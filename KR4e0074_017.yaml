  text: 遜志齋集卷之十七
  hash: sha256:1449f0c1aefd5aeba186270945a1823d343e991ecb82930a3ab58c48638d14c5
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4e0074_SBCK_017-1a}
body:
  text: 中順大夫浙江按察司副使奉勅提督學校雲間范惟一編輯奉政大夫浙江按察司僉事奉勅整飾兵備南昌唐堯臣校訂中順大夫浙江台州府知府事前刑部郎中東呉王可大校刋記柳氏譜記柳氏浦江著姓也鑄始遷祖也師顔其字河東其遷所自也建炎初其遷之時也瀚字宗海鑄子也森字子林彬字子均瀚子也森之子何監字元潔藴字元積也監生二子禪也祐也禪生子圓慶圓夭而慶子㫁不繼也祐子與某與某子新亦不繼也彬之子何温也温之子福福子周用用無子而周子嘗嘗子施亦絶也禪以下曷爲不字非無字也爲其絶不字也藴子𥙷之字山甫其官則宋崇德主簿也崇德之子知高郵縣事金字時某也高郵嘗以子貴贈泗州知州封浦江縣男則元之時也其子爲誰賀無嗣而寳後也次子貫加諱者何尊之也曷爲而尊之學爲當世師而名于其下冝尊也其仕則爲翰林待制而私謚則文肅也寳之子曰璟景文璟之子曰復叔賢𣏌叔堅也復子三恂性愭也𣏌子四愉某某愷也文肅公有子三人紹慶路學正卣三子秬頴穆也秬夭頴字伯嘉爲永豐尉曰士某子如士魯子得其子也穆字叔雍其子曰士忠字子中而孫則本尚㓜也同二子稠穟叔簡叔豐二子字也士恭穟子也因子程叔則而士禮程之子也自鑄至本十世矣續絶貴賤不同者何也天也天易知而難測敬順不怠而求合乎道者天所愛也肆悖不修而與道乖自逆于天者也天之於人無不愛而於順其道者愛之爲尤甚愛人則富貴之佚休之引而申之俾勿墜不如是則否焉然則天豈徒然哉視乎人之所爲而巳矣文肅公予雖不及師之而嘗聞之於人誠天之所愛者也今又獲見叔雍尤嗜學而近道蓋所謂善人乎文肅公之澤緜乎其未艾也余是以樂爲柳氏稱也龜岩隱居記山嶽川流霞雲草木流峙卷舒榮顇之態變化至無窮盡也然咸出天地自然之理使身居其所目寓其象以充大其德業以蛻濯汚垢以通乎出䖏消長隱㣲而不謬乎理則山川雲木固爲人學道之助及道之旣成也亦可謂無負於此也茍爲不然則嶄然而高者山也湛然而㓗者川也朝歛夕舒春榮秋顇者雲霞草木也而渺然居䖏乎其間者曰人耳果何預於巳之損益哉余少也好遊毎遇夫名山秀川之寓乎目而樂乎心者輙左右瞻眺思見夫學道之人觀其所得之淺深以勗乎已之不逮恨其人不槩見而重巒宻林多爲龎僧野叟之所窟宅欲以半畝之宮棲息於寛閒之境造物者亦靳而不之與豈吾道不頼乎外物而自成乎許君士脩有道士也其從父弟曰士成隱居于寜海縣治東南三十里之九湾山日循西行二里許山趾得翠石高大徑數丈若巨龜出曝於江渚之上石旁土田衍沃可耕而山勢亢爽風氣固宻初無築室于兹者士成顧而異之曰吾所居雖與山俱而喧雜湫隘豈天偶以此遺我乎因以貲購石旁之地立屋數間而謂之龜岩隱居間見予輙請記夫士成豈果爲隱者哉觀山於艮則當審夫時止時行之義觀水於坎則當識夫常德行習教事之象觀屯於雲雷而以之經綸觀升於木而以之積順德之高大他日得出䖏之宜以其所畜及乎人而不匱者非士成也耶吾聞道之大原具於易而龜列於四靈士成沉静好易或隱或不隱灼石龜而卜焉殆必有得矣余何足以知之冝隱軒記洪武九年余遇鄭君好義于京師是時天子方以災變求言天下御史用深文致無罪守相數十百人于獄議者冤之君曰此寜不足言耶即草封事詣丞相願得召對言狀丞相問所言云何君抗色曰吾將見上言事丞相何問焉丞相怒奏抵君罪君慷慨不少屈辨說天下事激昻竒壯聲動朝廷聞其名者皆稱君爲竒士予亦服君之才以爲且將立功名當世憂患不能沮之也後予遊學于外不與君相聞者甚久前年君歸自江淮予往訪焉視其貌加充聽其言若不忍出口語及前事則深自悔咎曰學未知道而多言此吾過也取聖賢經傳窮旦暮攻習發其其理而考諸躬行粹然若循䋲墨而蹈䂓矩非復昔日鄭君也予愈服之乃知昔之知鄭君者特其棄餘而君不予鄙也顧以所居冝隱之軒属予記凡物有所冝者必有所短舟冝於川而不冝於陸騏驥冝於致逺而不宜於服田偏於用也神龍乘風雲吐雷電下上八極而困蟄於玄冬與蛙螾等局於時也惟人亦然辨士冝於戦闘之際而居平世不如庸人烏獲任鄙冝於尚力之主而折旋尊爼之間手足無所可用拘於技也孟公綽冝於爲宰而短於治劇黄覇治郡則冝而爲相則損才各有所便也若夫爲聖賢之學者脩之於身也無不具而見之於用也無不能豈果有所冝與否哉其仕也隱之道行其隱也仕之用存不違俗以爲高不同世以求合用舎進退皆安之而不顧夫是之謂君子鄭君之學得於聖賢者美矣豈冝於隱而不良於行乎昔之見君也未越十年而君之所得過於昔之所見也多矣自兹以往使益進於道烏知無大異於今者而其冝於隱也庸知非冝於仕之端乎人之常情不能安於藜藿則不能享八珍之奉服䟽布而厭者其衣文綉也必驕未有濫於貧約而可䖏冨貴以免禍者故有慕利禄之心者死於貧賤者也隱居自得而樂之不厭者功名冨貴之人也黙山精舎記余年十七八侍先君守濟寜壽昌胡君朝翰自太學來分教魯諸生余時與之往來甚熟朝翰能爲詩執筆作行草書蜿蜒滿𥿄余私敬愛之後余先君捐舘執䘮歸天台聞朝翰亦丁内艱去不獲見及既除喪服至京師朝翰來訪逆旅追計昔日相見時巳五年朝翰貌加老與之語舊故各悚然不自勝余謂朝翰今内外仕者多出大學子亦將仕乎朝翰曰仕不仕有命非我所敢知我家壽昌有黙山最勝吾祖宋校書君楚才嘗歸老于此某思結屋其旁讀書著文以自娯第未果歸耳屋成名之爲黙山精舎子必爲我記之予曰子倘歸予記未晚既而朝翰每見必以爲吾言且曰子第爲記歸與否不在子也乃告之曰仕與隱皆非君子之所樂也樂得其道焉耳古之人有居輔相之位而色憂者矣有飯𬞞飲水而充焉自得者矣豈以仕與隱爲樂哉仕而得行其道可樂也隱而不失其義亦可樂也故樂在乎道奚以窮逹論哉茍無其道而樂居乎位是竊禄也不以其道而自肆於隱是盗名也故君子未嘗志乎仕亦未嘗志乎隱而惟其道之脩不志乎仕而卒然居乎位則人信之曰是不爲仕也爲行道也則其道之化人也速不期隱而隱則人信之曰是將爲隱也知其道之不可行也則人服其行而莫敢非之然則子之不汲汲於仕者是矣而何以眷眷於黙山哉且人之榮辱貴賤有命惟君子能不以之爲喜戚而脩其在我者以勝之子不見魯之陋巷乎當顔子之䖏乎此無一命之爵古金之禄以榮貴其身而今越千載雖野人婦女皆敬而仰之非以其道德之勝耶語當時之爵禄崇衍者季孟陽貨之流勝於顔子逺矣而今尚有識其故居者乎子誠能脩乎在巳者他日仕則以施諸人歸而隱則以善其身而名于後世使後世之人指黙山之精舎若魯人之仰陋巷然而予之言亦以子而傳不亦善耶直内齋記人之受於天者均也聖人與天同德而衆人至於與物爲徒可不知其故哉於此有泉焉其發源同其㓗瑩甘美同其一注之金玉之噐而􅍥之羃之塵壒無自而侵則其明可以察毫髪其味可以薦鬼神與其發源之初無以異其一入乎淤泥積潦之溝牛馬之所踐鳬鶩之所浴穢汚之所集而莫或藩捍澄治之則雖欲不異乎其初弗可致矣聖人之質金玉之噐也而又以禮爲􅍥以敬爲羃持之以兢兢之畏守之以翼翼之恭是以其中心渾全無所虧蝕其德即天德也其道即天道也其語黙進退出䖏久速舉措設張後乎天者不違乎天而先乎天者天不能違也故聖人之質旣美而又有自新之具其所合乎天者豈偶然哉若夫常人其質固已不美矣天理之所在嗜好汨之於内利害鉥之於外聲色臭味爵禄名勢所以穢汚之者非一端而又重之以怠肆放之以邪僻彼安能復同於天而不變其始哉其與物相去不能分寸者不知自新之學故也夫聖人之與庸人其資之不侔固有由然矣使衆人亦以聖人自新者治其心而加謹焉雖未至於聖其有不至於君子者乎此予於㑹稽張君遁之名齋而喜其有志也張君之質過衆人甚逺而好學慕古道取孔子釋坤六二之言以直内爲齋居之名夫敬爲復善去惡之機天理之所由存人欲之所由消也故人能一主乎敬穾奥之間儼乎若上帝之臨造次之頃凛乎若珪璧之奉妄思邪慮罔或萌孽其中而皆發於義也以之事父則盡乎孝而非欲人稱己之孝而爲之也以之事君則致其忠而非願乎冨貴華寵而爲之也操之而不失則内直内直則方外者在是而聖人之天德可庻㡬而至矣故曰直方大不習無不利則不疑其所行也學而至於不疑其所行非㡬於聖而能之乎嗟夫夫人皆可以與天同德而不知主敬以明善斯有志者之所以爲難能歟若張君者獨能取古人之學以自勉非有志而能然歟予也固志乎道而未至者焉得不與君言之而且以自警也歟君子齋記去年秋詔選太學生高等者爲郡縣學教官盧龍王藴玉來教諭沔陽予獲見焉其色燁然其儀度偉然聽其論事與人之得失當否㢘厲而精確使人悚然異肅然敬也是冬例朝京師予獲與藴玉偕道進往返八千餘里藴玉不予棄也行必聮轡息必比席食也匕箸之與鄰言也辭說之與叅歡然有㑹乎心而若有所得予與藴玉皆然而莫知其所由然也今年夏藴玉復來訪予郡學留與坐察其貌加粹以温叩其言益醇以簡而其志欿然愈自下不倦論古人之學輙悔其用力之未至予於是歎而深竒之噫何其進之速也古之君子德業赫赫著于天下流於後世者豈特天質之美哉蓋其操志也不畫於卑近其爲學也不安於淺陋平居無事固無時而不學及乎臨政事君聽訟接下御家睦親教人授業行師奉祭以至遊息寢䖏燕語歩趍亦無一事之非學惟其爲學之心常存而不怠是以凢有聲者皆足以悟乎耳不必聞琴瑟佩玉而後邪慮不萌也有形者皆足悟乎目不特閱典謨雅頌而後至理可樂也經乎耳目者顯而天地日月雷霆風雨山川草木幽而隂陽寒暑之盛衰進退無不足以濯舊蔽而啓新知君子之心曷嘗有斯湏之不進哉是以自少而至耄老自恒人而至聖賢如禾黍自盈寸之苗而至於有秋𣏌􅎚楩楠自拱把之植而至於百圍蓋有可必而不可誣者後之士志狹而易肆學陋而易足口焉而無得於心書焉而不求其道少之所習至長而忘長之所有至仕而棄未貴而先驕未老而巳懈勉強而僅得者不旋踵而失之豈復可望其進哉位愈高而名愈辱年益加而德彌損不至於小人而不止者衆矣求如藴玉之進乎道而不怠者烏可得哉自識藴玉始一年而巳覺其進使毎見而毎有所進焉其至於君子也孰禦蓋古之學者期至於君子後之學者期至於公卿爲君子矣雖不爲公卿無害也爲公卿而不足爲君子其如公卿何藴玉請名其齋居予欲以古人望之也因名之曰君子齋而以其說告之且以考其所進焉尚志齋記今人多不如古也而莫士爲甚以其無志也吾嘗試于衆曰周公孔子與吾同也可取而師也顔子孟子與吾同也可取而友也衆若駭然而驚愕然而相顧悱然笑予以爲狂嗚呼甚矣今之士之無志也寜獨不思乎口之所食者周公孔子顔孟所食之粟也身之所服者周公孔子顔孟所服之帛也寒而火暑而風廬而居車馬而行晨興而夕寢莫不與周公孔子顔孟同目能視耳能聽手足持且行亦莫有異者何獨於道而疑之乎使此四君子皆若世所妄傳神仙鬼物之不可形象則不可效之矣今其人生而居有鄕沒而相傳有子孫其德行文章具乎書可徴其所以爲聖賢爲學之次第可考而知奚爲而不可効之哉且此四君子者其性與吾同其形與吾同其能四耳而三目六五常而二其心邪而吾心之所具者亦未嘗闕其一也彼何獨可爲聖賢而吾何獨不可爲哉是有故也周公人臣也思兼三王之所爲孔子顔孟皆匹夫也而或自比文王或謂舜可得而及或羞比伯夷伊尹其所志如此其自視其身何如哉天之生身也豈特養夫區區之口體至死而巳哉亦將以輔天地所不及而助之養斯民耳然有命焉或不得位以施其澤於當時則著諸書而傳之乎後世惟伸其道而巳窮逹不足以累之也惟其不累乎窮逹故䖏之廊廟而無喜色困之畎畝而不動其中其中之所存者重故視乎外者輕志巳素定也豈若鄙夫之爲哉所志在乎冨貴權術得之則以爲榮失之則摧挫而欲死自君子觀之與犬䑕何異而或自以爲適者所志者卑故也故志乎冨貴權術而不志乎道者自賤其身者也謂其身不足以行道者誣其身者也謂周孔顔孟爲不可及者棄其天性者也是三者皆君子之賊也余友金華俞君子嚴請名其讀書之齋于太史公公名之曰尚志余病乎士之無志也久矣故告之以其說尚友齋記生乎今之世以舉世之人爲不足必求士於千載之上而友之其待巳不亦太重而視人不亦太輕乎非然也顧在我者何如耳我誠庸人也雖同閭共巷之人皆我所畏我安敢友之我誠賢也我誠有道也雖空天下無一人視千載如一時可也吾安可不友乎古之人是故昔者孔子自儗文王孟子羞比管仲而願學孔子斯一聖一賢其自知也明故其自許者當歴百世而無異詞茍不度其能而過於自許若司馬遷之比仲尼石勒之卑光武言未出口而人且竊咲之矣將孰信耶雖然此要其終而言耳學者之立志則異乎是古今一理也智與愚一性也能窮理而盡性雖即吾身爲孔孟可也雖上取孔孟而期友之亦可也况餘人乎浦陽黄君仲昭年二十餘好學而警敏嘗以尚友名其齋浦陽萬家邑也其業儒者亦衆矣仲昭雖賢豈無一人可與仲昭友者乎又推之於一郡又推之淛水之東其民益衆如仲昭者冝亦多矣又推之於大江之南極其廣而至天下豈盡無如仲昭之賢者乎仲昭皆不之求而遽取古之人以爲友或者固不能無疑然而仲昭之志則可尚也古之聖賢曷嘗以衆人待其身哉世衰俗䧏士不知所立志視古之人如鬼神異物然以爲非人所能及間有以古人自望者輙指咲以爲狂嗟乎今人啜粟衣帛莫不與古人同至於古人之道則自賤其身而不敢畧效之不亦愚乎仲昭之爲人余雖不足知然斯志則古人之志也是可以尚友矣顧未知仲昭所願友者何人爾古之人有賢有不賢其道有至有不至仲昭取其賢且至者以爲友而以其不賢者自懲則凡册書之所具孰非仲昭之友乎予頗有志於古以爲伊尹周公皆所當友者毎爲人所指笑喜仲昭之似吾志故爲之記若夫古人學術政事之懿道德仁義之說尚當與仲昭講之省庵記同郡盧廷剛爲谷府奉祠篤志問學勇於脩巳名其讀書之室曰省庵洪武癸酉從王過大梁予還自京師路遇焉請發其義未果也今年復自上國以書數千里抵漢中申前請予曰異哉廷剛之求也病瘍之人常求愈於瘍醫必不求醫於瘍者病目之人常求愈於目醫必不求醫於瞽者豈非未能治巳者固難望其治人乎予天下之固陋者平居視世事一無所省存誠而無思應物而無機見人紿巳輙以爲是而不省其爲欺見人侮巳輙以爲冝而不省其爲妄聞譽吾者泊然内視而不省以爲可喜聞毀吾者確然自信而不省以爲可怒於凡得䘮榮辱禍福皆不入吾胸中疾雷震電而不省爲之驚鬼出魅沒而不省爲之惑舉四海之無所省者莫予加也而廷剛顧求吾發省庵之義與醫瘍於瘍醫瞽於瞽何異哉雖然人之情不能兩至有所昧者必有所明有所短者必有所長予於物之外至者固不省矣吾豈果無省者乎吾於言也省其或違乎理於行也省其或戻於義念慮之萌發也省其或汨於私而淪於欲事上也省其未竭乎忠撫下也省其未底乎寛交友也省其未有以先施事神也省其未能無愧於天凡動乎四體而出乎口者未嘗不致吾之省非徒省之而巳又必攻之克之揉之直之使中心循乎正而不頗雖若是庸敢謂之能自省乎哉庸敢自謂弗叛於君子之道乎哉且予聞之無過而不省者聖人也有過輙省而即改者賢人也告以過而能改者進於君子者也過之不省而省所不必省者衆人也廷剛能於斯數者而慎所省焉然後知予所必省者非太察而所不省者非太踈也雖然經之言曰惟精惟一精則省之謂也知之属也一則非致力於守不能也克巳之事而行之夲也自昔大賢君子未嘗不從事於斯者而况予與廷剛也歟况不及廷剛者歟予也焉可不卒言之以塞廷剛之請且以自勉歟御賜訓辭記䖏天下之大位者必基之以天下之盛德而後可德不足而位有餘天道之所不與也自昔帝王之興天將俾文武才智之士出而輔翼之以享太平之樂必生盛德之君子以爲之先使之積仁累行以啓後人之業是以本源深長慶澤隆衍而奕世承其爵位于無窮非若僥倖于一旦者之不可恃也洪惟聖天子受天明命肇造區夏豪傑英勇之臣乘時奮身以立大功至將相者固不可以一二計求其有積乎其前有繼乎其後事業謀謨可以叅乎古之名臣者惟故𡵨陽武靖王李公爲然武靖之先駙馬都尉隴西恭獻王以皇國懿親晚享爵土方少壯時事父母極盡子道及際風雲之㑹爲上所尊禮在群臣中莫有比者而寅畏慎宻言不及私敦厚寛大動必思義海内稱盛德者歸焉至武靖王遂以元勲登上公之貴忠孝大節卓爲天下師法由是福祚光寵爲國世家今國公嗣軄思繼祖考之美皇上乃書體爾嫡祖忠孝不息八字以賜公旣寳蔵之而祇服不忘復手録其副嚴奉于居第之正堂出入瞻視恒若對越天顔靡或懈怠且謂孝孺嘗獲拜武靖王而粗知其事貽書海上而以記爲属立身事君之道莫大於忠孝公之生也天旣命公以是理今上復申言之以爲賜聖人之言即天之言也天發乎言固已昭然若日月况筆之爲書而昭掲于斯雖河洛之所出龍龜之所負何以過于此哉縱有令於辭者猶不能復加毫末而况孝孺之鄙賤乎雖然忠孝之說竊嘗聞之矣事親而祗順無違固孝也推以事君誠敬而不欺仁恕而有容先國家之政而忘乎私惟生民社稷是利而不顧乎巳此尤孝之大者也故知孝親乃可以事君能忠於君然後謂之大孝而忠與孝非二致也若公之先王和色順德洽乎家庭宏猷偉論禆乎宗社竒功俊畧震乎四夷而守以誠慤内而君安之外而百姓信之於斯二者可謂兼盡矣公也可不思述前人之事以期無負聖天子之耿命乎古之賢臣能繼祖考之業若伊陟之於阿衡巫賢之於巫咸吕伋之於尚父召虎之於康公魏文貞之有謩李西平之有愬皆克宣先猷昭宏遺志以承勲烈于悠久使人因其身而益知祖德之盛以増國家之光是所謂忠孝之大者而非有志者不能學也公春秋冨而爲學甚專噐重厚而用志甚逺刻情飾行不知冨貴之在躬而孜孜焉以報君親之恩自勵古所稱世濟其美而與國同休者天下固望之矣然則安敢不爲公書之以慶國之有世臣乎學孔齋記隂陽之氣運乎两間物之有形色者莫不資之以自成而是氣也未嘗爲之加損三辰之明也五嶽之崇也四海之廣也百川之流也皆得乎是氣之大者也豫樟楩楠得之以爲材麟鳯龜龍得之以爲祥虎豹犀象得之以爲威黍稷稻粱麻枲桑檿得之以利萬世力者得之以負重致逺靈者得之以司晨紀候而肖翹之類蝡動之倫非得乎是則不能有生其化可謂盛矣而運行不息者曷嘗有古今之間哉孔子之道亦然知者不得之則不能成其知勇者不得之則不能成其勇賜之辨求之藝偃與商之文學茍非有得焉則不能成其名而凡遊乎聖人之門者皆有聞乎其一二而聖人之道固自若也豈惟當世爲然千載之後得其全者爲大賢得其正者爲君子得其偏者猶不失爲善人明乎春秋者得其㫁明乎易衍者得其中明乎詩書者得其正明乎禮樂者得其文無得焉者過焉而爲莊周卑焉而爲申韓悖焉而爲小人具視聽而備人之形者孰能舎斯道而自立哉故庻人舎是則長㓜乖大夫士舎是則軄業墮爲將相舎是則無益於國而禍及之爲南靣之君而不師斯道則無以施德澤于衆庻著顯號於無窮由周漢而來得孔子之道以爲君者視其治功可考矣帝者得之爲文景爲明章爲太宗爲仁宗王者得之則或卓然爲宗英或知爲善之可樂是皆有絶人之資高世之識故能知所務而卒有成雖所得未能盡乎大全然皆聖人之徒也以臣觀乎蜀王殿下其聖人之徒而得其大全者乎殿下資禀甚高而務學甚篤聞道甚早而力行不怠明足以照萬理而不底于太察才足以綜萬事而行之以無爲德度之懿煦乎陽和之温也問學之愽浩乎寳蔵之冨也學古之士有一于此皆思自附於聖賢而乃䖏之以謙虗守之以畏慎檢身進道恒若不及而於恤民濟衆賑灾施惠之事孜孜爲之使遇孔子之聖而師尊焉所得豈可量哉間論群聖之道因以學孔名殿側之齋命臣記其說夫孔子之學當世之學者皆知之求其善學孔子之道者雖古之君子或病焉非孔子果不易學也竊取其偏而不求其全以名求之而不知吾身之可以爲聖賢者衆矣孔子所以與隂陽同其化者固足以陶鑄百王而範圍三代其言見乎經者人之所能識也其事本諸心者非學道而有得者不能也殿下旣有得於斯道矣而臣何言焉雖然得之固美也而守之難守之固難而不變其守推以及物也益難先乎孔子而得斯道之大全者莫如堯舜文王學乎孔子而得其全者莫如顔子堯舜之欽明恭巳文王之不顯亦臨無斁亦保顔子之克己復禮服膺不惰大聖大賢之守斯道也豈有他術哉亦曰敬而巳敬者所以成夫仁而巳矣仁爲衆善之原群德之長而天地之心也得此以爲人則人道盡得此以爲君則君道備孔子之聖豈能加毫末於斯乎故爲人而不學孔顔之學則不足以爲人爲君而不以堯舜文王爲凖則爲失君之軄自孔子以來千有餘歲矣知孔子者多不獲居乎大位而冨貴尊顯者往往不知師聖人之大全是以生民於孔子之澤未之數一作類𬒳也夫以殿下備顔子所有之德而居孔子所無之位敬以守之仁以行之至於愈久而不變固所優爲者推至仁以治國俾人人謂居大位學孔子而得其大全者自殿下始以一洗往古之陋豈非天下後世之幸也哉身脩思永堂記世子殿下旣正位儲宫惟負荷國家之重上而祇承帝訓恭紹王猷下而撫臨群臣士民以及三軍之衆弗可以不稽古爲學也日御殿東堂與官僚通經術者講說虞夏商周君臣出治立德之要孔子孟軻垂世淑人之言孜孜忘食因請于王取臯陶陳謨之語名所御堂曰身修思永以著厥志㑹臣較文京師還有教俾記其事臣拜手譲不可則言曰爲國之本莫尚乎脩身脩身之道莫切乎治心而心之官則在乎思是思者賢否之所由出治亂之所由生休咎之所由分也人之有身孰能無所思也哉惟能䖏其身于禮義所思不止乎安一巳而及於生民不止乎適一時而貽諸後世發言也恐或蔽於凡近而必務可以經逺施政也恐或便於目前而必欲傳之無窮如是則思永而身無不脩矣古昔賢君保宗廟社稷于千百載者未有不始于斯者也若夫恒人則不然耳目也聲色或誘之肢體也佚樂或溺之好義理矣或不勝乎利欲喜問學矣或不能推之行事言行之間茍且爲斯湏之計而不暇稍逺其謀欲其身之脩而治其國家烏可得哉今殿下名堂特有取乎臯陶之說可謂知所擇矣然殿下日新聖道於古事無不貫逹臣不敢復論抑嘗竊觀聖天子之致治宵衣旰食數十年無一日之怠冨有天下而膳服未嘗過其節嗜好未嘗失其中畏天恤民之意聞乎中國而播於四夷舉一事立一法必慮萬世而爲之防巍巍高出乎往古而開久大之業者皆身脩思永之明效而百王之取法者也豈非殿下之當師哉夫人君自謂不敢師聖人者知不優也有師聖人之美志而無其效者勇不逮也智勇具全而莫能輔君以道德者群臣之過也殿下信道敏學而問於臣顧臣雖不足以辱命而亦不敢有隱周公之詩曰無念爾祖聿脩厥德永言配命自求多福逺之如虞廷賢臣之所陳近之如聖上之所傳篤志力行以保艾王家之丕基私竊有望焉御史府記皇上嗣位之初即下明詔行寛政赦有罪蠲逋租鉅萬計去事之妨民者明年以紀元賜高年米肉絮帛民鬻子者官爲之贖免田之租稅㡬年分遣使者問海内所患苦賞㢘平吏罪至死者多全活之於是刑部都察院論囚視往歲减三分之二人皆重於犯法二年春二月甲子有詔若曰頃以訴狀繁易御史臺號都察院與刑部分治庻獄今頼宗廟神靈㫁獄頗簡其更都院仍漢制爲御史府專以紏貪殘舉循良匡政事宣教化爲軄省御史貟定爲二十八人務爲忠厚以底治平三月戊辰賜御史衣明日巳巳以都院舊署在太平之北於朝謁爲難命即詹事府爲御史府賜宴于新治復命文武大臣皆預以寵綏之既而有勑令臣某記其事臣惟斯民之生以德養之則安於爲善以刑制之則棄於爲惡聖人之治天下豈有他術哉使人人皆知去惡以從善而治道成矣惟御史之官始於周其軄之所治與權任之重輕雖累變不常然得其人則紀綱振而國體尊非其人則人望不肅而是非錯繆然專任以刑獄則自近代始曩者法吏持刑深刻犯者滋衆先皇帝甚厭苦之欲有所更革而未暇今皇上以德養人群生喜恱訟者衰止復古官名以脩善政實行先帝之遺志自今居是府者其敬承聖訓凡便於國利於民者則言之爲民之蠧爲國之病者則去之母溺於私而枉其所守母懾于勢而屈所當爲一以道輔佐天子行德教使黎民醇厚如三代時斯不負建官圖治之意苟爲不然舎其大而務其細或事小忠末節以市名或爲詭行憸言以規榮利於民之治否國之安危無預焉則是官之名雖更而實之可厭苦者自若也奚可哉臣幸執筆從太史後夫紀政教明軄守以示後世史氏軄也故書其事以爲居位者規春風和氣堂記曹國李公年盛一作冨而志愽質壯而氣和一作温爲天子近戚重臣而篤學下賢嗜好與韋布之士類名私第燕䖏之所曰春風和氣堂因友人林君公輔属筆於某某念童稚時嘗以文見先武靖王于濟上王喜而禮貌之從容咲語以國士見期今十有五年矣而公克嗣先烈聲譽志業有光於前人名所居堂逺以見属爲義甚冨而相䖏甚厚不可以鄙賤辭廼爲之言曰天以五氣成歲功而施發生之德者爲春人以五常應變而具慈愛之道者爲仁天雖至徤非春無以生物人有剛武明毅之才非仁無以立政故國之有仁人猶天之有春也唐虞之世有稷契臯䕫爲春而無險戾乖僻之氣以間之是以其時爲極盛爲湯之春者伊尹爲高宗之春者傳說爲文武成康之春者周公召公畢公之徒其爲人不同然皆能恊和萬邦施惠澤於天下至周之季孔子孟子者出其德可以爲春而國莫或之用雖能備大和於一身而無由推以及物漢之興蕭曹爲之春光武之復國鄧禹馮異卓茂賈復之流或除殘去暴以成其功或豈弟慈祥以化其俗其事雖殊而爲之春者一也由漢而下有仁人以輔其政者其國必昌而長故唐以房杜姚宋爲春宋以王李韓范司馬公爲培植元氣之具而皆傳世數百年其他或温之未㡬而寒之者繼之發生之難不能勝殞伐之易由是斯民閱千百載而與春遇者蓋不能十一夫豈仁者盛於古而後世獨鮮哉或遺之而不能用或用之而叅以邪佞之人雖欲爲春不可得也我朝之有天下文武之臣爲世之春者不可勝計而武靖王實爲首稱方其戡大難夷大盗以不殺爲威以不戰爲武義聲所𬒳海内率從及功成治定出入殿廷左右天子所言皆惻怛寛大之事謙謹忠恕不自驕盈民到于今頌之此豈可勉強爲之哉仁發於誠而不可掩也今公當太平無事之時思前人之德念國家之恩掲春風於堂上以寓目焉儼乎若武靖王之在前而挹其聲容也穆乎若䖏唐虞三代之朝而聽仁人賢士之謀議也孝以繼志忠以盡軄學益明道益高自牧愈下將見爲國之春賛雍熈之治於斯世也有日矣寜止見於一堂而巳哉夫生長顯美而不溺於富貴有以識志節之竒不爲耳目之玩而以仁者之事自勉有以窺噐業之盛余旣追思武靖之德而喜見公之有成故願爲天下道之蘿月山房記䖏焉而樂者不如慕焉而樂之之深也人之常情久則玩玩則厭心生慕則好好則樂心生茍有天下至美之物心一厭焉則雖貴而必賤淳熬擣珎世之美味也使常食者言之未必識其爲至美虞韶象武世之美音也使常聽者聆之未必知其爲善樂是以富貴者不知禄位之可樂而貧賤者慕焉山林之士不知幽寂之境之爲高而富貴者思焉然以貧賤而慕冨貴則爲鄙以富貴而慕林泉則爲逹其於外慕一也而賢否異焉者蓋無欲而貧賤猶不失爲善人無道而富貴其爲不幸也大矣世之賢士多喜林壑之趣而忘乎爵位之爲崇其亦有以也哉廣海何茂先資敏而文年少而竒其尊府當草昧時識真主於龍戰之頃遣使迎䧏所守十餘州不血一刃而歸軄方其有功于朝廷甚偉用是歴大藩者二十年遂剖符與諸徹侯等茂先生長於冨貴之中足未嘗履丘􅊤目未嘗覩林嶺性雅好學蕭然有出塵之姿其言論詩章若林居澗飲追雲月而遺氛垢者之所爲絶刮去軒裳綺紈態號其南門賜第讀書之室曰蘿月山房取杜子美過何將軍山林詩語也室之内外環以法書名畫竒石靈草在輦轂之下而有蘿浮衡麓間意聲利之人從之遊莫不自失也夫薜蘿之月隱居之士夫孰不見而未嘗知其趣茂先以之名一室而坐移崇山宻林于戸牖之下欣然而樂忘乎富貴之可羡是果曷爲而致此哉蓋其天資近道超乎世俗之表冝其不爲勢位所動也然心可楽乎物而不可溺乎物茍得其樂而不爲物所溺雖禄位不足爲累茍溺於所好而不能樂其趣雖林泉之清亦足爲役志之具而巳故士果有以超乎萬物則萬物皆爲我用無以過乎物則一心將爲萬物役聖賢之學所以貴乎窮理盡性使此心浩乎與天地同體故䖏富貴而不盈遇貧約而不歉臨大故㫁大事而不懾若是則利禄不能使之汚山林不能爲之清出䖏隱顯將無所不宜茂先之賢倘有意於是乎果出於是則雖子美復起而爲茂先言不能以有加矣而予也何足與聞之後樂堂記慮周乎當世然後可以任天下之事德施乎衆庻然後可以同天下之樂所知不過乎一時所謀不出乎一身者其不爲國家之禍者㡬希古昔豪傑之士居乎窮廬陋巷之中布衣𬞞食不足以自給而深思生民安危之由政教得失之故古今治亂之原而爲之營度計畫汲汲若謀其私彼豈不欲自逸而過爲是憂勞也哉蓋天之授人以才智非欲其自謀一身而巳固將望之𥙷天道之所不能助生民之所不及焉爾是以伊尹方䖏畎畝而以覺斯民自任顔淵飲水飢餓而論爲邦孟子轍環四方毎以先王之道告世之有力者誠知所受者大所任者重不敢棄當世而負乎天也故得志則澤𬒳于四海不得志則功流于後世其德業聲號愈逺而彌張若夫鄙夫則不然利乎身而忘乎人適乎今而不顧其後當其得所願而䖏大位肆於民上自謂可以無憂而不知無德及人終亦不能保其樂也予求士於今世不歸乎此者鮮矣若河南右叅議董公安常其聞聖賢之風而興起者乎公世居燕之宛平自爲儒生䖏山林間服布褐而茹藜粟巳懷憂民之心及元亡而國朝有天下公以薦入朝爲資善大夫事懿文皇太子其所陳說多忠厚之言皇上聞而善之超遷左春坊大學士㑹東宫晏駕俄出治河南盡心於民事民有所未安若疾在肢體政有所未宜若災在旦夕草封事數千言上于闕下而名其退食思政之堂曰後樂之堂蓋取范公希文之言以著其志焉世之居大任者多矣以家未富禄未厚所欲未盡得爲憂者常有之憂其軄之難稱者無有也不惟憂其軄而以斯民爲憂者尤無有也未得位則思位之可樂幸而得位則惟恐樂之未極孰有如范公之不忘天下而憂樂爲民者乎又孰有如公之慕聖賢者乎范公之學術與顔孟未必同也而憂民之心同公今之學術與范公未必類也而憂民之心亦同公之過於人豈不逺矣哉雖然范公謂先天下之憂而憂後天下之樂而樂然則世未臻於唐虞三代則君子將無斯湏之樂邪予觀公天質篤厚充養有素温粹之氣溢于咲言其中蓋有足樂者乎有以自樂而莫能施之于人此公之所以憂乎使䖏大位者皆能知公之所樂而效公之所憂斯民或者其有瘳乎後樂齋記匹夫而憂天下無位而論世事時俗以爲狂而君子之所取也以言乎位内而公卿大夫外而伯牧守令禄豐者任榮軄要者憂重匹夫固若無與焉以言乎道吾之所受於天者異於衆人若此其逺也天豈徒以是私我哉故大而天地小而人物而與我同類者或弗遂其性皆吾之任也皆吾任則皆吾之所當憂也安敢以身之卑軄爲觧乎古之人不敢以衆人待其身亦不敢以後王望其時顔回纍然布衣而自比於舜伊尹在草莾而思致其君於唐虞非爲夸大之論也道當爾也夫人在平居巳有仁萬物之心假之以位其功業孰禦乎故憂天下者天下之所恃以無憂者也鄙夫則不然務安其身而不恤乎人恱乎君而不顧乎後世其未得位則汲汲以求旣得之則極嗜好奉養之華以爲樂生民之艱瘁政治之闕失若巳不聞焉其心非不欲保禄位然其所務旣私甚則僨人之國否則自僨其身固有不能免者以其自爲之心太急而宴安之樂過早也茍能憂民之憂而圖利安之雖不期乎身之樂而樂自至矣寜有危敗之禍哉余少時誦范文正公之言而慕其爲人以爲賢者固當如是旣而觀其在仁宗時不獲大行其志以死每慨然歎息以爲仁宗近世之治主公經國之偉才猶不相遇合則世之有志如公而不值主者冝乎其多矣及遊四方求當今之士而交之欲其所志如公者未始一見然後又知非惟治主之難而有志者固少也近於京師識水嘉戴君思持思持爲大學生試事于外數年有司未之用賃室以居緼𫀆䟽食困貧殆不可䖏思持不以爲憂毎語生民之故輙深思長慮如切諸身然扁其室曰後樂若慕文正公之言者余於是私愛敬焉士之不能行道者憂貧賤慕冨貴之情害之也而思持獨不以此易其心其異於常人逺矣夫異常之事雖㣲而不廢古之義也乃記其齋以告於世焉孝思堂記人子之道養其親固難而莫難於顯其親顯其親固難而尤莫難乎安其親安其親難矣而惟壽其親者爲尤難也自庻人以上滑甘膬美之品纎麗温㓗之服孰不知奉乎父母然而顔色之或少違志意之有未誠愛敬之心一有不至則不足爲善養幸而事養無所戾然不能脩德以顯其身使父母之聲譽不彰徹于當世生無以異於衆庻沒無以豐其祭祀則親與巳皆未能無所憾或致身於貴富俾親得享其光榮矣茍才不克勝乎位善無以及乎人貽謗取侮而恒懼乎危辱之臻則亦未得爲孝也其或富貴而親安之矣勢位可以耀當時而名節不足傳後世則親之令名不能垂乎悠久君子猶病焉故孝子事親之心無窮而其道亦無窮養而能顯顯而能安安而能壽其親於永存庻㡬君子之所願而可以盡孝思之心乎成都王侯履道少䘮父其母夫人賢而知教納之於庠序俾就學旣而遂登朝爲御史由御史爲河南按察司僉事而母夫人固無恙履道迎就官所朝夕率婦子侍側怡愉順適僚友稱孝焉因扁其正堂曰孝思以著其志夫人恒難乎養而履道有禄以具肥甘供裘葛莫難乎顯親而履道入朝則豸冠立柱下執憲度以肅百僚出蒞大藩則綉衣持斧按行所部紏枉而旌直吏二千石以下奔走拜伏惟恐或後窮閭下邑數千里之民莫不想望其風采而思其家世之過人不謂之能顯親可乎然則履道之所宜思者在乎安其親之心壽其親之名而巳國之所尚者公㢘而持之以無欲民之所思者不擾而行之以寛惠邪墨者無所貸而柔愿者無所冤則可以恱乎親矣一念之所出一行之所施不惟欲狥乎巳而必欲合乎天不惟欲同乎人而必欲當乎理使稱仁人孝子者必歸焉則巳之名可傳親之名亦因以不朽矣能如是豈非孝思之大者乎履道家乎蜀蜀之士若司馬相如揚雄雖能顯其親於無窮而德不足李令伯以孝稱于後世而君子不能無憾可以當仁人孝子而無愧者惟諸葛武侯張敬夫爲然斯二賢者皆百世之士也人不以百世之士自期則其所思者不逺矣履道好古而文篤行而温他日致其身爲名臣以不忘其親使天下後世因孝思之堂誦履道之德其尚有考於吾言也全樂齋記心無媿戚慕怨而樂者樂乎天資於物而後樂者樂乎人天下之物未嘗無可樂也以無可樂而徒資於外物則其樂也有時而窮而吾樂之也有時而厭崇華侈㤗妖姱珍怪之於目繁聲逺調之於耳肥堅安養之於身可以樂亦可以悲衆人樂之而君子笑之君子之所樂全其受於天者而不以人僞叅之索之極其明踐之極其誠持而行之至於久而不息則天地之運寒暑之迹萬物之情皆吾樂也豈若資於外者之淺乎彼快然適意自以爲樂者可樂之具接於前則以爲舉世之樂莫能敵及靜思而熟念之凢其所樂者皆可慚恧悔恨也庸有一息之樂哉古之聖賢窮日之力常若不及者求其固有之樂而巳不以窮逹動其中也不以窮逹變其樂斯樂之至者乎浦陽黄君資安脩㓗而知義䖏一室布衣𬞞食若無以自適而心獨樂之名其所居曰全樂而属余以記凡人心有所樂口未必能言也况君之樂而余能言之乎然天下之道同也古今之性同也余探乎千載之上而求之舜之皷琴顔子之簞瓢曾晢之遊詠㑹乎吾心者如出於吾心也况於君乎余試與君登浦汭之高丘而望之榮且悴者何爲也感乎吾耳者何聲也晦明燠寒行乎兩間而無窮者何氣也流而逝峙而列者孰使之然也蒼乎其退乎其者誰爲之宰也君請爲余言之余當援琴而皷之君之樂即吾之樂也吾之樂與舜顔子曽晢之樂將有同乎無同乎人之樂乎天之樂乎君必知之矣余烏足與聞之好古齋記余遊太史公之門東陽葛君信亦以其業來學瞻其儀觀若有志古人者叩其言好舉易詩書㝷出其文數十篇皆斥去時俗語巳而視其文之目則題曰好古齋余異而問之曰君何古之取乎夫宓犠氏之前世之所謂上古也三代之間世之所謂中古也秦漢以䧏世之所謂下古也上古吾無徴焉耳下古吾無取焉耳君之所好者其中古乎中古之世今之世無隨随疑誤焉君生乎今之世所好於中古者果何道乎自夫鉅者而言民之生也置連帥諸侯以治之爲阡陌立井田以均之學校以教之禮樂以薫之而今之存者鮮矣爲州閭隣里之法以洽其情爲鄉飲鄉射之法以勉其怠爲冠昏䘮祭之法以厚其倫而今之行者寡矣君之所好將在兹乎君曰吾無位奚敢過計願近之余曰古之農畊焉而足食古之商稱物而求直古之工任力而求報今也或嬉懈以困其生或騰價以取乎人或窳其噐以欺世或不執三者之業異乎先王之教而肆然衣食於其間是以古之民也富今之民也貧古之俗也美今之俗也薄而君之所好將在斯乎君曰是亦非我所能爲也願近之余曰古之爲士者冠員而履方上衣而下裳長紳委前利劍珮後容臭珩璜備乎左右今也加乎元者方其隅納乎足者銳其首小𬒮斜裙束絲繫膂俯仰無和平之音進退無從容之度拜則軒其尻趨則蝢其歩而與古異矣而君之好乎古豈謂是歟君曰服之不衷久矣然王制也吾何敢違用今之服行古之禮可也願復近之予曰古之爲學者豈務他哉務明乎倫理而巳故事君有言責者盡其言有事任者赴其功臨敵致其勇履難奮其忠事父母而竭其孝兄弟焉而竭其愛妻子焉而别且慈朋友焉而誠信不欺君之好古將謂是歟君曰斯人之常行也不敢不勉抑願聞其餘予曰古之人脩其業善其身而已未嘗有求於世也及其譽聞旣廣其君舉而加諸位其心戚然若不敢安遑遑然思推其澤於斯民若益稷伊傅之流是也今則不然脩其業以自鬻于人及旣得位則棄所學以富貴其身是以功名之見於世者䆮少矣君豈謂是歟君曰此立功之說聞君子有立言者奚若予曰古之立言者豈以文辭哉亦明其道而已道明矣思覺後世之人故不得巳而載之言其言出而爲經作萬世之程周衰秦漢間䖏士說客不知道術各以其臆見爲書偏曲詭激君子羞稱之然其辭有足取者至于今并失之矣而君之好其謂此乎君曰此吾志也盡之矣謹聞誨矣予曰雖然此皆以物而言也以物而觀誠有古今之異君盍思夫道充天地亘古今一而巳矣堯舜禹湯文武盡之以爲君益稷伊傳周公盡之以爲臣孔子盡之以爲聖顔回曽參踐之以爲賢盗跖違之以暴桀紂逆之以亡是道也不以冨貴而加不以貧賤而損不以古而興不以今而隕誠反而求之自有太極具於吾心古孰甚焉躬而行之逹則兼善天下窮之獨善其身古之人皆然余亦有志於古凡井田封建之法三代之大典未嘗不究而知之思而欲行之不敢以今之人自視也而君好古之道言貌文辭皆類乎古則亦古之人也行將造君而質焉君曰然請書以爲記種學齋記農之於田君子之於學其貴賤雖不同力至則獲多心專則功博其道類也然而山澤之農勞苦而常貧原隰之農逸暇而富足此限於地勢者然也農之良者能以力勝之惰者地雖美不能爲美焉蓋良農之治田也先時而藝倍力而培早作而夜不休垂成而志愈勸竭三時之力棄百事而不顧故土雖瘠而獲豐歲雖凶而不飢惰者不然藝則後於衆培則失其時貪休而嗜逸坐視人之勞而弗思及其將熟則礪錢鏄以趨之其土非不美也而力之不至則有不可恃者矣故豐歲而常飢凶年而離散此則在乎人之爲也然用力之中有不同焉五榖榖之善者也或者棄去不植而惟䄺稗焉是藝䄺稗歲凶土曠而暫植之可也藉之以爲常用力雖勞而與惰者無㡬矣不亦過歟夫學也何以異乎是人之資禀智愚之殊猶地之美惡然周公孔子之道五糓之種也賢智之資學之而易入固非愚者所及或恃焉而不加脩則歸於愚矣愚昧之人質固下也茍能兼攻而勇致之其有弗至於道者乎斯道也近之化一家逺之濟天下不可一日忘也或者病其難而事乎老佛名法之教其始非不足觀也而不可以用用之脩身則德墮用之治家則倫亂用之於國於天下則毒乎生民是猶䄺稗之農也學之蠧者也用力雖勞而不可入乎道也此農之有似乎學而鄭君叔度㫖乎韓氏種學之言以名其齋者歟夫叔度禮義之胄也而質過乎人生七齡而誦周公孔子之言今二十年矣田固美也生乎名胄又加美也學之早藝之先乎人也惟周公孔子焉學學之得其道也夫如是在乎加之不息耳累仁集義以培其本明六藝之文以暢其攴䟽之剔之惟恐邪穢之萌也扶之翼之欲其日盛而月長也􅉼之欲其深煦之欲其明引而程之欲其自強而不倦道之成也孰禦旣成矣欿焉其若虗眇焉如不及皇皇焉思與人共之足乎已而循乎天用則𬒳乎生民矣不用亦不失令名豈非種學之善者哉不然則鹵莾爾滅裂爾非吾之所謂學矣而與學之蠧者俱矣噫非叔度之賢斯言也吾將誰告歟訥齋記工於辯者非能言者也惟訥於言者爲近之用心與否之異也李廣之射石非用心於石也故中石而沒羽使廣之心知其爲石而求中之則石不可得而破矣天下之事莫勞於過用其心莫逸於棄其智巧而不用有意於用其智巧至拙者也有意於工其機辨至不能言者也漢之廷臣陳平之流口材窮天下而綘侯平居騃戅若不能出言孰不鄙其木訥哉及乎誅諸吕而安劉氏發一言而七廟定非平等也綘侯也故士能有所養然後臨事而不困百戰百勝之兵一戰而不勝敗矣蓄銳而不發未嘗有勇名必勝之將也夫以無窮之變交陳乎前而人欲以私智利口酬之使各當其理而無缺不亦難哉茍能析衆理以待乎事居至靜以應乎動彼嘵嘵而至吾以黙黙示之固將鉗舌汗顙之不暇而烏能與我較乎天台厲君士榮其少時志銳氣充讀書務博覧談論偉然常窮其同軰旣而渉世頗久乃自懲創見人厚自謙退不爲多言題其室曰訥齋士榮蓋有所得而然也吾嘗病利口者之衆以爲茍不有以捄止則日趨於薄思以身由之而未能然人見予之不言也或尤以爲傲或笑以爲愚彼固不足以知然而俗之所尚其可見矣毎竊自嘆安得與余同者而語之乎今旣於士榮見之而又惜其身之在下不能使人化之也雖然以士榮之才豈有不遇者哉吾試從而徴焉他日大夫士耻言人之過失而尚躬行田野之民安於其業而不能相訐訟臨民之上者相戒以惡言厲色爲羞此必訥者之化也當是時也士榮尚以告余亦可出而仕矣尊聞齋記古之人有不可及者惟聖人爲然自聖人以下其天資與人不大相逺也而後世莫有及之者無聖人爲之師而爲學之功不若古人也七十子之徒旣靣見聖人而躬受其教矣冝若可以無過猶且日檢其身而不睱聞聖人一言則退而識諸心出而講於友服於言行而推於事功或有愧乎斯言則惕然而慚戚然而憂恐恐然懼無以見於師而服乎友也及善其身而成其名人問之則又退然如不能勝曰斯吾師之教也非我之能爲也稱於人則曰吾師之云也非我之所能言也豈特於師爲然於當世之賢者亦然於昔之聞人亦然古人之尊所聞蓋如是故名立於當時傳於後世而不廢也今之人豈皆不若古人之有美質哉去聖人旣逺矣用力倍古之人且恐不足而顧放其心而不持弛其身而不脩視聖人之言如鳥過其目聞聖人之言如風入其耳不求其意之所存不察其道之可法於吾身同時之人冝又可知也蔑其所聞如此欲其名之立道之成豈可望哉奚獨不思乎聖人之所由聖七十子之學於聖人問荅辨難之說非徒云也七十子有是性也吾性與之同七十子有是才也吾才與之同七十子所學於聖人者吾何爲不可乎茍能即聖人之言以爲師諸子之言以爲友以顔閔所以自治者治其身顔閔可㡬而及矣况餘子乎且天下非無人生今之世而欲得如古聖人而師之固未見茍求勝巳者而師之豈無其人乎一鄕之中必有勝巳者吾師之一國之中必有勝巳者吾又從而師之以國爲未至又求天下勝巳者而事之則吾之所聞必衆矣告吾以善者必多矣又求古聖人之所言者而服之雖顔閔生今之世亦若是而已矣茍欲必得如聖人者以爲師而望以善其身難矣哉六人郭君士中好學善文辭受經於今太史公而取曾子之言以尊聞名其齋太史公信天下之師也士中旣得而師之矣又能尊其所聞則所以治身之道異乎今之所爲也必矣余欲以賢者望士中也故推吾所聞者以告之棠溪書舎記浦江之東有地曰棠溪吾友烏傷劉君養浩築室講學其上養浩學于太史公爲文有名于四方年四十餘志不稍懈而益篤焉養浩謂余嘗從事乎學俾余記之嗟乎學豈易爲而易知者哉非誠爲學者不足以知非誠知之不足以言言之而不至知之而不明皆未盡爲學之道者也古之爲學者可見矣其幽深奥渺者雖不可以言傳未有道不足以周萬理才不足以用天下而可爲聖賢者也孔子之門若子羔者跡其行可謂有道君子矣而孔子鄙之爲愚若仲由者可以治千乘之邑而斥之爲野蓋子羔之信道而才不足以行之仲由優於才而未能以聞道皆偏滯於一隅者也後世學聖賢者旣不足以得其大全高明宏逹之士務事功而過於踈畧純恪謹飾之士攻義理而局於卑懦踈畧之流必至於詐卑懦之流必至於木自漢以下未有不入於二途者也近者大賢病其若此於是著其說於群經大窮乎天地而㣲析乎毫髪精之於性命粗之於事爲莫不掲而示人使學者可以按書而蹈聖賢之域冝乎其易矣而卒未有至焉者有志者寡而安於小成者衆慎言篤行學之一事耳古之恒民皆由之而不以爲異今之能若是者人望之如聖賢而彼亦以得聖賢之道自望文辭言語道之餘噐耳古之人未嘗以此爲學而後之大儒君子舎是無以名此學之所以墜地而莫救也吾嘗以爲當今之世非傑然雄才出而脩孔孟之道不足以起俗學之弊而使生民見三代之盛以太史公之賢豈無望於爲學之士哉此吾與養浩之所宜勉也夫人有美才難矣以美才而得師又難也茍不以聖賢爲凖則豈不可惜乎故吾以大者爲養浩告若文辭之事固養浩之所知者余不敢以告也來鷗亭記心無一物之累然後萬物皆可以爲樂非樂夫物也物至乎前而皆足以資吾之樂也茍爲有累於心擾擾焉怵迫于中者紛紜起滅萬變而無窮五采八音陳乎耳目之側亦孰與爲樂哉故心誠有可樂雖㣲物皆足娯乎心其中無可樂者雖至可樂之物亦適以增其累昔之君子有居深山而群鹿豕者有居海濱而事漁釣者方其有以自樂快然不知貧賤之足悲而貴富之可慕凡物之觸乎見聞者莫不有以樂其中蓋其心之虗明廣大與天地同體而無一物之累其樂不亦宜乎後之士樂乎物者有矣有以自樂者每難乎其人豈非無得於心故哉無得於心而有資於物猶瞽者之資乎美觀聵者之資乎美音雖有可樂奚從而樂之華亭姚子宗文天資粹美而好學不倦其心蓋有足樂者異日居海上鷗鳥翔集于左右心樂之因名其居曰來鷗亭及來居淮水之隂群鷗從之如昔日仍掲其名而請予記夫鷗鳥之飛水居之人多見之而未嘗知其爲可樂姚子獨遇之忻忻莫逆于心豈獨於鷗爲然哉凡物之接乎前者莫非可樂之具也子思子曰鳶飛戾天魚躍于淵言其上下察也君子之道與其所樂安往而不在乎斯理也予竊有味焉而未之有得也幸而他日與姚子劇論斯亭之上以發吾心之所同者豈非果可樂也哉讀書齋記弓矢干戈所以禦亂而其弊也亦以興亂非弓矢干戈能興亂用之者非其人則亂因之而起或者以其興亂而不知其有禦亂之功遂棄而不用豈不惑哉聖人懼人性之偏於所習而淪於不善立詩書禮樂以教之愚者使之通昏者使之明悍者使之淳頑者使之㢘當周盛時天下無不學之民無不善之俗故賓興賢且能者用之於朝則爲良公卿而其在畎畝之人亦皆不失爲敦行君子其化至於刑措而不用其效至於七八百年而後亡詩書禮樂之教使然也後世覩其末流之弊謂辨士以口舌相傾皆教之所致而不究其善俗化民之功於是或任刑名以督責爲能或尚黄老以無爲爲高或用武夫俗吏各以其意見爲治求以勝詩書禮樂而卒不可勝然後知其不可及而終不能以此易彼斯非惑與故欲知天下之治亂視其俗欲知其俗視其民知學與否而巳矣異時江南之俗以貲産相推以侈靡相夸其號爲有識者客爲好學是以大亂乘之今國家有意於化民之事而其大家巨族亦慨然有慕於爲學車君叔明兄弟尤以文雅稱以其餘力發爲詠歌入其室樸素儉質其身無異嘗以讀書名其齋州里多效之能文辭者又從而嘆咏之吾故以是占天下之將治也人心亦衆矣欲一而同之舎其性之所同有者不能也其性之所同有者具乎詩書禮樂之教以此治人人心有不一者乎能一人心與之生死存亡無不可也此先王之意也今世方行之而巨室者又導上之教以致於衆庻者也使三呉之地比屋皆知爲學之美者寜不自車君始乎然則斯齋之所繫大矣黙齋記烏傷有士曰宗君思􅌖病世人以言語取敗題其居室爲黙而告予曰子能爲言其爲我記之余曰異哉乎宗君巳欲黙而強人以言乎以余之言爲是則君之黙過也以君之黙爲是則余之言非也二者不可以茍同矣君之有愛於余言何哉雖然予非好言者也蓋欲黙而未能者也於他人且不能不言况敢黙於宗君乎余嘗遊㤗山之崖見奔流之注於􅊤其聲若雷霆之震凡有耳者至其側皆廢其用而人不之恠及䖏乎家聞兒童噪於庭則咄而禁之然後知語與黙之說水之聲役於天故雖暴而人不惡兒童之噪出於人故人惡之君子之於語黙豈有他哉出於天而發於不得巳斯美矣道誠宜言也雖終日言孰能非之道誠宜黙也雖一啓齒人猶以爲病故君子未嘗有意于言亦未嘗有意乎黙也皆一於天而不敢叅之以人人僞而天誠誠者無窮而僞者有時敗也冝黙而言其失爲佞冝言而黙其失爲誣二者皆君子之所不取今宗君旣以黙自居而余復言之而不巳不亦皆不可乎是不然也昔之聖賢有不語如愚人者矣有以好辨稱於時者矣人豈敢訾其爲過哉有道者之於世不待言而化不待令而從若顔子是矣宗君其慕顔子者乎自大賢以䧏言不直則道不明道不明則學不傳故孟子居好辨之名而不辭余慕孟子者竊有志焉見山堂記桐廬多名山壽昌爲勝壽昌之南山又其勝者而梁氏居爲尤勝梁氏居當山之陽求其盡群山之勝於一覧者則在乎見山堂焉初山堂之未建梁氏曰某者按其西百餘武得小山高而不亢叢而不汙左右顧視而樂之乃剗荆棘除糞壤因崇以爲垣夷級以爲階腴者爲圃而通者爲徑斬木琢石而作斯堂堂成而四望諸山翼然臨乎前屹然蔽乎後雲幻霧詭林加穹而石加秀禽鳥猿鼯之音寒暑旦暮之變接乎耳目而動乎心志所以増益乎人者大矣於是名堂曰見山命諸子講學其中俾予記之世之山有目者皆見也然多蔽於所嗜幸無他嗜而見之則又病於求之大深取之大愽而不能有所得今夫樵者蘇蘇而然也市人屠賈日常見山而若無所見蔽於貨利而然也仕者汲汲於爵禄才者汲汲於名譽衆營營各役志於所嗜皆有所蔽而奪其耳目之正雖見猶否也惟夫幽人靜士遺外物而不嗜故獨見之然又多肆意於瑰竒幽絶之境不逹其大至於縁木躋崖窮極險怪敝履屐勞軀體而不知厭則其所得者狹矣善於用物者則不然㩀其要以觀其妙得其一而盡乎百凡接於目者㑹諸心心之所㑹皆足爲我用而不爲所役其事至逸而所獲至大故君子樂之若見山堂者近之矣然堂以爲學且與學道者類焉道具於聖賢之言人莫不學也而不見乎道之真以有蔽之者耳幸而無所蔽則又昡於文辭之富騖心畢精慱索逺采而不得其要故卒無因而至焉惟知要之士操大中以制衆理居至静以裁萬變知周乎物而不勞才𥙿於用而無窮斯爲善學者矣然則斯堂豈特可爲觀遊之適而巳哉孝友庵記烏傷朱氏居赤岸者爲㝡著元之季世丹溪先生諱震畗字彦脩以道德性命之說教其鄉人人咸服之先生娶戚氏生二子衍玉嘗擇地東朱山之原謂其子曰我死與而母俱蔵此若等冝祔于左右皆應曰諾巳而戚氏卒衍亦卒未㡬先生亦卒玉奉先生及母夫人柩窆于其中奉兄柩窆墓右又預治其左爲二穴他日將與其妻合塟即墓前若干武爲庵俾子弟居之以奉洒掃扁之曰孝友而來告曰此先君之志我則行之請有以示後人使世守無怠嗚呼古禮之廢也久矣塟之弊爲尤甚古之塟者萬民各以其族區分而序列之惟有罪者則不入兆域至周之季雖稍變弛然族塟之禮未變也昔嘗觀乎洙泗之間拜先聖人之墓見伯魚子思之冡昭穆序塟而子孫咸祔其側至今二千年而未巳猶有先王之遺意焉今之人儒衣冠而誦六藝者皆以學孔子自名至於塟其親則往往信俗巫冡師之說爲其身謀或父子異䖏或兄弟殊遷使其魂魄不相接形氣不相依與黜罰其親何異乎而猶以儒稱於人不亦妄矣乎若先生父子者可謂無愧於孔子傳不云乎慎終追逺民德歸厚矣慎終之事玉旣能行之茍欲追逺則豈不在後之人哉玉之子與衍之子從父兄弟也至於孫則爲從祖兄弟矣愈逺而至于曾玄至于來昆又至于數十世分益盡愛敬之心得無少衰乎幸有人焉能相率而拜于墓下㑹于斯庵之中指之曰某某墓之子也某墓之孫也出於某墓者也某墓又出於先生者也吾數十百人其初數十人耳數十人其𥘉數人耳數人之先先生一人耳一人之身何爲而不親睦乎聞斯言也有不涕泣而下拜者非人也孝友之心其能自巳乎其有弗追逺而返始者乎斯豈先生之志乎其可以示後人否乎玉泣曰是先生命玉之志也請書之望雲堂記生乎千載之上而爲後世所慕者夫豈偶然哉生乎千載之下而尚友乎古人者夫豈徒然哉道德功業不能逺過乎人無以興無窮之慕志行才術不能自㧞於流俗雖慕古之人無益也故觀古人之善當視慕者之衆寡觀今人之賢否當觀其所慕之人與其所爲之業所慕得其人而行或不掩焉君子以爲夸所爲有足多而不知取法於古之賢者君子以爲陋慕焉不失人由焉不違道豈非君子之所爲者乎綘人劉士登繇太學生仕于朝再擢爲京府治中二親居乎鄉去官所數千里以道途之不易也弗敢迎以養因名其堂曰望雲之堂蓋慕乎唐賢相文惠狄公之爲人而取其語以表其孝思可謂知所慕矣及觀士登之行巳爲政安重慎宻不大聲色而吏懾其威民信其令大夫士稱其才而咸謂劉氏爲有子又何難能也今天下之人有親如士登者不爲鮮而能善其身爲時令人如士登者鮮也善其身而能以古之賢臣自望者尤鮮也夫古之與今時有先後而其得於天者等耳文惠公之爲孝子爲忠臣卓乎貫天地昭乎掲日月者曷嘗加毫髪於天性之外哉善率之而巳矣以士登之篤志而才美歛之爲德行施之爲事功將奚所弗至他日位益崇所樹立益偉使後之人慕其行業猶今之慕文惠稱歎企羡父母與有榮焉則果能㧞於流俗而於孝也大矣然則居斯堂也可不深思君親之大義以求無愧於古人乎梅所記仙居高君德至博學慎行隱居薦谷之陽名其所居曰梅所客疑之曰有梅焉而謂之梅所可也環坐之内未嘗有梅而曰梅所何歟高君苟以梅自儗則梅一物耳生於寂寞之鄕而榮於窮冬之時視夫姱麗如綺綉絢郁如雲霞奪目適意逞妍於陽春而爲人所善者不侔甚矣而君獨何取乎或從而應之曰人與物固非同類也而有以比德焉昔日孔子嘗以蘭自儗周之詩人以樛木儗后妃以棫樸儗賢材屈原以申椒蘭桂比君子斯數者豈非草木哉而聖人賢士皆有取者以德不以其形也苟以其形枯叢敗折非有知識之性聲音之竒何足取之有蓋君子之觀物也求之於形似之外㑹於心意之表故物皆爲我用用之久而不厭彼衆人則不然騁意於形色之間娯情於臭味之頃譬如游蜂野蝶憧憧旦夕而不知止用力雖勞而所得者寡矣是烏足以語夫道德哉且子不聞乎随時而同俗者衆人之智也獨立而不變者君子之節也在昔之時挾材御術僥倖於一旦取鞍馬金帛以驕其妻子而自以爲得志者閭巷之間皆是也旋目而視之風雨散而沙塵飛欲再求而熟玩之巳不可見矣是何異於陽春之草木乎高君居衆人得志之時飲水飯粟以樂聖賢之道衆人固譏其戾俗而笑其後時矣及變亂旣清彼方危懼惴慄恐不能自脫而高君之道確然不變而坦然方亨何異於梅之在歲晏乎然則雖謂高君爲梅可也謂高君寓意於梅亦可也謂高君所居爲梅所亦無不可也何獨疑之乎於是高君謝曰㫖哉子誠知梅歟廣平有愧和靖不如臨海縣知縣黄誥黄巖縣知縣張師善台州府儒學教授尚芳訓導李深黄巖縣儒學教諭文程府學生陳縝葉琰王梅齡臨海縣學生李臨卿戴濬之黄巖縣學生孫思光牟汝鈞校對遜志齋集卷之十七終
