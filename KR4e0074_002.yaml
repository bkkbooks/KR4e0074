  text: 遜志齋集卷之二
  hash: sha256:a596b8eb8217e7c26f4f18a6c058127ddf73f4b37216b9b322e236f00f7db465
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4e0074_SBCK_002-1a}
body:
  text: 中順大夫浙江按察司副使奉勅提督學校雲間范惟一編輯奉政大夫浙江按察司僉事奉勅整飾兵備南昌唐堯臣校訂中順大夫浙江台州府知府事前邢部郎中東呉王可大校刋雜著釋統上仁義而王道徳而治者三代也智力而取法術而守者漢唐宋也強致而暴失之者秦隋也篡弒以得之無術以守之而子孫受其禍者晉也其取之也同而身爲天下戮者王莽也茍以全有天下號令行乎海内者爲正統耶則此皆其人矣然則湯武之與秦隋可得而班乎漢唐之與王莽可得而並乎莽之不齒乎正統久矣以其篡也而晉亦簒也後之得天下而異乎晉者寡矣而猶黜莽何也謂其無成而受誅也使光武不興而莽之子孫襲其位則亦將與之乎抑黜之乎昔之君子未嘗黜晋也其意以爲後人行天子之禮者數百年勢固不得而黜之推斯意也則莽茍不誅論正統者亦将與之矣嗚呼何其戾也正統之說何爲而立耶茍以其全有天下故以是名加之則彼固有天下矣何不加以是名也茍欲假此以寓褒貶正大分申君臣之義明仁暴之别内夏外夷扶天理而誅人僞則不宜無辨而猥加之以是名使聖智夷乎暴桀順人者等乎逆弑也僥倖而得天下者雖其勢力之強無所爲而不成然其心私計而深念未嘗不畏後世之公議今将立天下之大法以爲萬世勸戒不能探其邪正逆順之實以明其是非而㮣以正統加諸有天下之人不亦長僥倖者之惡而爲聖君賢主之羞乎適事機之㑹庸材小人皆可以得志處非其地用非其時聖君賢主亦不足以成治功古之能統一宇内而動不以正者多矣秦隋其尤也動不以正而以正統稱之使文武周公而有知其不羞與之同此名乎故謂周秦漢晋隋唐宋均爲正統猶謂孔子墨翟荘周李斯孟軻楊雄俱爲聖人而傳道統也其孰以爲可非聖人而謂之聖人人皆知其不然不可爲正統而加之以正統之號則安之而不知其不可是尚可以建之萬世而無弊乎名者聖人之所慎也季子然以冉求仲由爲大臣孔子忿然争之若二子之才魯之諸臣莫及也茍爲大臣未見其爲過而孔子慎而不許盖才如仲由冉求而以爲大臣則伊尹周公将曷以名之乎伊尹周公大臣也則二子非其類矣故曰可謂具臣矣以秦隋而方乎周豈直二子之與伊尹周公哉使孔子而出其不混而稱之也决矣盖必有其道焉而不可知矣嘗試論之曰天下有正統一變統三三代正統也如漢如唐如宋雖不敢㡬乎三代然其主皆有恤民之心則亦聖人之徒也附之以正統亦孔子與齊桓仁管仲之意歟奚謂變統取之不以正如晋宋齊梁之君使全有天下亦不可爲正矣守之不以仁義戕虐乎生民如秦與隋使傳數百年亦不可爲正矣夷狄而僣中國女后而㩀天位治如符堅才如武氏亦不可繼統矣二統立而勸戒之道明僥倖者其有所懼乎此非孔子之言也盖竊取孔子之意也釋統中正統之說立而後人君之位尊變統之名立而後正統之說明舉有天下者皆謂之正統則人将以正統可以智力得而不務脩德矣其弊至於使人驕肆而不知戒舉三代而下皆不謂之正統則人將以正統非後世所能及而不勉於爲善矣其弊至於使人懈怠而無所勸其有天下同也惟其或歸諸正統或歸諸變統而不可必得故賢主有所勸而姦雄暴君不敢萌陵上虐民之心朱子綱目之作所以誅暴止亂於前而爲萬世法也立一法而不足盡天下之情僞則小人將馳鶩乎法之外而竊笑吾法之踈是孰若無法之愈乎故正統以處其常而叅之以變統然後其變可得而盡也朱子之意曰周秦漢晋隋唐皆全有天下矣固不得不與之以正統苟如是則仁者徒仁暴者徒暴以正爲正又以非正爲正也而可乎吾之說則不然所貴乎爲君者豈謂其有天下哉以其建道德之中立仁義之極操政教之原有以過乎天下也有以過乎天下斯可以爲正統不然非其所㩀而㩀之是則變也以變爲正奚若以變爲變之美乎故周也漢也唐也宋也如朱子之意則可也晋也秦也隋也女后也夷狄也不謂之變何可哉正統則處之以天子之制變統則不得並焉正統之君非吾貴之也變統之君非吾賤之也賢者得民心得民心民斯尊之矣民尊之則天與之矣安得不貴之乎非其類無其徳民必惡之當時惡之後世以其位而尊之則違乎天矣故不得不賤之也貴不特於其身而又延及於子孫雖甚愚不肖苟未至於亡國猶尊之以正統之禮賤不特於其身而其子孫雖有賢知之才亦不能揜其惡夫如是而後褒貶明夫如是而後勸戒著夫如是而後正統尊奸邪息夷狄懼釋統下夫所謂變統之制者何也異於天子之禮也彼生以天子養沒以天子葬儼然帝中國而臣四夷天下莫與敵大矣曷爲而異其禮盖其所可致者勢也不可僣乎後世者義也勢行於一時義定於後世義之所在臣不敢私愛於君子不敢私尊於父大中至正之道質諸天地叅諸鬼神而不忒也何謂天子之禮正統是也正統之君始立則大書其國號謚號紀年之號凡其所爲必書所言必書祀典必書封拜必書書后曰皇后書太子曰皇太子后及太子殁皆曰崩葬必書其陵其謚有事可紀者紀其事所措置更革曰詔曰令曰制兵行曰討曰征曰伐施惠曰赦曰大赦施刑當罪曰誅曰伏誅違上興兵者曰反曰作亂曰犯曰㓂曰侵倍之者曰叛其鄰國其臣慢之者必因事貶之知尊正統者雖㣲必進之不幸而至於衰㣲受制於強暴或屈而臣之強暴者誠夷狄也誠不可爲正統也則盜賊之雄耳必慎抑揚予奪之辨其以兵侵也曰入㓂得地曰䧟㨿都曰㨿至闕曰犯虜正統之君必易辭書其故見殺曰弑而書其主之名及其主之沒也特書曰死其黨之與謀陳力得罪於正統者雖功多皆書曰死以著其罪以絶其惡得中國之地其民有思中國而叛之者曰起兵以地降者曰來歸不爲中國而反者彼亦不得而盗賊之也亦曰起兵得郡則曰取某郡其誘正統之臣曰誘執曰執殺曰殺将相則名其主正統之臣降于夷狄則夷狄之死不曰卒而曰死凡力能爲正統之患者㓕亡則異文書之以致喜之之意正統亂亡則詳書而屢見之以致惜之之意變統之異於正統者何也始一天下而正統絶則書甲子而分註其下曰是爲某帝某元年書國號而不書大書帝而不書皇書名而不著謚其所爲非大故不書常祀不書或書以志失禮或志禮之所從變則書立后不書尊封其属不書非賢臣雖王公拜罷卒葬不書行幸非關得失不書詔令非有更革不書其崩曰殂后死曰薨大臣曰卒佐簒弒賛征伐以危正統者曰死聚歛之臣曰死酷吏曰死浮屠之位尊而因事得書者曰死毀正統陵廟宫室名其主用兵不曰討不曰征伐刑其人不曰誅天下怨而起兵惡而起兵不曰反惡乎簒弑非惡乎君也惡乎夷狄惡乎女主非其君故不得以君道臨之也惟於其臣於其部落則得致其罪士之仕變統者能安中國則書能止暴亂除民害則書能明道術於後世則書有愈貴而愈賤者有愈賤而愈貴者利禄寵倖之臣愈貴而愈賤也守道不汙之士愈賤而愈貴也故君子之於變統外之而不親也㣲之而不尊也㫁㫁乎其嚴也閔閔乎恐其久也望望乎欲正統之復也是何也爲天下慮也奚而爲天下慮使女主而乘君位夷狄而踐中國簒弑而不亡暴虐而繼世生民之類㡬何而不滅乎立變統所以扶人極能言抑變統者君子之所取也後正統論正統之名何所本也曰本於春秋何以知其然也春秋之旨雖㣲而其大要不過辨君臣之等嚴華夷之分扶天理遏人欲而巳春秋之世周室衰諸侯盛以地不及於齊晋吳楚以兵以粟則不逺於魯衛曹鄭然而必曰天王天王齊晋雖大國一有踰分奸禮則必貶之楚與吳固巳稱王與周無異矣而斥之曰子曰人豈非君臣之等華夷之分不可廢乎傳曰春秋大居正又曰王者大一統此正統之名所由本也於乎後之言正統者其可戾春秋以爲說乎由周以來秦漢晋隋唐宋皆嘗一天下主中國而朝四夷矣正統必歸焉秦起始皇二十六年而止於二世之三年隋起開皇九年而盡大業十三年唐起武徳元年而盡天祐四年漢始高祖五年晋始太康元年宋始太平興國四年然漢自建安而分爲三晋自惠帝以後夷狄横熾而中原䧟沒宋自高宗播遷江表是三代者或與簒賊勢同地醜或爲夷狄所虜辱甚者或屈而臣之其㣲甚矣然君臣之等華夷之分之不可廢猶周也故漢必至於炎興元年而止晋必至於元興三年而止宋必至於祥興二年而後天命絶此百世不易之道春秋之大法也而或者見其㣲欲㫁自剖分之歳廢統而俱主之嗚呼其亦不察乎春秋之義而甘爲簒賊之歸也夫中國之爲貴者以有君臣之等禮義之教異乎夷狄也無君臣則入於夷狄入夷狄則與禽獸㡬矣當周之衰諸侯或射王中肩或天子出狩聖人豈不知周之無異於齊晋呉楚之屬哉然而常抑彼尊此者爲天下後世慮也茍以其迹則周當與魯衛同列矣何有於王乎如此則何以爲聖人之春秋乎夫漢晋宋之事奚異於此而今之横議者猶啜啜不置嗚呼其亦不察乎春秋之義而甘爲簒賊夷狄之歸也且聖人之作春秋以其操至公之道故建之天地而不謬前乎百王而有徴後俟來者而無惑也茍亦隨俗之好惡待時而重輕豈足以爲聖人哉俗之相成歲薰月染使人化而不知在宋之時見胡服聞胡語者猶以爲恠主其帝而虜之或羞稱其事至于元百年之間四海之内起居飲食聲音噐用皆化而同之斯民長子育孫於其土地習熟巳久以爲當爾昔既爲其民矣而斥之以爲夷狄豈不駭俗而驚世哉然顧嫌者乃一時之私非百世不易之道也賢者之慮事當先於衆人而預憂於後世使其可繼假使後世有聖人者出則將儼然當之如昔之正統乎抑亦有所裁制損益如處呉楚者乎苟以夷狄之主而進之於中國則無厭之虜何以懲畏安知其不復爲中國害乎如是則生民之禍大矣斯固仁者之所不忍也然則當何爲曰其始一天下也不得巳以正統之法書其國號而名其君於制詔號令變更之法稍異其文崩殂薨卒之稱逓降之繼世改元之禮如無統一傳以後分注之凡所當書者皆不得與中國之正統比以深致不幸之意使有天下者懲其害而保守不敢忽使夷狄知大義之嚴正統之不可以非類得以消弭其僥覬之心則亦庻乎聖人之意耳嗚呼俗之移人也久矣吾欲揚斯言於今之世寧能免啜啜者之躁怒哉此非予之言也乃聖人之言也向之所陳春秋之義也春秋之義茍廢三代以降得天下者亦異矣吾嘗妄論之曰有天下而不可比於正統者三篡臣也賊后也夷狄也何也夷狄惡其亂華篡臣賊后惡其亂倫也夫天之生此民好惡嗜欲之不齊不有以主之則紛争而靡定故簡聖賢之人授之命爲之主同其好惡節其嗜欲明君臣父子夫婦長㓜之倫以教之爲衣服等殺交際吉凶之禮以文之撥洪水猛獸蛇虫夷狄之害以安之夫所貴乎中國者以其有人倫也以其有禮文之美衣冠之制可以入先王之道也彼篡臣賊后者乘其君之間弑而奪其位人倫亡矣而可以主天下乎茍從而主之是率天下之民無父無君也是猶可說也彼夷狄者姪母烝雜父子相攘無人倫上下之等也無衣冠禮文之美也故先王以禽獸畜之不與中國之人齒茍舉而加諸中國之民之上是率天下爲禽獸也夫犬馬一旦㩀人之位雖三尺之童皆能憤怒號呼持挺而逐之悍婢奸隷殺其主而奪其家雖犬馬猶能爲之不平而噬囓之是何者爲其亂常也三者之亂常無異此矣士大夫誦先王之道者乃不知恠又或爲之辭其亦可悲矣乎或曰史以記事者欲其實乃所以彰其惡也故春秋於簒弑之君未嘗去其號聖人且不敢况後之人乎曰何爲其然也春秋之時非後世可比也當是時聞有臣弑君者矣未聞弒而奪其位者也且魯者聖人之父母國而時君固在也故或爲之諱若他國則㩀其赴告之辭而書之聖人固有不知其詳者矣然崔杼之弑齊簡公孔子沐浴而請討之季氏之逐魯昭公孔子一則曰公在乾侯二則曰公在乾侯使季氏而主魯聖人其忍以魯國君禮與之乎其黜之無疑矣然則吾之言固聖人意也復何僣乎又况巳徃之跡而欲曲爲之諱其亦不逹於義乎曰簒臣之事則既然矣賊后曷爲而不得爲主也聖人之作易其於此言之備矣陽者君之道也夫道也隂者臣之道也妻道也易之六爻凡隂之得中隂乘陽位必諄諄爲之戒坤隂之純卦也於其始則戒曰履霜堅氷至恐陽之忘備也於其終恐疑於無陽也曰龍戰于野五恐其居尊位也則曰黄裳元吉黄中色而棠下飾臣之事也婦之道也戒其居上則不吉也其他曰括囊曰含章曰從王事未嘗予其專也推之六十四卦之中莫不皆然則聖人之意可知矣春秋無其事故不書使有之聖人其肯一日主之乎曰夷狄之不可爲統何所本也曰書曰蠻夷猾夏㓂賊姦究以蠻夷與㓂賊並言之詩曰戎狄是膺孟子曰禹遏洪水驅蛇龍周公􅈾戎狄以戎狄與蛇䖝洪水並言之禮之言戎狄詳矣異服異言之人惡其類夷狄則察而誅之况夷狄乎孔子大管仲之功曰㣲管仲吾其𬒳髪左袵矣如其仁管仲之得爲仁者聖人美其攘夷狄也然則進夷狄而不攘又從而助之者其不仁亦甚矣曽謂聖人而肯主之乎學聖人之學治先王之道而昧乎此又何足論哉曰荆舒以南春秋之所夷狄獨可爲正統乎曰非也自秦以來襲禮義而爲中國者二千年矣人倫明而風俗美烏得與夷狄比乎先正大儒知夷狄之不可長也故雖強如符堅盛如徳光不與之以中國之禮知賊后之不可主也故吕氏之強武氏之才不與之以天子之位知篡臣之不可訓也故王莽侯景之徒一以盜賊待之其爲法至公其爲道至明其爲慮至逺也其於聖人之意春秋之分至得也所謂萬世而不可易者也曰是則三者皆廢之而不書乎曰不也吾固曰不比之於正統而已非廢之也不廢其迹而異其辭則其爲戒也深矣嗚呼天下後世之心吾不敢必也茍有賢者其将信吾言也夫自予爲此文未嘗出以示人人之聞此言者咸訾笑予以爲狂或隂詆詬之其謂然者獨予師太史公與金華胡公翰而已天下之人若二公者少而執偏私之見者常多予之言何恃而立於世哉然二公者天下之賢而知道者也文章言論惟知道之人能傳而偏私者無聞焉二公既信予則後世之賢者其有不信者乎吾之言其有所恃矣或稱古今人不同所見亦異又安知其果足恃哉抑吾聞道之在人不以古今而有二後有同予所得者必將有取于斯也有取無取不足較予拳拳之心爲天下生民慮爾有志乎生民者果以予言爲狂者乎抑狂者固自有其人乎深慮論一慮天下者常圖其所難而忽其所易備其所可畏而遺其所不疑然而禍常發於所忽之中而亂常起於不足疑之事豈其慮之未周與盖慮之所能及者人事之宜然而出於智力之所不及者天道也當秦之世而滅六諸侯一天下而其心以爲周之亡在乎諸侯之強耳變封建而爲郡縣方以爲兵革可不復用天子之位可以世守而不知漢帝起隴畝之匹夫而卒亡秦之社稷漢懲秦之孤立於是大建庻孽而爲諸侯以爲同姓之親可以相繼而無變而七國萌簒弑之謀武宣以後稍剖析之而分其勢以爲無事矣而王莽卒移漢祚光武之懲哀平魏之懲漢晋之懲魏各懲其所由亡而爲之備而其亡也皆岀其所備之外唐太宗聞武氏之殺其子孫求人於疑似之際而除之而武氏日侍其左右而不悟宋太祖見五代方鎮之足以制其君盡釋其兵權使力弱而易制而不知子孫卒困於夷狄此其人皆有出人之智負盖世之才其於治亂存亡之㡬思之詳而備之審矣慮切於此而禍興於彼終至於亂亡者何哉盖智可以謀人而不可以謀天良醫之子多死於病良巫之子多死於鬼彼豈工於活人而拙於活已之子哉乃工於謀人而拙於謀天也古之聖人知天下後世之變非智慮之所能周非法術之所能制不敢肆其私謀詭計而惟積至誠用大德以結乎天心使天眷其德若慈母之保赤子而不忍釋故其子孫雖有至愚不肖者足以亡國而天下不忍遽亡之此慮之逺者也夫茍不能自結於天而欲以區區之智籠絡當世之務而必後世之無危亡此理之所必無者也而豈天道哉深慮論二藥石所以治疾而不能使人無疾法制所以備亂而不能使天下無亂不治其致疾之源而好服藥者未有不死者也不能塞禍亂之本而好立法者未有不亡者也人身未甞有疾也疾之生也必有致之之由誠能預謹於飲食嗜欲之際而慎察於喜怒悲樂之間以固其元氣而調其榮衛使寒暑燥濕之毒不能奸其中雖㣲藥石固不害其爲生泄敗之壊傷之而恃藥石以爲可免於死此死者交首於世而不悟也夫天下固未嘗好亂也而亂常不絶於時豈誠法制之未備歟亦害其元氣故也夫人民者天下之元氣也人君得之則治失之則亂順其道則安逆其道則危其治亂安危之機亦有出於法制之外者矣人常拘拘焉盡心於法制之内而不盡心於法制之外非惑歟聖人之法常禁之於不待禁之後而令之於未嘗爲之先故法行而民不怨欲禁民之無相攘奪盜竊也必先思其攘奪盜竊之由使之有土以耕有業以爲有粟米布帛以爲衣食而後禁之則攘奪盜賊可止也欲禁民之無爲暴戾詐僞不率倫紀也必先爲學以教之行道以化之使之浸漬乎禮譲薫蒸乎忠厚知暴戾詐僞不率倫紀之爲非然後可得而息也欲其無相滛亂也必先使之無鰥寡怨曠之思欲其無貪黷也必先使之知畏戮辱而重㢘耻夫先使之可以無犯乎法而猶犯之者此誠玩法之民也玩法者非特法之所不容亦民之所不容也故刑罰加於下而民視之如霜雪之殺雷霆之擊以爲當然而不敢以爲非故民曉然知上之法所以安巳也非所以虐巳愛戴其上而不忍離卒有至凶極悍之徒萌無上之心亦無由而成事以其能固民之心也不能使之安其生復其性而責其無爲邪僻禁其無爲暴亂法制愈詳而民心愈離欲保國之無危是猶病内鑠之疾而欲求活於針砭及其死也不尤養生之無道而責針砭之不良嗚呼曷若治其本邪深慮論三繼世而有天下者必視前政之得失而損益之知其得而不知其失懲其失而盡革其舊此皆亂之始也夫有天下逺者至於數十世近者百餘年而後亡其先之政必有善者及其子孫一旦而敗之亦必有不善者茍去其不善而復其善増益其所未足而變更其所難循求其宜於民情則可矣奚必使其一出於巳而後爲政哉三代以降昏主敗國相㝷於世者非他皆欲以私意更其政而無公天下之心故也舜繼堯未嘗改於堯之政禹繼舜守舜之法而不敢損益湯之繼桀武王之繼紂反桀紂之所爲復之於禹湯之舊損益之而巳末嘗敢以私意爲之也以私意爲天下者懲其末而不究其本者也周之政可謂善矣本於唐虞二代之爲而損益於武王周公二聖人之心後世雖有智者豈能過於二聖人哉暴秦起而繼之見其子孫敗於削弱則曰周之政弱於是更之以強周之刑過於寛於是易之以猛而不知周之法未甞過於寛與弱也當周之衰國自爲政苛刑宻禁四布而百出武王周公之遺意掃蕩無遺民不堪其主之暴虐於是亡六國而爲秦則周之諸侯以強與猛而亡非過於弱與寛也秦不知其故不反武王周王之舊而重之以強濟之以猛於是天下怨苦而叛之非民之罪也變更之道非也夫政譬之弓然日用之則調越月逾旬而不用之則欹善治弓者見其欹則檠之使其調而巳不善治弓者則折而棄之而更以朽株敗枲爲弓以射射而不中乎禽豈禽之過哉棄良弓之過也天下之弓不能必其良否惟羿之弓不問可知其良以其善射而擇之精也後世之政其得失未可定也千載之後舉而行之而無弊者其惟武王周公之法乎深慮論四有天下者常欲傳之於後世而不免於敗亡者何哉其大患在於治之非其法其次則患守法者非其人也民心難合而易離譬之龍蛇虎豹然欲久畜之則必先求其嗜欲好惡喜怒之節而勿違其性使性安於我而無他慕之心然後可得而畜也既不失其性矣猶恐後之人未能皆若吾之用心專且勞於是立爲畜之之法而著之於書曰如是則可以久畜如彼則将逸去而不可禁使後世雖庸夫小子能守吾法而不變亦可以畜之而不失此創業者之責也法可以治而亂也法可以存而亡也歸罪於子孫而委諸天命可也茍吾法有未盡焉亂亡因吾法以起其可謂之天命乎周之嗣王自成康昭穆以下惟宣王爲賢其他者與漢唐亂亡之主無異然而至於七百餘年而後亡者守法者雖闇劣而其法善也當七國之時周雖巳衰使有賢主如宣王者復出赫然奮發舉文武之遺典而修明之諸侯有不歛袵而朝者乎故周之弊在乎守法者非其人而不在乎法漢唐之法駁雜而踈畧得賢主則治不得其人即亂而亡故其弊在乎法不足周事而不可專罪守法之非人若秦之法固不可得守矣使有賢主繼始皇之後猶不免於亂况胡亥之刻虐乎故二者俱弊而亡者秦也隋之法與秦異而守法者與秦同故法雖不足以取亡而亡於暴虐者隋也此五世之君惟周之亡爲天命秦隋漢唐雖爲法不同而自速其危亡則一而巳夫有天下者豈有自速危亡之心哉而子孫卒不免焉者其爲法之過也世之爲法者莫不欲禁暴亂貪猾詭僞盜竊之人而此數者常布滿海内之獄不爲少止豈爲刑罰之不重哉俟其爲暴亂貪猾詭僞盜竊而後禁之而不能使其不爲也聖人之爲法常治之於未爲之先使其心自知其非而不肯爲故爲法者不煩守法者不勞而民不敢爲亂易曰豶豕之牙吉豶牙非無牙也有牙而不能傷也此聖人治天下之法也深慮論五治天下有道仁義禮樂之謂也治天下有法慶賞刑誅之謂也古之爲法者以仁義禮樂爲榖粟而以慶賞刑誅爲塩醢故功成而民不病棄榖粟而食塩醢此亂之所由生也山谷之民固多不待塩醢而生者矣其害不過羸憊而無力以塩醢爲食不至於腐腸裂吻而死豈遂止哉人性非好死也常趨死之道而違生者告之者非也夫仁義禮樂之道非虚言而巳必有其實本其實而告之人寧有不知其美者乎仁義禮樂之爲人忌於世者由夫虚言而不爲事實者始告之以爲仁而不告之以爲仁之故彼将曰此虚言耳奚可用哉告之以爲義爲禮樂而不告之爲之之事彼将曰此特其名爾安足信哉此聖人之道所以見棄於世而不振也持劍擁盾而謂人曰我善闘人必信之儒衣冠而謂人曰我善闘不笑則怒矣故欲人之見信必先示之以其事聖人之爲仁非特曰仁而巳也必有仁之政欲民之無饑也口授之田欲民之無寒也教之桑而帛麻而布欲老者之有養祭享賔客之有奉也教之陂池而魚鱉牢柵而雞豚欲民之安也不爲苛役以勞之欲民之無天也不爲煩刑以虐之親老子獨者勿事胎育而貧者有給以至於獵而不傷麛卵樵而不斬萌孽皆仁也其爲義也必有義之政上之取之也有常用之也有節均之也有分疆界也以防其爭鄰保也以洽其歡車服也以昭貴賤衡量也以信多寡饑寒也减其力役之征畧其婚娶之儀學於閭也使其知長㓜之序書於鄉也使其知善惡之效推而至於安生而逹分尊上而趨事皆義也爲禮之政而使民自揖譲拜跪獻酬之㣲各極其敬以至於五倫叙而三綱立爲樂之政而使民自咏歌搏推舞蹈之事充而大之至於和樂忠信不怨不怒而易使聖人之用是四者持之以堅凝而守之以悠久如待穫於秋濬泉於深必得其效而後止四者之化成天下之民膠結而不可解有不齊者從而以法令之則令之易服而治之不難故三代之民非異於後世之民也後世之民常好亂而三代之時未甞有一民爲亂者治之者異也仁義禮樂入其心民雖知可以爲亂而不能賞罰旌誅動其心民雖欲爲亂而不敢不能者有所耻而不敢者有所畏也治天下而能使人耻於爲非雖無刑罰可也恃法威而使民畏民其能常畏乎及其衰則不畏之矣三代以下雖有賢主而不足致治者欲使民畏而不知仁義禮樂之說也故爲治不可以不察也深慮論六智者立法其次守法其次不亂法立法者非知仁義之道者不能守法者非知立法之意者不能不知立法之意者未有不亂法者也古之聖人既行仁義之政矣以爲未足以盡天下之變於是推仁義而寓之於法使吾之法行而仁義亦隂行其中故望吾之法者知其可畏而不犯中乎法者知法之立無非仁義而不怨用法而誅其民其民信之曰是非好法行也欲行仁義也故堯舜之世有不誅誅而海内服其公以其立法善而然也夫法之立豈爲利其國乎豈以保其子孫之不亡乎其意将以利民爾故法茍足以利民雖成於異代出於他人守之可也誠反先王之道而不足以利民雖作於吾心勿守之可也知其善而守之能守法者也知其不善而更之亦能守法者也所惡乎變法者不知法之意而以私意紛更之出於巳者以爲是出於古之人者以爲非是其所當非而非其所宜是舉天下好惡之公皆棄而不用而一凖其私意之法甚則時任其喜怒而亂予奪之平由是法不可行也蕭何曹參世所謂刀筆吏其功業事爲君子耻稱焉然何之立法參之善守法後世莫及也當秦之亡其患不在乎無法而患乎法之過嚴不患乎法廢而不舉而患乎自亂其法故蕭何既損益一代之典曹參繼之即泊然無所復爲參之才何之所畏非不能有爲者也特恐變更而或致於亂不如固守之爲萬全爾夫天下譬之寶玉然法譬則韜蔵之噐然善爲寳玊計者噐既成則蔵而置之勿動可也日持而弄之携之以示人挾之以出遊失手而墮地不碎則缺璺矣故國有治於踈畧而亂於過爲之計過計者未嘗不咲踈畧者爲愚而不知踈畧者爲智大也故用智之爲智衆人之所知而不用其智之爲智非君子不能孟子曰禹之治水也行其所無事也豈止治水哉治天下者亦行其所無事而巳深慮論七謂必積徳而後王乎漢唐奚爲而有天下謂天命可以偶致乎項籍李宻奚爲而不有天下此世儒難通之論也然匹夫之家致十金之産其先必有忠信之人謂王者而不由於積徳固不可也漢唐之高祖或起於隴畝或興於世族非有數十世之積累如周之先公而傳數百年之久謂不由於天命亦不可也然則安所决乎有累世之積而又有聖人之徳者必王王必久而後亡成周是也雖無積於其先而有聖人之心者亦必王其亡也必與積久者異漢唐是也二者俱不足以王而得位者僥倖乎天命者也暫假之而巳矣秦隋五代是也故天之立君也非以私一人而富貴之將使其􅉼育斯民俾各得其所也善於知天者不敢恃天命之在我而惟恐不足以承天之命不敢以天下爲樂而以天下爲憂視斯民之未安猶赤子之在抱養之以寛而推之以恕澤之以大徳而結之以至誠使其心服於我而不能釋然後天命可得而保矣今牧人之牛羊者欲其久而不易必蕃息之長遂之使其人喜恱而不忍易斯可以久牧矣茍鞭箠之饑渇之死亡其所授而欲求其不已易寧可得哉欲知天命之永與促視乎創業之主可見矣創業者之仁不仁天命民心之所去就也創業者不患法制之不修刑罰之不嚴而患乎教化不行風俗不美誠能施教化美風俗其後世雖有冥愚暴悍之主天猶容而不遽絶之周自文武以降更足以亡國者數君而不亡豈天私之而然哉思創業者之徳而不忍也夫既無先人之積可恃以不亡又不及巳之身修徳以庇其後而曰天命在我何徃而不爲秦隋五代之歸哉深慮論八驍勇之士多死於鋒鏑聰明之士多敗於壅蔽天下之禍常起於人所恃而出於意之所不虞其故何哉人可以有徳而不可恃其有徳可以有才而不可恃其有才恃之所生禍之所萃也匹夫持挺而立於賁育之前賁育變色而不敢動非畏之也不知持挺者之勇怯也使人號於賁育之門曰我勇盖天下賁育則咲而殺之耳何哉真勇者固未嘗自恃其勇而驕人謂聰明者智足以盡萬物之變才足以通萬事之要而心嘗欿然夸辭不出於口忲色不形於面以旁求於當世之人故能謀者獻其謀有力者効其力凡一藝一能之士皆爲之竭盡而不敢欺之以其所處者謙所求者廣而不自恃其聰明也夫茍自恃其聰明未有不敗於其臣者也盖恃則自盈自盈則耻聞過耻聞過則人不告之以善而見聞日狹矣見聞既狹於是奸䛕之徒謬爲卑謟以媚適將順之於内而竊其威柄妄行賞罰於外是國家之大權潜移於下而猧亂乗之以起皆自恃其聰明之過也唐徳宗之於盧杞宋高宗之於秦檜方其任二臣也自以爲聖賢相逄驩然共政而不疑其時雖告之以爲壅蔽彼固以爲妄言而不信矣孰知爲計之愚適爲奸臣之所咲哉然則其所恃以爲聰明者乃愚之甚者也故人君不貴乎智而貴乎不有其智不貴乎才而貴乎不居其才不貴乎聰明而貴乎取衆庻之言以爲耳目不如是而好於自用者未有不敗於壅蔽者也深慮論九世之言治者亦難矣爲任人可以治則二世之任趙高哀平之任王莽玄宗之任李林甫皆以任之太過而亂以爲自用可以治則秦始皇隋文帝皆以自用而致㓕亡然則果何由而可治乎任人可也不得其人而任之不可也躬政可也自用而不用人不可也四海之事固非一人之所能知也君人者能正一身以臨天下擇世之賢人君子委之以政推之以誠而待之以禮燭之以明使邪佞無所進其䜛信之以專使便嬖不得撓其功簿書之事不使親其勞獄訟之㣲不使入其心惟責之以用賢才治百官變風俗足民庻興禮樂而綏夷狄如農之望穡旅之望家必俟其至而後巳茍有成功任之終其身不爲久也爵之極其崇不爲濫也功茍不成黜而屏之不爲少恩也罰而殛之不爲過暴也以此道任人則賢者可得而亂無自而生矣其或群臣之才不足任而已不可自逸則當博求衆庻之善施之於政而持其大綱以提揆天下之勌怠洗濯天下之昏穢使吾身如日月之運爲力不勞而纖㣲畢照如雷霆之威爲勢不猛而萬物自懾則雖躬親聴㫁亦何害其爲治哉昔之任人而亂者衆人之所謂賢則不任必取其意之以爲賢者則任之而不知其意之所謂賢者非希㫖迎合之徒則詐譎凶殘之小人爾用是而致亂非任人之罪也不能擇賢之罪也好爲聰察則不然以爲群臣舉不足信而必欲使天下之事皆由巳出故徃徃流爲苛細深刻而亦卒底于亡此非不能爲政也不知爲君之道者也夫爲君而不能任人是猶御而不能轡匠而不能斵用力雖至而不能成功任人而不得其人猶轡而不以絲斵而不以斧也曰然則欲治者将何先曰明以擇人誠以用賢深慮論十爲國之道莫先於用人用人之道莫先於作其好名喜功之氣好名喜功之人守常之主之所惡而創業垂統之君所願得而樂用者也舉世之才未必皆賢未必皆足用善用人者㧞一二於干百而使千百之人與之俱化而不自知此作氣之術也王良之馬豈皆騏驥哉當良執轡馳車試之於郊徐之則徐疾之則疾萬蹄之驟如一馬然非無駑劣下才者也雖駑劣下才者皆化而騏驥當其化也馬不知其筋力曷爲而化而執鞭䇿日侍王良左右之人亦不知其爲何爲而頓異也獨良知之爾馬之材質得於天者巳定王良豈能增益之哉能作其氣焉爾故以驥待馬則馬皆驥也以駑駘待馬則雖有善馬皆失其所爲善堯舜之世其人豈能素習行義而盡過於人哉所以作之者異也人有好名而強諌直諍者有好名而修㢘㓗敦信譲者自其人言之則好名信非善事矣自有益於國言之取其有益於國斯可矣烏顧其出於好名哉善用人者因其所長而用之而不奪其所好彼好名也吾因而與之以名則天下之好名而願行其道者無不至而吾之才不可勝用矣彼喜功者能治民則喜因治民以立功能用兵則喜因用兵以立功能興禮樂理風俗則喜挾其所能以立功然使各盡其才而如其所欲則其所立非彼之功乃有國者之功也用一人而使喜功者皆至於國何損乎此之謂作氣之道不能用才者則不然恐人之好名而不肯假人以名恐人之喜功而不肯使其立功甚則抑挫之傾壓之使其氣消沮隕穫而不振然後授之以位於是百職廢而天下無竒才百行隳而天下無善士非真無其人也不能作之而然也此其爲術至愚爲計至私非豪傑之主其孰能知之臨海縣知縣黄誥黄巖縣知縣張師善台州府儒學教授尚芳訓導李深黄巖縣儒學教諭文程府學生陳縝葉琰王梅齡臨海縣學生李臨卿戴濬之黄巖縣學生孫思光牟汝鈞校對遜志齋集卷之二終
