front:
  text: 遜志齋集卷之十中順大夫浙江按察司副使奉敕提督學校雲間范惟一編輯奉政大夫浙江按察司僉事奉敕整飾兵備南昌唐堯臣校訂中順大夫浙江台州府知府事前刑部郎中東吳王可大校刋
  hash: sha256:a17b4b2c6e3e5cabe7086827c304cb6fcf551a2e3fbbf3effb8e0a72a013bb0f
  markers:
