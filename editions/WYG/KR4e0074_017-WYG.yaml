body:
  text: 遜志齋集卷十七明方孝孺撰記柳氏譜記柳氏浦江著姓也鑄始遷祖也師顔其字河東其遷所自也建炎初其遷之時也瀚字宗海鑄子也森字子林彬字子均瀚子也森之子何監字元潔藴字元積也監生二子禪也祐也禪生子圓慶圓夭而慶子㫁不繼也祐子與某與某子新亦不繼也彬之子何温也温之子福福子周用用無子而周子嘗嘗子施亦絶也禪以下曷為不字非無字也為其絶不字也藴子補之字山甫其官則宋崇徳主簿也崇徳之子知髙郵縣事金字時某也髙郵嘗以子貴贈泗州知州封浦江縣男則元之時也其子為誰賀無嗣而寳後闕也次子貫加諱者何尊之也曷為而尊之學為當世師而名扵其下宜尊也其仕則為翰林待制而私諡則文肅也寳之子曰璟景文璟之子曰復叔賢杞叔堅也復子三恂性愭也杞子四愉某某愷也文肅公有子三人紹慶路學正卣三子秬頴穆也秬夭頴字伯嘉為永豐尉曰士某子如士魯子得其子也穆字叔雍其子曰士忠字子中而孫則本尚幼也同二子稠穟叔簡叔豐二子字也士恭穟子也因子程叔則而士禮程之子也自鑄至本十世矣續絶貴賤不同者何也天也天易知而難測敬慎不怠而求合乎道者天所愛也肆悖不修而與道乖自逆扵天者也天之於人無不愛而扵順其道者愛之為尤甚愛人則富貴之佚休之引而申之俾勿墜不如是則否焉然則天豈徒然哉視乎人之所為而已矣文肅公予雖不及師之而嘗聞之扵人誠天之所愛者也今又獲見叔雍尤嗜學而近道盖所謂善人乎文肅公之澤緜乎其未艾也余是以樂為柳氏稱也龜岩隠居記山嶽川流霞雲草木流峙卷舒榮顇之態變化至無窮盡也然咸出天地自然之理使身居其所目寓其象以充大其徳業以蛻濯汚垢以通乎出處消長隠微而不謬乎理則山川雲木固為人學道之助及道之既成也亦可謂無負扵此也茍為不然則嶄然而髙者山也湛然而潔者川也朝歛夕舒春榮秋顇者雲霞草木也而𣺌然居處乎其間者曰人耳果何預扵己之損益哉余少也好遊每遇夫名山秀川之寓乎目而樂乎心者輒左右瞻眺思見夫學道之人觀其所得之淺深以朂乎己之不逮恨其人不槩見而重巒宻林多為龎僧野叟之所窟宅欲以半畝之宫棲息扵寛閒之境造物者亦靳而不之與豈吾道不賴乎外物而自成乎許君士脩有道士也其從父弟曰士成隠居于寧海縣治東南三十里之九灣山日循西行二里許山趾得翠石髙大徑數丈若巨龜出曝扵江渚之上石旁土田衍沃可耕而山勢亢爽風氣固宻初無築室于兹者士成顧而異之曰吾所居雖與山俱而喧雜湫隘豈天偶以此遺我乎因以貲購石旁之地立屋數間而謂之龜岩隠居間見予輒請記夫士成豈果為隠者哉觀山扵艮則當審夫時止時行之義觀水扵坎則當識夫常徳行習教事之象觀屯扵雲雷而以之經綸觀升扵木而以之積順徳之髙大他日得出處之宜以其所畜及乎人而不匱者非士成也耶吾聞道之大原具扵易而龜列扵四靈士成沉静好易或隠或不隠灼石龜而卜焉殆必有得矣余何足以知之宜隠軒記洪武九年余遇鄭君好義于京師是時天子方以災變求言天下御史用深文致無罪守相數十百人于獄議者寃之君曰此寧不足言耶即草封事詣丞相願得召對言状丞相問所言云何君抗色曰吾将見上言事丞相何問焉丞相怒奏抵君罪君慷慨不少屈辨說天下事激昻竒壮聲動朝廷聞其名者皆稱君為竒士予亦服君之才以為且将立功名當世憂患不能沮之也後予遊學于外不與君相聞者甚久前年君歸自江淮予徃訪焉視其貌加充聽其言若不忍出口語及前事則深自悔咎曰學未知道而多言此吾過也取聖賢經傳窮旦暮攻習發其真理而考諸躬行粹然若循繩墨而蹈規矩非復昔日鄭君也予愈服之乃知昔之知鄭君者特其棄餘而君不予鄙也顧以所居宜隠之軒属予記凡物有所宜者必有所短舟宜扵川而不宜扵陸騏驥宜扵致逺而不宜扵服田偏扵用也神龍乘風雲吐雷電下上八極而困蟄扵𤣥冬與蛙螾等局扵時也惟人亦然辨士宜扵戰鬪之際而居平世不如庸人烏獲任鄙宜扵尚力之主而折旋尊俎之間手足無所可用拘扵技也孟公綽宜扵為宰而短扵治劇黄霸治郡則宜而為相則損才各有所便也若夫為聖賢之學者脩之扵身也無不具而見之扵用也無不能豈果有所宜與否哉其仕也隠之道行其隠也仕之用存不違俗以為髙不同世以求合用舍進退皆安之而不顧夫是之謂君子鄭君之學得扵聖賢者美矣豈宜扵隠而不良扵行乎昔之見君也未越十年而君之所得過扵昔之所見也多矣自兹以徃使益進扵道烏知無大異扵今者而其宜扵隠也庸知非宜扵仕之端乎人之常情不能安扵藜藿則不能享八珍之奉服䟽布而厭者其衣文繡也必驕未有濫扵貧約而可處富貴以免禍者故有慕利禄之心者死扵貧賤者也隠居自得而樂之不厭者功名冨貴之人也黙山精舍記余年十七八侍先君守濟寧夀昌胡君朝翰自太學來分教魯諸生余時與之徃來甚熟朝翰能為詩執筆作行草書蜿蜒滿紙余私敬愛之後余先君捐館執䘮歸天台聞朝翰亦丁内艱去不獲見及既除䘮服至京師朝翰來訪逆旅追計昔日相見時已五年朝翰貌加老與之語舊故各悚然不自勝余謂朝翰今内外仕者多出太學子亦将仕乎朝翰曰仕不仕有命非我所敢知我家夀昌有黙山最勝吾祖宋校書君楚才嘗歸老于此某思結屋其旁讀書著文以自娱苐未果歸耳屋成名之為黙山精舍子必為我記之予曰子倘歸予記未晚既而朝翰每見必以為吾言且曰子苐為記歸與否不在子也乃告之曰仕與隠皆非君子之所樂也樂得其道焉耳古之人有居輔相之位而色憂者矣有飯蔬飲水而充焉自得者矣豈以仕與隠為樂哉仕而得行其道可樂也隠而不失其義亦可樂也故樂在乎道奚以窮達論哉茍無其道而樂居乎位是竊禄也不以其道而自肆扵隠是盜名也故君子未嘗志乎仕亦未嘗志乎隠而惟其道之脩不志乎仕而卒然居乎位則人信之曰是不為仕也為行道也則其道之化人也速不期隠而隠則人信之曰是将為隠也知其道之不可行也則人服其行而莫敢非之然則子之不汲汲扵仕者是矣而何以眷眷扵黙山哉且人之榮辱貴賤有命惟君子能不以之為喜戚而脩其在我者以勝之子不見魯之陋巷乎當顔子之處乎此無一命之爵一釜之禄以榮貴其身而今越千載雖野人婦女皆敬而仰之非以其道徳之勝耶語當時之爵禄崇衍者季孟陽貨之流勝扵顔子逺矣而今尚有識其故居者乎子誠能脩乎在己者他日仕則以施諸人歸而隠則以善其身而名于後世使後世之人指黙山之精舍若魯人之仰陋巷然而予之言亦以子而傳不亦善耶直内齋記人之受扵天者均也聖人與天同徳而衆人至扵與物為徒可不知其故哉扵此有泉焉其發源同其潔瑩甘美同其一注之金玉之器而庋之羃之塵􅅽無自而侵則其明可以察毫髪其味可以薦鬼神與其發源之初無以異其一入乎淤泥積潦之溝牛馬之所踐鳬鶩之所浴穢汚之所集而莫或藩捍澄治之則雖欲不異乎其初弗可致矣聖人之質金玉之器也而又以禮為庋以敬為羃持之以兢兢之畏守之以翼翼之恭是以其中心渾全無所虧蝕其徳即天徳也其道即天道也其語黙進退出處久速舉措設張後乎天者不違乎天而先乎天者天不能違也故聖人之質既美而又有自新之具其所合乎天者豈偶然哉若夫常人其質固已不美矣天理之所在嗜好汨之於内利害鉥之於外聲色臭味爵禄名勢所以穢汚之者非一端而又重之以怠肆放之以邪僻彼安能復同於天而不變其始哉其與物相去不能分寸者不知自新之學故也夫聖人之與庸人其資之不侔固有由然矣使衆人亦以聖人自新者治其心而加謹焉雖未至於聖其有不至扵君子者乎此予扵會稽張君遁之名齋而喜其有志也張君之質過衆人甚逺而好學慕古道取孔子釋坤六二之言以直内為齋居之名夫敬為復善去惡之機天理之所由存人欲之所由消也故人能一主乎敬穾奥之間儼乎若上帝之臨造次之頃凛乎若珪璧之奉妄思邪慮罔或萌孽其中而皆發扵義也以之事父則盡乎孝而非欲人稱己之孝而為之也以之事君則致其忠而非願乎冨貴華寵而為之也操之而不失則内直内直則方外者在是而聖人之天徳可庶㡬而至矣故曰直方大不習无不利則不疑其所行也學而至扵不疑其所行非㡬扵聖而能之乎嗟夫夫人皆可以與天同徳而不知主敬以明善斯有志者之所以為難能歟若張君者獨能取古人之學以自勉非有志而能然歟予也固志乎道而未至者焉得不與君言之而且以自警也歟君子齋記去年秋詔選太學生髙等者為郡縣學教官盧龍王藴玉來教諭沔陽予獲見焉其色􅂱然其儀度偉然聽其論事與人之得失當否㢘厲而精確使人悚然異肅然敬也是冬例朝京師予獲與藴玉偕道進徃返八千餘里藴玉不予棄也行必聫轡息必比席食也匕箸之與鄰言也辭說之與㕘歡然有會乎心而若有所得予與藴玉皆然而莫知其所由然也今年夏藴玉復來訪予郡學留與坐察其貌加粹以温叩其言益醇以簡而其志欿然愈自下不倦論古人之學輒悔其用力之未至予扵是歎而深竒之噫何其進之速也古之君子徳業赫赫著于天下流扵後世者豈特天質之美哉盖其操志也不畫扵卑近其為學也不安扵淺陋平居無事固無時而不學及乎臨政事君聽訟接下御家睦親教人授業行師奉祭以至遊息寝處燕語歩趨亦無一事之非學惟其為學之心常存而不怠是以凡有聲者皆足以悟乎耳不必聞琴瑟佩玉而後邪慮不萌也有形者皆足悟乎目不特閱典謨雅頌而後至理可樂也經乎耳目者顯而天地日月雷霆風雨山川草木幽而隂陽寒暑之盛衰進退無不足以濯舊蔽而啓新知君子之心曷嘗有斯須之不進哉是以自少而至耄老自恒人而至聖賢如禾黍自盈寸之苖而至扵有秋杞梓楩楠自拱把之植而至扵百圍盖有可必而不可誣者後之士志狹而易肆學陋而易足口焉而無得扵心書焉而不求其道少之所習至長而忘長之所有至仕而棄未貴而先驕未老而已懈勉強而僅得者不旋踵而失之豈復可望其進哉位愈髙而名愈辱年益加而徳彌損不至扵小人而不止者衆矣求如藴玉之進乎道而不怠者烏可得哉自識藴玉始一年而已覺其進使每見而每有所進焉其至扵君子也孰禦盖古之學者期至扵君子後之學者期至扵公卿為君子矣雖不為公卿無害也為公卿而不足為君子其如公卿何藴玉請名其齋居予欲以古人望之也因名之曰君子齋而以其說告之且以考其所進焉尚志齋記今人多不如古也而莫士為甚以其無志也吾嘗試于衆曰周公孔子與吾同也可取而師也顔子孟子與吾同也可取而友也衆若駭然而驚愕然而相顧悱然笑予以為狂嗚呼甚矣今之士之無志也寧獨不思乎口之所食者周公孔子顔孟所食之粟也身之所服者周公孔子顔孟所服之帛也寒而火暑而風廬而居車馬而行晨興而夕寝莫不與周公孔子顔孟同目能視耳能聽手足持且行亦莫有異者何獨扵道而疑之乎使此四君子皆若世所妄傳神仙鬼物之不可形象則不可效之矣今其人生而居有鄉没而相傳有子孫其徳行文章具乎書可徴其所以為聖賢為學之次第可考而知奚為而不可效之哉且此四君子者其性與吾同其形與吾同其能四耳而三目六五常而二其心邪而吾心之所具者亦未嘗闕其一也彼何獨可為聖賢而吾何獨不可為哉是有故也周公人臣也思兼三王之所為孔子顔孟皆匹夫也而或自比文王或謂舜可得而及或羞比伯夷伊尹其所志如此其自視其身何如哉天之生身也豈特飬夫區區之口體至死而已哉亦将以輔天地所不及而助之飬斯民耳然有命焉或不得位以施其澤扵當時則著諸書而傳之乎後世惟伸其道而已窮達不足以累之也惟其不累乎窮達故處之廊廟而無喜色困之􅅵畆而不動其中其中之所存者重故視乎外者輕志已素定也豈若鄙夫之為哉所志在乎冨貴權術得之則以為榮失之則摧挫而欲死自君子觀之與犬䑕何異而或自以為適者所志者卑故也故志乎冨貴權術而不志乎道者自賤其身者也謂其身不足以行道者誣其身者也謂周孔顔孟為不可及者棄其天性者也是三者皆君子之賊也余友金華俞君子嚴請名其讀書之齋于太史公公名之曰尚志余病乎士之無志也久矣故告之以其說尚友齋記生乎今之世以舉世之人為不足必求士扵千載之上而友之其待已不亦太重而視人不亦太輕乎非然也顧在我者何如耳我誠庸人也雖同閭共巷之人皆我所畏我安敢友之我誠賢也我誠有道也雖空天下無一人視千載如一時可也吾安可不友乎古之人是故昔者孔子自儗文王孟子羞比管仲而願學孔子斯一聖一賢其自知也明故其自許者當厯百世而無異詞茍不度其能而過扵自許若司馬遷之比仲尼石勒之卑光武言未出口而人且竊笑之矣将孰信耶雖然此要其終而言耳學者之立志則異乎是古今一理也智與愚一性也能窮理而盡性雖即吾身為孔孟可也雖上取孔孟而期友之亦可也况餘人乎浦陽黄君仲昭年二十餘好學而警敏嘗以尚友名其齋浦陽萬家邑也其業儒者亦衆矣仲昭雖賢豈無一人可與仲昭友者乎又推之扵一郡又推之淛水之東其民益衆如仲昭者冝亦多矣又推之扵大江之南極其廣而至天下豈盡無如仲昭之賢者乎仲昭皆不之求而遽取古之人以為友或者固不能無疑然而仲昭之志則可尚也古之聖賢曷嘗以衆人待其身哉世衰俗降士不知所立志視古之人如鬼神異物然以為非人所能及間有以古人自望者輙指笑以為狂嗟乎今人啜粟衣帛莫不與古人同至扵古人之道則自賤其身而不敢畧效之不亦愚乎仲昭之為人余雖不足知然斯志則古人之志也是可以尚友矣顧未知仲昭所願友者何人爾古之人有賢有不賢其道有至有不至仲昭取其賢且至者以為友而以其不賢者自懲則凡冊書之所具孰非仲昭之友乎予頗有志扵古以為伊尹周公皆所當友者毎為人所指笑喜仲昭之似吾志故為之記若夫古人學術政事之懿道徳仁義之說尚當與仲昭講之省庵記同郡盧廷剛為谷府奉祠篤志問學勇扵脩己名其讀書之室曰省庵洪武癸酉從王過大梁予還自京師路遇焉請發其義未果也今年復自上國以書數千里抵漢中申前請予曰異哉廷剛之求也病瘍之人常求愈扵瘍醫必不求醫扵瘍者病目之人常求愈扵目醫必不求醫扵瞽者豈非未能治己者固難望其治人乎予天下之固陋者平居視世事一無所省存誠而無思應物而無機見人紿己輒以為是而不省其為欺見人侮己輒以為宜而不省其為妄聞譽吾者泊然内視而不省以為可喜聞毁吾者確然自信而不省以為可怒扵凡得喪榮辱禍福皆不入吾胸中疾雷震電而不省為之驚鬼出魅没而不省為之惑舉四海之無所省者莫予加也而廷剛顧求吾發省庵之義與醫瘍扵瘍醫瞽於瞽何異哉雖然人之情不能两至有所昧者必有所明有所短者必有所長予扵物之外至者固不省矣吾豈果無省者乎吾扵言也省其或違乎理扵行也省其或戾於義念慮之萌發也省其或汨扵私而淪扵欲事上也省其未竭乎忠撫下也省其未底乎寛交友也省其未有以先施事神也省其未能無愧扵天凡動乎四體而出乎口者未嘗不致吾之省非徒省之而已又必攻之克之揉之直之使中心循乎正而不頗雖若是庸敢謂之能自省乎哉庸敢自謂弗叛扵君子之道乎哉且予聞之無過而不省者聖人也有過輒省而即改者賢人也告以過而能改者進扵君子者也過之不省而省所不必省者衆人也廷剛能扵斯數者而慎所省焉然後知予所必省者非太察而所不省者非太疎也雖然經之言曰惟精惟一精則省之謂也知之属也一則非致力扵守不能也克己之事而行之本也自昔大賢君子未嘗不從事扵斯者而况予與廷剛也歟况不及廷剛者歟予也焉可不卒言之以塞廷剛之請且以自勉歟御賜訓辭記處天下之大位者必基之以天下之盛徳而後可徳不足而位有餘天道之所不與也自昔帝王之興天将俾文武才智之士出而輔翼之以享太平之樂必生盛徳之君子以為之先使之積仁累行以啓後人之業是以本源深長慶澤隆衍而奕世承其爵位于無窮非若僥倖于一旦者之不可恃也洪惟聖天子受天明命肇造區夏豪傑英勇之臣乘時奮身以立大功至将相者固不可以一二計求其有積乎其前有繼乎其後事業謀謨可以叅乎古之名臣者惟故岐陽武靖王李公為然武靖之先駙馬都尉隴西恭獻王以皇國懿親晚享爵土方少壮時事父母極盡子道及際風雲之會為上所尊禮在群臣中莫有比者而寅畏慎宻言不及私敦厚寛大動必思義海内稱盛徳者歸焉至武靖王遂以元勲登上公之貴忠孝大節卓為天下師法由是福祚光寵為國世家今國公嗣軄思繼祖考之美皇上乃書體爾嫡祖忠孝不息八字以賜公既寳藏之而祗服不忘復手録其副嚴奉于居第之正堂出入瞻視恒若對越天顔靡或懈怠且謂孝孺嘗獲拜武靖王而粗知其事貽書海上而以記為属立身事君之道莫大扵忠孝公之生也天既命公以是理今上復申言之以為賜聖人之言即天之言也天發乎言固已昭然若日月况筆之為書而昭揭于斯雖河洛之所出龍龜之所負何以過于此哉縦有令扵辭者猶不能復加毫末而况孝孺之鄙賤乎雖然忠孝之說竊嘗聞之矣事親而祗順無違固孝也推以事君誠敬而不欺仁恕而有容先國家之政而忘乎私惟生民社稷是利而不顧乎己此尤孝之大者也故知孝親乃可以事君能忠扵君然後謂之大孝而忠與孝非二致也若公之先王和色順徳洽乎家庭宏猷偉論裨乎宗社竒功俊畧震乎四夷而守以誠慤内而君安之外而百姓信之扵斯二者可謂兼盡矣公也可不思述前人之事以期無負聖天子之耿命乎古之賢臣能繼祖考之業若伊陟之扵阿衡巫賢之扵巫咸吕伋之扵尚父召虎之扵康公魏文貞之有謩李西平之有愬皆克宣先猷昭宏遺志以承勲烈于悠久使人因其身而益知祖徳之盛以増國家之光是所謂忠孝之大者而非有志者不能學也公春秋冨而為學甚専器重厚而用志甚逺刻情飭行不知富貴之在躬而孜孜焉以報君親之恩自勵古所稱世濟其美而與國同休者天下固望之矣然則安敢不為公書之以慶國之有世臣乎學孔齋記隂陽之氣運乎两間物之有形色者莫不資之以自成而是氣也未嘗為之加損三辰之明也五嶽之崇也四海之廣也百川之流也皆得乎是氣之大者也豫樟楩楠得之以為材麟鳯龜龍得之以為祥虎豹犀象得之以為威黍稷稻粱麻枲桑檿得之以利萬世力者得之以負重致逺靈者得之以司晨紀候而肖翹之類蠕動之倫非得乎是則不能有生其化可謂盛矣而運行不息者曷嘗有古今之間哉孔子之道亦然知者不得之則不能成其知勇者不得之則不能成其勇賜之辨求之藝偃與商之文學茍非有得焉則不能成其名而凡遊乎聖人之門者皆有聞乎其一二而聖人之道固自若也豈惟當世為然千載之後得其全者為大賢得其正者為君子得其偏者猶不失為善人明乎春秋者得其㫁明乎易衍者得其中明乎詩書者得其正明乎禮樂者得其文無得焉者過焉而為荘周卑焉而為申韓悖焉而為小人具視聽而備人之形者孰能舍斯道而自立哉故庶人舍是則長幼乖大夫士舍是則軄業隳為将相舍是則無益扵國而禍及之為南靣之君而不師斯道則無以施徳澤于衆庶著顯號扵無窮由周漢而來得孔子之道以為君者視其治功可考矣帝者得之為文景為明章為太宗為仁宗王者得之則或卓然為宗英或知為善之可樂是皆有絶人之資髙世之識故能知所務而卒有成雖所得未能盡乎大全然皆聖人之徒也以臣觀乎蜀王殿下其聖人之徒而得其大全者乎殿下資稟甚髙而務學甚篤聞道甚早而力行不怠明足以照萬理而不底于太察才足以綜萬事而行之以無為徳度之懿煦乎陽和之温也問學之博浩乎寳藏之富也學古之士有一于此皆思自附扵聖賢而乃處之以謙虚守之以畏慎檢身進退恒若不及而扵恤民濟衆賑灾施惠之事孜孜為之使遇孔子之聖而師尊焉所得豈可量哉間論群聖之道因以學孔名殿側之齋命臣記其說夫孔子之學當世之學者皆知之求其善學孔子之道者雖古之君子或病焉非孔子果不易學也竊取其偏而不求其全以名求之而不知吾身之可以為聖賢者衆矣孔子所以與隂陽同其化者固足以陶鑄百王而範圍三代其言見乎經者人之所能識也其事本諸心者非學道而有得者不能也殿下既有得於斯道矣而臣何言焉雖然得之固美也而守之難守之固難而不變其守推以及物也益難先乎孔子而得斯道之大全者莫如堯舜文王學乎孔子而得其全者莫如顔子堯舜之欽明恭已文王之不顯亦臨無斁亦保顔子之克己復禮服膺不惰大聖大賢之守斯道也豈有他術哉亦曰敬而已敬者所以成夫仁而已矣仁為衆善之原群徳之長而天地之心也得此以為人則人道盡得此以為君則君道備孔子之聖豈能加毫末扵斯乎故為人而不學孔顔之學則不足以為人為君而不以尭舜文王為準則為失君之職自孔子以來千有餘嵗矣知孔子者多不獲居乎大位而富貴尊顯者徃徃不知師聖人之大全是以生民扵孔子之澤未之數一作類被也夫以殿下備顔子所有之徳而居孔子所無之位敬以守之仁以行之至扵愈久而不變固所優為者推至仁以治國俾人人謂居大位學孔子而得其大全者自殿下始以一洗徃古之陋豈非天下後世之幸也哉身脩思永堂記世子殿下既正位儲宫惟負荷國家之重上而祗承帝訓恭紹王猷下而撫臨群臣士民以及三軍之衆弗可以不稽古為學也日御殿東堂與官僚通經術者講說虞夏商周君臣出治立徳之要孔子孟軻埀世淑人之言孜孜忘食因請于王取臯陶陳謨之語名所御堂曰身脩思永以著厥志會臣較文京師還有教俾記其事臣拜手讓不可則言曰為國之本莫尚乎脩身脩身之道莫切乎治心而心之官則在乎思是思者賢否之所由出治亂之所由生休咎之所由分也人之有身孰能無所思也哉惟能處其身于禮義所思不止乎安一己而及扵生民不止乎適一時而貽諸後世發言也恐或蔽扵凡近而必務可以經逺施政也恐或便扵目前而必欲傳之無窮如是則思永而身無不脩矣古昔賢君保宗廟社稷于千百載者未有不始于斯者也若夫恒人則不然耳目也聲色或誘之肢體也佚樂或溺之好義理矣或不勝乎利欲喜問學矣或不能推之行事言行之間茍且為斯須之計而不暇稍逺其謀欲其身之脩而治其國家烏可得哉今殿下名堂特有取乎臯陶之說可謂知所擇矣然殿下日新聖道扵古事無不貫達臣不敢復論抑嘗竊觀聖天子之致治宵衣旰食數十年無一日之怠富有天下而膳服未嘗過其節嗜好未嘗失其中畏天恤民之意聞乎中國而播扵四夷舉一事立一法必慮萬世而為之防巍巍髙出乎往古而開久大之業者皆身脩思永之明效而百王之取法者也豈非殿下之當師哉夫人君自謂不敢師聖人者知不優也有師聖人之美志而無其效者勇不逮也智勇具全而莫能輔君以道徳者群臣之過也殿下信道敏學而問扵臣顧臣雖不足以辱命而亦不敢有隠周公之詩曰無念爾祖聿脩厥徳永言配命自求多福逺之如虞廷賢臣之所陳近之如聖上之所傳篤志力行以保艾王家之丕基私竊有望焉御史府記皇上嗣位之初即下明詔行寛政赦有罪蠲逋租鉅萬計去事之妨民者明年以紀元賜髙年米肉絮帛民鬻子者官為之贖免田之租稅㡬年分遣使者問海内所患苦賞㢘平吏罪至死者多全活之扵是刑部都察院論囚視徃嵗減三分之二人皆重扵犯法二年春二月甲子有詔若曰頃以訴状繁易御史臺號都察院與刑部分治庶獄今賴宗廟神靈㫁獄頗簡其更都院仍漢制為御史府專以紏貪殘舉循良匡政事宣教化為職省御史員定為二十八人務為忠厚以底治平三月戊辰賜御史衣明日己巳以都院舊署在太平門之北扵朝謁為難命即詹事府為御史府賜宴扵新治復命文武大臣皆預以寵綏之既而有勅命臣某記其事臣惟斯民之生以徳飬之則安扵為善以刑制之則棄扵為惡聖人之治天下豈有他術哉使人人皆知去惡以從善而治道成矣惟御史之官始扵周其職之所治與權任之重輕雖累變不常然得其人則紀綱振而國體尊非其人則人望不肅而是非錯繆然専任以刑獄則自近代始曩者法吏持刑深刻犯者滋衆先皇帝甚厭苦之欲有所更革而未暇今皇上以徳飬人羣生喜恱訟者衰止復古官名以修善政實行先帝之遺志自今居是府者其敬承聖訓凡便扵國利扵民者則言之為民之蠧為國之病者則去之毋溺扵私而枉其所守毋懾扵勢而屈所當為一以道輔佐天子行徳教使黎民醇厚如三代時斯不負建官圖治之意茍為不然舍其大而務其細或事小忠末節以市名或為詭行憸言以䂓榮利扵民之治否國之安危無預焉則是官之名雖更而實之可厭苦者自若也奚可哉臣幸執筆從太史後夫紀政教明職守以示後世史氏職也故書其事以為居位者規春風和氣堂記曹國李公年盛一作富而志博質壮而氣和一作温為天子近戚重臣而篤學下賢嗜好與韋布之士類名私第燕處之所曰春風和氣堂因友人林君公輔属筆扵某某念童稚時嘗以文見先武靖王于濟上王喜而禮貌之從容咲語以國士見期今十有五年矣而公克嗣先烈聲譽志業有光扵前人名所居堂逺以見属為義甚冨而相處甚厚不可以鄙賤辭廼為之言曰天以五氣成嵗功而施發生之徳者為春人以五常應變而具慈愛之道者為仁天雖至健非春無以生物人有剛武明毅之才非仁無以立政故國之有仁人猶天之有春也唐虞之世有稷契臯䕫為春而無險戾乖僻之氣以間之是以其時為極盛為湯之春者伊尹為髙宗之春者傅說為文武成康之春者周公召公畢公之徒其為人不同然皆能協和萬邦施惠澤扵天下至周之季孔子孟子者出其徳可以為春而國莫或之用雖能備太和扵一身而無由推以及物漢之興蕭曹為之春光武之復國鄧禹馮異卓茂賈復之流或除殘去暴以成其功或豈弟慈祥以化其俗其事雖殊而為之春者一也由漢而下有仁人以輔其政者其國必昌而長故唐以房杜姚宋為春宋以王李韓范司馬公為培植元氣之具而皆傳世數百年其他或温之未㡬而寒之者繼之發生之難不能勝殞伐之易由是斯民閱千百載而與春遇者盖不能十一夫豈仁者盛扵古而後世獨鮮哉或遺之而不能用或用之而叅以邪佞之人雖欲為春不可得也我朝之有天下文武之臣為世之春者不可勝計而武靖王實為首稱方其戡大難夷大盜以不殺為威以不戰為武義聲所被海内率從及功成治定出入殿廷左右天子所言皆惻怛寛大之事謙謹忠恕不自驕盈民到于今頌之此豈可勉强為之哉仁發扵誠而不可掩也今公當太平無事之時思前人之徳念國家之恩揭春風扵堂上以寓目焉儼乎若武靖王之在前而挹其聲容也穆乎若處唐虞三代之朝而聽仁人賢士之謀議也孝以繼志忠以盡職學益明道益髙自牧愈下将見為國之春賛雍熙之治扵斯世也有日矣寧止見扵一堂而已哉夫生長顯美而不溺扵富貴有以識志節之竒不為耳目之玩而以仁者之事自勉有以窺器業之盛余既追思武靖之徳而喜見公之有成故願為天下道之蘿月山房記處焉而樂者不如慕焉而樂之之深也人之常情久則玩玩則厭心生慕則好好則樂心生茍有天下至美之物心一厭焉則雖貴而必賤淳熬𢷬珎世之美味也使常食者言之未必識其為至美虞韶象武世之美音也使常聽者聆之未必知其為善樂是以富貴者不知禄位之可樂而貧賤者慕焉山林之士不知幽寂之境之為髙而富貴者思焉然以貧賤而慕富貴則為鄙以富貴而慕林泉則為達其扵外慕一也而賢否異焉者蓋無欲而貧賤猶不失為善人無道而冨貴其為不幸也大矣世之賢士多喜林壑之趣而忘乎爵位之為崇其亦有以也哉廣海何茂先資敏而文年少而竒其尊府當草昧時識真主扵龍戰之頃遣使迎降所守十餘州不血一刃而歸職方其有功于朝廷甚偉用是歴大藩者二十年遂剖符與諸徹侯等茂先生長扵冨貴之中足未嘗履丘壑目未嘗覩林嶺性雅好學蕭然有出塵之姿其言論詩章若林居澗飲追雲月而遺氛垢者之所為絶刮去軒裳綺紈態號其南門賜第讀書之室曰蘿月山房取杜子美過何将軍山林詩語也室之内外環以法書名畫竒石靈草在輦轂之下而有羅浮衡麓間意聲利之人從之遊莫不自失也夫薜蘿之月隠居之士夫孰不見而未嘗知其趣茂先以之名一室而坐移崇山宻林于户牖之下欣然而樂忘乎冨貴之可羨是果曷為而致此哉盖其天資近道超乎世俗之表冝其不為勢位所動也然心可樂乎物而不可溺乎物茍得其樂而不為物所溺雖禄位不足為累茍溺扵所好而不能樂其趣雖林泉之清亦足為役志之具而已故士果有以超乎萬物則萬物皆為我用無以過乎物則一心将為萬物役聖賢之學所以貴乎窮理盡性使此心浩乎與天地同體故處冨貴而不盈遇貧約而不歉臨大故㫁大事而不懾若是則利禄不能使之汚山林不能為之清出處隠顯将無所不宜茂先之賢倘有意扵是乎果出扵是則雖子美復起而為茂先言不能以有加矣而予也何足與聞之後樂堂記慮周乎當世然後可以任天下之事徳施乎衆庶然後可以同天下之樂所知不過乎一時所謀不出乎一身者其不為國家之禍者㡬希古昔豪傑之士居乎窮廬陋巷之中布衣蔬食不足以自給而深思生民安危之由政教得失之故古今治亂之原而為之營度計畫汲汲若謀其私彼豈不欲自逸而過為是憂勞也哉盖天之授人以才智非欲其自謀一身而已固将望之補天道之所不能助生民之所不及焉爾是以伊尹方處􅅵畆而以覺斯民自任顔淵飲水飢餓而論為邦孟子轍環四方每以先王之道告世之有力者誠知所受者大所任者重不敢棄當世而負乎天也故得志則澤被于四海不得志則功流于後世其徳業聲號愈逺而彌張若夫鄙夫則不然利乎身而忘乎人適乎今而不顧其後當其得所願而處大位肆扵民上自謂可以無憂而不知無徳及人終亦不能保其樂也予求士扵今世不歸乎此者鮮矣若河南右叅議董公安常其聞聖賢之風而興起者乎公世居燕之宛平自為儒生處山林間服布褐而茹藜粟已懐憂民之心及元亡而國朝有天下公以薦入朝為資善大夫事懿文皇太子其所陳說多忠厚之言皇上聞而善之超遷左春坊大學士會東宫晏駕俄出治河南盡心扵民事民有所未安若疾在肢體政有所未宜若災在旦夕草封事數千言上于闕下而名其退食思政之堂曰後樂之堂盖取范公希文之言以著其志焉世之居大任者多矣以家未冨禄未厚所欲未盡得為憂者常有之憂其軄之難稱者無有也不惟憂其軄而以斯民為憂者尤無有也未得位則思位之可樂幸而得位則惟恐樂之未極孰有如范公之不忘天下而憂樂為民者乎又孰有如公之慕聖賢者乎范公之學術與顔孟未必同也而憂民之心同公今之學術與范公未必類也而憂民之心亦同公之過扵人豈不逺矣哉雖然范公謂先天下之憂而憂後天下之樂而樂然則世未臻扵唐虞三代則君子将無斯須之樂邪予觀公天質篤厚充飬有素温粹之氣溢于咲言其中盖有足樂者乎有以自樂而莫能施之于人此公之所以憂乎使處大位者皆能知公之所樂而效公之所憂斯民或者其有瘳乎後樂齋記匹夫而憂天下無位而論世事時俗以為狂而君子之所取也以言乎位内而公卿大夫外而伯牧守令禄豐者任榮軄要者憂重匹夫固若無與焉以言乎道吾之所受於天者異於衆人若此其逺也天豈徒以是私我哉故大而天地小而人物而與我同類者或弗遂其性皆吾之任也皆吾任則皆吾之所當憂也安敢以身之卑軄為觧乎古之人不敢以衆人待其身亦不敢以後王望其時顔回纍然布衣而自比扵舜伊尹在草莽而思致其君扵唐虞非為夸大之論也道當爾也夫人在平居已有仁萬物之心假之以位其功業孰禦乎故憂天下者天下之所恃以無憂者也鄙夫則不然務安其身而不恤乎人恱乎君而不顧乎後世其未得位則汲汲以求既得之則極嗜好奉飬之華以為樂生民之艱瘁政治之闕失若己不聞焉其心非不欲保禄位然其所務既私甚則僨人之國否則自僨其身固有不能免者以其自為之心太急而宴安之樂過早也茍能憂民之憂而圖利安之雖不期乎身之樂而樂自至矣寧有危敗之禍哉余少時誦范文正公之言而慕其為人以為賢者固當如是既而觀其在仁宗時不獲大行其志以死每慨然歎息以為仁宗近世之治主公經國之偉才猶不相遇合則世之有志如公而不值主者宜乎其多矣及遊四方求當今之士而交之欲其所志如公者未始一見然後又知非惟治主之難而有志者固少也近扵京師識永嘉戴君思持思持為太學生試事于外數年有司未之用賃室以居緼袍疏食困貧殆不可處思持不以為憂每語生民之故輒深思長慮如切諸身然扁其室曰後樂若慕文正公之言者余扵是私愛敬焉士之不能行道者憂貧賤慕冨貴之情害之也而思持獨不以此易其心其異扵常人逺矣夫異常之事雖微而不廢古之義也乃記其齋以告扵世焉孝思堂記人子之道養其親固難而莫難扵顯其親顯其親固難而尤莫難乎安其親安其親難矣而惟夀其親者為尤難也自庶人以上滑甘膬美之品纎麗温潔之服孰不知奉乎父母然而顔色之或少違志意之有未誠愛敬之心一有不至則不足為善飬幸而事飬無所戾然不能脩徳以顯其身使父母之聲譽不彰徹于當世生無以異扵衆庶没無以豐其祭祀則親與己皆未能無所憾或致身扵貴富俾親得享其光榮矣茍才不克勝乎位善無以及乎人貽謗取侮而恒懼乎危辱之臻則亦未得為孝也其或冨貴而親安之矣勢位可以耀當時而名節不足傳後世則親之令名不能埀乎悠久君子猶病焉故孝子事親之心無窮而其道亦無窮飬而能顯顯而能安安而能夀其親扵永存庶㡬君子之所願而可以盡孝思之心乎成都王侯履道少䘮父其母夫人賢而知教納之扵庠序俾就學既而遂登朝為御史由御史為河南按察司僉事而母夫人固無恙履道迎就官所朝夕率婦子侍側怡愉順適僚友稱孝焉因扁其正堂曰孝思以著其志夫人恒難乎飬而履道有禄以具肥甘供裘葛莫難乎顯親而履道入朝則豸冠立柱下執憲度以肅百僚出蒞大藩則綉衣持斧按行所部紏枉而旌直吏二千石以下奔走拜伏惟恐或後窮閭下邑數千里之民莫不想望其風采而思其家世之過人不謂之能顯親可乎然則履道之所宜思者在乎安其親之心夀其親之名而已國之所尚者公亷而持之以無欲民之所思者不擾而行之以寛惠邪墨者無所貸而柔愿者無所寃則可以恱乎親矣一念之所出一行之所施不惟欲狥乎已而必欲合乎天不惟欲同乎人而必欲當乎理使稱仁人孝子者必歸焉則己之名可傳親之名亦因以不朽矣能如是豈非孝思之大者乎履道家乎蜀蜀之士若司馬相如揚雄雖能顯其親扵無窮而徳不足李令伯以孝稱于後世而君子不能無憾可以當仁人孝子而無愧者惟諸葛武侯張敬夫為然斯二賢者皆百世之士也人不以百世之士自期則其所思者不逺矣履道好古而文篤行而温他日致其身為名臣以不忘其親使天下後世因孝思之堂誦履道之徳其尚有考扵吾言也全樂齋記心無媿戚慕怨而樂者樂乎天資扵物而後樂者樂乎人天下之物未嘗無可樂也以無可樂而徒資扵外物則其樂也有時而窮而吾樂之也有時而厭崇華侈泰妖姱珍怪之於目繁聲逺調之扵耳肥堅安飬之扵身可以樂亦可以悲衆人樂之而君子笑之君子之所樂全其受扵天者而不以人偽叅之索之極其明踐之極其誠持而行之至扵久而不息則天地之運寒暑之迹萬物之情皆吾樂也豈若資扵外者之淺乎彼快然適意自以為樂者可樂之具接扵前則以為舉世之樂莫能敵及静思而熟念之凡其所樂者皆可慚恧悔恨也庸有一息之樂哉古之聖賢窮日之力常若不及者求其固有之樂而已不以窮達動其中也不以窮達變其樂斯樂之至者乎浦陽黄君資安脩潔而知義處一室布衣蔬食若無以自適而心獨樂之名其所居曰全樂而属余以記凡人心有所樂口未必能言也况君之樂而余能言之乎然天下之道同也古今之性同也余探乎千載之上而求之舜之鼓琴顔子之簞瓢曾晳之遊詠會乎吾心者如出扵吾心也况扵君乎余試與君登浦汭之髙丘而望之榮且悴者何為也感乎吾耳者何聲也晦明燠寒行乎两間而無窮者何氣也流而逝峙而列者孰使之然也蒼乎其運鬱乎其凝聚者誰為之宰也君請為余言之余當援琴而鼓之君之樂即吾之樂也吾之樂與舜顔子曾晳之樂将有同乎無同乎人之樂乎天之樂乎君必知之矣余烏足與聞之好古齋記余遊太史公之門東陽葛君信亦以其業來學瞻其儀觀若有志古人者叩其言好舉易詩書尋出其文數十篇皆斥去時俗語已而視其文之目則題曰好古齋余異而問之曰君何古之取乎夫宓犧氏之前世之所謂上古也三代之間世之所謂中古也秦漢以降世之所謂下古也上古吾無徴焉耳下古吾無取焉耳君之所好者其中古乎中古之世今之世無隨隨疑誤焉君生乎今之世所好扵中古者果何道乎自夫鉅者而言民之生也置連帥諸侯以治之為阡陌立井田以均之學校以教之禮樂以薫之而今之存者鮮矣為州閭隣里之法以洽其情為鄉飲鄉射之法以勉其怠為冠昏䘮祭之法以厚其倫而今之行者寡矣君之所好将在兹乎君曰吾無位奚敢過計願近之余曰古之農畊焉而足食古之商稱物而求直古之工任力而求報今也或嬉懈以困其生或騰價以取乎人或窳其器以欺世或不執三者之業異乎先王之教而肆然衣食扵其間是以古之民也富今之民也貧古之俗也美今之俗也薄而君之所好将在斯乎君曰是亦非我所能為也願近之余曰古之為士者冠圓而履方上衣而下裳長紳委前利劍珮後容臭珩璜備乎左右今也加乎元者方其隅納乎足者銳其首小袂斜裙束絲繫膂俯仰無和平之音進退無從容之度拜則軒其尻趨則頓其歩而與古異矣而君之好乎古豈謂是歟君曰服之不𠂻久矣然王制也吾何敢違用今之服行古之禮可也願復近之予曰古之為學者豈務他哉務明乎倫理而已故事君有言責者盡其言有事任者赴其功臨敵致其勇履難奮其忠事父母而竭其孝兄弟焉而竭其愛妻子焉而别且慈朋友焉而誠信不欺君之好古将謂是歟君曰斯人之常行也不敢不勉抑願聞其餘予曰古之人脩其業善其身而已未嘗有求扵世也及其譽聞既廣其君舉而加諸位其心戚然若不敢安遑遑然思推其澤扵斯民若益稷伊傅之流是也今則不然脩其業以自鬻于人及既得位則棄所學以富貴其身是以功名之見扵世者䆮少矣君豈謂是歟君曰此立功之說聞君子有立言者奚若予曰古之立言者豈以文辭哉亦明其道而已道明矣思覺後世之人故不得已而載之言其言出而為經作萬世之程周衰秦漢間處士說客不知道術各以其臆見為書偏曲詭激君子羞稱之然其辭有足取者至于今并失之矣而君之好其謂此乎君曰此吾志也盡之矣謹聞誨矣予曰雖然此皆以物而言也以物而觀誠有古今之異君盍思夫道充天地亘古今一而已矣堯舜禹湯文武盡之以為君益稷伊傅周公盡之以為臣孔子盡之以為聖顔回曽参踐之以為賢盜跖違之以暴桀紂逆之以亡是道也不以冨貴而加不以貧賤而損不以古而興不以今而隕誠反而求之自有闕太極闕具扵吾心古孰甚焉躬而行之達則兼善天下窮之獨善其身古之人皆然余亦有志扵古凡井田封建之法三代之大典未嘗不究而知之思而欲行之不敢以今之人自視也而君好古之道言貌文辭皆類乎古則亦古之人也行将造君而質焉君曰然請書以為記種學齋記農之扵田君子之扵學其貴賤雖不同力至則獲多心専則功愽其道類也然而山澤之農勞苦而常貧原隰之農逸暇而富足此限扵地勢者然也農之良者能以力勝之惰者地雖美不能為美焉盖良農之治田也先時而藝倍力而培早作而夜不休埀成而志愈勸竭三時之力棄百事而不顧故土雖瘠而獲豐嵗雖凶而不飢惰者不然藝則後扵衆培則失其時貪休而嗜逸坐視人之勞而弗思及其将熟則礪錢鎛以趨之其土非不美也而力之不至則有不可恃者矣故豐嵗而常飢凶年而離散此則在乎人之為也然用力之中有不同焉五榖榖之善者也或者棄去不植而惟䄺稗焉是藝䄺稗嵗凶土曠而暫植之可也藉之以為常用力雖勞而與惰者無㡬矣不亦過歟夫學也何以異乎是人之資禀智愚之殊猶地之美惡然周公孔子之道五榖之種也賢智之資學之而易入固非愚者所及或恃焉而不加脩則歸扵愚矣愚昧之人質固下也茍能兼攻而勇致之其有弗至扵道者乎斯道也近之化一家逺之濟天下不可一日忘也或者病其難而事乎老佛名法之教其始非不足觀也而不可以用用之脩身則徳隳用之治家則倫亂用之扵國扵天下則毒乎生民是猶䄺稗之農也學之蠧者也用力雖勞而不可入乎道也此農之有似乎學而鄭君叔度㫖乎韓氏種學之言以名其齋者歟夫叔度禮義之胄也而質過乎人生七齡而誦周公孔子之言今二十年矣田固美也生乎名冑又加美也學之早藝之先乎人也惟周公孔子焉學學之得其道也夫如是在乎加之不息耳累仁集義以培其本明六藝之文以暢其支疏之剔之惟恐邪穢之萌也扶之翼之欲其日盛而月長也涵之欲其深煦之欲其明引而程之欲其自强而不倦道之成也孰禦既成矣欿焉其若虚眇焉如不及皇皇焉思與人共之足乎已而循乎天用則被乎生民矣不用亦不失令名豈非種學之善者哉不然則鹵莽爾滅裂爾非吾之所謂學矣而與學之蠧者俱矣噫非叔度之賢斯言也吾将誰告歟訥齋記工於辯者非能言者也惟訥扵言者為近之用心與否之異也李廣之射石非用心扵石也故中石而没羽使廣之心知其為石而求中之則石不可得而破矣天下之事莫勞扵過用其心莫逸扵棄其智巧而不用有意扵用其智巧至拙者也有意扵工其機辨至不能言者也漢之廷臣陳平之流口材窮天下而絳侯平居騃戅若不能出言孰不鄙其木訥哉及乎誅諸吕而安劉氏發一言而七廟定非平等也絳侯也故士能有所養然後臨事而不困百戰百勝之兵一戰而不勝敗矣蓄銳而不發未嘗有勇名必勝之将也夫以無窮之變交陳乎前而人欲以私智利口酬之使各當其理而無缺不亦難哉茍能析衆理以待乎事居至静以應乎動彼嘵嘵而至吾以黙黙示之固将鉗舌汗顙之不暇而烏能與我較乎天台厲君士榮其少時志銳氣充讀書務愽覽談論偉然常窮其同軰既而渉世頗久乃自懲創見人厚自謙退不為多言題其室曰訥齋士榮盖有所得而然也吾嘗病利口者之衆以為茍不有以捄止則日趨扵薄思以身由之而未能然人見予之不言也或尤以為傲或笑以為愚彼固不足以知然而俗之所尚其可見矣每竊自嘆安得與余同者而語之乎今既扵士榮見之而又惜其身之在下不能使人化之也雖然以士榮之才豈有不遇者哉吾試從而徴焉他日大夫士恥言人之過失而尚躬行田野之民安扵其業而不能相訐訟臨民之上者相戒以惡言厲色為羞此必訥者之化也當是時也士榮尚以告余亦可出而仕矣尊聞齋記古之人有不可及者唯聖人為然自聖人以下其天資與人不大相逺也而後世莫有及之者無聖人為之師而為學之功不若古人也七十子之徒既靣見聖人而躬受其教矣宜若可以無過猶且日檢其身而不暇聞聖人一言則退而識諸心出而講扵友服扵言行而推扵事功或有愧乎斯言則愓然而慚戚然而憂恐恐然懼無以見扵師而服乎友也及善其身而成其名人問之則又退然如不能勝曰斯吾師之教也非我之能為也稱扵人則曰吾師之云也非我之所能言也豈特扵師為然扵當世之賢者亦然扵昔之聞人亦然古人之尊所聞盖如是故名立扵當時傳扵後世而不廢也今之人豈皆不若古人之有美質哉去聖人既逺矣用力倍古之人且恐不足而顧放其心而不持弛其身而不脩視聖人之言如鳥過其目聞聖人之言如風入其耳不求其意之所存不察其道之可法扵吾身同時之人宜又可知也蔑其所聞如此欲其名之立道之成豈可望哉奚獨不思乎聖人之所繇聖七十子之學扵聖人問答辨難之說非徒云也七十子有是性也吾性與之同七十子有是才也吾才與之同七十子所學扵聖人者吾何為不可乎茍能即聖人之言以為師諸子之言以為友以顔閔所以自治者治其身顔閔可㡬而及矣况餘子乎且天下非無人生今之世而欲得如古聖人而師之固未見茍求勝己者而師之豈無其人乎一鄉之中必有勝已者吾師之一國之中必有勝己者吾又從而師之以國為未至又求天下勝己者而事之則吾之所聞必衆矣告吾以善者必多矣又求古聖人之所言者而服之雖顔閔生今之世亦若是而已矣茍欲必得如聖人者以為師而望以善其身難矣哉六安郭君士中好學善文辭受經扵今太史公而取曾子之言以尊聞名其齋太史公信天下之師也士中既得而師之矣又能尊其所聞則所以治身之道異乎今之所為也必矣余欲以賢者望士中也故推吾所聞者以告之棠溪書舍記浦江之東有地曰棠溪吾友烏傷劉君養浩築室講學其上飬浩學扵太史公為文有名於四方年四十餘志不稍懈而益篤焉飬浩謂余嘗從事乎學俾余記之嗟乎學豈易為而易知者哉非誠為學者不足以知非誠知之不足以言言之而不至知之而不明皆未盡為學之道者也古之為學者可見矣其幽深奥𣺌者雖不可以言傳未有道不足以周萬理才不足以用天下而可為聖賢者也孔子之門若子羔者跡其行可謂有道君子矣而孔子鄙之為愚若仲由者可以治千乘之邑而斥之為野盖子羔之信道而才不足以行之仲由優扵才而未能以聞道皆偏滯扵一隅者也後世學聖賢者既不足以得其大全髙明宏達之士務事功而過扵疎畧純恪謹飭之士慕義理而局扵卑懦疎畧之流必至扵詐卑懦之流必至扵木自漢以下未有不入扵二途者也近者大賢病其若此扵是著其說扵群經大窮乎天地而微析乎毫髪精之扵性命粗之扵事為莫不掲而示人使學者可以按書而蹈聖賢之域宜乎其易矣而卒未有至焉者有志者寡而安扵小成者衆慎言篤行學之一事耳古之恒民皆由之而不以為異今之能若是者人望之如聖賢而彼亦以得聖賢之道自望文辭言語道之餘器耳古之人未嘗以此為學而後之大儒君子舍是無以名此學之所以墜地而莫救也吾嘗以為當今之世非傑然雄才出而脩孔孟之道不足以起俗學之弊而使生民見三代之盛以太史公之賢豈無望扵為學之士哉此吾與養浩之所宜勉也夫人有美才難矣以美才而得師又難也茍不以聖賢為凖則豈不可惜乎故吾以大者為養浩告若文辭之事固養浩之所知者余不敢以告也來鷗亭記心無一物之累然後萬物皆可以為樂非樂夫物也物至乎前而皆足以資吾之樂也茍為有累扵心擾擾焉怵迫于中者紛紜起滅萬變而無窮五采八音陳乎耳目之側亦孰與為樂哉故心誠有可樂雖微物皆足娱乎心其中無可樂者雖至可樂之物亦適以増其累昔之君子有居深山而群鹿豕者有居海濵而事漁釣者方其有以自樂快然不知貧賤之足悲而貴冨之可慕凡物之觸乎見聞者莫不有以樂其中盖其心之虚明廣大與天地同體而無一物之累其樂不亦宜乎後之士樂乎物者有矣有以自樂者每難乎其人豈非無得扵心故哉無得扵心而有資扵物猶瞽者之資乎美觀瞶者之資乎美音雖有可樂奚從而樂之華亭姚子宗文天資粹美而好學不倦其心盖有足樂者異日居海上鷗鳥翔集于左右心樂之因名其居曰來鷗亭及來居淮水之隂群鷗從之如昔日仍揭其名而請予記夫鷗鳥之飛水居之人多見之而未嘗知其為可樂姚子獨遇之忻忻莫逆於心豈獨於鷗為然哉凡物之接乎前者莫非可樂之具也子思子曰鳶飛戾天魚躍於淵言其上下察也君子之道與其所樂安往而不在乎斯理也予竊有味焉而未之有得也幸而他日與姚子劇論斯亭之上以發吾心之所同者豈非果可樂也哉讀書齋記弓矢干戈所以禦亂而其弊也亦以興亂非弓矢干戈能興亂用之者非其人則亂因之而起或者以其興亂而不知其有禦亂之功遂棄而不用豈不惑哉聖人懼人性之偏扵所習而淪扵不善立詩書禮樂以教之愚者使之通昏者使之明悍者使之淳頑者使之亷當周盛時天下無不學之民無不善之俗故賔興賢且能者用之扵朝則為良公卿而其在􅅵畆之人亦皆不失為敦行君子其化至扵刑措而不用其效至扵七八百年而後亡詩書禮樂之教使然也後世覩其末流之弊謂辨士以口舌相傾皆教之所致而不究其善俗化民之功扵是或任刑名以督責為能或尚黄老以無為為髙或用武夫俗吏各以其意見為治求以勝詩書禮樂而卒不可勝然後知其不可及而終不能以此易彼斯非惑歟故欲知天下之治亂視其俗欲知其俗視其民知學與否而已矣異時江南之俗以貲産相推以侈靡相夸其號為有識者闕客為好學是以大亂乘之今國家有意扵化民之事而其大家巨族亦慨然有慕扵為學車君叔明兄弟尤以文雅稱以其餘力發為詠歌入其室樸素儉質視其身亦無異嘗以讀書名其齋州里多效之能文辭者又従而嘆咏之吾故以是占天下之将治也人心亦衆矣欲一而同之舍其性之所同有者不能也其性之所同有者具乎詩書禮樂之教以此治人人心有不一者乎能一人心與之生死存亡無不可也此先王之意也今世方行之而巨室者又導上之教以致扵衆庶者也使三吴之地比屋皆知為學之美者寧不自車君始乎然則斯齋之所繫大矣黙齋記烏傷有士曰宗君思睿病世人以言語取敗題其居室為黙而告余曰子能為言其為我記之余曰異哉乎宗君已欲黙而强人以言乎以余之言為是則君之黙過也以君之黙為是則余之言非也二者不可以茍同矣君之有愛扵余言何哉雖然予非好言者也葢欲黙而未能者也扵他人且不能不言况敢黙扵宗君乎余嘗遊泰山之崖見奔流之注扵壑其聲若雷霆之震凡有耳者至其側皆廢其用而人不之怪及處乎家聞兒童噪扵庭則咄而禁之然後知語與黙之說水之聲役扵天故雖暴而人不惡兒童之噪出扵人故人惡之君子之扵語黙豈有他哉出扵天而發扵不得已斯美矣道誠宜言也雖終日言孰能非之道誠宜黙也雖一啓齒人猶以為病故君子未嘗有意扵言亦未嘗有意乎黙也皆一扵天而不敢叅之以人人偽而天誠誠者無窮而偽者有時敗也宜黙而言其失為佞宜言而黙其失為誣二者皆君子之所不取今宗君既以黙自居而余復言之而不已不亦皆不可乎是不然也昔之聖賢有不語如愚人者矣有以好辨稱扵時者矣人豈敢訾其為過哉有道者之扵世不待言而化不待令而從若顔子是矣宗君其慕顔子者乎自大賢以降言不直則道不明道不明則學不傳故孟子居好辨之名而不辭余慕孟子者竊有志焉見山堂記桐廬多名山壽昌為勝壽昌之南山又其勝者而梁氏居為尤勝梁氏居當山之陽求其盡群山之勝扵一覽者則在乎見山堂焉初山堂之未建梁氏曰某者按其西百餘武得小山高而不亢叢而不汙左右顧視而樂之乃剗荆棘除糞壤因崇以為垣夷級以為階腴者為圃而通者為徑斬木琢石而作斯堂堂成而四望諸山翼然臨乎前屹然蔽乎後雲幻霧詭林加穹而石加秀禽鳥猿鼯之音寒暑旦暮之變接乎耳目而動乎心志所以增益乎人者大矣扵是名堂曰見山命諸子講學其中俾予記之世之山有目者皆見也然多蔽扵所嗜幸無他嗜而見之則又病扵求之大深取之大博而不能有所得今夫樵者蔽蘇而然也市人屠賈日常見山而若無所見蔽扵貨利而然也仕者汲汲扵爵禄才者汲汲扵名譽衆營營各役志扵所嗜皆有所蔽而奪其耳目之正雖見猶否也惟夫幽人静士遺外物而不嗜故獨見之然又多肆意扵瑰竒幽絶之境不達其大至扵緣木躋崖窮極險怪敝履屐勞軀體而不知厭則其所得者狹矣善扵用物者則不然據其要以觀其妙得其一而盡乎百凡接扵目者會諸心心之所會皆足為我用而不為所役其事至逸而所獲至大故君子樂之若見山堂者近之矣然堂以為學且與學道者類焉道具扵聖賢之言人莫不學也而不見乎道之真以有蔽之者耳幸而無所蔽則又眩扵文辭之富騖心畢精博索逺采而不得其要故卒無因而至焉惟知要之士操大中以制衆理居至静以裁萬變知周乎物而不勞才裕扵用而無窮斯為善學者矣然則斯堂豈特可為觀遊之適而已哉孝友庵記烏傷朱氏居亦岸者為最著元之季世丹溪先生諱震亨字彦修以道徳性命之說教其鄉人人咸服之先生娶戚氏生二子衍玉嘗擇地東朱山之原謂其子曰我死與而母俱藏此若等宜祔於左右皆應曰諾已而戚氏卒衍亦卒未㡬先生亦卒玉奉先生及母夫人柩窆扵其中奉兄柩窆墓右又預治其左為二穴他日将與其妻合葬即墓前若干武為庵俾子弟居之以奉洒掃扁之曰孝友而來告曰此先君之志我則行之請有以示後人使世守無怠嗚呼古禮之廢也久矣葬之弊為尤甚古之葬者萬民各以其族區分而序列之惟有罪者則不入兆域至周之季雖稍變弛然族葬之禮未變也昔嘗觀乎洙泗之間拜先聖人之墓見伯魚子思之冡昭穆序葬而子孫咸祔其側至今二千年而未已猶有先王之遺意焉今之人儒衣冠而誦六藝者皆以學孔子自名至於葬其親則徃徃信俗巫冡師之說為其身謀或父子異處或兄弟殊遷使其魂魄不相接形氣不相依與黜罰其親何異乎而猶以儒稱扵人不亦妄矣乎若先生父子者可謂無愧扵孔子傳不云乎慎終追逺民徳歸厚矣慎終之事玉既能行之茍欲追逺則豈不在後之人哉玉之子與衍之子從父兄弟也至扵孫則為從祖兄弟矣愈逺而至扵曾𤣥至扵來昆又至扵數十世分益盡愛敬之心得無少衰乎幸有人焉能相率而拜扵墓下會扵斯庵之中指之曰某某墓之子也某墓之孫也出扵某墓者也某墓又出扵先生者也吾數十百人其初數十人耳數十人其初數人耳數人之先先生一人耳一人之身何為而不親睦乎聞斯言也有不涕泣而下拜者非人也孝友之心其能自已乎其有弗追逺而返始者乎斯豈先生之志乎其可以示後人否乎玉泣曰是先生命玉之志也請書之望雲堂記生乎千載之上而為後世所慕者夫豈偶然哉生乎千載之下而尚友乎古人者夫豈徒然哉道徳功業不能逺過乎人無以興無窮之慕志行才術不能自拔扵流俗雖慕古之人無益也故觀古人之善當視慕者之衆寡觀今人之賢否當觀其所慕之人與其所為之業所慕得其人而行或不掩焉君子以為夸所為有足多而不知取法扵古之賢者君子以為陋慕焉不失人由焉不違道豈非君子之所為者乎絳人劉士登繇太學生仕于朝再擢為京府治中二親居乎鄉去官所数千里以道途之不易也弗敢迎以養因名其堂曰望雲之堂盖慕乎唐賢相文惠狄公之為人而取其語以表其孝思可謂知所慕矣及觀士登之行已為政安重慎宻不大聲色而吏懾其威民信其令大夫士稱其才而咸謂劉氏為有子又何難能也今天下之人有親如士登者不為鮮而能善其身為時令人如士登者鮮也善其身而能以古之賢臣自望者尤鮮也夫古之與今時有先後而其得扵天者等耳文惠公之為孝子為忠臣卓乎貫天地昭乎揭日月者曷嘗加毫髪扵天性之外哉善率之而已矣以士登之篤志而才美歛之為徳行施之為事功将奚所弗至他日位益崇所樹立益偉使後之人慕其行業猶今之慕文恵稱歎企羨父母與有榮焉則果能㧞扵流俗而扵孝也大矣然則居斯堂也可不深思君親之大義以求無愧扵古人乎梅所記仙居髙君徳至博學慎行隠居薦谷之陽名其所居曰梅所客疑之曰有梅焉而謂之梅所可也環坐之内未嘗有梅而曰梅所何歟髙君茍以梅自儗則梅一物耳生扵寂寞之鄉而榮扵窮冬之時視夫姱麗如綺繡絢郁如雲霞奪目適意逞姸扵陽春而為人所善者不侔甚矣而君獨何取乎或從而應之曰人與物固非同類也而有以比徳焉昔日孔子嘗以蘭自儗周之詩人以樛木儗后妃以棫樸儗賢材屈原以申椒蘭桂比君子斯数者豈非草木哉而聖人賢士皆有取者以徳不以其形也茍以其形枯叢敗折非有知識之性聲音之奇何足取之有盖君子之觀物也求之扵形似之外㑹扵心意之表故物皆為我用用之久而不厭彼衆人則不然騁意扵形色之間娱情扵臭味之頃譬如游蜂野蝶憧憧旦夕而不知止用力雖勞而所得者寡矣是烏足以語夫道徳哉且子不聞乎隨時而同俗者衆人之智也獨立而不變者君子之節也在昔之時挾材御術僥倖扵一旦取鞍馬金帛以驕其妻子而自以為得志者閭巷之間皆是也旋目而視之風雨散而沙塵飛欲再求而熟玩之已不可見矣是何異扵陽春之草木乎髙君居衆人得志之時飲水飯粟以樂聖賢之道衆人固譏其戾俗而笑其後時矣及變亂既清彼方危懼惴慄恐不能自脫而髙君之道確然不變而坦然方亨何異扵梅之在嵗晏乎然則雖謂高君為梅可也謂髙君寓意扵梅亦可也謂髙君所居為梅所亦無不可也何獨疑之乎扵是高君謝曰㫖哉子誠知梅歟廣平有愧和靖不如遜志齋集卷十七
