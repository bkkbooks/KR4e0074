body:
  text: 遜志齋集巻二十一明方孝孺撰行狀傳先府君行狀嗚呼惟我先府君之卒不肖孤既以十年二月二十四日奉柩與先妣林夫人合葬於深灣童施山之原復懼盛徳未紀無以明示來世疾首痛心以日以夜然斯事至大非託之立言君子莫能傳而當今天下所師所宗言而傳世者惟夫子為然况不肖無狀又獲出入門下玷弟子之籍是用不避誅責銜哀叩誠頓顙上請伏惟憐察焉嗚呼先君諱克勤字去矜姓方氏其先出於桐廬𤣥英處士於宋初十五世祖二十四府君始遷寧海侯城里世敦儒術為邑禮義家曾大父諱重桂鄉貢進士有學行學者尊之曰介軒先生大父諱子野父諱烱元鄞縣教諭皆以長者稱夫人葉氏宋丞相西澗公從曾祖姑也先君生而端重殊常五嵗能讀書自辯章句年十餘暗記五經為文有奇語里中老生嘖嘖賞異呼為神童稍長閲關閩遺書歎曰為學當如是矣遂刮去浮藻竭心推性命之秘閉門講習不知饑渇寒暑年十八九充然成徳為名儒受業質疑者繼乎門先君口舉手畫横分豎貫曲折明備各稱其所欲初邑人自宋季以駢儷雕刻為學莫有談周公仲尼之道者至先君始以易教授開陳其説士俗為之大變至正甲申江浙當大比先君就之試時有司以語忌去取士先君言時務歴數徃昔治亂之由以為如是則治否必敗見者相顧出舌曰奇才奇才賈誼弗過也竟不敢第先君名先君縱觀南宋故都為文貰酒酹岳武穆王墓歌黍離之詩慷慨泣數行下望者以為異人㑹番昜董彛先生為慶元路儒學正先君從之遊董先生素以通易自名先君與之辨質羲文大㫖先生不覺自失曰子信不可及愧其門人者久之先君自是道益明志益堅知元之將亂彌自韜晦窮理致知以盡其變至於隂陽消長之度禮樂名物之數井田封建之制躔次疆理之説咸求折中授業者日益多㑹海東盜起江淛行中書檄呉江同知金剛努以白金募民為水兵先君曰此關利害吾其可不言乃詣金剛努曰民之為盜者或迫於饑寒或祛於徭役今斯民固無賴矣奈何使其去妻子而為兵㡬何不首為盜耶是所謂致盜非禦盜也金剛努怒而去已而水兵果中道殺護吏逃去從盜金剛努踰垣走折一足始悔曰吾不從方先生言以至於此未㡬侍御遵達實哩至郡議招諭劉中丞基為副先君上書陳剿捕之畧不宜姑息劉君奇先君言而不能用遂至郡縣陷没民受其害先君發憤稱疾決意不出行入山谷採松栢啖之或辟穀絶食累日不返然益務開淑後學講説君臣父子大義以動之聞者心解或至洒泣是時他鄉民多著鶡冠操戈劒從權貴剽刼獨所居鄉無一人附亂者鄉隣有訟或相率就先君取平先君教以禮讓多致感悔或來饋謝則郤不受當路以幕府事屈先君議先君謝不肯曰我辟榖久矣弗足與人間事也閔民憂世之志每於文辭見之君子謂先君制行廉正如陶潜䇿時事善中如賈誼造詣深天資和毅無愧程伯子識者以為然丁未冬大明兵定郡縣先君著國家所以興亡之故為書欲詣行在獻之其目曰舉賢才安人心黜豪强除暴歛明教化其畧以為人心者國家之元氣教化所以燮養元氣之具也不任賢才則教化不行不去苛歛則人心不安失人心而得天下􅌸教化而求治平非所敢知也如是者累數千言洪武三年郡辟為邑庠師先君日以師道磨礲學者晝夜辨析諄諄不懈四方後進負笈求聽者百餘人人人有所聞學者私稱不敢以姓因所自號稱愚庵先君既以太夫人春秋髙自罷歸從而歸者踵相接一庠為空逺者稍稍散去至今稱師道之盛必以先君為言四年行部使者袁君宏以書幣來徵先君亡逸他邑郡吏詣門請雜逮姻連督索之先君不得已乃出時年四十有六矣之京師詣御史執政兩以母老辭執政詢以政治乃驚曰今列郡闕守長而先生適至朝廷之幸吾安敢蔽賢即下銓曹以易試中第二遂錫冠帶授濟寧知府階朝列大夫在官周三年省憲考績為六府最八年春入朝天子以為善治民錫燕儀曹遣踐舊職瀕行奬諭有加且曰政成當顯用汝先君拜謝而退三月重至官越五月知曹縣事程貢嘗以不職被笞恨先君上封事言狀詔御史楊某按覈楊適程故人恐程坐誣罪易民服潛索先君過事踰兩月無所得乃捕府中吏卒繫之考掠無完膚無一可問者楊懼與其吏謀誣先君私用倉中炭葦二百斤時十月未嘗附火而葦則蓋公宗垣實無私用者强卒以此誣先君先君不與辨遂得罪謫江浦終嵗將釋歸㑹印章事起吏又誣及九年十月二十四日遂卒於京師享年僅五十有一嗚呼痛哉初先君受濟寧之命以為非常之恩不可不盡力到部為書懸之通衢諭以朝廷養民之意孝悌忠信之道俾民有所不平詣府自言禁吏不得叱呵之日引耆耋之士坐語問以得失郡學官闕先聖廟頽壞先君聘前進士為師弟子未備者選充之役浮屠葺廟堂鑿廟前地為泮池撤佛廬増廊廡度廟後地為射圃造弓矢置旐鵠日視學率諸生習業始郡兵後人未知學先君以身為師為之立章句謹節文講内聖外王之道不踰時皆化儒服者斑斑間出郡邑之内學舍數百區在弟子籍者二千人始有詔民闢蕪田者後三嵗乃税吏邀近功不俟至期徵之復以田定其繇民滋惰田不増闢先君知其故下令申前詔與民約俾以丁男定繇著册書列民之丁産為上中下等下等析之三則每有徵發自上定之吏無所措其奸嵗時躬出郊勸督見長老勉以教子弟令子弟以力田欣欣焉如戴父母初至大歉民仰給它郡先君竭誠撫輯不敢勞之嵗暮轉戎衣於燕時有令役民舟者有誅旁郡俾民以牛車從事天雨雪牛僵死相枕濟寧民請以舟就役僚佐畏令難更先君曰吾知從民便抵法非所辭即以舟載具白於山東行中書省省義不問後他郡車輸者雨雪霑毁過半民賣車牛以償且弗能足破産者十八九而郡民以舟得無害指天泣曰活民者方使君也郡倉糧絶省檄民七百里轉粟青州民苦不便漕軍者自淮安輸濟南正道郡境先君以為便就輸郡倉而俾濟南轉青州粟道且便告於省省不從即以聞户部戸部奏可省臣大愧郡城圮舊以兵築指揮挾貴人勢當五六月役民萬餘築之民不得穡哀號即工聲聞數里旦暮不休先君憂憤不食曰民病不救焉用我為密聞中書衆以為且得罪不敢署名先君獨署之胡丞相以聞即日詔罷先時不雨先君袒跣遍禱羣祠涕泣卧祠下誓不雨不止至是詔至民驩呼而散大雨如注是嵗五穀俱熟民歌曰孰罷我役使君之力孰成我黍使君之惠使君勿去我民父母自是連三嵗三禱皆有年五年夏鄰邑蝗先君憂之移書社神變食省過夜焚香籲天俄聞空中薨薨聲燭之皆飛蝗是秋四境外皆饑獨一郡完熟人以為異先君於去民害如饑渴或無已勞之事輒却酒肉不御凡訴訟者隨事裁決大者笞辱小者諭遣之不留狀牘尤慎於獄月録日省不俾淹滯或事未具不決者時為糜以食之夏秋之稅舊以斛卒持槩髙下出其手或累旬不收民至謂倉為穽先君令民自持槩斛卒歛手不敢出聲遇將穫歛預以書與民期民争來輸税羣集時夜到倉下不敢就寢民信且悦不遣一吏而税常先足於他郡江西浙西二省有詔輸糧百餘萬於濟寧水陸三千里先君視之如已民不使有絲毫怨抑常制每斛别増四升以補腐耗先君憐其道逺可念言於朝蠲之二省民感泣及朝京師民之在京者數十輩擁拜馬前曰此我輸糧時老父也舊徴州縣吏皆以𨽻卒徃徃求索無厭先君下信符置郵而召莫敢不至者信符之籍以印識而中分之或屬之吏則托日月稽違圖賄利先君自箴之緩急之期一自已出由是吏弊誕息復下其制於州縣斷吏卒母瀆民有故皆以信符召集以故民得一力耕桑而襁負來者相屬四年户僅三萬税萬餘石八年税以石計者増至十四萬四千七百户増至六萬有奇二州十縣獄無滯囚郡獄㡬空民有積粟野無饑殍鷄犬牛羊散被草野富庶充實儼如承平之世先君奉神事上盡禮社稷山川諸祀在境内脩飾壇墠置祭器祭服湢澣之類躬親為之周垣之外樹以名木將事之際一如儀則無或怠惰水驛始在西門之内卑陋汚濕居者弗康先君料材木俟農之隙更作於南城之陽庭堂室房𢎞敞幽嚴百需之具舉無闕者冬寒河凍驛船不行則伐木為炭穿土穴藏氷因其餘力以集事功計精慮密出人意表泗水經郡城南通淮江北引河濟地勢髙瀉故搆石為閘而時畜洩之魯橋棗林二閘嵗壞石填河中舟道難之役閘丁絙壞石治磚灰雜土築成之故以葦囷蓄糧火屢為灾先君教民為陶作瓦屋百餘間嚴飭火令編民居為曹互相救恤火患為息先君在官未嘗一時閑雖無事終日冠帶坐堂上召諸吏授以詩書法律盛暑嚴寒不廢公牘堆几羣辨譁然片言折之大將軍魏國徐公曹國李公等率士馬百萬之燕駐郡頗久要官勢吏徵索糧芻争欲先得相索授喧錯于前先君從容酬決無不如意一軍稱能永嘉侯朱亮祖將舟師數百艘北征㑹河水涸舟膠不能動大怒召先君曰即具五千人浚河不者以軍法論時日且暮先君不忍煩民退而禱於天夜三皷大雨黎明河水漲數尺舟竟去莫敢言者先君為政以教化為先能以徳勝佐貳始或倨慢先君愈誠待之卒愧服願為弟子武夫悍將或不為禮久乃化戢信愛凡任吏取質訥少文者必躬先之俾入於善不喜近名常稱曰務名者必樹威樹威者必害人害人以利已吾不忍為也府庭之前不陳杖械皮鞭掛楹示不妄罰有過者告以道理使之自愧始而疑已而服已而信為不可及至以吏議南還民號呼填道如失親戚隨而行百餘里者數百人郡之子弟員登成均者聞先君卒奔走閤門外慟哭失聲嗚呼哀哉先君孝愛切至事教諭府君卑聲婉色惟恐弗至及海冦亂刼村落焚廬舍府君躬負太夫人入山中逃不暫顧妻子兩踵血流不恤及出官外遇太夫人與已初度南向望拜竟日不樂稍遇奇味輒涕泣曰太夫人不食吾何食為懸棄之至敗臰乃已遇二弟師訓父育終身未嘗變待朋友有恩好賙急難居濟寧南冠過者必以酒米饋之同郡者加厚焉同邑者又加厚焉告寒與衣告饑與食不能行者僦舟以送之同郡士為萊蕪丞欲迎其母而告無貲先君以一月俸金與之同僚以事奪無所衣食先君嵗買布帛以遺之日召之對食遇夜邀至家飲終三年如一日所入俸禄月二十石盡以散朋友不少吝惜自奉甚薄不服紈綺不帛襦袴一如布衣時或陋先君先君曰吾道當爾日不再肉或日無事輒却去曰禄不可徒食也每夜則拜而陳其所為事於天始至斛米可易白金三兩先君日食之餘盡留之官以紆軍食或請先君為家計先君曰先國可也敢射利乎所居室壞吏請葺不許曰母以我故勞民出俸貲買葦席障之令蔽風而已床榻左右雜置圖書入其室者若無人然居官五年惟一子及一童時人謂先君不堪而先君安之兖州守因童進二水𤓰先君笞童數十而召州吏還之鄉人為他郡縣令以一燖鴈侑書先君卻去與絶交或以為大甚先君曰吾非市名性不喜分外耳至於薪芻之㣲皆易以粟一芥不取於人每行縣以物自隨杯湯不肯受去官貧甚鬻所乘馬以行行李蕭然觀者歎息嗚呼哀哉先君面白如玉鬚眉秀麗不妄笑語不旁觀視動容周旋必以禮法率真任質不事表襮與人交好不以久近冷熱一立談頃洞見肺腑發言持論一本於正性命之道晚益精熟榮辱利害視之若一臨終之際知非自致超然委命顔色不改嗚呼痛哉先君之學明白純正以紹述考亭為已責所志益深且逺逢時得位亦欲推以淑斯人否則退隱邱園傳其業於書以詔後世皆未能究而天奪其年天耶天耶曷可信耶諸孤之痛曷有極而罪曷可量耶先君所為文辭多不留藁有汗漫集若干巻藏於家林夫人諱姬婦道冠九族先十五年於元至正癸卯九月十四日卒生子男二人孝聞孝孺女一人再娶夫人王氏諱在生女一人未彌月而夫人卒庶母董氏育之董氏生男一人曰孝友嗚呼先君之道蓋法時乎易取政乎書主敬乎禮體和乎樂雅言以詩制事以春秋其深髙博大者雖不可測而知然而家焉而有善俗之化官焉而致富庶之治發之乎政事著之乎文辭比於古之賢人循吏未之或加也然古之人有若此而傳者矣亦有不傳者矣其傳者必其居髙位者也必其有後人者也必其得立言者傳之也其否者或位卑而人弗知或其後不足以彰之與無傳之者耳今先君之位不顯以殁殁未數年而知者寡矣後之十年知者不尤寡乎又後之百年其復有知之者乎雖有不肖之孤存然年穉身賤言未信乎天下行未出乎四方孰從而傳之乎縱有所待安知其能必至乎此所以不得不悲且懼而汲汲圖之於夫子也夫子哀亡憫存而賜之銘不惟諸孤不敢忘先君亦且感徳於地下不朽矣謹狀常山教諭王府君行狀府君諱良玉字懷璞姓王氏其先太原祁人五季時節度使彦超由㑹稽徙婺之義烏所居鄉曰鳳林世號鳳林王氏其後有諱固者登皇祐五年進士第卒官恩陽令縣人在宋舉進士自恩陽始傳三世曰説贈宣奉大夫生二子曰永年喬年喬年生承奉郎濤承奉生江東轉運司幹辦某幹辦生誠誠生衛道衛道生濟景定二年應薦為國子免解進士府君之祖也考諱炎澤元石峽書院山長有學術學者稱之曰南稜先生黄文獻公師之後為銘其墓妣傅氏府君性髙介容貌偉然讀書善辨説尤深於春秋與浦陽呉公萊交移書論析疑義甚至縉紳之士皆伏之争迎為弟子師府君據中座談孝悌之道燦然可紀聽者駭然相顧舉邑之秀民賢大夫之子弟争執經拜門下願託名弟子籍中揖拜進退森森如度視府君顔色俯仰不敢譁笑其後成材者相繼府君屢試有司不利至正辛酉江浙行中書當試士府君曰吾豈終窮者耶就之試占副榜前名儒學提舉司因用為婺學訓導府君曰善可以及人足矣何必官為日未出冠帶坐堂上召諸生兩序立授其程範而督勸之一發端反覆數百言人人競列府君前以聽他師所居戸外無一跡亷訪使者至郡羣儒迎謁為禮畢俯首曲躬趨出惟恐其發問不能荅府君每留坐與之言事數千載治亂人善惡成敗政當否俗淳漓隨問隨荅使者未嘗不稱善拜送不敢以布衣待府君張君士𢎞善士也以亷訪使按部見府君才歎曰吾分得舉士而王先生老於布衣吾愧多矣即上其名俄授常山儒學教諭府君至常山視婺益加功常山人稱之時府君春秋髙三子裕禕補皆業儒而禕從黄文獻公學頡頏儕輩間尤有名待制浦陽栁公貫名士金華胡公翰交為府君賀府君亦私喜有子怡怡忘其老之將至年七十五以甲辰嵗五月五日卒於家六月某日葬崇徳鄉青巖里金村之原夫人陳氏諱貞處士寀之女好學知義理通醫藥星歴之書其舅患臂痺夫人奉湯藥躬沃洗久而不倦蒞家御子孫嚴而能教詩書皆口授之晚好浮屠老子書時焚香習誦疾病不廢年七十猶治絲枲不暫閑以今洪武壬子九月十一日卒得夀七十三丙辰十二月某日穿府君之葬附焉孫男六人綬綸綱紀紹紳孫女二人適傅完傅霖曾孫男十一人曰稠曰秩曰穆曰稷曰程曰穰曰稌曰稙曰稔曰稚女五人禕入國朝以文學致官翰林待制文顯天下而諸孫又皆能守父業府君之徳於是乎益可見矣孝孺辱與綬交讀待制公文辭思其所自出因問諸綬而狀府君羣行俾藏焉以備其家乘之闕象山王府君行狀府君諱某字剛甫姓王氏四明象山人曾祖某祖芝翁父松母徐氏府君少倜儻負氣節讀書畧通大義以薦為台州路學録至正中兵起海上奉省檄攝東門巡檢司事居六年盜不敢犯民安之郡奇其才事難決者輒屬以治府君明而能斷民趨其令爭鬭相訟者不之邑而之府君聞一言釋憾而去國朝洪武初昌國民作亂襲象山虜令丞王茫入于海府君與其友蔣公某謀曰狂豎虜上官據縣境其誅死固宜然事聞於上大兵必來邑民將盡虀粉吾曹可坐視而不救耶今能先格殺為亂者以獻則邑人可無害矣府君遂募民為兵掩擊之殺其魁二十餘人釋其衆喻之曰若曹良民第脅於賊爾能投兵復為民則可保首領否則自取誅滅無悔衆皆叩頭散去曰君生我時大兵聞有亂者將盡殱邑人及府君以事聞邑人争泣曰㣲君此邑數萬人皆為鬼矣狀上京師賜白金若干兩府君家素多貲至府君貲益贏然不以此自豪卑身好士人有遇難不問利害以身援之弗責其報人以此義府君恒病鄉鄰弟子不學欲割田創學以教之里有假貸者不深取其息與人交和易質直意氣豁然衆稱之為忠信人晚受誣逮京師十二年春正月三日卒年六十八聞者為之歎泣先娶葉氏早卒生一子用鼎好學有文晚娶董氏許氏生一子甫一嵗府君柩南歸以某年月日葬于某山之原俾某狀其事某之先祖與府君俱娶葉氏實聞府君事遂泣而書之以告立言君子謹狀明故贈將仕佐郎禮部員外郎瞿府君行狀府君諱嗣興字華卿姓瞿氏其先居河南後徙通州之海門宋末有諱某者避兵南來至姑蘇之常熟家焉生二子青達俱有才力能服其鄉人元師破江南有劉將軍者狥地至常熟青與達帥里中强壯拜馬前迎之有狂犬突出軍前衆愕然持弓不敢發青直前一箭射殺之衆驩曰壯士壯士可官也青曰吾不如弟達遂求旗號俾詔諭未降者承制授達百夫長及宋亡遷蘇州巡鹽大使兼管内六縣捕盜轉怯憐口提領娶某氏府君其子也府君少時家有禄食日從其徒射獵飲酒為樂不喜學書天資仁善和順未嘗有過年七十怯憐口以例革不置官提領君家食甚貧府君即折弓矢脱去紈綺故態躬力穡事以養二親承顔候色惟恐弗至母嘗病癰時天熱癰潰臭不可聞人皆掩鼻趨過府君跪床下執蒲葵扇驅蚊蚋以手磨穢剔汙扶起卧不解帶者三月至愈乃止母又嘗患積氣危甚醫不能治或告以股肉可瘳乃置刀盂上而禱於神俟刀躍乃可割府君如其言自旦至晡時頓顙於地顙破血流盈面刀弗動府君泣曰天忍不憫我耶我縱以身易母猶母之肉何暇惜乎知刀卒不可動起引刀割肉覆盂中裂帛漬血裹瘡戒左右弗泄羮之謬稱他肉以進時母不食已五日矣見羮喜為之握箸食一杯㡬盡食已而瘳母後嘗感疾思啖菱時菱未花市之不得解衣入菱澤中哀呼索之竟日手足皆腫俄得菱實三持歸遺母母疾如失既而貧愈甚或隔日一炊府君曰事急矣尚守不變如父母何哉攜家入蘇城謁多錢家願為盡力多錢家察府君誠信可㐲出貲財俾貿遷日分其息十之二府君繇是稍裕凡父母所欲無不致也府君不妄取而好施嘗朝出道獲人所遺囊有楮帛若干視其名則市中小夫府君坐不貼席走其家還之有遺田宅契書於路者覽之曰契書失將起争端跡其人呼與之其人貴家奴失主契畏罪涕泣欲求死叩頭謝曰公活我氊工王氏大雪凍餓不能起竈突無煙府君憫之天明攜錢二十緡潛投窻隙而去歉嵗出糶有窶人來糴衣不及脛府君受其錢五千陽忘曰汝糴十千耶倍與其粟鬻蔬者過門府君取其五錢授以楮幣十倍曰吾適無錢汝持楮幣去將以餘錢裨我鬻者笑曰吾安有錢裨君耶府君曰汝第持去俟錢多歸我不汝急也其意與之而不欲其知皆此類凡負販者必多給其直家人怪問其故府君曰彼胼胝手足以求升合利吾忍與較耶嵗丙申常熟凶民來依者數十輩府君僦舍以館而食之癘氣發病者相枕府君躬親粥藥而時進之卒賴以生府君晚喜浮屠言讀其書豁然若㑹其意者復閲北溪陳氏性理字義即解其要曰聖賢之學蓋如是因戒其二子懋莊曰我少不學至老而始悔若等其勉之懋與莊服父訓刻志事學莊入國朝為禮部員外郎府君及見之曰吾有望矣洪武乙卯九月府君得疾恐念慮或亂畫紙為圈揭屏間常目之二十七日卒於家卒前一日楚府伴讀陳子晟等道過府君將之京師問府君欲何言府君以兩手加額曰語吾兒努力供職報天子恩我死不恨享年八十有四莊在禮部累請於朝未報卒後月餘贈將仕佐郎禮部員外郎配蔣氏贈安人安人事舅姑如府君之孝舅姑或怒則率子女羅拜於前曰新婦誠可怒願念諸孫貸其罪舅姑意不解悲泣不已年七十二先九年卒是嵗十月二十三日葬呉縣横山梅家灣之原與安人合兆女三人一夭二適某某孫男四人紹緒紳某曾孫男二女一府君没明年莊自員外郎拜福建等處承宣布政使司左㕘政階通奉大夫當得加贈而早欲圖其不朽未暇請云大司農張公行狀公諱晉字徳昭姓張氏滑之白馬縣人曾大父某大父國柞大母宋氏公生而廣顙豐頥英穎異凡輩少喪二親治書侍御史宋公奇公警慧挾以自隨宋公渾重長者寡言自與不妄有所可否僚吏白事頷之而已公年十二三嘗侍側㑹吏以事紿宋公宋公乃頷之如平時吏退公恠問曰吏言事非是意實紿公耳公不語而宜之可耶因悉舉其狀無所遺宋公大驚陽叱遣公曰童子何與乃公事召吏詰之如公言叩首服罪宋公因是愈内奇公勉以問學公亦慨然有志於事為讀書務推學教大㫖警悟辨析釋類訓繁咸有條理名動鄉邑遂以儒舉既而亷訪司强欲吏公公欲明習法意益學律法以儒術相㕘所折獄人稱其平辟宗正府掾吏中書省掾為工部主事轉大禧宗禋院都事拜監察御史轉御史臺都事入中書為左右司員外郎刑部右司皆為郎中出為河間都轉運鹽使平江闕運糧萬户闕就以命之復入歴吏刑工三部尚書㕘議中書省事遂為江浙行省㕘政由江浙移淮南由淮南入中書㕘政事出蒞彰徳陞左丞移遼陽行省廷議闢燕兩郡荒田以給邊郡命公為司農大卿分司京東加授榮禄大夫大都路都總管尋以年請老至正二十二年以集賢大學士之禄致仕㑹邊事興復起為中書左丞公以疾辭復以大學士議中書之政而天下亂不可為矣二十五年仍復以大司農致政歸於家時年七十有一矣後十年以國朝洪武七年二月十四日薨於家年八十有一薨後十日葬淇南之原公天質剛勁色嚴貌莊居廷中有大論議謇謇不少阿屈聞者悚然托克托丞相尤禮憚之目為鐵虎張公它曹事有所避必問張公以為如何公亦以天下事自任所至必盡其方為刑部時民有與父異居而富者父夜穿垣將入取貲其子以為盜也瞷其入撲殺之及燭視尸則其父也吏議欲誅其子則子不以其為父欲釋無誅則有子殺父名久不能決公奮筆曰殺賊可恕不孝當誅子有餘財而使父貧為盜不孝明矣卒殺之燕都市中有瞽人挾術詐治貴人病使書其仇人名欲為之祈禳而誣告貴人以罪脅其賂以事覺衆以其篤疾將如常法收贖公曰彼之詐欺雖有目者不能為宜以盜論使當直決之罪宦臣中政院使康達理以籍家徙海南後得還而死其妻訴寃請其家貲公謂閹豎蓄妻無夫婦道格不與其守正疾邪多類此然常傅以平恕時海内既多故驍民常仗劒跨馬横閭里刼財貨以給禦者輒死議者欲同叛賊連罪且及其婣隣公争曰罪其家可也彼為惡者家且不恤况婣鄰乎使婣鄰畏法遁而從盜愈盛矣妖冦有敗而㣲服行乞民間者後就擒吏蹤跡其宿食逆旅家皆欲論誅之公為審覈得歸罪者數百家皆鞭數十縱遣之去僚屬譁言奈何縱反者宜獲罪語聞丞相丞相曰張公必有説也非汝所知召公問故具以情對咸得免歸江浙運司嘗上言鹽引一比鹽鈔二十倍而法偽造鈔者不以赦原偽鹽引者值赦輒免是利重者法輕利輕者法重也下公議公以為鈔乃有國者通行之寳引特鹽司防姦之法用之廣狹固異法烏得同言者不可用事寢不行其知法意皆如此故有重任必以屬公其分省彰徳以兵刑工户四部自隨尚書以下皆自選舉十路一州地方數千里賦民餉軍造兵器脩戰具以禦盜賊備河患禁剽掠輯亂恤饑以寧民雖陷亡相繼而人無不服其才而戴其仁及以司農居京師民無流竄惠意仁言洽於遐邇置十二屯屯立之吏以勸耕者貧無貲者給牛畀耕種貸以穀粟賑其匱乏而不取其息其所舉措常得法外意忠義之誠見於顔靣事功雖不盈其志而論當世才能臣者必推公為首而公亦老矣逮元之亡卒以夀終公敦内行育弟之孤子如已子為之嫁娶使忘其孤遊宦内外四十年皆要位所得禄賜不私於家雅有威重据鞍執鞚不左右顧與人坐語竟曰身不少側美髯長身望之巍然度量有容人或犯之不與較曲直使久自悔善談辨為文辭有氣有法度有集若干巻藏於家娶陳氏生子男二人用質用道用質字文敏介直有才仕國朝為某官公薨在元亡之後史臣不為立傳太常不為定諡而其行能傳之於人者非知徳之士不足以紀之而余非其人也文敏方以才自奮昭揭先徳蓋將有在謹次其所知者以俟謹狀孫伯融傳孫炎字伯融金陵句容人身長六尺餘面黒如鐵一足偏跛持辨風生舉辭如雲人莫當其口能為歌詩元至正中丁復夏煜以詩名炎遊此兩人間日夜相切􅀈益好立機括下紙可盡辭采爛然驚動一時雅好酒嘗與煜對飲務出奇相勝每得一爽句拍案大呼投劍起舞譁聲撼四隣所與交皆天下英俊亦以經濟自負氣豪才雄常輕視章句儒衆中常自許曰孫炎男子豈死蒿下耶㑹江淮大亂今皇帝渡江來金陵聞炎名召見與語累千數百言大意陳元運將終勸上延攬賢士以成大業義明辭正上甚悦之辟為江南行中書省掾每問以事炎慷慨激切所謀多合上心上愈嘉重以為可用上親征浙東炎從行以勞擢同知池州府尋陞知華陽府皆有聲己亥十一月擢行省都事是年十二月㑹師克處州擇守者咸以處在山澤間盜賊慿結不解難其人上既才炎遂以炎為處州總制錢穀兵馬之籍悉以委之不取中報且以勑牒未署者付之聽其辟任炎匹馬入處州時處州外七里皆賊窠穴獠酋黠蠻狼嘷虎踞不奉官府約束炎至㕔事召城中民列階下諭之曰元之不為天祐人共知之今四海裂為七八然吾觀其志皆無以生民為心者得天下者必吾主上也至今爾民梗化未知朝廷意昧者猶或握兵戲溝中自招誅滅主上不忍加兵故命我面諭爾民將以安爾非厲汝也爾民審思之帖帖遵化則有後福不然吾恐爾民將盡為戮民叩頭拜謝誓不敢二心轉告其鄉民以孫使君不可翫狎炎亦下書屬縣徧諭之數月皆化為良民炎復擇其勇徤者練為兵將將教習之擇其為衆所服者為之長有冦則率以禦無事罷歸為農聞有小警發一符立至軍門無敢或有奸之者强族素驕蹇皆畏之如神不敢出聲語雖在數百里外亦皆縮氣喪膽民賴以安人人謂願得孫使君治吾郡時秀民有能才者見方戰争勝負未分皆伏居山谷中不肯出炎患之鈎至一二人問有才者録其姓名為書遣使者招致之而故中丞劉基章溢知府葉琛皆為處士所推基最有名亦豪俠負氣與炎類自以為不當為他人用使者再徃返不起以一寳劒送炎炎作詩以為劒當獻之天子斬不順命者我人臣不可私受封還之草數千言開陳天命以諭基文辭甚美基不荅逡迍就見置酒與飲論古今成敗之事如傾峽滚滚不休畧無枝複基乃深欽歎之曰基自以為勝公觀公論議如此基何敢望哉炎遂致基於京師上方征伐無一兵與炎壬寅二月賊將李某賀某叛襲炎炎被禽幽空屋中列卒守之脅炎炎始紿以生吾能為若用賀李知非其本情恐留自遺患以燖鴈斗酒噉炎曰以此與公訣炎拔劒割鴈舉巵酒曰嗟乎我乃為鼠輩所陷爾死犬豕且不爾食賊持刀視炎飲酒自如賊叱其解衣炎罵曰此紫綺衣主上賜者吾當服以死勿解引枕而卧賊不忍伺其睡乃害之時某日也年四十事聞上嗟悼以某年月日葬於金陵南門外聚寳山甲辰贈徴仕郎洪武元年上即皇帝位念宣勞之臣閔炎死義追封丹陽縣男妻某氏為賊所擒不屈死繼某氏子一人某女某炎事親孝與人交緩急可仗遇匱乏者解衣推食以給之所著有詩若干巻其弟子蔣敬編次傳於世方某曰余年十一二時先君守濟寧間言炎詩十餘篇皆豪宕可喜及觀却寳劍篇益奇其辭而炎死久矣炎負氣聽其言知其為偉然大丈夫也故卒以節死孟子論學必曰善養氣養氣有以夫觀樂生傳觀樂生者越南邑寧海人也其先出堯四岳伯夷周武王時男于許祀太岳春秋列諸侯之㑹稱善國後失國以為氏自漢至今不絶人生其太岳支裔也或曰堯時有由者義甚髙堯欲讓以天下不從生蓋由後云或曰由言行不見於經蓋非也生名繼字士脩少好學而家貧精確篤志不以貧故自沮遇事有拂激於意輒閉門取書誦之聲抑揚若合音節可聴至其家者見生為人忘其為貧生亦有以自樂不自知其貧也生能文辭而好遊山澤間物偶㑹心遐觀熟視戀戀不忍離去已即為文辭以自見嘗曰吾於天得可樂者五天朗潔時纎滓不敢留與我心類可樂也日之初升月之方霽時吾樂之霞之舒歛雲之變化吾取以為文樂之吾於地樂海之深溥浩漫淵之澄瑩樂山之秀拔而逺者是皆可輔吾志發吾氣吾文得以汪洋不竭峻而不險肆而不汚者此也又曰吾於古人之言樂之不厭吾所以忘吾後古之世不知處乎荒僻曠絶之境而常若有得者非以其書存耶斯其為樂最深間以其意為詩九章言所樂者而自謂觀九者而樂莫如我也因别為號曰觀樂生人疑觀樂生是九物者人咸見之而生奚獨取以為已樂觀樂生曰吾非樂九物也能使九物為吾樂耳吾樂於天地間無所不取而豈特九物哉天之與我者亦大矣豈特與我衆人皆受之第衆人不知而吾知衆人不樂而我樂耳當吾之樂乎此也天不能與敵大地不能與敵厚力可以頓挫萬物者莫予加損也之理也積氣得之以為物始積滓得之以為物母燭乎兩間者得之以為晝夜禪明不息禹得之以疏洚水稷得之以粒黎庶周公孔子得之以為百世師顔氏子得之以飲水飯粟而忘其貧而吾亦竊窺之以自樂世之所樂者貴與富也罄其心之智計不足以致之而卒亦不能守也藉能守之覷覷然如鼠食乎機器之傍且囓且目委尾而側行惟恐機之發也計其心曷能斯須樂哉孰若不待求於人而得不必畏乎人而安隨乎所遇而無所不樂之為美也疑觀樂生者聞其言而異之曰觀樂生其知道者耶某曰予始聞觀樂生名觀其詩固以異焉及論次其語信乎非今之士也超於寵辱之表不以困窮易慮古之人皆然而今不少見何耶豈遺世髙蹈者衆無從知其事耶以觀樂生之賢與之接者猶不知其所存天下士豈易識乎人不知道而遽謂天下無士其未可哉其未可哉王進徳傳王進徳者名敏台之寧海人其上世多為儒以進士官于宋而從兄璞字藴徳尤文而賢進徳兒時從長兄竊觀縣庭見縣令威儀甚盛歎曰吾豈不足為彼耶從兄聞而奇其志因令入縣學為諸生同舍治經為文辭者易進徳年少問其文法靳不以告進徳憤且奮兼日夜攻習不休踰年輒出其上進徳氣剛有亷隅不與人為欵狎其所為事每欲異恒人其家固貧當其為學饑渴歸取杯水飲休休然若飫粱肉者人非其類雖欲飲食之不能也嘗與友夜讀空舍中夜半隣女叩門求宿甚哀其友欲納之進徳扣門厲聲罵曰吾在此誰敢入此門因疾呼使聞於外其友愧謝不敢出聲女逸去後學舍諸輕蕩士指目進徳相戒不敢為非義或飲酒歡笑聞其欵步即皆畏避始易之者至是皆歎服之㑹太學徴郡縣士遂貢於京師試列髙等廷議遣太學生分教北方賜衣陛見以行進徳得太原時天子方注意太學學中少年被寵顧異甚入預近事外官見諸生秀才從京師來奔走伺候若貴戚重臣其分教者亦多驕横奴視吏民不為禮進徳獨以禮自約束如平時不復過涯分守令敬愛退相語以為儒者不可媚犯藩鎮主將苦其清介異已欲試其所為召使飲酒床幃婦人於偏室酒酣内進徳其中鑰門以去進徳入見婦人大呼排門取廏馬乘之逃還主將驚謝稱之以為難後徴分教諸生還京師郡邑恐其入奏發已罪多賂以金錢貪者受至數百千緡進徳一揖辭父老即行無毫髪私奉㫖監收嘉興新城糧後督舟運糧輸蜀峽江悍急行者多舍運舟陸行為自全計進徳坐舟中不顧曰王事君命也死生天命也祇君命以俟天命何以陸為後自全者多以失舟獲罪進徳拜監察御史旬日以例免歸再起為刑部司獄坐㣲法輸作赦歸暴疾五月以洪武十五年五月初八日卒於家年三十有一進徳容貌端偉有威重慎交與不挫屈於人而善事父兄得孝敬意其所從為學從兄藴徳方進徳卒時為紀善於燕王府還書與弟琦相吊極痛惜之琦有文章謹操行有名然常語人謂不若進徳葉伯巨居升郭濬士淵皆奇士伯巨以上書論分封事死濬亦言事後以它事死二人皆負豪氣不服人至稱進徳則自謂弗如也贊曰金華胡翰先生髙介人也嘗與余論獨行士自言於衢得一人曰汪琟余昔至京師見琟故嘗仕斥不用敝衣繩履間纍然卒以窮死然其論議犖犖不少貶而進徳亦喜琟為人古所稱方以類聚者進徳與琟之謂耶跡進徳操持可謂篤義君子矣而所遭乃如此子罕言命其以是夫詹鼎傳詹鼎字國器台寧海人也其家素賤父鬻餅市中而舍縣之大家應繇於官者大家惟呉氏最豪貴舍其家生鼎鼎生六七年不與市中兒嬉敖獨喜遊學館聽人讀書歸輒能言諸生所誦呉氏愛之謂其父令兒讀書鼎欣然其父獨不肯罵曰吾故市人家生子而能業吾業不廢足矣奈何從儒生遊也然鼎每自課習夜坐餅竈下誦不休其父見其志不可奪遣之讀書踰年盡通其師所能師辭之時呉氏家延師儒鼎就學呉氏亦子育之使學未數年呉氏子無能與鼎談者其師去鼎遂為呉氏諸子師還邑中諸儒皆與為禮稱詹先生不敢慢鼎聞同邑有王愚可先生者學甚博從而師之學春秋通其説去就有司試不得代趙生試趙生乃得上第以仕於是鼎謂趙生曰我學經亦勞矣而子乃以我而仕此豈非天耶然不可無以謝我携趙生白金五十兩而去元末方國珍起海上不能制以重位授之國珍開府慶元求士為已用是時知向背者以為國盜也不可輔皆匿不出國珍聞鼎有才以計獲之鼎為所獲無奈因為之盡力為其府都事有廉名國珍弟平章事有人犯法屬鼎治鼎論如法平章之妻受賕請於鼎持不可曰今方氏欲舉大謀當用天下賢士一心守法曷使婦人得預事乎不許妻怒譖之繫鼎獄半載乃釋復起為上虞制上虞與偽呉王張士誠地相錯軍吏貴臣甚衆以鼎儒生不習邊事稍違約鼎㑹衆於庭引一驛丞責以不奉公斬之在庭者皆股栗膝行請罪膝屈久不能起乃罷後雖元帥萬夫長有所陳説皆長跪以言不敢舉目視其面鼎臨事有才簡牘滿前須臾而決暇復與故人賔客出遊四方遊士争及其門有馬給事者嘗與鼎以事過寧海令以下皆迎謁旦暮候其市中人相指歎曰學之能貴人乃至於此乎至正末我兵臨慶元城下國珍懼乘樓船遁於海上怒欲舉兵誅之莫為計鼎為草表謝辭甚恭而辯上讀表曰孰謂方氏無人哉是可以活其命矣乃赦不問更以國珍為右丞鼎亦召至京師鼎為書萬餘言詣闕下須駕出上之上為之立馬受讀付丞相官鼎楊憲為左丞惡言事者奉例徙居梁又徙陜去數年憲敗凡為憲用者皆受誅鼎賴此以免在陜七年大臣薦鼎名於朝鼎至京師中書以謫徙人不宜用將還之於陜鼎恐還為人所輕咲以貲屬掾史願留掾為之言於丞相曰詹鼎有奇才以例棄不用可惜丞相不信其人在可召視之非誣也丞相果召見鼎問之鼎髯甚美又能為梁趙間言歩趨進退閑雅有威儀丞相甚喜之稱於衆曰詹鼎尚書才也時河南行省缺郎中吏部請命鼎為之丞相曰吾同事以鼎才不可使外也待半嵗除留守都衛經歴改刑部郎中刑部佐寮未完有司請除吏丞相曰刑部有詹鼎在勝百輩其見稱如此鼎在刑部一以寛仁行法威聲不起而人皆樂其不苛刻罪人當分覆者争曰願得詹公覆我我死不憾㑹大都督府受賂除軍吏事發誣鼎有贓御史覆鼎鼎言在留守時所養孤甥來省恐有之鼎誠不知御史曰法貴殺有名卒誅鼎與百餘人皆死鼎坐罪薄有才人惜之鼎為文章氣燄逼古人守身廉重行義好學不廢自陜入京師時聞人有好書價金一斤鼎無金惟所乘驢棄以買書其為人奇偉如此及死其所養孤甥為之服喪三年葉伯巨鄭士利傳葉伯巨字居升寧海東蒼里人也好讀書年二十餘有名於鄉黨選為縣學弟子員善説禮凡朋友有昏喪必禮相之為人耿介不能藏人短見人不善立折之不顧其喜怒人知其無它終亦不恨也以年長通經術陞入太學未久詔諸生分教河北子弟伯巨得平遙縣待諸生如子諸生亦愛之如父兄洪武九年星變下詔求言伯巨曰今天下有三事最切其二事易見而為患小其一事難知而為患大此三者積於吾心久矣縱不求吾猶將言之况有明詔乎即為書言三事曰分封太侈也求治太急也用刑太煩也今四方平矣民庶思治矣而不務以寛厚御之視誅殺人如滅螻蟻使民不獲安息欲以圖治難矣夫圖治於亂世之餘猶理絲於棼亂之後緩之則端緒可得欲速則膠結而不可理今病民之不安奸邪不止朝夕異令賞罰不準君勞於上臣困於下治烏可致乎此二者人皆知其不可然非敗之根也所謂分封太侈者天子畿内地止千里而燕秦晉楚踰千里之國以封年少未達事之王無事則易驕佚有事則易為僭亂此人所未知而臣所謂為患難見者也其語皆切直上大怒曰小子乃何敢疎間吾家骨肉我見之且心憤况使吾兒見之耶速取以來吾將手射之而啖其肉耳伯巨至丞相乘上喜乃敢奏詔繫刑曹問狀瘐死獄中其同時言事有鄭士利士利字好義亦寧海人嘗為縣諸生其兄士原以儒薦為河南懷慶府同知遷湖廣按察司僉事士利因告於師去侍其兄遊學有名洪武九年天下考校錢穀䇿書空印事起凡主印吏及署字有名者皆逮繫御史獄獄凡數百人士利兄亦以河南時空印繫獄中天子方怒空印事以為欺罔行省言臣二十餘輩守令署印者皆欲置之死佐貳以下搒一百免死為軍逺方丞相大夫皆知空印者無它罪可恕莫敢諌士利獨歎曰上不知以為空印大罪誠得人言之上聖明寧有不悟懷欲言之適星變求言士利曰可矣既而讀詔有假公言私者罪之久之士利曰吾所欲言者為天子殺無罪為可痛耳吾兄非主印者固當出需吾兄杖出乃言言吾死不恨其兄免死出士利乃為書數千言言數事而於空印事最詳其意以為誠欲深罪空印者恐奸吏得挾空印紙為文移以虐民耳臣以為文移必完印乃可今考校䇿書合兩縫印非一印一紙之比縱得之亦不足用况不可得乎且錢穀之數府必合於省省必合於户部其數誠不可懸斷預決必至户部而後定省府逺者去户部六七千里近者三四千里待䇿書既成而後用印則徃來之難非期年不可至故必先用印而後書此權宜之務所從來逺矣何足深罪且國家諸法必明示之天下而後罪犯法者以其知其不可而故犯之也自立國以至於今未嘗有空印之律有司丞相不知其罪今一旦捕而誅之則何以使受誅者甘心而無詞乎朝廷求賢士而置之庶位得之甚難位至於郡守者皆數十年所成就通達廉明之士非如草菅然可刈而復生也陛下奈何以不足罪之罪而壞足用之才乎臣竊為陛下痛惜之其書既成欲上者數矣而未決每歸逆旅則閉門俯首而泣泣數日其兄子侍行者疑而問之曰何所苦乎士利曰吾有所自苦我以觸天子怒必受禍然殺我活餘人我更何恨遂持書詣丞相府士利短小容貌如常人見丞相禮頗倨丞相問何書士利曰吾將為天子言之丞相何問也丞相因御史大夫入奏上覽書大怒詔丞相大夫雜問誰教若為必有主謀者士利笑曰顧吾書可用與否如何耳且吾業既為國家言事自分受禍人誰為我謀乎辭卒不屈然猶輸作終身而竟殺空印者張孟兼傳張孟兼者名丁金華之浦江人也孟兼為人侃侃自許涉獵書史頗有俊才為鄉里所稱㑹天子詔徵才能士郡縣以孟兼名上擢國子學録禮部主事遷太常司孟兼固負自能為文常奴視同輩而是時誠意伯劉基以文章有重名與翰林學士宋先生俱為天下所尊信基氣豪不肯妄下人而獨喜稱孟兼嘗為上言今天下文章士第一為翰林學士宋濂臣基次之不敢辭又其次則有張生孟兼其餘臣不知也孟兼為基所稱愈自髙然他人弗服也或稍慢之孟兼輒怒嘗以文示其鄉人視之無言寘袖中曰俟夜熟復之今弗悉也孟兼陽為好言曰須刪脩之可也退則大怒其鄉人發其所短揚言於衆罵之且詆其文曰彼猶蠻荒山谷中縱為人衣前懸而後曳左侈而右歛視國工所製何敢望哉其鄉人自如不與較既而孟兼以謫輸作鄉人不及唁及以赦出復官乃賀孟兼怒罵若見人失官則棄背不一視及復官乃更謬為卑讓賀我若真細人吾何以禮為倨坐不起迎送其傲睨好面訐人皆如此人以是不附之每為宋先生言先生曷不於上前薦我先生亦才孟兼欲薦之未有逕㑹上欲用越僧證問先生嘗見證文否誰所有且索之以觀時證為書與孟兼論性命先生因言太常丞張孟兼所有之詔先生召孟兼以證文至上覽畢顧孟兼謂先生曰張丞卿門人也先生對曰非臣門人乃臣里中子耳且為文有才甚誠意伯劉基稱之上熟視孟兼曰生骨相薄仕宦徐徐進乃可耳毋驟也未㡬除孟兼為山西按察司僉事孟兼廉勁疾惡抵司糾擿奸猾無所貸株連徒黨相援引每一事株流數十吏民見張僉事出行部皆凜然墮膽如畏鬼神聲聞朝廷陞副使移山東而山東布政使呉印乃鍾山主僧上親選拜官妻女用金帛寵之甚厚印以見知人主自尊重禮節少簡孟兼自負其能無敵且印新用又僧也易之印候孟兼由中門入孟兼以為印雖位大然我風憲司不當由我中門召守卒笞之月朔望入學謁孔子畢令諸生執經講説孟兼故以語侵譏印印不平時初刋大明寳鈔印不令使兵民更自至庫賈錢民以爲病而孟兼謂此詔印擅行之是違制也騎馬入布政司讁箠僚吏問罪且言將上封事言於朝其僚吏皆大懾勸印即上封事言孟兼見陵侮然孟兼封事終不上也上覽印言以為孟兼凌我任用臣不遜召笞之孟兼既辱愈憤即捕為書封事者欲論以罪印復上書言狀請去位避孟兼之横否者且為所擠上大怒曰彼乃敢與我抗耶吾今乃與爾抗遂械孟兼至闕下廷詰之命衛士捽髪摘拏埀死特論棄市詔印曰吾除爾害矣善為之初孟兼遷副使山東自陳父老大夫為之請假上許之孟兼歸至家縣令丞皆門謁奉酒牲為禮孟兼坐受其拜不荅麾酒卻之鄉人皆勸其少遜讓和以下人孟兼不聽及於敗或憐之或快之以為宜然孟兼中突無憸賊之心祗以尚氣好髙人以故為人所陷才能者人所欲得也茍無謙遜以奉之而挾以驕人其為身害奚怪哉孟兼之才使能克已下人雖不幸未必死而欲尊大其勢而𦕈畧它人謬矣法雖過嚴其底於此酷厥有自哉芒茐公傳芒茐公者世莫知其為何許人或謂居廣信之龍虎山家世學老子之道天下為老氏者咸推以為宗其先在戰國時嘗相韓韓世家其能以計䇿教漢取天下者其祖也東漢亂韓相之末孫避去巴蜀者以禍鬼神語動其民民依之居者賴以脱於難後復來江南道益尊人稱之為天師異時人主因而封爵之以天師為稱號禮下之甚至芒茐公其裔也芒茐公姿顔如玉雪目瞳子爍爍有異光少襲祖父爵傳其業其所授徒遍海内所得有精粗其粗者猶能役雷電興雲雨探造化取徴驗如合劵自天子以下皆神芒茐公之道嵗時使者存問召至闕下道途所繇閭井市巷民聞芒茐公且來迎候拜伏車馬前以萬計車不得行芒茐公命其徒以符投井中令人就取去飲井立涸飲其水者病亦必愈於是聞芒茐公事者相増加歎語以為天人而芒茐公弗自是也曰吾祖取老子以無為為教其道甚髙後世學者多異蓋神其道而後教行闕去老子滋逺矣乃謝其徒廬於龍虎山之芝渠峯黜嗜欲薄於自奉以虚静為極以無言為教初多藝能好問學學靡所不習後盡棄去以為害道舉不以累其中志趣超然自得也學道之時闕指太虚示之無為之言亦推老子太㫖其言不滯於物不淪於闕故其號之曰芒茐公録其所言云贊曰老子後得其道者為列禦冦莊周世多有其書而列子言偽也莊周稱曰其緒餘以治國家其土苴以治天下觀曹參闕好莊周言又多奇能使盡用之術豈不多也欲其自得者深矣菜根居士傳菜根居士括蒼人裔出延陵季子其字曰宗禹少簡伉志氣髙不與世俛仰能為詩歌名出一時嘗遊江淮間釣濠水上登莊周䑓太極長嘯若不以禍福得失經意者人莫知其為誰見其家有菜又有處士服因號之曰菜根居士居士聞之曰甚善遂以自名所居種菜數百畦植灌甚時且不留草萊亂之故其蔬常盛於恒圃性豁朗不設機穽人有過面折之善輒稱服又能料事當否於未然及成不失毫髪以故人争推其才識與交者貴忘其位長忘其齒賢忘其所徳皆傾心為之盡而居士斥落芒角益以謙和自持客至擷蔬啐酒既飲醉輒引客行蔬圃中人怪其蔬長問其術居士曰吾不失其性而已人愈奇之意其可居官累官於時每使其言不能容接人然亦率不為人欺是以人愛其寛而伏其明去為人所思居士雖仕亦必隱者狀人不稱其官而稱其所居居士喜曰吾所隱誠非名所識也闕緱城生曰吾嘗與菜根居士游怪其時卻肉食居士曰子知味之為味而不知味之味也子以菜味肉則肉非菜也以肉味菜則菜亦肉也賤其所貴則貴者賤矣貴其所賤則賤者貴矣菜哉其可味也哉故又别自號味齋云其言類知道者余為論著之友鹿翁傳友鹿翁者居寧海東北耆山之下莫知其字名或云闕其先祖父嘗侍從大官於宋自宋亡元中世家故多難厭世俗芬華事自汚棄遺業屏處耆山下不交接庸俗日與麋鹿相欵狎若甚好之者而忘其非已類也别號友鹿􅂄山之人皆稱之為友鹿翁云翁氣貌淳厚意志豁然累散家財貸貧民不能償輒置不問視天下事舉無足累其心者因絶弗與人言曰與庸人談不如與吾鹿友服古處士服遊林壑間去來如飛年七十餘如六十許人顔面煜煜有光望之者疑其為列僊里人知之者謂翁學通古今得養生法跡雖髙而行不悖於倫理其友乎麋鹿蓋有激而然者非其意也或問之曰古之士慕一鄉一國天下皆有資乎其友其友必取道術類已者以翁之賢不友鄉之賢士而於鹿乎取奚取友之異邪或解之曰翁之賢視儕輩無可友者與其得憸巧之人而與之遊曷若友無知之鹿邪若使吾有以自娯物皆可以為徒茍無得乎已夫孰肯與吾友哉昔舜以大聖人而與麋鹿遊非與之遊也不以所處之陋變其樂也傳不云乎篤於為善者愛之徒翁其近是耶翁聞其語黙然笑不荅或問不已則指鹿曰子其問諸鹿鹿善知我論曰世傳避世之士如荷蓧接輿輩皆誕謾不倫非聖而自髙多戾中道以余觀友鹿翁恂恂然操行馴謹發言必稽乎義其真超乎世俗之表者邪彼以逢聖人而彰而此莫發其光士之立名績於天下者豈不係其所遇哉大笑生傳大笑生者越人也通文辭有才畧曉達世事居家以行義聞然善笑未嘗有威容每讀古書觀其得失禍福感應之理觸於中輒仰首大笑彌時不止聞人道當時賢不肖所遇乖殊則又大笑不已或問生大笑為何生笑而應曰吾笑可笑者耳天地於人蓋等非大異於人也天與地得氣之極盛者而成形故其為質巨為夀久人得其氣㣲且薄故未久即化其為物一也而俗以能予奪祥咎人者望之有不從而怨訾以為天之尤豈不妄哉以人視天天固蒼然大也以蟻䖝蛙蠅視人亦猶人之視天乎人曷嘗能制蟻䖝蛙蠅之命哉或有踐撲涵蓄之者偶然爾夫億兆之人在天下不啻如蟻䖝蛙蠅之多天必人人而察之以紀其善惡而各當其報不亦勞乎且天之所具以為用者日月星辰風雷霜雪其事至近也猶耳目鼻口之於人至切也而且不能使其無差忒薄食之灾况能禍福乎故為善惡而期天必報者惑也不可準怠而不為善者尤惑也堯舜之無子孔子顔回之厄夭盜跖之夀且樂皆適然耳天何與乎人頋嘵嘵辨之以為有定未定而必冀其報或又戚戚然懼其不足恃豈不皆大可笑乎吾少時亦嘗思聖賢憂世之説矣慨然悔悟以為聖賢者有安斯民之才其職不得不憂若我於已且不足何暇他人之憂乎且憂無益也闕意不復憂者以笑之適吾性非好笑也可笑者陳吾前不得不笑爾然世人之笑樂也不笑憂也吾之笑非樂不笑非憂而笑在乎憂樂之間知憂之無益故於笑乎發之使我以笑為憂則我死於憂久矣又曰富貴貧賤所以榮辱恒人而非我所榮辱也故吾未嘗以慕惡為心而惟笑以處之毁譽喜怒出於人不可以為輕重故吾聞譽且喜者大笑以應之聞毁且怒者亦大笑以應之我無善而彼譽且喜焉可笑也我無不善而彼怒且毁焉豈不可笑耶又曰天地之勝人也久矣人有可以敵之者非身之謂也或者不思而惟其身之欲是榮欲忽焉而俱滅彼蚩蚩者皆不覺也兹其甚可笑也嗚呼吾安得不笑耶其言如此而每遇儕輩則以告之其儕亦大笑不省也間之京師與余握手金陵門外辨上下古今數千載事大笑不自勝謂余曰子且奇士解吾意余亦俛首而笑因呼之曰大笑生生又大喜曰願為號云生王氏名某字某説者曰昔者楊朱阮籍皆好哭彼非好哭也心有所憤無以自舒因以寓其意然君子嘗病焉以為士不值則樂道爾奚為戚戚哉今大笑生獨好笑豈所謂樂道者非歟孔子論天人之際備矣而亦有所激而然歟否歟雖然其過於􅇶迫利害而不知止者逺矣溪漁子傳溪漁子金陵江寧人少脱畧不拘與羣兒嬉遨輒處其上而什伍部署之令之曰之左則趨之左曰之右則折而右無敢過視者溪漁之父素長者常禁切之納之學使讀書時時棄去不肯帖帖諸生間而所業未久即過諸生數倍諸生大畏之其師亦奇之謝曰子非吾曹人也溪漁子亦自雄其才志嘗徃來江淮之南結交大俠異人論古人功業遇當其意徘徊歎息仰天拊髀若有意於從之遊也與天台林右張轂最善右亦豪士善擊劍知兵而長於為文轂陽狂飲酒自放於歌詩二人皆自負髙一世嬰豎視同列溪漁子在淮上嘗釣海濵望見二人踞坐大笑二人者知其非庸人也即與之語大驚異其所為引歸逆旅主人出酒相飲攝衣跣行起舞為樂驩聲撼數十百家辨難上下古今事折衷損益根據理道識者知其非狂生或不識其為人共瞷指咲之以為真狂或又疑其為神仙人云溪漁子舉若不聞遇適其志鮮衣美服行衆人中見者争觀之否則被汚垢短衣逐躡市人後市人吁之弗辭也後溪漁子盡悔故所為買書千餘巻伏而讀之為文章奇偉伉徤然恥以自名常曰漢無儒者惟賈生諸葛孔明耳唐人陸贄粗有識然不足庶㡬王道所貴乎學將以輔天地所不及不然多讀書何為識溪漁子者聞其論髙愈疑之終莫能測其為何如士也或曰金陵有隱者王顯㣲仲好奇溪漁子即其人云或曰非也方子曰古者豪傑士其身未遇志未信於時寧晦于屠釣以自全不忍以細利挫其心彼誠有以真知輕重之分也溪漁子坐都邑中而逺利詭隱使人莫測其淺深此其志不茍且也明矣要之一世奇士哉魏節婦傳魏節婦趙氏者名第台之寧海人也父國真故邑大家延儒傅之能為春秋學者教其子仲武與江浦魏氏子順之同受春秋穎悟精勤嘗與仲武較藝大為國真所激賞順之祖悌元時以貲雄於鄉為里主常儲錢百錠為官用缺復補足其數一錢不取諸民民徳之呼為魏百錠父恩能賙人之急寒者與衣饑者與食死而不能葬者與棺槥國真聞之歎曰求福無如積善脩身無如好學吾無間然矣遂以女歸順之生二女而順之卒婦年僅二十四即以猶子較為嗣誓不它適其兄仲武憐之潛受同邑婁氏聘議欲强迎之歸奪其志節婦聞之謂曰將嫁而女弟乎吾生為魏氏婦死為魏氏鬼爾吾弗歸也堅不為動其兄不能奪較甫七嵗晨昏教養至於成立為娶同邑應氏生男女各二人而較已蚤世應氏時年二十九上奉孀姑下撫諸子兢業惕勵無毫髪増損於前人男娶女嫁各適其宜人皆以為善繼志趙氏今年九十三尚康强無恙應氏逮將五十子孫森然孝養不怠人人以為節義所報較字師學應氏字小其子曰海曰江童賢母傳童賢母姓羅氏寧海童處士釋卿妻也羅為縣舊族賢母少喪親姿端厚有識度年十三歸童氏時處士之祖母髙年而父母皆老賢母事之孝敬雍順治産業習女工甚得婦道舅姑喜家政一任之祖母晚病手足痺不能舉溲惡或時汚牀席賢母躬抱持洗滌飲食必執匙筯以進久而不懈祖姑心徳其所為每私祝曰吾苦新婦無以報願汝有子有婦咸若汝之孝敬賢母有知能遇女妹及族人親戚皆有恩祖姑及舅姑卒相夫奉喪葬於内外細粗指畫經綜皆有方畧條理既而家浸盛生四丈夫子子長各有才智好學問訓以禮義忠厚尤有母道及處士蚤世諸子長娶婦生孫一聽賢母之教遂相與合食不分財異爨作先祠置祭器以奉祖考家庭之間出内有法長幼有倫遇人有惠待賔客有禮於是賢母逺邇皆稱焉初元季無政大家以貲結長吏田之租税俾小民佃者代輸里正因而漁利每畝徴米四升小民以為病㑹賢母家為里正催民租税命減其半不足寧出已粟以輸鄉閭貧弱賴以不困洪武初寧海及隣縣饑里中富人以麥貸貧乏者每麥斗責榖二斗三升時賢母家有麥數廩召諸子謂曰饑者衆而吾家幸有餘安忍乘時取倍蓰之息若等無效它人宜減息一斗以為鄉率於是長子遵母意與諸弟行之又白於縣請禁多取息以病民者數百里内貸麥者利其息少競奔走焉咸歎息以為童母恩已母好施予孤弱不能自存者給以錢粟不責其償為之娶婦使成家業如是者二十餘人人或告饑推食以予之遇人有急度其事可解屬諸子為解之後或背負絶不與較至不義人戒莫近事於不可者戒弗為其揣料世事明逺甚雖丈夫有弗逮也家人指逾千婢僕指稱之人人察其饑飽苦樂與其才性所宜無有怨者今年㡬八十子婦及諸孫婦男女數十人曾孫七八人奉養祗順不敢違果若祖姑所祝名人士徃來者皆致拜而去稱賢母云贊曰天道報施豈不昭哉世俗智識淺蔽所蘄少不讐輒疑無禍福何其謬也吾觀世人家之興廢多由於婦徳孝慈惠和者必生賢子暴逆狠悖者必無後福非特天意也氣之所感召各以其類應固有以致之矣考之童母之事祖姑雖古所稱孝婦何以過其愛人恤物有足多者殆非特婦人所難也卒受善祥果致才子以昌大其宗孰謂積徳而不可恃乎二賢婦傳浦江嚴氏婦者鄭氏女鼎也鄭氏之先以行義著聞州郡累數世不異居至宋青田尉徳璋生鼎而愛之擇所居得嚴某歸其家鄉隣以為鄭氏之女必賢可知也皆瞷視其所為見其事舅姑順悦而有禮處庭闈無謔言疾步乃私語曰吾知其異常人也今乃果然歸未久嚴氏貲稍衰饘粥或不給禮舅姑不以窶薄其父母富憐鼎獨貧將召而勞之鼎雅自脩飭無異平時未嘗以貧故告其父母父母欲畀之財則辭曰吾鄭氏固有成法何以女貧故多畀之財乎終不受其父卒母遺之絰帛曰斯若翁喪帛也今不成服矣以遺汝泣曰古有父死而不忍視其書以手澤存也喪帛之存其比之書也大矣烏忍而受之母慚其言不敢復出口時其歸巻而納諸衾笥既歸知母之藏也奉而韜於篋踰年而省母則出諸篋還之其不妄取如此嚴氏族皆賢之母女之甥為諸暨金生有賢行既而妻於鼎之曾孫源其事舅姑如其外王母之在嚴氏姑嘗感末疾不能興起晨昏侍床下煮糜煉藥踞坐其側扶其首而飲食之或不進則憂戚與人言姑之疾輒嗚咽悲嘆及至姑所强為喜悦之色以温之姑疾甚久而卒孝養不怠姑埀死以手指天曰吾苦吾婦無以謝願得孝婦事之足矣喪其姑極悲哀無已聞者為之泣下夫中嵗慕黄老家言入山獨居間一至其家即去奉之愈恭如大賓家嘗遇盜賊夫處山中金携其貲避匿他所及賊至逼甚知不可保委貲而去獨袖其先世墓文一巻及歸貲盡獨出墓文歸其夫其夫驚喜曰貲失千萬不足惜此文乃吾日夜屬心者若能存之真吾婦也後生子材娶宋闕公女為婦果孝類之卒如其志云方子曰教之於人也要矣吾聞鄭氏之先祖曰綺者初家貧其鄉人遺之金數斤郤去不取嚴氏婦綺之來孫也其不妄取固亦宜也若金氏少嘗受教於嚴氏婦矣觀其競競然奉舅姑久而無怨是雖孝子所難終有孝婦如其姑之所願豈可謂無天道哉遜志齋集巻二十一欽定四庫全書遜志齋集卷
