body:
  text: 雜著考祥文孰為祥乎匪物由人子孝臣順父正君仁是之謂祥數者咸備雖星殞地裂不足以為殃茍失其道上下易職尊卑乖序雖芝生宫寝麟鳯在郊於祥何取世之人弗思求祥於物不知已之躬有祥攸出為善于家祥實基之不勉已而循物禍之所隨戒妖文人知物之妖而不知人之妖知人之妖而不知妖自已招山崩川竭雖為可畏嬖庸賢遁尤為可懼牝晨羝乳人以為異斁倫敗俗其禍尤著嗟乎今之人樂妖為祥行如跖蹻喜色揚揚哲夫旁觀股栗心掉彼謂無憂酣喜譁笑天縱汝為妖吾則莫知茍自人興汝寧不思誚伯牙文世傳伯牙事陋矣張文潜為賦哀之其辭信美而其義尤陋也余讀而鄙之為文誚伯牙且正張子之陋其辭曰戰國之士好夸嗜毗恒詭實以求合不顧人之是非於斯時也求自重而違世者嗟吾舎子而稱誰然於子有憾焉盖惜子為藝也善而為識也卑君子之學自得而已茍余中之有樂遑恤世之愠喜感子期之見知遂絶絃於既死悲乎陋哉子之志也知子一人不知舉世使夫人能識子則何名為絶藝俚歌巷語嬰孩啓齒惟其不知乃為至貴子之不幸子期是值忘子之惡舉子之愛俾爾望於人也過深而得於天者不至子誠有以自適天地日月草木庶類舉目欣然皆識子意茍為不得雖子期接踵譽言盈耳亦何預於吾子且夫全於天者不求合於人志乎逺者不取效于邇嗟伯牙乎爾曷不以萬物為一身以太虚為知已等毁譽於浮説而游心乎沖漠之鄉下迨乎無窮上泝乎無始以與無耳者聽無言者語奚為栖栖焉隘狷而可鄙此藝之所以為小技而予固不足與聞乎此也耶弔茂陵文祗明祀而言旋兮指槐里以西征停䇿憇于道旁兮覩髙丘之峥嶸即故老而訊之兮惟漢武皇之茂陵整冠裳而疾趨兮蹐遺廟以屏營凄風起于叢棘兮鼪鼯嘯于幽塋慨雄心之靡托兮悲㬅志之無成惟君皇之御極兮遘炎靈之方熾陋尭禹為未足遵兮卑祖武而弗肯繼内瘠民以自殖兮外震威乎遐裔騁車轍于八荒兮候神人于海澨建千門與萬户兮殫土木之奢麗希軒轅之騰化兮永傲倪乎斯世何盛業之易隳兮洪謨欝而難宣雖暫弱于戎胡兮生民疲弊而不痊奇禍機于巫蠱兮妃𦙍丁毒而銜寃諒逞心於屠滅兮抑天道之致然闢土疆之宏廊兮曽𤣥宫之莫固赫兵革之繁庶兮委守衛于草露城闕之崇敞兮求斷礎而無所後宫之韶冶兮僅或傳其塚墓像祈連以旌武兮想壮魄之已腐嗚呼哀哉形必有盡兮孰不有亡匪君皇之獨然兮尚奚為隠憫而廽遑惟祈生之已甚兮或妖誑而過望謂長年而卒老死兮斯足埀戒于昏荒明固有所不達兮智固有所短偉才畧之英邁兮哲與愚其相半賴表聖而黜邪兮兼善悔而能斷雖人恫而財竭兮終克免乎危亂悼往者之無知兮尚來者之可諫感盛衰之相襲兮仰昊天而永歎籲天文維洪武十四年嵗在辛酉六月乙卯朔下土臣某謹稽首昧死言維天生人厥質匪恒君之惟后淑之惟師匪后無以厚生匪師無以惇理位有隆卑其任惟鈞天降疵民不靖乃生越二紀茲甫受師后之功孰廸彛訓俾弗沉迷時惟臣師實宣若皇命肇小大遐邇民咸若徳蹈則庶邦底寧忠順徴嘉不自引伐亦既致厥事心罔或弗念帝室肆仲子元孫顯被寵命咸率履攸行弗越謂后惟天惟父惟天下烝民主曷敢不祗順暨躬暨嗣人曷敢弗伏思錫繼忠孝于将來時飲歠曰斯我后之徳時逸燕息曰斯我后之惠逺臣耆艾童弱戴后徳允若臨視栗栗肫肫罔有違乎昭憲誠亶篤宜聞于天天曷不易諶乃裁降之大戾恫􅆷厥家播流于西邑耆臣黄髪邦之寳龜灼知幾先邦之水火灼資民庸邦之粟帛民賴以生今曷使匪􅇳踐艱荒民罔不大惻曰曷自遺耉成人繼自今民何鑒何式何賴以永存如父母罹凶災罔豫矧臣承導闕愛愛徳施𢎞章肇閔閔心隠痛若弗能生念凡民師猶父母父母疾眚子籲祈於天天必閔應臣自茲始祗陳厥由臣有夀年禄慶在天未逮臣身願輸弗享以延師之脩齡啓帝心俾師克復故里居建乃家勿墜庶海内民有仰邦國有望臣死罔悔惟天鑒民誠誕敷休命匪臣䝉嘉徴将兆民是賴臣聞曰民雖卑誠靡不格天天雖尊惟誠之從嗚呼皇天其尚閔茲臣小子未有知惟天其惠綏休命告風伯文舟楫所資惟風與水二者皆得一日千里其或不然水戾風違咫尺莫進如受縶維今赴京師舎車從汴河決梁陳茫無畔岸所冀清風送我于南風乃逆施不可以忱篙人艣工流汗成雨白浪湧騰抑退軒舉嵗當大比羣士畢來天府奉詔俾擇其才時有常期勢不容後風茍尼之果誰之咎帝御九州事天敬神凡爾百靈孰匪帝臣邦國大事在乎取士不能體國亦神之恥咨爾風伯幸停怒威亟北其旋翼舟以飛三日之間達于畿甸我期不愆神亦罔怨百靈洋洋儼乎在前豈吾之私帝命是䖍里社祈晴文民之窮亦甚矣樹藝畜牧之所得将以厚其家而吏實奪之既奪于吏不敢怨怒而庶幾償前之失者望今嵗之有秋也而神復罰之嘉穀埀熟被乎原隰滛雨暴風旬月繼作盡撲而捋之今雖已無可奈然遺粒委穗不當風水衝者猶有百十之可冀神曷不亟訴于帝而遏之吏貪肆而昏㝠視民之窮而不恤民以其不足罪固莫之罪也神聰明而仁閔何乃效吏之為而不思拯且活之民雖蠢愚不能媚順於神然春秋報謝以答神貺者茍嵗之豐未嘗敢怠使其靡所得食則神亦有不利焉天胡為而不察之民之命懸于神非若吏之暫而居忽而代者之不相屬也隠而不言民則有罪知而不恤其可與否神尚決之敢告告佑順侯文古之人以守鄉邦為榮者豈以父兄宗族親戚友朋之所在一旦出人所不意傲然官府之上賞罰予奪千里之内為之榮哉吾生乎斯長乎斯飲食乎斯學問交游莫非斯郡之人則知其風俗之盛衰究其民人之苦樂莫吾若也幸而得民牧之寄除其所苦副其所樂革吾平日之所甚惡施吾平日之所欲為使一郡之民皆與被吾澤斯其所以為榮也雖然守之任有常嵗人之禍福不齊有及終嵗者焉有二嵗者焉百一之中或至於三年則又徙而他之矣雖欲盡其心智殫其材力不可得也今君侯以永康之人生雖不得守鄉郡沒而為神受帝明命合享廟食於數百里之内朝廷褒幽徳録利功錫爵為侯冕旒被裳秉桓圭坐乎殿堂之上鄉郡之長老子弟奉幡幣具牲酒備樂歌拜跪裸伏乎階圮之下無間深山窮谷望望而有之今二三百年矣君侯之榮勝於守鄉郡者豈不逺哉然榮之大者其責任亦大不可不思也某天台之書生愚不足以知鬼神之故以所見者料之上帝不猶人主乎君侯不猶守令乎今有守令受人主之爵禄而不治民事又見小民之急而受其貨財酒食既已得之而漫弗省其所苦小民不赴而訴之則人主且察而誅之矣今當六月而天不雨禾黍焦然欲死小民無所控語持牲醪禱乎君侯之廟者相繼也君侯端坐而享之未嘗有所或拒又不告之帝乞㳙滴之水以潤下土在他人不悉生民之苦者猶不當爾况君侯父母之邦乎君侯不能辭其責也審矣然而守令若此則上有人察之下有人訴之上帝之憂閔下民豈有任不職者而不怒其怒與否固不可知然而小民亦不訴者以無所訴而遂止是小民至愚而不知禮也惟禮年穀不順成變置其社稷土穀之主有功於萬世一不順成且得而變之况君侯乎君侯不可自恃也明矣夫禮天之經也人奉天經以行則猶天之為也未見其不可也人謂神乃帝所命人不得而變是不然帝無所私其好惡視乎人人之好也帝亦好之人之惡也帝亦惡之向以此郡之人懐君侯之徳故帝以命君侯帝之命君侯者以君侯能澤一郡之民而知其利害也今君侯有民而不恤受民之祀而不辭帝茍聞之責君侯豈其難哉君侯若此非特此郡之人可廢君侯也君侯之厲民不仁也受祀不義也以此二者有能率民數君侯而墟其廟廢其祀是天之所甚予也况君侯天下之偉男子以生民為心之日久矣其忍視民之窮困而不救乎君侯其勿謂某不為也某腰下有三尺劔欲為四海除患救害每見民之憂苦輙作蛟龍鳴思擇其尤者而少試之君侯幸無忽倘三日不雨當先拆君侯之廟投之於水恐君侯或蔽於左右近習而不知故先以告君侯其深念之無悔覈咎賦敷言而闕兮秉吾志以陳辭質尼父以為理兮要子輿而無私爰抗志以邁徃兮星火中以為期匪道術吾弗懐兮匪聖哲吾弗師朝既遊於貝闕兮夕又息乎瑶之圃睹珍瓌之溢目兮胡獨闕猶豫而不取豈味惡乎斯類兮恐心淫於可喜寧不美乎琛璧兮匹夫懐之而禍已䇿余馬乎㑹稽兮探神禹之秘穴悼道文之湮喪兮闕之惟輟北吾濟乎大江兮抗吕梁之驚濤衝風擊以溧潏兮虬螭號進咫尺其莫遂兮忽囬薄如羽毛繂絙設而奚施兮慘恒沮以煩勞豈好逺而負重兮将𢎞毅以作聖茍斯道其可望兮雖瀕死吾何病朝一飡而忘味兮夕假寐而不安若芒刺之窒吭兮既決去而能言踵四瀆而東騖兮挹山川之龎淑岱宗屹乎北屏兮鳬與嶧其聨矗兩觀芨其如塌兮欽明刑之震肅跽舎萌于杏壇兮盼佳植之森若蹟雖存而世久兮欲咨詢而未能魯周公其已衰兮文獻泯滅而誰徴倚壤垣而太息兮問吾生之已暮俾覿聖而友賢兮闕豈不顧乎此度喟揭復乎盛時兮固宜㝠趨而强歩昔子輿之有言兮謂凡民乃有俟豪傑謇其時出兮微文王猶興起余雖不及古之人兮幸賦予之靡異帝既命之以至純兮親又廸之以逺志曰聖言具在兮爛日炳而大示能潜心於求索兮敬典敬其闕致何有積而不增兮孰云行而不至恭昭訓而自省兮震雷霆其若驚從洋洋之江海兮蹈疑澌之始冰遌微入於中流兮闕舟檝而闕兮執汝操之弭貞神安余以闕兮闕昭明而光大兮曽不越夫一語無嶢嶢以為大兮無闕以為頗無矯矯以為直兮無營營以為阿詭而弗卑兮正而弗亢無易合而難知兮有難近而可尚剛􅐧聖之所取兮柔闕彼務私而茍悦兮知其中之匪仁道乃貴乎有名兮闕所闕處衆忌而莫辭兮同羣猾之攸闕懐斯言之不能忘兮闕吾意之未堅始敬闕而不怠兮茲少闕逢悠楊蛾眉之姣好兮衆女怨其殊特繫孤鳯於雞鶩兮闕與之兢食屈姱麗於文辭兮黨人譖而放黜賈正言而闕兮椎魯惡而逺斥頥蹈道而則聖兮邪交謗為鬼蜮闕立言而輔經兮憸鄙訾其悖徳自古昔而有然兮矧菲薄之極愚彼設而坎穽兮懵不顧而徑趨鳶帖翼而下搏兮孤鶵以為闕狼妥尾而伏伺兮犢衝突以為侣禍恒隠於不測兮謗恒發於不疑悼不智而受侮兮何彼人之足尤覽先哲之好脩兮闕微而不揚方進鬻闕而其所為相兮趙堯果代乎周昌語終而降拜兮美郭奉之善誘闕縱賢於同類兮夫豈足為師友以倒屣而見粲兮𢎞知枯之将貴脩虚挹於周英兮曰非闕抱朗明之精誠兮又重之以無闕在此曹無損兮闕其見如先後之胥接兮固代謝之恒理擠俊而訕哲兮闕而何恥繄人厥有之命兮豈毁譽之能移諒勞心而何益兮闕哀徳闕於人兮毁與皆可師譽闕兮毁闕昔忠人謂何兮明憯戚於細故神闕不於闕兮闕乎九土前三秋而無始兮後百世而無終闕何異蜉蚍與蠛蠓馴麒麟以駕軛兮繫闕兮闕元氣而凌鴻濛吾将視天闕閴兮闕責闕於外物兮闕期企乎闕静學齋賦惟昊穹之𤣥黙兮備恒道以示日月煥其錯行兮紛布闕展肆一呼而一吸兮為發育與揫歛羣物從而榮悴兮闕隂陽其舒慘大莫踰於嶽瀆兮小莫至於昆蟲顯何遇而弗闕兮隠何感之弗通且深廣兮夫何術而能闕極静静乃動之根兮闕五氣上喿行而妄動兮庶類之營庶類之營化闕其無成矧同人一心兮應外觸乎紏紛匪澄明而静一乃如絲而如棼闕者聖師之無憲猶日闕潤指昊天以示人兮欲無言而黙運猶賜之善辨兮謂辨予謂未知顔氏顔氏如愚兮亟揚言其庶幾嘉禾納之近仁兮佞之為闕而潜思兮𢎞猷之在茲維周氏後作兮興紹千載之遺統揭道奥為圗書兮曰主静以制動何明者之通達兮瞽者從而逺之道昭昭其孔彰兮昧者棄而材之得失兮恐利口之深詭雖榮盛而闕切兮何異闕螻蟻余少志乎行道兮獨慕乎前脩有虞信莫京兮餘可以以為逑摽禮樂以為檝兮施仁義以為舟濟澷闕之洪波兮冥斯民於樂丘忽有悔闕不然兮知余台之未至欲以静而為學兮庶來者之可冀且潜心於沖漠兮夕重之以乾乾攝衆衆而靡形兮中扁湛其若淵交至而弗勞兮如水涵而鏡受未至吾弗迎兮既往吾弗咎懐明徳之在已兮恥流俗之狂獧若黙闕而行正兮惡夫飾貌與多言示狙猿以周禮兮競呌噪以闕固歎知我之無人兮嗟斯道之難遇何朱氏之好脩兮先闕之中情敢静學之嘉名兮銘齋居而服膺賢聖匪䧏自闕兮脩道以立成尚慎終以弗怠庻言之可徴憫知賦哀葉廷振塊居幽而處獨兮藐昧陋而遘屯視冥芒而無覿兮聽矘􅍃而無聞疲精思於編簡兮馳志慮於遺文悼往古之莫吾與兮愧當今之莫吾親夙吾秉茲姱志兮泏宇内而求友闕既髙闕采兮亦微容而寡受紛瓌琦之豈無兮逞珍麗之叢揉驟而俄踦兮或始揚葩而遽朽棼芸芸之易逝兮莽悠悠其何之恍晤言之猶新兮倐墓草之已滋睇昊天而太息兮俯長川而增悲望斯人之不淑兮慨吾道之将微惟闕􅀢之靈霄兮美之子之挺秀質顓醇篤敏兮父師申之以告詔博載籍之淵粹兮騁俊力於文囿鈎羣言而交貫兮逈孤舉而闕奏應薦書於辟雍兮再而再進却曰吾慮道之未脩兮行吾志之靡獲衆喧闐以衒鬻兮兢攘竊而不怍茍得之以為宜兮失怨悱而不釋快庸目之矇眊兮機詐陳而自賢蘇腐櫟以為芳兮譽沉檀而斥龍涎進龜實豆兮毁擣珍為穢膻獻蒯枲以為領兮謂錦纈可苴履舞山鷄以效祥兮威鳯羞而闕羽既自欺以惑世兮世亦安之而不顧孰若子之誠一兮闕於名而實富在闕嵗之孟春兮歛舒舒而來翔繩吾以儀則闕以文章醉稱觴闕以孰寐兮闕九州之廣大兮固三代之疆址何賢哲之寥廓兮不逮古之多士天既生而偃之兮人莫窺其太始将忌能而嫉智兮天與人其同致昔洙泗之啓聖兮異才森其並出大或僈於造邦兮小猶易夫千室使僅得其一二兮真足極斯世之遺失嗟乎不及古之人兮又無友孰自律受形氣於大化兮知終盡之有期生有益之為美兮何夀夭之足議松栢薪於空山兮與朝菌又何異生有樂而可恥兮死有厄而足貴吾曠觀乎宇宙兮等萬古於一漚揆庶彚之消長兮審二氣之所由山有圮而闕合兮川有壅而為丘化昭明於腐兮鑠覆載而不少留彼天地山川且有澌滅兮矧天人復誰闕重曰佩美兮襲芳宛可慕兮難忘朅逝去兮何為生不永兮使人悲庸多夀兮哲夭般闕兮誰究誰考遊太初兮返其真愚風霆兮挾星辰帝視下兮察其仁異才降矣後復闕友筠軒賦惟青青之玉立俯漪漪之軒搆憇樂矣之幽情處蔚然之深秀蒼雪洒乎涼颷緑隂蔽乎清晝春之時也暖律乍起和氣方剛對穆穆之龍孫列斑斑之鵷行風節持以雅素體質直而端荘其夏色也南薰解籜丹鳯來儀香馥纍纍而貝簇宻葉重重而翠圍笙簧弭乎節奏珮玉鳴乎參差䀝佳麗以褒雄據静便而伏雌若一塵不到之際萬事脱覊之辰渭川致乎斯景黄岡寓乎此身風徐來而韶合雨初歇而香勻至若色侵書帙涼溢芳樽日穿漏以噀金水環逥而𠻳銀座擁碧筒之杯地敷翡翠之裀或彈棊而雅歌或觧衣而脱巾或焚香而啜茗或聨句而鼎真固平生以足樂雖百罰而弗醺越若秋之與冬金氣肅兮萬木凋𤣥冥降兮羣隂驍履霜兮氷将至擁枯拉朽兮焉逃禀抗雪之英姿徤凌雲之髙標或強董宣之項或折陶潜之腰或簇白雲之調或作重華之韶既不婉以不麗亦弗矜而弗驕世上有玉堂之貴此豈無甕牖之安乃緩歩以當車復謝崇而慕閑彼将聽晨雞而拜楓陛此獨咀明霞而扃柴關忘情於漢庭之寵避世於商陽之山至於侣魚蝦而友麋鹿豈復對隆準而瞻龍顔采玉芝於蒼烟之表洗兩耳於清溪之灣然而清則清矣未有得茲軒之真樂者也辭曰清清兮嵗寒之心温温兮琅琳之音君子居之兮實獲我心正俟命兮履薄臨深君子處兮慨古傷今古人汨汨兮誰争子所蔬一器兮酒一觴樂以忘憂兮嵗月長羗彼五陵豪富兮乃積乃倉朝重白璧兮莫手粃糠松花飯兮荷葉衣瞶兩耳兮逺是與非朝其遊兮莫而歸安得從子兮其樂有餘鄭氏四子加冠祝辭浦陽義門鄭氏十世之長仲徳父以禮冠其從子杓及諸孫燧爚燿而以字為屬余惟冠禮之不行也二千年矣舉曠古久弛之禮而行之夫豈為耳目之美哉亦曰以古君子成人之道望乎子若孫爾上以古道望其身而不能以君子自望謂之愛身不可也余欲四子者為君子故因字以勉其徳杓之為用惟絲是理字曰叔理欲其精敏不懈以周乎事燧以改火民用是資字曰允資欲其致用于世而不爽於宜爚為光明明不進乎上則不能逺字以允進使進乎善燿者輝之著茍充其内則其輝也益遐而㫼允充是字俾篤實其中而致其昭也大余於四子盖各有望焉不為無意也四子也豈可不勉以違父師之志乎祝辭曰加爾元服維茲令辰匪飾其外貴乎成人昔未有知徳或未備人曰童子宜有不至既峩爾弁而童厥心人謂之何責望也深一言之善終身行之今字告汝維名是徴杓之為器絲用以理觧類析紛莫切乎此以理字杓其義孔章用之於身既要而詳天下庶事紜綸舛錯如絲之棼不可控索急之則亂久之則艱無為則弛有為則煩曷以治之其要甚寡知要則為優於天下人心之明與天地參何逺弗該何微弗涵養之以敬以澄其内制之於義以應乎外肫肫其誠允烈其光如揭日月以燭四方以理庶事靡有滯失孰能致然大本既立由身而家自家而推有以應物何適非宜曷以惎爾聖賢之事勿謂難能與汝不異生民所資菽粟為甚茍微水火曷以烹飪火之為用與菽粟同此落二句古者用燧以寓政機榆柞桑槐各資其時字曰允資於義其可望爾致用比徳于火酒醴牲牢或可暫違一日匪燧民實阻飢凡此生民孰資以立盖有君子進其不及養之俾生導之俾成植其彛常牖其天明致用之功與燧無異何能濟物是在材智爾欲為燧惟徳之脩有以資民民咸汝求人之有心孰不思善惟其無學所思不逺學以為本篤行培之仁居義途勿怠于為政飭于家洽比閭里暨躋于位惠澤彌溥率履弗越斯謂允資貴成厥躬賢者自期惟古有訓冠為禮始曷始于茲備服致美𤣥端而袒人必尤之佩而不冠則爽于儀致飾于外惟備之務盍思厥徳寧有未具爾生名胄有伉其門曷以永家在爾後昆爚為爾名光明是勉明不上進所及不逺字以允進以逺為明匪字之美尚躬于行日之方升其輝耿耿愈進而崇無物不炳譬諸為善其始甚微日進月升譽聞赫熹恒人之身望為聖賢其功之難有如升天進而向上靡有弗至謂吾豈敢斯為自棄天賦明命曷有不完久蔽而昏盍識其端人怠以嬉獨奮于學學功既進乃亦有獲衆怯於善獨勇于為善集于身進徳之基勿怠其易勿畏其難勿移于昏惑於人言日有孜孜惟道是信緝熈于光明斯為允進古制名字以號其身匪欲務美以夸於人後之命名取義甚備能思而行猶古之意爾名為燿燿為輝光曷以字之允充孔􅆇惟天之運厥章爛然日月迭行星辰照宣天胡致斯陽體充實積中既乆光華外溢地厚而廣克配乎天實弸乎中至文發焉其在聖哲煥其有章秩秩而隂煌煌而陽視乎其身威儀甚都發為辭令為世大謨豈欲的然外施厥美道徳内充不能自止至足而流至美而發雲蒸雨潤靡不暢達今爾何學稱茲嘉名茍能充之何徳弗成出言則思聖哲是效舉足則思前武是蹈於親而孝而弟而兄自卑而尊無不敢承曰聖若茲我猶未及夫豈非人敢不汲汲仁覆天下智周萬彚吾獨何為而有未至知之使明踐之使𢎞反求諸心使及于誠涵蓄既深遵養既美光耀旁燭孰之能禦世不知道習陋安卑聞師古人不訕則疑慎勿類斯勇往獨覺允擴充之匪聖焉學釋思辭翰林待制華川王公子充奉使雲南十年而未復其冡子綬作思親之堂以寓其望慕之意而少子紳復為賦以自閔其志切其辭悲讀之可以流涕也夫父子之恩天性也豈有紀極哉孰不樂乎字養承事於安泰之時而有不獲者命也命非自我出者君子盡其所能為而已矣其如天何哉余悼二子之志推其故以釋之始發乎情而終歸諸命以冀其定焉辭曰悵獨往兮何所天廣地遐兮道囏且阻鯨鰐據川兮陸有兕虎蠻之人兮不可處君不歸兮将安與我思耿耿兮心勞苦楓櫧葉暗兮霧杳㝠毒氣漲天兮蝯􅎜又鳴蠻之人兮鳥獸嚘嚶被髪兮倮行血為飲兮齒頰頳君之處兮誰為朋冠裳兮佩玉乘文駟兮䕃華屋俊彦兮汝從倡汝和兮往余復愉樂兮恬康尊盛兮朗融曷不歸兮蠻夷之中彼豈汝悦兮此寧不子容我思君兮意安窮翕翕兮俟俟汝閭兮汝里食有黍稻飲有醴有豚兮有羜繳有鶉兮罟有鯉有子為養兮羞服温㫖望不還兮悲莫止崇堂兮邃室陳罍兮肆几便心兮佚體眉夀兮樂愷君胡為兮去此我之思兮如水孰不安兮故鄉逖獨處兮蠻荒謂誰兮使然皇有詔兮孔明天穹兮在上命在人兮昭章貴我兮賤我疇能違兮天常既知命兮何悲聖不遇兮矢言居夷秉至美之在余胡不可兮懌怡由余兮季札夷之産兮睿哲諒何所之無士兮道焉往而不合菅蒯可以為服草木實可以為粻舎故鄉可無思兮皇之恩不可忘恃聖明之大徳兮終擴闢此殊方操吾節以來臨兮縱遲暮兮何傷文㑹疏伏以道術之分九流儒者實禮樂之宗主浙水之東七郡金華乃文獻之淵林在天纒為婺女之墟於墳籍資賢人之聚自宋南渡有吕東萊繼以何王金許真知實踐而承正學之傳復生胡栁黄吳偉論雄辭以鳴當代之盛遂使山海之域居然鄒魯之風天實啓之世有作者惟我朝創業埀統之初載得華川潛溪之兩公或以誠篤博大鎮朝廷或以忠節剛方聞夷夏脩九十三年之元史為百千億載之成書雖盛衰榮辱所遇難齊而道徳文章俱埀不朽繼其後者夫豈易哉恭惟仲縉先生推其學則潜溪之門人論其家則華川之愛子耳濡目染於斯道斯文之懿不出於户庭而得之心解力行於厥父厥師之傳能紹其箕裘之業矣是以名播萬里來覩王國之光經授諸生聿佐郡庠之教夫成都自文翁興學不乏楊馬三蘇之才况賢王尚文已成周召二南之政教化行而風俗美固曰本於人君師道立而善人多是所望於吾子尚念淳熈乾道之大統皆振民育徳之宏規夫何近代以來徒為謀利之具慨想一時之羣彦鮮不隨波而逐流茍非振古之英賢孰克任重而道逺本六經而敷五教慎無負於孔孟在天之靈備九徳而配八元庶有待於唐虞致君之士謹疏建祖祠移族人疏舉觴而酹先酒盖思麯蘖之初秉耒必祀神農尚推粒食之始况夫人之𦕈質皆先祖之遺休堂構積累世之勞疆畛有無窮之利儻食焉而不察反二者之不如是以宗廟為先著諸經禮有田則祭具列聖謨苟存仁義之心敢忽祖宗之祀余家爰自前宋以至于今上下三百餘年繼承一十五世雖絶續盛衰之互見而東西前後之分宗凡此比屋之人孰非初祖之𦙍然支分派别本源既逺而益疎世易人亡祠祭僅存而無統或茍簡而不循乎禮或怠惰而不當乎時盂飯盃羮曷寓如存之敬桑樞甕牖莫棲來格之神茲欲創建新祠合祀羣祖四時仲月有田者各伸報本之誠一姓亡親無後者咸享祔食之祭明同祖之同體儼事死如事生上以萃髙曾祖考之靈下以洽兄弟子姪之志燕毛序齒佇觀睦族之歡鳩財僝工請盡奉先之道在我宗屬各單厥衷無或乖違以忝吾祖遜志齋集卷八欽定四庫全書遜志齋集巻九明方孝孺撰
