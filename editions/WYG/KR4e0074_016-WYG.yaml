body:
  text: 記傳經齋記世之稱治者二帝三王而已其詳不可得而知宏綱大法所以相傳而不泯者惟群經之存是賴然安在其不泯也經者治天下之具也豈直文辭云爾哉自秦火之餘老儒碩生補緝扶衛專門殊軌授諸其徒所從事者止乎訓解辨義至於補世善俗之道蔑如也由是世之君臣指經為浮言而英才雄辨之士顧棄去不業而一攻乎文辭之學帝王之道頽然墜地而生民亦大困矣嗚呼聖人之經豈固如是乎如是者非經之失也傳之者無其師受道者非其人也某少則嗜學竊有志於斯道自從先公學經匪聖人之言不敢存於心匪生民之利害無所用其情恨未及卒業而中丁憂患近年始就太史公學於浦陽然後知經之道為大而唐虞之治不難致也知古今之無二法而世之言學者果不足以為學也盖太史公受諸經於聞人君夢吉吳萊先生黄文獻公溍出而侍從帷幄輔導儲后雖未嘗得佐治之位以盡其設施然所陳說皆二帝三王之道其功徳隂被乎生民者厚矣及致其事而居于家以開淑來者為志雖某之鄙陋亦得與聞斯道微之於性命之理明之於禮樂刑政之要茍有得者無不以言某雖非其人不足以承其緒然安敢忘所自哉經之無用於世者二千餘年矣某竊嘗痛焉茍知之而不得用於世者天也身尊顯而不以行者不仁也謂時君不能行者不忠也謂斯民不可以道化者至愚也謂諸經為不足法者不知為學者也某既幸知之矣倘或有得乎天而見於世自兹以往皆公之賜也其敢忘乎其敢多讓乎於是名受業之齋曰傳經以志其所始貧樂窩記世謂士者多貧豈天使之然哉才髙則不忍以利自汚道得則不屑與俗相混其所存者榮大異美固以世之富貴為垢穢而不肯視其肯小屈其志以求之乎是以寧適意於飢餓而以沉溺利欲為深恥世俗不之察因以士善貧烏知富貴之正哉物之可以奉其身者無不給世俗之謂富貴者也然過取之也有禁茍得之也有禍稍踰其分則人思役之鬼神害之不致扵蕩覆澌盡有不已方其得所欲而守之也或有愧扵其心戚然若䝉不潔而恐人之覺也凛然若臨百仭之淵而憂其墜也曷嘗有斯須之樂哉士之扵富貴則不然扵三才萬物之理無不得諸已扵國家天下之事無不備扵身前乎百代之上後乎千載之下包羅綜括而不少遺大而日月河嶽照臨流峙之所由小而草木花實之盛衰隂陽寒暑之消長靡不存乎中而有以識其故然此猶其取扵外者耳至扵絶私去欲以全其性窮微致曲以達乎命尭舜禹湯文武之所有者與之絜深較廣而無怍周公孔子顔孟之所學者沛乎若皆在我而無􅃜歛之于一身而非有餘施之於政教而無不足當其存心無為以自樂其所存操威福之柄者不能奪為生民之宰者莫之制窮達死生之變亦大矣不少亂其胸次而為之入其視富貴果何如哉世徒駭區區之外物而以士為貧不知有道之樂固超乎富貴之表也奉川邵君真齋名讀書之所曰貧樂窩予不能知邵君悉其所樂也然不謀而同者心也不期而合者道也舜之居深山伊尹之處􅅵畝顔子之在陋巷時之相去數百載而其可樂如合劵然孰謂邵君之樂獨異扵予之所云乎樂壽堂記臨海王文俊少喪父而祖母及母氏鞠育之以至扵長而知讀書取友以飭其身修舉遺業以裕其家如父在時二母皆康寧壽考受其孝養文俊因闢故廬為堂以奉膳羞嵗時持觴跪拜為壽閭里莫不歎息謂王氏為有子他日語予以其故且請堂之名予重孝親之至因名之曰樂壽而告之曰子知事親之為樂乎世俗之所謂樂者在乎室廬輿馬服食寳貨音樂之奉斯數者當其適乎身而接乎耳目信亦足以樂矣然親茍不存而已獨享之盖有聞絲竹而泣覩物玩而悲遇美味而不忍下咽視堂寝而不忍安席者則其可樂也哀緣之以生何能樂扵身心而無憾乎幸而得親之存入有奉也出有侍也動有教也言有戒也見吾親之甘扵飲食也吾雖不食為之飽見吾親之身安氣和也吾雖疾而為之輕雖蔬食布衣以奉温凊之樂中心盖有不可勝言者矣况財足以致豐美甘脆凡所欲皆可順之而無違則天之與我者厚矣其樂豈不大矣哉世之人非皆不能養也或困扵貧窶而不能備物之奉或天早奪之雖有富貴欲奉而無由故富貴之為憾尤甚也今文俊雖喪父而二母皆康寧有年雖布衣處閭巷而其力可致甘脆以為養此其可樂者大矣焉可不知其為樂乎予少時未有所知以父母之樂為可常雖在膝下而不知其為樂及今而念之欲一見吾親不可得矣自兹以徃縱僥倖有成而竊五鼎之食三旌之位亦無與於樂矣故每遇有父母者輙幸其可樂而且為之言恐其不知為樂亦若予之追悔扵無窮也於乎文俊其尚以予為戒竭力畢志以適其口體脩身慎行以恱其心志不特使閭里之人嘆息慕羡而四方之人稱養親者歸焉過其門指其堂曰此王氏養親之堂也斯為不負吾命名之義矣茍徒崇觀美而行業不脩則環海之境昔者将相豪雄之居宏大高敞什伯扵斯堂而亦無聞者衆矣尚安足為文俊道哉問月樓記天台金君元升作樓以居名之曰問月當夜之良披羽衣命壺觴歌李白問月之詩擊如意以為節見者以為李白猶在人世也其郷人異之請予道其故余曰金君所問者月也使月能言且不能答余非月也豈能知其意哉雖然明於外者内不足以自知為天下所仰者受天下之疑月雖欲辭人之問也難矣余試與金君達觀於一氣之始可乎自我而視之月也明且大者也自月而觀之庸自知其為明且大者乎非惟不知其為明且大庸自知其名為月乎名且不知庸知其盈虚消長之道乎君何從而問之而月何從而答之一氣盪摩而月生焉彼非願異扵萬物也而賦之形者蒼蒼耳莽莽耳煌煌耳雖欲不異扵萬物不可得也其形雖異扵萬物其為之形者未嘗與萬物異也夫吾之形異萬物而最靈者生而寓於世貴賤脩短禍福之數紛乎其不齊且莫知其所由然况無情之月乎尚何暇於月之問哉雖然予嘗聞之居乎上而不遺乎下故明盈而不以為喜蝕而不以為戚故長存若是者非有類扵人之說乎金君才可以處位而抗志扵隠未遇扵時而能有以自樂其取類扵月者深矣余非其人烏足以言之味菜軒記凡物味之甚美者必為人所甚好可好之甚者亦往往能生其禍以病乎人酒味之美者也好之甚者小則有酗醟之失大則戕軀喪徳以災其國家牛羊魚鱉之類扵食物為最珍然華元以羊羮不均至扵取怒而致敗鄭靈公黿羮不以分人而逆亂之禍因之以生是以甘脆適口之故不之戒慎以飫飽亡其身者世常有之是豈非有甚美必有甚惡之事乎夫惟其味淡薄初若無可喜者而世自不能遺之飲者資之以析其酲食者資之以觧其飫貴而八珍九鼎之筵賤而橡茹藿歠之室莫不有待於味其物既不為人所争而其味和平清苦善除物之毒而不生疾以病人若是者其惟菜為然乎世之名人賢士每懲厚味之腊毒而顧深嗜乎菜若杜子美之扵韮薤陸龜䝉之扵杞菊蘇子瞻之扵蘆菔蔓菁莫不遂稱之見扵咏歌而黄魯直謂士大夫不可不知此味尤為篤論盖貧賤者之所易得則無踰分之思而求之不勞不為富貴者之所甚好則享之也安而用之也無愧身不勞而心無愧此君子之所以有取於斯歟暨陽蒋侯文旭以博士弟子髙等選為監察御史其官貴顯矣而其志清約亷謹以味菜名其所居夫為顯官而嗜菜其善有三焉不溺扵口腹之欲所以養身也安乎已所易致而不取衆之所争所以養徳也推菜之味以及乎人俾富貴貧賤同享其利而扵物無所害所以養民也養身以養徳養徳以養民此蒋侯之所以過於人也乎語有之曰人莫不飲食也鮮能知味也蒋侯於是乎知味矣因菜之味而深味聖人之道使仁義充乎中暢乎外而發乎事業於膏粱之味且有所不願而况於菜也哉存養齋記寧海某名燕處之齋曰存養里人方某為記以告曰惟天以二氣敷施五行實函顯赫徽命播生萬彚承命之中凝氣之醇亶惟人醇匪均漓厥中若酎之在醯䍌若泉之漸塗泥若玉之墮汙壤唯衆人厥精厥懿生則具全知攸知罔或廸行攸行罔或勉惟聖人衆人視聖人成勛盛徳巍乎天運煥乎日臨謂莫敢儗稽于初廼無殊惟心宰身微而靈虚而神囿覆載靡或遺酬酢群動靡或窒聖有之衆人亦有兹惟命在心為性為道之原為善之會為人物之分聖匪加多衆人匪有􅃜其不胥為聖在氣勝厥中其能勝氣復其天在學知要人授人以器受而失墜毁缺則怒則怨唯受有辜矧天授命于人心擴而闢之昭明配天以君則臣職卑以父則子職順祗昆恊弟睦于家邦陶于四海乃或弗念顯命從乃心戕乃性如縱奔馬弗思其復如閼川水折榮木弗遂其達是用獲戾于天用自絶扵聖以自沉溺扵庸嚚之歸惟志士懲其愆克自敬畏匪聞斯聞匪覿斯覿祗祗栗栗馭馬以朽綆莫喻其危奉琮璧而履峻坂莫喻其慎如對上帝師保莫敢少肆自逸以存其心充厥形而極其所未形因其始著以推其類視私欲為蟊螟俾無害其嘉榖視芬華為陷阱惟懼其或顛覆開其天明徹其妄昏善端之長理義為養外誘之侵俾莫能尋丕猷𢎞訓充塞天地寧謐群物咸出自兹是謂克事天是謂大飭其躬以式邇乎聖唯學之要莫尚斯相恒人罔廸知學非學蕩厥心事非事毁厥性權詐是習利欲是嗜卒劉厥身否則趨異端祈延其壽謂能存養背聖自怡其道以隳惟某甫尚鑑于兹則遵聖人之軌務學之要于以事天以脩其身以淑乎人恒人疇若兹於乎思厥名以無怠于成世良鮮哉南齋記人之初無有貴賤也才有所不若徳有所不逮而敬慢之心生相慢之至以爾汝為未足而呼其名以相名為未足而加以醜汙之號尊敬之甚以稱其字為僣而稱其姓以稱其姓為泛而曲為之辭長之則曰長者師之則曰先生或因其所居而為之號或因其所有而美其稱而先生長者之號夫豈强之使出扵口哉衆人之扵君子以為不如是不足致其尊慕之心而君子之貴扵恒人者固不待乎此也徳誠尊也才誠美也世雖加之以公相之號猶不以之為貴而况其細者乎世俗不之察挾其區區之細以為君子靳而不知茍無君子之所有雖加以世俗之貴而其可賤者固在吾之所得果有足貴焉則夫先生長者之稱與公卿大夫何别哉呼之為公卿與號之為先生長者均之出扵人之口也然公卿而無可敬人未嘗以先生長者推之先生長者道徳有以服乎人則公卿不足為之重吾以是知徳為衆人所推者過乎位為衆人所貴者甚逺也臨海陳先生行脩乎家學信于朋友聲聞扵郡邑以朱氏詩教授學者受業其門而以文辭政術稱扵世者相迹先生年老家居門人尊之不敢舉其字因其所居南齋稱之為南齋先生而先生不喜自居也自謂南齋滯叟世之所尚以為貴者印組以為華禄賜以為豐崇顯之位以為㤗之數者咸無焉而人尊而推之不敢字之而姓之不敢姓之而擇美號以稱之此其人豈有待於物而貴哉知其無待於外而猶强為之號以加其身宜乎先生之弗喜居也雖然名者衆人之所同欲也汲汲而求之則失之也必易不得已而受之則居之也必安先生亦嘗見夫世之所謂貴人者乎人面而陽尊之背而隂笑之生號為公卿沒喻為犬䑕者亦衆矣彼惟不務扵徳而求於外物之多也故得之而不可常有之而不能守方其垢辱交至以危其身欲如先生南齋之樂豈可得乎先生隠約守道無求扵名而名自尊居之而安傳之而可久其視世之貴賤相辱者何如哉然士固有足貴者初不在乎名位之有無而先生之可貴者亦不以南齋而重也余獨怪世俗常輕此而重彼乃為學者道使知先生之不仕非果賤而衆人之汲汲扵外物者觀乎先生亦可以自省也先生字徳良名某南齋在臨海之城中某巷懶齋記學道之士張君用隠自號懶齋而亟求予言余戲謂之曰夫懶者之扵事為迫之而不屑應强之而不即從其卧也忘起其坐也忘行飢忘食而渴忘飲固其宜也今子廼屢蹐吾門以言為請而不知厭是豈真懶也耶且使予亦以懶自居孰肯舍我之無言而為子言使吾非懶者也又烏能言子之懶哉雖然自夫不息者而觀之大而天運乎上日月行乎兩間百川經緯九州而達四海未嘗斯須怠也小而萬物之生羽毛飛動卉葉鱗甲之類其生長蕃育以遂其性者亦未嘗有一時之懈也况夫人也而暇懶哉自夫常止者而觀之則崖石以不動故堅山嶽以不動故壽水静則可鑑毫髮地静則可載萬類是皆懶之類也而子之懶豈謂是乎故巧者之奔走不如拙者之自守夸者之馳驟不如静者之悠久彼措慮扵涯分之外役志於義命之表孳孳憧憧扵塵埃之間而不知止者又孰若燕居無營以懶自名之為得耶道家之說貴無為而主静夫無為而静與懶相近而非懶之謂也子有以知之則為懶可也謂之非懶亦可也而予奚知焉扵是用隠唯唯請書以為記用隠世寧海人其先有仕吳越為光禄大夫者至今為大族云黙菴記會稽俞先生當年富氣盛時嘗以驚世絶俗之智懸河決峽之辨為當時所推既晚更事益深奉朝命為學者師扵東南小邑乃喜為簡黙號其燕處之室曰黙庵其弟子聞而疑之曰先生之為斯號也不亦異乎人之達其志意明天下之理而成物化民者以其能言也故教令不宣于家則親愛疎詞命不脩于鄉則長幼乖軍旅不言則無以用衆賓客不言則無以成禮居乎朝廷為大臣而好循黙則難以定國計和人民為諫官近軄而不務言事則有曠官竊位之譏先生為人師以教民善俗為職業封域之内有細行之違片言之悖先生恥之惡可以黙自處乎哉余聞而笑曰是知黙之為黙而不知黙之非黙也知言之不可止而不知非黙則不能為言也子嘗見夫萬仞之淵乎方其静也沉奫涵蓄不震不激泊乎無聲杳乎莫測惟其積之久而不妄出也故一旦決而為川達乎江河聲之所撼聞數百里使其不深而終日汨汨如溪潢澗潦之為則不崇朝而涸矣安能澤加萬類乎故士非能言之為貴而發扵不得不言之為美道充扵中不得已而後言則其言必傳無意扵辨不得已而後辨則其辨必明昔者孔子之門以言語稱者有矣惟顔子不言如愚人然由後世考之凡顔子之言皆為天下準與聖人之㫖相表裏而宰予子貢發言立論輒多疵而不適乎中豈非好辨者未必能言而善言者必本扵黙乎先生閱乎事變多矣求乎義理精矣知夫無益之辨之不足務盖将即顔子而師之而今而後先生之道益隆矣立乎朝則發而為正論埀乎後則揭而為大訓皆有道者之餘事也先生之黙烏知非言之至者乎二三子何患焉扵是疑者謝曰子之言似矣請質諸先生置之屋壁以袪弟子之惑靜齋記某郡郝君仲安治關市之征扵浦江恐夫躁心煩慮之不足以應物也闢小齋扵公署之旁陳書史于左右公退則歛膝澄坐以養心名之曰靜齋而願得予言夫静之為學著于易述扵禮而大備扵濓洛諸君子之書人皆誦之余不敢援以為郝君告然余少時嘗從諸老生遊于市脩衢廣巷車馬往來鼓吹閙耳珠玉錦繡之肆交陳乎前余憧憧而行不知其所底及暮而歸失道者數四至家而思之凡觸乎目者漫不能記而老生方坐而為人言所遇馬㡬蹄車㡬輪鼓吹㡬部道中人語者歌者為誰所語何言所歌何辭何為道以行行凡㡬里皆識之無所失余大驚以問老人曰子知子之所由忘乎心之為物静則明動則眩子不見夫鑑乎妍􅎀小大畢應者以其静耳使人持而摇之與破鬲何異余曰敢問吾心何以不静乎老人曰嘻子何見之暮也子見夫車馬得無願乘之乎子見夫恱目而娱耳者得無願有之乎人惟無欲視寳貨猶瓦礫也視車馬猶草芥也視鼓吹猶蛙蟬之音也則心何往而不静子有欲之之心存雖欲静而明得乎余聞其言始駭而悟退而養吾心三年果與老人無異今也雖處於廊廟之上置余於寳藏之中余心未嘗動也是非情偽紛錯乎前而應之未嘗勞也郝君之為是職與遊乎市者略同矣而人咸以無欲稱之其庶㡬知夫静者乎茍能無欲雖手執筆而聽訟口㫁曲直而目察銖兩中之寂然者未嘗少變也奚必處一室而後能静乎浦江俗號淳古異人才士必有隠于市者郝君試宻求而問焉其必以余言為然矣石鏡精舍記邑士童君伯禮既以禮葬其父於舍南之石鏡山與三弟謀合貲産共釜􅑄以食取古禮之宜扵士庶人者以次行之復恐後之人未能盡知其意而守之弗變乃即石鏡之陽為精舍聚六經群書數百千巻俾子姪講習其中求治心脩身之道以保其家以事其先而不怠且属予記其說以告來者予謂童君扵是乎知本矣人有五常之性天命也發為君臣父子兄弟夫婦長幼朋友之道天倫也天倫之常天命之本孰從而明之易詩書春秋禮記聖人之經也聖人之經非聖人之私言也天之理也天不言而聖人發之則猶天之言也三代以上循天之理以治天下國家故天命立天倫正而治功成風俗淳由周之衰不知聖人之經為可行而各以其意之所便時之所習為學百家衆說馳騁錯亂皆足以叛經而害理間有知經之不可廢者則又徒取其末而不求其本以為設扵人而不察其出扵天人心不正天理不明而三綱九疇因以不振經之用舍其所係豈微哉齊桓公欲取魯仲孫湫曰魯猶秉周禮未可伐也則古者以治經與否觀國之興廢也周原伯魯不恱學閔子馬曰學猶殖也不學将落原氏其亡乎則以學經與否觀家之存亡也經之扵人其重也如此世久不之察而童君獨知其可以善身保家首以教其子姪而不敢忽非誠知所本其能然乎自斯民之生封君世家富貴盛隆者亦衆矣其意莫不欲傳扵無窮而卒不能者奢泰滿盈而不能節之以禮私意䗬起而未嘗正之以義也使稍得聖人之言而守之於以治心修身致其道徳於衆人之表優扵天下可也於家乎何有童君之家雖未足與富貴盛隆者比而以禮自飭以義自正以經學望扵後人其所以守之者有其具矣凡學乎斯者擴乎天命之微以盡性篤乎天倫之序以盡道明乎經之大用以誠其身以及乎人則為善學而不辱其先矣此童君之望而亦聖人之㫖也茍徒取其末而遺其本誦其言而無益扵身與家豈聖人作經之意哉亦豈童君之所望也哉天台陳氏先祠記天台陳氏居東哲山者為著姓其先自婺來遷至秉彞十餘世矣族之盛凡近百家秉彞之祖恐其族大服降其情或離而不屬乃為祠祀始遷祖而使族人合祭以維繫其心元末兵亂祠燬扵火秉彞之父彦聖欲作新之未果而卒國朝洪武十年秉彞以為先人之志奚可不承乃謀扵堂弟集財聚工為祠於故址復以䙝器不可以祭也設牢醴粢盛之器藏扵祠以族人各用其物以祭為不飭也割田若干畆以供祀事請族之宗子主其祭祭必繇禮而不越焉其役逾年而成其事可以傳久而無弊因趙君鼎來京師請書之今天下之禮不合扵古者多矣不合扵古而合人情雖聖人出不能易也人之富貴自外至者不可以必得得之不可以世守而祗祖事先之心發乎天性人之所同也烏得以自外至為之制而禁抑天性哉茍拘古之法庶人惟得祭其彌今飲與食持盃必奠執匕必祝始為飲食之人去今已逺矣今之飲食非彼為之也人猶不忘之况祖考吾之所本者吾身皆其遺體其可忘而不祀乎自漢以來民之祭已上及髙祖非人不由禮也不合扵人情勢不可守也孔子嘗謂繼周者有所損益其此類也夫陳氏之祠自始遷而祭群祖言乎古之禮固不盡合先王制禮之意似可為得禮之本盖禮所以善俗而教民親睦雖作于古不足以感人心猶非古也雖不合于古於俗有益焉安知其不合於先王之意乎暴戾之夫不可以詞說化示之以父之像則泣過祖之廟則敬其泣與敬豈待詞說哉出乎天性不可止也陳氏族人信盛矣合之以一祠猶一家也此祠不廢傳數百年猶旦暮也辨其親踈謹其品節不合於禮者鮮矣有可以持世變俗者極人力之至難猶得為之况為祠而善一族者乎然則興作之工雖微而可書者甚大余有志於變俗而未能者喜其事約而愽因記其成且識所感焉遊清泉山記環寧海之山多可遊惟清泉山去邑為最近壬戌秋九月有九日余抵邑中與予友善者欲偕予遊求其近而易至者莫宜於清泉於是携琴命觴而徃登焉出西郭百餘歩折而北山阜隆起無崇林鉅壑峭異之觀彌望皆白茅叢生作花紛若鷺羽躡而升潤滑不可停足群奮相先至其脊有怪石二半陷于土蘚深碧色鱗生其上班班可玩遂列坐石旁道古今事以為樂久之復循脊西行冷風自西山來衣袂褰然飄舉不可進就其窪止而琴琴音與風聲相和抑揚徐疾琮琤澎湃心融融如有得起而四顧落日與山當東北雲氣中海濤際天日光倒射海上灩耀難正視乃之山北草舍飲酒飲已琴重作日暮始歸莫不動容愜意以為兹遊信樂也而予獨有感焉邑之名山十百於清泉者衆矣然遊者之跡罕至縱偶登之手疲於板援而趾病於踐履茍未窺其奥美之所徒厭其勞而不知其為可樂也是山較崇卑於彼固有所不敵而遊者必至至必樂之而歸豈非髙逺者難恱於時俗而卑近易至者乃為常情所喜乎然人於髙逺誠得其奥美而樂之則其樂有不可既者世顧莫肯自至而每用心於卑且近者何也以易至者為足樂夫豈天下之真樂也哉而予於此遊也豈不足為學道之戒也哉同予游者凡八人楊汝噐王脩徳盧希魯楊文遇章彦璞龔彦佐林嘉猷暨脩徳之甥應賢文遇善琴云集義齋記金華劉君剛其字為養浩既學於太史公復名其齋曰集義以予得綴同門之後曰願有聞也嗚呼養浩不猶古之道乎古之君子加之卿相而不喜予之萬鍾而不驕臨之患難而不怵困之貧賤而不憂者其志剛其氣充也人之有是氣也猶地之有水然地孰無水也而或梗之或湮之閼之使其不得行塞其原使其無所資則不足以為水矣浚其源欲其深防其畔勿使其渙節而䟽之順其性而導之雖界天下而達于海可也君子之養氣非能兼取於人也能自充之而已充之之道無他能循乎理而已矣俯仰扵天地而無愧質扵鬼神而無疑徴扵聖賢之道而與之符而况扵斯世乎世之所取吾不取也世之所予吾不予也世之所以為輕重榮辱者吾未必以為輕重榮辱也吾知有道存焉耳吾何慊彼哉故夫卿相之加萬鍾之賜得以行吾道世之幸也吾何喜而驕之有患難之臨貧賤之困不得以行吾道世之不幸也吾何怵而憂之有此集義氣充之說而古君子之為學也今之人則不然得釜庾之禄則以夸于衆有一命之爵則喜而以為榮患難臨之則戚戚不能生貧賤困之則怨天而尤人若是者非他氣不充而義不明也不明乎義是非利害蔽其方寸之心聞叱咤之聲則汗出而顔變頳雖不欲畏扵人得乎比之扵古之君子其能無怍乎然其始非有異也自致之爾有志乎學者而可不自審歟養浩之為學有年矣其扵君子之道必有聞矣且又愽學而能文辭占氣之充否者文辭莫近焉養浩日處乎斯齋而思其名若字又占之扵文辭而日驗之則不出户而得之矣雖予之言亦何足為養浩輕重哉藏用齋記今之人不如古豈惟資扵天者不足哉亦急扵用而無凝道之功耳古之君子質既美矣其心未以為美也又磨之以學學非徒學也必務得乎道道或有得矣其心未以為足也又藏之而不暴乎外積之而不計其勞察天下之理既熟矣復不求用扵人試之扵鄉黨徴之乎往昔綜核其條理考論其先後徳既成矣一旦出而居乎位故沛然發之而有餘秩然施之而合宜小之化郡國大之佐朝廷功業著乎生民勲績流而長存其藏畜愈久故用之愈章也今之人以恒衆之資恃其偏私之智而不學縱學矣不本乎聖人之道無有得於心而徒竊邪說曲辨以濟其無用之材其材固弗足用也其心不自揣度夸竒逞能謬飾虚言以攫禄位不能致則終身奔走乎道塗旅死而不顧及乎置諸位叩其詳而忸怩責其效而無所施大焉則亂政小焉則賊民世嘗謂今之人不如古而豈知其學之無道藏之無素之所致哉然若是者非其父師之弛教則自棄其身耳茍學焉未有不至者也浦江之陽有禮義家曰鄭氏有師曰金華太史公公禮義其質也而公又善教故其子弟皆賢而有曰叔器者又賢公嘗以藏用名其齋欲其後扵用也叔器魁然有美質好學而近道有可用之材而不自露固異今之所云矣予不敢以今之人望之也故告之以古君子之道在叔器之自取焉或謂藏用乃易上繫語彼論天地之功用殆非命名意也適意齋記貴極乎将相富累乎萬金喜怒可以榮辱一時去就繫天下之輕重紛華珍麗之物不求而自至快心快己之奉奔走競效于其前此衆人自謂適意者而隐居慕義之士以為何取乎此樹藝樵釣以養生彈琴讀書以養心倘佯恣肆於山泉丘壑之間咏歌論辨以發其趣棄禄利而不顧遺萬物而獨立其扵適意亦已至矣然而聖人君子猶病其隘也天之授我者養之致其全知之致其明行之致其篤用扵世則使隂陽寒暑得其時日月星辰循其度九州四海老癃单弱之民無不得其欲夷狄禽獸草木有生之類無不遂其性不有用扵當時則著之扵書傳之天下後世使倫紀正而禮義行姦宄消而禍亂正勞神苦形不暇自適而以衆人之安危為喜戚以區宇寧風俗美為適意若斯人者其扵富貴之樂固不忍處而亦焉忍樂其一身以自足哉此聖賢所以有功於世而非有志者不能學也浦陽黄君仲昭才美而甚文有司屢辟之辭不就作燕休之齋與士友講學名之曰適意人以仲昭為隠者也而余竊疑之人情非甚相逺也操瓢而呼者立於門雖御八珍不能知其㫖毛褐不完者行扵途雖錦衣狐裘不能知其温人之不獲適其願者多矣仲昭寧能獨適意乎天下之不治非特政教不脩法禁不宻也仕者茍富貴以忘民隠者私安佚以保身茍且鄙冒而不知聖賢之道者害之也余才不敢望乎聖賢然不敢不勉聖賢之事數十年間庶㡬或見兵革不試黎民樂業無飢寒勞苦之歎豈非余與仲昭適意之時乎浦陽余遊學之所故舊賓客之在者甚衆於是時也享承平之樂单車往來相與講說唐虞三代之道以為天下慶盖必始於此矣餘慶堂記力可以禍福一世而不能保其家之常存智可以臧否萬物而不能必其子孫之皆賢盖可為者人事之偶然而不能者天道不可以智力動也匹夫之相與綏之以誠則喜詐之以術則怒天道之神扵人情不逺矣而人欲以智力勝之安在其為智力乎昔嘗觀扵故都舊邑問公侯将相第宅之遺址而求其子孫之盛衰當時之煇赫崇熾者今多不復存凡守其舊宅而不墜者皆不遇者之後人也然後慨然而歎威權名勢造化之大柄彼乘時之間而以智力僣持之寧有不獲罪於天者乎縱無犯於天寧有不得怨於人者乎其先之積一身享之而無餘而欲昌其子孫難矣故再實之木其枝必瘁久息之田獲必倍常嵗吾於浦江黄氏而益知積而不發者之有後也黄氏自宋為詩書家嘗有仕者而不大著然以積善稱至今二百年其諸孫曰資善公愈好善修其業率二弟聚食不析鄉人賢之今太史公以餘慶名其堂昭其先之積善也黄氏之家故家也上世之所餘者非一物矣視於廟則籩豆衣冠秩如也視其堂則琴瑟書史森如也視其野則土田陂池鱗如也然是數者豈智力能守之哉亦餘慶之尚存焉耳世之貴盛者粟非不餘於囷帛非不餘於藏犬馬牛羊非不餘於家然而卒莫能守者善不足而天不與也人常汲汲圖彼之有餘而不汲汲憂此之不足何哉此吾所以嘉黄氏之賢而願為其後人告也仙溪霞隠記永康之南有溪曰仙溪其上飛霞觀在焉或曰常有仙人乘霞飛升至今上有霞氣故云學道之士徐東溟結廬于觀側以仙溪霞隠題其額人莫識也他日其族子允中以告余曰知霞者寧有過於予者乎余家赤城之西巨海之隂當天光初舒旭日未升有神氣焉自東而生騰而如烏廻而如輪奮而如龍曵而如神歘焉而鸞鳯翔彪焉而虎豹蹲彬緼雜襲重敷綰結或變為五色環湧抱日或隨風騫蕩久而乃没一朝之間終日之内不知其㡬起滅也當其起滅之頃目瞬氣息欲其不變已不可得况能常見之乎欲常見之且不可况欲常有之乎不可得而常有况近之乎而東溟欲託而隠焉此其志何也吾知之矣東溟其有所懲而然乎天下事物之變亦多矣寧獨於霞哉彼之朝華顯而暮羈纍朝肥堅而暮徒歩甘腴已盡而糠覈繼之綺繡去體而疎布不掩者其為變亦甚矣而衆人不察也往往知籠力執欲使適意者常存而不失而卒并其身弗守者有矣此非惑耶且凡物之接於耳目者孰能長存而不變日月之明也而不能無缺蝕山水之久也而不能無頽涸天地之大也而不能使無閉塞傾陷之災此皆號為歴終古而不變者且若是亦何怪於霞乎又何况於人之身乎自霞而言霞不能不變也自人身而言之人身亦霞爾自天地而觀之雖天地亦何異於霞乎雖有久速之殊其不能長存則一也惟夫聖人賢士知其然而思在我者勝之故修而為道徳施而為事功發而為言語可以埀千載而不變而神仙之家亦有見乎此則葆形練神為長生不死之術以其一身徐觀萬物之變昔之所傳韓終徐福軰皆是也二者之為道雖不同其過於衆人亦逺矣東溟之所學者神仙之事而余則慕乎聖人賢士而未能者豈足以知東溟允中試以吾言質焉東溟倘以為然或能乘霞訪余於赤城之下尚相與講之思孝堂記肇慶蔡徳芳以國子生歸省二親請名養親之堂余名之曰思孝而謂之曰天下之理不待思而得者至情也寝者未嘗思夢而夢生飲者未嘗思醉而醉至不食者不思飢而飢遇横逆者不思怒而怒聞鼓鐘管籥者不思樂而笑見衰麻踊躃者不思哀而悲此皆得於心不待形於目觸扵中不侍徴於外雖善謀慮之人無所措其思以其根於天性而已然况於父母豈待思而孝乎然吾有假假疑誤焉不待思而知情也久則怠怠則忘者情之變也故曰享太牢者不知太牢之味飯藜藿則思其美矣被狐貉者不知狐貉之温服䟽布則思其貴矣人恒在乎親側朝而怡怡暮而舒舒豈知其為樂哉或去鄉而逺遊違親既久則思生矣見食也則思親之飢遇暑與寒也則思親欝蒸而慘悽良辰佳日則思持酒而為壽嵗除時易則思親之将老而懼其愈衰於斯時也思之既熟使之養親其有不能孝者乎世之不能養者不思而不知其樂者也徳芳居京師二年思親之至不特如余所言而已也今歸而見親舉昔之所思而行之㫖甘温軟必躬進焉拜跪獻酬必敬加焉則於孝也可㡬矣雖然此思養親之謂也非壽親之道也以百年為壽者衆人皆然君子知其不足恃也久為無窮之思使雖終而没彌久而彌存故修己也則思如古之人事君臨民也則思不愧乎聖賢及乎名立於當時而著乎後世則其孝也大矣徳芳好學有美材於前之思不待予言於後之思不必予言然堂為養親而名非止於徳芳而已也故記之以告其後人思親堂記代太史公作人有情必有思同居共處日夕而相見亦何可思之有思之至者其惟乖違患難之後乎朋友至疎者也連業接席閱時月一旦而别去則怳然思况天下至親之父母乎人之有父母也優遊具慶逸暇無事朝暮不離膝下其心樂之不知有思也及乎事有不齊或出使乎逺方或早捐於館舍人子之心於是乎有不已於思者矣嘉辰美景也見人之養親焉則心惄然曰我親安在乎我何為不得養乎徬徨焉蹢躅焉累乎若無所依欿乎其不欲生茫乎天不足髙而海不足深也紛乎妻妾之奉冨貴利達之榮舉不足慰其心也豈惟是哉凡遇飲食則又執匕而思曰我食何為乎吾親不在矣視其居室則又仰而思曰吾親何不來歸乎我何為獨處此也却中席而不敢安避門閾而不敢履凡觸乎目者皆親之思也於乎此吾孟緼之思親堂所由名者歟孟緼同門友王君子充之子也孟緼為童時其父輙棄之而出仕于朝歴南康清漳二郡入翰林為待制以壬子之春衘命徃諭雲南至今七年而未復當其自漳召還時嘗過烏傷溪上省其家撫孟緼頂曰我受國恩義無顧家日爾善事母以昌大吾宗孟緼謹識之初王君治文學不事生産故廬庳陋孟緼購木作堂三楹間堂成後二年而君出使又八年而夫人卒於是孟緼之思盖有甚於昔之所云者矣乃顔其堂曰思親著其心之存且來告曰先生我父友也其何以慰我嗟乎人子之於父母不見而思固其天性也孟緼之思豈有過歟然徒思無益也思之甚而傷乎生則悖於義矣孟緼亦盍去其無益之思而思立其志乎爾父之志在乎樹功名而獲其文章之存者可見矣孟緼尚思繼其志而學焉他日茍能以功名顯乎世爾母固不得見矣爾父忽持節而來歸豈不慰孟緼之思哉夫天之於人寓懽忻於悲哀藏長養於摧折孟緼之履患難亦至矣又安知非昌大之基乎繼吾友之業者予将於孟緼是望予何以慰孟緼在乎慎之而已求古齋記生乎古者豈皆善人乎生乎今者豈皆不善人乎使生乎古者皆善人則舍今而求古可也使今之人亦有善焉者安得遽舍之而不求而必務於古乎今而視乎百嵗之前古也生乎百嵗之前者自視則今矣逺而千載之上古也千載之上之人自視則亦今矣孔子以為古者三代之盛而其時之人視三皇二帝則又為古矣三皇二帝三代以為古而其時亦嘗以為今矣然則今與古何定名乎隨人號之耳今與古無定名安知今之非古古之非今耶安得謂古之人皆善而今之人皆不足法乎故遺今而專乎古則其失為固遺古而務乎今則其失為妄固與妄其失一也君子不貴也君子之學取其善不究其人師其道不計其時善誠足稱也其人雖非聖賢不知其為不可也取其善而已道誠足師也其人雖生於吾同時居與吾同巷不以其易見而遺之也師其道而已天下之善一也古與今之道均也何以其人與時論之耶茍必惟古之求也則孔子於禮不問於老􅆅必求周公而問之琴不問於師襄必求師曠而問之官不問於郯子必求古之命官者而問之求其人而不可得則卒無所聞矣必得聖人而後取其言則荷蕢丈人之語孔子必将掩耳而過之與時人歌必黙然而不和之滄浪之孺子耦耕之隠者必鄙之以為老農小子而不聴之七十子之流必不與之往復答問而以道告之何以為聖人乎善學聖人者古之善吾學之今之善吾亦學之今之不善吾惡之古之不善吾亦惡之古之事合乎道固将取以為法也如使不若後世之美則舍古而取後世可也後世之不近乎道者固所棄也如古之不合乎道者安得以其古而取之乎曰然則孔子何以好乎古而取之也曰吾之言固孔子求古之謂善學者之求古猶良匠之求木焉木之生乎山有千嵗者矣有百嵗者矣使生乎千嵗者而材固取之也使不若百嵗之材豈以歴年多而取之乎二帝之輅古扵殷也伏羲之建時古扵夏也黄帝之冕古於周也孔子不取其古之甚者而取乎三代何歟惟其善而已孟子不取夏之貢而取殷之助武成之書取其二三䇿曽謂孟子非好古者乎聖賢之於古固如此也使聖賢生乎今之世其所去取又可知也慈溪孫君元禮篤學而慎行取孔子求古之語名其讀書之齋予喜其異世俗之學也推其說以告之使自擇焉壽善堂記天子受命之十有九年四夷既寧宇内祗肅廼下詔書舉養老之典民年八十九十者冨家賜爵有差貧不能養者日給酒肉嵗畀絮帛著為令然必有善為鄉閭所推者乃以前令從事窮山遐裔之人莫不稽首抃慄俯伏内省惟恐弗足稱詔㫖當厚恩而台属縣寧海緱城里之方兄弟二處士兄年八十有七弟年八十有三平居以友睦稱於族篤行聞於鄉未嘗疾言怒色有毫髪之過至是人無賢愚咸謂求可稱褒顯之意者莫如二處士蒼顔皓髪服古冠裳相與談笑一堂之上亦以晚際盛典為幸宗族舉酒為壽有立而言者曰事固有可以智成力得勢取而貲售者矣惟年之修短出於天天所不與雖有陶猗之富趙孟之貴不能延其年於須㬰力可以扛九鼎辨可以動萬乘欲使其身無疾痛而不可致豈非由乎人者可以幸得而本乎天者非人之所能及乎今二處士各年餘八十可貴也年俱髙者或有之而出於一家之兄弟尤可貴也兄弟俱壽者已為難矣壽而皆有善徳純行稱明詔之所褒寵如二處士豈非郡邑之所無求之當世果可多得乎是則非特為宗族之榮華實可為聖世之美觀昔之以年稱者如商山之四皓洛之九老壽者雖多然非一姓也兄弟之友睦者若漢之姜氏魏晉之王氏雖賢而未聞其皆有年也今吾二處士獨何以致此其可不知所自乎洪範之陳五福不惟以壽考為美而必曰攸好徳盖徳薄而壽則年不足多有徳而夭則澤不及施皆不得謂之福今二處士兼是二美可謂俱全請合壽與善名所居之堂以彰二處士之徳以侈聖世尚年嘉善之恩且俾登斯堂而聞二處士之風者相率勉為敦睦之行革鄙薄而復忠厚庶其有勸乎衆皆喜曰然俾族曽孫某記其語于壁以示族人子孫于無極是嵗九月望日某謹記卧雲樓記有得乎道者内不汨於利欲外不嬰於世故則隨所取而足隨所至而安隨所寓而樂卉衣蔬食處乎林泉而忻然若都卿相之位登乎耆艾而􅂱然常有嬰孺之容視天地猶一室視百世猶一朝視其身同乎萬物而萬物莫能與之偕夫是之謂至人而古之所謂神仙者為近之固不待服食而後壽滅跡人世而後髙雲卧天遊而後不可及也後之人不知神仙可自我而得往往求諸幻怪之說馳騖企慕之意勝而恬澹虚靜之功微自私之心一萌乎中其去道已逺矣何望其能有成哉是以秦漢以來學神仙者相望吾以為皆不足以得道而吳季子魯仲連張子房之流髙風絶識超乎埃􅅽之表君子每意其成仙而時往來扵人間盖或庶㡬焉夫人必有過人之行而後能抗造化以獨立遺事物而永存茍利欲之習未能大異扵衆人而獨蘄不死扵衆人異其不可冀決也縉雲曹先生異時戎馬中嘗慨然志扵功名既而若有所得悔前所為及真主出而四海清遂優游大山䆳谷間口不復談榮貴事或欲薦之仕輒不應所居重屋髙爽深秀先生笑歌其上以樂其所樂人望之以為神仙好事者因名之曰卧雲樓雲非可卧者也特以壮先生之髙致以為世俗之囂鬨汚濁者不足以凂之繇衆人而望若卧扵雲漢之上而莫能企及之耳顧先生亦曷嘗自以為髙哉先生饑而稻渴而漿寒暑而裘葛一不與人異所大異者獨其心不湼扵塵垢炳如也夫心與衆人異而跡與之同此所以為先生之髙耶其所造髙矣而不自以為髙吾安知百嵗之後不與仲連子房之徒遨遊八極而果與神仙為曹邪先生名璟字師宗予聞其風扵其子閤門郎養志養志静而温慤而文見之者亦可以想見先生之為人心逺軒記時乎隨身乎利而不知念乎天下後世者蔽扵近者也不為斯須之計而詳思千載之得失不謀一己之安而汲汲惟生民是圖上而欲續既往之績下而欲開無窮之傳深憂熟慮常若無以自釋者此非用心之逺者不能也世之人智勝一官才合流俗茍得錙銖之利達則􅍀然自負為有餘夫孰知逺者之當慮哉道之不明治之不古非人之心有異也蔽於近使然也予自京師還山南經大梁遇趙君古轍扵河南翊衛之幕府問其鄉則與予同問其業則儒也亦同既而與之論古今事淵乎其為思窅乎其為言粹乎不見其與道倍也間請名所居城南之草舍予名之曰心逺軒而謂之曰人之所以叅配天地超乎萬物之表而獨貴乎宇宙之内者特以是心為之宰耳人孰無是心也用之得其道則日月不能擅其明山嶽不能擅其髙河海不能比其容不善用之則雖有出萬物之資而終不免與萬物同泯可不知所務乎居髙位而處要勢出有車馬而食飫膏粱衆人之所樂也顔子饑餓陋巷不憂其身之賤貧而以舜自望講為邦之道其用心為何如而豈同俗淺智之士所能識哉惜夫世之不復見斯人也吾請古轍扵千載之上從而師友之克私去欲以復道心之大全博文稽古以究王道之始終會萬世為一息通四海扵一體大行則使昆蟲草木䝉其利窮居則樂之以終身埀之扵簡編豈不誠逺矣哉若夫淵明心逺地偏之詩其意固非混乎世俗者所能及予之望古轍則不止是也戅窩記士之可貴者在節氣不在才智天下未嘗無才智之士而世之亂也恒以用才騁智者馳騖太過釣竒竊名以恱其君卒致無窮之禍而氣節之士不與焉氣節者偃蹇可畏而才智者敏慧可喜可喜者易以成功亦易以致亂欲制禍亂扵未萌之先非得可畏者而任之不可也漢汲長孺吳張子布輩皆負氣自髙昌言倨色不少屈抑以取合當世視人君之尊不為之動遇事輒面争其短無所忌此皆流俗所謂戅人也而朝廷恒倚之以為重狐䑕之盜瞷其進退以為恭肆彼豈用區區之才智以服人哉人望而憚之以其節之足尚也國家可使數十年無才智之士而不可一日無氣節之臣譬彼甘脆之味雖累時月不食未足為病而薑桂之和不可斯須無之人君無可畏者在其側欲無危敗難矣余少慕古之戅者欲起長孺子布與之交而不可得則思博交海内之士以觀其所存謂余為戅者有矣而慕乎戅者未始或見豈節義之士獨少扵今之時乎抑遇合之術固有不同也今也天子懲近代之弊立諫諍風厲在位俾得言事誠得戅者出以應其求則治道可成矣同邑潘君伯理甫年七十餘而以戅名其窩豈慕長孺輩者乎扵其名可從而知其志惜其老而不獲見扵用也然有志者不累乎用舍居乎家行乎鄉與用邦國奚異焉使長孺子布為布衣亦将聞扵時傳扵後其肯泯然與庸衆人等乎君居其名師其道言論事為必有卓乎越扵世者是亦余之所慕者也願造君之窩而相與論之任重齋記浦陽鄭君其名枋字為叔車扁其絃誦之室曰任重而徴余記之余即其字而告之曰余嘗聞古之車矣其才之美同其治之工同其廣袤崇卑之制又同故閉户而攻之既成而行扵天下轍跡不爽乎分寸其所任之輕重未嘗大相逺也今則不然有載一鈞者焉有載十鈞者焉等而至扵載百鈞者則以為大車矣其材有美惡也其治有巧拙也其制之庬雜家異而鄉不同或隻其輪或短其轅或不以廂或以人駕牛馬之衡軛而都邑之塗轍跡縱横如織欲其任重者難矣古之世道徳同於上風俗同於下士有不學也學則必法文武周公之道出而施之扵位用之扵邦國雖不至扵聖賢亦不失其為君子其所任者固已重也世衰俗降人自為學家自為教諸子百氏雜然並出學者倀倀無所扵歸詭言異行遍海内而人材始萬殊矣故才止乎一邑行或可乎一鄉或事文墨而不閑籌畧或長扵治民而不知大體扵是賢人君子始不可多見繇其自任者輕故也叔車之材良矣家素以孝義聞治又工矣任重之道則在乎法古之制耳古之制莫善乎文武周公文武周公之道莫備扵孔子孔子之車以仁義為輪轂以禮樂為盖軫膏之以詩書澤之以忠恕其動如天其静如地運行如隂陽周通不窮如鬼神其所任之重者文武周公之道也當其時惟顔曽二子能具其制他如七千子之徒雖其才各殊至扵轍迹亦一而已盖自任之道同也斯世之自任者豈無其人乎權術熾而仁義銷矣驕侈作而禮樂壊矣人非不飾其車徒任其私智曲技而不任乎聖人之道猶虚車也今叔車知以重者自任其賢扵人豈不多乎雖然任重未易也不宏其中不足以容不堅其志不足以致是道也曾子嘗事之矣叔車其慎而則之茍未望於聖人之廬亦庶㡬乎賢者之歸養素齋記古之君子其逺過於人者非偶然也亦養之有素耳方其身在草野而惕然有朝廷之憂巍然有聖賢之志盖其平居凡接扵其身存扵其心者皆養也謹於取予交際得失之間以養其氣習扵禮樂政事弓矢馳驟之節以養其才行乎道徳仁義之塗講乎性命隂陽之說以養其徳觀扵天人事物之變以養其目聴扵琴瑟管絃歌誦之音以養其耳驗扵喜怒嗜好之故以養其情慎扵言語動作食息游宴之頃以養其身其素所飬者如此故加之以崇位重任處之以富貴逸樂迫之以患難賤貧其措之不難也如水之赴海日之暴物貨殖者之用財鳶飛天而馬行地也其不為物所動也猶瞽者之於色聾者之扵音其無憂戚怨憤也猶千金之子暫食扵逆旅之家蛟龍之蟄深淵𤣥豹之澤霧雨也盖其扵天下之事治之已熟故為之也優扵得失用舍之理識之已明故不以所遇而變宜其過人者逺也後世之士飬之既無素居位則病扵為處下則病扵守習聖賢之言而躬庸人之行襲君子之名而取世俗之譏上常患乎無材下常患乎無師豈其性之不若哉莫之飬而戕之者衆也予求扵所知得一士焉曰金華俞君大有俞君誦五經諸子之書土田僅足以免饑餒室廬僅足以庇風雨布衣敝席人以為陋而君樂之如處公卿之位余固疑其有道焉他日以其飬素齋告予予扵是知君之果知所飬也夫䝉霜雪而不變其色者必非驟長扵春夏者也處貧賤而不失所守者必非僥倖扵利禄者也若俞君之為其亦近扵古之君子乎余故以君子之自飬者告之飬素齋記代太史公作金華俞君大有敦愿而有禮好古而能文文聲動縉紳間雅不喜自耀深居退處若能遺世者所居之齋題曰飬素凡其所為文亦以飬素加之其言曰世道之降也我知之矣雕榱刻桷丹漆黝堊文窻綺疏錦幃繡幄者居室之華也扵我乎何加我則土壁而茅簷繩樞而甕牖匡床席門僅容仰俯以飬吾素而已狐袖豹襦烹肥膾腴青紅奪目甘膬淪膚者服食之侈也扵我乎何與我則被褐而束韋飯糗而茹藜粗糲淡泊僅禦寒饑以飬吾素而已脅肩累足拱手屈膝屏氣卑聲傾欹詭仄者禮儀之繁也我則不能惟知率情任質直躬正色無求扵人不忤扵物以飬吾素而已剽雋掠奇粉句飾辭彩雜章施為禄之資者辭文之麗也我則不為言務達志文以適意不求世知惟禮之附以飬吾素而已凡是者皆素乎外者開闢之初是謂太素風淳氣厚少智寡慮其民師師其俗熈熈故易為治而善人多也今者巧出偽作風澆氣薄嬰兒設機穽女婦事遊謔賤胥握文法富室擅箠扑訟獄煩滋世道交削然無位扵時且弗敢議也天之明徳既虚且靈寂然湛然不撓不攖故能酬應萬化洞照羣情主敬立誠與道合并以其體素也今也聲色以汨之利欲以汙之羞愧以鉥之浮詐以塗之闇昧錯穢敗厥良彛此予之所大懼而不敢不飬也彼恃其華我以吾陋彼快其侈我安吾約彼逞其繁我執吾簡彼眩其麗我守吾白去偽存真以全吾之天而反道之樸庶㡬立乎两間而一無愧怍也乎同郡宋濓偉其言髙其志避席唯唯書以為記守素齋記天下之事無難易應之扵卒然之頃則恒不足發之扵固有之末則每有餘古之君子所以大過人者豈恃其性質之異哉譬之千仞之木萬金之家其生植蓄積累自嵗月而起自毫釐故撓之以疾風迅雷而不為之變虐之以衰世惡政而不失其常非若拱把之材稗販之富之易為起滅也以之化人善俗則素有其行以之議大事㫁大疑則素有其才以之處乎窮達得喪禍福死生之際則其道徳素有以充乎中加之扵百僚之上顯融之位則其聲聞素有以服乎人由是而成功名扵當世豈不易哉後世之士少之為學非壮之所用口之所習非躬之所行平居無事講切濯磨以治其業既一反乎古一旦變故出乎其前愕眙相持歛手而不能救甚而冒利以忘義貪生以害仁進則不足扵為退則不良扵守治道衰而人才益下非以古學不修故耶國家深病乎此更科舉學校之法思以振作天下之奇才而用之歴年既乆而猶有乏人之歎豈特期用太速而飬之無素哉而師儒者與有愧焉漳之龍岩有士曰林先生原亮好古而䆳扵學以朝命教授于台荘恪有矩度未㡬而士習為變先生欲以身率之扁其退休之齋曰守素以勉學者使知為學不可無所守自守不可無其素夫隄防素修則不憂水潦之灾戎器素飭則不憂疆場之警士君子以其身任當世之重世不我用而才有所遺則其責在人任之以事而無以應之則其責在我使世有受其責者則非士之過矣彼或以吾為足任而吾之素守不能厭天下之望豈非士之辱哉古之聖賢所以孜孜若不及者以徳不素具才不素習則不足以佐天地之遺闕開萬世之治平是以劬躬殫智而不敢自逸今以衆人之資而没溺扵流俗之學旁求泛取以為可應當世之務而無一定可守之成說存乎心不幸出而任人之事㡬何其不困且躓乎此先生之所憂而名齋勉學者之意也吾觀乎世之師儒亦多矣以己之昧導人扵愚恐人之有知而率之惰媮其去先生豈不逺哉扵是齋也可以觀先生之有志可以知吾郡之士将有所成且可以見古道之漸可復也烏可以不書復齋記天台洪子宦學扵河南不歸其鄉者十餘年杞人聞其徳業之著也執經而師之滿門洪子好學不懈名其講學之室曰復齋客見而言曰洪子之復将懐歸而欲復其鄉乎抑亦欲復其天性之善乎夫復貴乎不逺不逺則無悔今洪子之去鄉已逺矣為日已久矣田園已蕪矣室廬已敝矣昔之相與者已䟽少者壮而老者亡雖欲復乎鄉奚從而復之若是則洪子殆欲復其性矣乎夫性受扵天者也雖蔽扵私而間扵欲義與利之相去非若台與杞之相邈也一念之萌決然舍彼而趨此非若欲行數千里之難也撤其䝉昏而昭昭者存非若去鄉之久而有遺忘也然則復之易莫過扵復其性者宜乎洪子以之名其齋也洪子聞之以告方子方子曰子以復其鄉為果逺而難復其性為果近而易乎夫舜禹之事功周孔之徳業率是性而為之者也庸衆之蚩蚩憸狡之卑卑失是性而不知復者也自衆人至扵聖其相去奚啻萬里而豈止若自杞歸故鄉之難哉子欲歸則具舟車載糗粮越旬月則可至矣欲至乎聖夫豈旬月所能及耶洪子矍然曰復性之難若是乎方子曰雖然有一焉復有道得其道則易失其道則難使子欲歸乎鄉而不循當之之路則終身不能至循其路而怠且息焉則至也不可必誠能不失其路不懈其力以聖人之說為車智以辨他岐之惑仁以體萬理之全而勇以行之則扵復天地之性也何有古之人有由之者顔子是也克己復禮而從事扵視聴言動之間得復之道莫尚焉是以復之初九顔子以之今洪子之為人信而通愿而文扵學顔子有其資矣它日復顔子之復而復乎故鄉予或倦遊而歸且将問途焉而况杞人乎扵是洪子謝曰聞其難也可以厲吾氣聞其易也可以果吾志請因以為吾齋記遺安堂記孤介之士離世自適而以利禄富貴為致禍之具志扵用世者騖扵可欲而以守髙不屈為致窮之術是二者之論皆似也而皆未合乎中道古之君子居乎位者衆矣其子孫食其餘澤大者或為封君逺者或數十世而不墜豈誠能致禍乎隠居行義茍無歉於心道徳信於當時名節埀扵将來其後人被服其遺訓卓然自立扵天下世未嘗乏也豈果無以遺子孫哉劉景升僣竊扵衰亂而欲以區區之勢誇龎公其意固隘矣龎公笑之言曰世人皆遺子孫以危吾獨遺之以安盖為景升發也由後世觀之據一州之地智不能取仁不能守身死未㡬而雄豪有力者逐其子而奪其位孰若􅅵畆之安哉龎公之言其取驗也速矣然非所以論出處之際也當景升之時使有髙光之才居方伯之位将使天下皆安而况其子孫乎龎公雖賢安得而輕之公之輕景升盖輕其無定亂濟民之畧而以富貴為樂也以富貴為樂而無憂天下之心能保其身則幸矣及其敗亡其子孫欲為奴𨽻尚可得乎故無道而富貴者皆龎公之所笑以為至危者也若夫有道之士則不然其隠也有以淑其家其仕也有以澤乎民故其身無徃而不安其子孫無之焉而不食其報吾天台龎参父以公之逺裔而名其所居之堂曰遺安貽書緱城里求予記之或疑参父非隠者而其堂名必襲祖訓殆以隠為髙是未知龎公之意亦未知吾参父之意也欲安其子孫者其要莫大乎為善無位而為善其事難而為功狹有位而為善言脱乎口而民懐其惠仁發乎身而化行乎俗若決水扵崇山而注之澤浩乎其孰能制之世之嗜利行私而不顧者皆未知為身謀者也奚暇計其子孫之安與否乎参父積學明世務以進取為事而欲遺子孫以安其所存者得先人之意多矣余家與参父之鄉邑比而壤接知龎氏之為名門也稔矣参父素力扵為善繼自今以後越之東南世厥家聲者又参父所遺之安者哉存耕軒記古之仕者将以行道後世之仕者非惟道不足以行且播惡扵衆此仕所以難也三代之時為公卿大夫者世其家累數百年而不替豈天獨厚之哉盖世修其軄而善之及物者深逺也自吾有知即考論前代之故事未嘗見有處大位之子孫能守其富貴而不變者盖思其故造化者之生人猶天地之産物巨木之下禾黍為之不滋享太盛者衰必隨之此理所必然志慮之士所以避棄榮利而不敢居者恐善不足以及物而不利扵後也臨海李君惟正自其少時即以才識見重扵當世嘗有官位既而棄去居金華讀書學以自娱取賀水部語名其室曰存耕或勸之仕不應指存耕以示之吾觀惟正非不能仕者其慮宻矣豈世俗所能識乎世俗之吏乘其位而掊取虐歛惟恐不足此其為身謀則可矣其如子孫何哉彼之志非不知其不善特以天道幽逺不可徴也而為之而不知卒不能免也惟正棄可必得之位而與細民伍猶宜黍之地休而不畊則已耕必致数倍之穡李氏子孫其有富者乎吾将扵是觀報施之道焉娱静樓記台人謂山川環複之地為奥去寧海西北五十里曰理奥地之尤秀美者也張氏世家其間其土深以腴泉甘而木茂其民敦厚無華力作畏訟以食勞自足為常而張氏子孫多習禮好學衣冠有制言語有則不與恒民等故縣言聞家推張氏與余交者元望質而通和而直善士也余因元望益信其家之多賢今年余友郭士淵與余言元望之兄懐濟作樓以據溪山之勝率昆弟講學其上名之曰娱静願得予記之予因士淵而愈知張氏之賢有所自也天下非無才也而恒病乎不學學者非少也而恒患乎不知道使有才者皆明乎道天下有不足治况於家乎三代以還二者不能相兼謀畧事功者流而為詐居正蹈義者不良扵為凡以學不知道故也智可以綜萬物之變而不詭義可以拯生民之戹而不伐舍則弛用則張不以貴富動其心者其惟諸葛孔明乎孔明學術不知其所承傳然豪傑之士得于天者固不待聞扵人而後知也孔明嘗謂學必本乎静才必成扵學其言得聖賢之意盖其所至深矣懐濟之有取乎静豈亦以此乎天地之初事物之始性情之中静也而未嘗不動也憧憧然出入與日俱至者動也而未嘗不静也復乎徃乎而孰為之宰乎盈乎縮乎而孰司其始乎是道也吾與懐濟終日由之而不思其故可乎世之慕孔明者衆矣求諸外而不求諸内雖盡孔明之所能者而學之亦妄而已茍得其内則聖賢可㡬矣於孔明乎何有吾邑固多異人焉知無慕孔明者乎懐濟兄弟知所尚皆有長才不在其身将在其所友懐濟其隂試之聞予言而抱膝長嘯者必其人也觀海樓記中國之地南至吴越而盡吴越之東南際海而窮寧海陳君與文所居直海濵因作樓以據髙爽臨溟渤暇日登覽以舒憂娱情甚自適也已而坐微法謫蜀江上思其故鄉不置蜀人與之遊者多為賦觀海之詩與文間持以歸属其所親善者語余曰子居亦並大海知海者宜莫如子請為記之嗟乎人之與人同也余與與文皆越人又同也然與文之所存吾不能知况無涯之海余何自而知之何從而言之乎雖然由其異者而觀之則人之與我不能以相合由其同者而觀之則萬物可視為一身茍欲觀海之形其茫洋瀰漫浮天地浴日月抗隂陽以侔大敝古今以為夀者章亥不能測其數海若不能述其㮣荘周不能盡其辭茍識其理則浮漚流沫舉足為學者師吾試與與文觀海扵形質之表可乎彼其倐焉而盈忽焉而涸進退消長與時升降者能知其故以處貴賤富貧榮辱禍福之際則可以忘得喪捐憂喜浩然而無疑矣彼之無所不下以成其深者能以之為法則可以自卑而下人以成其徳彼之兼容汎受不擇細大暴以久旱而不滅灌以洪流而不加者能因之以廓吾之量則可以容衆飬人臨大事遇大變而不惑扵其摩盪涵浸之勢可以作吾氣扵其恬波怒濤開闔變化之態可以發吾文扵其生育濡載之利可以推吾仁是則得扵觀海者亦多矣與文之居斯樓也其亦有同焉否乎吾聞蜀人稱與文處憂如平時無㡬微見于顔色此其扵海也殆有得矣斯可記也若曰燕安之餘為一室以自快扵山阻海澨飲食游觀而恣其般樂嘯傲以逸其身此直庸衆人之事余焉敢為與文願哉貯清軒記清氣之在天地間得其純全之會則為聖賢人得其澆駁之餘則為庸衆人以庸衆而視聖賢之資疑乎有髙下懸絶若終不可以企及然而聖賢未嘗以庸衆限人而不使其入扵清明之域者盖以五性在人猶水之在扵器器有汙潔而水之清初非以汙潔而加損也聖賢之扵性譬若以至潔之器受水而恒以静居之故其為水也可以鑑秋毫而察眉睫衆人譬以汙器受水而又動淆之則水始有渾濁而不足以自鑑矣故善學者積澄濾之功以變其渾濁而反乎至清則衆人可為聖賢人亦理然也今夫静閒之中觀乎雲霞之卷舒星辰之森列入乎山澤而玩夫泉石之秀潔松竹之髙茂其心未始不有翛然出塵之意及乎事變之陳于前利害之交激吉凶之揉錯向之翛然者則已填襍穢汙化為泥塵而不自知謂之善學不可也余嘗行乎四方絶江泝淮以達于河濟舟人取水以給炊釜得其清者固已不煩澄濾而自足得其濁者則置之一器以俟其清然後用向使怒其濁者而棄遺之又烏能知水之性而盡水之用也哉吾是以悟聖賢之扵衆人亦舟人視濁水若也天下之水本清而至扵不清者非水之罪也人之性本善而至扵不善者非性之罪也臨海留賢里澄溪修竹之間有屋翼然臨于方池之上者包氏之貯清軒也軒之處士曰仲游使余記貯清之意余謂環軒之水泉草木可以娱耳目而寓散閑者衆皆知其為清而清自我出不必為包君道也存乎方寸之間使得乎天者泓渟洞澈可以酬酢萬物而不為物所淆包君安可不聞此道邪余受氣甚濁竊有志扵聖賢之學患朋類少不足以反乎至清包君方肆意扵山澤有室可居有書可讀茍許余為忘年交尚相與講之菊趣軒記人之嗜乎物者必有樂乎物樂焉而弗厭非深有得乎物之趣者不能也好權者之扵位慕利者之扵財竭思慮殫嵗年孜孜求之而不止彼其為趣亦有所樂矣而曠達之士以為非孟嘉之扵酒阮孚之扵屐支遁之扵馬舉世之所尚者不足以易其好其所得之趣亦可謂深矣而髙潔之士未免以其所樂者為累盖人之心不可繫扵一物茍有所繫而不能釋雖逸少之扵書元凱之扵左傳李賀賈島之扵詩當其趣之自得以為雖萬物莫能易及其流扵玩物而喪其天趣則與好世俗之微物者無以異惟君子之知道者則不然在我之天趣可以會乎物之趣已有以自樂而不資物以為樂召公之卷阿曾㸃之舞雩是曷嘗有聲色臭味之可以適乎情而快乎體哉縱目之頃悠然有會乎心忘己以觀物忘物以觀道凡有形乎两間者皆吾樂也皆有趣也而吾心未嘗留滯于一物也夫是之謂得乎天趣後之士知聖賢君子之樂者盖有矣吾嘗扵陶淵明有取焉淵明好琴而琴無絃曰但得琴中趣雖無音可也嗟乎琴之樂扵衆人者以其音耳淵明并其絃而忘之此豈玩扵物而待扵外者哉盖必如是而後可以為善用物會稽張公思齊氣清而志美好學有長才少喜淵明之為人營别業于玉芝山中種菊釀秫名其居為菊趣軒及遇聖天子擢為陜西布政司左叅政去林壑而處公署之崇嚴覩園林之靚麗無復隠居之適矣猶揭菊趣之名不變或者疑之予以為琴而無絃猶不害淵明琴中之趣公茍得菊之趣豈問身之隠顯與菊之有無哉菊之為物揚英發秀扵風霜凄凛之際有類乎盛徳之士不為時俗所變服之可以引年扵澤物濟世之功又有類焉公之趣誠有得乎此處富貴而弗盈臨事變而不懾御繁劇而不亂推其所得者于政使數千里之民樂生循禮躋乎仁壽之域則公之樂果有出扵菊之外者矣夫樂止夫物之内者其樂淺樂超乎物之表者其樂深淵明之属意於菊其意不在菊也寓菊以舒其情耳樂乎物而不玩物故其樂全得乎物之趣而不損己之天趣故其用周嘗試登公之軒誦淵明之遺言而縦談古人之所樂則夫淵明之趣果属之公乎属之我乎尚幸有以語我哉遜志齋集卷十六
