body:
  text: 祭文誄哀辭祭太史公五首丁巳之春公歸金華六月載途公歸於家公曰美哉子來孔時斯文有傳非子誰宜我觀海内亦有作者非言之難知道者寡古人為學惟道是明繄我望子豈以文名拜公之言服公之徳從公三年忘寢與食公曰卓哉才器之奇加以嵗年吾且畏之孰俾師友傳之子孫意欲甥我以承其門歸告祖母祖母不可吾老娶婦欲其事我道路阻邈其歸無期且貴非偶汝固以辭此言未聞公家遘難聞之涕泣夜不能旦百口徙蜀與戎羌隣重走金華謀公弟昆欲徃省公中以故止祖母速歸得娶閭里遲之三載黽勉以從死生莫知以此負公公之為教必本禮義違親絶俗固非公意公今薨矣我存如何所肯忘公有如江河公之道徳未白於世公之文章㡬與公逝思公體貌尚寓于䕫哀公子孫桑梓是懷闡之雪之俾大以光導之扶之使之大行告於天王返𦵏以禮脱其羈縻使復閭里或周其囏或開其昏凡力可為不忘公恩第愚不肖弗敏為學天容地負懷公奥博忠義大節道徳大原庶㡬努力法古聖賢公之望我盖將在此天未可期心則已矢公神在天亦我之思我辭告公寧不我知嗚呼九鼎大吕不足炊糜陳於郊廟可鎮華夷麒麟騶虞不能服駕出於山藪可瑞天下盛徳之士邦家所毗潛功隠澤不見施為方其在時衆或未識厭世而去智者痛惜嗟吾先生全徳邁倫盡性蹈道卓然天民文傳海内世謂止此遺其粱肉貴其糠粃先生所存我何敢知使享眉夀人必賴之今也既亡民實無禄寥寥聖道疇引疇續昔始懸車學者滿門意謂小子可屬斯文嵗月㡬何忽十三年鈍拙無成實愧於天薄宦山南地隣西蜀遺孤萬里傷我心目身拘職業詎曰能來獲奠一觴豈非天哉道之廢興允匪人為曷以為報不負所期士不知道以勢為榮天貴不存寵辱易驚卓哉先生洞鑒千古駕雲乘風與造物伍聖主庸之掌制玉堂匪公之華邦家之光羣言讒之置於巴蜀匪公之尤民之無禄正襟談笑瞑目伸眉浩然無愧處險若夷貴賤去來靡貳靡忒孰能與偕忠信之積惟公忠信海内所稀謗與身亡徳為世師顧余小子寡聞不肖茲粗有知實公之教繫官山南今且八年公墓在䕫欲徃莫前友生南歸舟過墓下遣致一奠省視松檟大江滔滔惟海是宗我心所懷曷有其窮嗚呼哀哉尚享嗚呼我年十五始誦公文厥後五年登公之門公實天人遊戲世俗粃糠死生談笑榮辱利祿刑禍不入於懷獨憂斯道未見英才聞人一能欣喜動色晚遇小子自賀有得致政蘿山館置於家細析密㣲大包幽遐庸言極論莫匪正學翼孟宗韓沿洙遵洛簞瓢陋室若飫萬鍾訓物刑家惟孝惟忠天作奇殃去鄉徃蜀萬里西行怡然瞑目當始戒途告我以書勉以道學為君子儒慟哭山中忽復十年思公之心上通乎天一官蜀口葢亦天意承乏校文私情幸遂公墓於䕫拜謁靡遑孀孤滿目興我慨傷收恤教養後死之責祿薄力㣲有願未獲公之屬望夫豈為身將纘斯道以開後人雖愚無能志尚未已報公之徳庶或幾此大江流東卒與海通公神在天曷日其逢闕公之量可以包天下而天下不能容公之一身公之識可以鑑一世而舉世不能知公之為人道可以陶冶造化而不獲終於正寢徳可以涵濡萬類而不獲蓋其後昆其所有者皆衆人之所難勉而未嘗自以為足其所遇者皆衆人之所難處則快然委命而不置乎戚欣此公之所以跨越前古拔彚超倫控宇宙而獨立後天地而長存者乎世烏足以知之徒傳誦其雄文執其詞者惑其意得其似者失其真彼好慕者且若此又何恠乎臧倉與叔孫宜夫公之厭斯世而不居甘逺跡於峨岷蓋將弔重華於九疑唁屈子於江濵而不忍汙乎流俗之埃塵也然則公固以死生榮辱為夢幻得失毁譽為浮雲六合之内孰非其第宅薦紳之士皆若其曾𤣥尚何窮達之足云乎吾獨悲嘆而不止者上以憂乎斯道下以憫乎斯民愧受恩而未報懼來者之無聞嗚呼哀哉公其舍此而安之豈其與形俱逝與物同泯乎吾猶彷彿見公騎風馭氣鞭日月而叱星辰遨遊乎崑崙之野出入乎無窮之門是蓋處乎世者止七十有三年而不死者不知其㡬千萬春其遇乎人者雖若艱危而可痛而樂乎天者不可數計而具陳而吾猶噭噭哭于山巔與水濆是皆公之所笑而奚能酬教育之厚恩嗚呼哀哉列泰華以為殽注滄海以為尊吾知公之不我顧而庶㡬可以報公者習其所聞以求不負乎明訓行其所得以冀有益於黎元酹皇天與后土尚同鑒乎斯言嗚呼務遇合者或貴顯以終身而為天下之所惡負大名者多困阨於一時而為後世之所慕蓋利與善不可得而兼而公論必久而後定故也考乎公之平生道徳冠縉紳而位與衆人同列文章燿夷夏而家無百金之富卒之速讒遇斥奔走顛沛而死於道路孰不尤聲譽之不祥而取造物之恠怒哉然身既没而人主之知愈深家既破而子孫之守益固是以親王之賢覽遺文而歎息懷舊學而眷顧詢形容於圖像想儀矩於趨步已賜賚乎孤􅄔復閔悼其墳墓為王謀者惜公厭世之太早為公悲者恨王至蜀之遲暮也夫盛衰禍福之理聖賢有所不能違惟其既死而猶存愈逺而見思兹君子所以異乎衆人不啻若麒麟之於狐兔也某學道無聞受業有素仰徳容之如在嗟嵗華之易度兩瞻岷峨濫跡鵷鷺愛縁丈人之烏術等千金之瓠惟嘉殽與清醑皆賜物而匪沽上以昭乎厚恩下以寓乎衷素鳳飛赤霄百鳥朝之或集於枯鷃雀嘲之蛟龍天遊雷雨九土一或泥蟠蛙蚓獻侮古之賢豪身居廟堂耄倪稽首望其餘光一朝失勢遭讒遇斥羣兒樂禍謗毁山積惟太史公間世之英國之蓍龜人之典刑洪武初載光膺天寵名聞夷夏内外風動衣冠如雲趨拜於門有得一言寳若璵璠不幸西遷瞑目江澨麟踣而亡羣犬交吠物之見恠以異於常衆人不知吾道乃光賴兹賢王誠明濬哲興懷先正追悼黄髮意欲起公論過規失每觀遺文軫䘏㷀獨惟君知臣惟賢知徳王言既出讒妬自息公之名績終古不磨鬼燐紛紛如日月何小子無能蚤承教育不鄙其愚千載是託嵗月遄邁忽二十年志大無成懼辱公門俗論之悲夫豈待辨九原聞之當笑其褊青城矗天羣僊所都公神不亡其在兹乎祭太史公遷𦵏文嗚呼盛衰得喪之際孰非天哉榮辱出於一時者雖有幸與不幸而是非之公原於天道者終不可以勢屈而利回當變故之初興先生恬然委順於長江之涘荒城之隈雖樵童與牧婦亦為掩涕而徘徊意謂平生之徳業將與祿位而俱頽孰知雲收雨霽星斗之光有若洪瀾怒濤擊撞鼓盪而不能損砥柱之崔嵬今則文辭大行於天下而聖主為之追念子孫篤守其遺緒而賢王為之興哀賜之粟帛而遺孤有賴慕其風采而尚疑其遊戲於瀛洲與蓬萊伸於既屈之餘也尚若此而况千載之後公論既定其卓絶光著又何如哉然則先生於天可以無憾而吾徒小子所以惓惓如有失者恐上無以衛翼於斯道而下無以啟迪於將來兹者自蜀告歸為位一奠吾之不見先生也久矣庶㡬翩然下臨掀然㣲笑猶彷彿想像乎盛徳與雄才嗚呼哀哉尚享祭胡仲申先生上下百載四方萬里心所敬者數人而已惟數人中少達多窮或困其始或艱其終謂天使然天實何故賢者奚為為天所惡謂為偶爾智力可圖孰云君子不及鄙夫人之所重天之所輕其所至靳宜與禍并汲水於隣終世不怒試攘珠玉挺劒相顧造化之機變怪詭奇恒以示物使物莫窺儒者多言抉發幽秘陵轢鬼神譏切天地人之至情忌人揣摩矧造化者寧不譴訶是以賢哲多困不逢百無所能乃宜公卿富貴一時電滅漚起有以自立百世不死較其所獲多寡可量肯舍八珎而取糟糠嗟若先生其又何悲不競斯須千載是貽命不榮身禄不逮嗣人以為報道不在此其中所蓄月朗日温著為文章追配古人風雲之變江海之深𤣥酒大羮粹璧精金惟所欲言無不如意聲名赫奕昭灼當世曠視宇宙奚古奚今有盡者身無窮者心凡人所難深探獨得余復何嗟為天下惜斯道不振文弊質凋環目顧之一何寥寥兹已可憾聞者嘆咨况在不肖嘗辱見知違濶㡬何墓草已宿音容儀度宛在耳目後先相禪若晝夜然敢謂寡陋不圖其傳已死而生愈逺彌燿叙奠矢辭知已是報重告胡先生墓宋元之隆天下大同薦紳碩儒皆人中龍我生後矣見之無從所不恨者以識二公二公之徳各致其崇先生以介太史以容容如江海百川所宗介如山嶽峭拔穹窿如粟於饑如裘於冬人被其利莫知其功徃者太史致政而東先生來見皤然兩翁東人聚觀曰我父兄西人嘆言邦國未空顧登夀考顧履顯融内鎮國家外服狄戎用為禎祥以誇無窮云胡皇天降此薦凶太史入蜀先生亦終百年而成一日而失嗟今之人死生無日道㣲教析孰闡孰一風俗變壞孰救其疾其頽孰扶其潰孰窒有邪有詖孰正孰黜有慕乎善孰為引掖太史之行我已失色先生之神天充地塞何能泯滅為坏土抑舒而為風鬱而為魄蒸為雨露盪為霹靂誰謂冥冥而不赫赫有戾乎理尊榮安逸人或不誅先生是殛蹈道行義屈伏困阨先生上訴福佑是錫不合於人天之所徳不遇一時後世取則長山蒼蒼鎮此南國嗚呼先生與之無極祭戴先生斯道與宋俱遷南東文獻卓然婺為之宗各尊所聞以紹大統風行日舒山立海湧有元之衰耆老淪亡惟四先生揚其末光懿文太史事明天子長山華川内外鼎峙惟九靈公逺跡自藏嬉遊物表不耀其章辟諸寳器致用先毁顧瞻四傑喪其三矣幸公尚存為學者師孰是寡佑一老不遺自昔聖賢莫不有死死有所傳禍福同軌公之表著自不可磨視彼區區何足少多前有千祀後有萬世百年之間蓋不必計人囿大化如氷在川成壞斯須安可控搏有盡之形歸諸造物其無盡者終古不没得失之理公已無疑我獨何悲傷道之㣲星辰在上河嶽在下孰扶其衰尚俟來者祭王文節公嗚呼天之於人無久不報之善人之於世無終不定之天當事變之紛綸禍福險夷倒施而錯出若不可以數推而理度及夫徐觀其後而究其所止殃慶之應未嘗不曲當其實而無毫髪之偏辟之飄風暴雨挾雷電而驟至遇之者駭愕眩惑以為無復見乎白日矣瞬息之間軒豁開朗大而山嶽江河細而鷃雀䖝魚莫不各復其常而觀光采之爛然嗟乎先生負剛徤之氣藴該博之學抱作者之宏才而遭太祖之用賢固宜得位行道以復先王久墜之興致四海於平治拯萬世之顛連何期讒夫奸豎謀孽間搆卒俾蒼黄奔走於西南萬里之滇僰百不一試而身竟死於流離遷徙之迍遭當斯之時非惟親戚鄉黨痛其不幸凡聞先生之名而知其事者靡不疑天道之叵信為之悼屈而銜寃及今皇之繼統施大惠於八埏凡英偉奇傑之士無不招致於庶位而恨弗能起先生於九原於是先生之子方以才受薦擢官太學而先生平生大節因得陳於殿陛而達於旒扆之前於以有學士之贈於以有文節之謚褒崇閔悼極其華顯自有國之初文臣之没者不知其㡬而咸莫能比肩豈不以抑之久也發必盛屈之甚者伸必長而天道之徵於人者雖有遲速疾久之異而隨其所積以為報則如符節之合而罔愆吾由是知天之可恃善之可必人患不力於為善而不患為善之無傳嗟乎先生之生也崇位重禄之榮髙車駟馬之飾雖不及當時之權貴然身没之後彼皆澌盡腐滅而無遺而節行之傳昭乎若星斗之揭浩乎若江河之流姓名之著又儼若超世而登僊乃知讒佞之排先生也乃所以成先生之美轗軻之困先生也適以表其志節之全彼恣睢於一時此光曜乎萬年而先生又何憾焉某等或從遊於夙昔或尚友於簡編情不能自已而託諸一奠奠不能哀而復告以兹言祭鄭仲舒太常嗚呼世之仕者恒以困州縣沉下僚為憾而公之所歴講殿禁林學省頌臺衆人望之若髙舉而登僊仕而通顯莫不虞危機之及以善退為難而公當廢興之運優游解組取樂林泉昆弟賔客雍容談笑者十有七年老者每患乎無所養死者每患乎無所傳而公之家田禄室廬之美詩書禮樂之富足以娯意而便體公之身道徳行業之懿文章字畫之工足以埀世而稱賢於衆人之所憾者無一有於人情之所願者無不全年踰七十考終於寢是蓋古人之所或見而今世之所未聞者也聞公之喪宜可無恨矣胡為乎而使予失聲而頓足洒淚而呼天乎蓋斯民之生不能以自立必有君子以為之望斯道之㣲不能以無弊茍非賢者則莫振其衰而扶其顛自宋之亡幾及百年顧瞻金華有光蟬聯吾儕小子不幸而弗獲見其盛時矣所得見者五六人焉曰宋曰胡曰范曰葉此數公者皆百世之士而公出乎其間與之頡頏徃復上下辨論若星斗之並明金石之相宣豈非當今之美觀哉徃嵗不淑而葉公卒胡公逝既而宋公薨于蜀范公奄去而不可援亦已甚矣不可言矣夫豈知公亦遽厭人世而歸於九泉乎嗚呼自今以徃蚩蚩之衆何所效而為善茫茫之緒誰為之繼而尚延乎然則貴而歸考而没於公之生雖可願而四三君子爭先而歸逝其於天下寧非甚可哀憐乎况孝孺之於諸公或親接其教或早受其知或陪几杖以周旋而釣游於麟溪之滸眺望於芝山之顛促席飛觴㑹一時之英傑揮毫作賦掃千古之遺篇公之處我為最久而待我尤拳拳也􅂷别而歸公執我手我視公顔以為公精强雅健當享百年之夀而余之求師取友考萬古之得失舍公門無所息肩違公之日淺而見公之嵗尚綿綿也夫孰知至今六年而不一㑹余既憂苦百罹而公翩然決去忍不少須見我以盤桓乎嗚呼當今之人知我者豈無有才者蓋鮮宜生而死宜福而禍奪功名於少壯抱空志而煩寃者相環也予獨哀公而不止得非以愛敬而偏乎蓋古道日散而天下無全人浮淺以為通而輕鋭以為儇也狼戻以為能而刻深以圖一已之安也求如公之静重而有守和平而有量居之如山發之如淵犯弗忤而怒不遷者豈非鸞鳳之於鴟鳶乎徳可儀一世而與衆人同盡何以庇我黎民子孫乎是則吾之哀公者非特為游從之好談諧之樂蓋一以閔吾之道而傷其將墜一以誄公之徳以告公之曾𤣥公其以為然乎祭呉樗菴先生余生孤艱蚤失先人何所恃賴以淑吾身惟兹先友當時之彦不予棄遺納我於善十餘年間逝者如雲四顧興嗟幸公尚存誰實無良忍速公死堂堂民望於今盡矣惟公之生玉質金聲儼如列僊温粹而清據席談笑羣言咸廢尤善為詩尚友百世酒酣意適奮筆吟哦睥睨曹劉謂不足多𤣥思妙語神搆鬼設獨得於心大呼擊節洞視天下嘆莫已知人之不知豈特其詩仕非其志未老而退彼敢欺天謂公附勢曷不與辨以死自明義弗受辱視死反輕人之有終理所必至孰能久生閲世自肆古昔所傳惟僊能然超乎物表不履憂患公昔慕願與僊為儔死而有知必從之遊人之有生憂讒畏毁公之至樂迺自今始羣愚競利一老不容使果有僊孰不喜公為公之計死未為失况享髙年踰六望七昔我先人五十而終以公觀之所得已豐吾心之哀匪私所愛哀彼流俗淪胥以敗此獨為善衆視若仇彼為不善覆謂良謀善不勝惡人事之變是非榮辱身後乃見公雖云死不死者長寧若小人溘焉而亡念昔造門公迎以笑豈知今也哭公以吊已矣我公人邪天邪悠悠此哀為誰言邪嗚呼哀哉尚享祭葉夷仲主事嗚呼天禍斯道一至於斯奇才偉士溘死無遺我自結髪出遊天下所交所事皆名世者曾未十年零落西東哀訃日聞寰海為空嗟嗟夫子博辨俊傑妙齡挺秀揚聲楚越束書上馬翺翔燕京袖出文章諸公駭驚國不可為智者所畏退處兵間初匪其志天戈南麾溟波不揚手持龍節萬里海邦蠻王島侯祗命震悚南金大貝稽首來奉帝嘉勞績俾佐一州入宰畿縣奏課最優逺郡不治陟判其政引嫌告歸寓跡觴詠當宁興歎在廷乏才近臣交薦邦憲是陪刀筆章程衆趨刻覈顰蹙坐曹謂匪吾職羣士大比兩司文衡宸眷方隆縉紳所榮云何不淑遽厭人世年齒豈多五十而逝昔我先公與公最驩我為童穉輙觀公文謂公名人非我敢見乃辱愛知不我愚賤譽我勉我待以友朋再薦而起實忝同徴舟行千里連床接膝飛觴賦詩樂意横溢公留我歸有喜有悲我以家禍重之京師公篤道義不避嫌謗小人所怯公氣益壯契濶還里于今四年嘗歸覲父一見即旋示我以文論當世士來者莫知存者無㡬意公未老士譽所宗辟雍玉堂贊徳紀功孰知此别終天莫覩忍不少留俾發䝉瞽人邪天邪誰識其因人理多辟天豈亦然凡天之生莫不有盡惟有足傳雖亡不泯才之難兼古昔所疑或工於文拙於猷為或訥於言或昧於守人之所病公實備有使得髙位以大其行何適不宜止以文鳴公文之尤自可傳世一時冥冥終古㫼㫼彼庸狡者快意目前較其所得穢若䲭鳶事久跡明公可無憾我悲吾道為天所厭既窮吾身又奪其儔顧瞻四方誰與從遊始聞公喪我病方甚不能趨哭淚滴衾枕嵗且周矣哀不弭忘纍纍諸孤若在我旁貧不能振仰愧平昔文以告哀情何有極嗚呼哀哉尚享祭郭士淵寧海為縣上下千年才士衆多實難為賢至於近世諸老盡殁天啟其端俊傑乃出嗟嗟君子蚤有譽聞在庠序間已驚其羣昔被薦書翺翔太學抗疏殿庭觀者膽落欲收其功先挫其鋩歛而不施其聲愈揚在嵗巳未余從太史至於京師閲天下士孰不奮筆自儗韓歐我程其文莫如子優辭采粲然辨峭暢達波濤之壯鷹隼之決太史好士無所不容獨奇子才稱之羣公坐受子拜以示親愛銘子先墓使永不墜嘗為我言當世多才斯文可傳莫盛於台予鮮朋友亦喜得子坐談千古大笑起舞意氣之盛自謂無儔仰首視天曠視九州子繼居憂予亦還里徃來問難情義益美遊並予轂息聯予床凡予所聞無或閟藏予之金華子將赴闕自期即歸當與子别予留子去不相聞知思子無悲謂見有期孰云君子而竟止此不與子面乃聞子死子方未死我在郡城人或訛言予不之聽或言吾子近頗嗜飲予曰不然子慎而審孰是不慎以殞厥身孰是不思殱此良人嗟嗟吾子子果死耶胡不子留俾文邦家况子之才可以用世非若文人僅名一藝吾意望子卓爾大成立言行道烜赫聲名天胡不然置子于毒困于讒搆身死名辱衆人無知謗謂子狂紛紛矇瞽烏識否臧㣲生好直匡章不孝茍㣲孔孟是非曷較子之言行予實知之一時毁譽何足喜悲賢哲不幸古亦多有身後名彰終著不朽顧瞻文獻耿耿余懷為斯道慟非予之私祭許士脩嗚呼士之自立各有所成考徳要終乃可定名子之持身潔亷粹美珠完玉瑩不見纎滓去聖千載視之若存上探其心潛與討論細入絲毫大絡宇宙豁然洞視弦發矢透洩其珍奇以謳以嬉濯人肺腸俾蜕汚卑凡厥所能無不可喜自視若虚益進不止我自識子至今七年每見輒驚常異於前愛子敬子謂子可望為哲為賢以淑吾黨命不可信道不可期不俟大成而中奪之業雖未究志則已白人實不幸非子之怍我圖其行惟世之英何以名子賢者之清使子有位大行所學辟如江漢蕩滌汚濁不發其光卒歛而藏天果何為安可揣量豈謂斯世為可厭斁清都玉房招子遊息抑謂世故勞神憊形俾子來歸翺翔帝庭埀紳簮筆侍帝左右孰謂子夭吾見子夀彼昏無知畏死樂生疲瘁其身與憂患并天實佚子非子之禍曷知其然子昔告我子之將逝有卓其言幽明之故鬼神之原從容談笑不變顔色吾復何尤子道已得所足恨者同志日㣲有善孰進疇格予非吾實無能子望我厚謂將附子以托不朽子今死矣予復何為天茍相予不負子知子喪在堂予處堊室情不可制禮不敢出惟昔曾子嘗吊子張敢取斯義奠子一觴子不嗜飲觴豈予舉侑以斯言永訣終古嗚呼哀哉尚享祭宋仲珩嗚呼死生一塗禍福一門欲知得失視其所存違道而生與死何異孰為不亡死而無愧惟予仲珩俯仰不慙求之當今曾不二三况有文章才藝之美能知子名蠻夷婦女子夀雖短所傳甚長儼乎若存不見其亡世豈無人尊榮夀考死無足稱猶賤而夭鄙夫無知右彼左此可謂麒麟不若狐鼠古之論人志行是觀窘於所遇匪人由天天之使然聖智莫易豈其不能時有順逆仲由醢死宰予族夷衮衣大圭為百世師田恒孔悝盜國欺世一時卿相千古狗彘子之獲譴或構以罪子則已矣彼亦何在乃知小人徒爾紛紛毒機既發反中厥身戕善疾能百鬼所殛灼刺鞭箠俾為虺蜮子之端直當為明神駕風乘雲麾斥無垠浩然自得何所不可下視斯世汨没膏火子當哀之吾敢子悲交友淪喪將誰與依自聞子亡心疑未決不見來歸乃抱子骨仰天驚號胷膂欲裂乖仁負義羞愧天日子家太史視我如子難不能救貶不能侍天實知之我為何人尚有可勉以贖前愆撫孤教子使不失所傳道立名耀于終古我雖不肖誓不敢忘施重山嶽報㣲毫芒成否在天匪謂必能茍有所立斯言可徴子大夫人墓于蘿山吾欲祔之俟太史還從兄不可歸骨金華尚寧其居子故所家親友祖奠告以吾言匪特子知天實與聞祭王博士嗚呼人之有生何足恃邪始少壯之美好忽衰病之侵加曾未㡬時而俯仰瞬息之間形骸已隨乎物化棺槨倐掩乎泥沙又俄而過焉但見寒烟夕照宰木喧噪乎殘鴉蓋生世之不足控持類如此雖聖賢豪傑其徳業勛名可以參天而二地知術政事可以宰制乎衆庶而安定乎邦家及其終也未始能違乎斯理而吾徒於仲縉又何為屢嘆而深嗟嗟嗟仲縉子之去我而死一何速邪憶初見子於烏傷山中妙年白晢宛如處子操筆吐辭浩然源泉之初發􅂱若桃李之方葩當時碩儒巨公莫不稱美愛惜謂翰林君之有子而嘆其持節萬里未返乎荒遐後十餘年名聞四達賢王遣使聘致于藩國因得覩岷峨之奇峭凌江漢之洶湧求先君奉使之所衰麻哭踊招徠魂爽於滇池之涯是時年踰三十毅然有志於古道而入覲王門出教郡學雄文美譽旁流溢乎卬巴及今又將十年矣新天子即位召為博士逐入辭垣編摩先朝之實録文日以肆學日以盛而士之敬慕推許者亦日以多自意當聖徳顯融之時太平之期可望而至庶㡬與子嬉遊於翰墨之林漸涵乎禮義之域蒼顔黄髪同歸里閈以婆娑何期一疾僅隔數日重入子室男哭袒而女號髽嗚呼履仁有必夀之徴積善有茀禄之報以子之先人死於忠國而子有令徳足以承其遺澤遽奪以死兩者不得享一焉其理則謂之那豈蒼蒼者不能司禍福之柄而天道或過差乎將英才異人天之所靳天既生之復欲收之左右以為光華乎抑所稟者有定分人之不能兼備猶天與之角翊者去其齒牙乎以子之淑明温厚而夀止踰四十位止登八品何至若是乖也雖然吾觀於世得於天者多則遇於人者必薄厚取於世俗之所貴者其去道也必賒子之所有者辟之球琳琬琰周鼎商彛大貝與丹砂世人欲竊取其錙銖而不可得而子并包並蓄揮揚簸弄接駟而連車所取者不已過乎貪而所得者不亦奢乎如是而又望位髙而禄侈天之於人其孰能皆然則其可以不尤乎天而自釋况有男可嗣其學而復有孫矣食也稼穡而秔稻衣也樹藝而絲麻數世享之而有餘以子為富且貴夫孰以為夸吾所憾者欲蹈道而無補將聞過而莫予加四海之内章逢之流豈乏其人疇能如子助我以中正而指吾之疵瑕過子之門腹腸糾痛而不能已奉一觴而長慟知吾心之謂何祭鄒博士士生於世或榮其身而名則辱或顯於始而困於終不惟由乎學行之臧否亦係乎遭遇之窮通惟先生之早嵗既對策大庭而慕乎論政之賈誼及年七十有六復䝉聖明被薦而起儼若議禮之申公拜為博士而俾同脩金匱石室之書聖主之待老成可謂厚矣何一疾踰半載而竟不起縉紳之士欲挽留而無從昔與先生同試南官之多士或淪喪於兵革或搆罹於凶求其壯而仕仕而夀夀而顯融文詞傳於海内姓名著於辟雍有禄以考其終有子以承其祭者蓋惟先生一人而莫能與同况乎天子憫念耆臣賜棺以華其歛賜舟而致於家此皆士君子之奇遇而先生已得之矣復何有所傷恫然俊傑之生成才也難而才之可以名世者尤鮮數十年之所稱慕一旦而失之其何能無介然於心胸筆硯之相親笑談之相接今則無所望矣聊叙哀而酌酒一以慰先生於溟漠一以寫吾心之沖沖祭趙希顔天道至神為萬化原凡得喪與禍福孰能揣較乎其間故堯舜之聖而不能必賢於𦙍子湯文之徳而夏臺羑里亦不能逺引而茍全孔孟之困於陳蔡而棄於齊梁短於臧倉而毁於叔孫夫一聖一賢豈其才智尚有所不足固亦安於天命之自然予之黙識乎斯理也久矣今獨喟然有感於希顔嗟吾希顔文學之邵足以冠西蜀數十州之士譽聞之著非庸俗所能附麗而攀援上而達乎賢王之聽次亦屢見禮於名侯與大藩衆力推而競挽數稱疾而考槃晚為予而一出不終嵗而求還冀憣然而薦至豈竟死乎空山嘗熟聆乎緒論蓋深欲以智自脱乎險艱今則已酬平昔之志願徳雖不施於天下而幸身名之粗完夫豈希顔之智足以取此兮抑亦天道之佑而偶逢其安夫屈伸倚伏之機予不足以識之所能知者守道以保身則易抵巇以徼福則難嗟吾希顔既有得於此矣其於死生之際尚何遺憾乎人寰彼憸狡之蚩蚩急營利而自殘始攘奪於毫毛卒顛隮於穽淵以彼較得失於此分賢否優劣曾何待於名言予獨區區不能忘情於一奠者交游之素師友之義聊寓哀於此文祭童伯禮嗚呼我傷時人以利勝恩珍貴錙銖芥視天倫孰如吾子愛友弟昆同煬合藏矢死靡分衆皆蚩蚩適已忘物既充厥家他人遑恤孰如吾子克廣仁術惠於艱㷀掊取則弗人厚於躬薄於奉先貴為公卿寢薦豆籩孰如吾子祠廟是䖍嵗時烝嘗其儀秩然鄙夫蓄財吝嗇自封三牲私室賔庖靡供孰如吾子待士敬恭冠蓋盈門曾無怠容彼氓寡知謂學無益騁私角慧詆慢耆徳吾子懲之聞善必式寳愛訓言如金如璧惟篤孝弟以𢎞惠仁虚心屈體于賢于賔觀于其庭長幼振振嗟我鄉閭疇與為隣予昔卧病杜門避咎子招我遊欣然為起雲林有廬其下流水謂將與子黄髪燕喜宦學于秦不見七年每以書來慰我憂悁祝子夀考以遲我旋云胡不留永閟九泉荒荒我里士習日陋誰能易之力不能救松栢之萎荆棘之茂追爾之亡我心孔疚秀目長身玉雪其顔夢寢見之儼乎其存馳觴徃奠不接笑言序徳告哀以慰子孫祭外舅鄭公嗚呼昔年䝉恩教授於梁詔歸故鄉携家以行浙水漢川相去萬里妻弱子幼欲徃誰倚公實慨然曰我與俱我女我甥疇忍棄諸道路半年鬚髪為白暨予至官靡有安宅三嵗奔走于蜀于秦挈挈西東以秋以春公屢言歸志輒不遂女曰我父去我無遽甥曰我翁慎毋我棄公性孝友和惠而慈豈不顧家事與願違南望涕泣三易寒暑念父憶弟寢食獨語謂余今嵗歸省舊廬豈知一旦送公喪車不肖無能鄉閭寡偶荷公知愛期望甚厚姻親之故義不忍離我實負公俾死及之豈無子孫亦有宗族公獨於逺云誰在目然公為人知命達生怨天尤人夫豈其情何况此邦文武僚吏莫不愛公助公𦵏祭棺美墓安送者如雲令終無憾云誰能臻心所最痛公未耄老方期事養樂公夀考少失先子欲孝靡能庶㡬事公以展我誠此心已矣我復何怙茫茫九州孰踰此苦今當出𦵏再見無期天乎有靈寧知我悲祭從兄希聲代家兄作嗚呼同祖兄弟三父八人我年最長其次惟汝聰慧祥順自少特殊識事有才迥出流輩謂宜福祿以大厥家天不可知乃使汝夭汝妻汝子皆先汝亡死而有知痛恨何極我之先君實汝伯父罷官謫役汝偶在旁勞勩扶持不形言色今之子弟如汝者誰汝之操行莫此為美先君云亡十有一年今祖汝喪重我哀苦送柩臨穴病不能行酹汝一觴永與汝訣嗚呼哀哉尚享東陽葛府君誄有序東陽為婺上邑葛氏又為東陽貴族在宋理宗時太師端獻公洪以儒術㕘知政事而其弟諒獨不大顯後贈朝奉郎君子謂其有遺徳焉越四世而處士實生諱碞字夢賢其氣端而和其道方而直其學以仁義忠信為本處士生而不獲有一命之爵年六十又五而終門人咸哀傷以為天不可知或曰不然天與人恒相勝而不能相兼受於天過厚者其於人也必薄得於人太盛者無得於天者也兼而全之者數百嵗不一遇焉孔子孟子皆受於天也多故奔走窮中國而卒不獲有公侯之位彼貴富榮極者惟無得於天故終身逸樂而無憂若伊尹周公徳為聖人位為輔相有生民以來未之數見也夫人之於萬物鮮也人而得其清明淑粹者又鮮也天下無一日而無主而聖人更數十世無一焉為公侯者比肩而賢者累百世無一焉爵禄滿行多如蝟毛而善人舉世無㡬焉豈非天之所重在此而不在彼耶今處士基上世之餘徳而天畀以仁義忠信之全受天之爵則已厚矣奚謂天不可知乎使處士生而鍾邪戾之氣操詭隨之行秉凶暴之徳雖都大位秪為細人耳其生也孰懷之其死也孰哀之其重輕奚待校耶於是其門人咸曰宜誄宜謚某曰處士受於天者信厚矣然有一憾焉使處士之善得施被其徳沾其澤者豈其㣲哉而不少試以死此民之不幸亦處士之不幸也古之悼不幸者有誄節惠易名者有謚處士之守道弗貳不亦靖乎誠篤無偽不亦懿乎請以靖懿易名而誄之可也其門人皆曰然乃誄以辭其辭曰葛氏蔓延江淮之間歴嵗二千不大而綿稚川避世吏隱以賢厥𦙍孔碩呉寧是遷呉寧有葛積久而殷侃侃太師秉國之鈞不悍以剛不懦以仁非爽于儀允矣大臣爰有良工太師之季人奮以趨獨戢以避嗜道若飴畏利猶虺世蓄不施以篤厥裔於淑處士天賦之英師聖友賢佩準蹈繩内誠而方外柔而明趍善遺榮粱肉羣經羣經紛如辭奥義鴻衆説交羅喧蛙聚螽導其指歸百川之東開塞以通實虚以充孰謂韋布綺繡之華孰謂藜糗鍾鼎奚加維義之安維道之奢萬物匪富錙銖猶多鄉有士子視之作則有善斯程懷愆斯革人恃有師天奪何亟夀匪弗崇爵則靡錫嗚呼哀哉彼末之康文駟錦衣彼徳之涼位則孔巍既掊以肥又祿而尸獨閼其逢俾澤弗施天之降哀有繁其彚或昬以嚚或駁以戾戾雖纓裳徳則弗類疇若處士天爵之備聖有尼父位不公卿賢維子輿困於縱横厚取於天人奚可損不得於人斯道乃明嗟嗟處士處困而亨弗怍於衷弗愧於生諸生纍纍如喪父兄不顯其躬而榮厥名我傷匪他傷此下民水涸於淵苗槁於田能為者人不能者天自昔已然將誰之愆古有昭則易名以謚揆行伊靖考徳孔懿薦兹嘉號以永弗墜我思徽猷是以陳誄鄭府君哀辭洪武丁巳秋九月十日浦陽義門八世之長鄭府君年七十有二卒於家卒之明日其鄉之耋老子弟相携而來哭如失父母而哀三日舉邑之縉紳士大夫皆來哭如哭親戚而哀十日之内凡數百里之中聞府君之名者皆走來吊其容戚戚然如哭朋友嗚嗚相泣而不忍去則各來告於某曰哀之而哭不若哀之以辭為其可以久而傳也吾今之哭非不哀也聲已絶而遂已矣雖欲求之不可得已故昔之人徃徃宣之於辭因其辭而著其哀雖相去千里相後千載讀其辭其哀宛然也子曷為我圖之某曰雖然昔人之為辭以哀死者於生無與其人或有天下望被其澤不幸而蚤死有文章不能致通顯而遂貧困以死或死於逆旅之舍而父母不知或非其罪而横罹夭折或宗祀之重繫其一身既死而無子孫以承之葬埋之不時祭享之無主其姓名泯没而不傳是誠可哀也故從而為辭以道情情悲闕言後而意愈深使人讀之而不能成聲歌之而泣淚沾襟今府君則不然雖未嘗澤被天下而孝友為一家之政雖不致通顯而彰大其家義聲聞乎四方家之綱紀整肅内外合族皆屏氣曲躬立兩序惟府君言是從禮焉而禮具樂焉而樂具授几杖而倚笑談其惟所欲而陳乎前是不可謂之貧困也年登乎七十夀終乎正寢子孫林立乎䟽幕之下葬以時而祭有主家有範而墓有銘夫若是可謂之至幸矣聞其事者且將羨慕之不暇而何不幸之可哀乎客曰雖然以府君之身言之固無可憾也人之哀之者豈特哀其身哉哀吾民之不幸也夫府君者邑之善士也吾邑而得善士饑有所賙而寒有所恤難有所赴而學有所師其有益於民大矣吾民之不幸而府君以卒豈得無哀乎若止哀其身則一人之私耳而豈吾之哀府君者乎某於是無以詰之也因思今年之夏拜府君於地華軒下府君不以其穉賤肅而置之賔位所以遇某者甚厚府君之卒嘗趨而哭哭而哀矣感府君之獨禮我也而不知府君之遇夫人舉若是其厚而人之哀府君者皆若是之深也嗚呼善人之有功於民也如此哉於府君而不哀以辭將為誰而哀乎况某之不文而敢惜乎府君諱渭字伯陽云其辭曰人之生死兮萬有不齊五福具享兮亦復何悲身雖無悲兮人則爾思人思何為兮喪厥表儀以義名門兮十世于兹漸仁習禮兮肅穆而熙先生尸之兮以和勝威動一誠物兮不順不違大孰聯輯兮小孰携不畏以趨兮不慢以欺言惟忠信兮左矩右䂓家法孔儼兮鄉邦是推爾紛我解兮我賙爾饑父老有望兮子弟有師嗚呼人兮胡不順頥善人之亡兮衆庶疇依將奔慟兮遐邇畢來曷為而然兮懿徳致之徳可感人兮亘古如斯嗟今之人兮胡寧不為多脱誤鄭生祐哀辭台寧海有衣冠之族曰鄭氏顯於宋之季世功徳被於民而名不大著於天下後百年有孫曰祐生而其質碩厚端秀氣鋭而才良好强記多藝能年十四五壯偉如成人挽彊御悍超捷奇俊雖老將莫不咨賞之其父豪士善相人每出遊於外歸諦視其姿狀輒嘆曰舉莫如是兒矣縉紳先生過而見者亦異之咸謂必能振其宗使充其才氣將必卓然有所立而竟以疾夭死死時年甫十有七其生也非惟其親戚交友愛之凡見之者亦與親戚交友同其愛其死也非惟其父母昆弟哀之凡識之者無不哀其不幸而哭之失聲世常疑天人之道好違而難合人之所愛者天必艱其生所甚愛者生之艱也為尤甚焉至於鳳鳥麒麟珍瑋禎異之物愛之者彌衆則或曠四海歴千載而不一生而凡為人所憎疾厭苦者不植而自長不育而自蕃若恒有以相之其於人也嚚童惡子狠戾恣睢以病乎人雖其父母亦以其速死為幸者則壯盛而無疾貴富而得志稍有才質為世所愛慕者輒遇禍患不獲與庸衆人等豈天之愛惡與衆人異趣哉是未可知也或謂人之愛斯人也必欲常見之暫離而不見則思天之於人也亦然聞其美也則愛之愛之甚則不欲去乎左右故嚚且惡者多存而固而俊哲之生也恒難其全是則天之愛人者乃所以禍之豈理也哉若鄭氏子才質之美為人所奇愛而竟不永年推之於理莫知所由致也豈天者固有所難知而美好術智端為致禍之具耶使美好術智者不夭折而底於成其福乎斯世也大矣然則鄭氏子之可哀寧獨其家與其身也哉凡有志於斯世者皆宜悼其不幸也余與之有連而不識其為人既聞而哀之復重之以辭且以慰其父云氣渾判兮挺英特姿鸞麟兮貔虎力綽秀姣兮􅖙若神巧言笑兮肅而温未加弁兮突脩鉅衆咸慕兮莫敢侮嗟靈淑兮天所讐子美好兮死誰尤既聰達兮又慧哲超㡬先兮燭𦕈忽覘簡䇿兮目電光心不屬兮久無忘學之篤兮藝孔有弦强兮轡良馳馬叱咤兮矢交飛殱糜豕兮載歸萬夫駭兮力不格古有儗兮今焉索天所喜兮才藝精詔子歸兮難久生彼嚚昏兮稔姦慝身老死兮人孰戚子不幸兮少恢奇躬夭折兮令世悲死非鮮兮貴不朽夭可夀兮奚以老嗟子死兮勿尤天天茫茫兮曷憎憐來奚為兮去疇徃英靈滅兮將安放前千祀兮後無窮賢不遇兮古所同呉氏二賢母哀辭永興呉君荃母林年二十二夫亡亡一月生君甫彌月大父繼没大母胡與林畫夜苦誓保持遺孤强暴欲脅娶林林負兒與姑逃稍長鬻簮珥資其就學學埀成而林卒胡督之益力於是呉君為知名士呉氏宗賴以弗墜予謂託孤寄命丈夫所難而二母能之因為辭以宣其哀辭曰木則有枝兮婦則有夫嗟我二婦兮獨何孤夫兮謂何兮子猶在腹為雌為雄兮吾將誰卜子之生兮幸非女朝哭夫兮暮抱兒乳夫有知兮無知相兒兮上纘遺緒夫雖死兮舅在堂子生彌月兮舅亦云亡姑哭舅兮又哭子撫厥孫兮涕泗其滂我二婦兮何為守空幃兮夜凄凄涼風慘兮中人蟋蟀鳴兮兒夜啼撫枕兮太息起繞牀兮淚沾臆夫死有言兮耳猶聞吾兒不育兮呉鬼安食婦辟纑兮姑抱兒吾兒雖㣲兮吾夫在兹孰謂余兮荼蓼余甘之兮如飴彼何心兮狐鼠乘餘孤兮謀覆吾祀跳梁瞰室兮嘯衆以呼謂余㷀兮將焉與處山之石兮巍巍海之水兮靡有涯水可竭兮石可移身寧死兮節不可虧襁吾兒兮我負來何難兮去何阻夫有神兮願為虎身寄虎腹兮免人余侮諒一死兮何難志未伸兮魂魄靡安姑夀康兮子茍能養瞑余目兮從夫九泉我姻兮我婭憫余孤兮余舍昔妾媵兮如雲今隻影兮燈夜汲澗兮手龜抱薪兮棘裂我衣首如蓬兮誰理未亡人兮何有容儀袖簮兮脱珥揭羅襦兮裂文綺粥之兮為誰式教兮我兒嗟我兒兮勿怠荒爾祖爾父兮厥聞孔彰我不死兮為爾之故爾能立兮爾父不亡夙出兮暮歸不眠兮達旦勿謂母貧兮儋石無儲吾兒讀書兮我寧不飯兒踐兮母言焚膏繼晷兮以嵗以年年忽及兮加冠文之聲兮爛然婦於姑兮相語呉之先公兮庶㡬無餒感昔兮念今一悲兮一喜兒奉觴兮綵衣翩願夀兮如彼南山將竭力兮終養母忽逝兮不還姑撫婦兮泣嗚嗚曷不爾兮死無衰孱兮不死爾盛年兮罹此毒痛孫悲號兮奉大母有孫存兮大母無苦大母無子兮孫無父孫多材兮善奉甘㫖嗟二母兮亦恐疑作孔之難誓死撫孤兮身死志完引千鈞兮一髪以手障兮驚瀾二母死兮不死有子甚文兮善在國史國史旌銘兮五色有煒下爥泉扃兮上薄星紀彼何人兮豔婦夫屍在床兮咲言詡詡傾人宗兮殞人祀地下逢之兮顙汗猶泚嗚呼哀哉家有婦兮國有臣婦死以姑兮臣死以君胡獨二母兮呉祀是存嗚呼胡獨二母兮呉祀是存遜志齋集巻二十
