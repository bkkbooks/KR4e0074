body:
  text: 遜志齋集巻十五明方孝孺撰記艾庵記春官員外郎閩潘侯某清慎有文以艾庵自號或見而疑之曰楚三閭大夫賦離騷以春秋褒貶之法施諸草木禽獸而寓意乎君子小人於蘭茝荃桂蓋亟與之而於艾獨未嘗少貸焉歎芳草之變為艾傷賢者之隨俗以化也戶服艾之盈要以斯人之莫好修也今侯之賢不取其所與者以自儗而以其所賤者自名何其異歟或從而解之曰非是之謂也侯殆取夫創艾自新之意乎夫人品之不齊惟聖人無所艾下愚不能自艾有所警乎中而輒自悔艾者君子之事也絶舊愆之萌芽培天德而日滋俾且之所存超乎昨而暮之所得過乎晝則於道也其進可量乎艾之名庵其不在是乎㑹予至京師侯以二人者之言告且曰子以為何居予曰二説皆是也前之言疑侯之亷於取名後之言知侯之篤於進學雖然謂創艾自新美矣謂三閭褒貶為當其實則未可也三閭狷者也其取物也恒偏於名而不切於用故艾在所貶繇聖賢之道觀之艾何負於蘭茝荃桂哉生民之疾無窮而藥石之品人人不能蓄所能蓄者惟艾爾病者咸仰賴焉使天下而無艾吾懼夫死者不勝其衆也較其功蓋亞於菽粟三閭於菽粟猶未遑取則無取於艾也固宜然神農氏帝之聖者也而紀其名孟軻氏賢之大者也而稱其功雖見賤三閭烏能損其美哉潘侯以之名庵必有取之矣舎聖賢不信而信三閭知侯不為也或者疑侯取名之廉夫亦焉知其取類之逺乎且先治已而後功利可及於人創艾所以治已也起疾之功所以利人也亦在侯用之何如爾若夫取諸保艾以安其躬取諸未艾以慎其終亦未為無所用也善用言者雖恒言可以成德不善用言者雖美言不免致惑然則人謂艾為蕭可也謂為創艾可也三閭賤之可也聖賢貴之亦可也予從而言之亦未為不可也於是潘侯歎曰博哉子之言非惟得我之心抑可正三閭之陋使艾有知死且不朽益齋記余始至浦陽與邑士戴君元直遇元直長身昂然顧盻峭聳酒酣談論雜以嘲笑辭累千百無澁滯窘複態鋒穎橫出氣盖一座余驚駭意其為竒士而惜余拙呐不能與之往復詰難也二年又見元直其辭謔給敏如故而為禮恭遜歛戢意若自少昔之所為者余又驚之疑其有所得而然未暇問也又一年重見於錢塘諸公名士皆在席各吐所長為樂元直攝衣坐其下俯首斂膝不發一談日暮賓退恂恂揖謝侃然趨去儼若愿慤君子及與之言皆中道理去前時甚逺而諸公亦稱其美不置余大驚而問焉元直曰吾少時嘗以醫出逰渉呉楚泝淮泗至齊魯往來公卿之間虛左而俟束帛而迎者不可勝數吾時志髙氣盛謂口舌間足以成事方以此自才而人亦多以此竒我及今揣之然後知吾之過多矣嘗聞於季父能軒君以為易之遷善改過莫善於益乃以名吾齋吾將歸而求於聖賢之學子意何如余聞之愈大驚世之任意自喜瀕衰老遇挫抑而能悔悟者有之矣未有易慮於壯强之時改節於無事之際者也予見元直於數年之中而三改其德每見異焉非有志於道者能然乎聖賢之道甚近而易行也人鮮或至焉者亦止於自足爾以元直之善改過茍從事於聖賢之道旦以為是而暮已悔之昔之所為而今覺其非雖日異而月不同可也余蓋將屢驚焉豈特一再而已矣學士亭記賢哲之處世烏可以跡論哉當草昧之時世衰道鬱抱經綸之志而不得施安能舒暢其心神流浹其情志乎故或放迹於江海或養操於山林求遺世忘累之士而與之逰其意非求其道也葢寓迹於物耳茍狥迹而論之豈足以知賢哲之用心哉當元至正中有大儒先生太史公出於金華以道德性命濟世之略為學學成而四方兵起天下大亂公知莫如何往來山水間著書以自娯時烏傷聖夀寺有千巖大師者磊落善談論喜與吾儒逰公時時過與之語輒連日夜不休當其適意時或攜笻陟崇嶺看雲起卧石床聽泉瀑聲久則大笑而别别已復㑹人見其然以為公樂聞其道豈知公者哉及乎眞人御極僭亂平而四海定公應聘而起居朝廷者十有九年累官至翰林學士承㫖年六十有八致其政而歸於是大師亦圓寂已久矣而龍門海禪師復主聖夀以為斯寺公之所嘗逰也乃以洪武八年某月作學士亭於寺之南名以公官亭為公而作也海師以某從公學俾記其事某惟昔之賢者與方外交若陶彭澤之於惠逺周元公之於常總歐陽文忠公之扵居訥者有矣彭澤惟虎溪一笑元公以鸞名溪以青松名社然不聞有所創造也文忠既去而寺僧某作亭其寺以公别號名之曰六一亭矣然亭作於身後文忠不及見也今海師時公之還而作亭亭成而公氣疆體康肩輿觀覽乎其中此固古之所無而今之所僅有者也其安可無述然六一亭之作文忠之門人蘇長公實記其事其文傳故其事著某賤且騃何敢僭冒以汙偉跡哉雖然公之跡後必有知不待斯文文以道公之志某固不得而辭也宋氏為善堂記洪武十年制贈今太史公之顯祖為太常少卿顯考為禮部尚書制詞皆皇上所親製以為公之顯榮於今皆祖考為善所致公既嚴奉以歸與其伯兄教諭君景淵告於廟祭於家㑹其族人於金華之故宅以侈上之恩而教諭君為燕居之堂適成乃取制詞之意名之曰為善所以昭先德且教後人也君子之為善固未嘗有求報於天之心然其厚薄久近各以類而應此天道之必然不可誣也自夫異端之説興以禍福鼓天下之耳目以謂為善則可以裕於身與家延及後昆而報及來世使皆有利乎報而為善於是利與善之説不明而誠於為善者寡矣夫善者天之所賦人之所有者繇乎仁義忠信而行乎家推之以及乎人大之被於衆庶皆義之宜為爾豈望其報哉望乎報而為善雖所為合於義猶為利也公之先十餘世退然處乎田里修詩書禮讓之教行集於身而不耀德施於人而不居其所蓄積者厚矣一旦大發於公之身文章被宇内名譽葢天下位乎朝廷而推榮二代潛休隠德見稱於聖主而大白於四方繇是宋氏之善昭乎如日月之不可掩其先豈預蘄其至此哉雖公亦不預蘄其若此也不預蘄其若此而天卒莫能違此善之至者也教諭君嘉厥弟之有成揭而志之使後之人取法焉亦可謂能教矣雖然教之以名不若以身之為愈教諭君年七十餘慕古人之道不怠日坐乎斯堂之上訓其子孫者甚至葢庶乎銅鞮伯華司馬康之風焉為善之澤其有既乎若上之褒寵宋氏者殆不止乎斯而已也某公之門人也尚能為公道之畸亭記人之所得皆不能全受於天者深則遇於人者必淺合於人太甚者必無所得於天也夫聽盡乎謀而視極乎哲心通乎道而性純乎德此雖皆可能之而未必皆然以其制於天而天不畀之也於此有人焉獨若有得於斯耳也若或曠之目也若或闢之思也若或起之存也若或植之凡其舉措猷為皆若隂有以助之者而衆人不與焉謂非深有得於天可乎夫其所得者既已卓然超乎萬物之表矣而又逐逐於衆人之後求其餘腥殘穢以自飫非惟人不之從而天亦不之許矣故凡特立之士多不合於人非天欲困之也取乎天者已多其不能兼得乎人亦其勢然也自古昔以來惟聖人不常囿於勢自聖人以下多不免為勢所屈詩之亡屈原之詞為最雄故原不為當時所知為最甚莊周荀況皆以文學高天下故二子皆不遇杜子美李太白詩人之絶羣㧞類者也其他以道德才藝困者甚衆夫既有得於此矣其能與彼耶負此以自珍以為舉天下之貴者不願與易人之見知與否尚何足論莊周謂畸於人者侔於天吾嘗有感焉㑹稽楊宗哲為人清慎不苟少能為詩居太學數千人中獨以吟咏自娯不求人知而人亦少知之者後得一官為成都衞知事成都在西南萬里外而知事被儒服處武弁間嗜好論議宜有難合者宗哲一寓諸詩其喜戚逸勞乖違㑹聚必有所述其言簡而深淡而章往往皆君子之道也間以畸名其亭而請予記予固畸於人之尤者也而何以記斯亭乎然人所志有逺近故所合有大小侔於天者使心之所慮身之所出皆與天合雖困猶達也畸於人何患焉向使䘮廉恥捐道義而求人之合縱至貴顯其辱彌大且獲罪於天矣其如天何哉宗哲居於斯亭笑歌自樂洞觀千古果孰為得孰為失乎孰為合孰為畸乎尚友百世之賢豪而與之俱則夫畸於人也俄頃之間而合於天者不可以數計其畸也烏知其非合之大乎希董堂記祿位高乎人者可以耀一時而不足以傳百世道德備乎身者可以傳千古而不足以貴當時有志之士將安所取則哉吾之所受於天者推之可以澤天下埀之可以法無窮非特可徼利達也使富貴而事功昭乎時福澤加乎民君子固有取焉茍徒祿位而已矣則君子奚取乎是漢儒為公卿者多矣公孫𢎞之寵祿終身韋賢之父子相繼孔光胡廣之夀考皆當時所指説稱頌以為善保富貴者千載之後雖庸人孺子皆知輕賤之董仲舒在武帝時最為不遇屢遭有力者擯斥不得立朝廷而周旋藩國以仁義道德匡正至今尊其學術以為聖賢之徒士之善尚友者每喜引以自望則夫人之眞可貴者果安在哉世方汲汲於後世之所賤而不汲汲於後世之所慕非其甚惑歟若吾秦府長史茅侯大方其所謂善尚友者歟茅侯有學行為淮南學者師考績入朝天子召對而悦之擢為大國輔臣且勉以董子輔相之業賜賚期待者甚寵侯以為布衣而受隆遇懼無以稱聖天子眷知之恩諫爭彌綸得大臣體未踰年秦國稱治因大書揭其正堂曰希董之堂以章聖訓且著其志云茅侯為人敦大和雅不亢不諂其於正誼明道之言深有得焉葢聞董子之風而興起者然董子不為人主所知其出事藩國多遇驕王故匡正為甚難今茅侯之仕也天子嘉其能賢王重其德從容規諷内外推服其所遇於是過董子逺矣雖然劉向嘗稱董子謂伊呂不能過葢惜其不得盡行其道也使董子而得大位其可慕者豈不愈多哉葢祿位者小人得之則彌貴而彌辱賢者處之則彌貴而彌光賢者非以位而貴也道施於人被其澤者衆故其譽聞益賢也今茅侯以盛年逢盛時志意偉然才氣傑然焉知其位不過於董子哉得董子所不得之位而行董子所欲行之道使天下後世有慕焉則侯為善學古人而不負天子之訓矣借竹軒記余初與㑹稽蔡君惟中遇於京師者甚久時余方抱憂患倀倀無與語惟中亦以從事至因日得相與談自旦至暮班荆列坐久之乃各罷去及訪之於南門之南草户之外有竹數挺視其楣間有借竹字余指而問之惟中曰吾雅好竹假館於茲幸又有竹故因以識吾好耳他日願有以記之予疑惟中在逆旅中何暇事此因自微笑不答而今年逰浦陽客有自越來者致惟中之言重以記為囑且謂惟中居㑹稽有山林之樂甚適予聞而愈疑之昔之京師假屋以居謂之借竹固宜也今儼然處已之室竹則自有之矣而復以借何哉且惟中茍以外物而觀則孰非借乎舟車借以載吾身者也江山之勝借以遊吾心者也膏腴非我所有借以養吾者也玉帛非我所得借以富吾者也牛羊犬馬非我所得備借以食吾者也第宅傳舎也童妾贅疣也軒冕倘來也甚而言之雖吾之身猶借隂陽造化以生而豈特竹乎茍自其固有而觀萬物皆我所固有而何借之云世之人溺於自私視世之物皆執以為已有營營乎得䘮之區而不知止何異於􅎙蜋之丸糞土乎吾嘗絶江淮而北行登泰山而望之四方矣昔之英雄豪俊髙車大纛馳騁乎名都壯邑之中田夫巷婦嘖嘖隨而瞻望之以為神人者皆是百年以來惟見斷碑殘隴狐狸窟而烏鳶號其上豈非借之於造物者復歸之㝠漠之中乎故一身之外皆借也富貴利祿加乎身者又借之借者也而人方以為忻戚不亦謬乎古之達人以百世為斯須以天地為室廬以萬物為逰塵舉天下之物皆不足以嬰其懷而何竹之足言乎余將東逰探大禹之穴弔子胥之廟假惟中借竹之軒而相與談往者之故果孰為借耶孰為不借耶惟中幸此下有闕綠疇軒記江南盛時其俗異於天下者君子修德以教野人其野人力樹藝以奉君子分既素定逸者不以為無用而勞者不以為有勤上下相資恩意交浹鄒魯之盛殆不能過暨其既衰而弊文喪質媮君子以肆野人以病清言宏議者蕩而不檢作勞食力者鄙而難使於是俗之異適足以為患然善為治者不狥俗以茍同亦不矯俗以求異因其故理而正之使宜乎人情而已中州之制異江南舉君子野人而一之則民必苦其不便周之時閭族咸有師漢鄉邑有三老茍擇其才且賢者復其身俾淑鄉人子弟德可以為師則恒民皆以師禮事之才行不能過於恒民者雖故家世族皆斥與恒民齒則民莫不勉於學而俗可美也此豈非近於先王之意乎三老之設今固有之矣德足以師其鄉而為民望者余之所願見也浦陽鄭叔器為余言烏傷黄君公謹以學行重於鄉鄉民有疑必問焉有愬必赴焉有乏必求焉黄君應之不倦而處未嘗不審率子姓力田以為細民先闢軒於堂左命名曰綠疇示民以弗懈也君子常患乎不知稼穡野人常患乎不明禮義使無二者之患天下寧有不治乎黄君居君子之位既有以教民又率民趨所宜務此南國之所鮮也因其所鮮而旌之民胥效其所為君子不肆野人不病豈不始於茲乎惜予力之未能也夫闢一室不足以書有以名之亦未可書至於俗之盛衰其端微不宜不書也故具識之使人知黄君果君子也時敬庵記禮有因時而宜變者固不以出於聖賢而皆從之也夏商之禮定於禹湯伯夷伊尹夫寧有過哉周奚為而損益葢以時之相逺也周之禮去後世愈逺宜損益者多不幸而繼之以秦漢秦不足言乎禮而漢又無卓然大儒可以損益者定一代之制時君雖緣情有所創建德不能勝其位人不之信而競攻之故周禮之用至今文武周公之所為宜若不可損益也使有聖人生乎後安知其果無損益哉禮有不可變者有不容不變者不可變者本也不容不變者文也以本視其文則為拘以文視其本則為愚墓藏而廟祭周禮也漢之時有墓祭葢以情起者其文不同其本於孝敬與周何以異言禮者以其出於漢也多辨而非之非之非是也墓而藏者體魄也廟而祠者魂氣也魂氣無所不之奚獨可祭於廟而不可祭於墓乎人子之於親食其器則若見於羮入門則若坐於寢逰則若憑乎軾臨淵則若立乎涯於其足迹之所厯念慮之所及皆若見之况於體魄所藏而有不思者乎思而其魂氣有不集者乎因其魂氣集於思即而祭之不可謂無禮也從而廬之亦人情之所不能已孝敬之道也焉可深非也哉然廟祭者常也祭於墓者循情而制變也常而不敢忽乎變者君子之事厚於墓而䟽於廟此則非可也永康朱君世庸既葬其親于里之獨松原嵗時省焉則慨然悲視其草木垣域皆若見其親然曰吾親安知不在是乎遂菴於墓之旁以時敬題其額當省之時則致敬焉葢合禮之變者因徵記故為之言使知變而不失其本聖人所不棄也慈竹軒記昔年拜漢中之命有令至家與妻子偕往嵗暮抵鄞時天甚寒日且晡小舟循城行十許里逆旅舎己閉門遙望崇墉高棟有室翼然舟人指曰此張君敬輝之居也張君素善養母好客喜事遂使人先焉敬輝出迎客其母立堂上侯妻子肅以入張燈具殽羞酒數行諸弟侍側皆整飾不凡明日予見其母豐下秀眉出言溫溫敬輝因為予言少䘮父賴母氏以克至今諸弟皆有婦抱孫矣正堂北種竹數十百箇滋植茂甚母悦之因名侍膳之所曰慈竹軒願得畀一言余笑且諾至官所三嵗矣往來乎南北無一年之休未果為之言而追思其地與其兄弟未嘗忘乎心也今年較文於京府季弟自家來㑹復道敬輝之意余少失二親今惟庶母存亦老矣伯氏多病不能出門庭者十餘年季弟來寄詩數十章叙離違之情以歸田為望讀之悵惋流涕滿紙欲暫歸省而不可得其視敬輝母子康健日率諸弟婦子躬執盞斚上夀相怡愉身不渉憂患之塗耳目不接危辱之事食有稻魚衣有枲絲無求而自足無媿而自適其得失為何如而余何以為敬輝告哉雖然敬輝之所得非敬輝之工也余之不若敬輝非余之拙也命有以賦之焉耳命之所定雖聖賢不能違聖賢之所樹立雖命亦有所不能制也故困於陳蔡奔走於四方不遇於齊梁毁於武叔臧倉此天之所以制聖賢也明道立德揭天地之蘊開生民之惑而光耀於無窮此聖賢之所自為雖天莫之能與也敬輝學聖賢之道其尚無以得於天者自慰而以未能成於己者自勉或者天假佑之閔余母子兄弟之暌於先而俾得合於後他日獲歸休於家以叙天倫之樂尚當過敬輝之廬以觀慈竹之盛葢有日矣敬輝其待之企髙軒記以跡觀人不如以心觀人之為得也治水也播種也困窮於陋巷也茍以跡論之則烏得而茍同茍以心而推之則烏得而不同豈惟聖賢為然雖君子亦然司馬遷之感憤宏博見於文辭杜子美之忠義懇欵形於詠歌其世殊其業異論者謂二子可以並稱豈惟人為然雖物亦然金玉不同質而貴同水火不同性而用同麟鳳不同形而瑞同夫茍知其所同則尚何異之足較哉東漢之末徐孺子隠南州以節義自守不可得而衣食當世之士髙之吾邑人徐君太𤣥少學老莊書清修有志操執樂事於今藩王府予過其居題其休憩之室曰企髙勉其學孺子之為人也或者以為孺子處季世而太𤣥生盛世孺子業儒而太𤣥習道家言孺子自食其力而太𤣥衣食於國孺子不屈以潔其躬而太𤣥以一藝役於世宜無少同者而何能企其髙乎予以為不然士之髙卑在道德心志不在隠顯其中誠有足髙者雖混跡屠沽中不能害夫凌雲絶塵之趣誠無得於内雖巖棲澗飲而貪競之情不忘則亦卑汚之人耳故在已者髙矣雖富貴權寵不能奪其守而陷溺之而况古之髙士固有隠於道術者乎在己者無足髙縱逺引㝠逝欲自為髙而不能也今太𤣥之跡同於庸衆人而視其顔貎􅂱然若超乎埃氛之表不與人世相淆者其胸中之所存予安得知之哉予未足知之而世欲斷其髙下果足以得其真否乎葢謂太𤣥為孺子固不可謂其不可學孺子則尤不可也去外慕出嗜好泊乎不以天下事物汨其心而語黙取舎去就之際必審夫義焉則孺子之髙在乎太𤣥矣士患不知所企耳烏有學焉而不至為其實而無其效者乎息耕亭記方子行於越之野遇丈人焉誦而耕油然自得也怪而問之曰丈人勞苦矣何樂之甚丈人曰子勞苦吾哉而奚不自知也彼晨而興纓冠納履趨拱俯僂暑不遑褰疲不暇憩遇長值貴翼然而峙肅然而視側耳眴目如事嚴父强言假笑陽遜曲避是謂形勞披簡執䇿朱墨紛錯遺言逸典粲其盈目渉其流則若有餘探其源則若不足撐舌刺口疑端滿腹聖哲逺矣將何由質哀良已逝追計馬蹟欲知其方困而罔獲是謂學勞羣言胥攻萬牛之毛以之明道縶影以綯少者百年多止數世磨滅泥滓漫不可紀曷為不悟尚修其辭逞怪披竒窮精憊思遐觀千載竟亦何裨此謂名勞卑處郡邑尊據廊廟逢迎阿比以取嚬笑屏束學術宣敷條教物薄人澆機深穽巧寛則致侮嚴則取誚智絡氣使惠煦威釣古人之思自哂且悼是謂官勞凡此之勞亦已甚矣奚獨吾哉而子何問焉且吾之耕始也手忘乎耒而牛忘乎土今也土忘乎苗而吾亦不自知也衆人之耕也手與耒乖故躬勞土與牛乖故牛勞苖與土乖故苗瘠而土病吾今皆否焉得非有可樂者乎適意莫甚於樂而樂莫過乎心與物俱忘鳬浴乎水振翮修羽不勝樂也鷄浴乎土振翮修羽亦不勝樂也易置而强施之將不勝病矣忘其為土然後能浴乎土忘其為水然後能與水俱𠖇而不死吾今忘其為耕矣非特忘其畊且忘其所以畊非特忘其所以畊且併畊者而忘之耕者吾邪非吾邪天役吾邪吾役天邪吾且不知而奚以耕為治天下猶是也德被教洽中外熙熙能使君忘乎相相忘乎百執事治民者與民相忘則為治也可幾矣膠膠棼棼以心術相繆智計相延雖欲耕可冀耶余拱而問為治之道丈人不顧負耒而去莫知其所止葢隠君子也烏傷王仲縉為余言其兄仲言嘗學經而好耕為息耕之亭以休息焉安知無隠君子往來其間乎仲言儻見其人其以吾言質之艤航軒記浦陽鄭君仲潛壯逰都㑹盛麗之區未老而休於麟溪之故宅築室池上修廣如舟狀揭其眉曰艤航時率賔客燕息其間悠然若有以自樂而人莫測也客有歎者曰人惟内有足恃也然後不恃乎物能不恃於物然後能無物之累而物皆為吾用世之恃乎物者亦多矣珪組車馬恃之以為貴玉帛錦繡恃之以為富斧鉞兵甲恃之以為威有自恃之心則所恃者不足恃也惟不自恃者恒有而享之古之君子視衆人之所恃漫不以入其意而惟修其足恃者以徐觀乎千古之道彼非求異於人也審所輕重而較之固不得不與人異也今鄭君之家禮義可以維持數十世室廬器用可以厯數百年而不敝所畜可以惠鄉邦而人望之者以為舉世莫能抗君顧若不有於己而視其所居為暫艤之航其不恃於物可知己某聞之而笑曰豈特一室為航凡天下之物孰非航也視適意可喜之物如雲行鳥逝不須㬰存乎目者航之艤也子視子之身自少而壯壯而老曾有一日之息乎事物之接於身而浹於心者引領而承之莫不可悦旋踵而却視有可得久存而不去者乎故自人而言之身世皆航也不可得而艤也自其大者視之鉅且莫過於天地而天地亦航也亦不可得而艤也夫天地且不可恃以為固而况於人乎而况一室之間乎然天地不能自立也必有立之者不能自為也必有為之者天地有壞而立之者未嘗變也人之生有盡而俾之生者未嘗盡也噫航乎果誰為之而誰艤之乎吾將與子掇其維振其紀以求之於一氣之始則夫不恃於物者其可恃也逺矣巾山草堂記踰浙江以東多大山東南極海上尤秀絶其最著者天台四明鴈蕩天姥皆穹窿嵁峻為天下竒觀跡儗乎蓬閬名播乎區極士之選幽探勝者宜其樂趨之然而居其旁者往往終身未嘗一至豈以其崇髙不易援企而遺之歟台城中有小山特立圓秀蒼潤逺望之如人之弁冠人因語之曰巾山其上有樓閣室廬之美髙人至郡者無不往逰凡宅於左右者必搆危架迥以挹取朝嵐夕霏之異態葢其勢邇且卑矣所蘊易見至而窮之不難也是以衆樂觀焉盧處士定谷家正與山相面因名其堂曰巾山草堂定谷知讀書識義理其才智可用而恬靜不競非安於卑近者豈其心有所得鉅小崇卑固不足較乎夫天下之至崇大者莫過於道而卑且近者道亦未嘗不在也憚其難而安於淺陋固不可忽細微而慕夫髙且大者亦烏可哉故順親弟長事非逺也而性與天道不外焉堯舜之道與天準而謹言慎行可以馴致焉巾山巖壑之盛視天台四明固有間焉其有㑹於人心而人樂之不厭者果有異乎否耶定谷必有以識此矣往者壬戌七月之望予偕葉君夷仲張君廷璧林君公輔陳君元采夜登絶頂飲酒望月縱談千古竟夕不眠予謂葉君曰昔蘇子瞻夜登黄樓觀王定國諸公登桓山吹笛飲酒乘月而歸以為太白死三百年無此樂矣斯樂也又子瞻死三百年後所無也諸君皆大笑追計其時忽十五年今存者獨予與張陳耳二君亦將老矣予繫職業數千里未得歸然則於記定谷之草堂能無慨然乎定谷有子曰信慎敏而好文其尚語山靈待我東歸尚當約同志重逰因厯覽海上諸山以盡宇宙之大觀其樂葢未艾也藏器軒記無其器與有其器而不良而望用以善其事者百工之所難也今欲為室堅美之材山積於前而無規矩斧斤以治之雖有絶世之巧將安施焉使削蒿為規矩揉鉛為斧斤而命公輸成室雖假以嵗月營以智力必不能有所就故用非其器猶無器也無器而治室且不能成况天下乎仁義禮樂治天下之器三代盛時在乎位者既皆持此器而用之又教天下之士使人各藏此器於身以備公卿大夫之選是以有位者無不知道而凡民無不學道故上下相安而成治也易及秦廢禮樂仁義而不修盡舉三代為治之器焚之而用其剛虐私刻之法以挾制黔首猶以為未足復使黔首皆以吏為師而習其所為故方其盛時閭閻山谷之民岌岌不敢出氣及其衰也一旦發憤奮起以戕其君亦何其易哉用無其器上下相猜而不足以成治功無怪其然也自秦以後稱治者惟漢與唐宋其所為雖過於秦然或以小慈為仁或以似正為義或飾繁文以為禮樂其器不良欲以致三代之盛終不可得矣三代聖人之用此器也驗之於身而誠推之於家而和然後發之於政教故人之從之者信而化之也逺茍無本以行之則虚器耳人將從之乎今皇上有意崇古之治立學校以造海内之士嵗擇其良納之太學以教之以􅊀公卿大夫之選猶古之制也於是太學之秀皆奮然磨礪其器以致用自期天台李宗魯尤其傑出者也乃以藏器名其軒豪傑之士固有及時復古者矣况上之人方以三代之道望於士士可不以三代之道自望其身乎後世之君臣非皆不如古也其不足復古之治者器不善也以規矩為方圓以斧斤為斵削自三代至今無有異獨仁義禮樂不宜於今之民哉弗行耳宗魯敏而達於為政爵祿之來不可遏矣仁義禮樂之澤殆將被於今乎茍徒小慈似正而已矣飾乎外而已矣任法而已矣是豈惟宗魯不為哉亦非予之所望也草心堂記養親之道難矣以具滑膬甘美可以為養矣則饒財者皆可盡孝而古之孝子未必皆富也以備采色聲音可以養耳目車馬衣服可以養身體則崇於位者皆可盡孝而古之貴者未必皆以孝稱也以先意承志可盡乎孝則敏慧者可以為之以愉色婉容可盡乎孝則篤厚者可以為之而敏慧篤厚之士不能皆孝子也然則豈非父母之恩為至大故報之為甚難也耶故養口體順顔色察嗜好孝之末也而非其至者也必也致其身為聖賢而喻父母以道使德之在己者無可憾而名之顯乎親者有可傳然後為庶幾焉然亦難矣果能至是亦何足報父母之恩乎此吏部郎中永嘉楊景衡草心之堂所繇名也景衡早逰庠序通春秋學領薦書於鄉擢居是官京師去永嘉數千里母夫人在堂以舟車之難也不敢奉迎就養因名所居堂以見志葢取諸孟郊東野之言昔者詩人謂欲報之德昊天罔極東野亦謂寸草難報三春之暉皆善言孝子之心者也天下之事無難易惟自以為不足者所為必有成而自以為已至者恒不能進乎道景衡篤志好古以有祿位為時名大夫亦可謂顯揚父母矣而退然自託於窮人之辭感親恩之難報其不自足之意何可及哉古之君子大過人者無他亦惟不自滿足而已為子而自足必不能底乎孝為臣而自足必不能盡乎忠為學而自足必不能至乎聖賢之域景衡年尚壯强為學方未止而不自足如此推是以事君治人道德功業之成可望矣他日宦成而歸奉觴為夀使鄉人父老談事親者以景衡為法而後世有稱焉則其為孝也豈有既乎揚子雲曰事父母自知不足者其舜乎顔子曰舜何人也有為者亦若是師舜如之何亦勉於為善而已矣茹荼齋記予生七齡而喪母夫人又五年而繼母復卒又七年先公奄捐館舎葢二十而丁三艱質素薄苦多病重之以悲哀割心摧腑殆不能人竊自思悼當世之人有埀白而有父母者焉有五六十而有者焉有都崇位立大功而及養者焉不幸者或偏存怙恃焉則以為大戚矣或四十三十㷀然為孤則不自比於人矣若予者眇在童孩之中而尊親頓已凋逝雖欲自名為人尚敢望耶是以自忽忽而不寧食入口而不知其甘念昔人之言以遭喪為荼毒可謂甚矣因闢一室以居而以茹荼名之既以志其悲苦亦以自勵也追憶少時狂僭甫有知識輒欲以伊尹周公自望以輔明王樹勲業自期視管蕭以下蔑如也逰行四方考徵生民之利害揣度風俗之盛衰綜覈古今治亂之繇至詳矣將求所以試之而復自淺以為古之聖賢君子成大業立大功者天必俾之先受天下之大患渉天下之至苦故其志堅凝而不懾氣充盛而不衰智慮明而措置安不如是不足以成之也數年以來奔走屈抑於塵埃中為奴𨽻之所詈叱庸夫俗吏之所困辱心私自喜間以告於先公先公忻忻焉如不知其騃陋葢深意屬之不幸寡佑先公遽棄以去嗚呼尚忍言耶天之苦予一至此耶茍不自勉何以白先公於地下耶然患過而忘備處安而縱逸者恒情之難免也余也日處乎斯室而瞻斯名使中心常若寢乎苫塊之上立乎先公之前而與伊尹周公之徒相講説時乎遇則有以償昔之願否則折衷一家言以輔翼羣聖人之道以自立於萬世庶幾不繆先公之志也乎雖然是亦徒耳先公不可得見矣貴加乎衆庶澤被乎生民人以為榮則有矣而豈足以追父母之樂哉茹荼之名雖終身用之可也遜志齋集巻十五欽定四庫全書遜志齋集巻十六明方孝孺撰
