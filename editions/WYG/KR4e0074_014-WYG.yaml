body:
  text: 序贈林公輔序不安於小成然後足以成大器不誘於小利然後可以立逺功怡怡然自喜奕奕然自衒者豎子之雄非豪傑之士也天之所賦於我者若是其大也吾充之盡其道則可以運陽隂而順四時輔天地而遂萬物窮可以希孔孟達可以侔伊周彼或負一才挾一藝安之而自足者自賤者也吾之所有者不以禄位而加不以丘園而損者養之得其義可以與日月同其明河海同其容施之澤四表歛之善一身彼或不知自重而為外物所移奪者自輕者也豪傑之士則不然舉世推其賢而不以為德衆人被其恵而不以為功予之以卿相之位而不以為榮布衣蔬食處乎陋巷而樂之不厭非薄乎當世之事而好惡異於人也其所志者逺故常若不至内有足樂故在外者不足以汨之世之急於求名者實不足恃也切於趨利者義不明而所見者狹故也夫操不足恃之實而徼過情之名秉不當理之義而竊茍且之利内望於成已外望於立功不難矣乎余求士於今世病乎此也久矣思得如古豪傑者而友之而未之見然見可語者則以吾心告之聞吾言而笑者有之毁予以為迂者有之求其與予合者亦未之見予未甞不嘆以為豪傑之士難乎其人而有志者亦少也今年來京師始獲同郡林君公輔公輔長予一歳為文章善放詞馳騁然察其志殊不以此為足每慨然論事雜以諧笑若能輕外物者而喜談古今豪傑事以自況予每為之撫掌嗟乎斯民之困極矣困極必通上之人求其人用之而未之遇吾與公輔豈虚談哉不安於小成不誘於近利而就乎逺者大者吾與公輔志也茍怡怡然自喜奕奕然自衒則夫人皆是矣於乎其尚以為戒哉贈鄭顯則序天下之論文者嗜簡澁則主於竒詭樂敷暢則主於平易二者皆非也文不可以不工而惡乎好竒文不可以不達而惡乎淺易淺易以為達好竒以為工幾何不至於怪且俗哉善為文者貴乎竒其意而易其詞驟而覧之亹亹覺其易也徐思而繹之雖極意工巧者莫加焉若是者其為至文乎聖賢之文與後世之詞純駁工拙多寡不大相逺也而世人望之若天然不敢指儗之者以其不務竒其詞而竒其意故舉天下好竒者莫及也使其意不能過於衆人而惟詞之脩安在其為竒也哉日月之在天隮於東而行於西昏明於晝夜盈􅃜於晦朔自有天地以來未之有易也天固不䂓䂓然求異以駭人之視聽然愈久而彌新愈廣而無窮則為竒也大矣尚何以異為哉至於鬼燐之變滅不可以理推其跡雖似乎竒而其為明也微矣近代文士有好竒者以誕澁之詞飾其淺易之意攻訐當世之文昧者羣和而從之而三呉諸郡為尤甚此皆挾鬼燐而訾日月者也其力雖不足為斯文害然不除滅而禁斥之何由復古之盛乎今天子憫斯世之不逮古擇太學之士而教之吾郡鄭君顯則與焉顯則為文不好為竒而亦不流於易蓋學而得其正者也予竊有志於變天下之文而患不得友天下之賢誠得如顯則者數十軰其趨古人之道以自見於世其崇且大者可期也况於文乎今猶未之遇也烏得無慨然矣乎吾聞文與教化相上下安知今之文果不古類耶顯則誠以吾言求之有合於吾言者吾不謂之今之士也送石君永常赴河南僉事序予同鄉之友石君永常由進士高第為行人㑹今上嗣位拔用俊良其僚之長薦行人之尤者永常與焉擢為河南憲司僉事告行於余余執盞而問曰河南天下之要地治郡縣緜亘數千里而憲司操其平人有不得其願欲者必赴愬焉子之為政也奚先永常曰於賢者愛之保之如圭璧惟恐其或見傷如黍稷惟恐其或無成於不肖者則斥而抑之不使其有立也芟而剔之不使滋且殖也若是何如余曰可矣然未也永常曰謹學校之訓嚴禮義之節求遺老先生而尊教之使善者有所慕惡者有所愧若是何如余曰美矣然未也必也端其本乎本安在心是也子其正乃心嗜欲不形好惡不傾是非咸得其正然後可以為正矣本之不治而欲以法矯乎人以教變乎俗未見其能化也天下所貴乎執憲之臣者非所以揣較法律用之不差之為尚也以其能化之於法律之先而使之不抵乎法也使執憲止乎法律何不取吏之習法者而任之而必擢取儒者而為之乎然則天子之意可知也子行矣予欲不言乆矣子賢友也雖欲不言烏得而黙諸然余日侍軒陛間覩聖明之政其於用法最詳且慎也子其慎於用法也哉永常謝曰敢不從吾子教規於是其僚聞之知永常果不負乎薦擢也相率為詩以美之而俾為書其說以為序贈周履素序聖人之道雖高深博大然其要不過乎脩已以治人始於掃灑唯諾之微而終於盡性知命逺至於五禮六樂萬物之統萬事之變無所不究而近即乎彛倫之序不失其常旣有得乎此其推之為政教宣之於言語以用乎國家天下若水決川馬行陸颿長風以舟乎海也古之君子出環堵之室而任天下之重順運安行不動氣貎者所學皆可用而未甞為無用學也近世之士不然其所為學外其身與天下而舉不切乎事考其所施而程其所有判乎其不相入間有求其要者往往失乎先後本末之倫而功烈卒不足追古人之盛世之學者舎法家文吏則無所為師吾深病而竊悲之欲從願學好古之友相與講唐虞夏商之書釐周公孔子之典内淑吾身而推其餘以給夫世用而未之遂嵗之初吉天台周履素徒歩訪予於侯城山中留而與之談數日其志意才藝有可樂者且聞其所居竒山大谷間多特異士好學而與之游者甚衆烏知無與余同志者乎人恒患不好為學然好學而不知所好猶不好也知所好而不先講乎脩已治人之方好之無益也履素知所好矣其來也吾樂之而以未見其所與游者為憾也於其去告之故使歸而講習焉庶幾無蹈予向所病而相勉為有用之學也哉贈王仲縉序饑而食飽而嬉營私而騖利生無聞而死無述者衆人也食焉而思思焉而行不憂其身之窮而憂道之不脩不懼其家之無財而懼乎名之弗揚者君子也衆人之所為切於身而見效近故人之趨事者夥君子之所務事既緩而功亦遲故衆人多笑之而不知衆人之所為又君子之所悲也吾昔年舟還自金陵泊姑蘇城下舟人指城中大第謂余曰此元偽呉張氏宫也余問今其家安在則已無噍類矣問其人名字則已莫有知者矣及至錢塘道西湖舟人數謂余言林處士事曰此處士故宅也此處士墳墓也此處士曽遊之地也余未嘗不為之太息方張氏盛時據數州之富擅王侯之貴驅百萬之人以給其所欲其車服宫室妾媵珍寶騶從師徒僣擬乗輿而自謂一時之雄矣而今未下十年乃若此處士在宋時破廬敝裘羸童野鶴出入於烟霞水石間其窮困莫比今越二三百載姓名猶灼然在人耳目則區區之富貴者何足道而士之貧賤又何足憾哉且處士特一詩人其自立者非能如聖賢之宏大深逺有以明斯道而淑來世猶能如是况夫君子之希聖賢者乎吾友烏傷王仲縉年少好學其所志甚美而其鄉人竊笑之以為迂仲縉告余余恐其沮於衆人之笑也故告以斯說使仲縉知為學之足恃而益思自勉使衆人知所有者之不足道不暇笑人而自悲也贈郭士淵序天地有至神之氣日月得之以明星辰得之以昭雷霆得之以發聲霞雲電火得之以流形草木之秀者得之以華實鳥獸之瑞者得之以為聲音毛質或鶱而飛或妥而行或五色絢耀而八音和鳴非是氣孰能使之哉山以是而不動水以是而不息有時而崩隤溢涸者是氣滯而不行鬱而不通也惟人者莫不得是氣而鮮得其純得其至純者聖人養而至於純者賢者也是氣也養之以其道上之和隂陽下之育庶類以治天下則均以事鬼神則格以行三軍則勝其事君則忠臨下則仁居乎富貴而不驕處乎患難而不懾施諸政事秩乎其理也發諸文章煥乎其達也立乎朝廷則近懐而逺服百王畏而四夷恐􅉘虎蛇梟遁跡而深逝鳯鳥來而麟龜出非至神孰能致是乎二帝三王之盛是氣伸而在上故政教脩而禮樂作及周之衰是氣屈而在下無所於用則為孔子之春秋易禮以誅暴亂範倫紀其後孟子得是氣說東方諸侯輔以致治而不能用則著為七篇之書故孟子曰我善養吾浩然之氣其謂是乎秦漢以降是氣分而不全賦於人或得之而不善養或善養而不遭乎時漢文帝唐太宗甞用之以致治諸葛亮嘗用之以誅篡賊韓愈嘗用之以闢佛老他若董仲舒賈誼司馬遷揚雄皆用之成一家言雖不及於古其屈而在下則一也至宋人君能以道德作海内之氣故周程張邵朱子皆以是閑孔孟之道幽者使之明鬱者使之宣闢邪說而驅之完羣經於旣壊而司馬光亦以是更弊法歐陽脩蘇軾亦以是變詭僻險怪之文其後文天祥復以是不屈使懷貳之臣凛知禮義之可畏是氣之有益於世也大哉信乎不可不作是氣也今天下承禍亂之餘伸而在上發是氣於文章者太史公而已繼公而復古之道者吾不知其誰也吾嘗以為井田不行民不得康正統不定四夷恣横而道無由施竊欲排羣言而一反之闡孔孟之道於今世而聞者交誚余吾邑郭士淵獨以為然士淵能文章學於太史公而未得志於世吾服其材而又感乎命也嗚呼士淵其得是氣之幾純者乎在乎自養之而已養之誠以道伸於上而施諸人天也屈於下而埀乎後亦天也吾其違哉于人其違吾乎哉此句疑有闕誤衍文贈趙教諭序不知者謂仕莫易於教官知者則謂其職為最難夫為之難者非病乎位不崇而不能服人也非憂乎禄不豐而不足以資其身也亦非記問不充而無以應學者之咨詢也惟患乎吾身之德不明而無以啓人之昏吾身之行不能而無以起人之困故一言未脫乎齒而衆誚或叢於耳一動乍接於人而羣猜或萃於身斯其為可愧也斯其為可畏也豈非甚難而不易乎雖然吾身果不病乎位之卑則無慕外之非而可以師栁下惠士師矣可服乎人者不在兹歟不患乎禄之薄則有自得之樂而可以為孔顔之學矣資於身者不益博歟果能習舊聞而有新得則自可以應學者旁求而逺索将視古人之遺編為糟粕而凢以記誦自多者曽不滿乎一噱矣如是則德不患乎不明行不患乎不能人之昏者有不能啓之乎人之困者有不能起之乎吾之一言一動皆足以法於其徒而衆誚羣猜不能及於吾矣将愧我而畏我夫何愧人而畏人人恒難於所易而我能易其所難豈不尤貴尤賢哉於乎吾嘗為師故知其難為始也不知己未能而遽責人以必能故人恒我憎不知已之不足而責人以已服故人不我欲後也思欲以是勉人必先以是自勉故人亦我善思欲以是責人必先以是責身故人亦我親今吾去師位也已久每思之凛乎其若履朽惟子之賢克任是道敬之懋之令聞永保贈王生序多誤王生處甚卑而志甚髙亦有才氣闕居顯要者闕觀士焉所取哉人譬諸器也位譬諸闕所愛也加闕以藜糗不能損其可貴被土偶以文繡能忘其土偶之質乎才之與位不相謀也久矣君子觀其所存而已矣其所遇奚較焉漢中王生年二十餘調為海寧闗市吏其容凝然其氣充然其守甚確而志不凢近供職之暇輙袖古書從人講說乎仁義道德之㫖而深求之若不見其所處之陋者語及勢利之所為則疾之如所讐怨人多異而稱之吾觀世之以士名者一不得所願則去亷恥毁節行從而與俗渾不復肯自奮拔思稍别於庸人而生獨不然此其所存者足貴矣夫人有可貴而不知則為瞽知而不稱之於世則為隱余不敢隱於生也然後與之言以失言病予且為生病者非君子之道也送河南僉事湯侯序天佑人主而俾之創制立政以開悠久之業必生竒才異能以供其一時之湏使之無求而不獲無欲而不成端拱指麾而庶事畢治故漢之興或出於刀筆而為之次律令或起於薦紳而為之定禮儀或拔於行伍而為之申兵法至於章程律厯莫不有其人為之明一代之制而當時中外之政未聞有不理者夫以漢承秦坑滅之餘賢才宜其難遇也而真主一出羣英蝟興随其所向靡不如意豈人謀之所能及哉謂非天有以相之不可也國朝承有元八十餘年之後文獻殫耗皇上臨御蕩滌惰驕作新士氣廣太學以育俊茂未幾才能之士充溢四海居弼賛之任則著慎密忠敏之績列紏正之位則有明肅公亷之聲往往皆如夙成頴然絶出于時以致當世之治茍以為問學積累之素則人力不能若是之速也庸非天之所相乎予比年往還河南聞士民稱按僉事永嘉湯公正傳之賢其達於體要也宿儒舊耉有所不能逮熟於情偽也銖姦兩黠有所不能逃遇事敏決而應機立斷執理堅確而奮起勇決居官三年吏畏而民恱之闔境數千里之地莫不稱其美而想慕其為人而正傳年甫三十耳其於政事果孰傳而孰授之也哉疑也而若或悟之為也而若或輔之思慮之所營耳目之所察皆若有物以黙賛之者是則所謂天佑國家而賦其才者非邪夫才之難也久矣吾丘夀王玅年能文而治民無稱黄覇長於治郡而相業不顯工於此者多短於彼優為一職者大體或病焉此全才卓識所以難乎其人也今正傳之賢固非夀王軰所能及行将以治績受寵擢居大位益務寛厚之量敦誠明之學以古大臣之業自勉使今之行乎河南者他日行于天下而後世稱當今得人之盛於正傳有述焉非大丈夫之志願哉予於正傳所居為隣郡所業為同道與之言論志趣又有同者於其考績于朝者不獨稱其美而以逺者大者望之非私正傳也所以樂道斯世之得賢才也贈河南王僉事序遇時而得位者衆人之所慕非君子至樂之所存也有位而澤加于民志伸於時上有以得乎君次有以顯乎親此則君子之所樂者乎人孰不居乎位也而位之可以行志者鮮位可以行志矣患乎才之不充才足可為矣患乎道不足信乎上此士之樂難乎其全也抱有為之才居可為之位而受知聖明以光耀于天下王侯履道其人乎履道由博士弟子員自西蜀來京師不數歲擢僉河南按察司事行部于外勸學禮士搏姦擊强擿發偽媮威而不苛寛而不弛吏民咸大畏服㑹縣長吏有不法懼履道按之歛民金錢欲賂其左右履道以状聞天子嘉嘆稱善下璽書遣使者賜衣服錢幣所以褒予者甚盛於是履道之名赫然聞于朝廷而播于四方是時履道春秋尚富居河南已三年太夫人就養官所僚佐奉觴為壽共嘆其為賢子夫人亦欣欣焉為之飲食盡歡履道於是乎為可樂矣雖然君子之樂非特欲樂乎已必欲推之於人使之有以同吾樂也故已有善則思天下之人皆善已獲所願則思天下之人皆得遂其生夫豈徒榮一身也哉聖天子任賢圖治之心如飢渴褒嘉良臣以風厲羣下望於履道者盖有在其尚無以所至為已足而益思推所樂以及人以報天子之厚恩詩不云乎為君子使媚于天子又不云乎為君子使媚于庶人此士之所以為可樂而能全者乎送徐思勉之山東按察司僉事詩序以刑罰禁人不若以禮義化人之易入也以言貎察人不若以行事試人之易見也古人治道乃於今而有遇焉皇上嗣登天位念習俗之陋貪詐者之多以為昔者治之以法而犯者滋衆豈非教化有未至歟乃蠲逋租赦死刑選擢良吏以治海内除民之所患苦而與之以所歡未及期年萬姓恊和四方丕變士君子以行道輔時為榮而不貪禄位百執事庶人以謹行保身為常而恥言貨財上而朝廷下而窮邦小邑皆思洗濯瑕眚以自歸於善可謂盛矣上猶以為未也親擇廷臣二十有四人為採訪使以觀風謡燭幽隱利民之事得以便宜行之由是天下忻然謂太平可立致使者之出莫不自奮勵各思建明圖畫以求稱任使之意及旣事還朝卓卓以政事聞者盖居其半給事中華亭徐君思勉有聞之最者也天子以為可用㑹大同有警復俾持詔往撫慰兵民思勉精敏勁正所奏舉皆切時事其能愈彰適山東按察司以缺官告即授按察僉事将行其僚友喜思勉之受知於上而樂聖朝賢才之衆也為詩以餞之而以首簡為屬昔周之中興也宣王善於脩政用賢而賢才衆多詩人歌之韓奕烝民崧高諸篇皆餞行之辭也而烝民特為仲山甫徂齊而作其揄揚德業為尤盛至今觀者如逢其時見仲山甫焉今思勉之職視仲山甫未必同而徂齊則同将王命則又同第未知詩所述作能如尹吉甫之壯麗温厚與典訓並傳否雖然世有聖君不患無賢臣德業既盛不患無歌頌之者今上聖明不愧三代賢主思勉能以古人自望仲山甫之事寧知其果不可兾耶詠歌之士必有敷揚焜燿以照千古者矣抑尹吉甫之言有曰柔亦不茹剛亦不吐不侮鰥寡不畏强禦此其部使者之事也予不能詩請為思勉賦之送伴讀朱君之慶府序聖天子稽古圖治嘉惠九族念親王勸講輔德之官未備無以成藩屛之才也乃二年春三月詔増立賔輔一人佐講讀及書各一人進對皆稱名而不臣坐論道德用賔師之儀甫定適慶王奏薦名士三人請補府僚之缺於是天子以王所舉為必可任也俱授以官而檇李朱君仲湯為伴讀将行弟孝寧時為中書舎人請于朝之大夫士賦詩以餞之惟昔太祖髙皇帝以雄才神略戡定萬方懲前代宗室寡弱之弊衆建支庶羅列海内宫室服用下天子一等朝之大臣雖三公大将軍皆趨拜殿庭以至親處權寵之隆古莫與論何其盛哉然而諸藩德業可擬古之賢王者雖間有之而未之屢見豈非處尊崇之極而驕泰易滋左右之臣位下勢卑不能矯其失故耶天子慨然為深長之思増立輔臣重其職任俾咸知尊賢取友以成令德其為宗室謀可謂逺矣朱君首應是選其可不知所自重乎人於忠孝不能皆生而知故必貴學學不能無待於人而自達故必資師友之助朱君以講讀為名王之所講者必先王之正道由義則安蹈利則危敬慎則獲福恣肆則致凶與賢者同志則光榮與愚者同事則汙辱必懇懇為王陳之使王享有令名朱君亦預有其美不然徒以禄位為身計而王國之得失不介于中豈聖明設官之意哉抑豈舎人愛兄之所愿哉夫又豈賢王選擇薦進以求益於士君子之本心哉竊聞朱君言王好學有文章其於忠孝盖出於天性審如是能賦之士可以為聖朝賀矣送陳達荘序君子惡乎無功而忌乎喜功惡乎無名而忌乎好名功名者人之所宜有而不可有預求必得之心有預求必得之心於功名之間者造物之所不與也禹益之治水土臯陶之治法埀之共工䕫之典樂其心知盡其職而已豈願以此功而名於後世哉至今其功名溢於海内而不可揜者以其有無求之心也使皆鑿私逞智以求之則其為功名也狭矣往年天子念生民之未給恐闗市之利或過取而病民也使者四出覈天下徴納多寡之數將據之以為常斗筲無賴之人不思上之憂憫元元之意競以聰察苛細為能捃摭閭閻筐筴甕盎間物籍其數以為匿稅而致之罪郡邑至今拘其數而不能供吏以失職去者相望小人喜功好名之害至於此其功名亦豈有足稱者哉適足取敗而已天下何患乎無財能養民而富安之不求富國而國自富矣廣東嶺海之間民富物賤魚鹽之利最博故其地有鹽課之司其官自提舉而下朝廷咸慎擇其人四明陳達荘自孝義令遷為副提舉人咸稱君忠信有文才可以為政昔治孝義民甚安之盖儒者之達於事者予以謂陳君治此職於是乎得人使好功喜名之人執財利之柄嶺海之陬必有受其害者陳君仁民之餘政司其平以懐逺人東南之民必有受其福瞻駭咨嘆謂國有善吏焉豈非陳君所樂為哉不切切於功名而存心於愛民此功名之所以不舎者也送祝彦芳致仕還家序天子新有天下懲前代弛緩不振之弊赫然臨朝體天地之運法日月之明潤之以雨露震之以雷霆大舉廢政而脩明之如是者十餘年而始定當是時郡縣之官雖居窮山絶塞之地去京師萬餘里外皆悚心震膽如神明臨其庭不敢少肆或有毫髪出法度悖禮義朝按而暮罪之其重名實辯臧否誠古所未有也是以其時守職之官非精强敏給有兼人之材應世之智者鮮能終三年之久獨括蒼祝君彦芳自國初兵革未靖即受命食禄凡十有五年年至七十而以莱州府通判致其政而歸於是士大夫咸稱其賢而歎其獨得也多為詩美之而祝君亦自喜其老而幸休于家也復俾予序之今之仕而位如祝君者多矣而獲致其事而去者鮮矣獲致事而去者有矣仕十五年而至于今者鮮也古者國之史官書當時之事去其常者不書而擇其鮮有者書之然則祝君之歸使後世有史氏出其在所書乎送嘉祥知縣葉孔昭朝覲還任序先君太守公守濟寧踰五年于時三州二十縣長佐數十人皆南方士舉進士能文章有名者凡數軰余獲執經諸君間講論問難而閩士鄭君禮賢丞曲阜葉君孔昭知嘉祥待余尤厚鄭君端方温直而長於詩葉君慈良和惠而明於易余心尤敬愛焉二君每至先君屏去崖岸相與道性命之理談政事之要以相娱樂予時未渉患不省事以為諸君者可以常相與處未知其樂也洪武八年鄭君以中考遷知陜之同官縣去明年先君亦去官來京師以卒予奉喪歸天台伏山澤間目不見縉紳士大夫之容耳不聞文章道術之言每憂餘氣定追思諸君過從之盛輙引領西顧歎息而不已然後知昔時之樂誠不可復思以為二君方有志乎仕予何由而見之乎今年予偶來京師鄭君適自陜至㑹於逆旅既為禮相勞苦即問舊交所在數十人之中已鮮有存者獨葉君儼然治嘉祥得上考朝京師以還為衆所推譽余又歎當時仕州縣者或聰察强敏或苛刻有威聲人畏而服之今皆無在者而葉君以慈良和恵之儒者衆多疑其弛緩少功而獨存焉則又可見為政之道在此不在彼也已而鄭君謂葉君之來朝而還能詩者多歌頌之子最故不宜無序嗚呼葉君旣已過數十軰矣奚待予言哉然葉君先君之故人也先君之為政以刑不足以止暴則行德以率之以􅏥不足以制事則持静以化之故是時先君之政為東方郡牧首推是道也豈特可為郡哉雖天下可也今世俗之吏不達大體攟摭細故以為明深文重刑以為斷卒之禍及其身而後止其視葉君何如哉葉君以寛厚為縣而治矣由是而進乎其大者願無變乎斯道他日朝廷求寛厚者而用之其将在兹乎予雖賤敢為葉君慶且以識吾私焉送劉侯序天下皆知仕之為貴也而不知其所由貴茍徒以禄爵加人而不脩其可貴者吾見其賤未見其為貴也人之所貴乎仕盖将以行道焉耳道足乎身施乎人無所怍於心雖抱闗擊柝之㣲貴孰尚焉道不足而位有餘君子之所深恥也吾行乎世見貴者多矣求其可貴者未之或見豈果才之難哉才而知道者難遇也劉侯其庶㡬乎劉侯為令象山三年以民情為賞罰而不叅以私視富貧為徴發而不可動以利民始不安之久而愛之愈久而服之語必曰吾侯而不敢稱其官其意以為侯者爵之至貴以此加之所以見劉侯之果可貴也而不知劉侯雖為令其可貴者自若也三代之詩人宜其忠厚也至其怨誹其上斥之為狡童比之為碩鼠又何其薄甚矣哉今侯之治民旣甚異於詩人之所刺者而其民之忠厚不敢以其官稱之况肯有他哉則其過於周人也逺矣是非特侯之治民為可貴其民亦可貴也余得不貴之乎安得不稱之乎送李宗魯序髪不足者失髢則羞傷指之人無履則憂彼皆不足於已也故望於外物也重内茍足時千金之寶視之如泥塗文繡車馬陳於其庭而目不少顧豈以得失厚薄動其心哉爵禄之崇卑國之所以榮辱士士不可以此榮辱其身也而使士亦以此為喜戚則士之所貴者鮮矣故有以自適則生死一致也貴賤禍福一視也無以自適則飽餒寒燠皆可以變色而怨快况大者乎傳稱孔子攝魯相而喜此好事者之浮談大聖人之於天下不以物而喜戚得位而道獲行天也道不得施天也得與不得皆歸之天何以喜戚為哉如以得為喜則将以失為憂此好名嗜利者之為非無固必之道也吾固知非孔子事也世之以士名者莫不曰學孔子至考其行合於孔子者無㡬孔子之道豈徒言哉知而不信信而不行者衆也臨海李宗魯年二十餘竒傑有偉志入太學貧不能自給人不見其有困容予知其有富貴器也久矣去年釋布衣拜監察御史其容如在太學時今朝廷欲試之於外俾主𤓰洲廩粟其言貎與為御史時無異今之人有得盃􅅅而自慶者有失一錢而移怒於妻子者彼非不欲强飾其情内無足恃雖欲偽為而不能也布衣之於御史御史之於主粟吏其得失亦逺矣宗魯皆不為之少變豈非果有所恃之君子乎宗魯雖不慕富貴吾知富貴不宗魯舎也凡人可以富貴而不可以貧賤者不足為君子外物之臨豈足榮辱宗魯哉人茍以其外者賤宗魯非君子之徒也贈黄叔暘之遵化主簿任序金華黄叔暘以元名儒文獻公之從曽孫受學於今太史公為弟子由齊王府伴讀拜監察御史為良法官旣而出為北平遵化縣主簿人或謂叔暘生長名胄有美才都要任固宜今出而為斯職地逺且界邊大雪烈風薄冬凌春黄沙日夜飄擊街巷咫尺不可辨其氣苦寒其民被狐貉氊裘以居其俗剛愎不可以儒治而叔暘自南之北服食與其水土乖固不便况簿居令丞下勢卑尤難為莫不為叔暘憂余曰此雖愛叔暘而云非知叔暘者也夫君子異於衆人者幾何處華顯䇿肥馬從徒衆而享厚禄能安之而不憂者雖衆人皆然何以見君子至於事有所難處地有所難居勢有所難為而能不動於心思不形於顔面坦然以為樂者此惟君子能之衆人則不能矣君子之所樂者道所安者義道在是也義在是也雖置之於中國之外措之於編氓之列猶欣欣而不變况有禄食為王官乎夫仕固有崇卑顧為之何如耳為之誠不以道雖公卿猶無位也為之誠以道雖抱闗之賤猶傳於後世况有人民社稷之寄者乎自斯民之生其達乎位者亦衆矣然至今不泯滅者豈皆達者乎亦人之自為有以致之耳以叔暘之才其所視以為重輕者宜如何而奚以是為戚哉於是論者然余言請以為叔暘贈贈金谿呉仲實序道本於人心非幽深𤣥逺不可知也而人鮮知之邪說惑之耳古之為邪說者其言異其術異其名亦異其心亦自以為異於聖人之道故其說易攻而民之智者不之信後世之為邪說者其言與術皆異至於問其名則自以為儒問其所宗則以為得聖人之傳故智與愚者皆溺焉聖人之道載於經可知矣未嘗使人求道於博文約禮之外聖人没明道者莫過於子思孟子而二子之所言近而身逺而天下要其原則本之天命語其事則愚夫愚婦皆可知之亦未嘗為窈𡨕𣺌邈之說使人不可致詰也後世邪說者則曰文不必博也禮不必約也道之妙不可以言傳也嗚呼是果道邪以聖人之智睿七十子之偉傑其過於人亦逺矣然而必學於詩書禮樂六藝之文至於終身而不厭彼邪說者則曰六經不必學也必求於吾心俟其頓明忽悟而後可嗚呼是果何道耶且經之作何為也聖人思已之身不能常存以淑來世故載其所言所行者使人取法焉耳今人必謂無所用乎經而可以為聖賢則邪說者果勝於聖人也耶棄書語絶念慮錮其耳目而不任而僥倖於一旦之悟者此西域之異說愚其身而不可用於世之術也而學之謬自附於聖人而曰聖人之道固如是不特誣其身而又誣後之學者何其甚惑耶自斯道之不明其欲惑斯民者亦衆矣然墨者不諱其名為墨楊者不諱其名為楊申韓老佛之徒各不諱稱其名故放言而驅之則人隨以定其為害可息也天下之大害莫甚於名是而實非異端其實而聖賢其名此士所以從之者衆也然非彼之過也從之者愚也今有人焉棄稻黍而噉橡栗雖無識者亦知其為愚矣棄孔子子思孟子而不師而求異端之似者師之孰謂其智耶金溪呉君仲實儒者也學孔子子思孟子之道而不變於流俗者也其為學甚富其為文辭甚達是皆彼之所棄者而呉君獨盡心焉余慕其善為學也其自京師将歸故論邪說之害以贈之俾告其鄉人嗚呼斯道之不明久矣謂余言為然者其有志於道者乎送平元亮趙士賢歸省序考郭士淵集當作牟元亮文所以明道也文不足以明道猶不文也三代以上斯道明故其文簡三代以降道晦而不章人各以意求之故其文繁呉之人論舟可一言而喻胡羗之人終日談而不得其状知與否之異也聖人之言如書易春秋之所載孔氏弟子之所述片辭可以善其身而治天下豈好為畧哉無所用繁也荘周荀卿之著書其辭浩浩乎若無窮於道邈乎未有聞非工於言而拙於道也求道而不得從而以言窮之雖欲簡而不可致耳然其文猶未弊也自夫不狥道而狥人不求合於古而求合於今者始相如開其源崔蔡暢其支魏氏迄乎唐初助其瀾者盈天下天下之言文者諛乎人而已矣宜乎時而已矣何有於道哉唐之中世昌黎氏嘗一反之而道不足以逮文宋之盛時程氏嘗欲拯之而文不足以勝道歐氏蘇氏學韓氏者也故其文昌朱氏張氏師程氏者也故其道醇合二者而有之庶幾不愧於古乎而天下未見其人也嗚呼今之學者欲復古之文難矣古之道不過譽於人不浮費於辭今則不然譽不過則人以為慢辭不洽則人以為吝位尊則形於言勢卑則怒於色懐之出戸則裂而棄之矣古之道論是與非也必當賢之與否也必嚴其辨不自棄其身不茍從乎時今之人不然深謀則以為刺譏正言則以為擊排志乎道則訾以為迂慕乎聖賢則謗以為誕師以是為諱而不講弟子以是為嫌而不為嗟乎今之君子何由而復古之文乎古之文也質今之文惟恐其不華也古之文也正今之文惟恐其不阿也古之人所學者道今之人以道為不必知也當今之世非豪傑之才惡能捄之乎匪遺乎今不足以追古匪弗願乎人不足以明道匪有得乎道吾未見其能文也同郡牟君元亮趙君士賢太學之能文者也國家将望之以復古之文吾喜古道之見於今也於其歸省故與之論文送吏部員外郎龔彦佐序士惟不以富貴動其心然後可處富貴而成事功彼眩惑於利達者未得之則覬且慕旣得之則誇且肆此其識趣之陋烏能有所樹立於世哉夫禄之以天下而繫馬千駟常人思以其身易之而不可得而伊尹不屑一顧視焉彼聖人者其心之所存卓然髙出萬物之表而物不得以凂之其於天下之事也何有後之君子未嘗無才也卒之不若古之豪傑立德宏而成功大者其所見者淺而為富貴所􅇶也使其心有以自樂而不為外物所移何有難行之事乎予少行天下求自重之士與之遊而不可得昔年反乎鄉見龔君彦佐其言確然其貎肅然其自視甚重而不肯少屈於人心固竒之及今十餘年復至京師而彦佐為吏部員外郎視其德如鄉閭時不翕翕以趨勢不瑣瑣以狥利淡乎自守而不阿而名公卿皆才其所為予官翰林與彦佐居相隣而班相邇宜可以往來而彦佐非有故不至公事之暇閉門讀書其被服飲食以儉為本人不知其受下大夫之禄也於乎此可以富貴動其心者哉今年春彦佐居官及三載例得還鄉省墳墓與之友者請文以相其行世以仕而歸故鄉為榮人能言之若夫彦佐之志可與成功名而其進未已此則人之所未及知而予樂為鄉邦道之也送盧尚毅序昔予在鄉邑邑士盧君友直以孝友著稱予每過之見其子尚毅方十五六貌質端厚操筆書大字有法市野子弟從其遊者滿堂尚毅坐其中訓飭之莫不帖帖畏服心竊識而竒焉後數年選為縣博士弟子員予宦學蜀秦間繼而聞其以才領鄉薦入太學由太學生以事例出為幕官去年天下大比尚毅就山東鄉闈試在高等今年羣士大㑹於禮部尚毅預亞榜得為常德教授将行以贈言為請嗟乎自予識尚毅至今二十年予日衰且病念昔少壯時意氣豐盈開口論天下事若無難為者見古人所為少不惬意輒抉擿觝排今年四十有四囘視曩日若二人然日黙黙省已所遺闕惟恐所為或愧于天俯仰班行中上不能致主上下無以潤澤斯民復顧戀未能一旦引去以休於田里每自訟不暇而何以為尚毅贈哉况尚毅自童稚時已為人師今年踰三十治經為文皆不在人後以是而師大郡其不難而易也章章矣而予何以為告雖然古人所謂師云者非止治經為文而已也盖有道德之憲政事之傳其本乎正身以率之而不在法制䂓約之淺也是以師之所教弟子之所學皆非後世所及今尚毅之父以孝友聞而尚毅質重不華其為學必有異乎世俗之學者俾他日湖湘之間聞有師道可稱者安知非吾尚毅也夫贈劉君序天下之吏卑者衆而難為惟其衆也故仕者自意雖有善績終不足以取旌顯於世由是多毁蔑亷隅與俗相媮汨上下惟其難為故人無自固之心惟僥倖兾得盈嵗月即棄去不省是以庶職多不脩闗市之官卑而尤衆者也其不脩為尤甚此雖勢使之然吾意亦謂有志者寡故耳君子之仕烏有崇卑難易哉食其禄則思盡其心上之知否固不暇計茍祈人知而為善則為善者少矣有志者弗為也觀乎居大位者不足見人之志在下位者不廢其職惟有志者能之廬陵劉君思忠以儒被選擇征闗市於蘭溪三年恒賦不損於初而民稱其亷行旅稱其惠士大夫頌其能聞其去皆惜之非有志其能然乎先王之為治使有位者皆務脩其職非能督之使不敢懈也懲勸之道明焉耳若劉君之為先王之所宜勸者也今上方以治功望於下烏知異於先王之時哉余将於劉君之行徴之奉教送宣慰使楊鏗還播州詩序上帝以我大明能慎徳撫民付畀萬方禹益之所紀漢唐之所治彌天際海㒺不來臣播州宣慰使臣楊鏗當中夏甫定即來附屬春秋奉方物貢獻京師訓教兵民供徭輸稅俗淳盜息比於内郡使介行旅交稱其能洪武二十七年春入覲蜀都王嘉其忠于天朝也燕勞寵錫禮秩加等厥既辭有教曰鏗甚忠知臣職長史宜合儒臣賦詩以送之且命臣序之臣乃言曰地無逺邇人無中外惟克履道斯為賢能永受福禄惟忠惟孝皆上帝所賦福善禍滛實命之常環國之境其地十百於播州以雄長一方者世不乏人而播之楊氏獨繇唐季逮今六百年祖孫相傳靡有失墜豈甲兵險阻果足以自全耶盖以能繼忠孝奉臣順而受福于天人也世有負固自驕以取顛隕者視臣鏗之賢為何如是宜見寵嘉於賢王以華楊氏之子孫豈特傳一時而已哉臣鏗還其宣聖朝及賢王德意以告諸部族俾勿怠則臣鏗之忠可歌者滋大矣然則諸君子之詩殆其權輿乎臣鏗字廣成别號庸齋好學知義理其先出於宋贈太師業世以忠勇稱其守臣節盖有所自云送樓君士連謁選入京序貴玉之國多䃉好鳯之國多鶠名之所在偽之所趨也然良工不以多䃉而訾玉君子不以多鶠而嘲鳯務識其真而已玉與鳯何異耶今天下尚儒四方之以儒名者駢錯闕下誦先王之道立雋功於當世者不為少矣其中真名而偽行者亦豈無之哉或者見其然謂儒為不足用殆未之察耳其不足用者豈皆儒也耶疑斯說者曷不於樓君士連觀之樓君金華太史公之門人誦先王之道有年矣其文辭行術粹然不汚公嘗口稱之向者出而應有司之選主宣寧仁壽兩縣簿皆以憂去官雖未究其設施而其及民者盖累見矣使稍崇其階大其職豈不足以成功名哉於其除服而出也吾知其有所遇也夫士患無真材不患不遇有材矣雖不得位弗失令名無材而居尊位多見其無益也古之儒者豈徒誦說浮文云爾哉将以行其所知也聖人之道具乎六經四子之書皆可行也茍舉而措之天下可不勞而治况其小者乎自夫道之不明邪說布乎域中所遵而守者皆法家之言烏在其為儒道也以彼為世守之具則謂儒為不足用固無足怪者世之鄙儒因其言亦曰吾之道止云云耳非世所緩急也由是聖人之大經墜地雖幸逢斯世有振之之漸然其壊爛已久非一朝夕可理固有志者之所隱惜也吾之此言不於樓君發其将何從而發乎樓君幸以道自處見儒衣冠者則告之曰天子方以儒圖治各務𢎞道愼勿為䃉為鶠以累玉與鳯哉送解元振先生還廬陵序於道誠有所得而養之純守之篤則不為外物之所移習俗之所變彼摇奪於利欲漸瀆於汙卑者皆無得於道而然也斯道行乎天地而具乎人心人莫能違之而不能知之或能知之而不能得之是以𡨕而居瞽而蹈終其身而不能盡其性之所有加之以富貴則驕處之以貧賤則屈習之以機巧則遷天之全以與之者至於喪失拆裂而無遺是不亦可悲也哉然非其人之過也生也非其鄉學也非其師莫或啓之而戕之者衆無惑乎其不能有得也廬陵自宋盛時為文獻郡名人碩儒之有得於斯道者後先相望解氏為郡大族異時嘗有聞於天下元振先生少為其家良子弟受業諸父濯磨講切以求孔子孟子之所傳既而若有得焉涵焉而益深持焉而益完遂温然為君子江湘之間多知其名洪武癸酉四川藩臣發幣徴校士子之文賢王方篤志聖學稽古禮士因蒙召對賜坐從容諮訪元振坦夷愿諒言不致飾而陳義無隱其自守堅確不可變遷王甚嘉奨及其告歸特賜以詩而以朴直稱之復教羣臣咸賦詩以送之今世學古之士藝能才術如元振者雖不多見然不可謂果無其人也至其言行循乎道取舎去就不溺於俗求如元振者其可多致乎是以讀王之詩而不能自己於言既以明元振之學過世之人抑以見賢王以道取人非盛德不能也送周宗傳省親序吾台在宋時為東南文獻郡于時至宰輔者六七人列侍從典方州者以數十計亦盛矣哉官爵之盛不足深道吾獨慕其時道德文學之美形諸事業著于簡冊皆崇偉光大非後世可及豈其時人才素賢乎亦上之人有以化之也曩時文獻無遺弊陋不振者七十餘年豪傑之士生乎其間者亦衆矣而終有愧於昔心竊痛之以為盛衰之理常相仍而行庶幾將復宋時之盛乎及今天子立十餘年而吾郡之士稍稍可觀或出而治民或顯于朝廷其所為輒出他人右固已占其兆矣及來太學與其士游問學士之秀而人輒推吾台余獲求而徧交之其文辭純美而材質秀朗者果吾台人也余於是益為鄉邦喜今年上擇諸生之尤者四十有二人賜襲衣持束帛歸省其親他或連數郡無一人而台之在行者三人焉周君其一也上臣庶徧四海守土之吏理兵之将以萬計而幣帛之賜及其親者數十儒生獨先䝉之豈端為諸君哉所以耀天下之觀聽使為儒者知所勸耳是今之行雖窮塞絶漠之夫猶當興起為學况吾台文獻故邦乎况躬承其賜者乎又况若宗傳之賢者乎宗傳歸而告吾長者語吾朋友凡生吾台者皆當為台自重守官職則先德化後刑罰居田里則崇孝悌厲亷恥以為細民先宗傳亦尚考論道徳文章之緒益充其所為使他日朝廷講人才之美必先吾台道風俗之淳亦必首吾台而吾台果復宋時之盛吾深望宗傳之行也不然非惟負上之恩亦非吾所望於台之人送太學趙孝先從軍詩序臨海趙君孝先為國子生其父老矣當為兵京師孝先奮曰吾不代父誰當為父言者即告祭酒以願代状未許則言于禮部事聞詔可之釋其父遣歸孝先得命喜不自勝如疾甚遇藥如積雨獲見日月如羈旅亡聊而獲禄位也即變服以行愛孝先者曰孝先誠愛父矣然何不自重也有才如孝先蓄德踐行如孝先有聲名如孝先旦夕當為美官官于朝而以情請上未必不許也而何急自代為哉為世惜才者曰國家地盡四海執干戈職戰守者如林而少者豈一兵乎而使孝先為之也夫以孝先行能用之誠當其所長於民必有補益課其績效孰為寡多烏可狥一夫之私願而失良士哉孝先之友方希直聞之曰愛孝先者非知孝先者也為世惜才者安知國家之深惜乎以已視人則已重而人輕重者宜先輕者宜後也以親視身則身輕而親重茍為榮辱計而忘大義縱得大位何能一朝安中人且不忍為况孝先卓卓良士乎聖天子天運神斷以成大業其所舉措不易而審亦明矣豈不知孝先也豈不知兵之用薄得士之效大也辟之天然将欲暑之必先寒之将欲成之必先難之昭昭生於太隂隆隆隱於至㣲安知抑之非揚舎之非用乎安知萬金之非輕秋毫之非重乎且士之所學以善俗化民為本孝先一舉而使天下士莫不自濯磨奮發知親之不可遺禄位之不可茍由是而子則為孝由是而臣則為忠有益於人紀豈不甚大其於為人豈不甚可貴乎於是言者謝曰非聖天子之仁不足以遂孝先之志非孝先之知學不能處其身以道信乎士不可不學也乃相率為詩以美之而余書其說以序之送危泰生序臨海危生孟暘代其父輸作以死其弟國子生泰生請傳於太史公歛其首歸𦵏泰生之友郭君士淵謂余曰泰生悲其兄之不幸且不得志而歸子何以釋之乎余曰人處乎世父子相聚乎一堂之内朝夕焉以問其飽飢寒暑跪拜獻薦以致其歡忻而解其悲戚優游順美以養其生此民之幸者以方乎孟暘遭罹患苦以死固為不幸也然今人之得此者亦有矣而雜然而生寂然而死求其獲書於鄉胥閭史者且不能致况列於史官今孟暘獨有得乎此矣不謂之不幸然則泰生勿以深悲也且士之志上者在道德次者在勲業下者在利禄勲業非位髙不足為則世之仕者特利禄耳使泰生即得之不足為喜今舎此而去也誦聖賢之言以求性命之㣲㫖徧覽古今之變以觀其得失成敗之原推之於躬行以從事於古人道德之學其志之得者不亦侈乎而可以瑣瑣之失為戚耶儒者之於患茍非自致之則安乎命而已孟暘之死命也泰生之不遇亦命也命出乎天天其由人乎哉泰生之父賢而有文章其必識此矣郭君曰子之言非特可以慰泰生且可慰其兄非特可以慰其兄且可以解其父之憂而告其鄉人遂書以為贈送凌君入太學序為士之患常在乎自處太淺而望乎上過深聖賢之道至大矣其全可以治天下變風俗而其緒餘猶足以守一官化一鄉非止小材曲藝而已也故古之君子學之終身而不敢以為成材周於用而不敢以為能今之士不然所習者未脫乎剽竊誦說之間而充焉以為足所能者不過乎室家隣里之近而肆然以為髙聖賢觀之何其淺乎上之爵禄所以待賢者固古君子之所辭讓而不肯居者也今之士則以為分之宜得處卑則覬乎崇仕外則希乎内怨訐而悲戚勢取而力求其望乎上非過深乎上之所以勞於育才而病於少功也然亦有故焉鄙生於所求貪生於所用求之盡其道則鄙者可化矣用之當其才則貪者可消矣今之成均育才之地也欲得才之美者而用之舎二者奚先乎士惟有慕道德之志然後可以當大任有輕貴富之心然後可以成大功是豈庸人所能及哉浦江凌允恭嘵然有志操以郡諸生選入成均别予欲求予言允恭之才已為州里所推予無以贊也然予恐其以所至者為足而過望於上也故有以贈之送金文舉歸省序共里閈聨姻戚而相恤者常人之所能勉居異郡生異族而知相拯者惟君子能之自為孩提而識其靣見吾父兄與之交游來往吾情與之熟也一旦遇患難不忍而恤之則何難之有生而未之識也長而不與之交也自非志意之相同道術之相感烏能相恤而不厭哉今天子聚天下之才於太學而教之四方之人無所不有而吾寧海惟郭士淵在焉士淵素弱多病一蒼頭侍其行亦老矣去年士淵疾作且數月殆甚既而其蒼頭亦病饘粥幾無所仰其同舎㑹稽金文舉朝夕坐其側問其飢飽安否烹藥進食時其所欲而奉承之或半夜渴求水即持汲器以往或欲起不能行則扶掖而順其所如及士淵之愈無難色今年余訪士淵於京師士淵為酒飲我文舉為之具殽蔬持觴起勸客坐士淵下如事其兄然余屬目視良久以問士淵士淵以告曰吾與文舉素無平生歡而文舉視我如至親我無以報今文舉将歸省其親願子有以贈之余於是知文舉之為君子也古之君子視四海如其戸限觀四海之民皆若同氣之親老者父事之幼者撫之而不見其為他人故居乎鄉則鄉受其惠居乎位則澤被乎民而推之及乎庶類咸得遂其性彼誠知本而然也後世人不知本視其親戚且有乖背之心况同類者乎是以僥倖得位則堅持其私以行酷虐之政而生民之困久矣文舉方以材為時所稱禄位之隆其所宜有也余所望者在乎知本耳視其於士淵若此則於民寧有不能加愛者乎且無位而為善則事難而效寡有位而為善則勢易而功多文舉於其難者且為之矣况於易者乎其功名之成也可必矣余重士淵請故於其行道其已能者告其父兄使知文舉之賢而以余所聞者告文舉俾益進乎大者也送梁宏省親還廣東序木不必皆産於泰華求其足用而已玉不必皆出於荆藍惟其可寶而已材能之士何必皆齊魯韓魏之國哉茍能任之四海之内無不可用者不善任使雖鄰里之人猶且相猜烏足為治乎昔嘗稱南士輕剽不可當大事此北人自私之論三代聖人非不欲用南士也限於封域不能有其地雖欲用而不可致爾春秋寓周之法不鄙季札孔子論學文不鄙子游使孔子居乎位其将不用南士乎亦将用其才也漢之時有徐穉節行髙當世三國魏晉以後士之可稱者多南方之人唐之時與魏徴齊名者曰陸贄為宰相有行義者曰張九齡贄呉人九齡南粤人也宋之盛世有杜祁公衍范文正公仲淹皆居呉越間其後立功名有文學者率多江淮以南之士孰謂不足用哉世之取法以為程準者莫過於孔子而孔子未嘗鄙南士言治道之盛者莫過於漢唐宋而未嘗不用南士然則論者果何所本哉其不足信亦明矣今國家知其然凡任人命官惟以材而太學之生海内之人無所不有已可以矯論者之弊而自私之人猶竊竊相訾不置何其甚惑耶夫天之所以授人使為賢愚不肖者一而已何有南北之殊國家盡有宇内視四海皆其閫閾何嘗有所偏厚而云云者譬之羣兒相詈於慈母之前是可笑其無識也然南士亦有過焉誠使能自治其身如古人立乎朝則著忠讜之聲處乎大位則政脩而事治論者之喙将自息矣何以空言為乎太學梁君南粤人也入學二年其師材之其友敬之其将歸覲其親其鄉之人䝉由道來言吾故以南士之說贈之贈盧信道序吾鄉之士多秀而有文比三百載間其俗凡三變在宋中世相髙以文辭逮乾道淳熈後聞大賢君子之風而恱之重道德尚名節褎衣危巾講論性命言行必本乎禮義閭巷之間絃誦之聲相接至於元以功利誘天下衆驩趨之而習于浮誇負才氣者以豪放為通尚富侈者以驕佚自縱而宋之舊俗㣲矣大明御宇内今三十年屢詔誥四方剗削元之遺弊吾意士俗當復如宋時之美乎宦學于外久不與鄉人接未之見也今年臨海盧信道由鄉貢進士奉詔閲兵籍於山南予獲與之語其氣薫然以和其容翼然以恭叩其議論出入乎詩書沉涵乎禮文又皆粹然以正一何其善自變也人不知學則已為學不以宋之君子為師而欲達諸古猶靣山而趨而欲適乎海也乾淳之學莫盛於朱子博文以致其知主敬以篤其行而審於義理之辨此豈特朱子為然哉自孔子以來固然矣然則師宋之君子固學孔子者所宜為也為士者莫不曰學孔子至考其術業乃與孔子背馳豈足為善變哉予少有志於學於宋之故俗每有槩於心焉悼流俗之失而喜信道之得之也故因其歸俾告於鄉人使知學孔子必自宋之君子始以復宋之故俗非予之私言也蓋亦聖明誥教之意也送周景琰入試序學莫善於自得自得而後能化辟之木然天之生也潤之以雨露作之以風雷是物同得也及其培植既久其材或可以任梁棟其實或可以適口腹紛綸繁盛各效其用於天地之間為辛者不假味於甘為甘者不求助於苦松不必如栢而同歸於可用杞未必如梓而同至於可斵皆成於其所自得而是物者亦莫知其所自由夫是之謂能化古人之於學其取於聖人之經猶木之待風雷雨露而後生也及其得乎斯理而致其成守其恒者為善人達其奥者為君子而造其極者為賢士其所得雖有大小之殊然其才智浩乎不見其窮道術確乎不為習俗所變未有假習陳言故迹而成事功者故古人之於事有所不為而所為必名於後世以其自得而化也不善學者則不然非不學乎經也而不足以得經之理誦而習之則有餘推而用之則不達其於斯理也恱乎目而不入於心窺其常而不究其變如觀寶玉於富人之室非不知其可愛而不能使之為已用故有所為必勞勩而無成是豈特學者之過哉教之者無其術養之者無其素故耳國朝有天下思得足用之士而任之興學建師積以嵗月而考其自得之效數年以前詔以今歲大比至期而郡邑諸生冠帶而集者以千百計而臨海周景琰與焉景琰才良而氣温蓄乎學而聞於人者已久其所能衆人知之而其所得者衆人則未之知也今将試於有司出而用於世兹其漸矣景琰其為善人以進於德乎為君子以化民敦俗乎抑為賢者以致當今之治埀來世之則乎余心之望於景琰而當世之願於天下之士固然也茍徒誦習陳言以求合於有司之選而不能周一世之用豈吾所謂善學者哉豈當世之願於士也哉贈林士恭序黄巖林士恭好學而篤志其父将千兵鎮隣郡括蒼而母夫人留居故第士恭欲處以奉母則無人乎父之側欲久乎官所則無以慰母之心輕装美味奔走兩州間以致其養問安之使踵相接也士君子聞而喜其孝今年秋自括歸省母郡博士蘇公平仲為文贈之士恭以予善蘇公也示予於寧海且以贈言為請予無言久矣然黄巖寧海同郡也士恭見知蘇公而予與蘇公故交其道又同也焉能卒無言乎古之贈言者非以稱其所已能盖以増益其未至者耳士恭之能養蘇公已言之凡古聖賢之言孝皆士恭之所學而自知者也予将何以為士恭贈哉雖然士恭亦聞天子之誥之論者乎㫖甘温凊以適其口體定省愉恱以承其心志世俗以為善事親矣而復有大焉者臣乎忠友乎信兄弟夫婦和以别官以奉法戰而致勇此孝之大要而復有小焉者居處不可以不莊懼其或慢以辱親也言語不可以不慎懼其招怨以危身也精㣲廣博雖堯帝之平章百姓大舜之慎徽五典無以加之自皇王以來以訓誥化民未有盛於今者也士恭之孝固美矣觀乎此也其亦有所未至者乎茍有所未至其可不加之意乎夫言之善者雖恒人可以為教而訓誥之所陳聖人之言也雖庶人不可忽而天子之詔天下所當奉承以行者也孔子曰周監於二代郁郁乎文哉吾從周然則予之贈士恭非予之私言也天子之意而孔子之法也蘇公學孔子者其必有感於吾言也夫贈劉文仲序代太史公作余未冠時游學郡城中與文仲之父劉君彦祥交劉君時年三十餘鬚髯漆黒靣雪白褎然衣冠頡頏諸公間方以功名為志少所推接然獨與余善館於别室朝夕與語甚驩間命其子出拜五男二女長者七八歲小者三四嵗言笑啞啞眉目秀朗如畫圖競牽衣袂相追逐則文仲兄弟而文仲其第六子也中更亂離余遁藏山中不至城市者頗久後二十年兵革稍戢郡守辟余為郡庠師授五經於諸生復見劉君劉君署金華縣典史朝夕奔走大府形容衰憊不類曩時而諸子皆長大有室女亦已笄且適人矣既而余赴召至南京留官儒䑓出入翰林二十年以老引年乞身而歸每念劉君而文仲訪予於浦陽脩髯長身大類其父予驚問劉君安在兄弟皆無恙否而劉君作土中人已十餘年其七子之中惟文仲及一弟在餘五人皆已死矣嗟乎昔見劉君雖少憊而壮氣勃勃不衰安知其遽死哉然劉君年已至猶可不恨至其諸子余乃親見其孩提時嬉劇膝下如昨日耳今死者已死而存者如文仲且近五十為老成人則予雖欲不耄烏可得也文仲嘗被推擇為郡邑吏復遷吏北平以省墳墓辭還其來訪我也不忘其先人之交而余也追維平生之故寧不慨然乎盖古之仁人見舊故則相贈以言余耄矣欲無言者久矣獨於文仲而有感乃述平昔之所見以贈之使兩家子孫知予與劉氏有故而不忘相交之義云贈王時中序攻乎術者不足盡術之妙惟寓乎術者足以盡之天下之術未有不深且博者也茍徒竊竊然學乎其粗而不得於道則吾之精神智慮方為所役之不暇何由盡其理而用之善學者則不然於萬物之理無不窮衆理之變無不察心之所得固已絶出於人由是而寓於術縱横開闔無所施而不宜豈若專門獨學者之勞且陋哉趙括以善兵自雄一戰而喪軍殺将犯兵法所忌而不知淮隂侯平居飢餓困辱不稍自異於常人及乎為将百戰百勝曰此在兵法顧諸君不察耳括區區小智梏於一技而不達變淮隂之所學蓋有出乎兵法之外者其成敗之効宜然也余嘗見世人好論醫而不善治病每為人言學醫者不足治疾惟學道者乃能知醫聞者或疑其非或大吾言而不省盖知道者寡無足怪也邑人丁公語予以臨海王君時中之善醫及其所治竒効甚衆心固慕之而薦紳間多言時中之學包羅恣肆如古方士如近世山林髙人其容貎簡寂如儒者其神氣閑定如列僊之流莫能名其術也私益異焉既而余姑之夫盧君有疾殆時中治之而瘳思所以報之時中笑曰是果以恒醫遇我邪使我欲金帛為王公富人一舉手富貴終世尚何為於此哉余聞而益異之從而與之言終莫測其為人也嗚呼所謂有道而寓於術者其時中謂邪贈四明邵真齋序今年春余患痎瘧踰百日不止肌體瘠憊形容纍然兄弟賔客憂而謀諸人忽之者以為不足治行且自愈危之者以為瘧乆為蠱久且不可治余疑焉以問四明邵君真齋君脉已笑曰謂不可治者固謬謂不足治而自愈亦奚可哉然瘧之始作也一二日可止今數月矣欲速而暴攻之則損元氣我将徐守之而俟其自除既而兼旬而瘧果漸瘳昔之憂者咸喜而德君各為詩文以記其事君以醫聞東海上甚著於治余之疾特其餘事不足為言也然余獨有感焉自昔天下國家禍亂之生其初未必無可治之道也當其憂而謀弭亂之術才不足者務為夸言以自髙每易之以惑世智不足者過為危言以料事必難之以驚俗惟其不能燭乎事機之㑹究乎治亂之原故眩於紛紜之變而不知所以治之若夫豪傑之士則不然其於天下之故以是而始以是而終用某䇿則速成而勞用某策則淹久而逸炳然黙識於心胷之中而不為羣議所奪如羲和推筴以考日月之度造父王良執轡而知馬行之逺邇扁鵲見垣一方人而知五藏之癥結無毫髪之不合斯湏之不讐茍得其人而任之則烏有難平之事哉若邵君之於余庶㡬近之惜乎其所治之未大也余少有志於是嘗辟諸醫以為賈生善知脉而不善為方董生善為方而未嘗言脉周公之於齊魯預知其後之强弱治亂閲數百千載而不爽此真知脉者也孟子之於齊梁并其為治之纎悉而傳之此真知方者也恨今世無其人與共論斯事邵君言論恂恂然類有道者得無秘之而未肯發乎於此誠有得焉則喜而德君者非特余兄弟賔客而已也余願於君悉聞之送李生序善觀璞者不觀其形而觀其色善觀人者不以其材而於其氣形可偽也色不可偽也材可强也氣不可强也摩其外輝然而温栗然而潤人雖賤之吾必以為良玉矣叩其氣肆然而直浩然而正雖未措於用吾必以為美才矣古之育才者不求其多才而惟養其氣培之以道德而使之純厲之以行義而使之高節之以禮而使之不亂薫之以樂而使之成化及其氣充而才達惟其所用而無不能加之以天下之大事而不勞優之扵廟堂之上而不變窮之於荒陬陋巷而不憂其中有所受而然也故惟有所受者然後能有所為辟之大海然百川之灌千載之積受之而不辭然後能涵萬彚載舟楫而不難汙潢之水一葉加之則勝浮之以杯則沉矣故君子貴乎有養也臨海李生宗魯在太學侃侃自許不逐時軰俯仰嚢無一金之貲處之恒無憂色是非其氣之足恃能然耶彼見寶貨而喜者死於寶貨者也以困貧為憂者終於困貧者也故惟安貧賤而後輕富貴非善養氣者烏能爾耶生之氣美矣能養之以道吾未見其終貧賤也今年生歸拜其親其友某為之請且言生以布衣歸未有以慰其親請以言榮之余言不足以榮生或者因余之言以求生則知生之所得者過於人逺矣送李叅政之官廣西序丈夫生而遇聖神之主承信任之隆而居方伯之位得施賞罸號令於千里之内亦榮矣哉信榮矣然君子不敢以為樂也君聖則望其臣者深君之信任者隆則後世責吾者重所居者高而所治者廣則斯民議吾者衆議吾者曰承君之任如是之大也而敷君之德以澤吾民者猶有未至也後世責吾者曰彼之得君如此之隆也而其事業若斯之隘也吾之君如堯舜矣吾猶未及古之賢臣吾可不自省歟合三者而思之上恐負吾君中恐負吾民下恐不免後世之求備将日夜憂之之不暇奚所樂乎雖然吾才茍不足居乎位固不敢樂也誠有才焉斯民有未安也吾告於君而圖安之斯民未入乎善也奉吾君之道而教之大而國家之法有未著也吾以所得者告吾君為後世慮者或未至也吾将為之賛助焉則吾可以不愧吾之職矣吾之職不負愧則吾之心樂矣豈若無能者而戚戚為哉天台李君守恒以美才為上所拔擢任内廷承㫖者三年今由左通政為廣西布政司右叅政余知李君才甚充者也有方伯之樂而無其憂者也於其往道其榮且樂之故以告使致思焉送王文冏序代太史公作上既立太學以育才俊士六七年間竒能足用之人駢興錯出布列乎内外為政咸有可稱已而慮文學之臣未多見也乃詔丞相御史大夫擇弟子員質美而能文者得三十有五人命博士躬與講說日程其業而歲上其功丞相召諸生喻上㫖以為古之有文學者若游夏以降漢之司馬遷班固唐之韓愈宋之歐陽脩蘇軾皆傑然自立於世後世從而同之至今不衰諸生何異於斯人哉烏可以不勉皆謝而退莫不思自奮拔以稱上意上猶恐待之或未至也十二年春復詔大臣曰朕甚欲尊顯諸生恐其未悉吾意諸生入學之日久矣其歸省其親賜其二親帛各四端有妻孥者擕以來月與粟錢務得其歡心勿惜有司費於是㑹稽王生文冏承命将還告余請曰上之恩諸生者至矣文冏未知所報願有以教之余曰自昔國家之興駿功溢宇内盛氣薄日月天地為之磅礴山嶽為之動摇必有異才之士出而宣之然後上下得其序神人和而庶物育否則灾害生焉皇上有天下今一紀憲章文物無譲古昔思得異材出而宣揚盛美播於無窮而諸生適逢其時一何休哉是詔一出凡含聲鼓喙者皆當奮躍以効才技况諸生躬承其寵而目覩其盛烏可不思報也士之有文患不逢治世逢治世患乎無位不得被於人諸生以美才際盛時顯位可必取誠能以游夏自視如上之所期豈非誠有志者哉文冏歸見余友梁先生故太學也尚從而質焉送浮圖景昱序周公孔子之道衰而異端出稍盛其後其說尤熾人趨而信之最深乆而遂同稱於孔子曰儒釋世主惡其然欲斥之者有矣然既撲而愈焰旣滅而復興惡者之五六不勝喜者之千百延至於今塔廟多於儒宫僧徒半於黎庶西域之書與經籍並用吾嘗求其故以為楊墨名法之流其說與釋氏雖殊其違聖人之道則一然皆不數傳輒不復續釋氏更千載而不廢獨何哉盖楊墨名法淺而易知不足以動人釋氏之術其深若足以通死生之變其幽若可以運禍福之權惟其深也故過於智者恱焉惟其幽也故昬愚之氓咸畏而謹事之而其徒又多能苦身勩行固執而不為外物所移飾儒言以自文援名士以自助故其根本滋固柯脩蔓延纒乎海内無怪其與孔子同稱也然孔子之道猶天然豈以其同稱而損哉有一善可取孔子且猶進之聖人之容物固如是也况釋氏設教一本乎善能充其說雖不足用於世而可使其身不為邪僻不猶愈於愚而妄行者乎故儒之於釋縱不能使歸之於正姑容之恕之誘之以道傳之以文然後可使慕入焉四明璧奎昱師年甚少從烏傷龍門海公為弟子性慕儒學頗至其來京師而将還也海公屬予有以告之余非釋氏徒固無所告也然曄師之居烏傷睹土田之沃室廬之稠市廛之富亦以為盛矣人告之以京師為尤盛豈不疑之乎今至京師而觀之然後知其不誣也夫人學於釋氏已久驟而語之以儒道之大不猶昔之疑京師者乎在乎造之而已昱師其歸而求焉茍有得吾之言則去周公孔子之道不逺矣贈瑄藴中序學道之士旣無求於利禄宜乎無所處而不安然居山林者烟霞之與儔麋鹿之與朋去人羣逺世膠不獲從名人勝流講說咨叩以廣其業其流多失之野宅市朝者交乎王公薦紳以脩其文接乎碩師宿學以通其道茍不得幽夐絶特之地盤旋憇息以澄其志其流或近於肆今佛者瑄上人則不然其始去天台而遊京師四方之士多與之善巨公大臣多稱其賢上人日處鍾山大靈谷寺雖近市朝而其志猶山林也今年将住持括蒼之南明南明去郡城為甚邇有泉流林木之勝而郡博士眉山蘇公之名聞天下上人道古言行於余視其儀度通而和質而有文其論議理而節達而不浮翩翩乎佳士也以是而得蘇公與之往來問荅其道寧有不進者乎余棄於時而居乎海上日與樵釣者伍欲從蘇公而不可得於上人之行不能無所感焉雖然吾聞古之有道者果有可樂生死不足為之變窮達不能改其常而况於出處喧寂之細者乎是必有出乎見聞之表者茍得其要則雖與蛙黽雜居而非辱軒冕在躬而非榮蘇公之為人視無覩也聽無聞也而於理無不察於事無不知豈非庶㡬有道者乎上人行尚以吾言問之遜志齋集巻十四
