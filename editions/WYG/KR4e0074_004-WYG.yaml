body:
  text: 雜著周官一余始讀詩大雅豳風見其積累之盛而知周之所由興然猶異之曰何其久也及讀周禮至於大司徒鄉大夫州長黨正之法然後慨然歎其慮民之詳曰盡在是矣治天下易也莫難於一天下之民心民心可一也莫難於使民心咸出於正道無加於堯舜求其治之法以為必有異常絶特之事而其書之所載止於正徳利用厚生斯三者何足為異哉然而越數千載卒未有棄三事而行之者則聖人之治天下固不以求異也盡其道而已斯民也無以養生則死無以致用則勞無能正於其徳則愚以利言之愚不若死之甚也以言乎義生不厚不過於死人不知徳必至於為亂故聖人尤以為先武王周公豈好為煩細不急之務哉宫室衣服欲其媺且固墳墓欲其旌兄弟師儒朋友欲其聯比閭族黨欲其相保愛葬救州與鄉欲其相賙相賓或嵗一讀法或月一讀法善有可稱者書之惟恐不及過有稍著者戒之惟恐不改其日夜提掇督勵斯民而訓之者雖父兄之教子弟不若是宻也計其時之民不在於田廬則在族師閭胥之庭不治稼穡則聞仁義禮樂之教蒐狩則習弓矢祭酳則肄爼豆曷嘗暫放其心而弛其力哉其法之詳故疑衍如此故為之民者有忠順而無乖逆可使以義而不可刮以勢六七百年之間强諸侯狼顧鳶視者莫敢先發陵上之言必至於周禮盡廢而後肆道之化民也夫豈㣲哉秦不識其深意視為無用之虚言而焚除之由是斯民如放豚逸馬肆然法度之外而不可復制惰者為盜悍者為亂桀黠者雜出於徒囚之中馳逐海内咸有争天下之心至於今而未已人情易於縱肆而難於檢制釋先王之法服而被髪左袵去揖讓拜跪而倨傲怠佚順乎其適意也欲反而盡復乎古不亦難乎然而不行其道終不足以為治不顧一時之怨而興百世之墜典非明以察之勇以斷之堅忍以持之者不能也庸人習於茍且智士畏乎造端然則何由而可復耶君以身任之而不奪於流言臣以道揆之而不泥於近利三年而成十年而安繼乎其後者能推而守之武王周公之治可幾也二以一事之失而疑先王之政皆不可行以一人之謬而疑天下之士皆不可信此為治者之大患車戰古法也房琯陳濤之戰以車而敗戰者遂謂車不可用自秦以来不以車戰而䘮師殺將者亦多矣豈皆車之過哉琯以迂疎妄肆不知人而敗非車致然也由琯之所為使不以車戰其能不敗乎故議琯者罪琯可也罪車戰不可也先王之政其詳不可悉知也周官之所載詭於聖人之道者雖有之然遺典大法所以經世淑民者秩乎明且偹豈後世所能及乎人見有用之而致亂者因以為周官罪此鄙陋無稽之甚者也盜竊孔子之履納之而踰人之墻履寧有過乎竊履者可誅耳王安石之用周官棄其大者而不行惟取泉府之一言以傅㑹其私卒為天下禍此安石之謬也周官之言利亦稍宻矣蓋以千里之邦畿而供天地社稷之祭車服宫室之用公卿大夫羣臣之祿諸侯之燕饗四夷之遺賫咸出於是固宜有其法焉然取民也有制役民也有節凶禮則無力政無財賦無關門之征其不厲民以自養亦明矣安石不師其善者而泥於國服為息之説期以富國而國終不能富周官之法豈止於此而已乎為治有本末養民有先後制其産使無不均詳其教使無不學文武周公之大意也法古者亦取其大意所屬而行之奚患財之不足哉不治其本而以理財為先此文武周公之所誅而周官之所棄者也安石不顧而妄行後世不察而并罪周官周官何與焉自治道之不明士之自任者鮮矣自信而不惑者尤鮮也安石之自任而自信漢以下儒者皆莫之及使誠識其大者而行之其事功豈不甚偉哉惜其學不知道而過於自信也斯民不見先王之治久矣遇主者恒患不知道有其器者恒患不逢其時其法存其人存茍有遇乎世焉知周官之果不可行哉周禮辨疑一周禮者周史所記周之治事書也以其出於周也文武周公之遺法㣲意往往可得而推以其成於史氏所述也故不能無謬於聖人然去後世之制則已逺矣其有不能大過於後世者蓋亡逸之餘秦漢之士以意増損之者衆也條狼氏之誓羣臣於馭曰車轘於大夫曰鞭五百於大史曰殺小史曰墨周法豈若是暴哉君臣之際有常禮上不以尊而威其下下不以卑而屈於上道合則仕否則引而退不宜以鞭笞戮辱懼之也夫馭及太史皆近臣大夫則國之執政加以嚴刑而誓於衆使賢者居其職而能不知愧乎此非以禮使人之道也且車裂鞭三百之法秦漢以降之所有周之盛時寧有秦法御羣臣哉其非周制也明矣昔歐陽氏蘇氏皆嘗疑周禮然皆其制度之失耳於道無害也周禮之善多矣制度之不盡合豈足為周公累哉若其有戾於道者則學周公者所宜知也二聖人之治天下立法也嚴而行法也恕嚴者所以使民知法之可畏而不犯恕者所以使民知刑罰行於不得已而不怨斯二者其為事不同其至仁之心一也昔者讀酒誥之書嘗疑武王欲殺羣飲者為過甚既而思之武王豈好殺之主哉其為是言也蓋愛其民之深而人不知也示之以姑息阱民於死地而後刑之孰若先之以不可犯之禁使民不䧟於罪之為美乎武王以為使殷民酗醟而至於為亂不誅之則害法誅之則害仁民受其禍者必衆矣不若威之以至嚴使聞吾言者疑吾為過察吾心者感吾為仁聖人之用心不茍以悦民而使民隂受其惠此仁之至者也周禮周之遺書其慮民亦詳矣然不能無可惑者焉司徒之媒氏仲春令㑹男女於是時也奔者不禁夫王者之防民範之以禮義猶恐其為邪况納之於邪何以責其不由禮義乎昏娶以禮至勞而逆情也越禮而奔至易而適意也然人不敢為其易而勉為其所難者以有法禁存焉耳今曰不禁人之奔孰肯舎至易而為其所難乎是令之行男女無以禮合者矣啓之以淫奔之路茍又從而罪之是罔民也縱其越禮而不詰是賊民也夫婦者人倫之始夫婦之倫不正則人之倫將亂矣武王周公烏忍為此姑息之政以亂倫也哉賢人之言可偽為也聖人之心千載可推而知也求其言而不合能揆之於其心則是與非決矣人奚由偽三人之情不能無欲也故不能無争争而不能自直也故不能不赴愬者非人之所得已也故君子盡心焉察之惟恐其不明處之惟恐不合乎中民之有欲愬者惟恐其不至也安可責之以其所必無而禁抑使勿言乎周禮司㓂言民以財貨相訟者令入束矢以罪相告者令入鈞金而後聼之此非周制也民心貧富不同而後强弱生焉强弱相凌然後獄訟生焉强不勝而弱勝者十一弱不勝而强勝者十九私鬭於下而不勝則憤而愬於上則凡愬者多貧弱之刼於勢力而不獲自存者也烏得鈞金與束矢乎鈞金束矢富强者之所有而貧弱者之所無也茍必欲得之而後聼其辭則富與强者常勝而貧弱者終困抑而不伸何由盡民之情而服人之志乎以是而聼訟後世暴吏之所為周之法必不若是也孔子之門蓋有以聼訟稱者孔子曰聼訟吾猶人也必也使無訟乎夫聼訟而得其情未為失也孔子猶且非之况苛取於民而禁其訟者哉治天下不能使民無訟而禁其勿訟其差甚矣焉在其為周公之政吾固知周禮非全書也四治經不可致疑也疑經太過則聖人之言不行亦不可無疑也不能有疑則聖人之意不明始於有疑而終於無所疑者善學者也茍於信而不知擇於經何所明哉周禮余之所最好而疑之為尤甚葢好其出於古愛其為先王之制而惜其或失先王之意也故求之也詳味之也深於其有可疑者不得不為之辨也昔者周公論為治之道備矣未嘗及乎財利武王受西旅之獒召公駭然以為不可而争之夫受一犬未為害道財利國之所宜用言之未為有過二公抑之而不言斥之而不使人主受其貢者所以防亂源而慎其始也王者之所為將為後世法舉手投足且不可不慎况著之於書定一代之制周公謹之宜何如哉周禮之於言利何其宻也金玉玩好則入於玉府良貨賄則入於内府至於山師川師皆使致珍異之物其汲汲於利如此豈周公意哉以為周公之所著而法之不惟誣周公且禍後世矣昔之疑周禮者詆斥過甚固不足知聖人之意然若此者其非周公之言決也天下之患莫甚於名是而實非人求之以其名而行之於事必自財利始元豐之禍是也然則余安得不辨乎西伯伐崇為史氏者之言西伯之囚羑里崇侯虎實譛之及西伯得賜斧鉞專征伐而歸五年果伐崇侯虎果若其言是西伯挾天子之柄而報私怨也此必不然聖人之於賞罰豈嘗容心於其間哉觀人之善惡何如耳其善可旌也雖平生之所讐怨烏得不賞之其惡誠可誅也雖懿親近戚吾烏敢避焉蓋此法者非吾之所私有乃天子之法受之於先王而與天下共之者也竊天子之法賞無功則為祐惡罰無罪則為戕善此二者必誅於聖王之世紂之無道久矣諸侯豈無不臣服者乎其以斧鉞錫西伯受而行之宜自不臣服者始必不悻悻然蓄私怨而圖伐之也崇侯之事逺不可知其詳矣吾意其人必比㓙黨惡不供職於天子而侵害其與國殺虐其民人棄蔑其宗廟故西伯伐之必不以其譛己也茍憾其譛已是㣲量淺智之人齊桓晉文之流之所為豈足為聖人哉且羑里之事不經見史所稱獻美女善馬珍怪之説皆戰國之末好妄言者意搆之詞非其事之實也妄言者見詩歌伐崇求其罪而不得遂誣其譛西伯以為伐崇之端而不自知其謬也西伯嘗伐犬戎宻耆及邘矣則此四國者又豈皆譛西伯者耶故謂西伯伐崇者是也謂崇侯譛西伯以女馬賂紂得脱者皆非也曰然則史氏所述西伯之事亦有足信者歟曰惟獻地請去炮烙之刑者近之餘皆無足取焉耳武王誅紂余讀春秋見其紀時書事少者止一二言多者不過數十言斷斷然傳其所信而不敢肆竊嘗疑之以為當時史官所載必詳矣孔子曷不盡舉而書之奚為簡畧若是哉及觀左氏榖梁公羊三子之傳各述其所聞甚詳或曲説以傳經或因經而搆事肆情極論無復顧忌初若可喜徐而推之率多虛詞而鮮事實往往不足以得其要領而愈致人之惑然後知孔子謹嚴其詞若不敢盡者憂天下後世之至也孔子嘗繫易以辭矣反覆詰難至於理彰意竭而後止何獨於春秋而不盡其辭蓋道可以智窮而事必以實著與其循疑而失實以為後世害不若著其可信者之為愈也故曰多聞闕疑又曰吾猶及史之闕文也此孔子之意也司馬遷之為史記其志以作春秋自擬亦非不知春秋者矣至於紀載往昔之事竒聞怪説無所不錄而於三代之本紀多背經而信傳好立異而誣聖人其他㣲者未足論若武王與紂之事見於書最詳而遷非亂之尤甚牧野之兵非武王之志也聖人之不幸也武成載其時事但曰一戎衣天下大定不書紂之死者為武王諱且不忍書也他書謂紂自焚死意為近之武王之於紂非有深讐宿怨特為民去亂耳當斯時使紂悔過遷善武王必不興師而踰孟津及紂兵已北使紂不死而降武王必將封之以百里之邑俾奉其宗廟必不忍加兵於其身也况紂己死乎吾意武王見紂之死也必踊而哭之命商之羣臣以禮塟之矣豈復有餘怒及其既死之身乎遷乃謂武王至紂死所三射之躬斬其首懸於太白之旗又斬其二嬖妾懸於小白之旗此皆戰國薄夫之妄言齊東野人之語非武王之事遷信而取之謬也漢髙祖魏文帝皆中才之主非有聖智之度髙祖猶能不殺子嬰文帝猶能奉山陽終其身曽謂武王聖人而忍其君至此乎吾決知其不然矣茍信遷之言是使後世强臣凌上者􅉁醢其君而援武王以藉口其禍君臣之大義不亦甚哉吾故辨之以為好竒信怪者之戒畢命余讀尚書至於康王之命畢公然後知周公之忠厚也殷之遺民可謂頑矣大者作亂小者驕淫奢侈不率法度禮不得而齊之徳不得而服之周公知其不可旦夕治也既欲加兵誅之又舉而遷之於洛其怒殷民亦甚矣然方伐叛也為大誥告四方自他人言之宜痛詆深誚不比於恒民而周公方申命焉告以天命之去就無一辭及其民之非多士多方一則言遷民之故一則言降四國民命不誅之由反覆乎夏商之存亡稱其民曰商王士曰義民而不忍少傷之夫周公豈不知殷民之頑哉終不斥之為頑民而曲為之諱避者聖人之慮至深逺也民莫不有是非好惡善未至於此而加之以善名則必喜而奮曰上之待我以善人也安敢不為善惡未至於此而加之以惡名則必怨而怒曰上之不以君子待我吾安用為君子故以君子望中人中人皆慕而為君子以小人望中人中人或失其恒心殷民固頑矣周公以王士義民待之彼欲不修士君子之行得乎聖人之待人也恕如此宜乎未厯三紀而皆化也至於康王不知聖人導民之㣲權命畢公繼周公之職輙稱之為頑民舉洛邑之民豈無善者哉概而謂之頑殷民聞之得無怨且怒乎號之以為頑而欲責其不為頑不可得矣然則周公婉辭和色化殷民為君子康王發片言而誣殷之民為頑民文王武王忠厚之意至是銷鑠殆盡矣不然世之庸主無典則以遺後嗣者子孫䝉其遺烈猶可傳數世無亂以文武周公之大徳曷為不二三傳而遽㣲乎史稱成康為至治余謂周之衰康王基之檀弓季武子成寢杜氏之葬在西階之下請合葬焉許之入宫而不敢哭武子曰合葬非古也自周公以来未之有改也吾許其大而不許其細何居命之哭成寢而夷人之墓合葬於人階下二子皆不足為知禮其稱之也奚當然則知禮者宜何居曰無己則卜野而遷諸猶為善乎是防墓崩孔子泫然流涕曰吾聞之古不修墓取乎古而師之者以其合乎人情當乎理也父母之棺髐然暴於人而不修何取乎古乎信如其言安足以為聖其誣孔子甚矣謂殯乎五父之衢亦然子夏喪其子而䘮其明曾子弔之云云止亦已久矣孔子之門人曾子最少曾子之父與師商固友也曾子於子夏之䘮明而弔之則宜其名而數之者非曾子事也傳之者過也曰朋友有過以其長也則不正之與曰非也正之者是也名而數之曾子不若是暴也何以明之曰其辭倨而慢曾子之言慤而謹有子問於曾子曰問䘮於夫子乎曰聞之矣云云止不欲速貧也孔子之欲仕非為富也為行道也致美於棺椁非為不朽也為廣孝也欲富而瞷且趨焉以求利於蠻夷之國曾謂孔子若是乎欲全其既死之軀而因以為民制孔子何取乎有子之疑曾子之問子游之答傳之者謬也子思之母死於衛栁若謂子思曰子聖人之後也云云子思曰云云吾何慎哉禮者君子恒履之器也不可斯須逺於身豈以家之貧富時之通塞為行否子思賢者其於道粹矣信斯言也烏在其喻於道孔子之故人曰原壤其母死夫子助之沐椁云云止無失為故也周公曰故舊無大故則不棄也茍有大故則周公必棄之矣小過而容之義也大故而棄之者亦義也察察然拒昧昧然容薄量無制者之為豈聖人所為乎天下之大故宜莫甚於母死而歌者矣此而不棄烏乎棄以是為聖人之量吾弗知也讀三墳書書之名真而實偽者多矣何從而信之哉亦在審辨之爾辨之法有三味其辭以望其世之先後正其名以求其事之是非質諸道以索其㫖之淺深而真偽無所匿矣吾嘗執是以觀天下之書蓋十不失一焉若世傳三墳書者則又凡鄙而易見者也孔安國稱伏羲神農黄帝之書謂之三墳其言大道今此書以山墳為伏羲之書言君臣民物隂陽兵象謂之連山易而姓紀皇策之篇附焉以氣墳為神農之書言歸藏生動長育生殺謂之歸藏易以形墳為黄帝之書言其目而傳以申之考其辭則不類正其名則不合質諸道則淺陋而無稽其姓紀篇曰太始者元胎之萌太極者天地之父母太易者天地之變太初者天地之交太素者三才之始天地孕而生男女謂之三才頗剽莊列之餘言而造為異説此其道之淺陋無稽者也其論物則曰木為金所剋服陽臣十幹此後世厯生之常談伏羲之時曽有之乎論民曰四民之物以貨為本伏羲之時曷有四民之名乎謂封拜之辭曰策策始於漢而謂伏羲氏有策辭可乎祭天地於圓丘大夫之妻曰命婦周禮始有之而謂天地圓丘恩及命婦為黃帝之事可乎相人之術起於衰世而謂聖人以形辨貴賤正賢否為神農氏之書可乎此其名之不合者也其辭皆後世俚野之談而其尤謬者曰山月升騰川月專浮山雲疊峯氣雲霰彩山氣籠煙川氣浮光雲氣流霞皆唐人為詩之語其政典篇往往竊取書易而損益之如曰惟天生民惟君奉天民惟邦本食惟民天出言惟辭制器惟象動作惟變卜筮惟占先時者殺不及時者殺皆是也或者未之察顧謂書所謂政典正本諸此而定為上古之書其亦異哉然世之偽書衆矣如内經稱黄帝汲冡書稱周皆出於戰國秦漢之人故其書雖偽而其文近古有可取者此書則又偽於近代者也其後有序不著其姓名自謂天復中隱於青城之西因風雨石裂中有石匣得此書於匣中其文絶與此書類天復唐昭宗時也豈即青城隱者所偽邪雖然聖人之經猶日月然其道猶天地然使孔子時有三墳書孔子固不得而删存其名而亡其書孔子猶嘗言之今孔子之繫易但云伏羲氏畫八卦神農氏為耒耜黃帝埀衣裳未嘗言三皇有所謂三墳書也孔子不言安國何據而言之耶然則安國之言亦妄矣彼偽為書者因其言而復僣襲周禮三易連山歸藏之名以為伏羲神農之書周易不可襲則以歸藏先坤後乾名黃帝者故曰坤乾其亦妄之妄者耶以區區俚野之文而欲托於三代唐虞之上是猶瞽夫懸破鏡於空中而欲自比於日月也其亦惑之甚耶於乎世之擬經者亦可以知愧矣讀夏小正夏小正凡三百九十餘言先儒以孔子所謂行夏之時者即此書且以時之正令之善釋之自今觀之其書記十二月之候有關於人事者二十有七若采芸采蘩祭鮪攝桑剥𤓰剥棗納蔚取荼之類皆備記之求其大者惟服公田綏士女萬用入學剥鱓頒氷始蠺祈麥攻駒頒馬王狩陳筋革十一事而已豈所謂令之善者止於斯乎孔子有取於夏時以建寅之月為嵗首耳豈誠謂此書乎使此書果夏之遺書孔子曷不編於禹貢𦙍征之間乎孔子倘見此書奚不曰得夏小正而曰得夏時乎孔子未嘗指而言之後乎孔子者乃從而實之豈固别有所受乎或者信其説遽謂汲冡書之周月觧吕不韋之月令皆本諸此果何以定其先後乎聖人之經傳之萬世而無惑者以其明道也於道茍無損益雖謂出於孔氏之壁成於堯舜之時謂之古書則可矣吾安敢信哉讀汲冡周書汲冡周書十巻七十觧或謂晉太康中出於汲郡魏安釐王冡故曰汲冡以論載周事故曰周書宋李燾以漢司馬遷劉向嘗稱之謂晉時始出者非也此固是矣劉向謂其書為周書即孔子刪定之餘者則非也何者其事有可疑也畧舉其大者言之武王之伐殷誅其君弔其民而已其世俘篇乃曰馘魔億有十萬七千七百七十有九俘人三億萬有二百三十夫殺人之多若是雖楚漢之際亂賊之暴不若是之酷而謂武王有是乎所誅以億萬計天下尚有人乎周公之用人不求偹於一人其官人篇乃曰醉之以酒以觀其恭縱之以色以觀其常臨之以利以觀其不貧濫之以樂以觀其不荒以詐術㗖人而責人以正雖戰國之世縱横權數之徒所不為曽謂周公而以此取人乎王者之師禁亂除暴以仁義為本其大武篇則曰春違其農夏食其榖秋取其刈冬凍其葆不仁孰甚焉其大明篇則曰委以滛樂畧以美女不義孰甚焉此後世稍有良心者所不忍為曽謂王者之用兵乃若是乎其為文王之言曰利維生痛痛維生樂樂維生禮禮維生義義維生仁此稍知道者所不言曽謂文王大聖人而為是言乎其文傳篇曰有十年之積者王有三年之積者霸霸之名起於衰世周初未嘗有之謂王者不以道徳而在乎積榖之多是商鞅之徒所不言而以為文王之言可乎其他若是者甚衆及載武王伐商之事往往謬誕與書不合由此觀之決非周書謂孔子删定之餘者非也其中若諡法周月時訓職方之篇又與爾雅月令間有合者竊意漢初書亡隱士縉紳之流所偽者以為周書而司馬遷不察故引而用之劉向因以為古書耳其中芮良夫篇最雅馴其曰后除民害不惟民害民害非后惟其讐民至億兆后一而已寡不敵衆后其危哉嗚呼君子之言三復其篇為之出涕讀司馬法周司馬有用兵之法至齊威王欲尊用田穰苴遺法乃論古司馬法附穰苴之書於其中號司馬穰苴司馬法漢藝文志百三十篇今所傳者五篇蓋周書之存者寡矣而其言論猶有先王之遺意焉先王之兵非黷武好勝也將止亂而已此書所謂以戰止戰者得之先王之兵以愛民為本此書所謂不因㐫不加䘮冬夏不興師者得之先王之世寓兵於農農隙講武此書所謂忘戰必危者得之以徳不以力王道之盛也非此書所謂六德者乎正名而不尚詭王道之要也非此書所謂徧告諸侯彰明有罪者乎所謂舉賢立明正復厥職則興滅繼絶之事也所謂以仁為本以義治之則王者之政文武之所由興也若是者非穰苴所能言其為遺書無疑至有駁而不純譎而不正者則皆穰苴之法而亦非戰國之談兵者所能及蓋兵書之近道者也嗚呼王者之不作也久矣人心之趨下也日以滋矣於是英君謀士以譎詐為竒以屠戮為武若唐太宗李靖之問答惟知有孫吳之術而司馬法為虛語矣况有出於孫吳之不忍言者乎悲夫讀三畧三畧三篇或謂太公之書非也蓋後人偽而托焉太公之言於書無所見孟子以為天下之大老與伯夷並稱則其人可知矣三篇之中大率皆平淺鄙狹雜援軍䜟以足成之夫䜟書起於戰國之後太公之時曽有之乎中畧之末謂三畧為衰世而作太公之佐文王果衰世乎其間曰攬英雄曰侵盜縣官曰奸雄相稱曰霸者制士以權皆漢魏以後之言曰非譎奇無以破姦息冦非隂謀無以成功曰豪傑事職國勢乃弱其詭謬害理雖太公之奴𨽻所不屑道而妄謂太公之書可乎復有六韜者其誣聖賢尤甚論六兵則皆竊孫吳之所陳至其所自言猥細煩曲無足觀者至於避正殿用騎卒之説又其偽之易見者也近世三山施子美為之講義曲為辨釋以眩其博卒不敢言其為偽其愚陋無識特兒童之見耳而世乃傳而誦之讀子華子余始聞太史公言子華子為偽書近求其書以觀其辭婉麗可喜未覺其為偽也及詳味而徐察之始知為偽書無疑葢子華子程氏名本子華其字晉人與孔子同時孔子所與傾葢而語者也夫孔子周逰四方道途所遇若楚狂沮溺荷蕢荷蓧文人之流皆不足知其意至於歎息而不已子華子一見而得聖人之歡心亟觧束帛而贈之豈非當時之賢者哉其言論宜有過人者今所傳十篇之中語道徳則頗襲老列之㫖專對則倣左氏之文辨黃帝鑄鼎事不能直排其謬而曲為之説傅㑹不經與晏子論儉雖為近正而起人君奢侈之端答北宫意祥瑞之問善矣乃恐後世巧詐誕譎之臣作為聲歌薦之郊廟似指漢武朱鴈芝房之事其子車氏猳之喻復竊韓愈所作栁宗元墓銘論代播州之意醫藥之技孔子罕言之則劇談之而不置八卦以宫言孔子賛易時未有也而曰坎宫震宫觧字之不類時之乖錯者甚衆以為子華子之書豈非誣哉其首有劉向序亦與向文殊葢亦偽也偽之者不知為誰晁公武以為元豐以後人以字説而知之或以為王銍豈或然歟嗟乎人之著書上欲以淑来世其次亦欲揚聲光於不朽而偽是書既不足以淑諸人而又不能少見其名果何為哉果何為哉讀曾子曽子十篇一巻其詞見大戴禮雖非曾子所著然格言至論雜陳其間而於言孝尤偹意者出於門人弟子所傳聞而成於漢儒之手者也故其説間有不純如曰喜之而觀其不誣怒之而觀其不􅱗近諸色而觀其不踰飲之而觀其有常又曰神靈者禮樂仁義之祖也又曰君子將説富貴必勉於仁若是者決非曾子之言顧其言孝有足感予者予少之時事二親嘗謂人子無所自為心以父母之心為心今此書曰孝子無私憂無私樂父母之憂憂之父母所樂樂之㫖乎其有味哉一何似予之所欲言也然少時知之而不能躬見之及今欲養而二親已莫在矣疾病篇有曰親戚既沒雖欲孝誰為孝誦其言輟業流涕者久之讀荀子道之不明好勝者害之也周衰先王之遺言大法漫滅浸微孔子出而修之斯道皎然復章聖人之業煥然與天地同功彼處士者生於其後務懐誹訕之心以求異於前人其心以為堯舜之道孔子既言之矣復附而重言之何以云云為哉於是各馳意於險怪詭僻渙散浩博之論排擊破碎先聖人之道以伸其嵬𤨏一曲之偏智若楊朱墨翟宋鈃列禦冦莊周慎到之徒是也孟子生乎其時懼聖人之道敗壊於邪説乃敷揚孔子之意而攻黜之然後復定葢彼之説偏駁易辨故其入人也淺可指其過而聲之也若荀卿者剽掠聖人之餘言發為近似中正之論肆然自居於孔子之道而不疑沛乎若有所宗淵乎執之而無窮尊王而賤霸援堯舜摭湯武鄙桀紂儼若儒者也及要其大㫖則謂人之性惡以仁義為偽也妄為蔓衍不經之辭以蛆蠧孟子之道其區區之私心不過欲求異於人而不自知卒為斯道䜛賊也葢數家者偏駁不倫故去之也易荀卿似乎中正故世多惑之惜無孟子者出以紏其謬故其書相傳至今孔子曰惡紫為其亂朱也惡鄭聲為其亂雅樂也夫欲擯悖道之書而不用必自荀卿始何者其言似是而實非也讀孫子戰非聖人之得己也聖人之所為戰者不城而人莫敢踰不池而人莫敢近無戈矛劍㦸弓矢之器而姦謀邪慮消沮於萬里之外是之謂道徳之師其次導之以禮樂申之以政令誅暴而伐罪救民而不求利不戰而服人不殺一卒而勝國是之謂仁義之師下此則以材相用以詐相欺而已矣若孫武子者亦其一也然其十三篇之所論先計謀而後攻戰先知而後料敵用兵之事周備明白雖不足與於仁義之師茍以之戰則豈非良將乎視彼恃力之徒驅赤子而䧟之死地者猶狼殘虎噬耳嗚呼武亦安可得哉讀吳子衛人吳起書六篇兵書也起嘗受學於曾子故其書間談仁義然起烏足以知仁義哉起嘗殺婦而求將囓臂與母盟其天資固刻忍之人是以見棄於曾子之門而卒以兵顯觀其論兵則孫武之亞也而武之説為明備矣起嘗與魏武侯言在徳不在險信戰國時之名言特以無行見少於世亦可以見聖人之教入人者深而是非之公終不可泯也於乎豈不足為喜功者之戒哉讀慎子世以慎到與鄧析韓非之流並稱到雖刑名家然其言有中理者非若彼之深刻也其謂立天子以為天下非立天下以為天子不猶儒者所謂君為輕之意乎其謂役不得踰時不猶不違農時之意乎其謂用人之自為不用人之為我不猶舎已從人之意乎其謂不設一方以求於人不猶無求備之意乎其謂人君任人而勿自窮不猶任賢勿疑之意乎但到不聞聖人之道不知仁義之治墮於曲學而流於卑陋爾夫豈其性然哉讀公孫龍子君子無用乎辯也豈惟無事乎辯亦無事乎言也充乎心不得已而後言正言之而理不明不得已而後辯辯而無所明言而不出乎道則亦無用乎言與辯矣若公孫龍之辯不亦費其辭乎孔子所謂正名數言而煥然矣龍術為白馬指物通變堅白名實之論枝蔓繁複累數千言然其意不越乎正名而己傳有之曰有徳者必有言有徳之人一言而有餘不知道者萬言而不足故善學者必務知道讀尹文子尹文子一巻劉向定為刑名家書仲長統分為上下二篇且以劉向之論為誣然向謂為刑名家者誠是也特善於鄧析田駢者耳其説治國之道以為人君任道不足以治必用法術權勢術者人君之所宻用羣下不可妄窺勢者制法之利器羣下不可妄為非刑名家而何但其為民之心頗切末章尤中時君之弊使舉而行之名實正而分數明賞罰嚴而事功舉亦足以善其國然其苛刻檢柅而難於持循蹈履非王者之道以故君子不取而統獨好之遂因以斥向殆有所激而然耶讀鄧析子鄭人鄧析所著無厚轉辭二篇其言皆嚴酷督責之行韓非李斯之徒也嗚呼先王之澤竭而仁義道徳之説不振刑名者流著書以干諸侯用之而亡國者何限其遺毒餘熖蔓延於天下生民受其害至今而未己不亦哀哉予擇其可取者二百言著於篇餘皆㷊之夫水濁則無掉尾之魚政苛則無逸樂之士故令煩則民詐政擾則民不定不治其本而務其末譬如拯溺錘之以石救火投之以薪為君當若冬日之陽夏日之隂萬物自歸莫之使也恬卧而功自成優游而政自治豈在振目扼腕手據鞭朴而後為治歟心欲安靜慮欲深逺心安靜則神䇿生慮深逺則計謀成心不欲躁慮不欲淺心躁則精神滑慮淺則萬事傾怠生於宦成病始於少瘳偏生於懈慢孝衰於妻子目貴明耳貴聰心貴公以天下之目視則無不見以天下之耳聽則無不聞以天下之知慮則無不知讀尉繚子尉繚子二十三篇尉繚子或曰齊人或曰梁人以其有惠王問答語也三山施子美稱其有三代之遺風其然哉三代之盛未嘗有其書也非惟無兵書而兵亦非君子之所屑談也君子之道圖亂於未萌防危於既安本之以徳禮導之以教化同之以政令使兵無自而作俟兵之起而後與戰雖孫武吳起為將且恐不救而况云云之書豈足恃乎故好言兵者賊天下者也著書論兵者流禍於後世者也皆不免於聖人之誅也尉繚子不能明君子之道而恣意極口稱兵以惑衆其重刑諸令皆嚴酷暴苛道殺人如道飲食常事則其人之刻深少恩可知矣武議原官諸篇雖時有中理譬猶盜跖而誦堯言非出其本心是以無片簡之可取者謂之有三代之遺風可乎然孫吳之書與尉繚子一術彼以兵為職無怪其然若尉繚子者言天官兵談制談戰威守權十二陵武議將理原官治本戰權重刑令伍利令分塞令束伍令經辛令勤卒令將令有似乎君子而實非者也予不得不論之讀戰國策文武之道至於春秋之世委地矣孔子之作春秋傷周道之衰也夫豈知春秋之法復委地於戰國之世乎嗚呼朝覲㑹同之禮不修於天子之庭禮樂征伐之柄或輕易於諸侯之雄君臣上下之紀隳而簒弑争奪之事起此孔子之所甚痛也然其時天下諸侯猶知以尊周為義狼攫狐顧而不敢肆其無厭之欲葢道之在人心者尚有未泯耳及乎戰國則不然諸侯或遣一介之使而讓周或興師臨之而徴其鼎或責王入朝一旦而遂滅其宗廟其所自来者久矣功利熾而仁義銷矣㳺説行而亷耻衰矣譎詐盛而忠厚之風息矣觀乎十二國之所載繁辭瑰辨爛然盈目及求其指意非謀以奪人之國則以揺人之位非間人之骨月則皆昡惑人之事或大言倨禮以激之或佯疑曲問以入之或卑聲屈體以冀其哀或正貌詐心以釣其名或揣其志而施其計非不博且富也欲一簡之合乎道而不可得豈惟不合乎道欲一簡如左氏所傳公卿大夫之言亦不可得矣先王之遺澤餘化漫盡而國家繼之以亡豈不哀哉然其待士之禮猶有存者故得以廣聼周知匡扶其國久而後俱幷於秦至秦之始皇則自任其智棄天下之士而不用燔三代之言而不法巍然獨伸其尊以為可恃而其危亂不旋踵而即見於是戰國之遺法復委地矣悲夫讀吕氏春秋吕氏春秋十二紀八覽六論凡百六十篇吕不韋為秦相時使其賔客所著者也太史公以為不韋徙蜀乃作吕覽夫不韋以見疑去國嵗餘即飲酖死何有賓客何暇著書哉史又稱不韋書成懸之咸陽市置千金其上有易一字者輙與之不韋巳徙蜀安得懸書於咸陽由此而言必為相時所著太史公之言誤也不韋以大賈乗勢市奇貨致富貴而行不謹其功業無足道者特以賔客之書顯其名於後世况乎人君任賢以致治者乎然其書誠有足取者其節䘮安死篇譏厚葬之弊其勿躬篇言人君之要在任人用民篇言刑罰不如徳禮達欎分職篇皆盡君人之道切中始皇之病其後秦卒以是數者僨敗亡國非知幾之士豈足以為之哉苐其時去聖人稍逺論道徳皆本黃老書出於諸人之所傳聞事多舛謬如以桑榖共生為成湯以魯莊與顔闔論馬與齊桓伐魯魯請比關内侯皆非其事而其時竟無敢易一字者豈畏不韋勢而然耶然予獨有感焉世之謂嚴酷者必曰秦法而為相者乃廣致賔客以著書書皆詆訾時君為俗主至數秦先王之過無所憚若是者皆後世之所甚諱而秦不以罪嗚呼然則秦法猶寛也讀法言揚雄子雲法言十三篇子雲為此書嘗自擬論語而後世大儒或儕諸荀卿其自擬者僣也儕以荀卿者亦非也論語述聖人言行猶天地之化子雲方且竊之焉雕鏤藻繪而蕲類之其僣甚哉然自聖人沒明道者莫尚於子思孟子彼荀卿者乃攘袂訐斥而詆生民之性為惡其妄孰甚焉子雲則不然措言持論不敢違乎聖人至其為善惡混之説及以韋𤣥成與顔子並稱皆其不智而過言耳非若卿之妄也曰子雲勝卿與曰否卿才髙而果於大言故其過多子雲才劣而篤於好古故其過少其未聞道則一也曰好古曷事莽乎曰好古而不能擇義則將奚所不至故士貴乎聞道讀風俗通義風俗通義三十篇後漢末應劭所著今所存者皇霸正失愆禮過譽十反聲音窮通祀典怪神山澤十巻而已其辭固無他竒然語怪神之事一以理勝之足以觧流俗之弊又載當時人品而具評其事非按經受禮不敢畧於中臆之説故至今傳而不廢也後世著書者厭常喜異設為詭激邪曲之辯以為髙一時雖可以動人而無補於世終不能如此書之傳者衆矣天下之物山嶽有時而崩金石有時而毁惟至理之言與天地並存立言之士其不可不務知道哉讀漢鹽鐵論鹽鐵論六十篇漢桓寛所著當武帝時兵革薦興財用匱竭而均輸鹽鐵之征横出天下疲弊孝昭即位大將軍請詔郡國舉賢良文學問民所苦咸願罷鹽鐡酒𣙜均輸官御史大夫桑𢎞羊争難之以為不可罷寛襲其意而設為問答之詞以盡其辨善乎其言也於乎爲天下者曷嘗患乎無財也哉天下未嘗無財也茍用之以節治之有道夫何不足之有以漢言之文帝在位二十三年免民租者近半其時非有均輸鹽鐡之征而府庫充溢錢貫朽不可較武帝之天下即文帝之天下而又加之以百出之斂未嘗免一嵗之租宜其富矣而反愈困乏何哉葢文帝節儉而武帝征伐營繕以糜費之也人君茍不節儉雖積金齊泰華蓄貨擬江海不至於亂未見其厭足也武帝之天下宜亂矣而文景之澤猶在人心重以霍光知所緩急從而稍稍罷其害者故一變而弭元元之憤不然漢豈可冀哉此書也其於道徳功利之際論之當矣不特文辭足法而己也讀荀悦申監荀悦申監五巻其論治亂興亡之理詳矣悦生漢之衰丁靈獻之際强臣竊柄天下潰潰日非漢有悦雖侍講禁中而天子拱手受制知其莫之有為著此書以宣其志悦葢有用之材又親見世之亂故其言愈有徴據從而行之可以為治而自漢以來鮮有言之者縱或言之特以其文辭而已著書之不足恃如是哉然秦熖之餘聖道滅息唐虞三代之大經且廢而不講為治者視之以為空言而共譁笑之則夫悦書之不用又無足怪也余讀其書至曰以智能治民者泅也以道徳治民者舟也怳然失色而悲之讀崔豹古今註文之道有二載道紀事而己載道者上也紀事者其次也然道與事非判然二途也孔子入太廟每事問學詩而多識鳥獸草木之名豈不以事物為道之所寓耶舎是二者文雖麗無補於世終不能傳逺茍有補雖俚談野語亦不得而棄之予始讀太公家教其辭俚雜可笑自隋唐以來即傳之李翺大儒也至與文中子並稱葢其言間有合乎理者故也及觀崔豹古今註釋名辨物其言固不成章然晉時之人以文名者何限求如豹此書之用世絶少豈非以紀事故耶由此言之世之好竒䘮質者可以惕然而思矣讀博物志君子之學貴乎博而能約博而不得其要則渙漫而無歸徒約而不盡乎博則局滯而無術孔子孟子可謂博矣然而孔子曰吾一以貫之孟子謂將以反説約也則其用心可知也葢盡萬物之變而能會之於一心窮萬事之情而能析之以一理此聖賢之所貴也索乎人所不可知攻乎道所不必知以眩俗驚世此曲士之所務君子不取也世稱張茂先為博物吾觀其所著書何其異哉詩曰天生蒸民有物有則此物之至要而不可不求其理者也至於鳥獸草木之名狀與古者之異言怪説有所不知何病其為君子茂先獨汲汲焉纂述惟恐其不詳而於至要而當知者反無所明焉其所務若此可謂知所先後乎哉身為輔相視亂倫悖教之事皆不之顧至於張林孫秀犬豕之徒卒見殺於其手博物之智果安在耶士不知道而多聞之為務適足以禍其身而已讀聱隅子士未嘗不欲聞於後世也然徒務乎聞斯無聞矣為其所志狹而所望者私也聖賢安顧其一身哉上之欲善天下次之欲淑來世遑遑終其身而不恤著之書以明道孔孟是也或者覩其烈光傷己之不若悼世之不見稱亦述諸書以自表若揚雄王通之流其自為之意深而衛道之功寡君子病之矣至於黃晞聱隅子之為又慕乎雄通而作者也晞蜀士生宋仁宗時其言論不違理者頗有之然晞狠愎無忌人也故㫁然自信而不疑其論以漢髙盃􅃵之言為仁以屈原為愚以張良得聖人之安蕭何得聖人之變劉向得聖人之力以唐太宗為武王之後一人論性則詆孟子之言為非是皆其大謬者不知道而務名無怪乎其然也然其間謂井田肉刑鄉飲里選冠禮家廟之法不復弗足為治又以生不能澤物為耻嗚呼晞亦有志之士哉讀朱子感興詩三百篇後無詩矣非無詩也有之而不得詩之道雖謂之無亦可也夫詩所以列於五經者豈章句之云哉葢有増乎綱常之重關乎治亂之教者存也非知道者孰能識之非知道者孰能為之人孰不為詩也而不知道豈吾所謂詩哉嗚呼若朱子感興二十篇之作斯可謂詩也己其於性命之理昭矣其於天地之道著矣其於世教民彛有功者大矣繫之於三百篇吾知其功無媿雖謂三百篇之後未嘗無詩亦可也斯道也亘萬古而不亡心㑹而得之豈不在乎人哉讀陳仝甫上宋孝宗四書予始讀仝甫論史諸文見其馳騁為驚人可喜之談以為仝甫特尚氣狂生耳未必足用也及觀其上孝宗四書不覺慨然而歎毛髪森然上豎嗚呼仝甫豈狂生哉葢俊傑丈夫也宋之不興天實棄之使孝宗之志不伸者史浩沮之於前湯思退敗之於後及仝甫上書之時孝宗之初志己衰矣當隆興間孝宗茍聞此言將不踰時而召用之寧使同甫至闕報死於布衣而不用哉設用同甫聼其言從闕則未必無成功而卒不用者天也宋之不闕孝宗也興亡天命非予所知予所憾者以同甫闕而不得一展以死又豈非天哉展弗展不足以論同甫予所深悲者世愈下而俗愈變士大夫厭厭無耻有言責者不敢吐一辭况若同甫一布衣乎人不以為僭則以為妄得全身進退以死於牖下若同甫亦幸矣尚何不用之足闕世之相逺二百年而闕相下如此使同甫而見之當何如耶遜志齋集巻四欽定四庫全書遜志齋集巻五明方孝孺撰
