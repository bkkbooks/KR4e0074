body:
  text: 雜著毁譽一人之所好可以信其為善人乎一人之所惡可以信其為非善人乎未可也一人易私也衆人之所好可以信其賢乎衆人之所惡可以信其不賢乎亦未可也衆人易誣也然則惡乎從從其時之君子其為人也君子其是非也必明其去取也必當其為言必可信而無阿一君子之所好惡不問可信其為賢否也衆君子之所好惡不問亦可知其為賢否也何者恒人有衆寡君子無衆寡也通齊國之人皆惡匡章孟子獨取之而齊人之言皆廢衆誣而孟子直也舉滕國之民皆信許行而孟子獨斥之而滕民皆以為然衆私而孟子公也茍非君子雖衆不足信而况其寡乎茍為君子雖寡不可忽而况其衆乎然則聽言之道亦可知也君子之守不可移也一人曰是可罪君子不信也必察焉稱人之善也亦然不惑於恒人之毁譽故足以為君子人毁而毁焉譽而譽焉於恒人也何擇嗚呼今之君子何其易於毁譽也不賢人也或告之曰某也賢則從而賢之果賢人也或告之曰某非賢則從而不賢之賢與否人也賢之否之者吾心也奚不以吾心賢否之而以毁譽之言為賢否乎曷為不思也恒人之毁人也有端其譽人也有由有忌而毁者五有忌其才而然者有忌其名軋已而然者有忌其位髙不及而然者有忌其貲多不分而然者有忌其為世所重而然者惡而毁者四惡其直諒不比也或毁之惡其正而不可以私動也或毁之惡其賢而彰已之惡也或毁之惡其得君而不獲自肆也或毁之恒人之毁不出乎此者鮮矣出乎此而信之以行誅責焉行威怒焉則賢者遇禍而不賢者得志矣其譽人也有二利之而譽者四利其徳已也利其賜已也利其勢可倚也利其名可衒也畏之而譽者六或卑而畏之或以其貴而畏之或以其臨而畏之其勢盛也或脅之其黨衆也或使之其名震也或讋之由是而譽非其本心也不察而信之慶賞因之而施爵禄因之而頒則不肖者愈熾矣鄰乎號道乎吠而從之者鷄犬也取於物而不求諸心斯其為物也焉有君子而可以毁譽動乎雖然以毁譽易心者不知人者也以毁譽自變其行者不自知者也古之君子信道也審而自知也明其中無缺萬人毁之所疑當作漠如也其中未至也萬人譽之確如也彼豈以外易内哉人知之也未嘗喜人之不知也未嘗愠其心方師友乎聖賢而以百世為旦暮蚋集而蛆散者於我何哉嗚呼不以毁譽觀人者吾弗得見之矣能不變屈於毁譽於道也其庶矣乎鄉原或曰鄉原奚謂徳之賊也曰以其偽也奚為其偽也曰務同乎衆而不知道也一鄉之中有善人焉有不善人焉君子惟取乎善人而已不善者雖強附以從不取也怨怒以謗弗顧也於善如是也於不善如彼也斯為君子已矣使善不善咸悦而無殊焉寧知非不善人之徒哉鄉原者欲人咸悦而不擇義理者也欲人咸悦者鄉原之情也君子不可以利悦小人可以貨誘者天下之勢也以其私情動天下之勢必不可兼致而偏勝焉則與鄉原合者必毁君子不合乎汗者必惡鄉原之人鄉原之不善於君子則思所以擠排擯斥之於是視君子如仇讐而善人之類銷矣其賊徳也孰大於是曰若是則盜也奚原乎曰以名則盗凶而原吉也以言其禍與其原也寧盜虎皮而虎質可備也羊其外而虎其中不受其禍者鮮矣方大剛直者其内必疏通而不回詭佞而下人柔和而易喜者其險且戻莫測也故能餌人以甘言者必能中人以危法飾小謹以釣名者必能為巨虐以厲民以鄉原致位者胡廣也以鄉原竊國者王莽也無他由偽也閔俗何曾於晉非名相公孫五樓於南燕為亂臣趙括於趙氏為敗子然括能讀父書傳五樓料劉裕用兵曾知晉室将亂後世稱材智者有所不若也嗚呼豈特賢者不如古哉斥妄君子之於衆人其生與死同惟生而有益於世死而無愧於心者為君子其不能然者為衆人此其所由異也使飲且食焉以養其生而於世無補雖有喬松之夀猶無生也不能奉天之道盡人之性自致其身於無過雖談笑而亡猶不得其死也古君子所以汲汲若不及者未嘗以生死入其心惟脩其可以無媿之道焉耳天之全以賦我者吾能全之而弗虧推之俾明養之俾成擴而施之澤於天下後世於人之道無所愧雖不幸而乖於天迕於人死於疾病患難何害其為君子哉不能盡人之道而欲善其死者此異端之惑也異端之徒其立心行已固已大畔於君子視倫理之失夷然以為宜爾而不怪其身雖生其心之亡已久矣而猶務乎不死或尸居以求其所謂性命或餌金石服草木而庶幾乎坐化而立亡以預知其死為神以不困於疾病為髙彼既以此夸眩於世愚者惑者又從而慕效之不知其所云性命者果何道而預知不困者果何益耶孔子曰窮理盡性以至於命斯聖賢所以為教而人所當為者也窮天下之理而見之於躬行盡乎三綱六紀而達之於天道尭舜禹湯周公孔子之所傳人之為人不過學此而已生者知此而後可生死者明此而後可死入乎此則為人出乎此則為鳥獸不可毫髪去也異端者果足以知此乎其所云性命者果不異於聖賢之所云乎其去禽獸果逺乎皆不能然而惟緩死之求審如其言能閱千載而不死與木石何異曾何足勝於人而效之耶况其生死亦與恒人同其不為疾病所困而預知其死之期特寡慾清心使然耳不足以為異也苟以隠几而死為異則植物皆立枯茍以預知為神則鳥有知死而哀鳴者此二物者亦足異耶故不能盡人道雖不死而無益盡人之道雖不得其死猶不死也記禮者稱孔子将終曵杖負手而歌聖人之於生死宜先知之然不若是不害其為聖人也聖賢之於道不茍同於人於跡不茍異於俗道欲其同則枉已跡欲其異則駭世皆非聖人所為也舎聖人不效而惟異端怪術之師幾何而不䧟於禽獸耶啓惑天地之生物有變有常儒者舉其常以示人而不語其變非不語其變也恐人惟變之求而流於怪妄則将棄其常而趨怪故存之而不言後世釋氏之徒出意欲使天下信已而愚舉世之人於是棄事之常者不言而惟取其怪變之説附飾其故以警動衆庶其意以為此理之秘傳者人不及知而我始發之遇一物之異常輒張大而徴驗之欲稽其故則荒幻而無由欲棄其説則似是而可喜凡民之愚者皆信而尊之奉其術過於儒者之道而不悟此真可悲也夫運行乎天地之間而生萬物者非二氣五行乎二氣五行精粗粹雜不同而受之者亦異自草木言之草木之形不能無别也自鳥獸言之鳥獸之形不能無别也自人言之人之形不能無不相似也非二氣五行有心於異而為之雖二氣五行亦莫知其何為而各異也故人而具人之形者常也其或具人之形而不能以全或雜物之形而異常可怪此氣之變而然所謂非常者也非有他故而然也今佛氏之言以為輪迴之事見無目者曰此其宿世嘗得某罪而然耳見罅唇掀鼻俯膂直躬者曰此其宿世有過而然耳見其形或類於禽獸則曰此其宿世為鳥獸而然耳不特言之又為之書不特書之又謂地下設為官府以主之詭證曲陳若有可信而終不可詰此怪妄之甚者也天地亦大矣其氣運行無窮道行其中亦無窮物之生亦緜緜不息今其言云然是天地之資有限而其氣有盡故必假既死之物以為再生之根尚烏足以為天地哉譬之炊黍火然於下氣騰于上累晝夜而不息非以已騰之氣復歸于甑而為始發之氣也茍人與物之魂魄輪轉而不窮則造物者不亦勞且煩乎非特事決不然亦理之必無者也且生物者天地也其動静之機惟天地能知之雖二氣五行設於天地者不知之也使佛氏者即天地則可今其身亦與人無異何以獨知而獨言之乎多見其好怪而謬妄也今有二人其一人嘗遊萬里之外而談其所見則人信之茍其身亦與我俱處于此而肆意妄言則喪心狂惑人耳雖鄙夫小子亦知其妄且誕佛氏務為無稽之論正類乎此而人皆溺而信之豈皆不若鄙夫小子之知乎何其迷而不知悟也悲夫言命方子灌蔬于圃客有言禄命之術者方子曰若欲知命之説乎窮乎天理之紀推乎日月星辰之行參乎氣運往復之端而後可以言命之粗而余何暇言之而若亦何暇聽之然吾方治蔬試與子言蔬可乎始吾與二鄰人藝蔬各數十畦其土同樹之時同蔬之種又同其一人薅之甚時溉培甚宜其蔬為最盛藩籬不固一旦牛逸而踐之無遺植也其一人怠而不治時雨既畢草處其上而蔬伏其中萎翳隕穫無復生色吾閔二人者之為葺吾籬使物莫能踰數耘屢溉俾蔬無所害故吾之植獨盛以大茲三者亦可以言命否乎世之敏於封植進取以致富貴而不虞外患者踐於牛者也不能自脩而困賤貧者勝於草者也於命何預焉今徒言豐嗇禍福制於天者有必至而不察修治警戒由於人者有未至天人之道離而命之説窮矣雖然此吾庶民之圃之喻也非王者之圃之喻也萬民者王者之蔬也九州之内王者之圃也仁義徳澤其培溉之具也政教刑罰所以剔汙萊而理之也夷狄盜賊踐吾蔬者也酷吏横歛敗吾蔬者也聖人在乎上敗吾蔬者耘之除之踐吾蔬者斥之攘之而嵗免其租月賜之酺同其好惡而恤其窮孤故其民多富而少夭好善而無殃斯時茍以六物推民之災祥豈無短折貧困者乎而卒不售者人事修而天莫之違也及其不然可以踐敗之者有所不修而可以培且溉者有所不行故其民多不能遂其性而樂其生然其命之出乎天者豈無夀福康寧者乎亦卒乖戾者人事廢於下而天亦莫能違也故盛世衰世之民其命皆不可推宜然而然不然而不然此人所能知數之所該也不然而然宜然而否此理之所不可徴天地之所不能易而况於區區之數乎若行乎今之世其操術必精矣閱乎世之人必衆矣亦嘗見有宜死而夀宜賤貧而富貴如吾之所稱者乎茍有遇焉則幸以告吾将擷圃中之蔬歌太平之盛以與子言命越巫越巫自詭善驅鬼物人病立壇塲鳴角振鈴跳擲呌呼為胡旋舞禳之病幸已饌酒食持其貲去死則諉以它故終不自信其術之妄恒夸人曰我善治鬼鬼莫敢我抗惡少年愠其誕瞷其夜歸分五六人棲道旁木上相去各里所候巫過下砂石擊之巫以為真鬼也即旋而角且角且走心大駭首岑岑加重行不知足所在稍前駭頗定木間砂亂下如初又旋而角角不能成音走愈急復至前復如初手慄氣懾不能角角墜振其鈴既而鈴墜惟大呌以行行聞履聲及葉鳴谷響亦皆以為鬼號求救於人甚哀夜半抵家大哭叩門其妻問故舌縮不能言惟指床曰亟扶我寝我遇鬼今死矣扶至床床裂死膚色如藍巫至死不知其非鬼床裂二字疑誤吳士吳士好夸言自髙其能謂舉世莫及尤善談兵談必推孫吳遇元季亂張士誠稱王姑蘇與國朝争雄兵未決士謁士誠曰吾觀今天下形勢莫便於姑蘇粟帛莫闕於姑蘇甲兵莫利於姑蘇闕今夫王闕將闕而不闕此䑕鬬耳王果能將闕中原可得於闕士誠以為然俾為將聴自募兵戒司粟吏勿與較贏縮士嘗遊錢塘與無賴懦人交遂募兵於錢塘無賴士皆起從之得官者數十人月靡粟萬計日相與講擊刺坐作之法暇則斬牲具酒燕飲其所募士實未嘗能将兵也李曹公破錢塘士及麾下遁去不敢少格蒐得縛至轅門誅之埀死猶曰吾善孫吳法右越巫吴士二篇余見世人之好誕者死於誕好夸者死於夸而終身不自知其非者衆矣豈不惑哉遊吴越間客談二事類之書以為世戒明辨或曰蘇洵子之論明事約而功多其可為善言也乎曰其謂有大知小知者是也其所謂大智小智者非也聖人之治天下豈用詐術揣量天下之人情以為賞罰哉亦惟用其誠而已譬之天地之化隂陽誠運日月星辰誠行風雨雷露霜雪誠施寒暑晝夜之叙誠平物之囿乎其中者順之則生逆之則死其生與死天地豈以私意為之哉物各有以取之耳故物之生者不以生為恩死者不以死為怨以天地無意於生死也聖人之於賞罰豈異於是政教誠立禮樂誠備五刑五服誠陳隨其功罪而各得報焉為公卿大夫為士為剕為劓為墨為宫為大辟非聖人賞且罰之也聖人之法賞且罰之也非法有意於賞罰也受賞罰者自致之也故聖人埀衣坐乎廟堂而四海之人改徳繕行行於千萬里之外萌一惡心則慄然内懼恐其君之知之而不敢為修一善行則欣然自喜必其君之已知而不敢怠聖人豈能家察人視而使之然哉誠立乎此而應乎彼此明之大者也蘇子之言則不然以為人君之賞罰當若雷霆雷霆之擊物不測故人畏之如蘇子之言是天以詐術待萬物豈足為天哉世以天以雷霆罰暴惡吾不知其果然否也使其果然吾意天遇暴且惡者則罰之必不操狙詐之道盻盻焉瞷人之不意而使人駭且讋也夫務出人之不意而使人駭讋者市井相傾之小智稍知輕重者不為曾謂天而若是乎茍謂暴惡者不可得而盡誅故警一二以懲千百尤非也夫警一二以懲千百者亂邦姑息之政畏其衆而莫敢問不得已而為之耳非聖人之道也道貴乎至公善惡各當其報者道之常也今使千人而叛父母褻神明惟一人受雷霆之誅則此一人者獨何不幸而餘人獨何幸乎誅止乎一人為暴惡者将曰天之誅不能遍乎人吾何懼乎則其不善之心愈肆矣復何畏憚之有乎故謂雷霆誅暴惡者未必然也謂天以不測使人懼者非知天者也皆小智之私論也曰然則齊威王用此道而諸侯震懼者何耶曰彼固霸者之餘術耳烏足語夫王道且使威王而明則四境之内将不能欺之矣蔽於左右之人至於九載而後悟安在其智乎賢者非特即墨大夫不賢者非特阿大夫因左右之毁譽而賞罰斯二人其他有賢過於即墨不賢甚於阿者不幸而左右不言則無所賞罰焉則為鄰國之笑亦已多矣何震懼之有哉謂諸侯震懼者史氏之謬詞也蘇子信而取之過也彼蘇子者好於奇謀而不知道喜為異論而不守經吾恐世有好其説者以私智為明而禍天下故辨之學辨人莫不為學孰知所以為學也所以食者為飢也所以衣者為寒也至於學而不知所以其可乎哉夫人之有生也則有是心有心則有仁義禮智之性是性也惟聖人不假乎學能生而盡之非聖人之資也茍不學安能盡其理而無過哉故凡學者所以學盡其性而已不能盡其性而人之倫紊矣此人之所以不可無學也而學必有要焉何謂要五經者天地之心也三才之紀也道徳之本也人誰不誦説五經也而知之者寡矣茍不足以知其意雖日誦諸口而不忘謂之學則可矣而烏足為善學哉夫所謂善學者學諸易以通隂陽之故性命之理學之詩以求事物之情倫理之懿學之禮以識中和之極節文之變學之書以達治亂之由政事之序學之春秋以參天人之際君臣華夷之分而學之大統得矣然不可驟而進也盖有漸焉先之大學以正其本次之孟軻之書以振其氣則之論語以觀其中約之中庸以逢其原然後六經有所措矣博之諸子以覩其辨索之史記以責其效歸之伊洛關閩之説以定其是非既不謬矣參天下之理以明之察生民之利害以凝之踐之於身欲其實也措之於家欲其當也内燭之於性欲其無不知也外困辱而勞挫之欲其著而不懈畜而愈堅也夫如是學之要庶幾乎得矣發之乎文辭以察其淺深覈之乎事為以考其可否驗之乎鄉邦以勉其未至日量而嵗較晝省而夜思之功既加矣徳既修矣出而任國家之重位則澤被乎四表聲施乎百世矣處則折衷聖賢之道稽纉古今之法傳之於人著之於書以淑來者豈不巍巍然善學君子哉今之學經者吾疑焉童而誦之勦其虚辭以質利禄有釡庾之入以食其家則棄去而不省問其名則曰治經也問以經之道則曰吾未之聞也或者談治亂講性命於平居之時及登乎大位則惟法律權謀是行問其故則曰經不足用也於乎是可以為學經者乎經而無用亦可以為經乎然非經之過也學之者之愚也非學者之愚教之者無其術也雖學猶不學也吾故曰人莫不學而知所以為學者寡矣為其近利也浦陽山中有倪君正年四十餘而為學不輟予慕其好學而異乎世之所云者辨為學之道以贈焉指喻浦陽鄭君仲辨其容闐然其色渥然其氣充然未嘗有疾也他日左手之拇有疹焉隆起如粟君疑之以示人人大笑以為不足患既三日聚而如錢憂之滋甚又以示人笑者如初又三日拇之大盈握近拇之指皆為之痛若剟刺状肢體心膂無不病者懼而謀諸醫醫視之驚曰此疾之奇者雖病在指其實一身病也不速治且能傷生然始發之時終日可愈三日越旬可愈今疾且成已非三月不能瘳終日而愈艾可治也越旬而愈藥可治也至于既成甚将延乎肝膈否亦将為一臂之憂非有以禦其内其勢不止非有以治其外疾未易為也君從其言日服湯劑而傅以善藥果至二月而後瘳三月而神色始復余因是思之天下之事常發於至微而終為大患始以為不足治而終至於不可為當其易也惜旦夕之力忽之而不顧及其既成也積嵗月疲思慮而僅克之如此指者多矣盖衆人之所可知者衆人之所能治也其勢雖危而未足深畏惟萌於不必憂之地而寓於不可見之初衆人笑而忽之者此則君子之所深畏也昔之天下有如君之盛壮無疾者乎愛天下者有如君之愛身者乎而可以為天下患者豈特瘡痏之於指乎君未嘗敢忽之特以不早謀於醫而幾至于甚病况乎視之以至踈之勢重之以疲敝之餘吏之戕摩剥削以速其疾者亦甚矣幸其未發以為無虞而不知畏此真可謂智也與哉余賤不敢謀國而君慮周行果非久於布衣者也傳不云乎三折肱而成良醫君誠有位於時則宜以拇病為戒洪武辛酉九月二十六日述溪喻金華俞君子嚴受學於太史公将歸余送之溪梁之上指水而告之曰子知溪流之不息乎其為地卑也其為量有容也其為源深且逺也茲其所以不息也九仭之岡其形嶄然其勢巍然時雨過之如走建瓴不逾時而失之矣甕盎之器大者受石小者受斗石滿斗盈欲加㳙滴則旁出而横溢矣蹄涔斷潢行潦是資雨霽潦乾則枯涸繼之矣斯三者以其為地髙為量狹而無其源也夫學亦何以異於此乎以孔子上聖之資猶且學乎詩書易禮至於耄老而不敢怠知學之不可無源也當世之人無足與侔矣而猶問乎老􅅨問乎師襄問于郯子問于太廟之有司見婦人哭則問之見習水之丈人則問之其於人無所不問豈人之智有過于孔子哉知學之不可自狹也至於徳已成矣足以比尭舜而友周公矣人稱之為聖則驚駭歎息而不居而顧自儗於老彭之好古左丘明之知恥人問之農則曰不如農問之圃則曰不如圃與三人行則以為必有我師其自卑下者又何如哉此孔子所以為聖也夫人之患莫過於自髙莫甚於自狹而莫難乎不得其源源乎周公孔子之道則固終身資之而無窮用之生民而有餘矣茍他求焉吾未見其不涸也廣其中惟衆之容充其内不拒乎細於學庶乎有得矣自貴而賤人自盈而拒物吾未見其善學也歉然而若虛凝然而若愚戚戚焉如恐不及而失其塗學而有得焉庶乎可守矣嗜名而務耀衒智而自材吾未見其能至也嗚呼之水未足以喻乎道取其類而已子其觀乎海哉爍之以九年之旱而不見其涸灌之以百川之流而不見其盈舟檝載之而不重蛟龍龜魚鯤鵬蝦蠏巨細並育乎其中而不以為功然海之致此者其為地卑其為量有容其源深且逺亦無異乎溪之為也嗚呼子其去而益浚其源哉無若岡之髙也無若甕盎之狹也卑取而廣容得之勿以為足守之益致其恭太史公之為教若是而已矣雖孔子之道亦若是而已矣子其行哉余深有望於子越車越無車有遊者得車於晉楚之郊輻朽而輪敗輗折而轅毁無所可用然以其鄉之未嘗有也舟載以歸而誇諸人觀者聞其誇而信之以為車固若是効而為之者相屬他日晉楚之人見而笑其拙越人以為紿已不顧及冦兵侵其境越率敝車禦之車壊大敗終不知其車也學者之患亦然聖人之道離之為禮樂政教法度文章合之而為性命之原仁義之統其事業在詩書其功用在天下粹而全大而正確乎其無不具也不幸而敗於私欲折於異端昧於衆人之不知窒於學者之多岐於是世各以資之所近為道愿者以小慈為仁剛者以嚴刻為義能言者溺於言而不求於所不言嗜名者以詭僻立事而未嘗要之於至理人人莫不自謂得聖人之全而聖人之大全卒為天下裂譬之摧輈斷轂之車置而不用猶或可以欺世茍責之以任當世之重其不僨人之事幾希故人不知學足以害其身而不能禍天下學不知道而多才能其為害也大矣是以學以知道為貴知道以識其大全為貴存之於心體之於身見之於事而著於言一以聖賢為師少有未至自視凛然若耳目手足之不完也恒以為已憂則為善學矣挾其易成之技而不求道之大全者皆敝車類也仙居陳憲直與其同姓之友子頴奉其縣大夫之命謁予山中将率儔輩從予以為學予固求聖人之全而不得者自度不堪師人且今學校之所學者将以為道乎将以為進取之計乎抑将以任當世之重而推所得以及人乎如止以期進取則無用吾言矣茍志乎行道以及人舎聖賢将誰師哉而奚取於吾徒也夫所慕者聖賢也所法以自期者亦聖賢也則其行事幾於道也必矣舎聖賢之不師而僕僕焉求吾徒之愚者而師之吾懼憲直子頴之為善學者笑也雖然觀其細可以知其大於吾徒也猶不之遺而况聖賢之道乎然則憲直子頴之取善也周矣其所慕者殆非進取而已也不惟進取利禄之慕而以道為歸余雖魯且病固将以憲直子頴為友於其别而去也欲無説得乎公子對越諸公子問於方子曰竊嘗聞之聖賢之道其廣猶天其深如淵微顯咸該隂陽同𤣥太上得其全其次致其偏見之於事功横被乎八埏則可以使蒸民各樂其性鳥獸魚鱉萌芽生植皆全其天茍不能然猶可以整齊前古之墜典刮磨徃哲之遺編開生民之錮蔽埀皇極於千年故君子身無間於出處位無間於崇卑莫不欣欣自適無往而不致其樂焉今吾子懐淑明之資循正中之塗所準者莘尹叔旦攸師者仲尼子車談經則融成坐斥稽史則遷固受誅幽探神秘明執道樞洞燭千古遐瞰九區由暴須鄙賜億柴愚睨不嗛心恐受其汙神交顔閔㝠與之符其於今世宜何如也胡乃志抑氣歛恒若不豫瞠乎若有望而又失焱乎若欲求而弗遂愴乎疑有懐企乎如有慕不知吾子奚與古之樂道者異也方子曰唯哉否否吾有所思也雖然公子試以吾意言之公子曰人情之交咸有歆嗜自非聖智不能絶去今豪族貴冑穹門䆳户畫棁雕楹文簾珉礎蘭芬麝蓊錦爛綉昈燕趙之姝秦越之女環居雜處置酒髙㑹叩鍾擊鼓奏雲和之琴列陽阿之舞駢跣更進奠巵獻簋態姸意姣目挑頥許其味則熊膰豹胎蛟脊麟脯天鶬海獸江瑶林雉珍怪譎詭燮舌暢齒雖易牙之善調不能知名而遍數其歌則按宫協商和律附吕開闔造化咀嚼今古抗聲則雲驅而風湧含調則瓦震而莛舉庭鳥為之逥翔星辰為之吞吐聽者忘疲醉者復寤雖師曠重生不能别其音而較其譜酒䦨歡極狂發氣駛令徒召卒弦弓礪矢被盤龍金縷之裘跨希驥騊駼之馬長㦸麾前短兵夾輔遇者䑕伏觀者魚駭殱林罄谷不遺飛羽割肝為炙刳血為酒鞍負車懸羅列左右暮出朝歸樂以忘老亦何快與子則羮藿被褐坐擁簡冊帷裂不聨床敗闕足介狷無失困抱孤獨寧不有思於彼乎方子曰公子謂顔回慕跖乎滛樂田獵狂夫所好君子不談吾不思此也請更陳之公子曰學之所貴以能行也處下不能以施逺故願得意而偶時也唐虞之世内有四岳外立羣后設牧十二命官惟九契司廸民䕫典飭冑行必全於兼資徳必絶乎虐傲備三則為大夫得六則為邦君言語明試車服旌勲斯時之為士者亦可謂難矣下逮成周制完典郁惟徳行藝三物咸六乏一則見少於鄉具美斯獲預乎禄雖有俊傑之姿偉特之才分既大定向無設公卿之位析侯伯之爵周之士子亦何其碌碌也逓䧏迭興更統二千雖因革各異華實多愆然較其任賢容衆銖十闕桶闕有若于今之易易然也今國家濯穢滌汙天覆日明掄山攟穴旁取遐徴士有一藝者不以其賤而不用生乎四裔者不以其夷而見輕或自萌隸而有國邑或自寒酸而為公卿或以韋布拜二千石或以一言之美而擢令丞於古之起漁釣相板築無以異於文王武丁矣士之據崇座寝大厦御吏控胥呵咄叱咤闕五馬静途羣臺轡馬過者為趨乘者為下聽訟理政冠帯孔都喜則死灰復然怒則豫章立枯耄倪延頸而歎息奸詐側足而睢盱其或善者則慕循良之為敷惠和之治羣生霑其澤千里受其惠暴夫戾士闕之威棓削闕骨髓殺戮慘逮嬰嫠聲張勢盛顯抜鸞旗丈夫至於此也豈不足以自恣也哉吾子之思思謂是矣方子曰位以行道非是之謂也且富貴不可求吾何思此哉公子試稍髙之公子曰烝民之生紜紜兟兟憧憧奔奔外則寒暑燥濕之候動其志内則飢渴嗜欲之情役其身茍不有人以治之争奪戕戮之禍作而仁義忠信之道泯有皇上帝鍳觀下土擇其賢智神武者而俾為君土廣民衆俗變事殷非一人之所獨治故必舉賢哲而為臣臣惟千百曷以使之久而彌敦譬之九罭之網必揭之綱目乃不棼六馬之車必節之轡乘乃不僨故宰相者上以佐天子中以和百官平隂陽撫夷狄而下以養兆民得其人則朝廷社稷安而衆庶驩非其人則兵革興四夷横而區宇分故其位至重而天下莫與争其居也華榱刻桷亞於天子之廬其行也旌節導前上駟文軒闕辟易車殷則雷霆騰闐變色則海内膽裂微笑而八荒春温在人主之前進退否臧黜邪進良唇虚緩絞齒利劍鋩九卿執事望門膝行叩顙階頳屛息氣僵手司榮辱心制短長睚眦必酬巵酒必償賓客竊其餘威可以脅僚吏子弟藉其緒寵足以納逋亡䛕徳而誦業者投刺而請見迎意而希合者嚮望而搆裳中機則為雨露忤㫖則為風霜權利鼓動當世休烈埀之無疆位至於斯亦可謂極崇也矣吾子豈思之乎方子曰位崇信美也然有道以處之則易以為福無道以處之亦易以取禍且吾聞君子不患無位患無以稱其位公子之言夸尚權勢非守位之道吾不為是也請談其他公子曰乾濡坤茁人物肇發絪緼紛紛雜沓轇轕非聖立極何繇自别伏羲至神人文始孽旁覩凝矚仰窺俛察奇偶變易畫三卦八六合旁魄如嚢斯括姚姒繼轍益闡彌晰握操簡筆紀徳敷業商承周擴閎衍軒豁昭羅星火交揭日月罝罟千紀蒐獵羣物大政宏猷纎微恍惚籠絡綰結山載海畜厲幽汙衊典法遺脫天孕巨聖手秉神鉞剷刮蕪穢誅伐驁逆搜亡緝絶以有六籍典謨雅正訓誓激切三盤懇至諸誥惻怛詩道民情振滯宣欝頌純而和雅肆而達闕維闕商魯維闕風有正變憤怒蕩潏怒而不争刺而不訐正樂闕春秋主斷嚴簡予奪易幽而微大傳辨黙周禮主政論有本末宏充宇宙細析毫髪其宜孔多存者猶闕樂亡靡徴器數漫滅更秦之熖而中厄矣後儒區區摩簡續韋韓轅申毛説詩之師書出耄伏口語嗢伊孔壁嗣興安國訓治易禮春秋説者紛披各黨攸聞攻擊他岐錯忤迂誕異舌同辭其流謬妄至雜以䜟緯湼以𤣥虚沮於名物道愈乖離有宋羣哲紹而定之提聖之心表之通逵砭去積疢掃除目翳經至於此亦可謂無遺矣而或猶謂詩書失乎贗河圗近乎誣禮駁不純春秋難知呫呫乎其未有所底也吾子之思殆謂是乎方子曰經吾所盡心也雖然聖人既逺學者忽常好大喜為謗排吾竊不取傳註至於近世亦可以止矣吾安敢訐前人之缺失以取不遜之名哉則聖者立言賢者述之傳註之儒功少而事左吾不敢慕也公子曰聖殂教分别為異門曰有先師維孔元孫上紹參傳知道之原述為中庸性命是言枝葉交横本乎一根歛入無朕散被無垠厥𦙍于鄒闖聖之垣遂登其堂據道發論齊梁之君南面僣尊兗衣大圭視若孤豚狙詐相傾辨説如雲告以仁義耳塞不聞退緝道要埀諸空文㤗華讓崇菽粟儗珍河海恥富綺綉推温違者雖彊而踣循者雖弱而存䟽鑿齊功典謨誥訓峻極莫繼深𣺌絶倫揚雄吃而靡暢王通談而不純舂陵後奮黙契化元揭圗著書要而不煩河洛之間有伉弟昆關西之英參翔以騫敬以立懦禮以攝昏洗濯塵鑑􅂱然如暾遺書之多寳璐璵璠支衍而南大發于閩手抉衆流屬之崑崙絲繅髮櫛緒引毫分此七君子者皆所謂立言者也他若荘周荀况糠粃當世瓦礫諸子汙漫淪􅔿無有涯涘老􅅨禦冦與周同軌𤣥虚澹泊棄蔑禮義管商功利晏墨吝鄙非析翊虐秦斯詐詭六國之間述者如蝟不韋致客吕覧以叙采掠攘掇咸有綱緒屈原申憂怨不至誹瑰奇雋抜為詞賦始劉安叛誅其書甚斐事糅道厖猶傳不毁賈生智敏計謀孔偉仲舒守正於道有取遷修厥職事核文史造端創法綜統遐邇班固繼蹟辭直而理東京至隋質喪聲靡退之在唐裂去綉絺易滛以淳反麗以俚觝嘲異端軻雄是儗栁李皇張胥和俱峙金石鏘鳴黼黻交煒載越六代四氏繼起豐約温深各臻厥美此雖未足亞乎立言亦可謂述者之次也吾子豈非思法乎上者而恐力未迨欲就次者之事而心猶恥之故恒有所思乎方子曰立言之任吾則豈敢嘗願學焉然古之聖賢不得已而後言非其所樂也公子曰一氣之胚人物以滋孰戚孰䟽奚尊奚卑禆海吾池鎮嶽吾坻中國吾家兆庶吾肢肢疹則唏家悖則悲賢聖不治不媿何為洪水之難三聖歎咨跋履九州尫瘠胼胝䟽鑿為夷民用恬熈夏桀亂虐成湯拯綏爰有元聖立極修彛文武易暴叔旦是釐慮深制備靡有闕遺澤潤數世不刑而威嬴酷項悍漢武以國歴年既安而鮮有徳文以清浄景以私刻法䟽佐庸孰徴成績唐任齡晦小康乃覿宋之真仁僅臻富殖盖上下數千載而冶者如斯否者可識也生民之困烏得不極闕仗鉞抗旌踐江作京東披西勦朔伐南征陸屠狼豕水斬蛟鯨殱扶魑魅焚炙鼯狌殫智疲神大憝以平於是更制定律造政明刑重修人紀肇植天經嵗郊時廟日省月程乃作帝宫乃鞏禁城憲臣思法戎衛握兵小大相維内外迭承經營一紀而庶績丕凝已云至矣則而守之邦國可貞矣然聖謨炳然如日運天猶歉焉有陋徃代而卑漢唐之意盖欲追三王儕二帝而永皇祚于萬年滄海之波非一山之泉武庫之弧非一絲之絃立功埀紀固非一人之智獨士之賢所能盡其大全也然則設施建述之序何革何因何後何先行何徳而民裕用何道而化遷将補罅而塞漏将改範而陶甄将徼近效而速成抑圗深植而久安将使民懾而服抑使民悦而不忍捐将王而巍巍抑霸而烻烻将漸之以禮讓抑道之以詐諼孰當孰非胡易胡難此志士賢人所宜深究而熟謀時習而勉旃者也吾子之所思者意其在是乎方子曰嗟公子何言治亂之理邦國之事有位者之所宜思也鄙小且賤安敢僣妄為逺大之論乎然回也布衣而問為邦聖師韙之子車遊於諸侯舉稱尭舜君子大之若予則願學聖師之道者也公子有問敢終黙乎且公子之所陳廣矣髙矣奥矣幽矣余不能酬矣然鄙人之志不可不為公子言之也昔者聞之為國之道安於均定於分人成於序同於和而後可及其餘也虎豹熊羆處乎山而争啖相噬聖人養之同圈而寝分肉而食不敢他取此均之有道也先王知養民之不可不均也於是度田而井之冠受老傳通勞並獲業專而心一顧徳而行式維之以井邑丘甸縣都聨之以鄰里鄉黨州閭故其民無邪僻也崇閎峻墉穿窬不窺敝藩穴户童子攘資先王知分之不可不嚴也故天子尊於公公尊於卿卿尊於大夫大夫臨士士異於民諸侯降於天子伯降於侯子降於伯男降於子諸侯雖尊不敢蔑天子之卿士公卿雖貴不敢齒天子之路馬朝覲聘問行於上廵守錫予報於下殊禮加土以旌賢貶爵行罰以懲憤分定於上而不紊故内尊而外安先王病民之無叙而乖也教之以禮使父子兄弟以順以悌婣戚朋友以敬以愛三讓而升百拜而飲視毛避路遇杖歛衽故暴戾之風息而民易使為酒食饗㑹以合其歡忻為歌詩琴瑟以通其滯滛為羽籥于戚以道其倦怠故民樂於為善而不能為亂夫然後有教焉教之不循有政焉政之不從有官府之治焉故民終身不可使之見刑罰之威夫穉子在抱而啼告之以可畏之人則止使可畏之人立於其姆之前而威之則不畏矣見之習則玩之也民可使之見仁義禮樂仁義禮樂習其心則善思生刑罰習其心則不善之思生故為治者不可不慎也此其大凡也推之極其詳致之盡其公而又行之以弗厭此先王所以治且久也訾之以為迂玩之以為愚則吾不能知之矣自漢以降諸葛亮有大賢之才而不聞聖人之道司馬光范仲淹有君子之風而無大賢之才余亦欲講一王之法推往昔之軌正而不窒通而不泥施之於人足以富庶而知方用之於後可以世守而無弊茍無得乎時猶将折衷性命之㫖損益禮樂之事以傳之後世此吾之思也若公子之所云雖美吾焉能若是哉公子逡廵離席辭謝變色而言曰吾乃今知君子之思小子不敏請服明訓終身不敢言事多有缺悞余頗妄志於聖賢之道以為天下之事皆所宜為故所著公子對其言大而近夸夫言夸則駭俗所以人不好之故未嘗敢以示人吾友浦陽鄭君叔度獨誦而喜之謂余曰君子之所為揆於道如何耳奚顧人之好惡子言誠戾乎道則人以為夸也誠不戾乎道寧知世無知之者耶而子何疑焉余愧其言不能詰乃書一通并識其説歸諸叔度蚊對天台生困暑夜臥絺帷中童子持翣颺于前適甚就睡久之童子亦睡投翣倚床其音如雷生驚寤以為風雨且至也抱膝而坐俄而耳旁聞有飛鳴聲如歌如訴如怨如慕拂肱刺肉撲股􅏐面毛髪盡豎肌肉欲顫兩手交拍掌濕如汗引而嗅之赤血腥然也大愕不知所為蹴童子呼曰吾為物所苦亟起索燭照燭至絺帷盡張蚊數千皆集幃旁見燭亂散如螘如蠅利觜飫腹充赤圎紅生罵童子曰此非􅏐吾血者耶皆爾不謹褰帷而放之入且彼異類也防之苟至烏能為人害童子拔蒿束之置火於端其烟勃欝左麾右旋繞床數匝逐蚊出門復于生曰可以寝矣蚊已去矣生乃拂席将寝呼天而歎曰天胡産此微物而毒人乎童子聞之啞爾笑曰子何待已之太厚而尤天之太固也夫覆載之間二氣絪緼賦形受質人物是分大之為犀象怪之為蛟龍暴之為虎豹馴之為麋鹿與庸狨羽毛而為禽為獸躶身而為人為蟲莫不皆有所養雖巨細修短之不同然寓形於其中則一也自我而觀之則人貴而物賤自天地而觀之果孰貴而孰賤耶今人乃自貴其貴號為長雄水陸之物有生之類莫不髙羅而卑網山貢而海供蛙黽莫逃其命鴻鴈莫匿其蹤其食乎物者可謂泰矣而物獨不可食於人耶茲夕蚊一舉喙即號天而訴之使物為人所食者亦皆呼號告于天則天之罰人又當何如耶且物之食於人人之食於物異類也猶可言也而蚊且猶畏謹恐懼白晝不敢露其形瞰人之不見乘人之困怠而後有求焉今有同類者啜粟而飲湯同也畜妻而育子同也衣冠儀貌無不同者白晝儼然乘其同類之間而陵之吮其膏而盬其腦使其餓踣於草野離流於道路呼天之聲相接也而且無恤之者今子一為蚊所􅏐而寝輒不安聞同類之相􅏐而若無聞豈君子先人後身之道耶天台生於是投枕於地叩心太息披衣出户坐以終夕鼻對方子病鼻寒鼻窒不通踞爐而坐火燎其裳裳既及膝始覺而驚引而視之煜煜然紅盖裳之火者半也於是罵鼻曰夫十二官各有主司維鼻何司别臭察微臭之不察何以鼻為今火帛之臭亦烈矣而爾頑若不知遽俾火毒燼裳及衣壅蔽之禍豈不大可悲乎久之鼻忽有聲聲與口同曰我受命為子之鼻今二十又二冬蘭􅊉椒桂其氣苾芳我聞我知俾子佩藏槁蕕腐鮑風腥氣惡我覺其穢俾子避匿子足不妄履而出不遇毒者皆我之得職也今子乃昧於治身宜煖而寒去裌就單為風所加外鑠内欝壅我鼻觀遂至火燎切膚而不知其然皆子之過也於鼻何罪焉假使服食以節起處有常順隂爕陽無所敗傷鼻寧有不聞馨香乎且古之志士至于耄老猶且居不求適維道是奮大雪皴肌而爐不暇近恐適意之致毒知炎上之生災不可不慎也今子當始弱之時有荼毒之禍方當茹氷嚼雪塊枕草坐愁思怵廹凍餓摧挫猶恐不可而乃放不加思恣肆頹惰當祁寒時遽自溺於火為身計者良已左矣不此之責而反誚我為何哉夫壅蔽之禍厥有攸自秦亥蠱昏趙髙乃弑彼梁偏任斯有朱异隋廣淫酗而世基以肆木不虚中蟲何由萃此三主者茍以至公為嗜好以衆庶為耳鼻上宣下暢無所凝滯雖有奸邪何惡之遂顧乃偏僻猜忌執一遺二以蕕為薰椒蘭是棄由是禍亂交興宗覆社圮今子不務自尤而維鼻是訾一身之理且不達况於政治也哉方子仰而嗟俯而愧屏火捐爐凝神養氣既而鼻疾果愈醫原羿能教人射而不能使人命中王良能教人御而不能使人無衘橜之虞術之精微可以言語授而非言語所能盡可以度數推而非度數所能窮茍不黙㑹于心而欲持昔人一定之説以應無涯之變其不至於遺失者寡矣况得其法而不知其説者乎醫之為術於生民之用最切其説之至粹而出於古者莫過素問難經述隂陽氣運之理辨形體榮衛之原以明養生治疾之道非古之神睿聰達者何足以與此然其精微之要得諸心而見于効者固有不可以言傳者矣書豈足以盡其意乎後之學者不能求其為書之意而泥其説是以言論非不可喜而不良於用甚者棄書不省而惟攻乎淺陋拘閡之方書天下之疾萬變無窮而風氣古今之殊資稟厚薄之異服食之品勞逸之差静躁之度奉養嗜好居處習業所遭之時所遇之變人人相懸也茍非深思博考以周知其故而欲按既試之法銖比兩較之以治人之疾此奚異用鄉射之儀於臨敵制變之頃哉其取敗也必矣人固有盛寒而飲水者亦有遇風而欬者有披甲馳馬操劍槊行數百里而不汗者有出門輒勞憊不能行者相去寧啻十百此資稟之殊也古之人多碩大敦厚夀至百嵗今人未壮而先衰不老而已病豈能原闕一頁而夕果雨貴人喜起而行乎庭達旦疾若脱去明日後至之醫來謁貴人喜且問曰先生前日脉疾而言雨今得雨而果瘳何也醫對曰君侯之疾以憂得之然私計君侯忠且仁所憂者民耳以旱而憂以雨而瘳理固然也何待藥而愈邪若是醫者可謂得其道矣方書之所具成説之所有夫人皆能用也求之於言語之外而得其所不言之意非奇士其孰能之始余聞四明有世醫邵君真齋善為方視人疾以為不可治者必不治而所治必取奇効心竊識之今年真齋過余坐而與之語畏慎恭慤不妄有所稱引而於察脉用藥信乎無所茍余益信服之生民之疾多矣不度可否以身試之而無成者相踵其有如真齋之不茍用而必成功者乎有能求周公孔子之意於法度之表者乎茍難乎其人則余於真齋不宜無説也作原醫以贈之雜問天曷為而運乎地曷為而處乎日月降升曷為而有寒暑乎峙者曷為而山流者曷為而水乎鳥曷為而飛獸曷為而走乎孰明而可見孰幽而不可覩乎上下千載孰不變乎四方萬里孰不異乎人何由而出庶類乎心何由而參天地乎有生芸芸奚不朽乎有為而成孰長乆乎三五之道具六經乎六經委棄曷作程乎易辨治亂政之禎乎書著訓謨道之英乎禮以範俗樂和以成乎詩以蕩邪善之萌乎春秋賞罰人倫之城乎措之孔易施之孔明乎革澆紏慝化虛為盈乎萬彚咸育刑息讓興乎神人昭格天地以寧乎安如泰華百世其貞乎智力不煩神恬以清乎舎經舎經勞而不逞乎曷以成俗復井田乎井田奚先民平均乎南國廹隘自中原乎鄉保相恤恩義敦乎禮導樂宣亂奚臻乎曷以弭暴蠲濫法乎法繁衆死民玩何怛乎罟罛交陳魚能活乎促不憚死寧不跋乎欲民之訓省苛察乎曷以致治貴任人乎人疇為賢明且仁乎明以斷姦仁煦民乎州伯羣牧儼若神乎毋挫其柄久以責勲乎内外咸修治斯殷乎莽莽九土育羣氓乎性殊俗異厖服詭形乎嚘嚶侏離駭可憎乎亶究厥原二氣之生乎長吾諸父幼吾嬰乎摩疢療飢舎已以征乎審圗審思君職成乎錐可舂乎杵可為裳乎戈可書乎筆可以為兵乎橜可為楹乎楩楠可為杗乎牛可以驂乘乎馬可以軛而耕乎物各有性材曷可更乎治能無體政能無經乎方仭之址可為九成之臺乎一尺之基及肩之垣能不頽乎周曷為而延乎秦曷為而遽顛乎厚基廣址不在厥先乎三代異尚道亦異乎忠質化原文何貴乎秦之繼周豈尚刑乎漢之寛大亦善承乎唐尚諌諍自其始乎宋尚儒術奚而中圮乎奚王奚霸奚為美乎以法弭亂亂足弭乎以刀理髮髮可理乎弭亂何以其以寛乎牛飫芻豆復踰閑乎以兵威逺逺來服乎撝戈召賓賓将格乎何以格賓恭敬酒食乎何以來逺化被中國乎周有世積而厥􅍈綿乎漢唐何積而亦然乎豈視其身之仁暴不以其先乎周公之制煥哉章乎曷不足善其國至於削弱而亡乎豈聖人之智未深長乎抑後嗣不守自逢殃乎夢夢之中孰主尸乎善惡誰報修短誰司乎孰流而為電安發而為雷乎将一氣之行於沖漠人固莫得而窺乎周公孔子一何少乎跖蹻羿寡如蓬蓼乎豈天嗇其賦乎抑人不由其道乎俗流如川将日降乎川流彌下将安障乎民性孔善古何異乎施徳敦仁能無治乎鹽車之下有完驥乎鞭笞之下有賢士乎蒿藋之野有麒麟乎暴戾之國有忠臣乎投骨兩犬能無噉乎以利示民能無濫乎上之攸好下無趨乎上之攸尚下無為乎藝芳盈畦可以飽乎摛文充棟以明道乎求道於人不知在我乎秉燭煌煌出而求火乎啜粟衣帛與尭殊乎尭徳萬世獨不如乎孰非顔乎孰非孔乎而為庸民能無恐乎我晣晣乎孰得而涅乎我規規乎孰得而虧乎晣晰之至與神同明乎規規之至與天同形乎志将適楚能至趙乎志在修辭能知道乎鑿江浚河患無瀾乎道明氣充患無文乎天孕兆民猶厥子乎既受而生奚復死乎人之生死果有命乎桎梏巖墻孰非正乎君以出命将不然乎猛虎黠盜豈皆天乎祐惡抑善豈人常乎顔冉何厄而盜跖何昌乎豈至貴者名固足以厄其身乎将在乎人善攫者貴富而守道者貧乎豈民禍天地而剪除者乃得賞乎何屠城赭邑子孫貴盛而爵號宣朗乎踐蟻轢蛙果有辜乎彼起與籍戮人如刈麻将何法以誅乎均為天民奚貴奚賤而肆力以虐乎居天之位弗治以害果天托乎匹夫盜金能不賂吏乎胡盜予奪生殺之大柄而睢盱自恣乎有功於天孰過儒乎奚嗇其後而困其軀乎是非褒貶侵天職乎彼賞罰者又何蕃且息乎儀秦何積所遇喜乎孟荀何薄而困辱以死乎豈聖賢豪俊天所棄乎将闒葺委𤨏人所比乎狐兔如丘麟何少乎庸夫駢肩孰聞道乎道曷難行豈幽幽闇闇如漆如墨乎豈拘拘曲曲于蔓于棘乎將昭昭皎皎如出日乎坦坦朗朗如矢之直乎奚釋而弗思去而弗即乎見珠在淵能不求乎見羊躪苖能不憂乎胡道在身棄而弗修乎私欲躪厥天而日休休乎七日不食能不死乎一息不省能存天理乎人重死其身而輕死其心誰謂膏粱食犬豕乎五狼一羊羊能無傷乎衆惡一心心能無亡乎秉圭在廟能無寅乎執敬無愆能不仁乎一子堕井父能食乎萬民顛隮天胡弗惻乎天之任君猶人俾牧乎既食其直將芻其畜乎畜之不息主無惡乎肆暴殄之能無怒乎天之示君豈不章乎天之慮民豈不長乎妖星異災猶咄叱乎膏露嘉禾賚酒食乎蒼麟朱鳯果為祥乎武宣何修而來遊翔乎頟􅋕跖蹻盜之渠乎奚獲麟十六以駕車乎周衰政乖二百紀乎易姓幾何治者何主乎漢頌文景黄老之效乎曽謂儒道不若彼老乎唐始善相稱房杜乎稽籍考勲有可數乎􅆷厥母兄戾孰京乎胡抑心降志從魏徴乎太宗造基豈非哲乎徴言是從而徳彛以察乎斯民之性古何異乎孰謂古道不足治乎枕虎以寝能無囓乎招敵自助寧不滅乎天地何際中外何限乎隂陽晝夜何相反乎君子小人何性同而趨逺乎九州之外𣺌何窮乎鄒衍何見而嘵嘵以誑彼恫乎𤣥針視海能無惑乎無有羽翼孰知其極乎日月何弊乾坤有閉塞乎闇昧昏黒将如日之夕乎豈肇造人紀重建極乎長生久視寧有斯理尭舜大聖奚亦死乎偓佺安期果何在乎誰能不死閱千載乎怪士好誕非愚孰惑乎剖符尚主誅之何益乎異法汙華紛其可駭乎緇衣髠首曷徧四海乎藉其成佛復何庸乎滅倫敗類惰厥躬乎流毒深且久曷不去乎不伐厥本勞斧鋸乎井田法布孰有游民乎歛其浮誕化以仁義孰敢不循乎教出一孔政曷窒乎持之勿變屏異術乎申韓鄧慎世之虺乎刻削巧苛暴者奚喜乎用法如流奚不怛乎操刀終身寧不自割乎尭民之命皆富以長乎桀民之命皆夭而殃乎均為天民何所賦之不同乎抑偶值其時乎將命不可必而難知乎爵禄賞罰君之寳乎亷恥節義世之道乎俾民賤寳君安所貴乎俾民棄道世何能治乎秦法凝脂奚致亂乎漢網彌闊奚不犯乎火逼牛尾寧不觸乎孰云禍亂民所欲乎孰非民乎孰富孰貧乎孰衣文綉孰如懸鶉乎屈為傭𨽻天寧不仁乎仁莫如井田井田不易在任人乎封建莫復天下為私乎擇賢命爵尚庶幾乎刑措民滋世有不熈乎䇿問十二首問孔子刪詩書斷自唐虞以下其事詳矣至於二帝三皇系之所自未嘗稍及之盖慎其疑也及漢太史遷為三代世表乃稱尭舜禹稷契皆黄帝之後何所徴而言歟尭以二女女舜咨詢羣臣皆謂有鰥在下曰虞舜尭未嘗識之也使舜而與尭同族尭治天下以親九族為首其有弗識之者乎遷謂黄帝生𤣥囂𤣥囂生蟜極蟜極生髙辛髙辛生放勲黄帝生昌意昌意生顓頊顓頊生窮蟬窮蟬生敬康敬康生句芒句芒生蟜牛蟜牛生瞽叟瞽叟生舜自黄帝至尭四世而至舜乃八世其世數之踈數姑未論烏有聖人而娶四世之祖姑者乎舜百有十嵗而崩時禹年七十固未耄老也而遷乃謂禹為昌意之曽孫則於尭四從昆弟於舜為髙大父行矣安有四世之從孫年有百餘嵗而傳天下於四世之髙祖者乎黄帝至夏桀二十四世至湯一十九世湯又傳二十九世而為紂二代總之千一百二年而武王乃以黄帝一十九世孫而代黄帝四十六世孫紂何夏商周世次久速不同至此乎二帝三王之道學者所宜盡心而其事之難知有如是者皆不可不講也願聞所以折衷問孔子作春秋譏躋僖公傳謂子雖齊聖不先父食盖人之大倫不可紊也後世祭孔子以門人從祀乃異乎此顔淵曾參子思雖賢子也路也晳也伯魚也父也子顧居上父乃居下豈特若躋僖公先父食之失哉而世因之而不革何歟且子思孫也位於祖之前孟子子思門人也與師對坐其能安乎漢以下大儒得在祀典者衆矣或學術不醇或名節可賤果可以升聖人之堂而無愧乎學校者禮義所自出而聖賢人倫之則也辨其得失使質諸鬼神而無疑學者職也勿以無位為辭問子曰誦詩三百授之以政不達使於四方不能專對雖多亦奚以為是古之誦詩者必能從政而專對也今三百篇具在大儒君子又從章析句釋之其義理詳明皆聖人之時所未有而未嘗有用之於事者何歟豈時殊事異而有所難用歟将今之學者不若古之人歟夫古人亦人爾謂今人舉不能及可不可也然十五國風二雅三頌之中可以為政者何説茍當專對之任則将何見幸悉陳之欲以觀有用之學問古之學者舎道無所為學孔子曰君子學道則愛人小人學道則易使也然當是時未聞有道學之名何歟近世大儒抗然以道學自名於世可謂盛矣世俗反非病之而不信或攻之以為黨或目之以為偽又何歟道學之名未立宜人才之少及其學既盛則宜賢者之多而後世之士顧不逮古先抑又何也豈古者教出於一故人興於行後世學術多岐亂真者衆雖大儒先生不足振起之歟若周程邵張數子及朱文公張宣公謂之道學宜矣東萊吕氏其學似與朱子不異宋史乃不列之於道學亦有説歟今流俗以道學之名相詬侮鮮有以此自期者夫學而不求道烏足謂之學歟諸君誦周公孔子之言不釋於口可謂有志矣然志於學而不講其所當學不可也願肆言之且以觀趨向之所在問古之君子有徳必有言有學必有用觀左氏所傳公卿大夫以徳行名世者言語政事皆卓卓可稱是果何由致此乎孔門雖以四科目諸子然顔淵問為邦之政子貢聞性與天道子游治武城夫子喜之其不長於一偏也如此何後世學者之不及乎惇厚之士未必能言而無徳者肆為邪詖之説以惑世博通載籍者多不能施諸事而不學之人妄為刻薄之政以病民徳之與學不能兼有所通豈無所自而然乎孔子謂誦詩者能專對為政太史公亦謂書長於政諸君之為學徳行所習也詩書所講也出而當言語政事之任亦可以庶幾古人乎幸明以告我問六藝之為用要矣古之人未有不通乎是而可為大賢君子者其度數之細為教之法亦可得而詳言乎考之孔子之書其於禮樂盖屢及之而鮮有問答射御書數者獨何歟豈六者之中亦有重輕本末歟抑此四者微而易知當時學者無不習熟而無事於問答歟後世之士學止乎讀書以射御為武事以書數為末技禮樂之音律制度往往以為有司所職無庸乎考習其通六藝者盖寡然而道徳明備者輒為天下所宗而莫敢議何其與古異歟今欲師古人而周通六藝則患無其傳且力不暇欲如後世之學止乎誦讀則授之以事於用必有所闕然則奚為而可乎豈先乎其大而後可盡其細乎將識其㫖趣綱要而纎悉曲折或可遺乎周公自謂多藝孔子亦曰遊乎藝聖人未嘗以藝為可後也學者仰師聖人而顧後藝其不可也決矣講其所疑盖亦聖人之意問古者致治之主莫過漢文帝近世小康之君稱宋仁宗考之史傳文帝於制度未嘗有更變創建曹參為相日飲醇酒與吏相應歌呼其朝廷不治甚矣而天下樂業者何歟仁宗之時用兵則屢出屢敗府庫則匱竭而無餘其視富強者有間矣而海内乆安終宋之世思慕其徳不忘果何由而致此歟請質言之以祛所惑問秦漢以來天下多言祥瑞以為國家之興率由乎此然三代之立國傳統可謂盛矣其禎祥之符亦有可考者乎孔子作春秋大而地震日食小而螟蝝􅈮鷁之異皆謹志之計其二百餘年之間諸國豈無禎祥之事顧棄而不道其意果安在乎麟鳯龜龍記禮者以為四靈祥之尤也春秋以麟終篇聖人之書之也以為祥乎抑以為異乎以為祥也則劉宋之暴五代蜀之亂紛紛見於其國以為不祥也記禮者何所據而云然乎近世歐陽子斷然闢祥瑞四靈之説之謬信其言也則經所謂作善降之百祥國家之興必有禎祥其説皆非乎抑豈祥者非物而在人乎願辨其所以然以折衷舊説之得失問昔者聖人嘗言誦詩三百而不達於政雖多亦奚以為是學詩可以為政也豈特詩為然傳稱書以道政事漢儒多引春秋斷大政則書與春秋亦政事之所自出也非特二經也易所以冒天下之道舉而措之民謂之事業則可為政者莫大於易記禮者謂班朝治軍蒞官行法教訓正俗分争辨訟非禮皆不可則禮又政之本也今之學者莫不專一經而兼習五經果能以經術達於政否乎夫使一人而兼言五經之治道固有所不及其各推所聞可以輔世淑民措于政事者詳擇而明言之将以觀窮經致用之學問欽覩今大誥謂鄉飲酒之禮申明古先哲王之教令斯禮之相傳尚矣果始於何時歟古者之行是禮一則賓興賢能二則鄉大夫國中賢者三則州長習射四則黨正蜡祭其詳亦可得而言歟賓主介僎之位有不同九十至六十豆數有多寡所以示民者其義果何在歟孔子嘗言觀於鄉而知王道之易易也夫鄉飲之近于王道亦有其説歟我聖朝稽古為治頒儀式于天下叙長幼論賢良别奸頑異罪人坐席叙徳與齒而犯法者列於外坐勸懲之意可謂著明矣是即先王化民成俗之道也其節文制度亦可得而悉陳歟夫明乎古之道而通乎當世之務學者之事也其毋多讓問人之行莫大於孝故聖賢之問答加詳焉今我皇上大誥之書明孝以訓臣民凡為臣子者所當服行而弗忘也夫所謂飲食之品温凊定省之儀出告反面之節父母有命善則速行乖於禮法則哀告再三與禮經所言亦相表裏歟事君忠夫婦别長幼叙朋友信四者之為孝可得而詳言歟所謂居處端荘也涖官必敬也戰陣勇敢也其事果何脩而可致歟若何而可不犯國法不損肌膚不致人之罵詈歟此聖誥之大綱也其條目可得悉數歟今也家傳而人誦則人人有士君子之行矣孝為先王之要道詎不然歟夫言明乎道雖千古以上之聖人猶尊以為經况聖謨之大諸生寧有不素講而熟究其義者乎其悉心以對問國之有才猶鉅山喬嶽之有名木也故觀木之盛可知山嶽之崇厚觀賢者之多可推國之盛隆三代以下稱最盛而歴年久者莫漢唐與宋若也漢之張子房諸葛孔明唐之魏徴宋璟張九齡陸䞇宋之李沆韓琦富弼司馬光皆顯于世者也其學術之異同事業之崇卑亦可得而論歟抱道徳而不大顯者若賈誼董仲舒之在漢韓愈之在唐周程張邵朱子之在宋遺言具存于世其源流統緒之詳亦可得而言歟昔之不大顯者使其居光顯之位其亦致漢唐宋之治而已歟抑能比三代歟孟子曰誦其詩讀其書不知其人可乎是亦所宜講也達而在位所欲學者為誰仕而不顯所成就者何事悉著于篇将以觀多士之所志遜志齋集巻六欽定四庫全書遜志齋集巻七明方孝孺撰
