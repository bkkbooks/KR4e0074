body:
  text: 雜著釋統上仁義而王道徳而治者三代也智力而取法術而守者漢唐宋也强致而暴失之者秦隋也簒弑以得之無術以守之而子孫受其禍者晉也其取之也同而身為天下戮者王莽也苟以全有天下號令行乎海内者為正統耶則此皆其人矣然則湯武之與秦隋可得而班乎漢唐之與王莽可得而並乎莽之不齒乎正統久矣以其簒也而晉亦簒也後之得天下而異乎晉者寡矣而猶黜莽何也謂其無成而受誅也使光武不興而莽之子孫襲其位則亦將與之乎抑黜之乎昔之君子未嘗黜晉也其意以為後人行天子之禮者數百年勢固不得而黜之推斯意也則莽茍不誅論正統者亦將與之矣嗚呼何其戾也正統之説何為而立耶茍以其全有天下故以是名加之則彼固有天下矣何不加以是名也茍欲假此以寓褒貶正大分申君臣之義明仁暴之别内夏外夷扶天理而誅人偽則不宜無辨而猥加之以是名使聖智夷乎暴桀順人者等乎逆弑也僥倖而得天下者雖其勢力之强無所為而不成然其心私計而深念未嘗不畏後世之公議今將立天下之大法以為萬世勸戒不能探其邪正逆順之實以明其是非而槩以正統加諸有天下之人不亦長僥倖者之惡而為聖君賢王之羞乎適事機之㑹庸材小人皆可以得志處非其地用非其時聖君賢王亦不足以成治功古之能統一宇内而動不以正者多矣秦隋其尤也動不以正而以正統稱之使文武周公而有知其不羞與之同此名乎故謂周秦漢晉隋唐宋均為正統猶謂孔子墨翟莊周李斯孟軻揚雄俱為聖人而傳道統也其孰以為可非聖人而謂之聖人人皆知其不然不可為正統而加之以正統之號則安之而不知其不可是尚可以建之萬世而無弊乎名者聖人之所慎也季子然以冉求仲由為大臣孔子忿然争之若二子之才魯之諸臣莫及也茍為大臣未見其為過而孔子慎而不許葢才如仲由冉求而以為大臣則伊尹周公將曷以名之乎伊尹周公大臣也則二子非其類矣故曰可謂具臣矣以秦隋而方乎周豈直二子之與伊尹周公哉使孔子而出其不混而稱之也決矣葢必有其道焉而不可知矣嘗試論之曰天下有正統一變統三三代正統也如漢如唐如宋雖不敢幾乎三代然其主皆有恤民之心則亦聖人之徒也附之以正統亦孔子與齊桓仁管仲之意歟奚謂變統取之不以正如晉宋齊梁之君使全有天下亦不可爲正矣守之不以仁義戕虐乎生民如秦與隋使傳數百年亦不可為正矣若夫以女后而據天位雖革命改物如偽周之武氏亦不可繼統矣二統立而勸戒之道明僥倖者其有所懼乎此非孔子之言也蓋竊取孔子之意也釋統中正統之説立而後人君之位尊變統之名立而後正統之説明舉有天下者皆謂之正統則人將以正統可以智力得而不務脩徳矣其弊至於使人驕肆而不知戒舉三代而下皆不謂之正統則人將以正統非後世所能及而不勉於為善矣其弊至於使人懈怠而無所勸其有天下同也惟其或歸諸正統或歸諸變統而不可必得故賢主有所勸而姦雄暴君不敢萌陵上虐民之心朱子綱目之作所以誅暴止亂於前而為萬世法也立一法而不足盡天下之情偽則小人將馳騖乎法之外而竊笑吾法之疎是孰若無法之愈乎故正統以處其常而參之以變統然後其變可得而盡也朱子之意曰周秦漢晉隋唐皆全有天下矣固不得不與之以正統茍如是則仁者徒仁暴者徒暴以正為正又以非正為正也而可乎吾之説則不然所貴乎為君者豈謂其有天下哉以其建道徳之中立仁義之極操政教之原有以過乎天下也有以過乎天下斯可以為正統不然非其所據而據之是則變也以變為正奚若以變為變之美乎故周也漢也唐也宋也如朱子之意則可也晉也秦也隋也女后之稱制也不謂之變何可哉正統則處之以天子之制變統則不得並焉正統之君非吾貴之也變統之君非吾賤之也賢者得民心得民心民斯尊之矣民尊之則天與之矣安得不貴之乎非其類無其徳民必惡之當時惡之後世以其位而尊之則違乎天矣故不得不賤之也貴不特於其身而又延及於子孫雖甚愚不肖茍未至於亡國猶尊之以正統之禮賤不特於其身而其子孫雖有賢智之才亦不能揜其惡夫如是而後褒貶明夫如是而後勸戒著夫如是而後正統尊奸邪息釋統下夫所謂變統之制者何也異於天子之禮也彼生以天子養沒以天子葬儼然帝中國而臣四夷天下莫與敵大矣曷為而異其禮蓋其所可致者勢也不可僣乎後世者義也勢行於一時義定於後世義之所在臣不敢私愛於君子不敢私尊於父大中至正之道質諸天地參諸鬼神而不忒也何謂天子之禮正統是也正統之君始立則大書其國號謚號紀年之號凡其所為必書所言必書祀典必書封拜必書書后曰皇后書太子曰皇太子后及太子歿皆曰崩葬必書其陵其諡有事可紀者紀其事所措置更革曰詔曰令曰制兵行曰討曰征曰伐施恵曰赦曰大赦施刑當罪曰誅曰伏誅違上興兵者曰反曰作亂曰犯曰冦曰侵倍之者曰叛其鄰國其臣慢之者必因事貶之知尊正統者雖㣲必進之不幸而至於衰㣲受制於强暴或屈而臣之强暴者誠亂賊也誠不可為正統也則盜賊之雄耳必慎抑揚予奪之辨其以兵侵也曰入冦得地曰䧟據都曰據至闕曰犯擄正統之君必易辭書其故見殺曰弑而書其主之名及其主之歿也特書曰死其黨之與謀陳力得罪於正統者雖功多皆書曰死以著其罪以絶其惡得共主之地其民有思故國而叛之者曰起兵以地降者曰来歸不為本國而反者彼亦不得而盜賊之也亦曰起兵得郡則曰取某郡其誘正統之臣曰誘執曰執殺曰殺將相則名其主正統之臣降於亂賊則亂賊之死不曰卒而曰死凡力能為正統之患者滅亡則異文書之以致喜之之意正統亂亡則詳書而屢見之以致惜之之意變統之異於正統者何也始一天下而正統絶則書甲子而分註其下曰是為某帝某元年書國號而不書大書帝而不書皇書名而不著諡其所為非大故不書常祀不書或書以志失禮或志禮之所從變則書立后不書尊封其屬不書非賢臣雖王公拜罷卒塟不書行幸非關得失不書詔令非有更革不書其崩曰殂后死曰薨大臣曰卒佐簒弑贊征伐以危正統者曰死聚歛之臣曰死酷吏曰死浮屠之位尊而因事得書者曰死毁正統陵廟宫室名其主用兵不曰討不曰征伐刑其人不曰誅天下怨而起兵惡而起兵不曰反惡乎簒弑非惡乎君也惡乎女主惡乎女主非其君故不得以君道臨之也惟於其臣於其親黨則得致其罪士之仕變統者能安中國則書能正暴亂除民害則書能明道術於後世則書有愈貴而愈賤者有愈賤而愈貴者利禄寵倖之臣愈貴而愈賤也守道不汙之士愈賤而愈貴也故君子之於變統外之而不親也㣲之而不尊也斷斷乎其嚴也閔閔乎恐其久也望望乎欲正統之復也是何也為天下慮也奚而為天下慮使女主而乘君位終于不復反正簒弑而不亡暴虐而繼世生民之類幾何而不滅乎立變統所以扶人極能言抑變統者君子之所取也深慮論一慮天下者常圖其所難而忽其所易備其所可畏而遺其所不疑然而禍常發於所忽之中而亂常起於不足疑之事豈其慮之未周歟蓋慮之所能及者人事之宜然而出於智力之所不及者天道也當秦之世而滅六諸侯一天下而其心以為周之亡在乎諸侯之强耳變封建而為郡縣方以為兵革可不復用天子之位可以世守而不知漢帝起隴畆之匹夫而卒亡秦之社稷漢懲秦之孤立於是大建庶孽而為諸侯以為同姓之親可以相繼而無變而七國萌簒弑之謀武宣以後稍剖析之而分其勢以為無事矣而王莽卒移漢祚光武之懲哀平魏之懲漢晉之懲魏各懲其所繇亡而為之備而其亡也皆出其所備之外唐太宗聞武氏之殺其子孫求人於疑似之際而除之而武氏日侍其左右而不悟宋太祖見五代方鎮之足以制其君盡釋其兵權使力弱而易制而不知子孫卒困於彊冦此其人皆有出人之智負蓋世之才其於治亂存亡之幾思之詳而備之審矣慮切於此而禍興於彼終至於亂亡者何哉蓋智可以謀人而不可以謀天良醫之子多死於病良巫之子多死於鬼彼豈工於活人而拙於活已之子哉乃工於謀人而拙於謀天也古之聖人知天下後世之變非智慮之所能周非法術之所能制不敢肆其私謀詭計而惟積至誠用大徳以結乎天心使天眷其徳若慈母之保赤子而不忍釋故其子孫雖有至愚不肖者足以亡國而天下不忍遽亡之此慮之逺者也夫茍不能自結於天而欲以區區之智籠絡當世之務而必後世之無危亡此理之所必無者也而豈天道哉深慮論二藥石所以治疾而不能使人無疾法制所以備亂而不能使天下無亂不治其致疾之源而好服藥者未有不死者也不能塞禍亂之本而好立法者未有不亡者也人身未嘗有疾也疾之生也必有致之之繇誠能預謹於飲食嗜欲之際而慎察於喜怒悲樂之間以固其元氣而調其榮衛使寒暑燥濕之毒不能奸其中雖㣲藥石固不害其為生泄敗之壊傷之而恃藥石以為可免於死此死者交首於世而不悟也夫天下固未嘗好亂也而亂常不絶於時豈誠法制之未備與亦害其元氣故也夫人民者天下之元氣也人君得之則治失之則亂順其道則安逆其道則危其治亂安危之機亦有出於法制之外者矣人常拘拘焉盡心於法制之内而不盡心於法制之外非惑與聖人之法常禁之於不待禁之後而令之於未嘗為之先故法行而民不怨欲禁民之無相攘奪盜竊也必先思其攘奪盜竊之繇使之有土以耕有業以為有粟米布帛以為衣食而後禁之則攘奪盜賊可止也欲禁民之無為暴戾詐偽不率倫紀也必先為學以教之行道以化之使之浸漬乎禮讓薰蒸乎忠厚知暴戾詐偽不率倫紀之為非然後可得而息也欲其無相滛亂也必先使之無鰥寡怨曠之思欲其無貪黷也必先使之知畏戮辱而重廉耻夫先使之可以無犯乎法而猶犯之者此誠玩法之民也玩法者非特法之所不容亦民之所不容也故刑罰加於下而民視之如霜雪之殺雷霆之擊以為當然而不敢以為非故民曉然知上之法所以安已也非所以虐已愛戴其上而不忍離卒有至㓙極悍之徒萌無上之心亦無繇而成事以其能固民之心也不能使之安其生復其性而責其無為邪僻禁其無為暴亂法制愈詳而民心愈離欲保國之無危是猶病内鑠之疾而欲求活於針砭及其死也不尤飬生之無道而責針砭之不良嗚呼曷若治其本邪深慮論三繼世而有天下者必視前政之得失而損益之知其得而不知其失懲其失而盡革其舊此皆亂之始也夫有天下逺者至於數十世近者百餘年而後亡其先之政必有善者及其子孫一旦而敗之亦必有不善者茍去其不善而復其善増益其所未足而變更其所難循求其宜於民情則可矣奚必使其一出於已而後為政哉三代以降昏主敗國相尋於世者非他皆欲以私意更其政而無公天下之心故也舜繼堯未嘗改於堯之政禹繼舜守舜之法而不敢損益湯之繼桀武王之繼紂反桀紂之所為復之於禹湯之舊損益之而已未嘗敢以私意為之也以私意為天下者懲其末而不究其本者也周之政可謂善矣本於唐虞二代之為而損益於武王周公二聖人之心後世雖有智者豈能過於二聖人哉暴秦起而繼之見其子孫敗於削弱則曰周之政弱於是更之以强周之刑過於寛於是易之以猛而不知周之法未嘗過於寛與弱也當周之衰國自為政苛刑宻禁四布而百出武王周公之遺意掃蕩無遺民不堪其主之暴虐於是亡六國而為秦則周之諸侯以强與猛而亡非過於弱與寛也秦不知其故不反武王周公之舊而重之以强濟之以猛於是天下怨苦而叛之非民之罪也變更之道非也夫政譬之弓然日用之則調越月踰旬而不用之則欹善治弓者見其欹則檠之使其調而已不善治弓者則折而棄之而更以朽株敗枲為弓以射射而不中乎禽豈禽之過哉棄良弓之過也天下之弓不能必其良否惟羿之弓不問可知其良以其善射而擇之精也後世之政其得失未可定也千載之後舉而行之而無弊者其惟武王周公之法乎深慮論四有天下者常欲傳之於後世而不免於敗亡者何哉其大患在於治之非其法其次則患守法者非其人也民心難合而易離譬之龍蛇虎豹然欲久畜之則必先求其嗜欲好惡喜怒之節而勿違其性使性安於我而無他慕之心然後可得而畜也既不失其性矣猶恐後之人未能皆若吾之用心專且勞於是立為畜之之法而著之於書曰如是則可以久畜如彼則將逸去而不可禁使後世雖庸夫小子能守吾法而不變亦可以畜之而不失此創業者之責也法可以治而亂也法可以存而亡也歸罪於子孫而委諸天命可也茍吾法有未盡焉亂亡因吾法以起而可謂之天命乎周之嗣王自成康昭穆以下惟宣王為賢其他者與漢唐亂亡之主無異然而至於七百餘年而後亡者守法者雖闇劣而其法善也當七國之時周雖已衰使有賢主如宣王者復出赫然奮發舉文武之遺典而修明之諸侯有不歛衽而朝者乎故周之弊在乎守法者非其人而不在乎法漢唐之法駁雜而疎畧得賢主則治不得其人即亂而亡故其弊在乎法不足周事而不可專罪守法之非人若秦之法固不可得守矣使有賢主繼始皇之後猶不免於亂况胡亥之刻虐乎故二者俱弊而亡者秦也隋之法與秦異而守法者與秦同故法雖不足以取亡而亡於暴虐者隋也此五世之君惟周之亡為天命秦隋漢唐雖為法不同而自速其危亡則一而已夫有天下者豈有自速危亡之心哉而子孫卒不免焉者其為法之過也世之為法者莫不欲禁暴亂貪猾詭偽盜竊之人而此數者常布滿海内之獄不為少止豈為刑罰之不重哉俟其為暴亂貪猾詭偽盜竊而後禁之而不能使其不為也聖人之為法常治之於未為之先使其心自知其非而不肯為故為法者不煩守法者不勞而民不敢為亂易曰豶豕之牙吉豶牙非無牙也有牙而不能傷也此聖人治天下之法也深慮論五治天下有道仁義禮樂之謂也治天下有法慶賞刑誅之謂也古之為法者以仁義禮樂為穀粟而以慶賞刑誅為塩醢故功成而民不病棄榖粟而食塩醢此亂之所繇生也山谷之民固多不待塩醢而生者矣其害不過羸憊而無力以塩醢為食不至於腐腸裂吻而死豈遂止哉人性非好死也常趨死之道而違生者告之者非也夫仁義禮樂之道非虛言而已必有其實本其實而告之人寧有不知其美者乎仁義禮樂之為人忌於世者繇夫虛言而不為事實者始告之以為仁而不告之以為仁之故彼將曰此虚言耳奚可用哉告之以為義為禮樂而不告之為之之事彼將曰此特其名爾安足信哉此聖人之道所以見棄於世而不振也持劍擁盾而謂人曰我善鬬人必信之儒衣冠而謂人曰我善鬬不笑則怒矣故欲人之見信必先示之以其事聖人之為仁非特曰仁而已也必有仁之政欲民之無饑也口授之田欲民之無寒也教之桑而帛麻而布欲老者之有飬祭享賔客之有奉也教之陂池而魚鼈牢柵而雞豚欲民之安也不為苛役以勞之欲民之無夭也不為煩刑以虐之親老子獨者勿事胎育而貧者有給以至於獵而不傷麛卵樵而不斬萌蘖皆仁也其為義也必有義之政上之取之也有常用之也有節均之也有分疆界也以防其争鄰保也以洽其歡車服也以昭貴賤衡量也以信多寡饑寒也減其力役之征畧其婚娶之儀學於閭也使其知長幼之序書於鄉也使其知善惡之效推而至於安生而達分尊上而趨事皆義也為禮之政而使民自揖讓拜跪獻酬之㣲各極其敬以至於五倫叙而三綱立為樂之政而使民自咏歌搏拊舞蹈之事充而大之至於和樂忠信不怨不怒而易使聖人之用是四者持之以堅凝而守之以悠久如待穫於秋濬泉於深必得其效而後止四者之化成天下之民膠結而不可觧有不齊者從而以法令之則令之易服而治之不難故三代之民非異於後世之民也後世之民常好亂而三代之時未嘗有一民為亂者治之者異也仁義禮樂入其心民雖知可以為亂而不能賞罰旌誅動其心民雖欲為亂而不敢不能者有所耻而不敢者有所畏也治天下而能使人耻於為非雖無刑罰可也恃法威而使民畏民其能常畏乎及其衰則不畏之矣三代以下雖有賢主而不足致治者欲使民畏而不知仁義禮樂之説也故為治不可以不察也深慮論六智者立法其次守法其次不亂法立法者非知仁義之道者不能守法者非知立法之意者不能不知立法之意者未有不亂法者也古之聖人既行仁義之政矣以為未足以盡天下之變於是推仁義而寓之於法使吾之法行而仁義亦隱行其中故望吾之法者知其可畏而不犯中乎法者知法之立無非仁義而不怨用法而誅其民其民信之曰是非好法行也欲行仁義也故堯舜之世有不誅誅而海内服其公以其立法善而然也夫法之立豈為利其國乎豈以保其子孫之不亡乎其意將以利民爾故法茍足以利民雖成於異代出於他人守之可也誠反先王之道而不足以利民雖作於吾心勿守之可也知其善而守之能守法者也知其不善而更之亦能守法者也所惡乎變法者不知法之意而以私意紛更之出於已者以為是出於古之人者以為非是其所當非而非其所宜是舉天下好惡之公皆棄而不用而一準其私意之法甚則時任其喜怒而亂予奪之平繇是法不可行也蕭何曹參世所謂刀筆吏其功業事為君子耻稱焉然何之立法參之善守法後世莫及也當秦之亡其患不在乎無法而患乎法之過嚴不患乎法廢而不舉而患乎自亂其法故蕭何既損益一代之典曹參繼之即泊然無所復為參之才何之所畏非不能有為者也特恐變更而或至於亂不如固守之為萬全爾夫天下譬之寳玉然法譬則韜藏之器然善為寳玉計者器既成則寳而置之勿動可也日持而弄之携之以示人挾之以出逰失手而墮地不碎則缺璺矣故國有治於疎畧而亂於過為之計過計者未嘗不笑疎畧者為愚而不知疎畧者為智大也故用智之為智衆人之所知而不用其智之為智非君子不能孟子曰禹之治水也行其所無事也豈止治水哉治天下者亦行其所無事而已深慮論七謂必積徳而後王乎漢唐奚為而有天下謂天命可以偶致乎項籍李宻奚為而不有天下此世儒難通之論也然匹夫之家致十金之産其先必有忠信之人謂王者而不繇於積徳固不可也漢唐之髙祖或起於隴畆或興於世族非有數十世之積累如周之先公而傳數百年之久謂不繇於天命亦不可也然則安所決乎有累世之積而又有聖人之徳者必王王必久而後亡成周是也雖無積於其先而有聖人之心者亦必王其亡也必與積久者異漢唐是也二者俱不足以王而得位者僥倖乎天命者也暫假之而已矣秦隋五代是也故天之立君也非以私一人而富貴之將使其涵育斯民俾各得其所也善於知天者不敢恃天命之在我而惟恐不足以承天之命不敢以天下為樂而以天下為憂視斯民之未安猶赤子之在抱養之以寛而推之以恕澤之以大徳而結之以至誠使其心服於我而不能釋然後天命可得而保矣今牧人之牛羊者欲其久而不易必蕃息之長遂之使其人喜悦而不忍易斯可以久牧矣茍鞭箠之饑渴之死亡其所授而欲求其不已易寧可得哉欲知天命之永與促視乎創業之主可見矣創業之主仁不仁天命民心之所去就也創業者不患法制之不修刑罰之不嚴而患乎教化不行風俗不美誠能施教化美風俗其後世雖有㝠愚暴悍之主天猶容而不遽絶之周自文武以降更足以亡國者數君而不亡豈天私之而然哉思創業者之徳而不忍也夫既無先人之積可恃以不亡又不及已之身修徳以庇其後而曰天命在我何往而不為秦隋五代之歸哉深慮論八驍勇之士多死於鋒鏑聰明之士多敗於壅蔽天下之禍常起於人所恃而出於意之所不虞其故何哉人可以有徳而不可恃其有徳可以有才而不可恃其有才恃之所生禍之所萃也匹夫持挺而立於賁育之前賁育變色而不敢動非畏之也不知持挺者之勇怯也使人號於賁育之門曰我勇蓋天下賁育則笑而殺之耳何哉真勇者固未嘗自恃其勇而驕人謂聰明者智足以盡萬物之變才足以通萬事之要而心常欿然夸辭不出於口忲色不形於面以旁求於當世之人故能謀者獻其謀有力者効其力凡一藝一能之士皆為之竭盡而不敢欺之以其所處者謙所求者廣而不自恃其聰明也夫茍自恃其聰明未有不敗於其臣者也蓋恃則自盈自盈則耻聞過耻聞過則人不告之以善而見聞日狹矣見聞既狹於是奸諛之徒謬為卑諂以媚適將順之於内而竊其威柄妄行賞罰於外是國家之大權潜移於下而禍亂乘之以起皆自恃其聰明之過也唐徳宗之於盧杞宋髙宗之於秦檜方其任二臣也自以為聖賢相逢驩然共政而不疑其時雖告之以為壅蔽彼固以為妄言而不信矣孰知為計之愚適為奸臣之所笑哉然則其所恃以為聰明者乃愚之甚者也故人君不貴乎智而貴乎不有其智不貴乎才而貴乎不居其才不貴乎聰明而貴乎取衆庶之言以為耳目不如是而好於自用者未有不敗於壅蔽者也深慮論九世之言治者亦難矣為任人可以治則二世之任趙髙哀平之任王莽元宗之任李林甫皆以任之太過而亂以為自用可以治則秦始皇隋文帝皆以自用而致滅亡然則果何繇而可治乎任人可也不得其人而任之不可也躬政可也自用而不用人不可也四海之事固非一人之所能知也君人者能正一身以臨天下擇世之賢人君子委之以政推之以誠而待之以禮燭之以明使䜛佞無所進其䜛信之以專使便嬖不得撓其功簿書之事不使親其勞獄訟之㣲不使入其心惟責之以用賢才治百官變風俗足民庶興禮樂而綏夷狄如農之望穡旅之望家必俟其至而後已茍有成功任之終其身不為久也爵之極其崇不為濫也功茍不成黜而屏之不為少恩也罰而殛之不為過暴也以此道任人則賢者可得而亂無自而生矣其或羣臣之才不足任而已不可自逸則常博求衆庶之善施之於政而持其大綱以提撥天下之勌怠洗濯天下之昏穢使吾身如日月之運為力不勞而纎㣲畢照如雷霆之威為勢不猛而萬物自懾則雖躬親聽斷亦何害其為治哉昔之任人而亂者衆人之所謂賢則不任必取其意之以為賢者則任之而不知其意之所謂賢者非希㫖迎合之徒則詐譎凶殘之小人爾用是而致亂非任人之罪也不能擇賢之罪也好為聰察則不然以為羣臣舉不足信而必欲使天下之事皆繇已出故往往流為苛細深刻而亦卒底於亡此非不能為政也不知為君之道者也夫為君而不能任人是猶御而不能轡匠而不能斵用力雖至而不能成功任人而不得其人猶轡而不以絲斵而不以斧也曰然則欲治者將何先曰明以擇人誠以用賢深慮論十為國之道莫先於用人用人之道莫先於作其好名喜功之氣好名喜功之人守常之主之所惡而創業埀統之君所願得而樂用者也舉世之才未必皆賢未必皆足用善用人者㧞一二於千百而使千百之人與之俱化而不自知此作氣之術也王良之馬豈皆騏驥哉當良執轡馳車試之於郊徐之則徐疾之則疾萬蹄之驟如一馬然非無駑劣下才者也雖駑劣下才者皆化而騏驥當其化也馬不知其筋力曷為而化而執鞭策日侍王良左右之人亦不知其為何為而頓異也獨良知之爾馬之材質得於天者已定王良豈能増益之哉能作其氣焉爾故以驥待馬則馬皆驥也以駑駘待馬則雖有善馬皆失其所為善堯舜之世其人豈能素習行義而盡過於人哉所以作之者異也人有好名而强諫直諍者有好名而修廉潔敦信讓者自其人言之則好名信非善事矣自有益於國言之取其有益於國斯可矣烏顧其出於好名哉善用人者因其所長而用之而不奪其所好彼好名也吾因而與之以名則天下之好名而願行其道者無不至而吾之才不可勝用矣彼喜功者能治民則喜因治民以立功能用兵則喜因用兵以立功能興禮樂理風俗則喜挾其所能以立功然使各盡其才而如其所欲則其所立非彼之功乃有國者之功也用一人而使喜功者皆至於國何損乎此之謂作氣之道不能用才者則不然恐人之好名而不肯假人以名恐人之喜功而不肯使其立功甚則抑挫之傾壓之使其氣消沮隕穫而不振然後授之以位於是百職廢而天下無竒才百行隳而天下無善士非真無其人也不能作之而然也此其為術至愚為計至私非豪傑之主其孰能知之遜志齋集巻二欽定四庫全書巻遜志齋集巻三明方孝孺撰
