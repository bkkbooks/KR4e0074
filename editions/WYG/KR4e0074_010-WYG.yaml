body:
  text: 書與采苓先生二首某質性椎鈍學不篤專行能無所可取執事不察而過采之置諸賔客之列加於子弟之上使推所聞知以相訓告訓之非其所能而叩之非其所有待之過其所望而惠之違其所安執事之為賜雖大而某之愧亦厚矣辭拜以來心殊欿然未嘗斯須寧也然竊聞古之君子受施於人則思有以報之或以玉帛皮幣或以牲牢酒醴必欲其稱且或有所不足則復繼之以言某貧不能以前數者為報而是物也又今世之所恒有而厭見者亦不敢以為禮獨於言嘗求之古而得於心雖執事之所自知然古諸侯大夫相與饗燕之際賦詩以致其意皆取世俗誦習之陳言似亦無嫌於己知而不之道也某試言之而執事擇焉可乎盈天下之民以百萬計以義見旌顯者惟一家時公卿以上鮮能世其德而今至於三百年不少衰此豈人力也哉蓋積累培植之功深逺闕之日隆必有所基而其衰變亦必有所漸為家者不恃久安之基而畏近似之漸漸者不然而將然欲至而未至衆人之所忽而君子之所深慮者也故危其危者常安而安其安者常危以幸為憂者常樂而樂其所樂者必憂執事之家可謂盛矣他人固安且樂之而以為無憂然為之後者可不思其漸而戒之乎人莫不曰為善而善不可虛言必見乎事而後能及物莫不曰由義而義不可暫事必日修之而後可法於世夫使舉家之人耳目之所濡染戸聞家見而孜孜如不及非執事作之而孰致哉執事年髙性醇輔之以令弟宜無取於某之言請為執事誦周文王之詩曰無念爾祖聿修厥德永言配命自求多福以此報賜其可乎不可也今賔客遊於門墻者多佞辭卑色以媚悦為事鮮有致忠愛之言者某趨乎堂而望乎室也久辱知與愛也深不敢猥自疎外同乎衆人之情故敢以所聞為獻其可聽與否則惟執事之擇焉太常經歴仲瞻三尊丈馳仰之意不異此故不别幅諸令弟皆乞道謝道途雖逺當圖㑹晤伏冀以道自重不宣尊使來臨伏審家政脩舉尊候天相多福為慰某鄙劣無狀向嘗獲厠下賔之末過愛眷厚感刻無量還家以來道里脩隔人事多故慶吊之意闕然不舉獲罪深矣今乃不惟不責簡慢復以祖母之歸捐辱手書兼以嘉惠承命悚仄不知所為道逺意殷弗敢固辭強顔祗受愧踰於感也執事以髙年厚徳主家政一門之内英才異能者如雲何施而不可而書辭若忘其踈逺乃使之有所言江海之大而取於蹄涔何所容其喙耶然好問用中在聖人猶然宜乎執事之不遺也家國盛衰人皆知其本乎天而古人以天命為可祈而永年少時讀書不識其意觀執事之家然後知其信然浦陽百里邑昔之富盛過於封君者多矣今皆不復存而執事之門屹然立於頺波横流之際不為時俗變遷昔嘗遊乎廢墟壊址問故老而求其衰替之由不曰驕奢縱肆則曰虐民以自殖也及察執事之家羣居則有禮焉臨財則有義焉字衆則有惠焉育才則有學焉是以久而彌昌引而益長雖瀕於災患而天卒不忍違之天非私執事也人事脩於下天雖欲勿從不能也然事天者不恃天之不我違而恃我有以合乎天夫天之生人無不欲其遂且盛也而有富貴貧賤之殊者勢之所至天莫能制之耳其勢莫能制之而其心豈嘗斯須忘哉使有餘者補不足吾意天必喜之矣人之艱危而不救吾意天必怒之矣執事家故事有無息之榖視人之死而無歸者有斂貧而無貲者有濟疾而無告者有藥願學而力不足者有師此數者皆天之所喜稍稍脩復使不足者有頼焉祈天永命莫要於此将見執事之家其昌且延非特若今而已也執事閱理精多斯皆常談非甚髙之論然邇言必察固君子之所不棄也惟恕其僭妄而亮其誠幸甚與訥齋先生辱書惠伏審義門嘗有不虞之灾繼沐殊常之澤驚喜交至若接晤言而書辭懇惻上昭國恩次述先美穆乎仁義之發舒自非積諸中者深且厚何能至是乎第斯文寡祐吾太常丈遽厭人世道路艱阻乃今始知疾疢沉綿無由致哀於一慟不勝悲慕耳伏惟執事友敬之篤叔車孝愛之誠日月遄邁追感何窮然求之當世令名全徳不渝終始清文博學可傳将來如太常公者絶不可得此豈隨世泯滅者哉念此粗自慰解伏枕呻吟作一文令人持去朔日之奠命祝史對靈几前讀之以泄殄瘁之哀絮酒炙雞恐不蠲潔不復賫上公其或者享此誠乎來徳堂叙事己甚文况自記先祖遺事必可傳示後嗣孝孺縱續其後復何所發明茍以嘗登斯堂宜有紀述則必得前記觀之乃可執筆耳壯歲難恃倐焉將老真如來喻反覆感歎夜不復瞑然道之通塞天實為之謂之何哉使天未欲墜斯文則吾徒不有立於天下將有見於空言無所聞於當今将有待於來世使二者咸無所得猶當飭身勵行以善遺子孫俾百歲之後鄉稱善人決不敢自汙於流俗以隳先父師之訓言也惟執事篤學力行實鄙心所敬畏願益以繼承自任與諸昆季恊心致志昌義門于百世揚先徳於天下以稱聖朝崇奨之深㫖夫道行乎一家猶行乎邦國也何患乎無以自見於世哉采苓先生稱慶想已旋半軒釋齋仲瞻及諸丈皆康強甚􅇺瞻企疾作不能遍作書問起居幸為道區區之意違逺日久願見之心甚於饑渴冬寒惟萬倍自愛荅鄭仲辯二首昔者相與時不自惟其無似竊欲勉人捐其所愛而蹈其所甚畏以赴太史公之難舉措䟽濶事卒不成以為世俗笑笑之誠宜也然鄙心豈有所為哉執事於羣笑之時獨若憫其用心懃懃焉見於言色以相勞勉此其志固己卓矣所圖既不果避禍畏事不能昭雪明徳揚於殿陛以掲其忠誠皆不肖無狀之罪而執事之所知也為别還家事變横生東西奔播自救不給顯缺聞乎不決其真妄將欲信之則有所不忍棄而不言則傳者愈多毎一念之仰屋悲歎不知涕泗之交頥也今春欲至浦陽而家叔為他人所䧟顛越厥家祖母與焉徬徨侍行凡五閱月程天之亦以祖母歸道出錢塘與浦陽相邇欲附舟一往而祖母之側不可違去自至家以來意豈嘗斯須忘耶受知受教最為深厚而圖報之心最為無所發明此其得罪於君子也果矣陳里來乃承惠言嘉其所存而奨其所至且以逺且久者為屬覽之愴然増愧凡人有待於外者己有所不足也待粉黛而後都者非西子之容也待砥礪而後利者非莫邪之器也盛徳之士豈待言語而後信於世乎如太史公之所蓄積論述巍乎浩然自可抗衡百世固己騰之天下之口而被乎四夷之外矣後遭謗棄抑而未伸要知久當自著而豈汲汲於俄頃哉如僕之愚幸不為世所卑賤者以嘗在子弟之列故耳執事不知僕有資於公而謂公俟後死者而後著烏在其能著公也然而文辭不可以不傳祠祭不可以無主僕心存之久矣遇時而終伸其道乎天也公之心果不顯白乎亦天也天定而人為之必有在矣不在僕将在執事執事不居将在同門之士而何慮其無傳乎且僕昔嘗紀載言行矣而紀載者末也古之賢士以弟子而愈彰者如王仲淹之於房杜王魏穆脩种放之於邵堯夫擴之而益廣舉之而益髙使人考其功業學術而知其師之所藴故師不可以無弟子弟子不可以不尊師太史公之屬望於僕者古人之心也而僕豈其人哉雖然天其或者未絶斯道使昏昧者獲有所知究觀遺論羽翼成說進而施於人退而終於己自今以後微有所立相與過從講切稱門下以著其所由來斯庶不負公之知遇也乎庶可報公之萬一也乎執事幸有以教之無徒褒其所可稱而不督其所未至也去年王仲縉至蜀承手帖喻以近讀佛書自遣心切疑之以為特戱言耳及朝京師於一初處見所往還書援佛氏之說甚詳向慕於彼者甚至然後知足下之果入於佛也夫儒者之道内有父子君臣親親長幼之倫外有詩書禮樂制度文章之美大而以之治天下小而以之治一家秩然而有其法沛然其無待於外近之於復性正心廣之於格物窮理以至於推道之原而至於命循物之則而達諸天其事要而不煩其說實而不誣君子由之則至於聖賢衆人學之則至於君子未有舎此他求而可以有得者也足下學乎此也久矣曷為一旦棄素所習而溺於佛氏之云也茍以佛氏人倫之懿為可慕則彼於君臣父子夫婦長幼之節舉無焉未見其為足慕也茍以其書之所載為可喜則彼之說必不過於吾堯舜禹湯文武周公孔子之格言大訓未見其為可喜也茍欲以之治心繕性則必不若吾聖人之道之全茍欲以之治家與國則彼本自棄於人倫世故之表未見其為可用也故世之好佛者吾舉不知其心之所存使棄儒從佛果能成佛猶不免於惑妄畔教之罪况學之者固逐逐焉以生昏昏焉以死未嘗有一人知其所謂道者邪以足下之明智篤厚不於吾道有得焉而顧彼之趨不亦異乎足下習其說者果出於誠心乎抑亦姑以為世俗好之吾亦從而好之以取庸衆之喜恱乎由後則自欺不可也由前則事其說必當從其教必去夫婦父子兄弟之倫必削髪披緇必水飲草食而後可不能如是則是口其書而身違之外好其說而心不誠亦不可也夫不習佛氏之說於道固無所不足習其說而不誠自欺非惟得罪於吾之道而反且得罪於佛亦何所取而為之也近世從佛氏者甚衆未有得福者有一人焉嘗識之初頗好儒既而著書佐佛氏斥儒巳卒死於禍計其人慕佛氏冀福利福不可冀而禍及其躬是未易曉也得非不誠抑且自欺故不䝉祐而獲罪於天邪福禍之報儒者所不論特閔其欲徼福而反致禍亦可為不守正而妄求者之戒耳計足下之卓於識而深於道豈真若世俗徼福之徒之為哉蓋世之儒者當年壯氣銳之時馳騖於聲利用智惟恐不工操術惟恐不竒及五六十之年顛頓於憂患顧來日之漸短悼往事之可悔於是覽佛氏空寂之㫖而有當於心遂委身而從事焉以為極明達而最可樂者莫佛氏之書若也雖昔之賢豪以氣雄天下以文冠百世如蘇子瞻諸公亦不免乎此後人習俗以為宜然且謂以前人之智識才氣猶以佛氏為可慕而歸之矧不及萬萬者而可不從乎然以道觀之凡有慕於彼者皆無得於此也足於梁肉者無慕乎糠糜安於厦屋者無慕乎苫闔使有得於聖人之奥其樂有不可既者窮通得䘮死生之變臨其前視之如旦夜之常而何動心之有奚必從事於佛而後可以外形骸輕物累哉舎可致者而不求援不可必得而求之既以自欺又畔乎吾道惑莫甚乎斯也昔與足下論斯道時僕年方二十三固己知吾道之有餘而無待於外物時不知者多竊笑之及今十有五年愈覺聖人之訓為不我欺而舉天下之道術果無以易之也每見流於異端者輙與之辯非好辯也閔夫人之䧟溺而欲拯之於安平之塗誠不自知其過慮也以故為佛氏者多不相恱方期與足下共進斯事以衛聖人之教豈意足下有慕於彼乎今有人言行路之人墜於井雖閔之未必徬徨奔走而思救之也聞至親且賢之人墜於井則不暇食息狂呼呌號而思出之矣親愛之故也與足下相與之舊而徳器宏深交友中不可多遇烏能己於言而不告乎僕今年三十七足下當六十矣相違十餘年相去萬餘里之逺使足下所慕得其正僕將有以佐而翌之而何敢逆盛意而取不讓之責乎蓋必有所甚不得巳者亮足下之賢必能察之而未至於深怒遽絶也數百年禮義之門而足下於今為老成人在乎慎重學術以表厲後生非特僕之望斯世之望也僕守一官無分寸補世教近髮有白者靣己皺筋力漸減飲酒不敢如昔者惟自覺有過每應事己時時悔之恃此頗謂尚可進未知天之處之者何如耳如有所得聞幸速以見教是亦為報之道也與鄭叔度八首叔度十三兄足下與足下處時雖知愛敬推服然未知足下之不可遇也及違别而來潛伏田里衣冠而趨者日接乎門而莫可與言然後知若足下者皆間世人也非斯世之常有也僕乃得而友之豈非幸哉夫世道之弊己甚老者己死少而壯者不復知有經術汨汨騖利胥誇世以為能聞有好學者則嗤笑排謗謂之迂惑人家鮮有蓄書者五經四書猶破闕不全加之郡縣漁獵朝伺暮窺蓄牧樹藝之所入先以賂吏自享乃其餘耳尚慮不得安息以是愈無完書僕雖有志事學亦不可遂非特風俗使然也視此滋怛然不恱侍奉之餘雖常以古書自磨濯遇有逆意處思有師友講說而不可見輙俯首以歎循庭獨行饑不念食夕不知寢足下謂僕有一時之樂否乎人之至親莫過於父兄宗族僕雖早失先人而大母諸父兄弟固具在日處乎其間宜有足樂者而顧謂恒有不樂人將謂僕非人情矣然僕之心足下所熟知也僕頑鄙之資無與於人少之時隣里見其癖於學多指目以為迂雖婣連宻邇者皆然也獨先人見竒以為可教及先人出官于外携以自隨愚有所述多出以示人稱譽如儕軰先人之意自謂庶乎見其有成也不幸而遽棄以死僕日夜痛恨恐卒無所成流於庸人以虧先人之明故思自奮㧞立名以自見于後世退而深惟有祖母存諸父伯兄可以養矣夫子欲繼父遺業揚先人名祖母所喜諸父伯兄所欲也烏敢辭譲焉遂勉而從學求學者舎婺無所往故至于足下之鄉學于太史公而後知為學之道大也聞太史公之言而後知天下之鉅人也嗟乎太史公之愛僕足下知之公之知僕惟僕自知之雖號知某者皆不知之也公嘗為僕言聖賢之道所以處僕者至厚矣僕雖非其人然頗識去就知好尚安敢忽哉知人天下之至難知巳者尤古人所重也僕嘗怪以魏舒之賢以其季父知人之明而終身不知之使之守碓夫人藴輔相之才而其季父日與之接其容貎辭氣豈無少異於人乎猶不能知之則夫俊傑之士非恒人所知亦明矣顧智者乃能察之耳恒人恒多智者恒少世而遇一人愛賞㧞於羣笑之中喜其可既耶古人之重知己誠有以也僕於太史公雖欲不思其可得哉相與處也而樂相乖闕也而悲謂非人情可乎惟足下知之耳足下之待僕雖昆弟何以過而僕於足下亦無所不盡然僕之愚而何益於足下而足下之為賜則既多矣僕嘗謂辭令趨走非所以報朋友故受人之惠未嘗以語言謝之惟存之心繼之以不忘有所成立則報之未艾也此僕固陋之私也足下其謂然乎足下淳明慈良有君子之噐又篤學不倦其至於古人也奚禦願益加之意以果所望僕近辯正周禮始成書欲脩邑先達事行為人物記無相輔者恐未易采録相見當在明年久不得太史公動静遣人送書聊具一二辭雖多不能盡承吾子意厚過稱僕之文有足觀者慚愧彌日不能自觧非謬逆盛意以辱知巳顧私情有異於此者鬱而不發無以答吾子一笑故敢畧說其一二僕聞古之人未嘗以文為學也唐虞夏商逺不可徴然觀於詩書數十篇中紀四代之功徳固若耳聞而目見至周制作大備孔子稱其文特言其禮樂憲章之盛耳故雅頌之所陳誥命之所述易禮之所論著崒然而崇淵然而深炳然而章明肆然而易直端大斯謂之文矣而豈有意而為之哉譬如登泰山之巔極乎目之所至而水則江漢淮泗山則鳬嶧龜䝉周秦齊魯滕薛梁鄭衛趙韓魏人民之繁鮮土地之廣狹皆得之於心故言之而不誣問之無不知澤中之夫升尋丈之丘而望焉所見不過東阡北陌鷄犬牛羊蹤跡輙逞智以談於人終不暢達而順適何者所見髙下之不同也故人有知道與否而文何以異此自漢以來天下莫不學為文若司馬相如揚雄亦其特者而無識為己甚夫屈原之離騷憂世憤戚呼天目鬼神自列之辭其語長短舒縱抑揚闔闢辯說詭異雜錯而成章皆出乎至性忠厚介潔得風人之義然務以忠情達志非拘拘執筆凝思而為之也至於其徒寖失師意流於淫靡而相如與雄復慕而效之窮幽極逺搜輯艱深之字積累以成句其意不過數十言而衍為浮漫瑰恠之辭多至於數千言以示其博至求其合乎道者欲片言而不可得其至與澤中之夫何異哉自斯以後學者轉相襲倣不特辭賦為然而於文皆然迨夫晉宋以後萎弱淺陋不復可誦矣人皆以為六朝之過而安知實相如之徒首其禍哉向非唐韓愈氏洗濯刮磨而力去之文殆未易言也僕少讀韓氏文而髙其辭然頗恨其未純於聖人之道雖排斥佛老過於時人而措心立行或多戾乎矩度不能造顔孟氏之域為賢者指笑目為文人心竊少之從總角輙自誓懲以為雖不易至孔子之堂奥而顔孟之事皆在所願學者茍循其路而望其廬烏有不至哉復以欲知古人之道必識古人文字故時習章句凡有所感觸亦間發之其意在明斯道非為文也而吾子猥譽其文為可觀此僕之所深懼而不敢居者也雖然吾子見其可而稱之乃愛僕之至而樂其有所成名豈有過哉顧失者僕耳僕奉先人之遺體二十有二年學雖未至而知其味者亦己數年矣而身不能由之口不能以告乃徒假紙筆為事宜乎吾子之以文稱我也僕今而後其知過乎夫人不生則止生而不能使君如唐虞致身如伊周宣天地之精正生民之紀次之不能淑一世之風俗揭斯道於無極而竊取於文字間受訾被垢加以文士之號不亦羞聖賢負七尺之軀哉僕齒年尚富又受君子之誨自謂不至此不止而儕侣之中無誰與語吾子明達敏慧乃肯降屈為僕友此真僕所願而未獲者也夫道有可言者而不言則何以見愚陋之心冀盡所懐不覺近於誇大惟諒之勿怪僕受質戅介處時俗中見其側媚相諛說常忿忿不與言誦古人書而求其道每慨然自歎安得直諒多聞者為友乎向嘗行天下走三四千里越五六年飲酒娛樂軟談麗語交懽釋悶者不為少矣然僕不喜也近幸天假之分得與吾兄友兄不以僕之愚傾然見愛僕以徒愛而箴規不聞懲惎不逮與昔者愛僕者何異故先發所懐以告吾兄越旬日而無所承命深用致疑以為吾兄豈鄙僕而不荅哉今乃倐爾惠書陳其所未喻開發所不及而懇懇督教之此固夙昔所願而未得者一旦見之於吾兄嗟乎古之朋友正如此耳僕何足以當之哉然其中有非僕之所聞者茍黙而不復是負吾兄之義而無以泄固陋之心故不遂止古人之為學明其道而巳不得己而後有言言之恐其不能傳也不得己而後有文道充諸身行被乎言言而無迹故假文以發之伏羲之八卦唐虞三代之書商周十二國之詩孔子之春秋皆是己然非為文也為斯道之不明也及孔子歿諸子乃各著書多者百餘篇少者數十篇雖未必一出於聖人之道然亦各明其所謂道而豈為文哉故孔子曰辭達而已矣孟子亦曰我不得巳也則非摹效言語為世俗之文可知矣孔門以文學稱者如子游子夏皆明乎聖人之道通禮樂憲章之奥未嘗學為文也缺誤游夏之學為當今之游夏其所著果何書乎以易之脩辭立誠之㫖喻世之學為文者吾兄其未察乎且僕前書取屈原之離騷雖多悲憤詭異之辭然終出於憂國愛君之意又肆意而作非相如揚雄之流夸富艷眩采色窮精畢慮而為之以惑世者相如揚雄之賦上林羽獵雖厲其辭義曽不足望其毛髪而作於闕實為以招禍者此昔人所嘗言不易之見也吾兄惡其出僕之口而非之殆非僕之所敢知也文所以載道僕豈謂能之僕所病者秦漢以下斯道不明為士者以文為業能操筆書尺紙鳴一時輙自負以為聖人之學止此今漢以來至五代其文具在吾兄試觀之可以明道者果誰之文乎謂其文為道可乎獨唐之韓愈稍知其大者而不能䆒其本故其文亦未能皆出乎正是以僕竊少之而願學孔子亦不為過也使漢以下之文皆能不背乎道僕何敢譽之有今文之所載非諛死人而徼其賂則媚權貴有氣勢之人以致其身求其有益於世者十無一二焉文與道判裂不相屬如此何以謂文僕所以畏文士之名而避之者欲明斯道以為文而反招俗之陋也夫道者根也文者枝也道者膏也文者熖也膏不加而熖紓根不大而枝茂者未之見也故有道者之文不加斧鑿而自成其意正以醇其氣平以直其陳理明而不繁決其辭肆而不流簡而不遺豈竊古句探陳言者所可及哉文而效是謂之載道可也若不至於是特小藝耳何足以為文僕之意蓋病此而願務其本耳然不可以易為也而亦不可以語人也貴自得之耳古之人未嘗欲人知之而世俗之人亦不足以知之豪傑之士脩於衆人之中混於隴畝之間忽然行於世則徳被生民著之書則澤流於後世豈務自耀哉孔子大聖人也魯人毁之孟子賢人也辯士譏之彼皆揖讓乎朝廷與諸侯抗禮弟子從而輔之者盈中國其道徳章明聲名震一世猶且如是信乎知人者之難也然知與否不足為孔孟累也直為後世惜之耳僕於聖賢未能望其藩籬又年少容貎言辭不能以動人羣羣然而趨諾諾然而語與俗人無異者而語人曰學道宜人之不能信僕非語人也自意既為朋友而不言其志何以明道故㣲有所云夫豈知言出而謗歸名異而毁來乎夫人性質禀受自其少時己定至長而後充僕之才非不自知平生於百事皆不曉達獨於聖人之大本頗謂見之甚明好之甚篤顧精力未深耳夫茍欲治斯世乎僕将抱遺經陳之達者而施之於天下茍未欲治斯世著之在書授之其人樂之以終身亦未見其不可也吾兄何憂我之不至乎然吾兄之謂我未至者是也此僕之所以重吾兄吾兄視僕於衆人之中與之語者何人歟與之詡笑徃復者為誰歟與之論辯而言斯文者又誰歟舉無有也雖僕之愚不合於時人亦私心有所臧否則以為無益而不加之意耳今世風俗凌壊為交友者務相容悦每出一文示人一覽己雖文不佳亦強顔稱譽出門則嗤笑之僕毎自思遇人有過告之曰子某事過則怒發於色矣否則不應矣否則絶不復往來矣至於僕有過亦無人肯言是以汨沒俯仰於流俗之中過大而心不知詬積而無與語或内視自省輙兢惕不安如身汙不潔朋友如是亦何用之哉吾兄平居言不出口乃能數僕之過僕今而後知吾兄之異於尋常人矣聞善而服者古人之事也僕豈難之哉子思有云辯之不明不措也僕懼不明道耳非好多言而文過也吾子其思之尚盡其辭以輔不逮不宣僕自少行天下見士大夫多矣靣與之交者雖常有之其於心相得意相投者未之一見非為僕不合人亦人不合於僕者也去年來浦江居太史公門時獲過從吾兄里第公門同序者不減十餘軰吾兄羣從中僕識其靣者亦數十人然知僕者乃吾兄而僕所愛敬親宻少間蔽者亦莫兄若也僕始常歎世人學術識見不同僕見以為黒世人則以為白僕以為是世人則以為非僕之所喜世人則惡之是以平居未嘗與人語吾兄聞僕所言不待畢辭而巳悉僕之意於僕所論是非當否不待預約而如出一口吾兄之賢豈私於僕哉誠道合使然也僕知其如此感同道者之難遇幸而得吾兄故傾肺腑竭愚誠盡慇懃之好託昆弟之歡效古君子交友之義務為箴規劘切而至於道他人之所言者僕之言而吾不異他人之所多脫誤為僭故吾二人同處也必有所聞同游也必有所益樂也則共慶悲也則共戚日夕相與則慰懌而不自勝一旦别而來宜乎其各不能忘情也别來舟中十七日而至丹陽又十日而至京雖時有登渉之娯遊觀之適吾兄意僕果樂之哉僕言而有和也論而有答也疑而有所與講也勞苦而相撫慰也雖别吾兄僕固樂也僕言而無誰與和論而無誰與答疑而無誰與講勞苦而無誰相與撫慰僕何能不思吾兄乎僕竊自念人生相與之友雖若偶然亦有非偶然者僕自十五至今七年之間四方之士與僕交者以百計非特如去年至今所見數十軰而己然離散而他之無一人在目前者雖不遂忘之皆不若思吾兄之切今者髦士後生若有相過僕或避去不與談或一揖别退不與語或唯唯奉承不敢發辭至於與劇談竭論者無有也出文辭以示之者無有也待之不疑如吾兄者􅀹無有也僕非有所吝誠知無益抑恐虚名為衆所知祗以致累故不欲為耳聖人以無徳而名為至道家以無名為大善将兵者亦以無智名為貴伊尹周公孔子皆名動萬代然卒以招謗議於當世况其下者哉漢之時賈生董仲舒最有名最不遇唐之時韓愈柳宗元最得時名亦不大顯或遂致僨敗宋之時司馬公歐陽子二程蘇子瞻以及朱文公皆負當世重名然為世人所忌妬無得行其志者至于近代莫不皆然由是而觀名之足以累人也尚矣無能而富貴者僕固不取亦安敢輕談論暴文辭之技以招時俗之嫉病哉丈夫之生己有定命非人所能為則盡夫在人者而己吾之所得者大可以為聖次可以為賢上可以友千古下可以傳萬世能盡而充之則豈不多哉何暇與較錙銖分寸以為輕重長短哉僕之所志誠在此惟吾兄相知者可語否則必為妄誕矣吾兄天資至髙所見必與僕同然恐過於愛僕以僕不能閟重為憂故託書道意非惟慰兄亦以自慰也昔者同處時以相見為可常以離違為暫遇故聚集雖數亦不知其為可樂忽復别去亦不以為悲孰知跡與勢殊事與時異回視數百里之隣壤邈乎若有以間之而弗可見日月易邁忽復六年僕之馳思於吾兄曷嘗斯須去心乎第道路僻左無從寄書時或附人又多不達是以心雖甚親而為禮甚簡不知吾兄亦能見察否也今天下所為推禮義之族為人神所相者無出吾兄之門近而國家加恩宇内養老恤孤如指所屬以旌善優賢為本伏惟令伯諸老先生盛徳質行享有遐夀恩禮之加行有日矣甚盛甚盛獨於太史公傾沒而予有不可究知者每一興言悲恒不能自巳夢寐率旬日一見見輙不異在經席時計公之神靈充貫宇宙決不泯沒其可以與天壤相敝者尚不待文字而傳而况世上錙銖之得䘮乎然後人之求公者非文字則不能知其詳是以鄙心欲就吾兄具寫類集各藏一本庶他日不致失墜不知曽與叔端成此事否吾兄天資淑明所望者甚逺比來進學必愈絶人然昔時同遊各以盛年自喜僕在衆中年最少志趣為最䟽濶毎抵掌論議訶貶今世人今徳不加懋志日荒惰事業畧無有成而虗名為人所傳播深用自愧僕年三十矣古人年齒似此而徳業赫赫己及人者何限如僕之愚復何所用時簡册中竊覩志士賢人未嘗不汗出也去年冬末得痁疾綿歴三時近眼疾比舊轉深數歩之内不能辯人顔靣病起理髪時有白者氣力浸衰如老人狀朽劣至此尚何足比數於士君子之後乎僕家素貧至僕軰懶惰不能作農業坐是尤困然不以為憂汲清泉瀹麥餼與昆弟相與講聖賢之道若處至足之勢者天下當日治安吾軰獲優游徳化中伍田父而友野人推所得者以教閭里後生使皆為善人固士之行亦窮人自圖之拙計也近亦有數人相從執筆遣辭如趙彦殊兄弟者亦有可喜僕知文章為細事求古人所用心者以教之但學術卑淺無以發人使質美者無所視效以至於有成耳吾兄聞此亦能有以教之否乎久懐欲作書徧問諸老先生長者頗乏去人行又憊倦未果作今日偶與客飲酒闌聞人行強起就燭書殊不盡意僕得一嬰兒三歲令叔仲辯丈令兄叔車得子闕令兄而下想皆平安叔美叔端及諸令姪心益闕㷍燿二生娶婦未養浩兄在深溪必順適王仲縉俞子嚴頗聞人說見其文蘇公教授處州有書往來否皆望因風報及何時復得㑹靣臨紙悵塞惟千萬自重不宣奉别以來艱戚佚愉閑居行役夢寐無時不相接忘其為兩年之久千里之逺也前者奉祖母自京師還錢塘遇令弟叔鄂飲酒論舊故甚歡不覺至醉醉後見案上紙筆因有所書頺然就寢明旦叔鄂言之相視大笑不省為何語也今承使惠書謂僕望足下不以書相酬答而辯其故豈以醉中語嘗及之耶此固僕所以為戲耳足下與僕平居忘其崖岸甚至奈何以醉人戱語為真而不忘於言乎使僕非醉非戱果有見望之語亦不過厚於足下耳僕行海内士君子願交於僕者衆矣茍不足當意一食之頃輙忘其姓名雖強記臆終不能久若斯人者見其顔靣與否且不置喜愠於中况其書問之䟽數乎如足下軰一不相見則必形於夢寐又未足則欲見其所書求其書而不得則有槩于心不虞形於戱笑之言此乃相親愛而然耳言雖近乎怨而其心果何如哉足下於太史公門最號為相知猶復至此何惑乎世人之不我知也然人不見知固僕之所喜者年來奔走事變不得少休自度與造物者無他獨坐名字為人所稱道故為所忌耳去年夏為仇家誣辭所及幸得脫至冬又為相知者薦舉䝉主上見憐始得免今年誣辭事作幾䧟身覆家幸而不死以祖母歸竊自揣念僕家居寧海十六世四百餘年逺者不可知近若曽祖暨先人三世非其道不妄言以視平地如履機阱審而後發安而後為其於天豈有所負哉僕雖戅愚然其行事足下所悉也雖不敢望古之賢人亦安敢後今世君子哉天之相視乃若是天者果何為命者果何為士之處世果何為而可使為惡乃合於天乎性不能為惡縱欲合之而不可合也况天道固無此理耶使為善為天所福乎僕前之所陳非皆不善也而竟至此思其說而不得故妄意造物忌吾軰人在古孔顔之厄近時則太史公其明騐也不然以太史公之徳曾不能庇其家以全其身乎然人之所趨自當為此不當為彼語曰寧為瓦全無為玉毁此無識者之言耳天下固無千載之玉而豈有不毁之瓦乎夫玉我而吾瓦之瓦亦未必全也曷若玉吾玉之為美耶太史公之所遇信不可知然異操而同歸者何限而公之所存猶昭然揭乎天地之間也造化果厚公耶薄公耶後世乃定今未可談也然僕誠懲其事近益好簡黙不喜立名稱而胸中浩浩然亦有以自慰恱讀書粗見聖賢本意虚言游辭頗自厭耻欲求為有用之學而未能也足下有以教我否乎村居荒僻無書籍有一二朋友又各散去何時盡閱足下所藏書以相講切耶太史公夫人墳墓欲省拜公文集當論次此二事懸心腑間牢甚必當一往而祖母未許倘得世與我相忘則與足下居終有日矣此非戱言也足下别後學問必進有文章須見示母重為僕所望不宣自發義烏信引領西跂視日如年今兩月矣忽奉手書乖闊之思愛厚之意僕心之所同而不能言者煜然溢乎翰墨間捧誦循環且歎且羨病懐得此若脫垢汙而濯清泉不知疾痛之在躬也所可憾者太常丈及范先生皆傾逝斯道寥寥無所係屬近時海内知名之士非窮困即死不死即病如僕之愚不足比數於士君子之林久矣然自去冬得痎瘧疾輾轉至今屢愈屢作寒熱之餘伸紙握筆欲有所論著未能終四五行欠伸掉栗己欲就枕席不知天所予奪禍福竟如何今世人雖不見甚夀者然山谷間恒人年八九十或百歲者時有之如前之二公使之少緩一二十年而死誰以為過而忍奪之孰知其故耶僕今始三十氣力志意便己如老人但髪未白靣未皺耳家兄長僕八年數年之前居䘮過哀被疾苦僂狀尋常患肩背痛不能出僕雖可出亦未嘗出門於世務都不通曉閭里小兒挾奸舞詐狼貪䑕黠變態百為視僕樸懦可弄輙私相目謂真愚人獨頼季弟頗觧事近者按田造圗及他細事壹以諉之人頗謂其能而病夫因得安居以養拙拙益甚家益落有田數十畆小民見其不足為輕重棄不爲糞溉歲計窘家屡報絶糧輙笑曰古人有三旬九食瓶無儲粟者窮者豈我獨耶且天下之得其願者少不得其願者皆是也吾縱自憂其如衆人何因相與大笑而止處塵埃中不慣與流俗往還厭其喧閙每欲縳一椽於萬山絶頂人跡所不至處從一二友生讀書嘯歌以自樂伐木誅茅非有力者不能因自嘆非惟古之貴富人不可效欲效畸人静者巖棲谷汲以自快亦莫之遂吾之貧困過古人逺矣貧富貴賤豈學道者所當掛口哉恐吾兄别我久思我深欲知其所自處故盡發之以當談笑耳蘇公平仲近因黄巖人寄書來相問意甚欵欵頗自悼聯事者皆非同軰難與言思觧去而不得世所憒憒者多固宜有此歎然古之君子豈皆擇世而居耶亦當安之而己太史公千載之託未得其人煩其作一文甚好功行之詳只用僕所述歴官記叅以後所見聞足矣若欲明白公之本心僕雖無狀他日不敢辭也公無恙日嘗欲収僕申以婚姻之好還家言之而祖母不許公亦繼以事去遂不相聞平居常以為恨然公所欲親厚之者欲世講師友之契耳此身倘有樹立誓不敢忘但媿學術荒陋無所建明孤負期待以損知人之哲然僕之無成亦朋友之辱也吾兄可徒譽我而不我教憐我而無以處我乎金華以道術相傳者百餘年范公之亡有繼其後者否吾兄亦宜勉之拳拳愛慕之心舎此無可祝者徳輶如毛人鮮克舉之愛莫助之惟厚自貴重以扶植斯文春間僊華還嘗獲附書繼後歸山中杜門習静不與世接不獲聞動静向仰之切每形夢寐暮寒計惟闔户尊穉均安吾兄養徳家庭有以自樂糧長之役近稍優暇否某年來多病讀書之外無所用心藏書不多不足開廣智識然既不以他事累思故頗得專志於經漸覺見聖賢大意亦頗有所論著每復投筆自笑古人傳述成書而泯滅無傳者衆矣寧少我耶既復自觧以為吾之所學本非為名聊以發吾所得耳傳否不敢計也平居未嘗廢得在田里二十年無他故擾之則於諸經皆可自究其㫖聊以為巳有不與世俗口談而心無所得者同愧也吾兄以為如何離居日久病身不能動求如夙昔相聚講習之樂寧可得耶舊年喻及蘇公欲為太史公撰述文字荷其厚意有一書煩并歴官記一本寄與之恐其不詳知乎其故也爚兄聞得子頗進學否蘿山墳隴幸時省視不相見數年昔之埀髫者聞皆己加冠多有室有子吾曹雖欲常以少年自負尚何可得言之慨然敝邑朋友進徳己之雲南表兄盧希魯中今年甲科在翰林為編修雖升沉異趣而此中可語者便覺益稀不知婺之學者近復有何人晚出亦有可喜者否幸復示及敝親陳仲夷善醫而好學聞戴原禮先生摹印得丹谿醫按及格致餘論意欲求之煩兄轉索一本如戴公逺彦成處恐有望宛轉求一本寄與之以副其意陳云此間人可逓書至昭仁許氏故作此書語無次切冀恕之不宣答劉養浩二首在京師時專托戴七和之附書并寄祭九靈君文曽己達否斯文不振遂至於茲鉅儒宿學凋喪殆盡茫然墜緒將焉所屬而吾黨小子將何所仰耶論次文章脩明遺事正門生弟子之責也長山胡先生待僕甚厚僕當有所述今則未可墓銘嘗有人請于吳東閣濬仲吳公事多恐亦未能即作其文集有一本在曹公處嘗見京師士人亦多聞其名能多摹印出使觀文字者知有王氏之好事亦甚佳也太史公芝園集託之叔端不知何如誠墜此書責在我輩湏盡心為之王京普説有一本在武官家則親見其人許見借卒不肯將出久之恐失墜其幸存者慎無使散軼公家所藏書大南門外有一士人收得此人能文辭性行髙與僕善時時至其家輙借觀不勝其悲愴也公名在天地決難泯沒所得於天者過厚矣又欲兼得於人天何以堪之事雖至此在公可無憾斯世而不獲見斯人乃可憾耳子孫所存不知幾何田宅久之必有還理每念舊事輙慨歎形於夢寐送書人未來前兩夕連夢公相語公之心豈嘗一日不在我軰耶以是欲到彼編文集圖其事逺歸又患寒疾故未果詳見於鄭君書兹不能盡也王氏近如何昔年携其家則來此間欲師之者數家人慕之以為無愧鄭氏幸勉之勿怠秋涼惟侍養吉慶進學飭行於吾道有光㑹言有成約矣尚冀靣談以盡不宣一自為别不復以書相問者六年患難憂苦何所不罹形跡㡬於相忘矣然夢寐中未嘗不相㑹於蘿山之下兩溪之間也閒居獨處追惟昔日賢豪之盛想其儀狀言笑宛在目前徐而思之如風花霜葉存者無㡬吾兄於衆人競進之時雖若少抑而卒以此全人之得喪禍福倚伏之際孰非天哉而彼顧置喜戚於其間非惑耶孝孺出處兄想己知近於此理閱之愈熟居之愈安每觀古之名士少遭挫抑則戚嗟怨悼若無所容者深病其無識退之栁侯文章雖髙然於此道未有所得殊可厭薄耳吾兄居得美地義門士友可以往來考質為學必進其視索居無徒者為何如第孝孺近來漸不喜為無用之文人有求者非甚不得巳未嘗與之於勢要人尤不喜見杜門謝事欲成一二小書苦於疾疢未能有成年齒彌長大茍不求古人歸宿之地而效皃女子塗青抹紅以自誑衰老將至矣欲安所之邪患瘧患眼難於作字念相與之厚情不可遏聊一言之荅王仲縉五首僕為學不敏於人聞道不早於人扼愚守陋泛然與世浮沉非有超群之才絶世之識也每質諸道徳之奥未嘗不悚然内愧兢兢若無所容世之君子不棄而絶之亦已幸矣尚可望名譽之加乎數年來士大夫不察其實口耳相承猥有所稱引愈久愈訛遂以滋甚子嚴至乃謂長山胡先生屈巳推奨足下遂從而信其然夫長山今之賢而有道者也其文章方之當世未肯多讓求之古人不在作者之後使昔之大儒如虞公黄公尚在且當屈巳避之况眇爾之小子乎大凡先輩之於後學以為不引而稱之則其名不彰稱之而無所徴則衆人不信故屈己以為遜讓若長山先生之所言乃待後學之心也而非其實今足下以為然則過於聽矣今復惠書與僕論文且儗僕於司馬遷夫遷豈易及哉六經之下惟遷善紀事縱恣豪邁統紀苞括無常態也後乎遷者五百年作者以十百計欲其文之庶㡬遷者不可得也遷之才不易及如此足下乃率然儗於僕人其謂足下何哉此僕所以受書沉思而莫知所以答也然足下端慤直愿決非妄諛人者特過於聽而溺於相愛之深耳昔有愛珠者得徑寸之珠甚愛之或謂之曰此明月珠也愛珠者聞其言因將以問人月之光寧過於吾珠乎其他人聞者皆笑之而愛珠者仍持其說而不變夫愛珠者非不知月之明且大也信人之言太篤而愛己之珠太固耳夫稱珠以明月豈謂珠之果類於月哉而愛珠者斷然而儗之則過矣長山之稱是明月珠之說也足下遂以遷實之得夫類於愛珠者乎抑聞君子之相與則有異於是者譽其美之為愛不若規其過之為愛之深也僕聞古之善治者聞諾諾則懼諤諤則喜今足下不鄙賤僕而友之所謂諾諾則有矣而諤諤則未聞也繼今以往茍因僕之所遺闕而教之其受賜也豈止於食駃騠享大璧之為美哉僕亦當思所以為報不敢徒然取而㝠然己也違離己久思見顔靣而車從不一來意者足下之見忘耶忽奉教書周誦累過乃知足下念僕之切無異於昔時也夫與人友而疑人之忘己者非也積疑於心待書而後釋者亦非也此之謂以今人比足下而不以古人望足下斯僕之過也僕乃今知足下之心矣今之交友多矣其有如足下之念僕者乎有如足下之知僕者乎僕所聞見其能有而不告乎然足下欲得僕所著文以觀僕則不敢承命非有所靳也然無益於足下故不敢耳足下為文者乎則當求之于易之大傳書之典謨訓誓詩之三百篇孔子之春秋周之三禮及秦漢賢士之所著乃足以為法矣欲求其道乎則凡足下終日之語黙起居奉上馭下道未始不在也第知之有誠有不誠行之有至有不至耳能叅以孔子子思孟子之所言七十二子之所問而反質之於六經則自識之矣何取於僕之文乎雖僕之文時有所稱述而得之之方如斯而己斯道譬之水然隨地而有之有志者如鑿井者數仭之後將沛乎其莫禦矣茍不自用其力而乞水於人所得常不給而為心愈勞近代之士好摹竊古人之文是乞水者之術也文者道之餘耳茍得乎道何患乎文之不肆耶足下之井己鑿矣其源沸然而出矣能日濬之而不止誰能測其淺深哉僕之所得者不過若此雖文之所言亦若此而己足下其復思之何時得一聚首將與足下盡談十一月十一日某端肅奉書仲縉翰撰尊契家兄長侍史俞兄子嚴至得書及所作文序啓封伸紙立捧細誦意厚而誠義純而達不自知手之不釋而心之暢懌也世人之於文誰不為之至於求其可誦者何其鮮哉葢不得其塗故也士之患多厭常而喜怪背正而嗜竒用志既偏卒之學為竒怪終不可成而為險澁艱陋之歸矣且學竒怪者以其美也而竒怪亦非古人之所尚也文之古者莫過於唐虞三代而書之二典三謨禹貢𦙍征以及商周訓誓諸篇皆當時紀事陳說之文未嘗竒怪詩三百篇亦未嘗竒怪春秋書當時之事雖寓褒貶之法於一言片簡之中亦未嘗見其竒怪禮經多周漢賢人君子所論次其言平易明切亦未有所謂竒怪至於盤庚大誥其言有不可曉者乃當時方俗之語亦非故為是艱險之文也然則嗜竒好怪者果何所本哉茍謂於司馬遷班固則遷固之書有質直無華如家人女子所言者唐之文竒者莫如韓愈而其文皆句妥字適初不難曉宋之以文名者曰歐陽氏曰蘇氏曰曽氏曰王氏此四人之文尤三百年之傑然者而未嘗以竒怪為高則夫文之不在乎竒怪也久矣惟其理明辭達而止耳而世顧他之焉者猶之迷人醉客不問塗於大道肆意徑趨是以卒不免入乎荆棘之塲鼯狖之居而終弗獲就乎大道也今足下之所為非特得其塗而己而又有始終焉有理趣焉茍益脩於不弛浚其源而導其波將見汨汨然來而不止繼乎待制君之聲烈可望矣昔在朝廷為文者非不多而人獨推太史公與待制君蓋文之法有體裁有章程本乎理行乎意而導乎氣氣以貫之意以命之理以主之章程以覈之體裁以正之體裁欲其完不完則端大而末微始龍而卒蚓而不足以為文矣章程欲其嚴不嚴則前甲而後乙左鑿而右枘而不足以為文矣氣欲其昌不昌則破碎斷裂而不成章意欲其貫不貫則乖離錯糅而繁以亂理欲其無疵有疵則氣沮詞慙雖工而於世無所裨此五者太史公與待制君能由其法而不蹈其弊而務乎竒怪者皆反之此世之公言所以推諸此而不居乎彼也斯文者造化之至理寓焉人患不能造其極耳茍造其極決不可泯滅有志者在乎自力而巳僕所志尚有大乎此者省事者少不欲與人言雖應時作文又恐人以文人相謂亦久不喜談感足下愛我之深念我之篤聊以此復命子嚴亦甚可喜須時相與議論有益也某白别後終日汨汨深泥中執轡兢兢每虞傾跌幸無所苦前途未知稍勝否敬謹之外一聽之自然無所用心也來書言相念之意甚増感歎方今斯文寥落所望於足下者豈有涯哉望勿以聖賢之言為空談知之欲真踐之欲篤自期者欲逺大顧諟明命以勿負天之所授庶幾其可耳如某之頑闇曽何足效耶當以千古為師俟後世之知己無薄於自待而淺於求合况賢王以身率之宜無待於區區之言矣赴京不知在何時惟進道自愛見表兄及鄭庶子諸公亦望致此意某端肅奉白僕資質不敏明聞道日淺行巳之篤不逮古人是以年益加而智愈昏名益有聞而心益為之欿然日汨汨與世伍語黙俯仰能自異於流俗者㡬希每念昔之聖賢道徳言行之懿未嘗不内咎而深自慚也足下在朋友中最為相知且相與最久不思有以正其闕失納之于寡過之地顧以書譽其所未至而強其所未能豈僕之所望哉夫古之著書者非好為辭而然也非慕乎名而然也蓋以己之所有無由淑乎人天之舉以與我者懼其至我而絶也故從而筆之於書而公之於天下如子思孟子周元公之流其智誠足以知乎道其才誠足以周乎用其發之於言誠足以啓昧幽而埀矩則且不戾其所為也是以學者傳而信之如龜䇿恃而頼之如稻梁尊而仰之如日月茍為名而己爾夸其辭而己爾如揚子雲王仲淹之所述而巳爾於道無明也於事無補也揆之於其躬又不能無憾也則亦奚以為哉僕上之未能學子思孟子之萬一至於揚王之所為心又不敢以為可也居則黙黙以思兢兢以行勉勉焉期不畔乎道而冀其有成使吾學果能成其身乎則雖不著書其所傳者固在使學焉而無以自立於天下縱琢刻其辭其將孰信之僕之不易於言者鄙陋之志殆有在足下未宜以韓退之之事責我也夫退之之重著書有不自滿假之美焉未可深過其過在未聞道而言行未能無可議耳於道有得焉至和充乎中至順達乎外其音聲中乎律其周旋中乎禮其取舎好惡是非進退中乎義即之者邪慝消望之者鄙吝祛聞其風者相率而化於善彌千載而如尚存若斯人者何待著書而後有益於人哉故顔子黙然處陋巷而聖人予之為群賢首其後若漢之黄憲言論之存者無片簡焉當時莫不自以為弗及至於讀其傳者猶怳然想見其為人與憲生相先後之士有為昌言者矣有為政論者矣有為論衡者矣如足下所稱著書三數公其有益於後世者或有之而其人之賢否視憲何如哉僕少不自量亦喜有所著年長以來窺見聖賢之垣墻内顧彌覺不足非惟不喜為亦有所不暇為矣每見好名者不度智之不任徳之不類而亟為言言往往畔於道輙為之汗下果使聖人之道世無知者必待吾言而後明猶當審其醇疵而後出之况斯道自近世大儒剖析刮磨具己明白所患者信而行之者寡耳今世有賢者作當以躬行為先一反澆陋之習以表正海内庶㡬有所益豈宜復増以浮辭而長其虚薄邪足下謂僕所接見者少不能副遐陬僻壤之望因欲著書以化之夫以化當世為軄者賢士仁人事也僕也烏敢當且賢者能化從巳者不能化違己者仁人能使善者勸不能使惡者變故孔子至仁也而化不行於陽虎武叔孟子大賢也而臧倉賤之王驩怨之淳于髠輕之彼一聖一賢且有所不及而况纎微昧弱者顧舉一世而盡化之以口之不給而欲假書以傳僕雖騃其為計不宜若是疏也且萬世之所共尊而師其言者惟孔孟為然今閭巷庸人讀孔孟之書猶不知其可用或以為戱笑之資僕縱著書其能加於孔孟乎孔孟不可加其能庶㡬孔孟乎徳道如孔孟不能必世俗之信而僕乃欲著其荒言以化世俗不待智者而識其難足下不宜以之相勉也然足下之心豈有他哉乃愛僕之深處我之厚而不知非其任耳雖然僕非無志於道者學道而未至者也學未至則悔吝不能無過眚不能免必賴朋友以相成吾今而後所望以成己者舎足下而誰哉幸求所闕時以告我則足下所云化今傳後者其將有在矣願少緩之無以著書為勸與邵真齋書九首前者以賤疾故承過家撫視宿留兼旬不忍舎去此意厚甚不可忘也别後調理一如嚴戒而病根至今未除寒熱之作雖少減而咳𠻳還如曩時尚義同遊之約但恐羸弱之餘難即踐耳不知從者果能見臨否恐負前約特令村僕詣前或有善藥更惠數服􅀹佳然非所敢望也匆猝不謹惟冀恕察不宣某不能養生自去冬感瘧至今七十餘日纒綿未止仲夷景𢎞二公雖嘗診視然未能決其得失前家兄曽遣人詣宅巳沐許諾今特令山童奉迓風日頗清美望即見臨拳拳企仰之懐尚容靣談以盡不宣舊臘承臨訪匆遽别去弗能如禮慊恨無巳比以家兄希聲羸疾不減嘗遣舎弟輩走邀屢䝉許諾延頸以俟又復旬月而未果如約何見棄之深耶大抵家兄之疾先生雖知其證然千聞不若一見望撥數日之冗過家靣論服藥扶持以副拳拳之懇古之善醫以濟物為心者雖道路暫遇之人猶為診治况辱託交甚久如區區兄弟者而可拒而不赴乎某適有痔瘡之苦不能躬詣專令人上請幸翻然一來以慰懸仰輕瀆之罪尚容靣謝不宣令郎徳孚來承以舎妹故逺貽藥物感荷厚意曷日而忘第病者羸弱虚損難為得効寒熱痰咳畧無少減令子雖謂脉息無傷然恐日久益難調理鄙意欲煩從者過家診視使得脫體但天寒道逺跋渉為勞諒仁者以濟物為心必能惠然一來以副懸望也切冀勿外幸甚閬風小像至今未取得後㑹當寄達餘懐悉俟靣晤不宣夏間從者過家獲接言論近者弊親童伯禮丈令閫貳恙意欲邀足下診視嘗令小僕阿順詣宅代致此懇令郎荅書知在長亭王宅今特遣輿夫詣前望勿它辭即副其意叔通先生數日間亦到此可同行也區區病餘少力詳曲悉俟靣談不宣前者村僕還承書約在月末相過計日以俟未遂一見豈以雨故愆期邪近希政弟老母患傷寒己五六日深以為憂而賤體至今未平復令舎弟帶通至鐡塲令其專達此書至上請相陪同來諒先生過愛之厚必不忍棄我也拳拳之情尚容㑹晤以盡不宣比者專人致書偕令郎造請人回聞從者巳往長亭悵怏無巳舎妹縁其姑親來相迎昨日己還童宅臨行拳拳以舊恙未減為憂望執事過邑中特與表兄希魯同到其家診視輕重商議用藥以慰懸結之情幸甚區區同産鍾愛惟有此妹憐其抱疾恨不能以身代之千萬深體此懐勿拘滯於形跡乃所願也兹族弟往長亭特致此懇尚冀㑹言以盡謝臆不宣昨諭及手巻己作醫原一篇稱贊盛美家叔更欲索詩數首書之故未即發上如未有人至當令陳用中秀才送還也賤患痔疢久而未愈殊為所苦不知曾問得佳方否里人嘗有服黄連觧毒湯而愈者便中乞合一二貼付至實感厚惠匆匆奉復尚冀靣晤不宣久别之餘昨於許君處獲接言論豈勝慰浣第䝉枉顧邑邸適以賤事弗值為悵怏耳恃愛有懇祖母舊患頭風夜來忽復舉發項背間痛艱於眠食加以嘔吐神思頗倦舉家長少不知所為計非先生不能治之謹專人奉邀萬冀以斯文雅故撥置他事即賜一臨以副懸懸之望幸甚遜志齋集巻十欽定四庫全書遜志齋集巻十一明方孝孺撰
