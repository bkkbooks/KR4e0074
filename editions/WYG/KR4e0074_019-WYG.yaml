body:
  text: 春秋諸君子贊有序余取友於當世而未得則於古人乎求之讀春秋左氏傳得數十人心慕焉聖賢所稱較著者不敢論少戾乎聖賢之道者不敢取自石碏以下十有五人取其事贊其美以為法云石碏國之所恃在老成人以國為家不私其親知以發謀勇以戡亂雍容談笑坐拯世難侃侃石子衛之父師先事而諫徵若著龜始不吾從弑逆果作徐發一言元兇就縛春秋所書簒弑孔多誰能討賊不煩干戈雄才勁節英識大器仇牧晏嬰視之有媿世悦茍難滅親是稱臨危善斷卓乎難能嗟衛之微臣有石子嗚呼九州敢謂無士季梁賢知所居國小猶强文謨武猷屹如金湯荆楚之隨可坐而取久而不亡以有君子其在朝廷敵國震驚有旅若林莫之與京及乎棄賢姦雄相賀世無人望雖强易破長孺在漢子儀在唐叱咤指麾威行萬方彼冥弗思忽不知貴我懐生民今也誰恃臧僖伯戡禍弭亂世貴乎兵兵之所加治其旣形心術之微禍亂所自孰能治之諫臣之事在昔魯隱矢魚於棠其事雖微其志已荒有臣僖伯憂其漸懈昌言正色以訓以戒天稔其禍聞善不為鍾巫之難實兆於斯聖之求諫匪曰觀美羣情旣宣萬事畢理自以為智厭棄人言簒弑将行至死不聞諫之不用鮮不亡國我思若人中古遺直公子友魯有季子社稷大臣處人所難不失其仁莊僖之間兄弟多故叔牙慶父交紊王度親為骨肉義存君臣縱則廢法斷傷乎恩酌事之中酬酢萬變龍驤虎跱蛇豕屛竄才優於為濟以無私春秋嘉之志其來歸周公東征克對文武烈烈季子不忝皇祖後世之士量小才輕大故臨前驚怖失聲聖賢至公狥道忘已後國先家季子所耻叔肹士處衰世若行泥塗孰能超然不受其汚叔肹之賢髙潔葢世非義之禄笑而不視兄也有國匪君斯君獨深耻之安乎賤貧我捆我履可以衣食我身雖勞吾義已得彼為富貴千乗萬鍾其外雖導疑作通其心則窮人之所趨不我能止我之所貴不以易彼卑卑小夫利逹是圖朝讐夕臣犬豕不如伯夷之清子臧之節周公之孫魯邦之傑劉康公道在天下莫不與聞能知其眞千載一人春秋之間何國無士名言至論卓卓可紀有偉劉子獨得其宗矢辭豈多妙合大中孰養其原以定厥命必有事焉勤禮致敬後乎洙泗先乎唐虞聖賢有傳不謀而符生民夢夢飲食作息道之不明誰達其極三代君相治之師之逮徳下衰以法縻之上曠其職下悖其紀孰非天民嗚呼劉子范文子霸國之士尚利與功納君于邪不思其忠孰若夫子識㣲慮逺以勝為懼勇於從善鄢陵之戰楚師大崩矢中其王蠻方沸騰衆誇威强獨有憂色外患盡寧非計之得彼昏不戒以幸為常上肆下陵禍興蕭墻先事有言衆謂迂怪深謀弗從卒履其敗六國滅秦晉亂平吳全盛之邦多忽永圖烈烈夫子非霸者佐以道事君大臣之亞子臧恒人於利錙銖必競亦獨何心力譲千乘仁義可樂名節可尊肯取瓦礫棄遺璵璠簒弑紛紛孰非臣子先生醜之恐其汚已髙不忘世潔不亂倫大鎮社稷為曹宗臣秦楚有王雄霸中國戰不足稱千載汙辱去彼取此疇能與偕以利易生果何人哉臧文仲衆人之生莫不有死死而可傳舉世無㡬有美大夫國之典刑仁義之言煥如日星其身有終其名不沒後人宗之指為口實晉楚之盛豈乏世卿貴富一時事無餘名大夫立言後世是式念哉勿忘尚懋厥徳祁奚賢才之生國用所資觀其進退治亂從之一人在朝善類興起欲知其心尚視所舉彼也吾戚此也吾朋人以為比吾舉其能孰為隙讐孰所怨惡吾取其才餘不暇顧心無黨私為國得人茍利於國遑恤我身古之君子自信不茍不以毁譽輙變所守嗟世之人匪矯則偏或逺之用或親之捐有狥大公舉讐與子取謗速咎終莫能以道不勝偽治功日汙豈特夫子當世所無魏絳晉有跛夫好兵而愎以一笑故㡬亡人國天鍳凶徳卒傾厥宗三郤受誅假手厲公允文魏子以兵為戒輯和戎夏晉以昌大悼公之世屢合諸侯纘業文襄政教具脩意之所嚮靡有不服羣賢在位魏子之力士不知道以戰為嬉孰能無為坐制四夷孟獻子世無材智不過於削非有仁人何以為國魯號多士粲乎有文穆穆獻子其徳可尊用侈國貧言利愈宻宣成之間苛政横出夫子是悼勢莫止之昌言在人後世紀之乘馬之㣲鷄豚不畜富盡天下恒患不足古稱盜臣或以為才我懐夫子莫知我哀季札士之制行不必於同取舎進退惟義之從茍同其跡不度乎義尚類古人非徳之至嗟嗟季子賢且有文博達通㣲世鮮其倫使之有位變夷以夏桓文之績不足與伍天将䘮吳嚚童僣攘晦徳潔身效節子臧道之廢興盖曰有命行非子光止豈子病衆人何知為譽為尤孰明子心其惟春秋世教日衰戰爭求位季子有知當為流涕子皮大人無私物我同視善出於人與已無異人之勝已善者已能翼而扶之與之俱升授之國柄躬率以聽賞罸弛張必從其令此謂盛徳自古難之懿哉子皮為公卿師僑實國楨社稷是賴振經立則國勢㡬大非子知人羣枉孰容鄭之有政夫子之功紛紛鄙夫識闇量淺已則無能惡人為善世之不治豈曰無賢孰起子皮吾為執鞭子家羈魯有盜臣擅國自恣昭公寡謀躁以失位遜齊居晉淹恤八年惟子家子奉以周旋自有可為謀猷甚逺拒而不從卒以䘮返使用其言動合事機豈其終身棄國不歸久而彌恭困而無怨義不近名忠不避難考徳千載難乎其全夫子之節允也可傳晉文五臣世嘉其績彼也以才夫子以徳蜀三守贊李公氷處厲民之時而為惠民之政非仁者不能也興一方之利而流萬世之澤其才智足稱也幸而治乎蜀使斯民違乎難而樂其生也不幸而仕乎秦使後人論其世而賤其名也夫因時而宣上之徳者易為矯時而反古之道者難行也如公者為人之所難而能取信于上下殆非秦人也三代之英也文公翁漢初之治猶有秦風刀筆程才賤徳右功矯矯先生知政之首閔俗之龎化民以道肇建學宫爼豆詩書英俊如雲從於後車蜀人聚觀爭服章甫儒教顯行齊於鄒魯兩漢之間號蜀多才孰啓其端先生所培惜其不遇惠止一州使秉國鈞四海䝉休俗吏卑卑僅圖旦夕孰能起之俾輔邦國張公詠為政匪難患才之卑才優於事乃克有為惟忠定公萬夫之傑屢剖郡符有聲烈烈威惠所被梁益其尤坐鎮西南分天子憂時其寛嚴陽舒隂惨談笑指麾奸强破膽豈惟善政可配古人卓行危言為世名臣将相無功名隨身逝誰能使民廟祀百世乘風騎氣公神在天嗟彼憸邪敢執公鞭三賢贊有序聖賢之道以養氣為本今之人不如古者氣不充也氣不充則言不章言不章則道不明予竊有意於道而患委靡不振思起古豪傑而與之遊求於往昔得三人焉曰司馬子長曰韓退之曰歐陽永叔三人皆氣豪辭雄有振衰立懦之功因各為贊辭時觀之以自勵将由此進於聖人之道非敢以是為足也作三賢贊司馬子長三代之隆斯文顯然惟太史公震盪奮騫江河之深泰華之髙大包宇宙小析絲毫唐虞盛徳湯武峻功春秋之辭楚漢之雄韋編竹書金匱石室千載遺亡公手紀述掃刮晦䝉揭茲日月上翼典謨下昭大法彼敗降者名将之孫公白其辜覆謂多言凡人受辱孰不就死所不死者建大名爾名立不磨赫赫峩峩比績丘明功孰少多卓哉英賢允矣良史何人無知巷伯是儗公去千年斯文湮没紛紛鄙夫敢繼公筆韓退之漢後七代道䘮言棼不有先生孰興斯文先生之生志豪氣雄手抉百川注之使東刮垢去腐煥其一新詆排佛老扶起孟荀誰輿朽骨天子是迎請投水火以滅禍萌喁喁鱷魚為潮之毒帝念南氓俾往殱戮大海茫洋五嶺蒼蒼發為文章震盪激昻山不足髙海不足深斯文在茲無古無今惟鄒孟子仁義干戈先生在唐與之為徒吁此何時愈下彌衰先生不生孰扶孰持是氣長存磅礴上下有繼徽猷不在來者歐陽永叔宋至仁宗文治告成寔生偉人以鳴太平偉人為誰曰歐陽公宗孟繼韓蔚為文宗五季之末支離䵝昧公曰嘻哉非予疇繼刪煩剷華去其艱深大濩咸池厥音沉沉如玉之温如波之澄不撓不驚既暢且明伊周以來以文致窮千載惟公躋身顯庸既掌帝制亦預國政正色危言以犯以諍維蜀有蘇出公門下謂公斯文可比韓愈公之謂蘇托以斯文後世誦公哲於知人何哉鉅儒以多為貴人也可欺天也可畏尚友五贊有序有憂世之志而無經世之才有經世之才而無成物之徳欲以有為於天下皆古昔之所難也聖賢之跡不見於世也久矣慕事功者多蔽於卑近務髙逺者每病於難行吾求士於二千載之間功業赫然可稱而秉心操行不倍於聖賢之道者得五人焉皆天下之才士今世之所未聞而余之所願學者也故賛其盛以識余之私因是五君子以望乎聖人之大全此余之志也以五君子為足法而不以大者自望非余之志亦非五君子之志也諸葛武侯漢治任法難乎大臣惟忠武公千載一人綜覈萬變以義而動虎躍龍驤天下震恐極其智能亂不足平天實厄之大勲無成成敗紛然處之甚暇論其所存伊吕流亞古學不傳士氣益卑公心不亡百世之師陸宣公士不知義以國為外媚悦取容自為身計嗟吾先生慨然哀之君非堯舜媿見色辭諫書如雲指訐遺闕忠邪義利不少撓折事雖多違言則長存用諸天下可安黎元豈若俗儒以文嬉戲先生見之當為流涕范文正公古之至人忘已狥民一夫顛連如疾在身此義不明貴我賤物以民自奉恬不加恤孰若先生惟民之憂飲食夢寐四海九州先事而言庸狡所忌就其所成允足經世世之通患溺於故常聖法皇猷訾以為狂誰能致逺而舎車馬敢謂先生不在天下韓忠獻公生民難諶天下大器必能容之而後可治大人之量喬嶽巨川未嘗有為萬物資焉豈若淺夫露其才智初如可喜卒敗大事堂堂魏公宋之宗臣元氣流行為初為春欲名其功公本無作視其用舍為民憂樂世彌逺矣孰尚嗣之我觀九州悠悠我懐司馬文正公儒者之澤大行於民伊周以來惟公一人始未可為萬鍾不受逢時多艱為世父母凡民之心惟久乃安欲其即從聖人猶難亦獨何脩政化甚速誠於為善四海悦服用術相欺惟恐不深公神在天汝果何心云敞贊有序捐其軀有益於天下君子之所樂為也而况身不至於死而有益於世教者乎宜乎趨義者之衆也然而人寧舎其生以狥利而不肯勉其身以為義死於利者首交於世而為義死者歴數百年無一人豈其所重在彼而所輕在此哉知利之可以養生而不知其可以傷生知義之或至於殺身而不知殺身之可以不朽也古之仁人義士視刀鋸如飲食恬然就之而不辭者其好惡寧獨異於人哉見義明而慮道逺如是而死則安如是而生則辱如是而富貴則足耻如是而貧賤則可樂故其取舍之際㫁乎其不茍也師弟子之義與君臣父子等古人盖甚重之漢之時猶未變夏侯勝為孝昭皇后授經勝卒后素服五日以報師傅之恩夫以帝后而為師傅服羣臣不以為過則當時之俗猶可見也風化成於上雖以强臣亂賊之威指叱鼎鑊以待天下之士而士生乎其時猶有赴難蹈義正色疾趨而不顧者此漢所以為盛也與王莽之殺吳章欲禁錮其子弟門人多更名它師而平陵云敞幼孺為大司徒掾獨自劾吳章弟子收抱章尸歸棺歛之當時以是髙之比為欒布而敞竟以是名後世敞學術不可考後嘗仕莽為魯郡大尹其行已未能無可議者然其事師不以死生變節誠志義之士也哉章弟子千餘人賢於敞者必衆矣畏禍惜位竟泯滅無聞而敞之名與朱雲相上下慕義之士其可不勉乎夫不以貴賤生死為厚薄者非知道君子不能斯心也任社稷托幼孤将無所不可非若淺夫小人之不足仗也余是以贊之以為弟子事師遭變故者之法贊曰人之趨勢皆若可託觀於生死乃見厚薄朝以為師暮則背之人實易誑心其可欺嗚呼云生志剛氣烈曷以知之偉然大節妻子在後鈇鑕在前所見者義吾何恤焉吾身可恤師其可負視更名者犬䑕之伍道䘮民散俗益壞偷面恭背違犬䑕所羞不趨其難矧狥其死我獨何人嗚呼云子楊喬贊有序富貴不可輕也然人不能輕富貴則不能處富貴捕虎者未嘗畏其為虎故帖耳妥尾而惟吾之擒知其為虎而畏之則必為所噬矣人惟内有所重故視外物也輕天下之物舉不足動其心然後可以用天下之物一為物所動将為物役之不暇而何暇用物哉東漢固多節士及其衰也貪懦者處大位而君子皆困於下故小人得志以至於亡不然當時之士皆王佐才也得一人且可鞭笞海内之盜賊况若是其衆乎楊喬不在郭林宗徐孺子之列然吾觀其人不出孺子下葢其志可尚也人有慕富人之財而挑其女以逃者為利所役視富人若王侯将相視其家若鈞天帝宫而不知其為可耻也由君子觀之茍不以義則崇堂䆳寢猶蟻穴然珪組之貴與苴蒯無以異曾何足願乎萬乘之主天下之至貴也妻帝之女人臣之至榮也喬惟恐為所汙餓死而不辭此其心豈可以勢利奪哉使喬不死命為大臣屬以天下漢猶可興也桓帝不為天下慮而為一女計可謂不知人矣喬之賢豈可以女子誘哉然桓帝雖不知喬而知愛其才則後世之不如桓帝者多矣獨喬難遇耶吾常喜孺子為人饑不可得而食寒不可得而衣以為孺子與林宗猶夷與惠雖不可以優劣而孺子尤可慕盖漢季一人而已及觀喬事壮其志喟然嘆曰孺子不孤矣吾求友於古人舎孺子與喬而誰取耶世皆知重孺子而不知喬可恨也作楊喬賛使人知重喬者自余始賛曰人之器量有小有大或盜一錢或讓天下天下雖大一錢之積觀其用心大者可識吾謂楊喬可為三公屈以非義萬鍾不從曷由知之有大人節帝女不娶利豈能奪其中所重在義與道視卓操輩穿窬之盜伊誰可方孺子之倫永言尚友卓哉二人田疇贊智勇人之所有也善用之為難忠義人之所慕也審處之為難天下非無豪傑之士而功不見著於世何耶豈其智勇之不及忠義之沮䘮與用之失其時處之違其機者衆也荀彧不用於曹操則可以比子房董卓吕布不為逆亂則可追韓彭廉丹王尋為漢而死則可以與周苛等而皆不免於君子之誅其迹同而其所為異也漢末之亂酷矣余求竒士於其時得一人焉曰田疇忠不避難勇不畏死奮然感劉虞之遇而思為之報讐公孫瓉既亡謂可以盡力者漢室而已故應曹操之辟既而知操非忠漢者也故辭封侯之爵介不同俗清不悖倫忠在樹功義不茍合其才良其行果盖豪傑之士非當時奸雄所及也論者眩於成敗使操以成功見取而疇之志義不大章明於後世豈不謬哉孟子曰人有不為也而後可以有為若疇者庸非其人耶其不成功者命也豪傑之士制於命而不獲施者衆矣善觀人者觀其志不觀其事觀其噐不觀其位由是而言士之不幸者獨疇乎哉吾是以悲而賛之其詞曰古之觀人不於用舍考其所存以第髙下譬諸龍駒埀首糞車豈以其賤斥之為駑齊侯千駟如南面王仲尼之嘆夷齊有光漢季分爭得國者操吾獨何為田疇是悼操雖據國犬䑕之雄殺后無君天下不容奚若田疇忠義盖世委質劉虞身死靡二使受之命為漢大臣殺操復漢必不顧身嗚呼鄙夫惟利是就誰能為疇我與為友李太白贊唐治既極氣鬱弗舒乃生人豪洩天之竒矯矯李公雄盖一世麟游龍驤不可控制粃糠萬物甕盎乾坤狂呼怒叱日月為奔或入金門或登玉堂東遊滄海西歴夜郎心觸化機噴珠湧璣翰墨所在百靈護持此氣之充無上無下安能瞑目閉於黄土手搏長鯨鞭之如羊至於扶桑飛騰帝鄉惟昔戰國其豪莊周公生雖後斯文可侔彼何小儒氣餒如鬼仰瞻英風猶虎與䑕斯文之雄實以氣充後有作者尚視於公孔璋贊有序所貴乎天下者非謂兵甲之多玉帛之富擅海内之珍擁百萬之師無術以守之而至於敗亡者衆矣天下安恃乎此盖人之羣居必有其望百人聚兵闘之不止一人叱之即愧怍謝罪而引退者此必人之所望也欲服天下之心者必先求天下之望而尊之所慕愛敬屬欲爼豆之而不可得者一旦立於朝廷則民焉有不歸者乎故周之興也以伯夷髙光之興也以得張子房卓茂而賔師之武帝有汲黯諸侯惴畏而不敢叛代宗相楊綰唐㡬中興斯數君子者其容貎非動人才力非能與搴旗斬将者角然而聞其風烈奔走順從惟恐不得覩其輝光者徳𢎞於中聲名著於當世有非才藝之士所及也故一才一藝治功可稱者可以有可以無而名徳為四海望者國家興替之所繋也唐天寳之亂世皆咎其不用張九齡信矣然吾觀是時有名之士如李邕㤗和亦一世望也而𤣥宗不能容之所信任者皆小人之尤聞之可為凛凛而𤣥宗不悟是豈特足以失國而已哉殃不逮其身則幸也當㤗和之被繫張説輩皆擠搆之欲致之死而布衣孔璋獨上書請以身代璋信竒士乎而唐之君臣為可愧矣國不惜才而使布衣惜之斯世果何如也吾感璋之義讀其䟽而為之泣下曰𤣥宗之治不足觀矣賴有孔璋耳作孔璋賛其詞曰世有英傑生民之望國能尊之天下可王如海如河魚龍所依既據其依孰不畢來唐李㤗和亦天下士胡不存之欲寘之死天将亡唐故褫其魄人望既隕唐㡬不國我謂𤣥宗不若孔璋義聲洸洸暴於四方布衣愛士而國惡之我思孔璋孰知我悲袁安卧雪圖贊士必有守乃果於為茍賤卑汚大節已隳烈烈司徒處困不折志行皎然與雪俱潔登庸三朝作社稷臣萬乗安危寄公一身羣竇朋奸海内震恐正色揚言惴不敢動孰能使然惟氣直剛養諸衡門施於廟廊卧雪有圖千載作則貪夫視之尚䘮其魄蕭僕贊有序蕭僕者蕭穎士之僕也穎士唐𤣥宗時人有文章而性褊躁少容其僕事之甚謹穎士時時笞罵之至不能堪僕拭涕奉承不敢怨惟恐拂其意穎士笞罵弗為止他客僕語蕭僕曰咄癡男子屈身為僕者為酒食財貨也酒食財貨寧獨蕭氏有乎曷不去而自受困辱耶蕭僕曰吾非不知之去之誠何難顧惜主才不忍耳遂終其家不去余聞而悲之為作賛然非為是僕也賛曰天下之至賤者至於僕極矣僕之所欲得杯羮盂飯以養其生豈要好賢之名於天下哉而蕭氏僕獨愛其主之才受其箠辱而不悔甘其困厄而不去拳拳慕悦若忘其身之賤者何也盖秉彛好徳之心人人皆有之僕能不泯之耳是豈特賢於僕𨽻而已耶杜士賢贊有序宋理宗景定五年秋彗出栁詔求言東陽杜希聖時為武學生上䟽詆奸臣賈似道請正其罪以消天變天下壮之後百年其曾孫寔以䟽草示余余讀而嘆曰嗚呼當危亂之時而士君子肯忘其身而為之言布衣之微斥其信任大臣而不諱上下交盡其道是皆三代以降之所無而後世所當取法者也為賛以附其左方賛曰天下之故猶人一身血沮氣窒不名為人君臣暨民以情相繫情或不通瓦解河潰維聖廸哲察於人言虚已旁求惟恐不聞天之從違於此告之邦之興亡於此占之聞人之言有若天命人豈知天不敢自聖宋初諸宗嗜諫若飴風俗丕隆如三代時迨其将衰奸兇擅國國不遽亡繄諫之力惟時杜君奮不有身持書叩閽以擊權臣言雖不行肝膽㡬落直氣凛然可撼山嶽君非御史君非公卿憂國而言卒以直名孰居其官而遺其事起君九京吾為君御南稜王先生像贊有序士習之盛衰豈不繫乎世哉世之生士猶地之生木柯葉碩茂而花實盛美者必非瘠土之所能有也余觀於宋考其政教文章之懿而求士於其時其大者既皆博覧多識宏偉而端亮其隱約而不顯者亦多忠信敦慤方介嚴重望其威儀聽其論議莫不偉然有以異於人此豈士之素賢哉師友之際禮義之習有以成之也烏傷南稜王先生威仲生於宋季而老於元余不及識其人而嘗問其家求其遺事詢其鄉之耆老以考其行已之大方盖直諒剛嚴之君子而非今世之士所能及也揚子雲曰周之士也貴秦之士也賤周秦之相逺士未必皆以之而貴且賤也然不隨世而變者鮮矣安能不以之而異乎先生之弟子最顯者為黄文獻公溍仕元為學者所宗而先生之孫翰林待制禕以文學事今上有名當世觀於先生可以識宋之盛觀於文獻公與待制君亦可以知先生之徳矣賛曰欲知其身視其所處之世欲知其學視其所傳之人欲知其徳之厚薄曷不觀諸子孫吾以是知先生宋之善士古之逸民徐孺子管幼安之倫也御賜吳大學士􅀞像贊有序洪武十五年冬十月一日皇上以萬幾之暇召侍從儒臣訪論古道今東閣大學士金華吳公沉實預在列上嘉其德業文學之美命善工繪其像賜之以示寵褒之意公既詣闕稱謝将藏諸家以侈上恩以為鄉邦子孫無窮之榮明年某至京師獲拜而寓目焉因言曰昔之明臣獲畫像於王庭者若商之傅説及漢麟閣雲臺之所圖者有矣然髙宗圖説於未見之初二漢像諸臣多在既沒之後惟唐太宗為學士十八人畫像當其尚存方任之時天下聞而慕之有弗可及之歎時未嘗得受賜而藏於家也今皇上優禮儒臣逺同於太宗而公忠藎宻勿文足以宗一世學足以貫古今使與虞姚數子並生當不出其下而官為學士職在論思皆與之同又獲賜像而藏於家豈非間世竒遇尤為可慕也哉第像公者能窮其面貎而公之所藴同於古人者非知徳之士不足以知之某非敢以為然嘗讀公之文矣乃作贊辭附其左方以致景仰之私其辭曰行安識明學粹義精執筆横經陟降大庭帝敷人文化成九有公為儒宗隂翊治道徳為世儀文為世師凡厥縉紳孰克似之華髪蒼顔圖像孔肖子孫勿忘天子所詔御書贊有序中書舎人臣蹇義以忠謹䝉寵遇皇上為更今名而御書以賜之㑹臣以校文來京師義以見示謹稽首作賛曰惟天不言以象示人錫羡埀光景星慶雲聖人憲天與天同徳誕宣至文以立民極包犧之畫神禹之疇昭揭天心臨照九州後王稽古莫不有作孰能巍然前聖是若明明我皇聖與神通煥發天章衣被萬邦嵎夷昧谷髫童鮐叟大訓宏謨傳誦人口惟是御書世則罕觀如彼瑞物時見人間虹光寳氣上燭霄漢見者稽首心駭目昡臣義何脩乃克有之天錫嘉名孰與之夷常人萬言理有未足惟聖一辭終身可服君臣之體父子之倫逺之天下邇之脩身由義而行㒺有弗至對越幽明浩然無愧古人作聖敬立義行推其緒餘可臻治平衆兆寡知舍此弗踐心學無傳事功靡建義尚念哉祗奉聖猷天子命汝俾自慎脩如山如河如鼎如璧以利萬物以鎮社稷前有千古後有萬年為一不義以負於天天之所賜惟徳可守鬼神相之終古是保濳溪先生像賛二首星斗之文江海之量優游玉堂為天下望名不係乎寵辱心無與乎得䘮世何幸而見之當求其似於三代之英漢唐之上也道術可以化天下而遇合則安乎命也該博可以貫萬世而是非不違乎聖也無求於利達故金門玉堂而不以為榮無取於患難故遐陬絶域而中心未嘗病也卓然間氣之挺出粹然窮理而盡性也事功言語傳於世者乃其緒餘而其所存之深所守之正撓之而不倚挹之而不罄也是盖将友千古之豪傑待知己於後世而非適意於俄頃也彼外物之往來何足以累其大全而吾猶冀天道之終定也待制華川王先生像序贊傳曰國之将興必有禎祥其得人之謂乎故善觀國者不觀其甲兵之雄財粟之多土地之大而觀其得人賢否誠得其人弱可强敗可成不得其人雖威力富庶敵於海内亦不免於亡天将授人以天下亦必授之以守天下之器賢者之所在天下之所歸也當國朝之始興地界於羣雄之間最㣲矣然是時有數君子者皆起而從之識者已知天命所属既而或以功業定亂或以文章賛化卒能合四海於分裂之餘不越十年遂致乎治嗚呼是豈非天哉烏傷王先生子充在數君子中博辨通達以文章名上之為吳王授江南儒學提舉司校理陞禮部侍郎兼引進使轉起居注出同知南康府事及上即天位召入議禮改漳州通判㑹詔脩元史遂徵還與金華太史公俱為總裁及史成拜翰林待制未㡬而出使西夷雖未獲究其設施然其有益於國者大矣世之趨近功者恒謂儒者不足為時重輕此非知本之論譬之人身彼一才一藝者猶手足耳目然而賢者則元氣也人見手足之能持行耳目之能聽視而不知皆本於元氣不亦惑哉某幸受業太史公而以未識先生為恨先生之子紳以畫像見示乃叙而賛之曰天眷有明勃然龍興豈惟智謀得人乃成其人伊何匪将匪相爰有君子海内之望望既歸之孰能違哉彼王彼侯小大畢求惟華川公蔚其文雅位雖不崇名動天下人知其名豈知其心我懐徳音山髙海深空同外史贊飄然輕舉者吾知其為僊脱然無累者吾知其為禪操履仁義而不失者吾知其為儒者之賢人於茲三事不可得而全也惟空同子嬉戲出入於其間慕僊而好佛行髙而志專丰神朗潔如氷雪之在澗意氣閒逸如鸞鶴之飛天吾與之遊久矣而莫知其所由然也况可得而言傳耶楊先生像賛不翕翕以為同不戞戞以為矯遁身乎山林之中抗志乎雲霄之表若先生者崇爵厚禄不足以為大布衣糲食不足為之小以其所存者義所富者道也視彼曲學阿世顛蹶乎得䘮之途而不止者鳳凰之於烏鳶靈芝之於衆草也乎宋仲珩像賛璠璵其温氷雪其清皎如異人照映殿庭辭翰爛然為世重寳却而不居曰志乎道世臻平康斯文将昌彼美仲珩邦家之光王仲搢像賛身若不能勝衣而學術任千鈞之重口若不能發言而文辭如源泉之湧長於尚友而不能隨俗合汙鋭於自脩而耻於干譽徼寵此王子所以羣乎今之士而有古人之風賢者聞之而慕不肖者見之而恐而予嘗以謂茍不獲進於髙位如漢之韋平亦可以奮其才猷為今之賈董也鄭仲釋像賛徳方而行純服禮而蹈仁化周乎里閭才㧞乎等倫若是者不可以􅀞也美貎而長身質清而氣神其言也穆乎其諄諄其動也介乎而誾誾若是者又非􅀞之所能盡也然則補其所未足載其所不傳者豈不在乎斯文噫若人者古之篤慎君子而無愧乎義家之子孫者耶朱方中像序贊吾鄉士君子尚禮義而重名節凡仕於天下者雖學術有淺深才器有巨細政術有踈宻至其所守未嘗不有以過乎人盖習俗然也開封朱通判方中士之㢘慎敦厚者也居官且二年獨携一子與居弊廬蕭然壁無完土而牖無完紙厨廐薪芻㡬不属處之裕如不以動其心而惟以奉法守官為先務夜四鼔輙呼童奴起盥櫛坐㕔事或至晚始得一食不知饑渴之及也予過大梁見而嘉重其所守因書贊以識其行事以示閭里云行本於儒不驕不汙人或以為迂言本乎書不諂不誣人或以為愚政事舒徐規矩靡踰人或以為踈夫孰知其外如不足而内實有餘不適於時而與古為徒嗟乎使斯人而為世之所喜吾必謂風俗已復乎古初葉友直處士像贊孝友植乎其内才猷著乎其外恬退於競趨之時優游於多事之際不嶤嶤以忤物不汨汨以阿世予方於古人中求而不知其隱於盖蒼之西東海之澨也劉廷脩先生像贊稽古之學用世之才直氣凛然山嶽可摧器可有為時則不遇乃使妄庸希世取位不合於人造物為徒遺像在堂可敦薄夫南齋像贊知道徳之榮故於禄位也輕以仁義為樂故於嗜好也薄畜壮盛之志而弗及小施忘嵗年之邁而靡倦於學氣清而淳貌古而確雖不獲陪諸老於金馬玉堂之署以為國之蓍龜然優游庠序之間導揚聖賢之㫖誠足以纉前緒而開後覺也歟葉用賔贊身不躋乎通顯而以徳為榮才不著乎庸績而以術為名不衒竒以誇世故人服其善弗枉已以狥物故天錫其齡大冠深衣左史右經賔從在堂子姪滿庭閲百年之變故儼一代之儀刑是盖齊乎秦伏生之夀而庶㡬漢管寧之清者乎王中夫先生像贊生混合治安之時備敦龎淳厚之氣寛和博大足以範俗而化民剛毅明決可以成功而贊治惜乎其不盡試也出其餘馨發乎文藝沛若江河之決粲若星斗之麗世皆仰而尊之而不知特其餘事也盖嘗於進退出處之際窺公之為人窮而不戚泰而不肆位卑而道不行年髙而學愈邃其所存者深逺矣當耆英淪逝之餘覧乎遺像而挹涕劉養浩像贊世稱畵史能冩真吾獨謂儒者能寫真盖畵史能肖其形而不能肖其神儒者則於性情心術莫不窮變態而盡彌綸此所以頓剉萬彚而包括乾坤今吾養浩心之蘊蓄自足以藻繪一世而其形似何乃託於和丹吮墨之人吾試為之言曰是夫也豈非今之文行君子而古之鐵漢子孫也陳希古像贊灑然絶俗之韻溫然玩世之資不茍同於求合不立異以取竒出膺民社之寄處為士子之師發才猷於政事寓談笑於文辭若夫人者觀其儀状清而若腴老而不衰其所養可知矣豈非遊情事物之表而不為禄位所羇者乎澹如居士贊窅然深思者處事之精也沖然内足者燭理之明也才可以應乎萬變而守之若無能也智可以洞乎㡬先而泯跡若無所有也有以樂乎中故視外物之輕也衆所愧乎天故不願乎人知也此古君子之成徳而澹如居士所以自名者耶王藴徳像贊徳充於容言立於書著乎外者沛然有餘而存乎心者欿然若虚通而不流介而不拘春陽之煦時雨之濡是之謂世之醇儒而纂乎子雲仲舒之徒者歟友鹿翁像贊志淳而夷行和而厚不資榮於簮紱獨養髙於林藪寓琴書而自樂取麋鹿以為友無所累其心故身康而夀無所取乎外故家裕而久世常好夫智術謂狙詐為可守孰知夫才大竒者難全徳有餘者有後覩其容貌而考其子孫尚足以傳不朽也俞博士畵像贊位卑而志崇守約而氣豐清修閒逸得晉宋名流之度精悍辯博有秦漢䇿士之風世多窺其外而不察其中故但知其識量之逺言論之雄以吾觀之才良志充而所存者厚矣豈一邱一壑所能容耶黄氏三夀圖贊余少聞近古致治之主惟漢之文帝最賢求其本紀所載殊無甚異之事而太史遷獨稱其時生年六七十翁未識至城市游遨嬉戲如小兒状以為極盛心嘗疑之謂此何足見其盛乎後遊四方海内經大亂之餘風俗益偷埀髫之童輙往來郡邑用智巧相欺紿然後慨然思文帝之時信不可及追惟其盛未嘗不歎其難遇也間竊自觧以為唐虞三代固未易及至若文帝仁厚之主有志於治者皆可庶㡬效之安知不復遇乎昔年遊婺聞浦陽黄氏兄弟三人者合食以居至老不出閭巷心甚慕之今年至其家三老人者出迎鬚髯頒白冠裳如畵行歩踆踆可數黙然若不能為辭余私念史遷之所稱者其謂是乎天下自此殆将治矣治亂之來雖由於天而實係乎俗便捷巧佞之俗成其流必至於亂忠厚朴愿之俗成治之漸也當文帝時漢興三十載矣故其俗之盛如此今國朝之興方一紀而東南逺邑之間已有若三老人者使越一世之後安知不如遷之所稱乎然則三老人者君子於其身觀國俗焉所繫豈小哉其鄉之好事者繪而為圖而請余贊贊之固宜也雖然使天下之人皆若三老人者余之志伊周之志於是而見也謂三老人為異而贊之者非余之志也贊曰俗之澆淳視乎斯民治亂之原非天伊人世之方亂民喪厥徳詐諼機巧胥援以溺維治之符俗厚人龎厥風既成邦國以昌元亂既弭殆臻於理曷占其端視諸黄氏維黄世族為婺望家爵位非崇其徳孔華恃徳而驕徳則日隳弗居其名福禄攸躋懿茲黄氏有伯有季既錫之富又賚之齒人豈不富僅以貲名孰能與夷咸以善稱人之蓍艾集於一身疇得乎天施及弟昆伯氏持觴維仲之授季也䕫䕫以殽以豆其服豈華斯帛斯絺食匪云珍於以療饑孰不能言我弗出口一其敬誠樂有夀考凡爾孫子曷不是程以革其漓以揚休聲豈惟爾家宜俗之導孰能旌之四方是效杜推官贊不長於書而善於記不專於學而敏於事喜飲酒而未嘗輒醉性剛嚴而治獄平恕此杜子之所為異也况其才氣老而不衰容貌泰而不肆其中必有過人者宜乎聞其政者憚其風聲而與之居者喜其樂易也張文敏畵像贊生乎閥閲之家學乎輦轂之下既研磨於政事亦被服於文雅英才勁氣逺邁乎等倫剛毅潔廉不愧於儒者使之正色立朝簮筆冠豸庸邪當破膽而濳遁姦黠必聞風而驚詫胡為乎猶徘徊於冗散之塲倘徉於寛閒之野邪姚貞婦贊越之山隂處士姚君彦良有貞婦俞氏年二十六而夫亡貞婦毁容劬身以奉䘮𦵏降意循禮以事尊嫜慈以撫其子儉且敏以裕其業如是者三十餘年年五十八矣篤行徽言傳於鄉閭休風慶澤施於後昆子禮原以才薦於朝為禮部郎貞婦節行用是愈白於天下里父老言於縣以達於部使者叅伍審覈可信不誣且将有旌褒之令縉紳動色同聲交譽昔共姜守義歌於國風伯姬謹禮書於春秋惟茲俞氏實與為儔而上弗預𤣥聖之筆下不列風雅之篇庸非闕乎乃作賛辭播於閭里俾有所勸用敦於人紀其辭曰帝降厥衷孔粹惟人人極不傾以有大倫惟夫惟婦實倫之始父子昆弟咸基於此元聖立憲萬世是繩書謹其初禮設其恒詩備盛衰著美刺慝春秋之義勸戒甚白婦徳豈多以貞為常從一而終顛沛靡忘隂教既泯人失其行恣情棄軌㒺克循正婉婉夫人嫓越之姚有蔚其容令徳宣昭宜於尊嫜協於婣族胡性之懿而命不淑楚楚良人盛年云亡呱呱者嬰匍匐在旁于凊于温則曰既耄于鞠于育心焉閔悼黽勉劬勞時易世遷昭茲信誓敢負所天秉心靡渝如彼金石可銷可泐我則不易我葺我巢我雛嘵嘵載翔載翺鳴于九霄天錫之祉貞婦有孝子為天子使為民所視人曰孝子茀禄是承何以啓之母徳之貞人曰貞婦眉夀未艾子報㒺極克順克愛相古淑媛列於書圖貞婦配之奚寧弗如有赫名譽播於里閭帝命是旌邦國是模善無不孚亶哉匪誣老人星贊二首帝有司命淑慝是主曰老人星司命之輔嗟此下民無謂弗聞彼杖而遨日瞰爾門食氣之母服天之章下上南極昭回萬方眷佑下民􅌠制元命誕錫永年邦家之慶赤壁圖贊羣兒戲兵汙此赤壁江山無情猶有慚色帝命偉人眉山之蘇酹酒大江以滌其汚揮斥𤣥化與造物伍哀彼妄庸攘敓腐鼠明月在水獨鶴在天勿謂公亡公在世間白鹿洞規贊浦陽王君復之取子朱子白鹿洞訓學者之規揭諸講學之齋余美其知所嚮也述朱子之意為賛以繫之辭曰維天降衷維聖立極維賢弼教維民從式天賦之善靡有不同如木之升如水之東有或激之漂溢震蕩或閟其萌莫遂其長決之䟽之猶禹導川沃以雨露俾全其天三代之英洙泗大成地滋海蓄日運神行昧擴而明虚受而飽匪聖私言時天之道以天治天沛乎無難矯以人為行之愈囏千五百年聖統莫繼掇其緒餘以取禄利有宋羣哲闢而承之懿文齊公百世之師刮磨羣經淘沃衆說執其大中去取予奪遺書孔多覃被天下譬諸飲食非民水火推其本心曰余何言以言求之不汨則淺曷知其然其要甚簡斯道昭昭去人不逺有倫有紀天秩天彛民日由之寧不預知為學之初舍此焉學率而弗違匪資外鑠發之為事騐之於行天實牖民豈伊人能嗟今之人以學為戲言豈不工道則未至百爾君子公言是諏匪公之言維聖之猷歸田圖贊干禄非冒髙蹈非矯趨舎進退由義與道孔明之度子房之英天厄其道非吾無能廬山崇崇其下江水清風穆然盛徳之士畵梅贊金華濳溪公以翰林學士承㫖致仕居家時嘗以郡人徐原父所畵梅寄余兄希學筆法清勁有出塵之意公薨今數年矣藏之不忍視族祖雪窩處士雅好畵論及畵梅取公所寄而閲之如見公焉處士欲得之因以獻處士且贊之曰玉質氷姿不汙纎塵破顔一笑萬物皆春我思若人潜溪之上見者凛然如對公像馬圖贊昔人之論馬多以升天閑被服御為貴故畵者喜極其形容以余言之物貴乎全其天而莫累乎不得自適使馬受羈靮備法駕有韓哀伯樂之徒以為御猶不若羣逰自肆之為樂况御非其才任非其道乎同郡髙君示余以唐人所畵三馬頹然天放得馬之性非深於物理者不能也因為作贊云麒麟騶虞貴不可羇强加銜轡於馬為疵世人不察以此為美飾之金玉非馬所喜嗟此三駿乃馬之龍棄違天閑追雲躡風羣飲於江江水欲竭仰天大鳴氣薄日月伯樂視之振鬛奔馳况肯俯首駕君鼓車龍性難馴暫與馬伍霹靂上天雨水九土為好義作脩徳樛木贊王子善書得篆之髓流為木石與書同理柯條玉潤衆葉雲委鄭君得之贊者方子遜志齋集巻十九欽定四庫全書遜志齋集巻二十明方孝孺撰
