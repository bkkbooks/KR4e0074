body:
  text: 遜志齋集巻二十四明方孝孺撰古詩古詩蜀王殿下賜行厨酒膳奉謝天門傳詔飛金符帝子發春朝帝都萬里巴江引軸轤朝離瞿塘莫荆巫牙旗羽扇照江湖馮夷操楫龍伯扶威振海若驚天吳衮衣登朝玉陛趨至尊撫問情欝紆奏還大國天語俞却從周秦行坦途乘傳西來試馳驅日行三百尚未晡親藩留宴窮歡娛秦民擁路觀金轝口稱盛徳目睢盱共說賢王世所無南入荆門喜氣蘇蜀邦宻邇忘﨑嶇山花爛熳雲糢糊緑樹清江如􅀞圖漢中小臣章句儒早向王門曾曵裾是日來迎拜路隅按轡遥看咲且呼暮抵行宫侍直爐華燈照夜鋪􅉊毺從容前席講典謨𤣥談蟬聨如貫珠上探千古周八區鄙誚榮辱聖爲徒更闌喜極行玉壺叩頭舉白紅生膚侍臣奉教恩意殊大官美醖貯行厨特賜歸飲不用沽上尊珎味甘且腴受之無功辭有辜心感王恩厚矣乎獻諸祖禰頒妻孥招致朋僚洗罍觚共飲相歡同賜酺平生飲水兼茹􅂼秪將鉛槧代耕鋤近爲校教食民租尸居靜閲年歲徂世人視之等泥途賴逢聖主意氣孚討論聖猷師古初經綸萬理髮在梳小臣學術本麄踈志廣年荒才更迂量同溟海肯納汙欲致衆駿先收駑願王道徳爲世模摩撫疲癃恤鰥孤南漸瀘戎北羗胡陽和發生無朽枯育民興賢語不誣行致孔明與夷吾共康國政秉事樞保釐西土佐唐虞不數蠶叢及魚鳬吾王端拱化日舒從此感恩非一夫歌風臺歌風臺下春水黄歌風臺上春草碧黄河之水日夜流碧草年年自春色漢祖當時爲帝王龍泉三尺飛秋霜五年馬上得天下富貴樂在歸故鄉臺前老人爭拜跪柱杖麻衣見天子龍顔自喜還自傷一半隨龍半隨鬼翻思昔日亭長時一心捧檄日夜馳即今宇宙過四海一榻之外誰撐持却令猛士鎮寰宇安得長年在鄉里可憐創業埀統君後使乾機付諸吕淮隂少年韓將軍金戈鐡馬立戰勲藏弓烹狗太逼迫解衣推食何殷勤致令英雄遭婦手血濺紅裙當斬首蕭何下獄子房歸左右功臣皆掣肘還鄉悲唱大風歌向來老將今無多咸陽宫闕親眼見不忍荆棘埋銅駝臺前老人淚如雨爲言不獨漢髙祖古來世事無不然稍稍功成忘險阻荒祠古廟名歌臺前人已盡今人哀感激悲歌下臺去斷碑春雨生莓苔潼關潼闗將軍才且武五千士卒健於虎朝廷養汝爲阿誰盜賊公行如不覩昨日官車將到關西風放顚塵滿天錢囊衣篋繫車後歘來掣去同鷹鸇南望京師五千里僮僕所資餘有幾離家漸逺親故稀向我長號淚如雨嗟嗟僮僕汝莫愁聖人在上治九州㑹看海内皆冨足關不須防無盜偷淮隂淮隂城頭落日黄淮隂城下秋草荒古城西繞淮水長猶如背水陣堂堂當時犬將功無雙㒹嬴蹴項勇莫當丈夫何乃爲假王至今遺恨令人傷漂母一飯千金償解衣推食那敢忘相君之背貴莫量蒯生此語無忠良慎弗出口遭吾撞歌風帝子歸故鄉思得勇士守四方胡爲鳥盡良弓藏題嚴子陵敬賢當逺色治國湏齊家如何廢郭后寵此隂麗華糟糠之妻尚如此貧賤之交奚足倚羊裘老子早見機獨向桐江釣煙水赤壁東夏口西武昌赤壁峭絶當中央奸雄將軍氣蓋世敗卒零落慚周郎得鱸魚沽美酒孰若黄州蘇子曕謫向江湖動星斗噫吁􅃧曹公氣勢蘇子文章人物銷鑠塵跡荒涼惟有江水千古萬古空流長吊李白君不見唐朝李白特達士其人雖亡神不死聲名流落天地閒千載髙風有誰似我今誦詩篇亂髮飄蕭寒若非胷中湖海闊定有九曲蛟龍蟠却憶金鑾殿上見天子玉山已頹扶不起脫靴力士秪羞顔捧硯楊妃勞玉指當時豪俠應一人豈愛富貴留其身歸來長安弄明月從此不復朝金闕酒家有酒頻典衣日日醉倒身忘歸詩成不􅃹鬼神泣筆下自有煙雲飛丈夫襟懷真磊落將口談天日月薄泰山髙兮髙可夷滄海深兮深可涸惟有李白天才奪造化世人孰得窺其作我言李白古無雙至今采石生輝光嗟哉石崇空豪富終當埋没聲不揚黄金白璧不足貴但願男兒有筆如長杠題李白觀瀑布圖天寳之亂唐已亡中興幸有汾陽王孤軍疋馬跨河北手扶紅日照萬方凌煙功臣世爭羨李侯先識英雄面沉香亭北對蛾眉眼中已見漁陽亂故令邊將儲虎臣爲君談咲清胡塵朝廷策勛當第一珪組不敢縻天人西遊夜郎探月窟南浮萬里窮楚越雲山勝地有匡廬銀河掛空洒飛雪醉中信馬踏清秋白眼望天天爲愁全閨老奴汚吾足更欲坐濯清溪流英風逸氣掀宇宙千載人間寧復有夣魂飛度南斗傍􅀏酹廬山一巵酒雲松可巢今在無九江落照連蒼梧欲從李侯呌虞舜盡傾江水洗寰區題李白對月飲圖明月出髙樹上懸青天中下有萬頃之長江揚波泛彩清若空江風吹人色凄凛此時對月誰能寢十千斗酒何足論舉盃冝就花前飲花前飲酒無與儔酒酣意氣輕王侯仰招行雲不可得但見月與河漢俱西流僊人伐桂樹玉女倚瓊樓顧盻暫相恱棄去終莫留昨日已浩浩今日復悠悠人生如飛光及時不飲空白頭君不見月中玉兎搗靈藥不能醫此萬古愁何如醉卧長不醒天地與我同虛舟混混六合間浩然何所求徽宗花鳥圖宣仁升遐司馬死宋祚當時已中否豈知禍亂猶未休更立端王作天子簡書四出捷星馳重見熈豐舊設施太室既崇荆國祀朝堂新刋黨人碑廷臣往往多鉗口四海禎祥無不有萬金寳藏造池臺千里樓船載花柳君臣自詫文徳修不數唐漢追商周陳鐘考皷按雅樂厲甲揚戈昧逺謀宫中從容萬幾暇酣飲逸遊忘晝夜御輦時過宰相家㣲行或飲倡樓下宣和殿内玉屏風綺席金爐處處同詔遣内官宣畵史時拈象筆極形容神機宻運回天巧萬歲齊呼盡稱好玉礲裝軸錦裁題墨署花書朱篆寳心怡意􅆘藝愈良自道丹青過百王盡將兵籍付邊將還信奸臣斥俊良契丹滅後金人喜猶剖王封賞閹豎露布初騰紫陌塵天驕已渡黄河水汴京鎖鑰一時開雉扇鸞輿去不回圖書萬巻入沙漠奎璧無光天爲哀秪今俯仰三百載南北興亡幾更改廢陵已發社無基尺素誰家尚收在吾知此畫非人爲當有神物常呵摩故留花鳥在人世要俾後來懲戒之古來君徳在仁義小技雖工何足計不見昭陵一藝無偉績鴻名照天地錢氏家山圖錢君望鄉勞夣思陳君奮筆爲寫之毫端歘吸驅鬼物風霆捲地山川移紫雲峯髙當面立獅子灘聲轉山急翠竹揺風市塵逺青楓夾路樵歌入山脚盤廻到石門桑榆深映數家村百年丘壠澤未泯中古衣冠今尚存髙堂老人年八十皓首紅顔曈㸃漆柴門拄杖望兒還坐聽庭烏心若失錢君一見增喟傷此身如在淮水傍摩挲門户欲歸去細㸔無路墮𣺌茫乃知陳子善戱劇故假丹青惱胷臆世間萬事無不然畫地作餅安可食陳子亦是憶家客不特戯人兼自釋沙際扁舟已上檣何當共載歸故鄉題南屏對雪圖昔年歳莫京國還艤舟夜宿南屏山山風吹雲天欲壓夜半大雪埋江關清晨倚樓望吳越六合玉花飄未絶恍疑江水駕山來萬頃銀濤湧城闕山僧好事喜客留置酒開筵樓上頭玉堂僊人宋夫子紅顔白髮青貂裘坐談今古如指掌共看雲収月華上寒輝素彩相蕩摩碧海瓊臺迭蕭爽酒酣擊節心目開慷慨弔古思英才荒祠古栢岳王墓廢湖殘柳蘇公堤一時嘉㑹難再得僊人上天塵世窄王子何年繪此圖正貌南屏舊遊迹吾知王也竒崛人新詩妙墨俱絶倫偶然揮洒豈無意神授髣髴存天真世間今古同飛電回首人豪都不見空有羅山石室書夜夜虹光射霄漢江山萬里圖我昔奉勅辭金闕西下巴川持使節僊槎二月出龍河萬里春風掉晴雪吳江茫茫入杳㝠棹歌初過峨眉亭錦袍不見李供奉白雲遮斷三山青烟蕪漲緑知何地白鳥雙雙没淮樹片㠶風滿疾如飛矯首驚看泝流去大孤小孤横雪波匡廬五老青嵯峨九江秀色嘆竒絶半空飛瀑懸銀河推篷竟日閑吟倚瞬息舟移洞庭水君山如黛壓中流十二煙鬟鏡光裏好山逺自峨眉來瀟湘練明天際開疑峯九㸃落空翠重華孤墳安在哉武昌地轉多遺迹隔岸鳥鳴瞻赤壁烟焰旌旗魏武兵綸巾羽扇周郎策扶醉曽登黄鶴樓漢陽城對鸚鵡洲即從鄂渚櫂明月泝流直上窺荆州夷陵山勢多重疊楚樹蠻雲逺相接欲向䕫城入錦城還於巴峽穿巫峽神女峰前路欲迷瞿塘灧澦聞猿啼五溪越盡見雲嶺但見鳥道青天低萬里橋西看立馬足迹經遊半天下愧無草檄擬相如􅀏擲槖金輕陸賈今年詔許臨丹丘夣中往往驚覊愁江山誰寫入圖畫眼中歴歴如經遊岸巾一覧發長嘯滿襟爽氣高堂秋題王叔明墨竹爲鄭叔度賦吳下王蒙藝且文吳興趙公之外孫黄塵飄蕩今白髮典刑逺矣風流存華亭米芾稱善􅀞每觀蒙􅀞必歎詫謂言妙處逼古人世俗相傳倍増價昔年夜到南屏山髙堂素壁五月寒壁間舉目見修竹煙雨㝠漠蛟龍蟠呼童秉燭久不寐細看醉墨王䝉字固知蒙也好天趣􅀞師豈解知其意分枝綴葉人所知要外枝葉求神竒天機貴足不貴似此事不可傳諸師麟溪鄭君好竒士愛盡猶能賞其趣嗚呼世間作者非不多鄭君甚少可奈何失硯嘆吾家石硯𤣥玉色來自扶桑海中國盪摩日月露光精吞吐波濤含潤澤天生竒質爲世用海王龍伯不敢匿少時得之方外人四座傳翫皆歎息二十年來親翰墨北走洙泗西梁益錢塘㑹稽屢遊歴鬼神呵護同珙璧水怪山精皆辟易佐我爲文冩胷臆上探𤣥化與爲敵宣暢民彛輔皇極雲雨布濩飛霹靂倐忽變遷靡定迹謬致聲名驚四方招謗速侮不煖席其間損益兩相補硯也於余良盡職豈知萬事不可料昔者相親今不得潼闗羣盜何太劇竊瞰行人俟昏黑金錢雖失不足歎此硯使我深痛惜我非玩物有偏愛又非昧理苦蔽惑直傷美器不遇主有似賢才受驅迫真卿奉使陷叛臣蘇武持節幽異域忠肝義膽貫天地豈忍包羞汙㐫逆孔子春秋至謹嚴細事不肯登簡策大弓寳玉二物耳特書盜竊懲亂賊我誅鼠軰恨無力著作有心裨六籍何時見汝生羽翼奮飛重來侍吾側不然變化爲星辰照臨下土當烜赫外物聚散如置弈胡爲念汝長戚戚君不見自我得之失無憾不如蕭公差達識扇寒藤隂壑懸風霜刳皮擣骨收溪光銀漢半邊秋月白璚臺一幅春雲香青旗翠纛湘潭竹寳刀纎纎破寒玉束來十二碧琅玕鳳骨凝香冷盈掬吁嗟造化由天功乃知製作歸良工膠漆投情作鸞偶巻舒懷袖生清風清風飄飄可人意忽覺聲名滿天地南州溽暑恩愛多只恐涼飈入庭樹紅酒歌田家八月秋秫黄頳肩滿檐金穰穰西成萬室喜登塲斗酒勞慶年豐祥天台山人傳秘方釀成九醖丹霞漿紫檀糟頭秋㸃長絳囊醡壓甘露涼猩紅顆滴真珠光蓼花色比桃花強薦新設席請客嘗風吹桂花滿屋香饌出肥鷄一筯肪橙斫蟹膾雙鰲霜不須琥珀琉璃觥不須太白力士鐺我愛真率田家郎磁甌瓦盆罌水觴爛熳爲我澆吟腸新詩吐出雲錦章醉來興發恣豪狂高歌起舞當斜陽出門一􅀏爾汝忘大江東去煙茫茫食羊虎肉白額咆哮振山谷老羝見之驚且伏一朝強弱兩不存此肉都歸野人腹腹中惟恐相啖吞急呼美酒爲解紛酒酣一醉更懷古千載英雄羝與虎蕨箕行並海饑民千百數携鋤上山斸山土蕨根已盡斸不休力絶筋疲未言苦屋頭五日無炊煙十歩九却行不前全家性命係朝莫弱子假息阿母眠昨日斸蕨僅盈斗今日蕨根不滿手但憑斸蕨保餘生再拜青山感恩厚青山青山爾勿猜明朝未死携鋤來海米行海邊有草名海米大非蓬蒿小非薺婦女携籃晝作羣採掇仍於海中洗歸來滌釡燒松枝煮米爲飯充朝飢莫辭苦澁不下咽性命聊假須臾時皇天不仁我當死况乃催科急如矢來牟擬作日月期欲保餘生更徯爾嗚呼棄止不復陳椎牛酣酒為何人遊峨嵋楚客求丹梯泝流三峽踰五溪浙僧訪佛祖一錫凌空向西土江左儒生尋謫仙相逢共上峨嵋巔峨嵋山髙氣磅礴萬朶蓮開青插天天髙地逺望無極海東日出扶桑赤氣衝衲衣舉光揺角巾明眼底汪洋巨鰲動耳邊髣髴天鷄鳴龍宫對月窟曾聞謫仙遊霞光凝不散履迹今尚留千崖崩摧勢欲墮羽流緇侣參差坐七寳巖留供佛燈萬松竈起燒丹火風霆蕩潏雲樹糢糊虎豹接跡猿猱鬬呼星漢當頭手可摘靈芝甘露無時無雲漏日兮光一線金蓮白象兮紛紛而來見萬籟動分天樂和仙之人兮夜經過忽神驚而目眩豈事幻而說頗覩謫仙而無有杳鳳管與鸞車塵心未斷懷鄉土青鞋復踏來時路行行回首語青山石室無鎖門無關重來有日當躋攀肻效趑趄囁嚅徼名勢坐令塵土凋朱顔題萬間室少陵老翁餓瀕死意欲大庇天下人一椽茆屋不足蔽風雨安得萬間之厦蓋覆四海赤子同欣欣言狂意廣不量力至今世俗聞者交􅀏嗔侯城小儒愚獨甚不敢嗔􅀏謂公之意厚且真古來致亂皆有因大臣固位謹持禄其計止爲安一身髙車大纛耀侈冨子女玉帛驕里隣安危得失百不知更僣膏腴便利田宅遺子孫生靈窮苦墮溝瀆寒士困悴無衣紳彼也珍羞綺席歌舞燕樂窮朝昏老翁哀痛實爲此熟視鄙夫憸子辟之犬鼠加冠巾曰我得志有不爲嫉邪憤世欲救其弊忘賤貧至今已閱八百歲知翁之意世獨少蹈翁所惡常紛紛侯城子爲是懼人受天地中何以不與禽獸草木爲等倫一心運萬化五性涵義仁下補后土所不能上賛皇天之闕燮調寒暑撫五辰大禹䟽百川伊周綜理禮樂政教與世爲陶鈞孔子孟軻不得位著書明道亦與治水拯世之功均吾爲孔子徒忍汨流俗同沉淪故題一室曰萬間坐覺宇宙亭毒氣勢皆前陳身賤不敢論政教誓將修復孔業爲世開昏嚚室中左右列古書亦有諸史所筆志義之士忠良臣闗有子厚洛有伯淳羣公近出皆鳳麟美哉子厚西銘之說何諄諄吾恐當時亦感悲歎意故立此論可與日月同光新爲君不知此無以建皇極爲臣不知此無以康兆民願寫此書千萬巻洗濯鄙胷與私智使知林林之衆皆吾共出而同娠視之不至越與秦盡變呻吟愁歎之俗若去寒沍逢陽春小儒不惜獨困處此室作爲雅頌歌聖神再見中國大治同周殷滄州趣爲台城趙生孝禮題少年負竒志味道輕神僊縳虎千仞崖斬蛟萬里川東指扶桑西月窟以手捫天問天闕醉中欲奪羲和鞭驅䇿六龍下溟渤歲華忽復晚竒功竟無成耻作楚狂人甘爲魯諸生俯首蓬屋中被褐勘六經憂多髮白早觸事萬感盈擬從安期輩採藥遊蓬瀛蓬瀛羣仙别來久聞知掉頭還拍手世上憂勞早已知身後功名復何有棄我如敝屣不肯相攀援登髙發長嘯目送白鶴歸三山我友王子喬示予海嶠圖孤峯㧞出數千尺丹光雲彩交糢糊下臨無地上極無天漚波浩蕩望不極恍若巨鰲掀舞勢與元氣同囘旋金銀宫闕隱倒景翠綃絳節在眼前對此愜心賞便欲乘風與俱往恨乏同心人臨岐獨惆悵趙生天資妙訪我東海頭清談雄辨有仙趣坐覺毛骨寒颼飀生方讀書取青紫我已屏跡棲林丘他年謝事倘相㑹與爾共作蓬瀛遊許氏龜巖行寧海許子名續字士成年踰三十事母以孝稱士成六嵗失嚴父母氏褓抱避亂慈溪城于時鯨鯢奮擲東海沸紅塵滿天波血腥流離異鄉幾寒暑慈母守義志節如霜明盜平歸來閭里驚母能愛子復善教紡績衣食使入庠序拜揖從先生所學在大倫耻以文藝鳴家居近市母不樂又爲迎至龜巖之下養且耕兒壯母髮白諸孫長大能扶王母行士成嵗時奉觴爲母壽蹁躚拜舞同孩嬰食有黍稻殽有牲母氏感舊涕泣難爲情士成念母守節苦身賤莫達天子廷每爲鄉閭道母事辭㫖悽咽弗忍聽縣令不之察郡守不爲聞朝家有命誰能旌悲哉士成之恨何由平嗟嗟今之人豈無髙車大馬埀華纓推恩及父母丘壠沾光榮立身奉法不能謹雖有恩寵無由承身死汙辱増宗族愧醜父不願以爲子弟不願以爲兄孰若士成隱居不仕行修于家馳令名龜巖土厚且沃龜巖水甘且清龜巖之人誰與許子京許子之賢母所令鄉人祝許氏母子年百齡母爲人婦法子爲事親之準繩嘉爾母子孝且貞龜巖之高與天俱不傾樂哉士成配巖永久流芳聲蜀道易有序昔唐李白作蜀道難以譏刺蜀帥之酷虐厥後韋臯治蜀陸暢反其名作蜀道易以美之今其詞不傳臯雖惠於蜀民頗以專横爲朝廷所患暢之詞工否未可知推其意蓋不過媚臯云爾非實事也伏惟今天子以大聖御極殿下以睿哲之資爲蜀神民主臨國以來施惠政崇文教大賚臣僚及於兵吏内外同聲稱頌喜恱天下言仁義忠孝者推焉西方萬里之外水浮陸走無有冦盜商賈駢集如赴鄉閭蜀道之易於斯爲至矣臣才雖不敢望白而所遇之時白不敢望臣也因奉教作蜀道易一篇以述聖上及賢王之徳名雖襲暢而詞無溢美頗謂過之其詩曰美矣哉西蜀之道何今易而昔難陸有重巖峻嶺萬仞鑱天之劔閣水有砅雷掣電懸流怒吼之江關自昔相戒不敢至胡爲乎今人操舟秣馬夕往而朝還大聖建皇極王道坦坦如絃直西有雕題金齒之夷北有氊裘椎髻之貊東南大海際天地島居洲聚千萬國莫不奉琛執䞇効朝貢春秋使者來接迹何況川蜀處華夏賢王於此開壽域播以仁風沾以義澤家和人裕櫜兵歛革豺狼變化作騶虞蛇虺消藏同蜥蜴鑿山焚荒穢畧水剷崖石㠶檣屝履任所往宛若宇宙重開闢美哉蜀道之易有如此四方行旅絡繹來遊西覽德成都萬室比屋如雲桑麻蔽原野鷄犬聲相聞文翁之化孔明之仁嚴鄭之節揚馬之文遺風漸被比鄒魯士行賢哲方回參方今況有賢聖君大開學館作校論典墳坐令政化希華勛徴賢一詔到巖穴咄爾四方之士孰不爭先而駿奔王道有通塞蜀道無古今至險不在山與水只在國政并人心六朝五季時王路嗟陸沉遂令三代民盡爲獸與禽當時豈惟蜀道難八荒之内皆晦隂戎夷雜冦盜干戈宻如林今逢天子聖賢王之德世所欽文教洽飛動風俗無邪滛孱夫弱婦懷千金悍吏熟視不敢侵蜀道之易諒在此咄爾四方來者不憚山髙江水深爲玉泉山人題天地直接扶桑東百川委㑹來無窮兩崖爲門障海口大江中流潮汐通豐山横鶩東奔放浪嚙沙崖穿玲瓏翠鳳飛來白銀闕金鰲湧出金蓮宫天台赤城此磅礴間氣往往生英雄鴻儒碩士世不乏神靈秀異天所鍾玉泉山人獨嗜古食貧力土專而工結廬椒江望蓬島坐看海氣浮青紅含嚼英華𠻳芳潤吐納光景噓長虹羣仙窈窕羅几席洪波浩瀚涵心胸蕞爾一鄉不滿意邈焉四海將奚從日披黄巻對賢聖上並周孔齊羲農國風雅頌導于正典謨訓誥操厥中權謀智術競趨利𤣥談清議咸歸空濂洛崛起樹名教千載道學開盲聾仁義行師佐伊吕禮樂出治登蘷龍拯救生民布仁化此心炯炯今昔同食息夢寐若見之上下議論相磨礱論交豈止一世士直追三代還淳風屈伸去就隨所遇仕止進退皆從容某山某水吾釣遊歸來舊隠巢雲松次河南府梅花堂韻前年停車汴水陽鄭公延我政事堂是時梁國花亂發遊蜂乳燕春滿墻緑酒浮觴面玉白繡衣耀座腰金黄豈知造化不容物俊傑俄爲土中骨重來訪舊無一存冠蓋年華兩飄忽堂中遺跡傷人意粉圖素壁銀鈎麗道廣常懷濟物心數竒竟負匡君志文章爛熳空自苦政術廉平索誰繼官僚薦書嗟我遲妻子思家歸未遂感此臨風涕淚埀出門上道風塵翳西行境内五百里到處逢人稱善治洛陽城中迎嵗新正思昔日梁園春河南忽過張少府意氣還同鄭老真蠟梅盈庭花瑶璨銀燭照夜光璘珣登髙訪古隘八極勸酒􅀏談驚四隣我被虛名浪羈束奔走皇皇炊不熟明朝又渡瀍水西行李再經燒棧北丈夫㑹合當有時各展忠貞報王國東河驛值雪次茅長史白戰體韻東河氣髙地常冷越客入山愁日暝蹇驢破帽闖驛門敝屋踈籬耿燈影更䦨藉草始一寐夜半雪來初未省窻眀恍訝烏繞樹身倦宛同蛙伏井鷄鳴起看眼生花睡熟山童呼不醒積深已覺擁藍闗勢逺直疑沾庾嶺穿簷入隙如有求塞户填堦豈須請瓦溝早滴爲炊煙水靣難消因泛梗樂事偏冝壯士獵清氣先入詩家茗平鋪道路混險夷蓋覆乾坤掩瑕眚空山難行無客到高卧閉門終日靜春來一月尚嚴凝天上何人調九鼎半生對雪走四方竒絶愛此林壑景長松壓重龍虎怒巨石羅陳闕整北風末勢更飄揚斜炤餘輝愈光炯南望殊憐京闕遥西顧頗覺歸途永未須翫物遽憂患有形易化皆幻境明朝隂翳盡掃除天際諸峰翠相並乗興伸眉且一􅀏人生饑寒非不幸莫將詩句效蘇公淮隂詎肯儕噲等愛日堂白日麗青天朝出扶桑莫虞淵堂上有親雪滿巔坐看白日心茫然長繩不可繫急景如流川羲和羲和停爾鞭高堂一日如千年寄貧朝餐漿一盂莫食􅂼一盤胸中六經粲星斗筆底萬巻馳波瀾人笑先生窮不耻先生嘆人愚可鄙終朝醉飽百不知何異腥羶飫螻蟻世上羣兒昧重輕每是螻蟻非先生縱令先生窮至老猶與日月爭光明覽以德用中二友和東坡喜雨之作席前衿佩多如雨危坐談經亦良苦講堂日宴未朝飡舌捲唇黒面生土小齋退食聞扣門倒屣起迎咽還吐知是兩賢送詩至笑却杜康麾陸羽錢也駿馬氣莫當陳也奔泉勢難禦元祐詩壇不易登俱欲升堂啟其户文章繇來闗政教道術何曽間今古每憐陋儒不自量詆訶前人竟奚補浪與唐宋較優劣有如癡兒侮厥母蘇公風骨眞天人駭視四海手摩撫二南洋溢騶虞出九韶鏗鏘鳯凰舞列僊得道行御風漢相閑居老食乳神竒變化脫邊幅怒罵嘻噓皆新語眼中不復見此翁雲月江山澹難主我狂自少喜翰墨辟若惰農服田畝嘆彼么麽星辰出望公光燄日當午二公豪健敢扳附蓄積穰穰富倉庾大篇属和意有餘坐覺詩名動城府當今聖朝任英俊雅頌再作聲教普吾衰才薄子勉􅏧振起斯文繼前武渡淮後寄宗文先輩及諸士友長淮風顛浪雷吼爭渡千人喧渡口蹇驢破帽衆所輕行李甘心落人後臨淮先生交義深視我重比雙南金席前弟子總英俊相携擁餞淮之隂就中孫玘藝且勇奮袖登舟氣增重扶顛禦侮況有人病身幸免波濤恐掛㠶長嘯煙霧開主人謝客縁城回孫也追隨不憚險艱危可仗真竒才世俗結交看勢利有勢相依無即棄賤貧如我豈足憐脫落凢情見真意賢豪邂逅何所無排難多由竒丈夫古人事業望公等欲輔國歩須捐軀次鄭好義紀夣韻有引昨承寄示紀夣長句諷詠之餘不勝感歎因用増至二十五韻以道鄙懷答雅意尚正教之竒材偉人世不作太息斯文付㝠漠承君忽枉紀夣篇喜極長吟淚交落雄辭璀錯迸星斗險語鏗訇飛電雹念我雖知意氣真感君復使情懷惡憶昔與子在京師玉堂老僊侍幃幄冠蓋追趨禁闥深朝廷尊寵禮數渥聲名如雷動天地震起蟄䖝伸屈蠖國有蓍龜民有師水之海瀆山之嶽升堂執業集英彦寳帶朱衣雜南朔朽材浪跡偏見憐繩墨匡持重礱斵子時好修美文藝清談劇辨相娛樂公於多士雖並收視我與君尤不薄龍驥咸歸伯樂廐天球本出荆山璞要爲國家樹基址屬望吾人興禮樂安知埀老萬里行直泝岷江踰劍閣死生契闊恩義乖音書隔絶道路邈索居卧病東海上舊徳棄捐徒歎怍夣中見公疑尚存雅度髙風儼如昨公之神明在宇宙陟䧏照臨焉可度或乘鸞鳳驂麒麟或奏韶夏陳羽籥鈞天清都足豪俊講道論文恣歡謔應悲我輩混世塵俛首顰眉語咿喔獨念靈櫕客西土明詔未許歸故宅昔䝉召見欲奏論造次自疑難感格聖君霈澤覃萬方寧使遺骸塟夷貊子文無後善人懼馬遷有書心事白所憂陋拙忝知已昭雪孤忠負前諾公心豈不望後人入夣語子意甚確子兄文章極醇雅典國製作名烜赫爲銘功行播遐邇可配史傳埀簡䇿子將繼踵綰章綬便當任此千古託如吾自料乏時才空言駭世徒宏廓水北山南結茅宇弟唱兄酬老耕穫著書倘可寓王制未死尚期明聖學與子他年擬見公公歸應化遼東鶴寄修德平生識字不滿百浪竊聲名有慚色反觀身世每自鄙何以使子心莫逆前月馳書許訪我恐我無錢厭賔客惠書問疾繼踵來爲賀更生重悽惻我力不能事耕稼性又不耐營官職承明辭歸茹藜糗侯封鼎食誰願易今年瘧鬼忽侵凌寒熱交爭類勍敵埀頭伏枕二十旬腰腹枵羸面如腊嗌乾恃粥不善飯下牀須扶還按壁向來意氣隘九州頃歩顛躓真可惜所忻元兄督家政甔石無儲免憂戚抱書欹卧困即眠見客暫起饑輒食萬事盡抛思慮表一身豈䘏饑寒迫古來賢豪例窮苦屠兒販豎千金殖皇天予奪有深意衆生淺闇何由識君來不須念我貧厭飫仁義非外得薄田近穫十斛麥炊之作糜可朝夕溪南磐石廣數仭墻頭新筍髙百尺竹間讀書石上卧青雲爲蓋苔當席頗聞海上有巨鰲鼓舞洪濤氣腥黒請君持竿亟一掣膾肉作脯如山積盡俾黔黎飽君徳與君大嚼醉千日免使窮愁惱胷臆送劉士端歸括蒼憶昔髙皇定華夏海内遘屯龍戰野幃幄謀謨三數公君家中丞最瀟洒軸轤十萬搗虛來㠶檣蔽空聲吼雷從容決䇿掃強冦手扶日月滄溟開盜犯洪都突彭蠡砲石星流湖水沸御舟閣河諸將譁神箭穿顱逆酋斃是時中丞謀畧精指揮英傑江南平掀髯撫掌談世事天子稱善羣臣驚寰區混一定勲賞鐡劵金符頒土壤中丞獨擅翊賛功賜號每爲諸伯長青田宰木三十年髙皇僊馭亦賔天國初故老尚誰在幾人事業圖凌煙忽見聞孫三歎息秀目踈髯遺像逼擬樹豐碑墓道邊欲請天朝重褒錫至尊含􅀏問近臣先帝功臣今有孫胡爲拂衣入山去旰食未敢干君恩海内只今無盜賊幽州興兵惱邦國廟堂謀議豈無人我懷中丞淚沾臆嗚呼志士古所稀留侯武鄉今是誰九原招公倘可作爲解四海蒼生危題王節婦妾入君門知有夫夫雖不幸夫子孤人生必死死即已大義一失將安圖爾有金如山我有心匪石頭髮可斷頭可得以死報夫奚所惜幽哉猗蘭芳在彼澗水湄荆棘非不䌓永終保令姿千秋萬載茍可滅白日成塵海成血楊節婦良人贈我明月珠永託團圞誓無違豈期生子髪未髫竟以王事捐其軀妾身既作楊家婦撫此孤兒事堅守明月之珠深自藏千金不落他人手青絲髮斷今復長妾心直與珠爭光推門鬻市卒不售死將地下還阿郎玉堂學士文章伯爲發幽貞播金石千載少似曹家妻凛凜遺風可相敵題許節婦傳渭水不可濁豈與常流俱節婦不可辱自與常婦殊節婦之節良可書書出大手名斯埀嗚呼竒花異卉人難植瑞麥嘉禾不可常種得寫懷子䂓聲裏吳蠶熟星繭纍纍照人目踏車已作春雷鳴我獨無人冷機軸繭老蛾飛爭奈何愁端零亂如絲多故人一去不復返徒有血淚如春波新婚已盟未諧耦青鳥傳音在春後青春㑹少離别多心事殷勤向誰剖君不見古井淵源百尺深欲汲未得勞人心井深百尺君莫恨但恨繩索無千尋聞䳌不如歸去不如歸去一聲動我愁二聲傷我慮三聲思逐白雲飛四聲夣繞荆花樹五聲落月照踈櫺想見當年弄機杼六聲泣血濺花枝恐汚堦前蘭茁紫七八九聲不忍聞起坐無言淚如雨憶昔在家未逺遊每聽䳌聲無㸃愁今日身在金陵土始信䳌聲能白頭律詩懿文皇太子輓詩十章盛徳聞中夏黎民望彼蒼少留臨宇宙未必媿成康宗社千年恨山陵後世光神遊思下土經國意難忘文華端國本濳澤被寰區雲繞星辰劍春回造化爐變通周典禮寛大漢䂓模厭世嗟何早蒼生淚欲枯監國禆皇政憂勞二十年龍樓方愛日鶴馭遽賔天已失羣生望空餘萬世傳長江一掬淚流恨繞虞淵相宅圖方獻還宫疾遽侵鼎龜懸寳命笙鶴動哀音誰紹三皇治徒傾四海心闗中諸父老猶望翠華臨三朝兼庶政仁孝感嬰孩萬嵗千秋志經天緯地才未登宸極定忍見泰山頹聖子承皇業能舒四海哀懿文光典冊善美過昭明歴數歸元子哀榮慰聖情神靈遊帝所陵寢鎮天京公論當時定千秋有頌聲虹光流渚日五馬渡江年聖質中興運天倫位正傳徳隆尊未極仁與壽難全餘慶埀中古皇家世有賢淵黙師成憲端嚴信若神承天行日月與世作陽春銳意思寛政温顔訪老臣至今江海士猶想屬車塵六龍猶未御萬物已昭蘇使處尊崇位應無凍餒夫不知天上樂還憶世間無八極遨遊暇踟蹰顧帝都斥土開瑶殿因山近翠㣲神輿離鶴禁天淚濕龍衣日月還丹闕風雲送六飛太平皇業固清廟詠光輝右十詩蓋以寫臣子之至情而寓攀號迫切之意未嘗敢以示人今以記事靈殿􅆘舍弟以諸生來見感泣乃書以與之然辭之卑陋而事之隆重身之踈寡而道之崇髙冝其不足以形容之也大行皇帝輓詩睿哲君天下恢𢎞德化新宵衣圖治道側席致賢臣王氣金臺曉仁風玉宇春忽朝雲晏駕率土淚沾巾謝蜀王撫問賜藥六首有序臣伏承睿恩撫問兼賜良藥及臯比講席拜受之餘無任感荷敬次滕訓導所寄詩韻粗述瞻仰之誠辭句蕪拙乞埀宥察而正教之幸甚超悟天人際從容禮法中豪端錦江水麈尾雪山風善共東平樂才看冀北空感恩慚獨厚箋䟽許頻通壤地三千里絃歌五十城廷多漢長者座有宋耆英立事多師古行仁不近名願存無逸戒佇見治功成聽政憂民切虛心待士䖍典章皆有據談笑總堪傳夜月初筵酒春風廣厦氊小臣懷徳處每憶白駒篇大名傳海宇盛徳冠時人文字天垂象姿顔嶽降神仁施邦域逺年與憲章新願沐恩波濶花溪理釣緡賢王思賤士欲爲制頹齡藥授還丹祕功存本草經駐顔嗤鑷白閱歲比冬青倘遂飛昇去長依傅說星服猛本王政賜皮書閣中林泉眼如電文采座生風似可講周易寧須喚小空深思避賢者𤣥理未能通應召赴京道上有作三首揺落秋冬際蒼茫鄞越間青山欹枕過白鳥背人還問俗鄉音異消愁酒價慳虛名果何物不使病夫閑官程催嵗暮百尺可停牽煙浦髙低樹晚江來去船青山過越少滄海帶吳偏所遇無親舊懷人興眇然客路喜暄暖初冬天始寒近京風俗異逆浪水程艱人語吳音雜漁歌楚調酸畏途非好友懷抱若爲寛病中述懷二首卧病知爲國尤須謹未形盛強多過計安逸每傷生燮理宜修政醫治乃用兵但令元氣固四海樂昇平故交憐抱病意厚數相過憂患人難免方書俗易訛衞生功莫就醫國理如何但喜心無恙斯民疾更多送盧信道漢中㸃兵喜子東南秀照人眉宇清早探經濟學已負老成名治世難忘武邊城要足兵闗河雖䟦渉歴覽快平生題萬間室一室纔函丈何縁號萬間靜中存太極圖裏看人寰舒巻心無外經綸意自閑誰能同此樂魚鳥亦歡顔題曲徑曲徑潛通市髙墉逺背村醉眠忘作客静讀懶開門古學嗟中絶羣經續已繁平生刪述意深恐負乾坤次韻奉寄好義五首真齋至出見寄詩甚􅇺懸渴諷詠不能已因借韻述懷邑中還同宿偶作一首今并録上初旭濕霜痕溪流緩復奔路因頻到熟心待舊交論山勢隨村曲窑煙接海昬知君多善教所至俗還敦聞說幽居僻僊鬟翠崦南陽坡饒美木曲澗㑹澄潭問俗何方古藏名此地堪深期帶經往清夜擁爐譚野性便時棄虛名耻世聞目縁多慮暗志爲好竒分傍日翻書巻臨池寫練裙思君同雅興搔首誦停雲混俗非真隱深居學避囂看雲山映竹坐石水通潮道勝貧何病神完趣獨超遺經對千古意頗似聞韶草没堦前石雲連户外山位居人下拙身在病中閑出處多難事逢迎有瘦顔仰看雙白鶴暮向逺林還歲暮寄王修徳先生二首杪歲埀埀盡寒花悄悄繁律回春有信氷動水生㾗樸學慚經濟窮居廢討論都將百年意一笑付乾坤長嘯茅齋窄清談酒盞空天寒爐擅寵嵗惡甑無功計拙居鳩上身癯訝鶴同燈花笑愁絶故向夜窻紅承宜隱友兄同還精舎賦短律五首爲别風檻臨溪敞幽人稱隠居髙松偏宿鷺濁水最多魚隣父邀嘗酒鄉豪􅀏著書時艱知已少來往莫教踈携友踏溪沙同尋隱者家雨多知損麥土暖喜宜𤓰身願明時棄文慚世俗誇旅懷難一笑撥遣付流霞於世吾何補論心子最知呌閽他日恨感事百年悲地主能投轄天閑幸脫羈談經深夜坐涼月在清池情深難遽别送逺却同歸衣濕洒塵雨路經埀釣磯山童迎客慣國士似君稀且復聽雄辨前賢賴發微千載康成學羣賢惜異時典章秦火盡禮樂漢書疑聚訟吾何敢承家子莫辭從來參筆削萬一補民彛次韻荅錢文學二首幽亭斜日在佳興與君同屐潤催詩雨衣涼醒酒風鵝羣穿草白蜂足帶花紅愁散身殊健全寛雲夣胸雲山留客住尊酒賴君同照影林端月清心水面風醉書詩草黒笑剪燭花紅不是聽雄辨難消磊磈胸題􅀞二首得意支郎􅀞分明是米家亂雲浮雜樹逺渡卧枯槎白屋孤舟迥丹崖一徑斜何時共漁叟洞口訪桃花曲折成千里雲山儼一鄉林踈茅屋見水落釣舟藏世路羊腸外仙家鳥道傍此身何處着箕潁意難忘寄童伯禮二首俗薄吾深厭家肥子孰過孝慈諸弟共才俊一門多處世難同衆居鄉本貴和古來修禮讓盜賊尚投戈黍肉屢來饋寸心殊自憐傷亷増我過尚德貴君賢握臂知身瘦捐書待病痊每懷徐孺子衰世道能全催菊蚤帶春泥種頻添沃壤培如何九日至不見一枝開時過花何補天寒客懶來便須連夜發莫負掌中盃代菊荅生意本天得無人亦自芳但能娛晚節何必媚重陽服食多延壽風霜獨擅塲秪應夷皓軰心迹可相忘過北山翁避世慚無術忘年賴有翁山中九日後花下一尊同江迥宜秋色林踈怯晚風放懷甘取醉舎此更誰從送鄭履順二首病卧思親友幾人能見過天寒念我至風義覺君多取士周三物論才魯四科相期曽閔上嵗月莫蹉跎學是千秋事文非一藝卑古來傳道術誰免假言辭魯史三王政周官百世䂓知君美才氣慎勿負深期峨眉縣曉發次韻渡水籃輿穏穿林草徑微勝遊方外得樂事世間稀風過欹僧笠雲來掛道衣山靈應待久好去莫相違謝羣公送别賤士何須送羣公不世情聽鷄朝謁後並馬出郊行心戀金門逺身依玉樹榮愁來今夜月兩地向誰明道中遇盧先生先生獨無慮作客竟忘歸謾把詩書閱寧知世事非秋風吹落鴈江樹隱斜暉少立橋邊路相思恨久違春和五首幽人遊澗谷芳譽動京華暫食髙山蕨終簮上苑花醉歌辭激烈老態影欹斜願得萬間厦轉爲寒士家山深諸藏殖海廣百川歸材蓄廊廟器文張錦繡機魚龍將逺化鳬鶴漫齊飛爲愛賢名久人間萬事非慨余徒就老羨子早馳名幽谷遷鶯語九臯孤鶴聲課蒙聊給膳教子力勤耕身世相忘久山猿總不驚念子身宜隱憂時志復存騰章吐直語索句發竒言燕雀爭栖閙豺狼鬬食喧寧知陶靖節適意向田園鄭生瑚璉器曽住此林丘死骨今埋土新阡誰樹楸百年愁莫遣一夢樂誠優惟念雙親老無能爲爾謀寄處州教授蘇平仲先生四首懷舊輕千里無書逺七年論心思盡地㑹面極升天名重連城價文雄萬斛泉何時絮巵酒紀徳浦陽阡舊習深知誤虛名久自羞故人猶比數文苑昔同遊婺女遺言絶胡公學制優料君施善教才俊滿南州蘿山同業士存没兩無聞未盡人間用寧修地下文劉郎應屏跡鄭谷自清芬搔首看征鴈天寒逺索羣昔過東陽縣知君近始來留詩徒屬和無計復邀回賴有梁園客同傾杜酒盃死生星散後感舊復憐才二十九日三首揮淚劬勞日持觴孝義門敢承千古託恐負二親恩善頌慚諸彦傷懷望九原寂寥生意盡空愧此身存野人哀感日天子戊辰年已負懸弧意空吟陟岵篇病身難報國歉嵗欲求田築室依先隴將心訴九泉就木悲賢傑持家賴哲兄三人嗟莫並一世竟何成毁壁千秋痛看雲此日情遥憐小兒子念我倚櫩楹遣病十首冬瘧春仍壯身羸氣覺虛脗乾秪食粥眼眩廢觀書行歩兒童笑形容老病如平生千古意獨在悶難舒病痁當歳晏冬去病猶存氣弱翻多汗心虛苦畏喧此生應有命萬事可忘言向晚移書巻微吟卧負暄底用憂微疾人多悔久生危機非􅅵畝髙枕豈公卿千古斯文託羣經此日情廢興天命在得酒且須傾急雨張燈夜匡床伏枕時食貧宜客少身病願春遲道豈斯文著才非聖世遺用心耕鑿外榮辱竟何施久病諸人問深居四壁牢故交貽善藥姻婭饋醇醪閑厭虚名絆貧知古道高時來稍暄暖斟酌減綈袍二月風猶勁寒生滄海波呻吟知夜永羸憊損天和行覺冬衣重眠妨夜食多百年強壯日排悶付髙歌出户迎人倦投床散帙迷牽衣嗔穉子煮藥愧山妻葛令尋勾漏梅生入㑹稽病思方術士亦似阻雲泥春風已兩月閉户不相知百舌強言事衆芳空滿枝官途多世難卧病亦天時應有簮纓者低頭羨我爲飲酒留盃底攤書礙枕旁人扶修冠櫛客勸罷文章糓雨催田父花時到海棠病夫渾不較流轉任春光病久身渾憊醫踈術易窮嚢空冝勿藥跡滯尚飄蓬禮樂周秦後乾坤槖籥中數行憂國淚江海與俱東童景純來二首千古劬勞恨三冬瘧癘餘故交猶記憶尊酒問何如拜倩人扶答文教子代書何時減藥餌一笑百憂除欹枕雨聲歇竹間聞鳥鳴病惟愁是伴閑與懶相成墮地驚兹日終天負所生一杯魚菽祭悲感淚縱横贈鮑民瞻學道懶言文君文思不羣雪消三峽水波漲一川雲出處存爻彖經綸在典墳莫名詞苑傳須立濟時勲哭吳樗庵先生五十韻夫子嗟淪喪鄉閭頓寂寥百年遺老盡一代典刑銷在昔朝廷盛諸儒學業饒著書磨嵗月抗論切雲霄獨歩才偏壯清時俗未澆翟門人競集鄭驛客嘗邀冠蓋來千里牲牢具一朝柳營嘶騕褭茗椀捧妖嬈家釀傳荷葉溪鮮貫柳條醉猶親簡䇿樂不爲簞瓢晚節趨王命顰眉逐使軺將軍開幕府畫諾任賔僚燕薊藩翰重兵戎節制遥宣威增國勢褫魄遯天驕絶漠清烽火前驅奏鼓簫歸田心戀戀解組思飄飄松菊猶堪理桑榆幸未彫散金思效廣擊壤願歌堯紗帽長蒙首銀章懶束腰吟哦今李杜吐納古松喬勝㑹無虛日清談或屢宵小心親里閈避咎狎漁樵名美偏招謗年髙未免徭鬬牛嗔孔雀孤鶴畏鴟鴞媚竈慚何枉懷沙恨莫消事隨東逝水迹斷舊題橋素櫬還家慘緦麻聚哭囂可憐嬰世網本不負天朝盛徳知誰繼寃魂謾擬招園林春黯淡風雨暮飄飄致逺悲良驥搏空憶皂鵰聞喪皆頓足知已自埀髫秀句時稱賞華筵必辱要吟成珠滿紙坐久斗回杓􅆘意魚依藻搜竒翠映苕劇談衾每共痛飲燭頻燒髮爲工詩白心縁慮患焦豈知埋玉樹常想報瓊瑶劍許何當掛琴存久不調已同麟斃魯空待鶴歸遼官忍題朱旐家聞賣黒貂徑荒泥蚓出池廢雨蛙跳隆替天難問災祥理匪昭聖賢從古歎憂患幾人超女在難同蔡身危不類晁知音俄頃失抱疾轉無聊蜀魄三更月胥江萬古潮誰能名季札應解訴臯陶痛絶生芻奠哀傷壞木謡空齋暮聞笛揮淚向風飇次危紀善五十韻倍成千字獻蜀王有序臣幸侍燕間叨陪論講於道徳之奥雖未敢窺然不可謂不知其一二近閱危紀善五十韻排律詩因次其韻意有未盡輒復增加厥數倍之成一千字上進葢以紀事實而昭聖世之盛美非欲效詞人墨客以靡麗爲工也伏惟賜覽觀焉歴數歸眞主皇威定八荒奉天頒正朔截海統封疆建國遵姚姒貽謀鄙晉唐徳星臨井絡全蜀仰賢王白日開金殿紅雲綻繡裳輿圖文獻域城闕武擔陽地秀多才彦田腴足稻粱十年藩輔重萬里幅貟長南土通滇僰東陲帯沔湘周封元過楚禹貢舊稱梁盛德超中古高名冠四方擎天爲柱石瑞世比鸞凰禦衆樞機簡臨朝禮貌莊正冠居便座決事處齋房實踐循規矩精思入混茫小臣名盡記直士諌無妨該博尤知要英明匪過剛羣書陪几席前哲儼􅃵墻旦奭宜方駕間平合侍傍事神孚肹蠁欽聖祝穹蒼講學心無逸憂民意不忘陳經黄閤老問俗白髯郎不洩親毛穎知微却杜康青雲隨鶴駕紫綬列鵷行漢代規模大周官法制詳懿親思魯衛洪業重高光師古人爲鑑存心禮自防不知千乘貴惟恐一夫傷餓殍虞填壑流民閔陷羗氷縑贖賤穎玉粒飫饑膓但欲賙黎庶寧辭罄積倉分曹具饘粥隨處集羸尫有嗿羣聲沸相攜蹇歩蹡胥靡無横天盜賊耻相攘恩出蠲租令歡騰施藥坊嬰孩頒糓飬胔骼賜棺藏故老偏優禮先賢盡表章中興想劉葛佐運念闗張擬植千尋栢還栽八百桑廟堂新䆳宇劍履列長廊杜屋重輪奐花溪頓煒煌齊名圖至白接武配蘇黄善政俱修舉仁聲逺播揚校人馴柙虎膳宰縱河魴要使天心順寧教物命戕至誠通造化惠澤及飛翔淵懿真堪述謙恭莫肯當崇儒先五教建極重三綱開館延耆艾隆師錫篚筐衣冠儀秩秩絃誦韻洋洋執業諸生衆求書使者忙九流分揷架萬巻載連檣樂善人心恱無爲國本強虛懷臻聖域騁歩領文塲揮翰銀鈎活摛辭玉佩鏘鼎彛皆國器蘭桂本天香觀玅言逾富研精食靡遑日惟親孔孟性不惑姬姜軫念窮邊地埀情健卒糧撫身無凍餒遇敵必騰驤解語疎鸚鵡長鳴歎驌驦劭農興耒耜寛法絶桁楊當代真希遇前王或未嘗泰山髙莫並瀛海浩難航麟趾耽經史龍衣佩瑀璜笑談溫玉色追琢燦金相肅挹尊賢傅端居喚小璫已能通魯語正可齒虞庠玉樹連枝秀瓊葩奕葉芳骨竒瞻日角𣲖近識天潢舉措存寛厚蒐羅必俊良聚賢頻設醴寳訓舊明堂末學逢昭代平生服令望承顔初見日屈指九經霜術類千金帚榮過七寳牀敢期蓮作炬每飲蔗爲漿身賤思疑病言髙㸃類狂汗顔趨紫闥馳夢落滄浪心怯恩波闊人誇寵數彰賜衣頻跼蹐前席屢徬徨授簡安能賦開筵特命觴偶同華屋燕徒飽大官羊雅句褒彌重微軀感莫量聨篇舒錦綺一字重琳琅憶昔憂居堊陳情訴陟岡奎文昭孝行宰木發光芒寵異兼存殁風聲别否臧望林掄杞梓占斗拔干將知己恩偏渥希賢德甚涼何繇酬覆載深幸覿顒卬喜見皇家盛從知世運昌弓戈藏府庫道徳固金湯政教依仁宅詢謀逺知囊朝廷存鎮重巴僰敢飛揚誠可回天地心能協雨暘羣生䝉長養百穀屢豐穰人傑生臯摯邦基過夏商九重延祚𦙍百世愛禎祥磐石安宗社山河拱帝鄉孤忠深佇望恭已贊吾皇人日從蜀王登萬嵗山鰲首髙臨紫極開五雲長日擁蓬萊嵩呼曽獻君王壽人日今從帝子來寳仗鳴鞭金騕褭石牀御坐錦莓苔才華愧匪朝陽鳳飛葢華隂喜共陪宿峰頂次濟定韻層崖削壁跨千重坐鎮西南勢獨雄元氣昆侖磅礴外祥光隱見有無中珠瓔寶藏留全相金碧樓臺倚半空縱是蓬萊并弱水清光難與此相同登歸雲寺閣棲身丹壑總忘歸水閣頻登趣不稀雨脚斜侵耕叟笠苔花青匝定僧衣山餘積雪寒猶壯巖墮流星曉更飛卜築何當居此地玉堂金馬任相違木皮嶺自慚非佛亦非仙也宿丹崖緑樹巔曉汲衣翻草頭露午炊竈起木皮煙日離滄海三竿逺天厭烏紗五尺連頓覺眼前無俗物片雲飛過鳥爭喧山中對景書懷烏靴脫却換青鞋踏徧名山愜素懷虎嘯石頭風萬壑鶴眠松頂月千厓雲開面靣峰如削谷轉行行樹似排湖海故交零落盡烟霞清趣幾人偕宿新津寳花寺百丈岡頭佛寺開晚涼按轡陟崔嵬落花亂逐溪流瀉歸鳥低衝馬箭回雲外老僧鋤筍蕨樹根童子掃莓苔景清愛借禪房宿不爲叅𤣥聽講來送吳主簿關西短簿衆稱賢太華峯前坐五年心爲嫉邪曾奏事家因好客不留錢霜寒茅屋鷄聲蚤月落江城鴈影翩此去京華遇鄉使好將嘉政萬人傳次韻贈方貟巖山人到處清泉可洗心禪機一指用功深任教東住復西住不改鄉音與梵音見客喜爲青眼顧能詩懶效白頭吟近來識靣峨眉上蘿月松雲得共㝷次韻兄調弟希政并柬鄭叔度二首百年喬木隂當户五畝幽居水映茅好古喜尋遺老問避喧懶與貴人交從兄受學慚蘇轍與弟分財笑薛包孝友傳家得無愧聚蚊免使退之嘲鄉閭儒術許誰加弟唱兄酬興未賖經濟有心慚薄德安居無事任貧家日髙甕牖蜂穿紙潮落江汀鴈聚沙却嘆離居趨侍日時來相對卜燈花挽徐節婦大節寥寥不可聞晚從吾郡始知真百年禮樂無男子一日干戈有婦人波冷曹娥沉白骨雨荒剡嶺洗紅塵爭如烈焰三千丈髙照青編萬古春贈韓敏道先生赴召先生樂道慕前人又被書徴覲紫宸詩巻已隨官棹月布衣還染屬車塵文章共喜遭逢晚禮樂應知入問頻登眺鳳臺多制作郵筒珍重寄河濵次韻留别陳季明先生二首太丘美政漢稱賢髙節英風四海傳埀白雲孫今幾葉汗青甲子已千年盍簮重見星埀象落筆猶驚地湧泉耻以文章爲世用懶將辭色向人妍每懷海上三秋别來借山中一榻眠妙論久容親講席深盃相勸惜離筵時清共喜閑身健情重翻令别意綿他日朝廷訪遺老吹嘘擬進白雲篇絶句枯木圖寄許士修春到已多時幽禽尚未知上林無限好何事立枯枝虎圖踴躍谷生風崢嶸百獸中豈知王者瑞足不履生蟲題山水二首欲向匡廬隠出門知路難江山竒絶處多在畫圖看離家今幾載衣袂染京塵不敢看圖畫青山恐笑人題曹娥江娥以孝而死江因娥得名至今潮上落猶帶哭爺聲題竹月圖送太學生歸省黄金臺上月照爾憶親情歸去供甘㫖春林笋正生病中除夕四首數漏掩殘厯中宵氣候殊獨憐愁共病不與歲同除三十知未老已難同少年功名謝時輩心事愧前賢里巷占新嵗皆云勝舊年幾回新歲過萬事只如前良醫難治病學道不能行瘧疾何須患吾心病未輕題畵茅屋東嶼西嶼白雲前山後山爲報溪頭流水落花休出人間牧牛圖谷口驚湍雨歇柳隂芳草春還試問太平樂事夕陽牛背青山奉試靈芝甘露論漢家圖治策賢良董子昌言日月光自笑腐儒千載後却勞聖主試文章書事伏枕三旬不整冠夢魂時復對金鑾忽聞盛事披衣坐今日朝廷立諫官二月十四日書事二首斧扆臨軒几硯閑春風和氣滿龍顔細聽天語揮毫久携得香􅈣兩袖還風軟􅊮庭尚薄寒御爐香繞玉闌干黄門忽報文淵閣天子看書召講官試院偶題三首栁影波光鎖院深一塵不到市聲沉多情惟有雙靈鵲時到庭前送好音三代賔興法尚存每因取士嘆斯文近來眼病無􅂓甚豈復能空冀北羣橋門冠蓋藹如雲才氣爭先總出羣自愧腐儒無一藝強顔來此較斯文次韻謝蜀王六首有序敬蒙睿恩賜以篇什誦味感愧次韻六首以謝恩命許辭金殿直歸裝仍賜石渠書欲知懷德無窮意長望星辰想屬車志是子淵方是廣才如曽㸃始爲狂自慚末學何爲者孤負恩言髩欲蒼幸曕天下難逢德又讀人間未見書魂夣何嘗違禁闥深恩安敢忘巾車徳尊待士真忘勢位下憂民每悔狂明日岷峨應漸逺莫雲回首看青蒼全徳已看承道統雄才更復主詩盟欲知聖敬心無息顧諟參前與倚衡德勝東平弟與兄共誇樂國似蓬瀛近聞傳令安黎庶歡動山南十萬兵侍世子奉獻蜀王十首有序臣謬以踈庸獲侍世子殿下硯席竊覩岐嶷之姿英偉之識度越于人萬萬誠宗社之慶欲述鄙言陳民事人情物理之槩少效忠懇以廣聦明恨未果爲先作絶句十首以進伏惟益懋典學以副下情不勝至願賢君德業本天成猶待修心道益明喜見儲王親筆硯更須講學近儒臣昩爽先求問寢衣三朝日日禮無遺古來世子能敦孝惟有文王最可師祖訓昭昭日月新由來治國本天倫令名要使傳千載仁政須教及萬民炫日輝霞錦價髙製成稱體小龍袍試看黼黻文章美須念蠶桑杼軸勞金匙磲盌絳紗籠玉瑩珠圓顆顆同願采豳風歌七月要知稼穡重三農農事艱難古所憐一生幾度遇豐年若非聖世輕租稅逐末何人肯力田九經治國本修身身正方能鑒别人辯佞要知駑異驥任賢莫指玉爲珉君王待士古來無令徳髙名滿八區濟美喜看賢世子已能端拱禮諸儒去歲開倉賑餓夫今年下令活無辜東平謾說能爲善未識當時有此無稅薄刑清見盛時民安田里俗熈熈欲求上古無爲治仁孝君王自足師謝蜀王賜果十首有序屢承佳果之賜偶爾成句并述所見以寄下情謹録進上伏惟宥察涪州丹荔擅時稱翠篚來庭色尚新獻罷未曽登玉案先教頒賜與羣臣翠籠擎出殿門東受賜羣臣喜色同却笑開元恩未廣秪將異味恱深宫尚食頻供素膳回金壺僊醖不曽開君王嗜道渾忘味佳果何勞逺貢來無才慚曵殿門裾珍味頻嘗玉饌餘解道側生風味好惜非梁苑馬相如九重勤儉恤民勞錫貢深思道路遥異味竒珍俱詔罷皇明家法勝前朝病身趨召歴千山又見江城荔子丹竊食無功心有愧賜歸分與衆人看園官愛果勝黄金一樹生成一樹心味美已知堪適口當思培植用功深利欲頽波挽不回幾人沉溺壞靈臺要明聖道無窮意須仗賢王不世才道術衰㣲幾百年陋儒無力愧皇天已看位是真王貴須使心承往聖賢新製蒲鞭賜理官丁寧用法效劉寛好生要使民無犯示辱如寛也不難無題三首宫臣傳教造安車駕出金門賜舊儒優老免親藩國政入朝唯讀帝王書山南桃李競春光食實年年在異郷應被旁人暗相笑閑官那得許多忙伯兄海上思相見幼子山南憶别離兩地闗心歸未得夜看雲漢立多時逺違闕庭二首戀闕思家兩繫情君王恩重屢留行欲知去國遲遲意三日秪趨一日程形如槁木榮枯泯心似虛舟去住忘底事别情猶不奈只因懷德慕賢王遊峨眉山紀行十首一鶴相隨復一瓢山巔水澨足逍遥秪因戀闕情無限回首忘過萬里橋西蜀雲山處處竒最竒人說在峨眉想應踏遍千崖月露滴松梢鶴夣時出郭涼風入抱清亂山遮馬似相迎寧知待召登瀛客忽作看雲聽水行王憐塵土辱凡肌命入雲山茹紫芝只恐同袍不相識誤猜禮佛到峨眉客久賢王兩賜衣不知春到已春歸清朝試出都門看留得殘紅一片飛山頭月出天初露江面風生水欲波正是勝遊新得意片雲相引入岷峨朝辭宫闕莫田家江白山清兩岸沙卧犬不驚籬落靜麥風簷底響繰車孤舟湖口一名僧咫尺鄉山識未曾今去峨眉同覽勝躋扳須上百千層名山佳處孰同遊白髮緇衣四五流青眼古銘鄉士彦燈前夜夜話台州學僊無骨佛無縁甘着儒冠坐一氊入社敢同陶靖節不須三笑虎溪前入山後覽定水仰山二上人并吳講師次予發成都絶句韻因復次韻述事言懷落日斜明掛樹瓢下方城郭去人遥青山過雨僧深定門外雲封獨木橋羽客禪僧也好竒對人覔句幾攅眉林端新月初髙夜葉底殘紅落盡時倚澗人家近更清吠風驚犬走還迎衲衣鶴氅從章甫落日看山一字行山南夫子待多時庭外松花落磵芝夜半夣囘聞皷響覺來顙泚冷沾眉澗底白頭僧浣衣雲間童子負薪歸幽栖更羨投林鳥半已尋巢半已飛千尋古木已無柯萬丈深淵不起波此日勝遊他日記落花時節到中峨東海西頭是我家門前花徑接鷗沙三年别後一作却徒多恨敢道詩書讀五車山行十日只逢僧盡道蒙恩報未曾共上峨眉望宫闕祥雲五色繞三層奉詔名山作勝遊壯懷如水不停流今朝獨坐峨眉頂一覽端能隘九州榻借禪那豈夙縁坐來渾似舊家氊祗應心事慚蘇晉不解長齋繡佛前次韻冩懷送叔貞之成都十七首有序乙亥新春出城東偶作十七詩同遊諸友從而和之因亦次韻以寫所懷㑹叔貞之成都書以識别詩中所云司户孫者即叔貞也道濟羣生心尚歉知周萬物禮逾勤能爲世上難行事始是人中寡過人盛世豈無謀國者漢家長憶富民侯榮名史策尋常事公論江河萬古流漢髙嫚士千餘載不見師臣與友臣解使時君謙德重孔明而下兩三人下士立身涇渭渾胸中耿耿是非存子雲美新最可賤著作猶尊李仲元宻葉叢篁噪晚鴉荒村百里兩三家疲民采拾供租稅猶恐傍人議𣙜茶多才久要錢文學長日詩筒衮衮來俊思雪消三峽長好懷春到百花開伯尚庭前傾竹葉用中宅畔看梅花天教二子相爲樂來往風流也足誇每懷樗散鄭司户喜看杞梓作孫枝氣清似得江山助才異休令匠石疑胡生挾䇿行千里足繭衣穿不肯回斯道要爲終古計丈夫寧避俗人猜江山萬里無黄耳雨露三年憶紫荆日暮出門聞鴈過忍聽雲畔索羣聲一念無爲付道耕百邪還聽歛心兵本原能與天同體三代功名始可成浩蕩乾坤爛漫春天將樂意付窮人迥無臭味堪誇世縱有爭心豈解嗔烏石岡頭白苧衣幾回醉伴夕陽歸山中兄弟遥相憶未必天心與我違我與東風作主賔忍教負却太平春一觴一咏酬佳景也未輸他世上人梅逕桃蹊遶蓽門半依城市半通村春風一見如相識莫逆於心兩不言魚在深淵鳥在山乾坤無物不相闗野亭日午支頥坐閑看雲天一鶴還食罷移床坐小亭細看羣蟻奪餘腥倦來莞爾成㣲笑宇宙茫茫幾廢興感舊九首雄文不見林公輔病眼荒荒何處開將相亦輸天上樂多情莫向世間來盃酒論心有幾人天台張榖舊相親近來詩句多竒語書比藏真更絶倫精通八法楊文遇暗誦五經陳用中揮翰天庭應獨歩忍飢村巷欲成翁翰苑暫歸盧太史銓曺已失鄭郎中名髙金殿龍頭選夣憶蒼山馬鬛封林鄭爲文學我家波瀾議論闊無涯兩年不見何時到望斷嶓江八月槎愽陵愽士才華盛漢上畸人道術卑欲寄一書無鴈過相期千古只心知立言溫粹懷陳采肆筆縱横憶鮑岡若使韓門加接引未容籍湜獨升堂王郎逺逐雲中戍許子俄爲地下郎重訪舊人尋舊迹嶺雲溪月總堪傷多病深知志術荒中年若復厭文章欲圖天地相終始肯與時人較短長别母舅哭外舅鄭公三首昔奉安車共入關擬於此路復南還今朝獨向江東去淚洒西風草樹斑女甥携抱逺相從骨肉情深反負公南鄭江頭三尺塚夕陽衰草萬山中竹帛相期古道深結婚端不爲多金自慚非是竒男子恐負侯髙擇婿心中秋對月二首雙櫓鳴江水不波雲山無數拂船過夜深把酒問明月月色與愁誰較多南鄭荒墳草木寒東甌舊宅桂花丹九秋最好今宵月又向孤舟獨自看題漢中三寺佛放光三寺神燈古有名我來惟見月華清非闗佛日今消歇應避文星不敢明蜀相像羽扇綸巾一卧龍誓匡寳祚剪奸雄圖開八陣神機外國定三分掌握中買臣妻墓青草池邊一故丘千年埋骨不埋羞丁寧囑付人間婦自古糟糠合到頭二喬觀書深閨睡起讀兵書窈窕丰姿若个誰千古周南風化本晚涼何不誦關雎王節婦兩月孤兒百里墳一燈風雨幾黄昏可憐玉帳豪華客不識金沙節義門鄭義門丹詔旌門已拜嘉千年盛典實堪誇史臣何用春秋筆天子親書孝義家彭山道中煙鳥歸林已夕陽野人相引度髙岡馬頭一片青山影經過絺衣似水涼夜度桑洲驛山路彎彎石甃平碧天涼露下三更無端一夜西風惡吹着新愁上紫荆客至竹裏烹茶費屢呼携壺沽酒遶村無同飡麥飯無難色風槩知非淺丈夫聞盧原質表兄廷試探花郎授編修喜而寄之奉天殿上榜初開共賀江南得秀才好是青蘿居士說近來文運屬天台送義烏龔叔安給事歸省鷄舌同含侍紫宸朝回東閣每相親片㠶忽逐西風去鴛鷺行中少一人繡湖煙雨正宜秋之子還家喜得遊忠孝堂前舊明月相隨重到鳳池頭談詩五首舉世皆宗李杜詩不知李杜更宗誰能探風雅無窮意始是乾坤絶妙詞前宋文章配兩周盛時詩律亦無儔今人未識崑崙𣲖却笑黄河是濁流發揮道徳乃成文枝葉何曾離本根末俗競工繁縟體千秋精意與誰論大厯諸公製作新力排舊習祖唐人粗豪未脫風沙氣難詆熈豐作後塵萬古乾坤此道存前無端緒後無垠手操北斗調元氣散作桑麻雨露恩覽陳先生見和諸詩戱題孔璋揮翰檄曺公烈日秋霜格力雄白髮雲孫千載後新詩尚可愈頭風道者扇競利爭名不暫休紛紛盡逐水東流道人心事如松栢閱盡尋常草木秋題山水隱者先生六歳時作棟宇參差逼翠㣲路通猶恐世人知等閑識得東風面卧看白雲初起時題山水霜落江南木葉丹滔天波浪一舟還何人得似林中叟目送浮雲過逺山修德惠枯木圖次韻四首有序修徳先生寄惠枯木小幅并以詩留别病中不能追從謹次韻奉答逺别出門愁見難燕山越水路盤盤將心付與天邊月兩地清宵一様看月明樹影落晴波寫寄山房古意多已分此身同稿木歳寒相對老巖阿百年禮樂愧前賢濓洛微言久不傳待子歸來同講習細炊麥飯飲寒泉至道無聞昧力行神交千載獨周程直教俯仰渾無愧始是堂堂世上英見梅寒梅凍後放幽姿何事今年花較遲昨日途中春意到溪頭纔見兩三枝畵梅微雪初消月半池籬邊遥見兩三枝清香傳得天心在未許尋常草木知竹不禁俗物敗人意忽見幽篁眼爲明記得舊遊天上夢連昌宫外聽秋聲題東坡畵竹内翰何年寫畵圖眼中驚見鳳毛孤一枝潤帶江南雨遂使眉山草木枯斑竹圖湘君泣盡淚痕乾翠袖蕭蕭倚暮寒却憶洞庭爲客處滿湖風月泛舟看墨菊二首解印歸來鬢已斑故園松菊可怡顔祗縁三徑荒涼久特寫秋花仔細看分根昔日向東籬種近羲之洗硯池幾度偶澆池上水花開朶朶墨淋漓題菊順流舟楫日邊回古木軒窻水際開萬里西風數行鴈送將秋色過江來馬一日曾騎越與燕皷車隨後意茫然圉人何必相羈絆亦未乗龍去上天聞燕曉夣驚回燕語巢窻前紅日在花梢心思佩玉朝天日待漏金門鼓尚敲百雀圖曲巷髙簷避網羅朝來飽啄隴頭禾但今四海長豐稔不厭人間䑕雀多羲之籠鵝圖内史清真江海情每將髙誼動朝廷平生却被能書誤更爲鵝羣寫道經荷花渚禽絶世丰姿不受塵丹霞爲質玉爲神渚禽莫怪開時晚一洗尋常草木春鸚鵡幽禽兀自囀佳音玉立雕籠萬里心只爲從前解言語半生不得在山林立春偶題二首萬事悠悠白髮生強顔閱盡靜中聲效忠無計歸無路深媿淵明與孔明百念蹉跎總未成世途深恐誤平生中宵擁被依牆坐黙數隣鷄報五更
