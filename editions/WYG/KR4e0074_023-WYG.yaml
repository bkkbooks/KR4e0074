body:
  text: 遜志齋集巻二十三明方孝孺撰古詩蜀府敬慎齋天降大命孔神而明巍巍天位匪德莫承赫赫聖皇天實子之奄宅九有丕冒四夷百辟是臨兆民是使何逺弗綏何悍弗靡德威所加孰不震驚尚篤祗慎以奉天明矧惟哲王有此大國天子之祐之寵之錫君于西土厥壤汪汪喬岷大江式固其疆有臣有民有隣有輔外有戎羗于徼于圉匪格以誠孰克潛孚匪治以仁疲羸曷蘇教之禦之以恩以禮攘之訓之威武豈弟天有顯任舉集王躬惟克敬慎迺寜家邦惟聖天子肇基百世衆建藩輔以匡來裔厥或罔恭民亦罔從厥或弗慎下孰敢信惟王迪德懋昭大猷日宣聖學以祗天休愔愔于思䕫虁于守穆穆語言不驚左右視乎在服有秩有倫視乎在廷紀法具陳視乎禁衞動有矩律視乎郊圻靡有迨逸云孰致之敬慎使然惟克敬慎迺罔有愆惟爾今王天子攸倚四國攸喜下民攸恃王于齋宫吉士祁祁教言徐徐温其有儀蹮蹮黄髪忠嘉啓告直辭靡撓不怒以笑古昔格王永有烈光彼或慢肆福禄靡常王躭稽古天下取則宜其邦國稽古惟王邦國以康𦙍嗣用昌天佑大明藩輔多賢宜于民人於千萬年讀書齋翼翼髙齋秩秩群經推辭繹義必敬必誠持心惟虚是受是承立志惟篤是毅是𢎞恢廓其量可吞滄溟奮作其勇若捍都城求之勿易思之勿更取之欲愽約之欲精聖言何疑不疑不明聖道何正不正不平融㑹其殊操植其恒朝斯夕斯期乎有成外怯不足小德微能内有若無盎溢􅇲盈惟仁之居惟義之貞霽月之明止水之澄天君明泰我縱我横道無不得理無不形富貴敝屣子女酷刑難玷汚辱寧過潔清大之天下小之家庭是經是緯是章是程聖讀庸行馬牛冠纓􅀶覽孔殷書匱是銘允矣君子夜寐夙興惟誠惟勇有權有衡聖訓赫臨于几于楹聖經是讀聖徳是行四月一日蒙賜宴浣花新建草堂感恩懷古偶作靈雨過瑶階朝陽麗金殿吾王講藝餘特賜群儒宴茲惟杜子宅遺址當郊甸盛代仰前脩髙堂歘重建葺茅昭舊迹拓地增新觀棟宇極崇華簷甍儼雕煥兩楹陳綺席僊醴兼珍膳列坐無俗賔衘恩共酬勸花溪浮砌淨雪嶺當窻見覽物獨興懷古人如對面追思天寳後宇内疲征戰徒抱稷契心莫覩唐虞禪薄游經險阻放意娛篇翰使獲遭聖明寧令老貧賤人生鮮遇合自昔共嗟惋並世或棄捐千秋有相羨吾曹獨何幸淺技䝉深眷難報國士知空為昔賢歎江山鍾粹美天地存幽贊佇俟英俊興重看盛文獻臣近述基命録粗載三代帝王寛厚之政以寓忠愛之私幸徹睿覽過䝉賜詩寵褒詞髙㫖逺復增慚荷謹依韻畧陳情以謝萬一云明哲昔御世虚心禮賢臣令名昭簡䇿千秋播清芬賢王啓大藩懿德貞且純英姿邁前烈髙志企古人聖學自得師曠代莫與鄰睿謨粲可述善政難具陳况復抱雄才著作妙入神下筆百川湧潤澤義與仁陋儒亦何幸趨召奉絲綸恩言寵賜褒猥謂堪致君仰惟文獻國濟濟申白賔圖治超太古餘光能見分讙歌擬雅頌烜赫繼丘墳齋殿觀書恭侍閒燕且承賜文嘉勞無任感服謹賦詩一首以抒下情無為運王化虚靜契天心神情既昭朗外誘安能侵齋居閲道妙端拱肅冠襟超然萬彚表儼若上帝臨竹素粲盈前群言恣窺尋遐思自知要愽采仍鈎深嗜古忘飢渴好善踰球琳㝠觀㑹衆理抗志珍分陰俯仰周乾坤瞬息貫古今人爵已莫並天貴誰能任賑窶散倉粟贖人捐府金政教洽四境蒼生歌德音文昭聖明喜誠格鬼神歆陋儒荷寵光避席瞻旒簪埀歡惠顔色灑翰嘉忠忱瀚海茫無涯豈復資蹄涔譬彼一簣土寜補泰華岑受恩徒徬徨憂懷欝欽欽鴻勲希旦奭令名仰回參日新崇大業濟世同舟霖臣仰德之深非言可喻謹次淵明九日詩韻叙謝萬一至人憲天德虚心體群生自為代工計豈為濟衆名惟王間世才欽聖奉天明端居澹無欲四海流仁聲耄倪競稽首願王夀千齡如彼岷峨髙不騫復不傾小臣最陋劣夙受顧盻榮孤恩愧明義念舊勞睿情臨風拭病目思見德化成癸酉嵗京府徵考試繼奉蜀王殿下命述事少時輕離别志氣誇壯強及茲未莫年已復多感傷念昔之蜀都執經侍賢王放懷禮法地取樂文翰塲耆俊滿大廷濟濟㑹冠裳出言有同趣講藝靡乖方惟王帝室英聰達世莫當精誠洞千古一目連十行道大才更雄氣温色彌莊勞心撫庶政虚已思虞唐封内數十州德聲藹洋洋皇天降嘉貺百穀屢豐穰盛美不自居檢身循典章凝情觀衆妙愽問取所長自慚魯鈍學三嵗承寵光避席玉座側設醴金殿旁睿哲能兼容闕失專覆藏采陟等葑菲比珍匪琳琅近者迎屬車拜辭褒水陽情真賜色笑感激銘肺腸喜遇大比秋齋官含晝涼寸情擬披豁古訓思對揚雖乏涓埃補忠貞誓無忘豈知事難必曩願弗獲償徵書京國來􅌺若晨風翔謬忝較文職守臣啓儲皇儲皇新德一作聽政出令聞八荒戒􅅚况丁寧庸薄實恐惶經旬廢寢食嘔欬病在床王人俄繼至幣自藩閫將强起扶杖迎坐語兩徬徨報國固臣節效信亦士常趨召違天朝懼非義所臧王心秉忠孝處事明且詳微衷倘見察庶或貸死亡赫赫我大明幅員同夏商仁恩洽宇宙帝業熾以昌九有如一家内外咸樂康取士皆為國何嘗限封疆蜀道平若砥漢水淺可航胡為不能往矯首徒慨慷白日流光輝葵藿隨低昻願王崇明德以慰葵藿望休日奉陪蜀府諸公晏集居閑嘆時邁閲世知才短頻為觀國遊每覺歸期緩群公盡耆英過從恨殊晚他鄉親故稀骨肉不在眼非資談咏歡孰使離情展大藩仰仁哲政化崇寛簡長日自優游茲辰况休澣牲醪出珍賜果蔬隨物産一觴偶相酬萬慮皆可遣貴同周士肆狂笑晉人孏語樂天趣深心清市塵逺新秋欣已至毒暑行將斷靈雨席上來微涼座中滿明時古難遇良㑹世所罕各勉存令猷埀聲繼伊管蜀府遇夏時教諭次韻叙德言懷周道昔淪喪鳯鳥收其聲紛紛徇世士各以智術鳴仲舒起西都蜀漢有孔明下帷談正誼濡走濟羣生二子茍遇時惠澤被孤惸惜其遭逢謬不見禮樂興邇來一千年文獻鮮有徵豈無輔相貴未免利禄嬰鄙夫何所知浪竊當世名致君事莫及好古心徒傾身疲道路長興入江山清偶隨群臣後獲見百代英神姿儼淵肅雄論極醇精德政尚寛和西土臻治平福善固天理願治本民情昔嘆賢豪稀今見德位并寄言同袍子拭目王化行閒居感懷十七首鳴鳩知天雨乾鵲知天風螅蟀最無知亦悲年運窮云何當世士憒憒温飽中變故如波濤浮沉安所終鳯隨天風下暮息梧桐枝群鴟得腐䑕笑汝長苦飢舉頭望八荒黙與千秋期一飽亮易得所存終不移乘時功易立處下事少成君看蕭曹才豈若魯兩生賢豪志大業舉措流俗驚循循刀筆間固足為公卿賢有四海志家無一金貲言髙力不足舉世爭笑之不如富俠子錢刀散孤􅄔閭閻稱行義赫赫名聲埀竊竊衆所憂不踰衣食間孰知温飽外可憂非一端賤憂道難行貴憂名不完誰能斷棄此自樂如孔顔無事本無尤無作自無愧心超萬化表跡混人群内卑卑流俗語懶問亦􅂴對有時或出門獨撫霜中檜庭前兩古檜封植今百年女蘿欺衰朽揚翹冠其巔弱榮蒲栁脆鉅􅆬金石堅得時不自料嵗晚良可憐我非今世人空懷今世憂所憂諒無他慨想禹九州商君以為秦周公以為周哀哉萬年後誰為斯民謀士無及物智每喜華其廬我居豈不敝於道已有餘明取容吾身奥取藏吾書奚須嘆其陋不見阿房初秦人奮戎狄蠶食舉八荒自言功德大傳緒萬世長鮑魚臭未絶赤龍歘飛翔巍巍且莫保瑣瑣安可量習俗日頽壞疇能塞其源自從井牧廢開此爭敓門救弊豈無術得君古難言田間一巵酒跽酹蒼梧魂道喪學術敝士心日汙卑躋扳得斗禄寧使節行隳古人安分義卿相有不為栖栖糞土中困處固其宜俗士不知道喜以異自雄安知名世者固與常人同聖賢盡其常縱浪禮義中何須騖神變惝怳驚羣聾内有邱山重外有秋毫輕於心不自得誰免慕榮名少賤事干謁尊貴樂驕盈焉知陋巷士塵芥視簪纓利欲烈炎火雪􅆋起縱横區區一子輿死以口舌爭豈不念迂逺安能負平生皇皇斯須困炳炳萬世明胡貊笑紈綺吳越賤堅車群庸方囂囂固謂智士愚刀筆計得失絲粟較盈虚誰云周公聖對此慚不如池魚不知海越鳥不思燕蚯蚓霸一穴神龍輕九天小大萬相殊豈惟物性然君子勿歎息彼誠可哀憐次金華王仲縉感懷韻十首兼呈張廷璧哲后踐貞軌簡䇿有餘馥彼或趨卑汙流惡寧有足明達知所師鑑古以自燭惟王實天縱虚心湛無欲學道期濟人為善靡徼福群書不去手萬理暸在目鄙臣守鉛槧恩光蒙逺矚穆如首夏風煦若陽春旭才微媿寵厚跡賤慚愛篤報德諒無階錫嘏徒有祝東京多節士我懷管幼安騰身風塵表寵禄寧肯干子魚不相諒髙位屢超遷腐䑕欲見汚聞之媿心顔皜皜由夷姿逈出兩漢前彼哉阿世者變滅同飛烟榮華神所戲貧賤節斯完此道匪難知胡為人不然福生既有胎福茂詎無根𤣥理諒不爽羣動何紜紜商周數百載積累基至仁𦙍嗣豈皆賢所藉先澤存後王昧經逺謀慮止其身於道或偶合秉心殊未純永懷極盛時民物熈陽春孟氏好斥霸惡彼能亂真隆中有一士卓然古天民長嘯六合間草昧思經綸寸心如白日可破萬古昏所遇雖不諧餘輝尚燉燉使逢髙光主禮樂寧沉湮惜其遺書亡大志人罕聞如何徇利子於道不知真卑卑章句中徼禄求潤身可貴不在位可賤不在貧無取一時好當作千載人翠鳥質微細乃以羽自戕犀象獸之雄每因齒角亡物生無巨小適用反相傷犬羊死柔弱虎豹死暴強彭􅅨死于夀夭者死於殤萬生誰長存所貴德譽光古來志節士立身有大方孰云蕭艾藂果勝蘭蕙芳封倫論治道盛詆習俗漓鄭公若砥柱坐障狂瀾馳嗟此古遺直磊落胷中竒遭逢英明君計畫得小施劉蕡豈不偉結舌竟如癡浚恒寧獨然天運固若斯熖熖趨愈下滔滔竟何之萬事吾不識聊以善自持始見澤腹堅又聞谷風至炎熇復能幾木葉忽已墜四序不少停景物日夜異思之熱中腸不遑食與寐支離如病鶴顧影獨長唳黄雀飽稻粱笑爾埀兩翅野性拙生理大化無停機緼袍汗沃若絺綌風凄其壯士千載心豈憂食與衣由來浮海志不是軒冕姿人生尚聞道冨貴復奚為賢有陋巷樂聖有西山飢朶頥多所失苦節未可非保身戒無疾制治憂小康茍操敬慎心何必求扁倉依依桃李花安知有嚴霜松竹淡自守嵗晚凌衆芳小人徒媕婀志士多慨慷我生豈不貴萬物備天常天常既無虧貧賤果何傷榮華衆所慕志得虞咎愆賤貧可無憂復為飢凍纒有能外兩途逍遥循自然茍不悟斯道中心何由宣曰予素寡昧未達性命原勵茲不息操夙夜靡遑安奮庸有伊周處約有騫淵敬承聖哲訓庶慰遲暮年追次朱子春懷詩韻聞鍾理短髪徐步啓荆扉不知夜雨過園林頓芳菲江山靜妙顔雲日浮清輝殘梅落欲盡幽池水痕肥始見新嵗來景物忽如茲徒為逝川嘆未遂滄州期及時貴取樂莫遣青春歸舟中呈同召葉夷仲林公輔楊大中陳元豐一作采本乏適時用誤為當世知進身媿蹇拙退處乃其宜何意承寵光使車忽來茲靡靡踰南國秩秩錫多儀嚴程不可稽王命自有期親愛俱在眼弗獲顧我私聖猷同山嶽微忠劣毫絲黽勉諒何補徒興千載思上已約友登南樓生意忽滿眼不知春淺深良朋曠嘉㑹濁酒難孤斟迢迢城上樓髙朗宜逺臨曷不一舉趾縱望淵與岑逍遥群動表舒豁萬古心古人已寂寞繼者應在今藴真有至樂外慕非所欽疇昔舞雩詠千秋虞氏琴窮達各有適宇宙流遺音景風生穆清佳趣溢魚禽願言領衆妙無為欝沖襟次韻春色與漢水相看兩俱深誰能當此時有酒不共斟城端聳華構賔友皆來臨東瞻太白雪西望峩􅔞岑縱觀八紘内洞見天地心千年等旦暮豈識古與今尚友懷賢豪妄意鮮所欽慷慨隆中嘯窈𦕈河汾琴其人儼不妄思欲嗣徽音觴多意不盡譁笑驚飛禽清風似相知數數吹余襟再次前韻昔時喜飲酒舉白不辭深及茲中嵗來已復畏人斟後生多所忽豈識老㑹臨志士惜景光登麓已知岑每聞前世事頗見古人心逝者良不息將來誰嗣今百年當有成泯滅寧足欽毎憐伯牙陋鍾死破其琴自得茍堪傳何必求知音俯觀水中鯈仰􅥬雲際禽真樂不吾隠欣然豁煩襟送鄭叔貞之成都謝公江海人雅量極宏廓中年别親友猶謂懷抱惡况我褊迫士志意早衰弱辟如遶指金詎耐膏火爍豈無骨肉親相望天一角兩生萬里至講道慰寂寞探竒忘舊悲觀妙有新樂寧知事多忤重使嘆離索林也前嵗歸重來忘曩約鄭子今復去南行踰巘崿成都壯麗地江水帶郛郭山窺子美堂雲護孔明栢壯遊豈不佳觀國資所學國僚盡耆俊政簡恒燕醵日開百金筵坐有四方客揮毫歌盛美文彩紛烜赫卓爾樂邦風巍乎王者宅王誠天人秀令德顔閔若神機盡經緯大度藴才畧心融群聖言穎銳智獨覺坐收千古秘萬理隨綜錯尚友師徽猷姚姒靡間隔勵精施惠政民物沾德澤至化通幽明餘恩及飛躍小心事天子放意躭簡䇿道積不自盈怡怡躬吐握知名久佇望前席啓東閣立談盡歡娛至理無適莫從容倘埀問占對慎酧酢為言寡朋儔舊業愈荒落疑經待同勘蕪史期共削相須左右肱理勢不可各王仁極深廣夙昔受殊渥囊餘舊賜錢篋有新頒帛身為微軄絆感歎顔面怍使子能輸忠寧不副所托金門盛才彦德星耀井絡􅞪􅞪白鳯群豈復少一鶴惟茲山南郡士氣陋且薄古心莫與論積疢誰為藥願子早告歸離憂變歡噱四科洙泗道五等成周爵真知茍内充外物奚須度旱麓清照人漢水淺可濯懷哉春服成重繼咏歸作又送叔貞之成都空名誑當世自誤還勞人鄭子復為誰跋涉窮冬春去年赴上國風雪迷江津徒步從我行面黒手足皴今茲有徵命欲往志靡伸子復之成都代余陳所因念子逺遊學三年别慈親敝衣犯緇垢斷裂莫為紉蜀道幸坦平王化甚惠仁歴覽快心目庶足忘苦辛諸葛政猶在少陵詩有神浩蕩觀大江穹秀瞻峨岷心胷藴竒偉撫事氣益振丈夫平生懷豈惟安其身况可廣咨訪大邦多縉紳恨我不得俱惟恐孤主恩見王再三謝念此疎逺臣偶爾遣意奉呈同學諸君子及示叔貞秀才累物擾靈府澹然無所為家貧自鮮營萬事俱不知日禄餘一斗粗給菜與糜秫田亦易畊有酒供四時門多儒雅客暇則斟酌之相對靡俗言共談止書詩遐情或深契歡笑同解頥孰謂千古逺其人如在茲於心有至樂天地亦可遺未知軒裳貴詎識勢位卑彼美要路仕賢勞耀輕肥窮通各有適寧論是與非送謝生因奉寄岐陽公帝子謹王度大藩臻治平文風播南土四國揚休聲上公國懿親令德惟邦禎奉恩自夙昔脩貢表貞誠名馬西域來玉勒懸珠纓金門足麒麟特受顧盻榮王昨駐中都貂蟬藹盈庭公來必燕語禮接同友生異質况天挺至尊愛彌甥勲賢冠當世夷夏欽盛名繼美實在茲聞望良匪輕近因師傅重愈見德業成歴數傳萬年蒼生仰皇明豈徒本支盛股肱在公卿海内雖已康民俗猶未寧鄙夫抱深念思覩禮樂興願公善匡輔報主以忠貞載光史臣籍永邁宗戚英靈雨洗南麓漢光晚來盈臨流送囘使懷古動遐情發褒城過七盤嶺宿獨架橋閣上名為不祥器斯理昔未覺及茲困奔走始嘆立論確險哉七盤山羊腸凌巘崿三年八往返顛頓髪早白此行當盛夏溽暑逞餘虐晝伏避蚉䖟宵征越林薄危橋帶褒水俯瞰波流惡鑿石勞衆工縁崖搆飛閣下扶千柱壯上倚浮雲弱怒雷地厎鳴懸瀑崖際落山中郵傳少過客資棲泊勞者務茍安寧思非所托更闌急雨至洪濤相噴薄鬼神助晦㝠天地混磅礴病身倦輾轉酣寢絶疑愕晨興霄景澄林壑還可樂有生大化中萬變相綜錯所遇聽自然何處匪安宅歴聘魯中叟詠歸沂上客勞逸命分殊順俟安敢擇過濚陽露濕塵不起曉行秋氣清遥作瑶天星未没野草蟲亂鳴途中何所見多見古軍營斷溝無新作流水荒隴存古城為問戰者誰其人總豪英當時誇氣勢畢命恣紛爭但恨智力殫詎思時世更寂寞千載後艱勞竟何成身亡事即已得失存空名善者或稱嘆惡者受譏評因之念首陽西顧清風生感此黙自嘆白日車前明過寧陵縣學師道古所重義與君父同自從東漢來節行著髙風繫理或訴寃死請代以躬收塟與撫孤懇惻貫蒼穹聖賢埀大法勉孝兼勸忠豈聞訟其師擠寘囹圄中執憲者何心此輩忍見容不惟紊人紀實斁上帝衷至理有相闗斯乃教化宗扶持罔失墜允藉參贊功末俗日悍驕童穉忘敬恭滔滔未有艾燄燄安所從我行聞怪事竊嘆徒傷恫誰操黜陟柄幸為懲頑􅇯葺書齋舊門扇安貧未必爾才拙本無能謬隨縉紳後誤以好道稱朅來忝一官行役嵗屢仍風雪走沮洳舊路充炎蒸山南舊草堂居處不得恒前人遺搆築一椽無暇增雙扇昔所闢蠧版同春冰三年忘葺理啓闔繫以繩友生每謂予朴陋良可憎曷不稍脩治費少力易勝人生跡如寄外物豈須憑聖哲有廣居所貴心志𢎞雄都多甲第華榱暎雕甍位崇德義薄鬼神見侵凌顧我田野人貧賤分所應庇身何必好取足容曲肱所冀對康時尊酒延佳朋春風日滿􅚋涼雨宵同燈順理覬暮息養恬神慮澄庶幾謹素節弗畔顔與曾感橙樹有作有序秋林道旁有橙樹處荆棘中不知幾何年矣㑹增置驛舍芟夷堂基斧斤幾及遇識者知其為菓實之美也獲免築室既成正值窻牖間結實纍纍然可愛過而見焉感而為之賦詩橙生蜀山裏蕪没荆棘塲荆棘忽剪除孤根虞見傷幸遇識者顧扶植不忍戕築室適在茲窻牖正相當花埀素雪盛葉茂青雲張方秋氣盛肅原野飛早霜衆木不復榮百草已罷芳纍纍枝間實爛爛半青黄摘置樽俎間几席有餘作輝光豈惟巴人羨南服亦罕嘗嵬峩帝王宫異味來萬方何以解煩渴甘酪間蔗漿此物倘前陳玉食倍馨香可令積疢蠲坐見人情康惜無先容者盱彼途路長遇世良有㑹處已貴安常嵗寒善自保用舍隨行藏栽柏迂拙乖世用每藴無窮思取效非目前逺與千載期翠柏信良材成長計功遲茲晨斸煙雨移動盈尺姿清廟嚴潔地聖靈㑹于斯豈無杞栁輩不足當階墀殷社夙所尚古制非徒為先師實殷人植此理固宜但恐枝榦弱不耐風霜欺培護茍無失終見盛大時三年過人長十年齊桷榱百年必合抱根深柯葉滋青霄泊鸞鳳厚土蟠蛟螭豈特傲寒暑將堪閲興衰所托况得所永免斤斧危既膺顧盻榮復與剪伐辭寥寥百世後神物相扶持何必為棟梁迺見材氣施流光若飛翰時代易推移行看好古士追說種者誰我生素多病中嵗早孱羸待為鶴髪翁見汝凌雲枝志士用心者濩落為世嗤何如群兒巧揷槿紛成籬新栽栢為瓠蔓所纒令諸生披解以遂生意有作青青庭前栢移植芳春時既承雨露潤歘見雲霄姿盛夏乏人工眼中蕪穢滋瓠壺引長蔓左右纒蔽之晨興試行觀沉思喟然悲微物凌善類勝負闗盛衰巨葉覆其顛濃陰密如帷自非為披折恐使嘉樹萎呼童操短鎌芟彼草與茨瓠蔓亦徐解扶持向藩籬植物共有生榮枯兩無知貞脆本天質生成仗人為仰惟𤣥造心發育靡偏私於焉别臧否可以人理推漢昭任愽陸不受群邪欺符堅逐仇騰景畧事業施用賢必逺佞果斷貴無疑嗟余何為者棲屑名位卑觸物徒有懷於時竟奚裨栢也材氣良取效嘗患遲衆人重口腹愛瓠固其宜紛紛俄頃計落落千載期浩歌向蒼穹此意知者誰喜脩德汝器二君子偕嘉猷秀才至宛宛心所慕盈盈日興思今辰果何祥舉目皆在茲經時抱沉瘵杜門謝親知狷獨莫與徒有懷欲從誰聊求古人志逺與後世期放情簡冊間庶以靜自怡此意信似拙衆方背而馳非子秉沖襟疇能無棄遺敝廬面落日炎暑每相欺清談偶有適四座生涼颸久乏經世具孰正生民彞深衷欝未宣流光迅難追嘅餘喜胥㑹豈以慰我私相期樹斯道與國隆丕基又孟春期過我仲夏始來翔只尺同里居㑹合猶莫常何况涉逺道各據天一方言歸雖有期心思詎能忘我如失群鶴斂翮雞鶩塲時逢涼飈發仰首睇穹蒼子若隨陽鴈髙舉隘八荒知時識天叙豈慕稻與粱哲兄富文學簪筆侍賢王愛國心事苦念親夢魂長朝退寢室靜閱書焚妙香賔僚各雨散思子不在旁子去義所安講道信有望山河壯都㑹圖譜有餘芳弔古考隆替撫時推興亡賈傅論過秦杜生賦阿房千秋繼竒偉亦足宣慨慷顧惟河洛間神邱欝相當逺思百聖烈近想群賢臧載瞻伊水濵二龍宣重光和貞各詣極崇𦕈交揮揚後來閩衡傑闡述爛昭章匪是啟靈秘正途已微茫願子奮遐躅整䇿趨康莊明明吾所懷暨暨宜力將幽獨靜自憫内視德甚涼方忻麗澤益乖析情增傷遲子即來旋緬跡鴛鷺行墜緒俟並緝他岐兾同攘重開萬古昏再覩斯民昌深期實在茲抱瘵語莫詳行當重執手母使熱中腸次鄭好義見貽韻五首鄭子好古學天機靜而深沖然舞雩詠中有咸韶音茅舍帶流水琴書閟清陰遊魚戲晴波好鳥鳴逺林那得一笑樂洗此千古心赤驥困皁􅇫埀頭避駑駘王良振長轡蹴􅂿風雲開古來功名際何代無竒才當其未遇時誰免蒙塵埃丈夫亮有命勿使心顔頽少時見白日意謂手可扳仰天邈無階狂走徒頳顔尺綆愧深汲寸管無全斑聖途千萬里用力恒苦艱安得驂飛龍倐爾升天關㓜安老丘壑千載想髙情鄙哉華子魚軒冕良可輕功名世不少孰與節義并至樂有天貴茍得非吾榮臨風發長歎欲為智者評山中一樽酒慰此離别腸清夜步廣庭大星吐寒芒向來負竒氣舉目空四方栖遲盛年至留滯天南荒君看升帝閑不必真乘黄乙丑中秋在石鏡精舍同士友翫月後二日家兄寄示㑹飲分韻諸詩覽之悵然歎不得與因奉次來韻兼柬鄭君好義四首我來南山中正見秋月圓我家豈無此兄弟况滿前胡為輕别離顧影清輝寒賴有座上客共結無窮歡愁端旋消釋言笑各開顔寄謝兄與弟明年相對看秋霽月正好山谷氣逾清風簷敞虚牖愛此萬里明嘉賓自逺至樂飲暢髙情雄談振林谷頓令懐抱傾叢桂困荆棘時來吐芳馨物生尚有待吾意詎無成且終良宵㑹難值衆美并酒酣發長嘯似聞鸞鶴聲惟恐日易出顧影遶庭行開樽酌月華酒味清且醺吐氣長風生吹滅天際雲此身與宇宙誰主復誰賓有生道為貴萬事何足論苦節慕夷齊延年稱羡門仙凡兩冥漠奸雄猶啖吞山棲未為隱頗喜離俗氛固窮固非潔用世豈吾仁昏昏坐平旦兀兀行薄暮豈乏徃來人幽懷寡清晤辭源湮曩濬理窟增舊錮幸子有佳期欣然冩衷素𤣥談相應發妙理獨超悟頗憚尊酌煩易覺光景度詘身違道逺髙世遭衆惡勉矣循大中心期永無斁題山水昔隱林壑中不知林壑美今年在城闕見之心輒喜楓林新受霜茅茨隔秋水安得呼扁舟遨遊五湖裏楊栁渡殘月墮瑶天涼風在髙樹人行野色分鳥轉巖光曙川平愜幽眺境勝遺塵慮日出小舟横依依楊栁渡宿夾江寺窻開覺山近院涼知雨足淡月透疎􅎉流螢度深竹心空慮仍澹神清夢難熟起坐佛燈前閒抽易書讀二蟲吟翾翾暮光螢燭舉競飛附没身煙熖間至死終不悟日月衆所瞻嗟汝不一顧雖有向明心所從良已誤喧喧秋後蚊白日噆我肌我雖病無力掃撲亦易為憐汝營一飽未得死及之且復縱遣去天運自有時郭西精舍士友同宿淹懷終嵗思幸際清宵㑹情深新喜集語愜孤愁退離居積頑鄙處下多尤悔倦翮謝騫騰羈蹤損貞介含悲靜自嘅抱獨招群怪非子不我遺斯心復誰賴天寒四野寂雲斂疎星大霜葉響枯條水灘咽鳴瀨振衣逞𤣥覽玅趣超塵􅙟靜泝一氣先虚涵萬象外林泉皆道情縻組本天械擺落已遺榮過從敢辭憊袪疑冀閎論立懦佇明誡頽風倘可還朂德斯無懈追次文公先生嵗莫燕集韻二首靈臺湛無為一念寂不起外物紛相交飛揚千萬里哲人善操養淵澄復山峙所期天爵脩詎以貧賤恥豈無華軒客膏梁飫頑鄙道義竟無聞放浪徒自喜滔滔從俗化悄悄為誰美知言世所難感歎何時已賢豪居廟堂四海為興起時乎有不遇淳風化閭里用為江河流處作喬嶽峙所逢異通塞内省無欣恥紛紛夸毘輩患失誠足鄙屈身營所欲易愠復易喜人生貴聞道外物豈真美千載簞瓢生令聞傳不已嵗除祭先奉懷家兄次文公先生病中呈諸友韻日月行不息我亦少安居違家今幾何忽復五載餘微官悞人事解令親者疎毎思别時語不見空中書及茲嵗將闌感歎正躊躇祀先具薄奠撫已懷厥初觴酒豈云乏獨酌悶難祛寧當解組去御子花間車遊石鏡山詩親友㑹集諸公囘途有作世道久凋䘮斯文難合并駕言山中遊來與子同盟髙齋在深谷側徑防險行白日亦蕭散惟聞絃誦聲開筵動芳酌與客張華燈持盃恣歡謔聨床如弟兄凌晨起盥櫛披襟瞰前楹霜林凋綺葉秋花吐竒英百靈兢紛集萬象森羅迎佳趣心已領新詩誰與評良㑹不可常俗慮仍相縈登途數囘首暫别難為情迴溪屢曲渡清流堪濯纓離離莫雲合矯矯孤鴈鳴乘髙望遥火髣髴識巖坰勞生幸脫鞅至道思服膺從君來借榻棲隠謝浮名再次石鏡精舍㑹集韻三首風日淡秋晚欣此佳㑹并賢豪昔同調泉石非舊盟秪應念違别忽作山中行雄談為絶倒空谷騰歡聲論詩涉風雅深夜張華燈義交無老少情親如弟兄齋中二三子侍立環兩楹把酒起為夀禮秩交相迎丈人名文章落紙誠世英珊瑚與玉樹對之敢譏評乃知髙世人不為塵俗縈秋空白雲散悠然暢遐情嗟予尚稚劣夙心㑹簪纓沉潛守編簡愁對寒蟲鳴豈知金石韻鏗鏘振林坰重茲領秀句願言當服膺匪徼一時譽終期千古名野性淡無嗜不求四美并喜茲二三友同結嵗寒盟願言道義交豈慕青雲行山深寡轍跡地僻無囂聲曲几列遺編疎籬翳寒燈凝神對賢哲况共弟與兄幽蘭藹北牖脩竹羅前楹忽聞長者車倒屣欣趨迎貌匪山澤癯器乃邦國英揚論徹幽䆳萬彚隨品評風雲時動盪川岳互迴縈磊落賢俊姿慷慨今古情不耽好爵貴飄然解簪纓至今懷令望江海傳詩鳴竒懷寄竹帛安居守林坰小子來問道仰德思服膺從茲勉素業不媿知已名太古日已逺轉覺浮偽并不聞金蘭契豈願敦盤盟浮雲無定態流水難西行滔滔勢利間豈識韶濩聲翻思機巧徒明滅風前燈閉門絶聞見所親惟父兄丈人忽來過雅淡振軒楹山禽兢喧呼童穉亦歡迎清詩多古調妙論超時英富貴苟不累貧賤孰能縈羣賢共舒睡萬物屬品評星斗羅竒襟風雲動髙情瞿瞿世儀表濟濟古冠纓孰知枳棘間尚有鸞鳯鳴鯫生寡交接遊息在村坰偶茲觀美德夙興當服膺幸托龍門賞終期崇令名病眼喜郡守見過目疾不飲酒昏昏心意煩忽聞郡守至出戸強開顔况覩温粹姿復聆豈弟言乃知盛明世屬任多才賢神歡坐忘疲欲起屢相援筍蔬雨餘美細酌林花間風煖落英過日斜歸鳥喧苦云事填委未暇蘇痌瘝髙位不易居斯民良亦難一夫或凍餒仁者為悲酸腐儒實無能教士慚素餐臨觴願有祝早使群黎安題信可時經歴熨帛圖聖主恩如天賜帛一萬匹承之錦繡叚重之踰金璧西風摧刀尺將為君子衣熨貼既匀調粲粲光陸離防胡猶未已行役何當歸為君重着絮此地饒寒威奉懷太史公用盡字韻隆替存恒期含生㑹當盡獨遭誣枉搆既往有餘愍哀彼草昧初遺黎困戈盾英雄逞割據未暇分牡牝公來作蓍龜王畧見封畛上為宗社鎮下為邦國準旂常揭日月鍾磬羅簴簨諷諫陸賈多制作張華敏格天誠宻運恤物涕潛隕氣囘窮冬温力導大川引竭忠職調護埀老辭疾疢謂可樂桑榆相從拾芝菌安知事乖謬𤣥造獨何忍顛頓萬里行流離闔門殞所餘已無幾猶受飢凍窘自顧受深知無能效賙賑是非屬公議不以窮達泯終古仰大名昭囘配箕軫紛紛榮辱論百世同一哂三嘆秋風前目送髙飛隼鄰父攜酒相飲夷惠俱可慕清和合天真汨予流俗中豈暇思古人抱拙恥為佞遇物展殷勤雖無失已尤事過每自嗔隣翁偶相訪延坐列主賔為言秫田登願我嘗其新巨榼傾濁醪雞黍雜前陳持盃強勸飲禮率意態親顧予寡德業無以給比隣何階及爾輩愧此風俗淳酒酣述往事所歴多苦辛却憶全盛時無言指蒼旻世運有隆替𤣥造豈不仁父老且少安汝本三代民九重敦政教萬幾盡經綸行當被嘉澤皷舞歌聖神二禽咏鵲噪未足喜鴉鳴未須憂天道神且逺微物徒喧啾翰音善司晨不免供肴羞鸛鶴至髙潔所識惟林邱鴻鵠隘八荒但為稻粱謀文彩羡孔鸞繒繳或暗投况彼鴉與鵲志非衆鳥儔質陋羽翮短雲霄非所遊性貪嗜飲啄逐逐不自休飢則摇口吻向人如有求何能洞先幾兆與天心侔禍福有定命所致各有由人理固坦夷鬼神良昧幽茍中存仁義自可無愆尤何須浪悲喜為禽鳥誑譸來寅慰韓愈惡聲感黄州好怪失所守二子非英流吾方友千古逺法孔與周考祥視素履樂道以夷猶敬次張南軒贈朱文公韻送董公昔忝國士薦觀光帝王州強言酬顧問流汗對冕旒有詔試文章下筆心懷羞退朝東閣下獲與夫子遊夫子燕薊來氣貌何休休至尊重純德特為儲王留出入朝兩宫寵恩正綢繆予時報聞罷歸飯田間牛升沉本命分出處非人謀安知十載後握手梁山幽蟲鳴月耿耿鴈度風颼颼話舊若夢中一笑忘百憂况茲林泉窟足以寓冥搜仰看岷峨峯俯視江漢流敬慎以為楫忠貞以為輈居夷聖所欲勿憚道阻脩題童賢母巻後南山有喬木柯葉敷重陰匪惟雨露滋土腴根本深童氏秉孝義兄弟同一心構穫良足多先澤久浸滛卓哉賢母行鄉邦迭嗟欽婦道盡恭睦庭訓肅規箴救殍麾廪粟收宗散籝金生業隨日增善積祥慶尋繩繩螽斯應玉立蘭芽森𤣥理諒靡僭令德斯鑒臨埀裕既有始濟美宜自今永言引弗替百世流徽音應教恭賦靜妙軒世故役群動方寸如旋蓬孰知神妙理乃在𤣥黙中至人本無為清明常在躬百念寂不起湛然與天通庶政或前陳聽斷每從容化原有餘地善應無留蹤齋居樂康時爐熏颺微風忘言對縹帙端拱師黄農兹惟文獻邦冨庶古莫同載敷嘉靖治㑹見躋時雍宋五公咏李文靖公李公安平相雅識極淵永惓惓閔無告扣陛日有請格君古不易慮國存要領紛然土木興始悟先幾炳王文貞公盛德每多容平世喜迂怪公操鎮靜量不幸當其㑹神書祀河嶽王府窮賞賚昭昭知過心寵禄有餘悔冦忠愍公冦公社稷臣識逺才亦果張皇澶淵狩佞幸慚計左青衫老作吏赤子淚交墮宏謨雖不終亦足振媮惰范文正公布衣憂社稷此義古亦然桓桓髙平志致主二帝前時屯道難合謗息名愈全繼明有良𦙍千載陋韋賢司馬温公傾否難永圖拯溺有遺巧肫肫反正力誠節作足動穹昊羣邪競囘遹善政恣紛擾廢興豈人謀千秋仰元老訊瘧尊生道不足衛生亦無由微痾忽相侵坐為肢體憂疑水集寒氣挾纊思重裘虐燄繼踵然絺綌不願留陰陽各用事對處天一陬如何兩相值追逐同仇讐弱質受摧沮有似中暍牛有耳不解聰有目等無眸舌不辯辛甘鼻不别薫蕕耳目口鼻官焦然共懷愁謂此果誰致試與天君籌吾觀今之人紛紜劇蚍蜉日趍紅塵市夜醉笙歌樓縁情喪恒性縱欲戕天猷告之養夀命大怒不頷頭云胡反無疾徤捷如猱猴方子頗好道少以禮自脩觀其居家庭未嘗暫嬉遊旦食不暇飽夕夢孔與周生疾豈有端天君亦知否天君聞之笑汝言理誠優子病殆天意皆非汝愆尤惟天生俊哲蓋為萬世謀大欲扶三綱次欲叙九疇安能閉闗卧縮首鳴啾啾孔孟處衰世奔走摧輪輈寧不懷晏安此道難中休天令所賦授與古豈不侔恐其不自強降疾警惰媮方子暫遘疾身疲面無膏忍見萬赤子病者半九州子能憂斯民厥疾當自瘳茍徒念一身夀考吾所羞耳受口以告目鼻涕泗流方子豁爾寤百體頓和柔再拜紀嘉言可以埀千秋次脩德雜詩韻三首通衢夷且直舉世所共知求端迷往轍顛躓終無歸達人解至理秉心若明曦敬恭視盤鑑齋莊整裳衣昭昭奉一德暨暨滅衆私為仁諒茲在彼狂胡弗思制變易為失所貴謹未然本心秉靈德洞鑒媸與妍譬彼達海流出自山下泉積久諒益深雲濤皷風煙始學誠已誤補過幸有年力微道尚逺感此徒煩悁神龍卧深澤不若抱甕滋白日閟重陰不如寸燭輝賢豪初未遇但覺吾道非紛紛當途于權勢衆所歸兩生困蓬藋屠販建旌麾斯事自古然今人安足悲初冬雨中獨坐吾廬混人群來往劇鼃黽頗欣夜雨來頓使蹤跡屏滔滔流水障悄悄耳目靜風窻試展書佳趣倐已領平生煙霞癖夙昔慕箕穎抗懷軒冕上雅志星日炳寧知墮俗流汨没未獲逞竒懷獨不忘幽念時自省豪雄外身名曠士賤鍾鼎欲語嗟莫同長歌碧林瞑雜詩四首贈林嘉猷伊周不治經董賈不言文宏謨塞宇宙髙論追典墳如何末代士操觚動成群但要言辭好不顧心志分至道豈難行彞倫人共聞勉哉不逺復恭黙事天君循循勇不逮頟頟善或虧古人患才難可以當世推自吾行四方所見多有之豈乏俊爽流未足慰我思聖道充天地其微入毫絲非精莫能察非敏莫能為致用貴不頗篤守在不移由來賢哲事皆本純粹資顧予亦陋劣前徽豈能追仰止二三友有過頻相規操行一不慎坐取終身憂發言一不思或為萬世羞過小莫吝改進德勿厭脩誰能百無為自致孔與周載籍彌九有群言劇毫毛棄置患術疎窮探畏心勞何由領其畧可使道藝髙聖學亂百家黍稷雜莠蒿良農善别識培溉復芸媷取大成吾身致用同伊皋彼哉溝澮魚豈足連九鰲次韻贈國亮經歴君侯昔筮仕匹馬之幽并先子守東藩始結鄰壤盟寧知十載後握手山中行鬂髪白欲盡韜光復潛聲話舊若夢覺痛飲張華燈尚欣古義敦愛余均父兄雨洗秋色浄群山擁前楹山鳥喜客來飛鳴似相迎緬思天下士公是世外英流俗何所知紛紛好議評莫邪雖在土龍氣上􅂞縈自非冰鑑識誰知江海情談詩較李杜起舞笑絶纓大音久閴寥厭聽寒蟲鳴麟鳯居空谷何由在郊坰處世媿郭泰通家慚李膺巖棲倘有約相與棄榮名雜詩四首相如妙文辭髙處無與敵多財為身累終老汙名蹟人生取予際千載觀令德茍富何足論䘮節良可惜好名未知道古人有揚雄著書欲傳世不暇脩厥躬聖言德之餘屈伸與天同哀哉大節廢豈足稱固窮賈生信英才蚤識當世事身逢致治期遇主亦天意道髙固難合流俗工媢忌一死尚足多千秋想竒氣幡幡市井人出納量錙銖積財至千萬侈然夸有餘華堂占廣陌列肆遍通衢朝餐聚俠客莫飲羅名姝一朝與法遇家破及妻孥金玉歸縣官不能贖其軀郭解既夷滅季倫亦門誅安知子原憲窮巷歌唐虞脩德以詩寄次韻藜羮淡無和腐粟舂難圓羞將饋俗賔歡笑置子前子豈乏粱肉對之每欣然云胡恐費我來往動經年子行信勞止吾道良足憐深期挹嘉話不必枉華牋抱痁百日卧欲言無與朋敦敦守一床鬂脫影如僧豈惟形容悴智識無由增視此不棄捐子心一何𢎞細人忘名軋俗士為利懵孰能使余慕君子固有恒營營茍得者忍以利易生徇欲遂忘反捐軀匪其情古人崇仁義講切極粹精於斯弗自得猩狖埀紳纓貴有不足懷賤有不足輕景公徒千駟子眞豈其卿再和并簡林嘉猷夜光自有輝不因磨礪圓騏驥自致逺不以鞭策前古來知道者天質固使然師友發其微成德在早年余少稍有慕今也反自憐子誠肯開我嘉言著來牋十年窮取友四海幾得朋豈惟得吾徒旁及老與僧自昔得王子勃鬱氣為增子才信已毅愧我德未𢎞所患涉道淺未免臨事懵何由與子隣講習日可恒温温我所愛處子有林生匪惟質柔嘉逈出遺世情從我南山遊斸雪煮黄精共悲狙喜怒靜閲猴冠纓生也尚審思勿言韋布輕巍巍孔孟業豈以為公卿送一宗和尚次蜀王詩韻有序成都大慈禪師欽公一宗與余皆天台人雖所趨殊途而相見萬里之外有足樂者今將暫還故山謹次賢王殿下賜草堂長老詩韻以寓别情里中故人有相問者幸為謝之浮雲出山中浩蕩隨去來來非有所係去亦忘所之若人釋門秀矯矯孤鶴姿林泉三十年喜譽如波馳平生西方學所藴未及施一朝忽乘興來謁􅡠峨師微笑坐談空傾城走羣緇遂令好事者懶問子雲竒清香焚柏子細雨洒楊枝相逢話鄉曲麈尾不暇麾越蜀萬里途各處天之陲胡為偶至此欲語忘其辭歴歴世間事星星鬂中絲迢遥無所嬰老大秖自知巴江復舉棹故廬討遺基散懷天台月濯足楢溪漪我亦倦遊客歸耕有深期身在華山陽夢繞大海湄徘徊將何說秖恐負明時家兄寄中秋㑹飲詩因分韻述懷以答時過不自惜長年轉多憂壯心若湍水湧激不少休念昔童稚日此身百無愁良宵見明月喜躍如有求大母方夀康諸祖未白頭開筵羅廣庭蔬果問殽鱐先公奉觴起叔父迭獻酬玉立四五人文采皆琳璆酒行聞雅歌鹿鳴何呦呦豈無辨難言禮義皆先猷脫畧輕萬事髙視曠九州每卑楚漢業或誤良平謀奮袖時抵掌舉箸借前籌坐間二季父豪俊邈無儔慷慨頗蠭起自許公與侯酒罷寧復眠長吟倚危樓夜闌得繡句叩戸來相投我時被鍾愛兄弟共譁咻席賔欲亡酒輒笑牽衣留轉眼二十年存亡兩悠悠庭闈音容絶門戸變故稠巢懷鶴上天雷行龍脫湫惟餘老仲父衰鬂對清秋今嵗月最好我適南山遊含情面樽俎感歎葢有繇伯氏欲相寛新詩遞來郵發函清淚墮紙濕不可収永思舊所見一往如川流于今㑹飲歡頗似昔日不我家埶衰繆難與時人侔譬彼百年屋不足施雕鎪願伯善扶持重使楹棟脩庶免傾壓虞百口蒙庇庥我愚更懶惰樸學愧前修術疎何所成言髙每難讐空懷濟物志夢寐談孔周嵗華易為度自哂等浮漚長恐墜遺業上貽先人羞伯也幸閔我正救愆與尤復為戒諸弟敦睦無相猶道德在詩書為生視田疇天倫茍足樂外物皆懸肬骨肉豈異人風波同一舟持家尚禮讓處衆貴和柔堂構倘樹立梓杞加丹髹重還當時盛豈特才藝優世欲登虞唐吾將老林邱終期友愛樂黄髪叙綢繆深衷久有懷對月偶歌謳歌竟視天宇寒光衝斗牛寄好義同鄉不相見動涉秋去春何意忽來翔㑹合當茲辰雄談有逺趣文采驚世人譬彼隨和質衆目咸知珍陋俗乏竒士懷抱鬱未伸每思伊葛流磊落展經綸志大固難售心孤邈誰親君來起我意頗覺氣為振炳炳千古事悠悠三代民舉首視大荒汗顔慚此身深衷非一端欲語未及陳胡為復求去重使别恨新夙負江海情恥為兒女仁賢豪日衰謝感歎易悲辛涼風吹碧海月露洗髙旻酒至且持飲言歸何所嗔送友人之雲南教官地逺㑹面難情深嗟别速今衝微雨去欲向誰家宿山城碧雲裏茆舍清溪曲莫厭官寂寥終期化夷俗巾山晨夜望柬錢克温月落江水明疎鐘發林杪濛濛山氣合歴歴川光曉玅靜𤣥化機縱意群動表悠然悟真趣忽覺天地小是身本無累萬事相紛擾願釋經世情於茲共幽討間居偶題雨歇堦草淨鳥鳴叢竹中偶無輪鞅過遂與山林同晞髪庭際日振衣松下風自非捐世故誰得此相從勉學詩十二首殘燈結成花枯竹化為菌凋零如此物秀氣終未盡人心最靈智自棄獨何忍聖門本𢎞大梯磴多接引曾髙愚魯資直解配顔閔流年急如箭髪白難再鬒及時不努力老大成蠢蠢樹木生有枝子弟教及時七年異男女八嵗分尊卑二五學書計逢人多禮儀三五學射御四五加冠緌今來謾不省古道當如茲欲作髙髙臺為爾寛作基欲求深深井為爾逺為期不聞鄒孟學還自俎豆嬉人材日衰少善保膝下兒兒童聚嬉戲不離父母傍父母顧盻之百憂為爾愴惟此慈愛心此同春日光陽和透地脈草木俱芬芳兒身已長大能不念往常愉色與婉容傾心奉髙堂嗟哉力何短父母恩甚長上堂拜父母甘㫖手自供入廟羅豆籩祀我祖與宗死者魂魄安生者恩義隆一門無二志謦欬生春風豈惟薫閭里上聞天九重祥雲及膏雨滋我庭下松孰云唐虞逺不得身遭逢由來豪傑士世世皆時雍藹藹桑梓樹遲遲杖履音未瞻父母顔已起恭敬心樹木手所植杖履身所任此物猶足重况彼鍾愛深父愛我亦愛不間獸與禽六親同骨肉何以能相侵莫驅屋上烏烏有反哺誠莫烹池中鴈鴈行如弟兄流觀飛走倫轉見天地情人生處骨肉胡不心自平田家一聚散草木為枯榮我願三春日埀光照紫荆同根而並蔕藹藹共生成妻賢少夫禍子孝寛父心不知何人語相傳猶至今室家兩相好如鼓瑟與琴二親豈不驩花木羅春隂雖云一樽酒共酌還共斟物情動相失安用儲千金家睽在婦德彖繫有遺音布帛文被體粟菽味充飢常人未識察徃徃爭好竒貪竒不願寳刻成無當巵大鈞播萬類瑣細各有宜得時易長養失叙徒施為哀哉楊朱淚滴向他路岐正途亦甚坦舍此將安之蜘蛛解布網蛣蜣能轉圜萬物各有役何人得安然周公貴為相仰思夜不眠仲尼大聖人易書三絶編孰謂我有耳不聞古所傳一聞敢自墮勇志如奔泉好龍非真龍藻繪等兒戲懼虎思虎傷聲容凛然異六經豈虗文中有無盡意一從河出圖光景不可閟皎皎如日星悠悠在天地青編積几閣翻閲何容易曽參之一唯已徃難再值勸爾一盃酒君行莫匆匆君心雖欲速道路久乃通東可窺大壑西能越空同不憂嵗月晚但憂筋力窮三年刻片楮九年成一弓制作雖云難為藝則已工小事可喻大願言置胷中離離園中樹花開動無數或紅如丹朱或白如瑩素今日正自佳明晨不如故易盛還易衰浮華眼前度物情何參差天地均雨露南山有松栢壽並金石固遜志齋集巻二十三
