body:
  text: 中順大夫浙江按察司副使奉勅提督學校雲間范惟一編輯奉政大夫浙江按察司僉事奉勅整􅅚兵備南昌唐堯臣校訂中順大夫浙江台州府知府事前刑部郞中東呉王可大校刋蜀王賜方漢中書二首公西州之冠冕有識者無不心恱誠服而新學晚生亦有所依歸也余一日不見有如三秋况在逺道乎先民有言能自得師者王又曰務學不如務求師良有以哉予以􅆌躬藩衞宗社之重亦必慎柬賢良以僃頋問爾懿文清節有東漢之風尚志立言爲當代之重秘閣閱書燕閒賜對經帷進讀道德坐論矧乃郡庠之責學課之繁别旣數月良非得巳忠言嘉謀予所饑渴竭乃心力副予眷待遣書指不多及蜀王送希直先生還漢中詩嵋山峨峨江水泱泱我疆我理俾民以康靡言匪衣靡善匪得閱士孔多我敬希直謙以自牧卑以自持雍容儒雅鸞鳯之儀有學有識乃作乃述追之􅅣之金玉之質侍我經筵不倦以勤非德不言非道不陳軄思其歸義不可奪采采者芹伺教如渴爰抹其馬爰振其衣拜手稽首載辭而歸昔之來也春日遲遲今之歸也凉風凄凄悠悠我心念子良苦爰命辭臣飲餞江滸王道如砥旣歌且詠八月初吉抵于南鄭􅃆彼江漢亦合而流瞻彼岷峨欝其相繆心之知矣臨别繾綣子如我思道豈云逺歳行在子文闈秋開較藝至公遲子西來蜀王賜方教授詩三首伊昔開東閣相看眼獨青文章奏金石衿佩覩儀刑應世逰三輔焉能困一經前星垂炳耀染翰侍􅊮庭聞􅀃眼空天下士只疑身是洛陽人少年有學談仁義高論無慚問􅀑神九載之官看教育萬言詣闕聽敷陳曵裾巳在長沙日知巳相逢此志信四十雖聞不動心平生冨貴豈能􅁋屢􅀩論薦來天禄自􅀒文章入翰林養望也湏添白髪觀光仍遣教青衿河間好古嗟予慕多士從逰愛子深蜀王送胡志高赴漢中兼柬方希直二首趣裝何䖏去驅車赴漢中欣然逰大郡况復依方公問學日盗愽道德日益隆丈夫志逺大那肯局樊籠他年居舘閣歩武接䕫龍胡子蜀中士受公知更深不憚三巴路欲成仁者心伊昔韓門士籍湜蒙賞音朂哉今胡子願無媿鄭林鄭公智林良顯蜀王讀基命録武皇稱汲黯近古社稷臣卓乎天地間百世有餘芬宋公廊廟姿志慮殊精純由來慕前烈願學在斯人雖䖏江湖逺擬欲踐臣鄰苟非堯舜道肯向黼扆陳嘗咲賈太傅前席對􅀑神著述累萬言所言皆歸仁爲君觀此書四海属經綸爲臣觀此書有術能􅃱君聖賢友多聞我亦忝嘉賔持此以贈我讀之至夜分撫卷􅂯三歎良可嫓典墳送方生還天台詩有序金華宋濳溪濂古者重德教非惟子弟之求師而爲師者得一英才而訓􅅚之未嘗不喜動顔色此無它天理民彛之不能自巳也予以一日之長來受經者毎有其人今皆散落四方􅁰稷雖芃芃不如䄺稗之有秋者多矣晚得天台方生希直其爲人也凝重而不遷於物頴銳有以燭諸理間發爲文如水湧而山出喧啾百鳥中見此孤鳯凰云胡不喜越一年别去感慨今昔又云何弗思退朝之暇懸燈黙坐因發於聲詩一十四章以送之末章用來字者冀負笈重來以迄於有成也詩曰北風何逶迤雪花大於手之子有逺役􅃘勸尊中酒念子初來時才思若繭絲抽之巳見緒染就五色衣被之行儒林孰不生􅃩慕蹮蹮媚學徒二歩一回顧余生老且至秋髪垂两肩得之喜欲舞如􅀗寳珞然素編躭清晝青燈坐深夜探玄欲忘􅃦薦味如啖蔗一朝别我去何以釋離憂不禁秦淮水流子江上舟但願逆風起吹舟不得往共穿鍾阜雲時看白石長風本無情物豈能知我心事旣不得諧贈言如贈金湏知九􅌇山功或少一簣學貴隨日新慎勿中道廢群經耿明訓白日麗青天苟徒溺文辭萤爝欲爭妍姬孔亦何人顔靣了不異肯堕盆盎中當作瑚璉噐不見金谷園瓊芳委塵沙㤗山有喬松老􅆬凌蒼霞四海皆兄弟知巳獨難遇伯樂倘不逢鹽車厄騏驥明年二三月羅山花正開登高日盻望遲子能重來洪武九年冬十一月書于蘿山石室精舎送希直歸寜海五十四韻有引濳溪洪武丙辰予官禁林寜海方生希直以文爲贄一覽輙竒之舘寘左右與其譚經歴三時乃去明年丁巳予􅀩恩謝事還浦陽生復執經來侍喜動于中凢理學淵源之統人物絶續之紀盛衰㡬微之載名物度數之變無不肆言之離析於一絲而會歸於大通生精敏絶倫每粗發其端即能逆推而底于極本末兼舉細大弗遺見於論著文義森蔚千變萬態不主故常而辭意濯然常新衮衮滔滔未始有竭也細占其進脩之功日有異而月不同僅越四春秋而巳英發光著如斯使後四春秋則其所至又不知爲何如以近代言之歐陽少師蘇長公軰姑置未論自餘諸子與之角逐於文藝之塲不識孰爲後孰爲先也今爲此􅀃人必疑予之過情後二十餘年當信其爲知言而許生者非過也雖然予之所許生者寜獨文哉庚申之秋生以不見大母者久將歸省焉予深惜其去爲賦是詩旣􅀭其素有之善而復朂以逺大之業云詩曰昔在辭垣時英才常駿奔水碧與金膏價重駭見聞終然無根蒂歛散空中雲方生海來上玉立而春温袖携絺繡書靣帶黼黻文揖遜入禮域陳義凌秋旻同飡大倉粟共勘典與墳濳深索幽䆳穹高攀嶙峋􅂿雪忽言别渉險航江津梅花似相憐沿途􅇺孤貧湛恩來九天憫我髪如銀特􅃙還故山許與煙霞親生聞抱經來䖏此寂寞濵􅐯蒼扣無始溟滓窮無垠宇宙所管攝載籍所敷陳終始鈎鉗之若大樂建鈞律吕按高下宫商肅君臣鬯和免惉懘疊奏歸繹純桑濮唉麾斥滛哇竟何存黃鍾壓瓦釡庭燎滅􅀑燐似兹稽古力可敵戡定勛濡毫寫雄顥勢足移峨岷漏泄渾沌竅出入造化神變幻波起伏凊温玉璘珣盡抽神竒秘不堕臭腐塵所以日出之愈見光景新山􅀑當洒泣湘靈且逡巡振古著作家後先各􅌭紛豈知萬毛牛難嫓一角麟古今二千載有如星在晨豈意瓦礫中見此席上珍予生髮未燥立言鄙河汾結交一世士暮齒越七旬妍媸與苦良入目無􅅏痕自非病狂藥顛倒甲與􅚙寜因一學徒䛕辭浪云云大言心不怍秪爲所見真生今省行期序飲松竹根咲摘黃金花起泛青瑶尊酒酣两耳熱劇論如抽緡寜無贈别言有志湏當遵真儒在用世毋徒滯彌文文繁必喪質􅆘中廼彬彬有虞號多士九官展經綸惟時亮天工外夷悉來賔不聞有著書鼔蕩摩乾坤生乃周容刀生乃魯璵璠道真噐乃貴奚湏用空言孶孳務踐形勿負七尺身敬義以爲衣忠信以爲冠慈仁以爲佩廉知以爲鞶特立睨千古萬象昭無昏此意竟誰知爲爾言諄諄毋徒謂強聒一一冝書紳洪武十三年庚申秋九月吉日先生與伯欽書云太史示予此詩未嘗以示人蓋以其知者少故也今特録􅀉吾兄前軰勉後學惓惓之意不特在乎文辭而巳望相與勉之䟦太史公送方希直還詩臨海林佑公輔天下之士不能皆賢㧞其􅀹賢者而訓廸播揚之則天下之未賢者亦將觀感而興起矣此善教之道也孔子論仁論學之際一則曰顔子二則曰顔子而三千之徒亦自以爲不及日夜勸勉求其所以爲顔子者終聖人之世雖庸才末學聞風而起者皆有所成非教者約而所成者愽哉苟不擇賢愚槩而進之非惟彼未有所悟而我之教無廼屑屑矣乎當今之世去聖人巳逺執聖人之道以戸牖天下者太史公一人而巳天下之士登公門者奚趐千數而公許與之間特於希直深有望焉觀所贈詩拳拳之意蓋可見矣雖然使天下之士其立心其操行其爲文辭誠如希直者公之心也幸而僅有焉又烏得不深望哉又烏知所望於希直者不爲天下學者之所望哉吾知此詩之作不特於希直見之又臨海葉見㤗夷仲見㤗視宋太史公以年則父兄也以道則師也少爲學子時常思從公逰而不可得洪武初自安南還始拜公京師公一見即呼爲忘年友而不屑以師父兄自居頗疑公有所惜旣而侍公者數月辨論􅒑誨未嘗不爲予盡乃益服公學鉅德溥信乎其爲一代􅊆人而非蕞爾小子之所能測也其後爲廪禄所縻挈挈然往復南北雖或間至京師一􅂯見公而不得久嗚呼公今不可作矣閱其遺稿輙澘然出涕公高第方君希直性孝友爲文章雄邁醇深登公門者皆莫能與之齒公特鍾愛之雖親子姪弗及也在金華時嘗辭歸省公作詩二百餘言送之所以期望之甚重今年冬予與希直同徴赴亰師希直於舟中出以見示相與收淚讀之予且衰愧無以荅公之知希直方富於齒尚益自力以求副詩中之所􅁛也夫洪武十五年長至日又同邑郭濬士淵濬事愚菴先生時希直年纔十四五操筆綴文固巳不凡後希直從先生守濟寧由京師還值予武林出示今太史公所贈詩觀其􅒑勉属望之厚情詞藹然濬疑天下能文之士莫不以得出太史公之門爲幸如希直者冝非一人而希直以童冠之年厠於其間獨何道以􅃱此哉去年冬太史公來朝往拜之頃復得與希直晤叙且得盡見其所謂遜志齋稿文氣渾成識見卓邁動以聖賢自許其身不但言詞之古而巳然後知希直之􅃱此者有在也雖然古學不明久矣世之人以時代觀人而不知今之可以爲古故特逹抱負之士恒見累于多口是雖習俗與時移易抑亦吾道未有以信之爾希直尚益勉循古道興復古學不負太史公属望􅒑勉之意使先生之學大􅀍于世斯爲善爲人後矣惟希直念之染􅀃金華蘇伯衡平仲凡染象天象地象東方象南方象西方象北方象草木象翟象雀以爲色取蜃取梔取藍取茅蒐取棠盧取豕首取象斗取丹秫取涗水取欄之􅁅以爲材熾之漚之􅍊之宿之􅁋之沃之􅂗之揮之漬之以爲法一入􅂯入三入五入七入以爲候天下染工一也於此有布帛焉衆染工染之其材之分齊同其法之節制同其候之多寡同其色之淺深朙暗枯澤美惡則不同其深而朙澤而美者必其工之善者也其淺而暗枯而惡者必其工之不善者也蓋天下之技莫不有妙焉染之妙得之心而後色之妙應於手染至于妙則色不可勝用矣夫安得不使人接于目而愛翫之乎此惟善工者能之非不善工可能也夫工於染者之所染與不工於染者之所染其色固有間矣然雖工者所染之布帛與天地四方草木翟雀其色則又有間矣無他天地四方草木翟雀之色二氣之精華天之所生也天下之至色也布帛之色假乎物采人之所爲也非天下之至色也學士大夫之於文亦然經之以杼軸緯之以情思發之以議論鼔之以氣勢和之以節奏人之所同也出于口而書于􅁓而巧拙見焉巧者有見于中而能使了然於口與手猶染工之工於染也拙者中雖有見而辭則不能逹猶不善工之不工於染也天下之技莫不有妙焉而况於文乎不得其妙未有能入其室者也是故三代以來文者至多尚論臻其玅者春秋則左丘眀戰國則荀况莊周韓非秦則李斯漢則司馬遷賈􅁩董仲舒斑固劉向􅀭雄唐則韓愈桺宗元李翺宋則歐陽脩王安石曾鞏及吾祖老泉東坡頴濵上下數千百年間不過二十人爾豈非其妙難臻故其人難得歟雖然之二十人者之於文也誠至于妙矣其視六經豈不有徑庭也哉六經者聖人道德之所著非有意於爲文天下之至文也猶天地四方草木翟雀之爲色也左丘明之徒道德不至而其意皆存於爲文非天下之至文也猶布帛之爲色也學者知辭氣非六經不足以言文玄非天黃非地青非東方赤非南方白非西方黒非北方夏非翟緅非雀紅緑非草木不足以言色可不汲汲於道德而惟文辭之孜孜乎天台方希直從太史宋公學爲文章其年甚少而其文甚工不惟同門之士未有及之者自朝縉紳以至四方之老成凡與宋公友者無不推許之以爲不可及余每過宋公退即希直讀其所爲文未嘗不擊節而歎其有得於文之妙也今希直將歸其郷大肆其力於文故因以此勉焉余自蚤歲徒盡心於文章垂五十而迄無成不知自勉乃欲勉希直寜不知愧然希直得余􅀃而及時以道德自任則又何至予哉此予之所以􅃱愛􅂇於希直也洪武十九年秋八月望日古詩贈希直葉見㤗吾友方濟寧其人世希生有如炎燉之雪曙天之星平生特立不徇俗窮年矻矻惟究心乎羲文周孔之遺經一旦起作郡卓然爲群􅀺之怙恃列牧之儀刑九原長往不可作使人思之泫然􅀟涕零我言濟寜今不死濟寜有子字希直外焉才華巳絶世内焉持敬恒惺惺往年我謁宋太史見之坐右愛其風神秀發目光如月􅀟眉青太史文章擅中土東播踰若木西流入麊泠毎稱希直禀間氣旁馳餘子猶以清渭臨濁涇太史猶巨鐘而我猶寸莛我誦蕪陋辭一一爲我側耳聽只今逺行不可覿送入樊籠仍剪翎我歸巳五載俛首􅁼拘囹每一念疇昔中心若生螟今年希直忽相過使我洒淚如醉醒握手塵市中頋影两蛉䧺文細字塞巨帙咄哉著述能爾馨振􅃑快讀不可了雅辭宏論開心扄其顯遏雲漢其幽通窈㝠贍如戈甲積􅀳庫竒如盤􅂦鐫商銘麗如勾芒青春布花卉壯如隆豐白日驅雷霆千流萬派怒奔放終然帖帖趨東􅈚頋我歛退餘守口動如瓶今日得子文躭誦不暫停有如赤日途觧渴得楚萍又如藜藿膓忽咀五侯鯖􅃈􅃈彼何人廼工月露形劃然周廷覩巨燎光影不復窺微螢嗟哉希直執經太史門聞禮濟寜庭以文比行行益峻持以用世不啻如養生之􅂖粟濟疾之參苓胡乃僻處東海裔坐閱晦朔彫堯蓂我欲其爲不朽計鋩鍔淬礪重發硎至音詎能秘錫鸞荅和鈴直湏上追虞書嫓周雅豈肯下比秦誓方魯䮐于以作春秋之羽翼爲禮樂之藩屏嗟哉載道噐孰謂在世猶芻靈上帝閱世憫斯文寜復下取􅃙六丁水爲江漢星作斗鐫之金石垂千齡洪武十年夏五月吉日送希直逰金華同邑許􅁇士脩良㑹古所惜光景不可􅅏故人今有行岀門復悠悠晨鷄號逺陌行色滿道周惻愴意莫宣慷􅁣意難酬願言力古訓所貴德業優千里從明師豈徒事逺逰川原􅄅何極仰止在山丘余生學苦晚賢哲忽我􅀹頋乏馳騁力重增離别憂遙遙金華道逸駕邈難儔瞻望两相失從君去無由願爲東南風吹上八詠樓願爲雲端月照彼􅀟溪流君情諒不違我心復何求荅希直許􅁇婺嶺隱天末遙思正屬君慰情來逺札動目有新文逸􅂹莫並駕離鴻常念群山空歳華晚舊話㡬時聞送希直應聘赴亰許􅁇陋學窺千載古今極寥寥竒才不世出先哲何其遙方子間氣英孤鳯翔九霄經史歛胸臆早歲能充饒深造入玄閟精研味􅃾膏發爲五色文光􅆋萬丈高吐辭信雄筆江河勢滔滔聞者但縮喙白首慚俊髦受知濳溪翁恩義猶同袍顧託有深意􅀭言豈虗褒聲價凌海嶽山澤焉久遨神珠隱自現寳玉終難韜中使隆優禮特起推賢豪天衢麗雲日盛際冝有遭紀載小班馬明良慕䕫臯徽猷諒巳著榮名非所徼同郷託交􅁩春戀豈一朝因依附勁翮愧我腹背毛㑹難思少􅅏去馬疾若飈情至不能别病懷空欝陶聞希直自亰還許􅁇玉音初捧巳殊倫天意深嘉得異人衆謂歐蘇才復出我知孔孟道當伸賜歸使就林泉養期用􅅏爲瑞世珎一旦巳成千載遇高風矯首在清旻􅀉方正學内翰樂平程仕簡三十年前下董幃姓名早見註黃扉古今文字非無託天地精華信有歸金匱入編嚴斧􅃏紫泥承詔落珠璣斯文盛代惟公軰林下何曾有布衣正學齋記金華王紳仲縉漢中府教授天台方公希直僃神明之資􅀒正大之學􅁣然有志於聖賢者也蜀王殿下素加禮敬間嘗聘置右右以咨諏正道公見必以仁義道德之言陳於前王方大肆力於緝熈之學日以誠意正心躬􅁱體驗爲務與公論辨若律吕之諧肯綮之中無不脗合王愈加歛容納之與臣下言必曰方公今之賢者也遂賜名其讀書之齋曰正學期其底聖賢也公退以告于紳紳聞三代之隆大道昭著風俗淳厚人倫明于上教化行於下故人之學焉者多出於正周衰列國分爭人尚詭異各自知能自立門戸而異端之術競起矣若楊墨之爲我兼愛老􅆅莊列之虚無張儀蘇秦之縱橫韓非申不害之刑名管仲晏嬰之事功有不能枚舉者逮至漢唐世愈降而道愈漓著書動以百計其爲􅀃必曰我著書所以明斯道也而道卒不加眀我立言所以開人心也而人心終不加古非徒無益於人其所以壅塞正途聾肓耳目者爲甚大天下之士莫不隨波逐流而相上下其於聖賢之道遂若􅄮逕之異趨矣比之三代之學其邪正爲何如哉尚幸間有豪傑之士岀於其間足以回人心破邪􅀃挽頽波而振餘風然亦不能多見若漢之董仲舒其言明白坦易爲得聖賢之心唐之韓愈卓乎特立於百世之下皆間世之竒才也至宋周茂叔以洒落之懷得理奥於黙契心融之妙及其門者若二程子之主敬行恕窮神知化而道益宏逺矣其後新安朱子出又能推明周程之㫖而集群賢之大成於是世之先後雖不同要皆羽翼斯道而所學純乎其正者也故自三代之下論者莫先於宋有元之時若許衡氏若呉􅊹氏若許謙氏軰彬彬和附于下者蓋莫非朱子之傳嗚呼上下千數百年求其人僅僅如此而邪􅀃之惑人反有過之則夫凌高駕虚勵志鼔勇而跌足於異途者可勝道哉此志士仁人所以扼腕而深悲也今公才足以振俗德足以服人生逢聖明之世而又遭遇賢王之眷頋則所以追諸子而遡三代者公其可無意乎紳識志卑淺於公之學無能爲􅃥幸嘗辱知於公􅇰久故敢竊公之餘論以繹􅌖念之萬一苟以爲然則􅁇今以往益圖執鞭以爲御焉荅方希直先生書王紳紳向時嘗立於道邊見有行者揖群兒而問曰某將往于某敢問何之群兒指曰當從此往有頃行者悔曰群兒之言不足信乃更揖於父老父老曰當從彼往行者從父老言果得周道以此自懲學問之道果何異哉自孔孟􅃿後道術分裂百家並起各自以所見爲言上下數千年其人不可勝數大抵皆得其一而遺其二剽其末而失其本者也甚至敗道傷化流毒遺害者有之况至於今風俗愈漓教化愈敝則其言又豈不甚乎此豪傑之士所不􅃘見而自黙稍有志者當慎擇而聽信之也紳質性愚陋固不能立言以攻之然切欲慎擇而聽信四五年來問道之心甚切群兒之言喧􅅝闐閙于耳者亦不爲不多及求如父老之言惟執事也故紳於執事之言毎心融神㑹㫖解意通獨恨力不足耳苟其可强雖水火在前弗頋也今執事乃惠書以紳能聽執事之言爲奬嗚呼以善道告人而從之人之情也又豈紳有過人也哉雖然執事所謂知言難遇發口祗覺無味故黙黙自解此則紳之所惑者也自昔聖賢之生豈必逢聖賢而後言皆俯躬曲就喋喋而誨之惟恐其道不明也孔子嘗環轍於魯衞陳宋之􅀖至老不倦後雖有無言之歎然亦發憤之辭也孟子奔走於宋梁之國汲汲以仁義闢邪􅀃時人不察或譏其好辨而孟子不沮觀其所爲可槩見矣今執事僃精誠之才蓄純明之德日以立言明道爲巳任而期底乎聖賢之域庻日談論於衆人之中是者進之非者斥之使開其心化其質是其冝也胡爲黙黙以自解無乃與孔孟之心異乎雖然紳之愚世所不取而執事且教之又安知執事之言非孔孟之意乎從以紳受執事之知而不以是爲復是負執事之心也又豈紳之心哉上侯城先生書先生又嘗號矦城生王紳君子負天下重望者必有副之之道也然言其衆非一士安得人人而誨之哉言其久非一時安得日日而語之哉古之立言著書者正以此也紳切見執事以英妙之年早属天下之重望然而副之者非無意也第恐有所未盡焉姑以近日目所及者言之自􅆗而入見于王口談堯舜周孔之道日閱書詩六藝之文及申而出接見賔客學徒者十數軰扣之以律而應之以律倡之以吕而和之以吕無不各中其節其用心亦云至矣而其勞亦且甚矣然復以爲言者蓋以陳于王前者雖甚盛而㝷丈之外人不得而與聞也接于往來者雖甚羙而閭巷之間人不得而共知也是則執事窮神憊力於一日之中而所及者止此則又何以慰遐陬僻壤之望哉此紳之所以拳拳望執事立言著書以明道也且道之不明亦巳久矣自孔子􅃿異端並起至孟子麾而斥之其言見於七篇之書其書雖爲門弟子之所記述然莫非其精神心術之所萃後乎萬世斯道藉之爲保障生民􅀝之爲粟帛其功不在禹下者豈止及數人而利一時哉其後若荀卿若司馬遷若劉向揚雄班固軰莫不各以著書爲事而其所至亦各不同惟韓愈獨不喜著書故張籍切切爲言愈請待五六十然後爲之紳未嘗不慊于懷以爲著書必待五六十且萬一天不假年則賈生之策不及陳而文中子之中􅀃不及著也切意愈之卓立豪傑邁于近世其書之不著固不足爲其重輕第人之仰望者不無觖意焉今執事之才之羙固將轢馬劉駕揚班而底孟荀也天下之所仰望者豈外此哉執事苟不亦有以副之吾恐望之弗得必􅁇之以怨怨之不止必随之以詆且毀也或者又謂凡著書必其道不行于時故托於書以自見耳今侯城藴才蓄德筮仕云初方將駸駸見用以究其志奚以空言爲事乎􅂚思大上有立德其次有立功其次有立言其並列非一日矣孔子亦曰有德者必有言未聞立德者棄事功而建勲業者遂忘言也周公其德大聖也其位􅃁宰而攝政也其言散見於詩書周禮也迄今未有病之者而著書豈足以病執事哉今執事之德厚矣言之見於文章日用者大而至矣苟遂因而筆之於書則雖安處一室終日如愚而逺近之人均受其惠矣何必窮年竟月披寒冐暑奔頓於道途以副人人之望而卒不能周其望乎惟執事其納而圖之上矦城先生第二書王紳向者不揣愚惑輙獻瞽言於左右蓋祈執事立言著書以振天下之聾盲情激于中不􅁴覼縷執事以爲然耶談􅀏納之俾副其望可也以爲非耶訶叱而麾斥之不爲過也今旣不遂其請頋乃賜荅以千數百言若有所論辨者􅀹見執事之德之弘不以言之不善而遺之獨固守其謹撝而不變又且道之使盡其言者是豈紳之所敢望哉然而有不可巳於言者故不得不終其􅀃也執事懲揚雄王通之徒未明道而著書爲無益於世遂欲躬顔子黄憲之行俾黙黙無片簡之可傳而後巳是猶懲人之病風而惡出畏人之溺水而􅁍游也不其矯之太深而過情也哉且天之生聖人也豈特獨厚其身邪亦將用其有餘以備其不足爾觀乎堯舜禹臯陶益之典謨高宗湯武成康伊傅周召之訓誥若孔子之所以刪述曾子思孟之所以􅁇䋲其大要皆所以成巳而成物也以是聖人雖不世出而斯道不終泯者以有斯文之足徵也今執事又謂斯道近世大儒剖析刮磨具巳明白縱著書不能加於孔孟故辭讓不爲是􅀹不可也且所謂成巳成物之道六經巳具載矣孔子無言可也而猶不忘於弟子之問荅孔子大聖也其言該􅀶無遺冝若無以加矣而曾子猶用心於大學子思親承曾子之授且聖人之澤未逺可以忘言矣亦汲汲扵中庸孟子時異端雖起苟舉聖人之說而闢之亦可矣乃反覆乎七篇之言至周元公道絶千數百載文獻昭昭尚在也亦必以心得之妙筆而爲書其後若二程子若張子若朱子若吕子軰莫不各以著書爲事其餘紛然作者不暇論彼諸聖賢者豈不知天下之道一揆也聖賢之至不可等也然且鰓鰓焉若此者所謂畏天命而悲人窮至仁之心也今執事言行皆取則於賢哲頋獨於斯而避之此紳之所以未曉也且執事之所以脩于巳者美矣而士之所以望於執事者亦至矣正冝􅃦不安席食不下咽拳拳夜以􅁇日而圖副人之望尚何暇恬居妥䖏而俯與紳論辨去取乎哉惟執事深思而毋忽與童景庸書王稌叔豐仲縉先生之子王稌􅂯拜書奉景庸契家兄長執事二十四年之别山川阻脩莫遂一會晨夕惟翹企尺素之書稍慰契闊至今未奉一字其於馳戀之懷奚啻飢渴去秋得剡西孫孟昭書知有教翰至東陽煩單宗陽付趙希德轉逹舎下不意希德領書遂一疾不起後問其諸子竟失所在惟增悵恨而已兹會貴邑祁姓啇人詢知使門與其同里葉宅有􅊚聮之雅從而􅀗審文候動􅂂廸􅁻賢伯仲均綏多福爲慰僕今歲假舘於金華郡城義士􅀽仲仁家童冠呶呶遣日學無寸進徒於世有生無益死無聞之憂懼耳視執事賢伯仲德脩而業廣文雄而名振士林者不可同年語矣敝郡斯文寥寥濳溪文脉之遺僅有浦江鄭義門叔度先生檢討叔美先生乃弟叔端先生三數公而巳聚會間談論同門往事未嘗不􅁣然興歎先師遜志齋及先人諸公之不作而深有羡於賢伯仲能􅁇斯文於兹時也遜志遺文鄭氏收輯四五冊缺逸頗多長史公每從僕抵貴郡會賢伯仲補完之貧病多故未卜何時可遂僕痛念遜志名蹟日就湮沒欲執事與令兄商􅃀捜輯其學行幽濳生卒始末爲家傳行狀以傳同志有愛慕之心者自能黙識而謹蔵或可待時發􅀭於萬一此事惟賢伯仲從之久而知之深餘恐未能􅁀白其志而遜志冥冥間寜無望於賢伯仲乎􅁧次成幸附便來或躬造義門一遊甚佳遜志表姪鄭季温珣近有消息否或歸隱鄉里執事幸嘱其來與僕一會或可謀往聚寳門旅殯之所負遺骼歸瘞故里此區區之素志必欲行之而未遂也執事幸加深察因祁歸便特此􅂓逹逺懐餘不能悉惟萬萬自愛以副交逰逺望方先生小傳郡齋舊刻先生方氏名孝孺字希直一字希古嘗以遜志名其齋蜀獻王更之曰正學世􅁛正學先生逺祖自桐廬徙居寜海父克勤洪武初擢知濟寜府言行政事名一時母林氏元至正丁酉生先生生時有木星堕其所􅀟瞳炯炯如電甫髫齓日讀書積寸人以其善属文呼爲小韓子十五六時侍父濟寜歴齊魯之􅇕覽周公孔子廟宅問陋巷舞雩所在􅁣然有愿學之志洪武八年父􅀍誣逮獄上書政府願以身代不報明年以文謁宋公景濂深驚噐之名流老軰皆讓不敢及會父㘴空印事草䟽將詣闕伸理而父没扶䘮歸葬又明年宋公􅃱仕還浦陽復往卒業凢四載辭歸公㝷徙蜀先生欲往省不果爲文􅈼天願輸巳壽以延師齡洪武十五年上用呉沉掲樞等薦聘至陳􅀃多􅁛㫖上謂樞曰方孝孺孰與女對曰十倍於臣上以是不􅃘輕用諭遣還家數年復辟至上知先生志存教化謂群臣曰今非用方孝孺時乃除漢中學教授蜀獻王延之䖏以賔師恒曰方先生古之賢者也先生久于蜀因得訪宋公墓䘏其􅀌遺癸酉丙子校文京府三十一牟戊寅大孫嗣召爲翰林愽士㝷進侍講禮遇甚重當是時天下識與不識咸仰之以爲顔孟程朱復岀旣靖難兵下城破嗣君亡文廟納姚廣孝言召用先生不屈死之夷其族時革除建文之五年永樂元年也年四十六所著周易枝辭周禮考次目録武王戒書注宋史要言基命録文統皆燬不傳宣德以還國禁漸開遺詩文始出于世賛曰方先生在當時名重行尊故得禍最慘然以身殉主自其常分而心之安也自晚宋來士習大衰先生無所待而興其志願學聖人􅁣然以經世宰物爲心謂三代政教鑿鑿可行於今其本在脩身故篤志力行箴儆之道無不備心事皦然無毫髮可疑信子曾子所稱君子人也誠得師孔子將不爲曾子矣乎正學先生事狀臨海陳紀先生名孝孺字希直姓方氏裔出桐廬玄英䖏士宋初徙居寜海緱城里曾祖子野祖烔元鄞縣儒學教諭父克勤母林氏以至正丁酉先生生癸卯毋没時方六歳哀慕如成人洪武􅉝亥隨父知濟寜謁曹國李文忠公公禮貌之期爲國士乙卯父被誣下獄上書丞相府願以身爲軍贖父罪丙辰以文謁金華宋太史公于翰林公視其凝重不遷於物頴銳洞釋諸理有喧啾百鳥中見此孤鳯凰之喜館置左右譚經歴三時會父㘴空印事草䟽將詣闕伸理值父没扶櫬歸葬丁巳太史公謝事還浦陽先生復執經往侍凢理學淵源之統人物絶續之紀盛衰㡬微之載名物度數之變無不言之析於一絲會歸大通毎粗發其端即能逆推而底于極見於論著文義森蔚辭濯然常新未始有竭進脩之功日有異而月不同僅越四寒暑而已庚申之秋歸省祖母公惜别因叙其素有之善朂以逺大之業且曰予所許者不獨在文後二十餘年當信其爲知言辛酉公徙蜀先生往省不獲爲文􅈼天願以己之壽年輸委乞延師命壬戍秋在郡城會葉林張陳四君子登巾山絶頂縱談千古竟夕不􅄰先生自以此樂乃蘇子瞻死後三百年所無也癸亥召至京以疾還壬申復召除漢中府學教授有令許至家與妻偕往癸酉閏四月到任時京府啓儲君四川遵蜀王命俱以郷試考文見徵先生辭四川赴京府甲戌春朝蜀獻王道經䕫得謁宋太史公墓而䘏其家王好善忘勢召對不名賜號其讀書之室曰正學學者稱爲正學先生自是書啓往復無虗時其賜教有曰闔門忠義爲百世光華先生謝云惟當克巳慎行益勵夙心體國忠君不負所學丙子考文京府戊寅高皇帝賔天皇孫嗣位召爲翰林愽士巳卯陞侍講命考文京府庚辰復司㑹試一時君臣道合有大制作若省躬殿銘凝命神寳頌御史府記東甌王神道碑銘皆岀先生手是時海宇謐靖幽州兵起先生憂國追惟劉中丞基爲之淚下未㡬天命有歸先生以死殉君至於夷滅不變上距宋太史公惜别時適二十餘年矣知德之深知言之至至是信哉爲文雄邁醇深所著述有僅存者然當時有禁又五十年郷之儒紳始蒐輯成帙鋟梓以傳南安守華亭張弼題其卷後曰篤信好學守死善道宇宙之間僅見此老九原有知亦足以少慰也夫予小子景仰先哲直以甲子書其所信者以示不忘弘治巳酉五月朔成都府正學方先生祠堂記臨海趙淵君子之學􅂚爲正持其志養其浩然之氣而巳矣是故志立則氣充氣充則人與天一無是氣天地亦㡬乎息矣而况於人乎吾台方先生希直蚤以聖賢自期其言曰學聖人者湏先識孟子學孟子者湏先識浩然之氣又自名其齋曰遜志蓋其平生所得力䖏端在是矣我高皇帝時両召語合稍除漢中教授蜀獻王復數延之尊之曰正學先生於是天下識與不識咸望之若孟子建文初累官侍講與决大機天下􅀝之若伊尹靖難兵至姚廣孝軰中以烈禍屹不爲動天下義之若夷齊若此者正孟子所謂不能􅁋不能移不能屈焉者矣非學之正志之篤有得於所謂浩然者耶卒之國禁開於仁皇廣孝奪於今上遺文盛流天下寳之蓋出於人心之同然而不容以終冺者如此頃淵逰蜀謂先生過化之地義冝建祠廼偕僚宷白于都御史唐公鳯儀御史丘公道隆旣􅂧聞于王王曰隆真儒以光我先王余責也於是承奉君周宣陶宣寗儀周􅄾者􅂧􅁣然各輸數伯金以襄􅌖德祠成仍題之曰正學初濳溪宋先生客塟於䕫獻王惠王凢両遷之其墓其祠則宋承奉景之所自營者而今祠則其東曠壌也越蜀幽明之遇似亦非偶然者矣嗚呼師生之緒君臣之義列聖列王之德此誠關一代大故而奚可以不書若承奉諸君之効義夫亦人所難者因并及之且以語蜀之多士相與㳺心於先生之學云嘉靖壬辰夏四月旣望祭文貞公文祠在漢中府學和順王雲鳯公博究經史高談仁義動息言貌必揆諸禮法文辭渾然天成浩浩洋洋冩其所得該括萬事􅁣慕三代之治自任經濟之重立朝未久殺身成仁百千萬年凛有生氣公嘗教授漢中未斬之澤于今猶在鳯按部過此率諸生稱公爲文貞先生㓗除一室題曰正學祠正學者蜀王賜公號也作主祀公俟後之欲知公者有攷焉謹告過侯城里有感金陵魏澤彦恩笋輿衝􅀨過侯城撫景依然感􅁣興黃鳥向人空百囀青猿堕淚只三聲山中自可全高節天下難居是盛名􅁍憶令威千載後重歸華表不勝情謁侯城里有感太平謝省侯城里侯城老人死不死萬丈文光射列星正流一派分洙泗忠肝義膽照氷雪烈氣慿慿塞天地神逰帝側騎箕尾行天還整羲和馭寒爲陽和旱爲􅀨精靈颯爽誰能閟冥交不用覔逢干􅁱􅁧王郞舊知巳又謝鐸我憶侯城人不見侯城里悲風忽何來令人淚如雨侯城西薄山侯城東逼海西山不可餓東海不可死千秋萬歲心悽惻竟誰語惟應劒光血夜夜衝斗起又謝鐸欲向西風酹一樽乾坤何處著英魂百年事過風前燭千古名傳海上村香火半龕誰地主孫枝一葉是君恩夕陽滿地傷心淚付與江流自􅄍吞謁正學先生祠堂吉安􅀽道我從東南行清風東南至往事垂百年行人口如矢大商有夷齊大唐有王魏稽首拜先生地下知誰愧附家傳故愚庵先生方公墓叛文宋濂嗚呼自我齊國文公紹伊洛之正緒號爲世適益衍而彰傳道受業者㡬徧大江之南而天台爲極盛時則有潘子善氏林叔恭氏趙㡬道氏兄弟以及杜仲良氏如此者不能徧舉皆見而知之推原體用之學敷化弘治而風動於四方重徽疊照於斯爲至流風遺俗迄今猶有未泯若我愚庵先生方公其殆聞而知之者歟先生諱克勤字去矜姓方氏其裔出睦州玄英處士干宋初十五世祖廿四府君某始遷寜海侯城里曽大父重桂郷貢進士大父子野父烱元鄞縣儒學教諭母葉氏宋丞相夣鼎從曾孫女也先生㓜而端凝五歲知讀書自辨章句十歳暗記五經諸老先生嘖嘖愛賞目爲神童年垂弱冠徧窮濂洛關閩遺書及㝷郷先逹授源委凢渉性命道德之秘窮研探索􅃦食爲之㡬廢因喟然歎曰爲學必合天人而後可舎是非學也至正甲辰甞一踐塲屋言國家利害峭直無所顧忌有司不敢取飄然東歸益閉戸潜心于一卦一爻必欲驗諸事爲至於天文地理禮樂刑政及制度名物之屬亦辨析歸於至當如指諸掌會海民爲變江浙行中書檄呉江同知金剛奴募民爲水兵先生詣金剛奴謂曰民計窮而爲盗未爲盗者亦挻挻欲動柰何授之以兵是謂增盗非禦盗也金剛奴怒不荅旣而水兵果於中道殺護吏逃去從盗金剛奴踰垣走折一足始悔曰吾不從方先生言以至於此未㡬侍御史左荅納失里至郡招諭劉都事基爲之副先生上書陳勦殄之畧不宜姑息都事韙其言而不能用遂􅃱郡縣䧟􅃿民罹塗炭先生發憤入山谷採松栢食之累日不返當路延先生入幕府先生謝曰我辟􅂖久矣弗足與人間事也呉元年冬大明兵取台州先生欣逢真主之出乃大有爲之時䟽舉賢才安人心黜豪強除􅁀歛明教育十餘事將上之未果洪武二年詔立郡縣學以訓導辟先生樂於育才即起應命􅀒笈來從者至百餘人先生據經陳義曲暢旁通㡬無毫髪遺憾聞者皆皆淪肌浹髓薫爲善良俄以母夫人春秋高力辭而歸諸生追之者踵相接學舎爲空四年夏朝廷聞先生賢欲􅃱之部使者􅀽君宏以書幣來徴先生以母老不􅃘離左右辟去旁縣郡承使者風㫖雜逮婣連督索之先生上京師两詣執政固辭執政竒先生材命就銓曹試考覈入格名列第二上特命知濟寜府事階朝列大夫錫之冠帶以行先生至官爲書一通懸於康衢諭上愛養元元之意民有所不平詣府自言禁吏胥不得呵問日引􅂄耋㘴語訊以得失郡學官缺孔子廟堂頽圯聘前進士爲師弟子貟有未備者􅃟􅀘之役浮屠以葺廟堂廟南鑿爲泮池傍列两序闢射圃於廟北造弓矢樹正鵠日一􅂯視學親爲正句讀較中否属縣之内社各立學學凢數百區學子繫籍者二千人兵後號爲最盛始有詔民闢廢田者閱三載乃稅吏徼近功不俟期歛之復以田定起科繇民益隋田不增闢先生與民約定爲簡書列爲丁産爲上中下三等等復柝爲三毎有徴發恒視書爲則吏不敢並縁爲姦歲且暮轉戎衣于燕時有令役民舟者有誅别郡以牛車從事天雨雪牛僵死于道破産者十八九民請以舟就役僚佐畏令難之先生曰吾知從民便抵法非所辭也即載以舟具白山東行中書省省義不問郡倉絶糧省檄民七百里轉粟青州民病不能適漕運者自淮安輸濟南道出郡境先生欲就輸郡倉而俾濟南􅃱青州告于行省弗聽即以聞戸部戸部奏可行省臣愧之郡城壞故事築以兵指揮使挾貴人勢當五六月聚民萬餘治之民不得田哀號而即工聲聞數里先生􅁬曰民病不救惡用二千石爲宻聞中書同官疑且得罪不敢署名先生獨署之胡丞相惟庸以聞即日詔罷先是不雨先生袒跣徧禱群祠涕泣卧祠下誓不雨不還至是詔下民驩呼而散大雨如注是歲五􅂖俱熟民歌曰孰罷我役使君之力孰成我􅁰使君之雨使君勿去我民父母自是連三歲三禱皆有年五年秋隣境盡蝗先生省愆變食稽首告天夜聞空中甍甍聲燭之乃飛蝗蔽天而過郡獨有年民有赴愬者隨事則决大者笞辱小者諭遣之不㽞案牘􅀹慎於庻獄月録日省不使久淹或文有未具時作麋徧食之夏秋之稅毎命斛卒持槩高下岀其手或至累旬不収民競指倉爲穽先生令民自槩斛卒歛手不敢出氣遇將西成預移文與民期民爭來輸不遣一吏而稅常先登江西浙西二行省運糧百萬濟寜水陸數千里先生視如部民不使有錙銖怨懟舊比毎斛益四升以禆蠧耗先生憫其道逺言于朝蠲之府召州縣官屬皆役皁􅀠往往索賂無厭先生下信符置郵無敢不至者信符之籍以印識而中分之吏托月日稽違以媒利先生私蔵之緩急有程一自巳出復行其法於封内壹以信符召民民得竟并力耕桑襁負來歸者相望于道初赴官時戸僅三萬稅萬餘石三年之後稅以石計者十四萬四千七百戸亦增至六萬有竒二州二十縣家有積粟野無餓莩羊牛鷄犬散被郊垌富庻充實如承平之世至於社禝山川諸祀先生􅁱崇壇壝嚴􅅚噐服或樹名木於周垣之外一如儀制無有所闕水驛在西門内庳陋汚濕居者弗寜先生料揀材木候農之􅂩更作於城南庭堂室房弘敞逾昔冬寒河凍驛舟不行令舟人伐木爲炭穿土穴蔵氷因其餘力以成事功泗水經郡城南通淮江北引河濟地勢高㵼搆石爲牐而時畜􅂥之魯橋棗林二牐歴歲久壞石填河中舟道難之役牐丁絙壞石治􅁅而甓之故以葦囷庤粮火屢爲災教民爲陶瓦營屋百餘間申戒火令編民居爲曹伍遞相救恤其患遂止大將軍魏國徐公逹副將軍曹國李公文忠統士馬十萬之燕駐郡稍久要官勢吏爭索粮芻相膠􅁑于前先生依序酬决無不如意一軍􅁛能永嘉侯朱公亮祖將舟師數百艘北征河水涸舟膠不可動脅先生曰即趣五千夫浚河否則以軍法論日且暮先生不􅃘煩民泣禱於天夜二鼔天雨􅀺明水起數尺舟竟去莫有言者先生爲政以風化爲急務以德勝佐貳始雖倨慢先生委誠待之卒自愧服武夫悍將不知禮久亦化戢在官縱無事終日冠衣㘴堂上召諸吏授以書詩法律或公牘堆几群辨方譁先生片言折之各心恱而去性不喜近名常自誦曰近名必立威立威必至害人吾不􅃘爲也府庭之間不陳杻械革鞭懸楹間示不妄罸省憲考績爲六府最八年春入朝皇上以爲善治民錫燕儀曹使踐其舊軄瀕行奬諭有加且曰政成當顯用卿秋八月知曹縣事程貢嘗以不軄被笞心衘之上封事言狀詔御史楊某廉按楊適程故人恐程㘴誣罪易民服潜索先生過事踰両月無所得乃捕府中卒吏盡繫之搒掠無完膚無一可問者楊更與其吏謀誣先生用倉中􅁅葦時十月固未嘗附火而葦則苫公宇垣實無私用者先生不與辨遂就逮民號呼填道随行百餘里者將千數先生次子孝孺上書政府大臣願以身爲軍贖父罪不報竟謫役江浦㑹空印事起吏又誣及之孝孺復草䟽將伏􅊴上訴而先生殁於京師九年冬十月二十四日也壽僅五十又一孝孺與兄孝聞奉柩東歸十年春二月二十四日窆於縣東北深灣童施山之原禮也先生娶林氏諱􅁎婦道爲一族冠先十五年卒至是合塟生子二人即孝聞孝孺孝聞年十三居母之喪不肉食至服除人以純孝稱之女一人􅂯娶王氏諱在生女一人未彌月而王卒少房董氏育之董氏生子一人曰孝友二女皆在室未行先生靣自如玉須眉秀整不妄咲語動容周旋必合禮法兵亂􅀒母逃入深谷両踵血流遇二弟訓育備至終身未嘗失色與人交率真任質不事表襮不以久近爲冷熱立談之頃洞見肝膈南冠過郡者必以米醪饋之不能歩者僦舟車送之萊蕪丞陳川欲迎毋爲養厄於無貲出錢五千助之同列以事奪禄買布帛給其用且日延之對食久而不衰脫逢其飲醉投案太詬而去待之益恭及酒解來謝陽若不知者曰昔之夜吾亦醉矣不識君何謝也生平奉養簡素不服紈綺御一布袍􅁆載不易日不􅂯肉不治官事輙􅁍肉不食所守㢘甚絲毛不取諸人毎行縣以物自隨杯湯不肯受兖州守因童進二水􅀲笞童十召州吏還之郷人有爲饒陽令者以燖雁侑書力􅁍去乃巳初至官時禄米一斛可易金三両以軍食告乏月取十斗爲食餘悉儲于倉或􅀹其迂不恤也晚年益加畏慎晝所爲之事夜則白於天俯仰皆無愧怍榮辱利害恒視之若一坦然不疑古所謂體道成德之人先生誠庻㡬焉其爲文章質而不華平而中理有汗漫集若干卷傳學者云濂私自念齊國文公之薨殆一百七十又九年而其學䆮微譁世取寵者徒剽掠爲談辨誇多闘靡者務組織爲篇章文公所以扶世教淑人心者率棄爲空言故其臨事之際仰攫俯拾唯恐利不入槖至有庸夫賤豎之不屑爲者嗚呼可嘆也巳有如先生聞風而興乃能誠求實踐參前􅀝衡儼若上帝鑒臨􅉼養旣純發舒自異仁民善俗之政至今人人能道之大命雖止於斯而其率性會道無愧於文公者尚皦然弗誣也孝孺久從濂受經頗知先生行事之詳於是歴叙其故而繫之以銘銘曰堂堂齊公命世之雄伊洛正傳實爲大宗入天出人完傳翼經有遏必䟽無幽不明疇不皷篋千里來過燦如聚星惟台獨多流光所及寜有翳昏掲彼日月輝于天門逝者沄沄滅景銷聲不有人豪聞風孰興猗歟先生行知尊聞養氣弗餒充乾塞坤實孚名随上徹九天鶴書翩翻降於丘園爰自布􅅊專城以居象笏朱衣於赫其儀寵恩之加其廣無垠曷以報之誓不顧身敷宣帝仁逹于齊垊以煦以嫗以􅃱其亨民或勞只如魴之頳乃平更繇俾遂其生􅃛胥舞文其貪若狼乃障乃防而扼其吭人相告言久嬰亂離父母孔邇我胡弗歸十百爲群其來如雲操􅍏耰鋤以播以耘我行其原萬桑沃然俯瞰于隰􅁰苗芊眠鄰多孽蝗刺天而飛避不入境絶􅀋有知真儒之效小試則殷誰曰漢吏專羙其循太龢薰蒸郁紛輪囷自此而升何澤弗臻大命止斯傷如之何視天方高淚如懸河我又奚嘆數竒則然中心無慊生順死安善人殄瘁斯道之衰顧瞻無依胡寜不哀崔崔者岡􅄅􅄅者陂其中有墳千載之悲方希學傳方孝聞字希學先生伯兄也少有至性年十三䘮母輙稽典禮䟽食水飲彌越三年及父卒㫁酒肉居宿于外祖母亡亦如之毎一號慟聲盡氣極嘔噦岀血扶而後起於是䆮成羸疾行歩傴僂然守禮益確親戚郷閭莫不稱爲孝子家素貧窶一錢寸帛不私妻子奉尊撫㓜衣食賓祭喪塟婚嫁費用百出經理補葺以身任之曲中儀節儉而不陋平居未嘗去書徧學五經而䆳於易精求聖賢㫖趣由􅃱知而誠身由親睦而愛物務䔍踐􅂂不爲空言發爲文辭理深意逺存心仁厚接物和恕里中有争訟者不至郡縣而相率以質是非開以一言莫不恱服德器完精才具優長通逹世務議論甚偉先生嘗曰某所以粗知斯道者非特父師之教抑亦吾兄之訓􅅚也卒于家見修史私録及赤城新志石龍集方希詩方孝友字希先生季弟也舊傳文廟召先生草詔不屈親屬皆就戮先生目之不􅁴淚下孝友乃口吟一絶阿兄何必涙澘澘取義成仁在此間華表柱頭千載後旅魂依舊到家山士論壯之以爲不愧先生之弟云方氏二烈女傳臨海章嶽正學方先生一門四節之盛世所共知而二女子之死則或未知先年天台老儒西軒王宗元九十歲時與石梁王君度言嘗授經烏傷山中有祝監生者老矣謂及見西楊閣老嘆方先生二女當先生死時年俱未笄被逮過淮相與投橋水死其事甚烈當時西楊欲爲傳未就西軒以属王君曰子可遂成西楊之意後石梁由南部岀守建昌亦未及爲當時嶽與石梁之子㣧東實與聞之兹因重刻先生之文録此附載集中以見先生篤學守道不貳􅍏心而死君難精誠薰浸家庭閨閫間雖二小女子臨變赴義視死如歸不懾不回與先生伯仲之死同烈者講之素定也或者人得併觀於此益徴先生立言無虚語真足以昭方來起後學不惟見道化攸孚且使人知反身激厲處常變兹心則同當不􅃘以丈夫子愧于方氏之二小女子云嘉靖庚申仲冬新刋正學方先生文集序臨海趙洪洪自髫年聞諸老成稱先生之道德文章岀乎天性始生之夕有木星堕於其所􅀟瞳烱烱如電弱冠日讀書積寸從金華太足公游時所收皆天下士先生五經百家皆巳醖藉下筆翩翩盡聖賢膏􅃾公深驚器之以爲莫之與京􅍏考守濟陽坐累先生數請以身代獲原洎應詔擢蜀府教授引道匡主獨秀於玉葉中㝷用交薦内閣一時􅀝重凡將相間所爲惟先生之咨四方夷裔得一字珤於至璧晚路碕危皎皎大節出人所難先生易之今猶薰灼耳目也噫先生之淑􅂂如此冝天有以培祐之而澌蕩慘於無遺如此豈理也耶自古有然又何云異先生之文􅁧述􅇰多大足以包天地近不離日用之常皆雋永乎道德之語而意獨至而其論辨之高逺超昔賢之見今其縹囊儲牣不可得而覩矣幸而掇乎嘘燼之餘所謂存什一於千百者也中間在蜀之作皆友人侯君􅀖彦得姑蘇編脩陳公之所傳録與夫􅀶采士夫間之記誦凡詩文二百六十七篇吾鄉之士肆畏道􅍏事什襲珍蔵無由裒采洪竊惟春陽已舒江漢旣濯應不屑於毛疪矣廼於寒暑之暇􅂢俸募工繡梓以圖壽傳悉手所繕落於天順六年六月望日考於次年四月望後一日也尚恨􅀌陋寓僻乏好事同志與之共成而諦訂焉魯魚中存凡經目者其加宥正又當知先生之文不冝以文視文而以之求道得先生之心可也雖然先生之功德固不資文章以顯先生之文章亦不假洪以傳然洪之所以疲於僣盭而不少爲輕重者特爲吾郷餼羊之計云爾苟居隱墅而如是存德義以善里閈歴仕階而如是持忠節以奠朝社庻乎不忝所生而可以闖聖藩矣或者典刑具存豈非鄕人之美觀也哉豈非先生之敷錫也哉又惡知非先生之所望於後人之志哉凡我知愛苟私所遺惠然輻凑洪當倩巨筆以書成美敢蝕厥雅邪時天順七年歲次癸未夏四月望日新刋遜志齋集後序謝鐸右遜志先生文集三十卷拾遺十卷爲文千二伯首總若干萬言於乎先生之文不見於世也久矣天順中趙教諭洪實始鋟梓以傳旣而鐸與文􅃟黃君孔昭頗加蒐輯於是葉文莊公盛秋卿林公鶚王忠文公之孫汶諸所傳録者皆稡焉旣又從柳别駕演盡得常人之所蔵者視昔蓋不啻倍蓰而先生之文乃始稍稍以完今年春寜海令郭君紳聞之以書來曰先生邑人也是不可廢願益得以傳諸梓鐸與文􅃟君亟喜而授之或者曰先生之功業雖不盡見於當時其道德在天下蓋有不可掩者文直其餘事耳而又何以其傳不傳爲先生意哉鐸曰不然文者道德之著而功業則又文之見於行事者也伊周孔孟之道德功業盛矣千載之下匪由斯文之存曷從而知之又曷從而傳之乎且至大如天地至明如日月其疾徐之度盈虗之數猶必有待乎人而况於人乎故欲傳先生之文者非徒爲先生計也爲後之人慕先生之道德欲盡求其功業而不可得者計也先生之文非吾台所敢私亦非予小子所得而贊特以著令尹之志於不忘且以告夫天下後世知誦先生之文者令尹又嘗即先生故居求所謂祠堂者而新之蓋洪熈初先生之遺族得從寛法而爲之者也常本舊稱遜志齋集者訛缺爲甚謹具存之不敢别有所更益教諭之編有的知其非岀於先生者乃不敢取其曰正學者蓋蜀獻王所賜遜志則先生所自號今并入之以復其舊而其續得者當更爲别録云成化巳亥冬十月朔新刋遜志齋集後序黃巖黄孔昭孔昭自㓜習聞先生之名於郷長老私謂先生學本天成非人所能及也旣長稍知向慕求先生遺文而讀之則知先生之學雖浩瀚如江海運動如日月變化如􅀑神而其所言無一不出乎日用彛倫之常蓋皆愚夫愚婦之所能知能行而天地聖人之所不能外嗚呼先生之學固孔子孟子之學也學者欲學孔孟之道孰得而後之哉惜其遺文散佚天下僅見趙教論刻本孔昭乃與謝侍講鐸日加訪采而其邑之秀彦猶能各以所蔵來告遂合葉林二亞􅀸王李二中書與柳常州之所得者彚次之而是編成焉於是先生之文亦庻㡬其全矣然先生之學巳不愧存殁文之全不全亦奚損益哉惟吾後人小子欲求先生之道者非此則無以考其全也集旣成福建林僉憲克賢寜海郭縣尹紳各以書來請壽諸􅎚孔昭與侍講圖斯文永乆莫如先生桑􅎚之地故奉以属郭尹郭尹又蒐訪於其邑得詩與文若干首附益之方經畫召工而金義士明陳訓導熈鄭學究公詢秀才楊顗金逺軰咸􅁬義助相校書董治各有司任不日月板將告成嗚呼於此又可見先生德澤之在郷邑者愈久而愈不忘也雖然是集也㧕豈吾台人所得而私之哉庸書諸末簡以告天下後世之欲知先生者成化十六年庚子夏五月朔日書方正學遜志齋集後張弼二十年前瑞安楊元霽知吾華亭嘗岀方先生遜志齋藁見示乃録本也且道先生大節頗詳謹讀而妄書其後曰篤信好學守死善道宇宙之間僅見此老後得刻本則又加多􅀼謂孔子此八字而豈過也乎猶以見之未盡爲恨今年二兒弘冝知寜海乃先生之􅊴里也得全集十二本􅀉南安秉燭疾讀掩卷深思如讀程朱之集喜而忘􅄰而又不􅁴涕泗之交零也嗚呼學之正養之充行之確而此八字未爲過也三代而下可考其詳者大節或有之所養所學恐未逮乎當時有以歐蘇擬之者冝其弗屑也我朝以宋濳溪楊東里爲文章稱首然恐亦不當出其右乎於乎以文章家目之殆非先生之知巳也於乎九原可作舉世皆當奔走爲之執鞭如遇孔子不知以三仁許之乎嗚呼成化十八年壬寅五月之吉書重刻遜志齋集後先生王者之佐于時以彼其才易服就列宜􅃱卿相之位究􅍏謨猷頋豈與唐王魏者等先生不此之􅂅悲椘抗激至磔身沈族而氣不少回凢以存君臣之義爲天下防也嗚呼忠哉抑有功於昭代深矣雖報䘏闕然而遺文盛流斯固列聖之惠與文始集于趙學諭洪至禮部尚書謝公鐸工部侍郞黃公孔昭益廣捜之得若干卷刻諸寜海木今慢矣乃會黃叅軍綰應吉士良趙大行淵刪定僞謬重刻斯編以行于世俾知夫􅁬大忠者本如此云正德庚辰仲冬朔守台後學姑蘇顧璘識臨海縣知縣黄誥黄巖縣知縣張師善台州府儒學教授尚芳訓導李深黄巗縣儒學教諭文程府學生陳縝葉琰王梅齡臨海縣學生李臨􅀸戴濬之黄巖縣學生孫思光牟汝鈞校對遜志齋集卷附録終
