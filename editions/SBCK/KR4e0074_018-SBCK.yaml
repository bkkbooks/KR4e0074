front:
  text: 遜志齋集卷之十八
  hash: sha256:ce09d472bddc954fe37be2ec492201da35bbeab42794941c22d2eba4dc50175e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4e0074_SBCK_018-1a}
body:
  text: 中順大夫浙江按察司副使奉勅提督學校雲間范惟一編輯奉政大夫浙江按察司僉事奉勅整􅅚兵備南昌唐堯臣校訂中順大夫浙江台州府知府事前刑部郎中東呉王可大校刋題䟦題大學􅂐書正文後大學出於孔氏至程子而其道始明至朱子而其義始備然致知格物傳之闕朱子雖嘗􅀘之而讀者猶以不見古人全書爲憾董文清公槐葉丞相夣􅂦王文憲公栢皆謂傳未嘗闕特編簡錯亂而考定者失其序遂歸經文知止以下至則近道矣以上四十二字於聴訟吾猶人也之右爲傳第四章以釋致知格物由是大學復爲全書車先生清臣嘗爲書以辨其􅀃之可信太史金華宋公欲取朱子之意􅀘第四章句以授學者而未果浦陽鄭君濟仲辨受學太史公預聞其􅀃而雅善􅂐書某因請以更定次序書之􅀅刻以示後世盖聖賢之經傳非一家之書則其􅀃亦非一人之所能盡也千五百年之間講訓言道者迭起不絶至於近代而始定而朱子亦􅂚嘗㫁然以爲至當哉故亦以待後之君子爾世之嘵嘵然黨所聞而不顧理之是非者皆非朱子之意也舊􅀃以聴訟釋本末律以前後之例爲不􅀋合爲一章而觀之與孟子堯舜之智不徧物之言正相發明其爲致知格物之傳何惑焉古人之􅀃經畧舉大義而意趣自備非若後世􅀃者之固也由國家而推之天下大學之所宜爲則欲致知者舎聴訟而何以哉是語雖異於朱子然異於朱子而不乖乎道固朱子之所取也歟鄭君多學而不雜執中而不滯觀其所好其傳所謂近道者歟洪武十四年冬十二月十二日謹記書漢三王䇿文後武帝朝立三子爲王䇿命之文深淳温雅卓然可述雖三代訓誥無以過而諸王或以夭死或以惡終無一人能保其位何邪先王之爲治自心而身而推之家國天下行之也有其本事不違乎道言不爽乎行脩之者有其常是以有所不言言而人必從有所不爲爲而天必應武帝窮侈極欲以處其身而嚴刑重歛以困天下其本固巳悖矣乃欲以仁義訓其子而望其久存豈人情與天道哉故以言語爲教者不若躬行之懿也以制度立國者不若道徳之久也題神異經東方朔在武帝時諌諍似汲黯文辭似司馬相如肆志輕世曠然有麾斥八極之意去公孫弘軰甚逺特以好爲詼諧無實之談故爲君子所薄而後之龎辭恠􅀃多推而歸之士之持身擇術可不慎乎今所傳神異經誕淺不足辯以朔好恠也人或疑其本於朔然嘗稱淮南子書而文又陋野其非朔著决也其間有窮竒獸事言逄忠信之人則齧而食之逄奸邪則擒禽獸而飼之似有激於志失正者而言之嗚呼世之可􅏜者獨窮竒也哉題受禪碑後曹氏父子以禪譲文簒竊其事蹟穢矣當時羣臣侈爲賛譽以爲舜禹復生著諸金石誇耀來世若誠有足稱者豈以一巳之故苟汙無耻而不自知其惡與􅀅逼於亂賊之威虐雖有君子亦莫能自正而從之與然漢之􅀅亡其漸暴于天下久矣豪傑之士度不能臣曹氏宜若管㓜安之踰海㓗身以避之不能决去低徊眷顧於利禄勇不足以死節智不足以撥亂包羞取容競爲謟䛕以全身斯爲小人矣若當時羣臣是也賢士君子者國之本也舉國無一人焉其國安恃而不亡乎此碑所著皆曹氏所謂佐命勲臣而實賊漢者也用賊人之國者以立其國國未立而賊與國􅀅􅁇之矣僅一傳世弱子竪孫爲司馬氏所陵刼禪者猶未死而受禪之舜固巳先亡以此得者必以此失固可爲千古之戒而其賛譽誇耀之虚辭適足取嘲笑於後世耳果何益於敗亡哉題王右軍遊目帖余在京師數見右軍墨蹟率皆窘束羞澁􅀋鈎摹而成者决知其非真也今觀此帖寓森嚴於縱逸蓄圓勁於蹈動其起止屈折如天造神運變化倐忽莫可端倪令人驚歎自失世之臨者雖積筆成山吾知其不能到非右軍誰足以與此哉或以􅁓筆未故爲疑祕閣有唐􅀄誥文􅁓色如新則此帖之尚完不足怪也浦江鄭君仲辨最博雅善書亦謂爲右軍真蹟無疑相與熟玩久之因識其後題觀鵝圖善用物者天下無遺物夫茍無遺物則凡飛走動息之􅀋接乎耳目者悠然㑹乎心皆足以助吾天機孰非可用者乎世稱王逸少愛鵝鵝何足深愛逸少固有以取之爾事物之變天地之蹟隂陽􅀑神之藴奥心之所得寫之於書其所取者豈特一端哉盈兩間者皆逸少之書法也鵝盖其一物而巳觀錢舜舉之􅀞風流閒逺之趣猶溢於目中此豈易與世俗言耶題蕭翼賺蘭亭圖唐史稱侍臣請集太宗文章太宗不許曰人主患無徳政文章何爲因斯言而觀其用心豈欲以區區翰墨傳世者哉而於蘭亭一􅁓之㣲乃設詐謀命蕭翼賺取於辨才溺於嗜好之篤顧與中主無異何其惑也然以人主之尊不以威迫􅀔取而委曲求之於一老僧其用心亦厚矣玩之沒身納諸陵寢石凾鉄匣錮於山陵之下其蔵護亦固矣而數百年之後不免爲有力者所􅀤則夫世之縱意非可欲取之不遺餘力而謂可以守而不失者豈非大惑也哉此可見爲天下所同欲之物茍非其所宜有雖人主不能長守惟不溺於物者乃能不爲物所累圖之工否不足論而斯理觀者所宜識也圖今蓄於之蕭君彦祥彦祥好學之士其尚以是觀之十七年二月六日書書蘭亭墨本後學書家視蘭亭猶學道者之於語孟羲獻餘書非不佳唯此得其自然而兼具衆美譬之徳盛仁熟而動容周旋中禮者非勉強求工者所及也此卷劉㑹孟諸公鍳定以爲定武舊本􅀄見未覺其妙久玩之令人有悟入處真可寳也哉題禇遂良書唐文皇帝哀冊墨蹟晋宋間人以風度相高故其書如雅人勝士蕭洒醖藉折旋俯仰容止姿態自覺有出塵意陵夷至于中唐法度森然大備而怒張挺勃之氣亦巳露矣唐􅀄諸賢去古未逺故猶有晋宋遺風觀禇公所書哀冊豈後人所可髣髴哉古人所爲常使意勝於法而後世常法勝于意意難識而法易知顔桞之書余一見即知其美此書八九年中凡三見矣今始識其用意之妙正猶有道君子泊然内運非久與之居不足知其所藴也題韓幹馬圖右五馬圖宋時嘗入内府蘇子美趙徳麟題識以爲韓幹真跡近蔵臨海錢氏兵亂馬失其二而題識猶存錢君克􅀖重装裭之恐後人不知其故也俾著其語幹於斯藝可謂精矣而杜甫以􅀞􅁏少之世以爲名言余謂觀􅀞之法山川草木當求其精華所聚不必計其巨細踈宻鳥獸虫魚當求其意態性情於筆墨之外不必較其肥瘠大小推而至於文章之繁簡字􅀞之重輕莫不皆然甫論字則貴瘦硬論􅀞馬則鄙多肉此自其天資所好而言耳未足爲通論也覽此圖者尚以斯言求之書黄鶴樓卷後竒偉絶特之觀固無與於人事然於其廢興可以知時之治亂焉夫黄鶴樓以壮麗稱江湘間當天下盛時舟車旌盖之來遊考鍾鼓肆管絃燕㑹于其上者踵相接也元未諸侯之相持武昌莽爲盗區屠傷殺戮至于鷄犬求尺木寸垣於頺城敗壘間而不可得於是天下之亂極矣及乎真人既一海内建親王鎮楚以其地爲國都旄頭属車徃來乎其上者四時不絶盛世之美殆􅀅稍稍復覩余恨不􅀗見之而是貌其状甚悉雲濤烟􅀣咫尺千里夏口漢陽蒼蒼如目睷展卷而卧閱之恍然如乘扁舟出入洞庭彭蠡之上而與李白崔顥軰同遊也今四方日就治平而江湘尤予所願遊者他日苟或一登爲之賦詠以追蹤於古之作者或者其始諸此乎題顔魯公書放生池石刻肅宗之放生煦煦小仁無足稱者當時池多至八十餘所而此碑獨以魯公辭翰而􅀓則夫天下之可恃者果在乎尊榮也哉公之書人皆知其爲可貴至於正而不拘荘而不險從容法度之中而有閑雅自得之趣非知書者不能識之要非言語所能喻也題宋孝宗題橙花詩後人之文辭翰墨非極精妙不能傳乎後世惟帝王及有道之士雖未盡美人亦好而傳之然爲天下所尊仰而不敢褻玩者恒在乎徳而不在乎位陳叔寳隋煬帝之詩宋徽宗之書與􅀞盖有見􅆕咄笑其所爲者矣其美而可傳也且若此况其不工者乎故欲圖來世之傳者雖人主之尊亦觀其徳而巳予嘗論宋之諸帝仁宗法不足而厚有餘孝宗才不逮而志甚銳昔見仁宗飛白數大字慨然想見其時此詩乃孝宗題馬璘􅀞橙花之作其書法方之祖父不及多矣然使人望而敬之忘其爲區區小詩詩疑當作技豈非以其志烈之足慕哉題米氏山水圖後目古極盛之世天下之間和同無間粹英秀傑之氣充盈洋溢是以賢才之生多駢􅀤逓見父子兄弟俱以所長稱于時者衆矣而宋東都爲尤甚相業功烈則吕氏范氏道徳之純則程氏文章則蘇氏曽氏王氏孔氏劉氏其他至不可勝數而米氏父子各以􅀞名家亦皆擅一時之妙豈人力所及哉天欲固人之國家必生才以植其本使之扶而立之輔而翼之或從而藻繪潤飾之不如此不足以見盛大之美也元輝此圖乃避地新昌時作山川林麓吐吞闔闢有排斡元氣之􅀔實可與古作抗衡不特追配先人而巳當人物凋謝之餘洞視今昔慨歎久之題朱子手帖君子之與小人較勝􅀒於一時則彼常盛而此常衰觀是非於百世則盛於俄頃者不足以盖無窮之惡屈於一身者未嘗不光顯于天下盖時與事錯迕雖聖賢莫能逹其躬及其􅀔易而理存人亡而謗息狐狸狗䑕之軰臭腐澌盡而無遺而論議之公終不能掩衆庻之口若徽國文公朱子與西山蔡先生屈於小人之事可見矣文公西山相與講􅀃者孔孟周程之正道而胡紘沈􅁇祖軰極力詆誣甚者欲寘之於死地西山營道之竄公亦受僞學之目奪官裭秩逐屏從遊之士由小人觀之曲意悖義取媚於權姦以爲朱蔡且􅀅終身名俱㓕矣夫孰知二百年之後摧抑困悴者皎乎若白日之當天而鄙陋邪嵬之流以擠排汙衊爲事者人之視之猶覩不㓗之物目憎而氣奪莫不欲戮既死之遺􅅎以快仁賢之憤哉嗚呼亦可爲千古之鍳矣西山之竄在慶元二年丙辰文公此書不知遺誰而惓惓欲告郡守稍寛西山之拘執師友之義尚可以敦薄夫而勵末俗非特字畫之可傳而巳也後之觀者其尚有所感悟以爲君子之歸也夫題趙子昻千文字帖宋之季年書學掃地蕩盡而詩尤壊爛不可􅀵拾趙文敏公生其時而能脫去陋習上師古人遂卓然以二者名家正書尤爲當世所貴重此卷千文洪武􅀄鬻金陵市中而金華宋公仲珩稱爲公中年得意書故刑部主事葉公夷仲因購而蔵于家公之弟恵仲父預脩先朝寳録出以見示於是歎文敏公之學古舎人之精識刑部之好竒皆不可得也題靈隱寺碑後天地間至堅固者莫如金玉木石脆薄者莫如簡筆縑􅁓礲石攻木範金坏土以成室其成也難其傳也宜其可久操筆書􅁓率然而成文非假金石以刻之宜其易毀㓕也然而世之爲堅固之具者常托其傳於易毀之物則豈不以其所托之人爲足恃耶錢塘佛寺􅇰鉅麗者曰靈隱當元皇慶壬子嘗改而新作之距今洪武癸酉僅越八十二春秋求其一榱一瓦皆巳毀燎無遺而金華石塘胡公及呉興趙文敏公所撰而書之文述寺之創始與其山水之勝棟宇之麗僅盈尺之􅁓耳誦而觀之當時之事猶儼乎如在則夫天下之可恃以永久者果安属哉亦可以慨然而有感矣石塘在元位最不顯而行最篤文最竒趙公名重宦高毎得其文必欣然爲之書於是又可見茍有足恃固不以外物爲重輕而二公之過乎人必有出乎文辭翰墨之外者而世之尊二公者方拘拘然求之於此而不知求之於彼不亦重可感夫翰林脩撰練君子寧以此卷示余子寧多學而甚文必以余言爲然題桐廬二孫先生墓文後予嘗論正統以爲有天下而不可爲正統者三篡臣女主夷狄也簒臣女主之不得與於正統古巳有之惟夷狄之全有四海創見于近世故學者多疑焉盖蔽于聞見而不暇遐思逺覽胡怪乎其未之識也宋徳祐景炎之後縉紳先生徃徃竄匿山谷或衰麻終其身或慟哭荒江㫁壟間如失考妣而不復有榮逹之願者多有之及其世久俗變然後競出而願立其朝盖宋之遺澤既盡而然也若桐廬二孫公兄弟槃􅄘公之抗志不汙求心公之不屑仕進何其凛然可尚也哉富貴之過於貧賤也逺矣使義可以處之無愧二公奚爲區區踐其所難而不顧乎盖必有甚不可者而非知道者不能識也嗚呼斯理也見于孔子之易春秋者詳矣學者不深考至於棄君背父䧟于夷狄而不自知道之不明其禍如是其烈也可畏也夫世有知二公之心者其知予正統之論也夫表槃􅄘之墓者黄文獻公爲求心公墓碣者文獻門人王君子充其事巳備故弗論姑識予所感云槃􅄘諱童􅀤字君文求心諱辰龍字題元諸儒帖昔時諸君子學術皆有承傳雖字畫之微亦皆得其意趣故所言多閑逺逸麗非若今人縱手妄作也夫昔人於不急之事猶致其精况所當先者乎今人於易爲者猶不講况難爲者乎有志者於此可以慨然矣吾友俞子嚴有志之士也以數帖見示故以所慨者告之題賜宋懌顔魯公多寳塔碑後文辭翰墨於儒者爲餘事然非天分之高學力之積不能造其極兼乎兩美者固難其人而父子相承能擅其工者世亦不可多見也國朝之􅀄翰林學士承㫖潜溪公以文辭􅀤道徳之奥而介子中書舎人仲珩善書最當時凡海内求文於公者必謁仲珩書之薦紳以爲美談不幸仲珩亡公亦相􅁇即世十餘年來士之欲昭幽行而紀偉績者無所於歸仲珩之子懌奉母居蜀思紹父學殿下至國聞而閔之以爲名臣之子孫也時賜粟帛賙其家撫勞教育者甚至由是懌得專於學其書益工洪武二十七年四月二十七日殿下講學于齋宫左長史臣南賔侍坐臣孝孺亦預在席有教曰宋懌書法可嘉其以顔魯公多寳塔碑賜之仍手書賜宋懌三字於篇首臣既持以付懌且告之曰士爲衆人之子孫也易而爲名人之子孫也難盖以徳業隆厚非厲志篤學則不易紹乎前美也今殿下仰思前正而施恩於懌可謂盛矣懌尚日孶孶因藝以進乎學因學以進乎道以紹父祖之聲猷以報殿下之寵望則善爲人臣子矣孝孺嘗受學于潜溪公固不敢不勉以辱公門而所望於懌者非止能書而巳也詩曰高山仰止景行行止懌也其可忽諸題賜王訓導詩後翰林待制金華王公奉詔脩元史文辭爲史官最及使南夷一死爲羣臣最有子紳能傳其業家學之美又最當時宜乎殿下賜詩嘉奨之也唐甄濟不仕禄山以死其子逢能見知方州大臣白其事于朝且請韓退之爲立傳君子稱之待制公文章節義不愧於濟而紳受知賢王深􅀍禮遇又非逢可比父子名績其有不傳也哉後之執筆紀事者當於賜詩有徴焉不待退之之書而後著也題醫􅀃後管輅之言曰善易者不言易輅之治易其淺深不可知然斯言則晋之清談皆不及也君子之學自得而巳果有所得則天下之物皆足爲吾用於心無得焉則所習而熟者雜然陳吾前方爲所累之不暇於吾何􅀘哉太史公爲􅃽君作醫􅀃累數百言而無片辭出醫書可謂知道者之言也吾與􅃽君論辨甚久􅃽君未嘗以衒其術而人多以善醫稱之其殆管輅之􅀋耶題太史公手帖某年二十時􅀗見先生于翰林遂受業于門及先生致事還金華侍左右者數年毎蒙奨與以爲易教所以陶冶鞭䇿之者甚至此帖乃庚申歳謫蜀􅀅辭京師時所􅀤詞意重厚拳拳以古賢哲之事見勉若誠以爲可望者嗚呼題楊先生墓銘後太史潜溪先生以雄文厚徳師表當世禮接天下士如恐不及而所敬愛推服者不數人若白鹿子楊公本􅀄尤與太史公友善而以爲不可多得者也白鹿子貌清而神峻言厲而志端於人無貴賤富貧徳有可尊則敬之否則不􅃘正目視荘辭􅃀論不肖者惴慄焉是以鄕閭之民不畏郡縣之笞辱而畏白鹿子之公議人或欲薦之仕不應強以酒食非其人輙辭布衣韋帶處乎林泉而聲聞于逺邇盖有東漢諸君子之風焉白鹿子生於元元之習俗陋矣以學士君子自名者僕僕塵埃車馬間求利逹徼聲譽惟恐弗得而白鹿子獨能操志篤行不􅄺乎世之垢汙古所謂介士幽人㧞流俗者其白鹿子之謂邪孝孺年二十餘遊太史公門􅀗聆白鹿子言論固巳竦然敬之今十有五年太史公既即世而白鹿子亦亡於是百年之遺老盡矣其孫友以鄭太常所爲墓銘見示歎士習之日變悲老成之靡存爲之於邑者久之題太素子墓銘後昔昌黎韓子之銘盧處士歐陽子之銘薛直孺皆其妻之兄弟知之深望之厚而哀其殁故其辭反覆於天人之際爲最深今戴先生於太素子趙君猶二公之於盧薛也是以其辭信而詳其事微而可傳而太素子之卓行因得著明於世古今人夫豈果相逺哉吾昔遊金華聞太素子之風高其爲人而今巳矣浙水東固多竒士求若人之似於山海之間其尚可得邪惜夫題礲硿子墓碣後士不以得位而後貴也居位而不能行道祗所以累乎位善推其所爲於人雖未嘗有位孰得而賤之乎故因位而著勲業者易不假乎位而徳及於人非有志者不能也吾觀太史公礲硿子墓碣礲硿子鄕里一布衣耳㐫歳能活數百家遭亂能衛其鄉人於難此其及物者厚矣何必有位哉公之言曰有積無􅃜惟後之垂礲硿子三子皆才而顯且方以儒術進用於世吾􅀅於是徴天道焉題濟寧張氏墓銘後當中原文獻盛時薦紳大儒彬彬多齊魯之士道徳言論既足師表一時而餘風所漸雖閭巷之人皆敦篤忠厚慕尚文學非他郡可及兵興以來師䘮道微漠然無復存者余先君貞恵先生昔爲魯守嘗思有以化之迎禮師儒擇子弟之重厚知禮者使就學焉于時洙泗之間㡬爲之一變自先君去官今八九年魯士之出爲世用者徃徃有之大率皆當時之秀而張君盟其一也盟以才受薦佐大郡甚有名稱惜其父處士生不顯于時思􅀤其遺徳以傳後世乃求銘于聞人以識其塟余遇諸京師爲之歎息流俗之壊也久矣親沒不圖所以傳之而惟祈福於異教所費不可勝計而卒無絲毫之益盟獨能以章著先行爲急豈非知所輕重者哉余久不至魯由盟觀之其俗盖􅀅盡變矣復異時之盛安知不始諸此乎盟幸以告我余尚能爲魯人書之題胡仲申先生撰韓復陽墓銘後爵位所以取尊於當世而非取信後世之具也逹官顯人茍無足傳則聲與身泯隱約之士道術文學誠過乎人人其居雖困而其所有昭乎若日月之掲夫孰能掩之世俗不之察託傳世之任者不於其道而於其位親沒而圖銘墓之文徃徃於位號華顯者求之甚者或假辭於文而寓名於公卿豈知古之傳世者固不以禄位而重哉其陋也甚矣金華胡翰先生異時嘗以一布衣入史舘出爲衢府教授退處田里以終士之貧困無出其上者然其操􅂂高介文章雅馴當世之士多自謂不能及之先生既不妄稱譽而世俗亦鮮知其文故四方得其文者爲最寡呉郡韓君奕示余以先生所作先府君墓銘盛有所推許於知愛先生之文可知奕之異乎衆人於先生亟與之言可信其先君果竒士也余年二十一見先生於金華先生不余賤待以國士與語連日夜不休今亡矣思重見而弗可得讀其文如接其聲容因書卷末以授韓氏使世俗知韓氏之求先生之不拒皆古道也䟦劉府君墓碣後李元賔文學在當時最爲韓退之所推而退之銘其墓不過百餘言稱其美者不過十言然非元賔莫能當也古人之文要而不煩也如此近世銘墓者爲言多至數千少亦不减數百否則求者怫然有不滿之色是豈特文之不逮古哉習俗之弊也久矣吾友劉君剛養浩請銘其父處士之墓於太史公公爲之銘辭約義該得退之之意盖欲矯積􅁦而復諸古也養浩學古而攻其辭故公以古道處之由是而求處士之爲人其亦古之所謂善士夫題㑹稽張處士墓銘後外爵禄而貴富者君子也待爵禄而貴富者恒人也備萬物于一身天下之物孰加焉友聖賢于千載天下之貴孰並焉不有得於此而顧有慕乎彼則其所慕者庸知非君子之所耻也耶孔子賤千乗之齊侯而取首陽之餓士曽西薄志得位尊之管仲而畏仲由世俗之所謂富貴貧賤豈足論有道之君子哉􅌘之珏芝里有處士曰張公珵字克譲生于世者七十六年而不階一命不資斗禄以布衣終田里然和易純正之徳見推于鄉閭雋㧞清逺之文尚友于古人寓至富於窮約之中存至貴於卑賤之表有子五人既沒而叔子思齊爲陜西左叅政少子遯亦以通儒術薦爲紀善諸孫勝衣冠者多至二十二人世皆曰處士富貴人也身不待乎富貴是以澤及乎後昆張氏之富貴其亦異於恒人逺矣盖道徳有餘而天之報有不至者後世必􅂪其福然則張氏之孫曽欲保先澤于悠久者可不以處士言行爲法乎叅政公名可家以字行繇觀察使拜今官學行政事君子以爲不愧其先人云題溪漁子傳後今之爲士者不患其無才而患其無氣不患其無氣而患其不知道道譬之源也氣譬之水也才譬之能載也盖有無其源而不能爲水者矣未有水既盈而不載者也是以君子不敢強用其才而務養氣終身由乎禮義之途使内不愧於天外不挫于人充溢盛大無施而不可舉而建事立功則天下豈有難爲者乎後世學者不知出此用其驟盛易衰之氣而無所養當其銳然於有爲之􅀄固若可喜及乎渉歴無窮之變未有不薾然消沮者也吾嘗歎而疑之郡人林左民示余以溪漁子傳稱溪漁子事及其言論皆偉甚左民竒士因其所交以觀溪漁子之才氣有足望哉然溪漁子好爲文而不自足顧毎有取於世之有道者此其志異於世俗逺矣江淮間豪傑之所㑹盖有得道之人焉余求之而未之遇也溪漁子盍求而見之乎茍有得於其言則左民之所稱者皆溪漁子之粗也余必預聞之題陳節婦傳後世之記事者務取詭特竒異之行以駭人視聴而於守常蹈義者則棄而不録故史氏所書節婦孝女非赴淵投崖則㫁髪刲股吾甚惑之所貴乎善行者以其當乎義而可法也茍吾之義無愧於天下則亦奚用夫異俗駭世過爲難能之事乎有意乎爲異者未必不入於利不知仁義之可慕而自勉于仁義斯其於善也篤矣余觀王紀善璞及鄭僉事士元所傳陳節婦應氏事盖節婦年十七歸陳甫一年生子三月而夫亡利誘而􅀔迫之者盈耳凝然不爲之變劬躬畢志以事舅姑陳氏之宗卒頼以不墜未嘗赴淵􅄬崖而人稱其節未嘗刲股㫁髪而舅姑安其養方其自脩於閨閫之内寧知節義之名爲足慕哉無所慕於外而勉於爲善此節婦之行所以爲美惜夫有司不言於朝不􅀗書列史氏之籍然其孤好學􅅚行圖顯先徳􅀅必有立於世他日使人謂陳氏爲有子而節婦行義因之以章則可以駭人視聴者在此而不在彼矣何患其無傳耶題鄭叔致字辭後古者制名之義不一而莫病於近代爲其慕乎美稱也夫人之有名􅀅終身以之茍著爲學之方使之顧名思義豈非善名之者乎世之爲父師者徃徃以皐䕫益稷丘軻囘路加於無知之兒其名則聖賢也求其徳則庸竪賤夫也不亦妄且誕歟是謂之不知其父師之道也若吾友浦陽鄭叔致則不然叔致之生也其父取大學格物之義名之曰格及冠其師太史公復以叔致字之而祝之以辭欲其用心於致知之學也嗚呼是不亦善爲父師也乎夫人之通患不患於不能行而嘗患於不知不先致知雖有出世㧞倫之材亦不免􅄀行謬作之􅁦能窮天下之理盡萬物之情一旦措之於事業則沛然而有餘􅀤之爲文章則浩然而無涯蓄之以爲徳行則從容而中道矣古聖賢之學必以知爲先也而叔致可不務乎物之理不可以數計而欲知之也盖有要焉操至静之噐以應乎羣動以索乎冊書察之於天地之際驗之於倫理之間譬諸破竹焉既得凾刃之地一節之後􅀅豁然矣知既盡而於聖賢之學無得者吾不信也叔致生禮義之家重之以美質耳目之接無非知也舉足動容於堂序之間推而逹之無非可行也而太史公又甚愛之其於學不既得矣乎予復爲是言者予與叔致友以忠告者友道也雖然叔致奚俟予言哉題宋舎人􅂐書􅂐書以清圎勁㧞爲高秦唐二李皆以是名世其用心至矣自江南徐􅂦臣始變而肥巳稍逺於古然能不失其意故論者尚之近代趙魏公子昻愛􅂦臣書所作大小􅂐多􅀋􅂦臣由是學者翕然效之甚至彭亨濁俗如腯豕然不知魏公天資高邁故所書自過於人俗子軰塵胸陋質欲逐其迹無怪其謬也金華宋君仲珩病古學之不振學大小􅂐匪二李不師其用心甚久故所作駸駸逼真此王荆公刻漏銘爲李思問書亦其一也嗚呼古人不可見矣欲識其遺意者尚於宋君觀之題宋舎人草書千字文後近代能草書者呉興趙公子昻公所敬者爲鮮于公伯㡬稍後得名者爲康里公子山吾嘗評趙公草書如程不識􅀅兵號令嚴明不使毫髪出法度外故動無遺失鮮于公如漁陽徤兒姿體充偉而少韻度康里公如鸞雛出巢神彩可愛而頡頏未熟雖俱得重名而趙公高矣􅁇三公而作者金華宋仲珩草書如天􅂹行中原一日千里超澗渡險不動氣力雖若不可蹤蹟而馳驟必合程矩直可凌跨鮮于康里使趙公見之必有起予之歎此卷千字文乃仲珩爲李君思問書者尤渾雄可喜仲珩今之古人也思問勿易視之題宋仲珩草書自作詩近代善書尤著者稱呉興趙文敏公及康里子山文敏妙在其行奕奕得晋人氣度所乏者格力不展子山善懸腕行草逸邁可喜所缺者沈著不足金華宋君仲珩兼得二公之妙而加以俊放如天􅂹奔行不躡故歩而意氣閑美有蹴踏凡馬之􅀔當今推爲第一乃余在金華時自京師書其所作詩􅀉余者詩與書皆翩然有塵外意誠希世竒玩也題周氏文後知人天下之至難由人之言以觀人至難之尤也人之平居非察其所守不足知其志非試其臨事不足知其才才志得矣非考其終身不足以知其徳此人未易知者爲然也士之寛􅁉有容者譽人多過其實刻厲疾惡者取人多䘮其真自非誠明公溥之士其予奪褒貶未必可信則察言之際豈易乎哉吾友方君其介㓗不妄有所稱而王君脩徳􅃀然守正不爲詭隨之行茍非其人雖其親愛不以片言許也今於周君友文俱言其美若出一口然夫以方君之言雖微王君猶信也王君之言雖微方君猶可也而二君交賛之皆以爲難能則周君之善烏可誣也哉昔余與周君遊先於二君而周君之來吾郷二君知之者詳於余古道之不復也久矣余於周君喜二君之公於取人也既爲之書復繫其􅀃使人知予爲之書者非􅀻乎周君盖猶二君之意也題王氏述訓後師弟子之教不立世之學者一變而爲陳相再變而爲逄􅂪由􅂪而變不至於羿之爲不止也其漸豈不可畏哉予過梁宋間覩河洛之俗可駭焉至汜水見河南按察僉事王侯􅂂道所爲述訓歴紀成童時所從之師以致不忘之意其情辭忠厚有足感人者嗚呼薄夫惡子觀乎此其尚知所愧耻而感慕也哉題劉養浩所製本朝鐃歌後文章之用明道紀事二者而巳明道之文非有得於斯道者雖工而不傳紀事者不得豐功偉徳可以聳攝衆庻耳目者而書之亦不足取尚於後世故士未足以明道則博求當世非常可喜之事而述焉亦文之美者也西漢文士最衆尤傑然者賈生董仲舒其才未必遷固之下然後世傳而誦之者必遷固之文而賈董不若焉賈董不得紀天下大事而遷固爲史也今天子起布衣除羣雄十餘年統一四海與漢高祖無異吾太史公以閎博竒偉之文居遷固之任爲士者莫不慕之公之門人金華劉君養浩亦奮然自喜以爲此難遇之時不可漫無所述乃考徴征伐之次第爲鐃歌十二篇以宣􅆒國家之功烈其事信其辭竒其取尚於世可必也嗟乎養浩於斯文可謂有志矣昔之人居史氏之位而不脩其軄者甚衆今養浩未嘗得位於時而遇事感􅀤輙有所作使假之以位遺功遺徳未盡紀載者庻乎有所託哉余少竊妄志述者之事􅀔孤行獨無宗族親黨之譽而不聞于人而不得賢人君子爲之美故徃徃顧以怠惰而未能然斯文之有益於世者不止若此而巳也願與養浩加勉焉題黄東谷詩後昔人謂詩能窮人諱窮者因不復學詩夫困折屈鬱之謂窮遂志適意之謂逹人之窮有三而貧賤不與焉心不通道徳之要謂之心窮身不循禮義之塗謂之身窮口不道聖賢法度之言謂之口窮三者有一焉雖處乎崇臺廣厦出總􅀅相之權入享備物之奉車馬服食非不足以夸耀市井然口欲言而無其辭心欲樂而有其累其窮自若也無三者之患心無愧而身無尤當其志得氣滿􅀤而爲言語文章上之宣倫理政教之原次之述風俗江山之美下之探草木蟲魚之情性状婦人稚子之歌謡以豁其􅅐中之所藴沛然而江河流爛然而日星著怨思喜樂好惡慕歎無不畢見造化􅀑神且􅀅避之而何慊慊於區區之富貴者哉此謂之逹可也雖飢寒流離夫孰可以爲窮世之人不之察幸斯湏之􅀔者多挾其所有以驕士而不知士之非果窮巳之非果逹也象山之東谷有士黄君思銘過余侯城山中其身甚約而其言甚侈其形容甚臞而其詩甚麗出其所作數十百篇爲余誦之金鏘玉戞宫鳴徴和有􅅛竒纎妙之觀而無枯淡寒陋之態余雅爲之喜而君復􅀅自此而西歴覽天台諸山以盡巖壑之勝嗟夫近時詩人如君之可貴者鮮矣君行乎世有知君詩之可貴者其亦世之所鮮哉書夷山稾序後人之窮逹在心志之屈伸不在貴賤貧富富貴而於道無所聞於業無可傳謂之窮可也非達也賤貧而沛然有以自樂生有以淑乎人沒有以傳諸後謂之逹可也非窮也世多以隱顯賢否天下士而士亦以禄位得失爲心之欣戚􅀔盛則志滿而驕􅀔卑則志沮而陋於是士之進退皆窮矣非人能窮之也彼有以取之也吾觀四明􅃽先生羇寓數千里外在尺竹伍符中而放筆爲詩組織物状揣切人情敷􅀭事理浩乎其無涯燁乎其有輝味其言如素處顯位者未嘗有枯悴寒澁之態是安可謂之窮士乎士茍有自逹之具天且不能窮之而况於人也哉予自京師還過夷門與先生論詩因識所感使人知窮逹果在此而不在彼也書浦江二義門倡和詩後浦陽鄭氏王氏俱以義名門事傳于天下而聞于朝廷􅇮歳兩家爲訟者所誣王思敬甫偕鄭氏之長采苓子訴于朝皇上重二氏之義詔勿治於是二老人驩然同歸置酒相勞苦交遊之士爲詩以述其事二老人從而和之讀其辭尊君親上之情戴恩懐徳之意藹然溢諸簡册間何其美也人性之易感也尚矣綏之以徳則驩然鼓舞而和氣生焉和聲􅀤焉至和盈溢于宇内則風􅀨時萬物遂諸福畢應而治道以成觀二老人之詩當世政治之美從可想見豈特可爲鄉􅀖盛事而巳哉贈樓君詩卷題辭代太史公作洪武辛亥之歳浦江樓君真以文學用薦者赴京師有司􅀅官之君固以疾辭歸朝之名卿顯人與君交者皆重惜其去相率爲歌詩以賛其行凡若干首君嘗徴予序予未暇也及予致政家居以爲言予撫卷而視計其時僅越七年而其人之存者聚散不常於是益知君之賢而歎斯文之不可復得也嗟夫予何敢序之哉予嘗諍觀之天地之始終如日之旦暮耳千載之間如一時耳人之生世不啻如呼吸頃耳其中離合憂喜何足較乎可以與天地並存而不朽者惟文辭而巳若此卷者亦其一耳君試追思徃日交遊之人聲音笑貌暸然著於耳目間固如昨日事也欲求而見之豈復可得乎不知與夣寐何異也而余與君復云云不置何也斯理也非逹性命之故者不足以識之逹性命則物齊矣君足踐利禄之塲不願而辭歸其中心必有所得余非能知君獨視其詩而有所感故題之以辭書學齋佔畢後眉山史繩祖慶長所著學齋佔畢其論荀楊言性本於告子皐䕫以刑名聲色絶世引喻有味可爲世戒於子罕言利與命與仁訓與爲許謂君子懐刑乃懐思典刑而則效之大學彼爲善之當爲彼爲不善之小人皆可備解經之一􅀃盖篤志精思而求所自得者非特好異也然論乾坤二篇之䇿當萬物之數乃以稱物平施爲言謂三十斤爲鈞萬有一千五百二十銖又以孟子鈞是人也賈誼大鈞播物者實之其他談數附㑹曲折纒繞蔽聰可駭者頗衆甚矣乎其爲多思也至於考索經傳可喜者雖有之而謬誤亦間見焉豈所謂知者過之者邪然其異於世俗之􅂪瞀拘錮於巳然之成􅀃而漫不致思者亦巳逺矣况其該博於載籍索之惟恐不致盖亦難能之士也第疑聶夷中詩二月非鬻絲之時以爲乃四月之訛則爲未當乎理夫夷中盖以貧困細民未蚕未稼而預貸絲榖之直於人是以雖暫紓目前之苦而􅀅來不免飢寒之厄此非躬歴其事而深䆒民瘼者不能述斯言也而慶長乃不之知豈其偶未察耶抑其方銳於攻􅀤前人之短而不知巳之失邪題聴琴軒記後天下之事才而有爲者非難知其才而用之者爲難智而能言者非難逹其爲言之意者爲難是以李長吉發憤欲酹平原君而韓退之亦祭田橫以見志古人之重知巳豈有所利也哉吾之所得存於心未嘗􅀤口而彼能的然先得吾之所存固人情之所甚快也世傳伯牙絶絃於鍾子期其事有無未必然盖以喻知已之難遇耳廬陵鍾深省以聴琴名軒盖嫉夫知人者之少而欲以是自勉者歟今天下混同四海之才皆麗輦轂下其間豈無出􅀋軼羣之士伏於衆人之中而無所􅀤者乎深省號爲知人􅀅進而用於上㸑下之木有剨然鳴者其尚知而取也題積善堂記後爲善而至於君子人之所能必也爲君子而富貴且有後非人之所能必也世之人不爲其所可必而妄意於所難必脩於身者無成則委之如當然望於天者不􅀗則怨且疑以理爲不足信其惑不亦甚乎人之宜爲君子而不可爲小人出於性分之固有非爲利逹而爲之也使慕利逹而爲善其心巳䧟於小人之歸尚何暇天道之怨哉予觀顯融於斯世者多昔者質厚敦朴之士之子孫盖斯人之爲善出於天性而未嘗知外物之可慕故有以合乎君子而得天道之祐非偶然也河南按察副使㑹稽徐公以積善名其堂以昭其祖考之善而推其福禄之所自且以勉其後之人夫徐公之顯由前人之積則夫後人之所慿藉者豈不在公之所爲乎公之爲人御下寛黙有容而持身甚謹衆咸服之以爲君子而不自以爲才是宜爲天道之所祐者也尚於其嗣人徴之敬題蜀王殿下來鷗亭詩後蜀王殿下以睿哲之資性與理合􅀤言成章而謙虚好士士有見者未嘗不歛容垂問然文辭翰墨之賜非學術噐識逺過乎人者弗能致也徃者講學中都臨淮訓導姚宗文特承顧遇賜以來鷗亭詩時殿下春秋十有八耳而措辭雅馴有法雖縉紳儒先莫過焉是豈特儒者之美觀哉亦可以爲聖世宗室多賢之慶矣題許士脩詩集後師道之重古之君子以之參乎君父之間盖以人之有身非父則莫能生非君則莫能養父既生之君有以養之而不聞道徳禮義之教雖苟生於世不若無生之爲愈也是以於人爲特重視夫至尊至親之恩靡不及焉洙泗門人視孔子猶父及既沒三年猶哭失聲或築室獨居而不􅃘去此與唐虞之世如䘮考妣者何異自道䘮俗偷倫理廢薄而師弟子之義􅀹闕生無就養之禮死無爲䘮之制甚者讐疾其師乗􅀔折辱以快其忿豈皆民性之不逮古哉教者非其道受學者非其才故也誠使師有以爲教弟子知所以爲學其有不相親愛者邪吾鄉林昇嘉猷始事吾友王脩徳脩徳良士毅然以古道自整􅅚後不幸徙家南中婣族無一人顧恤嘉猷徒歩千里追送泣涕與訣别此其義有足多者嘉猷少予一歳輙以師禮事予㑹予教授漢中行六千里來學徳業大進見之者莫不稱其篤行此其可與世俗弟子同語哉嘉猷爲予言里人王暊與其弟暕嘗師脩徳之友許君士脩許君卒嘉猷爲集所爲詩暊暕爲購工刻于家以傳其待許君不以存沒少異若暊暕之於師盖亦當世之所鮮也嗚呼予嘗嘆斯世不復有如古人者今乃於閭里見之豈吾鄕之民性獨不異於古哉抑亦父兄長者之化有以習其耳目而致此也許君之詩予昔既爲之序復書其交友門人事以見許君之所教者非世俗所及而其所長非特在乎詩且以諷當時之爲弟子者使有所感􅀤焉䟦劉氏家藏誥命後烏傷劉氏在宋季如公亮者嘗以中奉大夫致仕而贈其父爲太中大夫亦嘗貴顯矣未越二百年而歴官行事之詳巳無所考向微斯誥則子孫且無從徴之况他人乎此可見人之傳世在彼不在此中奉之昆孫剛方以學術自表著勉其所當爲而無外慕之心固知所輕重哉題湯氏家藏賜笏記後春秋書法至簡事之不登載者盖甚衆而於寳玉大􅃓之竊獨兩書之而不厭盖以國之􅀓噐先世所受於君者其所繫爲至重也呉湯氏不忘其先祖爲進士於宋度宗時所受賜笏寳藏于家而求士君子以記之其亦孔子之意歟雖然笏之爲言忽也所以備忽忘且以戒人之忽也不忽則敬敬者徳之本湯氏子孫持不忽之心以守此笏雖百世可也不然國家天下大噐以忽而失之者多矣况一笏乎書李質夫序後名號者巳之所命以别乎人苟未極其美人未必非笑之也而名號者常務極其美焉聲譽者巳之所致以彰其身一有所不至則人􅀅訾謗之矣而爲士者未嘗脩其可以致名譽之道是之謂怠其所宜爲而先其所當後古之君子弗爲是焉名號與聲譽俱美者稱也二者相戾者愧也恐其相戾而勉焉以稱其名號者不亦善於自脩者乎善於自脩者君子取之章貢李君仲文常從事於儀曹覩制作文爲之盛因自號曰質夫其意有慕古反始之美及來仕于吾郡􅁣然以矯浮薄復質厚爲軄盖欲推其所慕以同諸人也天下之理莫善於可􅁇莫不善於使人無以加文者周之所尚聖人非處其薄也然質之甚猶可􅁇之以文文而至於盛則無以復加矣故必反之於質而後可由質而之文猶繪於素雕於檏順乎其不難也反而復之質非盡浣濯剗除之何由復其始乎而李君乃欲舉而復之其志既美而其事甚難也雖然巳不由而強人之從於事爲難已由之而化人之從非果難也士固有居乎閭里而化民成俗者况居位者乎李君苟能因是號也思其義而身由之機巧之去而惇厚之用椎魯之尚而矯飾之遺行成乎躬而聞乎世東南之民他日有耻浮薄而勉爲忠檏者其李君之化也夫臨海縣知縣黄誥黄巖縣知縣張師善台州府儒學教授尚芳訓導李深黄巖縣儒學教諭文程府學生陳縝葉琰王梅齡臨海縣學生李臨卿戴濬之黄巖縣學生孫思光牟汝鈞校對遜志齋集卷之十八終
