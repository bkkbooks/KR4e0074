front:
  text: 遜志齋集卷之二十一
  hash: sha256:e5e56b408be0ed3e88f7845c3035e2a274463df1a8d8eb9accdd4809f20d877e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4e0074_SBCK_021-1a}
body:
  text: 中順大夫浙江按察司副使奉勅提督學校雲間范惟一編輯奉政大夫浙江按察司僉事奉勅整􅅚兵備南昌唐堯臣校訂中順大夫浙江台州府知府事前刑部郎中東呉王可大校刋行狀傳先府君行狀嗚呼惟我先府君之䘚不肖孤旣以十年二月二十四日奉柩與先妣林夫人合塟于深湾童施山之原復懼盛德未紀無以明示來世疾首痛心以日以夜然斯事至大非託之立言君子莫能傳而當今天下所師所宗言而傳世者惟夫子爲然况不肖無狀又􅀗出入門下玷弟子之籍是用不避誅責㗸哀叩誠頓顙上請伏惟憐察焉嗚呼先君諱克勤字去矜姓方氏其先出於桐廬玄英䖏士于宋􅀄十五世祖二十四府君始遷寜海侯城里世敦儒術爲邑禮義家曾大父諱重桂鄉貢進士有學行學者尊之曰介軒先生大父諱子野父諱烱元鄞縣教諭皆以長者􅁛夫人葉氏宋丞相西澗公從曾祖也先君生而端重殊常五歲能讀書自辯章句年十餘暗記五經爲文有竒語里中老生嘖嘖賞異呼爲神童稍長閱􅀜閩遺書歎曰爲學當如是矣遂刮去浮藻竭心推性命之秘閉門講習不知飢渇寒暑年十八九􅂶然成德爲名儒受業質疑者􅁇乎門先君口舉手畫横分竪貫曲折明備各􅁛其所欲􅀄邑人自宋季以駢儷雕刻爲學莫有談周公仲尼之道者至先君始以易教授開陳其􅀃士俗爲之大變至正甲申江浙當大比先君就之試時有司以諱忌去取士先君言時務歴􅁆往昔治亂之由以爲如是則治否必敗見者相顧出舌曰竒才竒才賈􅁩弗過也竟不敢第先君名先君縱觀南宋故都爲文貰酒酹岳武穆王墓歌􅁰離之詩慷􅁣泣數行下望者以爲異人㑹番昜董􅃔先生爲慶元路儒學正先君從之遊董先生素以通易自名先君與之辨質羲文大㫖先生不覺自失曰子信不可及愧其門人者久之先君自是道益明志益堅知元之將亂彌自韜晦窮理􅃱知以盡其變至於隂陽消長之度禮樂名物之數井田封建之制􅄤次疆理之􅀃咸求折中授業者日益多㑹海東盗起江淛行中書檄呉江同知金剛奴以白金募民爲水兵先君曰此􅀜利害吾其可不言乃詣金剛奴曰民之爲盗者或迫於飢寒或祛於徭􅃥今斯民固無頼矣奈何使其去妻子而爲兵㡬何不首爲盗耶是所謂􅃱盗非禦盗也金剛奴怒而去巳而水兵果中道殺護吏迯去從盗金剛奴踰垣走折一足始悔曰吾不從方先生言以至於此未㡬侍御左荅納失里至郡議招諭劉中丞基爲副先君上書陳剿捕之畧不冝姑息劉君竒先君言而不能用遂至郡縣䧟􅃿民受其害先君發憤􅁛疾决意不出行入山谷採松栢啖之或辟􅂖絶食累日不返然益務開淑後學講􅀃君臣父子大義以動之聞者心觧或至洒泣是時他鄉民多著鶡冠操戈劔從權貴剽刼獨所居鄉無一人附亂者鄉隣有訟或相率就先君取平先君教以禮譲多􅃱感悔或來饋謝則郤不受當路以幕府事屈先君議先君謝不肯曰我辟榖久矣弗足與人間事也閔民憂世之志毎於文辭見之君子謂先君制行㢘正如陶濳䇿時事善中如賈􅁩造詣深天資和毅無愧程伯子識者以爲然丁未冬大明兵定郡縣先君著國家所以興亡之故爲書欲詣行在獻之其目曰舉賢才安人心黜豪強除􅁀歛明教化其畧以爲人心者國家之元氣教化所以爕養元氣之具也不任賢才則教化不行不去苛歛則人心不安夫人心而得天下􅌸教化而求治平非所敢知也如是者累數千言洪武三年郡辟爲邑庠師先君日以師道磨礲學者晝夜辨析諄諄不􅈈四方後進􅀒笈求聽者百餘人人人有所聞學者私􅁛不敢以姓因所自號稱愚庵先君旣以太夫人春秋高自罷歸從而歸者踵相接一庠爲空逺至稍稍散去至今稱師道之盛必以先君爲言四年行部使者􅀽君宏以書幣來徴先君亡逸他邑郡吏詣門請雜逮姻連督索之先君不得巳乃出時年四十有六矣之亰師詣御史執政两以母老辭執政詢以政治乃驚曰今列郡闕守長而先生適至朝廷之幸吾安敢蔽賢即下銓曹以易試中第二遂錫冠帶授濟寜知府階朝列大夫在官周三年省憲考績爲六府最八年春入朝天子以爲善治民錫燕儀曹遣踐舊軄瀕行􅅄諭有加且曰政成當顯用汝先君拜謝而退三月重至官越五月知曹縣事程貢嘗以不職􅀍笞恨先君上封事言狀詔御史楊某按覈楊適程故人恐程坐誣罪易民服濳索先君過事踰两月無所得乃捕府中吏卒繫之考掠無完膚無一可問者楊懼與其吏謀誣先君私用倉中炭葦二百斤時十月未甞附火而葦則蓋公宇垣實無私用者強卒以此誣先君先君不與辨遂得罪謫江浦終歲將釋歸㑹印章事起吏又誣及九年十月二十四日遂卒于京師享年僅五十有一嗚呼痛哉􅀄先君受濟寜之命以爲非常之恩不可不盡力到部爲書懸之通衢諭以朝廷養民之意孝悌忠信之道俾民有所不平詣府自言禁吏不得叱呵之日引􅂄耋之士坐語問以得失郡學官闕先聖廟頽壤先君聘前進士爲師弟子未備者選􅂶之􅃥浮屠葺廟堂鑿廟前地爲泮池撤佛廬増廊廡度廟後地爲射圃造弓矢置旐鵠日視學率諸生習業始郡兵後人未知學先君以身爲師爲之立章句謹節文講内聖外王之道不踰時皆化儒服者斑斑間出郡邑之内學舎數百區在弟子籍者二千人始有詔民闢蕪田者後三歲乃稅吏邀近功不俟至期徴之復以田定其繇民滋惰田不増闢先君知其故下令申前詔與民約俾以丁男定繇著冊書列民之丁産爲上中下等下等析之三則每有徴發自上定之吏無所措其奸歲時躬岀郊勸督見長老勉以教子弟令子弟以力田欣欣焉如戴父母􅀄至大歉民仰給它郡先君竭誠撫輯不敢勞之歲暮轉戎衣于燕時有令役民舟者有誅旁郡俾民以牛車從事天雨雪牛僵死相枕濟寜民請以舟就􅃥僚佐畏令難更先君曰吾知從民便扺法非所辭即以舟載具白于山東行中書省省義不問後他郡車輸者雨雪霑毁過半民賣車牛以償且弗能足破産者十八九而郡民以舟得無害指天泣曰活民者方使君也郡倉粮絶省檄民七百里轉粟青州民苦不便􅈇軍者自淮安輸濟南正道郡境先君以爲便就輸郡倉而俾濟南轉青州粟道且便告于省省不從即以聞戶部戸部奏可省臣大愧郡城圯舊以兵築指揮挾貴人勢當五六月役民萬餘築之民不得穡哀號即工聲聞數里旦暮不休先君憂憤不食曰民病不救焉用我爲宻聞中書衆以爲且得罪不敢署名先君獨署之胡丞相以聞即日詔罷先時不雨先君􅃝跣遍禱群祠涕泣卧祠下誓不雨不止至是詔至民驩呼而散大雨如注是歲五榖俱熟民歌曰孰罷我􅃥使君之力孰成我􅁰使君之惠使君勿去我民父母自是連三歲三禱皆有年五年夏鄰邑蝗先君憂之移書社神變食省過夜焚香􅈼天俄聞空中薨薨聲燭之皆飛蝗是秋四境外皆饑獨一郡完熟人以爲異先君於去民害如飢渇或無巳勞之事輙却酒肉不御凡訴訟者隨事裁决大者笞辱小者諭遣之不􅅏狀牘􅀹慎於獄月録日省不俾淹滯或事未具不决者時爲糜以食之夏秋之稅舊以斛卒持㮣高下出其手或累旬不收民至謂倉爲穽先君令民自持㮣斛䘚歛手不敢出聲遇將穫歛預以書與民期民争來輸稅群集時夜到倉下不敢就􅃦民信且恱不遣一吏而稅常先足於他郡江西浙西二省有詔輸粮百餘萬於濟寜水陸三千里先君視之如巳民不使有絲毫怨抑常制毎斛别増四升以􅀘腐耗先君憐其道逺可念言於朝蠲之二省民感泣及朝京師民之在京者數十軰擁拜馬前曰此我輸粮時老父也舊徴州縣吏皆以􅀠䘚往往求索無厭先君下信符置郵而召莫敢不至者信符之籍以印識而中分之或屬之吏則托日月稽違圖賄利先君自箴之緩急之期一自巳出由是吏弊誕息復下其制於州縣㫁吏䘚毋瀆民有故皆以信符召集以故民得一力耕桑而襁􅀒來者相屬四年戸僅三萬稅萬餘石八年稅以石計者增至十四萬四千七百戸増至六萬有竒二州十縣獄無滯囚郡獄㡬空民有積粟野無餓殍鷄犬牛羊散􅀍草野富庻充實儼如承平之世先君奉神事上盡禮社稷山川諸祀在境内􅁱飾壇墠置祭噐祭服湢澣之􅀋躬親爲之周垣之外􅀣以名木將事之際一如儀則無或怠惰水驛始在西門之内卑陋汚濕居者弗康先君料材木俟農之􅂩更作於南城之陽庭堂室房弘敞幽嚴百需之具舉無􅇅者冬寒河凍驛船不行則伐木爲炭穿土穴蔵氷因其餘力以集事功計精慮宻出人意表泗水經郡城南通淮江北引河濟地勢高瀉故搆石爲閘而時畜􅂥之魯橋􅀥林二閘歲壞石塡河中舟道難之􅃥閘丁絙壞石治磚􅁅雜土築成之故以葦困蓄粮火屢爲灾先君教民爲陶作瓦屋百餘間嚴􅅚火令編民居爲曹互相救恤火患爲息先君在官未嘗一時閑雖無事終日冠帶坐堂上召諸吏授以詩書法律盛暑嚴寒不廢公牘堆几群辨譁然片言折之大將軍魏國徐公曹國李公等率士馬百萬之燕駐郡頗久要官勢吏徴索粮芻争欲先得相索授喧錯于前先君從容酬决無不如意一軍􅁛能永嘉侯朱亮祖將舟師數百艘北征㑹河水涸舟膠不能動大怒召先君曰即具五千人浚河不者以軍法論時日且暮先君不􅃘煩民退而禱于天夜三皷大雨􅀺明河水漲數尺舟竟去莫敢言者先君爲政以教化爲先能以德勝佐貳始或倨慢先君愈誠待之䘚愧服願爲弟子武夫悍將或不爲禮久乃化戢信愛凢任吏取質訥少文者必躬先之俾入于善不喜近名常􅁛曰務名者必􅀣威􅀣威者必害人害人以利巳吾不􅃘爲也府庭之前不陳杖械皮鞭掛楹示不妄罰有過者告以道理使之自愧始而疑巳而服巳而信爲不可及至以吏議南還民號呼填道如失親戚隨而行百餘里者數百人郡之子弟員登成均者聞先君䘚奔走閤門外慟哭失聲嗚呼哀哉先君孝愛切至事教諭府君卑聲婉色惟恐弗至及海㓂亂刼村落焚廬舎府君躬􅀒太夫人入山中逃不暫顧妻子两踵血流不恤及出官外遇太夫人與巳􅀄度南向望拜竟日不樂稍遇竒味輙涕泣曰太夫人不食吾何食爲懸棄之至敗臰乃巳遇二弟師訓父育終身未嘗變待朋友有恩好賙急難居濟寜南冠過者必以酒米饋之同郡者加厚焉同邑者又加厚焉告寒與衣告飢與食不能行者僦舟以送之同郡士爲萊蕪丞欲迎其母而告無貲先君以一月俸金與之同僚以事奪無所衣食先君歲買布帛以遺之日召之對食遇夜邀至家飲終三年如一日所入俸禄月二十石盡以散朋友不少吝惜自奉甚薄不服紈綺不帛􅃭袴一如布衣時或陋先君先君曰吾道當爾日不􅂯肉或日無事輙􅁍去曰禄不可徒食也毎夜則拜而陳其所爲事于天始至斛米可易白金三两先君日食之餘盡􅅏之官以紆軍食或請先君爲家計先君曰先國可也敢射利乎所居室壞吏請葺不許曰母以我故勞民出俸貲買葦席障之令蔽風而巳床榻左右雜置圖書入其室者若無人然居官五年惟一子及一童時人謂先君不堪而先君安之兖州守因童進二水􅀲先君笞童數十而召州吏還之鄉人爲他郡縣令以一燖鴈侑書先君郤去與絶交或以爲大甚先君曰吾非市名性不喜分外耳至於薪蒭之微皆易以粟一芥不取於人毎行縣以物自随杯湯不肯受去官貧甚鬻所乘馬以行行李蕭然觀者歎息嗚呼哀哉先君􅆕白如玉􅂡眉秀麗不妄􅀏語不旁觀視動容周旋必以禮法率眞任質不事表襮與人交好不以久近冷熱一立談頃洞見肺腑發言持論一本於正性命之道晚益精熟榮辱利害視之若一臨終之際知非自􅃱超然委命顔色不改嗚呼痛哉先君之學明白純正以紹述考亭爲巳責所志益深且逺逢時得位亦欲推以淑斯人否則退隱丘園傳其業于書以詔後世皆未能究而天奪其年天耶天耶􅂚可信耶諸孤之痛􅂚有極而罪􅂚可量耶先君所爲文辭多不􅅏藁有汗漫集若干卷蔵于家林夫人諱􅁎婦道冠九族先十五年於元至正癸卯九月十四日䘚生子男二人孝聞孝孺女一人􅂯娶夫人王氏諱在生女一人未彌月而夫人䘚庻毋董氏育之董氏生男一人曰孝友嗚呼先君之道蓋法時乎易取政乎書主敬乎禮體和乎樂雅言以詩制事以春秋其深高􅀶大者雖不可測而知然而家焉而有善俗之化官焉而􅃱富庻之治發之乎政事著之乎文辭比於古之賢人循吏未之或加也然古之人有若此而傳者矣亦有不傳者矣其傳者必其居高位者也必其有後人者也必其得立言者傳之也其否者或位卑而人弗知或其後不足以彰之與無傳之者耳今先君之位不顯以殁殁未數年而知者寡矣後之十年知者不尤寡乎又後之百年其復有知之者乎雖有不肖之孤存然年穉身賤言未信乎天下行未出乎四方孰從而傳之乎縱有所待安知其能必至乎此所以不得不悲且懼而汲汲圖之於夫子也夫子哀亡憫存而賜之銘不惟諸􅀌不敢忘先君亦且感德於地下不杇矣謹狀常山教諭王府君行狀府君諱良玉字懷璞姓王氏其先太原祁人五季時節度使彦超由㑹稽徙婺之義烏所居鄉曰鳯林世號鳯林王氏其後有諱固者登皇祐五年進士第䘚官恩陽令縣人在宋舉進士自恩陽始傳三世曰􅀃贈宣奉大夫生二子曰永年喬年喬年生承奉郎濤承奉生江東轉運司幹辦某幹辦生誠誠生衛道衛道生濟景定二年應薦爲國子免觧進士府君之祖也考諱炎澤元石峽書院山長有學術學者􅁛之曰南稜先生黃文獻公師之後爲銘其墓妣􅀓氏府君性高介容貌􅊆然讀書善辨􅀃􅀹深於春秋與浦陽呉公萊交移書論析疑義甚至縉紳之士皆伏之爭迎爲弟子師府君㩀中座談孝悌之道燦然可紀聽者駭然相顧舉邑之秀民賢大夫之子弟爭執經拜門下願託名弟子籍中揖拜進退森森如度視府君顔色俯仰不敢譁􅀏其後成材者相􅁇府君屢試有司不利至正辛酉江浙行中書當試士府君曰吾豈終窮者耶就之試占副榜前名儒學提舉司因用爲婺學訓導府君曰善可以及人足矣何必官爲日未出冠帶坐堂上召諸生兩序立授其程範而督勸之一發端反覆數百言人人競列府君前以聽他師所居戸外無一跡廉訪使者至郡羣儒迎謁爲禮畢俯首曲躬趨出惟恐其發問不能答府君每留坐與之言事數千載治亂人善惡成敗政當否俗淳漓隨問隨答使者未嘗不稱善拜送不敢以布衣待府君張君士弘善士也以廉訪使按部見府君才歎曰吾分得舉士而王先生老於布衣吾愧多矣卽上其名俄授常山儒學教諭府君至常山視婺益加功常山人稱之時府君春秋高三子裕褘補皆業儒而褘從黃文獻公學頡頏儕輩間尤有名待制浦陽柳公貫名士金華胡公翰交爲府君賀府君亦私喜有子怡怡亡其老之將至年七十五以甲辰歲五月五日卒於家六月某日葬崇德鄕青巖里金村之原夫人陳氏諱貞處士寀之女好學知義理通醫藥星曆之書其舅患臂痺夫人奉湯藥躬沃洗久而不倦蒞家御子孫嚴而能教詩書皆口授之晩好浮屠老子書時焚香習誦疾病不廢年七十猶治絲枲不暫閑以今洪武壬子九月十一日卒得壽七十三丙辰十二月某日穿府君之葬附焉孫男六人綬綸綱紀紹紳孫女二人適􅀓完􅀓霖曾孫男十一人曰稠曰秩曰穆曰稷曰程曰穰曰稌曰稙曰稔曰稚女五人禕入國朝以文學􅃱官翰林待制文顯天下而諸孫又皆能守父業府君之德於是乎益可見矣孝孺辱與綬交讀待制公文辭思其所自出因問諸綬而狀府君群行俾蔵焉以備其家乘之闕象山王府君行狀府君諱某字剛甫姓王氏四明象山人曾祖某祖芝翁父松母徐氏府君少倜儻􅀒氣節讀書畧通大義以薦爲台州路學録至正中兵起海上奉省檄攝東門廵檢司事居六年盗不敢犯民安之郡竒其才事難决者輙屬以治府君明而能㫁民趨其令爭闘相訟者不之邑而之府君聞一言釋感而去國朝洪武􅀄昌國民作亂襲象山虜令丞王茫入于海府君與其友蔣公某謀曰狂竪虜上官㩀縣境其誅死固冝然事聞于上大兵必來邑民將盡虀粉吾曹可坐視而不救耶今能先格殺爲亂者以獻則邑人可無害矣府君遂募民爲兵掩擊之殺其魁二十餘人釋其衆喻之曰若曹良民第脅於賊爾能􅄬兵復爲民則可保首領否則自取誅滅無悔衆皆叩頭散去曰君生我時大兵聞有亂者將盡殱邑人及府君以事聞邑人争泣曰微君此邑數萬人皆爲􅀑矣狀上京師賜白金若干两府君家素多貲至府君貲益嬴然不以此自豪卑身好士人有遇難不問利害以身援之弗責其報人以此義府君恒病鄉鄰弟子不學欲割田創學以教之里有假貸者不深取其息與人交和易質直意氣豁然衆􅁛之爲忠信人晚受誣逮京師十二年春正月三日䘚年六十八聞者爲之歎泣先娶葉氏早䘚生一子用􅂦好學有文晚娶董氏許氏生一子甫一歲府君柩南歸以某年月日葬于某山之原俾某狀其事某之先祖與府君俱娶葉氏實聞府君事遂泣而書之以告立言君子謹狀明故贈將仕佐郎禮部員外郎瞿府君行狀府君諱嗣興字華􅀸姓瞿氏其先居河南後徙通州之海門宋末有諱某者避兵南來至姑蘇之常熟家焉生二子青逹俱有才力能服其郷人元師破江南有劉將軍者狥地至常熟青與逹帥里中強壯拜馬前迎之有狂犬突出軍前衆愕然持弓不敢發青直前一箭射殺之衆驩曰壯士壯士可官也青曰吾不如弟逹遂求旗號俾詔諭未䧏者承制授逹百夫長及宋亡遷蘇州廵鹽大使兼􅃹内六縣捕盗轉怯憐口提領娶某氏府君其子也府君少時家有禄食日從其徒射獵飲酒爲樂不喜學書天資仁善和順未嘗有過年七十怯憐口以例革不置官提領君家食甚貧府君即折弓矢脫去紈綺故態躬力穡事以養二親承顔候色惟恐弗至母嘗病癰時天熱癰潰􅆨不可聞人皆掩鼻趨過府君跪床下執蒲葵扇驅蚊蚋以手磨􅁾剔汙扶起卧不解帶者三月至愈乃止毋又嘗患積氣危甚醫不能治或告以股肉可瘳乃置刀盂上而禱于神俟刀躍乃可割府君如其言自旦至晡時蝢顙于地顙破血流盈􅆕刀弗動府君泣曰天􅃘不憫我耶我縱以身易毋猶毋之肉何暇惜乎知刀䘚不可動起引刀割肉覆盂中裂帛漬血褁瘡戒左右弗泄􅅅之謬􅁛他肉以進時母不食巳五日矣見􅅅喜爲之握箸食一杯㡬盡食已而瘳毋後嘗感疾思啖菱時菱未花市之不得觧衣入菱澤中哀呼索之竟日手足皆腫俄得菱實三持歸遺母母疾如失旣而貧愈甚或隔日一炊府君曰事急矣尚守不變如父母何哉携家入蘇城謁多錢家願爲盡力多錢家察府君誠信可仗出貲財俾貿遷日分其息十之二府君由是稍􅁉凡父母所欲無不􅃱也府君不妄取而好施嘗朝出道􅀗人所遺嚢有楮帛若于視其名則市中小夫府君坐不貼席走其家還之有遺田宅契書于路者覽之曰契書失將起爭端跡其人呼與之其人貴家奴失主契畏罪涕泣欲求死叩頭謝曰公活我氊工王氏大雪凍餓不能起竈突無煙府君憫之天明携錢二十緡潛􅄬窻􅂩而去歉歲出糶有寠人來糶衣不及脛府君受其錢五千陽忘曰汝糶十千耶倍與其粟鬻􅂼者過門府君取其五錢授以楮幣十倍曰吾適無錢汝持楮幣去將以餘錢禆我鬻者􅀏曰吾安有錢禆君耶府君曰汝第持去俟錢多歸我不汝急也其意與之而不欲其知皆此􅀋凢􅀒販者必多給其直家人怪問其故府君曰彼胼胝手足以求升合利吾􅃘與較耶歲丙申常熟凶民來依者數十軰府君僦舎以舘而食之癘氣發病者相枕府君躬親粥藥而時進之䘚頼以生府君晚喜浮屠言讀其書豁然若㑹其意者復閱北溪陳氏性理字義即解其要曰聖賢之學蓋如是因戒其二子懋莊曰我少不學至老而始悔􅀂等其勉之懋與莊服父訓刻志事學莊入國朝爲禮部員外郎府君及見之曰吾有望矣洪武乙􅆗九月府君得疾恐念慮或亂畫􅁓爲圈掲屏間常目之二十七日卒于家䘚前一日楚府伴讀陳子晟等道過府君將之京師問府君欲何言府君以两手加額曰語吾兒努力供軄報天子恩我死不恨享年八十有四莊在禮部累請于朝未報卒後月餘贈將仕佐􅀰禮部員外即配蔣氏贈安人安人事舅姑如府君之孝舅姑或怒則率子女羅拜于前曰新婦誠可怒願念諸孫貸其罪舅姑意不解悲泣不巳年七十二先九年䘚是歲十月二十三日葬呉縣横山梅家湾之原與安人合兆女三人一夭二適某某孫男四人紹緒紳某曽孫男二女一府君没明年莊自員外郎拜福建等䖏承宣布政使司左叅政階通奉大夫當得加贈而早欲圖其不杇未暇請云大司農張公行狀公諱􅀳字德昭姓張氏滑之白馬縣人曾大父某大父國柞大母宋氏公生而廣顙豐頥英頴異凡軰少喪二親治書侍御史宋公竒公警慧挾以自隨宋公渾重長者寡言自與不妄有所可否僚吏白事頷之而巳公年十二三嘗侍側㑹吏以事紿宋公宋公乃頷之如平時吏退公惟問曰吏言事非是意實紿公耳公不語而宜之可耶因悉舉其狀無所遺宋公大驚陽叱遣公曰童子何與乃公事召吏詰之如公言叩首服罪宋公因是愈内竒公勉以問學公亦慨然有志於事爲讀書務推學教大㫖警悟辨析釋􅀋訓繁咸有條理名動鄉邑遂以儒舉既而㢘訪司強欲吏公公欲明習法意益學律法以儒術相叅所折獄人􅁛其平辟宗正府􅁺吏中書省􅁺爲工部主事轉大禧宗禋院都事拜􅁥察御史轉御史臺都事入中書爲左右司員外郎刑部右司皆爲郎中出爲河閭都轉運鹽使平江運粮萬戸闕就以命之復入歴吏刑工三部尚書叅議中書省事遂爲江浙行省叅政由江浙移淮南由淮南入中書叅政事出蒞彰德陞左丞移遼陽行省廷議闢燕两荒田以給命公爲司農大􅀸分司京東加授榮禄大夫大都路都總管㝷以年請老至正二十二年以集賢大學士之禄􅃱仕㑹邉事興復起爲中書左丞公以疾辭復以大學士議中書之政而天下亂不可爲矣二十五年仍復以大司農􅃱政歸于家時年七十有一矣後十年以國朝洪武七年二月十四日薨于家年入十有一薨後十日葬淇南之原公天質剛勁色嚴貌莊居廷中有大論議謇謇不少阿屈聞者悚然脫脫丞相􅀹禮惮之目爲鐡虎張公它曹事有所避必問張公以爲如何公亦以天下事自任所至必盡其方爲刑部時民有與父異居而富者父夜穿垣將入取貲其子以爲盗也瞷其入撲殺之及燭視尸則其父也吏議欲誅其子則子不以其爲父欲釋無誅則有子殺父名久不能决公􅁬筆曰殺賊可恕不孝當誅子有餘財而使父貧爲盗不孝明矣卒殺之燕都市中有瞽人挾術詐治貴人病使書其仇人名欲爲之祈禳而誣告貴人以罪脅其賂以事􅁴衆以其篤疾將如常法收贖公曰彼之詐欺雖有目者不能爲宜以盗論使當直决之罪宦臣中政院使康逹理以罪籍家徙海南後得還而死其妻訴􅁈請其家貲公謂閹竪蓄妻無夫婦道格不與其守正疾邪多􅀋此然常􅀓以平恕時海内旣多故驍民常仗劔跨馬横閭里刼財貨以給禦者輙死議者欲同叛賊連罪且及其婣隣公争曰罪其家可也彼爲惡者家且不恤况婣鄰乎使婣鄰畏法遁而從盗愈盛矣妖㓂有敗而㣲服行乞民間者後就擒吏蹤跡其宿食逆旅家皆欲論誅之公爲審覈得歸罪者數百家皆鞭數十縱遣之去僚属譁言奈何縱反者冝􅀗罪語聞丞相丞相曰張公必有􅀃也非汝所知召公問故具以情對咸得免歸江浙運司嘗上言鹽引一比鹽鈔二十倍而法僞造鈔者不以赦原僞鹽引者值赦輙免是利重者法輕利輕者法重也下公議公以爲鈔乃有國者通行之寳引特鹽司防姦之法用之廣狹固異法烏得同言者不可用事􅃦不行其知法意皆如此故有重任必以屬公其分省彰德以兵刑工戸四部自隨尚書以下皆自選舉十路一州地方數千里賦民餉軍造兵噐脩戰具以禦盗賊備河患禁剽掠輯亂恤飢以寜民雖䧟亡相􅁇而人無不服其才而戴其仁及以司農居京師民無流􅇡惠意仁言洽于遐邇置十二屯屯立之吏以勸耕者貧無貲者給牛􅂌耕種貸以􅂖粟賑其匱乏而不取其息其所舉措常得法外意忠義之誠見於顔靣事功雖不盈其志而論當世才能臣者必推公爲首而公亦老矣逮元之亡䘚以壽終公敦内行育弟之􅀌子如巳子爲之嫁娶使忘其孤遊宦内外四十年皆要位所得禄賜不私于家雅有威重据鞍執鞚不左右顧與人坐語竟日身不少側美髯長身望之巍然度量有容人或犯之不與較曲直使久自悔善談辨爲文辭有氣有法度有集若干卷蔵于家娶陳氏生子男二人用質用道用質字文敏介直有才仕國朝爲某官公薨在元亡之後史臣不爲立傳太常不爲定謚而其行能傳之于人者非知德之士不足以紀之而余非其人也文敏方以才自􅁬昭掲先德蓋將有在謹次其所知者以俟謹狀孫伯融傳孫炎字伯融金陵句容人身長六尺餘􅆕黒如鐡一足偏跛持辨風生舉辭如雲人莫當其口能爲歌詩元至正中丁復夏煜以詩名炎遊此两人間日夜相切􅽏益好立機括下􅁓可盡辭采爛然驚動一時雅好酒嘗與煜對飲務出竒相勝毎得一爽句拍案大呼投劍起舞譁聲撼四隣所與交皆天下英俊亦以經濟自􅀒氣豪才雄常輕視章句儒衆中常自許曰孫炎男子豈死蒿下耶㑹江淮大亂今皇帝渡江來金陵聞炎名召見與語累千數百言大意陳元運將終勸上延􅄃賢士以成大業義明辭正上甚恱之辟爲江南行中書省􅁺毎問以事炎慷􅁣激切所謀多合上心上愈嘉重以爲可用上親征浙東炎從行以勞擢同知池州府㝷陞知華陽府皆有聲巳亥十一月擢行省都事是年十二月㑹師克䖏州擇守者咸以䖏在山澤間盗賊慿結不解難其人上旣才炎遂以炎爲䖏州總制錢􅂖兵馬之籍悉以委之不取中報且以勑牒未署者付之㕔其辟任炎匹馬入䖏州時䖏州外七里皆賊窠穴獠酋􅃛蠻狼嘷虎踞不奉官府約束炎至坐㕔事召城中民列階下諭之曰元之不爲天祐人共知之今四海裂爲七八然吾觀其志皆無以生民爲心者得天下者必吾主上也至今爾民梗化未知朝廷意昧者猶或握兵􅃧溝中自招誅滅主上不􅃘加兵故命我面諭爾民將以安爾非厲汝也爾民審思之帖帖遵化則有後福不然吾恐爾民將盡爲戮民叩頭拜謝誓不敢二心轉告其鄉民以孫使君不可翫狎炎亦下書属縣徧諭之數月皆化爲良民炎復擇其勇徤者練爲兵將將教習之擇其爲衆所服者爲之長有㓂則率以禦無事罷歸爲農聞有小警發一符立至軍門無敢或有奸之者強族素驕蹇皆畏之如神不敢出聲語雖在數百里外亦皆縮氣喪膽民頼以安人人謂願得孫使君治吾郡時秀民有能才者見方戰争勝􅀒未分皆伏居山谷中不肯出炎患之鈎至一二人問有才者録其姓名爲書遣使者招􅃱之而故中丞劉基章溢知府葉琛皆爲䖏士所推基最有名亦豪俠􅀒氣與炎􅀋自以爲不當爲他人用使者􅂯往返不起以一寳劔送炎炎作詩以爲劔當獻之天子斬不順命者我人臣不可私受封還之草數千言開陳天命以諭基文辭甚美基不荅逡迍就見置酒與飲論古今成敗之事如傾峽滚滚不休畧無枝􅃨基乃深欽歎之曰基自以爲勝公觀公論議如此基何敢望哉炎遂􅃱基于京師上方征伐無一兵與炎壬寅二月賊將李某賀某叛襲炎炎􅀍禽幽空屋中列䘚守之脅炎炎始紿以生吾能爲若用賀李知非其本情恐􅅏自遺患以燖鴈斗酒噉炎曰以此與公訣炎㧞劍割鴈舉巵酒曰嗟乎我乃爲䑕輩所䧟爾死犬豕且不爾食賊持刀視炎飲酒自如賊叱其解衣炎罵曰此紫綺衣主上賜者吾當服以死勿解引枕而卧賊不􅃘伺其睡乃害之時某日也年四十事聞上嗟悼以某年月日葬于金陵南門外聚寳山甲辰贈徴事郎洪武元年上即皇帝位念宣劳之臣閔炎死義迫封丹陽縣男妻某氏爲賊所擒不屈死􅁇某氏子一人某女某炎事親孝與人交緩急可仗遇匱乏者觧衣推食以給之所著有詩若干卷其弟子蔣敬編次傳于世方某曰余年十一二時先君守濟寜間言炎詩十餘篇皆豪宕可喜及觀􅁍寳劍篇益竒其辭而炎死久矣炎􅀒氣聽其言知其爲􅊆然大丈夫也故䘚以節死孟子論學必曰善養氣養氣有以夫觀樂生傳觀樂生者越南邑寜海人也其先出堯四岳伯夷周武王時男于許祀太岳春秋列諸侯之㑹􅁛善國後失國以爲氏自漢至今不絶人生其太岳攴裔也或曰堯時有由者義甚高堯欲譲以天下不從生蓋由後云或曰由言行不見于經蓋非也生名􅁇字士脩少好學而家貧精􅃀篤志不以貧故自沮遇事有拂激於意輙閉門取書誦之聲抑􅀭若合音節可聽至其家者見生爲人忘其爲貧生亦有以自樂不自知其貧也生能文辭而好遊山澤間物偶㑹心遐觀熟視戀戀不􅃘離去巳即爲文辭以自見嘗曰吾於天得可樂者五天朗㓗時纎滓不敢􅅏與我心􅀋可樂也日之􅀄升月之方霽時吾樂之霞之舒歛雲之變化吾取以爲文樂之吾於地樂海之深􅄎浩漫淵之澄瑩樂山之秀㧞而逺者是皆可輔吾志發吾氣吾文得以汪洋不竭峻而不險肆而不汚者此也又曰吾於古人之言樂之不厭吾所以忘吾後古之世不知䖏乎荒僻曠絶之境而常若有得者非以其書存耶斯其爲樂最深間以其意爲詩九章言所樂者而自謂觀九者而樂莫如我也因别爲號曰觀樂生人疑觀樂生是九物者人咸見之而生奚獨取以爲巳樂觀樂生曰吾非樂九物也能使九物爲吾樂耳吾樂於天地間無所不取而豈特九物哉天之與我者亦大矣豈特與我衆人皆受之第衆人不知而吾知衆人不樂而我樂耳當吾之樂乎此也天不能與敵大地不能與敵厚力可以頓挫萬物者莫予加損也之理也積氣得之以爲物始積滓得之以爲物毋燭乎两間者得之以爲晝夜禪明不息禹得之以䟽浲水稷得之以粒􅀺庻周公孔子得之以爲百世師顔氏子得之以飲水飯粟而忘其貧而吾亦􅀼窺之以自樂世之所樂者貴與富也罄其心之智計不足以􅃱之而䘚亦不能守也藉能守之覷覷然如䑕食乎機噐之傍且囓且目委尾而側行惟恐機之發也計其心􅂚能斯須樂哉孰若不待求於人而得不必畏乎人而安隨乎所遇而無所不樂之爲美也疑觀樂生者聞其言而異之曰觀樂生其知道者耶某曰予始聞觀樂生名觀其詩固以異焉及論次其語信乎非今之士也超於寵辱之表不以困窮易慮古之人皆然而今不少見何耶豈遺世高蹈者衆無從知其事耶以觀樂生之賢與之接者猶不知其所存天下士豈易識乎人不知道而􅃍謂天下無士其未可哉其未可哉王進德􅀓王進德者名敏台之寜海人其上世多爲儒以進士官于宋而從兄璞字藴德尤文而賢進德兒時從長兄􅀼觀縣庭見縣令威儀甚盛歎曰吾豈不足爲彼耶從兄聞而竒其志因令入縣學爲諸生同舎治經爲文辭者易進德年少問其文法靳不以告進德憤且􅁬兼日夜攻習不休踰年輙出其上進德氣剛有㢘隅不與人爲欵狎其所爲事毎欲異恒人其家固貧當其爲學飢渇歸取杯水飲休休然若飫梁肉者人非其􅀋雖欲飲食之不能也嘗與友夜讀空舎中夜半隣女叩門求宿甚哀其友欲納之進德扣門厲聲罵曰吾在此誰敢入此門因疾呼使聞于外其友愧謝不敢出聲女逸去後學舎諸輕蕩士指目進德相戒不敢爲非義或飲酒歡􅀏聞其欵歩即皆畏避始易之者至是皆歎服之㑹太學徴郡縣士遂貢于京師試列高等廷議遣太學生分教北方賜衣陛見以行進德得太原時天子方注意太學學中少年􅀍寵顧異甚入預近事外官見諸生秀才從京師來奔走伺候若貴戚重臣其分教者亦多驕横奴視吏民不爲禮進德獨以禮自約束如平時不復過涯分守令敬愛退相語以爲儒者不可媚犯藩鎮主將苦其清介異巳欲試其所爲召使飲酒床幃婦人於偏室酒酣内進德其中鑰門以去進德入見婦人大呼排門取廐馬乗之逃還主將驚謝􅁛之以爲難後徴分教諸生還京師郡邑恐其入奏發巳罪多賂以金錢貪者受至數百千緡進德一揖辭父老即行無毫髮私奉㫖監收嘉興新城粮後督舟運粮輸蜀峽江悍急行者多舎運舟陸行爲自全計進德生舟中不顧曰王事君命也死生天命也祗君命以俟天命何以陸爲後自全者多以失舟􅀗罪進德拜􅁥察御史旬日以例免歸􅂯起爲刑部司獄坐微法輸作赦歸􅁀疾五月以洪武十五年五月􅀄八日䘚于家年三十有一進德容貌端􅊆有威重慎交與不挫屈于人而善事父兄得孝敬意其所從爲學從兄藴德方進德䘚時爲紀善於燕王府還書與弟􅄾相吊極痛惜之􅄾有文章謹操行有名然常語人謂不若進德葉伯巨居升郭濬士淵皆竒士伯巨以上書論分封事死濬亦言事後以它事死二人皆􅀒豪氣不服人至􅁛進德則自謂弗如也賛曰金華胡翰先生高介人也嘗與余論獨行士自言於衢得一人曰汪琟余昔至京師見琟故嘗仕斥不用敝衣䋲履間纍然䘚以窮死然其論議犖犖不少貶而進德亦喜琟爲人古所􅁛方以􅀋聚者進德與琟之謂耶跡進德操持可謂篤義君子矣而所遭乃如此子罕言命其以是夫􅉟􅂦傳􅉟􅂦字國噐台寜海人也其家素賤父鬻餅市中而舎縣之大家應繇于官者大家惟呉氏最豪貴舎其家生􅂦􅂦生六七年不與市巾兒嬉敖獨喜遊學舘聽人讀書歸輙能言諸生所誦呉氏愛之謂其父令兒讀書􅂦欣然其父獨不肯罵曰吾故市人家生子而能業吾業不廢足矣奈何從儒生遊也然􅂦毎自課習夜坐餅竈下誦不休其父見其志不可奪遣之讀書踰年盡通其師所能師辭之時呉氏家延師儒􅂦就學呉氏亦子育之使學未數年呉氏子無能與􅂦談者其師去􅂦遂爲呉氏諸子師還邑中諸儒皆與爲禮􅁛􅉟先生不敢慢􅂦聞同邑有王愚可先生者學甚􅀶從而師之學春秋通其􅀃去就有司試不得代趙生試趙生乃得上第以仕於是􅂦謂趙生曰我學經亦勞矣而子乃以我而仕此豈非天耶然不可無以謝我携趙生白金五十两而去元末方國珍起海上不能制以重位授之國珍開府慶元求士爲巳用是時知向背者以爲國盗也不可輔皆匿不出國珍聞􅂦有才以計􅀗之􅂦爲所􅀗無奈因爲之盡力爲其府都事有㢘名國珍弟平章事有人犯法屬􅂦治􅂦論如法平章之妻受賕請于􅂦持不可曰今方氏欲舉大謀當用天下賢士一心守法􅂚使婦人得預事乎不許妻怒譛之繫􅂦獄半載乃釋復起爲上虞制上虞與僞呉王張士誠地相錯軍吏貴臣甚衆以􅂦儒生不習邊事稍違約􅂦㑹衆于庭引一驛丞責以不奉公斬之在庭者皆股栗􅂰行請罪􅂰屈久不能起乃罷後雖元帥萬夫長有所陳􅀃皆長跪以言不敢舉目視其􅆕􅂦臨事有才簡牘滿前湏􅁷而决暇復與故人賔客出遊四方遊士爭及其門有馬給事者嘗與􅂦以事過寜海令以下皆迎謁旦暮候其市中人相指歎曰學之能貴人乃至於此乎至正末我兵臨慶元城下國珍懼乘樓船遁于海上怒欲舉兵誅之莫爲計􅂦爲草表謝辭甚恭而辯上讀表曰孰謂方氏無人哉是可以活其命矣乃赦不問更以國珍爲右丞􅂦亦召至京師􅂦爲書萬餘言詣闕下湏駕出上之上爲之立馬受讀付丞相官􅂦楊憲爲左丞惡言事者奉例徙居梁又徙陜去數年憲敗凡爲憲用者皆受誅􅂦賴此以免在陜七年大臣薦􅂦名于朝􅂦至京師中書以謫徙人不冝用將還之於陜􅂦恐還爲人所輕咲以貲屬􅁺史願􅅏􅁺爲之言於丞相曰詹􅂦有竒才以例棄不用可惜丞相不信其人在可召視之非誣也丞相果召見􅂦問之􅂦髯甚美又能爲梁趙間言歩趨進退閑雅有威儀丞相甚喜之􅁛於衆曰詹􅂦尚書才也時河南行省缺郎中吏部請命􅂦爲之丞相曰吾同事以􅂦才不可使外也待半歲除􅅏守都衛經歴改刑部郎中刑部佐寮未完有司請除吏丞相曰刑部有詹􅂦在勝百軰其見􅁛如此􅂦在刑部一以寛仁行法威聲不起而人皆樂其不苛刻罪人當分覆者爭曰願得詹公覆我我死不憾㑹大都督府受賂除軍吏事發誣􅂦有􅂍御吏覆􅂦􅂦言在􅅏守時所養孤甥來省恐有之􅂦誠不知御史曰法貴殺有名䘚誅􅂦與百餘人皆死􅂦坐罪薄有才人惜之鼎爲文章氣􅆋逼古人守身㢘重行義好學不廢自陜入京師時聞人有好書價金一斤􅂦無金惟所乘驢棄以買書其爲人竒􅊆如此及死其所養孤甥爲之服喪三年葉伯巨鄭士利傳葉伯巨字居升寜海東蒼里人也好讀書年二十餘有名於鄉黨選爲縣學弟子員善􅀃禮凡朋友有昏喪必禮相之爲人耿介不能蔵人短見人不善立折之不顧其喜怒人知其無它終亦不恨也以年長通經術陞入太學未久詔諸生分教河北子弟伯巨得平遙縣待諸生如子諸生亦愛之如父兄洪武九年星變下詔求言伯巨曰今天下有三事最切其二事易見而爲患小其一事難知而爲患大此二者積於吾心久矣縱不求吾猶將言之况有明詔乎即爲書言三事曰分封太侈也求治太急也用刑太煩也今四方平矣民庻思治矣而不務以寛厚御之視誅殺人如滅螻蟻使民不􅀗安息欲以圖治難矣夫圖治於亂世之餘猶理絲於棼亂之後緩之則端緒可得欲速則膠結而不可理今病民之不安奸邪不止朝夕異令賞罰不凖君勞於上臣困於下治烏可􅃱乎此二者人皆知其不可然非敗之根也所謂分封太侈者天子畿内地止千里而燕秦􅀳楚踰千里之國以封年少未逹事之王無事則易驕佚有事則易爲僣亂此人所未知而臣所謂爲患難見者也其語皆切直上大怒曰小子乃何敢踈間吾家骨肉我見之且心憤况使吾兒見之耶速取以來吾將手射之而啖其肉耳伯巨至丞相乗上喜乃敢奏詔繫刑曹問狀􅁃死獄中其同時言事有鄭士利士利字好義亦寜海人嘗爲縣諸生其兄士原以儒薦爲河南懷慶府同知遷湖廣按察司僉事士利因告于師去侍其兄遊學有名洪武九年天下考校錢􅂖䇿書空印事起凡主印吏及署字有名者皆逮繫御史獄獄凡數百人士利兄亦以河南時空印繫獄中天子方怒空印事以爲欺罔行省言臣二十餘軰守令署印者皆欲置之死佐貳以下榜一百免死爲軍逺方丞相大夫皆知空印者無它罪可恕莫敢諌士利獨歎曰上不知以爲空印大罪誠得人言之上聖明寜有不悟懷欲言之適星變求言士利曰可矣旣而讀詔有假公言私者罪之久之士利曰吾所欲言者爲天子殺無罪爲可痛耳吾兄非主印者固當出需吾兄杖出乃言言吾死不恨其兄免死出士利乃爲書數千言言數事而於空印事最詳其意以爲誠欲深罪空印者恐奸吏得挾空印􅁓爲文移以虐民耳臣以爲文移必完印乃可今考校䇿書合两縫印非一印一􅁓之比縱得之亦不足用况不可得乎且錢􅂖之數府必合於省省必合於戸部其數誠不可懸㫁預决必至戸部而後定省府逺者去戸部六七千里近者三四千里待䇿書旣成而後用印則往來之難非期年不可至故必先用印而後書此權冝之務所從來逺矣何足深罪且國家諸法必明示之天下而後罪犯法者以其知其不可而故犯之也自立國以至于今未嘗有空印之律有司丞相不知其罪今一旦捕而誅之則何以使受誅者甘心而無詞乎朝廷求賢士而置之庻位得之甚難位至於郡守者皆數十年所成就通逹廉明之士非如草菅然可刈而復生也陛下奈何以不足罪之罪而壊足用之才乎臣􅀼爲陛下痛惜之其書旣成欲上者數矣而未决毎歸逆旅則閉門俯首而泣泣數日其兄子侍行者疑而問之曰何所苦乎士利曰吾有所自耳我以觸天子怒必受禍然殺我活餘人我更何恨遂持書詣丞相府士利短小容貌如常人見丞相禮頗倨丞相問何書士利曰吾將爲天子言之丞相何問也丞相因御史大夫入奏上覽書大怒詔丞相大夫雜問誰教若爲必有主謀者士利􅀏曰顧吾書可用與否如何耳且吾業旣爲國家言事自分受禍人誰爲我謀乎辭䘚不屈然猶輸作終身而竟殺空印者張孟兼傳張孟兼者名丁金華之浦江人也孟兼爲人侃侃自許渉獵書史頗有俊才爲鄉里所􅁛㑹天子詔徴才能士郡縣以孟兼名上擢國子學録禮部主事遷太常司孟兼固􅀒自能爲文常奴視同軰而是時誠意伯劉基以文章有重名與翰林學士宋先生俱爲天下所尊信基氣豪不肯妄下人而獨喜􅁛孟兼嘗爲上言今天下文章士第一爲翰林學士宋濂臣基次之不敢辭又其次則有張生孟兼其餘臣不知也孟兼爲基所􅁛愈自高然他人弗服也或稍慢之孟兼輙怒嘗以文示其鄉人視之無言寘䄂中曰俟夜熟復之今弗悉也孟兼陽爲好言曰湏刪脩之可也退則大怒其鄉人發其所短􅀭言於衆罵之且詆其文曰彼猶蠻夷山谷中縱爲人衣前懸而後曵左侈而右歛視國工所製何敢望哉其鄉人自如不與較旣而孟兼以謫輸作鄉人不及唁及以赦出復官乃賀孟兼怒罵若見人失官則棄背不一視及復官乃更謬爲卑讓賀我若真細人吾何以禮爲倨坐不起迎送其傲睨好􅆕訐人皆如此人以是不附之毎爲宋先生言先生曷不於上前薦我先生亦才孟兼欲薦之未有逕㑹上欲用越僧證問先生嘗見證文否誰所有且索之以觀時證爲書與孟兼論性命先生因言太常丞張孟兼所有之詔先生召孟兼以證文至上覽畢顧孟兼謂先生曰張丞卿門人也先生對曰非臣門人乃臣里中子耳且爲文有才甚誠意伯劉基􅁛之上熟視孟兼曰生骨相薄仕宦徐徐進乃可耳母驟也未㡬除孟兼爲山西按察司僉事孟兼㢘勁疾惡抵司紏擿奸猾無所貸株連徒黨相援引毎一事株流數十吏民見張僉事出行部皆凛然堕膽如畏􅀑神聲聞朝廷陞副使移山東而山東布政使呉印乃鍾山主僧上親􅃟拜官妻用金帛寵之甚厚印以見知人主自尊重禮節少簡孟兼自􅀒其能無敵且印新用又僧也易之印候孟兼由中門入孟兼以爲印雖位大然我風憲司不當由我中門召守䘚笞之月朔望入學謁孔子畢令諸生執經講􅀃孟兼故以語侵譏印印不平時􅀄刋大明寳鈔印不令使兵民更自至庫賈錢民以而孟兼謂此詔印擅行之是違制也􅀐馬入布政司讁箠僚吏問罪且言將上封事言于朝其僚吏皆大懾勸印即上封事言孟兼見陵侮然孟兼封事終不上也上覽印言以爲孟兼凌我任用臣不遜治笞之孟兼旣辱愈憤即捕爲書封事者欲論以罪印復上書言狀請去位避孟兼之横否者且爲所擠上大怒曰彼乃敢與我抗耶吾今乃與爾抗遂械孟兼至闕下廷詰之命衛士捽髪摘拏垂死特論棄市詔印曰吾除爾害矣善爲之􅀄孟兼遷副使山東自陳父老大夫爲之請假上許之孟兼歸至家縣令丞皆門謁奉酒牲爲禮孟兼坐受其拜不荅麾酒郤之鄉人皆勸其少遜譲和以下人孟兼不聽及于敗或憐之或快之以爲冝然孟兼中突無憸賊之心祗以尚氣好高人以故爲人所䧟才能者人所欲得也茍無謙遜以奉之而挾以驕人其爲身害奚怪哉孟兼之才使能克巳下人雖不幸未必死而欲尊大其勢而􅆌略它人謬矣法雖過􅃊其底于此酷厥有自哉芒茐公傳芒茐公者世莫知其爲何許人或謂居廣信之龍虎山家世學老子之道天下爲老氏者咸推以爲宗其先在戰國時嘗相韓韓世家其能以計䇿教漢取天下者其祖也東漢亂韓相之末孫避去巴蜀者以禍􅀑神語動其民民依之居者賴以脫于難後復來江南道益尊人􅁛之爲天師異時人主因而封爵之以天師爲􅁛號禮下之甚至芒茐公其裔也芒茐公姿顔如玉雪目瞳子爍爍有異光少襲祖父爵傳其業其所授徒遍海内所得有精粗其粗者猶能役雷電興雲􅀨􅊥造化取徴驗如合劵自天子以下皆神芒茐公之道歲時使者存問召至闕下道途所繇閭井市巷民聞芒茐公且來迎􅀱拜㐲車馬前以萬計車不得行芒茐公命其徒以符􅄬井中令人就取去飲井立涸飲其氷者病亦必愈於是聞芒茐公事者相增加歡語以爲天人而芒茐公弗自是也曰吾祖取老子以無爲爲教其道甚高後世學者多異蓋神其道而後教行缺去老子滋逺矣乃謝其徒廬于龍虎山之芝渠峯黜􅄝欲薄於自奉以虗静爲極以無言爲教􅀄多藝能好問學學靡所不習後盡棄去以爲害道舉不以累其中志趣超然自得也學道之時缺指太虗示之無爲之言亦推老子太㫖其言不滯于物不淪於缺故共號之曰芒茐公録其所言云賛曰老子後得其道者爲列禦㓂莊周世多有其書而列子言僞也莊周􅁛曰其緒餘以治國家其土苴以治天下觀曹參缺好莊周言又多竒能使盡用之術豈不也欲其自得者深矣菜根居士傳菜根居士括蒼人裔出延陵季子其字曰宗禹少簡伉志氣高不與世俛仰能爲詩歌名出一時嘗遊江淮間釣濠水上登莊周太極長嘯若不以禍福得失經意者人莫知其爲誰見其家有菜又有䖏士服因號之曰菜根居士居士聞之曰甚善遂以自名所居種菜數百畦植灌甚時且不􅅏草萊亂之故其􅂼常盛於恒圃性豁朗不設機穽人有過􅆕折之善輙􅁛服又能料事當否於未然及成不失毫髪以故人爭推其才識與交者貴忘其位長忘其齒賢忘其所德皆傾心爲之盡而居士斥落芒角益以謙和自持客至擷􅂼啐酒旣飲􅋨輙引客行􅂼圃中人怪其􅂼長問其術居士曰吾不失其性而巳人愈竒之意其可居官累官于時毎使其言不能容接人不爲人欺是以人愛其寛而伏其明去爲人所思居士雖仕亦必隱者狀人不􅁛其官而􅁛其所居居士喜曰吾所隱誠非名所識也侯城生曰吾嘗與菜根居士游怪其時郤肉食居士曰子知味之爲味而不知味之味也子以菜味肉則肉非菜也以肉味菜則菜亦肉也賤其所貴則貴者賤矣貴其所賤則賤者貴矣菜哉菜哉其可味也哉故又别自號味齋云其言􅀋知道者余爲論著之友鹿翁傳友鹿翁者居寜海東北􅂄山之下莫知其字名或云其先祖父嘗侍從大官於宋自宋亡元中世家故多難厭世俗芬華事自汚棄遺業屏䖏􅂄山下不交接庸俗日與麋鹿相欵狎若甚好之者而忘其非巳􅀋也别號友鹿􅂄山之人皆􅁛之爲友鹿翁云翁氣貌淳厚意志豁然累散家財貸貧民不能償輙置不問視天下事舉無足累其心者因絶弗與人言曰與庸人談不如與吾鹿友服古䖏士服遊林壑間去來如飛年七十餘如六十許人顔靣燁燁有光望之者疑其爲列僊里人知之者謂翁學通古今得養生法跡雖高而行不悖於倫理其友乎麋鹿蓋有激而然者非其意也或問之曰古之士慕一鄉一國天下皆有資乎其友其友必取道術􅀋巳者以翁之賢不友鄉之賢士而於鹿乎取奚取友之異邪或觧之曰翁之賢視儕軰無可友者與其得憸巧之人而與之遊曷若友無知之鹿邪若使吾有以自娯物皆可以爲徒苟無得乎巳夫孰肯與吾友哉昔舜以大聖人而與麋鹿遊非與之遊也不以所䖏之陋變其樂也傳不云乎篤於爲善者舜之徒翁其近是耶翁聞其語黙然􅀏不荅或問不巳則指鹿曰子其問諸鹿鹿善知我論曰世傳避世之士如荷篠接輿軰皆誕謾不倫非聖而自高多戻中道以余觀友鹿翁恂恂然操行馴謹發言必稽乎義其真超乎世俗之表者邪彼以逢聖人而彰而此莫發其光士之立名績於天下者豈不係其所遇哉大􅀏生傳大􅀏生者越人也通文辭有才畧曉逹世事居家以行義聞然善􅀏未嘗有威容毎讀古書觀其得失禍福感應之理觸於中輙仰首大􅀏彌時不止聞人道當時賢不肖所遇乖殊則又大􅀏不巳或問生太􅀏爲何生􅀏而應曰吾􅀏可􅀏者耳天地於人蓋等非大異於人也天與地得氣之極盛者而成形故其爲質巨爲壽久人得其氣㣲且薄故未久即化其爲物一也而俗以能予奪祥咎人者望之有不從而怨訾以爲天之􅀹豈不妄哉以人視天天固蒼然大也以蟻䖝蛙蝇視人亦猶人之視天乎人􅂚嘗能制蟻虫蛙蝇之命哉或有踐撲􅆂蓄之者偶然爾夫億兆之人在天下不啻如蟻虫蛙蝇之多天必人人而察之以紀其善惡而各當其報不亦劳乎且天之所具以爲用者日月星辰風雷霜雪其事至近也猶耳目鼻口之於人至切也而且不能使其無差忒薄食之灾况能禍福乎故爲善惡而期天必報者惑也不可凖怠而不爲善者􅀹惑也堯舜之無子孔子顔回之厄夭盗跖之壽且樂皆適然耳天何與乎人頋嘵嘵辨之以爲有定未定而必冀其報或又戚戚然懼其不足恃豈不皆大可􅀏乎吾少時亦嘗思聖賢憂世之􅀃矣􅁣然悔悟以爲聖賢者有安斯民之才其軄不得不憂若我於巳且不足何暇他人之憂乎且憂無益也缺意不復憂者以􅀏之適吾性非好􅀏也可􅀏者陳吾前不得不􅀏爾然世人之􅀏樂也不􅀏憂也吾之􅀏非樂不􅀏非憂而􅀏在乎憂樂之間知憂之無益故於􅀏乎發之使我以􅀏爲憂則我死於憂久矣又曰富貴貧賤所以榮辱恒人而非我所榮辱也故吾未嘗以慕惡爲心而惟􅀏以䖏之毀譽喜怒出於人不可以爲輕重故吾聞譽且喜者大􅀏以應之聞毀且怒者亦大􅀏以應之我無善而彼譽且喜焉可􅀏也我無不善而彼怒且毀焉豈不可􅀏耶又曰天地之勝人也久矣人有可以敵之者非身之謂也或者不思而惟其身之欲是榮欲忽焉而俱滅彼蚩蚩者皆不覺也玆其甚可􅀏也嗚呼吾安得不􅀏耶其言如此而每遇儕軰則以告之其儕亦大􅀏不省也間之京師與余握手金陵門外辨上下古今數千載事大􅀏不自勝謂余曰子且竒士觧吾意余亦俛首而􅀏因呼之曰大􅀏生生又大喜曰願爲號云生王氏名某字某􅀃者曰昔者楊朱阮籍皆好􅂘彼非好哭也心有所憤無以自舒因以寓其意然君子嘗病焉以爲士不值則樂道爾奚爲戚戚哉今大􅀏生獨好􅀏豈所謂樂道者非歟孔子論天人之際備矣而亦有所激而然歟否歟雖然其過於怵迫利害而不知止者逺矣溪漁子傳溪漁子金陵江寜人少脫畧不拘與群兒嬉遨輙䖏其上而什伍部署之令之曰之左則趨之左曰之右則折而右無敢過視者溪漁之父素長者常禁切之納之學使讀書時時棄去不肯帖帖諸生間而所業未久即過諸生數倍諸生大畏之其師亦竒之謝曰子非吾曹人也溪漁子亦自雄其才志嘗徃來江淮之南結交大俠異人論古人功業遇當其意徘􅆦歎息仰天􅶈髀若有意於從之遊也與天台林右張轂最善右亦豪士善擊劍知兵而長於爲文轂陽狂飲酒自放於歌詩二人皆自􅀒高一世嬰竪視同列溪漁子在淮上嘗釣海濵望見二人踞坐大咲二人者知其非庸人也即與之語大驚異其所爲引歸逆旅主人出酒相飲攝衣跣行起舞爲樂驩聲撼數十百家辨難上下古今事折􅂨損益根㩀理道識者知其非狂生或不識其爲人共瞷指咲之以爲真狂或又疑其爲神仙人云溪漁子舉若不聞遇適其志鮮衣羙行衆人中見者争觀之否則􅀍汚垢短衣逐躡市人後市人吁之弗辭也後溪漁子盡悔故所爲買書千餘卷伏而讀之爲文章竒偉伉徤然恥以自名常曰漢無儒者惟賈生諸􅁑孔明耳唐人陸䞇粗有識然不足庻㡬王道所貴乎學將以輔天地所不及不然多讀書何爲識溪漁子者聞其論高愈疑之終莫能測其爲何如士也或曰金陵有隱者王顯㣲仲好竒溪漁子即其人云或曰非也方子曰古者豪傑士其身未遇志未信于時寜晦于屠釣以自全不􅃘以細利挫其心彼誠有以真知輕重之分也溪漁子坐都邑中而逺利詭隱使人莫測其淺深此其志不茍且也明矣要之一世竒士哉魏節婦傳魏節婦趙氏者名第台之寜海人也父國真故邑大家延儒􅀓之能爲春秋學者教其子仲武與江浦魏氏子順之同受春秋頴悟精勤嘗與仲武較藝大爲國真所激賞順之祖悌元時以貲雄於鄉爲里主常儲錢百錠爲官用缺復􅀘足其數一錢不取諸民民德之呼爲魏百錠父恩能賙人之急寒者與衣飢者與食死而不能塟者與棺槥國真聞之歎曰求福無如積善脩身無如好學吾無間然矣遂以女歸順之生二女而順之䘚婦年僅二十四即以猶子校爲嗣誓不它適其兄仲武憐之潜受同邑婁氏聘議欲強迎之歸奪其志節婦聞之謂曰將嫁而女弟乎吾生爲魏氏婦死爲魏氏􅀑爾吾弗歸也堅不爲動其兄不能奪校甫七歲晨昏教養至于成立爲娶同邑應氏生男女各二人而校亦蚤世應氏時年二十九上奉孀姑下撫諸子兢業惕勵無毫髪増損於前人男娶女嫁各適其冝人皆以爲善􅁇志趙氏今年九十三尚康強無恙應氏逮將五十子孫森然孝養不怠人人以爲節義所報校字師學應氏字小其子曰海曰江童賢母傳童賢母姓羅氏寜海童䖏士釋卿妻也羅爲縣舊族賢母少喪親姿端厚有識度年十三歸童氏時䖏士之祖母高年而父母皆老賢母事之孝敬雍順治産業習女工甚得婦道舅姑喜家政一任之祖母晚病手足痺不能舉溲惡或時汚􅇃席賢母躬抱持洗滌飲食必執匙筯以進久而不懈祖姑心德其所爲毎私祝曰吾苦新婦無以報願汝有子有婦咸若汝之孝敬賢母有知能遇女妹及族人親戚皆有恩祖姑及舅姑䘚相夫奉喪塟於内外細粗指畫經綜皆有方畧條理旣而家浸盛生四丈夫子子長各有才智好學問訓以禮義忠厚􅀹有母道及䖏士蚤世諸子長娶婦生孫一聽賢母之教遂相與合食不分財異㸑作先祠置祭器以奉祖考家庭之間出内有法長㓜有倫遇人有惠待賔客有禮於是賢母逺邇皆􅁛焉􅀄元季無政大家以貲結長吏田之租稅俾小民佃者代輸里正因而漁利毎畒徴米四升小民以爲病㑹賢母家爲里正催民租稅命减其半不足寜出巳粟以輸鄉閭貧弱頼以不困洪武􅀄寜海及隣縣飢里中冨人以麥貸貧乏者毎麥斗責榖二斗三升時賢母家有麥數􅅒召諸子謂曰飢者衆而吾家幸有餘安􅃘乘時取倍蓰之息若等無效它人冝减息一斗以爲鄉率於是長子遵母意與諸弟行之又白于縣請禁多取息以病民者數百里内貸麥者利其息少競奔走焉咸歎息以爲童母恩巳母好施予孤弱不能自存者給以錢粟不責其償爲之娶婦使成家業如是者二十餘人人或告飢推食以予之遇人有急度其事可解屬諸子爲解之後或背􅀒絶不與較至不義人戒莫近事於不可者戒弗爲其揣料世事明逺甚雖丈夫有弗逮也家人指逾千婢僕指􅁛之人人察其飢飽苦樂與其才性所冝無有怨者今年㡬八十子婦及諸孫婦男女數十人曽孫七八人奉養祗順不敢違果若祖姑所祝名人士往來者皆􅃱拜而去􅁛賢母云賛曰天道報施豈不昭哉世俗智識淺蔽所蘄少不讐輙疑無禍福何其謬也吾觀世人家之興廢多由於婦德孝􅄌惠和者必生賢子􅁀逆狠悖者必無後福非特天意也氣之所感召各以其􅀋應固有以􅃱之矣考之童母之事祖姑雖古所􅁛孝婦何以過其愛人恤物有足多者殆非特婦人所難也卒受善祥果􅃱才子以昌大其宗孰謂積德而不可恃乎二賢婦傳浦江嚴氏婦者鄭氏女􅂦也鄭氏之先以行義著聞州郡累數世不異居至宋青田尉德璋生􅂦而愛之擇所居得嚴某歸其家鄕隣以爲鄭氏之女必賢可知也皆瞷視其所爲見其事舅姑順恱而有禮䖏庭闈無謔言疾步乃私語曰吾知其異常人也今乃果然歸未久嚴氏貲稍衰饘粥或不給禮舅姑不以窶薄其父母冨憐􅂦獨貧將召而勞之􅂦雅自脩􅅚無異平時未嘗以貧故告其父母父母欲􅂌之財則辭曰吾鄭氏固有成法何以女貧故多􅂌之財乎終不受其父䘚母遺之絰帛曰斯若翁喪帛也今不成服矣以遺汝泣曰古有父死而不􅃘視其書以手澤存也喪帛之存其比之書也大矣烏􅃘而受之母慚其言不敢復出口時其歸卷而納諸衾笥旣歸知母之蔵也奉而韜于篋踰年而省母則出諸篋還之其不妄取如此嚴氏族皆賢之母女之甥爲諸暨金生有賢行既而妻于􅂦之曽孫源其事舅姑如其外王母之在嚴氏姑甞感末疾不能興起晨昏侍床下煑麋煉藥踞坐其側扶其首而飲食之或不進則憂戚與人言姑之疾輙嗚咽悲嘆及至姑所強爲喜恱之色以温之姑疾甚久而卒孝養不怠姑垂死以手指天曰吾苦吾婦無以謝願得孝婦事之足矣喪其姑極悲哀無巳聞者爲之泣下夫中歲慕黄老家言入山獨居間一至其家即去奉之愈恭如大賓家嘗遇盗賊夫䖏山中金携其貲避匿他所及賊至逼甚知不可保委貲而去獨䄂其先世墓文一卷及歸貲盡獨出墓文歸其夫其夫驚喜曰貲失千萬不足惜此文乃吾日夜属心者若能存之真吾婦也後生子材娶宋公女爲婦果孝􅀋之䘚如其志云方子曰教之於人也要矣吾聞鄭氏之先祖曰綺者􅀄家貧其鄉人遺之金數斤郤去不取嚴氏婦綺之來孫也其不妄取固亦冝也若金氏少嘗受教於嚴氏婦矣觀其競競然奉舅姑久而無怨是雖孝子所難終有孝婦如其姑之所願豈可謂無天道哉臨海縣知縣黄誥黄巖縣知縣張師善台州府儒學教授尚芳訓導李深黄巖縣儒學教諭文程府學生陳縝葉琰王梅齡臨海縣儒學生李臨卿戴濬之黄巖縣儒學生孫思光牟汝鈞校對遜志齋集卷之二十一終
