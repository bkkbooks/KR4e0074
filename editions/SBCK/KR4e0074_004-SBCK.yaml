front:
  text: 遜志齋集卷之四中順大夫浙江按察司副使奉勅提督學校雲間范惟一編輯奉政大夫浙江按察司僉事奉勅整􅅚兵備南昌唐堯臣校訂中順大夫浙江台州府知府事前刑部郎中東呉王可大校刋
