body:
  text: 雜著周官一余始讀詩大雅豳風見其積累之盛而知周之所由興然猶異之曰何其久也及讀周禮至於大司徒鄕大夫州長黨正之法然後􅁣然歎其慮民之詳曰盡在是矣治天下易也莫難於一天下之民心民心可一也莫難於使民心咸出於正道無加於堯舜求其治之法以爲必有異常絶特之事而其書之所載止於正德利用厚生斯三者何足爲異哉然而越􅁆千載卒未有兼三事而行之者則聖人之治天下固不以求異也盡其道而巳斯民也無以養生則死無以􅃱用則勞無能正於其德則愚以利言之愚不若死之甚也以言乎義生不厚不過於死人不知德必至於爲亂故聖人􅀹以爲先武王周公豈好爲煩細不急之務哉宫室衣服欲其􅍇且同墳墓欲其族兄弟師儒朋友欲其聮比閭族黨欲其相保愛葬救州與鄕欲其相賙相賓或歲一讀法或月一讀法善有可􅁛者書之惟恐不及過有稍著者戒之惟恐不改其日夜提掇督勵斯民而訓之者雖父兄之教子弟不若是宻也計其時之民不在於田廬則在族師閭胥之庭不治稼穡則聞仁義禮樂之教蒐狩則習􅃓矢􅀕酳則肄爼豆􅂚嘗暫放其心而弛其力哉其法之詳故疑衍如此故爲之民者有忠順而無乖逆可使以義而不可刮以􅀔六七百年之間強諸侯狼顧鳶視者莫敢先發陵上之言必至於周禮盡廢而後肆道之化民也夫豈㣲哉秦不識其深意視爲無用之虗言而焚除之由是斯民如放豚逸馬肆然法度之外而不可復制惰者爲盗悍者爲亂桀􅃛者雜岀於徒囚之中馳逐海內咸有争天下之心至于今而未巳人情易於縱肆而難於檢制釋先王之法服而􅀍髪左袵去揖譲拜跪而倨傲怠佚順乎其適意也欲反而盡復乎古不亦難乎然而不行其道終不足以爲治不顧一時之怨而興百世之墜典非明以察之勇以㫁之堅忍以持之者不能也庸人習於茍且智士畏乎造端然則何由而可復耶君以身任之而不奪於流言臣以道揆之而不泥於近利三年而成十年而安􅁇乎其後者能推而守之武王周公之治可㡬也二以一事之失而疑先王之政皆不可行以一人之謬而疑天下之士皆不可信此爲治者之大患車􅀾古法也房琯陳濤之􅀾以車而敗􅀾者遂謂車不可用自秦以來不以車􅀾而䘮師殺將者亦多戾豈皆車之過哉琯以迂踈妄肆不知人而敗非車􅆀然也由琯之所爲使不以車􅀾其能不敗乎故議琯者罪琯可也罪車􅀾不可也先王之政其詳不可悉知也周官之所載詭于聖人之道者雖有之然遺典大法所以經世淑民者秩乎明且俻豈後世所能及乎人見有用之而􅆀亂者因以爲周官罪此鄙陋無稽之甚者也盗竊孔子之履納之而踰人之墻履寜有過乎竊履者可誅耳王安石之用周官棄其大者而不行惟取泉府之一言以􅀓㑹其私卒爲天下禍此安石之謬也周官之言利亦稍宻矣蓋以千里之􅀖畿而供天地社稷之祭車服宫室之用公卿大夫群臣之禄諸侯之燕饗四夷之遺賚咸出於是固宜有其法焉然取民也有制役民也有節凶禮則無力政無財賦無関門之征其不厲民以自養亦明矣安石不師其善者而泥於國服爲息之􅀃期以冨國而國終不能冨周官之法豈止於此而巳乎爲治有本末養民有先後制其産使無不均詳其教使無不學文武周公之大意也法古者亦取其大意所属而行之奚患財之不足哉不治其本而以理財爲先此文武周公之所誅而周官之所棄者也安石不顧而妄行後世不察而并罪周官周官何與焉自治道之不明士之自任者鮮矣自信而不惑者􅀹鮮也安石之自任而自信漢以下儒者皆莫之及使誠識其大者而行之其事功豈不甚􅊆哉惜其學不知道而過於自信也斯民不見先王之治久矣遇主者恒患不知道有其噐者恒患不逢其時其法存其人存茍有遇乎世焉知周官之果不可行哉周禮辨疑一周禮者周史所記周之治事書也以其出於周也文武周公之遺法㣲意徃徃可得而推以其成於史氏所述也故不能無謬於聖人然去後世之制則巳逺矣其有不能大過於後世者蓋亡逸之餘秦漢之士以意增損之者衆也條狼氏之誓群臣於馭曰車轘於大夫曰鞭五百於大史曰殺小史曰墨周法豈若是􅁀哉君臣之際有常禮上不以尊而威其下下不以卑而屈於上道合則仕否則引而退不宜以鞭笞戮辱懼之也夫馭及太史皆近臣大夫則國之執政加以嚴刑而誓於衆使賢者居其軄而能不知愧乎此非以禮使人之道也且車裂鞭三百之法秦漢以䧏之所有周之盛時寜有秦法御群臣哉其非周制也明矣昔歐陽氏蘇氏皆嘗疑周禮然皆其制度之失耳於道無害也周禮之善多矣制度之不盡合豈足爲周公累哉若其有戾於道者則學周公者所宜知也二聖人之治天下立法也嚴而行法也恕嚴者所以使民知法之可畏而不犯恕者所以使民知刑罰行於不得巳而不怨斯二者其爲事不同其至仁之心一也昔者讀酒誥之書甞疑武王欲殺群飲者爲過甚旣而思之武王豈好殺之主哉其爲是言也蓋愛其民之深而人不知也示之以姑息阱民於死地而後刑之孰若先之以不可犯之禁使民不䧟于罪之爲美乎武王以爲使殷民酗醟而至於爲亂不誅之則害法誅之則害仁民受其禍者必衆矣不若威之以至嚴使聞吾言者疑吾爲過察吾心者感吾爲仁聖人之用心不茍以恱民而使民隂受其惠此仁之至者也周禮周之遺書其慮民亦詳矣然不能無可惑者焉司徒之媒氏仲春令㑹男女於是時也奔者不禁夫王者之防民範之以禮義猶恐其爲邪况納之於邪何以責其不由禮義乎昏娶以禮至勞而逆情也越禮而奔至易而適意也然人不敢爲其易而勉爲其所難者以有法禁存焉耳今曰不禁人之奔孰肯舎至易而爲其所難乎是令之行男女無以禮合者矣啓之以􅁋奔之路茍又從而罪之是罔民也縱其越禮而不詰是賊民也夫婦者人倫之始夫婦之倫不正則人之倫將亂矣武王周公烏􅃘爲此姑息之政以亂倫也哉賢人之言可僞爲也聖人之心千載可推而知也求其言而不合能揆之於其心則是與非决矣人奚由僞三人之情不能無欲也故不能無争争而不能自直也故不能不赴愬者非人之所得巳也故君子盡心焉察之惟恐其不明䖏之惟恐不合乎中民之有欲愬者惟恐其不至也安可責之以其所必無而禁抑使勿言乎周禮司㓂言民以財貨相訟者令入束矢以罪相告者令入鈞金而後聽之此非周制也民心貧冨不同而後強弱生焉強弱相凌然後獄訟生焉強不勝而弱勝者十一弱不勝而強勝者十九私闘于下而不勝則憤而愬于上則凢愬者多貧弱之刼於勢力而不􅀗自存者也烏得鈞金與束矢乎鈞金束矢冨強者之所有而貧弱者之所無也茍必欲得之而後聽其辭則冨與強者常勝而貧弱者終困抑而不伸何由盡民之情而服人之志乎以是而聽訟後世􅁀吏之所爲周之法必不若是也孔子之門蓋有以聽訟􅁛者孔子曰聽訟吾猶人也必也使無訟乎夫聽訟而得其情未爲失也孔子猶且非之况苛取於民而禁其訟者哉治天下不能使民無訟而禁其勿訟其差甚矣焉在其爲周公之政吾固知周禮非全書也四治經不可􅃱疑也疑經太過則聖人之言不行亦不可無疑也不能有疑則聖人之意不眀始於有疑而終於無所疑者善學者也苟於信而不知擇於經何所明哉周禮余之所最好而疑之爲􅀹甚蓋好其岀於古愛其爲先王之制而惜其或失先王之意也故求之也詳味之也深於其有可疑者不得不爲之辨也昔者周公論爲治之道俻矣未嘗及乎財利武王受西旅之􅆈召公駭然以爲不可而争之夫受一犬未爲害道財利國之所宜用言之未爲有過二公抑之而不言斥之而不使人主受其貢者所以防亂源而慎其始也王者之所爲將爲後世法舉手投足且不可不慎况著之於書定一代之制周公謹之宜何如哉周禮之於言利何其宻也金玉玩好則入于王府良貨賄則入於內府至於山師川師皆使􅃱珎異之物其汲汲於利如此豈周公意哉以爲周公之所著而法之不惟誣周公且禍後世矣昔之疑周禮者詆斥過甚固不足知聖人之意然若此者其非周公之言决也天下之患莫甚於名是而實非人求之以其名而行之於事必自財利始元豐之禍是也然則余安得不辨乎西伯伐崇爲史者之言曰西伯之囚羑里崇侯虎實譛之及西伯得賜斧􅃏專征伐而歸五年果伐崇侯虎果若其言是西伯挾天子之柄而報私怨也此必不然聖人之於賞罰豈嘗容心於其間哉觀人之善惡何如耳其善可旌也雖平生之所讐怨烏得不賞之其惡誠可誅也雖懿親近戚吾烏敢避焉蓋此法者非吾之所私有乃天子之法受之於先王而與天下共之者也竊天子之法賞無功則爲祐惡罰無罪則爲􅆷善此二者必誅於聖王之世紂之無道久矣諸侯豈無不臣服者乎其以斧􅃏錫西伯受而行之宜自不臣服者始必不悻悻然蓄私怨而圖伐之也崇侯之事逺不可知其詳矣吾意其人必比㐫黨惡不供職於天子而侵害其輿圖殺虐其民人棄蔑其宗廟故西伯伐之必不以其譛巳也茍憾其譛巳是㣲量淺智之人齊桓晋文之流之所爲豈足爲聖人哉且羑里之事不經見史所称獻羙女善馬珎怪之􅀃皆􅀾國之末好妄言者意搆之詞非其事之實也妄言者見詩􅁔伐崇求其罪而不得遂誣其譛西伯以爲伐崇之端而不自知其謬也西伯嘗伐犬戎宻􅂄及邘矣則此四國者又豈皆譛西伯者耶故謂西伯伐崇者是也謂崇侯譛西伯以女馬賂紂得脫者皆非也曰然則史氏所􅄒西伯之事亦有足信者歟曰惟獻地請去炮烙之刑者近之餘皆無足取焉耳武王誅紂余讀春秋見其紀時書事少者止一二言多者不過數十言㫁㫁然傳其所信而不敢肆􅀼嘗疑之以爲當時史官所載必詳矣孔子􅂚不盡舉而書之奚爲簡略若是哉及觀左氏榖梁公羊三子之傳各述其所聞甚詳或曲􅀃以傳經或因經而搆事肆情極論無復顧忌􅀄若可喜徐而推之率多虗詞而鮮事實徃徃不足以得其要領而愈􅃱人之惑然後知孔子謹嚴其詞若不敢盡者憂天下後世之至也孔子嘗繫易以辭矣反覆詰難至於理彰意竭而後止何獨於春秋而不盡其辭蓋道可以智竆而事必以實著與其循疑而失實以爲後世害不若著其可信者之爲愈也故曰多聞缺疑又曰吾猶及史之缺文也此孔子之意也司馬遷之爲史記其志以作春秋自儗亦非不知春秋者矣至於紀載徃昔之事竒聞怪􅀃無所不録而於三代之本紀多背經而信傳好立異而誣聖人其他㣲者未足論若武王與紂之事見於書最詳而遷乖亂之􅀹甚牧野之兵非武王之志也聖人之不幸也武成載其時事但曰一戎衣天下大定不書紂之死者爲武王諱且不􅃘書也他書謂紂自焚死意爲近之武王之於紂非有深讐宿怨特爲民去亂耳當斯時使紂悔過遷善武王必不興師而踰孟津及紂兵巳北使紂不死而䧏武王必將封之以百里之邑俾奉其宗廟必不忍加兵於其身也况紂巳死乎吾意武玉見紂之死也不踊而哭之命商之群臣以禮塟之矣豈復有餘怒及其旣死之身乎遷乃謂武王至紂死所三射之躬斬其首懸於太白之旗又斬其二嬖妾懸於小白之旗此皆􅀾國薄夫之妄言齊東野人之語非武王之事遷信而取之謬也漢高祖魏文帝皆中才之主非有聖智之度高祖猶能不殺子嬰文帝猶能奉山陽終其身曾謂武王聖人而忍其君至此乎吾決知其不然矣茍信遷之言是使後世強臣凌上者􅉁醢其君而援武王以藉口其禍君臣之大義不亦甚哉吾故辨之以爲好竒信怪者之戒畢命余讀周書至於康王之命畢公然後知周公之忠厚也殷之遺民可謂頑矣大者作亂小者驕􅁋奢侈不率法度禮不得而齊之德不得而服之周公知其不可旦夕治也旣欲加兵誅之又舉而遷之於洛其怒殷民亦甚矣然方伐叛也爲大誥告四方自他人言之宜痛詆深誚不比於恒民而周公方申命焉告以天命之去就無一辭及其民之非多士多方一則言遷民之故一則言䧏四國民命不誅之由反覆乎夏商之存亡􅁛其民曰商王士曰義民而不􅃘少傷之夫周公豈不知殷民之頑哉終不斥之爲頑民而曲爲之諱避者聖人之慮至深逺也民莫不有是非好惡善未至於此而加之以善名則必喜而􅁬曰上之待我以善人也安敢不爲善惡未至於此而加之以惡名則必怨而怒曰上之不以君子待我吾安用爲君子故以君子望中人中人皆慕而爲君子以小人望中人中人或失其恒心殷民固頑矣周公以王士義民待之彼欲不修士君子之行得乎聖人之待人也恕如此宜乎未歴三紀而皆化也至於康王不知聖人導民之㣲權命畢公􅁇周公之軄輙􅁛之爲頑民舉洛邑之民豈無善者哉槩而謂之頑殷民聞之得無怨且怒乎號之以爲頑而欲責其不爲頑不可得矣然則周公婉辭和色化殷民爲君子康王發片言而誣殷民爲頑民文王武王忠厚之意至是銷鑠殆盡矣不然世之庸主無典則以遺後嗣者子孫蒙其遺烈猶可傳數世無亂以文武周公之大德􅂚爲不二三傳而􅃍㣲乎史􅁛成康爲至治余謂周之衰康王基之擅弓季武子成􅃦杜氏之葬在西階之下請合葬焉許之入宫而不敢哭武子曰合葬非古也自周公以來未之有改也吾許其大而不許其細何居命之哭成􅃦而夷人之墓合葬於人階下二子皆不足爲知禮其􅁛之也奚當然則知禮者宜何居曰無巳則卜野而遷諸猶爲善乎是防墓崩孔子泫然流涕曰吾聞之古不修墓取乎古而師之者以其合乎人情當乎理也父母之棺髐然􅁀于人而不修何取於古乎信如其言安足以爲聖其誣孔子甚矣謂殯乎五父之衢亦然子夏䘮其子而䘮其明曾子弔之云云止亦巳久矣孔子之門人曾子最少曾子之父與師商固友也曾子於子夏之䘮明而弔之則宜其名而數之者非曾子事也傳之者過也曰朋友有過以其長也則不正之與曰非也正之者是也名而數之曾子不若是􅁀也何以明之曰其辭倨而慢曾子之言慤而謹有子問於曾子曰問䘮於夫子乎曰聞之矣云云止不欲速貧也孔子之欲仕非爲富也爲行道也􅃱美於棺椁非爲不朽也爲廣孝也欲冨而瞷且趋焉以求利於蠻夷之國曾謂孔子若是乎欲全其旣死之軀而因以爲民制孔子何取乎有子之疑曾子之問子游之荅傳之者謬也子思之毋死於衞柳若謂子思曰子聖人之後也云云子思曰云云吾何慎哉禮者君子恒履之器也不可斯湏逺於身豈以家之貧富時之通塞爲行否子思賢者其於道粹矣信斯言也烏在其喻於道孔子之故人曰原壌其毋死夫子􅂇之沐椁云云止無失爲故也周公曰故舊無大故則不棄也茍有大故則周公必棄之矣小過而容之義也大故而棄之者亦義也察察然拒昧昧然容薄量無制者之爲豈聖人所爲乎天下之大故宜莫甚於毋死而􅁔者矣此而不棄烏乎棄以是爲聖人之量吾弗知也讀三墳書書之名真而實僞者多矣何從而信之哉亦在慎辨之爾辨之法有三味其辭以望其世之先後正其名以求其事之是非質諸道以索其㫖之淺深而真僞無所匿矣吾嘗執是以觀天下之書蓋十不失一焉若世傳三墳書者則又凢鄙而易見者也孔安國􅁛伏羲神農黄帝之書謂之三墳其言大道今此書以山墳爲伏羲之書言君臣民物隂陽兵象謂之連山易而姓紀皇䇿之篇附焉以氣墳爲神農之書言歸蔵生動長育生殺謂之歸蔵易以形墳爲皇帝之書言其目而傳以申之考其辭則不􅀋正其名則不合質諸道則淺陋而無稽其姓紀篇曰太始者元胎之萌太極者天地之父母太易者天地之變太初者天地之交太素者三才之始天地孕而生男女謂之三才頗剽莊列之餘言而造爲異􅀃此其道之淺陋無稽者也其論物則曰木爲金所剋服陽臣十幹此後世暦生之常談伏羲之時曾有之乎論民曰四民之物以貨爲本伏羲之時􅂚有四民之名乎謂封拜之辭曰䇿䇿始於漢而謂伏羲氏有䇿辭可乎祭天地於圓丘大夫之妻曰命婦周禮始有之而謂天地圓丘恩及命婦爲黄帝之事可乎相人之術起於衰世而謂聖人以形辨貴賤正賢否爲神農氏之書可乎此其名之不合者也其辭皆後世俚野之談而其􅀹謬者曰山月升騰川月專浮山雲疊峰氣雲霰彩山氣籠烟川氣浮光雲氣流霞皆唐人爲詩之語其政典篇徃徃竊取書易而損益之如曰惟天生民惟君奉天民惟􅀖本食惟民天出言惟辭制噐惟象動作惟變卜筮惟占先時者殺不及時者殺皆是也或者未之察顧謂書所謂政典正本諸此而定爲上古之書其亦異哉然世之僞書衆矣如内經􅁛黄帝汲冡書􅁛周皆岀於􅀾國秦漢之人故其書雖僞而其文近古有可取者此書則又僞於近代者也其後有序不著其姓名自謂天復中隱於青城之西因風雨石裂中有石匣得此書於匣中其文絶與此書􅀋天復唐昭宗時也豈即青城隱者所僞邪雖然聖人之經猶日月然其道猶天地然使孔子時有三墳書孔子固不得而刪存其名而亡其書孔子猶嘗言之今孔子之繫易但云伏羲氏畫八卦神農氏爲耒耜黃帝垂衣裳未嘗言三皇有所謂三墳書也孔子不言安國何㩀而言之耶然則安國之言亦妄矣彼僞爲書者因其言而復僣襲周禮三易連山歸蔵之名以爲伏羲神農之書周易不可襲則以歸蔵先坤後乾名黄帝者故曰坤乾其亦妄之妄者耶以區區俚野之文而欲托於三代唐虞之上是猶瞽夫懸破鏡於空中而欲自比於日月也其亦惑之甚耶於乎世之擬經者亦可以知愧矣讀夏小正夏小正凢三百九十餘言先儒以孔子所謂行夏之時者即此書且以時之正令之善釋之自今觀之其書記十二月之候有關於人事者二十有七若采芸采蘩祭鮪攝桑剥􅀲剥􅀥納蔚取茶之􅀋皆俻記之求其大者惟服公田綏士女萬用入學剥鱓頒氷始􅅙祈麥攻駒頒馬王狩陳筋革十一事而巳豈所謂令之善者止於斯乎孔子有取於夏時以建寅之月爲歲首耳豈誠謂此書乎使此書果夏之遺書孔子􅂚不編於禹貢㣧征之間乎孔子倘見此書奚不曰得夏小正而曰得夏時乎孔子未嘗指而言之後乎孔子者乃從而實之豈固别有所受乎或者信其􅀃􅃍謂汲冡書之周月觧吕不􅅊之月令皆本諸此果何以定其先後乎聖人之經傳之萬世而無惑者以其明道也於道茍無損益雖謂出於孔氏之壁成於堯舜之時謂之古書則可矣吾安敢信哉讀汲冡周書汲冡周書十卷七十觧或謂晋太康中出於汲郡魏安􅁵王冡故曰汲冡以論載周事故曰周書宋李燾以漢司馬遷劉向嘗􅁛之謂晋時始岀者非也此固是矣劉向謂其書爲周書即孔子刪定之餘者則非也何者其事有可疑也略舉其大者言之武王之伐􅎋誅其君吊其民而巳其世俘篇乃曰馘魔億有十萬七千七百七十有九俘人三億萬有二百三十夫殺人之多若是雖楚漢之際亂賊之􅁀不若是之酷而謂武王有是乎所誅以億萬計天下尚有人乎周公之用人不求俻於一人其官人篇乃曰醉之以酒以觀其恭縱之以色以觀其常臨之以利以觀其不貪濫之以樂以觀其不荒以詐術㗖人而責人以正雖􅀾國之世縱横權數之徒所不爲曽謂周公而以此取人乎王者之師禁亂除􅁀以仁義爲本其大武篇則曰春違其農夏食其榖秋取其刈冬凍其葆不仁孰甚焉其大明篇則曰委以􅁋樂略以羙女不義孰甚焉此後世稍有良心者所不􅃘爲曽謂王者之用兵乃若是乎其爲文王之言曰利維生痛痛維生樂樂維生禮禮維生義義維生仁此稍知道者所不言曾謂文王大聖人而爲是言乎其文傳篇曰有十年之積者王有三年之積者覇覇之名起于衰世周初未甞有之謂王者不以道德而在乎積榖之多是商鞅之徒所不言而以爲文王之言可乎其他若是者甚衆及載武王伐商之事徃徃謬誕與書不合由此觀之決非周書謂孔子刪定之餘者非也其中若謚法周月時訓職方之篇又與爾雅月令間有合者竊意漢初書亡隱士縉紳之流所僞者以爲周書而司馬遷不察故引而用之劉向因以爲古書耳其中芮良夫篇最雅馴其曰后除民害不惟民害民害非后惟其讐民至億兆后一而巳寡不敵衆后其危哉嗚呼君子之言三復其篇爲之出涕讀司馬法周司馬有用兵之法至齊威王欲尊用田穣苴遺論古司馬法附穣苴之書於其中號司馬穣苴司馬法漢藝文志百三十篇今所傳者五篇蓋周書之存者寡矣而其言論猶有先王之遺意焉先王之兵非黷武好勝也將止亂而巳此書所謂以􅀾止􅀾者得之先王之兵以愛民爲本此書所謂不因㐫不加䘮冬夏不興師者得之先王之世寓兵於農農􅂩講武此書所謂忘􅀾必危者得之以德不以力王道之盛也非此書所謂六德者乎正名而不尚詭王道之要也非此書所謂徧告諸侯彰明有罪者乎所謂舉賢立明正復厥軄則興滅継絶之事也所謂以仁爲本以義治之則王者之政文武之所由興也若是者非穣苴所能言其爲遺書無疑至有駁而不純譎而不正者則皆穣苴之法而亦非􅀾國之談兵者所能及蓋兵書之近道者也嗚呼王者之不作也久矣人心之趋下也日以滋矣於是英君謀士以譎詐爲竒以屠戮爲武若唐太宗李靖之問荅惟知有孫呉之術而司馬法爲虗語矣况有出於孫呉之不􅃘言者乎悲夫讀三略三略三篇或謂太公之書非也蓋後人僞而托焉太公之言於書無所見孟子以爲天下之大老與伯夷並􅁛則其人可知矣三篇之中大率皆平淺鄙狹雜援軍䜟以足成之夫䜟書起於􅀾國之後太公之時曾有之乎中略之末謂三略爲衰世而作太公之佐文王果衰世乎其間曰􅄃英雄曰侵盗縣官曰奸雄相􅁛曰覇者制士以權皆漢魏以後之言曰非譎竒無以破姦息㓂非隂謀無以成功曰豪傑事職國勢乃弱其詭謬害理雖太公之奴􅊢所不屑道而妄謂太公之書可乎復有六韜者其誣聖賢􅀹甚論六兵則皆竊孫呉之所陳至其所自言猥細煩曲無足觀者至於避正殿用􅀐卒之􅀃又其僞之易見者也近世三山施子美爲之講義曲爲辨釋以昡其愽卒不敢言其爲僞其愚陋無識特兒童之見耳而世乃傳而誦之讀子華子余始聞太史公言子華子爲僞書近求其書以觀其辭婉麗可喜未覺其爲僞也及詳味而徐察之始知爲僞書無疑蓋子華子程氏名本子華其字􅀳人與孔子同時孔子所與傾蓋而語者也夫孔子周遊四方道途所遇若楚狂沮溺荷蕢荷蓧丈人之流皆不足知其意至於歎息而不巳子華子一見而得聖人之歡心亟觧束帛而贈之豈非當時之賢者哉其言論宜有過人者今所傳十篇之中語道德則頗襲老列之㫖專對則倣左氏之文辨黄帝鑄􅂦事不能直排其謬而曲爲之􅀃傅㑹不經與晏子論儉雖爲近正而起人君奢侈之端荅北宫意祥瑞之問善矣乃恐後世巧詐誕譎之臣作爲聲謌薦之郊廟似指漢武朱鴈芝房之事其子車氏猳之喻復􅀼韓愈所作柳宗元墓銘論代播州之意醫藥之技孔子罕言之則􅇵談之而不置八卦以宫言孔子賛易時未有也而曰坎宫震宫觧字之不􅀋時之乖錯者甚衆以爲子華子之書豈非誣哉其首有劉向序亦與向文殊蓋亦僞也僞之者不知爲誰􅄯公武以爲元豐以後人以字􅀃而知之或以爲王銍豈或然歟嗟乎人之著書上欲以淑來世其次亦欲􅀭聲光於不朽而僞是書旣不足以淑諸人而又不能少見其名果何爲哉果何爲哉讀曾子曾子十篇一卷其詞見大戴禮雖非曾子所著然格言至論雜陳其間而於言孝􅀹俻意者岀於門人弟子所傳聞而成於漢儒之手者也故其􅀃間有不純如曰喜之而觀其不誣怒之而觀其不􅱗近諸色而觀其不踰飲之而觀其有常又曰神靈者禮樂仁義之祖也又曰君子將􅀃富貴必勉於仁若是者決非曾子之言顧其言孝有足感予者予少之時事二親嘗謂人子無所自爲心以父母之心爲心今此書曰孝子無私憂無私樂父母之憂憂之父母所樂樂之㫖乎其有味哉一何似予之所欲言也然少時知之而不能躬見之及今欲養而二親巳莫在矣疾病篇有曰親戚旣沒雖欲孝誰爲孝誦其言輟業流涕者久之讀荀子道之不明好勝者害之也周衰先王之遺言大法漫滅浸㣲孔子岀而修之斯道皎然復章聖人之業煥然與天地同功彼䖏士者生於其後務懐誹訕之心以求異於前人其心以爲堯舜之道孔子旣言之矣復附而重言之何以云云爲哉於是各馳意於險恠詭僻渙散浩􅀶之論排擊破碎先聖人之道以伸其嵬􅃈一曲之偏智若楊朱墨翟宋鈃列禦㓂莊周慎到之徒是也孟子生乎其時懼聖人之道敗壞於邪􅀃乃敷􅀭孔子之意而攻黜之然後復定蓋彼之􅀃偏駁易辨故其入人也淺可指其過而聲之也若荀􅀸者剽掠聖人之餘言發爲近似中正之論肆然自居於孔子之道而不疑沛乎若有所宗淵乎執之而無竆尊王而賤覇援堯舜摭湯武鄙桀紂􅌂若儒者也及要其大㫖則謂人之性惡以仁義爲僞也妄爲蔓衍不經之辭以蛆蠹孟子之道其區區之私心不過欲求異於人而不自知卒爲斯道䜛賊也蓋數家者偏駁不倫故去之也易荀􅀸似乎中正故世多惑之惜無孟子者出以紏其謬故其書相傳至今孔子曰惡紫爲其亂朱也惡鄭聲爲其亂雅樂也夫欲擯悖道之書而不用必自荀􅀸始何者其言似是而實非也讀孫子戰非聖人之得巳也聖人之所謂􅀾者不城而人莫敢踰不池而人莫敢近無戈矛劍㦸弓矢之噐而姦謀邪慮消沮於萬里之外是之謂道德之師其次導之以禮樂申之以政令誅􅁀而伐罪救民而不求利不􅀾而服人不殺一卒而勝國是之謂仁義之師下此則以材相用以詐相欺而巳矣若孫武子者亦其一也然其十三篇之所論先計謀而後攻􅀾先知而後料敵用兵之事周俻明白雖不足與於仁義之師茍以之􅀾則豈非良將乎視彼恃力之徒驅赤子而䧟之死地者猶狼殘虎噬耳嗚呼武亦安可得哉讀呉子衛人呉起書六篇兵書也起嘗受學於曾子故其書間談仁義然起烏足以知仁義哉起嘗殺婦而求將囓臂與毋盟其天資固刻􅃘之人是以見棄於曾子之門而卒以兵顯觀其論兵則孫武之亞也而武之􅀃爲明俻矣起嘗與魏武侯言在德不在險信􅀾國時之名言特以無行見少於世亦可以見聖人之教入人者深而是非之公終不可泯也於乎豈不足爲喜功者之戒哉讀慎子世以慎到與鄧析韓非之流並􅁛到雖刑名家然其言有中理者非若彼之深刻也其謂立天子以爲天下非立天下以爲天子不猶儒者所謂君爲輕之意乎其謂役不得踰時不猶不違農時之意乎其謂用人之自爲不用人之爲我不猶舎巳從人之意乎其謂不設一方以求於人不猶無求俻之意乎其謂人君任人而勿自窮不猶任賢勿疑之意乎但到不聞聖人之道不知仁義之治墮於曲學而流於卑陋爾夫豈其性然哉讀公孫龍子君子無用乎辨也豈惟無事乎辨亦無事乎言也充乎心不得已而後言正言之而理不明不得巳而後辨辨而無所明言而不岀乎道則亦無用乎言與辨矣若公孫龍之辨不亦費其辭乎孔子所謂正名數言而煥然矣龍術爲白馬指物通變堅白名實之論枝蔓繁􅃨累數千言然其意不越乎正名而巳傳有之曰有德者必有言有德之人一言而有餘不知道者萬言而不足故善學者必務知道讀尹文子尹文子一卷劉向定爲刑名家書仲長統分爲上下二篇且以劉向之論爲誣然向謂爲刑名家者誠是也特善於鄧析田駢者耳其􅀃治國之道以爲人君任道不足以治必用法術權勢術者人君之所宻用群下不可妄窺勢者制法之利噐群下不可妄爲非刑名家而何但其爲民之心頗切末章􅀹中時君之弊使舉而行之名實正而分數眀賞罰嚴而事功舉亦足以善其國然其苛刻檢柅而難於持循蹈􅂂非王者之道以故君子不取而統獨好之遂因以斥向殆有所激而然耶讀鄧析子鄭人鄧析所著無厚轉辭二篇其言皆嚴酷督責之行韓非李斯之徒也嗚呼先王之澤竭而仁義道德之􅀃不振刑名者流著書以千諸侯用之而亡國者何限其遺毒餘熖蔓延于天下生民受其害至今而未已不亦哀哉予擇其可取者二百言著于篇餘皆焚之夫水濁則無掉尾之魚政苛則無逸樂之士故令煩則民詐政擾則民不定不治其本而務其未譬如拯溺錘之以石救火投之以薪爲君當若冬日之陽夏日之隂萬物自歸莫之使也恬卧而功自成優游而政自治豈在振目扼腕手㩀鞭朴而後爲治歟心欲安靜慮欲深逺心安靜則神䇿生慮深逺則計謀成心不欲躁慮不欲淺心躁則精神滑慮淺則萬事傾怠生於宦成病始於少瘳偏生於􅈈慢孝衰於妻子目貴明耳貴聦心貴公以天下之目視則無不見以天下之耳聽則無不聞以天下之知慮則無不知讀尉繚子尉繚子二十三篇尉繚子或曰齊人或曰梁人以其有惠王問荅語也三山施子美􅁛其有三代之遺風其然哉三代之盛未嘗有兵書也非惟無兵書而兵亦非君子之所屑談也君子之道圖亂於未萌防危於旣安本之以德禮導之以教化同之以政令使兵無自而作俟兵之起而後與􅀾雖孫武呉起爲將且恐不救而况云云之書豈足恃乎故好言兵者賊天下者也著書論兵者流禍於後世者也皆不免於聖人之誅也尉繚子不能明君子之道而恣意極口􅁛兵以惑衆其重刑諸令皆嚴酷苛􅁀道殺人如道飲食常事則其人之刻深少恩可知矣武議原官諸篇雖時有中理譬猶盗跖而誦堯言非出其本心是以無片簡之可取者謂之有三代之遺風可乎然孫呉之書與尉繚子一術彼以兵爲職無恠其然若尉繚子者言天官兵談制談􅀾威守權十二陵武議將理原官治本􅀾權重刑令伍利令分塞令束伍令經卒令勤卒令將令有似乎君子而實非者也予不得不論之讀􅀾國䇿文武之道至於春秋之世委地矣孔子之作春秋傷周道之衰也夫豈知春秋之法復委地於戰國之世乎嗚呼朝覲㑹同之禮不修於天子之庭禮樂征伐之柄或輕易於諸侯之雄君臣上下之紀􅈥而􅆲弑争奪之事起此孔子之所甚痛也然其時天下諸侯猶知以尊周爲義狼攫􅈢顧而不敢肆其無厭之欲蓋道之在人心者尚有未泯耳及乎戰國則不然諸侯或遣一介之使而譲周或興師臨之而徴其􅂦或責王入朝一旦而遂滅其宗廟其所自來者久矣功利熾而仁義銷矣游􅀃行而廉耻衰矣譎詐盛而忠厚之風息矣觀乎十二國之所載繁辭瑰辨爛然盈目及求其指意非謀以奪人之國則以摇人之位非間人之骨月則皆眩惑人之事或大言倨禮以激之或佯疑曲問以入之或卑聲屈體以兾其哀或正貌詐心以釣其名或揣其志而施其計非不博且冨也欲一簡之合乎道而不可得豈惟不合乎道欲一簡如左氏所傳公􅀸大夫之言亦不可得矣先王之遺澤餘化漫盡而國家􅁇之以亡豈不哀哉然其待士之禮猶有存者故得以廣聽周知匡扶其國久而後俱幷於秦至秦之始皇則自任其智棄天下之士而不用燔三代之言而不法巍然獨伸其尊以爲可恃而其危亂不旋踵而即見於是戰國之遺法復委地矣悲夫讀吕氏春秋吕氏春秋十二紀八覧六論凢百六十篇吕不􅅊爲秦相時使其賓客所著者也太史公以爲不􅅊徙蜀乃作吕覧夫不韋以見疑去國歲餘即飲酖死何有賓客何睱著書哉史又􅁛不􅅊書成懸之咸陽市置千金其上有易一字者輙與之不韋巳徙蜀安得懸書於咸陽由此而言必爲相時所著太史公之言誤也不􅅊以大賈乘勢市竒貨􅃱富貴而行不謹其功業無足道者特以賓客之書顯其名於後世况乎人君任賢以􅃱治者乎然其書誠有足取者其節䘮安死篇譏厚葬之弊其勿躬篇言人君之要在任人用民篇言刑罰不如德禮逹欝分軄篇皆盡君人之道切中始皇之病其後秦卒以是數者僨敗亡國非知㡬之士豈足以爲之哉第其時去聖人稍逺論道德皆本黄老書出於諸人之所傳聞事多舛謬如以桑榖共生爲成湯以魯莊與顔闔論馬與齊桓伐魯魯請比􅀜内侯皆非其事而其時竟無敢易一字者豈畏不􅅊勢而然耶然予獨有感焉世之謂嚴酷者必曰秦法而爲相者乃廣􅃱賓客以著書書皆詆訾時君爲俗主至數秦先王之過無所憚若是者皆後世之所甚諱而秦不以罪嗚呼然則秦法猶寛也讀法言揚雄子雲法言十三篇子雲爲此書嘗自擬論語而後世大儒或儕諸荀􅀸其自儗者僣也儕以荀􅀸者亦非也論語述聖人言行猶天地之化子雲方且􅀼之焉雕鏤藻繪而蕲􅀋之其僣甚哉然自聖人沒明道者莫尚於子思孟子彼荀􅀸者乃攘􅃑訐斥而詆生民之性爲惡其妄孰甚焉子雲則不然措言持論不敢違乎聖人至其爲善惡混之􅀃及以􅅊玄成與顔子並􅁛皆其不智而過言耳非若卿之妄也曰子雲勝􅀸與曰否卿才高而果於大言故其過多子雲才劣而篤於好古故其過少其未聞道則一也曰好古􅂚事莾乎曰好古而不能擇義則將奚所不至故士貴乎聞道讀風俗通義風俗通義三十篇後漢末應劭所著今所存者皇覇正失愆禮過譽十反聲音竆通祀典怪神山澤十卷而巳其辭固無他竒然語怪神之事一以理勝之足以觧流俗之弊又載當時人品而具評其事非按經受禮不敢略於中臆之􅀃故至今傳而不廢也後世著書者厭常喜異設爲詭激邪曲之辨以爲高一時雖可以動人而無􅀘於世終不能如此書之傳者衆矣天下之物山嶽有時而崩金石有時而毁惟至理之言與天地並存立言之士其不可不務知道哉讀漢鹽鐡論鹽鐡論六十篇漢桓寛所著當武帝時兵革荐興財用匱竭而均輸鹽鐡之征橫岀天下疲弊孝昭即位大將軍請詔郡國舉賢良文學問民所苦咸願罷鹽鐡酒榷均輸官御史大夫桑弘羊争難之以爲不可罷寛襲其意而設爲問荅之詞以盡其辨善乎其言也於乎爲天下者􅂚嘗患乎無財也哉天下未嘗無財也苟用之以節治之有道夫何不足之有以漢言之文帝在位二十三年免民租者近半其時非有均輸鹽鐡之征而府庫充溢錢貫朽不可較武帝之天下即文帝之天下而又加之以百岀之歛未甞免一歲之租宜其富矣而反愈困乏何哉蓋文帝節儉而武帝征伐營繕以麋費之也人君茍不節儉雖積金齊㤗華蓄貨擬江海不至於亂未見其厭足也武帝之天下宜亂矣而文景之澤猶在人心重以霍光知所緩急從而稍稍罷其害者故一變而彌元元之憤不然漢豈可兾哉此書也其於道德功利之際論之當矣不特文辭足法而巳也讀荀悅申監荀悅申監五卷其論治亂興亡之理詳矣恱生漢之衰丁靈獻之際強臣竊柄天下潰潰日非漢有悅雖侍講禁中而天子拱手受制知其莫之有爲著此書以宣其志恱蓋有用之材又親見世之亂故其言愈有徴據從而行之可以爲治而自漢以來鮮有言之者縱或言之特以其文辭而巳著書之不足恃如是哉然秦熖之餘聖道滅息唐虞三代之大經且廢而不講爲治者視之以爲空言而共譁咲之則夫悅書之不用又無足怪也余讀其書至曰以智能治民者泅也以道德治民者舟也怳然失色而悲之讀崔豹古今註文之用有二載道紀事而巳載道者上也紀事者其次也然道與事非判然二塗也孔子入太廟每事問學詩而多識鳥獸草木之名豈不以事物爲道之所寓耶合是二者文雖麗無􅀘於世終不能傳逺茍有􅀘雖俚談野語亦不得而棄之予始讀太公家教其辭俚雜可咲自隋唐以來即傳之李翺大儒也至與文中子並􅁛蓋其言間有合乎理者故也及觀崔豹古今註釋名辨物其文固不成章然􅀳時之人以文名者何限求如豹此書之用世絶少豈非以記事故耶由此言之世之好竒䘮質者可以惕然而思矣讀􅀶物志君子之學貴乎􅀶而能約􅀶而不得其要則渙漫而無歸徒約而不盡乎􅀶則局滯而無術孔子孟子可謂􅀶矣然而孔子曰吾一以貫之孟子謂將以反􅀃約也則其用心可知也蓋盡萬物之變而能㑹之於一心竆萬事之情而能折之以一理此聖賢之所貴也索乎人所不可知攻乎道所不必知以昡俗驚世此曲士之所務君子不取也世􅁛張茂先爲􅀶物吾觀其所著書何其異哉詩曰天生蒸民有物有則此物之至要而不可不求其理者也至於鳥獸草木之名狀與古者之異言恠􅀃有所不知何病其爲君子茂先獨汲汲焉纂述惟恐其不詳而於至要而當知者反無所明焉其所務若此可謂知所先後乎哉身爲輔相視亂倫悖教之事皆不之顧至於張林孫秀犬豕之徒卒見殺于其手愽物之智果安在耶士不知道而多聞之爲務適足以禍其身而巳讀聱隅子士未嘗不欲聞于後世也然徒務乎聞斯無聞矣爲其所志狹而所望者私也聖賢安顧其一身哉上之欲善天下次之欲淑來世遑遑終其身而不恤著之書以明道孔孟是也或者覩其烈光傷巳之不若悼世之不見􅁛亦述諸書以自表若􅀭雄王通之流其自爲之意深而衛道之功寡君子病之矣至於黃晞聱隅子之爲又慕乎雄通而作者也晞蜀士生宋仁宗時其言論不違理者頗有之然晞狠愎無忌人也故㫁然自信而不疑其論以漢高盃􅅅之言爲仁以屈原爲愚以張良得聖人之安蕭何得聖人之變劉向得聖人之力以唐太宗爲武王之後一人論性則詆孟子之言爲非是皆其大謬者不知道而務名無怪乎其然也然其間謂井田肉刑鄕飲里選冠禮家廟之法不復弗足爲治又以生不能澤物爲耻嗚呼晞亦有志之士哉讀朱子感興詩三百篇後無詩矣非無詩也有之而不得詩之道雖謂之無亦可也夫詩所以列於五經者豈章句之云哉蓋有增乎綱常之重關乎治亂之教者存也非知道者孰能識之非知道者孰能爲之人孰不爲詩也而不知道豈吾所謂詩哉嗚呼若朱子感興二十篇之作斯可謂詩也巳其於性命之理昭矣其於天地之道著矣其於世教民彛有功者大矣繫之於三百篇吾知其功無媿雖謂三百篇之後未嘗無詩亦可也斯道也亘萬古而不亡心㑹而得之豈不在乎人哉讀陳仝甫上宋孝宗四書予始讀仝甫論史諸文見其馳騁爲驚人可喜之談以爲仝甫特尚氣狂生耳未必足用也及觀其上孝宗四書不覺慨然而歎毛髪森然上竪嗚呼仝甫豈狂者哉蓋俊傑文夫也宋之不興天實棄之使孝宗之志不伸者史浩沮之於前湯思退敗之於後及仝甫上書之時孝宗之初志巳衰矣當隆興間孝宗茍聞此言將不踰時而召用之寜使仝甫至四上而不報死於布衣而不用哉設用仝甫聽其言從其設施則未必無成功而卒不用者天也宋之不復興者亦孝宗也興亡天命非予所知予所憾者以仝甫之才而不得一展以死又豈非天哉展弗展不足以論仝甫予所深悲者世愈下而俗愈變士大夫厭厭無氣有言責者不敢叱一辭况若仝甫一布衣乎人不以爲狂則以爲妄得全身進退以死於牖下若仝甫者幸矣尚何不用之足恠乎世之相逺二百年而俗之相下如此使仝甫而見之當何如耶臨海縣知縣黄誥黄巖縣知縣張師善台州府儒學教授尚芳訓導李深黄巖縣儒學教諭文程府學生陳縝葉琰王梅齡臨海縣學生李臨卿戴濬之黄巖縣學生孫思光牟汝鈞校對遜志齋集卷之四終
