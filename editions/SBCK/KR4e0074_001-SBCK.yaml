front:
  text: 遜志齋集卷之一
  hash: sha256:d404c8009eef000f70bb25a85bdc53278b4ae3aee8fb05c25f78819be2285be9
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4e0074_SBCK_001-1a}
body:
  text: 中順大夫浙江按察司副使奉􅃯提督學校雲間范惟一編輯奉政大夫浙江按察司僉事奉勅整􅅚兵備南昌唐尭臣校訂中順大夫浙江台州府知府事前刑部郞中東呉王可大校刋雜著㓜儀雜箴二十首有序道之於事無乎不在古之人自少至長於其所在皆􅃱謹焉而不敢忽故行跪揖拜飲食言動有其則喜怒好惡憂樂取予有其度或銘于盤盂或書于紳笏所以養其心志約其形體者至詳宻矣其進於道也豈不易哉後世教無其法學失其本學者汨於名勢之慕利禄之誘内無所養外無所約而人之成德者難矣予病乎此也蓋久欲自其近而易行者爲學而未能因列所當勉之目爲箴掲于左右以攻巳闕由乎近而至乎逺蓋始諸此非謂足以盡乎自􅁱之事也坐維坐容背欲􅀡貌端荘手拱臆仰爲驕俯爲戚毋箕以踞欹以側堅靜若山乃恒德立足之比也如植手之恭也如翼其中也敬而外也直不爲物遷進退可式將有立乎聖賢之域行歩􅂂欲重容止欲舒周旋遲速與仁義俱行不畔乎仁義是爲坦途寢形倦于晝夜以息之寧心定氣勿妄有思􅅯勿如伏仰勿如尸安養厥德萬化之基揖張拱而前肅以紓敬上手宜徐視瞻必定勿游以傲勿佻以輕逺耻辱於人動必以正拜古拜有九今存其一數之多寡尊卑以秩宜多而寡倨以取禍宜寡而多爲謟爲阿以禮制事不爽其宜食珎􅃾之慚不若藜藿之甘萬鍾之尸居不若釡􅁃之有爲茍無待於富貴夫孰得而貧賤之噫飲酒之爲患俾謹者荒俾莊者狂俾貴者賤而存者亡有家有國尚慎其防言發乎口爲􅆇爲否加乎人爲喜爲嗔用乎世爲成爲敗傳乎書爲賢爲愚嗚呼其發也可不慎乎動吾形也人吾性也天不天之祗而人之隨狥人而忘反不棄其天而淪於禽獸也㡬希􅀏中之喜􅀏勿啓齒見其異勿侮以􅃧内旣病乎德外爲禍階抵掌絶纓匪優則俳喜得乎道而喜其喜曷巳得乎欲而喜悲可立俟惟道之務惟欲之去顔孟之樂反身則至怒世人於怒傷􅁀與􅃍切齒攘􅃑不審厥慮聖賢不然以道爲度揆道酬物巳則無與􅁀􅃍是懲聖賢是師顔之好學自此而推憂惰學與德汝日戚戚憂爲有益名位不光惟日憂傷汝志則荒棄其所當憂而憂其不必憂世之人皆然汝孰憂哉勉於自􅁱好物有可好汝勿好之德有可好汝則效之賤物而貴德孰謂道逺將􅁢蹈之惡見人不善莫不知惡已有不善安之不顧人之惡惡心與汝同汝惡不改人寜汝容惡已所可惡德乃日新已無不善斯能惡人取非吾義錙銖勿視義之得千駟無愧物有多寡義無不存畏非義如毒螫養氣之門與有以處已有以處人彼受爲義吾施爲仁義之不圖䧟人爲利私惠雖勞非仁者事當其可與萬金與之義所不宜毫髪拒之誦誦其言思其義存諸心見乎事以敬畜德以静養志日化歳加山立川駛聖道卓然焉敢不至書德有餘者其藝必精藝本於德無爲而名惟藝之務德則不至苟極其精世不之貴汝書不美自視不善德不若人乃不知憂先乎其大後乎其細大或可傳人不汝棄雜銘冠居上不易衆所瞻視傾側必墜帶寛則弛急則促要厥中㤗而肅衣服不羙人不汝􅀹德不羙乃汝之羞屡孰爲險􅂂非義孰爲夷行必思敬于事先靡適不宜筆妄動有悔道不可悖勿謂汝才後有萬世墨難乎成易乎毀保玄德著千禩硯其體剛肖乎乾其用靜法乎坤惟徳全永長存􅁓以之立言欲其載道以之記事欲其利民以之施教欲其義以之制法欲其仁界尺體方則動正質重則行直一轉一側亦不可偏僻硯匣思而後言其言必傳言而後思雖悔莫追書櫃唯群聖之道咸萃在茲不能精思力學則書爲虗噐不能希賢由聖則學非真知小子極愚敢不敬慎日以孜孜書籖至􅀶而約於精深思而敏於行考古以立事觀人以脩巳治亂興衰必知其由進退語黙必中乎理毋眩乎辭必要諸道以聖爲則純駁可考論學則觀其身論政則考其時詞有華而不廢言有似而不取枕於此思道道必明於此論事事必成於此警戒汝福將大於此恣肆其禍將至席燕安溺人甚於洪波身溺可濟心溺柰何患常生於無事禍莫大於多欲憂􅅥可以保身敬慎可以致福衾巳之温思人之寒巳之安思人之艱徳之失錦衾慄道誠完布衾安持敬勿堕恒省巳過毋謂不汝知天視不遺床屏蔽汝身毋蔽汝心椸美衣華體美服華身衣之惡謂汝窶貧名之惡斯爲小人致飾於外而不思自新柰何乎此民頮盆汝􅆕或垢不容飲食汝心之汙不愧于色噫視心如視􅆕以新厥徳戶端爾聴邇言勿溺小事必敬正容體謹辭令出入必思欽若天命戸内治天下易邇或謬逺安求巳爲而悔莫若早戒患至而憂不如預謀何以樂心無愧怍何以憂輕舉多求闔􅀆闢􅀆取法乾坤由仁義行以貽爾子孫牗蔽則暗啓則明克去欲􅀆天徳乃弘大其牗天光入公其心萬善出啓之啓之天光斯生戒之戒之勿蔽汝天明日月之光無㣲不逹􅀑神之理無幽不察擴汝昭明勿自掩閼觀室於牗觀人於道闢牗者破昏好道者日新柱人有可忿反巳而察巳有甚怒􅃘無妄發毋肆爾情以壊汝名彼惟不思卒僨事䘮生交善人者道徳成存善心者家室寧爲善事者子孫興室何以傾梁柱弱家何以衰禮義薄國何以亡無徳澤門非禮之事勿行非義之貨勿入禮義所出是爲清門悖傲所出是爲禍門貨財所出是爲幸門仁賢所出是爲徳門不惑於利者休多行可悔者憂非無外不足以任道非無息不足以成業非至公不足以知人非至宻不足以察理心之所貴者四此之謂也釜勿納非義以取滿盈非義多毒滿盈必傾質完厚徳日新資六府養兆民食噐汝飲而食當思爾職行而有得斯無愧色無功而厚享欽節已以􅁉衆是爲儉徳嗇人以自封斯爲民賊毋以一食而忘天下毋以茍安而忽永圖􅃴巳而忘人者人之所棄克巳而利人者衆之所戴酒巵無以欲失性無以忿輕生無以樂忘禮無以利用兵洽親和衆恒於斯造禍興敗恒於斯懲其惡以趨善尙慎其儀可欲必戒萬乘之國多以此敗矧汝士也泰人不􅄝水而惟酒之􅄝酒之味美而水無味嗚呼淡泊者無毒而好美者可畏夫焉可以不識􅁏爼有以異物用物無愧不能脩徳而享其奉是食其同􅀋也吾爲汝懼之食案爲善終世一眚而蹶務徳如山一言而殘忿不可長惡不可滋匕箸之頃怨或起於斯疾不生於堇荼而生於甘美禍不起於干戈而起於言語敬慎汝口鍳于前􅁤養身之具或有未俻汝以爲愧養心無方禮義消亡不思其􅆇忽其大而圗其細㡬何而不賊汝之生邪斗斛土廣粟多匪以量而加徳薄才散匪以貧爲患出納平均將利爾嗣人權衡虚以爲體平以爲則隨物賦形爲民作極皇王攸謹尚其無私百爾秉心或鍳于兹尺度㝷丈之繆實始毫􅁵君子畜徳無忽細㣲几慿之安出汝言居上不易爲下實難􅀝席汝之息念民之力汝之休念民之憂忘其私而與道謀後其私母俾人􅀹先人而後巳者安􅃴巳而勞人者危無以過小而不戒無以道大而不爲扇徳之凉任之寵攝尺寸之柄四方風動謹無悔􅃘無憂謙無辱信無􅀹時乎舎時乎庸動不違時代天之工寒即乎燠暑即乎凉自外至者懼其巳傷而不知發乎中者爲身之殃噫􅄝欲之毒甚於劔芒人惟寒暑之慎而不於此之防何邪爐近而即之則能温汝狎而陵之則能焚汝民猶火也勿謂可侮匕筯汝之食人慎勿㤙人之食汝慎勿諼五鼎之饋爲惠不成乾餱之遺怨由以生一舉筯而驕士將敗汝名帚地之垢治之以帚心之垢不思其道汝居孔潔􅀆於汝何有瓦大厦不傾匪一瓦之積黎庻之安乃衆賢之力浴噐洗滌邪慮以啓新知勿安於汙濁自棄弗治濯之潔初匪外至於鑠天明亦若此衆欲汙之吁可鄙形之汙濯之則巳心之汙百行皆毀名之汙萬世之耻水既潔然後可以溞身巳既修然後可以化民桔橰旱爲虐汝功乃作寧汝無功無俾歲也凶聖制噐資利人功施博巧足珍賜多言道未醇眩異􅀃惑聖真是猶見一瓠之濟而以舟楫爲可棄夫安得爲智邪鑱用汝芟夷或封殖崇善去惡乃厥職念民勞謹民時順民欲惠民灾耒耜勞思善敏豐財安厥匱恬厥勩業勿貳世長利牛之力不可􅇵土之宜不可易牛劇則敗土易無稼箠勞則息母既其力力竭則斃於汝乎何益鞍道役智智役力智之不如惟汝所適任智而不知道人將汝役馳驟易劇不若徐行不息易劇者緩不息致逺轡操縱有術駑猶良用違其才騏􅂹亡以寛馭民􅀖乃昌車以廣載以剛運險則止易則進衆材得職乃不僨衆噐堅車乃良百戰得賢成乃光朽轅腐輻乘者殃雜誡人孰爲重身爲重身孰爲大學爲大天命之全天爵之貴備乎心身不亦重乎不學則夷乎物學則可以守身可以治民可以立教學不亦大乎學者聖人所以􅂇乎天也天設其倫非學莫能敦人有恒紀非學莫能序故賢者由學以明不賢者廢學以昏大匠成室材木盈前程度去取沛然不亂者繩墨素定也君子臨事而不眩制變而不擾者非學安能定其心哉學者君子之繩墨也治天下如一室發于心見于事出而不匱煩而不紊不學者其猶盲乎手揣足行物至而莫之應右第一章治人之身不若治其心也使人畏威不若使人畏義也治身則畏威治心則畏義畏義者其於不善不禁而莫能爲畏威者禁之而莫敢爲不敢之與不能何啻陵谷右第二章養身莫先於飲食養心莫要於禮樂人未嘗一日舎飲食何獨於禮樂而棄之乎尊所賤而卑所貴失莫甚焉右第三章學術之㣲四蠧害之也文姦言摭近事窺伺時􅀔趨便投􅂩以貴冨爲志此謂利祿之蠧耳剽口衒詭色􅁋辭非聖賢而自立果敢大言以高人而不顧理之是非是謂務名之蠧鈎摭成􅀃務合上古毀訾先儒以謂莫我及也更爲異義以惑學者是謂訓詁之蠧不知道徳之㫖雕飾綴緝以爲新竒鉗齒刺舌以爲簡古於世無所加益是謂文辭之蠧四者交作而聖人之學亡矣必也本諸身見諸政教可以成物者其惟聖人之學乎去聖道而不循而惟蠧之歸甚哉其惑也右第四章爲政有二日知體稽古審時缺一焉非政也何謂知體自大臣至胥吏皆有體違之則爲罔先王之治法詳矣不稽其得失而肆行之則爲野時相逺也事相懸也不審其當而惟古之拘則爲固惟豪傑之士智周乎人情才逹乎事爲故行而不罔不野不固右第五章古之仕者將以及物今之仕者將以適已及物而仕樂也適已而棄民耻也與其貴而耻孰若賤而樂故君子難仕右第六章古之治具五政也教也禮也樂也刑罰也今亡其四而存其末欲治功之逮古其能乎哉不復古之道而望古之治猶陶瓦而望其成鼎也右第七章定天下之爭者其惟井田乎弭天下之􅁀者其惟比閭族䣊之法乎有恒分而知恒道奚由亂右第八章三代之化民也周而神後世之禁民也嚴而拙不知其拙也而以古爲迂孰迂也哉右第九章化於未萌之謂神止於未爲之謂明禁於巳著之謂察􅅍而後制之謂瞽秦漢之治其瞽也與不師古而瞽之師孰謂之非瞽也右第十章貧國有四而凶荒不與焉聚歛之臣貴則國貧勲戚任子則國貧上好征伐則國貧賂賄行于下則國貧冨國有四而理財不與焉政平刑簡也民樂地闢也上下相親也昭儉而尚徳也此冨國之本也右第十一章國不患乎無積而患無政家不患乎不冨而患無禮政以節民民和則親上而國用足矣禮以正倫倫序得則衆志一家合爲一而不富者未之有也右第十二章學古而不逹當世之事鄙木之士也通乎事變而不本於道術權詐之士也鄙木者不足用權詐者不可用而善恱人及其失也未愈於詐聞以權詐亡國矣未聞鄙木者之僨事也故君子尚朴而不尚華與其詐也寧木右第十三章仕之道三誠以格君正以持身仁以恤民而不以利禄撓乎中一存乎利禄則凡所爲者皆狥乎人狥人者失其天失天而得人愈貴而猶賤也右第十四章柔仁者有後剛􅁀者難􅁇仁者陽之属天之道也生之􅁼也􅁀者隂之属地之道也殺之􅀋也好生者祥好殺者殃天行也右第十五章爲家以正倫理别内外爲本以尊祖睦族爲先以勉學脩身爲教以􅀣藝蓄牧爲常守以節儉行以􅄌譲足巳而濟人習禮而畏法亦可以寡過矣右第十六章禮本於人情以制人情泥則拘越則肆折􅂨焉斯可巳古之庻人祭不及祖漢以下及三世非越也人情所不能已也古過於薄今過於厚則從於厚今過於薄不若古之美則惟古是從禮近於厚雖非古猶古也右第十七章古禮之亡也人不知事親之道今䘮禮朝夕奠之儀其事生之常禮乎孔子曰至於犬馬皆能有養不敬何以別乎噫行者鮮矣右第十八章三年之䘮自中出者也非強乎人也因其心之不安莞簞也故枕由寢苫因其心之不甘於肥厚也故啜粟飲水因其不􅃘佚樂也故居外次不聞樂豈制於禮而不爲哉情之不能止也今世之能䘮者寡矣飲食居處如平時談笑容服無所更變古之戮民與欲正天下之俗非始諸此夫安始右第十九章君子事親以誠縁情以禮知其無益而僞爲之非誠也惑異教而兾􅄀福者非僞乎聖賢所不言而不合乎道者非禮也化乎異端而奉其教者豈禮也哉事不由禮者夷也夷者夷之死不祔乎祖右第二十章孝子之愛親無所不至也生欲其夀凢可以養生者皆盡心焉死欲其傳凢可以昭掦後世者復不敢忽焉養有不及謂之死其親沒而不傳道之謂之物其親斯二者罪也物之􅀹罪也是以孝子修徳修行以今聞加乎祖考守職立功以􅂋號遺乎祖考稱其善属諸人而薦譽之俾乆而不忘逺而有光今之人不然豐於無用之費而嗇於􅂋親之禮以妄自誑而不以學自勉不孝莫大焉右第二十一章國之本臣是也家之本子孫是也忠信禮譲根於性化於習欲其子孫之善而不知教是自棄其家也右第二十二章爲子孫者欲其慤不欲其浮欲其循循然不欲其􅋕􅋕然循循者善之徒􅋕􅋕者惡之符右第二十三章士不可以不知命人之所志無窮而所得有涯者命也使智而可得富貴則孔孟南靣矣使德而可以致福逺禍則羑里􅋌人之厄無從至矣使君子必爲人所尊則賢者無不遇矣命不與人謀也久矣安之故常有餘違之故常不足右第二十四章處俗而不忤者其和乎其􅁦也流而無立持身而不撓者其介乎其􅁦也厲而多過介以植其内和以應乎外斯庻矣乎右第二十五章非義之利腊毒可喜之事蔵悔易恱之人難近萬全之舉多怨君子知其然功茍可成不沮於怨也人果不可近不受其恱也事之􅃴意必思其艱利之可取先慮其患故名立而身完也右第二十六章一年之勞爲數十年之利十年之勞爲數百年之利者君子爲之君子之爲利利人小人之爲利利巳右第二十七章君子有四貴學貴要慮貴逺信貴篤行貴果右第二十八章好義如飲食畏利如蛇􅚣居官如居家愛民如愛身者其惟貞惠公乎釋書而爲治而政無不習也去位而處野而色未嘗異也是以不以才自名而才者莫能及不以道自任而君子推焉世俗之學豈足以窺之乎右第二十九章儒者之學其至聖人也其用王道也周公沒而其用不行世主視儒也藝之而巳矣嗚呼孰謂文武周公而不若商君乎右第三十章人或可以不食也而不可以不學也不食則死死則巳不學而生則入于禽獸而不知也與其禽獸也寧死右第三十一章待人而知者非自得也待物而貴者非至貴也右第三十二章不怍于心合乎天足乎巳及乎人而無容心焉其惟君子哉右第三十三章尚􅀑之國多病好利之人多貧禍不可避也利不可求也有心於避禍者禍之所趨􅄝利無厭者害必從之故君子信道而安命右第三十四章人之不幸莫過於自足恒若不足故足自以爲足故不足甕盎易盈以其狹而拒也江海之深以其虚而受也虚巳者進徳之基右第三十五章政之􅁦也使天下尚法學之􅁦也使學者尚文國無善治世無聖賢二者害之也何􅀹乎人右第三十六章愛其子而不教猶爲不愛也教而不以善猶爲不教也有善言而不能行雖善無益也故語人以善者非難聞善而不懈者爲難右第三十七章金玉犀具非産於一國而聚於一家者以好而集也人誠好善善出於天下皆將爲吾用奚必盡出於巳哉智而自用不若聞善而服之懿也才而自爲不若任賢之速也右第三十八章學箴九首有序昔之爲學者經無恒􅀃師無恒道隨其意之所向而欲自逹於古爲功勞而成效寡今之世異乎此逺矣經出於一家之言而道槩於聖賢之中苟務學焉宜無不至而人才之難反有甚於昔者豈非不得其方也哉作九箴以自省且以戒人擇好不好而學勞而罔􅀗不慎而好􅂚底乎道或好其迹或好其辭匪不能好其好者卑三千之徒莫非竒士聖云好學惟顔氏子俯仰自得泊乎無言彼豈區區急於有聞嗟爾奚爲以名自累名也可懷顔亦可媿慎習以身範俗者聖賢之爲不化於俗者中人之資與俗推移匪愚則何古之爲學所以行道通則爲汙介則爲矯較其所近介愈於通失已雖殊違道則同夷群混世欲與道俱懼汝忽焉小人之趨余茲戒汝篤慎厥守不有古人可師與友聖則汝師賢尚友之彼亦何人汝寧弗思明義明於義者於利也輕授之天下不以爲榮茍爲所移皆可欲者快意陳前身亦可舎一念之動一髪之間相去㡬何爲陵爲淵勿以其㣲殆曰可受㣲之不察大者何有聖有伊尹放主於桐海内帖然服其至公人見遺錢縱目私睨市兒抵掌訾其貪利尹獨何道舉世不疑心無所利曰汝信之惟利之喻害于而躬行義之報愽乎無窮擇義在我聖亦可企勿謂古之人吾不敢至辨疑不善學之人不能有疑謂古皆是曲爲之辭過乎智者疑端百出詆呵前古摭其遺失學匪疑不明而疑惡乎鑿疑而能辨斯爲善學勿以古皆然或有非是勿􅀒汝能言人或勝汝忘彼忘我忘古與今道充天地將在汝心虚受中之虚取善於人沛然有餘實其内自以爲至人不汝惎天下之善天下同之汝不自􅀻孰匪汝師一夫之識其復能㡬禁爾不思貴巳賤彼舜禹之聖猶取人言汝􅂚不然汝豈誠賢知要何以治已何以治人聖承賢􅁇何革何因爲學不難知要爲貴識其大端勉焉可至不察其本而玩其華窮竒極博於道何加聖賢之學皆以用世不宜於行斯爲一藝天之􅂌汝靡有不全汝􅃘狹之不畏於天篤信命輪人爲弓強之不從俾鼎人爲瓦迫之不可工守其業猶不以利移舎古狥今可以士爲仁義吾内爵禄其外内爲外屈失其天貴蹈道自我夫豈由人不求合於世斯爲天民慎獨人或可欺天實汝司人不汝窺汝心自知噫存心如事天爲敬之基篤行中人慕道如童賛日知其爲明不知其質日不可邇道非日比擴而行之在我而巳一身非㣲天下非大勢有屈伸道無隆隘勿敏於言而怠於行維恒若不足以底于成四憂箴有序孔子之聖不待勉而成然恐夫徳不修學不講義不即徙過不能改則引以爲巳憂今人之質不足㡬聖人也决矣而未見有以四者爲憂者其卒歸於愚也奚恠焉余懼爲愚之歸也箴其闕以自勉修徳古人言學修其在已巳無所得猶不學爾惟徳之務必勉於爲譬諸飲食必飽爲期方其巳飽不憂其餒無以􅁇之餒可立待是以賢哲務徳是修行以終身恒以爲憂一事之成一行之蹈豈云匪徳貴乎彌邵知不逮舜仁不逮堯曰伊曰周徳音孔昭彼與吾同作則萬世獨爲凡民寧不有愧充之俾崇擴之俾洪主敬力行不息其功成無爲能盈無爲足聖之不如而汝自局汝不是思汝年日加暨其巳晩汝憂則那講學聖於萬理皎若日月不資修治洞見毫髪猶必講學以辨是非嗟今之人乃謂有知性命之㣲政教之大逺徹古今廣溢覆載孰可自淑孰可及民損益弛張奚後奚先汝之不講粉飾掩護事變臨前左右失措古君子爲學要而不華任之天下如治其家惑矣今之人以華爲貴空言自誑道則不至咨汝講學大本是求勿狹以陋勿駁以浮心與道俱􅀑神與謀憂巳之不逮後則無憂徙義聞所當爲奮决不疑飈移電馳是謂勇於自治知其爲義可否進退怯於爲善䧟溺也易聖賢雖大惟勇可成勿安於非義謂吾不能義不即徙聖猶憂之汝不憂乎􅃘自絶於善而甘爲小人之儔乎改過昔爲不善今悟其愆能立改之不失爲賢言曰既出事曰既徃懲創不嚴其惡日長理欲之際義利之間精察其㡬勿就所安折其始萌覺於將發盪摩翳昏存其昭晣作聖之學必謹自茲顔子不貳爲萬世師勿恃能改無過爲貴以有過爲憂顔樂可致箴四首有序無以過人者衆人之流而求異於人者又君子之所不取也然則將何所從哉合乎天不合乎人同乎道不同乎時雖不求異於人而過人也逺矣余病乎未能而學焉欲自至近者始作箴以自朂口不宜言而言是佞之徒宜言而不言是愚之符佞爲憸人愚爲鄙夫宜言而言人誰汝惡宜黙而黙人誰汝怒我言以道彼惡何傷我黙以義彼怒彼狂惟道之從勿狥乎人狥人違道與愚佞均天之生爾將以明道狂波墜緒汝障汝紹勿肆於􅄀合乎大中惟翼聖之經身人之營營汝則凝凝人之幡幡汝則安安相彼君子知嶽如河小人輕儇如䑕如蛾嗟時之人蛾䑕是效不死于機卒殺于燎嶽以靜壽河以廣容式其深崇以鎮于家􅀖食凡民之生食必有事徒食不事惟犬豕􅀋犬以禦盗豕以供祀人之無益非二物比美貌長軀號名爲儒智出物下孰云非愚我告汝訓臨食必思思而無媿汝則食之汝業不修汝徳不益汝心有媿雖餒勿食汝學汝仕推是無違思而有得力見於爲功施天下萬鍾非奢無徳於人瓢粟猶多汝思而食省于斯言誰謂道逺將得其門寢聖哲之寢心亦有思思而爲善厥徳沛如彼闇之思在乎利欲長惡滋凶惟日不足周公待旦大猷以成跖起鷄鳴死以盗稱其思則同其績曷殊中夕不寐撫心以圖克畏箴於皇上帝降衷于人五性統心宰制此身如國之君如兵之帥百職萬夫罔敢乖悖禀氣或偏梏其天明外與物交􅀻欲乃萌􅁋哇誘耳靡曼眩目言發於躁形動於欲或亂以酒或肆以狂詭隨爲柔狠虐爲剛顛倒謬迷舉違其正敗􅀋賊倫斵䘮天性當其方昏恬謂宜然中夜静思夫豈吾天廼奮而悲亟改前轍遏於横流撲於始發若去蟊賊若戡姦􅇯皷勇直前不􅅏寸蹤抉彼隂霾洗滌日月秉禮持敬作我斧鉞􅀌光既囘萬􅀋復初思前之爲䧟於嚚愚今幸克之敢弗戒懼操存稍怠恐其逸去屋漏之闇對越有嚴一念之㣲􅀑神降監勿安所安勿嗜所嗜易失惟言難成惟事圖巨於細􅂂坦若􅇖跬歩或差萬馬莫追内謹其㡬外防其誘盤盂機穽袵席師保可畏在心豈彼蒼蒼心之操縱身與存亡表裏交修本末一致作聖之基敬戒勿墜勵志箴天賦純命赫赫皇皇肆人受之厥質匪常或柔或剛或粗或龎惟上聖􅁢􅆇爲民之綱天命上聖綱紀人極肖天之能克有成徳發之爲猷動之爲則播爲嘉言時靡瑕􅑯如陶如冶如春如秋如元氣之運如江河之流民咸仰之莫覿厥由舉民于大中佐天洪休昔在堯舜邁烈百王亦有湯武易亂以康弼其令謨惟群哲有光翕萃駿昌道以大行周徳衰止玄聖以作以言爲政以詔以􅁴其徳天地其用粟帛妙乎無方於廓景鑠相在後君子孰不是儀永言千古疇克􅀋之有扶而崇有淪而卑有閑于事而本則遺惟昔炎宋天擴其蔀篤生俊哲旁魄先後導流于源擇苗于莠用爲飲食作爲師保穣穣者舒擅於中區譬彼夏屋既搆既除曽是弗居困踣路衢慨懐古昔慚愧交如閔子㣲陋夙亶顓魯父師之訓纉引先緒昭哉先子靖恭好古匪仁弗服匪禮弗處爰求懿徳以淑後生秩秩嘉謨渢渢徳馨何惑不祛何昧不明歛之毫芒散周八紘予實不􅀋聞善鮮蹈眩瞀于華罔臻厥奥持循不武過慝莫告惟怠荒之懐是用不得其要惟日惟月則弗我舎聖功誕遐曽弗我屇童也植志壮也則懈内愧於心若膚叢于蠆在昔多士卓爾早成一間庻㡬揚聖之庭長沙博志諸􅁑挺英皆夙造乎道爲世凖程子企焉是望若或可及退省于中莫之能立中夜以興􅄃衣涕泣若鴻鵠在􅀣靡所止集視彼澗水其流湜湜未抵于海尚莫能息道雖云逺有志則􅀗心膂方強焉敢不力誠以爲榦敬以爲植義以爲路禮以爲城俾内無擾而外慕不萌統乎天君百志惟明􅋃勁則逺水盈則衍溝澮之溢所及則淺伯禹之績公旦之典豈伊匪人徳劭於勉一體之􅃜愧不逮人衆徳之弛覆謂宜然謂汝弗知亦既能言知而弗念云誰之愆嗟予小人矢自今始匪口之言惟足之􅂂成巨於㣲陟遐于邇群哲在上用循于前􅁤毀譽箴余􅄝道頗久間徵之毀譽而喜怒之心未忘􅀼爲物所動也作毀譽箴箴曰人之譽汝戒汝勿喜汝喜而驕汝徳日圯人之毀汝戒汝勿怒汝怒而爭人將汝惡圯爲愚基惡爲禍階内削外􅆷存者㡬何古之君子學以爲巳聞人之言審巳而已是也吾師否也吾欺過則在彼喜怒何爲無知之人中怯不足以人之言爲巳寵辱人言萬端孰可詰徵苟信不俻􅀒汝之生汝自今後吾告爾法棄汝耳目惟心是察耳目者人心通乎天天而謂然汝何憾焉擇交箴捷捷而趨諾諾而隨靣則爾䛕背則爾非黙黙而方誾誾而正貌不爾是心則爾敬茍信其外不察其中君子之失小人之從友彼小人如飲鴆酒入口雖甘毒則在後與君子朋螫舌逆情始爲難堪輔爾于成有妄人者二者之間援仁襲義以訐以訕求其所爲汙穢莫測是爲務名惟爾之賊交際孔艱厥狀萬端直爲爾傲順謂爾奸傲徳之㐫奸徳之囘不囘不㐫惟道是諧無求人合而合于天人合一時天合萬年家人箴十五首有序論治者常大天下而小一家然政行乎天下者世未嘗乏而教洽乎家人者自昔以爲難豈小者固難而大者反易哉盖骨月之間㤙勝而禮不行􅀔近而法莫舉自非有徳而躬化發言制行有以信服乎人則其難誠有甚於治民者是以聖人之道必察乎物理誠其念慮以正其心然後推之脩身身既脩矣然後推之齊家家既可齊而不優於爲國與天下者無有也故家人者君子之所盡心而治天下之凖也安可忽哉余病乎徳無以刑乎家然念古之人自脩有箴戒之義因爲箴以攻巳缺且與有志者共勉焉正倫人有常倫而汝不循斯爲匪人天使之然而汝舎旃斯爲悖天天乎汝棄人乎汝異􅂚不思耶天以汝爲人而􅃘自絶爲禽獸之歸耶重祀身烏乎生祖考之遺汝哺汝歠祖考之資此而可忘孰不可爲尚嚴享祀式敬且時謹禮縱肆怠忽人喜其佚孰知佚者禍所自出率禮無愆人苦其難孰知難者所以爲安嗟時之人惟佚之務尊卑無節上下失度謂禮爲僞謂敬不足行悖理越倫卒取禍刑遜譲之性天實錫汝汝手汝足能俯興拜跽曷爲自賊恣傲不恭人或不汝誅天寧汝容彼有國與民無禮猶敗矧予􅆌㣲奚恃弗戒由道在巳豈誠難耶敬兹天秩以保室家務學無學之人謂學爲可後茍爲不學流爲禽獸吾之所受上帝之􅂨學以明之與天地通尭舜之仁顔孟之智聖賢盛徳學焉則至夫學可以爲聖賢侔天地而不學不免與禽獸同歸烏可不擇所之乎噫篤行位不若人愧耻以求行不合道恬不加修汝徳之凉僥倖高位秪爲賤辱疇汝之貴孝弟乎家義譲乎鄉使汝無位誰不汝􅆇古人之學脩巳而巳未至聖賢終身不止是以其道碩大光明化行􅀖國萬世作程汝􅂚弗效易自滿足無以過人人寧汝服及今尚少不勇於爲迨其將老雖悔何追自省言恒患不能信行恒患不能善學恒患不能正慮恒患不能逺改過患不能勇臨事患不能辨制義患乎巽懦御人患乎剛􅄶汝之所患豈特此耶夫焉可以不勉絶􅀻厚巳薄人固爲自􅀻厚人薄巳亦匪其宜太公之道物我同視循道而行安有彼此親而宜惡愛之爲偏踈而有善我何惡焉愛惡無他一裁以義加以絲毫則爲人僞天之恒理各有當然孰能無私忘巳順天崇畏有所畏者其家必齊無所畏者必怠而睽嚴厥父兄相率以􅃪小大祗肅靡敢驕横於道爲順順足致和始若難能其美實多人各自賢縱私殖利不一其心禍敗立至君子崇畏畏心畏天畏巳有過畏人之言所畏者多故卒安肆小人不然終􅂂憂畏汝今奚擇以保其身無謂無傷䧟于小人懲忿人言相忤􅃍愠以怒汝之怒人彼寧不惡惡能興禍怒實招之當忿之發宜􅃘以思彼言誠當雖忤爲益忤我何傷適見其直言而不當乃彼之狂狂而能容我道之光君子之怒審乎義理不深責人以厚處巳故無怨惡身名不隳輕忿易忤小人之爲人之所慕實在君子考其所由君子鮮矣言出乎汝烏可自爲以道制欲母縱汝􅀻戒惰惟古之人既爲聖賢猶不敢息嗟今之人安於卑陋自以爲徳舒舒其學肆肆其行日月邁矣將何成名昔有未至人閔汝少壮不自強忽其既耄於乎汝乎進乎止乎天實望汝云何而􅃘無聞以􅃿齒乎審聴聴言之法平心易氣既究其詳當察其意善也吾從否也舎之勿輕於信勿逆於疑近習小夫閨閤嬖女爲䜛爲佞􅀋不足取不幸聴之爲患實深宜力拒絶杜其邪心世之昏庸多惑乎此人告以善反謂非是家國之亡匪天伊人尚審爾聴以正厥身謹習引卑趨高歳月劬勞習乎汙下不日而化惟重惟黙守身之則惟詐惟佻致患之招嗟嗟小子以患爲美側媚傾邪矯飾誕詭告以禮義謂人巳欺安於不善莫􅁴其非彼之不善爲徒孔多懼其化汝不慎如何擇術古之爲家者汲汲於禮義禮義可求而得守之無不利也今之爲家者汲汲於財利財利求未必得而有之不足恃也舎可得而不求求其不足恃者而以不得爲憂咄嗟乎若人吾於汝也奚􅀹慮逺無先巳􅀻而後天下之慮無重外物而忘天爵之貴無以耳目之娯而爲腹心之蠧無茍一時之安而招終身之累難操而易縱者情也難完而易毀者名也貧賤而不可無者志節之貞也冨貴而不可有者意氣之盈也慎言義所當出黙也爲失非所宜言言也爲愆愆失奚自不學所致二者孰得寧過於黙聖於鄉黨言若不能作法萬年世守爲經多言違道適貽身害不􅃘湏􅁷爲禍爲敗莫大之惡一語可成小忿不思罪如丘陵造怨興戎招􅀹速咎孰爲之端鮮不自口是以吉人必寡其辭捷給便佞鄙夫之爲汝今欲言先質乎理於理或乖慎弗啓齒當言則發無縱誕詭匪善􅂚陳匪義􅂚謀善言取辱則非汝羞四箴父子子孝寛父心斯言誠爲􅃀不患父不慈子賢親自樂父母天地心大小無厚薄大舜日䕫䕫瞽􅅱亦􅁢若夫婦夫以義爲良婦以順爲令和樂禎祥來乖戾灾禍應舉案必齊眉如賔互相敬牝鷄一晨鳴三綱何由正兄弟兄湏愛其弟弟必㳟其兄勿以纎毫利傷此骨肉情周公賦棠棣田氏感紫荆連枝復同氣婦言慎勿聴朋友損友敬而逺益友宜相親所交在賢徳豈論富與貧君子淡如水歳久情愈真小人口如􅁡轉眼如讎人九箴有序臣以迂陋過承睿知兹者考文還自京師敬奉教令侍世子殿下講學伏觀世子殿下天性高明學業超卓顧臣何能有禆萬一􅀼惟古人忠愛乎君者必有箴戒之辭臣無似敢取聖賢之意作箴九首以獻講讀之暇倘賜覽觀或可爲懋徳之一􅂇臣不任惶恐之至敬天人之有生受命于天動作起居奉以周旋苟或弗敬是慢天理既違天常亦紊人紀是以聖哲祗慎小心事無鉅細罔有不欽逸欲靡存怠肆靡作順天而行俯仰無怍純乎天徳與聖爲徒保國撫民可不敬夫守訓聖皇有訓傳之萬年惟克慎守乃爲仁賢制度有常尊卑有叙愛親忠君恤民禮士大而治國近之脩身孰爲之綱在敬與勤敬則心明萬理不昧勤則身泰所爲無怠精思篤行大訓是循能循聖道是爲賢君本孝身乎奚自實本乎親惟能盡孝斯可成仁况兹有國神民是主至徳無虧庻政以舉温顔抑氣先意承歡膳􅈗視食司衣問寒未言而畏不怒而恐志靡自專事無妄動正躬謹行非禮不由君親既安心乃無憂惟古文王事父盡孝著於禮經萬世是效儲王睿哲尚其師之勿謂聖人我不敢爲正學古學務實體立用隨始諸身心驗於設施後世失之攻乎文藝觀聴是娯道徳是棄王者之學以古爲師窮理正心固守勇爲法尭爲仁法舜盡孝視民如傷文王是效簡册所陳善政嘉猷取之自治奚暇外求聖賢立教要而不煩昧者溺心疲憊空言漢之賢王東平稱最篤行爲善垂範百世魏有陳思徒事文章徳業無傳識者弗􅆇聖明御世好善崇徳鍳乎成憲永康􅀖國推仁天地之徳廣厚無垠蔽以一言莫過乎仁萬生芸芸天孰不愛爰命人君天工是代圎顱方趾共本異形茍揆厥初皆若同生聖人之心博施濟衆一夫失所如抱疾痛燠念民寒飽思民飢巳享安逸恐民之疲不奪其時不盡其力開其昏愚賑其灾厄衆庻樂業國乃富強上不恤下非禮之常蕩蕩大藩哲王所受世篤至仁千載是守謹禮人情難制譬之河江禮以正俗爰立大防上而朝廷下建閭里自身及家莫不有禮君臣以定父子以親夫婦昆弟舉得其倫大法既昭衆志咸一綱紀相維名分有秩禮之爲治析於未萌不能謹禮刑措奚能賢哲知本檢身克已言動之㣲􅂂繩蹈矩以此使臣必效其忠以此臨民必致其恭爲國以禮聖有明訓敬徳罔愆永垂令聞崇儉天地生財以養庶民宰制之柄在乎人君節已厚人不專其利崇儉黜欲􅀖國乃􅁉茍恃富侈奢泰是夸既損令徳民用咨嗟明明聖皇以儉率下尚朴懲奢天下從化囊帷革􅂂史䇿見褒象筯玉杯賢臣所憂得失之原勸戒罔極千古爲鍳慎乃儉徳無逸天徳剛健不已于行日月旋運無息故明人處兩間烏可放逸耽樂是從憂所自出舜禹至聖尚戒慢逰日昃不遑西伯興周古有格言燕安鴆毒汲汲爲善猶恐不足人之有心易縱難􅀵必學古道乃可自修目視簡編心惟奥㫖匪賢弗親匪善弗􅂂造次無失寤寐靡忘日求至樂罔或怠荒觀省徃行爲法爲戒察理既精勇爲不懈忠孝仁義日勉行之充乎徳業發乎文辭勤政之基由此而積敬于庻事日新不息慮逺處乎尊位宜逺其謀其逺伊何千載九州常人所知止乎旦夕􅂓樂一時不知憂戚茍安一已慮不及人寧謂天下皆切吾身聖哲存心廣大周悉慮無不至念無不極正身立徳以􅁉後昆作範垂憲澤􅀍無垠警畏憂勤無或怠肆天下後世終蒙其利慎齋箴有序人之持身立事常成於慎而敗於縱縱猶之火一燎而不可收慎猶之奉盈心存於敬而兢兢弗忘則不至於顛覆故君子惟慎之爲貴里人王君仲􅆇嘗病夫人以縱取敗懲其失名其室曰慎齋余聞而喜其志欲其久而不懈也箴以告之箴曰縱轡以馳忽而不思康荘險􅇖惟􅅥惟慄虞其遺失􅂂坎而佚惑乎世之人以肆爲可常怠不知檢率取危亡汝放於言言孰之信不慎於行孰汝之順言爲徳符行爲徳機二者不慎于悖之歸有覺齋居以慎作則匪嘉厥名􅀅􅅚爾徳欲言而思勿爽於宜勿爲詭誕以啓厲階􅀅行而思必由乎義勿人之從惟天是畏天之昭昭靡幽不臨逰鍳汝體息鍳汝心由粗而精由㣲而鉅敬慎無愆朂哉君子宗儀九首有序君子之道本於身行諸家而推於天下則家者身之符天下之本也治之可無法乎徳修於身施以成化雖無法或可也而古之正家者常不敢後法盖善有餘而法不足法有餘而守之之人不足家與國通患之况俱無焉者乎余徳不能化民而􅀼有志於正家之道作宗儀九篇以告宗人庻㡬賢者因言以趨善不賢者畏義而逺罪他日於大者有行焉或者其始於此尊祖人之異於物者以其知本也其所以知本者以其禮義之性根於天俻於心粹然出於萬物故物莫得而􅀋之今夫形禪而氣續者人與物之所同也渇而飲餒而噉勞而瘁逸而嬉者人與物不相逺也卒之人貴而物賤者何哉人能知尊其身之所自出而物不能也故生而敬事之爲之甘膬豐柔之味以養其口爲之華軟温美之服以養其體爲之采色以養其目爲之馨香以養其鼻順其所欲以養其心猶以爲未至也於是􅅚身惇行以養其德令聞嘉譽以養其名著其徳美於天下後世使之沒而不忘久而彌章君子之爲人子孫非以養生爲貴而以奉終爲貴非以奉終爲難而以思孝廣愛爲難蔵于墓祀于廟自天子逹于士隆卑廣狹不同而其致一也故天子七諸侯五大夫三士二官師一庻人寢乎薦自外爲之制者由乎人孝敬之情出於天由乎人者不可踰也本乎天者夫寧有強之者哉天之命也人雖至昏弱也甚無知也過先祖之墓未有不動心者時焉而祀其先語及其遺事未有不嘆泣者􅄱氣之感有所受也非偶然也故宗廟之制祭祀之禮君子以此崇本反始致誠敬於其先㕓井之氓則祭田祖不以歳之豐歉而變不忘其始也况於身之所自出者乎知有其身而不知身之所自出是謂禽犢之民知奉其身而不恤吾身之所同出是謂痿痺之民是二者雖色貌爲人而其身物化也久矣故人而不知本謂之悖不睦族謂之戾悖與戾惡名也世之立而談者天之所授與尭舜孔子不異由顔焉而顔由孟焉而孟不此之務而惟惡名之求尚爲愛其身也乎吾懼夫吾族之人爲痿痺禽犢之歸而不自知也爲尊祖之法曰立祠祀始遷祖月吉必謁拜歳以立春祀族人各以祖祔食而各以物來祭祭畢相率以齒㑹拜而宴齒之最尊而有徳者向南坐而訓族人曰凡爲吾祖之孫者敬父兄慈子弟和鄰里時祭祀力樹藝無胥欺也無胥訟也無犯國法也無虐細民也無博奕也無闘争也無學歌舞以蕩俗也無相攘􅀼姦侵以賊身也無鬻子也無大故不黜妻也勿爲奴􅀠以辱先也有一于此者生不齒于族死不入于祠皆應曰諾然後族人之文者以譜至登一歳之生卒而書舉族人之􅆇否其有婚姻相賙患難相恤善則勸惡則戒臨財能譲養親事長能孝而悌親姻鄉里能睦而順此其行之足書舉書之累有足書者死則爲之立傳於譜其有犯於前所訓者亦書之能改則削之久而愈甚則不削而書其名族人見必揖雖貴賤貧富不敵皆以其属稱喜必慶戚必吊死以其属服無服者爲之是日不􅁏而群􅂘之群祭之群􅁙之重譜尊祖之次莫過於重譜由百世之下而知百世之上居閭巷之間而盡同宇之内察統系之異同辨傳承之久近叙戚䟽定尊卑收渙散敦親睦非有譜焉以列之不可也故君子重之不修譜者謂之不孝然譜之爲孝難言也有徵而不書則爲棄其祖無徴而書之則爲誣其祖有耻其先之賤旁援􅂋人而尊之者有耻其先之惡而􅀻附于聞人之族者彼皆以爲智矣而誠愚也夫祖豈可擇哉兢兢然尊其所知闕其所不知詳其所可徴不強述其所難考則庻乎近之矣而世之知乎此者常鮮趨乎僞者常多淳安之汪氏繇其身縁而上之至於魯公之族七十餘世皆有諱字卒􅁙􅀂目見而耳受之者其心以爲至博也而博不能勝其僞也越之楊氏親煬帝之裔而耻其名之汙遂避而不言呉寧之杜氏越千餘歳而宗漢之延年晋之當陽侯是皆知本者之所深惡而爲之者以爲工也顧不惑哉天下有貴人無貴族有賢人無賢族有士者之子孫不能脩身篤行而屈爲童􅀠而公卿將相常發於隴畆聖賢之世不能傳其遺業則夷乎恒人而縉紳大儒多興於賤宗天之生人也果孰貴而孰賤乎四海之廣百氏之衆其初不過出於數十姓也數十姓之初不過出於數人也數人之先一人也故今天下之受氏者多尭舜三王之後而皆始於黄帝譬之巨木焉有盛而蕃有萎而悴其理固有然者人見其常有􅂋人也則謂之著族見其無有逹者也則從而賤之貴賤豈有恒哉在人焉耳茍能法古之人行古之道聞于天下傳於後世則猶古人也雖其族世未著不患其不著也孔子子思以爲祖而操庸嵬之行則其庸嵬自若也祖不能貴之也故吾方氏出帝榆岡而譜不敢列之􅂋于昔者衆矣而不敢附之疑者闕之以傳疑不可詳者畧之以著實而惟以篤學脩身望乎族之人嗚呼富貴利逹外至者也求之不可必得得之不可必守守之不能必傳也仁義忠信之道備乎心不求而足得之可以行行之可以著施之盈天下而歛於身不見其隘傳之被萬世而非威武􅀔力之所能移善尊祖者思是道也行是道也天下不惟尊其身將歸徳於其祖而祖益尊祖益尊而譜益傳斯其爲孝大矣何必趯趯然爲僞而欺且誣哉睦族井田廢而天下無善俗宗法廢而天下無世家聖人之立法所以收萬民之心而使之萃于一者治道之極治功之盛不可忽也故一之所在智者無所措其謀辨者無所措其􅀃勇者無所用其力如裘之領如網之綱如髪之握如輹之轂如馬之有轡如牛之有紖操之則歛縱之則放招之則集撝之則退屈信作止惟上之所令而民不能叅以􅀻先王之民非甚異於後世也其好義而易使從化而畏法寧死於飢寒而不􅃘爲亂者豈碪斧鈇􅃏所能禁哉教之以其所固有故其向善也安令之以其所易知故其趨化也亟當是之時同閭接畆之人猶相親睦信順而大小宗法行乎宗族之間爲百世之宗者百世宗之爲五世之宗者五世宗之宗其身則守其訓有所猶爲皆受命于宗子而悍戻争闘之風無自而起苟非大姦魁詐不可教令則安有不善者乎故三代之俗非固美也爲治之具既美而習使之然也後世願治之主王佐之臣迭興于世而卒不足㡬乎古豈民性之不可化耶其具之廢已久世主便因循而憚改作材士昧逺畧而務近功區區􅀘􅁦苴漏而未及乎政教之全也民心益離而俗愈散奚獨民之罪君子預有責焉吾嘗病之而未之能行則思以化吾之族人而族不可徒化也則爲譜以明本之一爲始遷祖之祠以維繫族人之心今夫散處於廬爲十爲百而各顧其􅀻者是人之情也縱其溺於情而不示之以知本則將至於紛争而不可制今使月一㑹于祠而告之以譜之意俾知十百之本出於一人之身人身之疾在乎一肢也而心爲之煩貌爲之悴口爲之呻手爲之撫思夫一身之化爲十百也何􅃘自相􅆷刺而不顧乎何􅃘見其顛連危苦而不救乎何爲不合乎一而相視爲塗之人乎故爲睦族之法祠祭之餘復置田多者數百畆寡者百餘畆儲其入俾族之長與族之㢘者掌之歳量視族人所乏而􅀘􅂇之其􅑿則以爲棺槨衣衾以濟不能􅁙者産子者娶嫁者䘮者疾病者皆以􅀻財相贈遺立典禮一人以有文者爲之俾相族人吉㐫之禮立典事一人以敦睦而才者爲之以相族人之凡役世擇子姓一人爲醫以治舉族之疾其藥物於􅀘􅂇之􅑿取之有餘財者時増益之族之富而賢立學以爲教其師取其行而文其教以孝弟忠信敦睦爲要自族長以下主財而􅀻典事而惰相禮而野不能睦族沒則告于祖而貶其主不祠富而不以教者不祠師之有道别祠之不能師者則否廣睦人之親踈有恒理而無恒情自同祖推而至於無服又至於同姓愛敬之道厚薄之施固出於天而不可易然有親而若踈者有踈而若親者常情變於所習也閱歳時而不相見則同姓如路人比廬舎同勞逸酒食之會不絶則交㳺之人若昆弟使同姓如路人他人如昆弟斯豈人之至情哉物有以移之君子未必然而常情所不能免也聖人之治人以常人之情爲中制俾厚者加厚而薄者不至於離恐其以不接而踈踈而不相恤也故爲之祭酺之法合之以燕樂飲食以洽其歡忻􅄌愛之情恐其狥於利而不知道也肅之以鄕射讀法使之祗敬戒慎而不至於怠肆祭而酺所以爲樂也讀法所以爲禮也約民於禮樂而親者愈親踈者相睦此先王之所以爲盛也哉舉而行諸天下今未見其不可也然非士之職也故欲自族而行之鄉爲之制其制曰宗族歳爲燕樂之㑹四其時則二月也五月也八月也十有一月也其物則時祀之餘也其品則豕與羊各一酒醴羞果惟所有而不必侈也酒以七行九行爲節也位以尊卑長㓜爲序也茍尊矣雖稚子猶位乎上也苟長矣雖貧且賤以齒也其言惟孝弟忠信而勿褻也勿譁也勿慢也飲雖醉而勿違禮也立子弟二人爲執禮以佐酒酒至揖請飲既飲揖請酬既酬揖請殽羞二人歌詩其詩則蓼莪棠棣􅁑藟東門唐之枤杜谷風雅之黄鳥之􅀋貴其能感人而敦倫理也其數則如酒也立二人講􅀃嘉言古之人及乎教者皆在所取也將歌也將􅀃也執禮揖曰請肅以聴皆拱而坐坐則肱相比行則武相䘖舉爵飲醻食羞皆後長者畢則旅揖辭而退少者送長者于家然後返歳爲禮儀之㑹三冬至也歳之初吉也夏至也冬至陽之始生也君子之道自此始亨矣宜有慶也是日昧爽舉族自勝冠以上咸盛服造祠下相揖趨及門祝啓門以次入序立以時羞獻奠酒皆再拜班趨出族之長坐别堂次長者率群昆弟子姓捧觴稱壽畢皆拜遂以次飲酒相拜如禮典禮以譜至北向坐讀之長者命衆坐衆坐聴善惡之在書者咸讀無隱設席於南楹之東比向署其上曰旌善之位善之多者長者命之酒俾少者咸拜之典禮翼以就位署南楹之西曰思過之所惡之累書而不改者俾立其下於是長者以譜所列傳緒盛衰絶續之故明言之而告以常訓曰爲善如􅄝飲食去惡如去毒螫慎思哉勿墜爾先祖之祀衆拱而聴皆俯首就班再拜出少者授長者杖以序行乃還于家夏至隂之始生也君子所宜慎也是日素服謁祠如冬至禮不飲酒不相拜讀譜之儀亦如之歳之初吉慶拜如冬至禮不讀譜鄉黨之制歳爲燕樂之㑹一其時以秋其物以祭社之餘其坐以齒以徳以爵其禮主於譲其儀如宗族之㑹歌詩􅀃嘉言亦如之其詩以伐木魚麗南有嘉魚菁菁者莪賔之初筵擇鄉人子弟群歌之其誦嘉言也􅂄老之賢者舉以教在坐者皆起應曰祗奉長者之訓凡族人鄉人不與于㑹者八悖倫紀者闘爭者相訟者使酒而􅒬者博奕者過累書而不改者虐鄉里者言僞而行違者皆君子之所棄也不善者棄而後知所戒然後善者尊而益勸勸戒立而俗寧有不美者乎奉終愛敬以養生哀戚以送死墓焉而􅁙位焉而祭皆本於禮而不敢忽者先王教民之通法也䘮而用浮屠之術塟而信塟師之說資􅄀報於不可致詰之間徴休咎於無情難驗之川阜上以爲親謀下以爲身利者此古之所未聞也後世闇夫野人多趨信而甘心焉親沒于床不于禮而于浮屠不􅂘泣擗踊而于鐘磬鐃鈸非是之務則人交咲以爲簡時可􅌾矣泥于山川之利否而不即塟或至於終身或身死而委槥於子孫甚者子孫恐􅁙之禍其身舉而棄諸水火􅁙親以禮者世反非之爲愚於乎是何其不察而至於此極乎彼浮屠之所謂輪囘者果可信耶天之生人物者二氣五行也其運也無窮其續也無端先者過而後者來未甞相資以爲用者二氣五行之常也自草木而觀之發榮於春盛壯奮長蔚乎而不可遏及乎戒之以凛風申之以霜露昔之沃澤茂美一旦飄而爲浮埃化而爲汙泥蕩㓕殫盡無跡可窺矣其發生於明年者氣之始至者爲之也豈復資既隕之餘榮乎惟人也亦然得氣而生氣既盡而死死則不復有知矣苟有焚灸刲割佚樂適意身且不有而何以受之形盡氣盡而魂升魄降無所不盡安能入人􅎍腹重生於世而謂之輪囘也哉天地至神之氣以其流行不窮故久而常新變而不同使必資巳死之人爲將生之本則造化之道息矣烏足爲天地倘或有之人固不知之也浮屠亦人耳何自而獨知之彼以其茫昧不可揣索故妄言以誣世夫豈可信而事其教乎孔子謂祭之以禮爲孝則事異端之妄棄聖典而不信者其爲非禮也大矣不孝孰加焉而闇者顧安之而不以爲非胡可哉􅁙師之動人以禍福而其說􅀹恠人之昌隆盛熾者其先必有厚徳之遺賤貧夭絶者必有餘惡之著山川何與焉誕者則不然聞有貴富之人於此則歸福於其塋􅊘曰此某形也此某徵也於􅁙之法宜爾也聞有貧賤之人於此則曰此􅁙之罪也此於法宜至於斯也信斯言也則人之多財而力足者皆相率而爲不善及乎死也求善地以􅁙其身則可免子孫於禍夫孰肯爲善乎由大者而論之繋乎盛衰者莫大乎國都殽函河渭無異也秦帝之亡漢帝之昌隋㩀之而促唐㩀之而長果在於善地乎帝王之尊家天下而役海内使地善而可興竭智以營陵廟奚求而不致而亡國敗主相屬則果不在乎此也審矣古之卜宅兆云者以神道定民志耳非視岡阜之向背逆順臆度目㫁加世之􅁙師之爲也􅁙師祖晉郭璞書其書苟可信璞用之以􅁙其祖考宜有竒驗不誣而璞卒死於􅆲賊其身不能福而謂能福乎人其可信否耶世之人多信之不知自䧟於不孝而莫之贖也於乎先王之禮一失而流于野再壊而化于夷暨其大壊而不可爲忽乎入于禽獸而不之􅁴寧不哀哉天下之人其小者化爲夷由夷而徃吾不能知其所至矣其心􅁋浸膠固非空言所能革也吾獨以告吾族人親䘮必以三年三年之制必循禮勿以浮屠從事違者生罰之死不祀于先祠􅁙卜吉㐫而勿泥􅁙師之說期必以三月三月不能至五月五月不能止七月過一歳者如違䘮禮之罰必刻壙志墓銘力不足者刻其名俾後有考作方氏䘮􅁙儀務學學者君子之先務也不知爲人之道不可以爲人不知爲下之道不可以事上不知居上之道不可以爲政欲逹是三者舎學而何以哉故學􅀅以學爲人也􅀅以學事人也􅀅以學治人也􅀅以矯偏邪而復于正也人之資不能無失猶鑑之或昏弓之或枉絲之或紊苟非循而理之檠而直之瑩而拭之雖至美不適於用烏可不學乎夫學非爲華寵名譽爵禄也復其性盡人之道焉耳彼蠕而動翾而鳴者不知其生之故與其爲生之道是以物而不神􅄀而不靈人之爲學所以自異於物也匪特異於物欲異於衆人也匪特異於衆人上􅀅合乎天地㧞乎庻􅀋之上而爲後世之則也其說存於易詩書春秋三禮其理具乎心其事始乎窮理終乎知天其業始於修巳終於治人其功用至於均節運化􅆂育萬物大得之而聖深造之而賢勉修之而爲君子聖賢君子非天墜而地出人爲之也舉夫人之身皆可爲聖賢而乃不能異於物􅂚過哉不知務學之方也今世俗之儒申申而行由由而言謄口頬播簡牘以誇乎人知非不博言非不華矣而於古之學未也何哉爲其泛而無本也漫而無統也可喜而無用也君子之學積諸身行於家推之國而及於天下率而措之秩如也奚待詞說乎以詞說爲學上以是取士下以是自期此士所以莫逮乎古也嗚呼無善教而天下無善士無善士而天下無善俗世俗之陋其患豈㣲也哉余不欲學者之􅀋之也方氏之學以行爲本以窮理誠身爲要以禮樂政教爲用因人以爲教而不強人所不能師古以爲制而不違時所不可此其大較也其小學曰七歳而學訓之孝弟以端其本訓之歌謡諷諭之切乎理者以發其知群居而訓之和賜之以物而導之譲慎施朴楚以養其耻敏者守之以重黙木者開之以英慧柔者作之強者抑之扶之植之摧之激之而童子之質成矣其大學曰立四教皆本於行行不修者不與一曰道術二曰政事三曰治經四曰文藝一道術視其人質之端方純明知㣲近道者與言考其言行以稽其所進試其問難以審其所造政事文藝其材之所能者無不學也二政事視其通明才智者使學焉治民之政八制産平賦興教聴訟禦灾恤􅀌御吏禁暴悉民情知法意爲政事本試以言授以事而觀其所堪三治經精察燭理篤志不惑而長講􅀃者爲之四文藝博文多識通乎制度名物立言陳辭可以爲世教者其極也試之之日皆以終月皆欲其稱其教之名也教之存乎師化之遲速存乎人得其人推而用之不難於天下夫豈一家之學也哉謹行士之爲學莫先於慎行行之於人猶室之有棟柱也帛之有絲縷也木之有本也馬之有足也鳥之有翼也聖得之而後爲聖賢得之而後爲賢君子修是而爲善小人失是而䧟於夷狄禽獸之歸夫焉可忽哉積之如升高之難而或敗於談􅀏爲之於閫閾之内而或播於四海九州才極乎美藝極乎精政事治功極乎可稱而行一有不掩焉則人視之如汙􅁾不潔避之如虎狼賤之如犬豕并其身之所有與其疇昔竭力專志之所爲者而棄之矣可不慎乎夫口之便於甘肥體之便於華美耳目之耽於所思心志之趨於所樂家欲富而身欲尊者人之同情聖賢之所不能無也然而學道之士禁制克節惟恐是念之萌於中蒯衣藿食黜好寡欲終身而不敢怠者誠知䡖重之分也人之身不越乎百年善愛其身者能使百年爲千載不善愛其身者忽焉如蚊蚋之處乎盎􅇲之間夫蚊蚋之生亦自以爲適矣而起㓕生死不踰乎旬月當其快意於所欲以盎􅇲爲天地而不知其所處之㣲昧陋之民亦若是矣迷溺於聲色􅀔利以身爲之役而不以爲勞其心以爲至樂也而不知其可悲也甚適也而不知其爲汙辱也均之爲身也聖賢之尊榮若彼而衆人之汙辱若此􅂚爲而然哉慎行與否致之耳難成易毀者行也難立易傾者名也得之不能久於身樂未既而憂􅁇之者人之欲也以富貴利逹易汙辱之名猶食烏喙而易死也况倐忽接於耳目者之不足恃乎故人有殺身而狥君親者非不愛身也愛其身甚而欲納之于禮義其爲慮甚逺矣寜死而不肯以非義食知義之重於死也寧無後而不敢以非禮娶知失禮之重於無後也僥倖苟冐於一時而蒙垢􅀍汙於萬世小則閭里識之以爲訾大則冊書著之天下􅀏之聞其名則唾􅎪不欲入于耳計其所得曽不若秋毫而賤辱其身使孝子羞以爲父正士羞以爲友遺裔逺㣧羞以爲祖不亦惑哉且人不患不富貴而患不能慎行無行而富貴無益其爲小人守道而貧賤無損其爲君子吾家自始遷祖至於余身十五世矣以言乎貲産則不踰于中家以言乎爵祿則未有以位乎朝者然而不愧於人見推於世者以先人世有積徳蓄學操行異乎恒人焉耳逺者余不足知之若曽大父西洲府君之純厚慤大先君太守貞惠公之㢘介方正視古之賢者豈有間哉吾族之人暨􅀅來而未至者烏可不效也人莫不喜爲名人之子孫而不知其尤難於衆人盖徳大則難􅁇行高則難稱有善過於人人未之取也曰其祖之賢不但如斯而巳有惡未著人巳責之以爲不肖曰若之祖何人也而爲此哉故生於㣲宗庸族者過易􅀮而善易著以其特出掩於其先人皆異之故不求其俻也生於世家者過易聞而善難昭以其先多顯人而不可企也嗚呼方氏之嗣人柰何而不慎乎君臣父子兄弟夫婦朋友五者天倫也斁天倫者天之所誅人之所棄生不齒死不服􅁙不送主不入祠譜不書其名行和于家稱于鄉徳可爲師者終則無服者爲服緦麻有服者如禮祭雖已逺猶及雖無主祭者猶祭如是而不能爲君子則非方氏之子孫也告于祠而更其姓不列于譜修徳能爲衆人所不能行之事者其子孫必享衆人所不能致之福人之爲善非爲子孫計也然天道之於善人以及其身爲未足常推餘澤以福其後人則亦􅂚嘗不爲子孫計哉第衆人之計速而易致而君子之澤逺而難讎故趨乎善者常少溺乎利者常多衆人毎􅀏爲善之士爲迂緩無術而不知天道之所佑固在此而不在彼也天下無千載全盛之國無百年全盛之家天豈不欲有國家者久而不墜哉或一再傳而失之或未終其身而不振得之於勞勩艱難之餘而敗之於談􅀏燕安之頃非其智力所不能徳不足而子孫無所籍以自立也人之生於德善之家猶木之生沃土蚤發而易長華茂而後凋磽田瘠壠雖有萌蘖之滋拳曲擁腫終不足觀則所籍使之然耳今之人莫不欲子孫之蕃賢才之夥傳緒久而不衰而莫能爲善此猶不藝而欲穫也不獵而欲衣狐貉也孰從而致乎故富貴而不修徳是以爵禄貨財禍其身也富貴其子孫而不力爲善是置子孫於賤辱之穽争奪之區而不顧也使貴而可傳則古之顯人與齊魏秦楚之君至今不失祀矣使富而可傳則趙孟三桓之裔有餘積而無􅁨矣然而皆莫之存何哉徳澤既竭而後人莫能􅁇也先人有千乘之􅀔萬室之邑不足恃也金帛菽粟盈溢􅅒廥不足恃也惟有餘徳焉爲可恃而恃之者身必危可恃以存者其惟徳修于身而不懈者乎徳有及乎數百年者有及乎百歳者有及乎當世者有及乎一鄕行乎一家者子孫之食其報也恒視所及爲廣狹道術材畧髙世而㧞􅁼或見於事功佐明主除暴亂立法制或著於書以陳仁義政教正人心於􅀅亡遏邪說於欲盛此德於數百年者也不能如彼之盛而其所爲可以扶衰拯溺爲百年所依怙者百年之所徳也又不能然而濟當時之難者當時之所徳也下此而盡力於一郷行法於一家鄕與家賴之亦可以及其子俾不􅃍至於禍敗况其所及愈大則所利愈逺乎閭巷之士欲澤天下後世固非其職然因其身之所居以爲其分之所當爲奚爲而不可也故事親而孝事長而弟族焉而睦婣焉而義慈恭惠和不犯不忮以此守身而無媿者其徳可以澤其子推而行于鄕矜寒恤飢周人之所不及而爲人之所難爲其㣧嗣有不興者乎有位而立功學道而立言皆人所可致者孰謂吾族之人而不能爲善人乎孰謂爲善而果不可特乎體仁天之生人豈不欲使之各得其所哉然而􅀔有所不能故托諸人以任之俾有餘􅀘不足智愚之相懸貧富之相殊此出於氣運之相激而成者天非欲其如此不齊也而卒不能免焉是氣行乎天地之間而萬物資之以生猶江河之流渾涵奫淪其所衝激不同而所著之狀亦異大或如蛟龍小或加珠璣或聲聞數千里而或汨然而止水非有意爲巨細於其間也而萬變錯出而不可禦人何以異於斯乎智或可以綜覈海内而闇者無以謀其躬財或可以及百世而餒者無一啜之粟天非不欲人人皆智且富也而不能者􅀔不可也􅀔之所在天不能爲而人可以爲之故立君師以治使得於天厚者不自專其用薄者亦有所仰以容其身然後天地之意得聖人之用行而政教之說起故聖賢非爲巳設也所以爲愚不肖之資貨財非富匹夫也固􅀅俾分其餘以􅀘人之匱乏三代之盛是法行於朝廷達於州里成於風俗而入於人心是以天下無怨嗟之民久矣其亡而莫之復也世之志義之士猶有推其所有餘行其所可爲者其亦先王之所取者乎然非知本者不知其意之美也人之挾所長以虐同􅀋由不知本故耳使知斯人之生皆本於天視人之顛隮䧟溺與巳無以異則民焉有失所之患哉余病乎未能而欲試諸鄉閭以爲政本數百家之鄉其人必有才智貲産殊絶於衆者雖廢興迭出而未甞無毎鄉推其尤者爲之表使爲二􅅒三學􅅒之法豐歳夏秋自百畆之家以上皆入稻麥于􅅒稱其家爲多寡寡不下十升多不過十斛使鄉之表籍其數而衆閱守之度其凡􅀊可得千斛以俻㐫荒札瘥及死䘮之不能自存者其入也先富而岀也先貧出也視口而入也視産産多者皆庚加息十一不能庚則否􅅒之左立祠以祠入粟多而及人􅀶者祠之左右序掲二板左曰嘉善書其人之績板以朱書以青右曰媿頑板不飾書以白書吝而􅀻者爲表而不均者漁其利而不䘏民者歳再集衆謁祠而讀之以爲戒學之法各立師一人以有徳而服人者爲之立司教二人司過二人司禮三人鄉人月吉盛衣冠相率謁學暇則遊於學問乎師有違過者於師乎治悖教不良者師與其罰其教法如族學之儀臨海縣知縣黄誥黄巖縣知縣張師善台州府儒學教授尚芳訓導李深黄巖縣儒學教諭文程府學生陳縝葉琰王梅齡臨海縣學生李臨卿戴濬之黄巖縣學生孫思光牟汝鈞校對遜志齋集卷之一終
