front:
  text: 遜志齋集卷之七
  hash: sha256:9dc0fe6ea34d1002bdc9294425d2dd43931411c389d94636cb33bfed748dec02
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4e0074_SBCK_007-1a}
body:
  text: 中順大夫浙江按察司副使奉勅提督學校雲間范惟一編輯奉政大夫浙江按察司僉事奉勅整􅅚兵備南昌唐堯臣校訂中順大夫浙江台州府知府事前刑部郎中東呉王可大校刋雜著靈芝甘露論聖人有非常之德故天地有非常之徴天之有􅀨露地之有草木此其所常有者也於其常不足觀聖人之盛惟其德充仁著㝠符黙感露而有甘露焉草而有靈芝焉沛然而䧏莫測其源燁然而華莫究其根或瑩潔圎浄而其味如飴或敷爲七莖九莖而質備五色此豈可以易􅃱哉德昭乎上下仁蓋乎六合大而日月星辰遵其度小而昆䖝動植得其性中而􅀺庻􅀩澤樂生故天爲之發醇地爲之孕英使粹美竒秀之氣於兹二物而見而二物未足以盡之則又爲鳥之鳯獸之麟鱗而爲龍介而爲􅀛未見聖人者因其世之所有而知其德旣見聖人者因其德而信天地禎祥不易􅃱而古昔之􅃱此祥者未之數遇也臣竊求聖人之徴於聖世甘露靈芝發祥於畿甸山川之間者多矣非極盛德何能􅃱此赫赫之嘉祥哉昔者誦諸傳記而今得躬覩之斯可爲天下慶非特一時美觀也雖然臣聞天地於禎祥之􅀋非惟見於物亦間見於人故物有非常之質人有非常之才非常之物僅可爲太平之徴非常之才實可以􅃱太平之盛是以聖人尤貴之重之德可以善俗行可以化民使人見之而喜即之而慕巋然傑然爲禎祥於天下國家者此真人之甘露靈芝也天地之佑聖人者意其在此豈徒見於山川之間而巳哉郊祀頌有序皇帝肇禋于上下神祗奉太祖高皇帝配先是十二月癸卯朔乘輿臨視殿壇戒􅅚百吏滌牲省噐各嚴厥軄無敢或違是月戊寅上御奉天殿群公卿士咸受誓戒其夕宿于齋宫明日巳卯岀舎皇邸尚食進素膳及期行事自元旦至于祭天地開朗日月華曜氛祲屏除風氣穆清方當岀郊龍旗徐行萬騎不驚山川草木皆有喜色六軍百姓忻躍聚觀洎將展禮玉輅望門䧏趾而趨脫舄登殿秉璧奠瓉興俯拜跪寅畏慎恭如對天顔與神明居星妃岳君海王瀆長翕忽腌靄若歆若格夜半禮成仰瞻霄漢煥朗澄瑩上爲動容昧爽還坐正殿在廷臣僚及百執事相率拜賀畢同進言曰王者嗣位而郊見上帝蓋上以占天心下以定民志若天地享答神靈恱豫􅀺民永受福祉苟不順洽人用弗寜今皇上肇祀而神祗恊賛六合之内光照顯赫陽明發舒隂慝消伏浹于旬日纎翳靡形白叟鮐翁嘆未嘗遇兹豈智力所及哉上之至誠貫徹二儀皇天䧏鍳錫以萬年休命祥徴灼灼可信不誣翰林侍講臣某曰誠之動天固然矣然臣伏覩陛下自即位以來鴻恩惠澤漸漬萬方赦重罪免逋租恤困窮賑乏絶受直言褒賞良吏登任才俊寜屈國法而不忍以法病民寜􅆣儲積而不􅃘以歛妨農仁聲義聞升格穹昊上帝眷懐保祐顧綏若父慈子夙夜不忘禋而居歆蓋盛德之明驗也天所享不常視德臧否以爲喜怒有德而生民安其治則天心恱無德而怨讟下興則天用不佑德之動天厥惟昭哉臣不佞幸執筆綴從官後躬覩盛禮謹作頌辭以明聖德之格天以播善政于無極其詞曰上帝至仁視民如傷眷求同德俾典萬􅀖自唐之衰夷擅中國迨于有元人胥于狄赫赫太祖受命孔時黄􅃏朱旗載清九圍復天之常修人之紀蕩削􅁾腥上帝攸喜休養􅀺元若疾在身大功未終授之聖孫惟聖天子皇祖是嗣奉承天心克受帝祉霈澤是施大賚是庸桁楊不陳囹圄虗空孰租之逋奚貸之􅀒厥數千億棄而勿取孰爲􅑺蟊撲之除之䧏以風􅀨俾􅆂濡之登賢用能幽滯􅁬􅀤容受嘉言衆志必逹四海所環有萬其區至仁溥暢庻􅀋昭蘇乃諏令辰正月壬午誓戒臣工大祀攸舉陽德顯融歛戢群隂天開日舒百神鍳臨玉輅岀郊樂備不作齋于祠宫盛服儼恪肅肅于動栗栗于言上帝在兹敢有弗䖍昭哉廣殿取􅀋明堂金舖瑶礎勢切穹蒼􅂦爼旣豐幣玉旣􅅚灺燭煒煌騂牲芬苾乘輿徐來及門而趨執圭屏息仰覿天居乃盥乃薦乃綏乃燎儼若居歆覩其色咲分命臣僚獻于群神合敬同誠百禮具陳雲君岳祇海王瀆伯厥靈洋洋來舉飲食帝謂天子􅃱孝事天爰錫純嘏子孫萬年太祖嘆言天子至仁恩加􅀺庻四夷咸賔天子稽首受天之胙拜跪周旋如奉寳璐樂止禮成夜氣正中星斗交羅其光烿烿聖情欣豫上帝予輔萬口同聲昔未嘗覩還坐法宫端拱受朝至和盈庭如聞九韶天子曰嘻來爾臣隣惟天惟祖匪德疇親政或未脩惠或未愽各殫乃心助予諮度勿厚其歛重困細氓勿苛爾刑必臻乎平乃稽詩書乃施教化乃建皇極崇王斥伯準則堯禹紹述商周純用道德配古作逑邪慝隂􅀋弗眤弗使君子陽剛是崇是仕民所願欲宵旰推行其所畏惡絶于未萌人心旣恱天命自久聖子神孫百世之保流以源長國以仁興敬天靡渝萬方永貞凝命神寳頌有序皇帝始即阼布德施仁大宥萬方恩聲義聞震于四表函夏之間群􅀺胥慶於是天啓厥祥地效其珎廼元年使者還自西方爰得青玉於雪山廣袤踰二尺揆其􅀄得徴兆異常質理栗温世所希見來獻天府先是上在儲宫嘗夣神人􅃱上帝命授以重寳及是􅀗玉宸􅂨宻感未俾宣露二年正月十一日上將郊祀乘輿出宿齋宫其夕復若有覩與前夣恊驚窹欣喜遂命玉人肇工􅅣爲大璽方尺六寸九分親定其文曰天命明德表正萬方精一執中宇宙永昌其歲十二月工以成奏名曰凝命神寳三年正月元旦告于天地祖宗爲文以示遐邇群臣稽首􅁛賀是日討罪之師適來獻捷王旅􅁬伐逆黨大奔越十三日郊見上帝十九日享于太廟每歲正月恒病隂􅀨至是自元日至于郊廟翳氛屏除日月華曜山川軒豁神人喜悅咸以爲上德格天而天錫斯寳及寳旣成天必錫以介福將見年榖屢豐災害不作􅀺元安富草木鳥獸皆遂生育兹其端巳見矣寳之明徴豈徒然哉臣孝孺乃言於衆曰人之寳厥寳而不知天之攸寳知天之攸寳而不知皇上之所以寳斯寳也昔在古􅀄聖帝明王有大寳焉位以之定民以之安天以之清地以之寜禍亂以之消福祥壽考以之􅃱子孫賢才以之盛且昌堯舜禹湯文武受于天而得之夏癸商􅉝周幽厲秦政隋廣天不􅂌而失之漢高文光明唐太宗宋太祖窺是寳而弗能有其全是寳也或謂之中或謂之仁或謂之皇極或謂之寛厚數千載間有得焉者寡矣不可以智取不可以才􅀗不可以力爭乃至皇上而天復授焉用其緒餘已霈如霖雨􅃳澤天下而民􅀍其惠者方來而未艾也尚恐保之者或未能盡復恐後之君國子民者不知寳之所在也取陶唐虞夏三聖人相傳之要而銘刻焉蓋精以擇之一以守之而用其中於民德由此立政由此成天命由此凝天下之至神豈有加於此者哉天不言授皇上以寳皇上以一言發帝王之寳昭哉鑠乎真萬世之鉅範百聖之弘謨也彼秦之斯衒其蟲􅂐天厭其醜焚而燼之久矣衆兆􅃖􅃖追而索之噫匪有見乎神寳孰知彼之爲陋且卑乎古者國之制度繫天下安危生民治亂者史必書之其可咏嘆􅁛録者縉紳學士頌之臣官以文學名而軄在太史躬覩盛事其烏可以巳廼拜手稽首獻頌曰天有太寳授之人君百世相傳鮮得其真其寳伊何神妙莫測歛蔵一心施覃九域爰在中古無噐有文姒受重華承諸放勲三聖􅁇作迭居天位有寳守之四海大治其精其一曰執厥中曰仁曰義異號同功成湯得此表正萬􅀖周武丕承於前有光䧏自嬴秦聖賢迹熄以噐爲寳不寳道德茫茫千載帝王孔多傳祚短長視寳如何得聖緒餘亦克康乂漢唐而下駁而靡粹惟明天子天實啓之授以大位俾作君師克仁克明克武克毅動謀于神靜恊于帝上帝之心惡殺好生皇宣慈惠任德緩刑孰􅇳之􅀒幽抑罔雪剖其桁楊觧其縲絏孰租之逋身困家傾焚其簿書俾吏勿徴孰厄于窮鬻及男女出金爲贖還􅂌父母有胔于途或骼于原歛而􅄟埋釋其痛􅁈或以飢寒殺越于貨止戮其魁餘黨皆赦或以單弱脅從􅁀強釋而弗誅賜衣與糧一話一言務崇寛大公卿士庻以薄相戒群喙懽騰幸逢聖明盍朝乎仕將野乎畊葺爾室廬育爾孫子保無外虞終樂田里民心和同實與天通天念天子養民之庸錫以寳王夣神告語曰予命汝永爲民主天子曰嗟天命孔祥我造重噐以福萬方昔人所寳寳止乎噐噐雖可久道不足貴精一執中二帝之謨我刻斯寳與聖合符告于祖宗逹于天地著乎文章照臨後世得道者昌失道者亡以道爲寳肇自聖皇皇陛黼座寳在左右匪道弗言匪道弗履威罰慶賞必信必明聖謨在前敢有不平用賢去邪必篤必果祗服聖訓不慎其可出令發政道爲權衡喜怒從違以道爲經緝熈日新大中之道僉曰神哉兹惟大寳寒暑以順􅀨􅊙以時災害以消民物以孳云誰使然兹寳之神匪寳之神天子之仁大哉聖仁天地是配􅀓示無􅆠宇宙永頼省躬殿銘有序皇上嗣大寳位清心恭已喜怒不形輕徭减賦賞罰以􅀋舉措得宜行之期年萬姓恱服群生欣豫薄海内外薫爲太和上猶謙譲弗自以爲德旦暮親政勤勵靡遑復於乾清坤寜南北二宫間爲退朝燕䖏之殿置古書聖訓於其中沉玩靜思名之曰省躬諭以尚父所存丹書之㫖夏書所欹聲色宫室之戒曰汝其以是爲銘臣受命而退拜手稽首言曰天下國家之本在乎君君之所以建極垂範於四海者在乎身而􅃱此身於無過之地俾􅀺元􅂪福後世承式者不以心爲之宰乎是心也五性具焉五典行焉萬理萃焉萬事出焉苟或不有以持之則發乎正者易㣲流乎欲者易危是以聖人慎之而加省察之功德若堯舜可以爲至矣而兢業不􅈈勲若禹湯武王可謂難能矣而未嘗敢忘乎學祗德而聞善則拜者禹也屏逺聲色貨利而聖敬日躋者湯也從事敬怠義欲之訓而銘于席鑑衣冠以自警者武王也其爲事不同其敬以省躬則一也故其德業如日月之光與天地並存後之君非無雄才美質然不知聖學之要或始于勤而終于肆或勉強於衆庻贍覿之時而放逸於閑居狎䖏之際其不能比􅂭於古豈無所由然哉惟我皇上以二帝三王之資居二帝三王之位而篤志聖人之學日蒞治朝命令之宣政事之著陶冶庻􅀋而措斯民于治安者旣無媿於古矣退而燕休不少暇逸而復省躬于斯焉覩棟宇而若上帝之臨撫屏扆而若祖考之格聖心湛然與天爲一思慮圖猷靡有弗敬至理昭朗邪慝消除愛惡怒欲之偏無自而岀芬華靡麗之誘無間而入固不待省而自存也而省躬之念不忘匪深得乎堯舜禹湯相傳之道烏能臻斯盛乎斯道不傳也蓋久徒知以智術法律爲治以故小不足以移風易俗而大不足以祈天永命聖上以敬爲學􅁇自今始終弗二内外罔愆將見隂陽恊年谷登四靈至品彚咸若子孫􅀺民受祉于千萬年矣臣幸以勸講爲軄謹奉制獻銘曰天眷君德付􅂌兆民民之慘舒繫乎一人萬化之原庻政之本大哉此心與天地準心乎克敬恭巳無爲百度以貞四海雍熈或怠以肆天德淪亡内外交荒􅀖用弗昌至聖惟堯舜禹湯武以敬相傳千載同矩明明天子前聖是師端拱法宫天下順之未旦而朝旣旰而食淵黙齋莊以建皇極于郊于廟􅀑神䧏臨惠于臣民動靡不欽任官以賢敷政惟德薄賦寛刑恤􅀌掩骼至仁暢逹霑􅀍萬方惟帝克敬惟天䧏康帝心弗居彌自謙抑内殿燕休寅恭朝夕究觀前史以鑑安危左書右詩千古與期􅄝好未形防鉅于小喜怒之􅀤必循乎道恩欲其普政欲其平兵欲不試刑寓好生下察民情上祗天戒咸省諸躬無時怠􅈈敬怠之徴古有訓辭怠則患生敬爲福基身心旣謹復省于事啚於盛時可保長治帝心乾乾如日在天不息于行照臨八埏華搆有嚴實資聖敬育德綏民永受天慶慎獨齋銘恒人爲善徼利務名謹於昭昭肆於㝠㝠乘衆不察恣意所向人欲横奔天理淪䘮君子懲之慎於至㣲匪虞人􅁴而畏已知一念之萌必存乎正片言之發必主乎敬勿謂闇室忽而不欽易欺者人難欺者心勿謂細行放而或貳細行不修大德將敗惟聖之明不見是圗矧兹士子不敬謂何於赫天君宰爾百體率而從之勿越乎禮禮爲教本敬爲德基本立基宏奚施弗宜齋居有嚴學者孔秩􅁥兹勿忘聖謨如日謹節堂銘天道在人爲心之仁仁道之大始於事親事親能養謹節爲貴謹則無憂節則不匱我持我身我力我田綵服餘間挾我簡編雖無顯榮我親則安雖無三牲亦有㫖甘進立于朝大夫卿士􅀭名尊親由謹節始寜海童君以是名堂養親其間華扁煌煌我作斯銘用􅀭厥德有過其閭爲我必式喜友堂銘真素先生家于海隅自其先人兄弟共居爰議築室燕衎以娯卜諸溪南􅀛恊其繇除荒剔􅁾以葺戸牖先生左䖏諸季在右雍雍愉愉子姓先後徴名陶詩命以喜友名成益喜與客飲酒酒半有客離席而嘆􅀭弁啓齒以言子所爲喜者吾能論之凢人喜幸出於憂患病者喜愈客者喜還困者喜舒危者喜安又有人焉縁物而喜誇者喜權譁者喜市荒者喜色貪者喜賄相彼所喜先生不取恂恂骨月恩義有加一室團欒其喜無涯此於人情相去㡬何且子不聞兄弟之間非特于今古人所難􅁔形斗粟詩賦然萁豈曰無家兄弟爲仇先生之居雖陋弗完我行其庭爾箎爾塤先生之身雖隱林阜我觀其私爾足爾手食不待奢分饔并飱居不待華同温共寒霜露之晨風月之夕行吟接􅂂坐諷聮席三畆之宅五畆之原弟耨于後兄耕于前旣孝旣友從容話言飲此醇醴盎然春温凢登斯堂與飲斯醴歸視其家孰無兄弟先生之喜不私諸巳將令吾徒聞風而起將令吾居永爲孝里先生聞之欣然而喜衆賓酢酒先生起舞取酒酌季且咲且語豈無他人不如我同父友于堂銘有序寜海竺君􅁢恭與其二弟􅁢升􅁢和皆好學而知義以友于名堂蓋有志乎敦睦者因銘以著其美且以大且逺者勉之銘曰天賦恒性厥倫有五君親兄弟朋友夫婦親之當愛君之當忠人雖至愚鮮不率共婦以情合乖戻者寡朋友義交以道相下至於兄弟本乎一身或頑不知覆若他人有藩其廬有異其畝有冨千乘不餬其口有忌其才斥之不疑寜以天下付諸癡兒僨業隕身莫不由此嗟彼不仁實滅天理天之俾汝爲弟爲昆夫豈人力乃命攸存長少雖殊其本則一孰非遺體而忍不恤弟寒父憐兄飢父悲胡私其身曾不􅃱思在父之身或有痾癢手足撫摩不待勉􅆠今雖異形其氣則同安危憂樂孰不相通懿美竺君好學慕道謂道之要惟孝惟友旣孝于親復友同生高堂其嚴掲以嘉名嗟嗟斯民皆予兄弟顛連無告視之䫙泚由近而逺尚克推之政行于家􅀖國其儀之慎思堂銘有序廬陵劉君子愽以文學恪忠受知于上擢磨勘司丞名其退食燕居之堂曰慎思余善是名喜劉君之能於軄也銘以相之銘曰惟皇建德統綏萬民孰輔承之小大庻臣或弼其違或敷其治有舉大綱有親細事其在賢哲視軄則思忠國尊君不顧其私曰此下民與吾同體孰艱孰危孰困寒餒孰爲昏迷汨其天明昭􅀭大猷􅀣之􅀖經虞夏之道殷周之制損益弛張以淑萬世凢民所安必謀必行其所不欲必絶其萌靜以􅃱思俾合中正舎􅃦忘食祗帝之命揆其所存本乎至公利澤所加沛然無窮嗟彼小夫􅄝利忘善豈不有思厥思不遠位患不崇家患不昌罔上浚民患計不良勢有相軋智有可忌心所惡讐患不能去蚤夜以思蓄隂滋姦乘機􅀼發僨國瘝官爲休爲祥爲㐫爲禍所思一殊判若水火若有古訓惟慎其㡬鋤于未形絶于未爲本心之明日月之掲私欲之㣲稂莠之㧞思發于中由義與仁國忘其家民忘其身勳名之盛上配前古視彼小夫穢若犬䑕劉子􅄝學孔文而賢對越嘉名作時恭先百爾有位慎恪厥職思孝思忠鞏我皇國寜野軒銘有序善爲治者常養斯民之質於冥冥之中使之全其性而不鑿其天顓然無思頽然無爲推魯敦樸而不雜以僞故其民難摇而易化失其道者則不然搔之以智巧而昡之以機變飾之以儀節而􅁋之以浮華於是天下之文日勝質日媮民始紛紛狙伺乎下而禍亂因之以生太史公班固􅁛漢文帝之時七八十翁未嘗識市井遨遊嬉􅃧如小兒狀余嘗思其言而嘆其盛蓋自三代以䧏數千年間俗莫醇於此時者賈􅁩軰闇於治道猶發憤病之斯豈足以知文帝哉以法術治天下固不若以德化先天下之爲完也是道也惟文帝知之曹參行之而賈􅁩非之此賈生所以不逮文帝也哉近代之政去古逺矣然其法寛事約有足取者故方其承平之際老成先進之人皆渾厚雅重口不出毀訕之言而身不􅂂詭激之行余不及見之而聞其流風於縉紳間蓋兵革之餘故老無復存者矣今乃得陳君國大焉陳君閔習俗之澆弊欲以身率之名其所居曰寜野軒其意以爲寜失之於野可尚哉其爲名也昔漢興至文帝蓋三十餘年而後風俗易化安知今之異於古哉復先王之盛殆必有在而君之名室烏知其非兆歟不可以無述也乃爲之銘銘曰皇始尚質貴乎自然不忍以文鑿民之天文過爲媮質甚爲野以媮况野如鄭與雅大雅之音澹泊無華靡曼姱都乃聲之邪質􅀡無文其樸則美以飾喪真爲詖爲詭惟昔有國政簡而章洽于萬􅀖民俗阜康鉅夫碩人森列天下推其言行莫匪長者遺澤之傳今也則㣲不有善士孰矯循之幽幽斯軒茨戸甕牖其植果蓏其䕃榆柳豈無藻繪斥而弗施惟野之尚愧不忍爲非無財智亦有儀度慤乎不文惟野之慕蕩蕩流俗機詐日繁上下胥欺莫知其囏軒有嘉名取則孔遠有來遊觀尚勸爲善雙桂軒銘有序傳曰仁者必有後豈不然歟某遊京師識太子正字四明桂公公和易誠篤表裏如一與人交豁然無隱􅀋漢萬石君龔勝之流舉朝之士服公徳無異辭信所謂仁者也旣而復謁公於清溪私第見公之二子曰慎宗敬曰全宗生者又皆英敏卓越讀書綴文有名縉紳間人或􅁛之曰桂公有二良子私心固巳期之以爲必非偶然者某東歸天台宗敬以書來言四明所居軒有雙桂連理之祥因以雙桂名軒余􅀤書歎曰是天之所以符二子耶仁者之報其殆兆於斯邪不可無以識也爲作銘銘曰天人之間古謂難言是豈其然影著於形響必有聲感孰不應胡執不通訾其夢夢盍觀桂公桂公孔仁言敷行敦二子甚文文則旣有質則加厚􅁛者同口人舉巳彰天兆厥昌惟桂發祥一本而􅄮􅄮而合之天意可知豈無他􅀣獨發於桂桂姓攸契􅀟桂欝敷二子之符耿哉不誣天亦可親日視于人肆其屈伸惟公植德二子將食益衍無匿爾衍爾昭爾公爾侯復膺天休慈溪之隂雙桂森森望於東南扶桑可薪析木可焚是桂永存五雲山房銘有序五雲山房者何前宣寕簿楼君士連之室也謂五雲者何山名也山而加於房者何室依乎山也室則居之爾而詠歌之者何樓君將出以仕而不忘乎室則無所忘於心矣知本之道也知本者君子之事也何以昭之銘之所由作也銘曰惟山房奥而明弘而有容君子是則厥德以充峻而潔不汙不涅君子是則以保清節山房之中君子不忘慎終毋忘仕也孔臧林泉讀書齋銘有序士不知所爲學久矣文辭以爲華記誦以爲愽古之學者雖不外乎此以求道然道不在是也錢塘徐君文以林泉讀書名其齋余喜其好學之篤也誦所聞者以銘之銘曰斯人之生去物無㡬叅乎兩間惟性之美持美勿斆爲嚚爲庸牖擴天明厥惟學功孰治于學而遺其事口習心游卒淪于墊或懲其害力於躬行物有不知將躦于㝠又或不然去學絶爲惟心之求異端是歸三者殊科畔道則一幸有聖謨皎其如日匪學奚知匪行奚臻主敬立誠卓爲天民萬理紜紜之如髪春融海澡木長泉逹内剗其􅁾外薅其􅆷不吝以􅉻不驕以亢以聖爲準以賢爲徒大道是趨廣居爲家勿溺於汚勿畫於邇日運天行真語確􅂂細行宏猷小紀大綱察於纎㣲徴於家􅀖誰謂天下難乎治平各充其需禮叙樂成學之盛功庻其在此豈若偏􅄮僅足一巳俗學卑卑爲俗攸􅅓非有扇銘用此以扇枕孝子之行也用此以扇暍仁君之聖也由孝而充之則爲奉上之忠由仁而廣之則爲澤民之政也王待制私謚議翰林待制王公禕使雲南以節死久而易名之典未下門人議私謚之烏傷俞恂曰惟三代之學本諸身心著于行事發于文辭表裏相符華質不爽故著之于書者即其操行之餘形於言行者即其學術之實未有言與行乖身與學戾者也世䧏道䘮儒者始離學術心身而二之所學歸乎仁義而所爲狥乎邪僻考其爲書則上援聖賢稽其所至則僅同庸俗以之䖏下則不足以美風教化鄉閭以之事君則不足以光華朝廷表率海内惟待制公則不然自其少時巳有大志受於家庭得於師友者皆純正之學察理盡乎精㣲制行本乎忠恕􅀒剛方之氣懐經濟之資當元之季嘗草書􅁆千言將上于朝以救􅆣失知事不可爲乃歸休于家欲以文辭名後世旣而遭逢聖朝遂爲史官􅁱元史始於太祖造􅀖之􅀄終於末主播殂之後刪煩剔冗􅀘其軼遺君臣賢否邪正逆順之跡天地事物禮樂刑政兵民財貨消長興廢盛衰之由莫不粲然包綜具有倫序嘗兩賛郡政咸著廉能之聲有豈弟之德後以伉直忤用事者使萬里絶險之􅀖􅅏滯􅁆年蠻夷向義之心未洽遂加􅆷害竟不屈以死追考公平生志行端潔學術淵深其於性命道德之要治忽成敗之㡬灼見洞曉發之文辭敷􅃾蔚贍浩乎若秋江之濤鼔盪莫測而其來有本也藹乎若春空之雲變化不常而其岀無窮也其在翰林嘗掌制命四方學者爭傳誦之求者盈門以不得一言爲耻蓋自古盛世之文一代不能􅁆人而公之述作可與相準偏才曲士多優於言而劣於行公南中之節􅁬厲卓偉使異域知中國有守死不貳之臣其過於人甚遠昔王仲淹孟東野之徒門人朋友皆援古著謚後世韙之今欲最公文行以文曁節謚之於禮其可衆皆曰諾其子紳以告天台方孝孺孝孺曰予嘗聞翰林學士金華宋公􅁛待制公文行皆如恂言死而易名於義爲􅁛乃定謚曰文節試筆􅀃吾居乎鄉客遺善筆二分其一於友人而用其一銳而端圎而勁以摹畫咸與心􅁛愛之不忍妄用遇佳紙墨洎文辭則以書書畢滌而蔵之恣意率手有所作則用其次者是以雖甚久而猶新焉他日友人至問其所得則曰弊而棄之矣詰其用則紀錢粟貨利卑猥事不稍惜視之與里巷所爲偏欹軟惡者等不知其爲美也吾聞而歎之友人曰子何歎之細也以余用斯筆也而違其任余則有過矣雖然世之用人者得無有甚於余之用筆者乎筆易爲也美者易得也用久必敝固其軄也今夫所謂賢士君子者天之生也難生而不夭死不疾病􅀗全其美也尤難然而用之者不任之以立政教修紀法居廟朝治海内而卑位冗軄是命一不快於意不待其敝而棄之且加不勝之法焉者亦衆矣不彼之歎而於筆焉惜是尚爲知􅀋也哉吾愧乎其言謂之曰筆吾所任也故吾知愛而嘆之任人非吾事也吾其敢僣而歎乎若姑修其可任者以待人之任巳何暇乎世之歎而吾之疑邪畏􅀃人可無畏乎㓜則畏乎長賤則畏乎貴鄉則畏鄉之老成學則畏士之賢者仕乎位則畏法令畏小民畏公議豈特若是而巳哉食焉而畏無以及乎人也言焉而畏其背乎理也居焉而畏其過於燕安也􅃦焉休焉而畏邪僻有以􅆷吾中也臨財而畏其損吾行也居寵而畏其滿盈也舉一事興一役而畏其或勞乎民或病乎時也然猶不特此也見少者而畏無足爲之法見賤者而畏無足爲之養見愚者而畏無以教之見鳥獸草木而畏吾之無聞而將與之同於澌盡朽腐也見山林川澤而畏吾及物之利有所不及也見古聖賢之言行而畏其不可追也思乎後世而畏其將訾短乎我也然尚有甚於此者視乎吾身而畏或不能慎守以辱乎親察乎吾心而畏無以全所付以辱乎天天之􅂌我者爲何如仁也而或賊之以忮忍義也而或蔽之以利欲禮也或爲驕慢之所勝智也或爲小慧之所淆以言乎臣而忠或疚焉以言乎子而孝或惰焉以言乎大而或未能用天下以言乎小而或未能爲天下用凢天軄之内有所􅆣皆謂之違天可也屋漏之間􅀑神臨焉觴豆之際兵戈生焉般樂怠傲酖毒存焉思慮有未純省察有未至則爲忽乎天矣人之於天而違且忽焉豈不甚可畏也哉子受父母之命則佩而思之一有所違則世以爲不子臣受命於君則奉而行之一有怠事則有不臣之罰天之可畏於君親也昭然矣柰何人違且忽其命而不知畏也夫其不畏者非其人之過也爲之師者莫以告而不自知其所受之重也使果知受於天者之重則其起居食息語黙取予之際其有不􅅥􅅥以思兢兢以持者乎使果知畏天命矣則所畏之事將日寡無所徃而不安矣不知天命之可畏則事物陳乎前者孰非可畏者哉是以君子知可畏之理故無可畏之患小人則不然入於可畏而不止故知君子小人之分觀其知所畏與否而巳矣漢中劉生仲義事予爲弟子者五年其爲學篤謹不􅈈而持巳以禮蓋粗知所畏者今將貢于京師升于太學而逹于天朝予欲其不􅀒天之所􅂌而爲君子之歸也故以所當畏者告之太學先生多予之所畏者其必有以正予言也夫其尚因予言而有以教乎生也夫習菴說鄉先生陳君季明年六十餘而進學不􅈈間謂予曰吾之生也先子以晦菴朱子之名命之及長而知其不可也請更焉因名爲熈旣而自念名固不敢同於朱子然奚敢舎朱子之學而不學也故别號習菴以見志子以爲可乎予曰可哉古之人以昔賢之名爲名者若司馬長卿之名相如慕乎藺相如之爲人而取之也顧元凱之名雍蔡中郎喜之而以巳名與之也然而長卿未必如藺子元凱雖賢亦未嘗􅀋乎伯喈豈非名可以取諸人而道必在於自至乎君子之學聖賢務乎道德之同而不貴夫名字之􅀋自孔孟以來學孔孟之道而造其極者其名非必與孔孟同而其道則無不同以其志乎聖賢之志而習乎聖賢之業是以卒至乎其域而不自知也苟爲無志而所習與聖賢殊雖以舜禹自名亦妄焉而巳夫孰以爲可乎今君於名則辭而不敢與朱子同於學則習而不敢與朱子異可謂知所務矣然而朱子之學聖賢之學也自朱子沒二百年天下之士未有舎朱子之學而爲學者至於道之􅀋乎朱子者未之或見何哉蓋踈淺者􅀼其華而忘􅁱巳之實質魯者守其意而不求􅃱用之全莫不自以爲有得焉而終不得以成身而見乎世君之所習誠能以敬存心以義制行窮萬物之理以周乎事盡彛倫之常而不失其中歛之則措於家施之則􅀍乎民雖欲辭其名而人固將以善學朱子之道􅁛之矣不治其本而攻其末習乎其言而不察其所由言則凢所習者未必非朱子之所棄也而豈君之志也哉抑予觀世之學者少之所習旣長而怠壯之所習未老而忘是以雖欲志乎道而不可得君年愈高而爲學愈力孜孜焉以未及古人爲耻於是乎過人遠矣蓋或習焉或否焉而習乎非所當習者衆人也終身由乎道而不少息者君子也始乎無所不習而終不習無不利者非聖賢不能也習乎習乎其亦有無事於習者乎然則君也茍終身習焉而不止其爲君子也孰禦焉王温子栗字􅀃浦陽義門王温柔和而好學加冠將定字其師劉君恐其不足於剛也字之曰子栗爲辭以祝之而復謂余曰願有教也余曰事有似異而相資者水火以爲㸑鹽梅以爲和寒暑以爲歲由其離者觀之戾乎其不侔不可比而合也然是􅁆者必相合而後􅃱用並行而後成功夫豈果異乎哉剛柔仁義之辨不啻水火然未有不兼二德而可爲君子者視其外謙卑遜順之氣穆然求其内莊敬誠篤之意確然故端方而不犯慈良而不􅀝以之措大政持大議不變辭色而天下從之自道之不明士各因其資之所近爲學柔則至於枉巳剛則至於違衆枉巳旣不足以立事而違衆又不能有成治功之不見於世非此也與天下之所病者非不足於温也而患無以守其内是以柔懦者多流於詭隨劉君勉之以栗其知所教矣慎哉栗乎爾毋厲外而懦中也必也挺㧞特立如雪霜之松栢不撓不折以固其節乎温乎戒哉爾毋翕翕以合煦煦以同必也如春之融長養生息而不見其迹乎栗者所以爲敬也温者所以爲恕也居敬行恕而至於君子吾於子乎是望雖然飲食資乎水火而飲食非水火也鹹酸本乎鹽梅而至味非鹽梅也歲功成於寒暑而天地之化不止乎寒暑也周人有言曰不剛不柔厥德孔修德備乎剛柔而剛柔不滯于事惟聖賢能之鄭叔度字􅀃麟溪鄭君叔度與某同學太史公之門謂某曰吾之生先子貞孝君以楷名之及冠太史公字以叔度字之義公嘗欲教我矣而未之暇幸與吾子相好子能知公之意乎知則盍爲我言之某曰予未之聞也以臆言之公之期叔度者不其至乎度者先王所以齊萬物一民志之噐也天下之物至衆也姑舉一二言之布帛綺錦出於人之爲其長短侈狹鄉異而家不同苟無度以絜之争奪之端何由而弭乎造宫創室群材旣備百工咸集木之宜圎宜方爲柱爲梁長之爲棟楹短之爲楔杗苟無度以絜之何由成匠石之功乎作樂制噐範金爲鐘斵石爲磬絙絲爲琴瑟刳竹爲簫管穴匏爲笙􅅮土爲塤革爲鼗皷木爲柷圉其長短豐約之制至不同也苟無度以絜之則音何由而和乎任土制邑建都立國或畫田爲井或􅀣城作屏大而四海之内山嶽廣遠無際置􅆠分界立爲郡縣以統之設爲上下以縻之揆里行令數圖責貢苟無度以絜之孰得其數而爲之限域也哉度之爲用亦大矣雖然度有二公家之度懸之國中而四方之民各以其物來就而平焉忮者不敢怒智者不敢欺吝者不敢惜強者不敢違以其折中至公而無私也由國而郡由郡而邑莫不皆然三家之村足不履官府之門耳不聞法令之教削蒿而爲度以竈煤節其分寸量布揣帛自以爲可也苟律之以公家之法則爲辟矣夫人之爲學何以異是閭巷之氓飾詐任情自用其愚行之於家非不可也折之以聖人之道則過矣故聖人之道公家之度也取法乎天地合明乎日月前同乎三王後符乎萬世若周公孔子者爲度於天下者也其次若子思孟子之徒明聖人之道爲一時所師爲度乎一國者也次能脩身繕行以善化俗若郭林宗徐孺子之流人􅁛忠信者爲度乎一郡者也次能篤愿自持動靜不悖乎法取與不過乎義者若元紫芝陽城之流岀能盡其軄􅀮能固其志爲度乎一邑者也下此則卑矣今叔度之家秉義聚居者十世堂序之内秩然而禮穆然而樂林宗孺子之行人人操之而叔度蔚有文聲巳足爲一郡之度矣而太史公復以度期之豈非欲進於其大者乎大莫大於聖人之道一民志而齊萬物者聖人之事也叔度日懋而學之其不得爲賢者乎其不得爲一國之度乎豈非太史公意乎抑亦貞孝君之志乎若夫漢之廉范黄憲皆以叔度爲字而後之同者甚衆二子雖賢而不爲叔度言者將以大者望之猶太史公之意也王氏兄弟字􅀃翰林待制烏傷王先生有二子曰綬曰紳次第加冠於首各請字於金華太史公公字綬曰孟緼紳曰仲縉而某告之曰美哉二子之名與字也其爲用貴矣朝廷宗廟之禮穆穆在位百辟布列登䧏俯仰之際鏘然有聲者非佩玉乎即而視之天子之玉白也公侯之玉山玄也大夫世子水蒼曁瑜也士則瓀玫也而貫之者非綬乎綬則皆綬矣又即而辨之天子以玄組公侯以朱組大夫以純組世子以綦組而緼組則士也緼者赤黄之色而孟緼之字以之豈非望其修士君子之行而不爽於用者乎嗚呼綬以貫玉而鳴乎朝廷宗廟之中孟緼􅄝學綴文煥爛而和平某深願孟緼之貫道以鳴國家之盛也雖然綬之所繫者非大帶乎大帶之垂者非紳乎大帶之􅀶四寸素而朱裏者天子也而禆以朱緑素而禆垂者大夫也而禆以玄華練而禆垂之下者士也而禆皆以緇士之紳三尺有司去其五寸紳與帶非二物也謂紳爲帶可也謂帶爲紳亦可也其等雖異而其爲用約身而縉笏者則一也笏之制天子諸侯大夫士以球玉以象以魚湏文竹以竹本凢四等而將事執玉之時皆搢於紳是紳者一身之束約而敬之本也端冕之卷然衮繡之班然非紳以約之未見其服之􅁛也球象之温然文竹之燦然非紳以搢之未見其有所措也而仲縉之字以之豈非望其謹􅅚自持而􅃱於用者乎嗚呼紳之用要矣昔之􅁛大儒君子曰縉紳先生某深願仲縉益勉而思以嗣待制君之德也抑又聞之待制君之名爲禕而字爲子充禕亦服之貴者昔太史公嘗推其義且相期以文顯亦旣有徴矣今二子也亦有美名而某何人敢􅁇太史公之後哉雖然二子也其尚無忝厥父某雖愚又安敢不勉戴樂和之字􅀃事有不相謀而相感者金石土革絲木匏竹是八音無知􅁴運動之靈世之所用以爲樂者也仁義中正孝友人之所爲以善其身世之所謂德者也德􅁱於巳巳知之人未必深知之况此八物者何由而知之乎然而德盛則八音之樂随之以盛德衰則其音隨之以衰非八物之有知人之誠足以感物物有所不能自止也舜之韶紂之靡靡皆資於八音者也而其音之不同猶陵與谷然者非所以感之者異哉故八音可以人力爲也能使八音和而不失其正者非􅁱德以和之不可也自三代以來八音未嘗絶於天下然終未有及乎韶之遺音也非其噐不若其德不逮也苟有太和之德雖操牛尾而叩􅇲以爲節將有天育神化之意矣不然雖后䕫之噐尚存而欲其和胡可得也浦江戴先生名其子曰樂問字於太史公公字之曰和之蓋勉之以德也古人於樂無所不用而今也惟有天下國家者得備而用之其於無位者宜若無與焉然君子禮樂未嘗斯須去於身者非有噐之樂之謂蓋無噐之樂也有噐者固有今與古之殊不待噐而和者今何異於古哉視於其身慈譲忠信之色睟如視於其家親睦信順之意翕如此樂之本也奚待於噐乎戴氏自德聖以禮樂爲學光生學焉而至者也和之試求樂之本於身推之於家懌乎其無乖秩乎其有儀則凢接於耳目者皆樂也余將於是而考其德􅀓氏字􅀃古人之於字名所以自别而􅁛於人不計其美惡也商以前質畧蓋有徒名而無字者周之文盛矣周公孔子文之所從出也其加字名於子宜有異焉而乃禽魚􅁛之斯二聖人豈不欲其子有美名􅁛哉而卒不然者以人之美不在乎名字也德誠足尊矣雖㣲字以代其名人猶不敢名之茍無足尊者雖極字之美人不之字也盡名之美終不能名于後世也學者亦勉乎德而已何以名字爲哉然今之人不敢忽乎名字者以爲因是或可以勉其德曰仁而踐仁焉曰義而思義焉果能因名字之美而服行之則名字不爲無益矣烏傷傅君循淳慤有士行其族之兄武昌守伯長字之以希道其號甚美也而願余發之夫道之在天下豈以言而著哉顧知之審與畧行之至與否耳知之而審也行之而至也道固將積乎身豈特希之云乎如使知之未審行而未至雖欲希之安可得也千仭之木不自言而人􅁛其爲千仭號檉椐以梧檟人必檉椐之是豈名之爲貴哉有其實之爲貴也希道因名字也而益進乎其實則爲希道也較然矣不如是名字且無與於人余言安所益乎陳野翁字說天下之事不患其未備而患其太備方其未備也有才知者皆可因其跡而􅁇之及乎旣備而至於無以加傾於極盛之餘而蠧於至飾之後自非聖人矯而持之鮮有不爲大患者故帛之未繪也五色雖未著而黼黻文章之質巳具爲玄爲黄無所不可恒有餘美焉或者不察而采色繪􅀞之炳然溢乎目者固若可愛而物之至美亦窮若先王之治天下常養斯民至美之樸於政教之先使之不以物遷不以習變而不至於不可􅁇是以安化而易使和柔而易制茍爲不然籠之以智巧誘之以權詐彼將各逞其所長以馳􅕽于世紛紛狙伺乎上者日新而無窮而上之所操者巳殫矣國家之亡罕或不在乎此昔者孔子每病周末之文而欲從忠厚之先進孔子豈惡乎文哉惡乎朴之散而文無措也去先王之世益遠是朴不知其所在者久矣求之於通邑巨都茫乎其不可􅃱也求之於華顯之位邈乎其異於斯也反而求乎深谷窮山之間蓋猶有可徴者焉茍無好古之君子與不溺於習俗之弊者天地之至美㡬何而不至於胥亡也哉常觀乎閭里之㑹凢􅂄舊老成之士發言􅂂行多質實近厚有古昔之遺風而少年英銳徃徃飾智以相詐挾竒以相高可喜者旣過而可悲者􅁇之吾以是知孔子之嘆有以也四明之南有邑曰奉化奉化之桐照里有士曰陳先生性高守介􅀋古卓行君子年六十餘矣教其子甚嚴待鄉人有禮而和始名曰文而字爲􅁢章旣老而觀先進者之日㣲也復更名質而字野翁余違古人亦已久矣持其身以行乎今之世心恒惴然恐爲淺薄之歸而不􅀗聞故老之儀刑何幸乃得先生乎今之俗可暏矣革旣弊之文而復乎野以全斯民之樸宜必自東南始東南文之勝䖏也然則先生更字之意焉知非其兆乎余雖鄙且賤猶及預聞之王子文字觧人非名字則不能自别於衆人然其異於衆人者不在乎名字之美也視其德與行焉耳虺蟲之厲者也而仲虺爲良臣蠋蝡動之㣲也而王蠋爲貞士滅惡徴也而子羽爲君子疾不祥也而樗里以智聞夫豈在乎美其名字乎賢聖仁義惠哲忠孝此八者天下之美號世之人以之自名者多矣人未必以是􅁛之而蓄德謹行者雖未嘗用之爲名字人必以是號加焉故以美言爲􅁛謂不若踐之於身見諸行事之可寳也自有名字以來人以美言加其身者宜亦衆矣而傳於世者可得按籍而計豈非躬行有不至乎士或能以名字逹于一鄉而不能逹于通國或􅁛于一國而不足逹于天下然有逹于當時而不聞于後世者焉百年傳之久而遂亡者焉蓋其名世若是之難也沮溺謂孔子爲魯孔丘則是時與孔子同姓名奚特一二哉然惟孔子傳後世爲學者師而彼咸無聞由是知名字之不可恃苟無足􅁛雖襲聖人之名以自號無益也而况於美言乎人不修其可傳者惟名字之務美寜非惑歟浦陽王君其名曰江而其師友以子文字之其字信美也然斯文也周公孔子之所終身學焉如不足賢人大儒竭心思智能欲庻㡬而不敢望者子文乃取以自别于人其可不懋於德乎水不必皆若湘沅也惟能自逹于海者則皆謂之江浦江其一也其水不可容舟楫浴牛馬而以江名者取其不資巨川之助而能趨海爾夫由衆人而視聖賢何異水由遐荒而趨海乎然而水無㣲而不至於海者以其不息也思是名也學聖賢之道審能如浦江之於海則謂之子文也無惑黄晏仲晦字說浦陽黄君晏其生之時當元至正中四方兵起天下大亂民倀倀在干戈之間奔走伏匿無一朝寧其父孩而抱君曰是兒之生庻其有晏乎遂名之曰晏及乎真人應命而起掃除殘賊宇内晏然十五年間遂至平治而君適當加冠方斯時士之􅀭材露技以干世者又皆騷然不得安其居其賓賛相與言曰欲晏者惟自晦而巳於是字之以仲晦而俾予暢其義夫士之生大之欲顯功名於天下著譽聞於後世次之猶欲顯于一國下之猶欲顯榮于鄉􅀖而奚願於晦哉蓋晦者顯之根也曷不觀於大澤之龍蛇乎當天地閉蔵之時遁形於沙泥之下曾不如暖井之跳蛙惟其善自晦也一旦出則興雲霧而雨九土矣古之君子其顯之至者􅂚嘗不由於自晦哉或晦於屠釣或晦於魚鹽或晦於􅅵畝晦之久者受抑挫憂患必深所以増其智慮而助其材能者亦衆矣故一有用於時天下無難爲之事而立非常之功豈彼自衒者所及哉然其晦也非直與庸衆人逐逐同汙也雖晦其身而其心未嘗不經營乎天人之際上下求乎古今之豪傑而尚友之也苟亦逐逐然與恒人同視彼自衒者又何異乎喜功好名之士挈其所有以試於人非不足以立取貴富夸耀其鄉里驚駭乎衆庻然而其憂殆不勝其樂其安亦不足償其危也豈非不知自晦之使然耶黄君之父自危亂之時思宴安而以名其子字之者又知所以保之之道可謂善名字矣黄君苟能以古之君子自思而勉學焉則夫顯融之來可坐而得矣不亦善於爲子者乎劉士安字􅀃廬陵劉君子愽善士也名其子曰善而其友字之曰士安旣字而問其􅀃於天台方某曰事有一言而可以行於身克諸家推之蓋乎天下非士不足以知之非君子不足以至之非聖賢不足以盡之者其惟善也乎由天地而觀之發育鬯逹盈乎其間者是理也由人而視之慈愛惻怛與天地同體者亦是理也有形之􅀋孰能無之而衆人或䧟乎惡者患乎不學者耳士君子之爲學豈能加毫末於斯理之外哉由是而􅀤言焉則爲善言矣由是而制行焉則爲善行矣由是而措諸事爲見於德教則爲善政矣言善言行善行施善政則善播乎天下矣其身庸有不安者乎故士之安乎善猶衆人之安乎利也以利爲安者安未至而危辱􅁇之茍能安乎善則貴賤冨貧佚愉憂戚變乎外者雖無窮而其心未始不安也劉君有學行仕于時其勢可以爲善而其心休休然有樂善之色是其善之可􅁛者亦衆矣又欲傳諸子而因名若字以教之豈非知所教也哉士安居乎家則取於父逺焉則取法天下之善士又以爲未至則上而取法古之聖賢以爲師則其進於善也何惑焉蔣伯孚字􅀃予嘗觀乎大澤之陂而知易中孚之義矣方其一碧千湏􅆂山浸空清恬静帖鱗介呈露巳而風遜蓬焉生拂林動谷而加乎澤也恬者沸帖者震絲縈縠動濤廻浪噴萬皺相因變怪莫盡則仰而歎曰斯所以爲中孚也乎聖人之取象精矣夫澤至靜物也孰得而感之茍以石則石沉矣澤何能感以火則火滅矣澤何能感以雷則虗聲而不動物澤何能感天之高也地之厚也有生成之力而欲一感之不可得也必也其風乎風動則澤應有不待踰時而感者矣若此者以其中固有相孚之理也而斯卦也巽悔而兊貞巽風而兊澤於象爲中孚又巽順也兊也以順感民則民􅀃而信矣於義爲中孚又二體之中畫皆陽有誠之義全體中虗有虗之道斯聖人之取義又精也夫人之心至深而不可測猶澤也將何以孚之哉茍以威刑感之則猶以石沉澤也徒撓之耳以智計感之猶以火投澤也徒自勞耳以號令感之猶以雷動澤也徒震撼耳能感之者其惟誠乎以誠感民則有不言而信者矣豈惟居上位者爲然也雖公􅀸大夫亦然以誠事君則君信以誠蒞事則事治以誠享神則受福矣豈惟公􅀸大夫爲然也雖士亦然親親也匪誠則離䖏鄉黨也匪誠則怨交朋友也匪誠則爽豈惟士爲然也惟藝亦有然者孔子曰人而無恒不可以作巫醫恒者常理也謂誠也醫而非誠將孰信之哉烏傷蔣伯孚士而醫者也而其名曰誠徴予􅀃予故釋其義以告之伯孚能審乎此爲政可也醫云乎哉蔣氏異􅀲辨東陽蔣宗顯藝􅀲之圃得異􅀲焉並蒂而駢實紺色而璧文圃人異之曰自吾一人詎知從事乎兹􅀗􅀲多矣未有若斯之異者其殆祥乎不敢取以告宗顯宗顯視之果異也不敢以食奉之而歸或曰此祥也天下之物異於其􅀋者爲祥爪牙角鬛之倫兟兟也人恒見之不貴也其異乎􅀋者曰麟麟不可多得也人貴焉故麟謂之祥羽翮而飛者充天下人不貴之者必其多者也其不可見者曰鳯故鳯謂之祥萌而生者衆矣而獨貴乎朱草湧而出者衆矣而獨貴乎醴泉豈非以其寡哉今夫􅀲家藝而人食之累千百未見其狀之若此也而蔣氏之圃獨見之安可弗謂之祥乎或曰不然物皆本乎氣化而莫能相通各囿於天而不知其所由木之樛者曲者􅄮者詭形怪質萬變而不齊人不能詰其端雖木亦不自知其所以然也謂木有意於爲之木未嘗有知也謂造物者使之然造物者不若是屑屑也然則物各役乎天而不自知也明矣何預於人事乎人之指有􅄮者脅有駢者人不知其􅂚爲而然也夫人之靈且不能檢其形况是􅀲也植物之㣲者自知爲異爲祥乎草木之異常者皆氣之變也於人事乎何與而人以爲祥豈不惑哉二􅀃者相持久不能决宗顯以問余余曰謂之祥者是也謂之非祥者亦是也君子之道大極乎天地㣲通乎􅀑神能充其用􅀨􅊙寒暑自我而施况一草之異乎故有以􅃱之則謂之祥可也苟無以􅃱之雖使禾頴同乎隴木理連乎庭災害之來猶有莫止者祥烏可恃乎蔣氏於東陽爲望族忠信孝友著于鄉踈親聚食合爲一身斯人之祥也祥乎斯世者也又何以蔓生蓏實之怪爲足尚哉且一􅀲之異於其􅀋猶聞于人而名于世况夫德之異於衆庻者乎蔣氏其益務滋乎德而勿異乎􅀲他日治民者奔告于天子以爲東南之邑有祥民者必蔣氏也耶府學生陳縝葉琰王梅齡臨海縣學生李臨卿戴濬之黄巖縣學生孫思光牟汝鈞校對遜志齋集卷之七終
