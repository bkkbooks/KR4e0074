front:
  text: 遜志齋集卷之六
  hash: sha256:8af554b5ecfc58d4cd30b2e5964c4569be2d2bf610735412b491c773928d7e53
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4e0074_SBCK_006-1a}
body:
  text: 中順大夫浙江按察司副使奉勅提督學校雲間范惟一編輯奉政大夫浙江按察司僉事奉勅整飭兵備南昌唐堯臣校訂中順大夫浙江台州俯知府事前刑部郎中東呉王可大校刋雜著毁譽一人之所好可以信其爲善人乎一人之所惡可以信其爲非善人乎未可也一人易私也衆人之所好可以信其賢乎衆人之所惡可以信其不賢乎亦未可也衆人易誣也然則惡乎從其時之君子其爲人也君子其是非也必明其去取也必當其爲言必可信而無阿一君子之所好惡不問可信其爲賢否也衆君子之所好惡不問亦可知其爲賢否也何者恒人有衆寡君子無衆寡也通齊國之人皆惡匡章孟子獨取之而齊人之言皆廢衆誣而孟子直也舉滕國之民皆信許行而孟子獨斥之而滕民皆以爲然衆私而孟子公也茍非君子雖衆不足信而況其寡乎苟爲君子雖寡不可忽而況其衆乎然則聽言之道亦可知也君子之守不可移也一人曰是可罪君子不信也必察焉稱人之善也亦然不惑於恒人之毀譽故足以爲君子人毀而毀焉譽而譽焉於恒人也何擇嗚呼今之君子何其易於毁譽也不賢人也或告之曰某也賢則從而賢之果賢人也或告之曰某非賢則從而不賢之賢與否人也賢之否之者吾心也奚不以吾心賢否之而以毀譽之言爲賢否乎曷爲不思也恒人之毁人也有端其譽人也有由有忌而毀者五有忌其才而然者有忌其名軋巳而然者有忌其位高不及而然者有忌其貲多不分而然者有忌其爲世所重而然者惡而毀者四惡其直諒不比也或毀之惡其正而不可以私動也或毀之惡其賢而彰巳之惡也或毀之惡其得君而不獲自肆也或毀之恒人之毀不出乎此者鮮矣出乎此而信之以行誅責焉行威怒焉則賢者遇禍而不賢者得志矣其譽人也存二利之而譽者四利其德巳也利其賜巳也利其勢可倚也利其名可衒也畏之而譽者六或卑而畏之或以其貴而畏之或以其臨而畏之其勢盛也或脅之其黨衆也或使之其名震也或讋之由是而譽非其本心也不察而信之慶賞因之而施爵禄因之而頒則不肖者愈熾矣鄰乎號道乎吠而從之者鷄犬也取於物而不求諸心斯其爲物也焉有君子而可以毀譽動乎雖然以毀譽易心者不知人者也以毁譽自變其行者不自知者也古之君子信道也審而自知也明其中無缺萬人毀之所疑當作漠如也其中未至也萬人譽之確如也彼豈以外易内哉人知之也未嘗喜人之不知也未嘗愠其心方師友乎聖賢而以百世爲旦暮蚋集而蛆散者於我何哉嗚呼不以毀譽觀人者吾弗得見之矣能不變屈於毀譽於道也其庻矣乎鄉原或曰鄉原奚謂德之賊也曰以其僞也奚爲其僞也曰務同乎衆而不知道也一鄉之中有善人焉有不善人焉君子惟取乎善人而巳不善者雖強附以從不取也怨怒以謗弗顧也於善如是也於不善如彼也斯爲君子巳矣使善不善咸悅而無殊焉寕知非不善人之徒哉鄉原者欲人咸悅而不擇義理者也欲人咸恱者鄉原之情也君子不可以利悅小人可以貨誘者天下之勢也以其私情動天下之勢必不可兼致而偏勝焉則與鄉原合者必毁君子不合乎汙者必惡鄉原之人鄉原之不善於君子則思所以擠排擯斥之於是視君子如仇讐而善人之類銷矣其賊德也孰大於是曰若是則盗也奚原乎曰以名則盗凶而原吉也以言其禍與其原也寜盗虎皮而虎質可俻也羊其外而虎其中不受其禍者鮮矣方大剛直者其内必䟽通而不回詭侫而下人柔和而易喜者其險且戾莫測也故能餌人以甘言者必能中人以危法飾小謹以釣名者必能爲巨虐以厲民以鄉原致位者胡廣也以鄉原竊國者王莾也無他由僞也閔俗何曾於晋非名相公孫五樓於南燕爲亂臣趙括於趙氏爲敗子然括能讀父書傳五樓料劉𥙿用兵曾知晉室將亂後世稱材智者有所不若也嗚呼豈特賢者不如古哉斥妄君子之於衆人其生與死同惟生而有益於世死而無愧於心者爲君子其不能然者爲衆人此其所由異也使飲且食焉以養其生而於世無𥙷雖有喬松之壽猶無生也不能奉天之道盡人之性自致其身於無過雖談咲而亡猶不得其死也古君子所以汲汲若不及者未嘗以生死入其心惟脩其可以無媿之道焉耳天之全以賦我者吾能全之而弗虧推之俾明養之俾成擴而施之澤於天下後世於人之道無所愧雖不幸而乖於天迕於人死於疾病患難何害其爲君子哉不能盡人之道而欲善其死者此異端之惑也異端之徒其立心行巳固巳大畔於君子視倫理之失夷然以爲宜爾而不恠其身雖生其心之亡巳久矣而猶務乎不死或尸居以求其所謂性命或餌金石服草木而庻㡬乎坐化而立亡以預知其死爲神以不困於疾病爲高彼旣以此夸昡於世世之惑者又從而慕效之不知其所云性命者果何道而預知不困者果何益耶孔子曰竆理盡性以至於命斯聖賢所以爲教而人所當爲者也竆天下之理而見之於躬行盡乎三綱六紀而逹之於天道堯舜禹湯周公孔子之所傳人之爲人不過學此而巳生者知此而後可生死者明此而後可死入乎此則爲人出乎此則爲夷狄鳥獸不可毫髪去也異端者果足以知此乎其所云性命者果不異於聖賢之所云乎其去夷狄禽獸果逺乎皆不能然而惟緩死之求審如其言能閱千載而不死與木石何異曾何足以夸人而效之耶況其生死亦與恒人同其不爲疾病所困而預知其死之期特寡慾清心使然耳不足以爲異也茍以隱儿而死爲異則植物皆立枯茍以預知爲神則鳥有知死而哀鳴者此二物者亦足異耶故不能盡人道雖不死而無益盡人之道雖不得其死猶不死也記禮者稱孔子將終曵杖負手而歌聖人之於生死宜先知之然不若是不害其爲聖人也聖賢之於道不茍同於人於跡不茍異於俗道欲其同則枉巳跡欲其異則駭世皆非聖人所爲也舎聖人不效而惟異端恠術之師㡬何而不䧟於夷狄鳥獸耶啓惑天地之生物有變有常儒者舉其常以示人而不語其變非不語其變也恐人惟變之求而流於恠妄則將棄其常而趍怪故存之而不言後世釋氏之徒出意欲使天下信巳而愚舉世之人於是棄事之常者不言而惟取其恠變之說附飾其故以警動衆庻其意以爲此理之秘傳者人不及知而我始發之遇一物之異常輙張大而徴驗之欲稽其故則荒幻而無由欲棄其說則似是而可喜凡民之愚者皆信而尊之奉其術過於儒者之道而不悟此真可悲也夫運行乎天地之間而生萬物者非二氣五行乎二氣五行精粗粹雜不同而受之者亦異自草木言之草木之形不能無别也自鳥獸言之鳥獸之形不能無别也自人言之人之形不能無不相似也非二氣五行有心於異而爲之雖二氣五行亦莫知其何爲而各異也故人而具人之形者常也其或具人之形而不能以全或雜物之形而異常可怪此氣之變而然所謂非常者也非有他故而然也今佛氏之言以爲輪廻之事見無目者曰此其宿世甞得某罪而然耳見罅唇掀鼻俯膂直躬者曰此其宿世有過而然耳見其形或類於禽獸則曰此其宿世爲鳥獸而然耳不特言之又爲之書不特書之又謂地下設爲官府以主之詭證曲陳若有可信而終不可詰此恠妄之甚者也天地亦大矣其氣運行無竆道行其中亦無竆物之生亦緜緜不息今其言云然是天地之資有限而其氣有盡故必假旣死之物以爲再生之根尚烏足以爲天地哉譬之炊黍火然於下氣騰于上累晝夜而不息非以巳騰之氣復歸干甑而爲始發之氣也茍人與物之䰟魄輪轉而不竆則造物者不亦勞且煩乎非特事決不然亦理之必無者也且生物者天地也其動靜之機惟天地能知之雖二氣五行設於天地者不知之也使佛氏者即天地則可今其身亦與人無異何以獨知而獨言之乎多見其好恠而謬妄也今有二人其一人嘗遊萬里之外而談其所見則人信之茍其身亦與我俱䖏于此而肆意妄言則䘮心狂惑人耳雖鄙夫小子亦知其妄且誕佛氏務爲無稽之論正類乎此而人皆溺而信之豈皆不若鄙夫小子之知乎何其迷而不知悟也悲夫言命方子灌𬞞千圃客有言禄命之術者方子曰若欲知命之說乎窮乎天理之紀推乎日月星辰之行參乎氣運徃復之端而後可以言命之粗而余何暇言之而若亦何暇聽之然吾方治𬞞試與子言𬞞可乎始吾與二鄰人藝𬞞各數十畦其土同樹之時同𬞞之種又同其一人薅之甚時漑培甚宜其𬞞爲最盛藩籬不固一旦牛逸而踐之無遺植也其一人怠而不治時雨旣畢草䖏其上而𬞞伏其中萎翳隕穫無復生色吾閔二人者之爲葺吾籬使物莫能踰數耘屢漑俾𬞞無所害故吾之植獨盛以大兹三者亦可以言命否乎世之敏於封植進取以致冨貴而不虞外患者踐於牛者也不能自脩而困賤貧者勝於草者也於命何預焉今徒言豐嗇禍福制於天者有必至而不察修治警戒由於人者有未至天人之道離而命之說窮矣雖然此吾庻民之圃之喻也非王者之圃之喻也萬民者王者之𬞞也九州之内王者之圃也仁義德澤其培漑之具也政教刑罰所以剔汙菜而理之也夷狄盗賊踐吾𬞞者也酷吏横歛敗吾𬞞者也聖人在乎上敗吾𬞞者耘之除之踐吾𬞞者斥之攘之而歲免其租月賜之酺同其好惡而恤其窮孤故其民多富而少天好善而無殃斯時苟以六物推民之災祥豈無短折貧困者乎而卒不售者人事修而天莫之違也及其不然可以踐敗之者有所不修而可以培且漑者有所不行故其民多不能遂其性而樂其生然其命之出乎天者豈無壽福康寧者乎亦卒乖戾者人事廢於下而天亦莫能違也故盛世衰世之民其命皆不可推宜然而然不然而不然此人所能知數之所該也不然而然宜然而否此理之所不可徴天地之所不能易而況於區區之數乎若行乎今之世其操術必精矣閱乎世之人必衆矣亦甞見有宜死而壽宜賤貧而富貴如吾之所稱者乎茍有遇焉則幸以告吾將擷圃中之𬞞歌太平之盛以與子言命越巫越巫自詭善驅鬼物人病立壇塲鳴角振鈴跳擲呌呼爲胡旋舞禳之病幸巳饌酒食持其貲去死則諉以它故終不自信其術之妄恒夸人曰我善治鬼鬼莫敢我抗惡少年愠其誕瞷其夜歸分五六人棲道旁木上相去各里所候巫過下砂石擊之巫以爲真鬼也即旋其角且角且走心大駭首岑岑加重行不知足所在稍前駭頗定木間砂亂下如𥘉又旋而角角不能成音走愈急復至前復如𥘉手慄氣懾不能角角墜振其鈴旣而鈴墜惟大呌以行行聞履聲及葉鳴谷響亦皆以爲鬼號求救於人甚哀夜半抵家大哭叩門其妻問故舌縮不能言惟指床曰亟扶我寢我遇鬼今死矣扶至床床裂死膚色如藍巫至死不知其非鬼床裂二字疑誤呉士呉士好夸言自高其能謂舉世莫及尤善談兵談必推孫呉遇元季亂張士誠稱王姑蘇與國朝争雄兵未決士謁士誠曰吾觀今天下形勢莫便於姑蘇粟帛莫富於姑蘇甲兵莫利於姑蘇然而不覇者將劣也今大王之將皆任賤丈夫戰而不知兵此䑕闘耳王果能將吾中原可得於勝小敵何有士誠以爲然俾爲將聽自募兵戒司粟吏勿與較嬴縮士嘗遊錢塘與無頼懦人交遂募兵於錢塘無頼士皆起從之得官者數十人月靡粟萬計日相與講擊刺坐作之法睱則斬牲具酒燕飲其所募士實未嘗能將兵也李曹公破錢塘士及麾下遁去不敢少格蒐得縳至轅門誅之垂死猶曰吾善孫呉法右越巫呉士二篇余見世人之好誕者死於誕好夸者死於夸而終身不自知其非者衆矣豈不惑哉遊呉越間客談二事類之書以爲世戒明辨或曰蘇洵子之論明事約而功多其可爲善言也乎曰其謂有大知小知者是也其所謂大智小智者非也聖人之治天下豈用詐術揣量天下之人情以爲賞罰哉亦惟用其誠而巳譬之天地之化隂陽誠運日月星辰誠行風雨雷露霜雪誠施寒暑晝夜之叙誠平物之囿乎其中者順之則生逆之則死其生與死天地豈以私意爲之哉物各有以取之耳故物之生者不以生爲恩死者不以死爲怨以天地無意於生死也聖人之於賞罰豈異於是政教誠立禮樂誠俻五刑五服誠陳随其功罪而各得報焉爲公卿大夫爲士爲剕爲劓爲墨爲宫爲大辟非聖人賞且罰之也聖人之法賞且罰之也非法有意於賞罰也受賞罰者自致之也故聖人埀衣坐乎廟堂而四海之人改德繕行行於千萬里之外萌一惡心則慄然内懼恐其君之知之而不敢爲修一善行則欣然自喜必其君之巳知而不敢怠聖人豈能家察人視而使之然哉誠立乎此而應乎彼此明之大者也蘇子之言則不然以爲人君之賞罰當若雷霆雷霆之擊物不測故人畏之如蘇子之言是天以詐術待萬物豈足爲天哉世以天以雷霆罰暴惡吾不知其果然否也使其果然吾意天遇暴且惡者則罰之必不操狙詐之道盻盻焉瞷人之不意而使人駭且讋也夫務岀人之不意而使人駭讋者市井相傾之小智稍知輕重者不爲曾謂天而若是乎苟謂暴惡者不可得而盡誅故警一二以懲千百尤非也夫警一二以懲千百者亂邦姑息之政畏其衆而莫敢問不得巳而爲之耳非聖人之道也道貴乎至公善惡各當其報者道之常也今使千人而叛父毋褻神明惟一人受雷霆之誅則此一人者獨何不幸而餘人獨何幸乎誅止乎一人爲暴惡者將曰天之誅不能遍乎人吾何懼乎則其不善之心愈肆矣復何畏惮之有乎故謂雷霆誅暴惡者未必然也謂天以不測使人懼者非知天者也皆小智之私論也曰然則齊威王用此道而諸侯震懼者何耶曰彼固覇者之餘術耳烏足語夫王道且使威王而明則四境之内將不能欺之矣蔽於左右之人至於九載而後悟安在其智乎賢者非特即墨大夫不賢者非特阿大夫因左右之毀譽而賞罰斯二人其他有賢過於即墨不賢甚於阿者不幸而左右不言則無所賞罰焉則爲鄰國之咲亦巳多矣何震懼之有哉謂諸侯震懼者史氏之謬詞也蘇子信而取之過也彼蘇子者好於竒謀而不知道喜爲異論而不守經吾恐世有好其說者以私智爲明而禍天下故辨之學辨人莫不爲學孰知所以爲學也所以食者爲飢也所以衣者爲寒也至於學而不知所以其可乎哉夫人之有生也則有是心有心則有仁義禮智之性是性也惟聖人不假乎學能生而盡之非聖人之資也茍不學安能盡其理而無過哉故凢學者所以學盡其性而巳不能盡其性而人之倫紊矣此人之所以不可無學也而學必有要焉何謂要五經者天地之心也三才之紀也道德之本也人誰不誦說五經也而知之者寡矣茍不足以知其意雖日誦諸口而不忘謂之學則可矣而烏足爲善學哉夫所謂善學者學諸易以通隂陽之故性命之理學之詩以求事物之情倫理之懿學之禮以識中和之極節文之變學之書以逹治亂之由政事之序學之春秋以叅天人之際君臣華夷之分而學之大統得矣然不可驟而進也蓋有漸焉先之大學以正其本次之孟軻之書以振其氣則之論語以觀其中約之中庸以逢其原然後六經有所措矣愽之諸子以覩其辨索之史記以質其效歸之伊洛關閩之說以定其是非旣不謬矣參天下之理以明之察生民之利害以凝之踐之於身欲其實也措之於家欲其當也内燭之於性欲其無不知也外困辱而勞之欲其著而不懈畜而愈堅也夫如是學之要庻㡬乎得矣發之乎文辭以察其淺深覈之乎事爲以考其可否驗之乎鄉邦以勉其未至日量而歳較晝省而夜思之功旣加矣德旣修矣出而任國家之重位則澤被乎四表聲施乎百世矣䖏則折衷聖賢之道稽纉古今之法傳之於人著之於書以淑來者豈不巍巍然善學君子哉今之學經者吾疑焉童而誦之勦其虗辭以質利禄有釡庾之入以食其家則棄去而不省問其名則曰治經也問以經之道則曰吾未之聞也或者談治亂講性命於平居之時及登乎大位則惟法律權謀是行問其故則曰經不足用也於乎是可以爲學經者乎經而無用亦可以爲經乎然非經之過也學之者之愚也非學者之愚教之者無其術也雖學猶不學也吾故曰人莫不學而知所以爲學者寡矣爲其近利也浦陽山中有倪君正年四十餘而爲學不輟予慕其好學而異乎世之所云者辨爲學之道以贈焉指喻浦陽鄭君仲辨其容闐然其色渥然其氣充然未甞有疾也他日左手之拇有疹焉隆起而粟君疑之以示人人大咲以爲不足患旣三日聚而如錢憂之滋甚又以示人咲者如初又三日拇之大盈握近拇之指皆爲之痛若剟刺狀肢體心膂無不病者懼而謀諸醫醫視之驚曰此疾之竒者雖病在指其實一身病也不速治且能傷生然始發之時終日可愈三日越旬可愈今疾且成巳非三月不能瘳終日而愈艾可治也越旬而愈藥可治也至于旣成甚將延乎肝膈否亦將爲一臂之憂非有以禦其内其勢不止非有以治其外疾未易爲也君從其言日服湯劑而傳以善藥果至二月而後瘳三月而神色始復余因是思之天下之事常發於至㣲而終爲大患始以爲不足治而終至於不可爲當其易也惜旦夕之力忽之而不顧及其旣成也積歲月疲思慮而僅克之如此指者多矣蓋衆人之所可知者衆人之所能治也其勢雖危而未足深畏惟萌於不必憂之地而寓於不可見之初衆人咲而忽之者此則君子之所深畏也昔之天下有如君之盛壯無疾者乎愛天下者有如君之愛身者乎而可以爲天下患者豈特瘡痏之於指乎君未嘗敢忽之特以不早謀於醫而㡬至于甚病况乎視之以至踈之勢重之以疲敝之餘吏之戕摩剥削以速其疾者亦甚矣幸其未發以爲無虞而不知畏此真可謂智也與哉余賤不敢謀國而君慮周行果非久於布衣者也傳不云乎三折肱而成良醫君誠有位於時則宜以拇病爲戒洪武辛酉九月二十六日述溪喻金華俞君子嚴受學於太史公將歸余送之溪梁之上指水而告之曰子知溪流之不息乎其爲地卑也其爲量有容也其爲源深且逺也玆其所以不息也九仭之岡其形嶄然其勢巍然時雨過之如走建瓴不逾時而失之矣甕盎之噐大者受石小者受斗石滿斗盈欲加㳙滴則旁岀而横溢矣蹄涔㫁潢行潦是資雨霽潦乾則枯涸継之矣斯三者以其爲地高爲量狹而無其源也夫學亦何以異於此乎以孔子上聖之資猶且學乎詩書易禮至於耄老而不敢怠知學之不可無源也當世之人無足與侔矣而猶問乎老𥅆問乎師㐮問于郯子問于太廟之有司見婦人哭則問之見習水之丈人則問之其於人無所不問豈人之智有過于孔子哉知學之不可自狹也至於德巳成矣足以比堯舜而友周公矣人稱之爲聖則驚駭歎息而不居而顧自儗於老彭之好古左丘明之知耻人問之農則曰不如農問之圃則曰不如圃與二人行則以爲必有我師其自卑下者又何如哉此孔子所以爲聖也夫人之患莫過於自高莫甚於自狹而莫難乎不得其源源乎周公孔子之道則固終身資之而無窮用之生民而有餘矣茍他求焉吾未見其不涸也廣其中惟衆之容充其內不拒乎細於學庻乎有得矣自貴而賤人自盈而拒物吾未見其善學也歉然而若虗凝然而若愚戚戚焉如恐不及而失其塗學而有得焉庻乎可守矣嗜名而務耀衒智而自材吾未見其能至也嗚呼之水未足以喻乎道取其類而巳子其觀乎海哉爍之以九年之旱而不見其涸灌之以百川之流而不見其盈舟檝載之而不重蛟龍龜魚鯤鵬蝦蠏巨細並育乎其中而不以爲功然海之致此者其爲地卑其爲量有容其源深且逺亦無異乎溪之爲也嗚呼子其去而益浚其源哉無若岡之高也無若甕盎之狹也卑取而廣容得之勿以爲足守之益致其恭太史公之爲教若是而巳矣雖孔子之道亦若是而巳矣子其行哉余深有望於子越車越無車有遊者得車於晉楚之郊輻朽而輪敗輗折而轅毀無所可用然以其鄉之未嘗有也舟載以歸而誇諸人觀者聞其誇而信之以爲車固若是効而爲之者相屬他日晉楚之人見而咲其拙越人以爲紿巳不顧及㓂兵侵其境越率敝車禦之車壊大敗終不知其車也學者之患亦然聖人之道離之爲禮樂政教法度文章合之而爲性命之原仁義之統其事業在詩書其功用在天下粹而全大而正確乎其無不具也不幸而敗於私欲折於異端昧於衆人之不知窒於學者之多𡵨於是世各以資之所近爲道愿者以小慈爲仁剛者以嚴刻爲義能言者溺於言而不求於所不言嗜名者以詭僻立事而未嘗要之於至理人人莫不自謂得聖人之全而聖人之大全卒爲天下裂譬之摧輈㫁轂之車置而不用猶或可以欺世茍責之以任當世之重其不僨人之事㡬希故人不知學足以害其身而不能禍天下學不知道而多才能其爲害也大矣是以學以知道爲貴知道以識其大全爲貴存之於心體之於身見之於事而著於言一以聖賢爲師少有未至自視凛然若耳目手足之不完也恒以爲巳憂則爲善學矣挾其易成之技而不求道之大全者皆敝車類也仙居陳憲直與其同姓之友子頴奉其縣大夫之命謁予山中將率儔軰從予以爲學予固求聖人之全而不得者自度不堪師人且今學校之所學者將以爲道乎將以爲進取之計乎抑將以任當世之重而推所得以及人乎如止以期進取則無用吾言矣茍志乎行道以及人舎聖賢將誰師哉而奚取於吾徒也夫所慕者聖賢也所法以自期者亦聖賢也則其行事㡬於道也必矣舎聖賢之不師而僕僕焉求吾徒之愚者而師之吾懼憲直子頴之爲善學者咲也雖然觀其細可以知其大於吾徒也猶不之遺而况聖賢之道乎然則憲直子頴之取善也周矣其所慕者殆非進取而巳也不惟進取利禄之慕而以道爲歸余雖魯且病固將以憲直子頴爲友於其别而去也欲無說得乎公子對越諸公子問於方子曰竊嘗聞之聖賢之道其廣猶天其深如淵㣲顯咸該隂陽同玄太上得其全其次致其偏見之於事功横𬒳乎八埏則可以使蒸民各樂其性鳥獸魚鱉萌芽生植皆全其天茍不能然猶可以整齊前古之墜典刮磨徃哲之遺編開生民之錮蔽埀皇極於千年故君子身無間於岀䖏位無間於崇卑莫不欣欣自適無徃而不致其樂焉今吾子懷淑明之資循正中之塗所準者莘尹叔旦攸師者仲尼子車談經則融成坐斥稽史則遷固受誅幽探神秘明執道樞洞燭千古遐瞰九區由暴湏鄙賜億柴愚睨不嗛心恐受其汙神交顔閔㝠與之符其於今世宜何如也胡乃志抑氣歛恒若不豫瞠乎若有望而又失焱乎若欲求而弗遂愴乎疑有懐企乎如有慕不知吾子奚與古之樂道者異也方子曰唯哉否否吾有所思也雖然公子試以吾意言之公子曰人情之交咸有歆嗜自非聖智不能絶去今豪族貴胄穹門邃戸畫稅雕楹文簾珉礎蘭芬麝蓊錦爛綉昈燕趙之姝秦越之女環居雜䖏置酒高㑹叩鍾擊鼔奏雲和之琴列陽阿之舞駢跣更進奠巵獻簋態妍意姣目挑頥許其味則熊膰豹胎蛟脊麟脯天鶬海獸江瑶林雉珎恠譎詭爕舌暢齒雖易牙之善調不能知名而遍數其歌則按宫恊商和律附吕開闔造化咀嚼今古抗聲則雲驅而風湧含調則瓦震而筵舉庭鳥爲之廻翔星辰爲之吞吐聽者忘疲醉者復窹雖師曠重生不能别其音而較其譜酒䦨歡極狂發氣駛令徒召卒弦弓礪矢𬒳盤龍金縷之裘跨希驥騊駼之馬長㦸麾前短兵夾輔遇者䑕伏觀者魚駭殱林罄谷不遺飛羽割肝爲炙刳血爲酒鞍負車懸羅列左右暮出朝歸樂以忘老亦何快與子則羔藿𬒳褐坐擁簡冊帷裂不聮床敗闕足介狷無失困抱孤獨寜不有思於彼乎方子曰公子謂顔回慕跖乎滛樂田獵狂夫所好君子不談吾不思此也請更陳之公子曰學之所貴以能行也䖏下不能以施遠故願得意而偶時也唐虞之世內有四岳外立群后設牧十二命官惟九契司廸民䕫典飭胄行必全於兼資德必絶乎虐傲俻三則爲大夫得六則爲邦君言語明試車服旌勲斯時之爲士者亦可謂難矣下逮成周制完典郁惟德行藝三物咸六乏一則見少於鄉具美斯獲預乎禄雖有俊傑之姿偉特之才分旣大定何無設公卿之位析侯伯之爵周之士子亦何其碌碌也逓䧏迭興更統二千雖因革各異華實多愆然較其任賢容衆銖十桶有若于今之易易然也今國家濯穢滌汙天覆日明掄山攟穴旁取遐徴士有一藝者不以其賤而不用生乎四裔者不以其夷而見輕或自萌隸而有國邑或自寒酸而爲公卿或以韋布拜二千石或以一言之美而擢令丞於古之起漁釣相板築無以異於文王武丁矣士之㩀崇座寢大厦御吏控胥呵咄叱咤五馬静途群臺轡馬過者爲趨乘者爲下聽訟理政冠帶孔都喜則死灰復然怒則豫章立枯耄倪延頸而歎息奸詐側足而睢盱其或善者則慕循良之爲敷惠和之治群生霑其澤千里受其惠暴夫戾士才之威棓削骨髄殺戮慘逮嬰婺聲張勢盛顯㧞鸞旗丈夫至於此也豈不足以自恣也哉吾子之思思謂是矣方子曰位以行道非是之謂也且富貴不可求吾何思此哉公子試稍高之公子曰烝民之生紜紜兟兟憧憧奔奔外則寒暑燥濕之候動其志内則飢渇嗜欲之情役其身茍不有人以治之争奪戕戮之禍作而仁義忠信之道泯有皇上帝鍳觀下土擇其賢智神武者而俾爲君土廣民衆俗變事殷非一人之所獨治故必舉賢哲而爲臣臣惟千百曷以使之久而彌敦譬之九罭之網必掲之綱目乃不棼六馬之車必節之轡乘乃不僨故宰相者上以佐天子中以和百官平隂陽撫夷狄而下以養兆民得其人則朝廷社稷安而衆所驩非其人則兵革興四夷横而區宇分故其位至重而天下莫與争其居也華榱刻桷亞於天子之廬其行也旌節導前上駟文軒辟易車殷則雷霆騰闐變色則海內膽裂㣲笑而八荒春温在人主之前進退否臧黜邪進良唇虗緩絞齒利劍鋩九卿執事望門膝行叩顙階頳屏息氣僵手司榮辱心制短長睚眦必酬巵酒必償賓客竊其餘威可以脅僚吏子弟藉其緒寵足以納逋亡䛕德而誦業者投刺而請見迎意而希合者嚮望而搆裳中機則爲雨露忤㫖則爲風霜權利鼔動當世休烈埀之無疆位至於斯亦可謂極崇也矣吾子豈思之乎方子曰位崇信美也然有道以䖏之則易以爲福無道以䖏之亦易以取禍且吾聞君子不患無位患無以稱其位公子之言夸尚權勢非守位之道吾不爲是也請談其他公子曰乾濡坤茁人物肇發絪緼紛紛雜沓轇轕非聖立極何繇自别伏羲至神人文始孽旁覩凝瞩仰窺俛察竒偶變易畫三卦八六合旁魄如囊斯括姚姒繼轍益闡彌晣握操簡筆紀德敷業商承周擴閎衍軒豁昭羅星火交掲日月罝罟千紀蒐獵群物大政宏猶纎㣲恍惚籠絡綰結山載海畜癘幽汙衊典法遺脫天孕巨聖手秉神鉞剷刮蕪穢誅伐驁逆捜亡緝絶以有六藉典謨雅正訓誓激切三盤懇至諸誥惻怛詩道民情振滯宣欝頌純而和雅肆而逹雍容商魯雄伐風雅之變憤怒蕩潏怒而不争刺而不訐正樂而無佚春秋主㫁嚴簡予奪易幽而㣲大傳辨黙周禮主政具有本末宏充宇宙細析毫髪其宜孔多存者猶闕樂亡靡徴噐數漫滅更秦之熖而中厄矣後儒區區摩簡續韋韓轅申毛說詩之師書岀耄伏口語嗢伊孔壁嗣興安國訓治易禮春秋說者紛披各黨攸聞攻擊他𡵨錯忤迂誕異舌同辭其流謬妄至雜以䜟緯涅以玄虗沮於名物道愈乖離有宋群哲紹而定之提聖之心表之通逵砭去積疢掃除目翳經至於此亦可謂無遺矣而或猶謂詩書失乎贗河圖近乎誣禮駁不純春秋難知呫呫乎其未有所底也吾子之思殆謂是乎方子曰經吾所盡心也雖然聖人旣逺學者忽常好大喜爲謗排吾竊不取傳註至於近世亦可以止矣吾安敢訐前人之缺失以取不遜之名哉則聖者立言賢者述之傳註之儒功少而事左吾不敢慕也公子曰聖殂教分别爲異門曰有先師維孔元孫上紹参傳知道之原述爲中庸性命是言枝葉交横本乎一根歛入無朕散𬒳無垠厥㣧于鄒闖聖之垣遂登其堂㩀道發論齊梁之君南靣僣尊衮衣大圭視若孤豚狙詐相傾辨說如雲告以仁義耳塞不聞退緝道要垂諸空文㤗華譲崇菽粟儗珎河海耻富綺綉推温違者雖疆而踣循者雖弱而存䟽鑿齊功典謨誥訓峻極莫繼深渺絶倫揚雄吃而靡暢王通談而不純舂陵後奮黙契化元掲圖著書要而不煩河洛之間有伉弟昆關西之英叅翔以騫敬以立懦禮以攝昏洗濯塵鑑燁然如暾遺書之多寳璐璵璠攴衍而南大發于閩手抉衆流属之崑崙絲繅髮櫛緒引毫分此七君子者皆所謂立言者也他若莊周荀况糠粃當世瓦䃯諸子汗漫淪􅔿無有涯涘老𣆀禦㓂與周同軌玄虗澹泊棄蔑禮義管商功利晏墨吝鄙非析翊虐秦斯詐詭六國之間述者如蝟不韋致客吕覧以叙采掠攘掇咸有綱緒屈原申憂怨不至誹瑰竒雋㧞爲詞賦始劉安叛誅其書甚斐事糅道厖猶傳不毀賈生智敏計謀孔偉仲舒守正於道有取遷修厥職事核文史造端創法綜統遐邇班固繼蹟辭直而理東京至隋質䘮聲靡退之在唐裂去綉絺易淫以淳反麗以俚觗嘲異端軻雄是儗柳李皇張胥和俱峙金石鏘鳴黼黻交煒載越六代四氏繼起豐約温深各臻厥美此雖未足亞乎立言亦可謂述者之次也吾子豈非思法乎上者而恐力未迨欲就次者之事而心猶耻之故恒有所思乎方子曰立言之任吾則豈敢甞願學焉然古之聖賢不得巳而後言非其所樂也公子曰一氣之胚人物以滋孰戚孰䟽奚尊奚卑禆海吾池鎮嶽吾坻中國吾家兆庻吾肢肢疹則唏家悖則悲賢聖不治不媿何爲洪水之難三聖歎咨䟦履九州尫瘠胼胝䟽壑爲夷民用恬熈夏桀亂虐成湯拯綏爰有元聖立極修彛文武易暴叔旦是釐慮深制俻靡有闕遺澤潤數世不刑而威嬴酷項悍漢武以國歴年旣安而鮮有德文以清淨景以私刻法䟽佐庸孰徴成績唐任齡晦小康乃覿宋之真仁僅臻富殖蓋上下數千載而治者如斯否者可識也生民之困烏得不極乎嚮也天䧏大厲狄據中土裂禠冠裳棄擲豆爼紊我倫理風乖俗斁椎結旃裘獸攫羝跽禮義湮亡化爲夷虜三世于此矣天命真人仗鉞抗旌踐江作京東披西勦朔伐南征陸屠狼豕水斬蛟鯨殱扶魑魅焚炙鼯狌殚智疲神大憝以平於是更制定律造政明刑重修人紀肇植天經歲郊時廟日省月程乃作帝宫乃鞏禁城憲臣思法戎衞握兵小大相維内外迭承經营一紀而庻績丕凝巳云至矣則而守之邦國可貞矣然聖謨炳然如日運天猶歉焉有陋徃代而卑漢唐之意蓋欲追三王儕二帝而永皇祚于萬年滄海之波非一山之泉武庫之弧非一絲之絃立功埀紀固非一人之智獨士之賢所能盡其大全也然則設施建述之序何革何因何後何先行何德而民𥙿用何道而化遷將𥙷罅而塞漏將改範而陶甄將徼近效而速成抑圖深植而久安將使民懾而服抑使民恱而不忍捐將王而巍巍抑覇而烻烻將漸之以禮譲抑道之以詐諼孰當孰非胡易胡難此志士賢人所宜深究而熟謀時習而勉旃者也吾子之所思者意其在是乎方子曰嗟公子何言治亂之理邦國之事有位者之所宜思也鄙小且賤安敢僣妄爲逺大之論乎然回也布衣而問爲邦聖師韙之子車遊於諸侯舉稱堯舜君子大之若予則願學聖師之道者也公子有問敢終黙乎且公子之所陳廣矣高矣奥矣幽矣余不能酬矣然鄙人之志不可不爲公子言之也昔者聞之爲國之道安於均定於分人成於序同於和而後可及其餘也虎豹熊羆䖏乎山而争啖相噬獸人養之同圈而寢分肉而食不敢他覬者均之有道也先王知養民之不可不均也於是度田而井之冠受老傳通勞並獲業專而心一顧德而行式維之以井邑丘甸縣都聮之以鄰里鄉黨州閭故其民無邪僻也崇閎峻墉穿窬不窺敝藩穴戸童子攘資先王知分之不可不嚴也故天子尊於公公尊於卿卿尊於大夫大夫臨士士異於民諸矦䧏於天子伯䧏於矦子䧏於伯男䧏於子諸矦雖尊不敢蔑天子之卿士公卿雖貴不敢齒天子之路馬朝覲聘問行於上廵守錫予報於下殊禮加土以旌賢貶爵行罰以懲憤分定於上而不紊故内尊而外安先王病民之無叙而乖也教之以禮使父子兄弟以順以悌婣戚朋友以敬以愛三譲而升百拜而飲視毛避路遇杖歛祍故暴戾之風息而民易使爲酒食饗㑹以合其歡忻爲歌詩琴瑟以通其滯淫爲羽籥千戚以道其倦怠故民樂於爲善而不能爲亂夫然後有教焉教之不循有政焉政之不從有官府之治焉故民終身不可使之見刑罰之威夫穉子在抱而啼告之以可畏之人則止使可畏之人立於其姆之前而威之則不畏矣見之習則玩之也民可使之見仁義禮樂仁義禮樂習其心則善思生刑罰習其心則不善之思生故爲治者不可不慎也此其大凢也推之極其詳致之盡其公而又行之以弗厭此先王所以治且久也訾之以爲迂玩之以爲愚則吾不能知之矣自漢以䧏諸葛亮有大賢之才而不聞聖人之道司馬光范仲淹有君子之風而無大賢之才余亦欲講一王之法推徃昔之軌正而不窒通而不泥施之於人足以冨庻而知方用之於後可以世守而無弊苟無得乎時猶将折衷性命之㫖損益禮樂之事以傳之後世此吾之思也若公子之所云雖美吾焉能若是哉公子逡廵離席辭謝變色而言曰吾乃今知君子之思小子不敏請服明訓終身不敢言事多有缺悞余頗妄志於聖賢之道以爲天下之事皆所宜爲故所著公子對其言大而近夸夫言夸則駭俗所以人不好之故未嘗敢以示人吾友浦陽鄭君叔度獨誦而喜之謂余曰君子之所爲揆於道如何耳奚顧人之好惡子言誠戾乎道則人以爲夸也誠不戾乎道寜知世無知之者耶而子何疑焉余愧其言不能詰乃書一通并識其說歸諸叔度蚊對天台生困暑夜卧絺帷中童子持翣颺于前適甚就睡久之童子亦睡投翣倚床其音如雷生驚窹以爲風雨且至也抱膝而坐俄而耳旁聞有飛鳴聲如歌如訴如怨如慕拂肱刺肉撲股噆靣毛髪盡竪肌肉欲顫兩手交拍掌濕如汗引而嗅之赤血腥然也大愕不知所爲蹴童子呼曰吾爲物所苦亟起索燭照燭至絺帷盡張蚊數千皆集幃旁見燭亂散如螘如蝇利觜飫腹充赤圓紅生罵童子曰此非噆吾血者耶皆爾不謹褰帷而放之入且彼異類也防之苟至烏能爲人害童子㧞蒿束之置火於端其烟勃欝左麾右旋繞床數匝逐蚊出門復于生曰可以寢矣蚊巳去矣生乃拂席將寢呼天而歎曰天胡産此㣲物而毒人乎童子聞之啞爾咲曰子何待巳之太厚而尤天之太固也夫覆載之間二氣絪緼賦形受質人物是分大之爲屖象怪之爲蛟龍暴之爲虎豹馴之爲麋鹿與庸狨羽毛而爲禽爲獸躶身而爲人爲蟲莫不皆有所養雖巨細修短之不同然寓形於其中則一也自我而觀之則人貴而物賤自天地而觀之果孰貴而孰賤耶今人乃自貴其責號爲長雄水陸之物有生之類莫不高羅而卑網山貢而海供蛙黽莫逃其命鴻鴈莫匿其蹤其食乎物者可謂㤗矣而物獨不可食於人耶玆夕蚊一舉喙即號天而訴之使物爲人所食者亦皆呼號告于天則天之罰人又當何如耶且物之食於人人之食於物異類也猶可言也而蚊且猶畏謹恐懼白晝不敢露其形瞰人之不見乘人之困怠而後有求焉今有同類者啜粟而飲湯同也畜妻而育子同也衣冠儀貌無不同者白晝􅌂然乘其同類之間而陵之吮其膏而盬其腦使其餓踣於草野離流於道路呼天之聲相接也而且無恤之者今子一爲蚊所噆而寢輙不安聞同類之相噆而若無聞豈君子先人後身之道耶天台生於是投枕於地叩心大息披衣出戸坐以終夕鼻對方子病鼻寒鼻窒不通踞爐而坐火燎其裳裳旣及膝始覺而驚引而視之煜煜然紅蓋裳之火者半也於是罵鼻曰夫十二官各有主司維鼻何司别臭察㣲臭之不察何以鼻爲今火帛之臭亦烈矣而爾頑若不知遽俾火毒燼裳及衣壅蔽之禍豈不大可悲乎久之鼻忽有聲聲與口同曰我受命爲子之鼻今二十又二冬蘭茞椒桂其氣苾芳我聞我知俾子佩蔵槁蕕腐鮑風腥氣惡我覺其穢俾子避匿子足不妄履而山不遇毒者皆我之得職也今子乃昧於治身宜煖而寒去裌就单爲風所加外鑠内欝壅我鼻觀遂至火燎切膚而不知其然皆子之過也於鼻何罪焉假使服食以節起䖏有常順隂爕陽無所敗傷鼻寜有不聞馨香乎且古之志士至于耄老猶且居不求適維道是奮太雪皴肌而爐不暇近恐適意之致毒知炎上之生災可不慎也今子當始弱之時有荼毒之禍方當茹氷嚼雪塊枕草坐愁思怵迫凍餓摧挫猶恐不可而乃放不加思恣肆頽惰當祁寒時遽自溺於火爲身計者良巳左矣不此之責而反誚我爲何哉夫壅蔽之禍厥有攸自秦亥蠱昏趙高乃弑彼梁偏任斯有朱异隋廣滛酗而世基以肆木不虗中蟲何由萃此三主者茍以至公爲嗜好以衆庻爲耳鼻上宣下暢無所凝滯雖有奸邪何惡之遂顧乃偏僻猜忌執一遺二以蕕爲薰椒蘭是棄由是禍亂交興宗覆社圯今子不務自尤而維鼻是訾一身之理且不逹况於政治也哉方子仰而嗟俯而愧屏火捐爐凝神養氣旣而鼻疾果愈醫原羿能教人射而不能使人命中王良能教人御而不能使人無䘖橜之虞術之精㣲可以言語授而非言語所能盡可以度數推而非度數所能窮苟不黙㑹于心而欲持昔人一定之說以應無涯之變其不至於遺失者寡矣况得其法而不知其說者乎醫之爲術於生民之用最切其說之至粹而岀於古者莫過素問難經𫐠隂陽氣運之理辨形體榮衞之原以明養生治疾之道非古之神􅐶聦逹者何足以與此然其精㣲之要得諸心而見于効者固有不可以言傳者矣書豈足以盡其意乎後之學者不能求其爲書之意而泥其說是以言論非不可喜而不良於用甚者棄書不省而惟攻乎淺陋拘閡之方書天下之疾萬變無窮而風氣古今之殊資禀厚薄之異服食之品勞逸之差靜躁之度奉養嗜好居䖏習業所遭之時所遇之變人人相懸也茍非深思愽考以周知其故而欲按旣試之法銖比兩較之以治人之疾此奚異用鄉射之儀於臨敵制變之頃哉其取敗也必矣人固有盛寒而飲水者亦有遇風而欬者有披甲馳馬操劍槊行數百里而不汗者有岀門輙勞􅉵不能行者相去寜啻十百此資禀之殊也古之人多碩大敦厚壽至百歲今人未壯而先衰不老而巳病豈能及乎是風氣之不同也或能飲酒至石不醉而或不敢染唇或敢腴鮮甘厚味而或羔藜茹藿或裌衣以禦冬或裘褐以䖏暑服食之品不特五方之人不類也貴富家子未嘗跣足沾手而小民終歲服勞與牛馬等知道之士怒不見于色而暴悍之夫動輙詬詈勞逸靜躁烏可同乎中州之人夏夜露卧而無恙使南人效之則病矣江海之人屏息水行鑿層氷而取魚鱉使山林之人效之則死矣人之耳目手足均也脉絡血氣筋骨均也而其變之乖殊若此醫豈易言乎藥豈易用乎其病在乎心也而藥其肺在乎寒也而以爲熱病乎實也而以爲虗病不能自言受藥而死者無所控訴故醫得用其術而莫之詰也諺有之曰山川而能語􅌾師食無所蔵腑而能語醫師色如土此言用藥之難也故智足以知古人之說矣而無所自得有所自得而不能察乎脉察脉精矣而不善藥欲犁然當乎疾而必愈皆不可致也則醫之以術名于世者焉可多得乎昔者貴人有疾而天方不雨醫來治者以十數皆莫効最後一人至脉巳則以指計甲子曰某夕天必雨竟出不言治疾之方貴人疑之曰豈謂吾疾不可爲邪何言雨而不及藥我也巳而夕果雨貴人喜起而行乎庭逹旦疾若脫去明日後至之醫來謁貴人喜且問曰先生前日脉疾而言雨今得雨而果瘳何也醫對曰君侯之疾以憂得之然私訃君侯忠且仁所憂者民耳以旱而憂以雨而瘳理固然也何待藥而愈邪若是醫者可謂得其道矣方書之所具成說之所有夫人皆能用也求之於言語之外而得其所不言之意非竒士其孰能之始余聞四明有世醫邵君真齋善爲方視人疾以爲不可治者必不治而所治必取竒効心竊識之今年真齋過余坐而與之語畏慎恭慤不妄有所稱引而於察脉用藥信乎無所苟余益信服之生民之疾多矣不度可否以身試之而無成者相踵其有如真齋之不茍用而必成功者乎有能求周公孔子之意於法度之表者乎苟難乎其人則余於真齋不宜無說也作原醫以贈之雜問天曷爲而運乎地曷爲而䖏乎日月䧏升曷爲而有寒暑乎峙者曷爲而山流者曷爲而水乎鳥曷爲而飛獸曷爲而走乎孰明而可見孰幽而不可覩乎上下千載孰不變乎四方萬里孰不異乎人何由而岀庻類乎心何由而叅天地乎有生芸芸奚不朽乎有爲而成孰長久乎三五之道具六經乎六經委棄曷作程乎易辨治亂政之禎乎書著訓謨道之英乎禮以範俗樂和以成乎詩以蕩邪善之萌乎春秋賞罰人倫之城乎措之孔易施之孔明乎革澆紏慝化虗爲盈乎萬彚咸育刑息譲興乎神人昭格天地以寜乎安如㤗華百世其貞乎智力不煩神恬以清乎舎經舎經勞而不逞乎曷以成俗復井田乎井田奚先民平均乎南國迫隘自中原乎鄉保相恤恩義敦乎禮導樂宣亂奚臻乎曷以弭暴蠲濫法乎法繁衆死民玩何怛乎罟罛交陳魚能活乎促不惮死寜不䟦乎欲民之訓省苛察乎曷以致治貴任人乎人疇爲賢明且仁乎明以㫁姦仁煦民乎州伯群牧儼若神乎毋挫其柄久以責勲乎内外咸修治斯􅎋乎莾莾九土育群氓乎性殊俗異厖服詭形乎嚘嚶侏離駭可憎乎亶究厥原二氣之生乎長吾諸父㓜吾嬰乎摩疢療飢舎巳以征乎審圖審思君軄成乎錐可春平杵可爲裳乎戈可書乎筆可以爲兵乎橜可爲楹乎楩楠可爲杗乎牛可以驂乘乎馬可以軛而耕乎物各有性材曷可更乎治能無體政能無經乎方仭之址可爲九成之臺乎一尺之基及肩之垣能不頽乎周曷爲而延乎秦曷爲而遽顛乎厚基廣址不在厥先乎三代異尚道亦異乎忠質化原文何貴乎秦之繼周豈尚刑乎漢之寛大亦善承乎唐尚諌諍自其始乎宋尚儒術奚而中圯乎奚王奚覇奚爲美乎以法弭亂亂足弭乎以刀理髪髪可理乎弭亂何以其以寛乎牛飫芻豆復踰閑乎以兵威逺逺來服乎撝戈召賓賓將格乎何以格賔恭敬酒食乎何以來逺化𬒳中國乎周有世積而厥祚綿乎漢唐何積而亦然乎豈視其身之仁暴不以其先乎周公之制煥哉章乎曷不足善其國至於削弱而亡乎豈聖人之智未深長乎抑後嗣不守自逢殃乎夢夢之中孰主尸乎善惡誰報修短誰司乎孰流而爲電安發而爲雷乎將一氣之行於冲漠人固莫得而窺乎周公孔子一何少乎跖蹻羿奡如蓬藜乎豈天嗇其賦乎抑人不由其道乎俗流如川將日䧏乎川流彌下將安障乎民性孔善古何異乎施德敦仁能無治乎鹽車之下有完驥乎鞭笞之下有賢士乎蒿藋之野有麒麟乎暴戾之國有忠臣乎投骨兩犬能無噉乎以利示民能無濫乎上之攸好下無趨乎上之攸尚下無爲乎藝芳盈畦可以飽乎摛文充棟以明道乎求道於人不知在我乎秉燭煌煌出而求火乎啜粟衣帛與堯殊乎堯德萬世獨不如乎孰非顔乎孰非孔乎而爲庸民能無恐乎我晰晰乎孰得而涅乎我規規乎孰得而虧乎晰晰之至與神同明乎規規之至與天同形乎志將適楚能至趙乎志在修辭能知道乎鑿江浚河患無瀾乎道明氣充患無文乎天孕兆民猶厥子乎旣受而生奚復死乎人之生死果有命乎桎桔巖墻孰非正乎君以岀命將不然乎猛虎黠盗豈皆天乎祐惡抑善豈人常乎顔冉何厄而盗跖何昌乎豈至貴者名固足以厄其身乎將在乎人善攫者貴富而守道者貧乎豈民禍天地而剪除者乃得賞乎何屠城赭邑子孫貴盛而爵號宣朗乎踐蟻轢蛙果有辜乎彼起與籍戮人如刈麻將何法以誅乎均爲天民奚貴奚賤而肆力以虐乎居天之位弗治以害果天托乎匹夫盗金能不賂吏乎胡盗予奪生殺之大柄而睢盱自恣乎有功於天孰過儒乎奚嗇其後而困其軀乎是非褒貶侵天軄乎彼賞罰者又何蕃且息乎儀秦何積所遇喜乎孟荀何薄而困辱以死乎豈聖賢豪俊天所棄乎將闒茸委瑣人所比乎狐兔如丘麟何少乎庸夫駢肩孰聞道乎道曷難行豈幽幽闇闇如􅃮如墨乎豈拘拘曲曲于蔓于棘乎將昭昭皎皎如出日乎坦坦朗朗如矢之直乎奚釋而弗思去而弗即乎見珠在淵能不求乎見羊躪苗能不憂乎胡道在身棄而弗修乎私欲躪厥天而日休休乎七日不食能不死乎一息不省能存天理乎人重死其身而輕死其心誰謂膏梁食犬豕乎五狼一羊羊能無傷乎衆惡一心心能無亡乎秉圭在廟能無寅乎執敬無愆能不仁乎一子堕井父能食乎萬民顛隮天胡弗惻乎天之任君猶人俾牧乎旣食其直將芻其畜乎畜之不息主無惡乎殄之能無怒乎天之示君豈不章乎天之慮民豈不長乎妖星異災猶咄叱乎膏露嘉禾賚酒食乎蒼麟朱鳯果爲祥乎武宣何修而來遊翔乎頟頟胡羯盗之渠乎奚獲麟十六以駕車乎周衰政乖二百紀乎易姓㡬何治者何主乎漢頌文景黄老之效乎曾謂儒道不若彼老乎唐始善相稱房杜乎稽籍考勲有可數乎戕厥毋兄戾孰京乎胡抑心䧏志從魏徴乎太宗造基豈非哲乎徴言是從而德彛以察乎斯民之性古何異乎孰謂古道不足治乎枕虎以寢能無囓乎招狄自助寜不滅乎天地何際華夷何限乎隂陽晝夜何相反乎君子小人何性同而趨逺乎九州之外渺何窮乎鄒衍何見而嘵嘵以誑彼恫乎玄針視海能無惑乎無有羽翼孰知其極乎日月何弊乾坤有塞乎闇昧昏黒將如日之夕乎豈肇造人紀重建極乎長生久視寜有斯理堯舜大聖奚亦死乎偓佺安期果何在乎誰能不死閱千載乎怪士好誕非愚孰惑乎剖符尚主誅之何益乎夷法汙華紛其可駭乎緇衣髠首曷徧四海乎藉其成佛復何庸乎滅倫敗類惰厥躬乎流毒深且久曷不去乎不伐厥本勞斧鋸乎井田法布孰有游民乎歛其浮誕化以仁義孰敢不循乎教岀一孔政曷窒乎持之勿變屏異術乎申韓鄧慎世之虺乎刻削巧苛暴者奚喜乎用法如流奚不恒乎操刀終身寜不自割乎堯民之命皆富以長乎桀民之命皆天而殃乎均爲天民何所賦之不同乎抑偶值其時乎將命不可必而難知乎爵禄賞罰君之寳乎㢘耻節義世之道乎俾民賤寳君安所貴乎俾民棄道世何能治乎秦法凝脂奚致亂乎漢網彌闊奚不犯乎火逼牛尾寜不觸乎孰云禍亂民所欲乎孰非民乎孰富孰貧乎孰衣文綉孰如懸鶉乎屈爲傭隷天寜不仁乎仁莫如井田井田不易在任人乎封建莫復天下爲私乎擇賢命爵尚庻㡬乎刑措民滋世有不熈乎䇿問十二首問孔子刪詩書㫁自唐虞以下其事詳矣至於二帝三皇系之所自未嘗稍及之蓋慎其疑也及漢太史遷爲三代世表乃稱堯舜禹稷契皆黄帝之後何所徴而言歟堯以二女女舜咨詢群臣皆謂有鰥在下曰虞舜堯未嘗識之也使舜而與堯同族堯治天下以親九族爲首其有弗識之者乎遷謂黄帝生玄囂玄囂生􅶎極􅶎極生高􅉝高􅉝生放勛黄帝生昌意昌意生顓頊顓頊生窮蟬窮蟬生敬康敬康生句芒句芒生蟜牛蟜牛生瞽叟瞽叟生舜自黄帝至堯四世而至舜乃八世其世數之踈數姑未論烏有聖人而娶四世之祖姑者乎舜百有十歲而崩時禹年七十固未耄老也而遷乃謂禹爲昌意之曾孫則於堯四從昆弟於舜爲高大父行矣安有四世之從孫年有百餘歲而傳天下於四世之高祖者乎黄帝至夏桀二十四世至湯一十九世湯又傳二十九世而爲紂二代總之千一百二年而武王乃以黄帝一十九世孫而代黄帝四十六世孫紂何夏商周世次久速不同至此乎二帝三王之道學者所宜盡心而其事之難知有如是者皆不可不講也願聞所以折衷問孔子作春秋譏躋僖公傳謂子雖齊聖不先父食蓋人之大倫不可紊也後世祭孔子以門人從祀乃異乎此顔淵曾參子思雖賢子也路也晢也伯魚也父也子顧居上父乃居下豈特若躋僖公先父食之失哉而世因之而不革何歟且子思孫也位於祖之前孟子子思門人也與師對坐其能安乎漢以下大儒得在祀典者衆矣或學術不醇或名節可賤果可以升聖人之堂而無愧乎學校者禮義所自岀而聖賢人倫之則也辨其得失使質諸鬼神而無疑學者軄也勿以無位爲辭問子曰誦詩三百授之以政不逹使於四方不能專對雖多亦奚以爲是古之誦詩者必能從政而專對也今三百篇具在大儒君子又從章析句釋之其義理詳明皆聖人之時所未有而未嘗有用之於事者何歟豈時殊事異而有所難用歟將今之學者不若古之人歟夫古人亦人爾謂今人舉不能及可不可也然十五國風二雅三頌之中可以爲政者何說茍當專對之任則將何見幸悉陳之欲以觀有用之學問古之學者舎道無所爲學孔子曰君子學道則愛人小人學道則易使也然當是時未聞有道學之名何歟近世大儒抗然以道學自名於世可謂盛矣世俗反非病之而不信或攻之以爲黨或目之以爲僞又何歟道學之名未立冝人才之少及其學旣盛則宜賢者之多而後世之士顧不逮古先抑又何也豈古者教岀於一故人興於行後世學術多𡵨亂真者衆雖大儒先生不足振起之歟若周程邵張數子及朱文公張宣公謂之道學冝矣東萊吕氏其學似與朱子不異宋史乃不列之於道學亦有說歟今流俗以道學之名相詬侮鮮有以此自期者夫學而不求道烏足謂之學歟諸君誦周公孔子之言不釋於口可謂有志矣然志於學而不講其所當學不可也願肆言之且以觀趨向之所在問古之君子有德必有言有學必有用觀左氏所傳公卿大夫以德行名世者言語政事皆卓卓可稱是果何由致此乎孔門雖以四科目諸子然顔淵問爲邦之政子貢聞性與天道子游治武城夫子喜之其不長於一偏也如此何後世學者之不及乎惇厚之士未必能言而無德者肆爲邪詖之說以惑世博通載籍者多不能施諸事而不學之人妄爲刻薄之政以病民德之與學不能兼有所通豈無所自而然乎孔子謂誦詩者能專對爲政太史公亦謂書長於政諸君之爲學德行所習也詩書所講也岀而當言語政事之任亦可以庻㡬古人乎幸明以告我問六藝之爲用要矣古之人未有不通乎是而可爲大賢君子者其度數之細爲教之法亦可得而詳言乎考之孔子之書其於禮樂蓋屡及之而鮮有問答射御書數者獨何歟豈六者之中亦有重輕本末歟抑此四者㣲而易知當時學者無不習熟而無事於問答歟後世之士學止乎讀書以射御爲武事以書數爲末技禮樂之音律制度徃徃以爲有司所軄無庸乎考習其通六藝者蓋寡然而道德明備者輙爲天下所宗而莫敢議何其與古異歟今欲師古人而周通六藝則患無其傳且力不暇欲如後世之學止乎誦讀則授之以事於用必有所闕然則奚爲而可乎豈先乎其大而後可盡其細乎將識其㫖趣綱要而纎悉曲折或可遺乎周公自謂多藝孔子亦曰游乎藝聖人未嘗以藝爲可後也學者仰師聖人而顧後藝其不可也决矣講其所疑蓋亦聖人之意問古者致治之主莫過漢文帝近世少康之君稱宋仁宗考之史傳文帝於制度未甞有更變創建曹叅爲相日飲醇酒與吏相應歌呼其朝廷不治甚矣而天下樂業者何歟仁宗之時用兵則屢出屢敗府庫則匱竭而無餘其視富強者有間矣而海内久安終宋之世思慕其德不忘果何由而致此歟請質言之以祛所惑問秦漢以來天下多言祥瑞以爲國家之興率由乎此然三代之立國傳統可謂盛矣其禎祥之符亦有可考者乎孔子作春秋大而地震日食小而螟蝝􅈮鵒之異皆謹志之計其二百餘年之間諸國豈無禎祥之事顧葉而不道其意果安在乎麟鳯龜龍記禮者以爲四靈祥之尤也春秋以麟終篇聖人之書之也以爲祥乎抑以爲異乎以爲祥也則劉宋之暴五代蜀之亂紛紛見於其國以爲不祥也記禮者何所㩀而云然乎近世歐陽子㫁然闢祥瑞四靈之說之謬信其言也則經所謂作善䧏之百祥國家之興必有禎祥其說皆非乎抑豈祥者非物而在人乎願辨其所以然以折衷舊說之得失問昔者聖人嘗言誦詩三百而不逹於政雖多亦奚以爲是學詩可以爲政也豈特詩爲然傳稱書以道政事漢儒多引春秋㫁大政則書與春秋亦政事之所自出也非特二經也易所以冐天下之道舉而措之民謂之事業則可爲政者莫大於易記禮者謂班朝治軍蒞官行法教訓正俗分争辨訟非禮皆不可則禮又政之本也今之學者莫不專一經而兼習五經果能以經術逹於政否乎夫使一人而兼言五經之治道固有所不及其各推所聞可以輔世淑民措于政事者詳擇而明言之將以觀窮經致用之學問欽覩大誥謂鄉飲酒之禮申明古先哲王之教令斯禮之相傳尚矣果始於何時歟古者之行是禮一則賓興賢能二則卿大夫國中賢者三則州長習射四則黨正蜡祭其詳亦可得而言歟賓主介僎之位有不同九十至六十豆數有多寡所以示民者其義果何在歟孔子嘗言觀於鄉而知王道之易易也夫鄉飲之近于王道亦有其說歟聖朝稽古爲治頒儀式于天下叙長㓜論賢良别奸頑異罪人坐席叙德與齒而犯法者列於外坐勸懲之意可謂著明矣是即先王化民成俗之道也其節文制度亦可得而悉陳歟夫明乎古之道而通乎當世之務學者之事也其毋多譲問人之行莫大於孝故聖賢之問答加詳焉今我皇上大誥之書明孝以訓臣民凢爲臣子者所當服行而弗忘也夫所謂飲食之品温清定省之儀岀告反靣之節父毋有命善則速行乖於禮法則哀告再三與禮經所言亦相表裏歟事君忠夫婦别長㓜叙朋友信四者之爲孝可得而詳言歟所謂居䖏端莊也涖官必敬也戰陣勇敢也其事果何脩而可致歟若何而可不犯國法不損肌膚不致人之罵詈歟此聖誥之大綱也其條目可得悉數歟今也家傳而人誦則人人有士君子之行矣孝爲先王之要道詎不然歟夫言明乎道雖千古以上之聖人猶尊以爲經况聖謨之大諸生寜有不素講而熟究其義者乎其悉心以對問國之有才猶鉅山喬嶽之有名木也故觀木之盛可知山嶽之崇厚觀賢者之多可推國之盛隆三代以下稱最盛而歴年久者莫漢唐與宋若也漢之張子房諸葛孔明唐之魏徴宋璟張九齡陸贄宋之李沆韓琦冨弼司馬光皆顯于世者也其學術之異同事業之崇卑亦可得而論歟抱道德而不大顯者若賈誼董仲舒之在漢韓愈之在唐周程張邵朱子之在宋遺言具存于世其源流統緒之詳亦可得而言歟昔之不大顯者使其居光顯之位其亦致漢唐宋之治而巳歟抑能比三代歟孟子曰誦其詩讀其書不知其人可乎是亦所宜講也逹而在位所欲學者爲誰仕而不顯所成就者何事悉著于篇將以觀多士之所志臨海縣知縣黄誥黄巖縣知縣張師善台州府儒學教授尚芳訓導李深黄巖縣儒學教諭文程府學生陳縝葉琰王梅齡臨海縣學生李臨卿戴濬之黄巖縣學生孫思光牟汝鈞校對遜志齋集卷之六終
