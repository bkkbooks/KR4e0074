front:
  text: 遜志齋集卷之十九中順大夫浙江按察司副使奉敕提督學校雲間范惟一編輯奉政大夫浙江按察司僉事奉敕整飾兵備南昌唐堯臣校訂中順大夫浙江台州府知府事前刑部郎中東吳王可大校刋
  hash: sha256:66917231eb5c8cc202237aab2a026058ec7fa668ba681149bb35bab4d0cca96a
