body:
  text: 一是集先生殁後六十年臨海趙學諭始得散落詩文三百一十四篇梓于蜀者為蜀本又二十年太平謝文肅公黃巖黃文毅公遍輯四方所藏得四十卷郭令尹梓于寧海者為邑本又四十年郡守姑蘇顧公梓于郡齋者為郡本今據三本而參酌之一集中諸論舊多遺闕近時丘文莊公稍加輔正名為論淵梓行于世今據論淵以輔其闕他所訛誤若讀尉繚子之類考諸經史子氏及正韻玉篇等書正之其無考者仍存疑一宋學士文粹序貞義處士鄭公墓表皇明文衡為金華樓公璉作然邑本郡本皆有疑先生與樓同門同官而代筆者仍存之一勉學詩二十四首文章辨體刻為吳人陳子平作而蜀本邑本皆有赤城集亦載為先生詩懷麓堂詩話惟云未考識者謂子平未嘗至蜀而初本得自蜀中當為先生作無疑故仍收之一蔣伯孚字説蔣氏異瓜辨贈雷峯樵叟送平元亮等序復齋梅所等記溪漁子大笑生等傳關王廟碑樓君墓銘俱載邑本而關王廟碑又載寧海志及三先生文稡今悉輔入一送李參政王文炯李生及方氏族譜序越國公神道碑雖皆見潛溪集而邑本各題下有代太史公作字則實為先生筆故收之一遊峨眉及歌風臺詩俱載蜀本而峨眉篇又載四川志皆輔入一遺安堂記載三先生文稡巾山晨望及間居詩舊傳民間併見吳越錢氏家乘謝文肅公嘗有不及早見之歎故特收之一慥慥齋記雖邑本郡本皆有然嘗刻于黃文獻公集內而續文章正宗亦屬黃作且輯正宗者乃先生友人鄭柏門人王稌也決知非先生筆故去之與木綿花歌舊載邑本亦以正宗為熊澗谷作而郡本去之者同耳一原本所載如送趙教諭及族譜序告佑順侯文等作於先生文頗不類以無據不敢刪去又如核咎閔知靜學齋等賦上蘇范二先生等書皆闕誤不可讀然實先生筆仍存之以俟知者一附録原止録蜀獻王及同時名公贈遺諸作今以傅狀祠記及吊祭詩文而續附者存始末也若愚菴公墓文孝聞孝友二先生暨二烈女詩傳此先生一門道德節義不容泯者亦併附焉重刻遜志齋集序往豫在亰師淂遜志先生方公集讀之既卒業數手其書不能釋去夫先生道德士也其所操志皆三代聖賢軌業豈暇韓栁諸家學哉或稱先生文似蘇長公非知先生深者先生嘗奏記太史潛溪公自謂大者宏廓敷揚其所傳於世其次整齊周公孔子之成法為來令凖下此猶當著一書攄所藴蓄續斯道於無極嗟乎斯豈謾言哉乃令考其時去關洛漸逺學無所從受先生獨奮然起身任之以遜志名其齋學者遂稱為遜志先生云今按集五卷以前多微言篤論誠有冥契神解於其間而逺謨石畫又時時于深慮論諸篇發之以紓其憂患之思至論正統變統之辨則自左史以來所未見道乃先生又豈徒言者以今究觀其行已立朝本末所謂始終典學死而後已者非邪論者謂先生行嚴言峻激亢過烈未逹從容之域豫以為先生在聖門蓋孔子所碩見之剛者迹其所存立已足暴於世而垂教無窮矣奚過言之云歲庚申豫行縣由永嘉造赤城見諸山遵海壁立森聳峭厲如端人介士整襟正色廪廪不可犯而皓氣飛越雲霞之上有終古常存者乃知先生嶽降其地實靈異所獨鍾慨然想見其人為之低徊不去久之已𣸪延問長老考其俗進諸生與之論德校藝察視其性術大抵疆執峭直砥厲繩檢猶存先生之風焉郡有遜志齋集故刑書東橋顧公為守時所刻豫取讀焉見其編漸漫漶因謀諸兵道唐君及新守王君重刻之二君躍然敬諾越數月報訖工豫乃僣敘次所論以識景行之私云唐名堯臣南昌人顧名璘王名可大皆豫同郡人嘉靖辛酉夏五月望日賜進士出身中憲大夫浙江按察司提督學校副使吳郡范惟一撰敘刻遜志齋集君子修辭立誠可與居業殆未睹其業而人已試其誠矣惟誠故逹逹故利於用也方先生之學一本於誠發而為文鑿鑿皆實理是故其大者麗玄黃而細不遺於蚊蚋之微眀與日月爭光而幽贊默成若或授之乎造化之柄近而家庭孝弟雍敘所橫𬒳者放之四海而皆凖也夫其為志專故詞無枝葉其行直故義存而不變其弘毅故膚鬯凝厚亦惟仁以為已任者能自淂之譬則水之為物緣理而行不廢小間動之而下蹈深而不疑障防則清歷逺則致卒成而不毁以生羣物成天能人槩有未睹已而獨見其觸砥石撼頽波必決而之海乃稱之曰水哉水哉云是集今昔具有評近又折衷於范王二君子隱有㝎衡豫焉用𣸪贅其詞第為寶斯文者付囑之曰請志之須與宵壤俱敝焉可也亦竊附志於二君子云是歲閠月三日後學南昌唐堯臣書重刻正學方先生文集敘明賜進士出身中憲大夫贊治尹浙江台州府知府吳郡王可大撰文不足以語先生而先生之藴蓄底裡操履經略實因文以見當元之季紀綱禮教淪蕩澌盡國朝受天明命誠意景濂諸君子起而倡率之禮法聿興文命肆布先生歸依諸君子以講明道學為已任以振作綱常為已責以繼往緒開來學為已事以輔君德起民瘼為已業養植既粹文彩自沃以故緒言餘論見重當時而二百年來不問賢不肖皆知有先生皆知有先生之文先生為郡寧海人奮有刻在郡久而杇弊督學中方范公謂兵憲貞山唐公曰豫司文養士而正學先生實公分地也曷相與以新之秋九月中方公校士於台則命可大校梓而敘之夫寧海自天姥迤邐而東土根靈逺扶輿清淑之氣已萃於卧龍諸山而桐柏蓋蒼又環其左右滄𬈑之溪瀚海之浩渺三靣入之其産有異才也固宜且先生自童稚時即歷齊魯之墟登周孔之廟慨然有意於顔閔之學明粹毅直豈襲取者哉有伊尹畢公之志而尤不滿於伯夷叔齊之死有緹索孔褒之孝而尤大其親濟寧公之學有董仲舒王仲淹起遺經於絶學之功而尤不雜以賈誼公孫弘之疵駁然則先生之文其有禆於世教名義寧不重且偉歟使其繼誠意景濂諸公立在朝廷考故典敷文教薦宗廟勒為一代之言以澤國家之盛則豈使後之人悲先生之心而益有感先生之文耶先生之文醇正如紫陽朱子理學如濂溪周子兩程子敘事如司馬子長論議如陸宣公而精神縝密則與昌黎韓子相上下耳讀其文想見其人後生末學不𣸪見先生者當於文而考之嘉靖辛酉夏五月至日遜志齋集序流而不可止者勢也習而不可變者俗也與勢俱往與俗同波者衆人也知勢俗之所趨而能確然以聖賢自守不浸淫於其中者君子也非惟不為勢俗之所浸淫而吾一言一行之所達天下之勢皆隨以定天下之俗皆隨以化譬若烈風震雷鼓撼上下無大不摧無幽不入雖有強梗自撓亦妥焉委靡於其下此非聖賢豪傑之士不能當周之末孔子之徒巳沒楊墨之説盛行於天下孟子慨然於布衣中修明仁義之道而楊墨之説以廢孟子以來更歷秦漢既遭坑焚之禍天下學者不見全經而老佛之徒唱為私説鼓舞天下天下之人皆相與師而尊之曰此當今之聖人也使三綱淪而九法斁其害有甚於楊墨者雖以韓文公之雄才竟不能為天下變至宋程朱諸子者出一掃陋習頓回天下於大道之中天下之人幡然而改曰吾道固在是也然後老佛之説為無用嗚呼當其肆為邪説乘吾道之無人戕賊其間根蟠枝散固植人心漫不可拔天不生程朱於天下則天下之人終日昧昧如瞽者之宵行何由暏青天而見白日也哉故曰能定天下之勢化天下之俗非聖賢豪傑之士不能也有如雲之舟方能適無涯之海有烏獲之力方能負千鈞之重有天下之才方能剖天下之事才不足於天下而欲剖天下之事猶乘小舟以適海驅孱夫以負重不待識者皆知其不可也是故不患天下之勢不我定天下之俗不我化惟患我無蓋天下之學耳彼郭林宗王導之徒屑屑衣冠之間猶能使天下之人效之况吾佩服聖賢之學而謂天下之勢不我定天下之俗不我變哉惜乎當今之學者則異於是况聞前朝之故習竊成説為文辭雜老佛為博學志氣汙下議論卑淺齪齪然無復有大人君子之態吾友方君希直奮然而起曰是豈足以為學不以伊周之心事其君賊其君者也不以孔孟之學為學賊其身者也發言持論一本於至理合乎天道自程朱以來未始見也天下有志之士莫不高其言論將盡棄其所學而從之嗚呼豈非豪傑之所用心也哉常士世生豪傑之士不多見而於吾希直見之又豈非吾之願也哉希直之文吾評之矣譬若春氣方至真液之色充滿廣宇飛潛動植之物各有生意天下之人莫不信之此特其一事耳要其大者不在此也雖然文所以逹志也不觀其文何以知其遜志齋集序天之生斯民也又必生聖賢為之依歸以裁其有餘以輔其不足必使暗者資之明懦者藉之強然後天地位而萬物育也然而伊周孔孟之徒不世出者非天之惡生聖賢也蓋聖賢者靈和純粹之氣之所鍾實未易逄也茍生矣則將行道於當世垂訓於方來雖其一身之微其功巳𬒳萬世之逺矣夫當世之後有讀伊周孔孟之書而慕效之者可不謂之豪傑之士乎雖然聖賢任道之心雖一而行道之勢則不同伊尹周公得志而見於功業孔子孟子不得時而托於空言其事雖殊要其歸則一也後之學者不察其心而離於二端專功業者則詆立言者為空文務立言者則謂必藉是以明道傳習之久而弊愈甚於乎世有不惑於衆人而致力行之功者其殆有志於聖賢者歟天台方君希直負精純之資修端潔之行考其學術皆非流俗所可及其言功業則以伊周為凖語道德則以孔孟為宗會其通而不泥於一志乎大而不局於小實有志於聖賢者也嗟乎聖賢之不作久矣斯道之微若晨星之在太空光彩不耀者數千百年至宋諸大儒出始續其不傳之緒而繼之然後學者有所宗師今去宋又二三百年矣斯道之晦亦久矣天之閔斯民而望後人者亦甚矣方君以出類之才如此其意必有在矣而君又烏可自不力也紳不敏幸忝同門之列於君之志竊有與聞焉故特著其説於文稿之首洪武三十年冬十一月金華王紳仲縉序蜀王賜方教授像贊緑鬢紅顔金精玉粹聘束帛於山林膺綸言於殿陛身遊乎蓬島方壼之間道泝乎伊洛洙泗之澨濳溪之後學名聞九重玄英之雲孫華間奕世是所謂孝于父母友于兄弟者也又贊太平謝鐸我台之學考亭是師逮于愚菴實聞而知愚菴之子是曰遜學益擴而弘上泝伊洛如麟在藪如星在晨旁觀一世絶類離倫潛溪之門盡天下士驚吒起立謂莫敢比心實希聖自視欿然銘盤書紳雜誡惓惓家人有針宗儀有紀謂道之行莫先於此學以氣充磅礴四行孰顧孰忌禍福死生迄宋歷元士氣益下有復古初不在作者遜志齋集目録卷之一雜著幼儀雜針二十首雜銘雜誡三十八章學針九首四憂針針四首克畏針勵志針毁譽針擇交針家人針十五首四針九針慎齋針宗儀九首卷之二雜著釋統三首後正統論跋附深慮論十首卷之三雜著君學二首君量君職治要官政民政成化明教正俗重爵祿正服卷之四雜著周官二首周禮辨疑四首西伯伐崇武王誅紂畢命檀弓讀三墳讀夏小正讀汲冡周書讀司馬法讀三略讀子華子讀曽子讀荀子讀孫子讀吳子讀慎子讀公孫龍子讀尹文子讀鄧析子讀尉繚子讀戰國䇿讀吕氏春秋讀法言讀風俗通義讀鹽鐡論讀荀恱申監讀崔豹古今注讀博物志讀聱隅子讀朱子感興詩讀陳同甫上宋孝宗四書卷之五雜著夷齊有子鬻拳鄭靈公二首豫讓樂毅曹參婁敬條侯傳霍光丙吉黃霸東漢漢章帝嚴光竇武崔實馬融趙苞許劭華歆諸葛孔明龎統諸葛誕晉二首司馬孚殷浩郭巨王彪之梁武帝魏孝文崔浩蕭懿甄琛沈約袁粲周齊之事隋文帝蘇威唐唐高祖唐文宗張九齡郭子儀唐莊宗卷之六雜