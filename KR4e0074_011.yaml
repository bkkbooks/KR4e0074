front:
  text: 遜志齋集卷之十一
  hash: sha256:6bd1bf6252c8d8b418e69a1118af3dda75d33755275996adb2478a15a2191e53
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4e0074_SBCK_011-1a}
body:
  text: 中順大夫浙江按察司副使奉勅提督學校雲間范惟一編輯奉政大夫浙江按察司僉事奉勅整飾兵備南昌唐堯臣校訂中順大夫浙江台州府知府事前刑部郎中東呉王可大校刋書復鄭好義三首景常來辱書見招爲山中之遊適賤疾未可出未獲承教月初欲到邑與醫商議服藥當取道石實到精舎聽高論也朋友日少鄙心豈敢一日忘諸公耶願各勉旃使斯道不至於落莫拳拳之望也伯禮齋丈昆季前幸爲致意餘懐非靣言莫究不宣恵書以先府君學行不傳爲僕責吾兄辭業不脩爲僕罪始而恐既而惑巳而思之斯二事也固有任其過者而非菲陋無状所敢任也夫古之君子於親之存既竭其志力以爲養迨其殁思其姓名徳烈不昭于天下於是脩身飾行務自樹立以顯揚之善稱于時功及于人使人推其所本而歸徳於其親曰夫人之所立其父之教也而其親之名以傳若孔子孟子於古昔聖賢遺佚賛述之者衆矣而未嘗一言及其親夫孔孟豈不愛其親哉知夫巳之所立者大親之徳不待言而顯也巳可以言之而且不言况肯以人之言爲重乎若夫以人言而傳者自漢魏以來銘墓者始然其初也作於門生故吏故其事爲可信其後門生故吏不敢自作則請於世之聞人其文苟傳則其事亦因以不忘僕於先公不幸弗獲同時執几杖在門生之列學業固陋又不能與世之聞人者齒而古君子之所務以爲親名者吾兄之所知也今不以自責而責之僕無乃非其任也乎且僕求於吾兄者古人之學也古人之條教具存其事始於通萬物之理而終於盡性知命始於正身及家而終於仁民育物由少至老而不以爲逺由中人至聖賢而不以爲誣有未至焉自訟於心有未講焉資益於友未嘗敢乖本末之叙而施怨於人也今吾兄所圖以顯親者不以道而曰以辭所引以爲未至而歸罪於僕者亦不以道而曰以辭如果以美其辭而巳則亦奚取於學而僕焉敢承是罪哉雖然僕交於吾兄㡬何年而吾兄之期於我者辭也取益於我者辭也則僕之爲罪可知矣嗟乎僕少之時妄自許與謂聖賢之道爲可速成學不得其術企而望之茫然無所歸行乎衆人之途恤恤乎其自悲先人之殁天下未有所聞每一念之若不欲生於世是心也其與吾兄有異乎夫内不足光昭其先人而謂其言可以取重於後世人皆知其不能也吾兄何辱命焉雖然繼自今不敢不勉吾兄其益懋乎古人之學相與講其非是而惟道之趨則僕之獲罪於吾兄者尚可贖于他日而吾二人先德之傳其必有在矣幸安之無遽不宣前日相聚雖甚驩而談道講古之餘時雜以嘲謔私心頗不喜以爲謔雖古人所不廢然不若無出諸口之爲美故嘗僭爲吾兄䂓之臨别時又以相屬盖朋友之義在我者宜然而言之從與否則非所敢與也兹辱惠書陳述夙昔攄發志意惻然引咎詞義懇篤且謂自此當絶不復爲覽之驚喜不能自巳夫以吾兄之信道嗜學於改過之勇特其細事固不足異而未免於驚者盖習俗益降交友以䛕說爲忠愛間有及於其身劘切過闕輙頳爾變色以爲發已之短或陽受而隂踈之今不特不加以怒而引咎不惟不忍踈棄而又歸徳焉此其越於衆人也逺矣且片言之失未爲深過使好辯者處之必援引古人以自解釋不笑之以爲不足聴則忽之以爲不足改不務自訟而謂同浴譏祼者雖名士大儒不能免此今吾兄獨痛自懲創若負不潔然惟恐刮滌之不亟假而事有大於一言者其有聞人之言而不改者乎僕之所以驚且喜者此也然吾兄之意則美矣而書復謂自歸鄉里所接見者皆俗子庸人故徳不加進此於義爲未善孔子曰三人行必有我師焉又曰魯無君子者斯焉取斯聖人之厚鄉黨而不敢誣衆人若是近時士大夫喜高自大瞋目抵掌有孩撫一世之態皆棄於孔子者也僕甚閔之甚厭之每自省察恐或蹈其失以爲狂愚之歸故與人處未嘗敢萌慢易意雖號爲無知者亦與爲禮務盡其情盖資性才噐之不齊其勢然也所貴乎君子者以能兼容並蓄使才智者有以自見而愚不肖者有以自全故天下無遺棄之怨必待與吾類者而友之則吾亦将爲人所斥矣勝巳者寜肯容我邪寜海雖小邑著籍之民至三十餘萬才且賢者必衆矣如僕者安足道今以僕故而卑鄉里之人甚非所望於吾兄也夫因人之見信求辭語之過而言之不止其迹若好勝者然能受言如吾兄倘隱黙所疑而不以告則爲不知言而失人矣故終一發之惟吾兄察焉正䝉一書乃張子窮深盡變之論間有可疑者先儒巳言之學者信其易知者而缺其難通處可也必曰定是非得失置去處於其間則烏乎敢若編集成書者以叅同契隂符經置諸太極圖通書之末此則甚非朱子本意耳熱甚喜雨躬書不謹餘留面談不宣與童伯禮足下奮不溺於流俗眇然深思欲以禮義振其家聲收既析之昆弟合㸑而食爲制成法以淑後人此世之所僅有者僕雖庸陋固願觀徳于左右以佐末議相其不及導揚盛美爲閭里光榮况足下有意乎振之其何說之敢辭然不幸爲祖母所棄雖踰時越月以歳事之不易柩猶在堂未獲襄舉方從父兄之後抒晨夕之哀徒奉教命冐以衰服請見則人謂我何以吉服請見則塟尚未畢釋哀凌禮諒亦非足下所以招之之意是以仰徳雖深而未敢承命者此也抑足下見招者豈以於聖賢君子之道不有聞乎僕學甚陋言甚訥使胸中果有所蓄造次未能發明而况真無有邪終日與人居未嘗一啓口或稍啓口輙觸人而共譁之坐是自懲創彌不樂言語縱欲時出片言料無明其㫖者復㫁舌中止足下雖雅好士将焉取於此乎雖然於足下則不敢隱盖自古非言之難能知言者難也知言固難而能行之者尤難也足下所欲則者金華鄭氏鄭氏之師太史公嘗爲僕言鄭氏初合食甚久而元之中世有曰某卿者勇於適義於人言無不立行其心所嚮萬夫莫能囘之以故其所爲事多數百年士大夫家所未能行者卒能大合其宗暴其聲光赫然掲於天下聞於後世國史之法王公之貴苟無足稱皆擯而不録而鄭氏以布衣叅名其籍于今三朝果何以致此哉勇於爲善而知輕重之分故耳其所爲法足下既已得之矣能師其勇而力於行雖無待於法可也人孰不樂告以善苟信之未篤執之未堅一以爲可焉一以爲否焉則雖僕亦何能爲然僕觀世之人不肯爲善者誠不逹耳吾鄉雖小邑富且貴者亦間見于時未渉數十年人已不知其姓名者多矣此真賈竪之智烏足道哉足下獨能知其非是爲子孫垂久逺之業自兹以徃茍能益行所聞俾義聲光于四方則僕也爲足下之里人亦預有耀矣當可爲之時願加勉􅏧僕他日獲至於終䘮敢不承足下之命尚當誦其所學與足下講之與趙伯欽三首僕求友於四方十餘年可友者衆矣於同郡得一人焉曰林右公輔尤僕之所敬者公輔氣高而才敏於人鮮推譲視人行行然有不滿之色前與僕書獨稱足下陳元采文僕固已知足下非流俗人可及近入臨海見公輔公輔說足下尤詳公輔之友張廷壁不相見者七八年其人竒偉不肯苟伏人至語及足下必稱善因二子而求足下之所造心已傾之久矣今乃承恵書爲論甚大爲辭甚逹卓乎有曠視前古之意反覆覽繹嘉二子之確於取人喜吾黨之士果有足望喜發於中而見於外如獲大呂九鼎而載以歸也僕嘗恠近代道術不明士居位則以法律爲治爲學則以文辭爲業聖賢宏經要典擯棄而不講百餘年間風俗汚壊上墮下乖至於顛危而不救者豈無自也哉私誠恨之不自知其不肖亦欲有所發明損益以表著於世而習俗卑下學者牿於舊聞不復知有學術竊竊詡詡茍且自恕或有志而才不足有爲或才高而沉溺不返可與言斯事者惟公輔耳公輔每與僕言未嘗不歎朋友足望者之少而有意於足下也書之所陳謂近世文辭不能比隆於唐宋而有取於僕僕無能之詞豈能過於近世哉使真有以過乎人則亦藝焉而已而足下安取乎是且近世所以不古若者足下知其故乎非其辭之不工也非其說之不詳也以文辭爲業而不知道術雖欲庻乎古不能也知道若行路然至愈逺則見愈多而言自異今欲至乎窮谷者言其所見不過泉石樹木禽鳥䖝魚之伏而已比之遊乎雄都巨邑者見宫室之壮麗車馬之蕃庻人民物産之瑰異變怪其言豈不有間哉故聖賢文辭非有大過於今人其所以不可及者造道深而自得者逺恒言卑論亦可爲後世法非剽襲以爲說者之淺也唐之諸儒惟韓子爲近道其他俱不若宋宋之士以言乎文固未必盡過乎唐然其文之所載三代以來未之有漢何足以方之今人多謂宋不及唐唐不若漢此自其文而言耳非所以考道徳之㑹通而揆其實也僕嘗謂求學術於三代之後宋爲上漢次之唐爲下近代有愧焉斯道之盛衰其端微矣非明智睿逹不能知之足下何知之蚤邪雖然足下之論近代信當矣抑僕猶有說焉世俗之患忽見而尊聞已之識既不能决是非醇駁互相承傳以白爲黒者皆是也足下言之而僕聴焉則謂足下謂知言士矣所與交者或與僕之見異則無乃以足下爲方人好高而爲驚世之論乎惟君子之所守不以毀譽而變茍慎所言而力於行以古之聖賢爲凖而不與近代較崇卑得失則古人且将畏足下近代安足並乎又僕爲吾郡喜者寧獨若今而巳乎久不談感足下勤厚聊以此奉報適有疾不能躬書惟恕察自足下别去屢辱枉問懐欲裁荅而居處僻左不與徃來者相聞念雖寄書必不能逹又意足下在太學與天下英俊相講切言道理文章者如林日有所得以開拓其智識僕縱欲有言豈能出足下聞見之外哉以是執筆伸𥿄而復棄去者數矣近復承書懇懇然以弗獲相與問學爲歎如僕之獨學寡徒固當發此歎於足下而今乃反施之於僕足下之意則厚矣顧僕豈其人哉僕於人事都不通獨古聖賢之書則若與巳意合時或有所是非感發輙寓諸文辭以自見當時君子不察其愚而謬加寵引以爲可教坐是得虚聲於時而亦以是不能及聖賢之門戸每觀古人道徳事功之盛慙悔攻中若無所自容以是深自懲創不敢有所作夸辭游辯㣲有與舊時類者亟毀棄之黙坐一室温習四書五經求其㣲意之所在大法之所寓察諸身心而驗於事爲盖欲自致於寡過之地而推其餘以及人其私指若此而未知其能至乎否也足下以卓越竒毅之才志之所向何所不逹然所宜慎者在乎無蹈僕之所悔而求古人學術之大全耳古學之弊莫甚於近代爲士者以文辭爲極致而不知道徳政教爲何事爲治者以法律爲極功而不知仁義禮樂爲當行士習益卑而治效愈下此豈古人所望於後世天下所願於君子者乎如僕之鄙陋既無可用於時故深欲爲朋友言之庻㡬復見古人之盛使聖賢之學衣𬒳海内固有志者之所樂聞也林左民爲學近復何似王微仲兄弟一至於此可哀金陵城中數千萬人惟此二人可語耳趙彦殊近在何處聞巳見其文得無與僕昔時所稱異乎要知如此軰人皆不易得能益求其大者則甚善若止以巳能者爲足則可惜也太學之士與足下善者爲誰亦有相箴䂓者否僕近得陳元采書頗有一二語見教殊喜之不忘足下有所見須以教我僕感之深亦不敢隱也望雨久甚兹偶得雨又得陳元采至獲足下所惠書詩此三事有鉅細其爲喜於僕均也天下學術靡靡日瀕于壊非大賢異才不足振之僕憂之甚於旱可望者非足下軰而誰耶才高識明而嚮道篤義如此斯僕所以喜也能繼是心愈進而不怠則可喜又必有過於今者将天下同喜之而僕安敢私焉荅王氏交幣使至伏辱賜書且有以惠之執事之意則厚矣而僕則甚不安昔者嘗學諸師而竊聞聖賢之道盖取與之際缺君子慎守而不敢越不宜取而取者非義也不宜與而與者亦非義也士無取於人之缺者有賜則受之缺者有贈則受之舎是而受則離乎義也離乎義不得爲君子執事泉布雖足以周人然義不宜以見賜明逹雖足以知人然缺賜接教誨之日淺義不敢以爲知已而愛於缺苟輙受之是忘義也執事所以過聴而加愛者謂頗知義耳謂知義而忘義豈執事見禮之意乎執事方以義合族義聲播於逺邇因加愛於人焉而違乎義恐非執事所缺居也故敢固辭若以僕嘗有文以美盛徳而欲以爲報尤所不宜然也僕昔之有言者政所歸美於義也言出於義也言出於義故人信而無疑使酬以利人将謂餂乎利而有言非惟僕不敢當恐累執事之高義惟執事圖之多缺荅張廷壁辱寄詩五篇且誘之使决其可否足下之意良厚矣然僕昧陋無識豈足知可否之所在邪意之厚而不荅則人将以爲隱荅而不能稱見屬之心則人将以爲妄妄過也而隱過之尤也足下吾友也固将有以正吾過試妄言焉而求正之可乎足下之詩刻削森秀爲世俗異味其辭信竒矣苟得此於世俗之士方推譽之不睱而僕安敢言今足下眇然有志乎古凛乎其非世俗之人也倘不以古人之所至者爲凖則爲卑足下矣而僕安敢不言盖古人之道雖不專主乎爲詩而其發之於言未嘗不當乎道是以雅頌之辭烜赫若日月雄厲若雷霆變化若鬼神涵蓄同覆載誦其詩也不見其辭而惟見其理不知其言之可喜而惟覺其味之無窮此其爲竒也不亦大乎而作之者𥘉非求爲如是之竒也本之乎禮義之充養之乎情性之正風足以昌其言言足以致其志如斯而已耳後世之作者較竒麗之辭於毫末自謂超乎形噐之表矣而淺陋浮薄非果能爲竒也稚子刻雪以爲娯目之具當其前陳非不可喜徐而察之蕩而無遺尚焉取其爲竒也哉足下之爲竒固非此類然㫖近味漓乏和平醇厚之韻得非所質之本未甚充而從事於竒麗之末故邪不本之務而求攻於末是猶棄木之根而蟠其枝以爲美欲其華澤茂遂弗可得矣故聖賢君子之文發乎自然成乎無爲不求工竒而至美自足逹而不肆也嚴而不拘也質而不淺也奥而不晦也正而不窒也變而不詭也辯而理澹而章秩乎其有儀燁乎其不枯而文之竒至矣然聖賢君子曷嘗容私於其間哉盈而流激而發不求而自得者也足下於此固巳知之矣而出言命意未免有艱苦澁滯之態者求於言而不求於言之所從出無惑乎其難也今天下學者靡靡焉惟習之所同潜竊陽剽無所顧忌以爲能詩不可勝數欲其知所趨向由大路而不失驅馳之節者舎足下莫先焉而僕猶僣有所言多見其妄也雖然不知而妄言僕誠過矣使妄言而偶有益於人豈非好古者之所樂聞乎昔有貴人之子病蠱而求藥於醫醫偶出其妻以毒䑕之藥付之貴人之子服而且泄既而疾良愈自醫者言之其藥信妄矣自愈者言之孰知其妄與否乎僕嘗怪風俗頺巧相師爲佞至於朋友亦以䛕恱爲忠近得陳元采書殊有箴教之益切中吾病爲之喜而忘食如吾子所戯粉飾繪畫以爲古人復生令人慚恨歸乎庸衆人之域今得元采而後知之所望之兄愛也無以爲報適有近詩十章及勵志詩十章今以寄元采足下幸一閱之以僕之懐元采以爲教而不怪其爲妄發也五詩中哭許士脩詩最之他詩用韻多有與古人異者行辭有未妥帖者考之漢魏諸作必自得之此特末失耳茍得其本當知鄙言果非妄也與友人論井田僕向者僣不自量竊傷三代聖人公天下之大典墜地已久見今國家法立令行寔足以乗勢有爲舉而措之無所難者故著論井田之事可復不疑僕雖不才亦嘗三思之而熟究之非偶爲是夸談也然每患有志者寡無與論講明之者始見吾子行淳貌古心獨慕焉以爲可語斯事故出而示之意吾子異於流俗人今吾子乃不察其道而横爲異辭以非之謂不可行於今此流俗人之常言僕耳聴之而㡬聵者也吾子安取而陳之哉且人之言曰古法有不可行於今者若井田是也斯言甚惑也古之時席地而食手掬而飲㰱血而㗖毛衣皮而寝革爲巣爲窟以相居拍手鼔腹以爲樂此其不得巳也固不若後世宫室鍾皷服食噐用之美且適也若此者非惟不可行亦不必行以其非中制也若井田者更三四聖人而始大備酌古今之中盡裁成之理生民之鉅方禮義之所由立也古者之世富庻勝於今風俗美於今上下親洽過於今國之盛強且久過於今曷爲而不可行哉人又言曰禹之洪水桀紂之暴虐人民稀少故田可均夫古之時人民之衆後世莫及井田雖未行而人其端巳見矣桀紂之暴非若秦隋之糜爛其民也湯武誅其君而已非若戰國秦漢之際殺人盈城野民何爲而少哉今天下䘮亂之餘不及承乎十分之一故均田之行莫便於此時而吾子乃援王莽嘗行證之以爲不可益謬矣且王莽之亂非爲井田也欺漢家之老母而奪其璽稱制於海内海内之人憤怒思剖其心而食之故因變奮起使莽不行井田海内亦亂莽亦誅死於井田何有哉吾子又謂漢唐不行今欲行之難矣尤非知本之論也漢唐不行者非不可行也未嘗行也漢高祖之世可行也而時無其人導之唐太宗有志於三代之盛而魏徴之流未知先後不能輔之以成大業孰謂不可行也流俗之謂不可行之者以呉越言之山溪險絶而人民稠也夫山溪之地雖成周之世亦用貢法而豈強欲堙卑夷高以盡井哉但使人人有田田各有公田通力趨事相救相恤不失先王之意則可矣而江漢以北平壌千里畫而井之甚易爲力也東海有魚曰鯤身如丘山動則雷震遊則濤湧穚井之蛙未嘗識也伸其股而自託曰東海寧大於井乎鯤魚之大孰若吾股乎今未知天下之故而曰井田不可行者是穚井之蛙之類也且僕鄙固之意以爲不行井田不足以行仁義者非虚語也仁義之行貴人得其所今富貴不同富者之威上足以持公府之柄下足以鉗小民之財公家有散於小民小民未必得也有取於富家者則小民巳代之輸矣富者益富貧者益貧二者皆亂之本也或難僕以爲陳渉韓信非有陶朱之富而豈富者爲亂哉以此論井田踈矣是殆不然井田之行則四海無閑民而又有政令以申之徳禮以化之鄉胥里師之教不絶乎耳苛取暴征之法不及乎身何苦而亂乎使陳渉韓信有一㕓之宅一區之田不仰於人則且終身爲南畝之民何暇反乎僕故曰井田之癈亂之所生也欲行仁義者必自井田始吾子欲舎井田而行仁義猶無釡而炊也决不得食矣夫不以釡炊雖愚婦知其不可不以井田爲治士大夫安之豈智顧不如愚婦哉抑習俗之移人也俗之降衰日趨而日下特立而不變者惟豪傑之士能之吾子儼然在縉紳之列不務明聖人之道以淑來者而非先王之制甚爲吾子不取也僕訥不善爲辯性頗質又不喜爲媚故直以故告吾子孟子不云乎不直則道不見然則僕亦非過也将以明道也吾子倘有疑於心當以見教僕尚能終其說不宣與黄希范教頺俗變以來士君子不復知學術之大全足巳而自畫安陋而習惰謙益虚遜之道消而驕慢荒怠之風熾吾兄以敦篤之資濟以英敏之識學足以致其所當知文足以暢其所欲言而能忘巳之長而下於少舎巳之才而問於愚汲汲然如不及此固于今之所罕見而學道者過人之節也顧僕豈足以承之僕自視資甚陋業甚淺無趨走唯諾之才有朴訥魯鈍之累希世應時之人見而不嗤鄙之者鮮矣而将何說以副吾兄之求乎抑乖於時者必有合乎古異於俗者必有同乎道吾兄誠不爲俄頃斯湏之計而有志乎聖賢之用心則僕竊嘗聞其一二矣焉敢卒譲焉第京府見辟迫趣上道雖欲攄吐藴蓄而無由千里遣徒贐以束帛而缺然無以報不勝愧怍吾兄少加容察則可以爲報者尚有俟於他日也荅閿鄉葉教諭郡守王公至辱示以劉翰林黄伯生所爲詩集序且俾有述焉物之美者無所待於外有待於外者皆持不足之心者也照乗之珠盈尺之璧不幸而寘諸泥塗瓦礫之中其光氣之晶瑩朗潔者固在及識者得而有之雖棲之於故篋襲之以敗絮連數十城之價自若也若夫藉之以良錦韜之以文匱盡飾乎其外而彰其美以示人則其中之所存者可知矣執事之詩僕雖未獲見而伏讀之然因二君子之言而求之盖可以無待於外者也苟無待於外雖二君之言巳爲過而况復有待於無能之辭乎且古之所謂序云者盖以明作者之意如詩書篇端皆有小序而復有大序加其首者是也小序或出於史臣或出於後之賢士大夫序之作者皆古之聞人然其中得其言而遺其意執其意而失其事徃徃爲經文之累者亦不爲少則序之無益亦巳明矣賢士聞人之爲序猶不能有益於經况今之爲序者能有益於執事之詩哉自詩書以下作者莫不有序或同志者指其徳業之所至或門人故交發其所藴而歎惜其遭逄初非有求於人而司馬遷班固揚雄之儔又直自𫐠巳意以抒其竒偉之才固未嘗有待於外也唐人之能詩者莫如李白杜甫甫詩當時無序者白詩李陽氷於其既沒嘗爲作序然其有無不足爲二子輕重而序者反託之以傳惟韓退之偶然一言推尊二子至今人誦退之之文而知李杜之不可及夫執事之詩信美而可傳則不求於人可也或自序其意可也以待後之是非可信萬世如退之者之一言亦可也何其擾擾於世俗之求哉且僕少而不專於學長而奔走於虚譽無暇以學及今粗聞先聖人之道而欲從事焉其所學既不在乎文而於文復厭棄不省故陋於文者舉世莫僕若也加之闇昧庸劣無適時之資掛名庠序食斗禄以活養妻子言不足取信於天下執事過聽而求之何爲計之䟽也雖然今之儒衣冠者不爲乏人以文辭自任者麻列于周秦之疆不彼之求而於拙訥無勢者有望焉執事之心殆非偶然者僕雖不能言烏敢卒愛於吾言乎哉第執事之詩足以自信而僕又未之見且劉黄既序之矣是以未能承命倘未即見絶或以草本相示使得窺賦咏之大端庻㡬可發舒所欲言譬猶故篋敗絮以藉重寳而増榮則區區之願也太守志行甚美可爲湖學薦紳賀屬患眼無聊不能一一荅劉子傳子傳教授侍史别久獲書甚嘉第所以道譽僕者太過三誦愧怍不知所謂今天下學者雖少如僕軰者宜可以千百計何足稱譲而足下云爾哉足下豈以衆人猥有所褒而然乎抑以年少有志姑與之耶苟襲衆人失笑之談則自忖未見有下人者苟謂年少可喜而然則僕常以暴得時名太早爲懼僕皆不敢承也僕性恬淡不喜時名於道徳功烈之名且不敢居况文章一藝耶是以常閉門不敢出與人交接聞人相奨許頭面爲之發熱况形之於簡牘耶然足下非見䛕者顧曲愛僕不覺其不然耳昔者楚大夫有愛玉者見白石即以爲玉非不識玉也蔽於愛故不自知其不可足下取僕得非楚大夫之玉之類也且鳳之爲祥自周至今三千餘年無繼者至若前代所稱皆指野鳥之罕見者非真鳯也其不易出如此今足下乃以喻僕僕何人而敢居之然有一事不敢不爲足下言之僕有志於古人之道久矣今之叛道者莫過於二氏而釋氏尤甚僕私竊憤之以爲儒者未能如孟韓放言驅斥使不敢横亦當如古之善守國者嚴於疆域斥候使敵不能攻刼可也稍有所論述愚僧見之輙大恨若詈其父母毀訕萬端要之不足恤也昔見皇甫湜言韓子論佛骨者羣僧切齒罵之矣韓子名隆位顯猶且如此况僕何能免哉士之行事當上鑑千載之得失下視來世之是非苟可以利天下禆教化堅持而不撓必逹而後止安可顧一時之毀譽耶狥一時之毀譽者衆此道之所由衰也然攻異端如攻病當追求其本魁然鉅夫非自耗其元氣病何由入之今病巳深善養生者當𥙷元氣元氣既完病即易去耳不然雖日有鍼砭我之元氣愈自損何能愈耶元氣者斯道是也自朱子殁斯道大壊彼見吾無人是以滋肆當今之世非大賢豪傑不足振起之苟無其力雖有志何益邪足下以宏博之學有志乎斯道而居大郡以興教化爲軄誠能使千里之内皆慕而不敢爲邪他郡之人又轉而取法焉居乎大位者又從而取法焉則斯道之盛可立待矣足下以爲何如旅中謝客人無可與談者因書有足警發畧陳固陋荅許廷慎往在京師士人從濠上來者多能誦足下歌詩固巳窺見胸中之一二去年在臨海遇林左民張廷璧二子問足下言行滋詳二子自負爲竒才至說足下輙弛然自愧以爲莫及也然後益信所窺之不妄近在王脩德所得所録文章數篇及手書深欲讀之㑹僕家難作未果寓目輙引去重入京師道塗所行千餘里恒徃來于懐及到此獲歳寒事記於友人家覽數行而大驚喜命意持論卓卓不苟非流俗人所敢望也何足下取於天之厚至是耶斯文世以爲細事然最似爲天所靳惜其賦於人也銖施兩較不肯多與得之稍多者便若爲所記臆時時迫蹙督責不使有斯湏佚樂意此理絶不可曉豈其可重者果在此邪不然何獨忌此而恱彼邪如僕自揣百無所有以粗識數字大爲所困當危憂兢悚時自誓欲以所能歸諸造物甘爲庸人而不可得足下幸安適無所苦而駸駸焉欲抉發竒秘以與造化爭也然其取忌亦大甚矣得微亦蹈其所忌乎僕雖爲斯文喜然竊以爲非計之得也雖然君子顧於道如何耳寧論利害哉自古竒人偉士不屈折於憂患則不足成其學載籍所該太半皆不得意者之辭也然後世卒光明崇大又安知忌之於一時者非所以爲無窮之幸而恱之於俄頃者非甚棄之耶此可爲足下道聊以發笑且自觧耳左民多稱王微仲之賢恨無由見之適見其弟晃仲亦雅士當是吾軰之秀大不凢也僕侍祖母故來此其詳有所難言與王微仲僕於斯道固嘗學之矣而未至也向見足下贈廷璧序文慊慊然欲以賢者望僕此安敢當哉孔子之門豪俊士不可勝數顔子獨處其上而莫能先之當時且若此况二千載後而謂有類之者雖常人知其難繼而足下歸諸無所肖似之僕其孰肯信之所以久感足下相待之厚而莫知所荅者此也雖然告人以善者益也譽人而不知其失者惑也僕不佞願爲益友於足下可乎古謂儗人必於其倫盖難乎其類也今謂金與玉爲同則可謂金與石爲同則不可爲其貴賤之殊也孟子以禹稷顔子爲同道盖金玉之類也漢儒以黄憲比顔子是猶石之與金也奚可哉今足下以顔子與黄憲並稱固非尊顔子矣又以僕比二子其卑顔子也滋甚僕自度方今世不足儕恒人而况憲哉又况若顔子者哉而僕焉敢當足下誠有意乎愛僕願以學顔子之道見教不然徒欲處之於賢者之末是棄僕也非以徳愛人之意也令弟處見足下所論著天才傑出則可喜矣似乎傷繁未甚瑩耳然所向慕甚高苟進而不止則足下所稱将自蹈之矣何必歸諸僕耶奉俞大有先生某奉書大有先生尊執事自京師還辱書存問適以冗未及奉荅令子來承體候寧佳甚慰甚慰昔人謂無財爲貧愚謂無子乃可謂之貧耳今執事得子嚴便可百無所憂千金不足多也更望勿縶以家事縱之使學俾談者稱執事有良子爲得不旣多耶待制公文章不可不傳湏與仲縉兄弟言之勸其刻􅎚傳世亦美事也區區仲冬後上金陵明年囘必得徃聴清論盡所欲言匆匆不宣荅林子山某愚戅而昧於道誦聖賢之言恒惴惴然懼無所聞以爲庸人之歸是雖鄙夫稚子有言尚亦恱而承之况吾兄之教乎茲辱書展誦徐繹自旦至午不能貫徹大㫖甚知吾兄之相待者高相重者至也今天下俗異於古朋友之義惟以過相䛕譽爲知愛謬爲恭敬爲盡禮切磨箴䂓之益蔑然不聞或少施之又飾詞而曲拒無古人從善如流之風此素所駭歎者今兄乃遺書獨賜誨諭是以古道見處矣倘有所疑而不以誠荅能不負於心乎故直明之幸無以爲僣夫人之心五性具焉其中雖寂然静也而不能不與物接及乎既發則七情動矣苟動而中其節如禹之聞過則喜湯武之怒而安民文王之哀㷀獨孟子之爲異端懼堯舜之愛民孔子之有惡而欲仁則何不可之有惟夫七情之發爲物所蔽則或汨其本然之善故聖賢立教使人寡慾養心克巳以求仁周子後出又掲而爲圖明太極本然之妙隂陽動静之理而言聖人定之以仁義中正而主静又著於通書以釋其意而必曰動而無静静而無動物也動而無動静而無静神也其意以爲聖人未嘗不動但常主於静茍静而無動則物而不通矣欲人在仁義中正主静静應於物耳非欲人強制其本心如木石然而不能應物也兄昔云此心一動則人而獸是周子所謂静而無動此木石耳心豈能然哉夫人處乎萬事萬物之間而欲與之俯仰裁天下之變成天下之務欲其不動不可得也惟仁義中正存乎中雖動猶不動耳苟此心一動不論當禮與否即謂之禽獸則推之以感而遂通天下之故者豈直静如木石之謂乎其他衆說皆不岀此兄聰明察理過人逺甚奚獨於是而未思乎殆陽爲弗知以試某耳某雖不足以知道者然性命之說嘗聞諸父師矣倘以爲未當而辱教焉以明乎聖賢之㫖則敢不承命荅胡懐秀才徃年在浙東獲交才俊間其最善者眉山蘇太史平仲臨海葉刑部夷仲浦陽鄭楷叔度天台林右左民趙象伯欽陳叔英元采王琦脩徳日夕相與周旋論議倡酬徃復沉濳乎天人之奥博觀乎興廢之理追琢乎行業而浸灌乎文章意氣孚洽無所覬慕體不待梁肉而肥心不待絲竹而暢十餘年來亡落者數人餘多散處他所然猶時得以書䟽相講切當憂而遇笑方思而暫釋未甚於窮獨也及居山南木石之與徒猿猱之與儔心欲言而口莫與談足欲行而物莫與娯諸生講授經義畢輙冥目危坐或取古書緩讀徐吟間有所得無從告語惟仰觀霄漢黙黙悟遣郡府以朝命燕集不可拒徃就末座官僚強飲以酒譁詞盈耳優戯在前未嘗爲之啓齒一笑頗自意無復追曩者之歡矣去冬之長安見唐愚士爲之欣喜又於愚士舎見足下文章益覺胸中慰恱然未知足下之深也今乃辱恵書千餘言陳述反復筆勢流動上思古人下慨當世偉然有竒丈夫之風自入秦且三年未曽有一人以文相貺豈意乃得之於足下乎撫卷熟覽出入懐䄂數日不能舎儼若重見徃時諸君而接其聲容也文章於士子最爲末事然非有得於古聖賢之意者不能世之學者衆矣其用志不專探索不精聞見不博攻習不久而能得聖賢之意者無有也是以吾少而好觀人文非止以其文盖将因其文而察其所存與之共進於斯道也覽足下之文於道信有志矣然而屢稱古之文人則是所向慕猶有所偏也賈生韓退之年三十餘已卓卓然樹立信如足下之云然使斯二公者得聞聖人之道而進於曾冉之列則其賢當何如哉僕鄙陋自度不足班古人而年長來閉口不復及天下事於政教舉措得失漫不復解而篤信六經有所爲也以之爲權衡有所疑也以之爲蓍龜惟愚不足逹世之機變甘以鈍拙自守人見其如此亦多竊笑之又素伉直不耐與富貴人仰俯有勢位者或欲招致聞其不善謟屈亦徃徃不合欲如賈生之亟談世事固不能如韓子之汲汲於得位尤不暇也而足下乃以賈韓相儗烏可當哉然賈生之勸漢文以寛大韓子之酷排異教尊孔孟竊有志焉使天或将康斯人明斯道他日倘萬一有成未可知也而不敢望也凡人當少壮時志意才氣百倍及年益増力益衰則沮謝隕獲有悔徃歎今之心如賈之長沙韓之潮陽其英銳之姿亦少减矣聖人大賢志氣隨日以強德業與時而加故有進而無衰既老而彌明僕之得乎天者未可知已之可勉者則猶有可進之地安知果不若足下之所期哉僕今三十六固爲未衰足下少三歳使三歳之中日有所得其於追僕而出其前猶騁駃騠蒲梢而逐伏櫪之駑馬特易易耳所願者先乎道而後乎文脩飾其身心而無預蘄乎聲譽則僕之所見将有大過於今者矣喜慰其可量邪比懶作書尤不敢論古人於足下有言不能黙黙然世俗之難言也久矣足下其勿以示人恐衆人之竊笑也荅王秀才前辱見臨且徴僕文以觀僕嘗閔世人不務學道而喜言文故有所論述耻爲人出之以吾子不憚重山鉅海來造吾廬意氣願欵非世俗軰可及特出舊作以荅雅意且兾指列其疵失以相發明今乃惠書猥有所稱美而以學文之說爲問僕豈能文者邪何吾子問之異也今天下雖乏竒才異能之士操筆執牘自負以爲文人者不可勝計吾子有問焉彼将有以告吾子不彼之即而此之求所謂學稼於工求魚於獵者也使效其所得豈足副見問之意乎雖然世俗之文僕雖未之學若古人之文僕嘗學之矣試爲吾子言其所知凡文之爲用明道立政二端而巳道以淑斯民政以養斯民民非養不能群居以生非教不能别於衆物故聖人者岀作爲禮樂教化刑罰以治之脩其五倫六紀天衷人極以正之而一寓之於文堯舜禹湯周公孔子之心見於詩書易禮春秋之文者皆以文乎此而巳舎此以爲文者聖賢無之後世務焉其弊始於晋宋齊梁之間盛於唐甚於宋流至於今未知其所止也唐之士最以文爲法於後世者惟韓退之而退之之文言聖人之道者舎原道無稱焉言先王之政而得其要者求其片簡之記無有焉舉唐人之不及退之者可知也舉後世之不及唐者又可知也漢儒之文有益於世得聖人之意者惟董仲舒賈誼攻浮靡綺麗之辭不根據於道理者莫陋於司馬相如退之屢稱古之聖賢文章之盛相如必在其中而董賈不一與焉其去取之謬如此而不識其何說也苟以其文未粹耶則艱險之元結俳諧之李觀且在所取矣如之何其去二子也苟以其所述者王覇之道不敢列之於文人之後邪則孔子孟子固與荀卿屈原李斯並稱矣安在其能尊二子也退之以知道自居而於董賈獨抑之相如獨進之則其所知者果何道乎然相如雖陋其辭賦猶皆有爲而作非虚語也近世則不然一室之微號之以美名輙從而文之視其名紛然雜出皆古之所未聞考其辭輕俳巧薄皆古人之所未有而求者以是望於人作者以是夸於時似有所爲使相如之奴􅊢見之且将棄去而今之士莫知其爲非此又退之之時所無有者也僕竊悲其陋故㫁自漢以下至宋取文之關乎道徳政教者爲書謂之文統使學者習焉違乎此者雖工不録近乎此者雖質不遺庻㡬人人得見古人文章之正不眩惑於佹常可喜之論祛千載之積蠧爲六經之羽翼作仁義之氣擯浮華之習以自進於聖人俾世俗易心改目以勉其逺且大者窮居少暇未有所成吾子誠有志乎古人之文則願勿溺於世俗勿爲一時毀譽所變勿以道徳爲虚噐勿以政教爲空言則文可得而學矣不然則世之能文者孰不可問僕之昧昧豈足副所求邪荅錢羅二秀才二君足下某年少謬招士大夫口舌騰譽心甚不喜得二兄書大有所稱儗滋不欲當苟遂黙受恐鄙陋之指不足以暁左右故不免復有所云古之言禮者曰儗人必於其倫若南宫适以禹稷儗孔子孟子以子思比曽子皆絜功量徳名與情稱而無疑者也或肆然而謬稱之是猶子禽以子貢比孔子揚雄以韋玄成比顔淵司馬君實以揚雄比孟子陸希愈不見信於當時則取譏於後世其不可較然也然之數子者雖不足儗聖賢而其聲光之著於天下猶鈞之於石㝷之於常非猶山阜之於蟻蛭河渭之於溝澮也儗之一不當且若是况某何如者而以儗李翶蘇軾曽鞏以下七八君子奚爲其可哉指鈞而謂人曰此石也指㝷而謂人曰此常也驟而聞之疑者尚少也指蟻蛭曰此山阜也指溝澮曰此河渭也不駭以爲過言則笑以爲無目人矣彼七八君子者皆博特而雄逹才高而文炳使其身不託於名人位不顯於當世猶有以聞於世而傳於後也况又得人焉而依之其卒能有立也豈不宜哉若某者才能不及其百之一恣意放言不善刻削任理所之欲書即止未嘗專攻于是望以之而立名豈能追作者之體要而庻㡬乎古之人哉而二兄乃云然竊恐識者以爲過言矣然世俗可與語古不可與語今自昔而然孟子大賢淳于髠且詆之揚雄韓愈皆傑然儒者當世談笑之此皆士之所不能免者也今某無古人之實而過得時譽豈今之俗異於昔哉何其不宜然而然也所貴乎美俗者以其毀譽公而是非當也宜然而不然者非也不宜然而然者亦非也二兄以英敏之資抗然以直道自許而過於譽也如此豈固有說乎抑期其至於此乎如期其至於此尤不敢處也世之稱七八君子者以文某於文雖嘗學焉然志不好也少之時學作文自度其不可竊獨慕乎聖賢之道以爲斯道非文則無以傳故又於文發之既而復以道之不至者不足以言文故嘗用心於三代秦漢之書考其氣運之高下叅其言語之醇疵以觀其世之盛衰得尖要其歸於道與否而凖繩之以聖賢之䂓矩盖将習之以兾其熟焉行之以望其至焉考之於身以見其成施之於世以驗其功服之於身而傳之乎來世上以不愧乎天中以不怍於心下以有益於人而後止此某之志也若二兄之所譽而儗者非某之敢望也二兄其謂誠然否乎急於自釋不覺流於狂僣二兄亮之所湏二文在沈君處已久想已得也與俞教諭某以祖母䘮伏處堊室将命者至喻以行人蔣君之指致執事之意俾之爲文及視其卷獲悉蔣君家世之盛才志之美且有尊祖反始之心使平居無事雖微執事之屬固願有以賛之今也不幸甫遭大故膺鬲摧裂神識荒迷言語動息不復自比於人雖欲強文其言而文奚從生且蔣君之不鄙而有取於區區之文者非果以其能文也盖以粗習聖賢之禮而不背乎倫紀焉耳方在衰絰之中苟使越禮忘哀飾琢辭說以媚夫人則人人将棄之矣而君何取焉雖然蔣君仕乎朝廷車轍之迹交乎四方今之還也必有時而重至斯境他日倘重至乎斯某或終䘮釋服當奉蕪陋之文請見于門下惟執事善爲我謝焉荅俞敬徳二首前辱書千餘言愛僕何厚也望僕何尊也而自處則又何謙也足下僕所敬自處以謙而遺之厚且尊此宜在所欲荅而未果者非不欲荅不知所以荅也僕於人不能翕然合亦不能判然離有問而對有呼而諾非吾類弗面也雖靣弗語也是以人喜僕者恒少見憎者恒多足下不惟喜之又過愛之不徒愛之又過尊之是宜有取於僕也然㝷繹足下之言而有取於僕者皆僕之所不取者也足下獨何爲耶自聖賢亡天下不幸離爲三四致義理者得其體爲事功者得其用文辭特其微者耳而致缺極爲尚不可數况其巨者乎僕竊不量其身之無似欲取聖賢而師之上将以不失天之所與次将以推其所與于斯人而患乎未能也足下之所見以爲善而取之者寧在此耶如取其微則今之名家者不爲鮮矣僕不足以累足下足下誠有幸於之矣繼此有問其烏敢黙耶多誤某鄙樸戅訥言行不能及古人器識不足以逹時務然守其愚子然莫與徒望望然高顧遐視而不合于時此固流俗之所笑且訕士君子之所不敢自是者也今足下猥加禮貌枉書賜問某熟察書中之言意欲望之以聖賢之道慇懃甚至某矣雖少然握筆伸𥿄工爲文辭好豐頥長髭言如轉丸歩爲當世所喜者不可學彼皆自以爲出羣之才經世之具使聖賢可至則斯人是巳而足下顧以歸諸某奚可哉自他人而言且不敢居况夫足下秉深逹之識讜直之論可否於殿陛間其志信古忠正之士懇懇焉以愛君報國爲心者自宜藐視一世不入眼睫而有取於某此某之所未解也足下苟取其文乎則華言而少實者古多有矣未足以信某之爲人苟取其貌乎自孔子不能無失宰予况於某哉雖然足下殆取其志也取其志則某嘗妄有不遜之論矣某六七歳時𥘉入學讀書見書冊中載聖賢名字或聖賢良相将形貌即有願學之心每竊寸𥿄署與同軰諸而指麾之父兄雖加呵禁不止也既而年十歳餘漸省事見仕宦者不足道以爲聖賢之學可以自立外至者不足爲吾輕重也遂有慕乎道徳之心又四五年侍先人北遊濟上歷鄒魯之故墟覽周公孔子廟宅求七十子之遺跡問陋巷舞雩所在濳心静慮驗其所得慨歎以爲彼七十子者縱顔閔未可㡬及其餘若樊遲冉求軰使學之同時豈皆譲之乎但今世無聖人出不得所依歸故不若爾迨今又五六年閱理滋多約心愈久始知古人未易卒至盖其信道之心篤自治之法嚴故其所成近求之無遺行實用之有成功非近代虚名者比也某誠信其然故不自放於俗每興傷今崇古之思積之既多發爲言語道政事必曰伊尹周公論道徳必曰孔孟顔閔寝而思者此數君子也坐而誦者此數君子也用心一入於此猶恐流於過高如古狂人而不適於用是以深自制抑若中無絲毫學者見庸衆人猶且畏而却避之况大賢魁儒如曽子子思孟子亘千載而特立者焉敢覬其萬一哉足下乃以某爲可庻㡬而至此言一出惟恐流俗将以笑某者笑足下矣然足下無或恠其笑也孟子曰君子之所爲衆人固不之識屈原曰非俊疑傑庸態然也近有人聞某狂言輙頓足撫掌如聞恠聲且欲來瞷形貌果類古人否所親者以告某笑應之曰形貌與今人不異但心似古人耳所親者亦大笑要之此事不必與流俗爭但汲汲力求千載以上之人爲師以俟諸百世之下知不知不暇問也聞有無識者見足下應召爭論輙笑足下爲愚此殆與兒軰之見無異聖天子下詔逹郡縣有志者上䟽以論天下利病唐宋以來常有之但今人不見便以爲恠此可歎也有志者行事當洞逹如日月所持既定以此而始以此而終以此而富貴以此而貧賤憂喜禍福付之於天何必較哉某頗有見於此故對衆人不敢發齒如痴人然又恐虚名無立久不敢與人徃復感足下之愛且知受書沉思有觸於中不能自遏聊攄意一言五經之說實領至誨雪甚不可出餘候相見盡談荅俞景文惠書以先夫人遺徳未傳於世而以銘文見屬辭氣懇惻厚甚此固孝子仁人不忍死其親之美意然某之言豈足傳信後世哉古之傳世者雖不可勝舉而其大較皆豪傑之士道徳充溢干中事功見于當時爲天下所仰服故其餘言緒論之所及無意於傳而後世自傳之以其抑揚予奪爲人之賢否輕重有獲著其名於文章之籍者輙相夸賀以爲榮耀至於子孫猶倚藉爲口實此皆以其人誠有可傳而然非特以其文也如范希文韓忠獻公程伯淳諸子其文辭固與人等耳後世傳而誦之而凢爲其所稱者因以炳著章明於天下豈非以其人之賢故耶使徒有文章而大者或不足若柳子厚劉禹錫及王介甫軰其身且不免爲世所詆議其所稱引賛譽之人欲望世人之盡信不亦難乎故善爲親圖者不在乎得可傳之文而在乎可傳之人其人傳文雖未至無害乎其傳也其文美矣而其人不掩焉縱美而不傳雖傳而不信祗足病其親夫奚𥙷哉今足下慮親之名未著而欲傳之苟以其文則某非能文者苟以其人則某之無能别於衆人也審矣而望其信於今垂於後世何爲計之過而求聞之踈乎且世之風俗漓薄視今之文未論其工拙先舒𥿄尾覧官位爵秩故求文章者必於穹位隆爵之人幸而得假其名輙拜受以去不復問其中作何語盖習使然也足下不於彼焉求而以某使誠美可傳亦将爲人所輕訕兾世俗之信且不能致而何望後世之傳乎使後世之人好尚與人異某他日於道或有所成文或有傳未可知也使亦類今人之爲見某素賤士其身且不能自傳而安能傳乎人耶雖然以位而傳者猶器以丹漆而美也𣏌􅎚之器固有待於丹漆之飾其飾既亡而其美亦亡矣若夫金玉之器則不然其美天美也其貴天貴也人欲丹漆之且無所施而况有待於飾乎足下行義文學爲士子師於人不妄有所取而獨有取於某意者其相求於丹漆之外也歟此之謂以古人之道見處而非汲汲於流俗之信也然則某亦安敢猥謂見棄於流俗而不勉乎銘墓之文謹如足下之命其可傳耶其無足傳耶其信于今邪其傳之後世而信邪足下有以取之其必有以識之矣某何敢知焉荅俞子嚴二首僕始者知吾兄能文未知吾兄之心今得吾兄書乃知吾兄之心果能稱其才也自宋亡以來八九十年風俗變壊延至於今日以滋加天下同然一律面異於心心異於口謟䛕以相容詭詐以相愚不知古人之道何用於今世也又不知古人倘在視今世爲何如也每深居沉念輙用慨歎曷爲而見古人之遺風乎今吾子乃能數僕之過言而䂓正之嗟乎美矣吾子之心何其似古人也僕始爲此言誠苦於行役而云未知其過及吾兄言之乃知其不能無過也夫一言之失未甚也吾子已不匿於心而䂓之使僕之過有甚於一言者吾子其能黙乎僕嘗患無從知已之失而䧟於至愚今乃有望於吾子矣且吾兄在布衣中不忍欺其友巳如此使有位於朝廷食人之禄其肯詭隨而爲䛕說以負其君乎使爲人臣者皆不負其君欲俗之不美得乎然則因吾子之言而稱之爲似古人未爲過也雖然古人之道非但如此而已也吾子其益務爲學而充乎其言有見於僕之失則望以爲僕告也雖不得友乎古人其尚何憾哉秋𥘉辱以文見示微察吾兄意氣愿欵似非流俗之相紿誑者故畧據意可否無所閟惜此朋友之義當然耳乃承恵書稱僕淳篤聰明不自高大褒揚過實非所敢當又以僕知道最早而欲相師此尤非所敢聞也僕氣質至愚於世事皆不曉逹自少惟嗜讀書年十餘歳輙日坐一室不出門戸當理趣㑹心神融意暢雖戸外鍾皷鳴而風雨作不復覺也家苦兵藏書散軼無異書可覽又性鈍劣不善記憶所讀書曠月彌年即忘不省加以踈率措慮不宻於書惟取其道理大意所在不復檢顧細微凢禮樂名物天官地理兵法釋老之籍皆不能存其端緒習静既久不能效時俗徃復語言文飾之事不復能鳶肩羔膝卑聲詭笑曲身俯首稱誦人美而求其喜恱居則直情任意簡黙而巳是以士君子見僕多不相合或哂僕爲愚或詆僕爲傲彼要非相知者亦僕之鄙有以致之也今吾兄不特不哂而詆之又從而禮下之至欲屈已相師一何意見之逺甚哉僕自度固非全愚亦非敢傲然謂之聞道則亦未也僕㓜有志於道視顔閔軰所至以爲可勉而及於聖人之言未嘗不思之於心而試之於身器識頑薄未見有過人者何足爲吾兄師耶茍謂友道在乎相教誨則猶庻㡬耳盖聖人之大者上莫過於堯舜禹湯文武下莫加於周公孔子而此八聖人之言行文章具在六經故後之學聖人者舎六經無以爲也世之學者莫不學六經然不知所以爲學夫醫士之讀素問難經将取以治病也茍不逹其意雖日誦之何益六經者亦學者之素問難經所以脩身治人之書也今人誦之而不解其㫖與不誦何異哉故多誦而不思不如少誦而思之爲愈也思而不行不如不思而行之爲愈也人苟能發明六經者大之於天下國家小之於善一已直易易耳况文詞乎吾兄謂於心無所得而爲文未能盡所欲言經不熟之過也苟熟乎六經則於道無所疑道明則於天下之事無難言者何憂學之不成乎然僕觀乎世之人皆不能無憂而所憂止乎服不得華食不得豐禄位不得崇至於以學不逮古爲憂如吾兄者誠不多見也吾兄思僕之言尚少進焉苟所憂不巳則樂自至矣人還索書屬有客不能多及與友人僕怠於爲學而闇於聞道所能者非古人之所急而所守者非流俗之所趨是以上無以合乎聖賢次而無以宜於當世固君子之所棄遺而襃然衣冠造吾門舉所疑以相質意盖望其相啓發者是何所聞之過而求益之踈乎欲遜而不荅則處賤也不敢拂盛意勉強有言則理之曲折非言所能周疑之深固非言之所能釋又素拙訥無所通解縱言之而恐其難合也雖然足下欲聞者此理非求合一時之器試嘗言之而足下聴之可乎夫聖賢之言非一端也其言未嘗同其要未嘗不同其意未嘗同其理未始不同譬之五榖味不必同而同於可食江河水不必同而同於可飲意之所主或異則言亦從之學者不必強而同之惟能識其意則理之從衡順逆鉅細顯微咸可推而得矣中庸以智仁勇爲三逹徳此言爲學之事以三者爲先非勇不足以進道故以勇繼仁智謂之逹徳云者明其非隱僻恠誕不合中庸之行也若五常之徳曰仁曰義曰禮曰智曰信乃其得於天而脩於巳者言性之本體則不待言勇而勇固在其中矣今足下乃合二者而槩視之謂勇既出於五常之外中庸不宜以爲逹徳㫁然疑之而不釋豈非泥其言而不探其意之過哉論性不必言勇猶盡性不必言禮義信之比也言仁而不及禮義與信豈以三者爲不美哉禮者履此者也義者宜此者也信者守此者也則三者不俟外求而至者也何獨至於勇而疑之乎且中庸之書首言中庸之不可能而以舜之知顔子之仁子路之勇實之盖中庸雖不可能然苟得知者能察兩端而執其中仁者能服膺乎善而弗失勇者能強毅自立而不囘奚難能之有則勇者雖不係乎五常而五常資勇而後盡豈出於五性之外而不可謂之逹徳乎聖人嘗以臧武仲之知公綽之不欲卞荘子之勇冉求之藝並言矣嘗以好仁好智好勇好剛好信並言矣此數者亦曷嘗在五常之目哉聖人發之則爲至理何可以詳畧多寡較也故繇意而考言則天下無廢言考言而遺意則天下無至論學聖人者亦學其意而已足下茍求其辭以爲異則孰非可異者何爲擾擾焉發衆異於胸中而不究其所同哉然今之士學不謀道盖久平居不復有相講說滋益之習獨竒自可乎疑有誤其所聞以爲賢者皆是也足下乃欲不自放雖不足疑之理不足問之人猶懇篤若此使果有卓然君子立於世寜有耻而不求其道者乎僕用是而知二三子之志矣語有之曰告我以過者吾之師也繼兹以徃幸無隱於我如僕之愚尚将有聞焉况足下軰耶荅金景文去年蒙賜書以先夫人墓銘爲屬私念執事學行爲人師文章恢恢乎有作者風所交多名士不鄙而有取於不腆之言其言似非偶然者嘗撰銘附上且求指擿蕪謬處見示迄今不聞一言相有於僕将附者不逹抑恐僕不能改故掩護其闕而不言耶古道廢壊朋友務以虚辭相䛕恱不少欲䂓切其過輙自疑又恐觸人靣談背議腹毀卒不敢發言此最大弊也僕獨學宜加懔懔而以弗獲聞巳過爲懼幸有誹詆以爲不肖人則大喜之有刺譏文章疵病者則小喜之其意固岀於見厚豈不喜哉執事篤古好道所存必與時俗人異趣恐尚以衆人處僕而不敢言故復云耳繼今苟有聞望無隱也吾郡聞人三百年來如黄巖杜清獻公鄙邑葉信公學術事業著于國史其餘卓卓者數十人類非近世之士所及至於僕軰而言學於諸公之前真可耻矣其敢向人說自以爲是乎凢今之稱引才藝以夸世俗者皆可耻者也然古事日逺後生無從知之流俗卑陋而莫之悟亦其所也僕近者嘗欲爲一書紀載前人行業使隱沒微晦之跡昭然布聞耀人耳目以爲州閭法式事在國史者巳録得數卷而不幸棄遺於太史者甚衆欲求其子孫而耆老淪亡無所考質每竊愧歎夫人劬一世之力以成其身顯名譽於當世盖選千萬而二三者也生乎其後者不能爲之發明以表掲其志義顧乃使之與庸夫恒人同於泯滅不亦違天道而負公義乎僕文采雖不足取然爲是而懼不自知其果不可也執筆憤悱旁求博討卒未有得執事年高而多聞於嘉言舊事必能記憶幸詳數以教我府學赤城志并望見借當令人抄録送還羅先生適縣志不載其行惟云事見鄒諫議浩送董遵逸序及州學三先生祠記及秦少游所作生祠記少游文巳得之三先生祠記學中必有煩令善書者録示僕觀古豪傑之士居乎位必有益乎位居乎鄉必有益乎鄉如使因循乎衆人之中於事無所𥙷則與衆人奚擇焉自京師歸又五年矣於聖賢之道未能有絲毫之𥙷固已獲罪於君子矣欲成小書以贖前過執事以爲可否乎當今文學之士莫不砥礪才器以赴事功或聞此舉大笑其迂也非執事知我安所發吾言耶荅林嘉猷昔在鄉閭嗜學之士妄見推譲挾䇿而遊吾門者無虚席焉尤以得吾子與鄭叔貞爲喜及以朝命來教山南士子衆多旦夕不少暇夙昔百事遺忘殆盡吾子與叔貞之容聲言笑時徃來乎吾懐居二年吾子果來叔貞亦至於是彌一歳矣吾倡也而有和吾語也而有荅吾疑也而或悟之吾憂也而或釋之吾喜怒之失中言行之違宜二子未嘗不有以匡我也豈特二子獲遂卒業于吾而喜哉吾所以離親去鄉食釡庾之禄于數千里之外而弗戚戚以思伈心以慙以得吾子故也邇者私歎吾子學業之進而怪其未嘗少言已志以爲豈誘掖之不至歟今乃忽辱長書浩乎其爲辭充乎其爲氣推而求其志意所存可謂卓乎絶岀者也聖賢學術不傳久矣學者卑陋不復知周公孔子之大方因陳襲腐自珍自誑少或有志斯事謹願者篤於守而不知推乎性命之原逹乎政教之統踈俊者銳於言而不知本乎倫理之常踐乎禮義之實故顯而在位則不足以淑世約而在野則不足以淑人風俗日偷而治功難成禮樂淪壊而刑罰不措非以斯道不明故耶吾謬不自量其無能竊獨耻之而有志焉以智識之弗弘才氣之弗勇世故縻之于外而疾疢灾患紏纒之於内是以年日長而業不増空名日聞而徳行益乖每覽古之大賢君子蹈道立徳無所可悔者未嘗不自責且深悲也當一念之攻乎心以爲世苟有同志者吾必求而與之偕何幸吾子之所進乃能副吾之所望乎世人不能有見於斯道者非狂則惑耳狂則足已自放而不肯務學惑則賤巳自畫而不敢爲學苟去是二患學之終身而不倦以止不盈以肆烏有無聞者哉吾子之所云㡬矣所以自期者是矣世俗無以踰子之志矣然必曰必爲卿相諌官御史而後可以行志則非也以人不知已從學事師爲當然而惡其譏病且亟與之辯亦非也君子之爲學事道而已道誠得也表世式民之具在是也尊主康國之術在是也傳後立教之本在是也世有知巳者舉而授之大位斯道得行天下之福也而吾何加焉世無知巳者委之畎畆蓬藋之中斯道不獲大行天下之無福也而吾何損焉故吾身之未爲聖賢君子也是吾之所當憂而所當自望者也雖言之無傷也舜何人也有爲者亦若是古之人有言之者顔子是也吾身之未爲公卿大夫豈吾之所當憂而自望哉雖無言可也言之則爲慕乎外不患無位患所以立孔子固戒之矣然則吾子之以道自期者吾之所望也以位自期者非吾之所望也當孔子之時公侯卿大夫何限顔子不得升斗之禄身不得暫立乎朝吾子以顔子爲得志乎以富貴于當時者爲得志乎以吾子之篤厚明敏固巳無疑乎此所以云云者殆必有激而然耶流俗之疑多生於所希見天下不識從師學道之事盖久彼見吾子二人者束書别家陵重山泝大川渉乎蛟鼉之淵寝乎虎豹之林而從迂拙無勢力者遊彼固不知吾子之心也宜其以吾子爲隱者也使子而從今世之顯人出政令檀權寵赫然爲人所畏服夸美者而學焉則人必無是言矣吾之跡類乎隱者而世遂謂子爲隱甚矣所從之不可不慎也雖然吾子何辯焉君子審乎在巳者而巳矣使吾與吾子學乎古者皆獨善自私之術而謂之忘世則彼之言當矣今吾與吾子非堯舜周孔之言弗存非脩巳淑人之事弗爲非推之四海而凖垂之萬世而信者無以措吾思也而謂吾子爲隱其可乎其不可乎彼庸人者不知之君子必知之今之君子未知之後之君子必有知之者而吾子奚遽鬱鬱於是乎賢否本乎學而係乎巳貴賤毀譽禀乎命而在乎人在巳者吾脩焉在人者吾聴之吾子無以鬱鬱爲也嗟夫天之生斯人其必有以處斯人使賢者生而以衆人處之不如不生賢之爲愈也天之愛民亦甚矣賢者之澤不遇於世亦久矣吾子其勉焉擴聖賢之道以善其身近之爲及物之政逺之爲傳後之書不能俱全亦可以一得吾自度無𥙷於世幸而見遊吾門者之有成其喜豈特什百于今哉叔貞好學吾愛且望之不减吾子其以吾言爲然否也書辭皆佳餘無所容吾言特以孟子相儗之說未善不敢受而有也能更之乃可爾與陳敬齋某徃歲嘗獲與進遂以拙稿就正焉荷先生不鄙夷之重以䂓戒之辭徳至渥也於心終不忘章末曰子将以予所言者爲戒以所䇿者自勵尚堅所守而懋學哉立志於至義之源行身乎大方之途沉濳游咏於詩書六藝之文使自得於心而形諸事業其勉予也不淺其蘄予也不薄矣每一誦此未嘗不肅容歛袵戚戚然動於中而歎曰先生之能以古道相箴也如是先生之好古也篤矣其非求聞於人而能自樹者乎又非能推錫類之心以恵夫人而不忍獨善者乎用心良厚矣及見所遺彦徳書則若有尤怨悲憤而未嘗釋然于竒孤不偶之歎者何則僕雖不敏嘗奉教於嚴君聞君子之於學将有以擴充吾良知良能而復吾本然之量非由外鑠我也豈以自外至者爲樂辱哉故将舉世非之而不加懼舉世譽之而不加喜無他好譽人者豈必我知好毀人者又何足瑕疵我哉視彼蔑然者誠不足以塵吾抱怫吾思也若是室廬空虚而吉祥至止取之左右逄其源矣吁文所以載道也固當求其工不工不宜慮夫人知不知也信工矣質諸古人而無疑不利乎求庸何傷人茍不知吾奚歉吾将鉗吾喙而巳耳使世無楊子雲亦甘夫覆酹瓿耳大冶之鳴金識者未必以我爲妖也今有人焉談衮冕絺綉之美于布素之士詫易牙之味于藜莧脫粟之人不惟藐然其聴必将赩然而怒譁然而駭矣否則反訾之而目爲妄人也雖然日月不以薄蝕廢其明江河不以旱澇爲盈縮篙師不以風濤之險舎其操舟農夫不以歳歉而輟其耕菊芳乎秋松栢秀乎冬各適其所奚可以時之不偶而歉吾素志哉先生之愛僕也不稔烏敢以是言進嗟夫人以國士遇我我當以國士報之惟高明者亮焉所願爲斯文盟主幸甚與樓希仁得西行書勝接面談逺甚信乎足下之辨于辭也文章雖小事人謂之能言僕𥘉不知識及出道歷呉楚至齊魯與梁趙秦晋之人交聞人談論能言者聲和而音雅詞切而義明理約而不亂端多而不複聴之使人洒然不倦不能言者終日口吃吃不能逹意雜亂滯澁如醉夣中語或故以蠻音俚說嘲哦噢噫使人意悶不樂然後悟文之美惡正類此讀司馬遷史記終日數卷不倦及覽禇小孫日者龜䇿等傳未終𥿄已欲棄去文豈易爲耶詞之美惡人之好惡繋焉人之好惡世之傳否繫焉而人以易爲之甚可笑也近見他人文數篇讀之漫不成句得其句意不能屬得其意辭不能馴正與楚粤間人僻處山谷不入中國者與之言缺果何人耶足下之文譬如趙人與梁人語聲音已不大相逺雖時或失口尚有趙音然終是能言者非吃吃不暢者比也然僕有一說能言與否固爲人之好惡又在審乎所言者何事韓非商鞅書正無與比然所言皆刑罸督責之術君子羞聴之揚雄文中子書雖儗古人不甚暢而所言多近道世猶有取焉豈非能言爲難而合乎道者尢難也耶僕固楚粤語者然頗嘗與中國人談喜足下相知聊一出口足下幸無笑其呐且戅也與盧編脩希魯三月中嘗於河南鄭大叅處留書煩其寄逹既即扶疾與二兒褁瘡登車四月七日至長安又半月至寳鷄由寳雞渡渭始入山歷棧道凡十日以閠月一日抵漢中離家至此一百二十四日水陸㡬七千里䝉𬒳國恩例得舟車與妻子軰幸免徒歩之勞途中過虎牢崤凾潼關之壮瞻華嶽終南太白之秀觀周秦之故都吊賢君哲士之陵墓循漢祖就國之故道追惟一時俊傑竒謀雄烈令人慨然而思惻然而感忘乎所經之險所之之逺也第恨病餘才思拙澁不能悉見諸詠歌以發胸中之所藴以是慚負古人耳初八日始到任山郡荒陋士人絶少生徒數十人聰明者不一二見又乏師儒五經亦無全者昧爽至昏黒嘵嘵從事授書改課程僅如村學舎䝉童師如此而望道徳之脩學業之増其可致耶以是恒自愧恐益無所聞知以副當世期待之意報聖主知遇之恩每一念及心膓爲熱流汗沽衣不知故人親友亦有爲吾慮此者乎水土暴惡男女有年三四十不能行歩者大癭垂膺項間十人而伍初見大駭以爲怪物學徒中亦多有之見之令人畏避恐久居此将亦不免是病又頻年水灾米與百物皆踴貴在此者八口方謀耕舎傍隙地種𬞞菜與諸生糲飯談聖賢自脩治人之道痛以禮義自繩約既率巳之頑惰又以化頑惰者使之知操身行世之大方孝親忠君之大節他日或有分寸之善及乎人庻可少塞無能之萬一但省事者寡言之雖切莫爲受之文辭更無可語者欲舉鄉里士人作訓導臨𥿄自笑孰肯輕千里而相從於寂寞之際乎因復不果向時指授數人頗識端緒今復棄之而來譬如農夫棄美地而耕瘠土耕者勞而美地失其利然不敢怠不敢厭庻㡬歳晚有釡庾之獲少時志意無窮及今寥落未見所成毛髪巳有變白氣力羸倦無復壮夫之態重以旅寓乖離之思亂其心俯仰應接之勞疲其體其不足至手君子之域也可知矣吾兄與文昭左民軰幸以古人自勉以利時及物爲巳任俾孤陋者有所企效而取法焉此則區區之私願也四川請考秋試使者坐待㡬兩月必欲俱行勢不可止殊悶悶無聊偶見便人畧報一二與陳用中吾與足下同閭里而始不相知或謂足下好學善記憶但習於俚俗謔語未磨礲以世務禮節耳吾以爲時俗騖利者多知慕學而好古者難得因與相見久之遂辟置家塾俾訓子弟盖欲引足下於道徳之塗進乎善而去乎非僻也一二年果大異夙昔文辭亦蔚然可觀閭里皆以爲然凡遊吾門者莫不樂稱焉及予以朝命教授漢中奔走四方徴召大懼無以誨學者因思足下交游久學問有師法勝荒陋鄙儒不知句讀者逺甚欲以文書請爲訓導軄或又謂足下好謔不變且不閑飾威儀辭令恐無以取適於上下吾又以爲足下當自能改勵以進乎君子不可以小疵棄也遂舉而不疑已而足下果來而趙君希顔亦自蜀至同爲斯軄吾復奉命之蜀及數月而還言者多說足下遺闕甚者謂好夸伐多忌媢酒後發狂以言語侵人予竊駭焉黙存諸心未敢形於言也姑時以古人事譬說兾能悔悟遷善及予将之京師足下忽使酒發惡言與希顔悖且自諉甘爲小人而不辭吾於是爲之大駭行數百里猶驚歎不能釋且自悲予徳薄言行無可則以至於斯也凡人之當爲君子而不可爲小人雖童昏無識里巷蚩蚩之氓亦知其宜然盖有願爲君子而操守不力不幸䧟於小人者矣未有願爲小人而能不爲小人之歸者也使足下在鄉黨爲小人不過禍一身耳今儼然衣冠爲大郡師食天子廪禄教士子數十軰不思自激昻悔過正巳以率衆而曰我甘爲小人則此數十軰者何所師法而爲君子耶足下一爲小人而使此數十軰皆䧟溺焉不亦可悲哉此吾所以駭且歎也且吾數千里相招者以君子望足下也足下不逺數千里而來者吾意其非爲升斗之禄也非以一訓導之名可以榮身與家也盖亦欲學所未能進所未知以求爲君子云爾今而不自檢飾肆口放言以侮老成詈同列悻悻恍恍自矢爲小人足下豈端爲小人而走數千里爲一訓導哉人心之深㣲隱宻者不易測識而其大畧亦易見言温而有理與人交恭遜而下人不妄不詐不苟取不苟訾好學不倦不自夸伐吾雖未能必其爲君子而必君子之徒也乖戾而好忿疾自以爲才伐已而侮人言無可愛行無可喜隂詭僻違使人惡見而厭視雖未必其爲小人而必小人之徒也審斯二者則足下所趨之塗可知矣夫人不亟悟亟改而復褰裳疾趨以小人爲旳而復自以爲是譬猶李赤之遭厠鬼面已䧟不潔矣而後諱人之言以圊溷爲鈞天帝居吾恐其終不免爲小人也雖然天下學者亦衆矣求如足下之燭義理善記誦於學多所通解豈可多致哉吾安知其遂不改而真爲小人之歸也使遽以小人處足下則予之言不宜岀矣念足下有能改之資而欲足下之改也故不能無言足下欲爲君子爲小人皆自今日始其深思之與郭士淵論文吾郡之文闕有間矣僕行四方每見郡人詞令可觀者即喜况能文者乎是以自見吾兄心洋洋如有所得寝爲加安而食爲加㫖非勉強而然也樂善之誠天性然也繼而又承寄以林君公輔之文且教僕曰試評其可否焉僕昔聞吾兄言固知林君之賢及展而讀之黙而味之其思淵以長其辭辯以逹不覺叩几三嘆反復玩繹遂至夜深乖離旅寓之思爲之頓消而沉伏鬱抑之氣勃然奮起信乎斯文之可以恱人而吾郡之秀不可及也僕不才自居金華太史公之門當世士大夫多獲見之矣凡能文有名者皆得而觀之矣至誦其文而使僕喜愜無所遺恨者不數人豈僕識見鄙劣使然哉亦作者鮮臻其極故也太史公嘗與僕言而以爲嗟嘆盖斯文之在人如造化之於物歳異而日新多態而善變使人觀之而不厭用之而無窮不失榮悴消長之常理乃足爲文而世之人多不能與此樂蹇澁者以艱言短語爲竒好平易者以腐熟冗長爲美或采摭異書恠說以爲多聞或蹈襲庸談俚論以爲易暁而不知文之美𥘉不在是也古之名世者具可見矣以僕言之秦漢以下大率多紀載講論之文耳求如古之立言者未之多有也聖人之言不可及上足以發天地之心次足以道性命之源陳治亂之理而可法於天下後世垂之愈久而無弊是故謂之經立言者必如經而後可而秦漢以下無有焉然而猶足以名世者其道雖未至而其言文人好其文故傳其言雖不文而於道有明焉人以其明道故亦傳二者俱至者其傳無疑也二者俱不至者其不傳亦無疑也以僕觀於今之人求其成文而可誦者且不易得况望其明道乎僕所以見吾兄與林君之文而喜者良以此也自古國家之興功崇而績偉政舉而教行天恐其或失墜也必生博特英逹之士執筆而書之所望於将來者非兄與公輔軰而誰乎此非僕私於同郡而言雖太史公亦深望焉更爲謝林君加意問學以法六經爲務倘有所得即以見教僕之几當不一叩而巳也與舒君舒君足下某在鄉黨時嘗接奉川朋友輙知足下名斯時新自京師歸湖海間人物可數慨然發不得見之歎雖未一識足下然已久存乎心而著乎目矣昔有人在京師以足下文見示且道足下材質甚美撫誦彌日恍然如聯席交辭神㑹意領不知相隔千里而限以二江也僕自十五六從先君學經讀古人文字頗思究其端緒然竊病今人與古不類自宋中世以下文未嘗敢觀時有所得私述而隂蔵之耻以示人及遊京師始岀謁太史公公一見輙曰子吾徒人也遂送至弟子籍中由是日獲聞所未聞然後知斯道如此而今人之得者果非也盖文與道相表裏不可勉而爲道者氣之君氣者文之師也道明則氣昌氣昌則辭逹文者辭逹而巳矣然辭豈易逹哉六經孔孟道明而辭逹者也自漢而來二千年中作者雖有之求其辭逹盖巳少見况知道乎夫所謂逹者如决江河而注之海不勞餘力順流直趨終焉萬里勢之所觸裂山轉石㐮陵盪壑鼓之如雷霆蒸之如煙雲登之如太空攅之如綺縠廻旋曲折抑揚噴伏而不見艱難辛苦之態必至於極而後止此其所以爲逹也而豈易哉漢之司馬遷賈誼其辭似可謂之逹矣若揚雄則未也唐之韓愈柳子厚宋之歐陽脩蘇軾曽鞏其辭似可謂之逹矣若李觀樊宗師黄庭堅之徒則未也於道則又難言也嗟乎此豈可與昧者語哉今之世不幸斯事廢缺頼太史公起而振之一代之文粲然始完人以爲公一儒者於世何所預而不知公之有功於斯世者至大也譬猶星辰之於天鬚眉之於人𥘉無所預然而有之則天象脩而人形妍無則晝夜乖舛而容儀陋劣矣盖公之文一本乎道徳而氣足以暢之當其發難折辯紆餘反覆雄毅弧博雅而不深質而不淺撃刺交前孤弩皆發觀者駭眩失色徐而察之則固從容閑暇如無專時而不失揖譲進退之禮此公之所以服四方之士而有誘民導俗之功者也某之獲見知於公者又何幸哉足下太學一諸生能自㧞於千人之中以得公之稱譽可謂有過人之材矣公未嘗易稱人也公待人雖極恭和苟非其材一言不加許僕不肖猥䝉公之奨引以爲教雖自知不足以當之而心亦私自幸非幸公之稱以爲足也幸不棄於大賢君子庻㡬可勉以入於道耳每患䘮亂之餘英俊寡鮮求其人友之以俱而不可遇故屬心於足下也亦欲相講說以同進於道耳僕性愚憨竊以爲古人之言有是有非是其是而非其非乃爲得之若以古人爲皆然則不可也識者殊少未免爲俗人所笑今足下乃病陸士衡文賦淺狹而有作竊窺叙述大意甚美士衡於道未有知所賦者特當時相尚之文固有志者所不譲足下病之誠宜第其中有不易之論如曰謝朝花於巳披啓夕秀於未振又曰怵他人之我先彼未爲無見但立志有非前人之意乃不然耳然其言之善者亦不可不取世人或不察其立辭之說而徒取其所謂襲凡蹈故綴緝成篇者使論誦之盡氣率不得其句則不知士衡之論故也故繼以爲告足下幸有以教僕僕亦不敢虚辱雖然吾儕之於文辭當法六經區區士衡又惡足置齒牙間哉與錢克温兩年來不獲承候起居每思巾山之㑹爲之悵然吾兄雅士當爲造物所佑而亦坎坷如此殆未易識正宜順處耳僕奉親還謹留此爲别台州府儒學教授尚芳訓導李深黄巖縣儒學教諭文程府學生陳縝葉琰王梅齡臨海縣學生李臨卿戴濬之黄巖縣學生孫思光牟汝鈞校對遜志齋集卷之十一終
