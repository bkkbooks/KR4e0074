  - {type: variant, offset: 13784, length: 850, content: 内則記孝養檀弓著哀思寥寥三代音於此猶見之我欲繪作圖豈乏丹青師丹青狀形體性情那可爲冬夏適温凊芳鮮在盤匜二親未飲食如子渴與飢奈何報木心限以百歲期飛鳥失其巢尚且鳴聲悲創鉅痛亦深衰麻交涕洟聖王爲制禮進退随天時千人萬人心一人心可知譙人夏侯氏有女志獨高夫家盡蕩滅節義終持操荣華昔共享禍患今同遭妾身偶生存志巳埋黃蒿親戚勿訝我人類異羽毛引刀㫁耳鼻見義不見刀至厚莫如地桑田變波濤真金不畏火見此女兒曹結交湏結心取士湏取德古交金不錬古士麟五色如何當世人作事多傾側甘言轉相媚内險不可測青青好禾稼生此螟與螣堂堂羙少年化爲狐與蜮人心天機在利欲日夜昏好苗莫助長惡木先除根斧斤一時緩惡木何由㫁莫畏根株深所憂筋力短吉人語何少凶人語何多多言亦反覆簡黙終無他可磨白圭玷言玷不可磨有口號談天有辨誇縣河心原一巳放觸物生偏頗悠悠百年内荣辱當如何驅車入東洛䇿馬上西京所遇何表表莫非公與卿旌旄出廣路百歩辟人行前駈與後擁不絶如雷轟人生䖏困阨孰不思寵荣此途良足樂此任苦不輕丈夫誓許國身作萬里城永懷鼎足戒母使公餗傾五行各異氣萬物無全材聲當配匏竹味即調鹽梅何噐不適用有根當復培山中多松柏城中多第宅孟嘗千金裘一狐難取白田单拜齊將即墨乘孤危群心傚死闘燕士不敢攴一朝寵禄盛惜身思自持人敵竟不下大㓂空若箕功名毎如此樹立終陵夷國家匪憂危寵爾將何爲動懷首䑕計退與災禍期向非魯連子身死節亦虧鸞凰寡儔匹玉樹少枝柯貴人在高位骨肉苦無多輕車駕駟馬妙舞隋清歌獨樂不如衆中心欲如何東家借一軸西家求一梭織成十丈幕周我堂之阿至親隔咫尺舉首如山河人生四海内同作兄弟看一夫向隅泣滿座爲無歡豈我無衣裳念爾飢且寒豈我無粱肉爲爾不能飱群生本一原有此惻隱端胡爲自汩沒功利日相殘辟如同母兒給之豆與簞奪彼以與此終非心所安飲馬長城窟窟中水無多秋風動百草水靣亦生波長城備外侮室内起干戈非關絶地脉乃是傷人和不見豐水上靈臺欝嵳峩前有大雅詩後有秦民歌鍤塗得苦水流毒如江河黃河西北來云自崑崙坵經行非一山回薄半九州上有不測源下有無盡流萬化同此機不知㡬春秋分明天地心不爲淺狹謀癡人用小計顛倒若無求安得申韓氏化爲古伊周, WYG: ''}
