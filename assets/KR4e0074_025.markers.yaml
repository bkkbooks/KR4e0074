  - {type: variant, offset: 7993, length: 9172, content: 年之别山川阻脩莫遂一會晨夕惟翹企尺素之書稍慰契闊至今未奉一字其於馳戀之懷奚啻飢渴去秋得剡西孫孟昭書知有教翰至東陽煩單宗陽付趙希德轉逹舎下不意希德領書遂一疾不起後問其諸子竟失所在惟增悵恨而已兹會貴邑祁姓啇人詢知使門與其同里葉宅有􅊚聮之雅從而獲審文候動履廸吉賢伯仲均綏多福爲慰僕今歲假舘於金華郡城義士袁仲仁家童冠呶呶遣日學無寸進徒於世有生無益死無聞之憂懼耳視執事賢伯仲德脩而業廣文雄而名振士林者不可同年語矣敝郡斯文寥寥濳溪文脉之遺僅有浦江鄭義門叔度先生檢討叔美先生乃弟叔端先生三數公而巳聚會間談論同門往事未嘗不慨然興歎先師遜志齋及先人諸公之不作而深有羡於賢伯仲能繼斯文於兹時也遜志遺文鄭氏收輯四五冊缺逸頗多長史公每從僕抵貴郡會賢伯仲補完之貧病多故未卜何時可遂僕痛念遜志名蹟日就湮沒欲執事與令兄商確捜輯其學行幽濳生卒始末爲家傳行狀以傳同志有愛慕之心者自能黙識而謹蔵或可待時發揚於萬一此事惟賢伯仲從之久而知之深餘恐未能暴白其志而遜志冥冥間寜無望於賢伯仲乎撰次成幸附便來或躬造義門一遊甚佳遜志表姪鄭季温珣近有消息否或歸隱鄉里執事幸嘱其來與僕一會或可謀往聚寳門旅殯之所負遺骼歸瘞故里此區區之素志必欲行之而未遂也執事幸加深察因祁歸便特此聊逹逺懐餘不能悉惟萬萬自愛以副交逰逺望方先生小傳郡齋舊刻先生方氏名孝孺字希直一字希古嘗以遜志名其齋蜀獻王更之曰正學世稱正學先生逺祖自桐廬徙居寜海父克勤洪武初擢知濟寜府言行政事名一時母林氏元至正丁酉生先生生時有木星堕其所雙瞳炯炯如電甫髫齓日讀書積寸人以其善属文呼爲小韓子十五六時侍父濟寜歴齊魯之墟覽周公孔子廟宅問陋巷舞雩所在慨然有愿學之志洪武八年父𬒳誣逮獄上書政府願以身代不報明年以文謁宋公景濂深驚噐之名流老軰皆讓不敢及會父㘴空印事草䟽將詣闕伸理而父没扶䘮歸葬又明年宋公致仕還浦陽復往卒業凢四載辭歸公㝷徙蜀先生欲往省不果爲文籲天願輸巳壽以延師齡洪武十五年上用呉沉掲樞等薦聘至陳說多稱㫖上謂樞曰方孝孺孰與女對曰十倍於臣上以是不忍輕用諭遣還家數年復辟至上知先生志存教化謂群臣曰今非用方孝孺時乃除漢中學教授蜀獻王延之䖏以賔師恒曰方先生古之賢者也先生久于蜀因得訪宋公墓䘏其孤遺癸酉丙子校文京府三十一牟戊寅大孫嗣召爲翰林愽士㝷進侍講禮遇甚重當是時天下識與不識咸仰之以爲顔孟程朱復岀旣靖難兵下城破嗣君亡文廟納姚廣孝言召用先生不屈死之夷其族時革除建文之五年永樂元年也年四十六所著周易枝辭周禮考次目録武王戒書注宋史要言基命録文統皆燬不傳宣德以還國禁漸開遺詩文始出于世賛曰方先生在當時名重行尊故得禍最慘然以身殉主自其常分而心之安也自晚宋來士習大衰先生無所待而興其志願學聖人慨然以經世宰物爲心謂三代政教鑿鑿可行於今其本在脩身故篤志力行箴儆之道無不備心事皦然無毫髮可疑信子曾子所稱君子人也誠得師孔子將不爲曾子矣乎正學先生事狀臨海陳紀先生名孝孺字希直姓方氏裔出桐廬玄英䖏士宋初徙居寜海緱城里曾祖子野祖烔元鄞縣儒學教諭父克勤母林氏以至正丁酉先生生癸卯毋没時方六歳哀慕如成人洪武􅉝亥隨父知濟寜謁曹國李文忠公公禮貌之期爲國士乙卯父被誣下獄上書丞相府願以身爲軍贖父罪丙辰以文謁金華宋太史公于翰林公視其凝重不遷於物頴銳洞釋諸理有喧啾百鳥中見此孤鳯凰之喜館置左右譚經歴三時會父㘴空印事草䟽將詣闕伸理值父没扶櫬歸葬丁巳太史公謝事還浦陽先生復執經往侍凢理學淵源之統人物絶續之紀盛衰㡬微之載名物度數之變無不言之析於一絲會歸大通毎粗發其端即能逆推而底于極見於論著文義森蔚辭濯然常新未始有竭進脩之功日有異而月不同僅越四寒暑而已庚申之秋歸省祖母公惜别因叙其素有之善朂以逺大之業且曰予所許者不獨在文後二十餘年當信其爲知言辛酉公徙蜀先生往省不獲爲文籲天願以己之壽年輸委乞延師命壬戍秋在郡城會葉林張陳四君子登巾山絶頂縱談千古竟夕不寐先生自以此樂乃蘇子瞻死後三百年所無也癸亥召至京以疾還壬申復召除漢中府學教授有令許至家與妻偕往癸酉閏四月到任時京府啓儲君四川遵蜀王命俱以郷試考文見徵先生辭四川赴京府甲戌春朝蜀獻王道經䕫得謁宋太史公墓而䘏其家王好善忘勢召對不名賜號其讀書之室曰正學學者稱爲正學先生自是書啓往復無虗時其賜教有曰闔門忠義爲百世光華先生謝云惟當克巳慎行益勵夙心體國忠君不負所學丙子考文京府戊寅高皇帝賔天皇孫嗣位召爲翰林愽士巳卯陞侍講命考文京府庚辰復司㑹試一時君臣道合有大制作若省躬殿銘凝命神寳頌御史府記東甌王神道碑銘皆岀先生手是時海宇謐靖幽州兵起先生憂國追惟劉中丞基爲之淚下未㡬天命有歸先生以死殉君至於夷滅不變上距宋太史公惜别時適二十餘年矣知德之深知言之至至是信哉爲文雄邁醇深所著述有僅存者然當時有禁又五十年郷之儒紳始蒐輯成帙鋟梓以傳南安守華亭張弼題其卷後曰篤信好學守死善道宇宙之間僅見此老九原有知亦足以少慰也夫予小子景仰先哲直以甲子書其所信者以示不忘弘治巳酉五月朔成都府正學方先生祠堂記臨海趙淵君子之學曷爲正持其志養其浩然之氣而巳矣是故志立則氣充氣充則人與天一無是氣天地亦㡬乎息矣而况於人乎吾台方先生希直蚤以聖賢自期其言曰學聖人者湏先識孟子學孟子者湏先識浩然之氣又自名其齋曰遜志蓋其平生所得力䖏端在是矣我高皇帝時両召語合稍除漢中教授蜀獻王復數延之尊之曰正學先生於是天下識與不識咸望之若孟子建文初累官侍講與决大機天下倚之若伊尹靖難兵至姚廣孝軰中以烈禍屹不爲動天下義之若夷齊若此者正孟子所謂不能淫不能移不能屈焉者矣非學之正志之篤有得於所謂浩然者耶卒之國禁開於仁皇廣孝奪於今上遺文盛流天下寳之蓋出於人心之同然而不容以終冺者如此頃淵逰蜀謂先生過化之地義冝建祠廼偕僚宷白于都御史唐公鳯儀御史丘公道隆旣𣸪聞于王王曰隆真儒以光我先王余責也於是承奉君周宣陶宣寗儀周琦者𣸪慨然各輸數伯金以襄􅌖德祠成仍題之曰正學初濳溪宋先生客塟於䕫獻王惠王凢両遷之其墓其祠則宋承奉景之所自營者而今祠則其東曠壌也越蜀幽明之遇似亦非偶然者矣嗚呼師生之緒君臣之義列聖列王之德此誠關一代大故而奚可以不書若承奉諸君之効義夫亦人所難者因并及之且以語蜀之多士相與㳺心於先生之學云嘉靖壬辰夏四月旣望祭文貞公文祠在漢中府學和順王雲鳯公博究經史高談仁義動息言貌必揆諸禮法文辭渾然天成浩浩洋洋冩其所得該括萬事慨慕三代之治自任經濟之重立朝未久殺身成仁百千萬年凛有生氣公嘗教授漢中未斬之澤于今猶在鳯按部過此率諸生稱公爲文貞先生㓗除一室題曰正學祠正學者蜀王賜公號也作主祀公俟後之欲知公者有攷焉謹告過侯城里有感金陵魏澤彦恩笋輿衝雨過侯城撫景依然感慨興黃鳥向人空百囀青猿堕淚只三聲山中自可全高節天下難居是盛名却憶令威千載後重歸華表不勝情謁侯城里有感太平謝省侯城里侯城老人死不死萬丈文光射列星正流一派分洙泗忠肝義膽照氷雪烈氣慿慿塞天地神逰帝側騎箕尾行天還整羲和馭寒爲陽和旱爲雨精靈颯爽誰能閟冥交不用覔逢干脩撰王郞舊知巳又謝鐸我憶侯城人不見侯城里悲風忽何來令人淚如雨侯城西薄山侯城東逼海西山不可餓東海不可死千秋萬歲心悽惻竟誰語惟應劒光血夜夜衝斗起又謝鐸欲向西風酹一樽乾坤何處著英魂百年事過風前燭千古名傳海上村香火半龕誰地主孫枝一葉是君恩夕陽滿地傷心淚付與江流自吐吞謁正學先生祠堂吉安袁道我從東南行清風東南至往事垂百年行人口如矢大商有夷齊大唐有王魏稽首拜先生地下知誰愧附家傳故愚庵先生方公墓叛文宋濂嗚呼自我齊國文公紹伊洛之正緒號爲世適益衍而彰傳道受業者㡬徧大江之南而天台爲極盛時則有潘子善氏林叔恭氏趙㡬道氏兄弟以及杜仲良氏如此者不能徧舉皆見而知之推原體用之學敷化弘治而風動於四方重徽疊照於斯爲至流風遺俗迄今猶有未泯若我愚庵先生方公其殆聞而知之者歟先生諱克勤字去矜姓方氏其裔出睦州玄英處士干宋初十五世祖廿四府君某始遷寜海侯城里曽大父重桂郷貢進士大父子野父烱元鄞縣儒學教諭母葉氏宋丞相夣鼎從曾孫女也先生㓜而端凝五歲知讀書自辨章句十歳暗記五經諸老先生嘖嘖愛賞目爲神童年垂弱冠徧窮濂洛關閩遺書及㝷郷先逹授源委凢渉性命道德之秘窮研探索寢食爲之㡬廢因喟然歎曰爲學必合天人而後可舎是非學也至正甲辰甞一踐塲屋言國家利害峭直無所顧忌有司不敢取飄然東歸益閉戸潜心于一卦一爻必欲驗諸事爲至於天文地理禮樂刑政及制度名物之屬亦辨析歸於至當如指諸掌會海民爲變江浙行中書檄呉江同知金剛奴募民爲水兵先生詣金剛奴謂曰民計窮而爲盗未爲盗者亦挻挻欲動柰何授之以兵是謂增盗非禦盗也金剛奴怒不荅旣而水兵果於中道殺護吏逃去從盗金剛奴踰垣走折一足始悔曰吾不從方先生言以至於此未㡬侍御史左荅納失里至郡招諭劉都事基爲之副先生上書陳勦殄之畧不宜姑息都事韙其言而不能用遂致郡縣䧟沒民罹塗炭先生發憤入山谷採松栢食之累日不返當路延先生入幕府先生謝曰我辟糓久矣弗足與人間事也呉元年冬大明兵取台州先生欣逢真主之出乃大有爲之時䟽舉賢才安人心黜豪強除暴歛明教育十餘事將上之未果洪武二年詔立郡縣學以訓導辟先生樂於育才即起應命負笈來從者至百餘人先生據經陳義曲暢旁通㡬無毫髪遺憾聞者皆皆淪肌浹髓薫爲善良俄以母夫人春秋高力辭而歸諸生追之者踵相接學舎爲空四年夏朝廷聞先生賢欲致之部使者袁君宏以書幣來徴先生以母老不忍離左右辟去旁縣郡承使者風㫖雜逮婣連督索之先生上京師两詣執政固辭執政竒先生材命就銓曹試考覈入格名列第二上特命知濟寜府事階朝列大夫錫之冠帶以行先生至官爲書一通懸於康衢諭上愛養元元之意民有所不平詣府自言禁吏胥不得呵問日引耆耋㘴語訊以得失郡學官缺孔子廟堂頽圯聘前進士爲師弟子貟有未備者選𥙷之役浮屠以葺廟堂廟南鑿爲泮池傍列两序闢射圃於廟北造弓矢樹正鵠日一再視學親爲正句讀較中否属縣之内社各立學學凢數百區學子繫籍者二千人兵後號爲最盛始有詔民闢廢田者閱三載乃稅吏徼近功不俟期歛之復以田定起科繇民益隋田不增闢先生與民約定爲簡書列爲丁産爲上中下三等等復柝爲三毎有徴發恒視書爲則吏不敢並縁爲姦歲且暮轉戎衣于燕時有令役民舟者有誅别郡以牛車從事天雨雪牛僵死于道破産者十八九民請以舟就役僚佐畏令難之先生曰吾知從民便抵法非所辭也即載以舟具白山東行中書省省義不問郡倉絶糧省檄民七百里轉粟青州民病不能適漕運者自淮安輸濟南道出郡境先生欲就輸郡倉而俾濟南致青州告于行省弗聽即以聞戸部戸部奏可行省臣愧之郡城壞故事築以兵指揮使挾貴人勢當五六月聚民萬餘治之民不得田哀號而即工聲聞數里先生奮曰民病不救惡用二千石爲宻聞中書同官疑且得罪不敢署名先生獨署之胡丞相惟庸以聞即日詔罷先是不雨先生袒跣徧禱群祠涕泣卧祠下誓不雨不還至是詔下民驩呼而散大雨如注是歲五糓俱熟民歌曰孰罷我役使君之力孰成我黍使君之雨使君勿去我民父母自是連三歲三禱皆有年五年秋隣境盡蝗先生省愆變食稽首告天夜聞空中甍甍聲燭之乃飛蝗蔽天而過郡獨有年民有赴愬者隨事則决大者笞辱小者諭遣之不㽞案牘尤慎於庻獄月録日省不使久淹或文有未具時作麋徧食之夏秋之稅毎命斛卒持槩高下岀其手或至累旬不収民競指倉爲穽先生令民自槩斛卒歛手不敢出氣遇將西成預移文與民期民爭來輸不遣一吏而稅常先登江西浙西二行省運糧百萬濟寜水陸數千里先生視如部民不使有錙銖怨懟舊比毎斛益四升以禆蠧耗先生憫其道逺言于朝蠲之府召州縣官屬皆役皁隷往往索賂無厭先生下信符置郵無敢不至者信符之籍以印識而中分之吏托月日稽違以媒利先生私蔵之緩急有程一自巳出復行其法於封内壹以信符召民民得竟并力耕桑襁負來歸者相望于道初赴官時戸僅三萬稅萬餘石三年之後稅以石計者十四萬四千七百戸亦增至六萬有竒二州二十縣家有積粟野無餓莩羊牛鷄犬散被郊垌富庻充實如承平之世至於社禝山川諸祀先生脩崇壇壝嚴飾噐服或樹名木於周垣之外一如儀制無有所闕水驛在西門内庳陋汚濕居者弗寜先生料揀材木候農之隙更作於城南庭堂室房弘敞逾昔冬寒河凍驛舟不行令舟人伐木爲炭穿土穴蔵氷因其餘力以成事功泗水經郡城南通淮江北引河濟地勢高㵼搆石爲牐而時畜洩之魯橋棗林二牐歴歲久壞石填河中舟道難之役牐丁絙壞石治灰而甓之故以葦囷庤粮火屢爲災教民爲陶瓦營屋百餘間申戒火令編民居爲曹伍遞相救恤其患遂止大將軍魏國徐公逹副將軍曹國李公文忠統士馬十萬之燕駐郡稍久要官勢吏爭索粮芻相膠葛于前先生依序酬决無不如意一軍稱能永嘉侯朱公亮祖將舟師數百艘北征河水涸舟膠不可動脅先生曰即趣五千夫浚河否則以軍法論日且暮先生不忍煩民泣禱於天夜二鼔天雨黎明水起數尺舟竟去莫有言者先生爲政以風化爲急務以德勝佐貳始雖倨慢先生委誠待之卒自愧服武夫悍將不知禮久亦化戢在官縱無事終日冠衣㘴堂上召諸吏授以書詩法律或公牘堆几群辨方譁先生片言折之各心恱而去性不喜近名常自誦曰近名必立威立威必至害人吾不忍爲也府庭之間不陳杻械革鞭懸楹間示不妄罸省憲考績爲六府最八年春入朝皇上以爲善治民錫燕儀曹使踐其舊軄瀕行奬諭有加且曰政成當顯用卿秋八月知曹縣事程貢嘗以不軄被笞心衘之上封事言狀詔御史楊某廉按楊適程故人恐程㘴誣罪易民服潜索先生過事踰両月無所得乃捕府中卒吏盡繫之搒掠無完膚無一可問者楊更與其吏謀誣先生用倉中灰葦時十月固未嘗附火而葦則苫公宇垣實無私用者先生不與辨遂就逮民號呼填道随行百餘里者將千數先生次子孝孺上書政府大臣願以身爲軍贖父罪不報竟謫役江浦㑹空印事起吏又誣及之孝孺復草䟽將伏闕上訴而先生殁於京師九年冬十月二十四日也壽僅五十又一孝孺與兄孝聞奉柩東歸十年春二月二十四日窆於縣東北深灣童施山之原禮也先生娶林氏諱姬婦道爲一族冠先十五年卒至是合塟生子二人即孝聞孝孺孝聞年十三居母之喪不肉食至服除人以純孝稱之女一人再娶王氏諱在生女一人未彌月而王卒少房董氏育之董氏生子一人曰孝友二女皆在室未行先生靣自如玉須眉秀整不妄咲語動容周旋必合禮法兵亂負母逃入深谷両踵血流遇二弟訓育備至終身未嘗失色與人交率真任質不事表襮不以久近爲冷熱立談之頃洞見肝膈南冠過郡者必以米醪饋之不能歩者僦舟車送之萊蕪丞陳川欲迎毋爲養厄於無貲出錢五千助之同列以事奪禄買布帛給其用且日延之對食久而不衰脫逢其飲醉投案太詬而去待之益恭及酒解來謝陽若不知者曰昔之夜吾亦醉矣不識君何謝也生平奉養簡素不服紈綺御一布袍數載不易日不再肉不治官事輙却肉不食所守㢘甚絲毛不取諸人毎行縣以物自隨杯湯不肯受兖州守因童進二水瓜笞童十召州吏還之郷人有爲饒陽令者以燖雁侑書力却去乃巳初至官時禄米一斛可易金三両以軍食告乏月取十斗爲食餘悉儲于倉或尤其迂不恤也晚年益加畏慎晝所爲之事夜則白於天俯仰皆無愧怍榮辱利害恒視之若一坦然不疑古所謂體道成德之人先生誠庻㡬焉其爲文章質而不華平而中理有汗漫集若干卷傳學者云濂私自念齊國文公之薨殆一百七十又九年而其學䆮微譁世取寵者徒剽掠爲談辨誇多闘靡者務組織爲篇章文公所以扶世教淑人心者率棄爲空言故其臨事之際仰攫俯拾唯恐利不入槖至有庸夫賤豎之不屑爲者嗚呼可嘆也巳有如先生聞風而興乃能誠求實踐參前倚衡儼若上帝鑒臨􅉼養旣純發舒自異仁民善俗之政至今人人能道之大命雖止於斯而其率性會道無愧於文公者尚皦然弗誣也孝孺久從濂受經頗知先生行事之詳於是歴叙其故而繫之以銘銘曰堂堂齊公命世之雄伊洛正傳實爲大宗入天出人完傳翼經有遏必䟽無幽不明疇不皷篋千里來過燦如聚星惟台獨多流光所及寜有翳昏掲彼日月輝于天門逝者沄沄滅景銷聲不有人豪聞風孰興猗歟先生行知尊聞養氣弗餒充乾塞坤實孚名随上徹九天鶴書翩翻降於丘園爰自布韋專城以居象笏朱衣於赫其儀寵恩之加其廣無垠曷以報之誓不顧身敷宣帝仁逹于齊垊以煦以嫗以致其亨民或勞只如魴之頳乃平更繇俾遂其生黠胥舞文其貪若狼乃障乃防而扼其吭人相告言久嬰亂離父母孔邇我胡弗歸十百爲群其來如雲操􅍏耰鋤以播以耘我行其原萬桑沃然俯瞰于隰黍苗芊眠鄰多孽蝗刺天而飛避不入境絶類有知真儒之效小試則殷誰曰漢吏專羙其循太龢薰蒸郁紛輪囷自此而升何澤弗臻大命止斯傷如之何視天方高淚如懸河我又奚嘆數竒則然中心無慊生順死安善人殄瘁斯道之衰顧瞻無依胡寜不哀崔崔者岡渺渺者陂其中有墳千載之悲方希學傳方孝聞字希學先生伯兄也少有至性年十三䘮母輙稽典禮䟽食水飲彌越三年及父卒㫁酒肉居宿于外祖母亡亦如之毎一號慟聲盡氣極嘔噦岀血扶而後起於是䆮成羸疾行歩傴僂然守禮益確親戚郷閭莫不稱爲孝子家素貧窶一錢寸帛不私妻子奉尊撫㓜衣食賓祭喪塟婚嫁費用百出經理補葺以身任之曲中儀節儉而不陋平居未嘗去書徧學五經而䆳於易精求聖賢㫖趣由致知而誠身由親睦而愛物務䔍踐履不爲空言發爲文辭理深意逺存心仁厚接物和恕里中有争訟者不至郡縣而相率以質是非開以一言莫不恱服德器完精才具優長通逹世務議論甚偉先生嘗曰某所以粗知斯道者非特父師之教抑亦吾兄之訓飾也卒于家見修史私録及赤城新志石龍集方希詩方孝友字希先生季弟也舊傳文廟召先生草詔不屈親屬皆就戮先生目之不覺淚下孝友乃口吟一絶阿兄何必涙澘澘取義成仁在此間華表柱頭千載後旅魂依舊到家山士論壯之以爲不愧先生之弟云方氏二烈女傳臨海章嶽正學方先生一門四節之盛世所共知而二女子之死則或未知先年天台老儒西軒王宗元九十歲時與石梁王君度言嘗授經烏傷山中有祝監生者老矣謂及見西楊閣老嘆方先生二女當先生死時年俱未笄被逮過淮相與投橋水死其事甚烈當時西楊欲爲傳未就西軒以属王君曰子可遂成西楊之意後石梁由南部岀守建昌亦未及爲當時嶽與石梁之子㣧東實與聞之兹因重刻先生之文録此附載集中以見先生篤學守道不貳􅍏心而死君難精誠薰浸家庭閨閫間雖二小女子臨變赴義視死如歸不懾不回與先生伯仲之死同烈者講之素定也或者人得併觀於此益徴先生立言無虚語真足以昭方來起後學不惟見道化攸孚且使人知反身激厲處常變兹心則同當不忍以丈夫子愧于方氏之二小女子云嘉靖庚申仲冬新刋正學方先生文集序臨海趙洪洪自髫年聞諸老成稱先生之道德文章岀乎天性始生之夕有木星堕於其所雙瞳烱烱如電弱冠日讀書積寸從金華太足公游時所收皆天下士先生五經百家皆巳醖藉下筆翩翩盡聖賢膏腴公深驚器之以爲莫之與京􅍏考守濟陽坐累先生數請以身代獲原洎應詔擢蜀府教授引道匡主獨秀於玉葉中㝷用交薦内閣一時倚重凡將相間所爲惟先生之咨四方夷裔得一字珤於至璧晚路碕危皎皎大節出人所難先生易之今猶薰灼耳目也噫先生之淑履如此冝天有以培祐之而澌蕩慘於無遺如此豈理也耶自古有然又何云異先生之文撰述最多大足以包天地近不離日用之常皆雋永乎道德之語而意獨至而其論辨之高逺超昔賢之見今其縹囊儲牣不可得而覩矣幸而掇乎嘘燼之餘所謂存什一於千百者也中間在蜀之作皆友人侯君邦彦得姑蘇編脩陳公之所傳録與夫博采士夫間之記誦凡詩文二百六十七篇吾鄉之士肆畏道􅍏事什襲珍蔵無由裒采洪竊惟春陽已舒江漢旣濯應不屑於毛疪矣廼於寒暑之暇捐俸募工繡梓以圖壽傳悉手所繕落於天順六年六月望日考於次年四月望後一日也尚恨孤陋寓僻乏好事同志與之共成而諦訂焉魯魚中存凡經目者其加宥正又當知先生之文不冝以文視文而以之求道得先生之心可也雖然先生之功德固不資文章以顯先生之文章亦不假洪以傳然洪之所以疲於僣盭而不少爲輕重者特爲吾郷餼羊之計云爾苟居隱墅而如是存德義以善里閈歴仕階而如是持忠節以奠朝社庻乎不忝所生而可以闖聖藩矣或者典刑具存豈非鄕人之美觀也哉豈非先生之敷錫也哉又惡知非先生之所望於後人之志哉凡我知愛苟私所遺惠然輻凑洪當倩巨筆以書成美敢蝕厥雅邪時天順七年歲次癸未夏四月望日新刋遜志齋集後序謝鐸右遜志先生文集三十卷拾遺十卷爲文千二伯首總若干萬言於乎先生之文不見於世也久矣天順中趙教諭洪實始鋟梓以傳旣而鐸與文選黃君孔昭頗加蒐輯於是葉文莊公盛秋卿林公鶚王忠文公之孫汶諸所傳録者皆稡焉旣又從柳别駕演盡得常人之所蔵者視昔蓋不啻倍蓰而先生之文乃始稍稍以完今年春寜海令郭君紳聞之以書來曰先生邑人也是不可廢願益得以傳諸梓鐸與文選君亟喜而授之或者曰先生之功業雖不盡見於當時其道德在天下蓋有不可掩者文直其餘事耳而又何以其傳不傳爲先生意哉鐸曰不然文者道德之著而功業則又文之見於行事者也伊周孔孟之道德功業盛矣千載之下匪由斯文之存曷從而知之又曷從而傳之乎且至大如天地至明如日月其疾徐之度盈虗之數猶必有待乎人而况於人乎故欲傳先生之文者非徒爲先生計也爲後之人慕先生之道德欲盡求其功業而不可得者計也先生之文非吾台所敢私亦非予小子所得而贊特以著令尹之志於不忘且以告夫天下後世知誦先生之文者令尹又嘗即先生故居求所謂祠堂者而新之蓋洪熈初先生之遺族得從寛法而爲之者也常本舊稱遜志齋集者訛缺爲甚謹具存之不敢别有所更益教諭之編有的知其非岀於先生者乃不敢取其曰正學者蓋蜀獻王所賜遜志則先生所自號今并入之以復其舊而其續得者當更爲别録云成化巳亥冬十月朔新刋遜志齋集後序黃巖黄孔昭孔昭自㓜習聞先生之名於郷長老私謂先生學本天成非人所能及也旣長稍知向慕求先生遺文而讀之則知先生之學雖浩瀚如江海運動如日月變化如鬼神而其所言無一不出乎日用彛倫之常蓋皆愚夫愚婦之所能知能行而天地聖人之所不能外嗚呼先生之學固孔子孟子之學也學者欲學孔孟之道孰得而後之哉惜其遺文散佚天下僅見趙教論刻本孔昭乃與謝侍講鐸日加訪采而其邑之秀彦猶能各以所蔵來告遂合葉林二亞卿王李二中書與柳常州之所得者彚次之而是編成焉於是先生之文亦庻㡬其全矣然先生之學巳不愧存殁文之全不全亦奚損益哉惟吾後人小子欲求先生之道者非此則無以考其全也集旣成福建林僉憲克賢寜海郭縣尹紳各以書來請壽諸􅎚孔昭與侍講圖斯文永乆莫如先生桑􅎚之地故奉以属郭尹郭尹又蒐訪於其邑得詩與文若干首附益之方經畫召工而金義士明陳訓導熈鄭學究公詢秀才楊顗金逺軰咸奮義助相校書董治各有司任不日月板將告成嗚呼於此又可見先生德澤之在郷邑者愈久而愈不忘也雖然是集也㧕豈吾台人所得而私之哉庸書諸末簡以告天下後世之欲知先生者成化十六年庚子夏五月朔日書方正學遜志齋集後張弼二十年前瑞安楊元霽知吾華亭嘗岀方先生遜志齋藁見示乃録本也且道先生大節頗詳謹讀而妄書其後曰篤信好學守死善道宇宙之間僅見此老後得刻本則又加多竊謂孔子此八字而豈過也乎猶以見之未盡爲恨今年二兒弘冝知寜海乃先生之闕里也得全集十二本寄南安秉燭疾讀掩卷深思如讀程朱之集喜而忘寐而又不覺涕泗之交零也嗚呼學之正養之充行之確而此八字未爲過也三代而下可考其詳者大節或有之所養所學恐未逮乎當時有以歐蘇擬之者冝其弗屑也我朝以宋濳溪楊東里爲文章稱首然恐亦不當出其右乎於乎以文章家目之殆非先生之知巳也於乎九原可作舉世皆當奔走爲之執鞭如遇孔子不知以三仁許之乎嗚呼成化十八年壬寅五月之吉書重刻遜志齋集後先生王者之佐于時以彼其才易服就列宜致卿相之位究􅍏謨猷頋豈與唐王魏者等先生不此之碩悲椘抗激至磔身沈族而氣不少回凢以存君臣之義爲天下防也嗚呼忠哉抑有功於昭代深矣雖報䘏闕然而遺文盛流斯固列聖之惠與文始集于趙學諭洪至禮部尚書謝公鐸工部侍郞黃公孔昭益廣捜之得若干卷刻諸寜海木今慢矣乃會黃叅軍綰應吉士良趙大行淵刪定僞謬重刻斯編以行于世俾知夫奮大忠者本如此云正德庚辰仲冬朔守台後學姑蘇顧璘識臨海縣知縣黄誥黄巖縣知縣張師善台州府儒學教授尚芳訓導李深黄巗縣儒學教諭文程府學生陳縝葉琰王梅齡臨海縣學生李臨卿戴濬之黄巖縣學生孫思光牟汝鈞校對遜志齋集卷附録終, WYG: ''}
