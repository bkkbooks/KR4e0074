  - {type: variant, offset: 4, length: 7992, content: 附録中順大夫浙江按察司副使奉勅提督學校雲間范惟一編輯奉政大夫浙江按察司僉事奉勅整飾兵備南昌唐堯臣校訂中順大夫浙江台州府知府事前刑部郞中東呉王可大校刋蜀王賜方漢中書二首公西州之冠冕有識者無不心恱誠服而新學晚生亦有所依歸也余一日不見有如三秋况在逺道乎先民有言能自得師者王又曰務學不如務求師良有以哉予以眇躬藩衞宗社之重亦必慎柬賢良以僃頋問爾懿文清節有東漢之風尚志立言爲當代之重秘閣閱書燕閒賜對經帷進讀道德坐論矧乃郡庠之責學課之繁别旣數月良非得巳忠言嘉謀予所饑渴竭乃心力副予眷待遣書指不多及蜀王送希直先生還漢中詩嵋山峨峨江水泱泱我疆我理俾民以康靡言匪衣靡善匪得閱士孔多我敬希直謙以自牧卑以自持雍容儒雅鸞鳯之儀有學有識乃作乃述追之琢之金玉之質侍我經筵不倦以勤非德不言非道不陳軄思其歸義不可奪采采者芹伺教如渴爰抹其馬爰振其衣拜手稽首載辭而歸昔之來也春日遲遲今之歸也凉風凄凄悠悠我心念子良苦爰命辭臣飲餞江滸王道如砥旣歌且詠八月初吉抵于南鄭沔彼江漢亦合而流瞻彼岷峨欝其相繆心之知矣臨别繾綣子如我思道豈云逺歳行在子文闈秋開較藝至公遲子西來蜀王賜方教授詩三首伊昔開東閣相看眼獨青文章奏金石衿佩覩儀刑應世逰三輔焉能困一經前星垂炳耀染翰侍􅊮庭聞說眼空天下士只疑身是洛陽人少年有學談仁義高論無慚問鬼神九載之官看教育萬言詣闕聽敷陳曵裾巳在長沙日知巳相逢此志信四十雖聞不動心平生冨貴豈能淫屢蒙論薦來天禄自負文章入翰林養望也湏添白髪觀光仍遣教青衿河間好古嗟予慕多士從逰愛子深蜀王送胡志高赴漢中兼柬方希直二首趣裝何䖏去驅車赴漢中欣然逰大郡况復依方公問學日盗愽道德日益隆丈夫志逺大那肯局樊籠他年居舘閣歩武接䕫龍胡子蜀中士受公知更深不憚三巴路欲成仁者心伊昔韓門士籍湜蒙賞音朂哉今胡子願無媿鄭林鄭公智林良顯蜀王讀基命録武皇稱汲黯近古社稷臣卓乎天地間百世有餘芬宋公廊廟姿志慮殊精純由來慕前烈願學在斯人雖䖏江湖逺擬欲踐臣鄰苟非堯舜道肯向黼扆陳嘗咲賈太傅前席對鬼神著述累萬言所言皆歸仁爲君觀此書四海属經綸爲臣觀此書有術能致君聖賢友多聞我亦忝嘉賔持此以贈我讀之至夜分撫卷再三歎良可嫓典墳送方生還天台詩有序金華宋濳溪濂古者重德教非惟子弟之求師而爲師者得一英才而訓飾之未嘗不喜動顔色此無它天理民彛之不能自巳也予以一日之長來受經者毎有其人今皆散落四方黍稷雖芃芃不如䄺稗之有秋者多矣晚得天台方生希直其爲人也凝重而不遷於物頴銳有以燭諸理間發爲文如水湧而山出喧啾百鳥中見此孤鳯凰云胡不喜越一年别去感慨今昔又云何弗思退朝之暇懸燈黙坐因發於聲詩一十四章以送之末章用來字者冀負笈重來以迄於有成也詩曰北風何逶迤雪花大於手之子有逺役忍勸尊中酒念子初來時才思若繭絲抽之巳見緒染就五色衣被之行儒林孰不生豔慕蹮蹮媚學徒二歩一回顧余生老且至秋髪垂两肩得之喜欲舞如獲寳珞然素編躭清晝青燈坐深夜探玄欲忘寢薦味如啖蔗一朝别我去何以釋離憂不禁秦淮水流子江上舟但願逆風起吹舟不得往共穿鍾阜雲時看白石長風本無情物豈能知我心事旣不得諧贈言如贈金湏知九仞山功或少一簣學貴隨日新慎勿中道廢群經耿明訓白日麗青天苟徒溺文辭萤爝欲爭妍姬孔亦何人顔靣了不異肯堕盆盎中當作瑚璉噐不見金谷園瓊芳委塵沙㤗山有喬松老幹凌蒼霞四海皆兄弟知巳獨難遇伯樂倘不逢鹽車厄騏驥明年二三月羅山花正開登高日盻望遲子能重來洪武九年冬十一月書于蘿山石室精舎送希直歸寜海五十四韻有引濳溪洪武丙辰予官禁林寜海方生希直以文爲贄一覽輙竒之舘寘左右與其譚經歴三時乃去明年丁巳予蒙恩謝事還浦陽生復執經來侍喜動于中凢理學淵源之統人物絶續之紀盛衰㡬微之載名物度數之變無不肆言之離析於一絲而會歸於大通生精敏絶倫每粗發其端即能逆推而底于極本末兼舉細大弗遺見於論著文義森蔚千變萬態不主故常而辭意濯然常新衮衮滔滔未始有竭也細占其進脩之功日有異而月不同僅越四春秋而巳英發光著如斯使後四春秋則其所至又不知爲何如以近代言之歐陽少師蘇長公軰姑置未論自餘諸子與之角逐於文藝之塲不識孰爲後孰爲先也今爲此說人必疑予之過情後二十餘年當信其爲知言而許生者非過也雖然予之所許生者寜獨文哉庚申之秋生以不見大母者久將歸省焉予深惜其去爲賦是詩旣揚其素有之善而復朂以逺大之業云詩曰昔在辭垣時英才常駿奔水碧與金膏價重駭見聞終然無根蒂歛散空中雲方生海來上玉立而春温袖携絺繡書靣帶黼黻文揖遜入禮域陳義凌秋旻同飡大倉粟共勘典與墳濳深索幽䆳穹高攀嶙峋踏雪忽言别渉險航江津梅花似相憐沿途慰孤貧湛恩來九天憫我髪如銀特敕還故山許與煙霞親生聞抱經來䖏此寂寞濵􅐯蒼扣無始溟滓窮無垠宇宙所管攝載籍所敷陳終始鈎鉗之若大樂建鈞律吕按高下宫商肅君臣鬯和免惉懘疊奏歸繹純桑濮唉麾斥滛哇竟何存黃鍾壓瓦釡庭燎滅鬼燐似兹稽古力可敵戡定勛濡毫寫雄顥勢足移峨岷漏泄渾沌竅出入造化神變幻波起伏凊温玉璘珣盡抽神竒秘不堕臭腐塵所以日出之愈見光景新山鬼當洒泣湘靈且逡巡振古著作家後先各􅌭紛豈知萬毛牛難嫓一角麟古今二千載有如星在晨豈意瓦礫中見此席上珍予生髮未燥立言鄙河汾結交一世士暮齒越七旬妍媸與苦良入目無留痕自非病狂藥顛倒甲與􅚙寜因一學徒䛕辭浪云云大言心不怍秪爲所見真生今省行期序飲松竹根咲摘黃金花起泛青瑶尊酒酣两耳熱劇論如抽緡寜無贈别言有志湏當遵真儒在用世毋徒滯彌文文繁必喪質適中廼彬彬有虞號多士九官展經綸惟時亮天工外夷悉來賔不聞有著書鼔蕩摩乾坤生乃周容刀生乃魯璵璠道真噐乃貴奚湏用空言孶孳務踐形勿負七尺身敬義以爲衣忠信以爲冠慈仁以爲佩廉知以爲鞶特立睨千古萬象昭無昏此意竟誰知爲爾言諄諄毋徒謂強聒一一冝書紳洪武十三年庚申秋九月吉日先生與伯欽書云太史示予此詩未嘗以示人蓋以其知者少故也今特録寄吾兄前軰勉後學惓惓之意不特在乎文辭而巳望相與勉之䟦太史公送方希直還詩臨海林佑公輔天下之士不能皆賢㧞其尤賢者而訓廸播揚之則天下之未賢者亦將觀感而興起矣此善教之道也孔子論仁論學之際一則曰顔子二則曰顔子而三千之徒亦自以爲不及日夜勸勉求其所以爲顔子者終聖人之世雖庸才末學聞風而起者皆有所成非教者約而所成者愽哉苟不擇賢愚槩而進之非惟彼未有所悟而我之教無廼屑屑矣乎當今之世去聖人巳逺執聖人之道以戸牖天下者太史公一人而巳天下之士登公門者奚趐千數而公許與之間特於希直深有望焉觀所贈詩拳拳之意蓋可見矣雖然使天下之士其立心其操行其爲文辭誠如希直者公之心也幸而僅有焉又烏得不深望哉又烏知所望於希直者不爲天下學者之所望哉吾知此詩之作不特於希直見之又臨海葉見㤗夷仲見㤗視宋太史公以年則父兄也以道則師也少爲學子時常思從公逰而不可得洪武初自安南還始拜公京師公一見即呼爲忘年友而不屑以師父兄自居頗疑公有所惜旣而侍公者數月辨論􅒑誨未嘗不爲予盡乃益服公學鉅德溥信乎其爲一代偉人而非蕞爾小子之所能測也其後爲廪禄所縻挈挈然往復南北雖或間至京師一再見公而不得久嗚呼公今不可作矣閱其遺稿輙澘然出涕公高第方君希直性孝友爲文章雄邁醇深登公門者皆莫能與之齒公特鍾愛之雖親子姪弗及也在金華時嘗辭歸省公作詩二百餘言送之所以期望之甚重今年冬予與希直同徴赴亰師希直於舟中出以見示相與收淚讀之予且衰愧無以荅公之知希直方富於齒尚益自力以求副詩中之所稱也夫洪武十五年長至日又同邑郭濬士淵濬事愚菴先生時希直年纔十四五操筆綴文固巳不凡後希直從先生守濟寧由京師還值予武林出示今太史公所贈詩觀其􅒑勉属望之厚情詞藹然濬疑天下能文之士莫不以得出太史公之門爲幸如希直者冝非一人而希直以童冠之年厠於其間獨何道以致此哉去年冬太史公來朝往拜之頃復得與希直晤叙且得盡見其所謂遜志齋稿文氣渾成識見卓邁動以聖賢自許其身不但言詞之古而巳然後知希直之致此者有在也雖然古學不明久矣世之人以時代觀人而不知今之可以爲古故特逹抱負之士恒見累于多口是雖習俗與時移易抑亦吾道未有以信之爾希直尚益勉循古道興復古學不負太史公属望􅒑勉之意使先生之學大𬒳于世斯爲善爲人後矣惟希直念之染說金華蘇伯衡平仲凡染象天象地象東方象南方象西方象北方象草木象翟象雀以爲色取蜃取梔取藍取茅蒐取棠盧取豕首取象斗取丹秫取涗水取欄之灰以爲材熾之漚之暴之宿之淫之沃之塗之揮之漬之以爲法一入再入三入五入七入以爲候天下染工一也於此有布帛焉衆染工染之其材之分齊同其法之節制同其候之多寡同其色之淺深朙暗枯澤美惡則不同其深而朙澤而美者必其工之善者也其淺而暗枯而惡者必其工之不善者也蓋天下之技莫不有妙焉染之妙得之心而後色之妙應於手染至于妙則色不可勝用矣夫安得不使人接于目而愛翫之乎此惟善工者能之非不善工可能也夫工於染者之所染與不工於染者之所染其色固有間矣然雖工者所染之布帛與天地四方草木翟雀其色則又有間矣無他天地四方草木翟雀之色二氣之精華天之所生也天下之至色也布帛之色假乎物采人之所爲也非天下之至色也學士大夫之於文亦然經之以杼軸緯之以情思發之以議論鼔之以氣勢和之以節奏人之所同也出于口而書于𥿄而巧拙見焉巧者有見于中而能使了然於口與手猶染工之工於染也拙者中雖有見而辭則不能逹猶不善工之不工於染也天下之技莫不有妙焉而况於文乎不得其妙未有能入其室者也是故三代以來文者至多尚論臻其玅者春秋則左丘眀戰國則荀况莊周韓非秦則李斯漢則司馬遷賈誼董仲舒斑固劉向揚雄唐則韓愈桺宗元李翺宋則歐陽脩王安石曾鞏及吾祖老泉東坡頴濵上下數千百年間不過二十人爾豈非其妙難臻故其人難得歟雖然之二十人者之於文也誠至于妙矣其視六經豈不有徑庭也哉六經者聖人道德之所著非有意於爲文天下之至文也猶天地四方草木翟雀之爲色也左丘明之徒道德不至而其意皆存於爲文非天下之至文也猶布帛之爲色也學者知辭氣非六經不足以言文玄非天黃非地青非東方赤非南方白非西方黒非北方夏非翟緅非雀紅緑非草木不足以言色可不汲汲於道德而惟文辭之孜孜乎天台方希直從太史宋公學爲文章其年甚少而其文甚工不惟同門之士未有及之者自朝縉紳以至四方之老成凡與宋公友者無不推許之以爲不可及余每過宋公退即希直讀其所爲文未嘗不擊節而歎其有得於文之妙也今希直將歸其郷大肆其力於文故因以此勉焉余自蚤歲徒盡心於文章垂五十而迄無成不知自勉乃欲勉希直寜不知愧然希直得余說而及時以道德自任則又何至予哉此予之所以致愛助於希直也洪武十九年秋八月望日古詩贈希直葉見㤗吾友方濟寧其人世希生有如炎燉之雪曙天之星平生特立不徇俗窮年矻矻惟究心乎羲文周孔之遺經一旦起作郡卓然爲群黎之怙恃列牧之儀刑九原長往不可作使人思之泫然雙涕零我言濟寜今不死濟寜有子字希直外焉才華巳絶世内焉持敬恒惺惺往年我謁宋太史見之坐右愛其風神秀發目光如月雙眉青太史文章擅中土東播踰若木西流入麊泠毎稱希直禀間氣旁馳餘子猶以清渭臨濁涇太史猶巨鐘而我猶寸莛我誦蕪陋辭一一爲我側耳聽只今逺行不可覿送入樊籠仍剪翎我歸巳五載俛首類拘囹每一念疇昔中心若生螟今年希直忽相過使我洒淚如醉醒握手塵市中頋影两蛉䧺文細字塞巨帙咄哉著述能爾馨振𬒮快讀不可了雅辭宏論開心扄其顯遏雲漢其幽通窈㝠贍如戈甲積晉庫竒如盤鼎鐫商銘麗如勾芒青春布花卉壯如隆豐白日驅雷霆千流萬派怒奔放終然帖帖趨東𬈑頋我歛退餘守口動如瓶今日得子文躭誦不暫停有如赤日途觧渴得楚萍又如藜藿膓忽咀五侯鯖瑣瑣彼何人廼工月露形劃然周廷覩巨燎光影不復窺微螢嗟哉希直執經太史門聞禮濟寜庭以文比行行益峻持以用世不啻如養生之糓粟濟疾之參苓胡乃僻處東海裔坐閱晦朔彫堯蓂我欲其爲不朽計鋩鍔淬礪重發硎至音詎能秘錫鸞荅和鈴直湏上追虞書嫓周雅豈肯下比秦誓方魯䮐于以作春秋之羽翼爲禮樂之藩屏嗟哉載道噐孰謂在世猶芻靈上帝閱世憫斯文寜復下取敕六丁水爲江漢星作斗鐫之金石垂千齡洪武十年夏五月吉日送希直逰金華同邑許繼士脩良㑹古所惜光景不可留故人今有行岀門復悠悠晨鷄號逺陌行色滿道周惻愴意莫宣慷慨意難酬願言力古訓所貴德業優千里從明師豈徒事逺逰川原渺何極仰止在山丘余生學苦晚賢哲忽我尤頋乏馳騁力重增離别憂遙遙金華道逸駕邈難儔瞻望两相失從君去無由願爲東南風吹上八詠樓願爲雲端月照彼雙溪流君情諒不違我心復何求荅希直許繼婺嶺隱天末遙思正屬君慰情來逺札動目有新文逸驥莫並駕離鴻常念群山空歳華晚舊話㡬時聞送希直應聘赴亰許繼陋學窺千載古今極寥寥竒才不世出先哲何其遙方子間氣英孤鳯翔九霄經史歛胸臆早歲能充饒深造入玄閟精研味腴膏發爲五色文光𦦨萬丈高吐辭信雄筆江河勢滔滔聞者但縮喙白首慚俊髦受知濳溪翁恩義猶同袍顧託有深意揚言豈虗褒聲價凌海嶽山澤焉久遨神珠隱自現寳玉終難韜中使隆優禮特起推賢豪天衢麗雲日盛際冝有遭紀載小班馬明良慕䕫臯徽猷諒巳著榮名非所徼同郷託交誼春戀豈一朝因依附勁翮愧我腹背毛㑹難思少留去馬疾若飈情至不能别病懷空欝陶聞希直自亰還許繼玉音初捧巳殊倫天意深嘉得異人衆謂歐蘇才復出我知孔孟道當伸賜歸使就林泉養期用留爲瑞世珎一旦巳成千載遇高風矯首在清旻寄方正學内翰樂平程仕簡三十年前下董幃姓名早見註黃扉古今文字非無託天地精華信有歸金匱入編嚴斧鉞紫泥承詔落珠璣斯文盛代惟公軰林下何曾有布衣正學齋記金華王紳仲縉漢中府教授天台方公希直僃神明之資負正大之學慨然有志於聖賢者也蜀王殿下素加禮敬間嘗聘置右右以咨諏正道公見必以仁義道德之言陳於前王方大肆力於緝熈之學日以誠意正心躬脩體驗爲務與公論辨若律吕之諧肯綮之中無不脗合王愈加歛容納之與臣下言必曰方公今之賢者也遂賜名其讀書之齋曰正學期其底聖賢也公退以告于紳紳聞三代之隆大道昭著風俗淳厚人倫明于上教化行於下故人之學焉者多出於正周衰列國分爭人尚詭異各自知能自立門戸而異端之術競起矣若楊墨之爲我兼愛老𥅆莊列之虚無張儀蘇秦之縱橫韓非申不害之刑名管仲晏嬰之事功有不能枚舉者逮至漢唐世愈降而道愈漓著書動以百計其爲說必曰我著書所以明斯道也而道卒不加眀我立言所以開人心也而人心終不加古非徒無益於人其所以壅塞正途聾肓耳目者爲甚大天下之士莫不隨波逐流而相上下其於聖賢之道遂若𡵨逕之異趨矣比之三代之學其邪正爲何如哉尚幸間有豪傑之士岀於其間足以回人心破邪說挽頽波而振餘風然亦不能多見若漢之董仲舒其言明白坦易爲得聖賢之心唐之韓愈卓乎特立於百世之下皆間世之竒才也至宋周茂叔以洒落之懷得理奥於黙契心融之妙及其門者若二程子之主敬行恕窮神知化而道益宏逺矣其後新安朱子出又能推明周程之㫖而集群賢之大成於是世之先後雖不同要皆羽翼斯道而所學純乎其正者也故自三代之下論者莫先於宋有元之時若許衡氏若呉􅊹氏若許謙氏軰彬彬和附于下者蓋莫非朱子之傳嗚呼上下千數百年求其人僅僅如此而邪說之惑人反有過之則夫凌高駕虚勵志鼔勇而跌足於異途者可勝道哉此志士仁人所以扼腕而深悲也今公才足以振俗德足以服人生逢聖明之世而又遭遇賢王之眷頋則所以追諸子而遡三代者公其可無意乎紳識志卑淺於公之學無能爲役幸嘗辱知於公最久故敢竊公之餘論以繹􅌖念之萬一苟以爲然則繼今以往益圖執鞭以爲御焉荅方希直先生書王紳紳向時嘗立於道邊見有行者揖群兒而問曰某將往于某敢問何之群兒指曰當從此往有頃行者悔曰群兒之言不足信乃更揖於父老父老曰當從彼往行者從父老言果得周道以此自懲學問之道果何異哉自孔孟沒後道術分裂百家並起各自以所見爲言上下數千年其人不可勝數大抵皆得其一而遺其二剽其末而失其本者也甚至敗道傷化流毒遺害者有之况至於今風俗愈漓教化愈敝則其言又豈不甚乎此豪傑之士所不忍見而自黙稍有志者當慎擇而聽信之也紳質性愚陋固不能立言以攻之然切欲慎擇而聽信四五年來問道之心甚切群兒之言喧囂闐閙于耳者亦不爲不多及求如父老之言惟執事也故紳於執事之言毎心融神㑹㫖解意通獨恨力不足耳苟其可强雖水火在前弗頋也今執事乃惠書以紳能聽執事之言爲奬嗚呼以善道告人而從之人之情也又豈紳有過人也哉雖然執事所謂知言難遇發口祗覺無味故黙黙自解此則紳之所惑者也自昔聖賢之生豈必逢聖賢而後言皆俯躬曲就喋喋而誨之惟恐其道不明也孔子嘗環轍於魯衞陳宋之邦至老不倦後雖有無言之歎然亦發憤之辭也孟子奔走於宋梁之國汲汲以仁義闢邪說時人不察或譏其好辨而孟子不沮觀其所爲可槩見矣今執事僃精誠之才蓄純明之德日以立言明道爲巳任而期底乎聖賢之域庻日談論於衆人之中是者進之非者斥之使開其心化其質是其冝也胡爲黙黙以自解無乃與孔孟之心異乎雖然紳之愚世所不取而執事且教之又安知執事之言非孔孟之意乎從以紳受執事之知而不以是爲復是負執事之心也又豈紳之心哉上侯城先生書先生又嘗號矦城生王紳君子負天下重望者必有副之之道也然言其衆非一士安得人人而誨之哉言其久非一時安得日日而語之哉古之立言著書者正以此也紳切見執事以英妙之年早属天下之重望然而副之者非無意也第恐有所未盡焉姑以近日目所及者言之自卯而入見于王口談堯舜周孔之道日閱書詩六藝之文及申而出接見賔客學徒者十數軰扣之以律而應之以律倡之以吕而和之以吕無不各中其節其用心亦云至矣而其勞亦且甚矣然復以爲言者蓋以陳于王前者雖甚盛而㝷丈之外人不得而與聞也接于往來者雖甚羙而閭巷之間人不得而共知也是則執事窮神憊力於一日之中而所及者止此則又何以慰遐陬僻壤之望哉此紳之所以拳拳望執事立言著書以明道也且道之不明亦巳久矣自孔子沒異端並起至孟子麾而斥之其言見於七篇之書其書雖爲門弟子之所記述然莫非其精神心術之所萃後乎萬世斯道藉之爲保障生民倚之爲粟帛其功不在禹下者豈止及數人而利一時哉其後若荀卿若司馬遷若劉向揚雄班固軰莫不各以著書爲事而其所至亦各不同惟韓愈獨不喜著書故張籍切切爲言愈請待五六十然後爲之紳未嘗不慊于懷以爲著書必待五六十且萬一天不假年則賈生之策不及陳而文中子之中說不及著也切意愈之卓立豪傑邁于近世其書之不著固不足爲其重輕第人之仰望者不無觖意焉今執事之才之羙固將轢馬劉駕揚班而底孟荀也天下之所仰望者豈外此哉執事苟不亦有以副之吾恐望之弗得必繼之以怨怨之不止必随之以詆且毀也或者又謂凡著書必其道不行于時故托於書以自見耳今侯城藴才蓄德筮仕云初方將駸駸見用以究其志奚以空言爲事乎曷思大上有立德其次有立功其次有立言其並列非一日矣孔子亦曰有德者必有言未聞立德者棄事功而建勲業者遂忘言也周公其德大聖也其位冡宰而攝政也其言散見於詩書周禮也迄今未有病之者而著書豈足以病執事哉今執事之德厚矣言之見於文章日用者大而至矣苟遂因而筆之於書則雖安處一室終日如愚而逺近之人均受其惠矣何必窮年竟月披寒冐暑奔頓於道途以副人人之望而卒不能周其望乎惟執事其納而圖之上矦城先生第二書王紳向者不揣愚惑輙獻瞽言於左右蓋祈執事立言著書以振天下之聾盲情激于中不覺覼縷執事以爲然耶談笑納之俾副其望可也以爲非耶訶叱而麾斥之不爲過也今旣不遂其請頋乃賜荅以千數百言若有所論辨者尤見執事之德之弘不以言之不善而遺之獨固守其謹撝而不變又且道之使盡其言者是豈紳之所敢望哉然而有不可巳於言者故不得不終其說也執事懲揚雄王通之徒未明道而著書爲無益於世遂欲躬顔子黄憲之行俾黙黙無片簡之可傳而後巳是猶懲人之病風而惡出畏人之溺水而却游也不其矯之太深而過情也哉且天之生聖人也豈特獨厚其身邪亦將用其有餘以備其不足爾觀乎堯舜禹臯陶益之典謨高宗湯武成康伊傅周召之訓誥若孔子之所以刪述曾子思孟之所以繼䋲其大要皆所以成巳而成物也以是聖人雖不世出而斯道不終泯者以有斯文之足徵也今執事又謂斯道近世大儒剖析刮磨具巳明白縱著書不能加於孔孟故辭讓不爲是尤不可也且所謂成巳成物之道六經巳具載矣孔子無言可也而猶不忘於弟子之問荅孔子大聖也其言該博無遺冝若無以加矣而曾子猶用心於大學子思親承曾子之授且聖人之澤未逺可以忘言矣亦汲汲扵中庸孟子時異端雖起苟舉聖人之說而闢之亦可矣乃反覆乎七篇之言至周元公道絶千數百載文獻昭昭尚在也亦必以心得之妙筆而爲書其後若二程子若張子若朱子若吕子軰莫不各以著書爲事其餘紛然作者不暇論彼諸聖賢者豈不知天下之道一揆也聖賢之至不可等也然且鰓鰓焉若此者所謂畏天命而悲人窮至仁之心也今執事言行皆取則於賢哲頋獨於斯而避之此紳之所以未曉也且執事之所以脩于巳者美矣而士之所以望於執事者亦至矣正冝寢不安席食不下咽拳拳夜以繼日而圖副人之望尚何暇恬居妥䖏而俯與紳論辨去取乎哉惟執事深思而毋忽與童景庸書王稌叔豐仲縉先生之子王稌再拜書奉景庸契家兄長執事, WYG: 巻}
