  - {type: variant, offset: 3899, length: 360, content: 題桐廬二孫先生墓文後予嘗論正統以爲有天下而不可爲正統者三篡臣女主夷狄也簒臣女主之不得與於正統古巳有之惟夷狄之全有四海創見于近世故學者多疑焉盖蔽于聞見而不暇遐思逺覽胡怪乎其未之識也宋徳祐景炎之後縉紳先生徃徃竄匿山谷或衰麻終其身或慟哭荒江㫁壟間如失考妣而不復有榮逹之願者多有之及其世久俗變然後競出而願立其朝盖宋之遺澤既盡而然也若桐廬二孫公兄弟槃峯公之抗志不汙求心公之不屑仕進何其凛然可尚也哉富貴之過於貧賤也逺矣使義可以處之無愧二公奚爲區區踐其所難而不顧乎盖必有甚不可者而非知道者不能識也嗚呼斯理也見于孔子之易春秋者詳矣學者不深考至於棄君背父䧟于夷狄而不自知道之不明其禍如是其烈也可畏也夫世有知二公之心者其知予正統之論也夫表槃峯之墓者黄文獻公爲求心公墓碣者文獻門人王君子充其事巳備故弗論姑識予所感云槃峯諱童發字君文求心諱辰龍字, WYG: ''}
