  - {type: variant, offset: 13105, length: 352, content: 及乎是風氣之不同也或能飲酒至石不醉而或不敢染唇或敢腴鮮甘厚味而或羔藜茹藿或裌衣以禦冬或裘褐以䖏暑服食之品不特五方之人不類也貴富家子未嘗跣足沾手而小民終歲服勞與牛馬等知道之士怒不見于色而暴悍之夫動輙詬詈勞逸靜躁烏可同乎中州之人夏夜露卧而無恙使南人效之則病矣江海之人屏息水行鑿層氷而取魚鱉使山林之人效之則死矣人之耳目手足均也脉絡血氣筋骨均也而其變之乖殊若此醫豈易言乎藥豈易用乎其病在乎心也而藥其肺在乎寒也而以爲熱病乎實也而以爲虗病不能自言受藥而死者無所控訴故醫得用其術而莫之詰也諺有之曰山川而能語􅌾師食無所蔵腑而能語醫師色如土此言用藥之難也故智足以知古人之說矣而無所自得有所自得而不能察乎脉察脉精矣而不善藥欲犁然當乎疾而必愈皆不可致也則醫之以術名于世者焉可多得乎昔者貴人有疾而天方不雨醫來治者以十數皆莫効最後, WYG: 原闕}
