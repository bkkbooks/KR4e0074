  - {type: variant, offset: 2521, length: 2477, content: 後正統論正統之名何所本也曰本於春秋何以知其然也春秋之旨雖㣲而其大要不過辨君臣之等嚴華夷之分扶天理遏人欲而巳春秋之世周室衰諸侯盛以地不及於齊晋吳楚以兵以粟則不逺於魯衛曹鄭然而必曰天王天王齊晋雖大國一有踰分奸禮則必貶之楚與吳固巳稱王與周無異矣而斥之曰子曰人豈非君臣之等華夷之分不可廢乎傳曰春秋大居正又曰王者大一統此正統之名所由本也於乎後之言正統者其可戾春秋以爲說乎由周以來秦漢晋隋唐宋皆嘗一天下主中國而朝四夷矣正統必歸焉秦起始皇二十六年而止於二世之三年隋起開皇九年而盡大業十三年唐起武徳元年而盡天祐四年漢始高祖五年晋始太康元年宋始太平興國四年然漢自建安而分爲三晋自惠帝以後夷狄横熾而中原䧟沒宋自高宗播遷江表是三代者或與簒賊勢同地醜或爲夷狄所虜辱甚者或屈而臣之其㣲甚矣然君臣之等華夷之分之不可廢猶周也故漢必至於炎興元年而止晋必至於元興三年而止宋必至於祥興二年而後天命絶此百世不易之道春秋之大法也而或者見其㣲欲㫁自剖分之歳廢統而俱主之嗚呼其亦不察乎春秋之義而甘爲簒賊之歸也夫中國之爲貴者以有君臣之等禮義之教異乎夷狄也無君臣則入於夷狄入夷狄則與禽獸㡬矣當周之衰諸侯或射王中肩或天子出狩聖人豈不知周之無異於齊晋呉楚之屬哉然而常抑彼尊此者爲天下後世慮也茍以其迹則周當與魯衛同列矣何有於王乎如此則何以爲聖人之春秋乎夫漢晋宋之事奚異於此而今之横議者猶啜啜不置嗚呼其亦不察乎春秋之義而甘爲簒賊夷狄之歸也且聖人之作春秋以其操至公之道故建之天地而不謬前乎百王而有徴後俟來者而無惑也茍亦隨俗之好惡待時而重輕豈足以爲聖人哉俗之相成歲薰月染使人化而不知在宋之時見胡服聞胡語者猶以爲恠主其帝而虜之或羞稱其事至于元百年之間四海之内起居飲食聲音噐用皆化而同之斯民長子育孫於其土地習熟巳久以爲當爾昔既爲其民矣而斥之以爲夷狄豈不駭俗而驚世哉然顧嫌者乃一時之私非百世不易之道也賢者之慮事當先於衆人而預憂於後世使其可繼假使後世有聖人者出則將儼然當之如昔之正統乎抑亦有所裁制損益如處呉楚者乎苟以夷狄之主而進之於中國則無厭之虜何以懲畏安知其不復爲中國害乎如是則生民之禍大矣斯固仁者之所不忍也然則當何爲曰其始一天下也不得巳以正統之法書其國號而名其君於制詔號令變更之法稍異其文崩殂薨卒之稱逓降之繼世改元之禮如無統一傳以後分注之凡所當書者皆不得與中國之正統比以深致不幸之意使有天下者懲其害而保守不敢忽使夷狄知大義之嚴正統之不可以非類得以消弭其僥覬之心則亦庻乎聖人之意耳嗚呼俗之移人也久矣吾欲揚斯言於今之世寧能免啜啜者之躁怒哉此非予之言也乃聖人之言也向之所陳春秋之義也春秋之義茍廢三代以降得天下者亦異矣吾嘗妄論之曰有天下而不可比於正統者三篡臣也賊后也夷狄也何也夷狄惡其亂華篡臣賊后惡其亂倫也夫天之生此民好惡嗜欲之不齊不有以主之則紛争而靡定故簡聖賢之人授之命爲之主同其好惡節其嗜欲明君臣父子夫婦長㓜之倫以教之爲衣服等殺交際吉凶之禮以文之撥洪水猛獸蛇虫夷狄之害以安之夫所貴乎中國者以其有人倫也以其有禮文之美衣冠之制可以入先王之道也彼篡臣賊后者乘其君之間弑而奪其位人倫亡矣而可以主天下乎茍從而主之是率天下之民無父無君也是猶可說也彼夷狄者姪母烝雜父子相攘無人倫上下之等也無衣冠禮文之美也故先王以禽獸畜之不與中國之人齒茍舉而加諸中國之民之上是率天下爲禽獸也夫犬馬一旦㩀人之位雖三尺之童皆能憤怒號呼持挺而逐之悍婢奸隷殺其主而奪其家雖犬馬猶能爲之不平而噬囓之是何者爲其亂常也三者之亂常無異此矣士大夫誦先王之道者乃不知恠又或爲之辭其亦可悲矣乎或曰史以記事者欲其實乃所以彰其惡也故春秋於簒弑之君未嘗去其號聖人且不敢况後之人乎曰何爲其然也春秋之時非後世可比也當是時聞有臣弑君者矣未聞弒而奪其位者也且魯者聖人之父母國而時君固在也故或爲之諱若他國則㩀其赴告之辭而書之聖人固有不知其詳者矣然崔杼之弑齊簡公孔子沐浴而請討之季氏之逐魯昭公孔子一則曰公在乾侯二則曰公在乾侯使季氏而主魯聖人其忍以魯國君禮與之乎其黜之無疑矣然則吾之言固聖人意也復何僣乎又况巳徃之跡而欲曲爲之諱其亦不逹於義乎曰簒臣之事則既然矣賊后曷爲而不得爲主也聖人之作易其於此言之備矣陽者君之道也夫道也隂者臣之道也妻道也易之六爻凡隂之得中隂乘陽位必諄諄爲之戒坤隂之純卦也於其始則戒曰履霜堅氷至恐陽之忘備也於其終恐疑於無陽也曰龍戰于野五恐其居尊位也則曰黄裳元吉黄中色而棠下飾臣之事也婦之道也戒其居上則不吉也其他曰括囊曰含章曰從王事未嘗予其專也推之六十四卦之中莫不皆然則聖人之意可知矣春秋無其事故不書使有之聖人其肯一日主之乎曰夷狄之不可爲統何所本也曰書曰蠻夷猾夏㓂賊姦究以蠻夷與㓂賊並言之詩曰戎狄是膺孟子曰禹遏洪水驅蛇龍周公􅈾戎狄以戎狄與蛇䖝洪水並言之禮之言戎狄詳矣異服異言之人惡其類夷狄則察而誅之况夷狄乎孔子大管仲之功曰㣲管仲吾其𬒳髪左袵矣如其仁管仲之得爲仁者聖人美其攘夷狄也然則進夷狄而不攘又從而助之者其不仁亦甚矣曽謂聖人而肯主之乎學聖人之學治先王之道而昧乎此又何足論哉曰荆舒以南春秋之所夷狄獨可爲正統乎曰非也自秦以來襲禮義而爲中國者二千年矣人倫明而風俗美烏得與夷狄比乎先正大儒知夷狄之不可長也故雖強如符堅盛如徳光不與之以中國之禮知賊后之不可主也故吕氏之強武氏之才不與之以天子之位知篡臣之不可訓也故王莽侯景之徒一以盜賊待之其爲法至公其爲道至明其爲慮至逺也其於聖人之意春秋之分至得也所謂萬世而不可易者也曰是則三者皆廢之而不書乎曰不也吾固曰不比之於正統而已非廢之也不廢其迹而異其辭則其爲戒也深矣嗚呼天下後世之心吾不敢必也茍有賢者其将信吾言也夫自予爲此文未嘗出以示人人之聞此言者咸訾笑予以爲狂或隂詆詬之其謂然者獨予師太史公與金華胡公翰而已天下之人若二公者少而執偏私之見者常多予之言何恃而立於世哉然二公者天下之賢而知道者也文章言論惟知道之人能傳而偏私者無聞焉二公既信予則後世之賢者其有不信者乎吾之言其有所恃矣或稱古今人不同所見亦異又安知其果足恃哉抑吾聞道之在人不以古今而有二後有同予所得者必將有取于斯也有取無取不足較予拳拳之心爲天下生民慮爾有志乎生民者果以予言爲狂者乎抑狂者固自有其人乎, WYG: ''}
