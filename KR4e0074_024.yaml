front:
  text: 遜志齋集卷之二十四
  hash: sha256:739bee613108bb3b3ecf752bd78a71d65ee352c68f0a98cf1da55f710e8df485
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4e0074_SBCK_024-1a}
body:
  text: 中順大夫浙江按察司副使奉敕提督學校雲間范惟一編輯奉政大夫浙江按察司僉事奉敕整飾兵備南昌唐堯臣校訂中順大夫浙江台州府知府事前刑部郎中東吳王可大校刋蜀王殿下賜行厨酒膳奉謝天門傳詔飛金符帝子發春朝帝都萬里巴江引軸轤朝離瞿塘莫荆巫牙旗羽扇照江湖馮夷操楫龍伯扶威振海若驚天吳衮衣登朝玉陛趨至尊撫問情鬱紆奏還大國天語俞却從周秦行坦途乘傳西來試馳驅日行三百尚未晡親藩留宴窮歡娛秦民擁路觀金輿口稱盛德目睢盱共説賢王世所無南入荆門喜氣蘇蜀邦密邇忘﨑嶇山花爛熳雲糢糊緑樹淸江如畫圖漢中小臣章句儒早向王門曾曵裾是日來迎拜路隅按轡遙看笑且呼暮抵行宫侍直爐華燈照夜鋪氍毺從容前席講典謨玄談蟬聮如貫珠上探千古周八區鄙誚榮辱聖為徒更闌喜極行玉壺叩頭舉白紅生膚侍臣奉教恩意殊大官美醖貯行厨特賜歸飲不用沽上尊珍味甘且腴受之無功辭有辜心感王恩厚矣乎獻諸祖禰頒妻孥招致朋僚洗罍􅒀共飲相歡同賜酺平生飲水兼茹𬞞秪將鉛槧代耕鋤近為校教食民租尸居靜閲年歲徂世人視之等泥途賴逢聖主意氣孚討論聖猷師古初經綸萬理髮在梳小臣學術本粗踈志廣年荒才更迂量同溟海肯納汙欲致衆駿先收駑願王道德為世模摩撫疲癃恤鰥孤南漸瀘戎北羌胡陽和發生無朽枯育民興賢語不誣行致孔明與夷吾共康國政秉事樞保釐西土佐唐虞不數𧖟叢及魚鳬吾王端拱化日舒從此感恩非一夫歌風臺歌風臺下春水黃歌風臺上春草碧黃河之水日夜流碧草年年自春色漢祖當時為帝王龍泉三尺飛秋霜五年馬上得天下富貴樂在歸故鄉臺前老人爭拜跪柱杖麻衣見天子龍顔自喜還自傷一半隨龍半隨鬼翻思昔日亭長時一心捧檄日夜馳耶今宇宙過四海一榻之外誰撑持却令猛士鎮寰宇安得長年在鄉里可憐創業垂統君后使乾機付諸呂淮隂少年韓將軍金戈鐡馬立戰勳藏弓烹狗太逼迫解衣推食何殷勤致令英雄遭婦手血濺紅裙當斬首蕭何下獄子房歸左右功臣皆掣肘還鄉悲唱大風歌向來老將今無多咸陽宫闕親眼見不忍荆棘埋銅駝臺前老人淚如雨為言不獨漢高祖古來世事無不然稍稍功成忘險阻荒祠古廟名歌臺前人巳盡今人哀感激悲歌下臺去斷碑春雨生莓苔潼關潼關將軍才且武五千士卒健於虎朝廷養汝為阿誰盜賊公行如不覩昨日官車將到關西風放顛塵滿天錢囊衣篋繫車後歘來掣去同鷹鸇南望京師五千里僮僕所資餘有幾離家漸逺親故稀向我長號淚如雨嗟嗟僮僕汝莫愁聖人在上治九州會看海內皆冨足關不須防無盜偷淮隂淮隂城頭落日黃淮隂城下秋草荒古城西繞淮水長猶如背氷陳堂堂當時大將功無雙顛嬴蹴項勇莫當丈夫何乃為假王至今遺恨令人傷漂母一飯千金償解衣推食那敢忘相君之背貴莫量蒯生此語無忠良慎弗出口遭吾撞歌風帝子歸故鄉思得勇士守四方胡為鳥盡良弓藏題嚴子陵敬賢當逺色治國須齊家如何廢郭后寵此隂麗華糟粳之妻尚如此貧賤之交奚足倚羊裘老子早見機獨向桐江釣煙水赤璧東夏口西武昌赤璧峭絶當中央姦雄將軍氣蓋世敗卒零落慚周郎得鱸魚沽美酒孰若黃州蘇子瞻謫向江湖動星斗噫吁戲曹公氣勢蘇子文章人物銷鑠塵迹荒涼惟有江水千古萬古空流長吊李白君不見唐朝李白特逹士其人雖亡神不死聲名流落天地間千載高風有誰似我今誦詩篇亂髮飄蕭寒若非胸中湖海闊定有九曲蛟龍蟠却憶金鑾殿上見天子玉山巳頽扶不起脫靴力士秪羞顔捧硯楊妃勞玉指當時豪俠應一人豈愛冨貴留其身歸來長安弄明月從此不復朝金闕酒家有酒頻典衣日日醉倒身忘歸詩成不𬋩鬼神泣筆下自有煙雲飛丈夫襟懷真磊落將口談天日月薄泰山高兮高可夷滄海深兮深可涸惟有李白天才奪造化世人孰得窺其作我言李白古無雙至今采石生輝光嗟哉石崇空豪冨終當埋沒聲不揚黃金白璧不足貴但願男兒有筆如長杠題李白觀瀑布圖天寶之亂唐巳亡中興幸有汾陽王孤軍匹馬跨河北手扶紅日照萬方凌煙功臣世爭羡李侯先識英雄靣沉香亭北對蛾眉眼中巳見漁陽亂故令邊將儲虎臣為君談笑淸胡塵朝廷策勛當第一圭組不敢縻天人西遊夜郎探月窟南浮萬里窮楚越雲山勝地有匡廬銀河挂空灑飛雪醉中信馬踏清秋白眼望天天為愁全閨老奴汚吾足更欲坐濯淸溪流英風逸氣掀宇宙千載人間寧復有夢魂飛度南斗傍笑酹廬山一巵酒雲松可巢今在無九江落照連蒼梧欲從李侯呌虞舜盡傾江水洗寰區題李白對月飲圖明月出高樹上懸青天中下有萬頃之長江揚波泛彩清若空江風吹人色凄凛此時對月誰能寢十千斗酒何足論舉杯冝就花前飲花前飲酒無與儔酒酣意氣輕王侯仰招行雲不可得但見月與河漢俱西流仙人伐桂樹玉女倚瓊樓顧盻暫相悅棄去終莫留昨日巳浩浩今日復悠悠人生如飛光及時不飲空白頭君不見月中玉兔搗靈藥不能醫此萬古愁何如醉卧長不醒天地與我同虗舟混混六合間浩然何所求徽宗花鳥圖宣仁升遐司馬死宋祚當時已中否豈知禍亂猶未休更立端王作天子簡書四出捷星馳重見熙豐舊設施太室既崇􅍮國祀朝堂新刋黨人碑廷臣往往多鉗口四海禎祥無不有萬金寶藏造池臺千里樓船載花柳君臣自詫文德修不數唐漢追商周陳鍾考鼓按雅樂厲甲揚戈昧逺謀宫中從容萬機暇酣飲逸逰忘晝夜御輦時過宰相家微行或飲倡樓下宣和殿內玉屏風綺席金爐處處同詔遣內官宣畫史時拈象筆極形容神機密運回天巧萬歲齊呼盡稱好玉礲裝軸錦裁題墨署花書朱篆寶心怡意適藝愈良自道丹青過百王盡將兵籍副邉將還信姦臣斥俊良契丹滅後金人喜猶剖王封賞閹竪露布初騰紫陌塵天驕巳渡黃河水汴京鎖鑰一時開雉扇鸞輿去不回圖書萬卷入沙漠奎璧無光天為哀秪今俯仰三百載南北興亡幾更改廢陵巳發社無基尺素誰家尚收在吾知此畫非人為當有神物常呵摩故留花鳥在人世要俾後來懲戒之古來君德在仁義小技雖工何足計不見昭陵一藝無偉績鴻名照天地錢氏家山圖錢君望鄉勞夢思陳君奮筆為寫之毫端歘吸驅鬼物風霆捲地山川移紫雲峯高當靣立獅子灘聲轉山急翠竹搖風市塵逺青楓夾路樵歌入山腳盤回到石門桑榆深映數家村百年丘壠澤未泯中古衣冠今尚存高堂老人年八十皓首紅顔瞳點漆柴門拄杖望兒還坐聽庭烏心若失錢君一見增喟傷此身如在淮水傍摩挲門戶欲歸去細看無路墮渺茫乃知陳子善戲劇故假丹青惱胸臆世間萬事無不然畫地作餅安可食陳子亦是憶家客不特戲人兼自釋沙際扁舟巳上檣何當共載歸故鄉題南屏對雪圖昔年歲莫京國還􅋈舟夜宿南屏山山風吹雲天欲壓夜半大雪埋江關淸晨倚樓望吳越六合玉花飄未絶恍疑江水駕山來萬頃銀濤湧城闕山僧好事喜客留置酒開筵樓上頭玉堂仙人宋夫子紅顔白髮青貂裘坐談今古如指掌共看雲收月華上寒輝素彩相蕩摩碧海瓊臺迭蕭爽酒酣擊節心目開慷慨弔古思英才荒祠古柏嶽王墓廢湖殘柳蘇公堤一時嘉會難再得仙人上天塵世窄王子何年繪此圖正貌南屏舊逰迹吾知王也竒崛人新詩妙墨俱絶倫偶然揮灑豈無意神授髣佛存天真世間今古同飛電回首人豪都不見空有羅山石室書夜夜虹光射霄漢江山萬里圖我昔奉敕辭金闕西下巴川持使節仙槎二月出龍河萬里春風掉晴雪吳江茫茫入杳冥棹歌初過峨眉亭錦𫀆不見李供奉白雲遮斷三山青煙蕪漲緑知何地白鳥雙雙沒淮樹片帆風滿疾如飛矯首驚看坼流去大孤小孤橫雪波匡廬五老青嵳峩九江秀色嘆竒絶半空飛瀑懸銀河推蓬竟日間吟倚瞬息舟移洞庭水君山如黛壓中流十二煙鬟鏡光裏好山逺自峨眉來瀟湘練明天際開疑峯九點落空翠重華孤墳安在哉武昌地轉多遺迹隔岸鳥鳴瞻赤壁煙熖旌旗魏武兵綸巾羽扇周郎策扶醉曾登黃鶴樓漢陽城對鸚鵡洲即從鄂渚棹明月沂流直上窺荆州夷陵山勢多重疊楚樹蠻雲逺相接欲向夔城入錦城還於巴峽穿巫峽神女峰前路欲迷瞿塘灔澦聞猿啼五溪越盡見雲嶺但見鳥道青天低萬里橋西看立馬足迹經逰半天下愧無草檄擬相如笑擲槖金輕陸賈今年詔許臨丹丘夢中往往驚羈愁江山誰寫入圖畫眼中歷歷如經逰岸巾一覽發長嘯滿襟爽氣高堂秋題王叔明墨竹為鄭叔度賦吳下王蒙藝且文吳興趙公之外孫黃塵飄蕩今白髮典刑逺矣風流存華亭米芾稱善畫每觀蒙畫必歎詫謂言妙處逼古人世俗相傳倍增價昔年夜到南屏山高堂素壁五月寒壁間舉目見修竹煙雨冥漠蛟龍蟠呼童秉燭久不寐細看醉墨王蒙字固知蒙也好天趣畫師豈解知其意分枝綴葉人所知要外枝葉求神竒天機貴足不貴似此事不可傳諸師麟溪鄭君好竒士愛畫猶能賞其趣嗚呼世間作者非不多鄭君甚少可奈何失硯嘆吾家石硯玄玉色來自扶桑海中國蕩摩日月露光精吞吐波濤含潤澤天生竒質為世用海王龍伯不敢匿少時得之方外人四座傳玩皆歎息二十年來親翰墨北走洙泗西梁益錢塘會稽屢逰歷鬼神呵護同珙璧水怪山精皆辟易佐我為文寫胸臆上探玄化與為敵宣暢民彛輔皇極雲雨布濩飛霹靂倐忽變遷靡定迹謬致聲名驚四方招謗速侮不暖席其間損益兩相輔硯也於余良盡職豈知萬事不可料昔者相親今不得潼關群盜何大劇竊瞰行人俟昏黑金錢雖失不足歎此硯使我深痛惜我非玩物有偏愛又非昧理苦蔽惑直傷美器不遇主有似賢才受驅迫真卿奉使陷叛臣蘇武持節幽異域忠肝義膽貫天地豈忍包羞汙凶逆孔子春秋至謹嚴細事不肯登簡策大弓寶玉二物耳特書盜竊懲亂賊我誅鼠輩恨無力著作有心禆六籍何時見汝生羽翼奮飛重來侍吾側不然變化為星辰照臨下土常烜赫外物聚散如置奕胡為念汝長戚戚君不見自我得之失無憾不如蕭公差逹識扇寒藤隂􅊤懸風霜刳皮搗骨收溪光銀漢半邊秋月白璚臺一幅春雲香青旗翠纛湘潭竹寶刀纎纎破寒玉束來十二碧琅玕鳳骨凝香冷盈掬吁嗟造化由天功乃知製作歸良工膠漆投情作鸞偶卷舒懷袖生淸風清風飄飄可人意忽覺聲名滿天地南州溽暑恩愛多只恐涼飈入庭樹紅酒歌田家八月秋秫黃肩滿簷金穰穰西成萬室喜登場斗酒勞慶年豐祥天台山人傳祕方釀成九醖丹霞漿紫檀槽頭秋點長綘囊醡壓甘露涼猩紅顆滴真珠光蓼花色比桃花強薦新設席請客嘗風吹桂花滿屋香饌出肥雞一筯肪橙䂨蟹鱠雙螯霜不須琥珀琉璃觥不須太白力士鐺我愛真率田家郎磁甌瓦盆􅎆木觴爛熳為我澆吟腸新詩吐出雲錦章醉來興發恣豪狂高歌起舞當斜陽出門一笑爾汝忘大江東去煙茫茫食羊虎肉白額咆哮振山谷老羝見之驚且伏一朝強弱兩不存此肉都歸野人腹腹中惟恐相啖吞急呼美酒為解紛酒酣一醉更懷古千載英雄羝與虎蕨箕行並海飢民千百數携鋤上山􅓯山土蕨根巳盡􅓯不休力絶筋疲未言苦屋頭五日無炊煙十步九却行不前全家性命係朝莫弱子假息阿母眠昨日􅓯蕨僅盈斗今日蕨根不滿手但慿􅓯蕨保餘生再拜青山感恩厚青山青山爾勿猜明朝未死携鋤來海米行海邊有草名海米大非蓬蒿小非薺婦女携籃晝作群採掇仍於海中洗歸來滌釡燒松枝煮米為飯充朝飢莫辭苦澀不下咽性命聊假須臾時皇天不仁我當死况乃催科急如矢來牟擬作日月期欲保餘生更徯爾嗚呼棄止不復陳椎牛酣酒何為人逰峨嵋楚客求丹梯泝流三峽踰五溪浙僧訪佛祖一錫凌空向西土江左儒生尋謫仙相逢共上峨嵋巔峨嵋山高氣磅礴萬朵蓮開青插天天高地逺望無極海東日出扶桑赤氣衝衲衣舉光搖角巾明眼底汪洋巨鰲動耳邊髣佛天雞鳴龍宫對月窟曾聞謫仙遊霞光凝不散履迹今尚留千崖崩摧勢欲墮羽流緇侣參差坐七寶巖留供佛燈萬松竈起燒火風霆蕩潏雲樹糢糊虎豹接迹猿猱鬪呼星漢當頭手可摘靈芝甘露無時無雲漏日兮光一線金蓮白象兮紛紛而來見萬籟動兮天樂和仙之人兮夜經過忽神驚而目眩豈事幻而説頗覩謫仙而無有杳鳳管與鸞車塵心未斷懷鄉土青鞋復踏來時路行行回首語青山石室無鎖門無關重來有日當躋攀肻效赼趄囁嚅徼名勢坐令塵土凋朱顔題萬間室少陵老翁餓瀕死意欲大庇天下人一椽茆屋不足蔽風雨安得萬間之厦蓋覆四海赤子同欣欣言狂意廣不量力至今世俗聞者交笑嗔侯城小儒愚獨甚不敢嗔笑謂公之意厚且真古來致亂皆有因大臣固位謹持祿其計止為安一身高車大纛耀侈冨子女玉帛驕里鄰安危得失百不知更僣膏腴便利田宅遺子孫生靈窮苦墮溝瀆寒士困悴無衣紳彼也珍羞綺席歌舞燕樂窮朝昏老翁哀痛實為此熟視鄙夫憸子辟之犬鼠加冠巾曰我得志有不為嫉邪憤世欲救其弊忘賤貧至今巳閲八百歲知翁之意世獨少蹈翁所惡常紛紛侯城子為是懼人受天地中何以不與禽獸草木為等倫一心運萬化五性涵義仁下輔后土所不能上贊皇天之闕燮調寒暑撫五辰大禹疏百川伊周綜理禮樂政教與世為陶鈞孔子孟軻不得位著書明道亦與治水拯世之功均吾為孔子徒忍汩流俗同沉淪故題一室曰萬間坐覺宇宙亭毒氣勢皆前陳身賤不敢論政教誓將修復孔業為世開昏嚚室中左右列古書亦有諸史所筆志義之士忠良臣關有子厚洛有伯淳群公近出皆鳯麟美哉子厚西銘之説何諄諄吾恐當時亦感悲歎意故立此論可與日月同光新為君不知此無以建皇極為臣不知此無以康兆民願寫此書千萬卷洗濯鄙胸與私智使知林林之衆皆吾共出而同娠視之不至越與秦盡變呻吟愁歎之俗若去寒沍逢陽春小儒不惜獨困處此室作為雅頌歌聖神再見中國大治同周殷滄州趣為台城趙生孝禮題少年負竒志味道輕神仙縛虎千仭崖斬蛟萬里川東指扶桑西月窟以手捫天問天闕醉中欲奪羲和鞭驅䇿六龍下溟渤歲華忽復晚竒功竟無成恥作楚狂人甘為魯諸生俯首蓬屋中被褐勘六經憂多髮白早觸事萬感盈擬從安期輩採藥逰蓬瀛蓬瀛群仙别來久聞知掉頭還拍手世上憂勞早巳知身後功名復何有棄我如敝屣不肯相攀援登高發長嘯目送白鶴歸三山我友王子喬示豫海嶠圖孤峯拔出數千尺丹光雲彩交糢糊下臨無地上極無天漚波浩蕩望不極恍若巨鰲掀舞勢與元氣同回旋金銀宫闕隱倒景翠綃綘節在眼前對此愜心賞便欲乘風與俱往恨乏同心人臨𡵨獨惆悵趙生天資妙訪我東海頭淸談雄辨有仙趣坐覺毛骨寒颼颼生方讀書取青紫我巳屏迹棲林丘他年謝事倘相會與爾共作蓬瀛逰許氏龜巖行寧海許子名續字士成年踰三十事母以孝稱士成六歲失嚴父母氏褓抱避亂慈溪城于時鯨鯢奮擲東海沸紅塵滿天波血腥流離異鄉幾寒暑慈母守義志節如霜明盜平歸來閭里驚母能愛子復善教紡績衣食使入庠序拜揖從先生所學在大倫耻以文藝鳴家居近市母不樂又為迎至龜巖之下養且耕兒壯母髮白諸孫長大能扶王母行士成歲時奉觴為母壽蹁躚拜舞同孩嬰食有黍稻殽有牲母氏感舊涕泣難為情士成念母守節苦身賤莫逹天子廷每為鄉閭道母事辭旨悽咽弗忍聽縣令不之察郡守不為聞朝家有命誰能旌悲哉士成之恨何由平嗟嗟今之人豈無高車大馬垂華纓推恩及父母丘壠沾光榮立身奉法不能謹雖有恩寵無由承身死汙辱增宗族愧醜父不願以為子弟不碩以為兄孰若士成隱居不仕行修于家馳令名龜巖土厚且沃龜巖水甘且清龜巖之人誰與許子京許子之賢母所令鄉人祝許氏母子年百齡母為人婦法子為事親之凖繩嘉爾母子孝且貞龜岩之高與天俱不傾樂哉士成配岩永久流芳聲蜀道易有序昔唐李白作蜀道難以譏刺蜀帥之酷虐􅍏後韋臯治蜀陸暢反其名作蜀道易以美之今其詞不傳皋雖惠於蜀民頗以專橫為朝廷所患暢之詞工否未可知推其意蓋不過媚臯云爾非實事也伏惟今天子以大聖御極殿下以睿哲之資為蜀神民主臨國以來施惠政崇文教大賚臣僚及於兵吏內外同聲稱頌喜恱天下言仁義忠孝者推焉西方萬里之外水浮陸走無有寇盜商賈駢集如赴鄉閭蜀道之易於斯為至矣臣才雖不敢望白而所遇之時白不敢望臣也因奉教作蜀道易一篇以述聖上及賢王之德名雖襲暢而詞無溢美頗謂過之其詩曰美矣哉西蜀之道何今易而昔難陸有重巖峻嶺萬仞鑱天之劒閣水有砅雷掣電懸流怒吼之江關自昔相戒不敢至胡為乎今人操舟抹馬夕往而朝還大聖建皇極王道坦坦如絃直西有雕題金齒之夷北有氊裘椎髻之貊東南大海際天地島居洲聚千萬國莫不奉琛執贄效朝貢春秋使者來接迹何况川蜀處華夏賢王於此開夀域播以仁風沾以義澤家和人𥙿櫜兵斂革豺狼變化作騶虞蛇虺消藏同蜥蜴鑿山焚荒穢略水剷崖石帆檣屝履任所往宛若宇宙重開闢美哉蜀道之易有如此四方行旅絡繹來逰西覽德成都萬室比屋如雲桑麻蔽原野雞犬聲相聞文翁之化孔眀之仁嚴鄭之節楊馬之文遺風漸𬒳比鄒魯士行賢哲方回參方今况有賢聖君大開學館作校論典墳坐令政化希華勛徵賢一詔到巖穴咄爾四方之士孰不爭先而駿奔王道有通塞蜀道無古今至險不在山與水只在國政并人心六朝五季時王路嗟陸沉遂令三代民盡為獸與禽當時豈惟蜀道難八荒之內皆晦隂戎夷雜寇盜干戈密如林今逢天子聖賢王之德世所欽文教洽飛動風俗無邪淫孱夫弱婦懷千金悍吏熟視不敢侵蜀道之易諒在此咄爾四方來者不憚山高江水深為玉泉山人題天池直接扶桑東百川委會來無窮兩崖為門障海口大江中流潮汐通豐山橫鶩東奔放浪嚙沙崖穿玲瓏翠鳯飛來白銀闕金鰲湧出金蓮宫天台赤城此磅礴間氣往往生英雄鴻儒碩士世不乏神靈秀異天所鍾玉泉山人獨嗜古食貧力土專而工結廬椒江望蓬島坐看海氣浮青紅含嚼英華嗽芳潤吐納光景噓長虹群仙窈窕羅几席洪波浩瀚涵心胸蕞爾一鄉不滿意邈焉四海將奚從日披黃卷對賢聖上並周孔齊羲農國風雅頌導于正典謨訓誥操􅍏中權謀智術競趨利玄談淸議咸歸空濓洛崛起樹名教千載道學開盲聾仁義行師佐伊呂禮樂出治登夔龍拯救生民布仁化此心炯炯今昔同食息夢寐若見之上下議論相磨礱論交豈止一世士直追三代還淳風屈伸去就隨所遇仕止進退皆從容某山某水吾釣逰歸來舊隱巢雲松次河南府梅花堂韻前年停車汴水陽鄭公延我政事堂是時梁園花亂發遊蜂乳燕春滿墻緑酒浮觴靣玉白繡衣耀座腰金黃豈知造化不容物俊傑俄為土中骨重來訪舊無一存冠蓋年華兩飄忽堂中遺迹傷人意粉圖素壁銀鈎麗道廣常懷濟物心數竒竟負匡君志文章爛熳空自苦政術廉平索誰繼官僚薦書嗟我遲妻子思家歸未遂感此臨風涕淚垂出門上道風塵翳西行境內五百里到處逢人稱善治洛陽城中迎歲新正思昔日梁園春河南忽過張少府意氣還同鄭老真蠟梅盈庭花瑶璨銀燭照夜光璘珣登高訪古隘八極勸酒笑談驚四鄰我被虛名浪羈束奔走皇皇炊不熟明朝又渡瀍水西行李再經燒棧北丈夫會合當有時各展忠貞報王國東河驛值雪次茅長史白戰體韻東河氣高地常冷越客入山愁目瞑蹇驢破帽闖驛門敝屋踈籬耿燈影更闌藉草始一寐夜半雪來初未省窗眀恍訝烏繞樹身倦宛同蛙伏井雞鳴起看眼生花睡熟山童呼不醒積深巳覺擁藍關勢逺直疑沾庾嶺穿簷入隙如有求塞戶填階豈須請瓦溝早滴為炊煙水靣難消因泛梗樂事偏冝壯士獵淸氣先入詩家茗平鋪道路混險夷蓋覆乾坤掩瑕眚空山難行無客到高卧閉門終日靜春來一月尚嚴凝天上何人調九鼎半生對雪走四方竒絶愛此林壑景長松壓重龍虎怒巨石羅陳整北風末勢更飄揚斜照餘輝愈光炯南望殊憐京闕遙西顧頗覺歸途永未須玩物遽憂患有形易化皆幻境明朝隂翳盡掃除天際諸峰翠相並乘興伸眉且一笑人生飢寒非不幸莫將詩句效蘇公淮隂詎肯儕噲等愛日堂白日麗青天朝出扶桑莫虞淵堂上有親雪滿巔坐看白日心茫然長繩不可繫急景如流川羲和羲和停爾鞭高堂一日如千年寄貧朝餐漿一盂莫食𬞞一盤胸中六經粲星斗筆底萬卷馳波瀾人笑先生窮不恥先生嘆人愚可鄙終朝醉飽百不知何異腥羶飫螻蟻世上群兒昧重輕每是螻蟻非先生縱令先生窮至老猶與日月爭光明覽以德用中二友和東坡喜雨之作席前襟佩多如雨危坐談經亦良苦講堂日晏未朝餐舌倦唇焦靣生土小齋退食聞扣門倒屣起迎咽還吐知是兩賢送詩至笑却杜康麾陸羽錢也駿馬氣莫當陳也奔泉勢難禦元祐詩壇不易登俱欲升堂啓其戶文章由來關政教道術何曾間今古每憐陋儒不自量詆訶前人竟奚補浪與唐宋較優劣有如癡兒侮厥母蘇公風骨真天人駭視四海手摩撫二南洋溢騶虞出九韶鏗鏘鳳凰舞列仙得道行御風漢相間居老食乳神竒變化脫邊幅怒罵嘻􅐵皆新語眼中不復見此翁雲月江山淡難主我狂自少喜翰墨辟若惰農服田畝嘆彼么麼星辰出望公光𦦨日當午二公豪健敢扳附蓄積穰穰冨倉庾大篇屬和意有餘坐覺詩名動城府當今聖朝任英俊雅頌再作聲教普吾衰才薄子勉􅏧振起斯文繼前武渡淮後寄宗文先輩及諸士友長淮風顛浪雷吼爭渡千人喧渡口蹇驢破帽衆所輕行李甘心落人後臨淮先生交義深視我重比雙南金席前弟子總英俊相携擁餞淮之隂就中孫玘藝且勇奮袖登舟氣增重扶顛禦侮况有人病身幸免波濤恐挂帆長嘯煙霧開主人謝客緣城回孫也追隨不憚險艱危可仗真竒才世俗結交看勢利有勢相依無即棄賤貧如我豈足憐脫落凡情見真意賢豪邂逅何所無排難多由竒丈夫古人事業望公等欲輔國步須捐軀次鄭好義紀夢韻有引昨承寄示紀夢長句諷詠之餘不勝感歎因用增至二十五韻以道鄙懷答雅意尚正教之竒材偉人世不作太息斯文付冥漠承君忽枉紀夢篇喜極長吟淚交落雄辭璀錯迸星斗險語鏗訇飛電雹念我雖知意氣真感君復使情懷惡憶昔與子在京師玉堂老仙侍幃幄冠蓋追趍禁闥深朝廷尊寵禮數渥聲名如雷動天地震起蟄蟲伸屈蠖國有蓍龜民有師水之海瀆山之嶽升堂執業集英彥寶帶朱衣雜南朔朽材浪迹偏見憐繩墨匡持重礱斫子時好修美文藝淸談劇辨相娛樂公於多士雖並收視我與君尤不薄龍驥咸歸伯樂廄天球本出荆山璞要為國家樹基址屬望吾人興禮樂安知垂老萬里行直泝岷江踰劍閣死生契闊恩義乖音書隔絶道路邈索居卧病東海上舊德棄捐徒歎怍夢中見公疑尚存雅度高風儼如昨公之神明在宇宙陟降照臨焉可度或乘鸞鳯驂麒麟或奏韶夏陳羽籥鈞天淸都足豪俊講道論文恣歡謔應悲我輩混世塵俯首顰眉語咿喔獨念靈櫕客西土明詺未許歸故宅昔蒙召見欲奏論造次自疑難感格聖君霈澤覃萬方寧使遺骸葬夷貊子文無後善人懼馬遷有書心事白所憂陋拙忝知巳昭雪孤忠負前諾公心豈不望後人入夢語子意甚確子兄文章極醇雅典國製作名烜赫為銘功行播遐邇可配史傳垂簡策子將繼踵綰章綬便當任此千古託如吾自料乏時才空言駭世徒宏廓水北山南結茅宇弟唱兄酬老耕穫著書倘可寓王制未死尚期眀聖學與子他年擬見公公歸應化遼東鶴寄修德平生識字不滿百浪竊聲名有慚色反觀身世每自鄙何以使子心莫逆前月馳書許訪我恐我無錢厭賔客惠書問疾繼踵來為賀更生重悽惻我力不能事耕稼性又不耐營官職承明辭歸茹藜糗侯封鼎食誰願易今年瘧鬼忽侵凌寒熱交爭類勍敵垂頭伏枕二十旬腰腹枵羸靣如臘嗌乾恃粥不善飯下牀須扶還按壁向來意氣隘九州頃步顛躓真可惜所欣元兄督家政甔石無儲免憂戚抱書欹卧困即眠見客暫起飢輒食萬事盡拋思慮表一身豈恤飢寒迫古來賢豪例窮苦屠兒販豎千金殖皇天豫奪有深意衆生淺暗何由識君來不須念我貧厭飫仁義非外得薄田近穫十斛麥炊之作糜可朝夕溪南磐石廣數仞墻頭新筍高百尺竹間讀書石上卧青雲為蓋苔當席頗聞海上有巨鰲鼓舞洪濤氣腥黑請君持竿亟一掣膾肉作脯如山積盡俾黔黎飽君德與君大嚼醉千日免使窮愁惱胸臆送劉士端歸括蒼憶昔高皇定華夏海內遘屯龍戰野幃幄謀謨三數公君家中丞最瀟灑軸轤十萬搗虛來帆檣蔽空聲吼雷從容決策掃強寇手扶日月滄溟開盜犯洪都突彭蠡炮石星流湖水沸御舟閣河諸將譁神箭穿顱逆酋斃是時中丞謀略精指揮英傑江南平掀髯撫掌談世事天子稱善群臣驚寰區混一定勳賞鐡劵金符頒土壤中丞獨擅翊贊功賜號每為諸伯長青田宰木三十年高皇仙馭亦賔天國初故老尚誰在幾人事業圖凌煙忽見聞孫三歎息秀目踈髯遺像逼擬樹豐碑墓道邊欲請天朝重褒錫至尊含笑問近臣先帝功臣今有孫胡為拂衣入山去旰食未敢干君恩海內只今無盜賊幽州興兵惱邦國廟堂謀議豈無人我懷中丞淚沾臆嗚呼志士古所稀留侯武卿今是誰九原招公倘可作為解四海蒼生危題王節婦妾入君門知有夫夫雖不幸夫子孤人生必死死即巳大義一失將安圖爾有金如山我有心匪石頭髮可斷頭可得以死報夫奚所惜幽哉猗蘭芳在彼澗水湄荆棘非不繁永終保令姿千秋萬載苟可滅白日成塵海成血楊節婦良人贈我明月珠永託團圞誓無違豈期生子髮未髫竟以王事捐其軀妾身既作楊家婦撫此孤兒事堅守明月之珠深自藏千金不落他人手青絲髮斷今復長妾心直與珠爭光推門鬻市卒不售死將地下還阿郎玉堂學士文章伯為發幽貞播金石千載少以曹家妻凛凛遺風可相敵題許節婦傅渭水不可濁豈與常流俱節婦不可辱自與常婦殊節婦之節良可書書出大手名斯垂嗚呼竒花異卉人難植瑞麥嘉禾不可常種得寫懷子􅒑聲裏吳𧖟熟星繭纍纍照人目踏車已作春雷鳴我獨無人冷機軸繭老蛾飛爭奈何愁端零亂如絲多故人一去不復返徒有血淚如春波新婚巳盟未諧耦青鳥傳音在春後青春會少離别多心事殷勤向誰剖君不見古井淵源百尺深欲汲未得勞人心井深百尺君莫恨但恨繩索無千尋聞鵑不如歸去不如歸去一聲動我愁二聲傷我慮三聲思逐白雲飛四聲夢繞荆花樹五聲落月照踈櫺想見當年弄機杼六聲泣血濺花枝恐汚階前蘭茁紫七八九聲不忍聞起坐無言淚如雨憶昔在家未逺遊每聽鵑聲無點愁今日身在金陵上始信鵑聲能白頭律詩懿文皇太子挽詩十章盛德聞中夏黎民望彼蒼少留臨宇宙未必愧成康宗社千年恨山陵後世光神逰思下土經國意難忘文華端國本濳澤被寰區雲繞星辰劍春回造化爐變通周典禮寬太漢􅒑模厭世嗟何早蒼生恨欲枯監國禆皇政憂勞二十年龍樓方愛日鶴馭遽賔天巳失群生望空餘萬世傳長江一掬淚流恨繞虞淵相宅圖方獻還宫疾遽侵鼎龜懸寶命笙鶴動哀音誰紹三皇治徒傾四海心關中諸父老猶望翠華臨三朝兼庶政仁孝感嬰孩萬歲千秋志經天緯地才未登宸極定忍見泰山頽聖子承皇業能舒四海哀懿文光典册善美過昭明曆數歸元子哀榮慰聖情神靈逰帝所陵寢鎮天京公論當時定千秋有頌聲虹光流渚日五馬渡江年聖質中興運天倫位正傳德隆尊未極仁與壽難全餘慶垂中古皇家世有賢淵默師成憲端嚴信若神承天行日月與世作陽春鋭意思寬政溫顔訪老臣至今江海士猶想屬車塵六龍猶未御萬物巳昭蘇使處尊崇位應無凍餒夫不知天上樂還憶世間無八極遨逰暇踟蹰顧帝都斥土開瑶殿因山近翠微神輿離鶴禁天淚濕龍衣日月還丹闕風雲送六飛太平皇業固清廟詠光輝右十詩蓋以寫臣子之至情而寓攀號迫切之意未嘗敢以示人今以記事靈殿適舍弟以諸生來見感泣乃書以與之然辭之卑陋而事之隆重身之踈寡而道之崇高冝其不足以形容之也大行皇帝挽詩􅌖哲君天下恢弘德化新宵衣啚治道側席致賢臣王氣金臺曉仁風玉宇春忽朝雲晏駕率土淚沾巾謝蜀王撫問賜藥六首有序臣伏承􅌖恩撫問兼賜良藥及臯比講席拜受之餘無任感荷敬次滕訓導所寄詩韻粗述瞻仰之誠辭句蕪拙乞垂宥察而正教之幸甚超悟天人際從容禮法中豪端錦江水麈尾雪山風善共東平樂才看兾北空感恩慚獨厚箋疏許頻通壤地三千里絃歌五十城廷多漢長者座有宋耆英立事多師古行仁不近名願存無逸戒佇見治功成聽政憂民切虛心待士虔典章皆有據談笑總堪傳夜月初筵酒春風廣厦氊小臣懷德處每憶白駒篇大名傳海宇盛德冠時人文字天垂象姿顔嶽降神仁施邦域逺年與憲章新願沐恩波濶花溪理釣緡賢王思賤士欲為制頽齡藥授還丹祕功存本草經駐顔嗤鑷白閲歲比冬青倘遂飛升去長依傳説星服猛本王政賜皮書閣中林泉眼如電文采座生風似可講周易寧須喚小空深思避賢者玄理未能通應召赴京道上有作三首搖落秋冬際蒼茫鄞越間青山欹枕過白鳥背人還問俗鄉音異消愁酒價慳虛名果何物不使病夫間官程催歲暮百尺可停牽煙浦高低樹晚江來去船青山過越少滄海帶吳偏所遇無親舊懷人興眇然客路喜暄暖初冬天始寒近京風俗異逆浪水程艱人語吳音雜漁歌楚調酸畏途非好友懷抱若為寬病中述懷二首卧病知為國尤須謹未形盛強多過計安逸每傷生燮理冝修政醫治乃用兵但令元氣固四海樂升平故交憐抱病意厚數相過憂患人難免方書俗易訛衛生功莫就醫國理如何但喜心無恙斯民疾更多送盧信道漢中點兵喜子東南秀照人眉宇清早探經濟學巳負老成名治世難忘武邊城要足兵關河雖跋涉歷覽快平生題萬間室一室才函丈何緣號萬間靜中存太極圖裏看人寰舒卷心無外經綸意自間誰能同此樂魚鳥亦歡顔題曲徑曲徑濳通市高墉逺背村醉眠忘作客靜讀懶開門古學嗟中絶群經續巳繁平生刪述意深恐負乾坤次韻奉寄好義四首真齋至出見寄詩甚慰懸渴諷詠不能巳因借韻述懷邑中還同宿偶作一首今并録上初旭濕霜痕溪流緩復奔路因頻到熟心待舊交論山勢隨村曲窑煙接海昏知君多善教所至俗還敦聞説幽居僻仙鬟翠崦南陽坡饒美木曲澗會澄潭問俗何方古藏名此地堪深期帶經往清夜擁爐談野性便時棄虛名耻世聞目緣多慮暗志為好竒分傍日翻書卷臨池寫練裙思君同雅興搔首誦停雲混俗非真隱深居學避囂看雲山映竹坐石水通潮道勝貧何病神完趣獨超遺經對千古意頗似聞韶草沒階前石雲連戶外山位居人下拙身在病中間出處多難事逢迎有瘦顔仰看雙白鶴暮向逺林還歲暮寄王修德先生二首杪歲垂垂盡寒花悄悄繁律回春有信氷動水生痕朴學慚經濟窮居廢討論都將百年意一笑付乾坤長嘯茅齋窄淸談酒盞空天寒爐擅寵歲惡甑無功計拙居鳩上身癯訝鶴同燈花笑愁絶故向夜窗紅承冝隱友兄同還精舍賦短律五首為别風檻臨溪敞幽人稱隱居高松偏宿鷺濁水最多魚鄰父邀嘗酒鄉豪笑著書時艱知巳少來往莫教踈携友踏溪沙同尋隱者家雨多知損麥土暖喜冝瓜身願明時棄文慚世俗誇旅懷難一笑撥遣付流霞於世吾何補論心子最知呌閽他日恨感事百年悲地主能投轄天間幸脫羈談經深夜坐涼月在清池情深難遽别送逺却同歸衣濕灑塵雨路經垂釣磯山童迎客慣國士似君稀且復聽雄辨前賢賴發微千載康成學群賢惜異時典章秦火盡禮樂漢書疑聚訟吾何敢承家子莫辭從來參筆削萬一補民彛次韻答錢文學二首幽亭斜日在佳興與君同屐潤催詩雨衣涼醒酒風鵝群穿草白蜂足帶花紅愁散身殊健全寬雲夢胸雲山留客住尊酒賴君同照影林端月淸心水靣風醉書詩草里笑剪燭花紅不是聽雄辨難消磊磈胸題畫二首得意攴郎畫分明是米家亂雲浮雜樹逺渡卧枯槎白屋孤舟逈丹崖一徑斜何時共漁叟洞口訪桃花曲折成千里雲山儼一鄉林踈茅屋見水落釣舟藏世路羊腸外仙家鳥道傍此身何處著箕頴意難忘寄童伯禮二首俗薄吾深厭家肥子孰過孝慈諸弟共才俊一門多處世難同衆居鄉本貴和古來修禮讓盜賊尚投戈黍肉屢來饋寸心殊自憐傷廉增我過尚德貴君賢握臂知身瘦捐書待病痊每懷徐孺子衰世道能全催菊蚤帶春泥種頻添沃壤培如何九日至不見一枝開時過花何補天寒客懶來便須連夜發莫負掌中杯代菊答生意本天得無人亦自芳但能娛晚節何必媚重陽服食多延壽風霜獨擅場秪應夷皓輩心迹可相忘過北山翁避世慚無術忘年賴有翁山中九日後花下一尊同江逈宜秋色林踈怯晚風放懷甘取醉舍此更誰從送鄭履順二首病卧思親友幾人能見過天寒念我至風義覺君多取士周三物論才魯四科相期曾閔上歲月莫蹉跎學是千秋事文非一藝卑古來傳道術誰免假言辭魯史三王政周官百世規知君美才氣慎勿負深期峨眉縣曉發次韻渡水籃輿穩穿林草徑微勝逰方外得樂事世間稀風過欹僧笠雲來挂道衣山靈應待久好去莫相違謝群公送别賤士何須送群公不世情聽雞朝謁後並馬出郊行心戀金門逺身依玉樹榮愁來今夜月兩地向誰眀道中遇盧先生先生獨無慮作客竟忘歸謾把詩書閲寧知世事非秋風吹落鴈江樹隱斜暉少立橋邊路相思恨久違春和五首幽人逰澗谷芳譽動京華暫食高山蕨終簮上苑花醉歌辭激烈老態影欹斜願得萬間厦轉為寒士家山深諸藏殖海廣百川歸材蓄廊廟器文張錦繡機魚龍將逺化鳬鶴漫齊飛為愛賢名久人間萬事非慨余徒就老羡子早馳名幽谷遷鶯語九臯孤鶴聲課蒙聊給膳教子力勤耕身世相忘久山猿總不驚念子身冝隱憂時志復存騰章吐語索句發竒言燕雀爭栖閙豺狼鬪食喧寧知陶靖節適意向田園鄭生瑚璉器曾住此林丘死骨今埋土新阡誰樹楸百年愁莫遣一夢樂誠優惟念雙親老無能為爾謀寄處州教授蘇平仲先生四首懷舊輕千里無書逺七年論心思盡地會靣極升天名重連城價文雄萬斛泉何時絮巵酒紀德浦陽阡舊習深知誤虗名久自羞故人猶比數文苑昔同逰婺女遺言絶胡公學制優料君施善教才俊滿南州蘿山同業士存沒兩無聞未盡人間用寧修地下文劉郎應屏迹鄭谷自清芬搔首看征鴈天寒逺索群昔過東陽縣知君近始來留詩徒屬和無計復邀回賴有梁園客同傾杜酒杯死生星散後感舊復憐才二十九日三首揮淚劬勞日持觴孝義門敢承千古託恐負二親恩善頌慚諸彥傷懷望九原寂寥生意盡空愧此身存野人哀感日天子戊辰年巳負懸弧意空吟陟岵篇病身難報國歉歲欲求田築室依先隴將心訴九泉就木悲賢傑持家賴哲兄三人嗟莫並一世竟何成毀壁千秋痛看雲此日情遙憐小兒子念我倚欄楹遣病十首冬瘧春仍壯身羸氣覺虛吻乾秪食粥眼眩廢觀書行步兒童笑形容老病如平生千古意獨在悶難舒病痁當歲晏冬去病猶存氣弱翻多汗心虛苦畏喧此生應有命萬事可忘言向晚移書卷微吟卧負暄底用憂微疾人多悔久生危機非畎畝高枕豈公卿千古斯文託群經此日情廢興天命在得酒且須傾急雨張燈夜匡床伏枕時食貧冝客少身病願春遲道豈斯文著才非聖世遺用心耕鑿外榮辱竟何施久病諸人問深居四壁牢故交貽善藥姻婭饋醇醪間厭虛名絆貧知古道高時來稍暄暖斟酌減綈袍二月風猶徑寒生滄海波呻吟知夜永羸憊損天和行覺冬衣重眠妨夜食多百年強壯日排悶付高歌出戶迎人倦投床散帙迷牽衣嗔稚子煮藥愧山妻葛令尋勾漏梅生入會稽病思方術士亦似咀雲泥春風已兩月閉戶不相知百舌強言事衆芳空滿枝官途多世難卧病亦天時應有簮纓者低頭羡我為飲酒留杯底攤書礙枕旁人扶修冠櫛客勸罷文章穀雨催田父花時到海棠病夫渾不較流轉任春光病久身渾憊醫踈術易窮囊空冝勿藥迹滯尚飄蓬禮樂周秦後乾坤槖籥中數行憂國淚江海與俱東童景純來二首千古劬勞恨三冬瘧癘餘故交猶記憶尊酒問何如拜倩人扶答文教子代書何時減藥餌一笑百憂除欹枕雨聲歇竹間聞鳥鳴病惟愁是伴間與懶相成墮地驚兹日終天負所生一杯魚菽祭悲感淚縱橫贈鮑民瞻學道懶言文君文思不群雪消三峽水波漲一川雲出處存爻彖經綸在典墳莫名詞苑傳須立濟時勳哭吳樗庵先生五十韻夫子嗟淪喪鄉閭頓寂寥百年遺老盡一代典刑銷在昔朝廷盛諸儒學業饒著書磨歲月抗論切雲霄獨步才偏壯清時俗未澆翟門人競集鄭驛客嘗邀冠蓋來千里牲牢具一朝柳營嘶騕裊茗碗捧妖嬈家釀傳荷葉溪鮮貫柳條醉猶親簡策樂不為簞瓢晚節趨王命顰眉逐使軺將軍開幕府畫諾任賔僚燕薊藩翰重兵戎節制遙宣威增國勢褫魄遁天驕絶漠清烽火前驅奏鼓簫歸田心戀戀解組思飄飄松菊猶堪理桑榆幸未雕散金思效廣擊壤願歌堯紗帽長蒙首銀章懶束腰吟哦今李杜吐納古松喬勝會無虛日清談或屢宵小心親里閈避咎狎漁樵名美偏招謗年高未免謠鬪牛嗔孔雀孤鶴畏鴟梟媚灶慚何枉懷沙恨莫消事隨東逝水迹斷舊題橋素櫬還家慘緦麻聚哭囂可憐嬰世網本不負天朝盛德知誰繼冤魂謾擬招園林春黯淡風雨暮飄颻致逺悲良驥搏空憶皂雕聞喪皆頓足知巳自垂髫秀句時稱賞華筵必辱要吟成珠滿𥿄坐久斗回杓適意魚依藻搜竒翠映苕劇談衾每共痛飲燭頻燒髮為工詩白心緣慮患焦豈知埋玉樹常想報瓊瑶劍許何當挂琴存久不調巳同麟斃魯空待鶴歸遼官忍題朱旐家聞賣黑貂徑荒泥蚓出池廢雨蛙跳隆替天難問災祥理匪昭聖賢從古歎憂患幾人超女在難同蔡身危不類眺知音俄頃失抱疾轉無聊蜀魄三更月胥江萬古潮誰能名季札應解訴臯陶痛絶生芻奠哀傷壞木嗂空齋暮聞笛揮淚向風飈次危紀善五十韻倍成千字獻蜀王有序臣幸侍燕間叨陪論講於道德之奧雖未敢窺然不可謂不知其一二近閲危紀善五十韻排律詩因次其韻意有未盡輒復增加􅍏數倍之成一千字上進蓋以紀事實而昭聖世之盛美非欲效詞人墨客以靡麗為工也伏惟賜覽觀焉曆數歸真主皇威定八荒奉天頒正朔截海統封疆建國遵姚姒貽謀鄙晉唐德星臨井絡全蜀仰賢王白日開金殿紅雲綻繡裳輿圖文獻域城闕武擔陽地秀多才彥田腴足稻梁十年藩輔重萬里幅貟長南土通滇𤏡東陲帶沔湘周封元過楚禹貢舊稱梁盛德超中古高名冠四方擎天為柱石瑞世比鸞凰禦衆樞機簡臨朝禮貌莊正冠居便座決事處齋房實踐循􅒑矩精思入混茫小臣名盡記直士諌無妨該博尢知要英眀匪過剛群書陪几席前哲儼羔墻旦奭宜方駕間平合侍傍事神孚肹蠁欽聖祝穹蒼講學心無逸憂民意不忘陳經黃閣老問俗白髯郎不泄親毛頴知微却杜康青雲隨鶴駕紫綬列鵷行漢代􅒑模大周官法制詳懿親思魯衛洪業重高光師古人為鑑存心禮自防不知千乘貴惟恐一夫傷餓殍虞填壑流民閔陷羌氷縑贖賤頴玉粒飫飢腸但欲賙黎庶寧辭罄積倉分曹具饘粥隨處集羸尫有嗿群聲沸相携蹇步蹡胥靡無橫夭盜賊耻相攘恩出蠲租令歡騰施藥坊嬰孩頒穀養胔骼賜棺藏故老偏優禮先賢盡表章中興想劉葛佐運念關張擬植千尋柏還栽八百桑廟堂新邃宇劍履列長廊杜屋重輪奐花溪頓煒煌齊名圖至白接武配蘇黃善政俱修舉仁聲逺播揚校人馴柙虎膳宰縱河魴要使天心順寧教物命戕至誠通造化惠澤及飛翔淵懿真堪述謙恭莫肯當崇儒先五教建極重三綱開館延耆艾隆師錫篚筐衣冠儀秩秩絃誦韻洋洋執業諸生衆求書使者忙九流分插架萬卷載連檣樂善人心恱無為國本強虗懷臻聖域騁步領文場揮翰銀鈎活摛辭玉佩鏘鼎彛皆國器蘭桂本天香觀妙言逾冨研精食靡遑日惟親孔孟性不惑姬薑軫念窮邊地垂情健卒糧撫身無凍餒遇敵必騰驤解語踈鸚鵡長鳴歎驌驦劭農興耒耜寬法絶桁楊當代真希遇前王或未嘗泰山高莫並瀛海浩難航麟趾耽經史龍衣佩瑀璜笑談溫玉色追琢燦金相肅挹尊賢傅端居喚小璫已能通魯語正可齒虞庠玉樹連枝秀瓊葩奕葉芳骨竒瞻日角泒近識天潢舉措存寬厚搜羅必俊良聚賢頻設醴寶訓舊明堂末學逢昭代平生服令望承顔初見日屈指九經霜術類千金帚榮過七寶牀敢期蓮作炬每飲蔗為漿身賤思疑病言高點類狂汗顔趍紫闥馳夢落滄浪心怯