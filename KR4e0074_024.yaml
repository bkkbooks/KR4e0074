紗籠玉瑩珠圓顆顆同願采豳風歌七月要知稼穡重三農農事艱難古所憐一生幾度遇豐年若非聖世輕租稅逐末何人肯力田九經治國本修身身正方能鑒别人辨佞要知駑異驥任賢莫指玉為珉君王待士古來無令德高名滿八區濟美喜看賢世子巳能端拱禮諸儒去歲開倉賑餓夫今年下令活無辜東平謾説能為善未識當時有此無稅薄刑淸見盛時民安田里俗熙熙欲求上古無為治仁孝君王自足師謝蜀王賜果十首有序屢承佳果之賜偶爾成句并述所見以寄下情謹録進上伏惟宥察涪州丹荔擅時稱翠篚來庭色尚新獻罷未曾登玉案先教頒賜與群臣翠籠擎出殿門東受賜群臣喜色同却笑開元恩未廣秪將異味恱深宫尚食頻供素膳回金壺仙醖不曾開君王嗜道渾忘味佳果何勞逺貢來無才慚曵殿門裾珍味頻嘗玉饌餘解道側生風味好惜非梁苑馬相如九重勤儉恤民勞錫貢深思道路遙異味竒珍俱詔罷皇明家法勝前朝病身趨召歷千山又見江城荔子丹竊食無功心有愧賜歸分與衆人看園官愛果勝黃金一樹生成一樹心味美巳知堪適口當思培植用功深利欲頽波挽不回幾人沉溺壞靈臺要明聖道無窮意須仗賢王不世才道術衰微幾百年陋儒無力愧皇天已看位是真王貴須使心承往聖賢新製蒲鞭賜理官丁寧用法效劉寬好生要使民無犯示辱如寬也不難無題三首宫臣傳教造安車駕出金門賜舊儒優老免親藩國政入朝唯讀帝王書山南桃李競春光食實年年在異鄉應被旁人暗相笑間官那得許多忙伯兄海上思相見幼子山南憶别離兩地關心歸未得夜看雲漢立多時逺違闕庭二首戀闕思家兩繫情君王恩重屢留行欲知去國遲遲意三日秪趨一日程形如稿木榮枯泯心似虛舟去住忘底事别情猶不奈只因懷德慕賢王逰峨眉山紀行十首一鶴相隨復一瓢山巔水澨足逍遙秪因戀闕情無限回首忘過萬里橋西蜀雲山處處竒最竒人説在峨眉想應踏遍千崖月露滴松梢鶴夢時出郭涼風入抱清亂山遮馬似相迎寧知待召登瀛客忽作看雲聽水行王憐塵土辱凡肌命入雲山茹紫芝只恐同袍不相識誤猜禮佛到峨眉客久賢王兩賜衣不知春到巳春歸清朝試出都門看留得殘紅一片飛山頭月出天初露江靣風生水欲波正是勝逰新得意片雲相引入岷峨朝辭宫闕莫田家江白山清兩岸沙卧犬不驚籬落靜麥風簷底響繅車孤舟湖口一名僧咫尺鄉山識未曾今去峨眉同覽勝躋扳須上百千層名山佳處孰同逰白髮緇衣四五流青眼古銘鄉士彥燈前夜夜話台州學仙無骨佛無緣甘著儒冠坐一氊入社敢同陶靖節不須三笑虎溪前入山後覽定水仰山二上人并吳講師次豫發成都絶句韻因復次韻述事言懷落日斜眀挂樹瓢下方城郭去人遙青山過雨僧深定門外雲封獨木橋羽客禪僧也好竒對人覔句幾攢眉林端新月初高夜葉底殘紅落盡時倚澗人家近更清吠風驚犬走還迎衲衣鶴氅從章甫落日看山一字行山南夫子待多時庭外松花落澗芝夜半夢回聞鼓響覺來顙泚冷沾眉澗底白頭僧浣衣雲間童子負薪歸幽栖更羡投林鳥半巳尋巢半巳飛千尋古木巳無柯萬丈深淵不起波此日勝逰他日記落花時節到中峨東海西頭是我家門前花徑接鷗沙三年别後一作却徒多恨敢道詩書讀五車山行十日只逢僧盡道蒙恩報未曾共上峨眉望宫闕祥雲五色繞三層奉詔名山作勝逰壯懷如水不停流今朝獨坐峨眉頂一覽端能隘九州榻借禪那豈夙緣坐來渾似舊家氊祗應心事慚蘇晉不解長齋繡佛前次韻寫懷送叔貞之成都十七首有序乙亥新春出城東偶作十七詩同逰諸友從而和之因亦次韻以寫所懷會叔貞之成都書以識别詩中所云司戶孫者即叔貞也道濟群生心尚歉知周萬物禮逾勤能為世上難行事始是人中寡過人盛世豈無謀國者漢家長憶冨民侯榮名史䇿尋常事公論江河萬古流漢高嫚士千餘載不見師臣與友臣解使時君謙德重孔明而下兩三人下士立身涇渭渾胸中耿耿是非存子雲美新最可賤著作猶尊李仲元密葉叢篁噪晚鴉荒村百里兩三家疲民采拾供租稅猶恐傍人議榷茶多才久要錢文學長日詩筒衮衮來俊思雪消三峽長好懷春到百花開伯尚庭前傾竹葉用中宅畔看梅花天教二子相為樂來往風流也足誇每懷樗散鄭司戶喜看𣏌梓作孫枝氣清似得江山助才異休令匠石疑胡生挾策行千里足繭衣穿不肯回斯道要為終古計丈夫寧避俗人猜江山萬里無黃耳雨露三年憶紫荆日暮出門聞鴈過忍聽雲畔索群聲一念無為付道耕百邪還聽斂心兵本原能與天同體三代功名始可成浩蕩乾坤爛熳春天將樂意付窮人逈無臭味堪誇世縱有爭心豈解嗔烏石岡頭白苧衣幾回醉伴夕陽歸山中兄弟遙相憶未必天心與我違我與東風作主賔忍教負却太平春一觴一咏酬佳景也未輸他世上人梅徑桃蹊繞蓽門半依城市半通村春風一見如相識莫逆於心兩不言魚在深淵鳥在山乾坤無物不相關野亭日午攴頥坐間看雲天一鶴還食罷移床坐小亭細看群蟻奪餘腥倦來莞爾成微笑宇宙茫茫幾廢興感舊九首雄文不見林公輔病眼荒荒何處開將相亦輸天上樂多情莫向世間來杯酒論心有幾人天台張穀舊相親近來詩句多竒語書比藏真更絶倫精通八法楊文遇暗誦五經陳用中揮翰天庭應獨步忍飢村巷欲成翁翰苑暫歸盧太史銓曺巳失鄭郎中名高金殿龍頭選夢憶蒼山馬鬛封林鄭為文學我家波瀾議論闊無涯兩年不見何時到望斷嶓江八月槎博陵博士才華盛漢上畸人道術卑欲寄一書無鴈過相期千古只心知立言溫粹懷陳采肆筆縱橫憶鮑岡若使韓門加接引未容籍湜獨升堂王郎逺逐雲中戍許子俄為地下郎重訪舊人尋舊迹嶺雲溪月總堪傷多病深知志術荒中年苦復厭文章欲圖天地相終始肯與時人較短長别母舅哭外舅鄭公三首昔奉安車共入關擬於此路復南還今朝獨向江東去淚灑西風草樹斑女甥携抱逺相從骨肉情深反負公南鄭江頭三尺冢夕陽衰草萬山中竹帛相期古道深結婚端不為多金自慚非是竒男子恐負侯高擇壻心中秋對月二首雙櫓鳴江水不波雲山無數拂船過夜深把酒問明月月色與愁誰較多南鄭荒墳草木寒東甌舊宅桂花丹九秋最好今宵月又向孤舟獨自看題漢中三寺佛放光三寺神燈古有名我來惟見月華清非關佛日今消歇應避文星不敢明蜀相像羽扇綸巾一卧龍誓匡寶祚剪姦雄圖開八陳神機外國定三分掌握中買臣妻墓青草池邊一故丘千年埋骨不埋羞丁寧囑付人間婦自古糟粳合到頭二喬觀書深閨睡起讀兵書窈窕丰姿若個誰千古周南風化本晚涼何不誦關雎王節婦兩月孤兒百里墳一燈風雨幾黃昏可憐玉帳豪華客不識金沙節義門鄭義門丹詔旌門巳拜嘉千年盛典實堪誇史臣何用春秋筆天子親書孝義門彭山道中煙鳥歸林巳夕陽野人相引度高岡馬頭一片青山影經過絺衣似水涼夜度桑洲驛山路彎彎石甃平碧天涼露下三更無端一夜西風惡吹著新愁上紫荆客至竹裏烹茶費屢呼携壺沽酒繞村無同餐麥飯無難色風槩知非淺丈夫聞盧原質表兄廷試探花郎授編修喜而寄之奉天殿上榜初開共賀江南得秀才好是青蘿居士説近來文運屬天台送義烏龔叔安給事歸省二首雞舌同含侍紫宸朝回東閣每相親片帆忽逐西風去鴛鷺行中少一人繡湖煙雨正冝秋之子還家喜得逰忠孝堂前舊明月相隨重到鳯池頭談詩五首舉世皆宗李杜詩不知李杜更宗誰能探風雅無窮意始是乾坤絶妙詞前宋文章配兩周盛時詩律亦無儔今人未識崑崙派却笑黃河是濁流發揮道德乃成文枝葉何曾離本根末俗競工繁縟體千秋精意與誰論天曆諸公製作新力排舊習祖唐人粗豪未脫風沙氣難詆熙豐作後塵萬古乾坤此道存前無端緒後無垠手操北斗調元氣散作桑麻雨露恩覽陳先生見和諸詩戲題孔璋揮翰檄曺公烈日秋霜格力雄白髮雲孫千載後新詩尚可愈頭風道者扇競利爭名不暫休紛紛盡逐水東流道人心事如松柏閲盡尋常草木秋題山水隱者先生六嵗時作棟宇參差逼翠微路通猶恐世人知等間識得東風靣卧看白雲初起時題山水霜落江南木葉丹滔天波浪一舟還何人得似林中叟目送浮雲過逺山修德惠枯木圖次韻有序修德先生寄惠枯木小幅并以詩留别病中不能追從謹次韻奉答四首逺别出門愁見難燕山越水路盤盤將心付與天邊月兩地清宵一樣看月明樹影落晴波寫寄山房古意多巳分此身同稿木歲寒相對老巖阿百年禮樂愧前賢濂洛微言久不傳待子歸來同講習細炊麥飯飲寒泉至道無聞昧力行神交千載獨周程直教俯仰渾無愧始是堂堂世上英見梅寒梅凍後放幽姿何事今年花較遲昨日途中春意到溪頭才見兩三枝畫梅微雪初消月半池籬邉遙見兩三枝清香傳得天心在未許尋常草木知竹不禁俗物敗人意忽見幽篁眼為明記得舊逰天上夢連昌宫外聽秋聲題東坡畫竹內翰何年寫畫圖眼中驚見鳯毛孤一枝潤帶江南雨遂使眉山草木枯斑竹圖湘君泣盡淚痕乾翠袖蕭蕭倚暮寒却憶洞庭為客處滿湖風月泛舟看墨菊二首解印歸來鬢巳斑故園松菊可怡顔祗緣三徑荒涼久特寫秋花仔細看分根昔日向東籬種近羲之洗硯池幾度偶澆池上水花開朵朵墨淋漓題菊順流舟楫日邊回古木軒囱水際開萬里西風數行鴈送將秋色過江來馬一日曾騎越與燕鼓車隨後意茫然圉人何必相羈絆亦未乘龍去上天聞燕曉夢驚回燕語巢窗前紅日在花梢心思佩玉朝天日待漏金門鼓尚敲百雀圖曲巷高簷避網羅朝來飽啄隴頭禾但令四海長豐稔不厭人間鼠雀多羲之籠鵝圖內史清真江海情每將高誼動朝廷平生却被能書誤更為鵝群寫道經荷花渚禽絶世丰姿不受塵丹霞為質玉為神渚禽莫怪開時晚一洗尋常草木春鸚鵡幽禽兀自囀佳音玉立雕籠萬里心只為從前解言語半生不得在山林立春偶題二首萬事悠悠白髮生強顔閲盡靜中聲效忠無計歸無路深愧淵眀與孔眀百念蹉跎總未成世途深恐誤平生中宵擁被依牆坐默數鄰雞報五更臨海縣知縣黃誥黃巖縣知縣張師善台州府儒學教授尚芳訓導李深黃巖縣儒學教諭文程府學生陳縝葉琰王梅齡臨海縣學生李臨卿戴濬之黃巖縣學生孫思光牟汝鈞校對
