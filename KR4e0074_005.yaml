front:
  text: 遜志齋集卷之五
  hash: sha256:601e9926a8ec8e55c3bd8694d54207ab22838e5fa0080e7b64082c7ce2f4f899
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4e0074_SBCK_005-1a}
body:
  text: 中順大夫浙江按察司副使奉敕提督學校雲間范惟編輯奉政大夫浙江按察司僉事奉敕整飾兵備南昌唐堯臣校訂中順大大浙江台州府知府事前刑部郎中東吳王可大校刋雜著夷齊聖人之道中而巳矣堯舜禹三聖人為萬世法一允執厥中也不及不謂之中過亦不謂之中請即此而論之伯夷叔齊孤竹君之二子其父將死遺命立叔齊父卒叔齊遜伯夷伯夷曰父命也遂逃去叔齊亦不立而逃之其後周武王伐商去隱于首陽山耻食周粟遂餓而死孔子嘗稱之曰古之賢人孟子嘗稱之曰聖之清誰得而議之哉雖然抑有説也先君之國受之於祖宗者也父子傳次以嫡以長古之制也易此必亂昔周太王三子長泰伯次仲雍次季歷太王欲傳位季歷以及昌泰伯知之即與仲雍逃之荆蠻以順父志以成王業孔子稱之以至德且曰民無得而稱焉夷也茍知父志欲立齊當效泰伯順父之志隱然退避於治命之日不當行巳之志顯然辭讓於亂命之餘也叔齊亦不立而逃之幸有中子以托國焉苟無其人其如先君之社稷何湯武之征伐即堯舜之揖讓天下歸周天之命也潔身自逺斯可巳矣何乃耻食其粟獨食其薇也庸非周上之毛乎斯皆過乎中者也於乎廉頑立懦足可為百世師過中失正恐未臻乎堯舜禹之道此孟子之所以譏乎其隘而孔子至德之稱在泰伯而不在夷齊也厥旨深矣有子孔子既沒天下之好為言論皆自托為孔子之徒而竊擬其説以折衷義理之得失至孟子時相去猶未逺而其言巳紛然淆亂不可勝辨孟子每深斥其非然亦不能止也不幸重之以秦火孔子之微言幾不復存於是儒生愈無所憚肆口恣意摹效語言不特托為其位而直以孔子自命孔子之言滋以不醇今雜出於諸子家語禮記之書者多附會鄙妄不可盡信者也然孔子時詩書錯繆賴孔子修而定之故人不惑於邪説今孔子之言乖亂甚矣後世無聖人者作則其説何由而有定耶猶幸其出於道術不明之時其論不能精深故學者得以窺其缺漏而知其為偽不然其禍可量也耶喪欲速貧死欲速朽未必為孔子之言然未為甚過也有子聖人之徒奚於此而疑之以中都棺槨之制而謂不欲速朽以命子夏冉有之荆而疑不欲速貧此尤誣聖人且誣有子也孔子之於仕止皆曰有命何汲汲於得位而先之以子夏與冉有耶使孔子誠急於仕乃急於行道也豈為不欲速貧哉為貧而謀仕於蠻夷之地􅗎且趨焉惟恐不得者鄙夫之所為曾謂孔子為是乎四寸之棺五寸之槨考諸王制參諸人情使君子致仁愛於其親非特不欲速朽也欲速朽者自為之道不欲以身為天下費也棺槨之美者事親之道不敢以天下薄其親也二者固各有當矣有子賢而知道者奚疑於此而非之此不惟非孔子之事決非有子之言也孔子之道猶天之賦物物受之者各異而因其所受者皆足以有成故其言近而未嘗不該乎逺淺而未嘗不極乎深上而可通乎下粗而可泝其精及其門者惟顔子庶乎近之而未至也孟子以下皆未免滯而未化矣有子未及孟子其言豈能似孔子哉為是説者非惟不知孔子亦未知有子者也故觀論語春秋者當因其辭以求聖人之意觀禮記諸子者當以聖人之意折衷其詞鬻拳鬻拳以兵諌楚文王而自刑左氏稱之為愛君余謂不然君臣之際固有常道矣賢者之事君不為違道之行以危身不為難繼之事以駭世順其常不徼異名守其職使後可法如斯而巳不敢僥幸以圖志之必逹事之必成也故君有過舉則積誠以諌三諌而不從則避其位而去之安可臨之以兵脅之以威而劫其君哉語之而不聽則讋懼之咄吒之俾不敢肆此制嬰兒之術耳烏有北靣事君而以嬰兒視之哉先王立為上下尊卑之分俾為臣者嚴守之而不敢僣所以杜亂也馬之在原野三尺牧竪鞭之而無罪及加羈靮而入君之間雖國之貴臣不敢視其齒而蹴其芻豈誠重馬哉尊其為君之所御也齒馬蹴芻細故也先王所以嚴為之禁者其慮天下深矣况以兵劫其君者乎或謂君為非義則將危社稷大臣以安社稷為心行權以格君宜若無罪焉是豈得為權哉事固有可以行權者矣然賢者猶難之若君臣父子之分天下之大經也父暴而違道子烏可行權而誶父乎舜聖人也瞽瞍頑夫也舜視其父之惡夔夔然順之不敢見於色設於詞舜豈不欲格父哉盡子之道而使父化乃所以格父也紂之暴可謂甚矣箕子紂之戚微子紂之兄二子皆賢人也至親且賢事暴君而不敢失人臣之禮或屈而為奴或待其亡而去之二子豈不知社稷重於君乎終不忍劫其君者知君臣之大經重於社稷也鬻拳之君雖有過非紂之甚鬻拳為臣非若二子之親且賢乃忍劫其君而不顧蓋激於小忠而不知大義者也焉得為愛君乎君子之豫奪人將以法戒於後世不可茍也劫君而謂之曰愛君將使姦臣亂賊欲行篡弒之事者皆挾愛君之名以自文其禍後世可勝道哉然固左氏啓之也鄭靈公二首天下之事成於大度之君子而敗於私智之小人智之於人固可以成事然用之以私意則流為詭詐險側而智能之士莫為之用故惟足以取敗大度之士其計謀畫䇿未必過於私智之人惟其度足以容物故有智者為謀有力者為戰有才者為之治所為無不成所欲無不得蓋惟不自用其智乃能役舉世之智而私用其智者適足為衆智役此事之必致者也人之度量相去亦殊懸矣世有棄萬金如涕唾者亦有吝杯羔而不肯與人者自棄萬金者言之則巳之所處者大而他人為愚自吝者言之未必不以巳為智而笑他人之妄也周衰諸侯之事亦多吾觀鄭靈公之死未嘗不深衰其智之小而笑其失君臣之道至於不忍杯羔之故而殺其身也且靈公非愚也其不與子公之羔亦非誠吝也特忿子公之笑而言夢為輕也故不與之羔使其夢無徴而乖其素望此兒女子相詭之恆情小人譎詐之私智爾子公怏怏而染指笑而赦之召而賜之可也靈公欲殺之則過矣茍知其心不忠果不利於宗廟正其大罪而誅之亦可也卒不能決遂死於子公之弒計其所為豈不愚甚矣哉君臣之際難矣尊卑之禮不肅則必至於僣上下之情不洽則必至於離惟賢主能嚴其分於朝廷會同之時而洽其情於私覿燕享之頃朝廷之儀或有不欽雖親賢有所不避燕享以和樂為本茍察其末節細禮而罪之則人人自危篡殺之事或階之以起故當容之以寬推之以恕使人咸得盡其情則嚴不至於離而和不至於僣矣靈公既不能預嚴君臣之分陵夷至於鼎爼之前而方責之小禮逞詭詐之智靳於杯羔以取強臣之憤其致殺身豈足怪哉故巵酒杯羔微物也善用之可以重於茅土之賜不善用之干戈鴆毒皆由於此人君自非以度容天下而挾小智以御其臣雖食之以大牢皆鄭靈公之續耳豈足為智哉御臣之術難矣御小臣之難不若御大臣之難御大臣之難不若御權臣之難也小臣有善賞之可也有過罪之可也大臣有功而賞之浮於功則驕不稱其功則怨有過而罪之當其罪則怒不當其罪則肆然猶不敢為亂也至於權臣則不然其威足以懾百姓其勢足以脅人主其喜怒足以為禍福故善御權臣者能隂銷其威而使國之大柄歸於巳者上也其次則莫若制之以禮嚴之以分惠之以恩使自戢其權而不至於僣又不能然則不取其怨怒而巳取其怨怒則危矣世之取權臣之怨怒者非為責其政事而然也非為詰其專橫而然也其始出於爭不急之小務蓋侮慢之私智怨蓄於纎微芥蒂之中而禍發於篡國弒君之大昔之所聞不可勝道而靈公之於子公尤其最著者也子公之為鄭卿蓋久矣靈公始立而為君德澤不加於境內威令未信於朝廷其於國之權臣冝撫之防之徐而收其柄銷其威然後國可得而治也不勝其一笑之憤靳杯羔而不與以取怨卒致弒逆之禍烏得為智乎今夫吾力足以勝人而後嘲之侮之唾罵之以致其怒故每鬪則勝茍不自量而好侮有力之人未有不勝於人者也况子公者久執鄭國之政於嗣君之立得杯羔之賜則夸以為榮決然而靳之不與寧不失其素望而慙同列之人乎雷同而受辱雖鞭撻不足較而耻一人於千百人之中其辱甚於死何者恐為千百人所笑也况子公斗筲飲食之人而挾無上之器其得志於杯羔則喜否則為亂固小人之常情其罪安足論乎獨靈公之失則世之御權臣者所宜知也昔者漢文帝以諸王入繼國統綘侯周勃挾誅吕氏之權常有德色帝待之益莊一旦臨朝而問榖錢決獄之數勃不能對慙愧流汗遂謝病不敢居相位不責其德色之不恭而引職事以問之若文帝可謂能御權臣矣蓋勃之功烈聲威素行於臣民茍責其不恭其心怏怏未必服禍或因之以起矣吾固假之以寬置而不問而以其職問之文帝豈不知其不能對哉出其不意問其所當知使其不對而自慙慙而不敢怨怨而不敢怒其驕慢之虗氣至是索然銷鑠而無餘天下之大柄不待發於聲色而盡歸於巳雖有勃輩十百亦無足異矣此其得御權臣之道者也使鄭靈公有文帝之行烏有殺身之禍哉後之人主不幸而遇權臣以文帝為法而以靈公為戒庶乎其無患矣豫讓士君子立身事主既名知巳則當竭盡知謀忠告善道銷患於未形保治於未然俾身全而主安生為名臣死為上鬼埀光百世照耀簡䇿斯為美也茍遇知巳不能扶危於未亂之先而乃捐軀殞命於既敗之後釣名沽譽昡世駭俗由君子觀之皆所不取也蓋嘗因而論之豫讓臣事智伯及趙襄子殺智伯讓為之報仇聲名烈烈雖愚夫愚婦莫不知其為忠臣義士也嗚呼讓之死固忠矣惜乎處死之道有未忠者存焉何也觀其􅃮身吞炭謂其友曰凡吾所為者極難將以愧天下後世之為人臣而懷二心者也謂非忠可乎及觀斬劍三躍襄子貢以不死於中行氏而獨死於智伯讓應曰中行氏以衆人待我我故以衆人報之智伯以國士待我我故以國士報之即此而論讓有餘憾矣假規之事韓康任章之事魏獻未聞以國士待之也而規也章也力勸其主從智伯之請與之地以驕其志而速其亡也絺疪之事智伯亦未嘗以國士待之也而疪能察韓魏之情以諌智伯雖不用其言以至滅亡而疪之知謀忠告巳無愧於心也讓既自謂智伯待以國士矣國士濟國之事也當伯請地無厭之日縱欲荒棄之時為讓者正宜陳力就列諄諄然而告之曰諸侯大夫各受分地無相侵奪古之制也今無故而取地於人人不與而吾之忿心必生與之則吾之驕心以起忿必爭爭必敗驕必傲傲必亡諄切懇告諌不從再諌之再諌不從三諌之三諌不從移其伏劍之死死於是日伯雖頑冥不靈感其至誠庶幾復悟和韓魏釋趙圍保全智宗守其祭祀若然則讓雖死猶生也豈不勝於斬劍而死乎讓於此時曾無一語開悟主心視伯之危亡猶越人視秦人之肥瘠也袖手旁觀坐待成敗國士之報曾若是乎智伯既死而乃不勝血氣之悻悻甘自附於刺客之流何足道哉何足道哉雖然以國士而論豫讓固不足以當矣彼朝為仇敵暮為君臣􅌤然而自得者又讓之罪人也噫樂毅樂毅不拔二城夏侯太初以為庶幾乎湯武蘇子瞻以為行王道之過余曰鄙哉二子之言也天下豈有行王道而不興者乎觀人之賢否當先觀其所為之事求其事而不得當求其用心之邪正湯武所以伐人之國其心曷嘗有利天下之意乎不忍斯民之困於塗炭挾大義而拯救之使取錙銖之非義殺一介之不辜雖奉海內之籍而歸之湯武不肯正目而視也其心顯然著於天地之間故拔一城取一國他國之民惟恐其來之不速翹足舉首而望之此其為王者之師也使湯武之心少出乎利匹夫匹婦將持耰鋤而逐之矣何以為湯武哉彼樂毅之師豈出於救民行義乎哉特報讐圖利之舉耳下齊之國都不能施仁敷惠以慰齊父子兄弟之心而遷其重器寶貨於燕齊之民固巳怨毅入骨髓矣幸而破七十餘城畏其兵威力疆而服之耳非心願為燕之臣也及兵威既振所不下者莒與即墨毅之心以為在吾腹中可一指顧而取之矣其心巳肆其氣巳怠士卒之鋭巳挫而二城之怨方堅齊民之心方奮用堅奮之人而禦怠肆巳挫之讐毅雖百萬之師固不能拔二城矣非可拔而姑存之俟其自服也亦非愛其民而不以兵屠之也誠使毅有愛民之心據千里之地而行仁政秦楚可朝四夷可服况蕞爾之二城哉湯武以一國征諸國則人靡有不服毅以二國征二小邑且猶叛之謂毅為行王道可乎湯武以義而毅以利成敗之效所以異也蘇子乃謂王道不可以小用小用之則亡王道特患乎人之不行耳小用之則小治大用之則大治猶之菽粟之療飢小食之則不死恆食之則充實奚可謂菽粟不可少食而寧噉粳核之為愈乎太初曲士不足論獨惜蘇子之易於言也曹參天下有不治之治而君子有無功之功非通乎道者不知也人皆知治之可以治也而不知求治而得亂人知有為可以成功也而不知有為適足以獲罪者功與罪固非人臣之所計而治亂之來不可不審也孔子曰如有王者必世而後仁昔甚疑之以為王者之於仁宜其致之速奚待歷世而然哉及觀乎古之求治太急而致亂然後知孔子之言百世不能改也夫民新脫於創殘之中不休息之於無事而遽騷之以制度文為之説使勉而從我則所以仁之者乃所以暴之耳凍溺之人不可以近火久餒之人不可以飽食出溺而近火者必僵餒甚而飽食者必死且火與食者豈有殺之之心哉求其速生乃速其死之道也故善治天下者先以不治治之曹參乏相惠帝日以飲酒為樂掾吏縱􅒬置而不問弛然不復加意於政教朝廷之間幾於亂矣而海內以治何邪若參可謂知治亂之方矣秦之亡不在乎無制而患乎多制不患乎法踈而患乎過密使參而相漢復苛推而詳禁之是續亡秦之熖而熾之也故參寧受無功之名而不忍圖有功以禍當世則利澤隂施於斯民民安於漢而不離漢業藉以久逺者參之功也史以參比蕭何參亦自謂不及然何非參比也何智謀雖過於參而不學故干戈甫定而役民大治宫室其意務媚於主而無撫民之心參茍居何之任必不為此以何代參則何亦不能如參之明於國體而無所變更也漢茍無何則參之才足以立法茍無參而他有才者繼之則漢之法亂矣天下易得也而安之為難安之為易也而使民安於吾之法為甚難參蓋嘗聞君子之道矣故其所為近道如此而先王安民制治之大法固不止如參之所為而巳也於乎道之不行也久矣哉婁敬將興之主惟恐人之無言將亡之主惟恐人之有言天下固非一言所能興亡也求其興亡之故未嘗不自一言始以一言之善而取之天下之賢者必曰取善若是之周也吾奚為而不言以一言之非而罪之天下之賢者必曰其諱過若此之甚也吾曷為而與之言人皆欲告以善是集天下之善於其身也人不欲告以善是以其身推天下之善也有此二者而欲不興亡皆不可得也漢高帝以雄武之姿匿智下意以用當世之俊傑既夷剪海內可畏者而廓清之亦可以少休矣聞婁敬遷都之説即奉宗廟百官而從之夫敬徒譎之虜布衣之人山東之賤夫耳語其辨不若陳陸語其智不若張蕭無夙昔之故左右之薦卒然脫挽輅而入見若涉無人之廷而論國之大事其術可謂甚踈其禮貌可謂甚野矣在廷之臣見其言論必且笑其妄而帝即日下詔與之俱西如不能視者從相之言不能聽者觀人之指屈天子之貴斂絶世之威而惟敬之信當時不以為輕動後世不以為無謀而子孫果安其利是知善不必自巳出貴乎能用人之善人君不必兼衆人之所長在乎因人之長而用之高帝之才非能逺過於人也智非能慮事詭計而惟積至誠用大德以結乎天心使天眷其德若慈毋之保赤子而不忍釋故其子孫雖有至愚不肖者足以亡國而天下不忍遽亡之此慮之逺者也夫茍不能自結於天而欲以區區之智籠絡當世之務而必後世之無危亡此理之所必無者也而豈天道哉深慮論二藥石所以治疾而不能使人無疾法制所以備亂而不能使天下無亂不治其致疾之源而好服藥者未有不死者也不能塞禍亂之本而好立法者未有不自謂能用三人傑故勝項氏三傑帝素所重者用其言為甚易未足以見帝之美踈賤如婁敬而用之不疑此漢之所以興也條侯傳論天下之賞罰必有所受受於人者必制於人大夫受於諸侯諸侯得以賞罰之諸侯受於天子天子得以賞罰之惟天子之大柄受於天而天不屑屑然與之較古之聖人恐其無所畏而肆也於是立史氏以書之史氏者所以賞罰天子而立天下之大公於世故天子之所賞而濫天下莫敢問史氏得以奪之天子之所罰而僣天下莫敢言史氏得以豫之天子之身所為有當否乎其下者莫敢是非也史氏秉大公之道是非之故天子之賞罰信於當時史氏之賞罰信於萬世天子之賞罰可以賤貴一世之人而史氏之賞罰可以懲勸於無窮榮辱於既死君子謂史氏之柄不在天子下彼以其位此以其公也使史氏之豫奪而不以其公後世何所取信哉漢𥘉輔相之臣多出於一時亡命屠販刀筆之流其人皆習熟世故迫於利害善避禍趨變而堅守臣節求諸高惠文景四世間如王陵周亞夫輩無數人而亞夫尤得大臣體在景帝時以爭皇后兄信及胸奴降王之封忤旨遂用他事下獄以死夫封無功者以亂先帝之法納夷狄之叛臣以啓為臣不忠之心此誠宰相之所宜爭也亞夫爭之豈為過哉彼景帝者私刻忍人也欲封其后之兄而亞夫不從其心固有殺亞夫之端矣特未得其名耳及降王而不封其怒宜愈甚特無以屈其説故忍而未發官甲楯之告景帝方幸其有名以誅之遂卒置之於死求其所為事確乎有大臣之風景帝罪之者私恨也為史者宜有以明之而司馬遷反詆之為守節不遜以取窮困嗚呼人臣如亞夫乃可謂之不遜乎夫朝廷之禮君臣之分固有當遜者矣至於為一事而亂舊典起邪心為害於國甚矣茍阿意希旨從而附和之此小人反覆之計謀一身而不顧職業之所為烏可謂之遜乎人臣者以義守職以忠事君利害有所不恤茍畏窮困而安利逹則無所不至矣亞夫之心豈以窮困為戚者哉遷不稱其能守官而詆其不遜不閔其死不以罪而悲其困窮史氏之論若此何以信於後世此吾嘗論遷善紀事而不知統善陳辭而不能斷有良史之才而不逹君子之道亞夫傳之類也霍光霍光以朴直見知武帝輔少主廢昌邑立中宗功烈為漢伊尹而身死受赤族之誅世嘗疑之曰是烏足疑哉光之獲全其軀亦巳幸矣賞罰生殺豫奪者天之大柄授之天子使奉而行焉者也故是六者惟天子得專之然猶不敢私任其喜怒好惡以為輕重而一決之於天功懋焉而後賞曰非我賞之也天賞之也罪盈焉而後罰曰非我罰之也彼得罪於天也其於生殺豫奪莫不裁之於天而不敢預存於心以可專之位持之以恭謹至於如此猶且或有不中禍及於身而殃及乎子孫况於無其位者乎且以伊尹之聖以德則天下莫加以位則為之師而當阿衡之任以功則相湯取天下致太平三世而至于太甲其格於天而著于民亦巳久矣其於太甲也未嘗廢之特奉之居憂於先王冡上俟其修德而迎之以歸其於進退宜無不可時之人孰敢非之然而伊尹既復政於君即決然請去其位不敢略有顧戀遲留之心何者誠知天之大柄不可以久持也夫伊尹聖人不任其私以賞罰生殺豫奪亦昭昭矣猶畏且慎如此彼霍光者自度何如人哉以德則僅若恆人以功則非有平暴亂安宇內之績特以謹願偶為人主所信而托以非常大事計其平日操天子之柄以制群下者幾何年矣其於輕重緩急巳不能無私意行於其間乎哉疑衍然立昌邑既不審隨數而廢之天下之人見其所為蓋巳側目視光者久矣非特天下之人吾意中宗未立之時亦疑光之為人矣不待參乘而後疑之也為光計者當中宗之初立社稷宗廟既有所托不負先帝顧屬之心即宜力辭而引去不許則宜辭朝廷之政不與而以列侯就第庶可少紓中宗之疑而息衆庶之怒光則不然一歸政而不受則肆然而居之至於身死而後巳且中宗是時年近壯矣其於民情國體究之熟矣光曷不思乎當昭帝之初立燕王上官之變非昭帝之明光之誅其得免乎在執政未久之時且若此更廢一主之後其生殺豫奪賞罰之際妄用者多矣使重有告於中宗光其可免乎吾故曰光之不底于戮幸也以其昧於去就之義而不知天之大柄不可僣持也雖然光不學無術其昧於去就不足責也中宗之待光宜亦不能無過焉當歸政之時封之以上國榮之以顯號優遊以師傳之禮而擇其之權使光有明哲之知禹雲山等知威權之不可以太盛而思退戢之道焉光身死之餘豈有赤族之禍乎故赤族之誅不在禹雲山謀逆之時而在光秉政之日中宗之疑霍光不在許后之死而在乎廢昌邑之時故取族滅者非禹雲山也光也光之得罪於天非廢立也僣持天之大柄也嗚呼世有不幸而居光之任者得吾言而思之其可免於禍乎丙吉君子之於天下盡人事而後徵天道天道至微而難知也人事至著而易為也舍易為而求難知則為不知先其微而後其著則為失序堯舜禹益相告戒之辭詳矣傳道則曰執中用人則曰九德治民則曰六府三事至論天道則曆象授時之外未嘗有片言焉三聖賢之於天道豈有所未逹哉棄所宜為而求之恍惚詭誕之域者固聖賢之所不取也宰相之職上有以格君下有以足民使賢才列乎位教化行乎時風俗美於天下倫理正而禮樂興中國尊而夷狄服有生之倫各遂其性而無乖戾鬪爭則可為盡職矣不必􅃮􅃮然探其所難知以為觀美也能盡其職雖日月失明寒暑不節無害其為治職有未盡使天地位而萬物育亦安所益於民乎漢史稱丙吉不問死傷而詰牛喘以為知大體此非君子之言民不知道至於相殺傷於都市之內政教不振而俗墮壞其為變亦甚矣豈非宰相所當憂乎舍此不問而恐隂陽不和何其迂且妄也子路問事鬼神子曰未能事人焉能事鬼不先盡事人之道而事鬼且不可况不務人物之性而徴不易知之天道烏在其能為相乎且宣帝時俗之弊非特相殺傷而巳一歲中子弟弒父兄妻妾弒其夫者二百二十餘人幾不可以為國吉不能佐其主以仁義使革風易俗陷斯民於禽獸而惟一牛之問謂之知所緩急不可也漢儒之學泥於術數而不知道其流至於蔽而不通愚而信怪雖可稱如吉者猶溺焉而不以為異况不足稱者乎天下猶人身然風俗血氣也災祥肥瘠也戕刺其體膚而不問見瘠者而問之人必以為惑矣察於細而忽於巨惑莫大焉而以為知大體可乎然則洪範之説皆不足信歟非然也庶徴九疇之一也必以人事為之本盡人事而後徴天道者吾之所知也信災祥而遺人事者漢儒之謬洪範之蠧也非君子之道也黃霸漢史稱黃霸為相功名損於治郡時昔者嘗惑之謂豈有才如黃霸而不能為相者乎後觀其為張敞所奏然後釋然知其故蓋宣帝不能盡霸之才非霸不能也天下之患非才之為難而用才者之為難夫騊駼駃騠可以不載駕而致千里不遇善御之人雖欲一日百里不可得也宣帝善任守令而不善任相知愛民之情而不知為國之體其天資善察好挾數以用而持法大嚴丙吉魏相之徒號為賢相不過逡逡然行乎繩墨之內醇謹僅足而巳非能有所創逹施為可為後世法也豈二子之才止於此宰相之功業視人主人主善任相雖中才亦足以為治不能任相雖俊傑不能以成功霸之治郡時得以意操縱斷制行于民而逹於境內故可以得人心及入而為相欲飭法令則人將以為過欲行教化則人將以為迂欲守廉隅則人將以為拙沛然行於一郡而莫敢禦者今皆窒沮而不可惜乎雖有有為之才安能立不可為之功致不可得之名哉其敕上計吏之事教化之一端耳真宰相之所宜為古之人先務教化缺霸豈為過哉張敞遽毀訐之謂其教民為偽而宣帝亦遽聽之蓋宣帝之素志以為漢家自有制度從事乎督責苛刻之間而惡聞教化之説久矣敞之言正與帝意合故帝信敞不疑而尤霸之非霸雖有為其可復得哉王猛慧黠小才非有絶人之智超世之量符堅斬除異議之臣而親任之卒並疆國而雄視海內非猛難遇用猛者難遇也任人以位而不假之權猶不任也假之權而不用其言行其道猶無權也今霸治郡則為良吏為相則為恆人任之以良吏之道彼則以良吏自效也束之以恆人之制雖欲不為恆人安可致哉噫才有餘而不用者士之責也用之不能盡人之才者人主之責也東漢天下之患固不可逆料而預防之也吾計禁乎此後世之患出乎彼吾謀杜其西後世之患生乎東禍亂之端神藏而鬼伏常發於人所不疑之地而起於世所倚賴之人雖知者何由而盡備哉然古之善慮國家者每事揆其始而考其終喜其成而憂其敗四海之事千載之業綜包參核於吾之胸中而定他日為患大小緩急推其得失而為之備使禍害之發不至於亂亡則庶乎可以盡吾心焉耳固非迷塞消沮能使之久而無患也武王周公之初定天下其心豈不知封建之弊必至於並吞削弱而不振也哉然恐易此道而更為異法未必若封建之可以安且久也故且勉而為此使治之有道者可以無亂失其道者亦不亟至於亡不敢過為矯激難守之法以為將來患也乘舟而渡水時有覆溺者人終不以一溺而廢舟駕馬行逺或有躓跌之失人終不以一跌而不駕在平輔其罅漏不完之處習其馳騁疾徐之節使慎之而巳前漢王莾之篡在乎元成失道上無明主下無正臣故莾得恃太后之勢而行篡竊之計非以三公輔相委任之權太重而然也光武過懲其弊而力矯之不任三公以事而政歸于臺閣其後遂成宦寺之禍而漢卒以此亡光武以為莾之得成其篡者權太重耳今吾奪其柄則其害可除矣孰知宦寺之禍反有甚於輔相者乎此不熟究其大小緩急之故也夫莾之篡以母后臨朝外戚預政而致然豈委任太專之罪哉光武能著為令典藏之宗廟俾後嗣有幼君在位當選厚德大賢之士為三公以輔之而不許毋后外戚臨朝預政則其害可以息矣不此之思而惟罷三公之制宦寺之興始於此矣蓋宦寺恆以傳閨閣之命受襁褓之寄而妄作威福茍外有良輔以持其柄內無毋后為之依怙雖曹節王甫充溢乎宫闥亦何患哉可疾者不疑而疑輔相末路之弊也遂使三公除拜皆以賂遺宦者而得雖欲免乎亡亦難矣三公之位古所謂其天職治天民者也茍擇當世之賢才而置諸位撫手而責其成功可也專橫之禍何自而致哉事變亦衆矣然不察之以至明推之以至公處之以至當徇斯須之細故而輕於變更惜哉光武之鋭於求治而未逹乎大體也漢章帝治天下之患莫甚於矯前世之失而過於中天下之事可矯也而不可過也然矯之急者必致於過失火之家三日不熟食走而躓者終身不御馬躓與火豈馬與食之罪哉而為之不食不御此矯之過也蓋懲之甚者改必速畜之久者發必肆方其前人之所為不合乎心其心悱然思有以易之而未能一旦據可為之勢力矯其弊不暇顧理之是非則所失者愈多矣往昔之事類此者甚衆雖漢章之賢亦未能免乎此也魏曹丕謂明帝察察章帝長者章帝豈真長者哉其天資亦明帝之流耳聞群臣言前代過於苛刻故深矯之以寬其寬也或過乎中而時自出其所為又恆過乎嚴是以當時文物典章雖有可觀者而朝廷幾於不治內則以皇后之譛殺四貴人而廢太子外則竇憲奪公主田園而不能加罪張林楊光恃勢貪殘而不知省鄭弘以太尉言竇憲而收其印綬以死此其失反有甚於明帝何足為長者乎漢之稱長者以其持心謹厚而無害以德化人而人自服之也若文帝者是也而章帝非其人也文帝嘗曰長者固殺人乎然則無罪殺貴人譴三公縱貴戚酷吏虐民而不問皆不得為長者明矣斯其矯弊不以道之過也王者之道不貴乎太寬亦不貴乎太察太察則善者或不能自容太寬則惡者或可以苟免二者俱政之弊不足以為中道明帝失之察章帝矯枉而兩失之然章帝之心稍近乎寬非明帝比也漢四百餘年歷二十四帝稱善治者僅數人而章帝與焉其功德可少哉且猶不能盡善也今有善弓惜其偏而欲矯之也必問諸弓人豈智之不若哉其智專且習也欲矯天下不求天下之士而問之謂之智可乎章帝賢矣惜其不得天下之士而輔之也嚴光君子之處世必乎仕則忘其身必乎不仕則忘其民忘身不智也忘民不仁也皆非君子之事也譬之水之在川通則流障則止隨其所遇而水不與力焉故隱不求名仕不規利各當其宜而巳嚴子陵之不仕光武或以不事王侯為子陵之高子陵豈為名高而隱者哉使有意於隱而偃蹇不屈以邀人主之尊禮則樊英之流釣祿位之術耳吾知子陵不為是也賢者非事君之為難而行道之足貴故量其主而後入察其幾而後動不使吾君有得賢不任之譏吾身有竊位負國之愧子陵與光武布衣研席之舊知其志趣德量之淺深審矣苟光武推誠善任子陵寧不少貶相輔以濟斯民乎以其事觀之不任三公而政歸臺閣大臣以切直死者有之群臣以非讖而見罷黜者有之子陵剛介人也不默默以固位必諤諤與之爭光武豈能堪之與其用而使人主有踈薄故舊之嫌則孰若不仕以全君臣之義哉此子陵所以為君子而後世莫能窺其本心者也王良友人誚良曰不有忠言竒謀而取大位何往來屑屑不憚煩也嗚呼為此言者其知子陵之志也乎易曰君子見幾而作子陵近之竇武禍恆發於大忽而事多敗於不斷為天下之大事者當畏可恃而危埀成不以巳之有恃而易人不以彼之不足備而肆志故所舉無不成而身完功立竇武之謀誅曹節王甫其志可謂忠矣而身不免受其殃世常悲之不知武有以致之也宦官擅政天下之所同惡也陳蕃及同謀之士天下之所稱以為賢者也女為太后而身為大將軍以天下之賢而誅天下之所惡宜乎去之如拉朽發腐事之成可以萬全而卒不成者以恃其可成而忽之也宦官之威行於中外久矣其根幹盤結宫省甚固為誅之之計當使䇿謀預定于外一旦會在廷之臣白太后及帝縛而夷之如雷霆之擊山嶽之壓使之不暇生變拱手伏辜則不盈朝而大患去矣今武則不然自五六月謀之至于九月而始發言於太后者再三而蕃復上疏陳其罪惡請太后宣示左右及攻其同黨不嚴為之備而從容歸府使宦竪得發密奏劫帝為變其失計不巳甚乎執犬于牢猶恐其噬而以兵自衛况節甫宫省久吏烏可謀誅之而不為備哉武蕃之賢非不知此特忽其不足畏故耳為計既踈遂使太后變遷身亡家滅海內賢士戮殺殆盡而漢隨以亡其志雖忠其才不足稱矣小人之謀害君子其為心忍為慮周為計決故君子多不能免君子之誅小人持以不忍之心行以踈略之計而不虞其足以為害故反受其禍者甚衆此天下所以治難而亂易忠義之士於是無所成功也有國家者可不慎其始哉崔實昔者觀孔子之書見其於子貢仲由之徒善於説辭必深折而重抑之明足以億事未為有過也而傷其多言以仕為學未為違道也而惡其口給而近佞心常以為惑奚孔子不貴於言若是耶及觀戰國之際天下之士皆棄道德仁義而不修以口舌磨切世主而覬勢竊柄大者亡人之國小者自殺其身又甚焉者著為邪説以為後世害紛然出乎斯道之外流於刻薄荒鄙誣民敗俗之歸而不自知也然後喟然嘆曰此孔子所以聖乎其預知之矣凡亂之生必有所始也芻靈之弊必至於以人殉葬象箸之弊必至於瑶臺璚室孔子之教人以勿易於言而周卒以口舌縱橫之辨而亡夫言豈可茍哉快意於一言或足以禍萬世發憤立一事或可以禍異時矯當時之失不求古今之變而輕於持論非知道者也彼崔實者獨何人哉憤時君之柔暗則論柔暗之失可也遽為邪説不顧理之是非而謂凡為治者必以嚴而治以寬而亂此豈理也耶周秦之效夫人之所能識也實不察乎此而亟稱宣帝之賢夫宣帝漢室基亂之主苛以為明忍以為斷督責以為能當斯世也斯民競知其可畏而不知其所可愛於是高惠文景之澤竭矣譬猶服金石恣聲色之人其外雖若未衰而其中之虗壞巳甚至於元帝繼之稍失其術則漢因以衰非元帝之罪也實輕信而不知道敢為異論而不顧其無稽至誣文帝以嚴致平何惑妄之甚哉漢之久而亡者文帝之功也且使宣帝處文帝之時是生一秦也宣帝固非秦比也率其所為行於甫定之世則其異於秦者幾希而豈能治哉治道固有本末先之以政教而後刑罰者秦漢以下皆是也文帝能參之恭儉忠厚之化故治其餘則守法而巳故未旋踵即不免於危漢室至於光武猶再榮之木其膏澤將盡矣明章能扶植培壅之僅至少康孝安以降漸衰而亂固其理也自非仁賢若文帝承之猶恐其不救而實欲濟之以嚴刑峻法此欲救將萎之木而斷其根鄙哉愚儒好高之論也仲長統乃從而稱之此其知與實何異哉自孔子之末學者不明道而阿世韓非之愚至以堯舜為土水而以刑罰為膏粱所聞者卑而所習者陋無怪其為此言也漢之諸儒惟賈誼董相及王吉為庶幾如實與統時人所推為大儒而其論至於與韓無異於乎其所從來逺矣豈特實之罪哉馬融馬融以通經術稱名儒既事梁冀復為作章奏請誅李固節義喪敗而不惜蓋其心在乎利祿也然卒不免冀手未幾髠笞徙朔方二者無一得而徒取惡聲孰若不食冀祿之為高哉茍謂事冀為不獲巳當其欲害李固杜喬之初毅然引大義而爭之以此得罪死有餘榮曲附姦回以圖身利而終蹈乎禍豈不足為患失者之戒乎趙苞趙苞為遼西守鮮卑劫質其母而攻其城苞曰昔為母子今為王臣義不得顧私恩力戰破之母遂遇害余曰苞善守官矣然而未知義也千金與盈尺之璧孰重人必曰璧重函璧之櫝與千金孰重人必曰千金重璧固重於千金矣以櫝而敵千金不可也君固有重於親者親亦有重於君者使守一城而君在焉城存則君存城亡則君亡寇雖劫母以脅降吾盡死以存君可也苞之所守者漢之君恃此以為存亡乎抑土地而巳乎如土地而巳土地者壁櫝之類也固不宜以此易母而不救也况善於謀者未必失君之土地子彼鮮卑者衆多而可以計取性貪而可以利誘其質母而攻城也所欲得者貨財耳能出數十萬賂之而以母為請彼樂得吾之利未必不從者也茍利未足盈其心則求而避之彼雖得吾城吾徐以計攻之未有不勝者也不此之圖而使母死於寇手雖可以存天下君子猶不忍也况一城乎義者合乎道而宜乎人心之謂也不可以固而不知變也棄毋以全城與全毋而棄郡其非義則一然不若棄毋之愈甚也權其輕重使合乎宜上不失親下不失職惟逹於義者能之惜乎苞之不足以及此也許劭不以窮逹易其守者君子也不以治亂改其節者良臣也屈挫於困約者必不能不驕於冨貴處衰世而為亂者豈能效忠於平治之時乎許劭謂曹操為治世之能臣亂世之姦雄昔人以為確論余意劭特畏其劫而陽為好言以恱之耳姦黠之人譬之虎豹豺狼明主在上制之以法束之以威虎豹豺狼之去玄夜而就白日特不敢肆其噬囓而巳豈遂化而為麒麟騶虞也哉夫能臣者以義處其身以道事其君惟以忠國家成事功為職而身之禍福用舍不與焉如漢諸葛公唐之郭子儀者近之矣故受任於敗亡之際復起於退間之餘有蓋世之功而欿然不居挾震主之勢而人不之忌彼其存心積慮一本乎至誠而不以絲毫之偽雜乎其間是以上而君安之下而民恱之其功業之盛卓乎無繼者以是故也彼曹操者以權詐為智以巧譎為略寓誅殺於嘻笑藏猜狠於簡易此其事主御人應物逹變者舍詐與譎莫先焉故雖梟張烏合於一時能盜漢之天下而不得天下之心使其遇英明之主譬如彭越之歸漢李密之降唐亦終為誅滅而後巳何以為能臣於治世固當為亂世之治臣操何德而堪之吾故曰劭之論劫於操而發耳非所以論操也華歆士固有德有餘而不善用者然操履不失乎正雖不長於用無害其為士也若華歆者專制一郡拱手而見奪於人其才不足稱矣又不能固守而役於曹操為之弒天下之毋此誠小人之無耻者而當時謂之良德有德者果如是邪史乃以其少時鋤地得金視而棄之與管幼安揮去不視分優劣幼安百世之士清介之行老而不衰與其初志正稱以歆比之不啻犬豕之於神龍懸絶甚多世俗論人槩以小廉細謹信其大節早年所踐料其平生義士仁人不以可欲惑志而好名之士多飾詐以釣名夫豈可不深辨邪諸葛孔明以庸常之人而問於賢人君子者人之情也以賢人君子而求所不及於庸常之人此非人之恆情而君子之盛節也為天下之大事者必力行乎衆人之所難勉使所為果有服乎天下然後可以驅馳籠絡天下之士而用之茍無以大異乎衆人則為人役之不暇何暇用天下之士哉諸葛孔眀以布衣至於為相而人不以為速以討賊為巳任而不任將帥人不以為自用兵敗而功不成人不以為無勇斷一國之政賞罰豫奪無所貸人不以為專世皆謂孔明才智之可以服人而不知不自肆其才智而取諸人此孔明之所以服人也三國人才吳為衆魏次之而漢又次之然漢之孔明二國之司馬懿周魯張陸之徒皆不能及當是之時天下一孔明耳而無所與讓及其為相顧乃深有資於僚佐而懇懇求忠益之言以孔明之賢豈待乎僚佐之益舉全蜀之士豈復有出於孔明智慮之右者乎賢人君子之用心也逺而期望也大常自見其不足而不見其有餘常恐巳闕之不聞而不敢謂人言為不可惟不自恃其才智也故能用舉世之才智茍露其才智與人角錙銖分寸以求勝則有才智者皆吾敵也吾安得而用之孔明之為相欿然虗巳以求聞巳之過秦漢以下為相者皆不及也而陳壽之徒比之為蕭何豈不辱孔明哉事功之成敗不可以論人也久矣禹稷與天地並而顔子陋巷之窮人伊尹佐商有天下而伯夷餒死無以自存其身之所處殊其所為又殊其志之所向亦殊孟子獨謂顔子可比禹稷伯夷與伊尹皆得聖人之一偏若孟子可謂善觀人矣夫善觀人者不以所至為優劣蓋成敗利鈍天也天之所命雖聖賢有所不能為聖賢之道寧有不至哉其所不能者非道之過也以孔明之賢興漢而致治其素所蓄積者不幸而功不成天也安得以成敗論孔明哉推孔明之心伊尹周公之亞也而其所未至道不逮也使孔明聞道則為聖賢矣惜乎其未有聞也於乎道不勝其才智茲其所以為孔明也歟然其過秦漢之士則逺矣龎統三代之時人才皆本於學故有才者必明於道德之要知道者必通於為治之法自周室既衰上不知所以教下不知所以學於是人各就其性之所近而攻之而學術治才析而為二天下之士明於經術者未必能見諸事功優於世務者未必能本於學術其弊至於秦漢之間世主以儒生為無用而司馬徽之論人才亦謂儒生俗士不識世務識世務者在乎俊傑其謬豈不甚哉儒者之道大之無不該細之無所遺近不以為易而不舉逺不以為迂而不為固無有不逹乎世務而可以為儒者也其不逹世務者謂之非儒可也安可謂儒生不足用乎自徽所稱者觀之若諸葛孔明之言論事為其不中乎道者鮮矣謂孔明非儒者不可也然徽以孔明龎統並稱吾竊有疑焉論者惜統早死故㓛業不及孔明余謂使統不死終非孔明比也孔明之學庶乎王道而統之言皆矯詐功利之習劉璋之迎昭烈或説昭烈就取益州昭烈恐失信於天下統則請就其來迎而襲殺之昭烈之不即從所以堅益州之民服從之志猶有王者之用心也統獨切切焉欲奪璋之位其器量何淺哉王者患乎德不弘道不洽不患土狹民微也昭烈居荆州之地能喻之以道俾民樂生而趨義吳蜀之民固將棄其主而歸之矣茍為不然以四海之衆而見奪於亂臣所少者豈地與民哉統不能輔其主以仁義敷大信於海內而導之為齊桓晉文所為之事其才智不足稱矣安在其為俊傑哉或者以昭烈得益州故能抗吳魏不知其不能興漢之業者自取益州始昭烈非有匹民寸地之基特以區區之信義感激人心所至人皆樂從之及乎虜璋而據其位由是魯肅得以讓誚關羽孫權得以分裂荆州而昭烈之聲威損矣此功名之心勝而不知道術故也先王之智謀兵力非能逺過於後世其能以弱制強以小服大獨何耶以其養才立教無不可用之學無不知道之人也夫行一法而使弱可強小可大雖不求功利而功利豈不逺哉而世主顧忽之以為儒生不可信之言之言疑衍謂之善治殆猶未也諸葛誕請葛氏兄弟三人仕於三國才氣雖不相類然孔明之下瑾與誕亦人豪也誕當司馬昭僣竊之時拒賈充之説起兵討之事雖無成身不失為忠義豈非凛然大丈夫乎世俗乃以是訾之謂蜀得龍吳得虎魏得狗為斯言者必賈充之徒自以􅦧國弒君取富貴為得計論人成敗而不識逆順是非之辨者也豈非揚子雲所謂舍其沐猴而謂人沐猴者邪晉論二首書不可盡信也而紀載之詞為尤甚同時而仕同堂而語十人書之則其事各異蓋聞有詳略辭有工拙而意之所向好惡不同以好惡之私持不審之論而其詞又不足以發之能不失其真者鮮矣况於世之相逺或數百年耳不聞其言目不覩其事身不預當時之得失意揣心搆以輔其所不足而增其所未備或有所畏而不敢直書或有舊恩故怨而過為毀譽或務竒眩博而信傳聞之辭或欲駭人之視聽而駕為浮辨自左氏司馬遷斑固不能免乎此弊况世之庸史其能傳信而不誣哉茍不因人君之賢否以考其政之治亂因行事之忠詐以定其人之㓛罪而欲盡信史之言則姦邪或幸免而無所懲豪傑之士咸有遺恨矣司馬師之於魏莽操之流亞也東關之敗以司馬王儀引罪于巳而殺之其暴虐不仁狼虎而冠者耳史氏又謂朝廷欲貶諸將師不許曰此我不聽傅公休之過也諸將何罪悉宥不問而削其弟昭之爵師一人也兵敗一事也由前之言則為小人由後之言則雖君子無以加之將孰據而信哉使二者俱得其實何暴於王儀而仁於諸將乎其必不然矣蓋盛德無繼者善多閟而不彰姦雄有後者惡多隱而不著師兄弟連執魏政弟之子遂奪魏而有天下子孫諱其先祖之惡而史氏亦畏而不敢直言故於師之紀傳則過稱其美於儀之事則謹志之以微見頌師之美不亦輕於信乎孟子於武成取二三册武成以聖人之事孟子猶不信而非之况庸史之所述姦雄之事為奈何盡信之乎信其所宜信而斥其不可信者此篤於信者也徒信而不知其非安在其能信乎孟子非不信書也不為茍信乃所以善信也余非不信史也蓋學孟子而未能也微見下疑有缺有天下而無天下之慮是以天下與人也天下固非知慮之所能守也然而先王終不敢忽人事而不修以為盡吾所當為俾無復遺失然後可以奉承天之與我之意天之豫奪豈偶然哉其得也必有所自其失也必有所致天非不欲人得其全且久也然數百年而僅一見者人不能盡其道天雖欲與之而不可得也拔人於衆庶而命之官孰不欲其久哉其或不免於危敗者有以致之非其君之不與也自書契以來享國最久者莫如周本於積纍之深逺固然矣求其經久保大之法上輔乎天道下冝於人情山川草木之性鳥獸夷狄之類莫不曲盡而各有以處之堯舜之治不若是之詳也聖人豈好為是煩悉乎不若此而至於亡者皆閼天之命君子不謂命也漢之境土分裂數十載自司馬氏父子襲蜀虜吳起而一之可謂盛矣其赫然南靣而帝不惟識者知其宫闕將傾子孫不保姦雄黠胡亦掩鼻而笑之盛尤其去兵過蚤立子非賢之所致孰知其失有大於此者乎誠使法立而制定餘教遺德流溢於海內雖刻持以而諸臣民猶將稽首屏息而尊事之况君之嫡乎中國夷狄不使相淆疆弱富貧不使相懸上下有分內外咸敘雖揖讓而治可也奚獨於兵之恃晉之君則不然禮失於上而不知法弛於下而不舉風俗弊壞而不能振教化缺失而不能修視其朝則大臣分黨而相軋貪墨而無厭視其野則胡虜雜處於近畿而不為之防庶人奢縱僣侈於下而不為之禁雖以中才之主繼之不能免於亂矣况騃竪悍婦居乎位而重之以倫頴之徒犬鼠之屬哉懿師以狡計詐力潛攘默竊歷數世而後得僅一傳而失其十九骨肉相殘卒為夷狄所轢籍有國以降未有子孫受禍若此之甚為中國害若斯之酷者也豈非取之不以道守之無其具故耶取天下而不以道者禍必及其子孫漢之吕氏唐之武氏宋之金寇或戮及其妻子或後嗣幾無遺類雖人事之變亦天道之不可誣者然此三代者以其有守之之具故危而復安衰而復盛而晉之既微纍有篡弒之禍以其治具之不完也取天下而不以道是以天下禍其子孫也守天下而無其具是使子孫禍天下也司馬孚斯道之在天下猶日月之在天也淫風怪雨彌時而止日月未嘗不行乎其間亂臣賊子恣橫乎世而天理之在人心者終不少變秦能滅六國之君而不能使六國之民不思其故主王莾能竊漢之位而不能使海內之民一日忘漢之德力可以服人身而不可以服人之心智可以擾人紀而不可以滅天之道先王所以欲明斯道於天下者豈誠欲務迂逺難行之事以為觀美乎其意以為茍徒用法以禁之使不敢為邪不若使之各知斯道自不能為亂之為愈也周自昭穆以下皆可以亡國強侯巨伯環擁而迭興皆可以兼并然而却視竦顧莫敢發口萌犯上之言者非其勢力之不及特以斯道猶有存者畏受悖道之名而不忍也秦之土地兵力豈皆過於諸國哉卒至於劫其主而不顧者夷狄之俗教化不明君臣上下不知道也一家之敗必始於不學之人一國之亂必興於不教之地天下之禍常發於無道之國先王必以教化為先務而不敢忽者豈苟然哉曹氏以詐力得國而不知所教當是之時斯道不明甚矣故丕睿父子坐席未暖而司馬懿巳􅗎其旁而欲攘取之臨終涕泣托以幼孤少不合意則引其手而易其位如易偶人然公卿大臣迎合將順莫以為非積習既久至於弒君篡位以為常耳而不復怪蓋舉中國而從之矣而其宗室之中若司馬孚者獨懇欵悲痛不忍與其謀子姓為天子而身為王公可謂尊顯矣獨慚愧若不忍居者身死於晉猶願為魏之貞士夫魏之亡巳久姦佞小人若賈充之徒咸以為堯舜之禪無以過而孚獨拳拳懷其舊君豈有所求而然哉吾以是而知雖大亂之世斯道未嘗亡國可以滅而斯道不可滅也求之二千載間生於逆亂之族而不為所變者三人司馬氏之孚武氏之攸緒朱溫之兄全昱皆能知篡逆之非唯攸緒辭位避去不受寵祿為最賢孚固非全昱可及然卒至受王爵而不辭其歸與全昱無異全昱故群盜惑於利而失其本心無足異者惜孚知忠而不知遷義之方也使孚為魏而死謂之魏貞士可也魏亡而不仕乎晉謂之貞士亦宜也既分土而居之是與師昭無别矣猶欲自托為魏臣其不智豈不甚哉雖然孚當廢弒之際不失臣禮使曹氏之臣皆能如孚師昭雖暴終不敢奪魏而自立也然則孚焉可少而斯道烏可忽哉殷浩自先王養士之制亡而天下無全才士之生于世者其學術各隨世之所尚而變觀乎世之所尚而士可知也西漢尚經術故士多通經而逹理東漢尚風節故士多能自重而不役志於利祿唐尚諌諍故抗直之士衆惟晉祖玄虗而尚清談故士之生於是時者能以恬淡寡欲治身而以簡檏不煩鎮俗釋然有等貴賤齊死生之意王導以此興江左謝安以此勝符秦庾氷王彪之之流皆此以見重于世士之用學術猶工人之用器器之用雖不同然利者愈於鈍有者愈於無挾其所聞知以應當世之事其不合者鮮矣方未用時計畫規度天下之得失利害素巳定於心及居乎位則舉而施之如出物于懷入手于袖取金帛干藏而陳之中庭快乎其無難沛乎其不窮矣冝其無不當也若諸葛孔明范仲淹身在布衣而巳有宰輔之志人亦以其志望之及其得志果不失人之所望是豈待言語而見哉以言語自表異者類多夸誕之士若殷浩者夸誕之尤也人莫貴於自知自知而後可以知人晉疑桓溫勢盛而藉浩抗之浩自計才智可以敵溫否乎溫握兵擅命久矣使才智與溫等猶不易况浩不及而居之不辭求免於禍難矣彼溫者志趣雖有不純而其才足以有為且當是時晉室之衰甚矣使浩為相能與歡然相下説以安國家利社稷不當以相軋而以信義喻之溫必感奮而恢復其外浩修為相之職而輔其內不越數年中原必可復也浩不此之究而輕動自用為不能為之事而圖不可圖之功踈姚襄而致其敗信敵國之間而自將以襲人其智術之踈殆與竪子無異固識者之所竊笑而俟其敗者卒取廢辱豈溫之罪哉溫謂用為令僕其宜欲以浩為相浩不惟不可將相亦非其所能為也蓋浩率易而不知國體觀其欲殺蔡謨固知其人之誕妄而不可有為矣其視導安之持重嚴蕳相逺不亦甚哉非名不足以取士而以名取士者又多失於虗名之人唐四夔李元平及浩者皆名過其實者也自古不核名實而取名實不副之人其不敗者幸也郭巨郭巨埋子世傳其孝嗟乎伯竒順令申生之恭君子弗謂孝也大杖不走曾子不得辭其責從父之令然且不可夫孝所以事親也茍不以禮雖日用三牲之養猶為不孝况俾其親以口體之養殺無辜之幼子乎且古之聖人行一不義殺一不辜而得天下不忍為之故禹思天下有溺者猶巳溺之稷思天下有飢者猶巳飢之放麑不忍君子羡之况子孫乎巨陷親於不義罪莫大焉而謂之孝則天理幾於泯矣其孝可以訓乎不可以訓其聖人之法乎或曰茍為不孝天曷以賜之金吁設使不幸而不獲金死者不復生則殺子之惡不可逃以犯無後之大罪又焉得為孝乎俾其親無惻隱之心則巳有則奚以安其生養志者固若是歟徼幸於偶耳好事者遂美其非義之行亂名教而不察甚矣人之好異哉豈其然乎或者天哀其子而相之歟不然則無辜之赤子不復生矣王彪之人恆病乎才略不足應天下之變才略足以應變而或不適乎事理之宜則其病反有甚焉者是以君子不特貴乎才略之優而尤貴乎用之得其當譬之干將莫邪用以誅擊盜賊則為義用以為盜賊之事則為亂用之同而所用異善惡判焉如水火故君子有時而智有時而愚皆以適夫義而巳焉可茍乎桓溫之於晉猶漢之曹操魏之司馬懿也少緩不死則篡晉必矣入朝而廢海西公是篡弒之漸也於斯之時立朝之士才足以任天下之重力抗大義而拒之使犬鼠之徒無所肆其噬囓之姦則善矣不然則奉身以死之亦可以明事君之節又不能然則𦍕狂稱疾勿預其事焉或可也而王彪之於禮儀未定大姦動色不知所為之頃乃為之草具儀制朝服當階神采毅然定太后令而廢其北靣正嫡之主此何為也哉衆情疑懼方若鋒刃之迫膚而能處之從容正色厲聲決以大事非勇者不能也然使彪之能以是折溫於朝奮笏擊之豈非剛正不屈之大臣哉助強臣以廢其主作其聲勢以成姦謀其罪不在郗超之下而後世猶謂彪之為才能之臣才固才矣惜其不善用也宋侍中謝朏當蕭道成自立使之解宋主璽綬陽為不知引枕而卧朏才智非彪之比然於廢興之際能全乎義孔子所謂其愚不可及者殆朏類邪梁武帝疫癘之生必自內不足者始疫癘不能擇人也內有不足則虗虗則自疑自疑其疾疾有不至者乎異端邪説者道之疫癘也其入人者外疑作內虗無主而多疑者必先姦之飫於梁肉者不求藜藿身無罪戾者不問赦宥豈忽於味而薄於惠哉足且無疑也梁武帝以帝者之貴區宇之富驍雄英果之才力足以奪取人之國家勢足以制萬姓修短之命及其志得功成顧屈辱於佛乘素車食瓦器服庶人之衣冠而願為其奴其志獨奚求乎蓋生於疑且悔也恆人少壯時挾勇往之氣為逆理異常之事以為當然而不怪至於既老而所為畢成所志盡獲其氣亦且衰矣於是追計平生之所為可愧可恨者雜然心目之中思可以自贖之術而一灑之當此之時有告以佛氏之説者必將善而從之矣武帝以詐力攘人之國而弒其君滅其子姓其用兵略地攻戰捍禦無辜而死者以千萬計春秋既高靜思而熟念之孰非可悔者乎悔甚而疑疑而思釋之之道觀佛氏之説有觸于心以為惟此可以贖吾之罪凡佛氏所禁者皆不敢為佛氏所云利益於身者皆不吝而為之卒至舍其身而不顧而不知其終無輔於危亡也佛氏之大指歸於誕妄武帝之所務又佛氏之所賤棄者豈恆理也哉王者之法有贖刑惟殺人不可贖使殺人而可贖則殺人者愈多矣天之常道善惡各以類應為惡而知悔少貸其罪則可矣今其言謂雖窮凶極暴之人能幡然自悔則可以成佛是教人視為惡為無罪而啓僥幸之門也其妄不亦甚乎且有為而為善者為利無為而為善者為義以義存心者為君子以利存心者為小人利於免罪而為善其心巳陷於小人而梁武欲以此自釋固巳蔽於擇術矣欲免於禍得乎使梁武稍明王道知前之所為不足以順天服人則勉為仁義正家而正天下子弟輯睦小民親附則可為善國矣棄所當為而惟異端之從蔑倫悖教無事之時子弟巳叛于下身幽於盜賊擁兵者環顧而不救憤怒而相屠不至身死國亡而不巳向之所為適以為害夫豈有利哉古之聖人不忍殺一不辜行一非義而取天下所以正其始也不敢舍仁義禮樂而左道小數必屏絶之所以善其終也始以詐力終以異端此梁武所以亡也魏孝文昔者舜命臯陶曰明于五刑以弼五教周人亦曰伯夷降典折民于刑豈非禮者刑之本而刑者禮之寓乎故禮之與刑異用而同歸出乎禮則入乎刑法之所不能加者禮之所取也春秋聖人用刑之書也而一本乎禮酌乎禮之中參乎其事之輕重斷以聖人書法之繁簡則春秋之旨可識而天下難處之變可處矣文薑桓公之夫人而與弒其夫其罪為重故於其去魯也削其姓氏曰夫人孫于齊哀薑閔公之母而與聞乎故其罪為輕故於其去也不削其姓氏而曰夫人薑氏孫于邾然其事雖殊而子無讐母之義則等也是以於其葬也皆謹書之而無貶辭焉其稱孫于前以正天下之大義書葬于後所以全母子之至情皆本乎綱常揆乎人心合乎伯夷之典臯陶之刑而無悖者也元魏馮太后鴆其子獻文帝弘而獻文之子孝文帝宏為馮氏行期年之喪動循禮制君子取焉先儒有為異説者以為非所當服其説謂孝文於馮太后有不共戴天之讐烏得而為之服吾意不然天下固無無父之國而豈有無毋之人哉獻文於孝文則父也於太后則子也母雖不慈子不可以不盡子道使太后有殺子之心而不果殺為其子者尚不宜以欲殺巳故而弗為服况孝文乃其孫而可以父故而讐祖母乎知其親而不能推其所當尊禽獸夷狄之道也因吾之親以推吾親之所親因吾之尊以推吾親之所尊此聖賢之教所以異於禽獸夷狄而為萬世通行之典也毋殺其子而縣得讐是知有父而不知父之有親也豈人情與天理乎假而不幸遇若文薑之毋預殺吾父為子者欲讐之則子之弒毋與婦之殺夫其罪固無以異弒毋而復讐欲為孝而益重其不孝猶且不可故聖人於文薑之卒書􅌾以明毋子之恩况馮太后直哀薑比耳毋生之身而毋殺之死者且不敢怨而孫乃欲追讐其祖毋而絶不服喪果何義者乎論者徒知父之讐不共戴天而不推孝子之於親縱受其虐不敢疾怨固非常人之比茍惟伸子之情而不明父之於毋猶吾之於父是惟知有父而以祖為路人商鞅韓非之法猶不至此顧欲妄援春秋以斷之春秋之義曾若是戾乎故馮太后之殺子固獲罪于春秋而非子孫之所得讐也孝文之盡心乎喪禮其於禮也合矣其於人子之情厚矣孔子曰人之過也各於其黨觀過斯知仁矣聖人於人之過求人之仁而論者乃於人之美而求其過其亦異乎聖人之教而甚於責人也哉或曰子無讐毋之義固然矣唐之武后論者惜五王不告于廟而誅之何也曰馮太后之惡惟在乎殺子故孫不得而讐之武氏滅唐之宗廟社稷殱唐之子孫易唐之國號是唐之篡賊也子雖不忍讐之唐之祖宗其舍之乎五王為唐討賊中宗勿與知焉其可也是亦春秋之意也故春秋之法罪輕而不悖乎禮者不以公義廢私恩惡大而為天下所不容者不以私恩廢公義能權事物之輕重然後可以用春秋不然其不受誅於春秋者鮮矣崔浩子路問成人孔子答以臧武仲公綽卞莊子三人者之所長而必謂文之禮樂而后可其意猶若不足於此者始誦而思之以為何成人之難如此耶既而得其説然後知聖人之言窮萬世而不可加損也徒智而不能無欲則將舞其智以為姦徒勇而不能無欲則將恃其勇以為亂無欲而不能燭之以智行之以勇則將局為狷固陷於愚僻而終不能有成兼斯三者而又有禮以節之樂以和之庶乎合於君子之道矣不然三者特一行耳操一行者天下豈少哉秦漢以下諸葛孔明視成人為近之張子房備是三者而禮樂不足謀海內之事無遺䇿可謂智矣而未能不離乎詭棄三萬戶而不受辭權利而不居可謂無欲矣而未能不近乎矯報讐秦項之間不遺知力可謂有勇矣而未能皆合乎義然比之當世之士則無過子房者矣固一世之傑也若聖賢之大成則豈如斯而止哉拓拔氏之崔浩嘗自謂其才可擬子房而稽古過之浩信多智矣缺不肯屈為之臣及遇高祖則曰沛公殆天授遂從而輔之不去子房非茍云爾也君子莫先乎擇主有濟世之術而不知擇可輔之主則為棄其術遇可輔之主而無濟世之術則為速其禍高祖寬厚長者子房知能用吾術可以有功能不受其位可以免禍也故天下既定則欲引而去之使君臣之間坦然無疑昔之料敵制變出人意表者今皆斂戢韜祕不使毫髮發見于外説客謀士之態一旦化為醇儒靜士而人不之覺高祖雖欲疑之豈可得哉此子房之智也浩之主夷狄之雄猜暴之虜耳而浩之術又皆出乎推步占驗譎怪恍惚之説參之以揣摩縱橫之辨智術蓋於其國權勢行乎群臣之上使人主忌其智同列畏其威固有致禍之道矣况重之以專挾之以私觸其所甚諱者暴之於外而身不知退卒取族滅豈足異也哉子房既智而守之以無欲故全浩以智濟其欲則歸於不智而巳人之有智猶地之有水然用之順其道物資之以生地利資之以成苟無以制之則浪溢泛濫適足以為地之害君子之為學必也本乎仁由乎義立乎其大者而用其智智發乎仁義天下之大智也不仁而欲用其智幾何不為崔浩哉蕭懿大臣之義守死非難也死而利國家安社稷為難使惟知守死之為得而不顧社稷國家之存亡烏在其為大臣也哉齊東昏之惡浮於昌邑王逺甚率其所為亡齊決矣蕭懿之入為尚書令也誠有忠藎之心告于宗廟擇其昆弟之賢者如寶寅輩而立之而廢東昏以侯還第則齊祀可延姦雄執兵柄者雖有跋扈不臣之心亦無自而作矣懿則不然知其主之昏狂而不能為之計斂手就戮而卒無益於天下惟憂其弟之為國患而竟亦莫之能禦也雖曰守死不二而豈足為忠乎雖然晉宋齊梁之間強臣陵上不少顧忌視廢辱其君如易奴隸缺勢可以為亂而不忍為也其才固短於應變而其執志不回豈非亦可尚哉甄琛人君之職為天養民者也然一人至寡也天下至衆也人君果何以養之哉惟用天之所産以養天民而巳五材百物不能自察其可用而用之故人君者導之以取之之方資之以用之之要使生乎天地之間者不至於無用用天下之物者不至於無節此君人者之職也後世人主不知其職在乎養民而剝民以自養凡物之適於用者盡籠而取之而與民為市於是茶鹽之類皆屬於官而責其稅於民民弗惟不蒙其利而橫𬒳其害者多矣此豈天地生物之意邪元魏甄琛請罷鹽池之稅其言曰一家之長必惠養子孫天下之君必惠養兆民未有為人父母而吝其醯鹽富有群生而榷其一物者也善哉乎斯言天下名言也而當時群臣有沮其議者以為其禁既罷利歸富室而小民不獲預語其障禁倍於官司夫利為豪強者之所擅特不能制之以法使然耳誠能為之制俾逺近之民以口多寡受鹽立官一員聽其爭鬪之訟而不取其利豈非王政之善也哉上有好利之君言利之臣由是甄琛之言世俗訾笑以為迂而不適於用不知世俗之所謂迂者皆先王之所取也沈約為非常逆理之事者其身雖周旋俯仰於衆人之中而其心常懷慚蒙愧於獨居深念之頃方其年壯氣盛猶可以自勝及乎年邁而衰氣餒而病所為之事與所負之人或見於影響或形於夢寐凛乎在前皆其讐敵此理之自然而豈自外至哉齊侯之彭生吕后之如意司馬子元之賈陵道王凌沈約之齊和帝皆是物也而是物者非果能為禍祟也穿窬之盜多夢牢獄巫覡之流多覩妖怪彼其心之所慮習之所積有以致之耳齊和帝之天下為梁武帝所奪使其靈則梁武當見之矣何為而但斷沈約之舌哉國家之勢巳歸於梁假若沈約不言其能止乎不禍梁武而禍約非齊和帝能禍約也利其國之亡而賣之以圖冨貴其心惴惴然未嘗不內愧於天天固有斷其舌之理矣君子之學仰不愧天俯不怍人天與鬼神且不能違之而何夢寐之見乎故心無愧怍視死猶生也將死而覩鬼神異行者多行可愧者也袁粲管仲王者之罪人也孔子蓋耻稱之然至於論其功則深許之為仁管仲之非仁孔子寧有不知者乎終不沒其善而與之者其意以為律之以王道則天下無全人有功於王而不免於誅則人不復知尊周為美而亂臣陵上者愈肆矣故取其事而不究其心稱其可稱者而其罪自不能掩聖人之行法如雷霆霜露雖以殺伐為威而生物之意未嘗不寓乎其間大義與大仁兼用而不相悖人焉有不勸者乎後世之好為言論者持法太刻而責人太備或以巳之不及而意人之皆然極排曲詆使義夫智士不獲自全乎世此大患也沈約齊之鬻國小人袁粲宋之忠義大臣也粲拒蕭道成而不納結諸將而謀誅之徑氣峻節可比漢王陵王允凛然有古豪傑風視禇淵輩直狐鼠耳其計之失在乎知人不審而以謀語淵乃淵負粲而敗非粲負社稷也使天未遽亡宋斬道成而夷其黨於粲何有哉其不能成㓛者特以威權去巳道成之勢巳盛而然非粲過也約不明其本心而文致細故以罪粲謂粲不肯當事門無雜賔物情不接故及於敗此何足罪粲乎論人之事當考其時君之所好惡攝裳露脛於朝廷之上則為慢涉水之攝裳雖及股不可謂之不恭何者非其本心也宋明帝以苛暴御下不欲政出群臣內外之臣有威望者必剪除之粲不敢招權以抗其君故遺釋勢利使其君不疑競進趨附之徒却去而不與接事君之義冝是也夫豈有過哉約攘利鄙夫不逹君子之道觀其罪粲之言其心可知矣區區富貴曾何足言而求之者棄名節捐禮義不顧軀命而惟恐失之如約之所得不足以當一笑甚至於鬻國弒君以固其寵而卒不免悵悵而亡奚若守道以死之為愈乎後之患失而貪得者視粲與約亦可以知所處矣周齊之事姦雄之主國其慮患極於精微防禍極其周密除其所忌惟力是視不使有萌蘖之存其為計莫不自以為工矣而不知禍患之生常出於其慮之所不及力之所不能報應之速不失分寸而其圖人者適以自圖滅人者適以自滅也觀於周齊之事何其著明哉初高洋既篡魏氏而奪其國忌元氏宗族疆盛恐其久得民心而復興也悉聚而殺之其心以為無足慮者矣後十九年而高緯為宇文氏所虜高氏之族皆死於宇文氏卒與元氏無異宇文氏之計行亦自謂莫之能侮矣後五年而后父楊堅拱手奪其位宇文之族幼子單孫無一存者其受禍之酷亦如高氏焉高齊之滅元氏當陳武帝永定巳卯宇文氏滅在宣帝大建辛丑始終僅三十三年而三姓相滅俱盡而無遺當其盛時氣𦦨熾然逞其威虐於勢窮力屈之人自意雖天不能違之而瞬息俯仰之間灰銷澌盡同歸於殄滅然後知天道不可誣也區區智力曽何足恃乎三代聖人不肯殺一不辜而取天下者非惟道之當然不忍以一身之貴富易子孫無窮之禍也故無功而得天下禍其身者也殺人以逞而欲保其國家禍其子孫者也隋文帝隋文帝以詐力取尊位其子侈縱以致敗亡君子陋之至與秦並稱然當時戶口蕃殖國用冨溢夷狄雖強大不敢少與之抗若漢唐之盛矣夫果何以得此也昏惑之主欲冨國者必厚斂民以適其欲而文帝躬履節儉謂有司曰寧餘於民無藏府庫斯言也豈惟中主有所不及雖前代賢君或愧焉此非富國之本乎罷鹽酒之禁減庸調之額死罪三奏而後行刑褒賞治民有政迹之吏此非戶口滋殖之本乎吐谷渾之子嵬王訶謀執其父而降則詔之曰溥天之下皆朕臣妾各為善事即稱朕心嵬王既欲歸朕朕惟教以為臣子之法不可逺遣兵馬助為惡事卓哉言乎不以小利廢大義真可以服夷狄之心矣其為人雖猜忌苛忍而能撫有華夏赫然續數百年之正統亦有以也哉後世人主語及秦隋則羞與為比求其所為不及秦隋者多矣此類是也茍不強為善而徒羞比於秦隋使秦隋之主有知其不羞與之比者幾希蘇威可以生可以死可以貴可以賤者君子也惡死而慕生貪富貴而戚貧賤者小人也以死為可惡寧知死有善於生者乎以貴為可樂寧知賤有安於貴者乎君子之於世視生死貴賤如手之俯仰不以動其意而一以義裁之義宜死也雖假之以百齡之壽不茍生也義宜賤也雖誘之以三公之爵不茍貴也其好惡豈悖於人情哉衆人徇於利故好惡失其中君子於義也明故審於輕重也當天下之亂常以世無知義之士而小人衆也危邦敗國有知義者立乎群邪之間使小人之爵祿不足以誘威刑不足以脅則尚可以興也不然雖全盛之天下其誰與守隋之亡也非甲兵少而才用竭朝廷無知義之士而莫為之死也輔相舊臣惟一蘇威拜伏蹈舞勸進頌美於群盜而不以為愧威在文帝時富貴巳極寵遇巳厚國危主辱力不能救則朝服立朝數群盜之罪而以身死之使覬覦僥幸之徒知君臣之分不可犯豈非大丈夫哉惜死而不忍決屈身於群盜其辱甚於死而威不悟然人不至於死不止也與其耻辱而生孰若速死之為善乎威事功殆亦有可取使死得其所固隋之名臣也一陷於非義身名俱喪天下至今羞稱之則其生也適所以纍豈不悲夫雖然威固不善處其身矣而隋之處其群臣者亦有以致之古之人必以禮貌待其臣者豈偽為爾哉養其氣而厲其節平居則有犯顔忠諌之益不幸而臨禍患則可殺而不可辱寧舍其生而不敢負國隋氏父子之遇群臣詐籠而威役之雖將相之貴少有疑隙則箠殺於殿庭之間凡仕于其時者皆挫辱之餘無耻之人氣不足以有為節不能以自守其屈身於盜賊固勢使之然豈足深怪哉不以君子待之而能以君子自為者惟君子為然素以小人待之而欲望其為君子之事此中人所難也於蘇威何惑哉唐有志於非常之功者必有非常之禍常者聖人之所務非常者君子之所惡而非常之功尤天道之所不與也人未嘗不欲有功也而不可有喜功之心以有功為喜必以無功為耻茍自耻其無功乃急於成功不顧難易而為之天下必有受其害者矣先王之治天下為其所當為而不強其所難為使天下民物各循其性終身行之猶有不及何暇他務哉後世之君多好徼功于夷狄故其衰也常受夷狄之禍而唐為尤甚皆太宗啓之也古之人君非不欲廣地衆民非不能攘逺伐亂而未嘗以逞於夷狄者知夷狄之不可以仁義懷不足以兵力取而恐為中國之患也甘心於異類者必有禍馮婦之子孫多死於虎學王良之術者多死於踶囓非惟力不武而習不精殆天道也太宗既平群雄而盡有海內其心思立希世間見之功以夸示後嗣命將出師獵夷虜之窟而獼之縲其酋長致之闕下襲以冠帶而俾之宿衛當其盛時自謂胡粵一家三王五帝之所未有至於玄宗盡用胡人為邉將任以疆埸之事祿山思明遂因之以起而唐幾於亡其後二百年間回鶻突厥吐蕃之寇不絶於邉郡盜賊之興卒自伐南詔始而五代四主皆出於雜胡德光桀黠遂子臨中國之主而號令宇內自晉以降受夷狄之禍亦未有若唐者也較其成功僅快適於一時而流患儲害歷二十餘世而不止太宗之攴庶始翦於武氏再覆於祿山黃巢殱之崔㣧朱溫芟之太宗於民有德不宜若是酷也寧知非喜功之報耶西漢之主惟武帝喜功最甚武帝諸子鮮不以惡終蓋兵之凶也久矣創業而以兵取者必有天禍喜功好刑者必難乎其後不得巳而用兵若湯武之為心在拯民而不在圖利庶乎可免哉不然是以一時之功易無窮之禍也唐高祖人之恆情多耽於所樂而不忍舍自十金之家以上推而至於天子盡地之所産以為富極人之所尊以為貴其為可樂亦大矣自能明智聰逹用心於事物之表者雖十金之微猶不肯釋以卑人而况其至大者劉項以此戰爭曹馬以此而凌人之孤寡世之亂臣賊子以此陷滔天之誅而不辭皆知其為可樂而然茍知其為不足貴則持以與人可也而况父子之親乎古之人主眷眷於有位或除其所可愛或吝於所當與既老而諱言死將終而不立嫡者衆矣識卑而量狹不知盈虗消息之道為宜然是以卒至於禍敗而莫之救也唐高祖固中智君也而能於天下始定之時授太宗以位而無顧戀之態豈其明逹有以與聞乎道耶是蓋不獲巳耳太宗以藩王一旦殺太子於宫內使其心膂武力之臣操兵至於君父之側而高祖不知其事亦危甚矣高祖之心蓋深為之懼潛為之怒而知其柄巳下移莫可如何也於是亟以太上皇自號而避其迫人之勢而太宗亦安然處之以為當爾而不怪吁此其時為何時其事為何事邪傳位之後又閲十年而崩高祖不能忘情於天下也審矣太宗貞觀之治為甚美太宗之早得位天下之幸也其所以蚤為政於天下者太宗之不幸也後之君子書其事於其前曰秦王世民殺太子建成立世民為太子於其後曰太子即位而高祖不與焉然則其傳禪之實不亦著明乎唐文宗人君不患無才而患德不足輔其才不患乎無德而患乎不能用其德有德矣無才以用之則近於愚有才矣不本於德則流於譎兼而備之者惟聖賢為然自三代以下漢之武帝中宗唐之太宗宣宗皆優於才而病於德者也元帝之仁柔文宗之恭儉德有可稱而才不逮者也二者均失也然揆鄉閭之行則才不如德論天下之功則德僅可以自守而才尤可以有為與其願慤而制於人不若剛果英毅者之易輔也文宗之操行唐諸宗皆不能過然而無益於危亂內困於刑臣外削於藩鎮者何耶有圖治之心而無為治之略有獨善之德而無濟世之才也治天下與為家異謹言篤學持小廉守小信無怨惡於人匹夫之事得矣為君則不然明以别賢否而處之各當其位仁以立政教而使宜乎民心勇以及事之幾而致其決智以通物之情而盡其變剛而不猛柔而不縱簡而不怠自疆而不勞而後天下可為也斥李德𥙿而用宗閔訓注不可以為明不能革厲民之政不可以為仁可會之幾陳于前而不知應之之術不可以為勇蔽於近習姦佞之徒賞罰不適乎功罪不可以言智惟恭儉之節粗若可取亦特匹夫之行耳雖耻為凡主何能免乎然自昔人主鮮能自知其過窮兵黷武則妄擬於湯武之師優遊姑息則比於堯舜之政言利則以利民為辭廢嫡則以擇賢藉口較其所為皆蓄禍致亂之道而其心方欣然以為聖智者甚衆文宗獨愧歎自謂不及赧獻其天資之美蓋可與為善者也使得賢者濟其所不及豈遽不若宣宗哉然則非特才之罪也張九齡張九齡為相而能使玄宗無過太子不廢小人困不得志九齡出而綱紀壞唐室漸亂而幾亡國或曰九齡古所謂大臣哉曰九齡忠矣而不能擇義善事君矣而未善處身安得為大臣乎古之大臣正其身以為天下準不可以位拘不可以恩狎立乎朝廷而君不敢為非義邪佞畏伏而不可肆待之以禮則留外貌少衰則引而去之其決於去就非不欲行道為欲行道故必審於去就也楚王戊不設醴於穆生生曰不去楚人將鉗我于市醴之不設何遽至於鉗哉然禍發必有幾人心之敬怠必以漸不設醴必至於不進食不進食必至於不命之坐不命之坐則必至於笞辱罵詈笞辱罵詈又不足不至於鉗而不止然則不設醴之去戮辱直毫髮間耳烏可不預為之計乎九齡臨事規諌近於以道事君者惜其知不可為而不速也九齡必欲殺安祿山行敗軍之誅宰相職也且巳知其有反相寧可巳乎當玄宗之不殺九齡冝以死爭之爭之堅不許則冝如禇遂良還笏而請玄宗茍悟而從則可除天下之害不從亦不失去就之義而無愧九齡爭之不力而遂巳焉玄宗以王夷甫見詆又忍而不去玄宗寧不以貪冨貴疑九齡哉九齡於此固可去矣及沮牛仙客之封李林甫以書生侮九齡而玄宗亦深慢之無復敬禮之意其當去也明矣而復不辭終至見斥而後去何其昧於幾而不知義九齡欲留而盡其言乎則二者可以見矣欲留而行其道乎則未有待人不以禮而可以行道者也九齡之賢必不慕區區之冨貴然觀九齡之事若未能超然於富貴之外者豈其心在君與國而不暇為身謀耶世未有詘其身而可正天下者九齡或未思之乎使九齡獲聞聖賢之道以古之大臣自望其事功必不若此而止也自道之不明通逹者流於權詐卑陋者局於貪鄙求之於唐如九齡者不過數人亦豈易得哉然則九齡雖未足為古之大臣亦可謂唐之大臣也夫郭子儀寓高世之意於衆人之迹受天下之疑𬒳身後之謗而不辭者君子之用心也名譽不修固衆人之所耻而名譽大盛者尤君子之所畏挾莫尚之功負蓋世之名居危疑之地自古鮮有不敗者而郭子儀能以功名終此其人之賢冝若有特立絶俗之行而史氏謂其窮奢極欲而人不非之論者尤史氏之妄以為子儀必不至此而不知子儀所以為智也有忠正之心而不見信於主有安當世之才而不能使當世安乎巳以盡其用皆有以致之而然耳子儀之賢其思之熟矣提大將之節奪海內於群盜之手而歸之唐威聲震乎夷狄功德加乎群臣此中主之所不能無疑者况肅代之陋狹德宗之猜忌乎於是時也子儀之子猶意其薄天子而不為則庸夫小人之過揣謬度子儀之心者多矣雖置萬喙自解於天下猶不能自明也子儀以為使巳見疑於君陷吾君有殺功臣之名不若少徇衆人之迹以自汙使君臣俱全而巳獨受奢欲之名之為愈也故其事雖類乎衆人之為而其心實在乎安國家利社稷使巧佞之徒知巳之不足疑而其君釋然不復知其為可忌其深慮逺計邈乎不可及非真有意於奢欲也明矣而論者至今疑之望子儀太高者以為必不肯為待子儀太淺者遂以子儀果不忘情於利欲奢而至於窮欲而至於極稍知禮義者之所羞為子儀曷為而為之乎求其迹而不察其心冝乎知子儀者鮮也沛公入關而財物無所取婦女無所幸范增疑其有大志而勸項籍急擊勿失使子儀不以此自汙寧知朝恩元載不以疑沛公者譛子儀乎裴度功名不及子儀遠甚李逢吉之黨謗其名應圖讖非敬宗察之度幾不免矣子儀雖受謗於群小而未有以不臣為言者尤可見子儀之智非度可望也雖然名者人之所惜也子儀受汙穢之名而不辭豈其所願哉故人處危疑之際而行不失義若伊尹周公後世之法也不得巳而以利祿自纍此子儀之智也亦子儀之不幸也夫唐莊宗唐莊宗以童子提數萬之師虜劉守光父子滅梁而夷其冡廟命將入蜀取王衍若縶苙之豚據千里之地而號令天下何其壯哉及志得㓛成勳臣外潰奴隸內叛匹馬獨出歸身無所流矢一集骨燼廡下妻子傾散屠戮人手與其初若二人之為者何也人之所恃以呼吸簸運萬物之變而與之推移者氣而巳有以養之則細入絲毫而不為歉大塞天地而不為盈挫之以困辱而不屈處之以尊榮而不驕弱壯老耄更易乎其身如閲一日之旦暮彼有以為氣之主故也惟隨其所使而不窮隨其所寓而皆安衆人之於是氣也萬物為之主而反為氣所使如喪將之兵如朝霧之氛如暴雷疾雨之湧水其始也非不可畏而可悅假之斯須之時則巳潰散消涸而不見其迹矣莊宗者非真知義與利之辨明於君臣之道者特假尊唐之名以求遂其欲得之心耳故其𥘉鼓少年之鋭氣足以昡惑驚駭庸常之人而稍有識者固巳竊笑之矣及其所欲既充向時之鋭巳盡則索然沮壞不復自振而蠱於嗜欲便佞駭夫弄竪皆得蒙覆而蔽壅之於是刑政隳紊表裏俱亂由其為氣所役而莫為之主故也均是氣也有所養者為正氣無所養者為虗氣為氣之正者不變於物持虗氣以應無窮之機其有不頽散者乎有志乎事功名者茍不明道集義以養其中而惟用區區之虗氣求以有成非君子之所知也臨海縣知縣黃誥黃巖縣知縣張師善台州府儒學教授尚芳訓導李深黃巖縣儒學教諭文程校遜志齋集卷之五
