front:
  text: 遜志齋集卷之十八
  hash: sha256:ce09d472bddc954fe37be2ec492201da35bbeab42794941c22d2eba4dc50175e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4e0074_SBCK_018-1a}
body:
  text: 中順大夫浙江按察司副使奉敕提督學校雲間范惟一編輯奉政大夫浙江按察司僉事奉敕整飾兵備南昌唐堯臣校訂中順大夫浙江台州府知府事前刑部郎中東吳王可大校刋題跋題大學篆書正文後大學出於孔氏至程子而其道始明至朱子而其義始備然致知格物傳之闕朱子雖嘗輔之而讀者猶以不見古人全書為憾董文清公槐葉丞相夢鼎王文憲公柏皆謂傳未嘗闕特編簡錯亂而考定者失其序遂歸經文知止以下至則近道矣以上四十二字於聽訟吾猶人也之右為傳第四章以釋致知格物由是大學復為全書車先生清臣嘗為書以辨其説之可信太史金華宋公欲取朱子之意輔第四章句以授學者而未果浦陽鄭君濟仲辨受學太史公預聞其説而雅善篆書某因請以更定次序書之將刻以示後世蓋聖賢之經傳非一家之書則其説亦非一人之所能盡也千五百年之間講訓言道者迭起不絶至於近代而始定而朱子亦曷嘗斷然以為至當哉故亦以待後之君子爾世之嘵嘵然黨所聞而不顧理之是非者皆非朱子之意也舊説以聽訟釋本末律以前後之例為不類合為一章而觀之與孟子堯舜之智不遍物之言正相發明其為致知格物之傳何惑焉古人之説經略舉大義而意趣自備非若後世説者之固也由國家而推之天下大學之所宜為則欲致知者舍聽訟而何以哉是語雖異於朱子然異於朱子而不乖乎道固朱子之所取也歟鄭君多學而不雜執中而不滯觀其所好其傳所謂近道者歟洪武十四年冬十二月十二日謹記書漢三王䇿文後武帝朝立三子為王䇿命之文深淳溫雅卓然可述雖三代訓誥無以過而諸王或以夭死或以惡終無一人能保其位何邪先王之為治自心而身而推之家國天下行之也有其本事不違乎道言不爽乎行修之者有其常是以有所不言言而人必從有所不為為而天必應武帝窮侈極欲以處其身而嚴刑重斂以困天下其本固巳悖矣乃欲以仁義訓其子而望其久存豈人情與天道哉故以言語為教者不若躬行之懿也以制度立國者不若道德之久也題神異經東方朔在武帝時諌諍似汲黯文辭似司馬相如肆志輕世曠然有麾斥八極之意去公孫弘輩甚逺特以好為詼諧無實之談故為君子所薄而後之龎辭怪説多推而歸之士之持身擇術可不慎乎今所傳神異經誕淺不足辨以朔好怪也人或疑其本於朔然嘗稱淮南子書而文又陋野其非朔著決也其間有窮竒獸事言逄忠信之人則齧而食之逄姦邪則擒禽獸而飼之似有激於志失正者而言之嗚呼世之可􅏜者獨窮竒也哉題受禪碑後曹氏父子以禪讓文篡竊其事迹穢矣當時羣臣侈為贊譽以為舜禹復生著諸金石誇耀來世若誠有足稱者豈以一巳之故苟汙無耻而不自知其惡與將逼於亂賊之威虐雖有君子亦莫能自正而從之與然漢之將亡其漸暴于天下久矣豪傑之士度不能臣曹氏宜若管幼安之踰海潔身以避之不能決去低徊眷顧於利祿勇不足以死節智不足以撥亂包羞取容競為諂諛以全身斯為小人矣若當時羣臣是也賢士君子者國之本也舉國無一人焉其國安恃而不亡乎此碑所著皆曹氏所謂佐命勳臣而實賊漢者也用賊人之國者以立其國國未立而賊與國將繼之矣僅一傳世弱子竪孫為司馬氏所陵劫禪者猶未死而受禪之舜固巳先亡以此得者必以此失固可為千古之戒而其贊譽誇耀之虛辭適足取嘲笑於後世耳果何益於敗亡哉題王右軍遊目帖余在京師數見右軍墨迹率皆窘束羞澀類鈎摹而成者決知其非真也今觀此帖寓森嚴於縱逸蓄圓徑於蹈動其起止屈折如天造神運變化倐忽莫可端倪令人驚歎自失世之臨者雖積筆成山吾知其不能到非右軍誰足以與此哉或以𥿄筆未故為疑祕閣有唐𥘉誥文𥿄色如新則此帖之尚完不足怪也浦江鄭君仲辨最博雅善書亦謂為右軍真迹無疑相與熟玩久之因識其後題觀鵝圖善用物者天下無遺物夫茍無遺物則凡飛走動息之類接乎耳目者悠然會乎心皆足以助吾天機孰非可用者乎世稱王逸少愛鵝鵝何足深愛逸少固有以取之爾事物之變天地之迹隂陽鬼神之藴奧心之所得寫之於書其所取者豈特一端哉盈兩間者皆逸少之書法也鵝蓋其一物而巳觀錢舜舉之畫風流間逺之趣猶溢於目中此豈易與世俗言耶題蕭翼賺蘭亭圖唐史稱侍臣請集太宗文章太宗不許曰人主患無德政文章何為因斯言而觀其用心豈欲以區區翰墨傳世者哉而於蘭亭一𥿄之微乃設詐謀命蕭翼賺取於辨才溺於嗜好之篤顧與中主無異何其惑也然以人主之尊不以威迫勢取而委曲求之於一老僧其用心亦厚矣玩之沒身納諸陵寢石函鐵匣錮於山陵之下其藏護亦固矣而數百年之後不免為有力者所發則夫世之縱意非可欲取之不遺餘力而謂可以守而不失者豈非大惑也哉此可見為天下所同欲之物茍非其所宜有雖人主不能長守惟不溺於物者乃能不為物所纍圖之工否不足論而斯理觀者所宜識也圖今蓄於之蕭君彥祥彥祥好學之士其尚以是觀之十七年二月六日書書蘭亭墨本後學書家視蘭亭猶學道者之於語孟羲獻餘書非不佳唯此得其自然而兼具衆美譬之德盛仁熟而動容周旋中禮者非勉強求工者所及也此卷劉會孟諸公鑒定以為定武舊本𥘉見未覺其妙久玩之令人有悟入處真可寶也哉題禇遂良書唐文皇帝哀册墨迹晉宋間人以風度相高故其書如雅人勝士蕭灑醖藉折旋俯仰容止姿態自覺有出塵意陵夷至于中唐法度森然大備而怒張挺勃之氣亦巳露矣唐𥘉諸賢去古未逺故猶有晉宋遺風觀禇公所書哀册豈後人所可髣佛哉古人所為常使意勝於法而後世常法勝于意意難識而法易知顔桞之書余一見即知其美此書八九年中凡三見矣今始識其用意之妙正猶有道君子泊然內運非久與之居不足知其所藴也題韓幹馬圖右五馬圖宋時嘗入內府蘇子美趙德麟題識以為韓幹真迹近藏臨海錢氏兵亂馬失其二而題識猶存錢君克邦重裝裭之恐後人不知其故也俾著其語幹於斯藝可謂精矣而杜甫以畫肉少之世以為名言余謂觀畫之法山川草木當求其精華所聚不必計其巨細踈密鳥獸蟲魚當求其意態性情於筆墨之外不必較其肥瘠大小推而至於文章之繁簡字畫之重輕莫不皆然甫論字則貴瘦硬論畫馬則鄙多肉此自其天資所好而言耳未足為通論也覽此圖者尚以斯言求之書黃鶴樓卷後竒偉絶特之觀固無與於人事然於其廢興可以知時之治亂焉夫黃鶴樓以壯麗稱江湘間當天下盛時舟車旌蓋之來遊考鍾鼓肆管絃燕會于其上者踵相接也元未諸侯之相持武昌莽為盜區屠傷殺戮至于雞犬求尺木寸垣於頺城敗壘間而不可得於是天下之亂極矣及乎真人既一海內建親王鎮楚以其地為國都旄頭屬車往來乎其上者四時不絶盛世之美殆將稍稍復覩余恨不獲見之而是貌其狀甚悉雲濤煙樹咫尺千里夏口漢陽蒼蒼如目睷展卷而卧閲之恍然如乘扁舟出入洞庭彭蠡之上而與李白崔皓輩同遊也今四方日就治平而江湘尤豫所願遊者他日苟或一登為之賦詠以追蹤於古之作者或者其始諸此乎題顔魯公書放生池石刻肅宗之放生煦煦小仁無足稱者當時池多至八十餘所而此碑獨以魯公辭翰而傳則夫天下之可恃者果在乎尊榮也哉公之書人皆知其為可貴至於正而不拘莊而不險從容法度之中而有間雅自得之趣非知書者不能識之要非言語所能喻也題宋孝宗題橙花詩後人之文辭翰墨非極精妙不能傳乎後世惟帝王及有道之士雖未盡美人亦好而傳之然為天下所尊仰而不敢褻玩者恆在乎德而不在乎位陳叔寶隋煬帝之詩宋徽宗之書與畫蓋有見面咄笑其所為者矣其美而可傳也且若此况其不工者乎故欲圖來世之傳者雖人主之尊亦觀其德而巳豫嘗論宋之諸帝仁宗法不足而厚有餘孝宗才不逮而志甚鋭昔見仁宗飛白數大字慨然想見其時此詩乃孝宗題馬璘畫橙花之作其書法方之祖父不及多矣然使人望而敬之忘其為區區小詩詩疑當作技豈非以其志烈之足慕哉題米氏山水圖後目古極盛之世天下之間和同無間粹英秀傑之氣充盈洋溢是以賢才之生多駢發遞見父子兄弟俱以所長稱于時者衆矣而宋東都為尤甚相業功烈則吕氏范氏道德之純則程氏文章則蘇氏曽氏王氏孔氏劉氏其他至不可勝數而米氏父子各以畫名家亦皆擅一時之妙豈人力所及哉天欲固人之國家必生才以植其本使之扶而立之輔而翼之或從而藻繪潤飾之不如此不足以見盛大之美也元輝此圖乃避地新昌時作山川林麓吐吞闔闢有排斡元氣之勢實可與古作抗衡不特追配先人而巳當人物凋謝之餘洞視今昔慨歎久之題朱子手帖君子之與小人較勝負於一時則彼常盛而此常衰觀是非於百世則盛於俄頃者不足以蓋無窮之惡屈於一身者未嘗不光顯于天下蓋時與事錯忤雖聖賢莫能逹其躬及其勢易而理存人亡而謗息狐狸狗鼠之輩臭腐澌盡而無遺而論議之公終不能掩衆庶之口若徽國文公朱子與西山蔡先生屈於小人之事可見矣文公西山相與講説者孔孟周程之正道而胡紘沈繼祖輩極力詆誣甚者欲置之於死地西山營道之竄公亦受偽學之目奪官裭秩逐屏從遊之士由小人觀之曲意悖義取媚於權姦以為朱蔡且將終身名俱滅矣夫孰知二百年之後摧抑困悴者皎乎若白日之當天而鄙陋邪嵬之流以擠排汙衊為事者人之視之猶覩不潔之物目憎而氣奪莫不欲戮既死之遺魄以快仁賢之憤哉嗚呼亦可為千古之鑒矣西山之竄在慶元二年丙辰文公此書不知遺誰而惓惓欲告郡守稍寬西山之拘執師友之義尚可以敦薄夫而勵末俗非特字畫之可傳而巳也後之觀者其尚有所感悟以為君子之歸也夫題趙子昻千文字帖宋之季年書學掃地蕩盡而詩尤壞爛不可收拾趙文敏公生其時而能脫去陋習上師古人遂卓然以二者名家正書尤為當世所貴重此卷千文洪武𥘉鬻金陵市中而金華宋公仲珩稱為公中年得意書故刑部主事葉公夷仲因購而藏于家公之弟惠仲父預修先朝寶録出以見示於是歎文敏公之學古舍人之精識刑部之好竒皆不可得也題靈隱寺碑後天地間至堅固者莫如金玉木石脆薄者莫如簡筆縑𥿄礲石攻木範金壞土以成室其成也難其傳也宜其可久操筆書𥿄率然而成文非假金石以刻之宜其易毀滅也然而世之為堅固之具者常托其傳於易毀之物則豈不以其所托之人為足恃耶錢塘佛寺最巨麗者曰靈隱當元皇慶壬子嘗改而新作之距今洪武癸酉僅越八十二春秋求其一榱一瓦皆巳毀燎無遺而金華石塘胡公及吳興趙文敏公所撰而書之文述寺之創始與其山水之勝棟宇之麗僅盈尺之𥿄耳誦而觀之當時之事猶儼乎如在則夫天下之可恃以永久者果安屬哉亦可以慨然而有感矣石塘在元位最不顯而行最篤文最竒趙公名重宦高每得其文必欣然為之書於是又可見茍有足恃固不以外物為重輕而二公之過乎人必有出乎文辭翰墨之外者而世之尊二公者方拘拘然求之於此而不知求之於彼不亦重可感夫翰林修撰練君子寧以此卷示余子寧多學而甚文必以余言為然題桐廬二孫先生墓文後豫嘗論正統以為有天下而不可為正統者三篡臣女主夷狄也篡臣女主之不得與於正統古巳有之惟夷狄之全有四海創見于近世故學者多疑焉蓋蔽于聞見而不暇遐思逺覽胡怪乎其未之識也宋德祐景炎之後縉紳先生往往竄匿山谷或衰麻終其身或慟哭荒江斷壟間如失考妣而不復有榮逹之願者多有之及其世久俗變然後競出而願立其朝蓋宋之遺澤既盡而然也若桐廬二孫公兄弟槃峯公之抗志不汙求心公之不屑仕進何其凛然可尚也哉富貴之過於貧賤也逺矣使義可以處之無愧二公奚為區區踐其所難而不顧乎蓋必有甚不可者而非知道者不能識也嗚呼斯理也見于孔子之易春秋者詳矣學者不深考至於棄君背父陷于夷狄而不自知道之不明其禍如是其烈也可畏也夫世有知二公之心者其知豫正統之論也夫表槃峯之墓者黃文獻公為求心公墓碣者文獻門人王君子充其事巳備故弗論姑識豫所感云槃峯諱童發字君文求心諱辰龍字題元諸儒帖昔時諸君子學術皆有承傳雖字畫之微亦皆得其意趣故所言多間逺逸麗非若今人縱手妄作也夫昔人於不急之事猶致其精况所當先者乎今人於易為者猶不講况難為者乎有志者於此可以慨然矣吾友俞子嚴有志之士也以數帖見示故以所慨者告之題賜宋懌顔魯公多寶塔碑後文辭翰墨於儒者為餘事然非天分之高學力之積不能造其極兼乎兩美者固難其人而父子相承能擅其工者世亦不可多見也國朝之𥘉翰林學士承旨潛溪公以文辭發道德之奧而介子中書舍人仲珩善書最當時凡海內求文於公者必謁仲珩書之薦紳以為美談不幸仲珩亡公亦相繼即世十餘年來士之欲昭幽行而紀偉績者無所於歸仲珩之子懌奉母居蜀思紹父學殿下至國聞而閔之以為名臣之子孫也時賜粟帛賙其家撫勞教育者甚至由是懌得專於學其書益工洪武二十七年四月二十七日殿下講學于齋宫左長史臣南賔侍坐臣孝孺亦預在席有教曰宋懌書法可嘉其以顔魯公多寶塔碑賜之仍手書賜宋懌三字於篇首臣既持以付懌且告之曰士為衆人之子孫也易而為名人之子孫也難蓋以德業隆厚非厲志篤學則不易紹乎前美也今殿下仰思前正而施恩於懌可謂盛矣懌尚日孶孶因藝以進乎學因學以進乎道以紹父祖之聲猷以報殿下之寵望則善為人臣子矣孝孺嘗受學于潛溪公固不敢不勉以辱公門而所望於懌者非止能書而巳也詩曰高山仰止景行行止懌也其可忽諸題賜王訓導詩後翰林待制金華王公奉詔修元史文辭為史官最及使南夷一死為羣臣最有子紳能傳其業家學之美又最當時宜乎殿下賜詩嘉奬之也唐甄濟不仕祿山以死其子逢能見知方州大臣白其事于朝且請韓退之為立傳君子稱之待制公文章節義不愧於濟而紳受知賢王深𬒳禮遇又非逢可比父子名績其有不傳也哉後之執筆紀事者當於賜詩有徴焉不待退之之書而後著也題醫説後管輅之言曰善易者不言易輅之治易其淺深不可知然斯言則晉之清談皆不及也君子之學自得而巳果有所得則天下之物皆足為吾用於心無得焉則所習而熟者雜然陳吾前方為所纍之不暇於吾何輔哉太史公為蔣君作醫説纍數百言而無片辭出醫書可謂知道者之言也吾與蔣君論辨甚久蔣君未嘗以衒其術而人多以善醫稱之其殆管輅之類耶題太史公手帖某年二十時獲見先生于翰林遂受業于門及先生致事還金華侍左右者數年每蒙奬與以為易教所以陶冶鞭䇿之者甚至此帖乃庚申歲謫蜀將辭京師時所發詞意重厚拳拳以古賢哲之事見勉若誠以為可望者嗚呼題楊先生墓銘後太史潛溪先生以雄文厚德師表當世禮接天下士如恐不及而所敬愛推服者不數人若白鹿子楊公本𥘉尤與太史公友善而以為不可多得者也白鹿子貌清而神峻言厲而志端於人無貴賤富貧德有可尊則敬之否則不忍正目視莊辭確論不肖者惴栗焉是以鄉閭之民不畏郡縣之笞辱而畏白鹿子之公議人或欲薦之仕不應強以酒食非其人輒辭布衣韋帶處乎林泉而聲聞于逺邇蓋有東漢諸君子之風焉白鹿子生於元元之習俗陋矣以學士君子自名者僕僕塵埃車馬間求利逹徼聲譽惟恐弗得而白鹿子獨能操志篤行不涅乎世之垢汙古所謂介士幽人拔流俗者其白鹿子之謂邪孝孺年二十餘遊太史公門獲聆白鹿子言論固巳竦然敬之今十有五年太史公既即世而白鹿子亦亡於是百年之遺老盡矣其孫友以鄭太常所為墓銘見示歎士習之日變悲老成之靡存為之於邑者久之題太素子墓銘後昔昌黎韓子之銘盧處士歐陽子之銘薛直孺皆其妻之兄弟知之深望之厚而哀其殁故其辭反覆於天人之際為最深今戴先生於太素子趙君猶二公之於盧薛也是以其辭信而詳其事微而可傳而太素子之卓行因得著明於世古今人夫豈果相逺哉吾昔遊金華聞太素子之風高其為人而今巳矣浙水東固多竒士求若人之似於山海之間其尚可得邪惜夫題礲硿子墓碣後士不以得位而後貴也居位而不能行道祗所以纍乎位善推其所為於人雖未嘗有位孰得而賤之乎故因位而著勳業者易不假乎位而德及於人非有志者不能也吾觀太史公礲硿子墓碣礲硿子鄉里一布衣耳凶歲能活數百家遭亂能衛其鄉人於難此其及物者厚矣何必有位哉公之言曰有積無虧惟後之垂礲硿子三子皆才而顯且方以儒術進用於世吾將於是徴天道焉題濟寧張氏墓銘後當中原文獻盛時薦紳大儒彬彬多齊魯之士道德言論既足師表一時而餘風所漸雖閭巷之人皆敦篤忠厚慕尚文學非他郡可及兵興以來師喪道微漠然無復存者余先君貞惠先生昔為魯守嘗思有以化之迎禮師儒擇子弟之重厚知禮者使就學焉于時洙泗之間幾為之一變自先君去官今八九年魯士之出為世用者往往有之大率皆當時之秀而張君盟其一也盟以才受薦佐大郡甚有名稱惜其父處士生不顯于時思發其遺德以傳後世乃求銘于聞人以識其葬余遇諸京師為之歎息流俗之壞也久矣親沒不圖所以傳之而惟祈福於異教所費不可勝計而卒無絲毫之益盟獨能以章著先行為急豈非知所輕重者哉余久不至魯由盟觀之其俗蓋將盡變矣復異時之盛安知不始諸此乎盟幸以告我余尚能為魯人書之題胡仲申先生撰韓復陽墓銘後爵位所以取尊於當世而非取信後世之具也逹官顯人茍無足傳則聲與身泯隱約之士道術文學誠過乎人人其居雖困而其所有昭乎若日月之揭夫孰能掩之世俗不之察託傳世之任者不於其道而於其位親沒而圖銘墓之文往往於位號華顯者求之甚者或假辭於文而寓名於公卿豈知古之傳世者固不以祿位而重哉其陋也甚矣金華胡翰先生異時嘗以一布衣入史館出為衢府教授退處田里以終士之貧困無出其上者然其操履高介文章雅馴當世之士多自謂不能及之先生既不妄稱譽而世俗亦鮮知其文故四方得其文者為最寡吳郡韓君奕示余以先生所作先府君墓銘盛有所推許於知愛先生之文可知奕之異乎衆人於先生亟與之言可信其先君果竒士也余年二十一見先生於金華先生不余賤待以國士與語連日夜不休今亡矣思重見而弗可得讀其文如接其聲容因書卷末以授韓氏使世俗知韓氏之求先生之不拒皆古道也跋劉府君墓碣後李元賔文學在當時最為韓退之所推而退之銘其墓不過百餘言稱其美者不過十言然非元賔莫能當也古人之文要而不煩也如此近世銘墓者為言多至數千少亦不減數百否則求者怫然有不滿之色是豈特文之不逮古哉習俗之弊也久矣吾友劉君剛養浩請銘其父處士之墓於太史公公為之銘辭約義該得退之之意蓋欲矯積弊而復諸古也養浩學古而攻其辭故公以古道處之由是而求處士之為人其亦古之所謂善士夫題會稽張處士墓銘後外爵祿而貴富者君子也待爵祿而貴富者恆人也備萬物于一身天下之物孰加焉友聖賢于千載天下之貴孰並焉不有得於此而顧有慕乎彼則其所慕者庸知非君子之所耻也耶孔子賤千乘之齊侯而取首陽之餓士曽西薄志得位尊之管仲而畏仲由世俗之所謂富貴貧賤豈足論有道之君子哉􅌘之珏芝里有處士曰張公珵字克讓生于世者七十六年而不階一命不資斗祿以布衣終田里然和易純正之德見推于鄉閭雋拔清逺之文尚友于古人寓至富於窮約之中存至貴於卑賤之表有子五人既沒而叔子思齊為陜西左參政少子遁亦以通儒術薦為紀善諸孫勝衣冠者多至二十二人世皆曰處士富貴人也身不待乎富貴是以澤及乎後昆張氏之富貴其亦異於恆人逺矣蓋道德有餘而天之報有不至者後世必蒙其福然則張氏之孫曽欲保先澤于悠久者可不以處士言行為法乎參政公名可家以字行繇觀察使拜今官學行政事君子以為不愧其先人云題溪漁子傳後今之為士者不患其無才而患其無氣不患其無氣而患其不知道道譬之源也氣譬之水也才譬之能載也蓋有無其源而不能為水者矣未有水既盈而不載者也是以君子不敢強用其才而務養氣終身由乎禮義之途使內不愧於天外不挫于人充溢盛大無施而不可舉而建事立功則天下豈有難為者乎後世學者不知出此用其驟盛易衰之氣而無所養當其鋭然於有為之𥘉固若可喜及乎涉歷無窮之變未有不薾然消沮者也吾嘗歎而疑之郡人林左民示余以溪漁子傳稱溪漁子事及其言論皆偉甚左民竒士因其所交以觀溪漁子之才氣有足望哉然溪漁子好為文而不自足顧每有取於世之有道者此其志異於世俗逺矣江淮間豪傑之所會蓋有得道之人焉余求之而未之遇也溪漁子盍求而見之乎茍有得於其言則左民之所稱者皆溪漁子之粗也余必預聞之題陳節婦傳後世之記事者務取詭特竒異之行以駭人視聽而於守常蹈義者則棄而不録故史氏所書節婦孝女非赴淵投崖則斷髮刲股吾甚惑之所貴乎善行者以其當乎義而可法也茍吾之義無愧於天下則亦奚用夫異俗駭世過為難能之事乎有意乎為異者未必不入於利不知仁義之可慕而自勉于仁義斯其於善也篤矣余觀王紀善璞及鄭僉事士元所傳陳節婦應氏事蓋節婦年十七歸陳甫一年生子三月而夫亡利誘而勢迫之者盈耳凝然不為之變劬躬畢志以事舅姑陳氏之宗卒賴以不墜未嘗赴淵投崖而人稱其節未嘗刲股斷髮而舅姑安其養方其自修於閨閫之內寧知節義之名為足慕哉無所慕於外而勉於為善此節婦之行所以為美惜夫有司不言於朝不獲書列史氏之籍然其孤好學飾行圖顯先德將必有立於世他日使人謂陳氏為有子而節婦行義因之以章則可以駭人視聽者在此而不在彼矣何患其無傳耶題鄭叔致字辭後古者制名之義不一而莫病於近代為其慕乎美稱也夫人之有名將終身以之茍著為學之方使之顧名思義豈非善名之者乎世之為父師者往往以皋夔益稷丘軻回路加於無知之兒其名則聖賢也求其德則庸竪賤夫也不亦妄且誕歟是謂之不知其父師之道也若吾友浦陽鄭叔致則不然叔致之生也其父取大學格物之義名之曰格及冠其師太史公復以叔致字之而祝之以辭欲其用心於致知之學也嗚呼是不亦善為父師也乎夫人之通患不患於不能行而嘗患於不知不先致知雖有出世拔倫之材亦不免冥行謬作之弊能窮天下之理盡萬物之情一旦措之於事業則沛然而有餘發之為文章則浩然而無涯蓄之以為德行則從容而中道矣古聖賢之學必以知為先也而叔致可不務乎物之理不可以數計而欲知之也蓋有要焉操至靜之器以應乎羣動以索乎册書察之於天地之際驗之於倫理之間譬諸破竹焉既得函刃之地一節之後將豁然矣知既盡而於聖賢之學無得者吾不信也叔致生禮義之家重之以美質耳目之接無非知也舉足動容於堂序之間推而逹之無非可行也而太史公又甚愛之其於學不既得矣乎豫復為是言者豫與叔致友以忠告者友道也雖然叔致奚俟豫言哉題宋舍人篆書篆書以清圎徑拔為高秦唐二李皆以是名世其用心至矣自江南徐鼎臣始變而肥巳稍逺於古然能不失其意故論者尚之近代趙魏公子昻愛鼎臣書所作大小篆多類鼎臣由是學者翕然效之甚至彭亨濁俗如腯豕然不知魏公天資高邁故所書自過於人俗子輩塵胸陋質欲逐其迹無怪其謬也金華宋君仲珩病古學之不振學大小篆匪二李不師其用心甚久故所作駸駸逼真此王荆公刻漏銘為李思問書亦其一也嗚呼古人不可見矣欲識其遺意者尚於宋君觀之題宋舍人草書千字文後近代能草書者吳興趙公子昻公所敬者為鮮于公伯幾稍後得名者為康里公子山吾嘗評趙公草書如程不識將兵號令嚴明不使毫髮出法度外故動無遺失鮮于公如漁陽健兒姿體充偉而少韻度康里公如鸞雛出巢神彩可愛而頡頏未熟雖俱得重名而趙公高矣繼三公而作者金華宋仲珩草書如天驥行中原一日千里超澗渡險不動氣力雖若不可蹤迹而馳驟必合程矩直可凌跨鮮于康里使趙公見之必有起豫之歎此卷千字文乃仲珩為李君思問書者尤渾雄可喜仲珩今之古人也思問勿易視之題宋仲珩草書自作詩近代善書尤著者稱吳興趙文敏公及康里子山文敏妙在其行奕奕得晉人氣度所乏者格力不展子山善懸腕行草逸邁可喜所缺者沈著不足金華宋君仲珩兼得二公之妙而加以俊放如天驥奔行不躡故步而意氣間美有蹴踏凡馬之勢當今推為第一乃余在金華時自京師書其所作詩寄余者詩與書皆翩然有塵外意誠希世竒玩也題周氏文後知人天下之至難由人之言以觀人至難之尤也人之平居非察其所守不足知其志非試其臨事不足知其才才志得矣非考其終身不足以知其德此人未易知者為然也士之寬𥙿有容者譽人多過其實刻厲疾惡者取人多喪其真自非誠明公溥之士其豫奪褒貶未必可信則察言之際豈易乎哉吾友方君其介潔不妄有所稱而王君修德確然守正不為詭隨之行茍非其人雖其親愛不以片言許也今於周君友文俱言其美若出一口然夫以方君之言雖微王君猶信也王君之言雖微方君猶可也而二君交贊之皆以為難能則周君之善烏可誣也哉昔余與周君遊先於二君而周君之來吾鄉二君知之者詳於余古道之不復也久矣余於周君喜二君之公於取人也既為之書復繫其説使人知豫為之書者非私乎周君蓋猶二君之意也題王氏述訓後師弟子之教不立世之學者一變而為陳相再變而為逄蒙由蒙而變不至於羿之為不止也其漸豈不可畏哉豫過梁宋間覩河洛之俗可駭焉至汜水見河南按察僉事王侯履道所為述訓歷紀成童時所從之師以致不忘之意其情辭忠厚有足感人者嗚呼薄夫惡子觀乎此其尚知所愧耻而感慕也哉題劉養浩所製本朝鐃歌後文章之用明道紀事二者而巳明道之文非有得於斯道者雖工而不傳紀事者不得豐功偉德可以聳攝衆庶耳目者而書之亦不足取尚於後世故士未足以明道則博求當世非常可喜之事而述焉亦文之美者也西漢文士最衆尤傑然者賈生董仲舒其才未必遷固之下然後世傳而誦之者必遷固之文而賈董不若焉賈董不得紀天下大事而遷固為史也今天子起布衣除羣雄十餘年統一四海與漢高祖無異吾太史公以閎博竒偉之文居遷固之任為士者莫不慕之公之門人金華劉君養浩亦奮然自喜以為此難遇之時不可漫無所述乃考徴征伐之次第為鐃歌十二篇以宣敡國家之功烈其事信其辭竒其取尚於世可必也嗟乎養浩於斯文可謂有志矣昔之人居史氏之位而不修其職者甚衆今養浩未嘗得位於時而遇事感發輒有所作使假之以位遺功遺德未盡紀載者庶乎有所託哉余少竊妄志述者之事勢孤行獨無宗族親黨之譽而不聞于人而不得賢人君子為之美故往往顧以怠惰而未能然斯文之有益於世者不止若此而巳也願與養浩加勉焉題黃東谷詩後昔人謂詩能窮人諱窮者因不復學詩夫困折屈鬱之謂窮遂志適意之謂逹人之窮有三而貧賤不與焉心不通道德之要謂之心窮身不循禮義之塗謂之身窮口不道聖賢法度之言謂之口窮三者有一焉雖處乎崇臺廣厦出總將相之權入享備物之奉車馬服食非不足以夸耀市井然口欲言而無其辭心欲樂而有其纍其窮自若也無三者之患心無愧而身無尤當其志得氣滿發而為言語文章上之宣倫理政教之原次之述風俗江山之美下之探草木蟲魚之情性狀婦人稚子之歌謡以豁其胸中之所藴沛然而江河流爛然而日星著怨思喜樂好惡慕歎無不畢見造化鬼神且將避之而何慊慊於區區之富貴者哉此謂之逹可也雖飢寒流離夫孰可以為窮世之人不之察幸斯須之勢者多挾其所有以驕士而不知士之非果窮巳之非果逹也象山之東谷有士黃君思銘過余侯城山中其身甚約而其言甚侈其形容甚臞而其詩甚麗出其所作數十百篇為余誦之金鏘玉戞宫鳴徴和有瓌竒纎妙之觀而無枯淡寒陋之態余雅為之喜而君復將自此而西歷覽天台諸山以盡巖壑之勝嗟夫近時詩人如君之可貴者鮮矣君行乎世有知君詩之可貴者其亦世之所鮮哉書夷山稿序後人之窮逹在心志之屈伸不在貴賤貧富富貴而於道無所聞於業無可傳謂之窮可也非達也賤貧而沛然有以自樂生有以淑乎人沒有以傳諸後謂之逹可也非窮也世多以隱顯賢否天下士而士亦以祿位得失為心之欣戚勢盛則志滿而驕勢卑則志沮而陋於是士之進退皆窮矣非人能窮之也彼有以取之也吾觀四明蔣先生羇寓數千里外在尺竹伍符中而放筆為詩組織物狀揣切人情敷揚事理浩乎其無涯燁乎其有輝味其言如素處顯位者未嘗有枯悴寒澀之態是安可謂之窮士乎士茍有自逹之具天且不能窮之而况於人也哉豫自京師還過夷門與先生論詩因識所感使人知窮逹果在此而不在彼也書浦江二義門倡和詩後浦陽鄭氏王氏俱以義名門事傳于天下而聞于朝廷曩歲兩家為訟者所誣王思敬甫偕鄭氏之長采苓子訴于朝皇上重二氏之義詔勿治於是二老人歡然同歸置酒相勞苦交遊之士為詩以述其事二老人從而和之讀其辭尊君親上之情戴恩懷德之意藹然溢諸簡册間何其美也人性之易感也尚矣綏之以德則歡然鼓舞而和氣生焉和聲發焉至和盈溢于宇內則風雨時萬物遂諸福畢應而治道以成觀二老人之詩當世政治之美從可想見豈特可為鄉邦盛事而巳哉贈樓君詩卷題辭代太史公作洪武辛亥之歲浦江樓君真以文學用薦者赴京師有司將官之君固以疾辭歸朝之名卿顯人與君交者皆重惜其去相率為歌詩以贊其行凡若干首君嘗徴豫序豫未暇也及豫致政家居以為言豫撫卷而視計其時僅越七年而其人之存者聚散不常於是益知君之賢而歎斯文之不可復得也嗟夫豫何敢序之哉豫嘗諍觀之天地之始終如日之旦暮耳千載之間如一時耳人之生世不啻如呼吸頃耳其中離合憂喜何足較乎可以與天地並存而不朽者惟文辭而巳若此卷者亦其一耳君試追思往日交遊之人聲音笑貌暸然著於耳目間固如昨日事也欲求而見之豈復可得乎不知與夢寐何異也而余與君復云云不置何也斯理也非逹性命之故者不足以識之逹性命則物齊矣君足踐利祿之場不願而辭歸其中心必有所得余非能知君獨視其詩而有所感故題之以辭書學齋占畢後眉山史繩祖慶長所著學齋占畢其論荀楊言性本於告子皋夔以刑名聲色絶世引喻有味可為世戒於子罕言利與命與仁訓與為許謂君子懷刑乃懷思典刑而則效之大學彼為善之當為彼為不善之小人皆可備解經之一説蓋篤志精思而求所自得者非特好異也然論乾坤二篇之䇿當萬物之數乃以稱物平施為言謂三十斤為鈞萬有一千五百二十銖又以孟子鈞是人也賈誼大鈞播物者實之其他談數附會曲折纒繞蔽聰可駭者頗衆甚矣乎其為多思也至於考索經傳可喜者雖有之而謬誤亦間見焉豈所謂知者過之者邪然其異於世俗之蒙瞀拘錮於巳然之成説而漫不致思者亦巳逺矣况其該博於載籍索之惟恐不致蓋亦難能之士也第疑聶夷中詩二月非鬻絲之時以為乃四月之訛則為未當乎理夫夷中蓋以貧困細民未蠶未稼而預貸絲榖之直於人是以雖暫紓目前之苦而將來不免飢寒之厄此非躬歷其事而深究民瘼者不能述斯言也而慶長乃不之知豈其偶未察耶抑其方鋭於攻發前人之短而不知巳之失邪題聽琴軒記後天下之事才而有為者非難知其才而用之者為難智而能言者非難逹其為言之意者為難是以李長吉發憤欲酹平原君而韓退之亦祭田橫以見志古人之重知巳豈有所利也哉吾之所得存於心未嘗發口而彼能的然先得吾之所存固人情之所甚快也世傳伯牙絶絃於鍾子期其事有無未必然蓋以喻知已之難遇耳廬陵鍾深省以聽琴名軒蓋嫉夫知人者之少而欲以是自勉者歟今天下混同四海之才皆麗輦轂下其間豈無出類軼羣之士伏於衆人之中而無所發者乎深省號為知人將進而用於上㸑下之木有剨然鳴者其尚知而取也題積善堂記後為善而至於君子人之所能必也為君子而富貴且有後非人之所能必也世之人不為其所可必而妄意於所難必修於身者無成則委之如當然望於天者不獲則怨且疑以理為不足信其惑不亦甚乎人之宜為君子而不可為小人出於性分之固有非為利逹而為之也使慕利逹而為善其心巳陷於小人之歸尚何暇天道之怨哉豫觀顯融於斯世者多昔者質厚敦朴之士之子孫蓋斯人之為善出於天性而未嘗知外物之可慕故有以合乎君子而得天道之祐非偶然也河南按察副使會稽徐公以積善名其堂以昭其祖考之善而推其福祿之所自且以勉其後之人夫徐公之顯由前人之積則夫後人之所慿藉者豈不在公之所為乎公之為人御下寬默有容而持身甚謹衆咸服之以為君子而不自以為才是宜為天道之所祐者也尚於其嗣人徴之敬題蜀王殿下來鷗亭詩後蜀王殿下以睿哲之資性與理合發言成章而謙虛好士士有見者未嘗不斂容垂問然文辭翰墨之賜非學術器識逺過乎人者弗能致也往者講學中都臨淮訓導姚宗文特承顧遇賜以來鷗亭詩時殿下春秋十有八耳而措辭雅馴有法雖縉紳儒先莫過焉是豈特儒者之美觀哉亦可以為聖世宗室多賢之慶矣題許士修詩集後師道之重古之君子以之參乎君父之間蓋以人之有身非父則莫能生非君則莫能養父既生之君有以養之而不聞道德禮義之教雖苟生於世不若無生之為愈也是以於人為特重視夫至尊至親之恩靡不及焉洙泗門人視孔子猶父及既沒三年猶哭失聲或築室獨居而不忍去此與唐虞之世如喪考妣者何異自道喪俗偷倫理廢薄而師弟子之義尤闕生無就養之禮死無為喪之制甚者讐疾其師乘勢折辱以快其忿豈皆民性之不逮古哉教者非其道受學者非其才故也誠使師有以為教弟子知所以為學其有不相親愛者邪吾鄉林升嘉猷始事吾友王修德修德良士毅然以古道自整飾後不幸徙家南中姻族無一人顧恤嘉猷徒步千里追送泣涕與訣别此其義有足多者嘉猷少豫一歲輒以師禮事豫會豫教授漢中行六千里來學德業大進見之者莫不稱其篤行此其可與世俗弟子同語哉嘉猷為豫言里人王暊與其弟暕嘗師修德之友許君士修許君卒嘉猷為集所為詩暊暕為購工刻于家以傳其待許君不以存沒少異若暊暕之於師蓋亦當世之所鮮也嗚呼豫嘗嘆斯世不復有如古人者今乃於閭里見之豈吾鄉之民性獨不異於古哉抑亦父兄長者之化有以習其耳目而致此也許君之詩豫昔既為之序復書其交友門人事以見許君之所教者非世俗所及而其所長非特在乎詩且以諷當時之為弟子者使有所感發焉跋劉氏家藏誥命後烏傷劉氏在宋季如公亮者嘗以中奉大夫致仕而贈其父為太中大夫亦嘗貴顯矣未越二百年而歷官行事之詳巳無所考向微斯誥則子孫且無從徴之况他人乎此可見人之傳世在彼不在此中奉之昆孫剛方以學術自表著勉其所當為而無外慕之心固知所輕重哉題湯氏家藏賜笏記後春秋書法至簡事之不登載者蓋甚衆而於寶玉大弓之竊獨兩書之而不厭蓋以國之傳器先世所受於君者其所繫為至重也吳湯氏不忘其先祖為進士於宋度宗時所受賜笏寶藏于家而求士君子以記之其亦孔子之意歟雖然笏之為言忽也所以備忽忘且以戒人之忽也不忽則敬敬者德之本湯氏子孫持不忽之心以守此笏雖百世可也不然國家天下大器以忽而失之者多矣况一笏乎書李質夫序後名號者巳之所命以别乎人苟未極其美人未必非笑之也而名號者常務極其美焉聲譽者巳之所致以彰其身一有所不至則人將訾謗之矣而為士者未嘗修其可以致名譽之道是之謂怠其所宜為而先其所當後古之君子弗為是焉名號與聲譽俱美者稱也二者相戾者愧也恐其相戾而勉焉以稱其名號者不亦善於自修者乎善於自修者君子取之章貢李君仲文常從事於儀曹覩制作文為之盛因自號曰質夫其意有慕古反始之美及來仕于吾郡慨然以矯浮薄復質厚為職蓋欲推其所慕以同諸人也天下之理莫善於可繼莫不善於使人無以加文者周之所尚聖人非處其薄也然質之甚猶可繼之以文文而至於盛則無以復加矣故必反之於質而後可由質而之文猶繪於素雕於檏順乎其不難也反而復之質非盡浣濯剗除之何由復其始乎而李君乃欲舉而復之其志既美而其事甚難也雖然巳不由而強人之從於事為難已由之而化人之從非果難也士固有居乎閭里而化民成俗者况居位者乎李君苟能因是號也思其義而身由之機巧之去而惇厚之用椎魯之尚而矯飾之遺行成乎躬而聞乎世東南之民他日有耻浮薄而勉為忠檏者其李君之化也夫臨海縣知縣黃誥黃巖縣知縣張師善台州府儒學教授尚芳訓導李深黃巖縣儒學教諭文程府學生陳縝葉琰王梅齡臨海縣學生李臨卿戴濬之黃巖縣學生孫思光牟汝鈞校對遜志齋集卷之十八終
