body:
  text: 中順大夫浙江按察司副使奉敕提督學校雲間范惟一編輯奉政大夫浙江按察司僉事奉敕整飾兵備南昌唐堯臣校訂中順大夫浙江台州府知府事前刑部郎中東吳王可大校刋蜀王賜方漢中書二首公西州之冠冕有識者無不心恱誠服而新學晚生亦有所依歸也余一日不見有如三秋况在逺道乎先民有言能自得師者王又曰務學不如務求師良有以哉豫以眇躬藩衛宗社之重亦必慎柬賢良以僃顧問爾懿文清節有東漢之風尚志立言為當代之重祕閣閲書燕間賜對經帷進讀道德坐論矧乃郡庠之責學課之繁别既數月良非得巳忠言嘉謀豫所飢渴竭乃心力副豫眷待遣書指不多及蜀王送希直先生還漢中詩嵋山峨峨江水泱泱我疆我理俾民以康靡言匪衣靡善匪得閲士孔多我敬希直謙以自牧卑以自持雍容儒雅鸞鳯之儀有學有識乃作乃述追之琢之金玉之質侍我經筵不倦以勤非德不言非道不陳職思其歸義不可奪采采者芹伺教如渴爰抹其馬爰振其衣拜手稽首載辭而歸昔之來也春日遲遲今之歸也涼風凄凄悠悠我心念子良苦爰命辭臣飲餞江滸王道如砥既歌且詠八月初吉抵于南鄭沔彼江漢亦合而流瞻彼岷峨鬱其相繆心之知矣臨别繾綣子如我思道豈云逺歲行在子文闈秋開較藝至公遲子西來蜀王賜方教授詩三首伊昔開東閣相看眼獨青文章奏金石襟佩覩儀刑應世逰三輔焉能困一經前星垂炳耀染翰侍􅊮庭聞説眼空天下士只疑身是洛陽人少年有學談仁義高論無慚問鬼神九載之官看教育萬言詣闕聽敷陳曵裾巳在長沙日知巳相逢此志信四十雖聞不動心平生冨貴豈能淫屢蒙論薦來天祿自負文章入翰林養望也須添白髮觀光仍遣教青襟河間好古嗟豫慕多士從逰愛子深蜀王送胡志高赴漢中兼柬方希直二首趣裝何處去驅車赴漢中欣然逰大郡况復依方公問學日盜博道德日益隆丈夫志逺大那肯局樊籠他年居館閣步武接夔龍胡子蜀中士受公知更深不憚三巴路欲成仁者心伊昔韓門士籍湜蒙賞音朂哉今胡子願無愧鄭林鄭公智林良顯蜀王讀基命録武皇稱汲黯近古社稷臣卓乎天地間百世有餘芬宋公廊廟姿志慮殊精純由來慕前烈願學在斯人雖處江湖逺擬欲踐臣鄰苟非堯舜道肯向黼扆陳嘗笑賈太傅前席對鬼神著述纍萬言所言皆歸仁為君觀此書四海屬經綸為臣觀此書有術能致君聖賢友多聞我亦忝嘉賔持此以贈我讀之至夜分撫卷再三歎良可嫓典墳送方生還天台詩有序金華宋濳溪濂古者重德教非惟子弟之求師而為師者得一英才而訓飾之未嘗不喜動顔色此無它天理民彛之不能自巳也豫以一日之長來受經者每有其人今皆散落四方黍稷雖芃芃不如稊稗之有秋者多矣晚得天台方生希直其為人也凝重而不遷於物頴鋭有以燭諸理間發為文如水湧而山出喧啾百鳥中見此孤鳯凰云胡不喜越一年别去感慨今昔又云何弗思退朝之暇懸燈默坐因發於聲詩一十四章以送之末章用來字者冀負笈重來以迄於有成也詩曰北風何逶迤雪花大於手之子有逺役忍勸尊中酒念子初來時才思若繭絲抽之巳見緒染就五色衣被之行儒林孰不生豔慕蹮蹮媚學徒二步一回顧余生老且至秋髮垂兩肩得之喜欲舞如獲寶珞然素編耽清晝青燈坐深夜探玄欲忘寢薦味如啖蔗一朝别我去何以釋離憂不禁秦淮水流子江上舟但願逆風起吹舟不得往共穿鍾阜雲時看白石長風本無情物豈能知我心事既不得諧贈言如贈金須知九仞山功或少一簣學貴隨日新慎勿中道廢群經耿明訓白日麗青天苟徒溺文辭螢爝欲爭妍姬孔亦何人顔靣了不異肯墮盆盎中當作瑚璉器不見金谷園瓊芳委塵沙泰山有喬松老幹凌蒼霞四海皆兄弟知巳獨難遇伯樂倘不逢鹽車厄騏驥明年二三月羅山花正開登高日盻望遲子能重來洪武九年冬十一月書于蘿山石室精舍送希直歸寧海五十四韻有引濳溪洪武丙辰豫官禁林寧海方生希直以文為贄一覽輒竒之館置左右與其談經歷三時乃去明年丁巳豫蒙恩謝事還浦陽生復執經來侍喜動于中凡理學淵源之統人物絶續之紀盛衰幾微之載名物度數之變無不肆言之離析於一絲而會歸於大通生精敏絶倫每粗發其端即能逆推而底于極本末兼舉細大弗遺見於論著文義森蔚千變萬態不主故常而辭意濯然常新衮衮滔滔未始有竭也細占其進修之功日有異而月不同僅越四春秋而巳英發光著如斯使後四春秋則其所至又不知為何如以近代言之歐陽少師蘇長公輩姑置未論自餘諸子與之角逐於文藝之場不識孰為後孰為先也今為此説人必疑豫之過情後二十餘年當信其為知言而許生者非過也雖然豫之所許生者寧獨文哉庚申之秋生以不見大母者久將歸省焉豫深惜其去為賦是詩既揚其素有之善而復朂以逺大之業云詩曰昔在辭垣時英才常駿奔水碧與金膏價重駭見聞終然無根蒂斂散空中雲方生海來上玉立而春溫袖携絺繡書靣帶黼黻文揖遜入禮域陳義凌秋旻同餐大倉粟共勘典與墳濳深索幽邃穹高攀嶙峋踏雪忽言别涉險航江津梅花似相憐沿途慰孤貧湛恩來九天憫我髮如銀特敕還故山許與煙霞親生聞抱經來處此寂寞濵􅐯蒼扣無始溟滓窮無垠宇宙所管攝載籍所敷陳終始鈎鉗之若大樂建鈞律吕按高下宫商肅君臣鬯和免惉懘疊奏歸繹純桑濮唉麾斥淫哇竟何存黃鍾壓瓦釡庭燎滅鬼磷似兹稽古力可敵戡定勛濡毫寫雄皓勢足移峨岷漏泄渾沌竅出入造化神變幻波起伏凊溫玉璘珣盡抽神竒祕不墮臭腐塵所以日出之愈見光景新山鬼當灑泣湘靈且逡巡振古著作家後先各􅌭紛豈知萬毛牛難嫓一角麟古今二千載有如星在晨豈意瓦礫中見此席上珍豫生髮未燥立言鄙河汾結交一世士暮齒越七旬妍媸與苦良入目無留痕自非病狂藥顛倒甲與􅚙寧因一學徒諛辭浪云云大言心不怍秪為所見真生今省行期序飲松竹根笑摘黃金花起泛青瑶尊酒酣兩耳熱劇論如抽緡寧無贈别言有志須當遵真儒在用世毋徒滯彌文文繁必喪質適中乃彬彬有虞號多士九官展經綸惟時亮天工外夷悉來賔不聞有著書鼓蕩摩乾坤生乃周容刀生乃魯璵璠道真器乃貴奚須用空言孶孳務踐形勿負七尺身敬義以為衣忠信以為冠慈仁以為佩廉知以為鞶特立睨千古萬象昭無昏此意竟誰知為爾言諄諄毋徒謂強聒一一冝書紳洪武十三年庚申秋九月吉日先生與伯欽書云太史示豫此詩未嘗以示人蓋以其知者少故也今特録寄吾兄前輩勉後學惓惓之意不特在乎文辭而巳望相與勉之跋太史公送方希直還詩臨海林佑公輔天下之士不能皆賢拔其尤賢者而訓迪播揚之則天下之未賢者亦將觀感而興起矣此善教之道也孔子論仁論學之際一則曰顔子二則曰顔子而三千之徒亦自以為不及日夜勸勉求其所以為顔子者終聖人之世雖庸才末學聞風而起者皆有所成非教者約而所成者博哉苟不擇賢愚槩而進之非惟彼未有所悟而我之教無乃屑屑矣乎當今之世去聖人巳逺執聖人之道以戶牖天下者太史公一人而巳天下之士登公門者奚趐千數而公許與之間特於希直深有望焉觀所贈詩拳拳之意蓋可見矣雖然使天下之士其立心其操行其為文辭誠如希直者公之心也幸而僅有焉又烏得不深望哉又烏知所望於希直者不為天下學者之所望哉吾知此詩之作不特於希直見之又臨海葉見泰夷仲見泰視宋太史公以年則父兄也以道則師也少為學子時常思從公逰而不可得洪武初自安南還始拜公京師公一見即呼為忘年友而不屑以師父兄自居頗疑公有所惜既而侍公者數月辨論􅒑誨未嘗不為豫盡乃益服公學巨德溥信乎其為一代偉人而非蕞爾小子之所能測也其後為廪祿所縻挈挈然往復南北雖或間至京師一再見公而不得久嗚呼公今不可作矣閲其遺稿輒澘然出涕公高第方君希直性孝友為文章雄邁醇深登公門者皆莫能與之齒公特鍾愛之雖親子姪弗及也在金華時嘗辭歸省公作詩二百餘言送之所以期望之甚重今年冬豫與希直同徴赴亰師希直於舟中出以見示相與收淚讀之豫且衰愧無以答公之知希直方富於齒尚益自力以求副詩中之所稱也夫洪武十五年長至日又同邑郭濬士淵濬事愚菴先生時希直年才十四五操筆綴文固巳不凡後希直從先生守濟寧由京師還值豫武林出示今太史公所贈詩觀其􅒑勉屬望之厚情詞藹然濬疑天下能文之士莫不以得出太史公之門為幸如希直者冝非一人而希直以童冠之年厠於其間獨何道以致此哉去年冬太史公來朝往拜之頃復得與希直晤敘且得盡見其所謂遜志齋稿文氣渾成識見卓邁動以聖賢自許其身不但言詞之古而巳然後知希直之致此者有在也雖然古學不明久矣世之人以時代觀人而不知今之可以為古故特逹抱負之士恆見纍于多口是雖習俗與時移易抑亦吾道未有以信之爾希直尚益勉循古道興復古學不負太史公屬望􅒑勉之意使先生之學大𬒳于世斯為善為人後矣惟希直念之染説金華蘇伯衡平仲凡染象天象地象東方象南方象西方象北方象草木象翟象雀以為色取蜃取梔取藍取茅搜取棠盧取豕首取象斗取丹秫取涗水取欄之灰以為材熾之漚之暴之宿之淫之沃之塗之揮之漬之以為法一入再入三入五入七入以為候天下染工一也於此有布帛焉衆染工染之其材之分齊同其法之節制同其候之多寡同其色之淺深明暗枯澤美惡則不同其深而明澤而美者必其工之善者也其淺而暗枯而惡者必其工之不善者也蓋天下之技莫不有妙焉染之妙得之心而後色之妙應於手染至于妙則色不可勝用矣夫安得不使人接于目而愛玩之乎此惟善工者能之非不善工可能也夫工於染者之所染與不工於染者之所染其色固有間矣然雖工者所染之布帛與天地四方草木翟雀其色則又有間矣無他天地四方草木翟雀之色二氣之精華天之所生也天下之至色也布帛之色假乎物采人之所為也非天下之至色也學士大夫之於文亦然經之以杼軸緯之以情思發之以議論鼓之以氣勢和之以節奏人之所同也出于口而書于𥿄而巧拙見焉巧者有見于中而能使了然於口與手猶染工之工於染也拙者中雖有見而辭則不能逹猶不善工之不工於染也天下之技莫不有妙焉而况於文乎不得其妙未有能入其室者也是故三代以來文者至多尚論臻其妙者春秋則左丘眀戰國則荀况莊周韓非秦則李斯漢則司馬遷賈誼董仲舒斑固劉向揚雄唐則韓愈柳宗元李翺宋則歐陽修王安石曾鞏及吾祖老泉東坡頴濵上下數千百年間不過二十人爾豈非其妙難臻故其人難得歟雖然之二十人者之於文也誠至于妙矣其視六經豈不有徑庭也哉六經者聖人道德之所著非有意於為文天下之至文也猶天地四方草木翟雀之為色也左丘明之徒道德不至而其意皆存於為文非天下之至文也猶布帛之為色也學者知辭氣非六經不足以言文玄非天黃非地青非東方赤非南方白非西方黑非北方夏非翟緅非雀紅緑非草木不足以言色可不汲汲於道德而惟文辭之孜孜乎天台方希直從太史宋公學為文章其年甚少而其文甚工不惟同門之士未有及之者自朝縉紳以至四方之老成凡與宋公友者無不推許之以為不可及余每過宋公退即希直讀其所為文未嘗不擊節而歎其有得於文之妙也今希直將歸其鄉大肆其力於文故因以此勉焉余自蚤歲徒盡心於文章垂五十而迄無成不知自勉乃欲勉希直寧不知愧然希直得余説而及時以道德自任則又何至豫哉此豫之所以致愛助於希直也洪武十九年秋八月望日古詩贈希直葉見泰吾友方濟寧其人世希生有如炎燉之雪曙天之星平生特立不徇俗窮年矻矻惟究心乎羲文周孔之遺經一旦起作郡卓然為群黎之怙恃列牧之儀刑九原長往不可作使人思之泫然雙涕零我言濟寧今不死濟寧有子字希直外焉才華巳絶世內焉持敬恆惺惺往年我謁宋太史見之坐右愛其風神秀發目光如月雙眉青太史文章擅中土東播踰若木西流入麊泠每稱希直稟間氣旁馳餘子猶以清渭臨濁涇太史猶巨鐘而我猶寸莛我誦蕪陋辭一一為我側耳聽只今逺行不可覿送入樊籠仍剪翎我歸巳五載俯首類拘囹每一念疇昔中心若生螟今年希直忽相過使我灑淚如醉醒握手塵市中顧影兩蛉雄文細字塞巨帙咄哉著述能爾馨振𬒮快讀不可了雅辭宏論開心扄其顯遏雲漢其幽通窈冥贍如戈甲積晉庫竒如盤鼎鐫商銘麗如勾芒青春布花卉壯如隆豐白日驅雷霆千流萬派怒奔放終然帖帖趨東𬈑顧我斂退餘守口動如瓶今日得子文耽誦不暫停有如赤日途解渴得楚萍又如藜藿腸忽咀五侯鯖瑣瑣彼何人乃工月露形劃然周廷覩巨燎光影不復窺微螢嗟哉希直執經太史門聞禮濟寧庭以文比行行益峻持以用世不啻如養生之穀粟濟疾之參苓胡乃僻處東海裔坐閲晦朔雕堯蓂我欲其為不朽計鋩鍔淬礪重發硎至音詎能祕錫鸞答和鈴直須上追虞書嫓周雅豈肯下比秦誓方魯駉于以作春秋之羽翼為禮樂之藩屏嗟哉載道器孰謂在世猶芻靈上帝閲世憫斯文寧復下取敕六丁水為江漢星作斗鐫之金石垂千齡洪武十年夏五月吉日送希直逰金華同邑許繼士修良會古所惜光景不可留故人今有行出門復悠悠晨雞號逺陌行色滿道周惻愴意莫宣慷慨意難酬願言力古訓所貴德業優千里從明師豈徒事逺逰川原渺何極仰止在山丘余生學苦晚賢哲忽我尤顧乏馳騁力重增離别憂遙遙金華道逸駕邈難儔瞻望兩相失從君去無由願為東南風吹上八詠樓願為雲端月照彼雙溪流君情諒不違我心復何求答希直許繼婺嶺隱天末遙思正屬君慰情來逺札動目有新文逸驥莫並駕離鴻常念群山空歲華晚舊話幾時聞送希直應聘赴亰許繼陋學窺千載古今極寥寥竒才不世出先哲何其遙方子間氣英孤鳯翔九霄經史斂胸臆早歲能充饒深造入玄閟精研味腴膏發為五色文光𦦨萬丈高吐辭信雄筆江河勢滔滔聞者但縮喙白首慚俊髦受知濳溪翁恩義猶同袍顧託有深意揚言豈虗褒聲價凌海嶽山澤焉久遨神珠隱自現寶玉終難韜中使隆優禮特起推賢豪天衢麗雲日盛際冝有遭紀載小班馬明良慕夔臯徽猷諒巳著榮名非所徼同鄉託交誼春戀豈一朝因依附徑翮愧我腹背毛會難思少留去馬疾若飈情至不能别病懷空鬱陶聞希直自亰還許繼玉音初捧巳殊倫天意深嘉得異人衆謂歐蘇才復出我知孔孟道當伸賜歸使就林泉養期用留為瑞世珍一旦巳成千載遇高風矯首在清旻寄方正學內翰樂平程仕簡三十年前下董幃姓名早見注黃扉古今文字非無託天地精華信有歸金匱入編嚴斧鉞紫泥承詔落珠璣斯文盛代惟公輩林下何曾有布衣正學齋記金華王紳仲縉漢中府教授天台方公希直僃神明之資負正大之學慨然有志於聖賢者也蜀王殿下素加禮敬間嘗聘置右右以咨諏正道公見必以仁義道德之言陳於前王方大肆力於緝熙之學日以誠意正心躬修體驗為務與公論辨若律吕之諧肯綮之中無不吻合王愈加斂容納之與臣下言必曰方公今之賢者也遂賜名其讀書之齋曰正學期其底聖賢也公退以告于紳紳聞三代之隆大道昭著風俗淳厚人倫明于上教化行於下故人之學焉者多出於正周衰列國分爭人尚詭異各自知能自立門戶而異端之術競起矣若楊墨之為我兼愛老𥅆莊列之虛無張儀蘇秦之縱橫韓非申不害之刑名管仲晏嬰之事功有不能枚舉者逮至漢唐世愈降而道愈漓著書動以百計其為説必曰我著書所以明斯道也而道卒不加眀我立言所以開人心也而人心終不加古非徒無益於人其所以壅塞正途聾肓耳目者為甚大天下之士莫不隨波逐流而相上下其於聖賢之道遂若𡵨徑之異趨矣比之三代之學其邪正為何如哉尚幸間有豪傑之士出於其間足以回人心破邪説挽頽波而振餘風然亦不能多見若漢之董仲舒其言明白坦易為得聖賢之心唐之韓愈卓乎特立於百世之下皆間世之竒才也至宋周茂叔以灑落之懷得理奧於默契心融之妙及其門者若二程子之主敬行恕窮神知化而道益宏逺矣其後新安朱子出又能推明周程之旨而集群賢之大成於是世之先後雖不同要皆羽翼斯道而所學純乎其正者也故自三代之下論者莫先於宋有元之時若許衡氏若吳􅊹氏若許謙氏輩彬彬和附于下者蓋莫非朱子之傳嗚呼上下千數百年求其人僅僅如此而邪説之惑人反有過之則夫凌高駕虛勵志鼓勇而跌足於異途者可勝道哉此志士仁人所以扼腕而深悲也今公才足以振俗德足以服人生逢聖明之世而又遭遇賢王之眷顧則所以追諸子而遡三代者公其可無意乎紳識志卑淺於公之學無能為役幸嘗辱知於公最久故敢竊公之餘論以繹􅌖念之萬一苟以為然則繼今以往益圖執鞭以為御焉答方希直先生書王紳紳向時嘗立於道邊見有行者揖群兒而問曰某將往于某敢問何之群兒指曰當從此往有頃行者悔曰群兒之言不足信乃更揖於父老父老曰當從彼往行者從父老言果得周道以此自懲學問之道果何異哉自孔孟沒後道術分裂百家並起各自以所見為言上下數千年其人不可勝數大抵皆得其一而遺其二剽其末而失其本者也甚至敗道傷化流毒遺害者有之况至於今風俗愈漓教化愈敝則其言又豈不甚乎此豪傑之士所不忍見而自默稍有志者當慎擇而聽信之也紳質性愚陋固不能立言以攻之然切欲慎擇而聽信四五年來問道之心甚切群兒之言喧囂闐閙于耳者亦不為不多及求如父老之言惟執事也故紳於執事之言每心融神會旨解意通獨恨力不足耳苟其可強雖水火在前弗顧也今執事乃惠書以紳能聽執事之言為奬嗚呼以善道告人而從之人之情也又豈紳有過人也哉雖然執事所謂知言難遇發口祗覺無味故默默自解此則紳之所惑者也自昔聖賢之生豈必逢聖賢而後言皆俯躬曲就喋喋而誨之惟恐其道不明也孔子嘗環轍於魯衛陳宋之邦至老不倦後雖有無言之歎然亦發憤之辭也孟子奔走於宋梁之國汲汲以仁義闢邪説時人不察或譏其好辨而孟子不沮觀其所為可槩見矣今執事僃精誠之才蓄純明之德日以立言明道為巳任而期底乎聖賢之域庶日談論於衆人之中是者進之非者斥之使開其心化其質是其冝也胡為默默以自解無乃與孔孟之心異乎雖然紳之愚世所不取而執事且教之又安知執事之言非孔孟之意乎從以紳受執事之知而不以是為復是負執事之心也又豈紳之心哉上侯城先生書先生又嘗號矦城生王紳君子負天下重望者必有副之之道也然言其衆非一士安得人人而誨之哉言其久非一時安得日日而語之哉古之立言著書者正以此也紳切見執事以英妙之年早屬天下之重望然而副之者非無意也第恐有所未盡焉姑以近日目所及者言之自卯而入見于王口談堯舜周孔之道日閲書詩六藝之文及申而出接見賔客學徒者十數輩扣之以律而應之以律倡之以吕而和之以吕無不各中其節其用心亦云至矣而其勞亦且甚矣然復以為言者蓋以陳于王前者雖甚盛而尋丈之外人不得而與聞也接于往來者雖甚美而閭巷之間人不得而共知也是則執事窮神憊力於一日之中而所及者止此則又何以慰遐陬僻壤之望哉此紳之所以拳拳望執事立言著書以明道也且道之不明亦巳久矣自孔子沒異端並起至孟子麾而斥之其言見於七篇之書其書雖為門弟子之所記述然莫非其精神心術之所萃後乎萬世斯道藉之為保障生民倚之為粟帛其功不在禹下者豈止及數人而利一時哉其後若荀卿若司馬遷若劉向揚雄班固輩莫不各以著書為事而其所至亦各不同惟韓愈獨不喜著書故張籍切切為言愈請待五六十然後為之紳未嘗不慊于懷以為著書必待五六十且萬一天不假年則賈生之策不及陳而文中子之中説不及著也切意愈之卓立豪傑邁于近世其書之不著固不足為其重輕第人之仰望者不無觖意焉今執事之才之美固將轢馬劉駕揚班而底孟荀也天下之所仰望者豈外此哉執事苟不亦有以副之吾恐望之弗得必繼之以怨怨之不止必隨之以詆且毀也或者又謂凡著書必其道不行于時故托於書以自見耳今侯城藴才蓄德筮仕云初方將駸駸見用以究其志奚以空言為事乎曷思大上有立德其次有立功其次有立言其並列非一日矣孔子亦曰有德者必有言未聞立德者棄事功而建勳業者遂忘言也周公其德大聖也其位冡宰而攝政也其言散見於詩書周禮也迄今未有病之者而著書豈足以病執事哉今執事之德厚矣言之見於文章日用者大而至矣苟遂因而筆之於書則雖安處一室終日如愚而逺近之人均受其惠矣何必窮年竟月披寒冒暑奔頓於道途以副人人之望而卒不能周其望乎惟執事其納而圖之上矦城先生第二書王紳向者不揣愚惑輒獻瞽言於左右蓋祈執事立言著書以振天下之聾盲情激于中不覺覼縷執事以為然耶談笑納之俾副其望可也以為非耶訶叱而麾斥之不為過也今既不遂其請顧乃賜答以千數百言若有所論辨者尤見執事之德之弘不以言之不善而遺之獨固守其謹撝而不變又且道之使盡其言者是豈紳之所敢望哉然而有不可巳於言者故不得不終其説也執事懲揚雄王通之徒未明道而著書為無益於世遂欲躬顔子黃憲之行俾默默無片簡之可傳而後巳是猶懲人之病風而惡出畏人之溺水而却遊也不其矯之太深而過情也哉且天之生聖人也豈特獨厚其身邪亦將用其有餘以備其不足爾觀乎堯舜禹臯陶益之典謨高宗湯武成康伊傅周召之訓誥若孔子之所以刪述曾子思孟之所以繼繩其大要皆所以成巳而成物也以是聖人雖不世出而斯道不終泯者以有斯文之足徵也今執事又謂斯道近世大儒剖析刮磨具巳明白縱著書不能加於孔孟故辭讓不為是尤不可也且所謂成巳成物之道六經巳具載矣孔子無言可也而猶不忘於弟子之問答孔子大聖也其言該博無遺冝若無以加矣而曾子猶用心於大學子思親承曾子之授且聖人之澤未逺可以忘言矣亦汲汲于中庸孟子時異端雖起苟舉聖人之説而闢之亦可矣乃反覆乎七篇之言至周元公道絶千數百載文獻昭昭尚在也亦必以心得之妙筆而為書其後若二程子若張子若朱子若吕子輩莫不各以著書為事其餘紛然作者不暇論彼諸聖賢者豈不知天下之道一揆也聖賢之至不可等也然且鰓鰓焉若此者所謂畏天命而悲人窮至仁之心也今執事言行皆取則於賢哲顧獨於斯而避之此紳之所以未曉也且執事之所以修于巳者美矣而士之所以望於執事者亦至矣正冝寢不安席食不下咽拳拳夜以繼日而圖副人之望尚何暇恬居妥處而俯與紳論辨去取乎哉惟執事深思而毋忽與童景庸書王稌叔豐仲縉先生之子王稌再拜書奉景庸契家兄長執事二十四年之别山川阻修莫遂一會晨夕惟翹企尺素之書稍慰契闊至今未奉一字其於馳戀之懷奚啻飢渴去秋得剡西孫孟昭書知有教翰至東陽煩單宗陽付趙希德轉逹舍下不意希德領書遂一疾不起後問其諸子竟失所在惟增悵恨而已兹會貴邑祁姓啇人詢知使門與其同里葉宅有􅊚聮之雅從而獲審文候動履迪吉賢伯仲均綏多福為慰僕今歲假館於金華郡城義士袁仲仁家童冠呶呶遣日學無寸進徒於世有生無益死無聞之憂懼耳視執事賢伯仲德修而業廣文雄而名振士林者不可同年語矣敝郡斯文寥寥濳溪文脈之遺僅有浦江鄭義門叔度先生檢討叔美先生乃弟叔端先生三數公而巳聚會間談論同門往事未嘗不慨然興歎先師遜志齋及先人諸公之不作而深有羡於賢伯仲能繼斯文於兹時也遜志遺文鄭氏收輯四五册缺逸頗多長史公每從僕抵貴郡會賢伯仲補完之貧病多故未卜何時可遂僕痛念遜志名迹日就湮沒欲執事與令兄商確搜輯其學行幽濳生卒始末為家傳行狀以傳同志有愛慕之心者自能默識而謹藏或可待時發揚於萬一此事惟賢伯仲從之久而知之深餘恐未能暴白其志而遜志冥冥間寧無望於賢伯仲乎撰次成幸附便來或躬造義門一遊甚佳遜志表姪鄭季溫珣近有消息否或歸隱鄉里執事幸囑其來與僕一會或可謀往聚寶門旅殯之所負遺骼歸瘞故里此區區之素志必欲行之而未遂也執事幸加深察因祁歸便特此聊逹逺懷餘不能悉惟萬萬自愛以副交逰逺望方先生小傳郡齋舊刻先生方氏名孝孺字希直一字希古嘗以遜志名其齋蜀獻王更之曰正學世稱正學先生逺祖自桐廬徙居寧海父克勤洪武初擢知濟寧府言行政事名一時母林氏元至正丁酉生先生生時有木星墮其所雙瞳炯炯如電甫髫齓日讀書積寸人以其善屬文呼為小韓子十五六時侍父濟寧歷齊魯之墟覽周公孔子廟宅問陋巷舞雩所在慨然有願學之志洪武八年父𬒳誣逮獄上書政府願以身代不報明年以文謁宋公景濂深驚器之名流老輩皆讓不敢及會父坐空印事草疏將詣闕伸理而父沒扶喪歸葬又明年宋公致仕還浦陽復往卒業凡四載辭歸公尋徙蜀先生欲往省不果為文籲天願輸巳壽以延師齡洪武十五年上用吳沉揭樞等薦聘至陳説多稱旨上謂樞曰方孝孺孰與女對曰十倍於臣上以是不忍輕用諭遣還家數年復辟至上知先生志存教化謂群臣曰今非用方孝孺時乃除漢中學教授蜀獻王延之處以賔師恆曰方先生古之賢者也先生久于蜀因得訪宋公墓恤其孤遺癸酉丙子校文京府三十一牟戊寅大孫嗣召為翰林博士尋進侍講禮遇甚重當是時天下識與不識咸仰之以為顔孟程朱復出既靖難兵下城破嗣君亡文廟納姚廣孝言召用先生不屈死之夷其族時革除建文之五年永樂元年也年四十六所著周易枝辭周禮考次目録武王戒書注宋史要言基命録文統皆燬不傳宣德以還國禁漸開遺詩文始出于世贊曰方先生在當時名重行尊故得禍最慘然以身殉主自其常分而心之安也自晚宋來士習大衰先生無所待而興其志願學聖人慨然以經世宰物為心謂三代政教鑿鑿可行於今其本在修身故篤志力行針警之道無不備心事皎然無毫髮可疑信子曾子所稱君子人也誠得師孔子將不為曾子矣乎正學先生事狀臨海陳紀先生名孝孺字希直姓方氏裔出桐廬玄英處士宋初徙居寧海緱城里曾祖子野祖烔元鄞縣儒學教諭父克勤母林氏以至正丁酉先生生癸卯毋沒時方六歲哀慕如成人洪武􅉝亥隨父知濟寧謁曹國李文忠公公禮貌之期為國士乙卯父被誣下獄上書丞相府願以身為軍贖父罪丙辰以文謁金華宋太史公于翰林公視其凝重不遷於物頴鋭洞釋諸理有喧啾百鳥中見此孤鳯凰之喜館置左右談經歷三時會父坐空印事草疏將詣闕伸理值父沒扶櫬歸葬丁巳太史公謝事還浦陽先生復執經往侍凡理學淵源之統人物絶續之紀盛衰幾微之載名物度數之變無不言之析於一絲會歸大通每粗發其端即能逆推而底于極見於論著文義森蔚辭濯然常新未始有竭進修之功日有異而月不同僅越四寒暑而已庚申之秋歸省祖母公惜别因敘其素有之善朂以逺大之業且曰豫所許者不獨在文後二十餘年當信其為知言辛酉公徙蜀先生往省不獲為文籲天願以己之壽年輸委乞延師命壬戍秋在郡城會葉林張陳四君子登巾山絶頂縱談千古竟夕不寐先生自以此樂乃蘇子瞻死後三百年所無也癸亥召至京以疾還壬申復召除漢中府學教授有令許至家與妻偕往癸酉閏四月到任時京府啓儲君四川遵蜀王命俱以鄉試考文見徵先生辭四川赴京府甲戌春朝蜀獻王道經夔得謁宋太史公墓而恤其家王好善忘勢召對不名賜號其讀書之室曰正學學者稱為正學先生自是書啓往復無虗時其賜教有曰闔門忠義為百世光華先生謝云惟當克巳慎行益勵夙心體國忠君不負所學丙子考文京府戊寅高皇帝賔天皇孫嗣位召為翰林博士巳卯升侍講命考文京府庚辰復司會試一時君臣道合有大制作若省躬殿銘凝命神寶頌御史府記東甌王神道碑銘皆出先生手是時海宇謐靖幽州兵起先生憂國追惟劉中丞基為之淚下未幾天命有歸先生以死殉君至於夷滅不變上距宋太史公惜别時適二十餘年矣知德之深知言之至至是信哉為文雄邁醇深所著述有僅存者然當時有禁又五十年鄉之儒紳始搜輯成帙鋟梓以傳南安守華亭張弼題其卷後曰篤信好學守死善道宇宙之間僅見此老九原有知亦足以少慰也夫豫小子景仰先哲直以甲子書其所信者以示不忘弘治巳酉五月朔成都府正學方先生祠堂記臨海趙淵君子之學曷為正持其志養其浩然之氣而巳矣是故志立則氣充氣充則人與天一無是氣天地亦幾乎息矣而况於人乎吾台方先生希直蚤以聖賢自期其言曰學聖人者須先識孟子學孟子者須先識浩然之氣又自名其齋曰遜志蓋其平生所得力處端在是矣我高皇帝時兩召語合稍除漢中教授蜀獻王復數延之尊之曰正學先生於是天下識與不識咸望之若孟子建文初纍官侍講與決大機天下倚之若伊尹靖難兵至姚廣孝輩中以烈禍屹不為動天下義之若夷齊若此者正孟子所謂不能淫不能移不能屈焉者矣非學之正志之篤有得於所謂浩然者耶卒之國禁開於仁皇廣孝奪於今上遺文盛流天下寶之蓋出於人心之同然而不容以終泯者如此頃淵逰蜀謂先生過化之地義冝建祠乃偕僚宷白于都御史唐公鳯儀御史丘公道隆既𣸪聞于王王曰隆真儒以光我先王余責也於是承奉君周宣陶宣寧儀周琦者𣸪慨然各輸數伯金以襄􅌖德祠成仍題之曰正學初濳溪宋先生客葬於夔獻王惠王凡兩遷之其墓其祠則宋承奉景之所自營者而今祠則其東曠壤也越蜀幽明之遇似亦非偶然者矣嗚呼師生之緒君臣之義列聖列王之德此誠關一代大故而奚可以不書若承奉諸君之效義夫亦人所難者因并及之且以語蜀之多士相與遊心於先生之學云嘉靖壬辰夏四月既望祭文貞公文祠在漢中府學和順王雲鳯公博究經史高談仁義動息言貌必揆諸禮法文辭渾然天成浩浩洋洋寫其所得該括萬事慨慕三代之治自任經濟之重立朝未久殺身成仁百千萬年凛有生氣公嘗教授漢中未斬之澤于今猶在鳯按部過此率諸生稱公為文貞先生潔除一室題曰正學祠正學者蜀王賜公號也作主祀公俟後之欲知公者有考焉謹告過侯城里有感金陵魏澤彥恩笋輿衝雨過侯城撫景依然感慨興黃鳥向人空百囀青猿墮淚只三聲山中自可全高節天下難居是盛名却憶令威千載後重歸華表不勝情謁侯城里有感太平謝省侯城里侯城老人死不死萬丈文光射列星正流一派分洙泗忠肝義膽照氷雪烈氣慿慿塞天地神逰帝側騎箕尾行天還整羲和馭寒為陽和旱為雨精靈颯爽誰能閟冥交不用覔逢干修撰王郎舊知巳又謝鐸我憶侯城人不見侯城里悲風忽何來令人淚如雨侯城西薄山侯城東逼海西山不可餓東海不可死千秋萬歲心悽惻竟誰語惟應劒光血夜夜衝斗起又謝鐸欲向西風酹一樽乾坤何處著英魂百年事過風前燭千古名傳海上村香火半龕誰地主孫枝一葉是君恩夕陽滿地傷心淚付與江流自吐吞謁正學先生祠堂吉安袁道我從東南行清風東南至往事垂百年行人口如矢大商有夷齊大唐有王魏稽首拜先生地下知誰愧附家傳故愚庵先生方公墓叛文宋濂嗚呼自我齊國文公紹伊洛之正緒號為世適益衍而彰傳道受業者幾遍大江之南而天台為極盛時則有潘子善氏林叔恭氏趙幾道氏兄弟以及杜仲良氏如此者不能遍舉皆見而知之推原體用之學敷化弘治而風動於四方重徽疊照於斯為至流風遺俗迄今猶有未泯若我愚庵先生方公其殆聞而知之者歟先生諱克勤字去矜姓方氏其裔出睦州玄英處士干宋初十五世祖草四府君某始遷寧海侯城里曽大父重桂鄉貢進士大父子野父炯元鄞縣儒學教諭母葉氏宋丞相夢鼎從曾孫女也先生幼而端凝五歲知讀書自辨章句十歲暗記五經諸老先生嘖嘖愛賞目為神童年垂弱冠遍窮濂洛關閩遺書及尋鄉先逹授源委凡涉性命道德之祕窮研探索寢食為之幾廢因喟然歎曰為學必合天人而後可舍是非學也至正甲辰嘗一踐場屋言國家利害峭直無所顧忌有司不敢取飄然東歸益閉戶潛心于一卦一爻必欲驗諸事為至於天文地理禮樂刑政及制度名物之屬亦辨析歸於至當如指諸掌會海民為變江浙行中書檄吳江同知金剛奴募民為水兵先生詣金剛奴謂曰民計窮而為盜未為盜者亦挻挻欲動奈何授之以兵是謂增盜非禦盜也金剛奴怒不答既而水兵果於中道殺護吏逃去從盜金剛奴踰垣走折一足始悔曰吾不從方先生言以至於此未幾侍御史左答納失里至郡招諭劉都事基為之副先生上書陳勦殄之略不宜姑息都事韙其言而不能用遂致郡縣陷沒民罹塗炭先生發憤入山谷採松柏食之纍日不返當路延先生入幕府先生謝曰我辟穀久矣弗足與人間事也吳元年冬大明兵取台州先生欣逢真主之出乃大有為之時疏舉賢才安人心黜豪強除暴斂明教育十餘事將上之未果洪武二年詔立郡縣學以訓導辟先生樂於育才即起應命負笈來從者至百餘人先生據經陳義曲暢旁通幾無毫髮遺憾聞者皆皆淪肌浹髓薰為善良俄以母夫人春秋高力辭而歸諸生追之者踵相接學舍為空四年夏朝廷聞先生賢欲致之部使者袁君宏以書幣來徴先生以母老不忍離左右辟去旁縣郡承使者風旨雜逮姻連督索之先生上京師兩詣執政固辭執政竒先生材命就銓曹試考核入格名列第二上特命知濟寧府事階朝列大夫錫之冠帶以行先生至官為書一通懸於康衢諭上愛養元元之意民有所不平詣府自言禁吏胥不得呵問日引耆耋坐語訊以得失郡學官缺孔子廟堂頽圯聘前進士為師弟子貟有未備者選輔之役浮屠以葺廟堂廟南鑿為泮池傍列兩序闢射圃於廟北造弓矢樹正鵠日一再視學親為正句讀較中否屬縣之內社各立學學凡數百區學子繫籍者二千人兵後號為最盛始有詔民闢廢田者閲三載乃稅吏徼近功不俟期斂之復以田定起科繇民益隋田不增闢先生與民約定為簡書列為丁産為上中下三等等復柝為三每有徴發恆視書為則吏不敢並緣為姦歲且暮轉戎衣于燕時有令役民舟者有誅别郡以牛車從事天雨雪牛僵死于道破産者十八九民請以舟就役僚佐畏令難之先生曰吾知從民便抵法非所辭也即載以舟具白山東行中書省省義不問郡倉絶糧省檄民七百里轉粟青州民病不能適漕運者自淮安輸濟南道出郡境先生欲就輸郡倉而俾濟南致青州告于行省弗聽即以聞戶部戶部奏可行省臣愧之郡城壞故事築以兵指揮使挾貴人勢當五六月聚民萬餘治之民不得田哀號而即工聲聞數里先生奮曰民病不救惡用二千石為密聞中書同官疑且得罪不敢署名先生獨署之胡丞相惟庸以聞即日詔罷先是不雨先生袒跣遍禱群祠涕泣卧祠下誓不雨不還至是詔下民歡呼而散大雨如注是歲五穀俱熟民歌曰孰罷我役使君之力孰成我黍使君之雨使君勿去我民父母自是連三歲三禱皆有年五年秋鄰境盡蝗先生省愆變食稽首告天夜聞空中甍甍聲燭之乃飛蝗蔽天而過郡獨有年民有赴訴者隨事則決大者笞辱小者諭遣之不留案牘尤慎於庶獄月録日省不使久淹或文有未具時作麋遍食之夏秋之稅每命斛卒持槩高下出其手或至纍旬不收民競指倉為穽先生令民自槩斛卒斂手不敢出氣遇將西成預移文與民期民爭來輸不遣一吏而稅常先登江西浙西二行省運糧百萬濟寧水陸數千里先生視如部民不使有錙銖怨懟舊比每斛益四升以禆蠧耗先生憫其道逺言于朝蠲之府召州縣官屬皆役皂隸往往索賂無厭先生下信符置郵無敢不至者信符之籍以印識而中分之吏托月日稽違以媒利先生私藏之緩急有程一自巳出復行其法於封內一以信符召民民得竟并力耕桑襁負來歸者相望于道初赴官時戶僅三萬稅萬餘石三年之後稅以石計者十四萬四千七百戶亦增至六萬有竒二州二十縣家有積粟野無餓莩羊牛雞犬散被郊垌富庶充實如承平之世至於社禝山川諸祀先生修崇壇壝嚴飾器服或樹名木於周垣之外一如儀制無有所闕水驛在西門內庳陋汚濕居者弗寧先生料揀材木候農之隙更作於城南庭堂室房弘敞逾昔冬寒河凍驛舟不行令舟人伐木為炭穿土穴藏氷因其餘力以成事功泗水經郡城南通淮江北引河濟地勢高㵼搆石為閘而時畜泄之魯橋棗林二閘歷歲久壞石填河中舟道難之役閘丁絙壞石治灰而甓之故以葦囷庤糧火屢為災教民為陶瓦營屋百餘間申戒火令編民居為曹伍遞相救恤其患遂止大將軍魏國徐公逹副將軍曹國李公文忠統士馬十萬之燕駐郡稍久要官勢吏爭索糧芻相膠葛于前先生依序酬決無不如意一軍稱能永嘉侯朱公亮祖將舟師數百艘北征河水涸舟膠不可動脅先生曰即趣五千夫浚河否則以軍法論日且暮先生不忍煩民泣禱於天夜二鼓天雨黎明水起數尺舟竟去莫有言者先生為政以風化為急務以德勝佐二始雖倨慢先生委誠待之卒自愧服武夫悍將不知禮久亦化戢在官縱無事終日冠衣坐堂上召諸吏授以書詩法律或公牘堆几群辨方譁先生片言折之各心恱而去性不喜近名常自誦曰近名必立威立威必至害人吾不忍為也府庭之間不陳杻械革鞭懸楹間示不妄罰省憲考績為六府最八年春入朝皇上以為善治民錫燕儀曹使踐其舊職瀕行奬諭有加且曰政成當顯用卿秋八月知曹縣事程貢嘗以不職被笞心銜之上封事言狀詔御史楊某廉按楊適程故人恐程坐誣罪易民服潛索先生過事踰兩月無所得乃捕府中卒吏盡繫之搒掠無完膚無一可問者楊更與其吏謀誣先生用倉中灰葦時十月固未嘗附火而葦則苫公宇垣實無私用者先生不與辨遂就逮民號呼填道隨行百餘里者將千數先生次子孝孺上書政府大臣願以身為軍贖父罪不報竟謫役江浦會空印事起吏又誣及之孝孺復草疏將伏闕上訴而先生殁於京師九年冬十月二十四日也壽僅五十又一孝孺與兄孝聞奉柩東歸十年春二月二十四日窆於縣東北深灣童施山之原禮也先生娶林氏諱姬婦道為一族冠先十五年卒至是合葬生子二人即孝聞孝孺孝聞年十三居母之喪不肉食至服除人以純孝稱之女一人再娶王氏諱在生女一人未彌月而王卒少房董氏育之董氏生子一人曰孝友二女皆在室未行先生靣自如玉須眉秀整不妄笑語動容周旋必合禮法兵亂負母逃入深谷兩踵血流遇二弟訓育備至終身未嘗失色與人交率真任質不事表襮不以久近為冷熱立談之頃洞見肝膈南冠過郡者必以米醪饋之不能步者僦舟車送之萊蕪丞陳川欲迎毋為養厄於無資出錢五千助之同列以事奪祿買布帛給其用且日延之對食久而不衰脫逢其飲醉投案太詬而去待之益恭及酒解來謝陽若不知者曰昔之夜吾亦醉矣不識君何謝也生平奉養簡素不服紈綺御一布袍數載不易日不再肉不治官事輒却肉不食所守廉甚絲毛不取諸人每行縣以物自隨杯湯不肯受兖州守因童進二水瓜笞童十召州吏還之鄉人有為饒陽令者以燖雁侑書力却去乃巳初至官時祿米一斛可易金三兩以軍食告乏月取十斗為食餘悉儲于倉或尤其迂不恤也晚年益加畏慎晝所為之事夜則白於天俯仰皆無愧怍榮辱利害恆視之若一坦然不疑古所謂體道成德之人先生誠庶幾焉其為文章質而不華平而中理有汗漫集若干卷傳學者云濂私自念齊國文公之薨殆一百七十又九年而其學䆮微譁世取寵者徒剽掠為談辨誇多鬪靡者務組織為篇章文公所以扶世教淑人心者率棄為空言故其臨事之際仰攫俯拾唯恐利不入槖至有庸夫賤豎之不屑為者嗚呼可嘆也巳有如先生聞風而興乃能誠求實踐參前倚衡儼若上帝鑒臨􅉼養既純發舒自異仁民善俗之政至今人人能道之大命雖止於斯而其率性會道無愧於文公者尚皎然弗誣也孝孺久從濂受經頗知先生行事之詳於是歷敘其故而繫之以銘銘曰堂堂齊公命世之雄伊洛正傳實為大宗入天出人完傳翼經有遏必疏無幽不明疇不鼓篋千里來過燦如聚星惟台獨多流光所及寧有翳昏揭彼日月輝于天門逝者沄沄滅景銷聲不有人豪聞風孰興猗歟先生行知尊聞養氣弗餒充乾塞坤實孚名隨上徹九天鶴書翩翻降於丘園爰自布韋專城以居象笏朱衣於赫其儀寵恩之加其廣無垠曷以報之誓不顧身敷宣帝仁逹于齊垊以煦以嫗以致其亨民或勞只如魴之頳乃平更繇俾遂其生黠胥舞文其貪若狼乃障乃防而扼其吭人相告言久嬰亂離父母孔邇我胡弗歸十百為群其來如雲操􅍏耰鋤以播以耘我行其原萬桑沃然俯瞰于隰黍苗芊眠鄰多孽蝗刺天而飛避不入境絶類有知真儒之效小試則殷誰曰漢吏專美其循太和薰蒸郁紛輪囷自此而升何澤弗臻大命止斯傷如之何視天方高淚如懸河我又奚嘆數竒則然中心無慊生順死安善人殄瘁斯道之衰顧瞻無依胡寧不哀崔崔者岡渺渺者陂其中有墳千載之悲方希學傳方孝聞字希學先生伯兄也少有至性年十三喪母輒稽典禮疏食水飲彌越三年及父卒斷酒肉居宿于外祖母亡亦如之每一號慟聲盡氣極嘔噦出血扶而後起於是䆮成羸疾行步傴僂然守禮益確親戚鄉閭莫不稱為孝子家素貧窶一錢寸帛不私妻子奉尊撫幼衣食賓祭喪葬婚嫁費用百出經理補葺以身任之曲中儀節儉而不陋平居未嘗去書遍學五經而邃於易精求聖賢旨趣由致知而誠身由親睦而愛物務篤踐履不為空言發為文辭理深意逺存心仁厚接物和恕里中有爭訟者不至郡縣而相率以質是非開以一言莫不恱服德器完精才具優長通逹世務議論甚偉先生嘗曰某所以粗知斯道者非特父師之教抑亦吾兄之訓飾也卒于家見修史私録及赤城新志石龍集方希詩方孝友字希先生季弟也舊傳文廟召先生草詔不屈親屬皆就戮先生目之不覺淚下孝友乃口吟一絶阿兄何必淚澘澘取義成仁在此間華表柱頭千載後旅魂依舊到家山士論壯之以為不愧先生之弟云方氏二烈女傳臨海章嶽正學方先生一門四節之盛世所共知而二女子之死則或未知先年天台老儒西軒王宗元九十歲時與石梁王君度言嘗授經烏傷山中有祝監生者老矣謂及見西楊閣老嘆方先生二女當先生死時年俱未笄被逮過淮相與投橋水死其事甚烈當時西楊欲為傳未就西軒以屬王君曰子可遂成西楊之意後石梁由南部出守建昌亦未及為當時嶽與石梁之子㣧東實與聞之兹因重刻先生之文録此附載集中以見先生篤學守道不二􅍏心而死君難精誠薰浸家庭閨閫間雖二小女子臨變赴義視死如歸不懾不回與先生伯仲之死同烈者講之素定也或者人得併觀於此益徴先生立言無虛語真足以昭方來起後學不惟見道化攸孚且使人知反身激厲處常變兹心則同當不忍以丈夫子愧于方氏之二小女子云嘉靖庚申仲冬新刋正學方先生文集序臨海趙洪洪自髫年聞諸老成稱先生之道德文章出乎天性始生之夕有木星墮於其所雙瞳炯炯如電弱冠日讀書積寸從金華太足公遊時所收皆天下士先生五經百家皆巳醖藉下筆翩翩盡聖賢膏腴公深驚器之以為莫之與京􅍏考守濟陽坐纍先生數請以身代獲原洎應詔擢蜀府教授引道匡主獨秀於玉葉中尋用交薦內閣一時倚重凡將相間所為惟先生之咨四方夷裔得一字珤於至璧晚路崎危皎皎大節出人所難先生易之今猶薰灼耳目也噫先生之淑履如此冝天有以培祐之而澌蕩慘於無遺如此豈理也耶自古有然又何云異先生之文撰述最多大足以包天地近不離日用之常皆雋永乎道德之語而意獨至而其論辨之高逺超昔賢之見今其縹囊儲牣不可得而覩矣幸而掇乎噓燼之餘所謂存什一於千百者也中間在蜀之作皆友人侯君邦彥得姑蘇編修陳公之所傳録與夫博采士夫間之記誦凡詩文二百六十七篇吾鄉之士肆畏道􅍏事什襲珍藏無由裒采洪竊惟春陽已舒江漢既濯應不屑於毛疪矣乃於寒暑之暇捐俸募工繡梓以圖壽傳悉手所繕落於天順六年六月望日考於次年四月望後一日也尚恨孤陋寓僻乏好事同志與之共成而諦訂焉魯魚中存凡經目者其加宥正又當知先生之文不冝以文視文而以之求道得先生之心可也雖然先生之功德固不資文章以顯先生之文章亦不假洪以傳然洪之所以疲於僣盩而不少為輕重者特為吾鄉餼羊之計云爾苟居隱墅而如是存德義以善里閈歷仕階而如是持忠節以奠朝社庶乎不忝所生而可以闖聖藩矣或者典刑具存豈非鄉人之美觀也哉豈非先生之敷錫也哉又惡知非先生之所望於後人之志哉凡我知愛苟私所遺惠然輻湊洪當倩巨筆以書成美敢蝕厥雅邪時天順七年歲次癸未夏四月望日新刋遜志齋集後序謝鐸右遜志先生文集三十卷拾遺十卷為文千二伯首總若干萬言於乎先生之文不見於世也久矣天順中趙教諭洪實始鋟梓以傳既而鐸與文選黃君孔昭頗加搜輯於是葉文莊公盛秋卿林公鶚王忠文公之孫汶諸所傳録者皆稡焉既又從柳别駕演盡得常人之所藏者視昔蓋不啻倍蓰而先生之文乃始稍稍以完今年春寧海令郭君紳聞之以書來曰先生邑人也是不可廢願益得以傳諸梓鐸與文選君亟喜而授之或者曰先生之功業雖不盡見於當時其道德在天下蓋有不可掩者文直其餘事耳而又何以其傳不傳為先生意哉鐸曰不然文者道德之著而功業則又文之見於行事者也伊周孔孟之道德功業盛矣千載之下匪由斯文之存曷從而知之又曷從而傳之乎且至大如天地至明如日月其疾徐之度盈虗之數猶必有待乎人而况於人乎故欲傳先生之文者非徒為先生計也為後之人慕先生之道德欲盡求其功業而不可得者計也先生之文非吾台所敢私亦非豫小子所得而贊特以著令尹之志於不忘且以告夫天下後世知誦先生之文者令尹又嘗即先生故居求所謂祠堂者而新之蓋洪熙初先生之遺族得從寬法而為之者也常本舊稱遜志齋集者訛缺為甚謹具存之不敢别有所更益教諭之編有的知其非出於先生者乃不敢取其曰正學者蓋蜀獻王所賜遜志則先生所自號今并入之以復其舊而其續得者當更為别録云成化巳亥冬十月朔新刋遜志齋集後序黃巖黃孔昭孔昭自幼習聞先生之名於鄉長老私謂先生學本天成非人所能及也既長稍知向慕求先生遺文而讀之則知先生之學雖浩瀚如江海運動如日月變化如鬼神而其所言無一不出乎日用彛倫之常蓋皆愚夫愚婦之所能知能行而天地聖人之所不能外嗚呼先生之學固孔子孟子之學也學者欲學孔孟之道孰得而後之哉惜其遺文散佚天下僅見趙教論刻本孔昭乃與謝侍講鐸日加訪采而其邑之秀彥猶能各以所藏來告遂合葉林二亞卿王李二中書與柳常州之所得者彚次之而是編成焉於是先生之文亦庶幾其全矣然先生之學巳不愧存殁文之全不全亦奚損益哉惟吾後人小子欲求先生之道者非此則無以考其全也集既成福建林僉憲克賢寧海郭縣尹紳各以書來請壽諸􅎚孔昭與侍講圖斯文永久莫如先生桑􅎚之地故奉以屬郭尹郭尹又搜訪於其邑得詩與文若干首附益之方經畫召工而金義士明陳訓導熙鄭學究公詢秀才楊顗金逺輩咸奮義助相校書董治各有司任不日月板將告成嗚呼於此又可見先生德澤之在鄉邑者愈久而愈不忘也雖然是集也抑豈吾台人所得而私之哉庸書諸末簡以告天下後世之欲知先生者成化十六年庚子夏五月朔日書方正學遜志齋集後張弼二十年前瑞安楊元霽知吾華亭嘗出方先生遜志齋藁見示乃録本也且道先生大節頗詳謹讀而妄書其後曰篤信好學守死善道宇宙之間僅見此老後得刻本則又加多竊謂孔子此八字而豈過也乎猶以見之未盡為恨今年二兒弘冝知寧海乃先生之闕里也得全集十二本寄南安秉燭疾讀掩卷深思如讀程朱之集喜而忘寐而又不覺涕泗之交零也嗚呼學之正養之充行之確而此八字未為過也三代而下可考其詳者大節或有之所養所學恐未逮乎當時有以歐蘇擬之者冝其弗屑也我朝以宋濳溪楊東里為文章稱首然恐亦不當出其右乎於乎以文章家目之殆非先生之知巳也於乎九原可作舉世皆當奔走為之執鞭如遇孔子不知以三仁許之乎嗚呼成化十八年壬寅五月之吉書重刻遜志齋集後先生王者之佐于時以彼其才易服就列宜致卿相之位究􅍏謨猷顧豈與唐王魏者等先生不此之碩悲椘抗激至磔身沈族而氣不少回凡以存君臣之義為天下防也嗚呼忠哉抑有功於昭代深矣雖報恤闕然而遺文盛流斯固列聖之惠與文始集于趙學諭洪至禮部尚書謝公鐸工部侍郎黃公孔昭益廣搜之得若干卷刻諸寧海木今慢矣乃會黃參軍綰應吉士良趙大行淵刪定偽謬重刻斯編以行于世俾知夫奮大忠者本如此云正德庚辰仲冬朔守台後學姑蘇顧璘識臨海縣知縣黃誥黃巖縣知縣張師善台州府儒學教授尚芳訓導李深黃巗縣儒學教諭文程府學生陳縝葉琰王梅齡臨海縣學生李臨卿戴濬之黃巖縣學生孫思光牟汝鈞校對遜志齋集卷附録終
