front:
  text: 遜志齋集卷之二十二
  hash: sha256:febfadbc6b07b87bd280c150c5053f39ddd4b26478db8c57ce791d027fb3cd43
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4e0074_SBCK_022-1a}
body:
  text: 中順大夫浙江按察司副使奉勅提督學校雲間范惟一編輯奉政大夫浙江按察司僉事奉勅整飾兵備南昌唐堯臣校訂中順大夫浙江台州府知府事前刑部郎中東呉王可大校刋碑表誌關王廟碑古之享天下萬世祀者必有盛德大烈𬒳乎人人其或功蓋一時名震一國祀事止於其鄉而不能及乎逺惟漢將關侯雲長用兵荆蜀間國統未復以身死之至今千餘載窮荒遐裔小民稚子皆知尊其名畏其威懷其烈不忘是孰致然哉蓋天地之妙萬物者神也神之爲之者氣也是氣也得其靈竒盛著則爲偉人當其生乎時揮霍宇宙頓挫萬類叱電噫風雄視乎舉世故發而爲忠毅之業巍巍赫赫與日月並明與隂陽同用不幸其施未竟欝抑以没其炳朗靈變者不與衆人俱泯則復爲明神無所不之固其理也人多謂侯特武夫之勇非有損益於世此非知侯之心者當侯之時勢莫完於曹操力莫強於孫權昭烈敗亡之餘削弱爲特甚操欲誘侯爲巳用毅然不從權欲爲子請婚罵辱其使如狗彘左右昭烈誓復漢室此其忠義之氣固足以服天下而豈一世之雄哉使侯不死與孔明戮力孔明治内侯治其外漢賊可誅孫氏可虜而高祖天下可復矣然則侯之存豈惟蜀人頼之海内實頼之無成而䘚非惟蜀人痛之凢嘗爲漢民者皆宜爲之悼惜也感之深思之久事其在天之神以致尊慕之心而不廢豈非出於天理民彛之正也哉寜海故有侯廟邑人䖍奉如侯尚存咸願紀德刻之牲石俾永世無惑詞曰炎光中滅寰宇分奸雄鉅猾胥噉吞穢腥上聞帝爲顰大統重卑高皇孫勑令神人下天閽虬髯虎眉靣赤璛寳刀白馬提三軍驅斬賊盗如孤豚扼荆取益聲勢振東呉喘恐睨且蹲中原萬里殺氣昬意欲掃蕩無留㾗厭世倐忽棄厥勲神靈在天燁若暾奉帝之命施威恩旌善誅惡康黎元孫曹兇虐罪莫原覊鬼號呼遭割焚孰若我侯乆愈尊海内廟祀莫敢諼春秋薦獻羅庭門酒牲芳碩箾皷喧侯乘飛龍雲駢軒萬騎扈從持旌旛來如飈馳去星奔惠民以德不以言嗟哉我民慎㓗䖍懋德致福無尤愆德凉媚瀆神不飡至理甚昭千古存侯神行世同乾坤梅長者祠堂碑天地至和之氣時得之而爲春日得之而爲煦風得之而爲薫皆所以長養萬物其化至宻其用至醇其在天德也則爲仁爲至善之德爲惇厚之化爲無言之教僃其理者在唐虞爲八元在周爲仁人在漢始稱長者其取義以爲能長育人材先躬行而尚本質有長盛昌大之道故善治天下者必貴之漢之大臣惟塞侯張歐皆以長者稱因其行而求之若曹懿侯之清淨寜謐萬石君之父子謙謹不譁丙丞相之居德不伐要皆長者之選長者之爲用迂而不曲緩而不滯寛大忠厚得聖人之度人主能用之者其國必興後嗣必蒙其利非若才智之士淺而易窮也彼孑孑然而露其智術任之以事聲威錯出非不可喜然刻薄少恩行法無餘意而慮民無隱情喜之者未終而厭苦之者衆矣若商鞅之於秦王猛之於符氏曾未旋踵而大亂作豈其才智之不足歟長厚之道㣲而人不懷其德也故天下可以無才能之人不可以無長者不幸而乏才能焉事不過於廢弛不幸而無忠厚之長者其誰恃而不亡乎長者之用粱肉也才智之效藥石也吾以所聞所見推之國有忠厚之治者後必不衰家之久存而不墜者必長者之子孫台之寜海有梅氏考之圖譜昔有諱盛字昌圖者仕晉爲章安令擢南昌别駕知晉將亡即是邑而隱焉常誦佛書而有靈鳥䧏其所居之側若諦聽者歲餘始知郡縣以爲鳳集上其事宋文帝聞而下詔褒之上表稱謝曰此殆覧陛下之德耳臣何與焉帝咨嗟稱爲長者仍命郡縣闢其所居舎爲舟丘寺云今八百餘年矣其子孫衆多爲邑巨家而寺亦不廢宋淳祐中諸孫之學佛者良阜建重閤像而事之歴年雖久而未有記其事者夫以劉宋立國未數十年而宗社爲墟長者之傳今千載而猶未艾此其所爲之可稱豈特一言之善哉宋文帝知其爲長者而不知長者之爲用國之不壽也固冝而長者之澤至於子孫而益著矣天之於善人其所施甚逺矣祠而奉之非特寓乎尊祖之思使聞長者之風者却去浮薄而趨忠厚豈不足爲天下之勸乎然則長者雖不獲如塞侯等之有益當時而其遺澤之所及未始不同也乃爲詩以系之詩曰中世取士貴乎才智巧僞如雲非國之利無言而化不爲而成長者之功沛然難名漢祀四百將相多有匪任長者其何能久如山之常如地之容不震不騰涵以雨風或乖于時世不能以澤鍾厥家千載祚祉有晉之衰攘於簒臣先生耻之高蹈海濱行脩于身閭里咸化靈鳥䧏祥自天來下璽書旌門惟德是嘉曰匪于躬邦家之華有而不居天下儀式錫之嘉名江海動色上下百世作者㡬君其誰于今尚有子孫列堂森森衣冠奕葉孰能祐之長者之澤爲善無位所係則長若惟尊崇䘚取危亡有嚴祠宫浮屠攸宅歲時蒸嘗子孫千百輔德惟天爲善惟人載其淳風民俗是惇成都杜先生草堂碑士之立言爲天下後世所慕者恒以蓄濟世之道絶倫之才困不獲施而於此焉寓之故其氣之所至志之所發浩乎可以充宇宙卓乎可以質鬼神非若專事一藝者之陋狹也荀卿寓於著書屈原寓於離騷司馬子長寓於史記當其抑欝感慨無以洩其中各託於言而寓焉是以頓挫揮霍沉醇宏偉雷電不足喻其竒風雲不足喻其變江海不足喻其深䘚之震耀千古而師表無極茍卑卑然竭所能以效一藝雖至工巧亦技術之雄而巳耳烏足與大儒君子之寓於文者並稱哉少陵杜先生在唐開元天寳間懷經濟之具而弗得施晚更兵亂益爲時所簡棄由是歛所得於古人者悉於詩乎寓之其言包綜庻類凌跨六合辭高㫖逺兼衆長而挺出追風雅以爲友蓋有得乎史記之叙事離騷之愛君而憂民閔世之心又若有合乎成相之所陳者㣲意所屬時以古昔命世聖賢自儗不知者咲之以爲狂而知其粗者憐之以爲詩人之大言而孰能果識其所存哉蓋嘗論人與物之品才知僅施於身者物之所以局於形理無不備而知無不通者人之所以異於物至於不能擴其所有以濟萬物而䂓圖止乎一身此則人而物者也均是形也而能踐其形均是性也而能不私乎巳以宇内之治亂生民之安危爲喜戚而勞思極慮必期有以濟之此則所謂人而能天而可以謂之大儒君子矣乎自孔孟没聖學不傳士之卑者多以私智小數爲學枉道以取冨貴視斯民之困窮不少介於心甚者或罔之以自利聖賢仁義之道不絶如髪先生獨有感於此其心願世之人咸得其所而巳雖飢寒有不睱顧視夫自私之徒如螻蟻之求穴則嘆而哀之是心也使幸而逹諸天下雖致治如唐虞之盛可也彼淺於知德者顧以大言爲先生病嗚呼先生庻乎人而能天者也其寓於言豈衆人之所能識哉成都浣花溪之上故有草堂廢於兵也蓋久大明御四海賢王受封至蜀以聖賢之學施寛厚之政旣推先王之心以惠斯民貧無食者賜之以粥䧟于夷者贖之以布歲所活以萬計歡聲逹於遐邇復謂先生爲萬世所慕者固不專在乎詩而成都之民思先生而不忘亦不在乎草堂然使士君子因覩先生之居而想先生之爲心咸有願學之志則草堂不可終廢乃於洪武二十六年冬十二月命臣工更作之不踰月而成中爲祠以奉祀廡其左右而門其前後爲草堂以存其舊高傑華厰皆昔所未有下教俾臣某記其事臣某惟先生不遇聖哲之君爲知巳汝陽漢中二王雖與友善而不能用其言數百載之内在位而尊慕者間有其人然皆以詩人稱先生而未能察其所存至於今王稽古尚德而後先生之道益光則夫懷竒抱節之士不有遇於時必有合於後而道之顯晦莫不有命觀於此亦可以知勸矣乃拜手獻銘曰天於萬民愛而子之篤生聖賢俾之理之群聚錯居顛迷於欲聖賢何事爲民耳目其䖏大位匪厚其身爲君爲師制産明倫四海九州若視閨闥一物失所仁聖憂怛稷契佐虞亦有伊周劬勩其形億兆爲憂古道不傳士溺於利以位自娯以民爲戲卓哉先生千古是懷力不能止詩以告哀推其本心可宰天下利澤滂滂物無遺者世不能以天實使然不諧一朝乃傳萬年神施鬼設地蔵海湧片言所加山岳震動載求其實濟衆忠君爲唐一經上配典墳知言寥寥賤德貴藝摭其餘膏粱肉是棄惟王濬哲道恊聖神蒐羅千載友古之人興懷先生爰作祠宇江山改容觀者如堵仁于黎庻憫恤艱窮聞其呻呼如疾在躬散粟賜糜以起其瘠百役不興以蘇其力問誰匡輔惟王之明先生之志王舉以行由唐迨今歴世悠久孰謂賤士而能不朽嗟蜀多士敬承王心斯道在人何古何今大明故開國輔運推誠宣力武臣特進光禄大夫左都督左柱國議軍國事信國公追謚襄武封東甌王神道碑銘洪武三十一年九月壬辰皇帝御奉天門故東甌襄武王之孫昱頓首言曰先臣和没巳三年墓道之碑巳具而未有刻文惟陛下憫之俾史臣有述焉制曰可臣昱至翰林以文爲請臣謹以其事聞有詔俾爲之銘臣乃言曰昔元德旣衰天下大亂我太祖高皇帝以神武明聖之資哀生民之無辜奮𬒮一麾四方響應芟夷僣盗蕩滌兇奸十餘年間遂濟大業雖曰天命所属不以智力然猛將名臣之勲著于王室有可徴者昔王之歸鳳陽新第也高皇帝有餞賜之勑其薨也有祭誄之文嘗自謂與王同受知滁陽王稱其智勇過人命勒石以紀勞績聖情深厚矣今陛下不遺舊而賜銘其碑以寵綏湯氏實行高皇帝之遺志臣執筆從太史後何敢卒讓謹按故開國輔運推誠宣力武臣特進光禄大夫左都督左柱國議軍國事信國公追謚襄武封東甌王姓湯氏諱和字鼎臣世居鳳陽縣之東湖里曾祖五一府君祖六一府君皆以王貴追封信國公考七一府君贈特進光禄大夫右都督左柱國追封信國公曾祖妣某氏祖妣周氏妣謝氏俱封信國夫人王㓜喪二親卓越有竒志嬉戲常習騎射指使群兒父老異之及長身長七尺倜儻饒智畧元至正間豪傑多起兵據郡縣王亦思自奮㧞以取冨貴壬辰歲聞滁陽王據濠兵勢強率所厚壯士千餘人仗劍從之滁陽王竒王驍勇置之麾下使從諸將略地毎在前行命爲百戸取九湾攻濠之定逺得兵千五百人擢爲千戸時高皇帝䖏滁陽王甥舘王委心推奉率兵從攻大洪山寨得兵八百陞長萬夫復從攻滁州殺其守帥以功多授管軍總管招集士䘚益衆又明年甲午帝自取和州諸將多滁陽王貴部曲顧望未盡效臣禮惟王以所領兵聽命甚謹帝心嘉焉㑹義兵元帥陳也先復攻和州王與將士擊走之乙未六月帝渡江下采石定太平王獲敵馬三百士䘚稱是既而也先與其將康將軍水陸分道㓂城王擊其水軍矢中左臂怒氣益奮中山王徐公逹寜河王鄧公愈帥師由東門轉戰城北破其歩軍遂生擒也先以獻王分兵取溧水句容克而守之丙申帝定建業三月王偕中山王取鎮江一日克其城兵不血刃陞統兵元帥復同中山王取金壇及冨莊七月轉同僉樞宻院事丁酉三月克常州奉命鎮守其地攻取江隂明年僞呉張士誠兵㓂常州王力戰却之擒其䘚三百十月復來㓂俘甲士千餘舟數千艘馬數十匹賊勢爲之少沮壬寅偕中山王攻無錫癸卯大破士誠兵于楊山斬其梟將獲甲首五百級逐其别將莫將軍虜其妻子以還拜中書左丞甲辰士誠弟僞丞相士信㓂圍長興王率歩將呉福興㑹開平王常公遇春軍合戰士信大敗而退超遷中書平章乙巳擊江西劇盗姚大膽斬之遂取永新州戮僞左丞周安等籍士馬歸于京師仍出守常州丙午帝命諸將伐士誠略太湖營于舊舘䧏僞將吕左丞等虜其兵二千馬八十疋轉戰湖州守將張右丞䧏進擊呉江州將不能格亦䧏遂薄姑蘇圍之明年丁未爲呉元年九月中山開平與王益督兵力戰卒平姑蘇縛士誠以歸三呉悉定除御史大夫兼太子諭德階榮禄大夫時方谷珎據温台慶元三郡與士誠比境聞士誠敗固巳震恐王督諸軍征之谷珍懼乘大舶迯匿海島中王遣人持書喻以國家威德谷珍即率昆弟子姪待罪軍門得兵械舟檝以萬計所至不擾王之功居多乘勝下福州戊申帝即大位改元洪武王畧定閩中諸郡至延平主帥陳友定怙險横甚令其副出城䧏觀望持两端王虜之以歸東南海上晏然是嵗九月帝幸汴梁王實扈從旣而與宋國公馮勝取懷慶澤路晉綘二年同中山王㧞河中渡河入潼關趨鳳翔越六盤關隴皆平明年與中山王宋國公至定西襲元將擴闊帖木兒營西北取寜夏至察罕腦兒獲其猛將虎陳定東勝大同宣府皆以勞先諸將九月還京師論功行賞錫以鐡劵封中山侯號開國輔運宣力武臣階榮禄大夫勲柱國禄一千五百石明玉珍乘中國亂僣號四川以重慶爲都玉珍死其子昇立四年詔王及德慶侯廖永忠統諸將征之昇鎻瞿塘峽以遏舟師王以計敗之水陸並進直擣僞都昇不能攴率其臣属奉金寳以䧏五年同中山王北征窮追和林明年甓通州外郛八年移鎮彰德甓其城是冬追元逋臣伯顔帖木兒于察罕腦兒獲馬牛羊無筭十年正月元日帝念王之功加號推誠位特進階爲光禄大夫軄爲左都督勲爲左柱國爵爲公國爲信俾議軍國事加禄至三千石仍賜鐡劵王益恭畏不自驕盈繼與𡵨陽王李公文忠練卒于鳳陽鳳陽濠之賜名也明年巡撫西河州繕完其城郭營舎十四年偕中山王北伐下灰山擒其平章别里哥及樞宻副使久通又明年詔至四川永寜治墉濠飾士馬十八年五開山獠爲亂王帥師討之夷其窟穴俘戮四萬人及入朝王以春秋高思歸故鄉從容乞骸骨群公次第以爲言帝喜之賜寳鈔五萬俾造第宅於鳳陽而謂王曰日本小夷屢擾東海上卿雖老强爲朕行視要害地築城增戍以固守備王行築海上數十城民四丁取其一爲兵以守之二十一年新第以成告率妻子陛辭賜白金以两計者二千黃金以两計者三百鈔以緍計者一萬五千文綺四十端信國夫人胡氏亦賜金錢文綺甚厚俱䧏手勑褒嘉之二十三年元旦朝于京師忽𬒳末疾且失音不能言帝聞之大驚即命駕臨視嘆惋久之遣歸故里十月詔王之子將命召至邸賜以安車入殿庭燕勞備至復厚賚俾歸以俟有瘳二十七年王疾彌甚不能興帝思見之特詔輿入覲手爲摩撫語及舊勞對之雪涕賜鈔六百五十緍預爲營塟之資二十八年八月七日薨於里第之正寢至是年七十矣訃聞帝感悼爲之不御朝者三日追封定謚親爲文授使者以祭命親王咸遣祭于其家棺槨明器冢壙皆官爲之以是年十一月十二日塟于縣曹山之原詔肖像于功臣祠配享於太廟祥禫必賜祭高皇帝禮遇功臣加恩于王恩禮之隆時莫與比夫人有婦德明詔稱其賢子五人曰鼎署前軍都督府僉事曰軌太原中護衛鎮撫曰鼐曰爕皆早卒曰醴同知左軍都督府階榮禄大夫將兵征五開卒于軍女五人長適德侯廖權次爲魯王妃次適萬泉衛指揮俞鼎次適景東衛指揮賴鎮之子溶次適楚雄衞指揮袁義之子興孫男十一人曰昱暹昇晟朂景昇昺旻昊曅晟其嫡也孫女四人曾孫男一人女二人皆㓜王沉毅質直勇而善㫁不妄發言入聞國論一語不泄于左右行師受任有詔即行不少顧家臨敵果敢堅忍未嘗挫􅗮有語及兵書者輙笑曰臨陣决機在智識敏逹耳何以泥古爲家畜妾媵百餘暮年皆資遣寜家得賞賜多惠鄕黨父老及孤貧無告者貴極公宰及歸田里見故交遺民意驩如也厥後群公多先物故而王獨享壽考以令名終斯固保身之有道而始終不倦可謂盛也巳今陛下追惟創業之艱顯揚刻銘使播不朽豈獨蓋覆湯氏之子孫蓋以昭揚先帝之功德而垂萬世也是用備著其事而獻銘曰於昭上帝視下孔仁䧏聖儲才相玆兆民民之顛隮俾聖康之復俾賢臣佐而襄之有元旣衰天厭其亂䔍生高皇拯綏大難龍奮于潜八極晦冥英傑如雲翼之以升惟東甌王旣智且武灼知天命早識真主衆方夢夢未决所從獨㫁不疑委身效忠臣或擇君杖䇿千里生于帝鄉其祉孰似寳劍彫戈折衝四方如虎如貔驅彼犬羊披淮濟江以作京邑京邑旣成皇業乃集東遏僞呉坐鎮毘陵不騫不傾伏義爲城帝德日宣逺懷邇服王率之行勢若破竹旣平姑蘇元惡就誅威鎮東南暨于海隅乃清關隴乃平幽冀萬邦來同獻其琛貝帝曰念哉劬我元勛爰啓土疆流慶後昆中山建侯遂公大國貂冠金劵繡裳赤舄海宇晏寜變夷爲華民休田閭榖粟絲麻王亦白髮燕嬉甲第伊誰致之天子之賜天子有詔共樂太平文錦兼金侑以百朋内暨夫人亦受寵錫璽書爛然觀者動色天實生才股肱聖皇豐其茀禄俾之壽康壽考令終孰與之同天子之門式勸有功没登王封從饗宗廟始卒無瑕其忠有耀昭哉大明如日麗天載焯鴻勲以訓萬年越國公新廟碑代太史公作丈夫之遇于時也生使人懷之殁使人思之且建廟食於其土必其德澤及人之深堅如金石而弗渝信如四時而弗爽昭如日星而弗􅑯然後足以厭乎人心而合乎輿論也嗚呼豈易致哉若今之胡越公者其庻㡬無愧於此乎自􅉝卯兵興天下大亂民遭溺焚倀倀無所棲止皇帝手秉黄鉞起而救之屯兵滁陽公杖䇿謁轅門一見語合遂居前鋒以佐揚天威龍鳳乙未春二月王師取和州夏六月下太平丙申春三月平金陵攻京口丁酉春三月又㧞毗陵公皆在行中搴旗斬將或操蝥弧以先登前後屢建竒功乃授右翼統軍元帥使宿衛帳下夏四月又從王破宣城上命行樞宻判官鄧愈成宣公副之秋七月遂同諸將軍攻徽州㧞之元將楊完者聚兵十萬欲復其城公自婺源兼程以進横槊而前大呼殺人衆皆披靡而遁戊戌春三月諸將軍克嚴州公又偕行䧏溪洞兵三萬以功遷行樞宻院判官公謂蘭溪去嚴爲甚邇蘭溪下則㫁婺之右臂矣冬十月乃下蘭溪十有二月王師取婺州陞公僉書行樞宻院事公益思有以自効巳亥春正月攻下諸暨州十有一月又平䖏州庚子夏六月又㧞信州信方絶粮人皆勸公還師公曰此閩楚喉衿地可棄之乎乃築城浚隍爲隘守計􅉝丑夏五月上憫公之勞且以婺爲海右大藩通閩引越非宿將重臣有以控制之不可乃授公江南等䖏行中書省叅知政事屯戍于婺州壬寅春二月溪洞兵叛而西歸公遂遇害知公之死者莫不哀慟流涕如喪厥父母上聞之亦震悼弗置親御翰墨作文以祭且命有司塐公像配享卞忠貞公廟庭甲辰冬復䧏㫖贈光禄大夫浙東等䖏行中書省平章政事柱國追封越國公先是公殁之明年公之諸部曲與境内之民悵然遐思若不能勝其情乃相率即城中作新廟一區十閱月而廟成堂門亭廡咸具及是寵褒之令下復群謁於金華宋濂諸部曲進曰公之號令素嚴人無違禁賞非無功罸非無罪使我等攻必克戰必勝而丕冐於寵靈之内者非公之賜歟我之病也孰知而起之我之凍且餒也孰察而周之其能親自褁創注藥及安於食且衣者非公之賜歟公之德我何以將之境内之民又進曰吾婺之民凋瘵殊甚公竱心撫摩之昔也奔走乎西東嵗無寜居今也長㓜一堂愉愉雍雍非公之賜歟昔也商賈不通布榖不給今也市區充溢百貨具集非公之賜歟昔也厄於暴强莫敢何問今也攘一莖茅公亦使人償之如承平時非公之賜歟公之德我亦何以將之今者寵光下𬒳爵登上公人神洽熈雲日潤明山川草木亦有喜氣適新廟告成願爲我詳記公之功德以垂永於無窮是用合辭以請濂竊觀古之名將出戍邊城者矣茍得甲士之懽心則耕田鑿井之氓必至於弗寜使斯民稍得以遂其生則持㦸荷戈者或不免於愁歎孰有两全者哉若公者可謂尤賢乎巳公嘗自誦曰我不知書然吾行軍唯知有三事而巳不殺人不虜人女婦不焚毀人廬舎故其軍一出逺近之人皆争附趨之蓋公䖏心以仁蒞事以威惟其仁也故不言而民附惟其威也故不戒而兵自不敢犯昔者祭征虜制御士心不越法度所在吏人不知有軍及其死也人爲立祠享之較之於公其事固無大相逺也廟而祠之其誰曰不宜𥘉公之未薨嘗夜出人見其两目煜煜有光若燈及其旣薨敵人數擾我邊陲公䧏祥異或見夣於人或覩靈光滿野洶洶聞人馬聲及出師輙大捷似實有隂兵來助者是則公英魂靈爽出入於星辰之間固未嘗亡也因并及之使知天之生公有非偶然者公姓胡氏諱大海字通甫泗之虹縣人詩曰真主啓運四方攸同升龍在天飈行雲從中有一人萬夫之雄其人謂何時維越公其一凛凛越公勁氣横騖手荷鉄殳其粲若璐彼趫以馬我捷以歩䧟陣如飛逢者必仆其二天兵四出靡弗在行瞠目疾視前無堅城有聲洸洸敵人震驚土疆既拓大勛以凝其三王曰俞哉爾予羽翼婺維雄藩爾鎮其域爾叅政府觧爾宥宻爾勞爾徠以盡乃職其四公旣受命分閫建牙威讋化孚莫敢或譁汝顛汝掖汝疢汝摩化汝呻吟而爲謳歌其五視彼郊原其耕澤澤視彼闤闠其通繹繹視彼室廬其居奕奕何以致斯伊公之力其六我民無禄俾公棄捐精神上游同合化權民之云思其何舎旃非廟曷祀非祀曷䖍其七乃簡甓材乃端術徑乃差糓辰視星之定林衡奔事班垂禀令紫梲星錯素階玉瑩其八邃清有寢嚴衛有門旁挾有廡四繚有垣肖像中居威神騰軒隂風肅如髣髴若存其九維公顧綏時著靈響隂火東騖鐡騎西上赤熾一揮無敵不磢孰不生畏孰不景仰其十生爲名臣死爲明神䇿書所列指縷可陳矧公之英貫乎屈伸幽明有殊神人則勻其十一公實惠我弗間弗二人之依公如旌繫檖登我稼穡遏我妖沴歆我明祀欽于世世其十二宋䖏士碑隂銘宋䖏士諱文昭字文霆金華人也䖏士嘗以次子太史公貴累贈嘉議大夫禮部尚書而曰䖏士以其德不以其位邦人之志也䖏士生二子其一爲義烏教諭淵次爲太史公濂享年八十有一而卒塟于白石山之原至于今十有五年矣而邦人哀䖏士者如始卒之歲稱䖏士者如䖏士尚存某獲侍太史公見公忠厚慈讓負天下之盛名而不恃其才爲天下之顯官而不驕其貴遇人無長㓜貴賤一以至誠不欺爲本未嘗不竊嘆以爲非人力所能爲退見公二子四孫或仕或未仕皆恭敬樂易薫然有君子之行又竊嘆以爲不可及固意其祖考之積者厚矣及讀公所著墓表䖏士之德則皆平易之事耳𥘉非有卓絶偉特之行問邦人之所以哀䖏士者亦不能名而言之於是而嘆曰䖏士之德其在是夫名至於使人不能名者善之至也可以名舉者非善之至也鸚鵡猩猩之能言騏驥之善走可得而名也至於鳳凰麒麟人皆知其爲瑞而莫知其所以瑞非不知也蓋聲音形貌之羙不足以盡其德而人不敢易稱之也故善之小者易述德之大者難名才傑之士多以竒功偉節著聞道德充盈者非口舌文辭所能具而不傳者衆矣然口之所稱歴世則亡而太史公舉其所可知而不論其難名者恐人以爲私美其親也是則䖏士之德非直而不阿者孰冝言之乃述邦人之意銘其碑隂曰金華宋䖏士德如古之仁人誠以交物而敬以持身天錫其後昆爲時碩臣孰謂善不可爲孰謂天不可信尚徴於䖏士之墳俞先生墓表元旣有江南以豪侈粗戾變禮文之俗未數十年薫漬狃狎骨化風成而宋之遺習消㓕盡矣爲士者辮髪短衣效其語言容飾以附于上兾速獲仕進否則訕笑以爲鄙怯非確然自信者鮮不爲之變是時金華俞先生獨率其家以禮深衣危冠坐談古道客造門肅威儀俯首拱而趨以迓至門左右立三揖至階揖如𥘉乃升及位又揖者三毎三揖皆有辭相稱慰慶賛周旋俯仰辭氣甚恭鄉人小子去宋久不知宋俗皆然或竊指先生爲異或尤以爲迂緩先生不顧年七十又二䘚于元至治四年正月十七日先生旣䘚而宋之遺風無有知者矣先生諱金字升器其先杭人呉越錢氏時仕其國爲戸部尚書董营田使者曰公帛嘗道婺義烏愛其地遂遷邑之鳯林鄉戸部生德銓德銓生又徙金華之孝順鎮生海海生善轉善智有子四人皆爲儒惟善智子昌言宋大觀五年上舎釋褐進士知永豐蕭山二縣而善轉子奉復家溪南之琴山奉生上虞主簿允允生性性生壽壽生義義先生父也母某氏先生少好學善自程督鈎發水涵木滋月長歲化壯而有名一試不合有司即退脩于家於經史尤潜心搜討較辯疑昧多所益附學者師尊之受業者繼于門先生德愈加志愈篤爲學晚而彌成人望其致用而宋亡矣故先生之名不大顯于世惟發之文章以自見久而亦散軼不傳世由是無從知先生知而言之者鄉人而巳然先生之所存鄉人未必知之知之之詳惟先生缺娶王氏生五子曰禄衍椿蓍某而卒諸子以卒之歲十一月某日塟于義和里之楊家園今觀先生卒時十年而先生之孫欽麒釋觀慶用亦爲老成人曾孫十五人巳多長云人于疑誤暨孫至曾祖則巳踈矣使復越數世尚有知者乎篤行自省固不恤乎人之知否然德如先生而不傳則天下之爲善者怠矣余是以論列之以見不茍合于時者乃所以合乎後世也林君墓表元之有天下尚吏治而右文法凢以吏仕者捷出取大官過儒生逺甚故儒多屈爲吏吏皆忠厚㓗廉寛於用法而重於有過勇於致名而怯於言利進而爲公卿者旣以才能政術有聞于時而在郡邑之間者亦謹言篤行與其時稱豈特吏之素賢乎士而爲吏冝其可稱者衆也元亡未久而遺風舊習與之俱變求之於世若林君者蓋鮮矣吾是以喜稱之君諱德世字一元台寜海人其先臨海黄氏自其祖德秀從母爲林氏子考仁壽來吏寜海因家焉君少好學通經史大義有士行居母喪如禮事後母有子道長而明習世故恢竒卓偉貌莊氣嚴善辯說事當否得失而料其成敗後輙驗邑人多慕與遊國𥘉知縣事李茂聞君才請與相見一見竒君曰吾不敢屈然使吾惮於政而病寜海之民君亦有不利焉願强佐我君語以土俗利害輔以義理法律因革翕張一本於愛民勸之立法以成歩度田著爲册書據其多寡以定徭賦民久而樂其便歲餘遷四明之定海定海杜令知君名事之難决者必謀於君無不立㫁㑹歲大旱民合辭以灾告郡守庸怯畏得罪遏斥不肯受属縣承守㫖禁訢災者君力爭于令獨受民辭逹于郡請上聞䘏𬒳災者租守怒徴租益急令憂不知所爲君曰官爲國家牧小民當以死爲小民爭之奈何畏守一怒而爲惠不終乎令用君䇿抱印章持文書伏守庭下涕泣乞自免守猶持不許適羽林耿將軍奉詔行天下問民所苦民以𬒳災狀自言將軍速郡縣官不受民辭者將寘之法令出文書䄂中獻之將軍驚曰浙東七郡無一人以旱請于朝而令獨有憂民心可嘉也令以君本謀對將軍特免出令餘皆問罪如法逺近聞之莫不多君以爲賢令由是益信君謂君愛巳君亦知無不言民有兄弟分財致訟者令欲以法繩之君謂彼以財而訟巳失兄弟情今不教訓而直待之以刑是使其兄弟終身相怨無巳也雖欲敦睦而無繇令因諭以倫理歸其財而遣之縣正田籍或以田詭寄他人以避征役覺令欲徙之君曰誠信未洽使民爲詐非特民之罪也今遽徙之失爲民父母意卒得不徙令改作城隍廟患材木無所取君建議毀淫祠佛寺以給其用海上盗掠官所運塩官欲償於民君持之堅民得不困其識大體善因事利民皆此類後竟坐以盗掠鹽奏報緩期謫頴上居七年復起爲刑部掾閱两月丁繼母憂歸以洪武􅉝酉六月十八日卒于家年六十一君脩行誼有器度始父殁時君偶出不獲躬侍藥餌後遇忌日必悲哀䘚之前五日病革矣妻子以忌日告猶強起以衣冠拜奠成禮如平時鄉先生舒公平𥘉以宦勝國北徙病死毘陵爲携其遺骨還塟其在頴上兵後暴骨滿野率家童拾而瘞之馭下嚴而有恩教子必以禮義娶呉氏生二子旭昶呉氏先君三年䘚君䘚之歲十二月十日合葬縣南許家山之原側堂葉氏有子三人曰昇昪昻旭早死而昇善學勵行服喪不近酒肉者三年玆述其所知事行爲書請識君墓余感夫世之銘墓者恒以位而不以德爵號崇顯之人過惡衍溢而猶爲之書秉志篤行之士不幸無位則棄而弗録故善者未必傳而傳者未必善也夫德合乎天者也位受乎人者也天之得而人之遺美也人之隆而天則替耻也賤其美而不貴而以耻爲榮豈理也哉君之得於人者雖㣲而其志之美蔚然而可稱過夫世之位有餘而德不足者多矣彼則務合乎人而此則求合乎天也人事常快於一時而天道必徴於悠逺子孫其昌尚勸爲善盧處士墓銘士之出於三伐之盛者豈素賢哉世教旣明勸懲之道旣備雖有未至者不得不企而及也生乎三代之後者上焉莫爲之率蹈乎邪者非惟不之禁而或以取榮趨乎義者非惟無以勸而適以取困故道之行也中人皆可以爲善及其廢也賢者之資不能以自立於不能自立之時而有由禮秉義之士可不謂難能耶若盧處士者是巳䖏士生元中世俗倫於胡夷天下皆辮髪椎䯻習其言語文字馳馬帶劍以爲常䖏士居雖近市然恬冲坦靜不樂芬華長衣危㡌徐言雅歩操儒生禮不變事後母下心抑氣甚得子道遇宗族鄉里一以柔和不較爲先有犯者對之微咲恂恂酧荅恐傷其意由是斯人亦不忍侮之居家雖無事必蚤起櫛冠洒掃祠寢非疾病未嘗一日怠好讀書纂集古賢人粹言及今人文若嗜飲食言若不能出口至論古今事當否得失成敗禍福及處之之冝詳審精深雖善辨者不能窮也親賓㑹集道前舊所歴見聞可法戒者以爲樂煦煦如也不肖者見之而愧善者見之而慕久與之居而不見其可厭蓋其天性粹美雖不同乎流俗而亦不求絶異於人故其生也人安之其没也莫不悼惜焉盧氏盛於齊周隋唐之際居台之寜海者其族衆多號桑洲盧氏者䖏士族也曽大考國華大考天麟考至公皆以善稱妣陳氏繼母王氏䖏士諱中字思誠配方氏予之姑也子二人曰質曰朴一女適同縣張宗雅男曰乾一質以縣學諸生登國朝洪武二十一年進士第對䇿殿廷天子竒其文擢寘第三授承事郎翰林編脩人榮䖏士善教子而䖏士益謙退若不預聞者後二年庚午䖏士年六十四以十月七日䘚于家以訃聞詔賜驛舟楮弊遣歸以明年正月九日塟於縣北梅林石門之原旣塟又四年乙亥質陞中順大夫太常少卿以書來漢中俾述其事刻于墓士之溺於習俗也久矣以孔子之時三代遺風未盡變聖化之沾英才大賢相望軰出而孔子猶嘆善人不可見得見有恒者斯可矣况二千載之下禮樂亡缺之餘而習于近世之陋也哉若䖏士者不汚於浮薄而持心制行與古君子類非所謂善人有恒者耶以此之資使及三代之盛而獲逰聖人之門道德之盛必有大過人者其所就當不止於此然則予於䖏士也安得不慕其賢而重有感也夫楊䖏士墓誌銘越新昌之楊氏當元滅宋時有諱普順者年十三歲爲兵挾以北至濟南厭次長而娶吕氏生子曰馬仕爲禁禦郎旣而棄妻子南歸父母尚無恙遂留不去䖏士普順之孫而禁禦之長子也𥘉禁禦娶王氏生五子自厭次來省父父强遣北還養其母㑹禁禦及王氏卒䖏士旣塟畢遂與諸弟訣來新昌事大父䖏士諱海珠字國寳少不資學間而凝重孝謹有德度在大父側愉色卑躬承意不少忤服喪治塟具合禮式家冨好施與族婣貧無依者輙賙給或養之終身鄕里匱乏歲時遺以米粟告糴者必飲食之歲大疫里中民駢首卧爲糜粥湯藥問慰撫䘏曲有恩意遇䘚有道死者爲之歛塟後水齧其墓復䟽澗引流使避去每諸子收息錢田租于外必諭寛貸戒勿歛怨以禍我家里甿畊地得金而不能辯持以鬻錢䖏士語其直使貨于人家人尤䖏士不售取爲巳利䖏士咲曰吾豈以利而昧心哉其所爲多類此尤善教子闢舘延師儒率諸子尊禮之夜則張燈命誦古人名言卓行以爲勸至老不懈年七十四以洪武十六年十二月二十九日終于家某年月日窆于白茅山之原配盧氏有美德男若于人魯某某孫男十有四人孫女四人魯由國子生爲成都前衛知事清慎能詩與余善述䖏士事始末來請銘銘曰義詘貲贏或僨厥身冨而克施天與其仁肫肫䖏士孝慈篤厚惠于鄕里不家其有惜其居下澤不旁流良貴靡虧善孰能儔古道日衰玆惟君子嗣人則之尚受餘祉王䖏士墓表天下之姓王氏爲盛其在東南者多出文獻公導文獻逺孫梁某將軍超孫始遷越剡溪將軍之裔有諱縉者石晉天福間自剡來台寜海之塔山因家焉䖏士其後也曾大父曰舉大父曰景叔父曰先魁在宋世皆不仕而爲冨家䖏士生元初䘚國朝受命之四年洪武􅉝亥十二月五日年八十有五其事親盡愛以有禮家嘗遇火父年九十卧病不能行亟抱以出復至先祠遷神主他所一不顧貲産及父喪不飲食至七日其待昆弟義以和二兄蚤卒撫從子如子無愛憎厚薄䟽數群從子姓數十人慈洽教敷藹如也於宗族有恩意不能自衣食者賙以粟帛不能喪者助以棺槥於鄉閭推所有無倦色里有瀦水之防曰蔣婆堰漑四百餘頃嘗决堰下田皆病旱捐私財募衆力築成之人賴其利其生見元之盛衰家冨實不少變是時冨家出有僕馬服有綺繡奉其身者多豪侈踰度而䖏士獨儉素喜讀書操行爲士人優游林泉以壽考終先娶盧氏年二十九生子元壽而䘚繼室以其女弟生子曰冨壽年八十五歲以洪武乙卯某月十日合塟上里奥西山之原而塟先䘚者于山北之原孫男五人嘉瓊琛璞瑋孫女五人曾孫十二人皓昻煚昱普昛暌晥鼎曾孫女九人䖏士旣没十八年長孫嘉以墓上之文爲請後五年予自漢中來京師乃爲之言曰䖏士閱有元一代之終始不可謂不壽也所基者久而所積者厚不可爲不富也目不識兵革而終於牖下謂之康寜而考終孰以爲否也矧其服行于躬者粹乎合於禮義其好德之善非斯世之所多有也嗚呼古之所謂不朽者其將在玆乎陳先生墓碣前同知景州事陳德星旣塟其考踈清先生乃以其僚知州事林顯所撰先生群行來京請文將鐫其墓上之碑余視其意惻然可念也不可以辭先生諱汝檝字傳巖踈清其别號陳其氏象山其所居也其先五代末有仕閩爲光禄大夫者避亂自閩長溪航海來遷五傳至顯爲生子彦發彦發生雷雷生應魁字君玉登宋季進士第爲國子助教有學行宋亡爲元遂匿不起學者尊之先生其子也母恭人楊氏先生資端凝喜學問不爲世俗譁教疑誤浮薄之習事親有禮鄕人服其孝後親没未塟隣家火勢將及家人争負筐篋走避先生與其嬪徐氏伏柩號慟誓不獨存巳而風返火熄柩獲全人益駭嘆以爲篤孝所感史官王禕傳之事聞于世從弟汝舟疾且死以㓜子爲託先生泣曰而子猶吾子也吾豈敢忘汝舟卒長其子娶婦以其遺物卑之歲大侵民飢先生與徐夫人謀鬻簮珥糴粟以賙飢者所全活甚衆平居雅易誠信即之者慕其賢聞之者樂稱其善多從之游歲時率賓客子姓婆娑燕嬉𬒳服整飾論辯雄偉其鄉之名士蔣景高因取其逺祖大丘事題其居曰嘉賢堂翰林學士危公素爲書其額嘗以部使者辟爲郡學録旣而引歸入國朝德星用薦者出仕而先生老矣年八十以洪武五年十一月二十三日終于家十年十一月二十九日塟縣東延壽奥山之原以徐氏祔徐氏諱􅎚有婦德德星其長也次德淵德定德性文衍女二人適士族孫男十七人孫女五人德星由同州移景州所至民安其政可謂良吏又能著其親之美而昭暴之天之於善人意其在是夫銘曰全其貴不慕乎位推其存不蘄乎聞天錫之祉多孫子遺澤有徴將在此侍讀唐君墓誌銘建文三年閠三月二十三日翰林行讀唐愚士卒于京師玄津街之官舎明日文學博士方孝孺言于朝上嗟悼久之詔有司給舟載柩歸塟公卿大夫相與惜其才之晚用用而未及施於人士君子相與歎其賢冝其壽考而不幸年五十二而殁門人學者相與奔走弔哭以爲失所依承而老成耆艾與之交者莫不爲之出涕君諱之淳字愚士以字行少有竒志攻學如飢渴之慕飲食父仕國𥘉應奉翰林文字有名君早出遊諸公間若翰林承㫖宋公等皆聲望高一世亟稱許其文詞而勉其爲學君年二十餘巳有聲浙水東應奉君謫死臨濠君􅉝勤䟦履奉喪歸塟追求父平生題咏篇什荒郵敗壁高崖㫁石之間纂録收拾如獲金璧時時伏讀聲凄切動人聞者爲之掩泣長身巨鼻博聞多識練逹世故爲文蔚贍有俊氣長於詩而善筆札毎一篇出人多傳道之洪武中屢欲有薦之者謝不就曹國李公好士爲勲戚第一聞其名走使者請至家俾其子師焉亦因與之講切待以賓友禮征行四方皆與俱歴燕薊秦周過前代廢都舊邑名賢傑士之遺跡未嘗不援筆有賦詞㫖超絶必驚壓一時頗喜飲酒酒酣談辨古今雜以諧謔竟日夜不窮㑹天子即位之三載詔翰林侍從之臣集數千載經史中事爲書以考治亂爲鑑戒命舉優通文學士孝孺與二三儒臣首以君薦上亦雅知其名且謂曹公之客必賢也趣召至殿庭即拜侍讀賜以冠帶俾與孝孺俱領脩書事且同以前漢書進讀人以君久困晚得一官輙得近人主左右且將行其所學咸爲之喜無忌嫉之者未幾而病病愈復起又未㡬時病甚或勸以禱于神不許卧月餘竟卒君紹興山隂人曾祖榮貴祖應麒考應奉肅妣汪氏娶周氏早死繼左氏生女四人得男輙夭卒之前某日始得一男子君喜自名之曰起君無他宗族李曹公最知之深而久將兵于外君久病念其家以悲旣而甚公歸與語曰無以身後爲念吾在能恤君家及卒喪具數百千緡皆倚以辦君次女壻國子生葉坦自得疾即視湯藥今又送其柩以歸將以某月日塟于山隂之赤土山而以銘爲請曰君之遺言也某聞君名二十年相與往還且十餘年及今乃爲僚友方欲與君同進于學而君棄予死矣垂絶之属其何忍辭君别號萍居所著有萍居稿數十卷及集録他書又數十卷可傳銘曰才而賤貧或尤乎人得位莫守將誰之咎能約禄豐身顯名汚較君所得不旣優乎曹䖏士墓碣銘元師取宋降其都宋恭帝北遷東南郡縣皆下廣益二王將走海上䖏之縉雲有義士曰曹君誠散家貲募兵泣謂二子天煖天驥曰吾先祖考繼世爲宋民戴天蹐地受德澤者三百餘年今宋亡主執吾義當死之筋力不逮責在汝等汝其無違吾志二子受命率兵從二王以行遇元師于台接戰不敵兄弟爭先死兄曰我死也其弟曰兄未有子且嫡也弟死國兄爲家不亦可乎遂代其兄而力戰以死兄還撫弟之子如子時聞曹氏事者皆爲流涕固巳卜其有後巳而䖏士生䖏士天驥之子義士之孫宋泉州德化縣令召之曽孫諱垓字德夫少孝謹識䖏巳大方事親先其所欲惡而將順之遇人無賤貴一以至誠不欺爲本廓大好施予歲饑捐錢粟周閭里力能庚者庚貧者置不問無難色於利人可爲者無不盡心而於神廬佛寺墮壞亦麋金帛佐其費逺近化服咸稱爲善人年五十有九以元至正丙戌正月五日䘚是日沐浴端坐戒後嗣以爲善勿怠累數百言不亂娶胡氏宋太學某之女賢而能順其夫年六十九以壬辰三月五日終後年十一月二十七日合塟洄巖之金盆山旣塟之明年盗起意其冡有蔵欲發之守冡者哭曰寜殺我毋發善人墓賊聞䖏士名德之相戒引去四男子某玘璟三女適吕德卿羊塌遂初盧陽孫男十有五人曰浦灃清溶汗浙洄游湫滂潤溱洧濡梁孫女五人婿曰吕欽名陳元某吕脩名陳希盂徐希和曾孫男二女三人浙有厚行國朝用薦者同知大同府階奉議夫夫以政事聞與余善論次其族姓事可稱者爲書授余請銘其先蓋祖漢二十一世孫磕五季世爲縉雲尉遂家縉雲磕至義士凡十六世義士䘚未百年諸孫數十人多爲大家銘曰其源孰啓視其祖父其澤孰承後昆是徴烈烈厥先蕃蕃厥傳有弗爲善請考斯阡呉䖏士墓表䖏州麗水有䖏士曰呉君諱再字仲可生于元之盛時無一命之爵而有以樂其心無政教刑罸之柄而有以感服乎民無惠澤言語以𬒳于世而其鄉閭思其善久而不忍忘也䖏士六世祖蜚英仕宋爲朝請大夫浙東轉運使曾祖集祖德潤父曾皆以醫術濟人娶王氏生四男子元同麟鼎濟後娶詹氏生一子瑜蚤卒孫男十人浩溢溱深洵清灃洧濋䖏士生斯世者七十年以國朝洪武丙辰二月二十一日終于家旣終其子某奉命以十一月某日窆于和樂鄉一塢之原今八年矣子孫多能守其家法而述其事䖏士敦厚和易孝于繼母而睦于宗族通史學能講說數千百年治亂得失邪正無所遺滯好賓客所友者皆名士然不以所長高人人以故喜親之貴者臨之忘其爲布衣之士貧賤者仰之忘其爲名族聞家雖野夫稚子皆知愛慕之以爲長者而䖏士初不爲詭異之行以徼譽於人也䖏士家故豐於財而不喜言利遇凶歲輙减粟價以賑飢人貸錢不能償以田來庚度與本侔即止息錢因棄不問貧者或焚其劵民蔡氏趙氏親死不能塟䖏士聞之召至家給以塟費嘉爲郡録事欲買田於郡學以養士以䖏士公㢘俾主其事䖏士恒以私錢倍田之數而償其租額田者至今利之其厚於爲人皆類是人用是稱之曰善人隣家火延燎䖏士榱桶垂及而及旁近舎䖏士家獨完鄉人大驚異之以爲爲善之報後子孫請易榱桶䖏士弗許曰使後人知吾何以得此於天庻有所警也然䖏士終不以語人是時天下久治風氣淳厚閭里老人皆以篤行相先非特䖏士爲然也故䖏士之善雖爲鄉邦所稱而不甚著聞于世今去䖏士之殁未久後生小子習於陋薄智術勝而忠篤損天子屢下明詔責勵之而未能率變也則夫䖏士之德安可不稱諸天下以爲世勸鄭䖏士墓石表辭浦陽之鄭氏有貞孝䖏士諱淵字仲涵生未嘗仕乎時足跡不出乎里門以洪武六年六月十一日卒二月十二日塟於左溪瑶塢其師太師公謚之而銘其墓墓上之木巳拱矣問其鄉之細民則蹙額曰仁人也處士在時吾民飢者告以食寒者告以衣病者我藥之稱貸者未嘗辭有恤我之心焉今死矣仁人不可得矣問其士大夫則蹙蹙然曰忠信人也其言也恐傷其氣其待人也和恕之容溢於靣其見人有善也揚之唯恐弗亟見人有過也隂告之而不聞于外貧者賙之急者紓之而未嘗以是驕人惜其死矣問其親戚則泣之曰吾忍言其德乎縱言之其有旣乎處士親在事之盡孝旣沒而喪之過哀親死時思食瓜終其身不食瓜曰吾何能下咽也事兄如事父兄曰坐則趨走就位不命之坐則拱而立不敢平目視撫子弟有恩而嚴或有疾夜四五起及訓飾之際正色厲辭凛凛如神明其視姻連不以貧富爲冷熱嫁其弟孤女踰於已出者其大者若此其少者可知吾言之安能旣也問乎太史公公出涕曰吾之徒也其事我也不以師而執子之禮其爲文辭氷潔而木茂其於道有聞矣不幸四十有八而亡今則無矣問於其子楷欲發其辭而舌莫能舉求其文得遂初齋藁十卷讀未終篇爲之泣下沾襟嗚呼處士一布衣耳道行乎家不特使親者哀之而交游者至今哀之不特君子哀之而野人亦且悲之使處士有位其及人者豈少乎而卒以死者命也世固有高位而人無稱之者甚或詆詬之願其速死其視處士有謚以昭德有文以傳世得失果何如哉嗚呼可哀也已處士之曾祖諱德璋宋青田尉祖諱文轟父諱鉅皆以好義同居聞母周氏配某氏先處士卒與處士同壙男卽楷女二人適某孫男耀楷有文行太史公稱之與予友以墓表之辭爲屬系曰古之爲儒道爲貴俗衰尙文才厥僞文奇行駁世所棄偉哉貞孝覺其弊躬行於家仁且義擴而爲文乃餘藝玄珪白璧郊廟器弗庸遽向山澤閟醇儒之亡衆歔欷幸有佳胤紹遺志積久報修將愈熾刻辭識之告來世采苓子鄭處士墓碣周之文盛矣至其季也流而爲詐誇孔子蓋屢嘆之教人必以忠信豈不以忠信爲立德之本故耶今世去孔子時益逺機巧之俗勝而敦慤之風微乃有若鄭䖏士者焉其可尚也哉處士諱濂字仲德别號采苓子居金華之浦江自其七世祖綺教子孫勿異㸑今傳十又一世矣元及國朝皆表其閭天下稱之曰義門鄭氏處士䖏乎世者八十有四年主其家者凡十有七年自成童至耄老其言必信其行必篤其事長撫孤待昆弟接朋友一以誠自持無纎毫之妄望之其容熈熈然即之其語怡怡然乆與之盤旋未嘗見其忿言怒色躁者炙之而悔詐者近之而愧士君子與之遊者若翰林承㫖宋公教授胡公翰贈翰林學士王文節公禕皆以文學重當世莫不推服以爲賢而鄉人子弟聞䖏士之名者咸敬畏以爲不可及也嗚呼可謂忠信之士矣處士爲學通大義羙髯長身貌和而氣淳家以田賦多推擇爲粮長屢以事入覲太祖高皇帝識之後妄人誣其家與權臣通財時嚴通財黨與之誅犯者不問實不實必死而覆其家處士與從弟湜两人爭先就吏上獨憐之曰我知鄭義門無是也人誣之耳擢湜福建布政司叅議而盡以所徴貨全歸鄭氏且問處士治家所以長久之道處士具以對上甚喜處士感上之恩毎上生辰即捧香詣闕下拜賀上未嘗不喜而勞之當是時浙東西鉅室故家多以罪傾其宗而處士家數千指特完蓋忠信之報云處士高祖政曾祖宋龍游丞德珪與弟青田尉德璋遭難爭先死祖文嗣考鈞䖏士本贈禮部郎中鍳之子以父命爲叔父後娶周氏先五十八年卒繼室梅氏子男四人櫄檝林彬彬好學有長才檝夭餘皆先卒惟彬後四年殁女二人長早死次適傳誼孫男五炳煜熾爍焱孫女四二適諸暨何恭永康朱輝餘在室曾孫男三人曰奎曰城曰墉女一處士以洪武二十六年四月二十三日終八月二十四日塟于石姥嶺之原塟之八年炳狀䖏士之善走京師請銘余始冠時從宋公于蘿山與䖏士家相去二三里而公與䖏士名同而生之歲又同相好也故余交處士祖子孫間甚熟公毎語及處士未嘗不以爲君子也後未㡬時而公薨又十三年而處士卒至于今而處士之故人交舊皆無在者而余幸執筆待罪太史墓上之石烏得以固陋辭銘曰自古有國莫能千年世之大家亦艱其傳貴冨豈無章組相繼道不足稱位隆名替鄭出榮陽周之攴孫來遷浦江以義爲門自宋迄今廢興多有巨族封君孰世其守維鄭之宗匪公匪侯躬率禮讓紹其先猷篤孝乎親恊恭昆弟人豈不能莫濟其美侃侃處士克長厥家忠信自脩無僞無華和色徐言犯者弗較安享壽康登于耆耄惟皇太祖神㫁如天華髪長髯屢對帝前帝眷綏之不怒以咲天恩誕敷爲善之報人之可恃令德爲尤疇棄不行外物是求宰木森森取則匪逺我啚其傳以勸爲善故中順大夫福建布政司左叅議鄭公墓表太祖高皇帝以神武雄㫁治海内疾兼并之俗在位三十年間大家冨民多以踰制失道亡其宗獨金華浦江鄭氏以孝義聞天下特受褒賞恩數甚盛或爲人所誣輙赦不問擢其子弟爲大官毎指以風切當世而鄭公湜尤爲先帝所器者也公諱湜字仲持洪武十四年奸人誣告其家以交通賊臣事甚危公兄弟二十五人存者㡬二十人而五人爲公之兄仲兄濂先以事在京師吏逮捕急四兄欲行公奮曰有弟在其忍使兄䧟刑辟自詣吏請行至京兄濂迎謂曰吾家長當任其罪弟無與公曰兄年耄弟當任其責非兄罪二人相爭入獄旣而太祖聞之召二人至殿前勞勉之即赦其罪賜湯沐酒食詔拜公布政司叅政吏部奏叅政無缺員特設叅議之官以處之遂授中順大夫福建布政司左叅議賜冠帶襲衣復命舉所知因薦同郡王應等五人後皆授叅議俱有聞于時公治福建吏民熟公家聲相誡勿犯豪將病民者公與之爭可否帖帖畏服南靜縣民爲亂詿誤者數千百人部曲多掠其婦女爲奴公皆言于諸將縱遣去兵不敢譁商有二人劇盗殺其一而取其財其一人得脫訢于官捕盗在獄驗屍無有不肯承公夜取盗鞠訊因縛置于庭匿吏案下俾聽其語夜半盗顧庭空無人果私語始知其沉屍井中明日詰盗以沉屍處盗驚伏閩人神其政十五年正月二十日以疾卒于京師享年五十有六公之先自宋同居至祖文㤗在元中世家始大考鉉封從仕郎江浙行中書省左右司都事母張氏公少竒警受學于太史宋公公稱其長才貌姿魁偉識度卓卓負氣有爲其事長待人理財御下皆有方所創條教皆可爲子弟法娶張民先公八年卒子男三人曰格曰杲曰柯杲及柯蘇氏出女二人適同邑張瑄東陽蔣卑孫二人光熖光某柯以十九年十一月𥘉八日奉公喪歸塟于諸暨龜山之原墓石未有文而格亦卒今年天子詔脩先朝實録公從弟前庻子濟爲史官與某聮事柯因以文爲請孝孺昔年二十餘從太史講學青蘿山數至公家拜其長老于堂上退而從公遊與諸公子姓相與論難甚樂也今去之二十年長老多巳亡公之子姓多強壯爲老成人或巳夭逝而詢公之墓木則巳拱而某亦衰病無所用於世矣嗚呼冨貴不足恃惟爲善可以獲天之祐少壯不可常惟脩德可以垂令名於無窮然則後之子孫追惟公之遭逢聖明以昌其家以永其令名其可不思所自也哉貞義處士鄭君墓表金華之浦江有孝義門曰鄭氏鄭氏有好學篤義君子曰䖏士諱洧字仲宗其言懿而信其行和而謹少受業于太史潜溪公劬勞勩志痛自繩斵鷄籠卧榻之側聞鷄𥘉號輙危坐誦讀至夜二皷不休由是盡通貫聖賢經訓尤精于朱氏詩論議根據仁義下筆爲文有竒俊語一時老儒多嘆譽之其家合族以食男女數百人處士事尊長待昆弟御卑㓜一以勤篤恭慎爲本上下莫不冝之洪武十九年詔天下度田繪疆畛爲圖命太學生涖其役太學生有以賄敗者蔓連大家多坐死處士兄濂時主家政當逮京師處士奮曰吾家以義名吾先曽祖弟昆坐誣罪爭先死維陽獄吾兄老矣吾可不代吾兄而使之就吏乎遂詣理自誣服死金陵其喪歸不惟其家哭之而鄉人靡不哀之不特識之者爲之涕泣凡聞鄭氏事者靡不悼其不幸也處士曽祖諱德璋宋青田縣尉昆弟相代死者也祖諱文轟父諱鉅母周氏配張氏子男二人曰櫟曰柏女二人孫男五人焯烝耿煔孫女二人曽孫男一人瑄處士卒於十九年七月八日年五十有三以明年七月七日塟於白麟溪北二里潘坂之原鄉人私謚曰貞義柏有文學與余皆師潜溪公處士遇余最厚柏以伯父左庻子濟所録狀來請銘誼不敢辭乃爲表其墓曰孟子謂以法死者非正命亦視其所爲何如耳使獲罪於義理而抵法如孟子之言可也倘所爲合乎義而遭逢其事變隕身于難得命之正也孰加焉故比干之死於君申生之死於父童汪踦之死於國孔子皆取之茍不由義而負耻貪垢以全其生縱登上壽殁牖下君子視之猶狐䑕之斃腐曷足謂之正命乎若處士者以身代兄死于仁義其所全者大矣其於天之所卑可謂無負矣壽雖不長名則永存爲善之報寜不在其子孫哉鄭處士墓碣銘洪武九年大臣擅事者以過用印章繫郡國守相以下數十百人獄劾以死罪中外冤之而不敢言㑹天子以星變詔臣民得言事寜海鄭士利奮曰事有切於殺無罪者乎即具封事投中書省求入對宰相問狀士利廷辨不屈又弗爲禮時士利兄湖廣提刑按察司僉事士原亦以前同知懷慶府時印章事在獄巳得减死論宰相怒士利無以發因謂其上書䂓免兄罪奏請治如律於是與兄俱輸作江淮間當是時士利聲動朝廷事雖不行天下傳其言莫不嘆服以爲竒士意其父兄之賢必大過乎人竦然慕之後數年擅權者殛死士利始以赦免歸而父巳卒兄亦沒徙所又三年爲洪武十五年士利以十月二十八日塟其父處士于縣東南士奥山之原以兄僉事君祔後四年始狀其事行來告曰利也無似父兄之生也不獲盡吾心今不幸殁矣茍無以昭其志業于來世其爲戾滋甚敢徼惠于吾子余知士利不敢辭處士諱邦彦字國昌世爲台城士族後遷寜海石谿曾大父某大父某考文明皆隱隴畝而考又以故廬漂于水徙水車䖏士少好學有高志強敏絶出窮經爲文有聲薦紳間其行巳端其御家有禮其教人有法嘗應進士舉不合即不萌仕進意開門授徒學者聞其講說各充然若有得喜蓄書手自校讐奥㫖疑義無不曉析望之温雅可慕炙其言論愈久而益深至其分别賢不肖善惡可否之際凛如也是以君子樂與之遊而小人異趨者畏之而弗敢怨年七十四而卒娶郭氏有婦德母道生四子一女子曰士原士亨士利士貞女適元江浙行省鎮撫童鑰孫男二人大同大雅女六人最長歸童淵餘尚㓜士原字好仁僉事君也剛直有才氣於學無不該貫國朝有天下之四年繇進士授奉訓大夫同知懷慶府事懷慶治一州五縣兵後民著籍者僅三萬家君至官招徠安輯諭誘有恩平賦役簡追逮禁吏不得爲姦召其耆耋告以法意使力作敦本越三年流逋四歸田野墾闢戸與稅增十餘倍河南諸衛軍粮月給鹽十之三各府役車夫赴河東鹽司輦致民困於道路君獨牒懷慶衛俾軍自輦鹽衛挾重臣勢令役民如各府行中書省下府衛雜議君持不可曰吾郡民寡而事煩與諸府異使月爲軍運鹽盡驅吾民父子兄弟踵接河東之途猶不給也其何以爲生且設軍以衛民奈何役疲民以奉驕卒衛官不能屈皆舉手曰請如同知議民至今便之考滿除湖廣僉事荆襄之卒先是乘亂多掠民女婦爲妻妾或脅爲奴往時部使者雖知其然而畏武臣莫敢究其事君至民拜馬前號泣訴立呼諸衛官俾還所掠于民君精練果敢操持勁正吏畏其威而強有力者聞其風亦莫敢犯之數千里間貪猾屏息若臨其家㑹㫁刑安陸府死囚有稱冤者時獄巳上御史臺奏報矣君索成案視之語果不同因奏其冤狀御史大夫怒君敢沮格我事因衘之旣而印章事起遂嗾懷慶吏誣君與知君與辯不勝遂自誣服輸作江浦明年徙儀真又三年徙京師年四十七以十三年四月二十五日遇疾卒時君父處士亦以是年正月二十七日終君季弟士貞先三年死於是存者惟两人士亨士利士利旣塟父兄事寡嫂陳氏撫兄子大同如巳子益刻厲爲學人謂鄭氏隱德累世積久發必大僉事君始欲以功名自奮竟不得年其將在士利乎士利學行日脩蓋能大其家者銘曰世之生才如木生地藴積深厚其發必異鄭氏之先家學淵源至於處士復尚以文匑匑其脩翼翼其教雖不有位厥德孔邵寔生良子才氣燁然郡政是毗邦憲是宣煦綏嘉柔摧擊暴強單窮舞歌姦屏盗亡聲威所曁千里化服銀章繡衣權貴震肅弗卑遐壽遽閼其施窺其所存亦巳雄竒凡今有家孰難非繼疇克象賢才美世濟考旣有子弟復似兄尚敏其德以篤厥承王君國祥墓碣金陵王顯述其叔父王君國祥言行授余請文其墓上之石顯竒士其文辭甚竒至其叔父之事尤竒也余考之爲之言曰昔嘗讀太史遷書載戰國秦漢征伐攻取間事必有謀臣辯士之畧叅乎其中或以一言脫屠䧟轉敗爲勝或奉文書下十百城國之所由盛強豈特甲兵足恃哉蓋有文事之助焉近世史所録名將爭戰之績則有矣而言辭之士寥闊罔聞豈馳說騁辯者不若古之人耶抑有之而莫之述也以顯所言王君說元御史大夫福壽以計破取二盗將如探鷇雛然固䇿士也哉而世不聞其名雖當時人亦不知計出乎君君說大夫時年六十二年且高不喜名名不聞於世至死而不悔古䇿士能之乎此其事足稱矣君諱元吉國祥其字也曾祖君祥祖子某父閏之君兄弟三人於次最少而重厚好問學自㓜竒偉喜兵家書輙以其意常爲人言之人咲其言之過君曰君凡子何足聞此吾誠過也年十四歲饑與兄行糴旁縣道遇盗利其粟將刼之兄懼走匿君不爲動徐紿罵曰庸縣官使吾運粟許遣夫防我而不至若豈防夫耶後有粟車數十两若其防後至者盗以爲然散去里中長老固巳異之後大夫福壽在金陵盗陳也先潘甲率兵數千自稱爲元帥聲言討賊索軍食城下大言殺人守將閉門伏不出大夫憂不知所爲君造門譌大夫論以禍福說累百千言驚其座人大夫亦驚喜起問計君曰今城中無一軍而盗兵悍甚此難與爭鋒當以計破之盗索芻粟公冝開城門陳芻粟車若將饋之者而陽以好言紿之請一元帥以卒來取芻粟彼聞吾言不測吾淺深两人必相讓則主者必自來吾以計殺之而制其一人易矣大夫從其言旣而潘甲果至執殺之也先失勢亦自敗去君絶不以語人又去而之燕秦齊魯之間隂察諸藩預知不足與言復歸金陵而今上巳得江淮即金陵爲帝都鄉間子弟多致大官君嘆曰人主在吾鄉而吾求之天下吾之命薄明矣尚多談何爲因噤不更談世事隱醫肆中以自給刮落鋩鍔不露㡬㣲故習恂恂務爲訥樸事父孝謹友其兄得恭遜意與衆人處不求其異人莫知其爲竒傑士也卒以布衣終年三十有九娶平氏一男頊再娶吕氏生某頊塟君于某山卒以某年月日以某年月日塟君爲人敦風誼知好尚當世名士多喜與交父喪致客千餘人挾其所長嘗以自高而人莫能高之世嘗謂古昔能言士多死於言爲竒謀士多以謀敗國因謂皆不若愚之全此要非篤論彼不善於用各有以取之非智辯之罪也若君之所藴而視時察變不以得喪爲累謂善用其智辯者非邪銘曰言之辯也識又逺也才則孔豐邦之選也胡閼其逢命之蹇也與時否通義是勉也不耆其終壽何短也揭昭于幽宫所存者逺也許士脩墓銘天台方孝孺有篤志尚德之友曰許君繼字士脩言必出乎正動必由乎禮趨舎取予咸則乎古之君子而無所茍其精思力學以求道德性命之藴汲汲若或失之而有得乎心沛然以樂不以貧賤患難惑其志余取友二十年所交海内知名之士甚衆考其所存莫有類吾士脩者蓋其操志勇自守介所期者逺而務踐乎事所造者深而其心欿焉如未有得使假以壽年其所志當卓絶過人而年僅三十有七而卒嗚呼此豈特斯人之不幸耶士脩之先汴人其六世祖景元宋高宗時爲台州教授遂家焉後徙寜海爲寜海人高祖文政曾祖彬祖光父琳皆業儒而不仕士脩質高朗自爲兒童巳有成人之志以學賢哲自勉喜爲詩其高妙處有魏晉人格韻别自號觀樂生其詩多道其所樂言暢而㫖深非近世人之所及也或傳其觀樂九詩至京師翰林學士金華宋公見而嘆賞之以爲不愧古人凡一時名能詩者皆自謂不及而士脩不自足益刻意經學翫心天人究賾探㣲將大索六藝之緒反之於約以成身致用而病作矣旣病咯咯然嘔血而學不止病凡三年每見必覺其進瀕死精神不亂與人言死生晝夜耳奚足怪談咲而逝嗚呼士脩之於斯道非篤信不惑其能然耶𥘉士脩學於鄉先生王君藴德王君竒之妻以女弟生一子曰籀二女曰忠曰惠王君固名士其弟琦尤與士脩相好士脩以洪武十七年正月二十六日卒琦述其行爲書托予銘予謝曰子兄弟與士脩善銘莫冝焉奚予之求後五年王君仕藩邸死琦亦謫去士脩弟顯將以某年月日塟某山來速銘於是士脩之親友盡矣予尚誰辭銘曰學失其統騖於空言飾外以欺㡬忘本源嗚呼士脩志篤行邵惟正之趨非義弗蹈曁曁其守汲汲其求棄遺芬華獨與道謀業雖不終世罕厥似我庸闡㣲以朂髦士僊居張䖏士墓誌銘余教漢中連以軄事趨京師道秦必朝于王而後行毎朝必承訪問賜酒食始遣去典儀副張君六成賛導進止具有儀法其奉上待人一以誠確予固熟識之去年冬自京師校文還六成舘焉接其人與之言論愈熟蓋所謂端士而余同郡僊居人也旣而六成爲余述其父䖏士事輙泣下余曰豈於死生之奉有所憾耶六成曰吾與兄德恭事吾父雖不能致養然於子道不敢失所憾者吾父有德行稱善人於鄉而墓石未有述且吾父年僅五十有一生旣不獲享壽考于時使沒而弗彰顯其志于將來是重夭吾父也敢於子也請予讓非其人六成以右長史茅君大方之狀請益固及考其狀䖏士之先居縣南之薦谷宗人有諱時舉者居南澗坊無子䖏士父嗣宗後之其家冨而好施閭里德其惠䖏士諱文道字希道其學務逹倫理大義其事親孝而有禮居喪哀而有節事繼母視其嫡無不及焉遇兄弟有恩意終其身不少衰待鄉里承父志不倦元季兵起避去山中鄉人或竊取其家貲後值其人陽爲弗知者其人慙謝以所竊自歸䖏士謝遣之其寛厚皆類此娶徐氏二子德恭六成也其卒以洪武甲寅三月某日塟以某年月日墓在東嶺之原台属邑五俗愿樸儉素惟仙居爲尤士多尚行守義不爲華言麗飾往往有古長者風如䖏士者是矣惜其殁于田里不克推其得於躬者以化澆競之習也然六成典大國之禮人多敬其賢處士之澤其將在兹乎銘曰其學也慤其行也卓其位則卑而施不博尚其後也克享遺澤陳仲昭墓銘仲昭諱子晟姓陳氏閩連江人少喜讀書有名里中長老稱之洪武四年詔用科舉取士仲昭甫任冠即以周易與諸儒試諸儒顧莫得仲昭名在前列福建行省貢于朝廷議少之俾入太學選爲荆王伴讀是時天子方寵士俊郊祀燕遊遇竒異惟偉之事輙命從官王臣年少賦詩属文親第高下咨賞其能仲昭從太史公學文有法可觀尤爲上所顧命缺闕命廷中年少趨過目視可者拜叅知政事御史郡守數十人仲昭久之獨不與九年從王之國後二年還京師病死中都學舎仲昭侍王謇直敢言王甚任之其府長史讇巧授王經不正說恣王所爲無所諌正仲昭毎廷詰之長史輙靣赤趨出䘖之㑹仲昭至楚娶婦甚愛婦翁謫爲兵戍邊惟外姑及女存仲昭還京師欲與外姑婦俱行長史持以爲兵妻不可格弗許仲昭獨行行發病念婦及外姑不置遂死死時二十六矣仲昭敏而專退朝覧誦綴述不少暇其鄉老生多造舎請其文自謂不及閩中諸儒亦皆竒嘆不敢望太史公尤稱之雖余亦重仲昭可友嗚呼今死矣與仲昭同仕少年才器出仲昭下多致大官又善與人合無所忤不遇禍仲昭獨以直取恨死不得志豈才者固人所忌耶或言貴冨脩短出於天世之得者甚衆不必如仲昭則與仲昭獨夭死豈天亦棄才耶嗚呼其可哀也仲昭死以洪武某年四月一日塟以某年月日銘曰孰俾子賢乎孰嗇子年乎孰使子無傳乎嗚呼天乎王處士墓誌銘臨海王處士孝弟行於家義讓聞於鄉樂易和雅爲才士名人所推重人勸之仕若不聞告以善惟恐失以是淑其身而訓其子孫享年八十於洪武丙辰二月初四日卒塟于胡家峙之原後十一年丙寅十二月二十八日夫人羅氏年八十有六亦終明年丁卯其子存誠將以十一月啓壙合塟泣且書曰先人行蓋一邑冝得銘以昭其蔵今失不圖無以示後嗣乃拜書于從女之夫林行巳走數百里以請予旣與爲禮問䖏士善狀林不能舉其目惟稱之爲善人予曰林君於是乎知人自世教之衰以詭激相高競趨細行以徼名譽求其出乎誠由乎中者咸無焉俗益以薄僞益以滋今䖏士爲善而不求名務德而不昡俗其謂之善也冝矣予嘉而銘之䖏士諱彦字汝翼姓王氏王氏之居臨海者有两族其先榖城來遷者曰廸功郎監台州稅其號曰西族處士本叅軍之六世孫監稅七世孫太學生收無子以䖏士父勛爲後收之父上蔡書院望賔諱復䖏士以爲曾祖上蔡之父楚州儒學教授諱滋䖏士以爲高祖處士夫人有賢行能推其餘以賑施閭里而存誠事親以篤孝稱存誠之弟德純德徴皆蚤世二婦復相勉守節不變予以是益信處士之爲善人也女一適毛建中早死孫男三人惟敞惟效惟斐孫女二人曾孫男四人伾倣億侄嗚呼爲善者必有後其將在是銘曰糓城之王世以善聞廸功肇台寔蕃子孫名卿碩儒䋲厥祖武出後宗人䖏士之父懿此䖏士篤履義仁令德有光加于前人天錫高年全歸于此過者式諸鄉之君子曹府君墓誌銘洪武十六年六月乙亥同知大同府事縉雲曹君養晦以疾卒京師明日其女兄之夫吕文熉治喪權殯于城南隅而謂曹君之友方某曰曹君性簡諒於人慎所推服於京師獲遇子稱於人以爲幸卒之日不能言矣猶張目舉手視予者久之察其意殆欲有言於子而不果今不幸死乎旅年僅二十有八父母在東南其子㓜甚可悲也子何以銘之以悼其死且慰其父母之心又曰曹君固不壽矣然吾聞能壽人者莫如文辭之美者其壽爲尤甚子其可無辭余旣哭與爲禮以不文讓不可則叙曰君字養晦諱湫以字舉于朝因以字行父某母盧氏祖垓號善人君資粹清好學問居家事母以孝稱母嘗病醫言人肉可療時君尚少即入暗室持刀刲其左臂血流滿几家人聞爭抱持止之則巳得肉矣糜以進母母病果療其爲人深沉有才智藝能鄉人交愛信之㑹詔書復漢法舉孝弟力田者里父老議稱此科者莫如吾曹君遂以君薦時有令肢體有瘢傷者皆罷不用君以刲臂伏闕請罪上曰此真孝子也其可罷耶授奉議大夫使佐大同府大同爲山西大郡且宿重兵主兵者皆大將貴臣守以下稍無善狀輙困折吏遇之弗敢少抗君有才能舉措施張得事機宜聲名出守上邊將甚竒敬之屈其威風降巳相驩狎政化行境内属郡邑守令數十人歛戢奉軄惟恐獲罪居官三年獄丞以私怨䘖君言君嘗以公事繫訟獄中與僚属飲酒下御史治言者因誣罪君當改官會病作遂䘚始余見君時君託余銘其祖墓不越數日而君病病時余日日視君君言語歴歴未嘗少變且命余爲文其思親之情懇焉可念嗚呼孰謂君之於親竟不復見而余乃復銘君之墓乎然君生有足稱道又終於官可謂具美雖不獲永年而古之聖賢固有然者此則命也於君可無憾矣君娶俞氏一子文某甫四歲君臨終時以托吕君吕君永康人與君同居自君去官至䘚服勞勩治藥物皆躬先之一不以憂君今以其喪歸欲以某年月日塟某地又將恤其孤而教之觀吕君之恩君如此則君之行洽於家者又可知也銘曰漢始近古以行取才推家于邦政化易該後易故常貴文藝士學用糠粃教空政弛有能張之爲民擇賢玆懿曹君爲群士先行脩于家化成于治配古諸侯章服孔貴不竟其施而以官終於身爲幸於世爲恫嘉績有傳邦人是紀孰旌其蔵嗚呼孝子宋仲珪墓誌銘翰林學士承㫖金華公有賢子曰宋瓉字仲珪其言確而信其行和而謹其爲學據依乎仁義取予好惡非禮法所存弗處也自其少時巳然持之終身心恒慊然雖變故灾患之迫于巳者其所存未嘗不然是以在父母側父母安其養而宗族服其孝居鄉里耆艾㓜稚冨貴貧賤莫不樂其善而從之遊奉賔客無賢否逺邇咸得其懽心人人以爲長者母賈夫人性嚴少不當意輙提耳詬責君年將老跪拜謝過若嬰兒然未始有怨懟之態伺其怒稍緩復温容好言以恱之當公在翰林致仕居家時天下士多奔走門下求文辭講道德者無虗日君營致酒食務順適公志不使有不合於禮公之重名高當世而季弟璲爲中書舎人長子慎亦通籍于朝人以爲尊顯而處之無盈大之色及後弟子爲坐法者誣死家遭譴逐侍從蜀之西疆間關萬里一子繼夭公亦卒于䕫家人死者相繼人爲之危而送終御家不肯失常度其形貌敦實重厚類壽考者而年止五十四竟以洪武十九年丙寅四月十日殁于茂州安逺驛旁之蓬簇殁時惟從子懌以孤童治喪三男皆先死無存者𥘉公之祖贈太常卿諱守冨及公父贈禮部尚書諱朝皆以柔善謹愿稱閭里至公尤以盛德爲海内師尊而卒未獲其報是以於君之殁也天下之知德公者雖不識君莫不思公之德而爲之嗟悼其與君遊者雖不識公然慕君之慈良易直咸痛惜而盡哀焉君先娶包氏金華人生三子慎愷恂繼同縣賈氏有二女長巳適人矣季在室㓜子懷卒之歲始生某從公學與君最懽且久公之西行不能從及今以事至蜀訪公遺孤得與懌㑹而懌以君群行見属於是君之喪巳五年矣情雖不忍銘而義則不可不銘也遂爲銘曰家稱孝子鄉稱善士冝受其祉而謫以死嗚呼命矣夫宋仲珩壙誌銘璲爲君名仲珩字金華其居宋爲氏父濂名儒國太史曽祖曁祖咸善士德政文昭乃厥諱君資粹清學淳羙文辭妙麗天所卑書尤有法配虞李中書舎人五官禩忠孝慎恭世儀軌三十有七庚申死季冬八月時加巳姪性迎喪友經紀明塟浦陽江東鄙祔母賈墓羅山趾仲夏某日襄厥事配方甚淑懌其子從太史行莫爲主嗚呼致斯果疇使埋石及泉載終始孝孺勒辭書鄭濟宋子畏壙誌金華宋慎子畏年二十七歲洪武十三年庚申十一月二十八日以某官卒京師明年五月某日從祖父弟性以其骨歸祔塟浦江羅山祖母賈夫人墓左天台某誌之曰嗚呼子畏以太史公爲祖以仲珪甫爲父以子之才智竒偉其於冨貴壽考皆所冝有而年不及壯仕不克膴舉莫推其故也告哀於幽使陵遷谷變之後有愛才者悼其不幸曰此仁人之子孫尚爲視護其墓郭君壙銘君諱濬字士淵姓郭氏台寜海人少靈異伉爽不群從里中先生讀書易悟若素熟者爲詩有竒語先生大稱愛之國朝建學設師弟子員選爲弟子業益脩䇿䇿有進聲精敏多有所難處事逆推其理無不中其機縣人皆以爲才洪武九年詔郡縣貢諸生之秀者于太學寜海以君貢時有詔許臣民言政事君至上書闕下論當時急務甚切召對忤㫖令學太學君自悔年少始學妄語非是閉齋取博士所蔵書恣讀爲文章輙美贍可喜太學所畜士數百千人見君文咸吐舌驚嘆謂不可及君亦氣高自負飲酒大醉縱筆疾書求者操𥿄立與及取以去無不意滿由是名起一時金華太史公以致仕歲來朝君同舎以君文見公稱爲竒士是時太史公以盛名爲當世師尊少所許可􅍦厚君竒其能君名愈聞于世旣而丁母憂公爲誌其母墓同學見君名以弗如君爲恨除服復徴入學適有五人爲學官君與語不合遂誣奏抵君罪以死死之歲洪武十五年五月某日而君年三十三矣君曽祖某祖有聞父仁母黄氏娶同縣陳氏無子一女尚㓜陳氏育君兄子某爲君後而陳以君所仕衣葬于某山且泣曰知吾夫者誰乎其生不幸死矣不可卒死吾夫也君兄乃使來告當君𥘉上書時同里人葉伯巨亦爲太學生分教山西亦上封事言天下大計徴至京師而死葉君亦豪士其年長於君其死在君前死亦無子人知不知聞二君事輙嘆息之而哀君爲尤深非特相與友善者爲然也嗚呼人之所願欲者冨貴也壽考也才能也名譽也然不可得而兼都大位享眉壽者常患不能有爲而爲世所輕訕其有才能名譽驚人者又多不遇蚤死而無所成功豈非難哉然䖏大位而無益于民雖貴猶賤也耆艾白首而無旦夕之謀雖壽猶夭也以君視之幸不幸果何如哉君之卒友人王琦集其文若干卷蔵于家而君遇余尤厚余實知君銘其可辭銘曰其成也孰卑之其逝也孰毀之人莫以之天實使之相其嗣人尚克祀之駙馬都尉郭公壙誌公諱鎮字彦鼎姓郭氏世爲鳳陽臨淮縣人父英以才勇善戰從太祖高皇帝定天下爲時名將賜號開國輔運推誠宣力武臣元勛柱國封武定侯夫人馬氏公何氏出高祖諱山甫曽祖諱聚以侯貴皆追封武定侯祖妣卓氏曽祖妣趙氏皆封武定侯夫人公故大家伯父子興以軍功封鞏昌侯追封陜國公謚宣武而姑氏復爲高皇帝妃公以勲戚子弟資貌㓗脩儀止詳謹朝謁之際上属目班行獨心喜焉洪武二十二年遂選尚永嘉公主賜金玉帶鞍馬金繡衣九襲拜駙馬都尉歲食禄二千石時年甫十七好學工詩熟於禮度毎命練兵綜事于外恭勤不懈中外稱之三十一年閏五月高皇帝崩今天子即位復命賞遼東兵事巳而還中途疾作至京師不能朝詔國醫視之卒弗愈以元年正月薨于賜第年二十有八事聞天子輟正朝三日歛及塟皆遣官賜祭諸王亦遣祭奠子三人曰蘭蕙荃皆上所賜名以是年四月十五日塟于應天府聚寳山喪塟之具一給于官不以煩其家嗚呼公父成功于先而公嗣其冨貴以承恩寵能恪恭于位令聞有稱可謂賢矣生不永年無以竟其志豈非惜哉且著始終納諸幽堂庻後之人莫敢壞傷處士鄭公壙誌公家台寜海氏鄭與點其名字子詠父曰督度稱篤行昆弟三人次爲孟少習經傳有至性居家孝友和以敬抱才甚優未從政女夫從宦奉温凊癸酉仲夏巳巳瞑客死漢中縁一病年五十六非短命生雖不顯德孔盛城北土岡厚且勁竁後三日龜所定子祥居南路脩逈尚其祐之俾終慶返塟故鄉禮斯稱樓君墓銘君諱士祥字彦璋氏曰樓所居邑曰義烏祖慧所紹父如浚字文翁文翁童兒少豐厚有志畧紹無子遂招而子之曰是兒必大吾家文翁旣長理財殖産具有方畫日充月拓卒爲巨室當婺之富民稱樓氏賔客食其庭者數十人子弟厮役皆衣綺綉善騎馬臂鷹走狗馳逐爲樂君獨弗效其所爲衣帛裘不臻華靡事親遇人誠謹篤實曾不知其爲富人賢士君子以是稱之遣長子從名儒太史公學教諸子事樹藝有餘以賙困者歲時擊牲爲酒召所親厚故人㑹飲咲歌爲樂見之者曰此承平時富民也年六十有一以洪武三年三月九日終是年一月某日塟石橋山君娶方氏四男子長銕從學者也其三人曰欽鉛銓皆爲士人二女長適同里金持正次適浦陽鄭幹孫男九人滋潤淇溱灝洪沃淵汴五孫女其二適人矣餘尚㓜銓與予遊其族兄恕余友也以其狀請銘銘曰樓氏在婺望久聲殷君之先人奮以貲聞夏屋崇堂封君之宅鍾鼔牲牢以饗賔客歲時遨遊良馬堅車綺綉煌煌𬒳于臺輿君於其時獨耻不效率其儉素克祗克好不狃于初不困于終視其朋軰孰可與同畜而弗施天道乃有孫子孔多尚徴厥後嚴夫人鄭氏墓銘浦陽鄭君源請銘其祖姑之墓而道其事曰祖姑名鼎嫁同邑嚴氏曰權生男女㡬人年八十有㡬以某年月日終某年月日塟某所今數十年矣知其事者惟吾兄弟嘗及見祖姑者耳弗及見者不知也又越數十年及見者日益少寜有知者乎此不冝不追爲之銘又曰祖姑之在家父母稱爲良女歸嚴氏舅姑稱爲順婦鄉人聘婦者必曰安得如鄭氏賢乎生女者必曰得如鄭氏女足矣旣老時過乎吾家湏杖以行矣毎坐必有業未嘗見其手之虗也始嚴氏冨旣而貧對其夫無傲容返見父無怨言母遺之縑帛三讓而不受曁老愈貧不求兄弟一錢此其終不可不銘又曰吾之妻諸曁金氏名玉祖姑甥女也少受祖姑教吾母久疾湯藥饘粥非手治弗進扶掖盥哺不以委人吾耳不聞其過言諸婦妾媵二百人服其賢無異辭毎以善言告人輙曰嚴夫人之教也吾祖姑之德由吾妻徴之益眀此冝祔書然非誼而好古者不信於人敢惟子請君有道人言不妄銘固冝惜余非其人也然不敢辭夫人曾祖運祖政父德璋宋青田尉銘曰不知其家視其隣不知其祖視其孫夫人之德徴諸甥女而益信孰傳弗泯不在玆文胡夫人范氏墓碣銘夫人姓范氏諱某和州鷄籠鄉人曾祖某祖某父某母婁氏四川都指揮使胡公淵之配贈驃騎將軍某某夫人某氏之孫婦贈某將軍某某夫人某氏之子婦右驃騎衛親軍指揮使宗之母也胡公世家鳳陽之定逺材勇絶倫至正中高皇帝起兵定江東公執戈從諸將爲瓜牙臣奪旗䧟陣功居多自安豐正千戸三遷而至成都後衛指揮使自成都征雲南復爲雲南都指揮由雲南徙進金齒復遷今官階一品夫人以公貴有封號洪武三年嘗朝高皇后于中宫賜以珠冠禮服十三載復入朝勞問賜燕賚以綺叚羊酒人皆榮之夫人少能安於貧窶以相其夫成功業晚處冨貴復能以儉勤率下教子婦勿爲奢靡事與其娣畢氏同居四十餘年奉養均一未嘗有忤容大小百口人人不同能調節撙量皆得歡心見其子琮好學名士多造門輙喜曰士君子乃不棄吾兒耶趣諸婦爲酒食延留久而不怠其明於事理類如此三十一年戊寅閏五月十八日終于成都官舎享年六十三子男四人曰寜曰安皆早卒次即琮次琛女二人長適耿竒季夭孫男三孫女三媛娥姻琮以明年巳卯隨父朝京師留拜親衛俾弟琛以某月日塟夫人于鷄籠鄉某山之原而以國子博士王君仲縉之狀請銘余昔遊成都與琮善聞大夫士稱夫人之行如博士之言乃爲之銘曰夫人處外志在四方内輔得賢厥家乃昌高皇龍飛英傑如雨惟時胡公猛敵貔虎寳劍彤弓戰功實多夫人相之俾勿顧家其窶其微克堅其守旣冨旣榮不恃其有始終一德靡懈儉勤百口烝烝率之以身入朝于宫后有錫予綉服珠冠㫖酒肥羜晚居于蜀公仕南中閨閫肅齊夫人之功夫有勲閥子膺天寵歸塟故鄉賁於丘塚冨貴豈無令德爲難婦順母慈巋其獨完有樹於道其下惟石載昭其潜垂範罔極楊夫人墓誌銘寜海處士楊先生子明其賢配曰王夫人諱某元秘書監丞大本之女贈禮部郎中晉昭之孫秘書君有文章氣高竒其女擇所適莫如先生楊氏邑大家内外族尊卑䟽戚其人賢否和戾冝不同夫人翼翼雅雅咸得其懽心事舅姑婉而恭慎而有禮先生從外舅遊學京師以家属夫人夫人祗上惠下各有儀則甘腴温軟必先奉舅姑揣度可欲營治以恱其意舅姑不知其家之有無而忘其子之違乎側也先生以是得縱志爲學徧交當世士以成其德爲時聞人夫人蓋有助及先生學成而歸不以細故綴心賔客至談衍竟日夫人治飾賔客飲饌必絜以時指使僮妾隨其資才有任舁無廢務其精敏儉儉逹於人此數句不可觧理以蓄其有雖丈夫不能過而夫人亦未嘗挾其所能以自有也尤善教子長子雖非巳出而好學夫人恩之尤異納於庠序不忍汨以事卒爲善士故邑人言爲婦爲母者必列以爲法春秋七十二以洪武十六年三月二十三日卒是年十月二十八日塟西白沙源先塋之次子男二人長靚也其次曰觀蚤死二女其一嫁柴原英一在室先塟靚以狀告某且曰吾母不甚學然知義理不喜浮屠言有勸施財祈福者輙拒不信故今不敢以其所拒者奉之惟於文字之傳所以報吾母也庻其在此某謂夫人以道相夫承厥家子又以禮塟其可稱也乃銘曰柔爲隂恒順爲婦貞内政克脩惟才乃成猗玆夫人實涵衆羙劬躬勵志以相夫子其爲言藹其爲儀率其儉素約世女不命于朝播德閭里嗣人孔文尚受鴻祉多有缺誤處士金君妻董氏墓銘余昔在郡城郡士金景文持其所述母夫人事行来告景文年五十六喪其母三年矣辭氣容色若始喪者余拜爲禮問故景文進所持書讀之且讀且泣不能成聲其辭悲愴諄切余聞之亦悲不自勝遽掩書而問其所欲景文曰欲得子銘吾母墓耳辭謝不敏然視景文誠篤於余似甚厚者則應曰諾㑹余還寜海屢遭家難未果爲今年景文復以書來速銘書辭益悲切謂我不可遺吾親倘吾母以子文而傳吾悲可少弭矣乃按其書而銘之夫人姓董氏諱某台之臨海人父受孫仕元爲某官夫人少有令質爲父母所愛旣笄擇士之賢者得金䖏士而嫁之䖏士諱玉世家同郡之僊居有文學夫人事夫能明輔其志承尊馭下具有禮則婣族咸賛以爲得婦道年四十餘産子輙夭死遂請䖏士置側室處士從之巳而夫人生一子景文也又四年側室亦育子曰德惠夫人撫之慈愛均一人嘆嗟其難能二子長皆爲娶婦夫人抱二孫焉喜曰金氏祖有祭主矣年七十三以至正壬辰九月十一日卒越二年甲午十月某日塟于昇平鄉蕭洋之原與處士同穴孫男四人與嵩汝㤗元哲元臣曾孫男五人仲益仲山仲思仲昕仲麓景文名德生好學能文辭爲學者所宗觀其孝親以求其爲人固可推而知以夫人之賢益信其子之篤行有以也銘曰詩著螽斯以立婦則内剛而忌乃匪隂德孰若夫人秉心淑嘉逮下孔恕誕開厥家天錫之子有嫡有系一務以恩莫知其異彼悍弗知惟巳是私式閼其宗祀事卒墮不私惟仁式蕃爾後嗚呼夫人順婦哲母黄處士妻鄭氏墓銘湖烏程䖏士黃􅌂之配鄭氏諱惠貞善事姑姑安其養洪武戊寅十月八日以疾暴卒其姑哭不食曰吾孝婦亡矣予奚以生爲其隣與其婣戚聞其死亦皆曰吾里失一孝婦吾誰取則儼亦悼惜其孝且賢也走書京師請誌其行以塟斯民之不勉於行久矣孝親事長非卓異難行也而盡之者士君子或愧焉况女子乎今黃氏婦不出閨門而人稱其孝斯其可尚巳孝婦曾祖諱應辰祖諱貴誠父諱原隆母謝氏性淑慎柔婉在姑側卑顔抑氣候其喜怒察其嗜好而後發言飲食必躬進匙筯絲銖細事不敢自專一聽於姑姑或有疾視藥謹慎不忍去左右相夫子順以正遇娣姒恭以和其家故饒財紡績織絍未嘗少怠壽止三十有六而卒是以人咸悲之子男二人曰壽曰璘女二人塟以是年十二月十九日墓在錢山祖塋之傍儼之考諱毅母范氏大父諱應麟曾大父諱衍銘曰淑孝靜顓胡不永年人以爲賢而不得乎天振古而然鄭君妻洪氏墓銘余與浦陽鄭君楷游東明山之麓過青松岡見塚焉鄭君惕然色變趨塚前揖揖巳環視兆域凝立不忍違余招而問之曰此塚與君有情耶何悲之甚也君泣曰吾先妻洪媛之塚也吾惡能無悲乎昔吾父之女兄適同里洪蓮生女媛而卒洪鄭氏世戚也故媛歸于我媛五歲時其母病涕泣禱于神請以身代及母卒哀慟如不欲生聞者爲之摧心九歲父娶後母鍾媛曲意奉承事之如巳母洪故多貲日招賔客飲酒女妓羅列彈箏擊聲嘈嘈欲沸諸女競出褰簾睇觀不休獨媛若無所聞閉戸業組紃足未嘗越戸閾其族人教女者必曰何不效媛耶年二十歸吾諸娣姒數十人共一堂食媛恭敬敏慧俯仰其間無不恱者尤得吾母周夫人心預測其意而將順之不待其言吾母有疾者累年媛節適飽飢寒燠調湯藥扶持卧起雖久不暫去左右值呉越亂夜半訛言㓂且至家人皆入山谷吾與奉母出匿隣人室吾母顧媛曰吾病去死近不足恤爾少艾曷不自爲計媛曰死則與姑俱死耳敢它之乎旣而吾母終媛方免乳故嬴憊復衰號頓毀適媛得熱病猶朝夕哭奠不巳諸母見其病日甚勸稍食魚肉媛泣不肯哭愈哀㑹吾母小祥時媛巳不能行呼媵女扶至帷前奠哭哭巳仆地由是寖劇逾三月竟死死於洪武庚戌七月十三日年僅二十又七十一月某日塟于某處媛將死時語吾曰越百日即塟我而歸主家廟吾問其故媛曰先姑靈几在堂而妾柩復存焉寜不愈傷君舅之心乎吾收淚諾之精神垂死不少亂語家事無一遺者生一女然一男耀時尚㓜其死時盻睞者久之而後逝嗚呼猶在吾目中也吾安能忘哉子欲慰吾悲其肯爲我銘乎余曰媛行應銘法非恒婦人比其死誠可惜也且與子善銘實宜媛字子姫祖諱與曾祖諱天錫銘曰質之姱德又孔嘉而命則不遐嗚呼其鄭君兮柰何臨海縣知縣黄誥黄巖縣知縣張師善台州府儒學教授尚芳訓導李深黄巖縣儒學教諭文程府學生陳縝葉琰王梅齡臨海縣學生李臨卿戴濬之黄巖縣學生孫思光牟汝鈞校對
