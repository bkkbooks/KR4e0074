body:
  text: 中順大夫浙江按察司副使奉敕提督學校雲間范惟一編輯奉政大夫浙江按察司僉事奉敕整飭兵備南昌唐堯臣校訂中順大夫浙江台州府知府事前刑部郎中東吳王可大校刋序宋氏世譜序士有無位而可以化天下者睦族是也天下至大也睦吾族何由而化之人皆欲睦其族而患不得其道吾為之先孰忍棄而不效乎有族者皆睦則天下誰與為不善不善者不得肆至治可幾矣睦族之道三為譜以聯其族謁始遷之墓以繫其心敦親親之禮以養其恩譜之法正月之吉會族以修譜也四時孟月會族以讀譜也十二月之吉會族而書其行以為勸戒也謁墓之法春序飲以申禮義秋序飲以明憲章也親親之道喜戚富貧相慶吊周恤也老壯稚弱相敬讓慈愛也役相助也力相藉也難相拯而死相葬也斯三者並行雖士可以成化况有位者乎不難於變天下之俗况鄉閭之近者乎近者宜其易為有位者宜其易化然而莫為且莫化者知道者鮮也知道而有位人焉得而不望之乎金華宋氏太史公之族太史公以道德文學師當世道之行先於其族凡可以睦族者無不為矣斯其譜也譜非公一代之書後世之所守者也非止一家之事舉族之所取則者也使逺而後世衆而族人皆如公之心雖無焉可也茍為不然有法以傳之猶恐其或廢况徒譜乎某是以私附其説于後俾後之人得以覽而擇焉由一族而推之天下將必自茲始此固公之志也歟謝氏族譜序先王之盛以井地養民以比閭族黨之法聯民以學校三物之典教民凡羣居耦聚者非必有昆弟之親宗族之序然貧能相收患能相恤喪相助而死相葬喜相慶而戚相憂小而五家之比大而萬二千五百家之鄉其情皆如骨肉之親之厚且篤也及乎法弛教失雖同宗共出之人乖離渙散而不相合貧也而或陵之患難也而或乘之死喪也而或棄之於是倫理大壞而不可振嗚呼王政之廢興豈細故也哉當其行也能使至疏者聚而為膠􅃮及其巳廢至親之愛皆化而為途人親睦之俗成雖天下不足治情乖勢散之餘士者欲善其家族猶且難之吾以是知先王維世持民之道非後世所能及而後世之為士者難於先王之時也象山謝德祚氏士之有志者也嘗為薦者出為南陵丞以歸其先由台之石馬來遷德祚閔其宗族傳序久逺子姓衆多而莫或統之其勢將至於渙散而不可合於是上自始遷之祖下逺其子孫凡十三世譜其名字壽年卒葬及其行事為書且自述其意以告來者戒其無至相凌相棄以同於途人既而復念石馬之族及近族之為寧海陳氏後者乃悉訪其族人而省之遇其尊長有禮而待其卑且少者有恩茍尊矣雖少不敢忽苟族矣雖貧不敢遺與之交者咸稱其美以為德祚非特能為譜也必能睦其族豫聞而甚善之天下俗固非一人一族之所能變然天下者一人一族之積也生乎世者莫不有祖有祖者莫不有族使有族之人皆知相親相輔如先王之民聯之以譜諜紏之以禮文歲時為酒食以洽其歡胥告戒以匡其失賙恤資助以全其生是雖未行比閭族黨之法而先王之法意實行乎其中矣如是則民皆樂生而好善重其身而不遺其親天下幾何而不大治乎夫以德祚之有志而能修其譜不待豫言而明也修譜而先王之法意存焉此則豫之所欲言以為天下勸者也童氏族譜序有天下而不能為千載之慮者必不能享百年之安為一家而無數世之計者必不獲樂其終身事變之生固非智計之所能盡備也然古之賢者寧使思慮出於事物之外而不使事物遺乎思慮之表方其燕安無事之時日夜之所營為恆恐一事之未周而啓將來之患一時之或懈而基無窮之憂人固疑其為計之過也而不知必如是然後可委諸天命晉何曽見武帝論議無經逺大略語其子孫以為天下將亂後果如其言吾嘗謂曽明於觀國而暗於自知夫以人臣處富貴之極不能為國謀計而日食萬錢善為子孫慮者果若是乎曽沒未幾而何氏無存者曽實禍之也自三代以降謀國之略皆何曽之所笑而大夫士之家抑又甚焉孝弟忠信以持其身誠恪祠祭以奉其祖明譜諜敘長幼親踈之分以睦其族纍世積德以求無獲罪于天修此則存廢此則亡此人之所識也而為家者鮮或行之當其志得意滿田園不患其不多而購之益力室廬不患其不完而拓之益廣至於子孫久逺之計所當慮者則棄而不省以為可委之於命而非人之所為嗟乎夫豈知禮義不修子孫不賢則吾所欲富貴之者適所以禍之也而豈足恃哉若吾鄉童君伯禮則不然君有明識特操而質性敦厚乎居恂恂以和而遇事善斷處兄弟義不忍析聚族而居諸弟承其志順其所為相與作祠堂以奉其先祖歲時以禮行事遇人有恩而於族人尤厚嘗以譜諜未修令子弟考質而為之且屬豫敘其首豫謂童君可謂知所先後矣家之為患常始於乖爭而乖忤之端在乎不知其本兄弟之於父其為本近也其情親而易感也至於孫之於祖則稍逺矣由孫而至於曽玄則愈逺矣而况由曽玄而至於十世至於無窮者乎使十世之後而相親如兄弟知有其本而不敢視之如路人非統之以祭祀而合之以譜圖安能使之然哉是知家之有廟族之有譜善為家者之所當先也而童君獨知而為之豈非賢乎雖然賢其身非難也使其子孫象其賢為難賢其子孫有道不違乎天天斯祐之矣天者非它也吾心之理也茲理也聖由是而聖賢由是而賢可以治身可以保家可以推而逹之天下童氏後人誠能守之而弗失處乎家則遺子孫以安出而居乎位則為天下建長久之業使童氏之宗赫然光於後世寧知不始於今乎豫與童君相好而其子姓多好學有文其姓氏之所自不待豫言而童君之美與其所當知者則不可不言也故為之言使知雖治一家亦不可無久逺之慮而童氏之盛蓋未艾也葛氏族譜序台之屬邑五其俗各殊地大物衆者則機辨輕捷而過於華僻在險隘者則椎魯儉固而近於陋寧邑居郡之東北與會稽四明相銜而為往來之衝有山溪竹木之美稻麥魚鹽之饒故其大家多優𥙿和雅喜學而好文其小民力業寡求鮮爭而罕訟其俗最為得文質之中然東西兩際巨海異時畨檣賈舶駢集競湊之所染習異俗人居其間或失其常惟縣之北鄉風氣奧密視諸邑為最善北鄉有聚落曰泉水山秀而川回土地沃衍岡阜綿亘有若環焉者葛氏世居之葛氏之先在宋𥘉自東陽仁壽鄉之葛嶺來遷當端平咸淳之際讀書取科第得官者數人然官止丞尉不大顯而諱午炎字南仲者篤志為善有惠及人厥後子孫日衆多蓄財積粟以給鄉閭之求者相望屋之榱角相交田之疆畝相錯延袤數里皆葛氏之族其地至於不能容則分而出居於外故其仕者厚重遜讓訥於言而敏於事其隱伏耕作者咸知自逺於法而保其家故其俗視縣為尤美今十五世矣諸孫之文者養心以為族既大而不復輯之則異日或至不相親也謀於諸父昆弟輯其枝派分别名字年壽卒葬之詳為書徴余為之序天下之俗不能自成由乎一國之俗國俗之所興由乎一鄉之俗鄉俗之所起由乎一族之俗茍非有君子長者出乎其類而表率之何以保其室家而昌其後哉豫嘗觀世之名族子孫相傳閲數百載而不墜者其祖必有盛德餘善以為之基而又能防範扶植以維持其變是以薰涵漸漬以成其風俗及俗之既成耳目之際皆足以化其心固能不奪于世故而有以守其遺業茍無德以培其本無法以貽於後人雖以天下之大而猶懼其弗能保而况於家族乎葛氏之先基以奕世之善而養心復為之譜以圖睦其族人此其為宗族計也不亦逺哉自茲而往將見俗益淳傳益盛非特若今而巳也豫亦有意於斯事每謂非譜無以收族人之心而睦族之法不出乎譜竊嘗折裏古道之宜于今者欲與族人行之德不敏而力不逮蓋久而未之試也養心昆弟多才而有志能不慨然於此乎審能因是譜而行古之道則古之俗復見於世則吾之族亦有所效矣蓋事或患於有志而勢不獲為或勢可以為而患於用非其道然則吾於葛氏譜也其能無所感也夫其能無所望也夫范氏族譜序為子孫以奉先祀亦難矣為常人之子孫非難而為名人之子孫難也為名人之子孫固難而為大賢之子孫尤難夫嚴蒸嘗守冡墓保上世之所傳以自立於閭里常人能是亦足矣而欲繼名人之門者豈止於斯而已乎行焉必端也言焉必信也學必有以過於人而才必有以用於世也求無愧於名人庶乎其可也而欲卓然立於大賢君子之後以求無忝焉則此何足以慰天下之望哉故言乎家世之可貴則莫尚乎為賢者之子孫言乎道德之難全亦莫難乎為聖賢之後也美才篤行之士子孫能世其家者未嘗絶而孔孟之胄千載無顯人非無顯人也祖德崇高難乎其為顯也蜀之范氏在宋盛時忠文公景仁以危言高節為海內所宗而正獻公淳夫以直道正學為元祐名臣正獻之子元長復能繼先業為建炎良史官聲猷之美後先相照可謂盛矣元長七世孫煥卿值元季之亂圖牒散亡重緝所知自忠文公高祖而下至于今凡十五世為家譜以示將來煥卿之子彥良從豫遊因以序為屬古之貴乎修譜者非特以著世次紀官位而誇于人也蓋將使後世觀之而考世德之淳疵明流澤之廣狹而益思所以自立云爾在忠文之時秉國柄以好惡榮辱當世士者莫如王安石吕惠卿在正獻時莫如章惇蔡京張商英林希之流此數人者方其志得氣盛視賢士大夫不啻其敵讐必欲擯廢竄殛之而後快由今觀之彼之禍心虐𦦨銷滅無遺而凶聲惡聞不可掩匿人至不忍言之於口而其遺胤亦未聞有存者縱或有之非惟人所惡見而為之子孫亦羞稱其世而不慊其為人范氏二三公雖不獲富貴於時或遭竄斥以死然至今尊仰師慕愈久而益隆而其後人猶能嗣詩書禮樂之傳久而弗變則夫人亦何樂為小人而不思為君子之歸哉范氏子孫觀乎譜而師先祖之善戒小人之惡則為君子也可兾矣夫有君子而無祿位族雖衰猶盛也祿位光榮而君子無聞焉族雖盛猶衰也煥卿年八十餘學行敦慎鄉人稱之而彥良亦好學有志所謂無忝於賢者之子孫其將在是乎徐氏譜序徐氏出於伯翳之裔偃王為江南著姓其在大末者為尤著大末支縣曰開化宋徽宗時名深始遷居之子孫雖不大顯而能世其善修其譜不廢國朝有天下其十五葉孫生以諸生入太學擢給事中乃以譜來徴序世之號徐姓者皆稱偃王為諸侯未嘗受命仁義修於躬而鄰國之君皆甘心北靣事之及見征於周天子遁去不敢較其民相率而從之者甚衆則其德之盛蓋有太王文王之風焉宜乎其後之昌而樂祖之也與偃王俱為諸侯者以千數今不能皆有後其名亦無若偃王之盛者以此知富貴而湮滅者何限惟為善乃足傳于後世偃王雖不王其遺厥後者大矣今吳越有楊氏皆大業之諸孫問其所宗則赧然諱稱之雖其譜亦諱而不書顔淵曾參未嘗有位天下之顔氏曾氏咸慕而祖之以誇於人又可見善不足者雖貴盛不容於子孫德義之士布衣以死猶為萬世所慕不特偃王為然也然則徐氏之祖偃王者其可不思勉哉君子澤垂後世者有時而既偃王去今三千餘年矣蓋不可恃也有志者居田里則率仁義以化其鄉守爵祿則率仁義以行其官如此則善為徐氏矣茍不能然而曰祖偃王其如偃王何哉吳氏宗譜序宋之遷于江南婺去國都為甚邇其地寬衍饒沃有中州之風故士之自北至者多於婺家焉于時婺之俗比他郡為最美為學者先道德而篤行誼尚廉潔而崇氣節修譜諜而謹名分暨宋之衰而至于失國老儒先生多感慨奮激深衣大冠處林壑甘貧賤而不肯少徇于世今百餘年矣余不及見其全而喜與士遊者樂其故俗而思其遺風庶幾乎得有若昔之君子者而事之也昔年見太史公于京師心樂焉以為不愧乎宋之士考其所為無不合者而恨世不能深知公之為人視其德行讀其文章而不知公非今世之士也學于公者多矣智足以知公者蓋衆求其內而不失士之行者其吳彥誠乎彥誠質厚而志篤有司嘗以其才應薦彥誠以親辭不可薦者閔其貧謀于縣人合數十緡贐之却不取卒辭于大臣以歸太史公致政家居以事獲譴就逮故人親厚者畏禍及多避匿散去獨彥誠左右公如平時及公事竣歸蜀彥誠又將告諸閭里知義者以周公余以是知彥誠過於恆人甚逺也士當無事時崇言侈論莫不重自許或詆之為恆人必怫然怒及臨財利遭變故能小異於恆人者寡矣此宋之士所以為難能余於太史公而益信彥誠之善學也彥誠它日修其家譜示余知其先在宋為儒家而彥誠欲豫序以告其族人余言不足為吳氏告也若鄉邦之故俗與彥誠志行之大端則後人所宜知也樓氏宗譜序先王之世井田之法行百姓知相拯恤一國猶一族一里猶一家况其同姓之人乎然猶恐其未至也復立大宗小宗之法以維持其心是以上下親睦風俗和厚歷世長久六七百年而不壞豈非治之得其道故耶自井田墮廢人各顧其家家各務其私至於兄弟且相攘奪况他人乎井田王制之大者吾末如之何可以稍見先王之遺意者惟譜系之法可為耳一鄉之中一姓之人少者數十家多者數百家其富貧貴賤強弱之不同至相懸也茍無譜以列之幾何富者之不侵貧貴者之不凌賤強者之不暴弱也乎得其人謹書之干譜取而閲之曰是雖賤與吾同宗也是雖貧與吾同祖也是雖弱亦吾祖之子孫也默而思之蓋恍然悲而惕然懼矣匪惟一鄉一姓者為然也同邑同郡之一姓皆然豈惟郡邑之一姓者為然一國之中其始徙必本於一人人能思之則雖相去千里可合為一宗視之如一家也奚有爭奪哉是法也先王之遺意存焉而廢也久矣親親之道息而風俗寖衰一鄉而同俗者且不思其本况郡國乎郡國之不可知而合者勢逺而無徴也勢吾亦莫如之何幸而可譜者惟同鄉者爾尚古之士間能為之則又往往循私而失實或謬制字名加於不可考之世或旁援貴顯之人加諸其譜之首而棄其所出之祖者衆矣是不亦愈失古之意哉烏傷樓希仁蓋知此矣樓在晉宋間嘗有顯者希仁皆不敢取信獨自十世祖以下書之几生仕卒葬之詳茍有聞者無不備載闕其所不知而信其所知也嗚呼是不亦有識而合於古者乎公侯將相之生夫寧有種在人之自修耳希仁第訓誘其族人自修而為善茍為善後世不患無顯者斯譜不患無傳也余竊有志於先王善俗致治之道而力未足以見之觀希仁之為而慊乎志故序其末簡抑亦有所感也夫丁氏復姓序吾邑丁先生譜其宗為圖以書言於豫曰吾之先本丁氏世為越之新昌人所居之地曰南州始遷之祖曰某傳十三世諸孫數十家其諱某者吾之曽大父也不幸少孤母夫人來歸寧海陳氏遂從而家焉陳氏因而子之歷吾祖吾父三世百年承陳氏祀雖知吾先之氏丁而不知其所由來新昌之族知吾祖以孤童適異邑而不知其所攸託蓋俱至於忽忘也久矣賴天之惠先祖之靈逮於吾躬獲遇宗人宜民於逆旅宜民丁氏之文者與豫語族姓書余告之故宜民驚喜出其譜稽余言皆信乃以其譜授余余奉以歸率昆弟子姓祗告祖考易神主為丁氏祀禮所得祀者如常儀然而陳氏子育吾先為恩甚太吾亦不敢遽忘而遺其祀俾承嗣之嫡祀奉之於禮其宜子尚為序其故以示後之人使自茲母重至於忽忘也余受書視圖為之歎曰先王治天下之具與世變滅盡矣所傳而不可盡變者獨姓氏為尚存然而自秦漢降或更於俗主之賜或以避仇而易或以避嫌而變或以委身他族而棄其族籍籍乎紛亂如禾黍稊稗之相雜使人莫究其本根所存者未必可考可考者未必可信安在其為弗變也哉當其初亂之時茍有稽古尊祖之士出而正之其變未至是極也因焉而不革冒焉而不去及其歲久地逺而益訛雖有欲正之者文獻殘缺亦終不敢果其是非此姓氏所以為難言也今也丁氏之為陳幸而地之相接為甚近世之相違為未逺先生有尊祖之美舊宗有可正之文宜其正之不難也雖然人之自異於同類者姓也斯外也命於人者也所由異於物者性也斯內也命於天者也外失之而不正不失其為人內失之而不察則與物幾矣故善尊祖者莫先於知其姓尤莫大於盡天之性丁氏祖齊丁公丁公之先尚父也尚父之訓曰敬勝怠者吉怠勝敬者滅義勝欲者從欲勝義者凶此盡性者所宜勉也丁氏之子孫其尚無忽忘也哉族譜序昔天地未分名曰混沌混沌以後名曰太乙太乙以後名曰太始太始以後名曰太𥘉太𥘉以後名曰開闢開闢之時始分天地清氣上而為天有日月星辰濁氣丁而為地有山川草木其氣清濁以成形結而為人禽獸萬物之象清氣結而升者為聖人濁氣混而下者為凡庶其類各有四大之形同稟五常之性性者情也有情則受命並受天地自然之氣結為男女則有夫妻既有夫妻則有父子既有父子則有兄弟則有朋友既有朋友則有爵祿則有諡號則有封邑既有封邑則有茅土既有茅土則有親踈則有宗族既有宗族則有譜序姓者生也共相生長宗者總也總統相連族者聚也非類不聚各相尊榮三皇已前無文無紀五帝已後典籍興焉莫不書其附䇿揚其德行典誥書其姓名顯其祿位序述千古所驗則明其世代者可序曰譜者普也普載祖宗逺近姓名諱字年號又云譜者布也敷布逺近百世之綱紀萬代之宗派源流序述姓名謂之譜系條録昏宦謂之籍狀天下書之謂之紀諸侯書之謂之史大夫書之謂之傳總而言之謂之譜譜者輔也遺亡者治而輔之故曰序得姓之根源記世數之逺近父昭子穆百代在於目前鄭玄曰譜之於家若網在綱綱張則萬目具譜定則萬枝在今恐一枝之上枯榮有異則強弱相凌一祖之後貴賤不同尊卑相濫今舉大綱以明衆目是以四海各流乃東出而西歸九河分趣雖道異而源同是以樹有凋榮之幹羽有長短之毛或短褐輕裘咸出公卿之胤佩玉負薪不廢連枝共葉詩云獨行踽踽豈無他人不如我同父父子相因不比他人之姓豈是百裔同居一祖千葉同生一株株強則葉盛根弱則幹微分之五世之謂族元祖是稱之為宗宗族同姓記之在此譜考光乎先世之蹤以示萬代之孫也胤者繩繩不絶之義可謂不忘親也雖然散在九州而蹤元無二分居百國而祖禰攸同但記之世數則尊卑可定必須忠孝於君親敬順於師長和睦於夫妻信義於朋友親睦於鄉閭恭勤志墓然後位進於公卿名揚於後世孔子曰從我於陳蔡者皆不及門也人之基業子孫根本不以無位門戶失次人善則門榮人惡則門賤所以敬二尊逺四惡敦五美修六藝九思十善弗忘於須臾故常積學藴心明以聽視先世之敘皆記於􅎍襟乃有孫不識祖字子不識父諱問其由序則默然書其家傳則閣筆如此之徒非紹隆後世之子也或曰富貴運所招何用先人之蔭聖人自生不由父母中人以上皆有承籍至如曲木直枝頑父哲子但取當時之用豈有禰祖之業而不記乎在心而睹之目者也蓋聞譜者姓名之經緯昭穆之綱紀導一宗之根源提九族之總統人倫根蒂君子貴之是以充者著之斯用之急也世數綿逺枝葉難分時運盛衰苗胤遼隔譜牒若存則依慿有據記注精顯則品類無差今古相承班序俱定次長幼之高卑纍官階之大小問源則不惑問世則不疑傳之記之以續後生無令斷絶勿有疑焉凡明十條例之于后一序得姓之根源二世族數之逺近三明爵祿之高卑四序官階之大小五標墳基之所在六遷妻妾之外氏七載適女之出處八彰忠孝之進士九揚道德之遁逸十表節義之鄉閭方氏譜序方氏出於榆岡之裔方雷比他姓為最先黃帝時有曰明在七聖之列其後有回為帝舜友歷二代方氏不顯至周宣王時叔為將伐叛有大勳烈詩人歌之然皆顯河洛間至西漢末曰紘者為司馬府長史河南尹會王莽篡國遂棄官徙江南居歙於是方氏始來江南紘生三子儕儲儼其後子孫甚衆大抵江南之方氏皆紘後而歙其宗邑也今歙山間猶多有方氏視廟云武昌之有方氏則自元巡檢漢祥始繇九江來遷漢祥之先本莆人而莆之方又本閩閩本泉州長史逹逹歙裔也漢祥之孫鼐以國子生仕于朝二轉為通政司參議輯其先之可知者為譜而徴余序嗚呼天下之姓多矣孰有若方氏之最先者乎以唐虞以前之氏子孫蔓延江南宜其大顯非他姓比然而今北方之人以方氏為鮮有之姓論姓氏者反不熟方氏何哉蓋姓貴乎後世子孫之賢彼李氏王氏鄭氏崔氏其先非必若方氏得姓之早也以其代有偉人出乎其間人習聞其功名之盛故皆灼然著人耳目方氏自叔以後雖未嘗衰絶特以無大顯名之人生乎其間故迄茲不甚著聞然則為人之子孫者烏可不勉哉使一宗之中得一人以顯其先自奮他宗之中亦必有慕效而起者慕者愈多而所勉者滋衆則顯于世垂于後者可得也方氏雖欲無傳于人不可掩矣如是而立於世上以昭前人之緒下以開後嗣之基豈非丈夫哉鼐有學問多材能善為其職朝廷咸稱之自茲以往使後世謂方氏顯于今者自鼐始武昌之方自鼐而著其將在斯乎溪上會飲詩序天子在位十有三年詔赦天下免今年田租議寬政數十事行之四海之民靡不舉手加額歡呼胥慶是秋禾大熟民愈恱懌中康外熙臻于治安七月庚戌前太史蘇公平仲自金華來舍于浦江黃氏翌日辛亥某往見又翌日壬子黃氏之長資善與客遊于舍北溪上張飲于西滸觴豆惟蠲疏蓏以時酒行不亟談説孔洽涼風徐來拂樹振衣雲容水態滌人心目賔主相樂甚某乃持觴屬資善曰君知所由樂乎資善曰惟嘉賔之辱臨獲周旋於尊爼之間敢不拜貺某曰君辭太謙雖然今日之樂某能言之六合之內吾閎闥黎首之民吾昆弟子姪使昆弟呻于庭子姪不安于室能獨樂乎曰不能盜伏于奧奴隸鬪于廡能獨樂乎曰不能然則獲享此樂者非謂天下晏安兆民各順其性而吾因得休于此乎斯果誰之賜乎資善拜曰天子之賜也公亦曰子之言是也某舉觴壽公曰公嘗編摩禁林頌聖治道民和公職也公其可無辭公曰子言誠然某退為詩三百三十言以進公和之已而某又和之而增至五百言請公申之俾能詩者繼之而俾黃氏藏之黃氏之從遊者曰仲昭曰容香巖溪亭夜集聯句序去浦江鄭氏之西三里其溪曰香巖有室翼然臨乎其上者鄭氏之溪亭也鄭氏之秀而文者曰叔度愛其曠逺邃清即而讀書焉今年秋八月甲子余自羅山抵叔度時雨新霽水循石行注于溪潭遊魚相追逐可玩余立視久之叔度聞余至出迎余曰美哉水獨有而樂之何不兼也叔度笑曰子欲樂則樂之吾豈子禁耶然觀於水而樂水之美未若不觀乎水而樂之為美也余未逹叔度揖坐亭之次室坐始定聞疾聲砯訇若風雨驟至余駭且顧出戶視之日色杲如也益異之叔度曰此非昔之所觀者耶觀之樂在乎目所樂者淺休乎斯危坐而聽目忘乎視口忘乎味四肢忘其所宜為而耳亦忘其為聽也孰知此聲之非天籟乎孰知吾之非天民乎而子何惑乎余曰子可謂善取物矣况夫會萬物之全而兼取之者乎叔度曰然乃共飲飲已暮色蒼然叔度之季叔鄂歌蘇子瞻赤壁賦余益為之喜叔度曰子瞻死三百年世豈復有斯人耶余曰聖人固不可數見孰謂天下果無子瞻乎於是大笑樂甚叔鄂請聯句余吟首三句叔度喜繼之燭至叔鄂又繼之遂迭次不絶書遇句稍工輒撫掌夜愈深溪聲愈厲以為雨真至也以手承簷霤無滴水乃知非雨更一燭詩成凡八百言書授叔度填諸溪亭使人知余之會平斯者有以樂乎斯也梅隱詩序君子不可以忘世亦不可以徇世宜乎道適乎時不失其正斯可矣有忘世之心其過至於太高而無用志存乎徇世其過流於鄙陋而無耻聖賢所以異於衆人以其才足以養民仁足以遂物之性而智足以行之耳有其具而無用世之心是謂之狷負其器不察其時之可否是謂之瞽二者皆非也而狷為愈以其自視者重而視外物也輕故有天下者命之曰隱逸而旌别崇異之後世之士樂其名之可喜而利其物之易售也不察巳之有無每以隱自名􅎖其文辭藝能而奔走乎市朝呌號乎有力者以取祿位及其既得則陽辭詭遜以為高在位者不知也信其然又從而以隱命之於是天下無隱士非無隱士也隱者不求知於世而載乎人之耳目者不足謂之隱也彼誠有得於心視外物如蚊翼蠅喙方以及其身為纍安肯以是役其心哉近世之以隱稱者皆古狷士之所棄者也吾嘗喜交海內賢俊欲因以致樂隱好遁者而友之求之甚久而所遇不能逮古之所聞意者世固有寓迹衆人之中而不可窺其際者乎故余於恆人未嘗敢忽之浦陽鄭君仲載為余稱會稽劉君伯時慕隱而雅好梅環其舍植之而處乎其間人號之曰梅隱而劉君異時嘗仕矣其迹不數數乎隱也余以是異之會稽自昔多隱者梅子真一世竒士至變姓名為吳市門卒不識子真者未必不卒徒視之也謂子真非隱者可乎事有迹甚類而心不同有不求甚似而趣不逺者然則焉知劉君非隱者亦焉知其果隱者也此惟劉君知之吾不足識之而謂劉君好梅與慕子真蓋皆未可知也夫不期乎當世之知而心獨追古人而友之非君子其能然乎劉君審知此則吾不謂天下無隱者也迎養詩序人心果足以動天乎疾痛而呼憂患而祈藐焉而不畣者固多矣茍謂果不可感也則誠臣孝子心之所願天必應之如影響者世多有之是則謂天不可動者非也謂皆可以感而致者亦非也惟事由乎天倫之正而立志堅確者所望必有成而出乎私情淺慮者不能也世之人以不足動天之事而妄意其報及乎弗畣則謂天為幽逺而難徴是豈知天者哉若今吏部侍郎東萊侯公景中之於父可謂能獲乎天矣公生七年而父坐纍謫閩稍長而毋氏告以故輒悲痛自誓願為學立身以贖父入膠水縣庠為弟子員劬書攻文晝夜靡懈年二十以高等入太學後二年甲子遂登上第擢給事中以忠慎為上所寵任而念父之心未嘗少忘因乘間扣頭自陳請納官代父辭甚哀切上聞而憫之詔還其父皇太子復承詔俾乘傳躬至閩迎以歸公馳詣謫所見父述詔旨父子相抱涕泣向闕拜舞以為更生乃俱至闕下謝恩上嘉其純孝眷待日益隆遂纍除至今官薦紳士觀其事莫不竊嘆皇上待下之仁喜公孝思之有成相與為歌詩以美之而友人鄭公禮為屬官天曹以書屬豫敘天下之事其初可以力至者人之所能與也非人之所可必者非天莫能與於斯也夫學以淑其身固人之所可為至於學成而仕仕而列乎朝為近臣為貴臣而為聖主所知受知之深而不遺其願此豈人之所可必哉上不遺其願矣使父或有疾疢則何以償人子之志今也父子相離十有五年而一旦高車駟馬迎於瘴癘之鄉而歸致其養非夫誠心之至而天有以相之何能及是哉雖然天道恆與人事相符當海內未定時子之不得養父者衆矣孝思雖切孰從而應之今公幸際太平之時上方以孝為治而用賢恤下重違人子之情是以素願獲伸而無憾雖天有以相之自非聖明在位莫能臻此榮遇也然則公可不思所以為報乎夫孝為萬善之原移事親之心以事君則忠莫大焉推愛親之心以及人則仁莫厚焉公以盛年處要任當竭誠以輔國家澤天下俾後世不特稱公為孝子而為忠臣則長見天道之佑其盛於今者非止一時之光寵而巳也蓋人恆患乎無志有志而不怠則所為無不成豫雖不獲識公之為人然觀其孝親而知其有志於忠君之業也故樂稱其事而以大者望之鄭氏春夜賞花詩後序有園池者則有花有花而得賞者難也有酒與殽間暇則可以賞賞而能詩以記之者難也讀書之家或能文其多至於若干篇者又難也賔客衆而製作多者有之皆出一姓之人若鄭氏者又難也族屬衆者或可及一姓而一家者鄭氏而已鄭氏之家以儉素相承雖有花他時未嘗賞而今也為太史公之歸而特設筵以樂之又可尚也太史公致政而歸未嘗出遊而為鄭氏出又難得也公之文不輕以與人而序鄭氏之詩又難得也公序人之詩亦有矣恐或至於流連而亟以太康為規其愛鄭氏之深又難得也夫天下之物不可以數計其難得者人必寶而傳之是詩也其有不傳者乎義門詩序孟子言仁言不如仁聲之入人深也先王導民之具詳矣政教以約之禮樂以正之刑罰以威之猶以為未足而復宣之以言入之以聲言載於書聲感於耳斯民之視聽莫不有所勸戒寧有不善者乎秦漢以來治道湮熄先王之澤不可復見所存者獨詩為粗完傳於學者孟子所謂仁聲詩蓋為近之然其言雖存而不易入人誦説者且不解其意况於聞之者哉蓋世逺而事異旨微而理密人不為之感者固宜也後世之詩出於一時之言殆若可以感人矣而病於道德不足而辭采有餘故雖可以感人而不能使人知性情之正夫人莫不有仁讓敬義之心也恆患不能言之以其心之所同然者入其耳戾者化悍者革悔者至於涕泣自訟喜者至於拊手蹈足此仁聲之所以為深者乎惜夫其不見於世也久矣豫於浦陽王氏得士大夫所為義門之詩而讀之喟然為之歎息然後知仁聲未嘗盡亡也王氏纍數世千指合食不以親踈少異其行信有足稱者詩之所言雖辭有不同者而其旨必歸於孝悌禮讓慈愛敦睦懇懇然有閔俗思古之意使治天下者不用仁聲化民則巳茍有用者舍是詩將奚取哉天下之不治多始於民不親睦涵斯民於教化之中使之勇於為善而怯於為暴者豈條法約束顯示而明禁之亦惟濡滌其耳目昭融其心志俾自得之耳夫不能使民自得而欲以淺陋之術制之其幸致於安治者鮮哉今天子方興三代之政必以詩道化民將見王氏之詩采於史官而用孝邦國然則此詩也非王氏之詩乃治世之音也非為一時之觀美實後世之所法者也王氏深溪集後僥幸可以致富貴而不可以得一善之名富貴可以豫奪人而不可以得君子之譽天下公言甚可畏也趙孟之門寒者能使之溫餒者能使之飽徒者能使之車馬而行然欲使一人稱其義終不可得顔回原憲皆畸窮困厄之士食無稻而居無廬其勢不足以詒談者之口而稱仁義者必推而歸之人心之公不可以勢利奪也尚矣士之致乎美名者舍仁義何以哉一鄉之所豫一國不豫之一國之所豫天下不豫之而能名乎世者未之見也鄉之人曰然國之人和之國之人曰然天下之人和之天下皆曰然而不得當世君子稱之茍名矣而能傳乎世者未之見也故名發諸身揚於衆人而傳於君子豈不較然矣乎婺之浦江在宋中世有鄭綺者以義聞當時而教其子孫不異㸑歷元逮今凡十世如其𥘉鄉人稱之浙水之東又稱之既而天下又稱之名賢巨儒遂發於文辭以咏歌之鄭氏嘗集為書即所居之地名曰麟溪集以傳由是鄭氏之義聞海內鄭氏之里深溪有王氏諱澄者嘗慕鄭氏名教其子孫取以為法子孫承其志今越五世亦不少變鄉人遂亦稱之士君子亦從而贊美之王氏乃亦輯而為書即其所居之地名之曰深溪集將刻以示來世嗚呼王氏可謂知所慕而善於致名矣世之君子其學術殊其智識亦殊其居之逺近又殊至於稱王氏之義門如出一口然誠非有其實而衆譽之能若是乎天地之間自斯民之生其為人亦衆矣然至今相傳而不泯者其名可得而數又何其少乎蓋惟豪傑之士能傳而湮沒無聞者多故也夫人之生莫不自雄於一世及其死也至與草木同為澌盡豈不誠惑乎故士論富貴貧賤惟善足以不杇仁義之心人孰無之讀斯集者非惟王氏後人當思自勵有人心者皆知所以鑒矣御賜廣揚衛方指揮明謙五花名馬詩序天之量不可得而測也觀乎晝夜之降升則可窺其度日月之形不可得而識也視乎光華之所𬒳則可知其明聖人之盛德其高深博大茫乎不可以私智揣度也茍非因其慶賞政令以求其志意之所屬何由而測識其盛哉自昔為治者戰伐之世多輕文吏安平之時多踈武臣是雖勢使之然而理有不宜然者今天子以神武定四海當攻取之初文武兩用各盡其材於封疆介胄之臣宏謨偉烈拔乎千載之上者待以恩禮未嘗少忘洪武十八年秋九月廣揚衛指揮臣方某有宿衛勞出內廄五花馬賜之在廷羣臣咸咨嗟感激或發乎味歌宣侈上恩以為方氏光榮是歲廣揚季弟以事還台謂人言曰吾昆弟無分寸功上以先人之故官之祿之置之左右比諸心膂舊臣天地之德念無以報而今重有此賜顧吾兄弟其何以堪乃傳言山中俾某為之序其事以示子孫于無窮某於廣掦雖未之識然以聖天子寵錫之隆而推之其致此者蓋必有道矣古之賢將治身之道雖非一端然在內而使人君親之以為安在外而使國家倚之以為重至於後昆而承其遺澤而與國同休戚者自非忠誠神武可以格乎天人其曷能臻此哉某昔於京師聞人言廣掦敦碩畏慎而其季子好學有文繼今益目奮勵殫厥心力處輦轂之下則思盡忠守疆宇于外則思愛民以承祿位于悠久方氏之澤其有艾乎在易之晉曰康侯用錫馬蕃庶寵錫之來蓋未艾也魯人美魯侯之詩曰思無疆斯馬斯臧廣掦昆弟其尚深思國恩之隆厚載掦天子之寵命哉衛氏紫薇詩序人果靈於卉木乎筮而聽乎蓍紀日而視乎蓂靡草之死菊之有華曆象候時者以為凖三秀之莖連理之植論治亂者取徴焉則卉木未嘗不靈於人也謂卉木果靈於人乎贊天地之化遂萬物之生者惟人為能然而卉木不與然則謂之不靈於人不可謂之果靈於人亦不可蓋人茍能盡其性則將與天地比德何卉木之不如茍蔽於私而溺於欲戕其性而􅍝迷其天誠有不若卉木之足信者矣以周公之聖管蔡至親而禾乃為之異畞同頴管蔡雖人也而不知周公之可尊禾雖微物而能彰周公之德焉可謂人果靈於物乎哉是知人誘於利欲故往往失其性無知無欲之物其受乎天者不與世俗變遷其能兆氣化之衰盛而發祥禎以示人也固宜新安衛氏為三秦令族異時嘗有顯者正堂之隂植紫薇焉元季之亂百口逃難他所室廬草樹蕩為灰燼者垂三十年及國朝平定海內衛氏之秀曰希古者始求故基而築室以居越明年紫薇復萌今二十年矣華幹之盛無讓承平時人咸謂衛氏舊族也其先蓋有厚德中衰而重興其將復盛乎觀於紫薇蓋兆之矣聞者多為詩以述其異夫卉木與人殊形而異類自常情言之邈乎其不相與也然而災祥之至多有徴焉者蓋人與物同乎一理與氣耳家之將昌氣之鍾也必盛人得之而為才賢其在物也為嘉卉為竒葩榮茂必異於常及其將衰也反是衛氏之家由一木而占之粹美之氣鍾之者厚矣將見高才異能之士出而為斯世之瑞文太平之休以光耀於無窮豈特見於卉蘖之微哉蓋人於盛衰之兆多因物以見而物之禛祥非託諸人則不能以傳今希古以文學鳴于關中而其子孫多有才而嗜學使紫薇而果有知殆必自賀其遭遇也夫豐湖書室序某𥘉侍先君守濟寧獲拜參政何公於山東行省公當天下未靖時舉南粵數州之籍來獻天子弗勞干戈全其富庶乃嘉寵公錫以璽書授之大藩公有德有威施政發令風行霆斷莫敢犯而所為皆本於寬厚尤好儒術平居讀書綴文無虛時某獲侍几杖者數月公每稱其子奉先之嗜學固巳知公之必有後而聞奉先之賢及某居先君之喪畢來京師公亦以老致政居國門南之私第又往拜焉而奉先適自粵來省公命相與論辨往昔治亂之理奉先劇談歷數如江出巫峽而東馳壯馬脫銜而驟於曠野也如髮𥘉櫛而承之以手繭瀹盆而鼓之其緒雖多而不紊也恢乎如鋸斷木秩乎如繩貫珠而連之也某益大駭知奉先之果賢不可及意其為學之功必有過人者已而奉先來言居粵時嘗即惠州豐湖之濵為書室日講學其中士大夫多為詩稱其善詩已聯為巨卷子為我序之某於是又知奉先過人者在是也生乎富貴而好禮聖人以為難彼在周之時去文武之化未逺猶若是况今違聖人二千載惠距聖人之居六七千里而奉先不惟好禮又能浸灌乎問學沈酣乎仁義出言制行鬱然儒者豈易得哉是可見參政公之教行於家善格於天使然非世之徒富貴者比可歌也昔麟趾之詩稱公子之美聖人取而著于周南以彰周公之德今天子方法成周之治歌詩之作洋溢宇內他日采詩者得豐湖之詩必將序之曰此何公之化也則奉先之賢可以不杇垂千載而豈徒一時為觀美而巳哉雷峯樵叟序并贊雷峯樵叟者台之寧海人也世居雷峯之下業詩書敦禮讓代不乏人至叟尤為鄉邦所敬式叟淳龎邃密事父母克盡子職處兄弟和以敬由是孝友之行聞于遐邇然不妄交接遇佻憸之徒恆趨避焉或以勢雄之故強與之善叟終不屈遇縉紳之士延至于家相與論古今人物賢否稽疑質惑雖至浹旬洽月無怠容鄉閭有忿爭不辨縣吏相與詣門質諸叟叟喻以一言咸恱服而去雅愛讀書自少至老不倦課子弟耕讀有恆度風晨月夕聞絃誦聲則喜間聞嬉笑俚語則終日不樂性頗嗜遊觀值春和景明樹林蓊蔚鳥聲嘲􅑜煙靄間即幅巾杖屨徜徉於山巔水澨與樵童牧兒伍心無厭焉因以樵叟自號或問之曰夫駕舟楫操網罟出沒于波濤者雖不自謂之漁人固以漁目之手耒耜腰鐮銍往來于畎畝者雖不自謂之農人固以農目之今叟居必冠裳行必杖屨所業必詩書無運斤砟斧之勤無拾枯束濕之勞而顧以樵自目其如名實之爽何叟曰若奚言之固也豫惡夫世之人不修其實擇美名而居之手未能操簡牘心未能頌章句輒軒然以儒者自居法律之莫諳爵號之莫曉輒岸然以古之良臣自處曰長者曰先生曰皋曰夔巳處之而不愧人呼之而不異及察其所存豈有毫髮誠身之善及物之功乎豫病之者蓋久固不敢尤而效之特取其薄而易為者自號亦欲矯里閈之弊反浮風而歸之淳耳且豫雖不躬樵者之事而能得樵者之樂白雲溶溶彌布崖谷隴樹排青林溪漲緑出入煙霞友于麋鹿而了不知塵世之榮辱若夫山林搖落潭澗澄清霜呈錦樹壑殷秋聲􅒂然長嘯谷應山鳴而杳不知寒暑之變更推此而言四時之樂寧有既乎彼樵者習其事恐未能知其樂豫雖不躬其事而彼之樂豫能全而有之庸以自目孰云不稱若奚言之固耶或以叟言告同里某某聞之俯而思仰而悟撫掌而嘆爰為作贊叟姓徐名山南字廷嶽贊曰詩禮奕燁族之右兮躬修孝友德之茂兮娛心竹素學殖之富首外防蟊賊佻薄不許為友兮內存孝謹子姓咸歸子厚兮雅愛山水斯樵叟之自號兮閔俗之浮咸遺實而取名兮慨末流之泛溢欲泝源而反舊兮攬煙霞之勝槩纍於我乎何有兮較厥德於懷氏之民尚奚先而奚後兮望雲詩序君子有以一言傳世者非以其言也以其事也非以其事也以其德也戰國之士以辨説稱晉宋之士以清談著古之能言者亦衆矣其言或存於世而世不之貴或聞於人而人不之傳豈其言之不美哉事不關於倫理而德不足為重輕人之不取之也固宜昔狄文德公嘗登太行見白雲孤飛而念其親今數百年矣人子之行役于外而思親者舍白雲無所為言或繪而為圖或發諸詠歌嗟乎當文惠公之出斯言也以抒其一時愛親之情耳夫孰知其卒傳于世而不廢哉蓋其德修于身事功立于天下而洽于生民人思其德而不能忘則并其微言細行咸識而傳之以為口實固非特以其一言之善也如以其言則人子之思親覩一物則感慕之心生孰不能為是言哉衆人不傳而文惠公之事獨見取於後世非有以也夫今世之士知取公之言而不知公言之所以見取於人謂之愛親則可謂之能孝則未也若文登孫惟大者其有志於事親者與惟大年二十餘辭二親肄業于太學久弗獲歸省今年抵命來台之寧海去其鄉數千里寧海地際巨海而登亦海邦也惟大覩飛雲往來海上因感文惠公之言而嘆曰倐南兮忽北雲之飛兮自我親側奉王事兮獨違子職􆈷見親兮不得因悵然泣下縉紳之士聞而悲之多為之賦詩古今之人同是情也天之降衷同是理也惟大之歎與文惠公之言何以異乎然文惠公之孝不在乎言而在乎德不在乎朝夕定省之微而在乎正國家匡社稷忠其君以利天下以豫觀乎惟大持已廉臨事審其志甚美此可以為孝親矣由是而充焉以之治民則盡乎仁以之事君則盡乎敬斂之為德施之為功安所往而非孝子之事哉故平居而飲食甘旨不去親側可以為善養而不足謂之卓行疾病而刲股刺血可以為難能而不足謂之逹孝致其身為聖賢君子而以令名貽其親此豈非孝之至者乎惟大學周公孔子之道而有志於古人豫不敢以衆人望之也孰謂惟大而不以君子自望哉德為君子而言為後世法此文惠公所以為孝也惟大有取於其言其必知所擇也夫其尚知所勉也夫張氏思親圖詩序古之為治者以誠御下而不預防其私其才略之任也拔於閭巷之間而俾治其郡邑不使其有逆情拂意之歎故仕者內得以養其親而外可以盡其職後世則不然任人不問其地之所宜心之所願必置諸數千里之外以為不若是則恐其顧私而廢法嗟乎使吾所用之人不賢邪雖易地而處之不能絶其私也使得賢者而用之彼視其妻子且不肯循私恩以違道况其州里之人乎不慎擇於未用之先而曲為之禁是以仕有去鄉之憂有不能養親之憾而國亦不獲得才之益如是者蓋千餘歲矣自三代以來聖人所立之制世主除革毀棄者相屬獨於此則守之以為宜然此余於張君文思不能無所感也張君世家河南之蘭陽其父母皆老矣而君猶為倉庫之官於東南逺郡欲迎以養則勢有不能欲請而歸則法有不可每言於人則悲歎不巴或為圖其鄉閭景物之槩日觀省之以自慰能言者多發為詠歌以寫其憂思人子之於親朝夕養於其側者職也出而仕於世壓於法而不獲終其養者亦職也養且仕焉兼盡其職而無憾者古之事也而張君今之人也古與今判也久矣張君之於親欲無思得乎雖然古之君子蓋有言矣口體之養不若心志之養也身之不逺不若名譽不亡之美也使親日與俱而道術無聞於世名聲不昭於後以為善養則可矣而於孝乎何取誠能不卑其官敬慎其身俾職益修吾之位隨以大人稱其事以貽父母光榮則於孝也得矣吾聞張氏異時嘗有顯人而張君敦厚能承其業父母之望其身有非特朝夕之養也信能以孝之大者自勉則雖不獲終養於家豈足憾哉趙彥殊字序孟子謂伯夷隘柳下惠不恭其離乎大中一也然求其近似者與其不恭也寧隘乎君子之處世不徇物以為同不詭俗以為異辟諸飲食裘葛適乎宜不違乎道而巳一乎同其弊必至於枉巳一乎異其弊必至於駭世不期於同異而無詭徇之失者其惟君子乎天下皆趨於利吾獨志平義天下皆趨於邪吾獨志乎正非吾求異於當時也將同乎古固不得茍同乎今也賢者吾同之不賢者吾異之非吾求異於人也務道之同固不得無少異也同於不可不同而異於不可不異皆順於道而無所容心焉則人以為宜然而莫敢以為非矣易曰君子以同而異其謂是耶浦江趙生其名曰坰或字之曰彥志其父謂未足以盡其義也請更之豫更之曰殊而謂之曰今世之所少者非同也其患在乎茍同而不知異茍同而不知異者流於迎合而多詐愚者陷於阿曲而近鄙欲世之大治安可得哉生之質可謂美矣而又飾之以文翼之以禮豈將同於當世云乎哉必亦務古之同而不同乎俗務道之同而不恤人之好惡斯可也漢之時若汲長孺可謂異俗之士矣若胡伯始可謂同世之士矣伯始近於惠長孺近於夷伯始不若長孺之近於道也生學古嗜道方以大中為歸夷與惠安足效哉同於所當同而不茍同異於所當異而不茍異生之所宜為也執其一而不合乎道者非君子之事也鄭生允充字序余友浦江鄭君叔寬之子耀年十六受學於余能記經傳數十萬言而約知其説鄭君請冠而字之余取孟子充實光輝之意字之曰允充為辭以祝之矣鄭君復為之請曰子常愛是子也以為可教教之於始冠將望以成人之事子其何以命之余曰人之具耳目口鼻四肢全而百骸順者形之成也冠帶衣裳佩玉而曵履望之儼然有儀而可愛者服之成也是皆可以為人矣而古之君子不是之重者豈不以其德乎故孝友足以宜乎家忠信足以合乎鄉可以為人矣而未成也智足以燭乎理才足以建乎事可以為人矣而未成也必也窮天下之理有諸巳而誠兼仁智之道而不滯於一偏全文武之器而用舍各以其時逹以功傳隱以義著者其惟成人乎而非學何能至是哉由孟子之言而求於古人之中若高柴原憲願潔慤廉見之者服而聞之者慕可謂善人矣而有諸巳者未至也􅃮雕開之篤於信道子路之勇於改過可謂信人矣而充實則未及也曽子子夏可以為充實矣而未至於光輝德全于中而形于外政教可以善俗而文章言語可以化民者其惟孟子乎孟子之德優為大人其未逹乎聖者未化也使孟子而化則與孔子何異學必至於孟子而後為成人則人豈易成乎哉三代以下才智藝能不愧乎古者甚衆而成人未之數見蓋道之難知也久矣今余望生以聖賢之事其可不致思乎夫以恆人而欲以聖賢較功潔德人固疑其莫之稱也然為人而不以聖賢自望賤其身孰甚焉教人而不以聖賢望人誣其人孰大焉鄭氏世家也持身範家之法人以為得三代之意則余以聖賢望生者非敢誣乎人也孰謂生之好學而忍自賤其身乎洪武十五年春正月既望撰黃仲儀仲顔字序眉山蘇先生字浦江黃君憲曰仲儀為辭以祝之其説既大矣而復請於豫豫固以不佞辭仲儀女兄之夫鄭君叔度力為言且曰先生之先文忠公嘗字張恕曰忠甫厚之是固有一人二字者矣子重字而申言之不亦可乎余重字之曰仲顔而告之曰子嘗見射者乎虎熊豹犴之侯陳于前射者之志各有所存焉志之所存目存之手存之身之為勢又存之其志在乎豹去乎豹者鮮矣必不中乎犴也志存乎虎去乎虎者鮮矣必不中乎熊之側也茫茫然無所定志極乎高逺而射之則終於不中而巳矣聖賢之為學亦然古人之善雖無所不學而取法於古人則各有志焉周公舍武王而師文王孟子舍曽子子思而學孔子言之所則者文王孔子也行之所效者文王孔子也日之所習夕之所思者舍文王孔子無所用其心故周公之道與文王類而孟子謂豫為聖人之徒使一聖一賢不各師所可師而泛焉慕乎古之聖人其志雖高而於成功也難矣今之學者其質非皆不若古人也其不足為聖賢之徒者知好古而不能取法也漢之處士有黃憲者人稱之為顔子而言論行事無傳焉仲儀之姓名其尚與之同乎抑亦慕之而將法之乎憲之德量渾融不可得而澄撓近乎顔子犯而不較處衰世而不欲仕近乎顔子之舍之則藏然顔子之所至非憲所及也憲質美而未聞道蓋所謂善人歟其視顔子猶曽子子思之視孔子也吾不欲仲儀學之也仲儀茍欲慕憲其學顔子乎學顔子而未及猶足以為憲學憲而不得非惟不及顔子且并憲而失之先生謂仲儀云者欲其法古人之善也余重以仲顔云者欲其師顔子也思前之所字以博取乎聖賢之道思後之所字勉而取中於顔子焉此先生與余言也好古而不知所歸茍師乎憲而自畫非所謂仲儀仲顔也臨海縣知縣黃誥黃巖縣知縣張師善台州府儒學教授尚芳訓導李深黃巖縣儒學教諭文程府學生陳縝葉琰王梅齡臨海縣儒學生李臨卿戴濬之黃巖縣儒學生孫思光牟汝鈞校對
