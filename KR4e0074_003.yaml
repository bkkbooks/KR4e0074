front:
  text: 遜志齋集卷之三
  hash: sha256:65d13f7064a91db0e6c17ffdb7aa1b697c141e6e49c59d2c55a474bff700ae87
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4e0074_SBCK_003-1a}
body:
  text: 中順大夫浙江按察司副使奉敕提督學校雲間范惟一編輯奉政大夫浙江按察司僉事奉敕整飭兵備南昌唐堯臣校訂中順大夫浙江台州府知府事前刑部郎中東吳王可大校刋雜著君學上人君不患乎無才而患恃其才以自用不患乎不學而患挾其學以驕人邈乎無為淡乎無謀以任天下之才智而不與之爭能則功之出於人者猶出於巳也持其偏長小數以與臣下較銖兩之優劣使才智之士不獲盡其所欲為是曷若不學之為愈乎漢高帝椎朴質厚於學無所知然其聽言任人與知道者無異陳叔寶楊廣好自矜伐以為群臣莫巳出而其所以自負者適足以取敗蓋聖賢之學不傳人君既不知為學之道而復不能用其學譬之兊戈埀矢王者用之可以伐僣亂而狂夫得之或以濟其惡而為盜豈戈與矢之不善哉挾莫邪之器而不能用未有不為大禍者也況彼之所得皆聖人之所棄者而恃之以驕人則適可疑當作足以害其身而巳學至于近世離而為四言性命者得其本其失也過高道政事者得其用其失也過雜文辭之習華而鮮實制度之辨勞而少功人君欲如學士儒生兼窮而並索之豈惟勢有所不能而亦安暇事于此古之聖王為學之道雖殊然其大要不過敬天仁民别賢否明是非數者而巳而必皆以正心為本正一心以對天下智者為之謀仁者為之守勇者為之戰而藝能才美之士咸以其術自奮何患有所不知哉學之不正而欲徒務乎學以之治身且不可而況天下乎君學下將欲應天下之變而計謀規法不素備於吾心一旦事變雜陳乎耳目之間其不至於瞀惑迷亂者鮮矣故人君不可不學也人君之學莫大於治心立政而治心之術有五持敬以弭安肆之萌寡欲以遏侈縱之漸養慈愛之端以充其仁伐驕泰之氣以固其守擇賢士自輔以間其邪五者立然後可以為政而為政之方有八明而不至乎苛寬而不流於縱嚴而不迫於刻仁而不溺於無斷智而不入於詐妄納諌而能委任無逸而能不變此為政之本也而未及乎政然能是八者則政可以舉而措之矣存之無形索之無方而其動無常者心也聖王之為學必先治於心如操六轡以御悍馬奉盤水而行乎堂階之上惟其顛逸而不可制傾覆而不可收自旦以至夕自起居飲食以至決大事處大變自壯以至老兢兢然不敢少肆故雖在位數十年而政教行乎天下者如一日國有百歲之儲積而宫室服御奉其身者無加遐荒逺邑無飢寒之民而憂勞之意不敢怠有學以治其心是以恆見其不足茍自不足則於治也何有哉後世人主不知學以其天資之所近者為治好仁則姑息而無斷任察則苛細而少恩廢疑當作嚴或近於殘寬或至於弛好謀多蔽於輕信推誠每失於小人或始於恭儉而敗於驕泰或初志甚鋭而旋致縱怠漢之文景武宣唐之明皇憲宗其才非不美也而不足以庶幾先王之治者豈非不能充之以學故哉人惟知不足然後久而不變持其所長自以為能居億兆之上處尊榮之勢內不能學外不能親疑誤此人君之不幸也君量智周乎萬物才高乎衆人者可以取天下而不可以守天下仁足以施法政義足以洽乎民心者可以守天下而未能使天下恱而不忘善為智者蓋有不用智而無不明不以才自名者無所不成德洽令孚而人莫能忘其仁義其惟量足以容天下者能之乎洪河大江奔注萬里勢之所遇聲之所嗄洶洶乎其可畏及趍於海泊然而行悠然而逝渙漫浩渺不復少肆者以其量素足以容之也天下大物也其動也無端其變也無恆自非量可以容之者孰能有之人能辭萬鍾之祿而或色喜于一金能虜三軍之帥而或呻吟於一指其出於計度而後為者未足見人之量惟其猝然遇之視之而不驚此非有量不能也古之聖王叢之以極繁至擾之事而處之若無投之以深憂厚懼之變而應之不勞恩及乎黎庶功高乎往古而不少見於辭色豈強而為此哉其所操持者大所􅉼畜者逺事物不得亂其中也堯視黎民時雍不異於洪水滔天之時舜居乎法宫而朝萬國與陶漁于河澤之際無異禹舉天下於魚鱉之波而使食息於平土而不與焉蓋於其功德之盛未足見聖人之大於處盛美而不居然後可見其量也後王之於古若視日月不能幾之者豈皆其智之不能質之不逮乎速盈而易驕可以利害動而不能用天才知才智自見于世者庶官百職之所為無所用其才智而才智之士咸為之用非聖人其孰能之君職能均天下之謂君臣覆兆民之謂君立政教作禮樂使善惡各得其所之謂君生民之初固未嘗有君也衆聚而欲滋情熾而爭起不能自決於是乎有才智者出而君長之世變愈下而事愈繁以為天下之廣非一人所能獨治也於是置為爵秩使之執貴賤之柄制為賞罰使之操榮辱修短之權位乎海內之人之上其居處服御無以大異於人不可也於是大其居室彰其輿服極天地之嘉美珍竒以奉之而使之盡心於民事故天之立君所以為民非使其民奉乎君也然而勢不免粟米布帛以給之者以為將仰之平其曲直除所患苦濟所不足而教所不能不可不致夫尊榮恭順之禮此民之情然非天之意也天之意以為位乎民上者當養斯民德高衆人者當輔衆人之不至固其職宜然耳奚可以為功哉後世人君知民之職在乎奉上而不知君之職在乎養民是以求於民者致其詳而盡於巳者卒怠而不修賦稅之不時力役之不共則誅責必加焉政教之不舉禮樂之不修弱強貧富之不得其所則若罔聞知嗚呼其亦不思其職甚矣夫天之立君者何也亦以不能自安其生而明其性故使君治之也民之奉乎君者何也亦以不能自治與自明而有資乎君也如使立君而無益於民則於君也何取哉自公卿大夫至於百執事莫不有職而不能修其職小則削大則誅君之職重於公卿大夫百執事逺矣怠而不自修又從侵亂之雖誅削之典莫之加其曷不畏乎天邪受命于天者君也受命于君者臣也臣不供其職則君以為不臣君不修其職天其謂之何其以為宜然而祐之耶抑將怒而殛絶之耶奚為而弗思也天與人其形雖殊其好惡去就不甚相逺也使君命一人焉而治民而困踣之厲虐之其有不怒者乎怒而能全其祿位乎天之於君雖不若君臣相接之明且著然未嘗不明且著也幸其未形以為無憂幸其未至以為愛已嗚呼其可果恃也乎治要無法不足以治天下而天下非法所能治也古之聖人知民不可以威服於是寓革姦剷暴之意於疏緩不切之為使民優柔揖讓於其間莫不兢然有自重知耻之心未見鈇鉞而畏威未見鞠訊而逺罪潛修默改於閭閻田里之中若有臨而督之者彼豈恃區區之法哉法之為用淺陋而易知民之為情深詭而難測以難測之情視易知之法法巳窮而其變未巳未有不為竊笑而隂誹者也善用法者常使民聞吾法之不可犯而不使民知吾法之果可畏夫人祗天而懼帝者以未嘗𬒳其誅殛而或𬒳其誅殛者必不能以復生也如使鬼神臨人之庭捽人而擊之則愚夫鄙婦皆思持挺而逐之矣其何畏之有欲人之重犯乎法在乎不輕用法於民吾視殺戮為輕刑而數用之彼將輕吾之殺戮而數犯之矣吾視笞罵為大辱重而施之彼亦以笞罵為足耻而畏避之矣得其要術者能使民畏笞罵為殺戮不得其要者刑人接於市而人談笑犯法不為之少衰人惟以死為足重也故知樂其生知生之樂也故凡可以賊身害名之事慎忌而不為使皆不愛其死則將紛然驚肆馳逐於法令之外趍死而不顧雖有法何足以制之聖人之治不恃斯民畏吾之法而恃其畏乎名不恃其畏乎名而恃其畏乎義夫纊冠素組玄冠縞武與坐之嘉石而畫其衣施之人身非有毀形傷膚之慘也而使惰遊之士不齒之人與麗乎法者服之坐之則慚悔愧恨與𬒳木索嬰金鐵者無異此何必刑哉加之以不義其辱固甚於刑矣孝友睦姻任恤有舉先王以是數者勸天下之民非能家説而人誘之也而人以能是為榮不能是為辱書之黨正族師之籍如受命于王庭而就刑于司寇其心逹乎義故知畏乎義而惟恐或違之也事固有類乎不急而為用至要甚微而為化甚博者聖人常以是寓夫御世淑民之精意使民奔走慕悅無所厭倦而不自知其由世俗不之察以為遷逺而不若用法之有功則過矣人主莫不欲民之興於孝弟禮讓也而人不免悖德而蔑教莫不欲吏之奉職而循理也而吏不免怠肆而汙僻則法果可以禁之乎法加人之肢體而不從而謂虗名可以服其心其事若不近人之情而理有所宜然者不可不察也二人治家一以變色不言為怒一以箠撻詬罵為怒自其嚴者言以變色不言者為不肅矣示其怒者雖異而其為怒則同人見其色之不易變也於其偶發乎靣其畏且恐與箠撻何擇哉故法不必嚴在示其意向而巳辱莫大於不得同於恆人觴舉坐以酒而飲一人水其愧於刑及其身耻為醉酒者所輕笑也良淑之民皆冠緇布德為民所尊者加識别之行為人所卑者使不與桓民齊則民莫不修其所可尊而去其所可卑者矣吏以廉潔稱者歸則服其服不能以義退者異其服以愧之則德惠盡其職矣推是類也等其田里别其室廬使民無貴賤以德之高下為貴賤仕無崇卑以政之廣狹為崇卑有罪者始則異其冠服次則殊其里居如是而不悛則誠不可與為善矣然後刑戮加焉人知刑罰果出於不得巳而行於果不可不怒也必能自重其身知麗乎法者為可耻而禮義之俗成矣夫茍可以變易風俗雖有甚難至逺之事先王之所樂為也況其易者乎易者忽之以為踈而不屑為難者重之以為高而不敢為則是聖人之道終無適而行也悲夫官政欲天下之治而不修為治之法治不可致也欲行為治之法而不得行法之人法不可行也故法為要人次之二者俱存則治俱弊則亂俱無則亡偏存焉則危世未嘗無人也然取而用之與用而責成之無其法則猶無人也今祿而仕者無虗位求其知職而不愧乎祿者無幾人法非不密也而貪暴者不為止怠鄙者不加畏闒茸不振者頑然食乎其間而不以為非其患在乎取之過雜持之過急待之過賤而黜陟不明耳奚謂取之過雜可以治人者必有以過乎人也過乎人之人居恆人之中固巳嶢然有異於衆而為衆之所服善用人者取其為衆人所服者而用之故人服其上之知人而歎受知者之稱其任各勉於自修而無有僥幸乎祿位之心使無以過於人而用之於治人之位則人必以上為瞽而以得位者為冒莫不自以為可用而有賤輕祿位之意曰彼猶吾也何以治吾彼與吾等也何以聽吾之曲直於是處士以不仕為高恆人以得位為宜而仕者之勢不尊威不行而令不信于下知不為衆之所與也則益不自重而為毀廉蔑耻之行何謂持之過急待之過賤蓋人必有樂乎位也然後思固其位安其身也然後自愛其身知其身之當愛位之當保然後凡可以戕身而僨位者畏避而不為可以得名譽華寵者慕效而為之馭之以不得自專之法加之以非其自為之罪役之以非其所能之工富足則快樂而獲存廉節則死亡而莫之救欲其有士之行烏可得也何謂黜陟不明天下之所尚視乎上之所嚮漢文好寬厚而人多化為長者宣帝好能吏而吏多以善治稱四海之內仕者之衆不可謂無才也而不聞卓然以才稱者以非上之所好故有才者沉鬱銷沮而不能自見妄庸之人茍且攫竊而不知愧耻誠使擇異常之才居四方之大位俾各察其屬之才鄙廉否言其狀于朝而進退之果才矣自縣而陟之於州於府加賜祿秩以旌之果不才矣可任則姑試之以事不可任則歸之於民處巳誠廉矣則厚其祿雖有過再宥三宥而後加以罪勿辱其身勿役之以小人之事取於民誠貪矣則收其祿役其身俾不齒於士上之好惡如日月之昭明人寧有不化者乎利乎報而為善者君子以之存心則不可然欲化舉世之人皆為君子不先示之以得失之理未見其遽從也言治道者不求其本急近功則謂德不若刑務教化則謂刑不如德皆近似而不然也一任乎德則為惡者茍免一任乎刑則為善者無所容皆不可以致治惟本之以德而輔之以刑使恩惠常施於君子刑罰常嚴於小人則寬不至於縱猛不至於苛而治道成矣民政治天下者固不可勞天下之民以自奉也然不能使天下之民知道而易使亦豈足以為治乎當昔之未有君臣也民頑然如豕鹿猿猱餒則食飽則奔逸跳擲而不可制欲馴之且不能況欲使之乎聖人者出知其散漫放恣無所統屬非久安之道也於是制上下之分定尊卑之禮俾賤事貴不肖聽于賢由胥吏以至于大夫公卿由子男以至于諸侯各敬其所宜敬而各事其居乎上者猶以為未足也復制治民之法使五家為比二十五家為閭百家為族五族為黨二千五百家為州萬二千五百家為鄉以屬乎司徒五家為鄰五鄰為里里四為鄼鄼五為鄙鄙五為縣縣五為遂以屬乎遂人聮之以五兩卒伍師軍以知其數習之以師田飲射祭祀讀法以一其心書其善以作其氣罰其惡以折其驕六畜車輦旗鼓兵器之稽可按籍而知老弱壯少可任與否不必問乎民而具上有所興作朝出一言而暮巳集進之則前退之則却其民常知恭順忠愛事上為當然不敢少有忿怨避縮之意三代之時非不役民也而未嘗有一民敢發不遜之言豈其威力足以制之哉其法素備其教素明民皆知道而易使故也戰國之君不知先王之用心務為茍簡之術以為不必如先王之煩密過慮亦可以為治斥絶遺典而師心自為既巳失矣而秦又并燒除刮絶之不復有為治之法而徒任刑罰以劫黔首譬之去悍馬之羈靮而臨以鋒刃彼有蹄齧騰躍而走耳安能以可生之身蹈必死之禍哉故斯民至於秦而後興亂後世亡人之國者大率皆民也其禍實自秦始秦之民即三代之民在三代之時則尊君而附上當秦之時則鷔狠凶戾視其君如仇讐豈民之過哉無法以維之無教以淑之而不知道故也二家之童其一自幼教之以拜跪順悌其一恣其詈言誶語而不禁他日犯上而賊倫者必自幼不教之人其知教者必不至乎有過也治天下者未嘗願天下之不治而不修致治之法猶願無死而不食也致亂之由非一端莫甚於治民無法治民之法既定世有叛將亡卒挾姦而肇釁縶而殺之易易耳亂亡所以相踵者無賴者為之倡好亂之民皆起而從之也使斯民皆知君臣之義或有狂夫怪民出乎其間衆縛而告于司寇何亂之能成茲欲復井田行周制如先王之時固難矣獨不可稍取先王之意為之法乎今之役民雖不能歲止於三日亦未至於厲民也終歲休干家縣官役之以數日之事已若為所不當為發憤懷怨而就道甚者或逃匿而不從上之威令方行而民巳如此設使不幸而威令有所不行何望其從上之命乎此治民無法教民無道而不知君臣之義使然也為人父者未必皆無過舉然子不敢逆其命者以父子之倫不可悖也人君之政豈能皆合乎民心茍不知君臣之義少不慊所欲則攘𬒮而起其危亦甚矣烏可以為不急而不務哉欲民易使莫如放鄉鄰鄼鄙比閭族黨之制執其中而用之為之正若長者月申之以讀法開之以古訓春秋合之以祭祀和之以飲酒導其忠順之道罰其不率令者遇有徴發以趨事先為者為上而厚賞以勸之以訕訐敗類者為下而屏黜以愧之上之人又能躬行以成俗立學校以明教則民可漸化矣然必制民之産使之無死亡之憂然後可茍驅不能自存之民從吾之令雖堯舜之仁周公之智有所不能況三代之舊法乎故民易治也在乎治之有法法可行也在乎養之有道成化寓控制天下之道於迂逺不急之法使人隂服乎上而不自知者周之所以得民也欲人之服從而炳然示之以服人之具其服也必不堅有意於服人先以養人者示之使天下成化而歸巳此誠能服人者也秦漢之君未嘗不笑周以為迂而其為治之具固周之所笑以為拙陋而不為者也惡犬升灶而食糜必嚴禁而預防之使不敢近則可矣不能制之於先伺其既食而擠之於釡雖可以快意而釡之糜豈可食哉秦漢之法擠犬於釡之類也其於民也未能教之知義而禁之勿為亂未能教之知孝而禁之勿悖慢視斯民冥頑愚僻與熊豕麋鹿無異不少置於心而為之計及其麗乎刑則三族誅滅之典斷焉行之而不顧威令既立使人視斧鑕如就几席而無所避豈不可畏哉畏極而玩玩極而怨有時不畏矣矣故以刑罰為威者威既褻而亂生以禮義化民者俗既成而分定能使民畏禮義如刑罰而不敢犯之則刑罰可措而不用矣周之盛時是也五家置之長二十五家置之胥百家置之師五百家立之正其事似乎不切也歲時則讀法春秋則會射搜狩考其善而書之紏其惡而戒之民之得休息者寡矣其事似乎太煩也然則周卒以此而治孰謂果煩而不切也哉周之成法具在今欲為此不難也而民必以為甚病夫變其所久習而俾為其所未見非特今之人病之雖周之民亦然武王周公以至仁易至暴宜其悅而順也然殷民紛紛思亂久而後定者以法制之驟而然也蓋殷之政亡久矣周驟以禮義繩之俯仰揖讓於規矩之中而不勝其勞則思其縱逸之安固恆人之所同然者況今之世承大亂之後乎然先王之道所以利民而上無所利能為之以漸可不擾而復也稍揆其當損益者而踈略之民可不甚病也宜定其制曰民家十為睦睦者言相親也十睦為保保者言相助也十保為雍雍者言衆而無爭也雍咸屬于縣雍有長以有德而文者為之保有師以有行而文者為之睦有正以忠信篤厚為十家則者為之同睦之人月之吉咸造睦正之廬正中坐餘立而侍老者坐侍令少者一人讀古嘉訓巳正為釋其義戒勸之衆皆揖而聽一人讀邦法已正立而宣敷之衆皆北向跪而聽讀既正書衆名于册列其所為於側善惡咸具無惡者為上善多者次之善惡均者為中惡多者為次中無善者為下正飲衆酒位皆以其行為差下者不卑酒不命坐三年而無惡者告于縣而復其身三年而無善者罰及之異其服不齒改者免之其善之目曰孝曰弟曰親鄰曰恤貧曰助同睦曰敏好學其惡反是保有學以教十睦之秀民四時各一會如睦制而略其教之法取其孝弟忠信之行取其端莊和敏之德取其治經而知理射而中習禮樂而安知書數而適用月試而升黜之升則於雍雍亦有學其教如保而加詳雍試而善則升于縣而復其家黜則于睦俾家之修修而有聞則復教之而復升之凡睦之民有未逹則問諸正正未逹則問諸學農而暇則惟學之遊以咨善言以法善行同睦同保遇相揖作相助語相讓飲酒相命召若族雖非同睦行族禮童子則學于睦之正取其群而和睦正保師雍長縣歲考其績而升易之為此下疑有缺誤者其家復凡民力征相先粟賦相率上之所令胥勸而趨􅌾死而絶者食病而窶者敬德而文者執強悍愎而敗類者棄好侫而巧者此其要也持而循之使不至於壞謹而察之使不至於弊而朝廷都邑皆以禮為治民寧有不化者哉由是道也近者十年逺者數十年周之治可復見矣嗚呼周之盛至于今三千年矣漢文帝唐太宗宋仁宗有願治之心而治卒不如古者以其不法古之道而失先王之意也道之行豈非難哉然為天下者患乎無志有志無難為也患乎茍安求安無難致也患乎畏事立事無難成也舉而措之如斯而已矣明教天下非無才也聚數萬之人養之十餘年而未見有一人可稱者養之無其漸而教之無其法也古之善育才者豈能益人以藝增人以智哉為之之具素備能使人以不成才為病不若人為耻各思勉為君子而不可止也故自其少時居於閭族而閭胥族師不責之以敬敏任恤則責之以孝弟姻睦其本固已美矣及其漸升于太學求之以六德以觀其內試之以六藝以觀其外行完而德備藝成而器良然後措之於用蓋其詳且慎也如此後之所望以為才者執子弟於販鬻之區芻牧之場𬒳之以衣冠而納於郡邑之學終歲期月太學有徴焉則又納於太學計其所習曾未知拜跪之節興俯之容而巳肆然有爵祿之心太學舉而教之者又不越乎誦書業文挾弓矢角膂力恆人之淺事歷時未久有司有求焉則以應之卿大夫之位有闕焉則以為之為之者既不自知其不可而命之者亦不責之以其所學於是學者以習恆人之淺事冒竊祿位為得計莫不相勉為恆人而自謂不必修君子之事也太學之所聚郡邑之所教咸有茍且之心無賴之行兾其才之成奚可致哉夫國之立學所以養才必不期其至此也為學者雖無志於道德亦必不自望為恆人也而卒不能有成者非他用之速而教之踈也古之六德智仁聖之事顔閔之所不能及六藝禮樂之度數節文孟子之所不能詳射御之工杜預羊祐之所不能兼書數之法君子猶有所未習今欲責學者皆法古人而盡備之宜其未易為也然不法古人而惟弓矢膂力是效誦書業文是為亦未見才之可成也然則何由而設教乎蓋聖人之取人德不求其全而取其不違乎道藝不求其備而貴乎能致其精唐虞以九德待士而有三德者亦俾為大夫有六德者亦俾為邦君聖人豈不欲得全德之人而用哉以為求人太全則天下無全才不若因德命官之為無失也臯陶未必能逹禮益稷未必能知樂而益稷臯陶所為之事伯夷后夔宜亦有所不能然而數子為之各稱其位而成名于後世以其精不以其備也人惟行可以自圖若才與藝則有能有不能欲強而通之非惟不足得其所不能且將并其巳能者而失之故善立教者莫如本之以六行餘則因其質而設其科人有剛毅而重厚者有慈良而順愛者有疏逹而明斷者有強識而通敏者有沈勇而有威者有多力而任武者此六人者使曲徇衆人所能必不能堪茍因其所固有而教之於成才也奚禦剛毅重厚也必可以任天下之大事則因而教之博通古昔之政教周知海內之得失觀其損益折衷以驗其為勿使色厲而偽者得參之則大臣之儲也慈良順愛者必可以治民則因而教之平賦施惠之方振災恤患之道辨邪察獄之事理俗興化之要勿使柔佞而詐者得參之則牧伯之儲也疏逹明斷者則百官衆職之儲也強識通敏者則文學典禮之儲也沈勇而有威多力而任武則將帥之選疆埸之所恃也各以其所當為者教之而皆不使近似可説之人得與則所用無非才而所為無僨事矣此大學之政也而為師者非其才德之美不可也大學推其法行之於郡縣俾亦以六科為凖郡縣之取弟子貟也必問於其宗族鄉黨皆言其篤行而好學則取之而復其家田百畒入太學則倍復仕而有政則皆復學於郡縣者與郡祀與燕會禮異之使殊於恆人縣每科四人三歲各升一人于郡郡每科十人三歲各升三人于太學太學每科百人為率以應上所任用郡縣既升而闕則即充之廪之也宜厚教之也宜詳試之也宜嚴用之也宜當人知學之可仕也則不怠於自修知各因其才而用之也則必謹於自立而天下之異才咸思有為於世矣為治者不患乎無才而患乎聚天下之才而不能教用天下之才而不能擇教之而能成其德用之而能不違其器則才何可勝用哉胡貊之富人聚馬盈谷而不得一善馬善御者執鞭䇿指麾而區别之一日馬之致千里者以百計而盈谷之畜無棄者御非能假馬以力而易其性也能别其高下而不失其性則善馬出矣為治者能不失其性豈特不患乎無才天下亦安所患哉正俗行於一人之身而化極四海之內觀於數百年之前而驗於數百年之後者風俗是也故風俗之所成至微也其效至著也所係似小也所由甚大也不可忽也昔者楚靈王好細腰舉國之人皆約食束膂引而後能起慿而後能立伊川之民𬒳髮而祭智者知其變而為夷風俗之端可不深察哉夏之忠商之質周之文其先之所尚傳之數十世而不變守之至於國亡而後巳其俗素巳定也故商之不能為忠猶周之不能為質也周公豈不知文之不若質哉至於商之末質漸散而繁文興矣周公知其莫可及也故因而文之恐其趨於浮薄也為之禮以節之作之樂以和之惟其如此故能至於七百餘年然其後亦已不勝其弊矣戰國之世遊説之士螽聚蚊合以諂言邪説啖諸侯傾動天下誠二代之所未有也由是生民日流於變詐豈非文勝之弊哉及秦懲其病遂坑殺儒生舉先聖賢之遺文餘法一火而盡燔之曾不師古而任其深刻巧苛之律不旋踵而遂亡其所尚非道故也漢興務以寬大更之法踈禁濶四百年之基用此以立然其時朝無人不知以禮義為俗其所因仍大率皆秦制也烏望其如三代哉至於近世惟宋之俗為近古尊尚儒術以禮義漸漬其民三百年之間宰相大臣不受刑戮外內庶官顧養廉耻雖曰綱紀未備其所崇尚逺非秦漢以下之所能及故其垂亡之際孀后少主既巳就虜而其臣抱君之遺孤奔走海島誓天指日擁立為帝朝夕請命如事神明卒之無一人有背叛之心至於溺死於海而後巳雖三代之亡未聞忠厚惻怛有若是者孰謂風俗無益於國哉且夫秦皇帝之死未久而其黔首相與奮挺而呼願食其肉漢唐之衰皆逼於其北面之臣而奪之而宋乃獨若此者何也秦棄禮義漢唐不知以禮義為俗而宋風俗淳美故也假使宋無夷狄之禍尊其前世之俗國安遽亡哉以是知風俗之至急也宋亡元主中國者八十餘年中國之民言語服食器用禮文不化而為夷者鮮矣其初尚有一二賢者教之參用宋法而亦頗以寬大為政故民亦安之然而暴戾貪鄙用其族類以處要職黷貨紊法終以此亂其俗大壞以至于今譬如弊鍾漏鐻非重鼓而鑄之其音不可得而調也夫欲因亂國之俗而致治雖聖人不能也勢不可也俗之既壞則日甚而歲滋耳無以匡持之豈遂止哉今北方之民父子兄婦同室而寢汙穢褻狎殆無人理盂飯設七咄爾而呼其翁對坐于地而食之頑不知教其於大倫悖棄若此甚非國家之便也上下有則乃所以導民故古者士民不非其大夫今小民得以執郡縣之短長撾鼓而訴之闕下弟子或訟其師子姪或證諸父禮義不立曷所不至哉法令非不明也有司按四方之罪非少怠也而犯者不為衰止黠胥巨吏開口肆然徴取於人而不顧問之則曰行且輸作不取何以為資或曰身死而妻子何所仰食姑取之以自給耳其設心自以為明逹見執貧守法者衆且群指而笑之而其人亦不幸卒無赦以死於是益堅貪者之心小民轉之窮苦割剝次骨鬻産賃室以奉其無懕之欲非特為此也國之大柄可以貧富者惟寶鈔為然無賴之民聚徒勒板而偽之御史中使國之廉察天下者安作妄詐男子假其衣冠符印乘傳而橫行夫偽鈔偽官之律至重也而若不愛其死而冒之者豈誠不愛也哉彼見死者之多而死不之畏也且人雖至愚奚不畏死彼誠見生之不足樂也知生之足樂則安肯言死哉頃者冨民受挫辱於官府或禠其衣而跽或庭拽而詬罵其心大耻掩面而不敢見人里中弔者填其戶殺羊為酒而祓除之其人亦終身以為病况犯有名之律至於死地哉今人則俱不顧矣鞭一百扶而出於外揭其瘡以示人笑談而道之人亦不以為怪一百之刑曾不直舊時之詬罵刑愈多而人愈不知耻則刑之不足化民亦明矣故欲民之重死而難犯法莫如省無用之刑而以禮義教之夫牧者之於羊操長鞭而逺麾之未嘗及其體則逐逐然行矣茍步步而鞭之則必馳突散走而不可制故刑者非所以治民者也不得已而後用民知其不得巳而後用則烏忍犯之哉俗之不美至此甚矣少遲而不變法令將不足禁之不可不深計也三代之變俗各視前代而變之元之俗貪鄙暴戾故今宜用禮義為質而行周之制今周之制亦有行者矣學校非不立也鄉飲之禮非不修也然而俗尚未善者未嘗灼然示之以所尚也夫示之以禮義者朝廷之上皆不言他而以禮義御史出行郡縣不以摶擊人責之而責之以禮義化民之事守令者考核之等不以興利增戶求之而求之以刑罪息學校興歲舉其孝弟忠信之民而尊異之使小民皆知朝廷之意在乎成俗而不求利在乎任德而不任刑則信讓立而廉耻興廉耻興而民重其死然後取先王防範天下至於七百年之法舉而盡行之三代之俗必復見而成康之治不難致矣世嘗謂古與今不同俗豈其然哉今也民啜粟飲水與三代之民同養老育幼與三代之民同獨人君不可行三代之政乎用元之法而欲致古之治猶食烏喙而望其引年附獨木而濟大川也重爵祿以一人而加乎萬姓之上聚之為膠􅃮散之為沙塵合之為手足而離之為仇讐其勢岌乎其可畏也然而人君處之甚安而居之不疑者以為天下之人賤者待我而貴貧者待我而富且曰富曰貴吾有以命之則其勢不能以自尊天下皆有待於我而吾無待於天下是以籠絡奔走舉世之豪傑而恆以是驕之而不知此僅足以致徇世之士而不足為高世之士之輕重吾以為人必待我而後富貴尊榮也彼高世者方以是為道德之纍大言宏論辭拒退避惟恐爵祿之汙其身則人君安得以此致之哉士之可以自恃者無窮而君之所以致士者舍爵祿則無所可用用之得其道雖不能致高世之士猶可得徇世者而任之操貴賤豫奪人之柄而不能用將使庸夫婦人咸自以為高而謂爵祿為不足貴此人君之大患而不可不察其故也數寸之節盈尺之綬何足以貴人而人知貴之者以人君不易以卑人知自貴重之道也凡物貴於不易得而賤於施所不當與未嘗拜人者拜一人焉則人以為盛禮則拜在所尊矣逢乞人而與之揖則其拜為不足貴而受其拜者皆褻而賤之矣方之為天下者能使人以不得祿位為不若人其心恆欣然有趨事赴功之心故上無求才之勞而下無曠官之憂執野人市魁而授之以大位士之賢者必曰我何可與之同仕乎哉由是處士以不仕為尊以遺世為高而訾爵祿為不足貴海內皆有無求於上之心人主提其空名將安所用乎賈於千家之市欲使千家之人日為市於其門猶必權物之價使人不能賤其物操區區之空名欲俾智者盡其謀才者效其功勇者陳其力而不使人知自貴之道謂之善慮天下不可也德可以為公卿吾從而用之於大夫士之上則居其下者莫敢不服德可以治民吾從而加諸斯民之上則為民者莫敢不服上之所用舉可以服人心則高世之士無可容而爵祿重矣不能服乎人心人君之權下為清言橫議之所奪而其勢渙散而不收則何所不至哉正服善治天下者常迎斯民好慕愧耻之端而導之於不言不動之中使之身勉於善而不自知勑之以辭説驅之以賞罰而強斯民之從之者化之至淺者也夫民雖有昏明愚智之不同然未嘗無所好惡也好之而未得則慕心生惡之而不能免則耻心萌且貧賤家之竪子𬒳以華衣美服則欣然喜巳不得有而見富貴家子之勝巳則赧然愧矣其喜與愧豈有教之者哉發於性本於天莫或使之然而不能已耳聖人之為治常因其天而順導其性寓可慕可耻之器於人所不可離之物俾民目接乎此而心化乎彼無爵賞之誘而其勸有甚於爵賞非鞭朴之威而其懲有甚於鞭朴用微而效速意密而化神者其惟衣冠之品上下有制之法乎昔者成周之盛其為制蓋詳矣天子諸侯以下自九章至於一章自十二旒至於三旒其曲折粗見於經傳而庶民之制之詳無聞焉獨禮記者曰野夫黃冠掌禽獸玄冠綏武不齒之服也縞冠素紕而綏五寸惰遊之士也由是而推之其寓懲勸之意於衣冠之􅎖蓋甚備矣夫頑悖之民刑其體膚創愈則痛平書其罪惡歲久則書亡曷若因其致飾之具别以美惡之等俾服者思其為可耻而慕乎善觀乎服可耻之飾者知其為當戒而禁乎惡之為著明乎蓋天下之民非可以一途視也或誦法堯禹而惇行道德或縱情逞力而干抵法律其相去不啻十百士君子揖讓雍容習為卿大夫之事而卑賤之夫負任奔走出入于泥塗草莾之間苟概而同之則何以别賢否而示貴賤哉成周之制意必有以處此而其詳不可悉考矣欲談先王之治者宜稍定其儀則凡士農工賈技藝百家之流於其冠服各為表識而以其人不以其族有德之君子化行於鄉黨及衆所擯棄作過𬒳罪之人或異其制以為懲勸亦不以其族而以其人非士族而有士行者進於士族尊之而為不善者服以其服而居民上者又接士君子以禮待庶民衆流以法微示意嚮以聳動之民見有德者之𬒳服美而邪慝者之可耻也必勉於自修見為士者之尊而執藝者之卑必慎於擇術天下皆慕而欲為士君子斯民孰與為不善而禍亂何自而作哉世主無不欲斯民趨善而去惡然而法愈煩而惡不止者不能迎其慕耻之端而使之不知善之可慕而至於無耻也故因其良心之發而導之則微示吾意而有餘喪其慕耻之心而令之雖迫之以刑誅而不足夫以刑誅之不能禁之民而欲其見吾區區之冠服而化此世俗之所惑也然是民也與三代之民類也畫衣冠而不犯者有矣刑措而不用者有矣聖人果何以致之哉蓋其施為有本末而導之有道化之有方也事之要固不止乎衣冠之有制而衣冠之有制豈非王政之所當務也哉臨海縣知縣黃誥黃巖縣知縣張師善台州府儒學教授尚芳訓導李深黃巖縣儒學教諭文程府學生陳縝葉琰王梅齡臨海縣學生李臨卿戴濬之黃巖縣學生孫思光牟汝鈞校對遜志齋集卷之三終
