front:
  text: 遜志齋集卷之三
  hash: sha256:65d13f7064a91db0e6c17ffdb7aa1b697c141e6e49c59d2c55a474bff700ae87
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4e0074_SBCK_003-1a}
body:
  text: 中順大夫浙江按察司副使奉勅提督學校雲間范惟一編輯奉政大夫浙江按察司僉事奉勅整飭兵備南昌唐堯臣校訂中順大夫浙江台州府知府事前刑部郎中東呉王可大校刋雜著君學上人君不患乎無才而患恃其才以自用不患乎不學而患挾其學以驕人邈乎無爲澹乎無謀以任天下之才智而不與之争能則功之出於人者猶出於巳也持其偏長小數以與臣下較銖兩之優劣使才智之士不獲盡其所欲爲是曷若不學之爲愈乎漢高帝椎樸質厚於學無所知然其聽言任人與知道者無異陳叔寳楊廣好自矜伐以爲群臣莫巳出而其所以自負者適足以取敗蓋聖賢之學不傳人君旣不知爲學之道而復不能用其學譬之兊戈埀矢王者用之可以伐僣亂而狂夫得之或以濟其惡而爲盗豈戈與矢之不善哉挾莫邪之噐而不能用未有不爲大禍者也況彼之所得皆聖人之所棄者而恃之以驕人則適可疑當作足以害其身而巳學至于近世離而爲四言性命者得其本其失也過高道政事者得其用其失也過雜文辭之習華而鮮實制度之辨勞而少功人君欲如學士儒生兼窮而並索之豈惟勢有所不能而亦安暇事于此古之聖王爲學之道雖殊然其大要不過敬天仁民别賢否明是非數者而巳而必皆以正心爲本正一心以對天下智者爲之謀仁者爲之守勇者爲之戰而藝能才羙之士咸以其術自奮何患有所不知哉學之不正而欲徒務乎學以之治身且不可而況天下乎君學下將欲應天下之變而計謀規法不素俻於吾心一旦事變雜陳乎耳目之間其不至於瞀惑迷亂者鮮矣故人君不可不學也人君之學莫大於治心立政而治心之術有五持敬以弭安肆之萌寡欲以遏侈縱之漸養慈愛之端以充其仁伐驕泰之氣以固其守擇賢士自輔以閑其邪五者立然後可以爲政而爲政之方有八明而不至乎苛寛而不流於縱嚴而不迫於刻仁而不溺於無㫁智而不入於詐妄納諌而能委任無逸而能不變此爲政之本也而未及乎政然能是八者則政可以舉而措之矣存之無形索之無方而其動無常者心也聖王之爲學必先治於心如操六轡以御悍馬奉盤水而行乎堂階之上惟其顛逸而不可制傾覆而不可收自旦以至夕自起居飲食以至決大事䖏大變自壮以至老兢兢然不敢少肆故雖在位數十年而政教行乎天下者如一日國有百歲之儲積而宫室服御奉其身者無加遐荒逺邑無飢寒之民而憂勞之意不敢怠有學以治其心是以恒見其不足茍自不足則於治也何有哉後世人主不知學以其天資之所近者爲治好仁則姑息而無㫁任察則苛細而少恩廢疑當作嚴或近於殘寛或至於弛好謀多蔽於輕信推誠毎失於小人或始於恭儉而敗於驕㤗或初志甚銳而旋致縱怠漢之文景武宣唐之明皇憲宗其才非不美也而不足以庻㡬先王之治者豈非不能充之以學故哉人惟知不足然後久而不變持其所長自以爲能居億兆之上䖏尊榮之勢内不能學外不能親疑誤此人君之不幸也君量智周乎萬物才高乎衆人者可以取天下而不可以守天下仁足以施法政義足以洽乎民心者可以守天下而未能使天下恱而不忘善爲智者蓋有不用智而無不明不以才自名者無所不成德洽令孚而人莫能忘其仁義其惟量足以容天下者能之乎洪河大江奔注萬里勢之所遇聲之所嗄洶洶乎其可畏及趍於海泊然而行悠然而逝渙漫浩渺不復少肆者以其量素足以容之也天下大物也其動也無端其變也無恒自非量可以容之者孰能有之人能辭萬鍾之禄而或色喜于一金能虜三軍之帥而或呻吟於一指其岀於計度而後爲者未足見人之量惟其猝然遇之視之而不驚此非有量不能也古之聖王叢之以極繁至擾之事而䖏之若無投之以深憂厚懼之變而應之不勞恩及乎黎庻功高乎徃古而不少見於辭色豈強而爲此哉其所操持者大所􅉼畜者逺事物不得亂其中也堯視黎民時雍不異於洪水滔天之時舜居乎法宫而朝萬國與陶漁于河澤之際無異禹舉天下於魚鱉之波而使食息於平土而不與焉蓋於其功德之盛未足見聖人之大於䖏盛美而不居然後可見其量也後王之於古若視日月不能㡬之者豈皆其智之不能質之不逮乎速盈而易驕可以利害動而不能用天才知才智自見于世者庻官百職之所爲無所用其才智而才智之士咸爲之用非聖人其孰能之君職能均天下之謂君臣覆兆民之謂君立政教作禮樂使善惡各得其所之謂君生民之初固未嘗有君也衆聚而欲滋情熾而争起不能自決於是乎有才智者出而君長之世變愈下而事愈繁以爲天下之廣非一人所能獨治也於是置爲爵秩使之執貴賤之柄制爲賞罰使之操榮辱修短之權位乎海内之人之上其居䖏服御無以大異於人不可也於是大其居室彰其輿服極天地之嘉美珎竒以奉之而使之盡心於民事故天之立君所以爲民非使其民奉乎君也然而勢不免粟米布帛以給之者以爲將仰之平其曲直除所患苦濟所不足而教所不能不可不致夫尊榮恭順之禮此民之情然非天之意也天之意以爲位乎民上者當養斯民德高衆人者當輔衆人之不至固其職宜然耳奚可以爲功哉後世人君知民之職在乎奉上而不知君之職在乎養民是以求於民者致其詳而盡於巳者卒怠而不脩賦稅之不時力役之不共則誅責必加焉政教之不舉禮樂之不修弱強貧富之不得其所則若罔聞知嗚呼其亦不思其職甚矣夫天之立君者何也亦以不能自安其生而明其性故使君治之也民之奉乎君者何也亦以不能自治與自明而有資乎君也如使立君而無益於民則於君也何取哉自公卿大夫至於百執事莫不有職而不能修其軄小則削大則誅君之職重於公卿大夫百執事逺矣怠而不自修又從侵亂之雖誅削之典莫之加其曷不畏乎天邪受命于天者君也受命于君者臣也臣不供其職則君以爲不臣君不修其職天其謂之何其以爲宜然而祐之耶抑將怒而殛絶之耶奚爲而弗思也天與人其形雖殊其好惡去就不甚相逺也使君命一人焉而治民而困踣之厲虐之其有不怒者乎怒而能全其禄位乎天之於君雖不若君臣相接之明且著然未嘗不明且著也幸其未形以爲無憂幸其未至以爲愛已嗚呼其可果恃也乎治要無法不足以治天下而天下非法所能治也古之聖人知民不可以威服於是寓革姦剷暴之意於䟽緩不切之爲使民優柔揖讓於其間莫不兢然有自重知耻之心未見鈇鉞而畏威未見鞠訊而逺罪潜修黙改於閭閻田里之中若有臨而督之者彼豈恃區區之法哉法之爲用淺陋而易知民之爲情深詭而難測以難測之情視易知之法法巳窮而其變未巳未有不爲竊咲而隂誹者也善用法者常使民聞吾法之不可犯而不使民知吾法之果可畏夫人祗天而懼帝者以未嘗𬒳其誅殛而或𬒳其誅殛者必不能以復生也如使鬼神臨人之庭捽人而擊之則愚夫鄙婦皆思持挺而逐之矣其何畏之有欲人之重犯乎法在乎不輕用法於民吾視殺戮爲輕刑而數用之彼將輕吾之殺戮而數犯之矣吾視笞罵爲大辱重而施之彼亦以笞罵爲足耻而畏避之矣得其要術者能使民畏笞罵爲殺戮不得其要者刑人接於市而人談咲犯法不爲之少衰人惟以死爲足重也故知樂其生知生之樂也故凢可以賊身害名之事慎忌而不爲使皆不愛其死則將紛然驚肆馳逐於法令之外趍死而不顧雖有法何足以制之聖人之治不恃斯民畏吾之法而恃其畏乎名不恃其畏乎名而恃其畏乎義夫纊冠素組玄冠縞武與坐之嘉石而畫其衣施之人身非有毀形傷膚之慘也而使惰遊之士不齒之人與麗乎法者服之坐之則慚悔愧恨與𬒳木索嬰金鉄者無異此何必刑哉加之以不義其辱固甚於刑矣孝友睦婣任恤有舉先王以是數者勸天下之民非能家說而人誘之也而人以能是爲榮不能是爲辱書之黨正族師之籍如受命于王庭而就刑于司㓂其心逹乎義故知畏乎義而惟恐或違之也事固有類乎不急而爲用至要甚微而爲化甚愽者聖人常以是寓夫御世淑民之精意使民奔走慕悅無所厭倦而不自知其由世俗不之察以爲迁逺而不若用法之有功則過矣人主莫不欲民之興於孝弟禮譲也而人不免悖德而蔑教莫不欲吏之奉職而循理也而吏不免怠肆而汙僻則法果可以禁之乎法加人之肢體而不從而謂虗名可以服其心其事若不近人之情而理有所宜然者不可不察也二人治家一以變色不言爲怒一以箠撻詬罵爲怒自其嚴者言以變色不言者爲不肅矣示其怒者雖異而其爲怒則同人見其色之不易變也於其偶發乎靣其畏且恐與箠撻何擇哉故法不必嚴在示其意向而巳辱莫大於不得同於恒人觴舉坐以酒而飲一人水其愧於刑及其身耻爲醉酒者所輕咲也良淑之民皆冠緇布德爲民所尊者加識别之行爲人所卑者使不與桓民齊則民莫不修其所可尊而去其所可卑者矣吏以㢘㓗稱者歸則服其服不能以義退者異其服以媿之則德惠盡其職矣推是類也等其田里别其室廬使民無貴賤以德之高下爲貴賤仕無崇卑以政之廣狹爲崇卑有罪者始則異其冠服次則殊其里居如是而不悛則誠不可與爲善矣然後刑戮加焉人知刑罰果岀於不得巳而行於果不可不怒也必能自重其身知麗乎法者爲可耻而禮義之俗成矣夫茍可以變易風俗雖有甚難至逺之事先王之所樂爲也況其易者乎易者忽之以爲踈而不屑爲難者重之以爲高而不敢爲則是聖人之道終無適而行也悲夫官政欲天下之治而不修爲治之法治不可致也欲行爲治之法而不得行法之人法不可行也故法爲要人次之二者俱存則治俱弊則亂俱無則亡偏存焉則危世未嘗無人也然取而用之與用而責成之無其法則猶無人也今禄而仕者無虗位求其知職而不媿乎禄者無㡬人法非不宻也而貪暴者不爲止怠鄙者不加畏闒茸不振者頑然食乎其間而不以爲非其患在乎取之過雜持之過急待之過賤而黜陟不明耳奚謂取之過雜可以治人者必有以過乎人也過乎人之人居恒人之中固巳嶢然有異於衆而爲衆之所服善用人者取其爲衆人所服者而用之故人服其上之知人而歎受知者之稱其任各勉於自修而無有僥倖乎禄位之心使無以過於人而用之於治人之位則人必以上爲瞽而以得位者爲冐莫不自以爲可用而有賤輕禄位之意曰彼猶吾也何以治吾彼與吾等也何以聽吾之曲直於是䖏士以不仕爲高恒人以得位爲宜而仕者之勢不尊威不行而令不信于下知不爲衆之所與也則益不自重而爲毀㢘蔑耻之行何謂持之過急待之過賤蓋人必有樂乎位也然後思固其位安其身也然後自愛其身知其身之當愛位之當保然後凢可以戕身而僨位者畏避而不爲可以得名譽華寵者慕效而爲之馭之以不得自專之法加之以非其自爲之罪役之以非其所能之工富足則快樂而獲存廉節則死亡而莫之救欲其有士之行烏可得也何謂黜陟不明天下之所尚視乎上之所嚮漢文好寛厚而人多化爲長者宣帝好能吏而吏多以善治稱四海之内仕者之衆不可謂無才也而不聞卓然以才稱者以非上之所好故有才者沉欝銷沮而不能自見妄庸之人茍且攫竊而不知媿耻誠使擇異常之才居四方之大位俾各察其属之才鄙㢘否言其狀于朝而進退之果才矣自縣而陟之於州於府加賜禄秩以旌之果不才矣可任則姑試之以事不可任則歸之於民䖏巳誠㢘矣則厚其禄雖有過再宥三宥而後加以罪勿辱其身勿役之以小人之事取於民誠貪矣則收其禄役其身俾不齒於士上之好惡如日月之昭明人寧有不化者乎利乎報而爲善者君子以之存心則不可然欲化舉世之人皆爲君子不先示之以得失之理未見其遽從也言治道者不求其本急近功則謂德不若刑務教化則謂刑不如德皆近似而不然也一任乎德則爲惡者茍免一任乎刑則爲善者無所容皆不可以致治惟本之以德而輔之以刑使恩惠常施於君子刑罰常嚴於小人則寛不至於縱猛不至於苛而治道成矣民政治天下者固不可勞天下之民以自奉也然不能使天下之民知道而易使亦豈足以爲治乎當昔之未有君臣也民頑然如豕鹿猿猱餒則食飽則奔逸跳擲而不可制欲馴之且不能況欲使之乎聖人者出知其散漫放恣無所統屬非久安之道也於是制上下之分定尊卑之禮俾賤事貴不肖聽于賢由胥吏以至于大夫公卿由子男以至于諸侯各敬其所宜敬而各事其居乎上者猶以爲未足也復制治民之法使五家爲比二十五家爲閭百家爲族五族爲黨二千五百家爲州萬二千五百家爲鄉以屬乎司徒五家爲鄰五鄰爲里里四爲鄼鄼五爲鄙鄙五爲縣縣五爲遂以屬乎遂人聮之以五两卒伍師軍以知其數習之以師田飲射祭祀讀法以一其心書其善以作其氣罰其惡以折其驕六畜車輦旗鼓兵噐之稽可按籍而知老弱壯少可任與否不必問乎民而具上有所興作朝出一言而暮巳集進之則前退之則却其民常知恭順忠愛事上爲當然不敢少有忿怨避縮之意三代之時非不役民也而未嘗有一民敢發不遜之言豈其威力足以制之哉其法素備其教素明民皆知道而易使故也戦國之君不知先王之用心務爲茍簡之術以爲不必如先王之煩宻過慮亦可以爲治斥絶遺典而師心自爲旣巳失矣而秦又并燒除刮絶之不復有爲治之法而徒任刑罰以刼黔首譬之去悍馬之覊靮而臨以鋒刄彼有蹄齧騰躍而走耳安能以可生之身蹈必死之禍哉故斯民至於秦而後興亂後世亡人之國者大率皆民也其禍實自秦始秦之民即三代之民在三代之時則尊君而附上當秦之時則鷔狠凶戾視其君如仇讐豈民之過哉無法以維之無教以淑之而不知道故也二家之童其一自㓜教之以拜跪順悌其一恣其詈言誶語而不禁他日犯上而賊倫者必自㓜不教之人其知教者必不至乎有過也治天下者未嘗願天下之不治而不修致治之法猶願無死而不食也致亂之由非一端莫甚於治民無法治民之法旣定世有叛将亡卒挾姦而肇釁縶而殺之易易耳亂亡所以相踵者無頼者爲之倡好亂之民皆起而從之也使斯民皆知君臣之義或有狂夫恠民出乎其間衆縛而告于司㓂何亂之能成玆欲復井田行周制如先王之時固難矣獨不可稍取先王之意爲之法乎今之役民雖不能歲止於三日亦未至於厲民也終歲休干家縣官役之以數日之事已若爲所不當爲發憤懐怨而就道甚者或逃匿而不從上之威令方行而民巳如此設使不幸而威令有所不行何望其從上之命乎此治民無法教民無道而不知君臣之義使然也爲人父者未必皆無過舉然子不敢逆其命者以父子之倫不可悖也人君之政豈能皆合乎民心茍不知君臣之義少不慊所欲則攘𬒮而起其危亦甚矣烏可以爲不急而不務哉欲民易使莫如放鄉鄰鄼鄙比閭族黨之制執其中而用之爲之正若長者月申之以讀法開之以古訓春秋合之以祭祀和之以飲酒導其忠順之道罰其不率令者遇有徴發以趨事先爲者爲上而厚賞以勸之以訕訐敗類者爲下而屏黜以愧之上之人又能躬行以成俗立學校以明教則民可漸化矣然必制民之産使之無死亡之憂然後可茍驅不能自存之民從吾之令雖堯舜之仁周公之智有所不能況三代之舊法乎故民易治也在乎治之有法法可行也在乎養之有道成化寓控制天下之道於迂逺不急之法使人隂服乎上而不自知者周之所以得民也欲人之服從而炳然示之以服人之具其服也必不堅有意於服人先以養人者示之使天下成化而歸巳此誠能服人者也秦漢之君未嘗不咲周以爲迂而其爲治之具固周之所咲以爲拙陋而不爲者也惡犬升灶而食糜必嚴禁而預防之使不敢近則可矣不能制之於先伺其旣食而擠之於釡雖可以快意而釡之糜豈可食哉秦漢之法擠犬於釡之類也其於民也未能教之知義而禁之勿爲亂未能教之知孝而禁之勿悖慢視斯民冥頑愚僻與熊豕麋鹿無異不少置於心而爲之計及其麗乎刑則三族誅滅之典㫁焉行之而不顧威令旣立使人視斧鑕如就几席而無所避豈不可畏哉畏極而玩玩極而怨有時不畏矣矣故以刑罰爲威者威旣褻而亂生以禮義化民者俗旣成而分定能使民畏禮義如刑罰而不敢犯之則刑罰可措而不用矣周之盛時是也五家置之長二十五家置之胥百家置之師五百家立之正其事似乎不切也歲時則讀法春秋則㑹射蒐狩考其善而書之紏其惡而戒之民之得休息者寡矣其事似乎太煩也然則周卒以此而治孰謂果煩而不切也哉周之成法具在今欲爲此不難也而民必以爲甚病夫變其所久習而俾爲其所未見非特今之人病之雖周之民亦然武王周公以至仁易至暴宜其悅而順也然殷民紛紛思亂久而後定者以法制之驟而然也蓋殷之政亡久矣周驟以禮義䋲之俯仰揖譲於規矩之中而不勝其勞則思其縱逸之安固恒人之所同然者況今之世承大亂之後乎然先王之道所以利民而上無所利能爲之以漸可不擾而復也稍揆其當損益者而踈畧之民可不甚病也宜定其制曰民家十爲睦睦者言相親也十睦爲保保者言相助也十保爲雍雍者言衆而無争也雍咸属于縣雍有長以有德而文者爲之保有師以有行而文者爲之睦有正以忠信䔍厚爲十家則者爲之同睦之人月之吉咸造睦正之廬正中坐餘立而侍老者坐侍令少者一人讀古嘉訓巳正爲釋其義戒勸之衆皆揖而聽一人讀邦法已正立而宣敷之衆皆北向跪而聽讀旣正書衆名于冊列其所爲於側善惡咸具無惡者爲上善多者次之善惡均者爲中惡多者爲次中無善者爲下正飲衆酒位皆以其行爲差下者不卑酒不命坐三年而無惡者告于縣而復其身三年而無善者罰及之異其服不齒改者免之其善之目曰孝曰弟曰親鄰曰恤貧曰助同睦曰敏好學其惡反是保有學以教十睦之秀民四時各一㑹如睦制而略其教之法取其孝弟忠信之行取其端莊和敏之德取其治經而知理射而中習禮樂而安知書數而適用月試而升黜之升則於雍雍亦有學其教如保而加詳雍試而善則升于縣而復其家黜則于睦俾家之脩脩而有聞則復教之而復升之凢睦之民有未逹則問諸正正未逹則問諸學農而暇則惟學之遊以諮善言以法善行同睦同保遇相揖作相助語相譲飲酒相命召若族雖非同睦行族禮童子則學于睦之正取其群而和睦正保師雍長縣歲考其績而升易之爲此下疑有缺誤者其家復凢民力征相先粟賦相率上之所令胥勸而趋􅌾死而絶者食病而窶者敬德而文者執強悍愎而敗類者棄好侫而巧者此其要也持而循之使不至於壊謹而察之使不至於弊而朝廷都邑皆以禮爲治民寕有不化者哉由是道也近者十年逺者數十年周之治可復見矣嗚呼周之盛至于今三千年矣漢文帝唐太宗宋仁宗有願治之心而治卒不如古者以其不法古之道而失先王之意也道之行豈非難哉然爲天下者患乎無志有志無難爲也患乎茍安求安無難致也患乎畏事立事無難成也舉而措之如斯而已矣明教天下非無才也聚數萬之人養之十餘年而未見有一人可稱者養之無其漸而教之無其法也古之善育才者豈能益人以藝增人以智哉爲之之具素俻能使人以不成才爲病不若人爲耻各思勉爲君子而不可止也故自其少時居於閭族而閭胥族師不責之以敬敏任䘏則責之以孝弟婣睦其本固已美矣及其漸升于太學求之以六德以觀其内試之以六藝以觀其外行完而德俻藝成而噐良然後措之於用蓋其詳且慎也如此後之所望以爲才者執子弟於販鬻之區芻牧之塲𬒳之以衣冠而納於郡邑之學終歲朞月太學有徴焉則又納於太學計其所習曾未知拜跪之節興俯之容而巳肆然有爵禄之心太學舉而教之者又不越乎誦書業文挾弓矢角膂力恒人之淺事歴時未久有司有求焉則以應之卿大夫之位有闕焉則以爲之爲之者旣不自知其不可而命之者亦不責之以其所學於是學者以習恒人之淺事冐竊禄位爲得計莫不相勉爲恒人而自謂不必修君子之事也太學之所聚郡邑之所教咸有茍且之心無頼之行兾其才之成奚可致哉夫國之立學所以養才必不期其至此也爲學者雖無志於道德亦必不自望爲恒人也而卒不能有成者非他用之速而教之踈也古之六德智仁聖之事顔閔之所不能及六藝禮樂之度數節文孟子之所不能詳射御之工杜預羊祐之所不能兼書數之法君子猶有所未習今欲責學者皆法古人而盡備之宜其未易爲也然不法古人而惟弓矢膂力是效誦書業文是爲亦未見才之可成也然則何由而設教乎蓋聖人之取人德不求其全而取其不違乎道藝不求其俻而貴乎能致其精唐虞以九德待士而有三德者亦俾爲大夫有六德者亦俾爲邦君聖人豈不欲得全德之人而用哉以爲求人太全則天下無全才不若因德命官之爲無失也臯陶未必能逹禮益稷未必能知樂而益稷臯陶所爲之事伯夷后䕫宜亦有所不能然而數子爲之各稱其位而成名于後世以其精不以其俻也人惟行可以自圖若才與藝則有能有不能欲強而通之非惟不足得其所不能且將并其巳能者而失之故善立教者莫如本之以六行餘則因其質而設其科人有剛毅而重厚者有慈良而順愛者有䟽逹而明㫁者有強識而通敏者有沈勇而有威者有多力而任武者此六人者使曲狥衆人所能必不能堪茍因其所固有而教之於成才也奚禦剛毅重厚也必可以任天下之大事則因而教之博通古昔之政教周知海內之得失觀其損益折衷以驗其爲勿使色厲而僞者得參之則大臣之儲也慈良順愛者必可以治民則因而教之平賦施惠之方振灾恤患之道辨邪察獄之事理俗興化之要勿使柔佞而詐者得參之則牧伯之儲也䟽逹明㫁者則百官衆職之儲也強識通敏者則文學典禮之儲也沈勇而有威多力而任武則將帥之選疆埸之所恃也各以其所當爲者教之而皆不使近似可說之人得與則所用無非才而所爲無僨事矣此大學之政也而爲師者非其才德之美不可也大學推其法行之於郡縣俾亦以六科爲凖郡縣之取弟子貟也必問於其宗族鄕黨皆言其篤行而好學則取之而復其家田百畒入太學則倍復仕而有政則皆復學於郡縣者與郡祀與燕㑹禮異之使殊於恒人縣每科四人三歲各升一人于郡郡毎科十人三歲各升三人于太學太學每科百人爲率以應上所任用郡縣旣升而闕則即充之廪之也宜厚教之也宜詳試之也宜嚴用之也宜當人知學之可仕也則不怠於自修知各因其才而用之也則必謹於自立而天下之異才咸思有爲於世矣爲治者不患乎無才而患乎聚天下之才而不能教用天下之才而不能擇教之而能成其德用之而能不違其器則才何可勝用哉胡貊之富人聚馬盈谷而不得一善馬善御者執鞭䇿指麾而區别之一日馬之致千里者以百計而盈谷之畜無棄者御非能假馬以力而易其性也能别其高下而不失其性則善馬出矣爲治者能不失其性豈特不患乎無才天下亦安所患哉正俗行於一人之身而化極四海之內觀於數百年之前而驗於數百年之後者風俗是也故風俗之所成至㣲也其效至著也所係似小也所由甚大也不可忽也昔者楚靈王好細腰舉國之人皆約食束膂引而後能起慿而後能立伊川之民𬒳髮而祭智者知其變而爲夷風俗之端可不深察哉夏之忠商之質周之文其先之所尚傳之數十世而不變守之至於國亡而後巳其俗素巳定也故商之不能爲忠猶周之不能爲質也周公豈不知文之不若質哉至於商之末質漸散而繁文興矣周公知其莫可及也故因而文之恐其趋於浮薄也爲之禮以節之作之樂以和之惟其如此故能至於七百餘年然其後亦已不勝其弊矣戦國之世遊說之士螽聚蚊合以謟言邪說㗖諸侯傾動天下誠二代之所未有也由是生民日流於變詐豈非文勝之弊哉及秦懲其病遂坑殺儒生舉先聖賢之遺文餘法一火而盡燔之曾不師古而任其深刻巧苛之律不旋踵而遂亡其所尚非道故也漢興務以寛大更之法踈禁濶四百年之基用此以立然其時朝無人不知以禮義爲俗其所因仍大率皆秦制也烏望其如三代哉至於近世惟宋之俗爲近古尊尚儒術以禮義漸漬其民三百年之間宰相大臣不受刑戮外内庻官顧養㢘耻雖曰綱紀未俻其所崇尚逺非秦漢以下之所能及故其垂亡之際孀后少主旣巳就虜而其臣抱君之遺孤奔走海島誓天指日擁立爲帝朝夕請命如事神明卒之無一人有背叛之心至於溺死於海而後巳雖三代之亡未聞忠厚惻怛有若是者孰謂風俗無益於國哉且夫秦皇帝之死未久而其黔首相與奮挺而呼願食其肉漢唐之衰皆逼於其北面之臣而奪之而宋乃獨若此者何也秦棄禮義漢唐不知以禮義爲俗而宋風俗淳美故也假使宋無夷狄之禍尊其前世之俗國安遽亡哉以是知風俗之至急也宋亡元主中國者八十餘年中國之民言語服食噐用禮文不化而爲夷者鮮矣其初尚有一二賢者教之叅用宋法而亦頗以寛大爲政故民亦安之然而暴戾貪鄙用其族類以䖏要職黷貨紊法終以此亂其俗大壊以至于今譬如弊鍾漏鐻非重皷而鑄之其音不可得而調也夫欲因亂國之俗而致治雖聖人不能也勢不可也俗之旣壊則日甚而歲滋耳無以匡持之豈遂止哉今北方之民父子兄婦同室而寢汙穢褻狎殆無人理盂飯設七咄爾而呼其翁對坐于地而食之頑不知教其於大倫悖棄若此甚非國家之便也上下有則乃所以導民故古者士民不非其大夫今小民得以執郡縣之短長撾皷而訴之闕下弟子或訟其師子姪或證諸父禮義不立曷所不至哉法令非不明也有司按四方之罪非少怠也而犯者不爲衰止黠胥巨吏開口肆然徴取於人而不顧問之則曰行且輸作不取何以爲資或曰身死而妻子何所仰食姑取之以自給耳其設心自以爲明逹見執貧守法者衆且群指而咲之而其人亦不幸卒無赦以死於是益堅貪者之心小民轉之窮苦割剥次骨鬻産賃室以奉其無懕之欲非特爲此也國之大柄可以貧富者惟寳鈔爲然無頼之民聚徒勒板而僞之御史中使國之㢘察天下者安作妄詐男子假其衣冠符印乘傳而横行夫僞鈔僞官之律至重也而若不愛其死而冐之者豈誠不愛也哉彼見死者之多而死不之畏也且人雖至愚奚不畏死彼誠見生之不足樂也知生之足樂則安肯言死哉頃者冨民受挫辱於官府或禠其衣而跽或庭拽而詬罵其心大耻掩面而不敢見人里中弔者填其戸殺羊爲酒而祓除之其人亦終身以爲病况犯有名之律至於死地哉今人則俱不顧矣鞭一百扶而岀於外掲其瘡以示人咲談而道之人亦不以爲怪一百之刑曾不直舊時之詬罵刑愈多而人愈不知耻則刑之不足化民亦明矣故欲民之重死而難犯法莫如省無用之刑而以禮義教之夫牧者之於羊操長鞭而逺麾之未嘗及其體則逐逐然行矣茍歩歩而鞭之則必馳突散走而不可制故刑者非所以治民者也不得已而後用民知其不得巳而後用則烏忍犯之哉俗之不羙至此甚矣少遲而不變法令將不足禁之不可不深計也三代之變俗各視前代而變之元之俗貪鄙暴戾故今宜用禮義爲質而行周之制今周之制亦有行者矣學校非不立也鄉飲之禮非不修也然而俗尚未善者未嘗灼然示之以所尚也夫示之以禮義者朝廷之上皆不言他而以禮義御史出行郡縣不以摶擊人責之而責之以禮義化民之事守令者考覈之等不以興利增戸求之而求之以刑罪息學校興歲舉其孝弟忠信之民而尊異之使小民皆知朝廷之意在乎成俗而不求利在乎任德而不任刑則信譲立而㢘耻興㢘耻興而民重其死然後取先王防範天下至於七百年之法舉而盡行之三代之俗必復見而成康之治不難致矣世嘗謂古與今不同俗豈其然哉今也民啜粟飲水與三代之民同養老育㓜與三代之民同獨人君不可行三代之政乎用元之法而欲致古之治猶食烏喙而望其引年附獨木而濟大川也重爵禄以一人而加乎萬姓之上聚之為膠􅃮散之爲沙塵合之爲手足而離之爲仇讐其勢岌乎其可畏也然而人君䖏之甚安而居之不疑者以爲天下之人賤者待我而貴貧者待我而富且曰富曰貴吾有以命之則其勢不能以自尊天下皆有待於我而吾無待於天下是以籠絡奔走舉世之豪傑而恒以是驕之而不知此僅足以致狥世之士而不足爲高世之士之輕重吾以爲人必待我而後富貴尊榮也彼高世者方以是爲道德之累大言宏論辭拒退避惟恐爵禄之汙其身則人君安得以此致之哉士之可以自恃者無竆而君之所以致士者舎爵禄則無所可用用之得其道雖不能致高世之士猶可得狥世者而任之操貴賤予奪人之柄而不能用将使庸夫婦人咸自以爲高而謂爵禄爲不足貴此人君之大患而不可不察其故也數寸之節盈尺之綬何足以貴人而人知貴之者以人君不易以卑人知自貴重之道也凢物貴於不易得而賤於施所不當與未嘗拜人者拜一人焉則人以爲盛禮則拜在所尊矣逢乞人而與之揖則其拜爲不足貴而受其拜者皆褻而賤之矣方之爲天下者能使人以不得禄位爲不若人其心恒忻然有趋事赴功之心故上無求才之勞而下無曠官之憂執野人市魁而授之以大位士之賢者必曰我何可與之同仕乎哉由是䖏士以不仕爲尊以遺世爲高而訾爵禄爲不足貴海内皆有無求於上之心人主提其空名將安所用乎賈於千家之市欲使千家之人日爲市於其門猶必權物之價使人不能賤其物操區區之空名欲俾智者盡其謀才者效其功勇者陳其力而不使人知自貴之道謂之善慮天下不可也德可以爲公卿吾從而用之於大夫士之上則居其下者莫敢不服德可以治民吾從而加諸斯民之上則爲民者莫敢不服上之所用舉可以服人心則高世之士無可容而爵禄重矣不能服乎人心人君之權下爲清言横議之所奪而其勢渙散而不收則何所不至哉正服善治天下者常迎斯民好慕愧耻之端而導之於不言不動之中使之身勉於善而不自知勑之以辭說敺之以賞罰而強斯民之從之者化之至淺者也夫民雖有昏明愚智之不同然未嘗無所好惡也好之而未得則慕心生惡之而不能免則耻心萌且貧賤家之竪子𬒳以華衣羙服則欣然喜巳不得有而見富貴家子之勝巳則赧然愧矣其喜與愧豈有教之者哉發於性本於天莫或使之然而不能已耳聖人之爲治常因其天而順導其性寓可慕可耻之噐於人所不可離之物俾民目接乎此而心化乎彼無爵賞之誘而其勸有甚於爵賞非鞭朴之威而其懲有甚於鞭朴用㣲而效速意宻而化神者其惟衣冠之品上下有制之法乎昔者成周之盛其爲制蓋詳矣天子諸侯以下自九章至於一章自十二旒至於三旒其曲折粗見於經傳而庻民之制之詳無聞焉獨禮記者曰野夫黄冠掌禽獸玄冠綏武不齒之服也縞冠素紕而綏五寸惰游之士也由是而推之其寓懲勸之意於衣冠之􅎖蓋甚俻矣夫頑悖之民刑其體膚創愈則痛平書其罪惡歲久則書亡曷若因其致飾之具别以美惡之等俾服者思其爲可耻而慕乎善觀乎服可耻之飾者知其爲當戒而禁乎惡之爲著明乎蓋天下之民非可以一途視也或誦法堯禹而惇行道德或縱情逞力而干抵法律其相去不啻十百士君子揖譲雍容習爲卿大夫之事而卑賤之夫負任奔走出入于泥塗草莾之間苟㮣而同之則何以别賢否而示貴賤哉成周之制意必有以䖏此而其詳不可悉考矣欲談先王之治者宜稍定其儀則凢士農工賈技藝百家之流於其冠服各爲表識而以其人不以其族有德之君子化行於鄉黨及衆所擯棄作過𬒳罪之人或異其制以爲懲勸亦不以其族而以其人非士族而有士行者進於士族尊之而爲不善者服以其服而居民上者又接士君子以禮待庻民衆流以法㣲示意嚮以聳動之民見有德者之𬒳服美而邪慝者之可耻也必勉於自修見爲士者之尊而執藝者之卑必慎於擇術天下皆慕而欲爲士君子斯民孰與爲不善而禍亂何自而作哉世主無不欲斯民趋善而去惡然而法愈煩而惡不止者不能迎其慕耻之端而使之不知善之可慕而至於無耻也故因其良心之發而導之則㣲示吾意而有餘䘮其慕耻之心而令之雖迫之以刑誅而不足夫以刑誅之不能禁之民而欲其見吾區區之冠服而化此世俗之所惑也然是民也與三代之民類也畫衣冠而不犯者有矣刑措而不用者有矣聖人果何以致之哉蓋其施爲有本末而導之有道化之有方也事之要固不止乎衣冠之有制而衣冠之有制豈非王政之所當務也哉臨海縣知縣黄誥黄巖縣知縣張師善台州府儒學教授尚芳訓導李深黄巖縣儒學教諭文程府學生陳縝葉琰王梅齡臨海縣學生李臨卿戴濬之黄巖縣學生孫思光牟汝鈞校對遜志齋集卷之三終
