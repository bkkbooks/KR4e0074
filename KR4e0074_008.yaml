front:
  text: 遜志齋集卷之八
  hash: sha256:15088a09ebc226f1ed254edfa1bc9ace24093cec2ee657b35ce990876883ff4b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4e0074_SBCK_008-1a}
body:
  text: 中順大夫浙江按察司副使奉敕提督學校雲間范惟一編輯奉政大夫浙江按察司僉事奉敕整飾兵備南昌唐堯臣校訂中順大夫浙江台州府知府事前刑部郎中東吳王可大校刋雜著考祥文孰為祥乎匪物由人子孝臣順父正君仁是之謂祥數者咸備雖星殞地裂不足以為殃苟尖其道上下易職尊卑乖序雖芝生宫寢麟鳯在郊於祥何取世之人弗思求祥於物不知巳之躬有祥攸出為善于家祥實基之不勉巳而循物禍之所隨戒妖文人知物之妖而不知人之妖知人之妖而不知妖自巳招山崩川竭雖為可畏嬖庸賢遁尤為可懼牝晨羝乳人以為異斁倫敗俗其禍尤著嗟乎今之人樂妖為祥行如跖蹻喜色揚揚哲夫旁觀股栗心掉彼謂無憂酣喜譁笑天縱汝為妖吾則莫知苟自人興汝寧不思誚伯牙文世傳伯牙事陋矣張文潛為賦哀之其辭信美而其義尤陋也余讀而鄙之為文誚伯牙且正張子之陋其辭曰戰國之士好夸嗜毗恆詭實以求合不顧人之是非於斯時也求自重而違世者嗟吾舍子而稱誰然於子有憾焉蓋惜子為藝也善而為識也卑君子之學自得而已苟余中之有樂遑恤世之愠喜感子期之見知遂絶絃於既死悲乎陋哉子之志也知子一人不知舉世使夫人能識子則何名為絶藝俚歌巷語嬰孩啓齒惟其不知乃為至貴子之不幸子期是值忘子之惡舉子之愛俾爾望於人也過深而得於天者不至子誠有以自適天地日月草木庶類舉目欣然皆識子意苟為不得雖子期接踵譽言盈耳亦何預於吾子且夫全於天者不求合於人志乎遠者不取效于邇嗟伯牙乎爾曷不以萬物為一身以太虗為知巳等毀譽於浮説而遊心乎沖漠之鄉下逮乎無窮上泝乎無始以與無耳者聽無言者語奚為栖栖焉隘狷而可鄙此藝之所以為小技而豫固不足與聞乎此也耶吊茂陵文祗明祀而言旋兮指槐里以西征停䇿憩于道旁兮覩高丘之崢嶸即故老而訊之兮惟漢武皇之茂陵整冠裳而疾趨兮蹐遺廟以屏營凄風起于叢棘兮鼪鼯嘯于幽塋慨雄心之靡托兮悲曼志之無成惟君皇之御極兮遘炎靈之方熾陋堯禹為未足遵兮卑祖武而弗肯繼內瘠民以自殖兮外震威乎遐裔騁車轍于八荒兮候神人于海澨建千門與萬户兮殫土木之奢麗希軒轅之騰化兮永傲倪乎斯世何盛業之易墮兮洪謨鬱而難宣雖暫弱于戎胡兮生民疲弊而不痊竒禍機于巫蠱兮妃㣧丁毒而㗸冤諒逞心於屠滅兮抑天道之致然闢土疆之宏廓兮曾玄官之莫固赫兵革之繁庶兮委守衛于草露城闕之崇敞兮求斷礎而無所後宫之韶冶兮僅或傳其冢墓像祈連以旌武兮想壯魄之巳腐嗚呼哀哉形必有盡兮孰不有亡匪君皇之獨然兮尚奚為隱憫而回遑惟祈生之巳甚兮或妖誑而過望謂長年而卒老死兮斯足垂戒于昏荒明固有所不逹兮智固有所短偉才略之英邁兮哲與愚其相半賴表聖而黜邪兮兼善悔而能斷雖人恫而財竭兮終克免乎危亂悼往者之無知兮尚來者之可諌感盛衰之相襲兮仰昊天而永歎籲天文維洪武十四年歲在􅉝酉六月乙卯朔下土臣某謹稽首昧死言維天生人厥質匪恆君之惟后淑之惟師匪后無以厚生匪師無以惇理位有隆卑其任惟鈞天降疪民不靖乃生越二紀兹甫受師后之功孰迪彛訓俾弗沉迷時惟臣師實宣若皇命肇小大遐邇民咸若德蹈則庶邦底寧忠順徴嘉不自引伐亦既致厥事心罔或弗念帝室肆仲子元孫顯𬒳寵命咸率履攸行弗越謂后惟天惟父惟天下蒸民主曷敢不祗順暨躬暨嗣人曷敢弗伏思錫繼忠孝于將來時飲啜曰斯我后之德時逸燕息曰斯我后之惠逺臣耆艾童弱戴后德允若臨視栗栗肫肫罔有違乎昭憲誠亶篤冝聞于天天曷不易諶乃裁降之大戻恫戕厥家播流于西邑耆臣黃髮邦之寶龜灼知幾先邦之水火灼資民庸邦之粟帛民賴以生今曷使匪辜踐艱荒民罔不大惻曰曷自遺耉成人繼自今民何鑒何式何賴以永存如父母罹凶災罔豫矧臣承導愛愛德施弘章肇閔閔心隱痛若弗能生念凡民師猶父母父母疾眚子籲祈於天天必閔應臣自兹始祗陳厥由臣有壽年祿慶在天未逮臣身願輸弗享以延師之修齡啓帝心俾師克復故里居建乃家勿墜庶海內民有仰邦國有望臣死罔悔惟天鑒民誠誕敷休命匪臣蒙嘉徴將兆民是賴臣聞曰民雖卑誠靡不格天天雖尊惟誠之從嗚呼皇天其尚閔兹臣小子未有知惟天其惠綏休命告風伯文舟楫所資惟風與水二者皆得一日千里其或不然水戻風違只尺莫進如受縶維今赴京師舍車從汴河決梁陳茫無畔岸所兾清風送我于南風乃逆施不可以忱篙人櫓工流汗成雨白浪湧騰抑退軒舉歲當大比群士畢來天府奉詔俾擇其才時有常期勢不容後風茍尼之果誰之咎帝御九州事天敬神凡爾百靈孰匪帝臣邦國大事在乎取士不能體國亦神之耻咨爾風伯幸停怒威亟北其旋翼舟以飛三日之間逹于畿甸我期不愆神亦罔怨百靈洋洋儼乎在前豈吾之私帝命是虔里社祈晴文民之窮亦甚矣樹藝畜牧之所得將以厚其家而吏實奪之既奪于吏不敢怨怒而庶幾償前之失者望今歲之有秋也而神復罰之嘉榖垂熟𬒳乎原隰淫雨暴風旬月繼作盡撲而捋之今雖已無可奈然遺粒委穗不當風水衝者猶有百十之可冀神曷不亟訴于帝而遏之吏貪肆而昏冥視民之窮而不恤民以其不足罪固莫之罪也神聰明而仁閔何乃效吏之為而不思拯且活之民雖蠢愚不能媚順子神然春秋報謝以答神貺者苟歲之豐未嘗敢怠使其靡所得食則神亦有不利焉天胡為而不察之民之命懸于神非若吏之暫而居忽而代者之不相屬也隱而不言民則有罪知而不恤其可與否神尚決之敢告告佑順侯文古之人以守鄉邦為榮者豈以父兄宗族親戚友朋之所在一旦出人所不意傲然官府之上賞罰豫奪千里之內為之榮哉吾生乎斯長乎斯飲食乎斯學問交遊莫非斯郡之人則知其風俗之盛衰究其民人之苦樂莫吾若也幸而得民牧之寄除其所苦副其所樂革吾平日之所甚惡施吾平日之所欲為使一郡之民皆與𬒳吾澤斯其所以為榮也雖然守之任有常歲人之禍福不齊有及終歲者焉有二歲者焉百一之中或至於三年則又徙而他之矣雖欲盡其心智殫其材力不可得也今君侯以康之人生雖不得守鄉郡沒而為神受帝明命合享廟食於數百里之內朝廷褒幽德録利功錫爵為侯冕旒𬒳裳秉桓圭坐乎殿堂之上鄉郡之長老子弟奉幡弊具牲酒備樂歌拜跪祼伏乎階圯之下無間深山窮谷望望而有之今二三百年矣君侯之榮勝於守鄉郡者豈不逺哉然榮之大者其責任亦大不可不思也某天台之書生愚不足以知鬼神之故以所見者料之上帝不猶人主乎君侯不猶守令乎今有守令受人主之爵祿而不治民事又見小民之急而受其貨財酒食既巳得之而漫弗省其所苦小民不赴而訴之則人主且察而誅之矣今當六月而天不雨禾黍焦然欲死小民無所控語持牲醪禱乎君侯之廟者相繼也君侯端坐而享之未嘗有所或拒又不告之帝乞涓滴之水以潤下土在他人不悉生民之苦者猶不當爾况君侯父母之邦乎君侯不能辭其責也審矣然而守令若此則上有人察之下有人訴之上帝之憂閔下民豈有任不職者而不怒其怒與否固不可知然而小民亦不訴者以無所訴而遂止是小民至愚而不知禮也惟禮年榖不順成變置其社稷土榖之主有功於萬世一不順成且得而變之况君侯乎君侯不可自恃也明矣夫禮夭之經也人奉天經以行則猶天之為也未見其不可也人謂神乃帝所命人不得而變是不然帝無所私其好惡視乎人人之好也帝亦好之人之惡也帝亦惡之向以此郡之人懷君侯之德故帝以命君侯帝之命君侯者以君侯能澤一郡之民而知其利害也今君侯有民而不恤受民之祀而不辭帝苟聞之責君侯豈其難哉君侯若此非特此郡之人可廢君侯也君侯之厲民不仁也受祀不義也以此二者有能率民數君侯而墟其廟廢其祀是天之所甚豫也况君侯天下之偉男子以生民為心之日久矣其忍視民之窮困而不救乎君侯其勿謂某不為也某腰下有三尺劒欲為四海除患救害每見民之憂苦輒作蛟龍鳴思擇其尤者而少試之君侯幸無忽倘三日不雨當先拆君侯之廟投之於水恐君侯或蔽於左右近習而不知故先以告君侯其深念之無悔核咎賦敷言而兮秉吾志以陳辭質尼父以為理兮要子輿而無私爰抗志以邁往兮火中以為期匪道術吾弗懷兮匪聖哲吾弗師朝既遊於貝闕兮夕又息乎瑶之圃睹珍瓌之溢目兮胡獨猶豫而不取豈味惡乎斯類兮恐心淫於可喜寧不美夫琛璧兮匹夫懷之而禍巳䇿余馬乎會稽兮探神禹之祕穴悼道文之湮喪兮之惟輟北吾濟乎大江兮抗吕梁之驚濤衝風擊以溧潏兮虬螭號進只尺其莫遂兮忽回薄如羽毛繂絙設而奚施兮慘恆沮以煩勞豈好逺而負重兮將弘毅以作聖苟斯道其可望兮雖瀕死吾何病朝一餐而忘味兮夕假寐而不安若芒刺之窒吭兮既決去而能言踵四瀆而東鶩兮挹山川之龎淑岱宗屹乎北屏兮鳬與嶧其聮矗兩觀芨其如塌兮欽明刑之震肅跽舍萌于杏壇兮盻隹植之森若迹雖存而世久兮欲咨詢而未能魯周公其已衰兮文獻泯滅而誰徴倚壤垣而大息兮問吾生之已暮俾覿聖而友賢兮豈不顧乎此度喟揭復乎盛時兮固宜冥趨而步昔子輿之有言兮謂凡民乃有俟豪傑謇其時出兮微文王猶興起余雖不及古之人兮幸賦豫之靡異帝既命之以至純兮親又迪之以逺志曰聖言具在兮爛日炳而大示能潛心於求索兮敬典敬其致何有積而不增兮孰云行而不至恭昭訓而自省兮震雷霆其若驚從洋洋之江海兮蹈疑澌之始冰遌微入於中流兮舟楫而兮執汝操之弭貞神安余以兮昭明而光大兮曾不越夫一語無嶢嶢以為大兮無以為頗無矯矯以為直兮無營營以為阿詭而弗卑兮正而弗亢無易合而難知兮有難近而可尚剛毅聖之所取兮柔彼務私而苟恱兮知其中之匪仁道乃貴乎有名兮所處衆忌而莫辭兮同群猾之攸懷斯言之不能忘兮吾意之未堅始敬而不怠兮兹少逢悠楊蛾眉之姣好兮衆女怨其殊特繫孤鳯於雞鶩兮與之兢食屈姱麗於文辭兮黨人譛而放黜賈正言而兮椎魯惡而逺斥頥蹈道而則聖兮邪交謗為鬼蜮立言而輔經兮憸鄙訾其悖德自古昔而有然兮矧菲薄之極愚彼設而坎宑兮懵不顧而徑趨鳶帖翼而下搏兮孤雛以為狼妥尾而伏伺兮犢衝突以為侶禍恆隱於不測兮謗恆發於不疑悼不智而受侮兮何彼人之足尤覽先哲之好修兮微而不揚方進鬻而其所為相兮趙堯果代乎周昌語終而降拜兮美郭奉之善誘縱賢於同類兮夫豈足為師友以倒屣而見􅙾兮弘知枯之將貴修虗挹於周英兮曰非敢抱朗明之精誠兮又重之以無在此曹無損兮其見如先後之胥接兮固代謝之恆理擠俊而訕哲兮而何耻繄人厥有之命兮豈毀譽之能移諒勞心而何益兮哀德於人兮毀與皆可師譽兮毀昔忠人謂何兮明􅉃戚於細故神不於兮乎九土前三秋而無始兮後百世而無終起何異蜉蚍與蠛蠓馴麒麟以駕軛兮繫兮鼓元氣而凌鴻𪷟吾將視天閴兮責於外物兮期企乎多缺誤靜學齋賦惟昊穹之玄默兮備恆道以示日月煥其錯行兮紛布展肆一呼而一吸兮為發育與揫斂群物從而榮悴兮隂陽其舒慘大莫踰於嶽瀆兮小莫至於昆蟲顯何遇而弗兮隱何感之弗通且深廣兮夫何術而能極靜靜乃動之根兮五氣上噪行而妄動兮庶類之營庶類之營化其無成矧同人一心兮應外觸乎紏紛匪澄明而靜一乃如絲而如棼者聖師之無憲猶日潤指昊天以示人兮欲無言而默運猶賜之善辨兮謂辨豫謂未知顔氏顔氏如愚兮亟楊言其庶幾嘉木訥之近仁兮佞之為而潛思兮弘猷之在兹維周氏後作兮興紹千載之遺統揭道奧為圖書兮曰主靜以制動何明者之通逹兮瞽者從而逺之道昭昭其孔彰兮昧者棄而材之得失兮恐利口之深詭雖榮盛而切兮何異螻蟻余少志乎行道兮獨慕乎前修有虞信莫京兮餘可以以為逑摽禮樂以為楫兮施仁義以為舟濟漫之洪波兮冥斯民於樂丘忽有悔其不然兮知余台之未至欲以靜而為學兮庶來者之可兾且潛心於沖漠兮夕重之以乾乾攝衆衆而靡形兮中扁湛其若淵交至而弗勞兮如水􅉼而鏡受未至吾弗迎兮既往吾弗咎懷明德之在已兮耻流俗之狂狷若默而行正兮惡夫飾貌與多言示狙猿以周禮兮競呌噪以固歎知我之無人兮嗟斯道之難遇何朱氏之好修兮先之中情敢靜學之嘉名兮銘齋居而服膺賢聖匪降自兮修道以立成尚慎終以弗怠庶言之可徴多缺誤憫知賦哀葉廷振塊居幽而處獨兮藐昧陋而遘屯視冥芒而無覿兮聽矘昏而無聞疲精思於編簡兮馳志慮於遺文悼往古之莫吾與兮愧當今之莫吾親夙吾秉兹姱志兮泏宇內而求友既高采兮亦微容而寡受紛瓌琦之豈無兮逞珍麗之叢揉驟而俄踦兮或始揚葩而遽朽棼藝藝之易逝兮莾悠悠其何之恍晤言之猶新兮倐墓草之巳滋睇昊天而太息兮俯長川而增悲望斯人之不淑兮慨吾道之將微惟之靈霄兮美之子之挺秀質顓醇篤敏兮父師申之以告詔博載籍之淵粹兮騁俊力於文囿鈎群言而交貫兮逈孤舉而奏應薦書於辟雍兮再而再進却曰吾慮道之未修兮行吾志之靡獲衆喧闐以衒鬻兮兢攘竊而不怍苟得之以為宜兮失怨悱而不釋快庸目之矇眊兮機詐陳而自賢蘇腐檪以為芳兮譽沉檀而斥龍涎進龜實豆兮毀搗珍為穢膻獻蒯枲以為領兮謂錦纈可苴履舞山雞以效祥兮威鳯羞而羽既自欺以惑世兮世亦安之而不顧孰若子之誠一兮於名而實冨在往歲之孟春兮斂舒舒而來翔繩吾以儀則以文章醉稱觴以孰寐兮恭眩惑矣九州之廣大兮固三代之疆何賢哲之寥兮不逮古之多士天既生而偃之兮人莫窺其太始將忌能而嫉智兮天與人其同致昔洙泗之啔聖兮異才森其並出大或僈於造邦兮小猶易夫千室使僅得其一二兮真足極斯世之遺失嗟呼不及古之人兮又無友孰自律受形氣於大化兮知終盡之有期生有益之為美兮何壽夭之足議松柏薪於空山兮與朝又何異生有樂而可耻兮死有厄而足貴吾矌觀乎宇宙兮等萬古於一漚揆庶彚之消長兮審二氣之所由山有圯而合兮川有壅而為丘化昭明於腐兮鑠覆載而不少留彼天地山川且有澌滅兮矧天人復誰重日佩美兮襲芳宛可慕兮難忘竭逝去兮何為生不永兮使人悲庸多壽兮哲夭般兮誰究誰考遊太𥘉兮返其真愚風霆兮挾星辰帝視下兮察其仁異才降矣後復多缺誤友筠軒賦惟青青之玉立俯漪漪之軒搆憩樂矣之幽情處蔚然之深秀蒼雪灑乎涼颷緑隂蔽乎清晝春之時也暖律乍起和氣方制對穆穆之龍孫列斑斑之鵷行風節持以雅素體質直而端莊其夏色也南薰解籜丹鳯來儀香馥纍纍而貝簇密葉重重而翠圍笙簧弭乎節奏珮玉鳴乎參差䀝佳麗以褒雄據靜便而伏雌若一塵不到之際萬事脫羈之辰渭川致乎斯景黃岡寓乎此身風徐來而韶合雨𥘉歇而香勻至若色侵書帙涼溢芳樽日穿漏以噀金水環回而嗽銀座擁碧筒之杯地敷翡翠之禋或彈棊而雅歌或解衣而脫巾或焚香而啜茗或聮句而鼎真固平生以足樂雖百罰而弗醺越若秋之與冬金氣肅兮萬木凋玄冥降兮群隂驍履霜兮氷將至擁枯拉朽兮焉逃稟抗雪之英姿健凌雲之高標或強董宣之項或折陶潛之腰或簇白雲之調或作重華之韶既不婉以不麗亦弗矜而弗驕世上有玉堂之貴此豈無甕牖之安乃緩步以當車復謝崇而慕間彼將聽晨雞而拜楓陛此獨咀明霞而扃柴關忘情於漢庭之寵避世於商陽之山至於侶魚蝦而友麋鹿豈復對隆凖而瞻龍顔采玉芝於蒼煙之表洗兩耳於清溪之灣然而清則清矣未有得兹軒之真樂者也辭曰清清兮歲寒之心溫溫兮琅琳之音君子居之兮實獲我心正俟命兮履薄臨深君子處兮慨古傷今古人汨汨兮誰爭子所𬞞一器兮酒一觴樂以忘憂兮歲月長羌彼五陵豪冨兮乃積乃倉朝重白璧兮莫手粃粳松花飯兮荷葉衣瞶兩耳兮逺是與非朝其遊兮莫而歸安得從子兮其樂有餘鄭氏四子加冠祝辭浦陽義門鄭氏十世之長仲德父以禮冠其從子杓及諸孫燧爚耀而以字為屬余惟冠禮之不行也二千年矣舉曠古久弛之禮而行之夫豈為耳目之美哉亦曰以古君子成人之道望乎子若孫爾上以古道望其身而不能以君子自望謂之愛身不可也余欲四子者為君子故因字以勉其德杓之為用惟絲是理字曰叔理欲其精敏不懈以周乎事燧以改火民用是資字曰允資欲其致用于世而不爽於宜爚為光明明不進乎上則不能逺字以允進使進乎善耀者輝之著苟充其內則其輝也益遐而晢允充是字俾篤實其中而致其昭也大余於四子蓋各有望焉不為無意也四子也豈可不勉以違父師之志乎祝辭曰加爾元服維兹令辰匪飾其外貴乎成人昔未有知德或未備人曰童子冝有不至既峩爾辨而童厥心人謂之何責望也深一言之善終身行之今字告汝維名是徴杓之為器絲用以理解纇析紛莫切乎此以理字杓其義孔章用之於身既要而詳天下庶事紜綸舛錯如絲之棼不可控索急之則亂綏之則艱無為則弛有為則煩曷以治之其要甚寡知要則為優於天下人心之明與天地參何逺弗該何微弗涵養之以敬以澄其內制之於義以應乎外肫肫其誠允烈其光如揭日月以燭四方以理庶事靡有滯失孰能致然大本既立由身而家自家而推有以應物何適非宜曷以惎爾聖賢之事勿謂難能與汝不異生民所資菽粟為甚茍微水火曷以烹飪火之為用與菽粟同此落二句古者用燧以寓政機榆柞桑槐各資其時字曰允資於義其可望爾致用比德于火酒醴牲牢或可暫違一日匪燧民實阻飢凡此生民孰資以立蓋有君子進其不及養之俾生導之俾成植其彛常牖其天明致用之功與燧無異何能濟物是在材智爾欲為燧惟德之修有以資民民咸汝求人之有心孰不思善惟其無學所思不逺學以為本篤行培之仁居義途勿怠于為政飾于家洽比閭里暨躋于位惠澤彌溥率履弗越斯謂允資貴成厥躬賢者自期惟古有訓冠為禮始曷始于茲備服致美玄端而袒人必尤之佩而不冠則爽于儀致飾于外惟備之務盍思厥德寧有未具爾生名胄有伉其門曷以永家在爾後昆爚為爾名光明是勉眀不上進所及不逺字以允進以逺為明匪字之美尚躬于行曰之方升其輝耿耿愈進而崇無物不炳譬諸為善其始甚微日進月升譽聞赫熹恆人之身望為聖賢其功之難有如升天進而向上靡有弗至謂吾豈敢斯為自棄天賦明命曷有不完久蔽而昏盍識其端人怠以嬉獨奮于學學功既進乃亦有獲衆怯於善獨勇于為善集于身進德之基勿怠其易勿畏其難勿移于昏惑於人言日有孜孜惟道是信緝熙于光明斯為允進古制名字以號其身匪欲務美以夸於人後之命名取義甚備能思而行猶古之意爾名為耀耀為輝光曷以字之允充孔臧惟天之運厥章爛然日月迭行星辰照宣天胡致斯陽體充實積中既久光華外溢地厚而廣克配乎天實弸乎中至文發焉其在聖哲煥其有章秩秩而隂煌煌而陽視于其身威儀甚都發為辭令為世大謨豈欲其然外施厥美道德內充不能自止至足而流至美而發雲蒸雨潤靡不暢逹今爾何學稱兹嘉名苟能充之何德弗成出言則思聖哲是效舉足則思前武是蹈於親而孝而弟而兄自卑而尊無不敢承曰聖若兹我猶未及夫豈非人敢不汲汲仁覆天下智周萬彚吾獨何為而有未至知之使明踐之使弘反求諸心使及于誠涵蓄既深遵養既美光耀旁燭孰之能禦世不知道習陋安卑聞師古人不訕則疑慎勿類斯勇往獨覺允擴充之匪聖焉學釋思辭翰林待制華川王公子充奉使雲南十年而未復其冡子綬作思親之堂以寓其望慕之意而少子紳復為賦以自閔其志切其辭悲讀之可以流涕也夫父子之恩天性也豈有紀極哉孰不樂乎字養承事於安泰之時而有不獲者命也命非自我出者君子盡其所能為而已矣其如天何哉余悼二子之志推其故以釋之始發乎情而終歸諸命以冀其定焉辭曰悵獨往兮何所天廣地遐兮道囏且阻鯨鰐據川兮陸有兕虎蠻之人兮不可處君不歸兮將安與我思君兮我心勞苦楓櫧葉暗兮霧杳冥毒氣漲天兮猿狖又鳴蠻之人兮鳥獸嚘嚶𬒳髮兮倮行血為飲兮齒頰頳君之處兮誰為朋冠裳兮佩玉乘文駟兮蔭華屋俊彥兮汝從倡汝和兮往余復愈樂兮恬康尊盛兮朗融曷不歸兮蠻夷之中彼豈汝悅兮此寧不子容我思君兮意安窮翕翕兮俟俟汝閭兮汝里食有黍稻飲有醴有豚兮有羜繳有鶉兮罟有鯉有子為養兮羞服溫旨望不還兮悲莫止崇堂兮邃室陳罍兮肆几便心兮佚體眉壽兮樂愷君胡為兮去此我之思兮如水孰不安兮故鄉逖獨處兮蠻㐬謂誰兮使然皇有詔兮孔明天穹兮在上命在人兮昭章貴我兮賤我疇能違兮天常既知命兮何悲聖不遇兮矢言居夷秉至美之在余胡不可兮懌怡由余兮季札夷之産兮􅐶哲諒何所之無士兮道焉往而不合菅蒯可以為服草木實可以為粻舍故鄉可無思兮皇之恩不可忘恃聖明之大德兮終擴闢此殊方操吾節以來臨兮縱遲暮兮何傷文會疏伏以道術之分九流儒者實禮樂之宗主浙水之東七郡金華乃文獻之淵林在天纒為婺女之墟於墳籍資賢人之聚自宋南渡有吕東來繼以何王金許真知實踐而承正學之傳復生胡柳黃吳偉論雄辭以鳴當代之盛遂使山海之域居然鄒魯之風天實啓之世有作者惟我朝創業垂統之𥘉載得華川潛溪之兩公或以誠篤博大鎮朝廷或以忠節剛方聞夷夏修九十三年之元史為百千億載之成書雖盛衰榮辱所遇難齊而道德文章俱垂不朽繼其後者夫豈易哉恭惟仲縉先生推其學則潛溪之門人論其家則華川之愛子耳濡目染於斯道斯文之懿不出於戶庭而得之心解力行於厥父厥師之傳能紹其箕裘之業矣是以名播萬里來覩王國之光經授諸生聿佐郡庠之教夫成都自文翁興學不乏楊馬三蘇之才况賢王尚文巳成周召二南之政教化行而風俗美固曰本於人君師道立而善人多是所望於吾子尚念淳熙乾道之大統皆振民育德之宏規夫何近代以來徒為謀利之具慨想一時之群彥鮮不隨波而逐流苟非振古之英賢孰克任重而道逺本六經而敷五教慎無負於孔孟在天之靈備九德而配八元庶有待於唐虞致君之士謹疏建祖祠移族人疏舉觴而酹先酒蓋思麯蘖之𥘉秉耒必祀神農尚推粒食之始况夫人之眇質皆先祖之遺休堂構積纍世之勞疆畛有無窮之利儻食焉而不察反二者之不如是以宗廟為先著諸經禮有田則祭具列聖謨苟存仁義之心敢忽祖宗之祀余家爰自前宋以至于今上下三百餘年繼承一十五世雖絶續盛衰之互見而東西前後之分宗凡此比屋之人孰非𥘉祖之㣧然支分派别本源既逺而益踈世易人亡祠祭僅存而無統或苟簡而不循乎禮或怠惰而不當乎時盂飯杯羔曷寓如存之敬桑樞甕牖莫棲來格之神兹欲創建新祠合祀群祖四時仲月有田者各伸報本之誠一姓亡親無後者咸享祔食之祭明同祖之同體嚴事死如事生上以萃高曾祖考之靈下以洽兄弟子姪之志燕毛序齒佇觀睦族之歡鳩財僝工請盡奉先之道在我宗屬各單厥衷無或乖違以忝吾祖府學生陳縝葉琰王梅齡臨海縣學生李臨卿戴濬之黃巖縣學生孫思光牟汝鈞校對遜志齋集卷之八終
