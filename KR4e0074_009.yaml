front:
  text: 遜志齋集卷之九
  hash: sha256:1e04e74378e5a108467a2388f30565dfc60e3aa70860c2da24c5e0346e2c0152
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4e0074_SBCK_009-1a}
body:
  text: 中順大夫浙江按察司副使奉勅提督學校雲間范惟一編輯奉政大夫浙江按察司僉事奉勅整飾兵備南昌唐堯臣校訂中順大夫浙江台州府知府事前刑部郎中東呉王可大校刋表箋啓代董學士表嘉議大夫禮部侍郎兼翰林院學士臣董倫伏以七月十三日手詔賜臣御書怡老堂三大字及髹􅃮几玉鳩杖各一者臣誠惶誠恐稽首頓首伏言聖慈軫念特降殊恩閭里傳觀欣逄盛典誠千齡之竒遇豈一巳之私榮伏念臣素無閥閱功勞兼乏智能才藝徒知篤信於古道自分無用於當時幸蒙高皇帝之知忝拜左春坊之命任臣以兩宫輔導之軄稱臣爲三葉帝王之師自愧學匪經綸功虧啓沃切覩聖道之淵懿皆由睿性之高明豈有㳙塵可禆海岳恭遇皇帝陛下傳大舜精一執中之語以武王崇德報功爲心能自得師與人爲善念臣久陪於硯席憐臣逺寓於夷蠻踐祚之初馳書以召蒼顔白髮越萬里而來歸金馬玉堂想十年之如昨入承顧問喜動聖顔出侍班行驚非昔侣陛下存求舊之義推養老之心既俾正席於詞林復令伴食於宗伯錫以田土欲使之富頒之第宅又遺以安㫖酒時出於大官華衣每裁於天府寵榮兼至慚懼已深豈意宸眷益加禮文彌盛髹几玉杖法古制之多儀奎畫雲章錫佳名以怡老朝署誇其榮幸縉紳嘆此遭逄惟漢顯宗稱能養老迨宋仁廟亦克尊賢然桓榮設几杖於太常而不聞有宸翰之賜晏殊題舊學於神道而不見有几杖之頒在於昔賢猶難兼乎具美愧茲老朽乃得荷乎鴻私此於聖徳之增光豈獨臣門之多幸自今持杖以戒噎則當思四海或有饑餒之民凭几以安身則當念一物或有失所之嘆至於瞻心畫之優禮永誓教子孫以繼忠嘉謀嘉猷敢不以時而入告聖明聖壽願祝與天而長存臣無任瞻天仰聖荷徳感恩之至謹奉表陳謝以聞洪武某年某月某日上蜀府箋將仕佐郎漢中府儒學教授臣方老孺誠惶誠恐頓首上言祗奉恩言特頒名劑禮超望表愧發喜中臣聞古賢君之於臣愛之而欲其久生故待之亦無所不至或以珎羞養其氣體或以藥石輔其衰羸盖其人皆當世之逹尊故斯禮爲無窮之盛事臣以駑下之才朴陋之學以言乎窮理則未逹天人之原以言乎力行則僅守聖賢之訓性質迂緩素無應世之長辭語拙踈又乏匡君之術徒以粗嘗講道從事求仁欲寡過而未能豈希賢之敢望茲盖恭遇殿下居真王之位禀將聖之資言行政事無愧古人被服造次必於儒者五行俱下而一覽不忘六經並治而萬理洞燭虚心典學篤志親賢既得濟南之伏生復思天下之善士旁諮文獻逺及庸愚謂臣趍時之技雖不踰於常流而行巳之方竊受教於君子猥加優禮待以温顔進對不名從容侍坐華衣美食愧無𥙷於絲毫甘酪醇醪感親調於匙筯方念報恩之無所豈知賜藥之荐加味本和平元氣無傷而有益功存爕理外患不伐而自除譬諸善人之爲邦常收久逺之效自慶病軀之蒙福必有痊復之期惟賢者之盛衰係斯文之命脉願推博施之徳咸歸樂育之仁顧臣軄業有程瞻戀徒切志欲留而懼乎茍禄愛過厚而難於發言壽域正開永頼生成之造此身未老敢忘忠孝之誠上蜀府啓伏以臣於今世儒者中學術才藝最爲迂拙受恩受奨最爲深厚每思遭逄之難惟恐無以爲報幸屬大比自意得備貟校文因瞻拜左右誦聖哲之遺言考帝王之善政以效愚忠四月九日忽天府移文以同考試見徴且謂已嘗啓聞儲王不許厭逺就近辭㫖迫切本府已與依准文狀去訖至二十一日四川公文及使者始至惓惓之誠以是不敢自遂雖京師藩輔均爲國事奉朝廷之命而弗敢辭固殿下之所嘉然臣犬馬私情不能自釋者良以恩奨之隆思報無所欲重瞻覩清光而未果也然臣聞受衆人之惠者爲報易受人君之恩者爲報難古之人臣受賜於君而無以報非願之壽考福禄則願其賢才之衆胤嗣之昌以此未足則又願其脩徳以合乎天俾爲受福之基盖舎此無以致其忠愛也夫以殿下之盛徳聞于西裔而高出前古其於壽考福禄與後嗣盛而人才多皆所固有而不待臣之祝矣臣將何以爲言哉然臣又聞之天不自以爲高也而凢物之高者莫及焉地不自以爲厚也而凢物之厚者莫尙焉聖賢惟不自以爲聖賢也故衆庶莫能比徳焉自謂望道未之見者文王也以不知彛倫攸叙而訪諸人者武王也受人之徽言者周公也斯數聖賢者惟不自知其賢是以若是巍巍也以殿下之徳之美而加之緝熙不息之功今天下之學士君子烏足窺餘光而承下風哉臣無似願益以古之聖賢自望不計其所至日求其所未至不以過今之人爲足而以未及昔之大聖大賢爲未足致察於喜怒之㣲致謹於嗜好之萌受逆耳之言爲難能之行俾後世稱聖賢者必取則焉此臣之所祝願而欲進獻以報恩奨者其踰於此也伏惟原其情宥其不即趍命之罪念其愚忠而特賜采納不勝大願又郭千戸至傳奉教命作文祭忠武侯謹巳撰就第以京兆生催促上道弗能陪觀盛禮爲慚負耳林昇久處山林祗承召命得與相見足慰桑􅎚之思縁臣起行書室文籍散漫欲其料理數日且録臣舊日所注武王戒書及宗儀十篇以進故遲留旬日昇此來携臣昔日所著評論宋事宋史要言一册自太祖至哲宗尚未完不敢上塵􅌖覧臣歸期未能預定如試事畢得遣昇仍至漢中教飾愈軰守視書室實望外之恩愈等䝉製名字期以成人造化生成之徳無以踰此但臣祖字曰景暘易景字爲師字似爲盡美恭候裁擇道山書院記一首繕冩附進詞意拙劣不足發明盛徳之萬一彌増慚悚諸儒亦不敢有所論述盖聖哲之門難爲言非虚語也臣受恩深隆奉違益逺無任瞻仰激切屏營之至洪武二十九年六月二十二日箋伏以臣卑賤迂鄙承光華受恩教之日久矣春𥘉不幸聞伯兄即世恭蒙􅐶慈賜號易名賻以泉幣閔恤存撫不一而足繼而有應天校文之召弗獲承命趍走殿庭之下以謝深恩其爲愧負理宜擯絶茲者還自京師甫餘三日而毛百戸至敬承教㫖粲然之文溢於翰墨語科塲之近事傷耆耋之罕存事關風俗雖一介不遺志欲褒揚雖一言必紀憐勞苦而成疾則有珎劑之頒恐居處之過陋則有皐比之賜非惟免擯斥之譴抑且有望外之恩顧臣何脩而克臻此茲盖伏遇賢王殿下禀不世出之資有大過人之徳以言乎學則三才萬物之理無不并包以言乎政則愽施濟衆之事皆欲興舉固足藩輔皇家照耀千古矣而猶不自滿假恒若不足以至貴而不遺至賤以睿哲而不棄無能弗以已長短乎人弗以獨智責乎衆是以雖臣之愚而過受恩禮久而彌篤者此也夙夜以思且漸且感深欲造朝以謝萬一而今年自六月辭山南歷渉苦寒始還任所手皺臂痛髪落饑羸遥望道山之庭如在霄漢之上尚幸仁恩垂察曲賜涵容俾服藥有効坐席稍温則濯大江以滌胸中之塵觀名山以窮天下之壮炙道徳之輝聆仁義之㫖以快鬱積之思以請不即趍拜之罪且得誦味緒言以求聖賢真是之歸必重有日矣無任瞻仰屏營之至洪武二十九年十二月初三日啓正月初四日禮生楊克禮偕林良顯至宣徳且慙且感謂有瞻觀之期不意䑕軰竄伏頗有警報城中岀兵衆情疑惑又收去歳秋粮未畢移文請别委官十六日府帖至次日即行適遇張百戸自代來同到沔縣是日聞畧陽縣被焚畧陽去沔一百餘里浮言相驚居人坐以待旦未可行欲冐險前進恐怯懦憊上貽􅐶情軫念欲止於沔以待復命則地當要衝無城郭兵甲可恃以安姑留禮生同還漢中稍候道路平安即當趍走以謝深恩顧臣受知最厚寵待優異苟使有益於國雖蹈難舎生亦何敢辭每念保全固護之至不敢自輕而迂拙無能所業不過文墨淺事非有所禆𥙷倘不度量招釁速咎以傷仁慈平昔垂愛之意則獲罪彌大矣良顯蒙恩衘戴無極引領西望悲惋交深無任瞻仰激切悚懼之至洪武三十年正月十九日又臣以庸猥久叨恩遇豈臣之能有過於人實頼天地之徳之量有以造就涵容之耳日夜循省懼不能報兹者瀕行敬䝉賜詩寵餞愧感之深言何能喻正平之才臣豈敢望辱賜品題爲榮多矣然彼不遇時適遭世患臣逢睿哲固當過之卻疑之詩就乞并書于卷傳之子孫以見寵光之優渥臣敢不益思自警以副夙昔期望之隆尚容賡韻以謝萬一洪武三十年四月十五日又臣恭蒙遣急足党直傳示長史呈駙馬都尉謝公詩一首深感睿心軫念之厚第臣才思樸訥又兼未奉教命屬和故不敢次韻親親之義盖欲教人以徳非將欲昡耀以文辭也是用取古人贈言之意賦四言詩一首始以褒美而終於勸戒雖不敢髣髴風雅發於忠誠止乎禮義盖亦有可采者焉更望特加刪正而去取之幸甚長史詩録附進臣無任屏營感怍之至洪武三十年四月二十七日又臣黎明恭𬒳續賜五詩識鍳之竒勸勵之至期奨之深從容所發心關乎風教而詞采雄逸又特餘事且又出於秉燭而成古人所謂晝有爲宵有得言有教動有法瞬有養息有存者於斯見之而臣也得躬􅑮盛美逮及一門皆預受褒嘉沒且不朽况依日月之末光未必邪敢干正祗奉以歸山君川伯皆當呵護而魑魅之徒必將驚駭退避矣不待相如之檄闢之而後廓如也夫子之云顔平原王文憲李鄴侯之喻過情之極流汗至踵愧不敢當謹候見以謝先奉啓陳聞干正句疑誤又臣昨宿鹽亭乙夜急足二人至逓至前月二十八日所封書展封得承賜喻令與駙馬都尉謝公作字說頓首捧教如聞玉音竊念平生野性踈直爲文亦多激切少温婉之韻於公卿貴人所湏恐渉乖忤每每懶作今於此文感念恩意屬望之厚不復敢辭遂留半日撰冩成篇第途中匆遽絶不能佳然狂奴故態未免呈露有未穏當處乞賜刪潤免使衆人指怪謝公承燕問傾心沐和風時雨之化不虚萬里行矣樓經歷未詳其人奉化樓則中爲北平都司幕僚舊與相識恐是斯人昨所撰四言詩想已徹睿覧山谷常稱妹之夫爲王甥故稱舅未審可援爲例否二古詩皆能摹冩物狀足爲海邦出色介甫所謂失之此而彼得之千載同此嘆尤時之有用世意韓公冠顛之言可見賢者惜才之切如此妙才棄於空寂造物未易暁也鶴年數詩末章爲佳但其論詩却未敢謂然也不知􅐶意以爲何如違逺漸久畧述鄙陋不覺覼縷伏乞赦其愚瞽幸甚無任屏營瞻望之至洪武三十年五月三日箋伏自奉辭甫十餘日眷寵優異慚感實深報效無階瞻馳彌切敬惟親王殿下以明哲之姿居崇高之位徳足以濟衆而自視欿然學足以成身而日進不已巳之所得樂與人同人之所能不求其備是以群士歆慕若飛鳥之宗鸞鳳衆流之趍江海顧如臣者雖懐好道之心而無適用之實語學術則泥古而不通語才藝則執一而無取舉止踈野言辭戅迂不顧衆之毀譽每忘身之卑陋世之見者莫肯信從天實啓之特加寵遇經筵下講屢陪觀聴之班燕席命觴親辱吐哺之禮感疾而命東朝賜衣天地高厚曲賜成全雲漢昭囘屢加褒奨許闔門之忠義爲百世之光華恩在古而或稀事爲今之共羡私自循省何以能任當克巳慎行益勵夙心體國忠君不負所學雖知葵藿之私難報陽和之澤庻㡬松栢之操不爲歳寒所移臣無任感恩戀徳激切屏營之至洪武三十年五月初八日啓日昨郎百戸至傳奉教㫖寫喬嶽詩及字說敬巳寫訖初不知芝蘭公之非嫡故以嫡言今改爲謝庭之特朱子詩傳曰特傑出之稱似爲穏恊字說前作頗未如意今更定一篇乞賜刪正如有蕪穢仍就批下再寫兼善二字關渉甚大故妄發明此義張子西銘意正如此使人皆存此心天下無失所之民矣臣愚嘗謂人主讀書如西銘大學明白簡易道理大原大本咸具不可不常存諸心正謂此耳至如㣲文碎義散見他書者固當叅考不棄然有所未察未足爲大害也公智携得舊拙文藁兩冊有舊讀子書雜書議論數十首頗有毫髪之見他日當俾録進囘視少時文皆二十餘歳時作其時巳知歆慕聖賢今四十餘矣尚與庸人無大相逺言之不覺愧汗沾衣也氷月堂巳作一銘不知巳徹睿覧否安老芝蘭室記甚異他作諸詩皆巳觀訖因芝蘭公記識之精亦足窺見異才之一節矣又知金輿遊幸名刹群緇有詩足爲外教増重贈蘭空詩匆匆未能扳和南洲玄極及張廷壁送公智詩今先進呈明日當别良顯公智而東無任感徳念違激切思企之至洪武三十年五月十一日又臣昨行至黄埧驛遇許指揮恭䝉賜示松筠芝蘭二公詩且承教告曲折又聞清白清真凝清三君子皆折節讀書深見聖朝文化之盛戚畹英才之多而松筠題清白軒詩及芝蘭公題温泉之作皆佳麗有竒氣可謂競爽也在臣聞之猶以爲喜况睿情篤於親親尚重文雅爲之喜幸又當何如哉比來唱酬必有親製官商相宣金玉並奏真盛事也近作祭鄉先生文及爲公智作定親書共二首録進乞賜改正臣無任仰徳瞻馳之切洪武三十年五月二十九日箋伏以恭承寵眷常懐難報之恩夙荷深知每耻過情之譽撫心感怍省已競慚敬惟親王殿下有剛徤中正純粹之徳而加之日新有聰明􅐶智寛𥙿之才而本乎天縱以忠恕爲治國之要以詩書爲養心之資不見者三年聖學之増譬諸水湧而山出侍朝者兩月仁政之美可使物阜而民康實皇家太平之基抑道統盛隆之兆臣受才最陋執徳未弘雖有志於求仁實無能於應世幸日月之垂照借朽木以光華喜江漢之滂流霑涸魚以潤澤雄辭秀句一字踰華衮之褒大節美名百口被帡幪之賜友朋携酒賀子美草堂之尚存兒女候門指淵明松菊之猶在孰匪陶鎔之力共推化育之仁第恩之大者非踈賤之所能報而心之至者亦言語之所難宣惟當守道以立身期不負於天地庻㡬責難而陳善或有效於㳙塵無任瞻仰激切屏營之至洪武三十年六月十八日啓伏自違逺旒扆巳踰十旬自暑而凉秋序將半雖省過勉學之心不敢少息而欽徳慕義神馳於輿井之域夢結於蓬瀛之署者亦未嘗斯湏忘也毛馬二使者經過獲聞奉詔時廵戎夷喜恱神人交贊福祉來同深慰瞻仰謝公墨竹暨詩風度英妙足爲國華文明之祥太平之徴亦可於此占之非特翰墨末事也有教作序及詩謹綴緝二首欲俟刪正未敢上卷皆書在别𥿄以進良顯重拜賜詩過承褒借而公智受恩深厚得遂室家之願此皆可以傳示千古増簡䇿之輝光爲薦紳之盛事非臣微瑣所能稱𫐠報謝也謹西望稽首祝千秋壽無任瞻仰感激屏營之至洪武三十年八月十二日又臣前者奉教令携至周易傳義寫本就點校今附六冊進納中間差誤及落字處亦多就貼𥿄本行上寫其誤字恐有未當不敢自保或字義可通者存之諸本互有得失故也餘書未畢者續俟便上進前都御史過此甚謙恭安静此城中亦懼法莫有犯者居數日即去聞在他處又不同必有以取之耳今秋丁祭樂舞畧有可觀當祭之時雨適暫止偶有二行人及分司者與祭問習樂之由莫不共感􅐶恩作成文教之盛竊聞車駕又将廵邊山路險峻雖川祗嶽伯奔走先後祓除擁護以禦不若恐玉體不免輿馬之勞然歷覽江山之壮而思禹功之大念皇圖之廣使邊徼之民歡呼喜忭懐徳歸仁亦可以忘其勞矣下情無任瞻仰馳戀之至洪武三十年八月十六日又伏自奉辭每使者至獲聞仁政之施仁聲之著輙快然以喜内而朝廷外而四方臣民士卒稱揚睿徳凡有所聞未嘗不舉首西望且慰且幸非有私也受恩深重異於恒人體國之心不能自巳喜天下之有賢王所以爲宗社生民慶也臣竊自忖度遭逄聖世身安食飽無由報答惟願國家享萬年太平之福臣之無能得優游治化中爲太平賤士歌詠頌美以與草木蟲魚共有其樂足矣比者伏聞奉詔廵邊歷覧江山之壮俯察民物之情所以發聖學之淵㣲念皇圖之廣大夏諺所謂遊豫爲諸侯度而𥙷其不足助其不給斯民一何幸哉雖輿駕䟦渉王體不能無勞然百神扈從萬福景從固不俟一介庸愚之祝願也無任瞻仰激切屏營之至洪武三十年九月初六日又毛總旗至敬承教㫖仁厚詳宻西望拜受快然如凛寒之遇陽和積隂久雨而忽覩白日之舒光也臣蚤服孔子之言謂知周萬物而道濟天下故不過每洞觀宇宙歷考載籍三代以後求其可當斯語者實難其人今乃於殿下而有遇焉伏惟殿下高居玄覧而於三才庻彚之原無不究六經群子之說無不讀禮樂政教之㫖無不通閭巷隴畝之情無不察可謂知足以周萬物矣服纎麗則恐一夫之或寒嘗珎美則思一夫之或饑處崇明嵬大之宫室則念或有苫闔不蔽之家享康寧怡愉之福祉則虞或有疾疢無告之民糜粟以賑其饑施藥以安其軀省興作以養其力給棺櫝以厚其終可謂道足以濟天下矣然知雖無不周而臣受照燭也特異仁雖無不溥而臣䝉竉惠也特深自頂至踵由親逮踈藩飾之光華服食之温飽何其非睿恩之所及哉而不止此也未有疾也而賜以扶衰之劑未有能也而褒以過情之言本所自而澤被先師之孫推其傳而恩加門人之室防其将然之謗弭其未萌之憂雖慈親之曲愛弱子良師之樂育英才而爲之謀亦不是過矣夫蟲魚蛇雀於物至微於性至賤受人小惠猶懐報而不忘矧臣嘗受教君子而於聖賢之大方粗有所聞者乎然而侍奉左右口未嘗發婉媚之談身未甞爲容恱之態與未曽受恩無異者盖以爲細恭繆敬非所以事君而圖報之心不能寢食忘也第身微才陋徳薄能鮮縱存惓惓之心如葵藿雖向太陽而不能少助於末光烏鵲雖宗威鳳而不能測識其靈徳以此常恐汨沒巽耎爲庸衆之歸以負不世之遇是以每慨然遐想若有遺而不得者此也抑臣聞之施徳而不徳者聖哲之君也受恩而不忘者志義之臣也殿下聖哲也固不責人之報而臣也安敢忘哉周人之詩曰罄無不宜受天百禄說者謂盖欲其君言行政事咸盡盛美以膺多福也敢以此上獻詩又有之曰中心蔵之何日忘之說者謂愛之根於中者深故發之遲而存之久也臣愚不肖尚當以斯言自勉無任激切屏營之至洪武三十年九月初十日書謝太史公數十年來師弟子道廢鮮有推所得引人之事執事探索古初根㩀仁義汲汲以誘㧞後軰爲軄雖樗朴不才如某者亦収之于門而告以斯道恩意懇篤撫勞不倦待之踰於子姓而進之以聖賢所務此今世之所未聞而古或有之者也某辭歸省又辱教之以言引譽過侈期望深逺今於别來旬月間延領西眺戚然懐戀不能自喻某少頗自負長而無成自入執事之門然後得窺見聖賢堂序粗識脩巳經世之大端僣不量力每有所稱說聞者未深暁多相恠駭獨執事見之以爲當然咨賞嘆息喜溢顔面某所以忘其卑賤旅寓無聊之情而有以自樂也夫人之相與處必心相安而後可久居庸衆人之間悶悶然無與語雖享之以八珎之味九韶之音不能安而留也執事於義則師也知巳也於恩則㧞之於恒人之中而感之也某宜何如哉然執事之知愛於至愚者非私某也盖閔斯道之不振矜得其人而明之也某之感執事也亦豈敢致私徳於執事乎竭其駑鈍務學之成他日萬之一有𥙷於斯世使将來有述焉則庻乎不負執事之所望耳是亦難言道之不行於斯盖甚久古之人家焉而長㓜序郷焉而倫理飭皆由躬行素積見信於人而然鄙心思慕之竊自惟宗族數十家其初本於一人而今猶或有不齊者思立爲輯睦之法以洽其情欲爲祠於冬至祀始遷祖而族人各以其祖祔食祭畢而㑹飲族之最長者以禮義陳訓舉族之人皆拱而聴每月之吉一㑹拜畢則訓如冬至之儀族之人有善則書之而加禮貌焉有不善亦書之而加教誡焉立之學以教族人之子弟爲置田以食其不能生者族殆可使親睦貧不足以興事人雖有聴者亦未并志一力以兾其成又寧海自宋羅正之以來有探道徳勤問學者其在當時勵名節立行義莫不殚一世之心志以兾發聞於後世而紀載之籍不立遂使湮廢不大光顯邑人多不知其姓名斯甚可恨欲成一書分析數目使幽暗者昭章阨窮者昌顯嘉名積行者獲知已於後僥倖茍得之徒知公義之所存用爲勸懲存乎風化而朋友寡少無從得其事實雖懇切言之好事者竟未復報此二端皆細事度其勢不甚難行其爲法可不求諸人而備而成之不易也如此况推明先正之道於天下其可易言哉然人恒慮志不足茍有志不有遇於時將有垂於後不有合於人將有合於天安知今人之非古乎哉安知古之果異於今人乎哉而某奚敢譲焉近亦有人說執事賜教之言以歐陽氏蘇氏以下見期爲過某聞之不應而笑笑而黙然竟不問其主名流俗人省事者少淳于髠鄙薄孟子桓譚輕揚子雲容貌不傳其書此大儒賢人猶若此况淺闇小子見誚於不知者亦又何疑所兢兢者恐傷執事之明耳某妄志殆未可遽以辭盡其大者将宏廓敷揚其所傳於世俾人得樂生逹理其次亦将整齊周公孔子之成法爲來今凖下此猶當著一書攄所藴蓄𥙷藝文之遺缺續斯道於無極豈止與諸子競銖兩毫末於文藝之籍哉執事之取某者必以此某之報執事亦在此兒曹愚人何足以知之其見疑者固其理耳屈原曰邑犬群吠吠所恠也犬見市井衣服持任而至者多卧不起視使服三代之衣珮鳴玉冠進賢之冠揖譲而進犬必驚駭以吠狺狺不巳此非有他也見所未嘗見心誠恠之而然三代被服豈願狺狺者之愛惡哉其所取則有在其所操守有常其所有時豈務流俗之合乎傳記所述卞和伯牙事皆戰國人急於見售者之言和之智不足稱而伯牙亦甚可恠君子之爲貴乎得於心而有以自樂何必人之知使舉世之人皆非子期牙之琴將不鼓乎何自待之輕而取於外之重也惟掦子雲頗解事然亦未逹乎理子雲謂後必有揚子雲必好已書其心雖不求合當世而終未能忘乎名也由君子言之所爲果有益於世而世不知貴其耻在人吾何與焉苟期後世之知而著書則狹矣某竊有見乎古人處已之大方自待頗不薄日坐静室未嘗樂人談有相過問者可語語之不可語辭譲而已見嗤見善皆不及知自謂可寡過大母年雖高而康強飲噉如六七十人侍奉粗適諸父諸兄足事以養明春之期不敢後時離左右逺思如曩時朝夕面言不可得恃見愛見知輙吐狂談不覺繁多上胡先生二首人之垂令名於當世者豈易得哉盖其才灼然有過於人而又有逹者引之於前賢者揚之於後也夫閭巷之人欲以一技名十里之内而不得况其郡邑乎欲名郡邑且不可况以斯文鳴斯道與爲四方所仰者乎其難也審矣然當世非難也後世爲難一世非難也後之千萬世爲尤難也齊之人曰賢楚之人曰不賢魯之人曰可越之人曰不可苟從而信之則其名傳於齊魯而不傳於楚越也齊魯誦之而楚越之人群笑而交嘲之則并齊魯亦不能傳矣是則奚可乎盖在乎逹者之引譽焉耳逹者一言曰賢齊魯吳越之人莫敢曰不賢逹者一言曰可齊魯呉越之人莫敢曰不可則論定而天下翕然稱之矣故曰必有逹者引之於前也逹者之言固當世之所信然至於後世則人忘之矣忘之則信之之心忽矣信之之心忽則謗議雜起而毀譽錯陳矣及其門者曰某公道徳足尊也文學足法也不見之者曰是未必然也及其門者曰某公天下之士也當世一人也不見之者曰是未必然也傳之愈久及見者益少不見者彌多則以爲然而信之益寡矣是則遂已乎亦在乎賢者掦之於後焉耳賢者一言曰某公之道徳文章間世一人耳則凡不見知者莫不信之矣曰某公吾之師也其出言履行吾不及也則後世之人莫不尊之矣故曰必有賢者揚之於後也然二者不時遇也某嘗讀歐陽氏蘇氏之書而有得乎此說焉蘇氏西蜀之人也一日挈其文就試千京師歐陽公曰斯人也吾之倫也京師之人不敢望也由是蘇氏之名隱然動天下及歐陽氏殁蘇氏之道行則推之曰歐陽公今之韓愈也由是歐陽氏之道著于後世而愈尊豈非相資以成令名者乎某生八歳而讀書十五而學文輙爲君子所過稱年二十而東遊京師京師之人咸曰内翰太史公今之歐陽公也其說而見焉公以重德居顯官爲士大夫所宗執經問道者林列于外公一見而曰是生也可教其從吾游吾於是幸有望焉某始而喜中而懼不敢當巳而愈思副公言遂委質左右而不去盖三年矣然相譽者惟公而已他人不信也及公致政歸金華某來從金華之人又稱曰吾郡胡先生當今之巨儒也太史公亦曰先生吾畏而不敢友者也某又思見焉同門者相戒曰先生於人未嘗有所稱可得其一言之褒者誇於鄉黨以爲榮吾子其見焉於是乎遂見於執事者執事不以其不肖遽稱之曰其将來未可涯也吾之門人無及也吾於生有望焉嗟乎某何人而敢當執事之稱譽哉久而思之執事以道稱人者非欺某也盖與人爲善期其至於大者耳某何敢不勉乎某妄不自量竊有志於聖賢之道上之欲推所得於人下之欲以彰明斯道著尺寸之名於後世然富貴係乎命不可預知所可用力者獨文辭耳而又不知其果足以至古人否是以終不能自信及聞太吏公之言又聞執事之開許以爲可樂始有所主於心日知趍向嗟乎執事之心歐陽公之心也而某也何足以報之顧惟盛徳不可以不謝而區區之誠有不能已者因具述其私言以獻于左右不自知其流於狂惑也雖然執事知我者豈以斯言爲狂也哉某端肅奉書長山先生執事世有授人千金而不得其一笑之報者亦有假人以片言而使人終身不忘者豈片言誠貴於千金哉顧施之何如耳人當富足榮盛時聲色可以適其心輿馬玉帛足以適其身賔客之陳說願交者之譽頌溢耳而盈目雖與之千金亦以爲宜然耳其心弗以爲恩也惟夫貧困賤辱之士勢未足以動衆庻名未能以信朋友心勞而跡下志欝而道窮見嗤於庸夫鄙人俛首抑氣誰復與語當此之時有一人焉能假片言之譽使人改容而加禮㧞之汚穢之中而措諸君子之列其心感激奮發雖千金之惠豈能過哉古今俊傑用此道得名於世者不可勝數而士之知所報者亦多有之盖施者非以是結人之恩報者非私於施者之譽上之心在乎彰善下之心在乎報徳亦理當然爾近世風俗則不如古逹於上者多忌乎下屈乎下者多怨乎上是以下有不遇之嘆而上無樂善之名而某於其間獨幸而有遇焉某眇爾之小子學未聞道才未周乎事數年之前旅遊京師爲齒甚少爲勢甚孤京師之士莫不易之翰林太史公獨見許以爲竒士及從公來此邦此邦之人未有見許於太史公也執事一見之輙轉告于人以爲可以無愧乎公之心既而人之見者必有問問者必以執事告之爲言於乎執事與太史公之心古俊傑待士之心也而某豈其人哉無可稱之實而受過實之稱此某之所爲懔然懼而怛然不自寧者也雖然執事之於人無所濫稱太史公之於人不妄有所許其殆有可勉者乎誠若執事之言勉而獲至於道大有以澤諸人小有以善其身報徳之心烏敢忘也然執事不期人之報也人之感執事者不望執事之知也知其不期人之報與不待言而明而猶爲執事言之者誠發乎中不知其形於言也兵戈之餘斯道不振人才之難莫甚於斯時此邦之秀者東陽有葛信誠夫其文執事自知稱之烏傷有樓恕希仁年長於誠夫而僕與之相上下王翰林之子曰紳有妻之姪曰俞恂皆好學能從事於此鄭氏以才稱者有叔度之弟曰棠曰栢皆能文此數子皆執事所宜收攬而教之假片言而稱之者也成均之中㧞於四五百人之上者有天台郭濬士淵林佑公輔二子之文太史公稱之其文具見雖不得來學於執事樂善之篤故欲爲執事言焉使執事知若某之愚者尚多有之益可爲斯道喜而其人之知所報與否不在執事也編脩蘇先生待某甚厚樂善亦甚至凡某之告於執事者望以告焉與蘇先生二首師友遐棄忽踰六年緒言閎論久絶心耳勝遊歡㑹無復曩時每一興懐輙俯首摶髀情不能巳時取舊所貺遺諸文讀之以自釋或見之賦詠以自遣然此心鬱鬱終不可開解昨偶得黄巖林君寄至手書發封伸𥿄口誦心思夙昔之好乖濶之情綢繆忳厚宛然在目何眷愛之隆属望之逺哉執事以斯文承諸公後爲時宗儒光華所燭譬之列宿在天物無不覩而鄙眛之蹤蔵伏奥宻鮮與世接若戴盆而居獨不能窺其所至是以相去雖近相慕雖勞而未獲以一書候左右者此也孝孺無所能解特以嘗出太史公門下謬爲當世所推然揣索其中實無可恃者平居好議古今稱說政教不自愧耻及渉世日久年齒日長大追覽前作深自悔其不然近亦欲鍼砭攻治去所甚病求古聖賢所用心者而學之而資性庸弱不見有成兼自去冬以來得痁疾彌年不愈寒暑稍間慿几展卷欲有所求索頭目眊眩輙復棄去讀周易頗厭近時傳註家繁複附㑹欲爲枝辭十餘卷發聖賢君子大意使人不惑於衆多紛紜之論歷時巳久而未能成書他欲論述者非一事地僻無書同志者絶少卒卒未見功緒自惟幸爲明時寛假得安一㕓於畎畝啜菽飲水以自肆上之不能出竒䇿爲生民國家輔無窮之業下之不足與荷殳執㦸捍封疆清徼塞宣爪牙之用苟徒頽然而居充然而食豈非天地之棄民哉故亦粗欲有以自見於後世而不知其果可望乎否也執事前時相與頗不薄今乃不閔其無成而徒譽之且欲屬之以斯文之重嗟乎自斯文之傳以此事自任者幾何人而數千載中可以名稱字舉者若是乎其寥寥也而孝孺焉敢以爲己任乎若曰不敢自怠自棄以從事乎此則不敢辭苟謂可以當斯文之傳廣天下逺來世必自有其人而非孝孺之所敢與也伏惟執事名塞海内而歛其教於一州創造設施必異於流俗恨無由趍走一見以盡所欲言高文知巳摹傳行世先子事行因得附末簡以傳甚幸甚幸䝉索陋作近時甚不多下筆又無力親寫託朋友寫數篇去殊不足觀病中作詩數首久欲奉寄今亦不睱書近時郷里畧有數人相從其中極有可喜者乃知此事在人不曽泯㓕但無人振起之故雖有高識英才不免湮沒耳括蒼山水清絶士子亦有可語者乎病中不能見林君同遊之約未獲承命有便時惠書問不宣溪上從游樂甚於人不忘自歸田廬取倡和之什觀之意未嘗不在僊華山水間也天下山川可翫者多而可喜者少天下之士鄙陋者多缺者少人之所遇於事者多遊乎物外者少聚而兼有之者其溪上之遊乎某獨将爲非也耶前後浦江欲奉書爲别適事累心不果道出剡中行崇山絶壑間煙姿霧氣環擁疊出爛若霞錦東南之竒觀也乃知靈運㤗者良有所爲恨不得與執事同知其時始與親友别離憂慮盈心翹首縱目雖暫爲披豁而竟不能攬擷竒勝與所遊者相頡頏於編翰間以此愧古人耳然事物恒理得之於心不必形諸言可以言傳者乃其粗者非其至精也彼傑特妙麗巳得之於胷中不勝邪執事其謂之乖離久思奉談笑而不可得文辭尤異於講切者近借到程氏遺書覽師弟子問荅慨然興歎不得生于其時與聞其盛然固有徴不猶興者况相去未甚逺其說大章爲世文諄諄導之以路豈能終無所聞哉以此知生於後未必不顧自力如何耳然當程子時賢者比肩出風俗雖未迨古亦至淳美其言猶以爲憂况于今相絶萬萬哉爲士者幸不與賤辱事惟道術明晦風俗盛衰之所宜知者風俗非無位者所能致鼔斯世之人慕學之道非吾儒軄之而誰乎婺之俗猶有可化識義理者頗不少執事爲之固宜也鄉邦習變非菲薄所能卒改居閑少出入慎言語自治已外庸暇及人徃時嘗與執事言趙氏兄弟資禀粹可語信然近再見思幸教之人才難得如此比者得數十人因斯文而進之於道庻可望乎當今汲汲於成人者惟太史公其嘗謂太史公此心可爲百世師真非誣也天向寒懐人益深遣童子行畧陳所當語者若心至意非言可既執事必能察之多誤去年得叔度書巳知執事念太史濳溪公之徳欲爲論次遺事以傳私心喜慰繼以感泣旋聞從者校文關中不知歸期何時而某卧病山中無由遇括蒼路使欲致一書逹所欲言至今未果自古聖賢君子道徳言行信於天下者如孔子孟子身沒而言在者若無待於人之傳然由門人弗圖其傳也後世史官無所憑信徃徃勦取異聞恠說以實其事或不知其姓字壽年之真讀其書者至今以爲恨其次若楊雄王通俱號一世大儒咸有所論著以發其藴蓄亦若不待人言而後信矣然雄以作美新媚莽受訾于世或者謂非雄所著殆後人依傚而爲之通書稱隋唐大臣皆其弟子識者謂多誤妄疑非出於通之手若是者使其門人有所述以紀是非之實寧有紛紛異論哉惟其當時以爲吾師之徳行文章自足以傳而有輕視天下之意故天下之人得持此遺失而議之嗚乎天地之大日月之明無所資於人而其行度徐疾盈虚之數猶必俟人紀之而後定彼以聖賢君子爲無待於人之言不亦大過矣乎吾太史公逺宗孔孟以爲學高視雄通而有餘其著書其制行其事君行道固巳暴於四方而信於當時傳於蠻夷之國而誦於縉紳當世雖未有發明之者亦無害其不朽也决矣第其末年遭罹飛語一子一孫死於禍而家遷身放卒于異鄉倘不得有道而能言者白其本心告之萬世瞹昧之謗人将憾之非特忠賢受抑於無窮且俾聖朝有知人未明之損豈細故哉宜乎執事有意於圖之也千載之間士之蒙誣受誑者何限逺則司馬子長以言語𬒳刑蔡邕以慨嘆受戮近則程叔子有貪黷之謗涑水公遭姦黨之名其他擠於險詖之人汚於朋黨之論生不得訴冤於朝殁不得返塟於里者不可勝計然其心跡卒光明于後世者頼有明士端人㫁以天下之公是非而不惑於流俗一時之私意大者辯其誣於史䇿小者表阡銘墓以示将來是以士有就死而不恨挫抑而愈光以有人發揚於後也今執事居與公同鄉學與公同道於公有師友之義而公之自朝退休於家也屬望於執事者甚厚且執事嘗官太史而以論譔之作爲已任於公之事而不有述焉何以解後人之疑正流俗之失而慰公之神靈於地下哉雖然公之心不期人之白巳也忠義自信而且嘗爲人言事君猶事父與事天也父不可欺天不可怨順受之而巳矣每論古人遇貶竄而怨誹及爲文過於憤激者深巳薄之以爲不逹君臣之義其素所存者如此及乎臨大故遭大禍視子孫之死夷然不少見顔面竄逐之至若返其鄉次于江壖端坐而逝此其心豈以世之榮辱介意哉其信乎巳者可以質之幽明而無怍考諸聖賢而不愧其於人之謗且譽若推之以爲高也抑之以爲卑也安之而巳矣身受其患尚無怨尤而於事行之白不白也復何較焉然而某之有求於執事而欲圖公之傳者非爲公計也爲誦公之文尊公之徳而欲盡知其平生之計也是則斯文烏可巳哉自公之亡天下無師後生小子自以爲高而議公者多矣然徐而視之如蚊蚋之群忽巳消而公固自若竊亦見其不量力而徒爲爾嘵嘵也人之賢不肖固有定論文章之高下亦然近時作者漸以稀濶在東南惟執事及徐教授耳徐公之文簡質典重有渾然之氣然推贍暢急言極論而不竭者實惟執事某徃與太史公論斯事過辱特見許與而前軰三數公復從而推奨之然七八年來痛自摧斥向時之可盡矣人持所業殊與相見時異惟以體乎身見乎事有𥙷乎聖賢而傳之萬世此鄙陋之志而亦太史公夙昔期望之意也執事可無以教我乎士氣日卑學術日趍於汚下某病廢無聊無足負荷斯事矣惟執事善自謀以大宣正學上報國家下慰相知者之望心所欲言者無踰於此而當今可告以此言者惟執事耳故卒一言之上范先生天之於人生之也難則屬望之也必逺望之也逺則待遇之也必詳衆人盈天下而一國一鄉或得一善士學者不絶而百年間世或得一大賢脩周公孔子之道以起人崇之者恒有之而聖人數千載不復見天之生斯人也缺於斯人也藝黍而資其食樹麻而資其衣有不得焉則缺吾樹藝之力天與斯人以莫少望之治使不失所上欲其無薄蝕乖紊之憂下欲其無崩損潰圯之灾其望之深逺也如此斯人也不足以任斯任也則巳知其真足以爲聖賢君子其自視其身宜若之何哉以家之不不其子無以養爲患者衆人也缺先乎千萬世而欲因吾身使之明後乎千萬世而欲因吾言以之乎道四海九州之内欲各不違其生而復其性斯吾之所當爲而亦天之任我之意也故古之聖賢君子不敢斯湏自逸其身而惟不負天之意天以數千百載之久而生斯人斯人不思爲之立數于百載纒繫緝寧之法而惟苟且因循之計其得罪於夭也甚矣天其能貸之耶此缺天命信乎不可不畏也自孔子殁百餘年而得孟子又千四百年而得周子程子二子之後又復百年而得朱子此數聖賢於天之所屬任者可謂無所負矣夫聖人今之有無不可知安知世無大賢君子其自視天之生之之不易其爲天下者宜亦不敢緩也天下之當爲者未可遽盡而遂萬物位天地非無位者所能爲則明道而傳諸人以淑後世大賢君子之職也道之不明莫甚於今談性命則或入乎玄宻而不能措之行事攻文辭則或離乎實徳而滯於記問扣之以輔世治民之術則冥昧而莫知所爲缺㡬何而不禍天下乎道之大端脩巳治人二者而巳率乎性命之理所以脩巳而爲治人之本也察乎禮樂政教之具所以治人而推脩已之餘也古以有此二者也故生民之類頼以無㓕而至於今苟或去此而不爲則人理麋爛久矣今天下亹亹然皆将以道徳爲虚噐雖儒者亦自謂無與於事功則聖人復出将何施乎聖人所謂道非若異端邪說足以誑惑斯世其爲其爲三綱二紀其體爲仁義其用以爲治天下法行則服乎人傳則寓乎文而豈徒播口舌恱耳目而已哉缺不幸而至於斯固賢人君子之所當深畏而熟思者也執事其少垂意乎執事身爲布衣而州里以爲師爲人師而容貌謙慎而不居智足以知天命而不過乎幽逺文辭可以述已志而不缺之以窺盛徳之所然當世之稱賢人君子者必歸無望乎由今而求之賢者君子于世未可知也越數世求之焉未可知也孔子不以有顔子而不行道子不以有而不著書各盡其軄思無負於天而巳執事烏可不爲後世慮取之道托之書緒言遺教可以範世缺向者履執事之庭而問焉嗣是道者未知其誰也豈世無賢者乎抑有之而未知之耶謂無人而不傳者與有之而不知皆非執事所忍居也某潜溪先生之門人不敢復言他師然聞古人之取善也博而自期也大取善博故於人無所不自期大故於道不以爲至某不敢自擬於賢人君子而亦豈同於衆人自七歳而至於兹十有八年入乎心而著乎思者昭乎其非衆人之事也嘗竊自喜天之生者或有意乎不肖而予甚有憂惟恐不能副天之所期望也故夙夜以思謀必至而爲數百年計者甚悉如是而後可爲治如是而後可以育才如是而後可以不負乎天而不墜其所傳某不自度其愚而私有意焉而非執事不敢以斯言告也夫以某之愚而猶乎天况執事世之所稱自以爲賢人君子者天其必不易然也而可忽耶惟執事思天生才之不易閔道術之晦而求明之不負乎天之所望使小子獲有聞焉則於天意得矣此軄也亦道當然也豈獨某之幸耶多缺誤與朱伯清長史昨承誨及諸葛孔明及范希文司馬君實三君子事謂某鄙論未當於理開析明白爲惠甚大竊自喜慶不能自休何者師友之道頽壊今世無復見匡教訓誘之事士初結交以爲未久不宜相督責及既久情義相習競競然恐招人之踈怨心有所見口竟不敢陳說名爲友而於身無纎毫禆益者甚衆穢惡不知其非相視相䛕俱至於無聞而後巳此某之所深懼者也執事逹理力行動法古人忘年降徳而與童稚卑賤者講明徃復救其闕失顧某烏能至此哉實執事知師友之道宜然耳某倘有所取而不以告是背乎心而與世俗無以異也故敢復盡其愚古之聖賢非特能言而巳其心必能該天下之理其才必能周天下之事雖衡門之下布衣之列而道徳性命之微仁義禮樂之要經世綏民之術禦患備亂之方莫不精究而歷試之故問之則無不能言任以輔相之位而行之如取物於囊汲水於河信乎其無難浩乎其莫窮罰加而無敢怨位崇而無敢謗以其道固有之也自漢聖賢之學不傳通才明識之士常患無道徳爲之本忠厚誠信之質知其大者而患才不足以充之若孔明之佐昭烈提數州之地以抗萬全之中原卒能割鼎一足屹立西蜀使曹氏父子睢盱駭愕而救敗不睱神機竒畧應變百出忠義之氣磅礴宇内脩明政教戢和人民勞之而不怨殺之而不憤惟天不祚於漢使大功不成其雄才偉㫁真中世之豪也然其學本出於申韓故襲取劉璋教後主以刑名不無謬於王道某嘗謂孔明有大賢之才而於道或有未聞者此也宋之號賢相者希文君實希文自少慨然有安民之心君實癯身苦心以憂天下不義而奪人之國二子必有所不爲然宋仁宗之時二虜亂於西北中國爲之不寧朝廷亦多故以希文之叅大政雖未久輙去而人主待之之隆問之之切僅䟽取士及革磨勘數事此數事者豈皆天下所頼以久安者乎君實當母后懲弊之時獨負生民之望不顧世之毀惡一掃新法而復舊政其功亦深矣然過於矯枉失於閑邪身旣死而群黨作法再復而夷狄横雖非人力之所能爲而變更之際有可議焉者使孔明之才當此之時必不若此而止某故謂希文君實有君子之心而才不逮焉者此也執事以謂過者何哉豈謂希文嘗伐西夏乎堅守持重使士卒樂用此誠非武夫所能及比之孔明未足當也若君實之革新法去民之所苦而從其欲至誠動天地大順感夷狄生則仰之若父母殁則哀之如骨肉是豈才之足以感乎人哉積乎心見乎色而人信之耳觀孔明當兵革之時非有利民之政而其死也民俱家哭巷悲如䘮親戚使其居君實之時有不若君實之得民者乎二子之才其不及孔明也明矣凡論徃昔之事逺則求諸簡册近則驗諸見聞得於見聞者易習而徴諸簡册者易忘習者其美彰忘者其美晦故常人尊近而忽逺也某則不然考其言以求其心計其功以較其才視其所處之難易而叅其成敗前人以爲然不敢遽以爲然也必詳察焉前人以爲否未敢遂否之也必加詳察焉若三君子之事固某之所自信而言者宜乎其有過也然近世先儒立言爲世法者莫大於程子朱子程子謂孔明庻幾禮樂而道則未盡朱子謂希文有欲爲之志而未能精宻謂君實學不本於致知而成功小其殆亦有過乎執事篤志朱子之學論之必審矣苟以務道之明不若言語訓告之詳而明先師之意使妄論私說不至於違道雖不更端而醮之某雖愚不敢不勉寄徐教授教授鄉先生執事某不幸早失先人始也俯仰顧視輙哀不自勝既而觸物遇時輙哀既再見先人衣履書帙輙愴然而悲及除服而居思先人之聲容辭氣存乎目者益逺矣凡見先人交友與嘗識先人之面者未嘗不趍而拜之泣而問之以先人之事盖某年二十而先人亡前之十年㓜且愚也未有知後之十年宜有知而性質愚魯於先人之善言懿行不獲紀載又頗謂先人壽年未衰當自有所論著又念古之君子不敢預以凶事望其親故因循遺失卒不復書及先人遽亡而先人之徳業竟無知者某竊痛且懼倚廬之中忍死掇拾耳目所見聞者即書之至於十年以前之事則詢諸父兄采諸遺文近而宗族逺而鄉里之人無所不徴各報其畧而請銘于太史公公在翰林時嘗聞四方人說先人學行政事甚熟故不拒而爲銘且盛有稱予雖少足以塞無窮之悲然先人之善諸孤之所不知而遺失者盖多矣是以詢於先人之友而先友之存者甚寡縱有存又多不能言雖知而無從教之此某所以願請於執事也伏惟執事於先人爲鄉郡而有久故文章言語足以傳信於人則先人之遺徳隱沒而未盡著者不望於執事而誰望哉先人道徳之奥某至愚雖不足以周知然考諸心則明白坦夷而不見有纎毫之闕徴諸身則端嚴重厚可以鎮俗而化民見一物失所則戚然以爲憂聞人之善則快然如巳岀較之於世誠不多見且不知於古賢者何如耳今鄉里之中善人君子日以淪亡後生學者無所取則揚先人之善而使學者知所效則有志者之所汲汲也執事不遺而有述焉豈特先人之幸哉某少不通於諸事惟於學問常若有隂督而黙相之者先人之亡宗族老人皆懲前事勸其輟業某重歎先人功名既不顯於天下苟又無人繼而揚之於來世豈先人所望哉故益刻心勵行從學於太史公鄙陋之私盖将以有爲也而未敢必其能成否故先有所請於執事苟以先人之故而憐之發之并有以教之使得以承先人之緒則幸矣墓銘謹録以上近所爲文迫疾不獲寫至冬問當持詣左右先公碑太史公尚欲刪正未及如命與王先生近者執事之歸孝孺以故人子謁見座下執事不鄙而辱之與坐且與之言所稱所望皆非庸衆人之事私竊慚怍不巳及返里舎追惟情義之厚怛然不寧躍然恨不獲久侍言笑率然不知形之於詩辭欲以奉寄則懼辭之不令棄而不逹則恐意之不誠既而思之不令之過小不誠之失大因録以進妄意執事且笑而斥之矣林嘉猷來乃承寵以和章辭氣深篤稱且望之也加甚展讀感歎問之嘉猷乃知行期巳迫欲趍走拜伏於道左以盡所欲言而疾病之軀莫能自致思所以報盛意而環顧乎家無一可者徐而自計執事此行将以軄事見賢王於藩邸凢古聖賢之格言弘訓可以禆𥙷遺闕者豈非忠臣所當采摭以備顧問之及哉於書篋中檢得武王戒書一編因畧加整次納上伏惟執事抱負仁義忠藎之心溢於顔面清閑之燕或可以之陳說以􅐌徳聲之萬一此固素所積蓄而亦鄙陋者之私望也他日功成身退安車東歸孝孺當率子弟迎於河梁之上以道間濶具謝不敏盖可待矣冬寒倍加崇護與葉夷仲先生某童時侍先人左右聞先生長者論議輙聞執事名年十二三執事自安南還枉傳至歌詩耳聞之愈熟後四年先人守魯執事手筆至復獲觀之後又見他文十餘篇先人教曰吾郡之士未有過者也某巳私識之又四年來金華執事自睢寧囘始獲拜于翰林太史公舘下執事温温乎其容甚與其進也屬屬乎其言深望其成也退則又爲書告先人曰他日顯吾郡者必此子也有子如此何以爲憂先人不及聞斯言而卒此書尚在某每展卷一視輙涕泣不自勝以爲先人不可見矣見先人之友庻乎如見先人而先友之存者惟執事數人而巳而又阻於事弗獲拜謁床下以受教其何能自致於無過之地而承先人之遺業哉且先人之本末執事所悉也所守者恒古人所爲不譲今人當世所知也一旦不幸至此乃徒以爲善守法以䧟罪過又官小事微不得列史官而著於來世此某之所大痛深懼者也自括髪以來心遑遑不知所依居則忽忽如有遺行道常若豺貍在後而相追聞人疾呼暴走即震魄駭膽周章四顧見持捉當道者輙驚懼汙出何者傷弓之鳥見曲枝則呌號而避之非虚語也嘗自思念先人巳矣不可柰何矣雖絶食東向死先人墓下亦徒然耳古之賢人哲士遇不幸者何限頼良子孫出而昭雪之其功名卒顯於書傳世多有之某雖不才豈遂已也哉鄙陋之志誠知其可勉思得名世之士而依之以究道徳性命之端緒求聖賢君子之用心而委身焉是以祥禫未終趍五六百里從太史公於金華雖流俗訾笑以爲迂而某行之不顧者也某在金華六歳矣日有所進而月有所獲人或見其云云者而勉譽之某弗以爲是也古之君子其所志在道徳故言之所宣者此也躬之所蹈者此也推之於政事者此也形之於文辭者亦此也惟其所務者大故接其言貌則可法政事文辭可傳於後天下從而效之非若後之文人者比也彼竊取於章句者譬之伶優被衮秉圭習堯禹之貌其外則幾似矣而不能久久則故態百岀人見則駭走矣是豈足爲學哉某誠知不敢自怠不敢自足亦安敢自期其能至哉其不足至者其在天乎其在人乎竭固有能勝天者亦有能勝人者爵禄俗之所稱人彼庸人者每以得失爲喜戚而豪傑之士而著於來世匪爵禄而貴者此真貴也周之顔閔漢之郭黄知所依歸宋之周子邵子其人或未嘗有一命之爵或辱在下位奔走而聲光烱然如日月斯何以致之哉世亦有享萬鍾之福而磨㓕無稱者貴賤果何如哉使得希此當復不恨况事變之來未有極乎雖然殆未易及也此數子者皆資賢智之才故卒能有立於世某闇劣菲薄豈足承斯道而顯揚先人哉是以持自少之心不敢決其可否嘗請太史公銘之墓矣世之號能文者亦皆嘗有所論述者矣惟執事實先人之友必有以慰先人於地下而塞諸孤之望與潘擇可先生頃以先人之故獲接緒言于執事執事盖有意於開之贈以文辭儗諸古之君子而望以賢者之道旣而執事以官滿去某亦以先人歸欲繼有請而各以事維無由相邇近者至郡城去執事爲未逺謂足以償私願矣又迫於誣搆無湏臾之間是以心雖不能暫忘而未能奉一書道曠缺謝不敏此宜得過於長者無惑也今也執事不惟不即棄絶且因士友賜之書上見先人交與之義下嘉其所守而撫存之意氣閔閔加於疇昔且慚且感不能自勝然後知君子之量出於恒情非妄意所及也然竊有疑焉交際之崇卑稱號之輕重固有常禮矣非尊而尊之過也非稱而受之愧也故君子之於名必使尊之者無過受斯名者無愧而後可執事於年則倍蓰也於徳則前進也於分則與先人仕同時也若某之少且愚字之已過矣於字加稱號焉於稱號加以先生之稱焉於禮得無不相似乎此其爲愧也甚大雖感盛心之厚不敢受而居也執事言行爲學者視效不督教以所不及而嘉之不遇以後進小子之禮而過稱之則某安所容乎茍黙而不發非惟非某有請於執事之意執事始欲開暁之者殆不若是是以重有說焉不宣荅林公輔僕自京師歸潜伏奥宻不與世人徃來於有聲勢者尤不喜見兼以疾瘧彌年氣力羸憊未嘗妄出戸限又素嬾作書䟽由是平生故人如足下者例成䟽濶瑄上人及同姓九成囘再承寄至書撫問稠疊厚甚且知足下棄官代父軍役旋即䝉恩復其章綬行益脩文益峻聲譽益隆此固閭里所望者然僕私願於足下則不止此百餘年來士大夫學術卑陋駁雜不復知聖賢成已正心之大方苟焉以釣名取寵謄陳言記成說則夸以爲知經摭拾騫𥙷稍旁句讀則自負以爲能文風俗既成衆咸趍之而不可制僕誠戅騃無似亦欲掃末流之弊復前聖之軌使古人之大全復章徹於天下質弱噐陋志力不強疾病侵加朋友衰散獨行而莫爲之徒空言而無誰與和不能有所建明之漸可見於此矣於是之時而求可以共進於斯道者舎足下将安望哉徃年在郡城中相與徃復論議甚壮四顧坐席皆一時之英以爲吾軰講習之樂當自此始豈知數年之間葉公死伯欽之官北方足下之京師廷壁元采各奔走於饑寒而僕復倀倀與樵夫野人爲伍年齒益加志願愈乖困窮愈篤嗟夫使吾至此而不獲與聞斯道者孰非天耶而吾尚何怨乎所可恃者與足下皆未老制於人而不得爲者吾莫如之何由乎我而人莫之制者勉而終業必有所可望求諸千載之上有師友焉放諸四海之内有同志焉垂之百世之後有知巳焉一其心而定其志逺其期而後其獲不有得於人将有得於天不有取於今将有益於後來然則吾之自處者豈不𥙿而望於足下者夫豈薄也哉寄示諸文已詳讀之求之軰流可謂特出而有餘矣然吾猶願足下以古人自鑑而裁其高下勿爲謟妄小生所戯僕軰之不及古人正以好謟自盈故無日進之階耳使日有人攻撃吾之過闕寧不早有所聞而迷懵至此哉前時好作文字謟子動輙以班馬韓歐相誑時聞其言心亦自喜今而思之使果如前諸公亦未足道而况不及萬萬哉近來絶不喜執筆看古人文辭多不當意不知病昏而然耶抑有以也今年當里長適值海濵築城之役三夫一抽衆務騷然病餘復患瘡瘍殊無意思欲與足下言者滿膺臨𥿄都忘却僅發一二聞周君顧君皆安甚慰當國家任賢之時各勉忠藎以立事功有睱時寄書以警發固陋不宣與士脩二首希魯來知足下已就校師甚以爲喜足下行方志果樂古道於今之世雖得崇位不置毫髪於心於校師乎何有而僕喜者非爲足下盖喜斯道之有助鄉學之未絶也學術之盛衰非有述焉則不明非有繼焉則不傳自古志義宏大而名不立者何限盖莫爲之繼也吾鄉自羅適先生至今且四百年竒偉之士不爲鮮矣其大者載國史小者亦皆自有論著在當世莫不燁然驚動於人而今乃泯泯盖不幸其子孫不能守遂至湮滅而後生之識其姓名者未甚衆豈非可惜哉僕以爲前人之弗傳後死者之責也故竊欲有所紀述而聞見淺狹不能悉其事常懇懇爲人言之苟且者多有志好古者少卒未有知而和之者以爲宜然者獨足下耳是以徃者曽致書足下時足下窮居無異於僕言發而莫之從意鬱而莫之逹久而不報也固宜今足下爲人師從游者皆邑之秀民秀民多於里黨習知而熟稱者也足下試坐召而問焉取其所著者而觀焉從其子孫而徴焉得其實則以示僕某雖文采不足希古作者然使執筆從足下後豈皆不及近代之士乎勒成一書蔵之學官俾人人有所攷法知古先之賢哲益思脩巳治人之道其功用甚大足下毋辭且讓爲也古人不苟著書兾行道耳今即得位亦未易行况足下不以貴賤動心者足下惟以文辭自見於世亦所以不朽矣僕新自婺歸粗有侍奉之驩然與朋友相逺殊悶悱不自勝閒睱能一見臨否辱書重以詩集序見屬意若罪其逋緩者此誠足罪也然僕於庸衆人苟有所求皆不敢拒而亟卑之豈於足下而有所惜邪顧謂凢物處美惡之間者必待人言而後定足下之詩辟之夜光照乗委之道上亦知其爲可寳矣茍又從數數然噪于其側指於人以爲寳不亦費於辭乎斯僕所以久而未作者以足下自足取信於世而然耳非果有所惜也今足下乃不以至美自居而若有取於無能之言何所取之異耶雖然世之有求於僕者非能真知斯文之足取也眩於好譽者之云而不自知耳天下之好文章者比肩而知言者無幾人以斯文稱於人者相望而能言者無幾人能言而知人之言者足下是也然則足下雖無待於僕僕固将卒言之而况懇然屬之乎僕之狂言今且出矣足下誠知言當有以復我無徒罪其遲而幸其得也寄士脩脩徳過邑中爲别承顧語追送令人不忘至此以疾未能出周宗傳家人從金陵還頗聞士淵傾背不知曾有實耗否當今斯文寥寥心之所屬政在此君而竟止於兹其命也夫每與廷璧左民軰言及輙相對歎息第事繫未得徃問其家幸道此情也鄙事未知如何惟聴之於天耳便中無惜示數字揮汗奉状伏兾鍳亮荅陳元采即王元采僕智微才劣不自料其無似而惟吾道之學學之不能專久而無所自得泛泛然與流俗同波其不足以及聖賢之堂序而爲庸衆之趍也果矣足下不見鄙棄望之以古人之事稱其所至而勉其所未能嗟乎天下之愛僕者孰有甚於足下者乎僕嘗恨世之朋友不察鄙陋爲學之私志而徒取其外之文競爲䛕言相傳導以爲容悅聞之慚恧憤悶竊自悲歎安得直諒之士以振吾過哉今乃於足下而有得焉爲賜厚矣雖然僕之不逮古之君子者豈特此乎徳不知所以脩也氣不知所以養也事變之臨乎前而不知所以應也是非得失成敗可否見於古而著於今者不能辯也天經人紀之當行者身日由之而其精微曲折之際不能盡也二帝三王周公孔子之典禮政教亦宜損益折裏施于今而澤乎後者未之講也義利之交公私之分理欲之辯棼如絲毫而易溺難致者未之能擇也與天地同運與寒暑日月並行而不息者古之聖賢或得之以自樂或推之以及人而未之有見也冥然守其愚塊然莫與徒每一思之悱憤奮激如喑者之欲言痿者之思起而不可遂也若是者足下尚其有以教我哉嗟乎今天下之人愛我如足下者誠鮮矣不望我以今人之所能而望我以古人之學不徒期我以古人之學而又發我以學古人之方足下之意信厚矣而僕何足以承之雖然盖有學焉而不至者矣未有至而不由乎學者也僕雖疲駑其敢不勉凡智之所可及力之所可爲者惟道是視有或顛越以忝先聖賢之訓天實臨之足下實棄絶之雖然足下之教我者寧止若斯而已乎僕之過亦多矣出乎口而悔生作乎躬而愧發者日相屬也時時省察求銷絶其端而患學之未至時之不逮踰一二年或可以寡過否乎足下有所聞有所得當以告我僕亦圖可以爲益者以報厚賜不敢忘也所寄二篇之文皆非苟作後篇尤雅潔深婉有法然應世之求不足發抒竒思有得而爲者更示數首甚善葉廷振之亡衰絰中不能徃吊又聞其㓜弟亦亡重可哀也望爲慰其尊祖諸文爲廷振而作者楚語爲佳公輔銘雖傷率易然不害爲好也但銘前不叙其鄉里及其父祖名行復不書其卒葬日月爲失首言刻諸墓上後謂銘諸墓始終爲不相應其意必謂其父人知其名不必書卒葬他文辭可互見故然雖古人有如此者亦用言之否則世久漶漫不知其爲何時之人何人之子也如刻石未成中㫁獨障狂瀾等語亦未醇宜稍爲更定恃與相知故一言之然亦不湏令人知此言出於僕也公輔才氣俊邁未易及之鑿空立論甚有可喜者但理趣易窮不逮古人涵蓄深逺乃本於踈薄所致耳此我軰通患也不論文甚久以足下相愛不覺多言别久得書聞已應僊居之辟爲邑人師士子向服從游多君子寄來文章又皆敷贍紆餘有作者風過前時所見逺甚慰喜無量吾兄年在僕先問學日有所益固鄙心所敬畏者來書偎自卑下每發求教之謙言内視愧恐誠不足當况僕近年爲疾疢所迫懼一旦溘死終無所聞愈思刋落華藻以求身心之實病向時恱人取譽之具朋友交相奨引以爲可喜者非惟不睱爲亦不復爲矣衆人不之察徃徃以此事相督責無以應之則悲且怒不知人亦何用乎此也使誠有志乎學則聖賢之經成法具存放而行之無不可至吾徒雖巧爲說辭亦不足希其毫末棄彼不師而惟吾徒之求不亦異乎吾兄所稱陳憲直僕已知其爲人其所求儆齋之文聞之久矣僕誠無愛乎吾言懼其無益於憲直故媿而不敢岀耳幸吾兄明告之如憲直必欲得之則求之吾兄足矣何必擾擾乎於僕之問也古人之相問告以道而不以文今人舉異乎是僕私自試入道之路莫切於公私義利之辯端居而思之念慮之興一日之間岀於義與公者雖多出於利與私者亦不少則不逮僕者可知也去僕愈逺者又可知也舎此不治而欲爲學是猶縱盜於家而欲府蔵之盈烏可得乎堯舜人心道心之訓孔子之克巳孟子之擴充四端皆是理也聖人所以爲盛者以其公之至義之盡也愚不肖者之不能有爲以其本心汨於私與利而無以自克也吾徒其可去是而不思邪僕前日病而問諸醫醫曰未病可治也既病而醫何益始甚怒之既而思其言盖以醫爲諷者是以樂以此告吾兄天下之不病者㡬人病而求醫者復㡬人醫而肯以情告人者復有㡬哉僕非能醫者盖病而後知醫者也吾兄非病者盖治人之病者也今之病者莫甚於好利而自私宜乎僕之以斯言告也近作易枝辭未能成書又無人繕寫不果奉上從吾遊者造圖築城之役皆散去兀然獨居無可屬筆者自作報書與王脩徳八首在金華時日接當世名人說論恒見所未見悟所未知孳孳窮日求以逹之苟快然有得著於文靜美惡可否輙有能辯而正之者心誠樂之客寓數年不肉而肥姿状情趣自覺大異於衆人盖非爲恱名譽而言然也自違離獨處困伏無人之境所與徃來者皆閭里同軰僕口時有所云彼尚未盡通解况著之於書不惑且笑則幸矣何能有所發明哉每自嘆閔恐遂委頓不復振奮懲創以爲成人之歸日讀古書數卷瞑目深念搔首循舎獨行心憶古聖賢君子道術功業之盛愧交於心若無所容其躬流俗不察猥見引譽以爲有文學知古今䛕言盈耳夸辭滿篋彼之意望於僕則厚矣其如古人何哉若此者以爲知固不可以爲相愛尤不可也足下識高而學古託知之日久不宜泛比衆人苟爲稱說而巳近兩辱書皆未聞箴戒攻䂓之益而惟妄相推奨若真見可敬畏者當今天下學者雖不多然如僕之陋怯曽何足數而足下亟稱之何足下取於僕之微也學者之患莫甚於自小其天自小其天者爲小人善於其所爲者爲大人天與我者若是乎其大也二帝三王以是爲君伊尹周公以是爲臣孔子孟軻以是而立徳垂訓於萬世而吾乃以是而爲末技淺智之資上無以賛聖賢之休光下無以輔民庻於治平小其天也亦甚矣不亦深可悲乎僕雖愚不才其所汲汲於旦暮而不敢息者亦欲全其所受於天者舉而措之於用非止若今之所能而巳也足下不責我以所未至而妄推我是棄我以爲不足進於道豈相知與相愛之心哉然世之欲效忠者常恐人之拒而不納非惟君臣朋友亦然僕自度非拒人者嘗竊怪韓子以斯道自任而不能受善言張籍二書之所譏可謂直矣而反覆救護自謂無害於道好無實之談而罪張籍爲同浴而譏祼䄇夫昔雖同浴而今能譏之則是已悟昔日之非而善改過者也其言可用吾知用其言而已何必追較其昔日爲此而不聴乎韓子好論道而未足以知道者以其過於自信而昧於從善也夫韓子之賢千載不能數人從善不果猶能累於徳况不若韓子者其可不取諸人乎以僕才質固不敢妄論韓子然聴言樂善則自謂過之足下幸察焉得僕之闕則以告我使由是而獲聞君子之道相與詠歌質難樂所得於空閑寂寞之區豈非天下之一快哉聞令兄貴徳入京不敢奉紀善先生書家書中幸爲道意家叔在彼比有報令一子弟來侍僕欲親作一行家貧歳歉未能即動令先附一書煩貴徳兄送逹以慰望者之心幸以鄉里之義得使必到是所願也處此世值此事變每思古人輙用慨然士脩疾比稍减否此方嘗有試者且易得不費又藥性皆平和服之當有効所言綱目義例㝷未入手㝷得即寄上與足下别後三遇期功之䘮入夏來得㿃下疾近又患痔悲憂呻吟忽忽無聊於旦夕之間是以聞吾許君卒雖已久而未獲走望殯幃宣一哀於亡友以致遊處相好之情江窑人至承惠書及詩情辭深切悼斯人之不幸歎斯世之不獲有斯人而恐其泯㓕無傳足下於親愛之義厚矣然許君之淳明脩潔微足下其誰不傷之僕始見許君以爲尚可多得及行天下遇四方士大夫或乗氣舞智以爲通或茍冐無耻以爲能或逞其纎毫之技以夸世自足求一二於千百而不可致然後知許君爲難得也士不知道盖久世所推仰者惟在乎文章文者道所不能無而非所以爲道也僕深厭之深病之每抵許君未嘗不有以發我意其可以共論此事以進乎聖賢之庭戸而天遽奪之不知天者竟若何壽考富貴常不惜施諸鄙夫庸人而恒與豪傑之士競此果何理哉得非衆人取於造物者少故其生成也易所受大者取於造物過多故天有所不能支而自㧞絶摧踣之耶抑天賦之者清明高朗人世隘濁不足以養之故棄去而不顧耶然天下之生不可勝計而古之傳世者未必皆壽考富貴之人也是則安知世之所貴者非後人之所賤今之壽者非後人之所謂夭乎焉知賤於今日者不貴於後夭於當時者不壽於萬世乎以今觀今未足知之以今視古則知之矣且古之傳者足下以爲皆自致乎盖有因人而愈章者李觀歐陽詹之文韓子亟稱之詹文未能脫俳諧之習觀頗振激欲立論亦不雅馴非名世者比也而今人凡讀書者莫不知尊二子豈不以韓子故哉蘇子瞻竒秦少游近借得其集雖有可喜而殊淺迫無深厚之趣使之獨立無知已者未必若今之赫赫大著也匪特文辭爲然雖有道之士亦有然者士之不可無友也如此今許君之可敬而畏者人未必識之所識者乃其詩耳而亦未必識其真也况固有不知其能詩者乎知與否於許君無損益有士焉如許君而不傳當世君子之耻也僕竊望於足下而足下顧以是勉僕夫何期待之過乎僕十五六時耶妄志乎斯道以聖賢行業爲可效而至今十餘年矣湛没流俗之中上不能出才知建太平之䇿康斯民于無窮續周統于既絶次不能抉幽探微明天人性命之奥以詔來世下之不能合一鄉一邑使閭里稱愿人秉介抱拙動與世乖内自思忖茫然無尺寸之長足下不有以教我而猥譽其美不以許君勵僕而俾僕昭揚許君之行何敢當也雖然有意於傳世者多不之傳而有益於世者不求其傳而人自傳之足下姑脩所學孜孜不解僕亦願竭其愚孜孜不解使足下之道光被于人則僕且将依附末耀以昭於後何患許君之不傳平禮記且少留僕嘗惜其混雜無叙又多淆僞欲爲定次之多病未果舊文稿想徧覽之有謬誤處幸以語及僕有所知當不敢隱亦交相爲益之道也不宣承寄示古賦及雜詩數篇賦寓意深逺得楚人音節詩亦蕭然有岀塵之韻諷詠累日喜不自勝某向以安居飽食無毫髪及物之益妄不自度欲蒐輯邑里遺事成一小書上以昭揚賢士君子之濳徳下以爲勸于将來俾後生小子有所慕而爲善盖舉古閭師黨正之軄爾非敢妄竊褒貶之柄而兾其傳也夫古人之傳世者豈偶然哉其事足傳矣其辭不能發之則不可傳其辭與事稱矣作者之道徳言行不足取信於世則雖傳而人不之信今縱使有卓然宏偉可喜之績付之無聞之人著以不聞之辭亦恐其卒歸于泯墜而况耆舊淪䘮之餘聞其名者不知其事言其事者莫考其實而欲取信於無窮焉可兾乎是以嘗爲吾兄言其故而久未成書者此也忠節好友篤行之人既各爲之傳其他文學貴顯者欲析而二之則其跡雖有隱顯之殊而其志行學術初不相逺以仕者爲宦逹既非所以尊之俱目之曰儒林則亦有以政事稱者今不敢僭爲區别通謂之先逹列傳但以時世分先後而不以仕否爲重輕竊意如是庻乎不失其序而無抑揚去取之嫌若夫治邑之大夫其有惠政及民如陳長官胡汲仲亦不可使其遺事日就亡失今爲立良吏篇以處之凡名姓稱于吏民之口者皆得附見焉然宋數百年歷賢令丞多矣世絶無所傳聞徃時紀土風者俱棄而不録今亦無所徴而爲之立傳使其人皆若洪忠宣者由是而興處顯位立名績于天下固不待此而傳若不幸官僅止此疲其心思智力蘄一聞于來世而又不可得豈非可恨哉前所問數公不知曽得其事状否第宋末爲文者矯陳腐之過喜以新竒亂事實如君家太常固未免此近訪得太常及鄭龍圖墓銘至於官位亦以他名易之讀之殊不曉其所居爲何軄所行爲何事惟視之太息而巳文之爲文豈以此等新竒爲好哉真不識其何說也夫文辭於學者至爲淺事以道言之正不必求其新竒惟發人所未嘗言之理則可謂之新非衆人思慮之所及則可謂之竒如孔子之大傳有聖人以來未之有也子思之中庸孟子之七篇有諸子以來未之有也周子之太極通書張程之西銘易傳以至朱子之所論著有經說以來未之有也以其古所未有謂之新竒或可也然聖賢豈務爲新竒哉其道明其徳盛其言不得不高且美耳故夫外道徳以爲文辭者皆聖賢之所棄者也近時自悼少時狂謬所好所業者不過記誦文辭而記誦不能博文辭不能工則又僅得其最陋者以是空言寖多絶無自得之味思一屏絶之而以顔曽所以自治者治其心爲日稍久覺向時過闕愈衆苟不早悟其非㡬老死甕盎中與蚊蚋俱盡而不知天地日月之爲大深可懼也吾兄前書有學無端緒之歎甚見進學之篤近世之淺陋者正坐易足而自高耳未能執筆巳斥顔柳不知晉人書法未能遣辭已呼蘇子瞻爲阿軾欲毀棄其文於孔孟之書未嘗詳讀旬日已指程朱說經之誤紛然辯駁不自愧耻此其人豈復知有天地日月也哉吾軰當深以之爲戒求古人崇大之域而趍焉可也所欲言者無窮不爲吾兄發之則無所發矣然不能詳畧道一二林嘉猷在此静篤可喜不欲其專意爲文辭嘗痛與之言凡在此者亦皆知所向方但未知終竟如何耳近鮑民瞻來其爲人有意於學俾且讀四書以端其本知聖賢所言之要自當知其本末也鄉里質美者不爲少但不喜學故無由與之言使得數十軰錯布一邑豈非美事耶有雜詩數首書遺嘉猷風味出所寄茅栗下如蹲鴟黄獨不足適口然或有無味之味也久不執筆不復成字聊發一笑前者道邑中邂逅得侍坐殊出意外第以僕軰欲歸不欲違其請别後即行弗及造宅請見爲恨耳孟清來聞尚留未到海上頗慰渇思此公徴文致吾兄及文遇之意甚切辭之不可信筆作一叙荅其意幸視而正之邑志曽脩得事畧九篇惟塩筭魚課未知其數兵稍連年數目當問之兵房識文案者倘耳目所及有可問者煩問之諸人傳分忠義孝友篤行貞節四品皆起首矣有可入者湏示及縣先逹尤卓卓者公家瓦全墓銘外有行状否銘文晦澁踈畧不足考其本末雲壑事問兩耆宿索之同姓菊田有詩名不知有子姓事實否他若山南樗園愚可學可兄弟及應伯章諸公皆當時有名士今皆不見其後人言其遺事令人慨然望一一遇可語者問其詳相報富貴而磨㓕者不足道若前數公用心期望與世懸絶矣使其同歸於泯沒豈非吾人之責耶故特奉告不知重到邑時尚未行否張生想巳去欲作書奉令兄先生如有便人再煩致意張君也别久承書具審侍奉多暇文候安適豈勝慰浣又得示悼觀樂生詩覧之慨歎無巳僕在衰絰中屢遭期功之䘮入夏來患㿃下疾近又爲痔所苦欲一徃奠哭以瀉此懐竟未能遂祭文作巳久便中人忽索書弗及録去當俟後便耳韓柳文装裭甚整潔感荷禮記尙欲看續當奉納聞令兄先生常有書不知近巳逺燕否歳月易過學業不見次第心甚愧之有欲言者無惜見教昨卧草一書千餘言粗發所懐人行速未能謹寫先此奉復一日前戯成詩欲寄今就附上不宣昨承寄示同宿詩諷咏累日宛如接對甚慰懸渇聞有桕燭之惠政濟所乏短晷可繼餘光及我者多矣先令兄進徳近爲草得一傳頗自謂無愧辭望界一𥿄寄下當爲書去嘉猷之尊君巳塟不及誌今爲作一墓表俾掲之墓上亦可令界𥿄來皆在千字左右字少𥿄餘却無妨也趙伯欽書今附去所得書云何亦可見示否獻歳欲徃敝親家士友如嘉猷軰欲見者不必屈臨以書逹所欲言足矣便中覼縷勿罪幸甚賤疾不止又無肩輿無由執手爲别此情怏怏無時可忘令兄先生之前有小書一編奉上山人處士之言可爲孟子敬王者設慎無令人知此書出於僕也切叩切叩數千里之别無可爲贈深以爲愧途中得暇幸數附書以慰懸望荅上清張真人僕少時聞漢天師之休風悚然驚歎思見其子孫以考委祉之所在及冠遊京師東南之士徃徃傳至文辭翰墨僕一見輙識之曰此非超乎埃氣之表遺世特立而與造化爲伍者不能至也固巳髣髴執事之爲人數年之前在京邸周賛禮孟啓持所畫便面致雅意徴鄙文若識以爲可語者追惟夙昔之心因不辭而爲之然所習殊業所趨異致自愧不足有所發明天台人來忽辱去年所枉書叙述疇昔辭意閎眇且喻以所存展誦反覆窈然如聆鸞鳯之音爛然如覩慶雲之輝肅然如接言笑於神明之庭廣莫之野不知其相去數千里之逺也僕嘗私悼世降術離言道徳者咸失其宗老子之教至漢而興然其意亦與厥初大異矣况至于今又千載其變遷盛衰之端可勝道邪於此而能獨覺其意奮乎矯厲以反本真如執事者非高世之姿何足以臻此哉昔之所期今乃果合所得者多矣第僕資噐汙陋厄於多病聞道之日甚淺無由致身崇高殊特之境以承緒論於下風然執事方凝掃虚静以久視斯世而僕年齒志力尚有進者他日或遂邂逅握手相目各語所聞以較異同得失計未晚也春和道體何如山中多高人隱者無由奉見徒有傾向而巳臨海縣知縣黄誥黄巖縣知縣張師善台州府儒學教授尙芳訓導李深黄巖縣儒學教諭文程府學生陳縝葉琰王梅齡臨海縣學生李臨卿戴濬之黄巖縣學生孫思光牟汝鈞校對遜志齋集卷之九終
